body:
  text: 卷四百二嬰孩痘疹門總論夫天行豌痘瘡西漢以前經方不載或云建武中於南征虜所得呼為虜瘡次而大小兒相繼傳染為受虜之疫氣故也後世明醫經方始說痘瘡斑疹蓋小兒瘡痘是托質成形在胎食母血穢出腹啼聲才落則咽下血穢同胎糞而下唯血穢之氣存焉因傷寒時氣或積熱潮熱運動穢氣入於五臟其毒當出穢氣入肝與淚相感則為水泡色澤微青以應肝之象旺在寅卯入心與血相感則為斑子色帶深紅以應心之象旺在巳午入脾與涎相感則為疹子色赤黃淺以應脾之象旺在辰戌丑未入肺與涕相感則為膿泡色白而肥以應肺之象旺在申酉腎主色黑腎在下不受穢氣瘡痘不透即變黑色以應腎之象旺在亥子假如小兒寅卯時發潮熱來日依時或三日依時蓋肝旺於寅卯因潮熱而運動肝氣故隨臟而出必知水泡也如巳午時發潮熱來日依時必出斑子也若辰戌丑未時內見點時發熱來日又占一時復作者必知出疹子也如申酉時作潮熱本屬肺臟來日卻在寅卯時發熱不依次第必知膿泡水泡相雜而出余皆仿此推之腎在下不受穢氣唯內虛多歸於腎變黑色難治也難經曰諸陽皆會於頭素問云春陽上升故知先出於頭面也瘡痘者是小兒大難不可不為詳審也錢氏云面燥腮赤目胞亦赤呵缺頓悶乍涼乍熱咳嗽噴嚏手足梢冷夜臥驚悸多睡並瘡疹證此天行之病也惟用溫涼藥治之不可妄下及妄攻發受風冷五臟各有一證肝藏水疱肺藏膿疱心藏斑脾藏疹歸腎變黑惟斑疹病後或發癇余瘡難發癇矣木勝脾木歸心故也若涼驚用涼驚丸溫驚用紅粉丸小兒在胎十月食五臟血穢生下則其毒當出故瘡疹之狀皆五臟之液肝主淚肺主涕心主血脾為裹血其瘡出有五名肝為水疱以淚出如水其色青小肺為膿疱以涕稠濁色白而大心為斑主心血色赤而小次於水疱脾為疹小次斑瘡其主裹血故色赤黃淺也涕淚出多故膿疱水疱皆大血營於內所出不多故斑疹皆小也病疱者涕淚俱少譬胞中容水水去則瘦故也始發潮熱三日以上熱運入皮膚即發瘡疹而不甚多者熱留膚腠之間故也潮熱隨藏出如早食潮熱不已為水疱之類也瘡疹始出之時五臟證見惟腎無候但見平證耳尻涼耳涼是也尻耳俱屬於腎其居北方主冷也若瘡黑陷而耳尻反熱為逆也若用百祥丸牛李膏各三服不愈者死病也凡瘡疹若出辨視輕重若一發便出盡者必重也瘡夾疹者半輕半重也出稀者輕裡外微紅者輕外黑裡赤者微重也外白里黑者大重也瘡端里黑點如針孔者勢劇也青乾紫陷昏睡汗出不止煩燥熱渴腹脹啼喘大小便不通者困也凡瘡疹當乳母慎口不可令飢及受風冷必歸腎而變黑難治也有大熱者當利小便有小熱者宜解毒若黑紫干陷者百祥丸下之不黑者慎勿下更看時月輕重大抵瘡疹屬陽出則為順故春夏病為順秋冬病為逆冬月腎旺又盛寒病多歸腎變黑又當辨春膿疱夏黑陷秋斑子冬疹子亦不順也雖重病猶十活四五黑者無問何時十難救一其候或寒戰噤牙或身黃腫紫宜急以百祥丸下之復惡寒不已身冷出汗耳尻反熱者死病也何以然腎氣大旺脾虛不能制故也下後身熱氣溫欲飲水者可治以脾土勝腎寒去而溫熱也治之宜解毒不可妄下妄下則內虛多歸於腎若能食而痂頭焦起或未黑而喘實者可下之身熱煩渴腹滿而喘大小便澀面赤悶亂大吐此當利小便不瘥者宣風散下之若五七日痂不焦是內發熱熱氣蒸於皮中故瘡不得焦痂也宜宣風散導之用生犀磨汁解之使熱不生必著痂矣瘡疹由內相勝也惟斑疹能作搐疹為脾所生脾虛而肝旺乘之木來勝土熱氣相擊動於心神心喜為熱神氣不安因搐成癇斑子為心所生心生熱熱則生風風屬於肝二臟相搏風火相爭故發搐也治之當瀉心肝補其母栝蔞湯主之瘡黑而忽瀉便膿血並痂皮者順水穀不消者逆何以然且瘡黑屬腎脾氣本強或舊服補脾藥脾氣得實腎雖用事脾可制之今瘡入腹為膿血及連痂皮得出是脾強腎退即病出而安也米穀及瀉乳不化者是脾虛不能制腎故自泄也此必難治睦親宅一大王病瘡疹始用一李醫又召錢氏錢留抱龍丸三服李以藥下之其疹稠密錢見大驚曰若非轉下則為逆病王言李已用藥下之錢曰瘡疹始出未有他證不可下也但當用平和藥頻與乳食不受風冷可也如瘡疹三日不出或出不快即微發之微發不出即加藥加藥不出即大發之如大發後不多及脈平無證者即瘡本稀不可更發也有大熱者當利小便小熱者當解毒若出快勿發勿下故止用抱龍丸治之瘡痂若起能食者大黃丸下一二行即止今先下一日瘡疹未能出盡而稠密甚則難治此誤也縱得安其病有三一者疥二者癰三者目赤李不能治經三日黑陷復召錢氏錢氏曰幸不發寒而病未困也遂用百祥丸治之以牛李膏為助各一大服五日間瘡復紅活七日而愈蓋黑者歸腎也腎旺勝脾土不能剋水故脾虛寒戰則難治所用百祥丸者以瀉膀胱之腑蓋以腑若不實則藏自不盛也何以不瀉腎曰腎主虛不受瀉故以二服不效即加寒而死四大王宮五太尉因墜鞦韆發驚搐醫以發熱藥治之不愈錢曰本急驚後生大熱當先退其熱以大黃丸玉露散惺惺丸加以牛黃龍麝解之不愈至三日肌膚上熱錢曰更二日不愈必發斑瘡蓋熱不能出也他醫初用藥發散發散入表表熱即斑生本初驚時當用利藥下之今發散乃逆也後二日果斑出以必勝膏治之七日愈睦親宮十太尉病瘡疹衆醫治之王曰疹未出屬何臟腑一醫言胃大熱一醫言傷寒不退一醫言在母腹中有毒錢氏曰若言胃熱何以乍涼乍熱若言母腹中有毒發屬何臟也醫曰在脾胃錢曰既在脾胃何以驚悸醫無對錢曰夫胎在腹中月至六七則已成形食母穢液入兒五臟食至十月滿胃脘中至生之時口有不潔産母以手拭淨則無疾病俗以黃連汁壓之云下臍糞及涎穢也此亦母之不潔餘氣入兒臟中本先因微寒入而成瘡疹未出五臟皆見病證內一藏受穢多者乃出瘡疹初欲病時先呵缺頓悶驚悸乍涼乍熱手足冷痺面腮燥赤咳嗽時嚏此五臟證具也呵缺頓悶肝也時發驚悸心也乍涼乍熱手足冷脾也面目腮頰赤嗽嚏肺也惟腎無候以在腑下不能食穢故也凡瘡疹乃五臟毒若出歸一證則肝水疱肺膿疱心斑脾疹惟腎不食毒穢而無諸證瘡黑者屬腎由不慎風冷而不飽內虛也又用抱龍丸數服愈以其別無他候故未發出則見五臟證已出則歸一臟也傷寒男體重面黃女面赤喘急憎寒口中氣熱呵缺頓悶項急瘡疹則兩腮赤燥多噴嚏悸動昏倦四肢冷傷寒當發散之治疹行溫平有大熱者解毒陳氏方論云小兒在胎之時乃母五臟所養成形也其母不畏禁忌恣意所欲加添滋味好啖辛酸或食毒物其氣搏於胎胞之中所以小兒在胎胞之時受得此毒名曰三一者五臟六腑穢液之毒發為水疱瘡二者皮膜筋肉穢液之毒發為膿水疱瘡三者氣血骨髓穢液之毒發為膿血水疱瘡三毒既出發為疹痘子母須當慎口不可食蔥薤韭蒜酒醋鹽醬獐兔雞犬河海蟲魚等物世俗未曉將未發舉往往不顧其後誤傷多矣凡療瘡疹先分表裡虛實若虛實不分則無所治如表裡俱實者其瘡易出易靨如表實裡虛者其瘡易出難靨已出未出之間或瀉渴或腹脹或氣促皆謂之裡虛速與十一味木香散治之以和五臟之氣已出未出之間其瘡不光澤不起發根窠不紅謂之表虛速與十二味異功散治之以表六腑之氣已出未出之間其瘡不光澤不起發根窠不紅或腹脹或瀉渴或氣促是表裡俱虛也速與十二味異功散送下七味肉豆蔻丸治之以助五臟六腑表裡之氣始出一日至十日渾身壯熱大便黃稠是表裡俱實也其瘡必光澤必起發必肥滿必易靨不致損傷也發熱口乾煩渴不止者切不可以冷水及蜜紅柿西瓜等冷物食之不可妄投清涼飲消毒散等藥恐冷氣內攻濕損脾胃則腹脹喘滿寒戰咬牙則難治咬牙者齒槁也乃血氣不榮也即不可妄作熱治之痘瘡雖出不快皆由毒氣壅盛妄謂其熱以藥宣利解散致令臟腑受冷榮衛澀滯則血氣不能充實皮膚肌肉其瘡不起發不充滿不結實不成痂故多癢塌煩躁喘渴而死皆因宣利解散之過縱有生者必罕矣大抵天地萬物遇春而生髮至夏而長成乃陽氣熏蒸故得長成今瘡疹之病腑臟調和則血氣充實自然易出易靨蓋因外常和暖內無冷氣之所由也異功散能除風寒濕痺調和陰陽滋養氣血使瘡痘易出易靨不致癢塌小兒才覺傷風身熱未明是與不是瘡疹便宜發散可服四味升麻葛根湯如瘡疹始出一日至五七日之間雖身熱或腹脹足梢冷者不宜也或身熱瀉渴驚悸腹脹熱汗出者不宜升麻葛根湯以上四證宜以十一味木香散治之如瀉水穀或瀉白色或瀉淡黃色者煎十一味木香散送下七味肉豆蔻丸治之瀉止住服不止多服若頻瀉多津液內耗血氣不榮其瘡雖起發亦不能靨如身溫腹脹咬牙喘渴者難治緣水穀去多津液枯竭而欲飲水不止者蕩散真氣故多死速以十一味木香散救之不愈者異功散治之木香散性溫平能和表裡通行津液清上實下扶陰助陽之藥也善治小兒腹脹瀉渴其效如神不能盡述如四五日不大便者可用肥嫩豬胰一塊以淡白水浸火煮軟熟取出切如豆大或皂子大與兒食乏令臟腑滋潤使瘡痂易落百無滯礙切不可妄投宣瀉藥恐內虛瘡毒入里傷兒真氣如六七日身壯熱不大便其脈緊盛與三味消毒散微得利即住小兒神氣軟弱瘡疹自初出兩三日至十三日當忌外人恐有卒暴風寒穢惡之氣觸兒瘡疹凡遇經者作三次出大小不等頭面稀少眼中無根窠紅肥滿光澤重者一齊並出如蠶種灰白色稠密泄瀉身溫腹脹頭溫足冷輕變重犯房室不忌口先曾瀉飲冷水餌涼藥重變輕避風寒常和暖大便稠若身反發熱煩渴者宜服六味人參麥門冬散治之如不愈者只服七味人參白朮散若痘瘡欲靨已靨之間忽不能靨腹脹煩渴不可與水蜜若與者轉渴而死急用十一味木香散救之若痘瘡欲靨已靨之間頭溫足指冷或腹脹瀉渴氣促者不可與水蜜與者即死速煎十二味異功散救之痘瘡十日至十一日當靨不靨其身不壯熱悶亂不寧臥則哽氣煩渴咬牙急煎十二味異功散更加木香當歸以救陰陽表裡若與水蜜西瓜等冷物者殺之太速十二日十三日瘡痂已落其瘡瘢猶黯或凹或凸肌肉尚嫩不可澡浴不宜食炙煿物及不宜食五辛五味並有毒之物恐熱毒熏於肝膈眼目多生翳障若不依此當為兒子終身之患用兩味穀精草散治之若身壯熱經日不除則無他證六味柴胡麥門冬散治之熱退者住服如不愈只服七味人參白朮散極妙若身壯熱大便堅實或口舌生瘡咽喉腫痛皆是瘡氣餘毒未盡四味射干鼠黏子湯治之如不愈者七味人參白朮散主之若風熱咳嗽咽膈不利三味桔梗甘草防風湯治之如不愈者七味人參白朮散主之若涕唾稠黏身熱鼻乾大便如常小便黃赤十六味人參清膈散治之如不愈只服七味人參白朮散立效若痰實壯熱胸中煩悶大便堅實臥則喘急五味前胡枳殼湯治之黃帝問曰飲有陰陽何也好飲冷者冰雪不知寒好飲熱者沸湯不知熱岐伯對曰陽盛陰虛飲冷不知寒陰盛陽虛飲湯不知熱治之何如故陽盛則補陰木香散加之以丁香官桂陰盛陽虛異功散加之以木香當歸每一兩藥共加一錢小兒痘瘡首尾不宜與水吃若誤與之瘡靨之後其痂遲落或身生癰腫若針之成疳蝕瘡血水不絶甚則面黃唇白以治難愈者何也蓋脾胃屬土外主身之肌肉祗緣飲水過多濕損脾胃搏於肌肉其脾胃肌肉虛則津液衰少津液少則榮衛澀滯榮衛澀滯則氣血不能周流凝結不散故瘡痂遲落而身生癰腫若有小渴者六味人參麥門冬散治之如不愈者只服七味人參白朮散極妙若身熱大渴者七味人參白朮散治之如不愈者只服十一味木香散如腹脹渴者或瀉渴者或足指冷渴者或驚悸渴者或身溫渴者或身熱面㿠白色渴者或寒戰渴不止者或氣急咬牙渴者或飲水轉渴不已者以上九證即非熱乃脾胃肌肉虛津液衰少故也宜服十一味木香散治之如不愈者更加丁香官桂多煎服丁香攻裡官桂發表其表裡俱實而瘡不起癢塌喘渴者死矣小兒瘡疹已靨未愈之間五臟未實肌肉尚虛血氣未得平復忽被風邪搏於膚腠之間則津液澀滯故成疳蝕瘡也宜用雄黃散繭綿散等藥治之久而不痊者潰骨傷筋以致殺人治瘡痘法十二事驚瘡第一小兒因傷寒時氣運動瘡痘欲出身熱忽發驚搐心生熱熱則生風風屬於肝二臟相傳風火相爭故驚搐也凡身體壯熱耳輪鼻尖及手足梢冷忽發搐者此非驚是痘搐也其驚搐則諸處皆熱有驚定後熱不退者三兩日必出瘡痘再出亦同上用驅風膏導赤散不退洗心散琥珀散涎盛利驚丸瘡欲出第二小兒因傷寒時氣頭疼壯熱憎寒咳嗽氣粗呵缺嚏噴大小便如常瘡痘未分或目澀肚疼者上用升麻湯惺惺散羌活散鼠黏散防風湯小柴胡湯閻氏云小柴胡治瘡痘驗夏月白虎湯甘露散擇用之夾食吐逆泄瀉發熱氣粗千金丸消食丸豆蔻丸四君子湯白朮散相間服惺惺散瘡疹攻目第三瘡痘欲出先攻目赤腫不開次出瘡痘不甚紅活有痰者設有安者須損眼目上用調肝散護目生銀丸並珍珠丸化痰宜更對證用藥痘毒生癰第四瘡痘正出或痘後生熱不去必生癰腫或毒攻眼目或從瘡跡中再出濃泡者是痘毒未盡大便焦黃或堅實者上用四順飲利三兩次並鼠黏湯夏用白虎湯時時多服之瘡痘肚疼第五瘡痘正出微紅無事忽因傷食肚疼叫哭者上用消食丸不退解毒丸微微逐食次用益黃散即安活人書云切不可用巴豆丸子藥下之此藥乃攻食積今有此肚疼證用之不妨若慮其下之恐因肚疼變動瘡痘縮伏第六瘡痘正出大便如常或堅實或焦黃忽憎寒戛齒者是痘毒縮伏多作此證上用大戟散前病若退隨證更發瘡痘如不退者死瘡痘吐瀉第七瘡痘正出吐瀉不食忽憎寒戛齒者瘡必黑陷喉中涎喘蓋兒先受風冷血氣虛弱即變此證難治多死上用益黃散甚者金液丹並食前服若吐瀉定後思食證平復方可用發瘡痘藥設不安者必生癰腫大小便澀第八瘡痘盛出身熱煩渴腹脹而喘大小便澀面赤悶亂上用八正散四順飲不退宣風散瘡痘入眼第九瘡痘盛出熱毒氣攻則斑瘡入眼多食毒物亦爾若覺眼腫或赤痛多淚時與開看睛無瘡即不害若有瘡赤腫者上用四順飲每日食後一服常令微利毒消平愈不爾害目解利瘡痘第十瘡痘出盡身涼喜食大便如常者上用四順飲子利三兩次後不生別病如失解利恐赤眼癰腫鼻衄下痢疥癩數證內皆不能免也痘毒發驚第十一瘡痘出後身熱不退時復搖頭手顫必發驚搐上用抱龍丸驅風膏琥珀散熱盛四順飲八正散鼠黏湯白虎湯不退無比散蓋豆毒所作也若瀉有此證者多死瘡痘作痢第十二瘡痘欲安不曾傷食有肚疼者是豆毒大盛氣血凝結腹中不散久必作膿血痢上用四物湯加罌粟皮大便堅實或瀉焦黃或熱或不熱有肚疼者四順飲若瀉白酸臭傷食肚疼者先益黃散後解毒丸令微利再益黃散瘡痘避忌者十腋中狐臭氣俗呼豬狗臭是也房中淫泆氣新房之氣是也婦人經候氣並諸般血腥臭惡醉酒葷腥氣聞醉氣痘毒畜入兒飲酒痘毒發出硫黃蚊藥氣並毒藥之氣硫黃之氣赤目觸之疾痛難瘥麝香臊穢氣聞麝香即畜入痘子吃即發出疫汗蒸濕氣錢氏云左右有胡荽酒闢汗氣誤燒頭髮氣並魚骨諸般臭氣及柴煙入口鼻內蔥蒜韭薤氣及烹炮煎煮油煙等氣溝糞濁惡氣孫真人云胡荽酒闢諸般惡氣出快以上皆不可犯令兒變動不可不忌蓋親歷驗也或曰有田舍小兒任之自然犯之者都無變動何也蓋貴賤有異稟受不同也凡出瘡痘首尾不可出風宜於虛爽處坐臥寒溫得所忌動風物食白魚野味頻與稀粥易能安愈應瘡痘才欲著痂即用酥蜜面油不住潤之可揭則揭遲則瘡硬成瘢痕治痘痕面靨密陀僧為末水調夜塗明日洗去平復瘡痘可畏者十不食多渴渴瀉不食益黃散白朮散不瀉不食白虎湯杏甘湯戛齒噤牙能令痘子陷伏是腎旺也治法在前憎寒困倦能令痘子縮伏是脾虛也治法在前煩躁體熱搖頭者欲生風候治法與大小便同吐逆泄瀉食不化益黃散正出並痘後大便膿血金粟膏桃紅丸瘡作黑坑內無膿血或黑色疱或無瘡跡作黑孔多死大小便澀四順飲八正散三黃丸玉漿散癰塊壅腫痘毒變疳口臭蝕牙唇口鼻牙落者死喘急痰盛杏甘湯生銀丸珍珠丸無比散聲啞氣噎或正出盛或痘後有此證多死咽藥食入腹中鳴者亦死以上是瘡痘惡證首尾可畏也除此之外皆不妨內犯其一二者但飲食如舊雖困重醫救有可生之理如飲食減平日一半者死有飲食如舊內犯其三四者亦死舌黑或鼻有黑氣並不治瘡已出而譫語者為惡證瘡成餅搭黯慘不發其聲焦啞不治兩眼閉而黑睛矇昧無光不治面腫鼻陷目閉頻齧齒者不治頭面腫大瘡盡爪破或臭不可近或腳冷至膝並不治瘡小黑而焦風攻頤頷唇頷腫硬或胸高而實並不治小兒諸病但見兩眼無睛光黑睛無運轉目睫無鋒芒如魚眼貓眼之狀個個不治或神藏於內但外若昏困者無妨其有病篤而眼中神氣不脫者猶可以活眼者五臟六腑神氣之所萃神氣已脫脈雖僅存亦未能保論瘡痘約日訣小兒瘡痘與傷寒相類或安或危或見或隱皆六七日之間歸證明矣凡瘡欲出先發熱輕者三四日次者五日遠者不過七日此約法也一日太陽傳膀胱二日陽明傳胃三日少陽傳膽四日太陰傳脾五日少陰傳腎六日厥陰傳肝七日還經傳遍五臟六腑故七日而止也又有小兒因傷寒至七日後或已汗或未汗或吐下後熱不除此毒氣盛而未發熱毒入胃發於皮膚成斑者狀如蚊蚤所齧赤斑十生一死黑斑十死一生及有胃熱發黃者狀如橘色不利者死又有成癮疹或白泡者此皆傷熱毒不除多變此疾也辨瘡疹諸證聞人氏云瘡痘之熱與諸熱似是而非若同而異此病之所以能惑人也凡小兒瘡痘其初不免乎發熱然必雜見四臟之證呵缺頓悶時作驚悸乍涼乍熱手足冷多睡面赤痰嗽打嚏惟腎無證耳若它病之熱種種不同如手足稍微冷發熱惡寒而無汗面色青慘而不舒左額有青紋者傷寒熱也手足稍微溫發熱自汗面赤而光者傷風熱也目胞腫而右額有青筋發熱而頭額腹肚最甚或兼嘔吐腹疼者傷食熱也面色青紅額正中有青紋手心有汗時作驚惕手絡脈微動而發熱也此驚熱也身熱而倍能食唇紅頰赤大小便祕脅下汗者此風熱也又有潮熱者發歇有時壯熱者一向熱而不已如懵然不分一概調治鮮不敗事諸熱失治皆能作瘡痘者蓋病有初異而後同者要當早為之所且瘡痘之毒蘊伏在裡非熱蒸則無自而出是以古書云熱蒸三日而斑生往往其間已見瘡痘之證今也不問傷寒傷風傷食之熱與夫驚熱風熱或潮熱壯熱之類久而不去內外感發則所蘊瘡痘之毒亦能乘間而出用藥者既先知熱之所以異又能慮熱之不解亦將為瘡痘之證斯可謂之良工矣嘗觀傷寒有胃爛發斑溫毒發斑二者其初均發熱也方其熱作之初孰謂其有發斑之證邪然則諸熱失治而能為瘡痘者斯言信矣挾熱而吐利者不可誤投燥藥蘊瘡痘證而先發搐者不可遽投驚藥經云諸痛癢瘡皆出於心今瘡痘之出雖四臟各有證要之心實為之主毒氣始作未形見之間忽發驚搐是毒氣自心經而出也苟不以內外證辨明之不為瘡痘防備之便用銀粉腦麝青黛等藥則心寒而飢斂毒氣內陷往往瘡痘之初似驚風發搐者每多誤服寒藥而死者氣絶之際或隱隱斑出已無及矣蓋心竅一寒則毒氣閉伏表裡不透又況心主一身之血心寒則血凝而不行瘡子欲出不可得也且瘡痘發驚必有它證相雜又有小兒平居安樂素無疾苦而忽爾作搐者必是瘡痘尤當審諦但用發散毒氣如惺惺散升麻湯紅綿散兼快氣利小便等藥服之雖未能即效決不致敗事待其熱氣得泄心神亦自安矣或有風寒與內熱相搏而致此者則各有其證治之亦如前法但加勻氣藥為妙張氏云瘡痘氣勻即出快蓋氣勻則榮衛無滯有寒亦敗大抵治驚惟平肝利小便最為第一小兒臟腑先有伏熱而適外感風寒或內傷生冷以致陰陽相拒發作腹疼或腹中作塊攻擊若手足稍及尻陰俱冷而腹中硬痛者是瘡疹證無疑矣更參以其他證候尤宜詳審但與平和勻氣兼發散藥為妙苟不知此便投巴豆大黃輩戕賊胃氣使毒氣不能宣發立致危殆其間縱有能發見者往往中道而廢為倒靨為陷伏終歸不救古人立升麻湯治小兒瘡痘嘗思古人之意蓋治瘡痘之常不治瘡痘之變何也未有斑點之前均發熱者常也已結痂疕之後均有餘熱拂鬱而肌表未清涼者亦常也是以升麻湯方效治瘡疹未發已發未發者謂未見斑點之前已發者謂已作痂疕之後此升麻湯所以為治瘡疹之常者也若夫斑點既見與夫痂疕未結其候千變萬化治法在隨證滲泄曾非定論之可拘如傷寒之變異不一也當此之際安可執一藥以應無窮之變哉且升麻湯所用之藥不過涼肌散解表而已未見斑點之前已結痂疕之後則可以涼肌可以解表古人處方之意如此曷嘗令用之於瘡疹正作之時耶今昧者不能究此既見斑點尚令兒服餌致肌寒表弱陷伏而危殆多矣升麻葛根湯按和劑方瘡痘已發未發者皆可服世俗習為常談不問小兒虛實冷熱自首至尾率多用之甚者方發而不快既發而復陷亦以升麻湯為常用之劑其為害可勝嘆哉何者葛根解表升麻差寒小兒氣盛熱多服之猶可以消毒萬一內虛胃弱則以水濟水寧不虧損胃氣冰凝血脈而瘡疹轉為之逆陷乎夫古人所謂未發者方身熱尚疑似之時也所謂已發者既透徹欲成痂之候也曷嘗以發而不快與發而復陷為可用升麻哉若不辨明殆恐世俗相傳枉死者半矣又況人之齧牙大熱大毒或者相習變陷不透者不問虛實一概用之其害又有甚於妄用升麻之不審也蓋瘡痘變陷有因外感風寒而壓之者治法則當解散寒邪有內氣大實榮衛不得調暢而出不快者治法則當流行氣脈安可概曰冰冷直用人牙遂使小兒服之鬱悶聲啞逮其發出稠疊異常往往沿比而不救矣曷不用紫草黃耆川芎甘草輩為愈哉始末日數有定熱蒸三日則紅斑生紅斑生至足心為齊不拘多少重者遍身輕者數枚而已紅斑生血疱起如豆在肌膚之上故以痘為名焉血疱結濃疱血疱結痂疕方為愈也紅點既見慎不可用升麻湯蓋升麻湯寒肌多致害人已見而出遲者用紫草飲子胡荽酒如證候平和者勿妄服藥惟愛護安養之紅點出齊之後作血疱七日結膿窠膿窠結定七日悉成痂疕此皆大略之言耳病人虛實不等不可拘以日數且古人云熱三日而生斑今有熱七日或數日而方生者亦有熱一二日而即生者自紅斑出齊之後當盡成血疱若血疱之中又尚有紅斑點相雜亦不可拘定日數待其皆作血疱為齊如紅斑出齊生血疱血疱七日結膿疱膿疱七日結痂疕此乃榮衛調和內外無諸傷犯方能如期或正作之際遇風候乖變遲速因而失序又豈可必拘以日數哉其有當結膿疱而不結者是毒氣彌盛而不斂用豬尾膏以解之豬尾膏是治毒氣太過血疱脹起不結膿窠膿窠已成不結痂疕熱極毒熾恐復入於心令兒昏悶而死故也非若外感風寒而倒靨內虛吐瀉而陷伏者之比出不快者數證不同不可不辨自紅斑出齊之後當漸成血疱血疱成膿疱膿疱結痂疕而愈也若紅斑已見三四日而反不出者乃毒氣內陷其證危甚切不可妄發及妄下發之則為斑爛下之則為虛脫凡小兒蘊毒在內遇冬溫或春夏暄熱腠理蒸郁遂出為瘡痘若正發之際忽天氣大寒毒氣反伏而不出則精神昏冒面青發熱或譫言妄語當此合用解肌表出之藥如紫草蟬蛻發散兼溫養如活血散之類感寒證畢備者凡和解發散之劑皆可斟量用之又有紅斑方出或內虛或因犯胃氣臟腑自利虛弱不食遂陷而不出者宜用溫里之藥甚者雖硫黃薑附靈砂伏火丹砂等亦可用大抵用藥治病或冷或熱所以救一時之不及不可拘以常制或將成血疱之際一半尚是紅斑點者此毒氣發越未透故也當此必不能乳食大便如常者宜半溫里半助養之劑其或內虛甚而生寒大便利者宜理中姜附輩以溫之里溫則氣不削氣不削則不伏陷矣又有內實之人皮厚肉密毒發難於發越至服大黃梔子乾葛石膏之類而得平順者或有適當炎月觸冒暑邪煩躁喘急大渴昏迷而發作不快用白虎石膏湯抱龍五苓之類而得安靜者此皆臨病識證隨時審諦不可執泥也大凡平居安樂則心神調暢氣體和平一旦有病則陰陽偏勝盛衰不同瘡痘已出而不能遍勻者前人治法唯透肌解毒而已肌透毒解既無壅塞之患則自然出勻宜必勝散快毒丹紫草飲胡荽酒之類出大盛而面黃大便色黑煩躁喘渴或腹脹者此為有瘀血在裡宜犀角地黃湯及治瘡疹中衄血吐血毒氣彌盛者若太盛之際不能解利則其害尤速如抱龍丸至寶丹生犀磨汁紫雪之類皆可選而用之若大便祕實小便不赤黃恐外熱而內寒又當別求治法嘗觀傷寒邪在裡則不可妄發汗邪在表則不可妄下瘡痘之不可妄發妄下者尤甚於傷寒雖然治瘡疹之家有云非微汗則表不解非微下則里不解者何也此說微汗則在表熱方熾斑點未見之先微下則在病之始及病之末裡熱壅實之際何嘗於瘡痘正發作之時而輒施汗下哉蓋妄發之則成斑爛妄下之則成虛脫不可不審如治傷寒法表和里病下之則愈汗之則死表病里和汗之則愈下之則死亦此理也非微汗則表不解者何瘡痘之源雖是蘊毒然必因天氣暄暖或感冒風寒及諸熱不解然後斑生方其發熱斑未見之時得微汗解散則雖為瘡痘其勢亦輕此所以言非微汗則表不解也蓋其證身熱頭疼鼻塞咽壅痰涕咳嗽面目赤色皮膚緊而脈數此皆熱極之故當此之際毒氣亦不輕者得微汗少解則可以折其方來之勢升麻湯等主之如斑點已出則慎不可用又有因服發散藥邪毒之氣隨汗作白珠子或出小紅瘡應手而解者不可不知也非微下則里不解者何病有始有中有末三者不同不可一概用藥且身熱脈數大便祕而腹脹此熱毒壅遏未見形伏者當微下之非微下則熱不減此是始者熱在裡斑未出之時也若斑點隱隱在肌膚中者是已發越在表宜用平和輕快勻氣藥此毒氣已在表瘡正發時則不可妄下也又有結膿窠痂疕之際脈尚洪數能食而大小便祕此表證已罷里有熱毒宜微利之大抵臟腑自熱往往利大小便者以其主出而不內故也大便如常者胃中主腐熟水穀大腸主傳送已化之物此平居察虛實冷熱之處蓋飲食進退則知人穀氣之虛實大便滑澀又知人臟腑之冷熱今大便如常則是其中平和無過冷過熱之患不必溫補亦不可妄攻擊然則大便如常是亦瘡痘之一順也病勢有遲速用藥當度其宜可速則速可緩則緩凡瘡痘非合下證但當以平和藥扶持之乳食調養之避風寒以溫之如已見三五日而尚未快出者可微發之微發不出則加藥加藥又不出無他證者則是瘡本稀不可更發也今人才見發之不出往往便下使其人內虛欲出者因利而不出已出者為陷伏為倒靨變壞歸腎以脾土弱而腎水反勝故也錢氏論以百祥丸下膀胱毒則脾土再實瘡痘復出要之與其下膀胱毒於黑靨之後莫若保脾土於未下之先則不下為愈縱下之而愈亦有三證一疥癬二瘡癰三目赤故前人論曰斑點未見蘊熱壅盛毒在臟腑宜預下之又牛黃丹證云瘡痘出定大便不通膿汁不幹者可下之以此觀之當下是病之始未出之前及病之末已出定之後非正出之時可下也大抵用藥治病能隨證滲泄斯為良法至於或用下藥者實出於不得已如傷寒有承氣之戒皆慎之至也雖然有當下證而不即下者又為失下之患所貴乎細審詳察耳有可下證者瘡疹出得太盛當結膿疱痂疕而不結者此是毒氣內外貫注若不速解之毒氣內入次心為害極大治法宜豬尾膏其有不結膿疱痂疕反能食而喘腹脹譫語不大便者當以承氣湯下之如熱甚而渴面赤悶亂大小便澀或大吐者合利其小便通關散主之或瘡疹已出定膿汁不生而大便不通者宜牛黃丹或瘡疹證未見斑點胃熱潮作氣粗腹脹大小便祕驚悸煩渴脈沉滑而數者此是毒盛而不得泄亦當用藥下之則內無滯塞榮衛升降其勢將自出此皆合下證也有發出有溫出有解毒者蓋病有輕重善治者能令重者輕輕者安和仲景論治傷寒宜隨證滲泄是也但身熱煩躁脈促喘滿有瘡疹證而斑點不見其熱未退者以麻黃湯等發之若斑點才見即止後服此謂表發而出之也或稟受怯弱脾胃虛冷大便自利而手足厥逆者炮乾薑炙甘草湯益黃理中輩可選而用之此溫里使之自出也或瘡痘正出有毒入大腸下利黃赤膿血身熱而渴者以薤白湯三黃熟艾湯解之此解其大毒而使之自出也於斯三者或發或溫或解其毒其證不同在審而用之也有令大便潤過者有當溫者有當下者蓋瘡疹傷寒傷食等病身有熱者如大便六七日不通須令潤過非取其峻快也然亦當以外證參之如仲景論陽結陰結期十四日十七日方劇若其人不腹滿不裡急後重則亦不必攻之今言六七日令潤過者得氣道升降則無壅遏之患緣小兒脆弱身熱而大便不通者則易實大便自利者則易虛惟令得所最為要法其有忽然溏瀉者須要理中湯丸輩溫之又有出得正盛喘促腹滿小便赤掌心及腋下有汗或譫語而大便不通者當投小承氣之類以下之下後瘡子紅活諸證悉退者更不須再服也已利而瘡痘出則不可再利者飲食滋味雖能益人失之太過亦能害人況烈毒慓悍之藥在已下之後其可再用乎但當其未出因熱勢太盛曾利臟腑令瘡痘既出則是內無壅滯明矣縱其熱尚熾但當解毒切不可更用利性等藥蓋實實虛虛古人之深戒雖然若使果合再利亦當更用但小其劑可也大熱當利小便小熱當解毒者大熱謂身熱脈實大小便祕津液燥而渴氣滿於胸中能食而不結膿疱痂疕當此之際懼其變生他疾故利小便使心火有所導引則雖不用冷藥熱亦自減去矣瘡痘不至過熱不為冷誤甚為良法小熱解毒之說謂小熱不解大熱必生利其小便則慮損氣故但可解毒而已利小便之藥導赤散為上解毒之劑如玳瑁湯獨聖散如聖紫草湯犀角飲皆可選而用之誤服熱藥則損目服冷藥則夭傷者蓋五臟平和能相資養一有太過不及則病從而生今瘡疹者是表裡俱熱而發出或助之以熱藥則其勢太過輕為咽喉癰瘍之疾甚則熱盛生風風熱之毒炎上不已無不害目者或抑之以冷藥則脾土無溫暖之氣腎水反勝為黑靨為陷伏遂至夭傷不可不戒有正瘡痘有膚疹者臟腑不同表裡有異膚疹瘡痘分別淺深六腑屬陽有熱則易出是以作膚疹一出則遍滿肌皮之上如痱瘡細疱子見而便沒其所受氣淺故也五臟屬陰有熱則難出其為瘡痘者在肌肉血脈之間必先發紅斑而後如豆大故名瘡痘其所受氣深故也大抵暴熱而便出者必膚疹久熱而難出者必正瘡痘膚疹非正瘡痘也傷寒熱毒發疱瘡相似者傷寒熱邪在表未能作汗或當汗不汗熱鬱於肌膚故發疱瘡色白或赤如火丹頭作瘭漿白膿者輕根下紫色隱隱有肌肉者重甚者五內七竅皆有之其形亦如豆小兒肌肉嫩薄尤多此證非正瘡痘也小柴胡加連翹麥冬生地黃及薑棗煎冬溫發斑溫毒發斑者活人書云冬月溫暖觸冒寒氣至春始發病初在表或已汗或未汗表證未罷毒氣未散故發斑黑膏主之又冬月溫暖人感乖戾之氣冬末即病至春或被積寒所折毒氣不得泄至天氣暄熱溫毒始發則肌肉斑爛癮疹如錦紋咳而心悶但嘔清汁葛根橘皮湯主之小兒常多此證醫人不識妄亂調治罔不敗事此亦非正瘡痘也經云癢為虛痛為實內快外痛為外實內虛外快內痛為內實外虛又云諸寒為痛今瘡痘若身疼者是發作之時皮膚厚肉理密或為外寒相搏故也投以勻氣去寒解肌透毒之劑為妙不必外此而他求也身癢有二證一則氣血不足其癢為虛活血散或四君子加黃耆枳殼主之一則不能食淡以致發癢蟬蛻一物湯主之瘡痘作癢深為可慮能調和愛護勿令有此乃為上策瘡毒入大腸者當發作之時其人或臟氣自脫或因服寒藥傷動致令瘡毒陷入腸瀉下如豆汁或便膿血或便黑汁顴赤如錢口內臭氣唇焦目閉加腹脹者必死之證當急用實脾暖胃之劑救之得大腸祕固瘡痘紅活亦死中求生也攻咽疼者心胃有熱上次於咽乾澀而疼如兼口舌生瘡齒浮齦腫者宜甘露飲水漿不下者紫雪最妙如聖湯抱龍丸消毒飲皆可選而用之以上證候須能食臟腑亦熱方可用如上焦雖熱卻覺小便清大便溏薄飲食不進者當以清上溫下藥調和之治入目方法心熱盛則生肝風肝主目熱毒熏之故為目患治以涼肝丸洗以秦皮散或因食毒物睛突出者宜仙靈皮散暴赤腫痛者宜導赤散患半年一年餘者宜蟬蛻散成翳者宜瓜蔞散威靈仙散目睛疼痛者宜浮萍散生痘瘡者宜大黃散貼之赤脈侵睛者宜羚羊角丸昏暗者宜金花散以上各隨證用之面青為逆者瘡痘以心血為主身熱煩躁驚悸面赤皆心經形見也所以面赤者為順今反見青色是色不與病相應安得不謂之逆當更察他證堤防之實必生風虛者必下利厥逆各宜思所以預製之庶幾治未病之意也遍身發青紫紋者此由外感風寒與內熱相拒故也瘡痘之出蓋熱邪內外蒸發其有當熱作之時忽遇天氣大寒熱毒方運出而暴寒折之外寒為內熱拒而不得入內熱為外寒閉而不能出毒氣壅於肌皮之間如癮疹如痣䵟或青或紫俚俗云鬼捻青者是也往往壯年出者皮膚厚肉理密尤多此證宜用透肌散牛蒡殭蠶散紫背荷葉殭蠶散卻寒溫肌透表之劑可選用也狀如蚊蚤所齧而色黑者何此榮血不能流行內外毒氣壅遏欲散而未散故也瘡痘屬血熱血和則其色如丹砂如雞冠若毒凝血聚則遂成黑色有此證者甚為危困其人必大小便祕喘急煩躁宜用山梔子湯宣毒膏治黑瘡子無比散莊氏云斑瘡倒靨而黑色者謂之鬼瘡子宜獖豬尾血調腦子最佳豬尾血調腦子證其人自利不食者難用不可不審既出而腹脹者有二證一則陰陽不和一則毒氣陷伏入里瘡痘正作熱毒既盛則必生煩渴或飲冷過多或誤投涼劑熱為冷所激欲出而不能冷熱相拒毒不發越故令腹脹甚者氣喘發厥瘡白而無血色多至不救急當以溫中藥疏逐冷氣冷氣散則腹脹自消昧者莫不又用藥宣瀉致令重困且傷於冷者必不能食大小便利腸中虛鳴此傷冷陰陽氣不和也若毒氣陷伏入里者但用溫平解毒快氣之劑如人齒散活血散之類大抵毒氣陷伏者又有他證相雜或煩躁大渴或大小便祕或啼哭不止萬一腹脹而目閉口中如爛肉臭者其證為大惡小便赤澀心腹脹滿者伏熱在胃則中有所隔上為心氣不降小便澀少而赤下為陰氣不升腹中脹滿董氏用四聖散發其毒得胃中熱散則邪氣自然冰釋詳其藥味紫草發散黃耆養瘡痘解毒枳殼和氣寬中木通導心氣而利小便又以甘草調和之出遲而朝夕啼哭者何凡人五臟和平則精神安靜有病則不然今瘡痘是五臟蘊毒當內外蒸郁發作之時朝夕啼哭者由神不安舍察其毒氣在表在裡若虛若實隨證滲泄大抵榮衛流通則神宇清快昧者不知見其朝夜啼哭或以為心熱或以為腹疼妄亂投藥以致冷熱偏勝變生他證可不審哉煩躁虛煩不得睡者調護瘡痘當審次序盛作之時必令心火有所導引苟或不然毒氣已出而未盡遂生煩躁宜以生黑豆煎湯令徐徐飲之渴者常冷飲可以解散熱毒召復陰氣抱龍丸生犀磨汁等皆可選用甚者新汲水調砂糖少許飲之又有津液不足虛煩不得眠者活人書酸棗仁湯最佳或吐或瀉而不能食者有冷熱二證吐而不渴瀉而手足冷面色青白此冷證也益黃理中輩主之既吐且渴雖瀉而手足心熱面帶赤色居處喜冷此熱證也五苓散竹葉石膏湯加橘皮等主之不食亦有虛實之異脾胃怯弱精神慢而不食者為虛當溫養之身熱中滿渴而不食者為實當清利之便血或下黑糞睡不醒者瘡痘雖是蘊毒而發所以為之運行者實血也今大便下血是里毒大盛或下黑糞者其理亦同加之睡不醒者證候為甚惡蓋一身之血心為之主便血下黑糞而又睡不醒則是心之神昏矣犀角地黃湯抱龍丸小柴胡加生地黃等主之當下當救里不同者瘡子半出半未出此里毒未盡也若其人大便不通喘急腹脹煩躁作渴譫言不安者當急下之蓋毒氣彌盛內外皆熱當令大便稍稍潤過若其人適苦自利四肢厥冷腹脹發噦者以裡氣虛也宜姜附理中輩急救之一則言當下者恐毒氣太盛昏悶而死故也一則言當救里者恐裡虛胃氣脫絶故也虛實之證相反如此投藥之際可輕易耶郁毒不散者瘡痘之初斑點未見者惟當用平和藥如升麻湯惺惺散鼠黏子湯紫草飲子等解利之或有不問虛實便以胡荽酒灑之葡萄酒飲之又火煅人齒酒調服之施之虛者猶庶幾焉若盛實之人則禍害立至矣熱毒之氣須臾貫注耳目口鼻咽中閉塞大便堅祕小便如血實謂郁毒不散毒氣無所從出反攻臟腑瘡凹而不起遂成倒靨當此之際不能解利至於斃者多矣是陽盛熱熾無陰氣以感之也如豬尾膏犀角地黃湯犀角玳瑁湯皆可選而用也得毒氣解散榮衛流通瘡子將自出矣且初覺頭痛發熱或兼微寒煩躁咽痛者宜升麻湯如聖湯瘙癢或癮疹者宜荊芥湯面赤黃大便澀小便少而或嘔者宜小柴胡湯不惡寒但煩躁而渴作赤斑點者宜竹葉石膏湯犀角飲子大便難通者宜四順飲子如譫言昏迷者宜承氣湯或大便自利赤黃而渴者宜三黃熟艾湯黃連解毒湯中病即止不必盡劑也斑爛者病當發散而不發散則毒氣閉塞喘促悶亂不當發散而誤發散則熱毒隨陽氣暴出遍身皮肉如爛此不善表之過也治法宜調脾進食令大便得所安養榮衛生肌解毒則無目赤咽痛口瘡吐衄等證解之不至於冷調養不至於熱方為良法斑爛作膿痛甚者用干黃土羅細末敷之輕者則研芒硝豬膽汁調塗勿令動著直候痂疕自落大段不能眠臥者用麥麩襯之又有因發表過甚外為斑爛而內虛陽氣不守作臟寒自利此又急當救里宜理中豆蔻之類臟腑既平則解外亦不可緩也膿汁不幹者出得太盛膿血淋漓不可著席疼痛者用干黃土羅末敷之欲不成瘢痕者火煅干牛糞研細以綿撲撲之大段甚者麥麩襯臥如暑月熱盛當藉之以芭蕉葉為主陷伏倒靨者內虛不能出者謂之陷伏外感風寒或被惡氣沖觸而不得出者謂之倒靨然有始末輕重不同若一概用藥必致夭橫瘡痘已出斑點為始血胞為中結膿窠痂疕為末且斑點之始熱毒方運出亦有陷伏亦有倒靨者若外感風寒肌竅閉塞血凝而不行必身疼四肢微厥斑點不長或變黑色或青紫癮疹此為倒靨也宜溫肌發散如紫草蟬蛻人齒殭蠶紫背荷葉之類溫散寒邪然後熱氣復行則其斑自出矣若胃虛而不能副榮衛者出而覆沒斑點白色或黑色其人必不能乳食大便自利或嘔或厥此胃虛而不能出謂之陷伏也宜用溫中之劑令其胃暖榮衛復行則當自出矣宜理中湯丁香煮散之類甚至姜附硫桂亦可用血疱為中者是紅斑出齊之後其狀如豆起於肌皮之上乃未結膿疱痂疕之前證也血疱七日當結膿窠痂疕當此或風寒乘襲而為倒靨或胃虛吐利而為陷伏者治之亦如前法又有房室等雜氣觸犯而然者當用豬蹄甲蒼朮乳香胡荽等法熏解之良方腦子豬血酒治毒氣入臟而不出黑陷而耳尻反熱者瘡痘惟腎無證以其不納穢故也當其發作之初及血疱之際一身俱熱而尻耳自涼此即腎之平證也蓋尻耳皆屬於腎今一旦黑陷是變壞歸腎使尻耳亦為之熱其證為大逆錢氏立論用百祥丸凡瀉膀胱謂腎邪既衰脾土復旺身熱氣溫欲飲水者可治以脾能勝腎寒去而溫熱也百祥丸之意即活人書論厥陰傷寒土敗木賊急用承氣湯皆是不得已而用之僥幸十救一二而已瘡黑有逆順者大凡黑靨陷伏本是逆證然亦有順者謂脾強可以勝腎雖黑靨而忽瀉膿血痂皮者為順此必舊服補脾藥故令脾氣得不衰毒雖入腹皆瀉出也經云脾病則五臟危今脾土既盛他悉無慮矣黑靨而逆者謂脾虛不能制腎乳食不消水穀雜下脾虛受毒四臟皆因而危殆然古人云病在腑者易治在臟者難治瘡黑乃變壞入臟雖得脾胃強盛是亦九死一生之證耳既出而狂叫喘呼者瘡痘已出熱毒自里而達外狂叫喘呼者臟腑熱燥而無津液也今五臟皆熱無陰氣以和之故令陽獨盛於上為狂叫為喘呼宜犀角地黃湯皆熱抱龍丸竹葉石膏湯之類更看大小便何部不利利之則平熱盛則出愈難其證大便不通小便如血或為癰瘡身上破裂者瘡痘本因熱而出熱勢甚則其出愈難蓋熱盛則榮衛為之閉塞毒氣滋蔓里毒盛者大便不通小便如血表毒盛者或為癰瘡身上破裂此由不善解利之故救之之法宜犀角地黃湯小柴胡加生地黃湯四順飲牛黃散紫雪之類可選而用之不結痂疕者血疱既成當結膿窠痂疕而愈當結而不結者由內外極熱毒氣散漫無陰氣以斂之古方以宣風散導之生犀磨汁以解之或飲之以水調砂糖當隨手而愈然用砂糖不可失之太早恐使瘡子入目切宜忌之誤以巴豆丸藥下之則內虛而熱不除蓋腸胃有熱而須蕩滌者宜湯液之劑飲食成積而須下者宜丸子藥今瘡子有合下證誤用巴豆丸藥則徒損胃氣熱毒反得以深入其勢愈不除或致便膿血為癰疽為腫毒變生諸證用藥者當知之百祥丸證瘡黑紫而干陷者以百祥丸下之不黑者慎勿下然陷下有數種當以外證參詳感風寒而黑陷者宜溫散之內虛自利而黑陷者宜溫補之誤下之後毒氣入里而黑陷者宜溫養而表出之被雜穢惡氣沖觸而黑陷者當熏解之若夫蘊毒至重內外蒸郁不結痂疕大便祕腹脹而黑陷者當以百祥丸瀉膀胱經毒服之身溫欲飲水者可治是脾強勝腎陷者當復出矣若加以寒戰身冷汗出耳尻反熱者死豬尾膏證虛汗實汗皆汗也虛熱實熱皆熱也瘡痘倒靨亦有虛實之不同可不分析而辨正之哉如瘡痘始發或斑點或血疱未結痂疕之際因久不食或自利或感風寒至不能出者雖名倒靨亦不虛實宜溫之其或心煩狂躁氣喘妄言如見鬼神大小便祕渴而能食毒盛而倒靨者此證為實與前諸證霄壤相遠宜豬尾膏又有血疱六七日當結膿窠痂疕而不結者是毒氣盛實心火獨燥當此宜用豬尾膏曾用之進一服隨手結痂疕神速特異以意思之人遇寒暄不常之時脫著衣服必先呷冷水一二口即不感冒者是心涼腠理閉而斂則風寒不能侵也今用豬尾膏正以血能歸心引腦子以涼之心涼則毒氣消釋榮衛流通於是血疱結膿窠膿窠結痂疕而餘證自退矣如傷寒厥陰證土敗木賊以承氣湯下之脾間毒去則脾土和水升火降寒熱作而大汗解豬尾膏之意得心竅既導熱毒解散則氣和神蘇自結痂疕蓋當結而不結者恐毒氣復入於裡昏悶而死故也以此言之瘡痘至血疱欲作膿疱之際毒氣已盡在外矣昧者見斑點之後血疱出遲便用豬尾膏殊不知毒氣未出盡而使心胃寒涼則毒氣內閉殺人甚速然則豬尾膏一藥是實熱證候方可用也才結痂疕即以真酥潤之用手抓破或剝去又更潤之稍遲則乾硬深入肌肉經久方脫遂成瘢痕此理昭然人多不曉反謂剝落早則成瘢痕何其誤也然既剝去之後卻不許早見風冷須當愛護其或不能剝去而又出風太早以致成瘢痕者密陀僧水調塗之蒺藜散鷹矢白散馬齒莧散青金散皆可選而用也瘡痂起而能食者人身以安健為當稍有疾病則精神氣血為之不安況小兒瘡痘自斑點發見至結痂疕日數雖有遲速之不同其精神氣血勞耗多矣大率瘡痂既起則中氣暴虛多不能食必藉參苓輩調養之其間或有瘡痂起而能食者是胃中宿有蘊熱故也蓋胃熱則谷消所以能食其人更大便稍祕或大便難當用三黃丸利之否則恐胃熱不去郁為口臭齒腐生風之證流散四肢則發為癰疽瘡腫之毒是說也惟善治未病者知之然亦有一等脾胃素壯實者自爾能食大便亦不至有祕結之患此又不可不知也病後解利當觀虛實者稟受有虛實病有虛實病後亦有虛實不可一概論瘡疹後當須解利此世俗通論然觀虛實可也且小兒稟受既實榮衛充壯病後有熱者宜與解利其證大便難小便赤能食而渴大段熱甚者宜大黃散留熱在胃嘔吐而口舌生瘡或下利黃赤者宜黃連散煩渴而小便少者宜五苓散餘熱溫壯齒疼或腫者宜甘露飲咽疼者宜抱龍丸如聖湯肝有熱毒多怒叫而不得眠者宜調肝散大腸下血疼痛者宜牛蒡散三黃熟艾湯生痘癰者宜小柴胡加生地黃湯犀角地黃湯無熱證者但當隨時安養而已或其人所稟素弱瘡痘既出之後榮衛大虛坐立振搖大便不祕小便不赤飲食不甚進者宜胃愛散異功散雙和湯之類以扶持之候其飲食如故起居稍勝榮衛既充然後微微解利至虛之人不必解利也嘗見虛怯小兒不應解利而強與解利遂為寒中為下利生病多端餘毒作嘔吐者脾胃主納而不出大小腸主出而不納瘡疹後嘔吐者是餘毒在胃也然有冷熱之不同如心煩作渴食乳甚急聚滿於膈中然後吐出如射其人必面色帶赤手足心熱居處喜涼此熱吐也如乳食水漿隨吐面色青白手足冷大小便自利此冷吐也熱吐者竹茹湯五苓散竹葉石膏湯加橘皮之類主之冷吐者益黃散理中湯丸主之要之病後餘毒多是熱邪其間冷證十有一二也病後忽遍身青黑色手足瘛瘲口噤聲如鋸者此中風也小兒瘡痘方愈榮衛正弱忽作前項證候者由節令氣交八方不正之風乘虛中入宜和劑方消風散二錢入蟬蛻末一錢分為三服投生薑薄荷汁及酒各數點溫湯浸之連二三服當時稍汗或作癮疹或再出膚疹而愈京師醫官宋鑑嘗用此無不愈者或小續命湯去桂附加荊芥亦可用也病後非時發搐搦者一則心熱留而不去熱盛生風風火相搏其人必喉中有痰目直上視面赤引飲居處喜冷宜導赤散抱龍丸小柴胡加生地黃之類一則病後多食胃弱不能勝谷謂之食蒸發搐其人必潮熱大便酸臭祕泄不調或嘔吐腹疼宜紫霜丸小承氣湯輩利之用藥之際要在詳審作痘癰結核腫毒者此由毒氣留藏經絡故於肌肉虛處或關節動搖處偏盛而成癰又或既平之後失於解利餘毒太盛外不得泄於皮膚內不得入於臟腑既不得入於臟腑聚而不去遂為之癰如毒氣淺者結核腫毒瘡癤而已甚者至頭項胸脅手足肢節盡焮腫作痛治法惟小柴胡加生地黃最妙如升麻湯消毒飲犀角地黃湯皆可選而用也病後目翳忌用點藥者何瘡痘毒氣之為目翳蓋自藏而達外治之之法但活血解毒而已活血不至於熱解毒不至於冷五臟平和則翳當自去或誤用點藥則是非徒無益而又害之不可不慎之耶病後大小便不通或便膿血者此由失解利之後熱氣並於小腸則小便不通並於大腸則大便不通如前後部俱不通者熱勢為甚四順飲承氣湯五苓散導赤散之類可選而用之其有熱毒流入大腸而便膿血者牛黃散犀角地黃湯黃連解毒湯三黃丸等斟酌用之餘毒咳嗽脅痛者經云左右者陰陽之道路左右兩脅之謂也瘡疹後咳嗽脅疼由余毒在中陰陽之氣不能升降也脅居身之左右陰陽二氣之所行也脅病是氣不能升降之故但解毒氣毒氣去真氣行所苦自平赤茯苓湯小柴胡加五味子桔梗枳殼等療之餘毒作煩渴者心胃二經受邪熱故也五苓散竹葉石膏湯黃連散燈心散主之天氣暄熱即與疏利膿疱之後亦當疏利者經云言上工治未病嬰兒童子雖虛實不同畢竟純陽當瘡痘未出之先或遇天氣暄熱當與疏利庶幾發作之日其勢必輕又膿疱之後毒氣太盛未結痂疕能食而大便祕面赤引飲者亦當疏利之疏利之說非是轉下不必用峻藥也如三豆飲子升麻湯消毒飲導赤散之類是也用藥不可執一前輩言老人之病必先助火以其陰盛而陽微當預溫之治小兒則曰當先瀉火謂其陽多而陰少須用導引勿令生熱然或有老而實幼而虛者此又當隨時變通又五實當瀉謂身熱脈大大小便不利能食悶瞀謂五實之證五虛當補謂身寒脈細不食前後利汗出為五虛之證或曰用利藥者候大小便祕而利則利之愈用溫藥者候大小便利而溫則溫之愈二者合利而利合溫而溫也其或外證合利大小便已自利何必利外證合溫大小便既自祕何必溫大抵治病最嫌陰陽偏勝善用藥者但令陰陽不偏則是常有生意又況小兒臟腑嬌脆易寒易熱易虛易實尤難調和所以用藥不可執一也用緩慢藥反致害人者病有外同而內異者又有病中遇天時節令變遷因而感異氣者又有病中氣血不定宿有蘊藏之疾隨之發動者其證未易辨識用藥之際須當識證切中病源但欲治熱熱去而不冷治冷冷去而不熱則無不愈者治風以治風藥治溫以治溫藥治勞治氣皆然今人不究病源因一概用不急之藥如四君參苓之類其意止欲逃差誤爾殊不知縱令病勢滋蔓誤人極多要之用和緩之藥亦各從其類而和緩耳何嘗謂不切病情而徒和緩也醫壘元戎云夫斑之為病皆由子在母腹中時浸漬食母血穢蘊而成毒皆太陰濕土壅滯君相二火之所作也因小兒真氣既盛正氣又王邪無所容或因天寒或因傷表或因傷里斑由是而生焉治當何如外者外治內者內治中外皆和其斑自出至於惡寒者發之表大熱者奪之渴者清之大便祕結者下之小便不通者利之驚者安之泄者分之可以執一為哉大抵傷寒同治最為高論隨經用藥不可闕也假令五日已里諸病與斑疹不能別辨者不可疑作斑疹必須發之但各從其所傷應見治之皆不妨斑出若強發之其變不可勝數矣前人言首尾俱不可下者何也曰首不可下者為斑未顯於表下則邪氣不得伸越此脈證有表而無里故禁首不可下也尾不可下者為斑毒已顯於外內無根蒂大便不實無一切里證下之則斑氣逆陷故禁尾不可下也有如所言溫暖蓋覆不令通風以其斑未出或身表涼而惡寒或天令寒而惡冷溫暖蓋覆不令通風也斑若已出身熱天暄何必用蓋覆而不使之通風乎後人執此二句首尾俱不敢下溫暖不令通風不知天令之所加人身之所感致使誤人多矣大抵前人之言隨時應變以其所可者而言之後人不知其變故執常而不移也噫首尾俱不可下者以其始終臟腑原無凝滯也若有一切里證及大便結者安得不下溫暖不使之通風以其發在冬時故如此也若發在夏時斑雖未出亦不用於此也斑之用藥大率以脈為主浮中沉之診乎舉按之候察其虛實定其中外則可以萬全矣未顯斑證所用之藥外傷升麻湯主之內傷枳實丸主之大便軟枳朮丸主之傷冷者溫之神應丸主之惡寒者發之宜防風蒼朮湯表大熱者奪之此表者通言三陽也夫陽盛則氣必上行言奪者治法不令上行也渴者清之大渴者白虎湯小渴者涼膈散大便祕結者下之桃仁承氣湯四順飲子柴胡飲子選用察其在氣在血小便不通者利之導赤散八正散之類當求上下二焦何經而用之驚者安之涼驚丸重者瀉青丸泄者分之寒則異功散四君子湯熱則澤瀉茯苓湯已顯斑證所用之藥出不快化毒湯出太多犀角地黃湯地骨皮鼠黏子湯咽不利桔梗甘草鼠黏子湯煩者桔梗梔子甘草湯肺不利紫草茸甘草枳殼湯太陽出不快荊芥防風甘草湯陽明出不快升麻加紫草湯少陽出不快連翹防風湯四肢出不快防風芍藥甘草湯瘡疹輕重候凡未出而發搐者是外感風寒之邪內發心熱之所作也當用茶粉下解毒犀角地黃湯主之一發便密如針頭形勢重者合輕其表而涼其內連翹升麻湯若斑已發密重微喘飲水者有熱證用去風藥微下之若出不快清便自調知其在表不在裡當微發散升麻葛根湯若青乾黑陷身不大熱大小便澀則是熱在內煎大黃湯下宣風散若身表大熱者表證未罷不可下若斑疹已出見小熱小便不利八正散若已發後有餘毒未散復有身熱瘡腫之類當用茶粉下解毒丸瘡疹已出後有聲音者乃形病氣不病也瘡疹未出先聲音不出者乃形不病而氣病也若瘡疹出而聲音不出者是形氣俱病也當清其肺氣宜用八風湯並涼膈散去硝大黃亦可孫氏云痘疹證初發或身熱或氣熱或驚掣狂躁叫哭煩躁或自汗或譫語或呵缺頓悶神昏或嘔吐皆因五臟虛實不同身熱後切宜避風又有便發搐者此是熱毒在經絡未得發越不必治搐只發散痘毒痘出搐便住不可不知大概以出得快為尚如出後或被壓抹以致黑凹者急用參耆白芍藥糯米藥或用酒嘖催趲起透不可忽視古人治法有云未出宜疏利有云已出不可疏轉有云首尾不可疏轉以余觀之不可轉之說為是經驗方論云豫見鄉中近年以來小兒患丹疹痘瘡甚多醫士用固陽湯真武湯姜附湯四逆湯歸茸三建湯獨雄湯熱藥治之名曰貼出服者多誤甚為痛惜豫暇日因遍觀古今經驗方論並無用熱藥貼出之說如湯民望論未嘗不用附子熱藥但有其證而用之如陳文中小兒及幼方異功一料內止用附子一錢今之醫士不問寒熱虛實之證但見痘瘡黑陷或不紅活或出參差便投熱藥可見其非此又不可全咎於醫士乃病家父母之心聞進熱藥甚喜用涼劑甚不安必服熱藥實無再生之期此乃醫士病家互相為誤若不略具古先聖賢用藥論證誠恐訛傳有誤後世謹按素問云少陽客勝則丹瘭外發及為丹疹屬手少陽三焦相火素問獨明瘡疹者少陽相火之所為也俗呼曰斑疹傷寒又曰諸痛癢瘡皆屬心火豈有寒乎故治丹疹痘瘡與治傷寒時氣同法當先推天地寒暑之宜察氣運盛復之理小兒稟性躁急氣體充實宜服辛涼稟性和緩氣體怯弱宜服辛溫兩手脈浮大可服辛涼兩手脈遲緩可服辛溫如辛涼之劑防風通聖散涼膈散之類是也辛溫之劑升麻葛根湯和解散惺惺散之類是也聖惠方云江南春夏時行疫癘多作斑疹此由熱毒氣盛故也毒氣未散而表已虛熱氣乘虛入於皮膚所以發斑癮疹用黃芩大青梔子石膏朴硝犀角大黃主之又熱病發斑表虛里實亦用石膏大黃龍膽黃芩主之湯民望論小兒瘡疹之候乃天行時氣熱不能解蘊積於胃而胃主肌肉其熱氣夾毒氣蘊積於胃毒氣熏發於肌肉狀如蚊子所齧乃成斑毒也赤者安斑散四聖散主之黑者化毒散川山甲散主之其痘瘡漸黑而陷大便不固四君子湯加黃耆肉豆蔻若大瀉四肢厥冷加附子主之又云瘡疹之疾不問輕重當用護目免致痘瘡入眼而生翳障若生翳決明丸羌活散蟬蛻散穀精草散主之朱奉議活人書云斑疹有三證一證冬時大溫至春為寒氣所折溫毒不得泄發而為斑葛根橘皮湯主之一證下之早熱氣乘虛入胃故發斑白虎加人參或加萎蕤名化斑湯主之一證下之遲熱留胃中亦發斑服熱藥過多亦發斑調胃承氣湯主之陳文中雲凡痘瘡方覺未出之時其證類傷寒之狀若痘瘡二三日始見微出如粟米大或黍米大或如緑豆大似水珠光澤明淨者又痘瘡四五日大小不一根窠紅活六七日肥滿紅色八九日長足肥滿瘡蠟色並不須服藥若痘瘡四五日稠密陷頭灰白色瀉渴者木香散救之如不效服肉豆蔻丸止其瀉泄若六七日身溫氣促口乾肚脹足指冷者或八九日後寒戰悶亂腹脹煩渴氣急咬牙宜木香散加丁香肉桂如不效服異功散若痘瘡十二日當靨其身或熱或不熱悶亂不寧臥則哽氣腹脹泄瀉寒戰咬牙宜用異功散加當歸木香主之十二三日瘡痂漸落其痂瘢猶黯或凹或凸肌肉尚嫩兒與乳母切忌辛辣有毒之物恐傷眼目為兒終身之疾如是傷目穀精草散主之若瘡疹收靨之後身熱不除別無他證麥門冬散柴胡散主之若身熱大便堅口舌生瘡咽喉腫痛皆是餘毒未除鼠黏子湯主之若風熱咳嗽咽膈不利甘桔湯主之若痘瘡癢搔抓成瘡膿血淋漓緣氣衰肌肉虛故也宜敗草散主之仍服木香散加丁香肉桂同煎依方救療萬無一失辨認痘疹斑瘡丹毒證治不同醫者詳察正痘瘡董氏曰初出如紅點遂旋起脹形如豌豆而結膿窠方結痂疕而愈癮疹即麻子王氏曰有熱則易出一出遍於肌膚之上如痱瘡細疱子見而便沒楊氏曰赤疹遇清涼而後消白疹遇溫暖而後滅傷寒熱毒發疱瘡胡氏曰乃熱在表而失汗熱毒蒸發其瘡色白或赤如丹頭帶白膿者輕根下紫色在肌肉者重非痘瘡也斑毒蚊跡楊氏曰陽證誤投溫藥或失汗下陽毒內熱蒸溽外迫毒氣入胃令人發斑其證昏憒關前脈洪大先紅後赤多見於胸腹輕則如疹子重則如錦紋紅者易治黑者難救蚊跡陽脈不洪病人自靜先紅後黃多在手足之間乃蚊跡也丹毒湯氏曰赤遊肌肉變易五色遊走遍體辨認痘瘡方論所載皆以耳冷尻冷中指冷驗之或中或否當以耳後有紅脈赤縷為的董氏曰宜以紅紙捻點清油照心胸間必有小紅點如粟起乃痘證也謝氏曰忽然發搐但無痰潮不惡風惟惡熱腹痛則腹先出眼澀則眼先出熱輕痘亦輕熱重痘亦重身熱則不出直候身涼方出痘疹論云痘疹之候有三五日遍身粟生時作咳嗽耳尖毛冷肌慢眼澀不開作寒欲以溫暖覆之者初覺之時當用薄荷散微微發汗次進調中散瘡即自愈服荷葉散汗未出者亦服調中散即汗出漸漸解若作寒熱其脈反遲者進脫齒散或患者寒熱不定目澀耳鼻冷此邪毒不傳諸臟攻皮膚而作或出遲者亦服脫齒散凡有三五日鼻中壅咽喉不利咳嗽目赤毛焦肌膚緊脈洪大而數此應瘡疹之候順者宜煎薄荷散發汗則瘡毒自出或鼻中壅咽喉不利目赤額紅脈不甚洪大者亦是瘡疹之候皆宜服脫齒散瘡如出白珠子或出紅小瘡子者乃是解也或鼻壅唇焦脈細面色痿黃時變青色皮膚慢吐清涎者亦是疹子之候此皆醫人誤下涼藥太多致令瘡難發凡瘡毒血氣順脾溫則易發若服涼藥過多則血澀氣弱脾冷則瘡毒泄遂變惡候此候亦服薄荷散並脫齒散若面青氣粗大小便不通瘡毒未發宜進滑石散如大小便不通利則服脫齒散次觀色候調治或面色赤者亦是瘡疹候若先赤而後青為逆候也或患數日面色青或痿黃四肢微冷上喘生涎手足搐縮以三焦氣壅血脈凝滯氣不得相榮當用薄荷散發泄瘡毒小兒初得病便驚狂身熱汗出問之則身不憎寒並不惡風脈洪數者皆當下之覺得有此證疹痘未發之前當服當歸散或有先頭疼口鼻出熱氣憎寒壯熱胸膈痞噎生涎心逆作渴不止足指冷口作臭氣兩手脈弦而或脾脈弦數者此因失飢傷邪熱當發赤疹及有患頭疼身不大熱口鼻有熱氣咽喉干痛口頰生瘡兩目如火熱耳尖手足稍冷兩手脈洪大後三二日必作渴面赤時作憎寒心逆口作臭氣目忽如硃色亦是伏瘡疹之候亦先當去邪毒藥須用大黃湯蕩之不可用巴豆水銀輕粉此等則無去熱毒之理反傷於五臟也或覺已結於皮毛之間微微似出慎不可利或誤利之則瘡毒反沒畜伏心間邪入肺中瘡毒內壞而死若瘡疹既出太盛竇膿水者卻當以大黃藥微利除毒如未發毒疹已前曾經利者即不用大黃藥但以解熱藥除其敗毒愚俗禁服藥餌只望巫祝不以藥泄利瘡毒致令大小便不通停熱毒於臟腑攻衝眼鼻咽喉腫塞口舌壞爛束手受死及有疹證只進涼藥或調氣藥恣其所措既疹痘已出之後又復猛利用藥既失疾勢已壞雖扁鵲無門救療所以時人不能盡其天年又按扁鵲治疹痘之法覺有疹痘之證先用油劑法解四肢極熱如服藥了良久就臥少時服至三五服大小便利四肢熱退邪毒漸解痘疹既出亦輕若曾服大黃散利者亦不必服此嬰兒服此頗有益或有未經解利而瘡毒已發者服如聖散或升麻散發散若瘡毒在肌膚三四日隱隱不發者則急用紫草飲子至數服則瘡疹出凡瘡疹未發前當用黃蘗膏塗兒面頰眼目之間乃續用胡荽酒噴背上四肢令速發出也若瘡未出及雖出而躁渴者宜服甘草散以少解利熱毒即住若瘡出遲亦當服紫草飲子大人針兩腕硯子骨間或灸一壯亦助發出疹痘毒氣若已發則不必用之如瘡候未作膿心膈躁睡不安者服青黛散黑豆汁若瘡毒出盡後宜服黃芩散以解餘毒若嘔吐則服此嘔吐自定若赤口有瘡下部亦有瘡自下利者服黃連散或瘡疹出後煩喘小便不利者宜進燈心散若瘡疹煩喘甚者即用麻黃湯或咽喉痛並嗽則加入麝香其有服冷藥太過咳嗽手足冷脈遲者煎炮乾薑炙甘草各四錢水一升二合取四合服之其或下痢赤黃膿血及渾身熱當與薤白湯解去惡積便瘥有疹痘安便攻動眼生翳膜腫脹者皆因肝臟敗熱停留所致切忌用點藥唯宜利脾解肝熱毒仍於眼邊上下貼協藥以散毒氣當服蕤仁散若生翳障重者兼密蒙花散量力服食翳膜退則止凡有時氣天行瘡痘者則急預服豆湯則不發瘡方見如前黑豆汁是或發瘡而因天行熱氣疱瘡身疼壯熱則當以桂枝及去節麻黃黃芩各半兩為末量大小一二錢暖水調下覆令汗出又以葛根湯解肌出汗凡身疼壯熱頭痛若不與小汗無由表散大便久祕毒氣藏伏心腹脹滿不與微利無由釋去邪毒切在消息若瘡痘已出者不可發表更增瘡爛若發膿痛甚者即用乾淨黃土羅細為末敷之仍數數食蜜若瘡勢稍輕者則用川芒硝以豬膽汁調塗瘡上勿令動著直候瘡痂落有大段瘡發不得臥席者用麥麩菌臥將息如痘瘡作漿戴白膿者其毒輕或紫黑色隱隱在肌肉裡者其毒重甚者五臟咽喉內皆有瘡甚則大便澀出血瘡黑靨不出膿者死舌黑鼻有黑氣者死其或疹痘未出已前熱毒內逼目瞪上竄驚叫有如驚風者此乃瘡欲出之候若誤認為驚風調治毒氣內畜邪熱不泄乃死或有惡瘡既出譫語不止此是惡候更以冷藥解利則使聲喑瘡疹反沒乃死或用燥藥太過咽喉腫痛猛發鼻血喘嗽而死或瘡作白疱忽然畜入臟腑漸作紫黑無膿日夜煩悶者服此化毒散其毒氣當從手足心出乃瘥此五死一生之候若便血瘡壞無膿者十死不治候大熱瘡毒頓出然後依證調理有患瘟毒痘瘡不出者一法以地黃雄黃令飲然不可太多太多則反有所損或飲啜熱乳積於腑臟者當兼用藥療乳母嬰兒孩童之性陽盛而陰微臟腑陰陽氣稍差逆大小便多不順利自扁鵲太倉公論療嬰孩藥性有可餌者皆先知節氣陰陽治之利臟腑則病勢漸解也儒門事親書云凡小兒瘡疱癮疹麩瘡丹熛等疾如遇火運勝時熒惑亂行之者不可便用升麻散解之升麻湯味辛性溫內經曰積溫而成熱是謂重火止可以辛涼之劑解之如遇平時可以辛溫蓋平時無事便同水化然而更宜審察病機甚者亦不可以辛溫但發散之後便以涼膈加當歸及白虎湯玉露散煎服之更甚者解毒湯調胃散下之古人云癍疹瘡疱首尾俱不可下皆誤矣豈不聞揚湯止沸不如釜底抽薪內經曰五寅五申之歲多發此病者蓋明相火之所為也又曰少陽客氣勝丹疹外發又曰諸痛癢瘡瘍皆屬心火王太僕又謂百端之起皆自心生豈可便用辛溫發散乎致熱勢增劇漸成臟毒下血咬牙發搐大熱明矣如白虎湯加人參涼膈加當歸桔梗勿問秋冬仍見瘡疹用之神良凡小兒瘡疱癮疹麩瘡丹熛癍毒之後臟毒下血內經曰少陽客氣勝則丹熛瘡疹發於外也蓋餘熱不解故臟毒下血治以黃連解毒湯白虎湯涼膈散臨證選而用之所謂白虎舊說秋冬勿用皆誤也但有此證便用之蓋其證屬相火故也大人亦同潔古老人癍論云癍疹之病其為證各異瘡發惞腫於外者屬少陽三焦相火也謂之癍小紅點行皮膚之中不出者屬少陰君火也謂之疹凡顯癍證若自吐瀉者慎勿亂治而多吉謂邪氣上下皆出也大凡瘡疹首尾皆不可下恐妄動而變此謂少陽通表宜和之也當先安里解毒次微發之安里解毒須安五臟防風湯是也如大便不澀者須微發之藥錢氏方中甚多宜選用之如大便祕宜微利之當歸丸棗變百祥丸是也初知癍疹若使之癍疹並出小兒難禁是以別生他證也首尾不可下者首曰上焦尾曰下焦若能吐利猶不可下也便宜安里若不吐瀉者先安里藥三五服如能食而大便祕結內實者宜疏利之若內虛而利者宜用里藥末後一服調微發之藥服之大抵安里之藥多發表之藥少祕則微疏之令邪氣不壅並而能作番次使兒易禁也身溫緩者順身涼者逆二者宜多服防風湯和之安里若大便實祕能食而內實宜當歸丸微利之濟生拔粹方云夫小兒癍疹始出之證必先面燥腮赤目胞赤呵缺頓悶乍涼乍熱咳嗽嚏噴足梢冷多睡驚並瘡疹之證或生膿胞或生小紅癍或生癮疹此三等不同蓋諸證皆太陽寒水起於右腎之下煎熬左腎足太陽膀胱寒水夾脊逆流上頭下額逆手太陽丙火不得傳導逆於面上是壬癸寒水逆克丙丁熱火故也小兒瘡疹之由皆始生之時啼聲一發口中所含惡血隨吸而下還於右腎命門胞中其瘡之發下焦相火熾也三等之癍皆出於足太陽寒水之經外為大寒內為二火交攻化血肉為膿可令內瀉二火又令濕氣上歸本位一二服癍疹即愈已後再無二番癍出之患而損生命者矣
