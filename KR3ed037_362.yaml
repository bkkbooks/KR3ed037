body:
  text: 卷三百六十二嬰孩五臟門總論錢氏論云五臟所生心主驚實則叫哭發熱飲水而搐虛則困臥悸動不安肝主風實則目直大叫呵欠項急頓悶虛則咬牙多欠氣熱則外生氣溫則內生脾主困實則困睡身熱飲水虛則吐瀉生風肺主喘實則悶亂喘促有飲水者有不飲水者虛則哽氣長出氣腎主虛無實也豆瘡入腎則黑陷更當別虛實證假如肺病又見肝證咬牙多呵欠者易治肝虛不能勝肺故也若目直大叫哭項急頓悶者難治蓋肺久病則虛冷肝強直而反勝肺也視病之新久虛則補母實則瀉子也肝臟病見秋木旺肝強勝肺也宜補肺瀉肝輕者肝病退重者唇青而死肺病見春金旺肺勝肝當瀉肺輕者肺病退重者目淡青必發驚更有赤者當搐為肝怯當目淡青色也心病見冬火旺心強勝腎當補腎治心輕者心病退重者下竄不語腎怯虛也腎病見夏水勝火腎勝心也當治腎輕者腎病退重者悸動當搐也脾病見四季皆仿此治之順者易治逆者難治脾怯當面目赤黃五臟相反隨證治之胃怯汗上至項下至臍此胃虛當補胃益黃散主之胃啼小兒筋骨血脈未成多哭者至小所有也胃氣虛面㿠白無精光口中氣冷不思乳食吐水當補脾益黃散主之胃虛冷面㿠白色瘦弱腹痛不思乳食當補脾益黃散主之下痢者宜調中丸主之湯氏五臟中風詩小兒心臟中風時偃臥唇紅汗濕衣但灸心俞三五壯唇青黃白黑休醫目瞪此為心已絶性命多應六日期此疾難別難治李倅之子前任義烏丞患心臟中風諸醫皆言死而退已三日不醒人余遂灸之今已長大凡見此候先宜著艾心俞正大中骨下兩傍各一寸半次服家傳牛黃丸肝風踞坐舉頭難早灸肝俞病即安細視眼連唇上色青黃方可放心寬色黑只應旬日死命歸泉路不能還脾臟若或中風邪腹滿通身色似瓜吐沫醫人猶可治唇青手足冷空嗟若灸脾俞三五壯縱然危困命能賒腰疼面黑腎之風兩脅麩病粢可攻急灸腎俞由得瘥面黃發痙莫從容啼不作聲有兩般肺絶無聲不用看或若外邪侵主臟溫和調氣自然安忽然喘急心煩滿縱有靈方命也棄急灸肺俞三五壯始知妙訣在人間湯氏肺中風多因嗽而始但服嗽藥不能散其風邪入於肺臟之絡其候喘急面色青黃目能認人口不能言醫者不明其證待盡而已余有親戚之子得此疾危亟余往視之尚留殘喘急以橘皮桑白皮瞿粟殼三件煎湯化百部丸二服急灸肺俞至第三壯其喘已定忽能言再灸作五壯繼而索粥自此生矣心臟附論心熱者視其睡口中氣溫或合面睡及上竄咬牙皆心熱也導赤散主之心氣熱則心胸亦熱欲言不能而有就冷之意故合面睡心氣實則氣上下行澀合臥則氣不得通故喜仰臥則氣得上下通也瀉心湯主之心有餘眠臥不安面伏地睡則導赤散洗心散主之虛弱則驚悸不安寧心膏主之小腸有熱或赤澀尿血木通散消石散紅龍散主之心不足驚悸恍惚憂愁不樂面無顏色用寧心膏安神膏心有客熱則睡中語導赤散洗心散主之方參砂膏通心氣除膈熱去痰壅硃砂人參南星炮天麻遠志去心用皮薑汁浸焙白附子殭蠶炒各半分硼砂一焙半茯神等分麝香少許上為末煉蜜丸如櫻桃大金箔為衣每服一丸麥門冬去心煎湯調下八物定志丸補心氣安精神遠志去心麥門冬去心菖蒲茯神去皮木茯苓去皮白者各半兩牛黃一錢白朮一分人參六錢上為末煉蜜為丸每一兩作三十丸以硃砂為衣每服一丸人參湯化下食後瀉心湯瀉丁火上用黃連一兩去須研極細末每服一字至半錢一錢臨臥溫水調下海藏云易老單瀉心湯加減法出於此乃實邪也實則泄其子肝臟附論肝感風者呵欠頓悶口中氣熱當發散大青膏主之若能食飲水不止當用大黃丸微下余不可下肝熱手尋衣領及亂捻物瀉青丸主之壯熱飲水喘悶瀉白散主之肝有風目連扎不搐得心熱則治肝瀉青丸治心導赤散主之肝有熱目得直視不搐得心熱則搐治肝瀉青丸治之導赤散主之肝有風甚身反張強直不搐是肝受風也當補腎治肝補腎地黃丸治肝瀉青丸主之若病或新或久皆引肝風風動而上於頭目目屬肝風入於目上下左右如風吹不輕不重兒不任風目連扎也若熱入於目牽其筋脈兩眥俱緊不能轉視故目直也若得心熱則搐以其子母俱有實熱風火相搏故也治肝瀉青丸治心導赤散主之肝有餘目赤多怒筋脈拘急肝風亦然或身熱者驅風膏並涼肝藥肝不足視不明兩脅拘急面色青白多恐悲泣地黃丸主之方瀉青丸治小兒肝臟實熱手尋衣領亂捻物目直視不搐得心熱則搐身反折強直目連扎或目內青或臟腑泄諸藥不止脾胃久虛並宜服之又名瀉肝丸當歸去蘆頭切焙稱龍膽草焙稱川芎山梔子仁川大黃濕組裹煨羌活防風去蘆頭切焙各等分上為末煉蜜丸雞頭大每服半丸至一丸煎竹葉湯同沙糖溫水化下地黃丸治小兒本氣虛怯由胎氣不成則神不足目中白睛多其顱即解開面色㿠自又腎氣不足則下竄蓋骨重惟欲墜於下而縮身也腎水陰也腎虛則畏明無精光者宜補之熟乾地黃八錢焙稱山茱萸乾山藥各四兩澤瀉牡丹皮白茯苓去皮各三錢上為細末煉蜜和丸每兩作五十丸三歲以下每服一二丸至三丸溫水空心化下麝香青金丸治小兒肝臟有風呵欠頓悶神昏不爽口中氣熱急驚搐搦胸滿氣短並皆治之天麻半兩白附子三錢炮蠍梢去毒微炒青黛二味各二錢烏蛇酒浸取肉焙乾七錢麝香別研硃砂別研天竺黃三味各一錢上拌為細末次入研者麝香硃砂研勻煉蜜為丸每一兩作四十丸每服一丸煎人參薄荷湯化下乳食空脾臟附論脾有餘脾胃有熱不思乳食或吐黃水瀉深黃色實熱也或瀉黃沫如蟹之吐沫虛熱也皆食物不化寶鑑云胃受熱五穀不能實先以黃白散行其臟腑後以五苓散脾虛熱先五苓散次黃白散再服五苓散或少以益黃散脾不足脾胃經冷不思乳食噦吐清水瀉緑白色食物不化時復肚痛或渴或不渴巢氏云小兒噦由哺乳冷冷氣入胃與胃氣相逆則胃氣不通致令噦也錢氏云瀉青白穀不化脾胃冷王氏云宿食不消脾胃冷也益黃散兩服紫丸逐積再益黃散千金云脾虛腹脹腸鳴溏瀉食物不化脾胃有積不思乳食或吐酸水瀉白腥酸食物不化傷食亦同或腹痛或不痛家寶方云吃物不消是脾有積紫丸逐下食積益黃散補或食不知飢飽並能食而大便不化是疳熱積益黃散汁吞紫丸瀉下後益黃散補並六甲丸脾胃有風不思乳食嘔吐涎沫食物不化大便雜色瀉久不定定而復作時多困倦錢氏云身溫風在脾故大便不聚先下益黃散補脾次宣風散逐去脾間風再益黃散並神寶丹及溫驚藥又云吐瀉乳不化傷食下之素問云脾胃受濕則水穀不分川椒丸五苓散活人曰五臟之病何脾病之多也蓋脾土也萬物之發生皆由於土百病起因皆是脾之受納谷飲多於諸臟乃病之多也脾怯當面目赤黃五臟相反隨證治之氣不和口頻撮當調氣益黃散主之食不消脾胃冷故不能消化當補脾益黃散主之弄舌脾臟微熱令舌絡微緊時時舒舌治之勿用冷藥及下之當少與瀉黃散漸服之亦或飲水醫疑為熱必冷藥下之非也飲水者脾胃虛津液少也又加面黃肌瘦五心煩熱即為疳瘦宜胡黃連輩大病未已用藥而弄舌者凶涎液不收小兒因氣不升降膈脘否滯致令乳食不化流入胃中隨氣上溢故令多涎其候胸滿短氣飲食遲化內經謂脾為涎當調脾胃升降其氣則病可愈方鉛霜散治小兒脾風多涎心胸壅悶不下乳食昏昏多睡鉛霜研牛黃研半夏生薑汁製焙乾龍腦研各半分白附子炮馬牙硝研防風去叉丹砂研天竺黃研犀角屑細辛去苗葉黃芩去黑心甘草炙銼各一分上為散再同研勻每服一字用生薑蜜溫水調下更量兒大小以意加減不計時候防風湯治小兒脾肺風熱膈上多涎心神昏悶少欲乳食防風去叉羚羊角屑黃芩去黑心人參枳殼麩炒去瓤甘草炙銼各一分半夏半分生薑汁製焙乾上搗篩每一錢以水八分入生薑少許煎至五分去滓不計時候量兒大小加減溫服降氣丸治小兒脾氣上溢氣不升降涎液不收清膈牛蒡子梔子仁甘草炙微赤銼川硝鬱金以上各半兩枳殼一分麩炒微黃去穰龍腦半兩研上為末麵糊和為丸如麻子大用薄荷水化下二丸至三丸不計時候量兒大小加減服之溫脾散治小兒脾胃傷冷涎常流出在兩口角一名溫胃散半夏半兩用白礬水浸人參豆蔻白朮乾薑各半兩丁香一兩甘草半錢上為末每服二錢生薑三片煎服食前張渙溫脾丹治小兒滯頤多涎流出漬於頤上此由脾冷涎多故也脾之液為涎脾氣冷不能收制其津液故流出漬於頤上法當溫脾俗謂之捏破涎渦兒者葛丞相云此方甚奇半夏曲用生薑六兩同搗細炒丁香一兩木香一兩乾薑半兩炮青皮半兩去白陳皮亦可白朮半兩上為末糊丸如黍米大一歲十丸二歲二十丸大小加減米湯下直指方有陳皮半兩一方煉蜜和丸金朱丹治脾熱多涎金箔二十片硃砂一兩研水飛半夏湯洗七次牛膽制南星一兩白茯苓半兩石膏半兩研水飛上都拌勻再細研用生薑汁和丸如黍米大每服十粒人參湯下乳後瀉黃散又名瀉脾散瀉脾熱目黃口不能吮乳藿香葉七錢重山梔子仁一兩石膏半兩甘草三兩防風切焙四兩上銼同蜜酒微炒香為細末每服一錢至二錢水一盞同煎至五分溫服清汁無時南方多以寒水石為石膏以石膏為寒水石正與京師相反乃大誤也蓋石膏潔白堅硬有牆壁而寒水石則軟爛以手可碎外微有黑細紋方書中寒水石則火煅用之石膏則堅硬不可入火如白虎湯用石膏則能解肌熱破痰治頭痛若用寒水石則誤矣又有一等堅白全類石膏而敲之亦皆成方者名方解石也可代石膏用之南人有不信此説者孝忠嘗相與同就京師大藥肆中買石膏寒水石方解石三種又同詣惠民和濟局及訪諸國醫詢證之皆合此説乃信服孝忠頃編保生信效方已為下論恐小兒尤不可誤故復見於此益黃散治小兒吐瀉脾虛不食五穀不化困倦少力腸滑夜起並疳虛盜汗並治涎流頷下常濕名滯頤陳皮一兩去白丁香二錢訶子炮去核青皮去白甘草炮炒各半兩上為末三錢水半盞煎至三分去滓食前服大小加減服之海藏云此劑瀉脾熱牛蒡丹治脾熱多涎牛蒡子一兩鬱金川朴硝枳殼去穰麩炒皂子半兩炒黃上為細末用生薑汁打白麵糊丸如黍米大每服十粒煎人參湯下大小加減半夏丸治小兒脾熱乳食不下胸膈多涎一名皂莢丸半夏半分須用生薑湯洗七遍去滑皂莢子仁半兩上為末用生薑汁和丸如麻子大不計時候以溫水下三丸隨兒大小以意加減半夏丸半夏一兩微炒白礬生研半兩上為細末麵糊和丸如粟米大每服五七丸量輕重加減食後臨臥生薑湯下桑白汁治小兒脾熱乳食不下胸膈痞悶涎溢不收上用新桑根白皮不以多少細銼取自然汁塗於兒口內立效如無新桑根白皮取干桑根白皮一兩細銼用水一盞煎至半盞放溫塗兒口內極妙又方上以白羊糞少許入水研取汁塗兒口內效又方上取鹿角末炒令焦更研令細以清粥飲調下一字又方上取牛噍草絞取汁少少與服之鬱金散治滯頤不問脾虛驚熱並可進之鬱金南星白附子大半夏各半兩上用生薑二十片皂角三條水兩盞煎藥同煮以干為度去皂角及生薑以四味焙乾同雄豬膽一枚以盞盛定刺汁以前藥入膽汁內浸炙乾又浸以膽汁盡為度再用鐵華粉半兩甘草三錢研勻同為末每服一錢薄荷蜜湯調下肺臟附論肺有餘咳嗽氣急痰實成塊瀉肺散褊銀丸珍珠丸下涎肺不足哽氣喘息嗽吐清涎目胞浮腫補肺散人參丸肺盛復有冷風者胸滿短氣氣急喘嗽上氣當先散肺後發散風冷散肺瀉白散大青膏主之肺只傷寒則不胸滿肺熱手掏眉目鼻面甘桔湯主之肺虛熱唇深紅色治之散肺虛熱少服瀉白散肺臟怯唇白色當補肺阿膠散主之若悶亂氣粗喘促哽氣者難治肺虛故也脾肺病久則虛而唇白脾者肺之母也母子皆虛不能相營故名曰怯肺主唇白白而澤者吉白如干骨者死錢氏曰東都張氏孫九歲病肺熱他醫以珠犀麝生牛黃治之一月不愈其證其證嗽喘悶亂飲水不止全不能食錢氏用使君子丸益黃散張曰本有熱何以又行溫藥他醫用涼藥攻之一月尚無效錢曰涼藥久則胃寒不能食小兒虛不能食當補脾候飲食如故卻瀉肺經病必愈矣服補脾藥二日其子欲飲食錢以瀉白散瀉肺遂愈七分張曰何以不虛錢曰先實其脾然後瀉肺故不虛也方阿膠散補肺阿膠一兩半麩炒馬兜鈴半兩焙甘草二錢半炙黍黏子二錢半炒香杏仁七個去皮尖糯米一兩上為末每服一二錢水一盞煎至六分食後溫服海藏云杏仁本瀉肺非若人參天門冬麥門冬之補也當以意消息百部丸治小兒肺寒壅嗽微喘百部炒乾稱天麻去節先作末各三分杏仁四十個去皮尖煮三五沸研入上為末和勻蜜丸皂子大溫水化下二三丸無時日三四丸此本方也仲陽加松子仁五十個糖丸之含化大妙瀉白散瀉肺脾熱目黃口不吮乳喘嗽桑白皮一兩銼炒黃地骨皮一兩甘草半兩炒上為細末每服一二錢水一盞入粳米百粒同煎食後服易老加黃連海藏云治肺熱傳骨蒸自汗用此以直瀉之梔子黃芩亦能瀉肺當以氣血分之腎臟附論腎有餘腹滿腸泄體重喘嗽小便黃色牽牛散瘡頭變黑氣急亦腎有餘百祥丸腎不足體重厥逆腹大喘嗽面無精光好暗畏明耳鳴聾重腦縫開地黃丸主之腎虛者兒本虛怯胎氣不成則神不足目中白睛多其顱即解面色㿠白皆為難養縱長不過八八之數若恣色欲多不及四旬而亡或有因病而致腎虛者非也又腎氣不足則下竄蓋骨重惟欲墜下而縮身也腎少陰也腎虛則畏明皆宜補腎地黃丸主之膀胱內通腎臟一處承受三經所傳其外腎冷熱皆由心氣主之心經有熱熱入小腸或赤或白或淋或澀心經有寒流膀胱或祕或疝或腫或光凡小兒初生兩個腎子俱大光浮名曰卵腫一邊差大名曰偏墜蓋由驚氣所行傳受於中或母懷孕驚憂之氣不散胞胎之間兒亦受之所以生下便有卵腫外宜黑散敷之內用清心順之黑散者用黃連黃芩大黃黃蘗等分燒留性為末豬膽汁同蜜調敷之立效清心以犀角地黃膏與服若有熱大連翹飲宿夜安定方羚羊角丸治小兒腎虛或病後筋骨弱五六歲不能行宜補益脾腎虎脛骨敲破塗醋炙黃生乾地黃焙炙酸棗仁去皮炙稱羚羊角尖細而節密者錯為末白茯苓各半兩桂去皮即有味煮不見火防風去蘆頭當歸去蘆頭黃芩切焙各一分上為細末煉蜜和成丸每服一丸皂子大兒大者加之食前溫化下日三四服久服取效地黃丸治小兒脾腎虛兩脅拘脹多恐悲哭又治大病後不能作聲是腎怯不能上接於陽又治稟受腎氣虛頭骨開澤瀉牡丹皮白茯苓各三錢熟乾地黃八錢焙稱山茱萸四錢山藥半兩牛膝四錢上為細末煉蜜和丸如小豆大三歲每服七丸空心溫水下一方無牛膝白芨散治小兒腎氣不成腦髓不足小兒年大骨應合而頭縫開者是也宜以藥塗之白芨柏仁防風去苗細辛去葉各一兩上為細末每服一錢以乳汁調塗在兒顱骨上每日一次用之甘豆湯治小兒腎虛有熱大小便不通黑豆一合甘草二錢薑七片上銼新水煎服瀉腎丸治脈洪而實上用前地黃丸熟地黃改生地黃去山茱萸是也此治左手本部脈若右尺洪實以鳳髓丹瀉之此地黃丸仲景八味丸去桂附若加五味子腎氣丸也此益肺之源以生腎水焉治腎縮治小兒初生兩腎縮乃初生受寒氣也硫黃茱萸大蒜上同研塗其腹仍以菵草蛇床子二味煎湯淋洗熏之蓋初生受寒氣而然治虛寒證惟腎主虛亦惟腎受寒小兒骨氣未就雖虛而不容補但以地黃丸與之厥冷者以生乾薑炙甘草煎湯調下洞泄者專用木香白朮生乾薑各一分辣桂炙甘草各半分銼細量兒大小作劑入陳米煎服治小兒外腎腫硬成疝腫硬一名地龍散上用干蚯蚓為細末用唾調塗常避風冷濕地治小兒外腎腫硬或疝疾或風熱暴腫上用地龍糞生薄荷汁調塗尤妙
