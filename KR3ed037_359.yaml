body:
  text: 卷三百五十九嬰孩門五臟伏敵喜傷附論肺所伏者心所敵者肝所喜者辛所傷者焦苦二變七蒸之臟和則喜歡氣爽神清魄強疾主喘滿咳嗽傷風作熱虛痰壅盛腎所伏者脾所敵者心所喜者咸所傷者甘甜五變十蒸之臟和主行坐嬉戲笑語疾主面黃黑齒截齒咬牙聤耳膿汁肝所伏者肺所敵者脾所喜者酸所傷者辛辣初變六蒸之臟和則魂神壯意志生疾主風攣搐搦眼目腫赤疼痛心所伏者腎所敵者肺所喜者苦所傷者鹹鹵三變八蒸之臟和則情性悅樂疾主驚癇恐悸虛躁啼叫讝語狂煩涎流口角脾所伏者肝所敵者腎所喜者甜所傷者酸釅四變九蒸之臟和則消穀氣美飲食疾主嘔噦疳積虛痢痞癖潮熱不思乳食五位分部定位附論肺部所主鼻孔名井灶尖處名準頭眼邊名大小眥中央坎陷名山根若鼻孔黑如煤即肺經焦或作黑燥如墨者即肺家絶其候難治鼻中赤癢疳盛蛔長或瀉白涕腦寒困寐或流清涕傷風喜睡肺熱鼻塞因息吹得有妨吻乳關竅閉阻感風寒邪熱亦如此鼻下生瘡潰爛即疳鼻中常臭積熱為咎腎部所主耳穴之前名曰耳花耳船名輪輪里名廓輪廓焦黑腎家虛熱其黑如炭腎絶死旦夕耳門生瘡衛積非常耳中膿出腎熱疳極臭名聤耳膿汁不止痛癢如裂其候虛熱耳聽不聰心腎氣壅常作哄哄熱氣上攻或如蟲刮榮虛衛熱耳輪如冰麻痘相侵耳輪紅熱傷寒是則熱極內痛腫氣相攻清心涼膈關竅通塞兒孩兩腎常虛無病若有攻擊便令無益肝部所主眼睛有穴內藏其神外究五輪眶䀭屬脾熱即生眵兩眥屬心熱痛如針白屬肺家熱赤生砂黃屬肝臟昏瞀醫障中心瞳人腎熱不明小兒眼目痛即便哭良方對治更為忌毒或患丹瘡從里為殃經效良藥速療無妨眼本屬肝怕熱怯寒令有治法拯理何難眼忽連眨驚風交雜忽然竄視驚風已至肝熱定睛或翻無神瞳出中陷十無一生脾部所主唇即口門語言之尊舌居其中飲食之宗齒牙咀嚼咽喉相約牙質既剛角宮羽商嬰孩未定唇口見病上則人中下乃承漿上下四方皆屬脾鄉口內屬心心脾有熱舌燥唇裂三焦蘊熱唇紅如血深紅重渴輕即流沫鵝口慕口木舌重舌脾肺熱就口內噴臭脾腎氣寒色如死肝大驚一嚇口乾唇白時時積驚漸漸衝心心氣不足令兒煩哭何知脾絶指甲皆黑目無神光醫者知亡五種撮口驚風最惡可醫論方無路莫錯心部所主眼睛直下高骨之中名之曰顴顴下名面面里名臉屬心無別黑則沉困青即驚悸亦心發風白乃疳氣虛黃衛積浮腫氣逆相順則安相生則吉相反病乖相剋證失醫士喜之平常不動良士惡之其色反弄應病弄色九分不得心絶何因大叫數聲過關不叫必作鴉聲夫人一身主事於心心不可病神散呻吟兒童心真才熱傷神神既昏亂當與調榮心為身主常安能語忽然加熱譫讝駭汝心要當清邪幹不寧心常昏沉醫工究心藥莫亂陳人之五體以頭為首首中有面面中有睛睛中有神神者目中光彩是也或隱或顯或橫或沖應衛而現病之順即順疾之逆即逆色者青黃紅白黑是也初發則我生而侵之次則生我以臨之盛則我克以交之重則克我而入之侵即有犯臨即相干交即過位入即通度然其白色者白似枯骨又如煙霧騰空黑色者黑如冷灰又如灶尾塵埃紅色者紅若朽木又若赤霞照谷黃色者黃似淡竹又如敗葉經霜青色者青如冬瓜又如荷葉蓋水察之侵臨交入究之生平克傷加以聽聲而應之一數圓長謂其如水渦漩洑流聲也二焦鋭謂如焚薪爆烈之聲也三數散靸謂其如朽腐拆蠹之聲也四數洪亮謂其如鐘磬之器擊響之聲也五數頽斃謂其如牆傾岑陷崩塌之聲也在疾病而有變隨證而有應五行五脈一氣易更色有滯者從幼至長氣干犯者隨受以傳或善或惡惟生五臟相參百脈相領輕重相傳自然應見辨小兒脈法分三部法分三部但取掌後高骨為關關前為寸口關後為尺脈如小兒脈可以一指按其三關進退取之此法甚明不須疑惑也論小兒脈小兒脈三歲以上五歲以下然後可看候與大人有異者為呼吸八至是常也九至病十至困蓋小兒純陽故脈息數促如大人者為不同也小兒周歲以前脈息難憑周歲以後方有脈形寶鑑云五百七十六日乃成人血脈骨肉皆堅牢方可診候也審脈逆順驚搐脈浮數順沉細逆身溫順肢冷逆夜啼脈微小順洪大逆身冷逆心腹痛沉細順浮大逆身溫順肢冷逆傷寒脈洪弦順沉細逆浮大順沉伏逆汗後脈沉細順洪緊逆困睡順狂躁逆溫病脈洪大順沉細逆身熱順腹痛逆咳嗽脈浮滑順沉細逆身溫順肢冷逆霍亂脈浮洪順遲微逆身溫順身冷逆吐哯脈浮大順沉細逆身溫順身冷逆泄瀉脈緩小順浮大逆身溫順肢冷逆諸痢脈沉細順浮大逆身溫順肢冷逆諸渴脈洪數順微小逆身溫順肢冷逆諸腫脈浮大順沉細逆臟實順腸泄逆腹脹脈浮大順虛小逆臟實順泄瀉逆痰喘脈滑大順沉細逆身溫順肢冷逆寒熱脈緊數順沉細逆倦怠順強直逆疳勞脈緊數順沉細逆臟實順脾泄逆蟲痛脈滑緊順浮大逆身溫順唇青逆諸失血沉細順浮數逆身溫順發熱逆中惡腹脹緊細順浮大逆身熱順身冷逆黃疸脈浮大順沉細逆腹實順泄瀉逆火疸脈浮洪順沉細逆身熱順身冷逆已上脈是小兒五臟之根本若得其順則知其可治若得其逆則知其不可治也縱有生者十難一二七表應病浮寸口風熱頭疼關上腹脹胃痛尺中大便不通芤寸口衄血吐血關上瀉血痢血尺中小便出血滑寸口吐逆噁心關上胃寒不食尺中渴飲不休實寸口胸中煩關上腹滿下利切痛尺中小腹脹小便淋澀弦寸口胸心結痛關上胃寒不食尺中小便赤澀緊寸口頭疼心痛關上腹內刺痛尺中小便急痛洪寸口頭疼壯熱關上吐逆不食尺中小便赤澀三部一脈三部俱數身熱驚搐煩竭心燥三部俱緩脾熱口臭吐逆寒熱三部俱弦肝風拘急欲發驚搐三部俱浮心腹疼痛急則驚癇三部俱芤久患瀉血吐血溺血三部俱洪發熱驚悸大小腸澀三部俱實胃壅不食或即下利三部俱急巢氏云主小兒驚癇脈應雜病數為熱屬腑遲為冷屬臟陽數主吐逆不吐必發熱陰微主泄瀉不瀉必盜汗沉數寒熱寒多熱少亦主骨蒸緊數寒熱熱多寒少又主骨熱急則驚癇沉緊心腹疼痛短數同就主咳嗽有痰沉細乳食不化亦主㽱痛下利沉伏為積聚主霍亂微緩泄瀉乳不化沉緩同微澀瘛瘲筋攣微澀主痢血微急寒熱吐血微浮嗽浮滑宿食不消亦主咳嗽浮緊疳氣耳聾弦緊潮痛浮弦頭痛身熱浮數驚熱緊滑吐血噁心心急數驚癇下利又主疳淋肺甚急顛癇風癇痰涎流溢肺浮實鼻塞大小便不通脾微細不吐則瀉難治關緊滑主蛔蟲尺沉同尺微細溏泄冷痢乳食不化尺微澀便血無血必盜汗脈過寸口入魚際主遺尿七表八里脈乃是五臟六腑脈也蓋小兒純陽有病多見七表脈為屬陽脈故也主病有驗八里脈所以不見者為屬陰脈故也設是小兒有八里脈者必發寒癇孫氏云陽脈急甚必變陽癇急驚風也陰脈沉遲多變陰癇則是慢驚風也是以八里脈多不經見小兒脈訣並歌凡小兒脈當以大指接三部一息六七至為平和十至為發五至為內脹脈緊為風癇沉緩為傷食促息為虛驚弦急為氣不和沉細浮為風大小不勻為惡候為鬼祟浮大數為風熱伏細為物聚單細為疳勞凡腹痛多喘嘔而脈洪為有蟲浮而遲潮熱者胃寒也溫之則愈嬰孩有疾未能言筋骨肌膚尚少堅脈理未全難考據當觀形色定由緣面帶青色肝之病赤色心病因可必白為肺病黃屬脾黑色屬腎斯為得黑死還生死可生紅深時氣有疾停青赤已受脾風了青黑應傳入慢驚發熱鼻冷是瘡疹耳冷應知風熱證通身皆熱是傷寒上熱下冷傷食病更將虎口紋色看或紅或紫傷風寒青驚白疳黑中惡黃困皮端皆可觀紋直是驚曲傷損沉隱為風因可識曲外為冷內食傷紋得短少當安逸五臟部位怕相承更看稟受有虧盈陰陽表裡不可亂補瀉過多須辨明五百七十有六日大小變蒸數已畢血榮氣盛脈理全診候方能無所失男左女右不相干須臾一指蓋三關浮風洪熱驚須數遲冷沉虛實積然脈浮固知感風候浮大傷寒宜審究浮緊驚風不可當浮數風熱應須有浮遲之脈有潮熱乃知胃寒無所守浮虛盜汗睡中多浮洪胃口如火炙瀉痢浮大不可醫口噤不食亦堪悲脈洪腹痛多嘔逆定知蟲動不容違脈弦為風或為寒弦數之脈瘧未痊弦急因知為客忤氣或不和邪所幹脈沉帶緊為腹痛緊數為驚多瘛瘲脈牢而實大便難牢緊瘲聚何能動脈浮濡瀉為虛弱久亦變驚上還作虛緊伏熱致生風虛濡漫驚真可邈脈沉而實為有積沉數骨間須極熱沉遲虛冷豈因無沉緩食傷多嘔逆脈緩筋細皆為冷乳食不化兩相宜單細疳勞伏氣攻小大不均惡候省蒸變尺寸脈不拘既曰變蒸何必驚脈如雀啄風癇疾直上直下亦驚名形候驗病詩額上多青色驚疼臥不安赤時身壯熱黃燥汗難乾素問云心熱病者顏先赤心氣合火火氣炎上指象明候故候於顏顏額也毛髮燥干黃驚疳體似湯熱除須有汗微渴意恓惶毫毛畢直主傷寒作熱素問云寒客於人使人毛髮畢直皮膚閉而乃為熱當是之時可汗而發之左臉連腮赤身軀發熱時肝弦筋脈急驚哭又攢眉身熱攢眉主頭痛不熱攢眉主下痢素問云肝熱病者左臉先赤肝氣合木木氣應春南面正理之則其左臉也右臉腮青白時時咳嗽頻痰涎多嘔逆不食少精神素問云肺氣合金金氣應秋南面正理之則右臉也兩臉微赤因潮熱夜間發作日間歇久則今兒氣血虛骨肉如蒸四肢厥有一等小兒兩臉常赤是血氣狀實自然也非熱所作若臉赤有熱者色必憔悴養生方云氣虛則發厥謂手足冷也血虛則發熱謂肌膚熱也兩臉腮青黑多啼無奈何驚疼是進退腑臟不安和鼻燥身粗促孩兒衄血因黃時尿不利赤色熱多嗔鼻燥兒多哭皆因肺熱為白青連口鼻吐瀉食傷脾目鮮目眨目青驚直視心肝熱已成二臟戰爭風火盛肝主風心主火漸看搐搦動雙睛錢氏云目赤兼青欲發搐目直身反強直生風又云肝風熱目連眨萬全方云目若目睛青脈左脅下必硬多吐涎沫扁鵲云目睛青脈主癖凶也有積眼睛黃春冬骨似湯夏秋多瀉痢疱腫嗽難當兩目疱浮腫皆因久嗽為睛黃脾有積潮熱有瘡痍亦有目疱腫不嗽者因積食傷脾久必虛腫有目腫腹脹者必利色無常眼深微黑睛微赤必生耳聾腎受積眼梢如有細紅筋內吊驚風是蹤迹印堂多青黑腹痛夜頻啼睡臥時驚悸無歡日慘淒攢眉因下痢疳積面黃浮吐瀉形容白唇乾渴不休傷寒身熱攢眉者主頭疼黃色人中畔兒因食物傷形青便澱沫脾胃不安康唇白兒須吐兼成失血形紅赤亦同唇乾唇皺渴夜熱不安寧久渴瀉唇紅以上虛證不可用涼藥有積唇黃色看看作腫形脾虛多夜起糞白臭酸腥唇青脾胃怯腸冷痛非常畏食多嫌乳憎寒面色黃青肝木色唇主脾土木來剋土知脾弱不能食巢氏云小兒臟氣不和血氣為冷所乘即口唇青白亦有臟氣熱唇生瘡而風冷之氣入瘡雖瘥後血氣不復故令唇青口臭或作燥唇焦赤腸中糞不通氣粗多作熱睡臥不和同紫色唇間見流涎口畔垂蛔蟲攻刺痛久則致尫羸涎流唇紫蛔蟲積痛作疼時汗出多虛痛若來脾胃冷蟲消積瀉保安和舌白乾焦燥焦黃並熱為小便難且澀心火漸蒸脾如小便不澀必焦黃舌腫厚急欲乳不能吃者此因邪熱客入兒臍流入心肺即舌厚唇燥不急治殺人洗心散導赤散墨魚切片子貼舌上百草霜鹽等分和塗舌上下立消舌黃舌上出血舌腫舌裂舌上芒刺舌焦舌黑舌赤並與地黃湯方見舌胎舌卷同兩耳前微赤疳攻必耳聾微黃驚入腎戛齒睡魂中頤下微黃亦主之或曰女子無腎素問云脆胎者系腎㿠白青形面心煩瀉又驚躽身啼腹痛臟腑作雷鳴面色青兼赤驚來熱亦成色青腸胃冷腹痛但啼聲紅赤傷寒面心煩熱不安眼解驚必作風盛變多端有一等小兒面黃不赤卻發潮熱傷寒壯熱者必唇乾燥或氣微促也面白黃皆見心煩瀉不調因傷常夜起乳食不能消面色兼黃赤驚疳發病因睡中多叫哭潮熱損精神胃熱身金色脾蒸麵眼黃不宜腸自利黃疸病難當頭面青筋起咨煎不肯眠身軀才發熱驚哭握雙拳唇紅面赤睡難安頭黑青筋驚氣蟠冷氣入腸成內吊虛風在胃變多端軀身叫哭為非祟拗頸啼聲欲作癇不久自然驚搐候陰陽邪正互相干弄色非時變胎氣客忤驚紅青鬚髮搐兼黑痛分明錢氏云病重面有五色不常不澤者死孫氏云弄色為夭色夭色者死下頤色微紅亦主耳聾熱聚小腸中結澀膀胱內令兒溺不通素問云腎熱病頤先赤腎氣合水水性潤下指象明候故候於頤古書有一證面青目兼黃小便澀異常亦主滑喉中多哽氣噎飲欲生驚二證皆癇疾看看搐搦成便黃因內熱紅赤黑同看緑白青皆冷疳肥食臭酸有一等淡黃沫如蟹之吐沫黃如槐花者虛熱治法在後傷食酸餿臭兼疳瀉白肥積停物不化結實久還稀小兒多要吐者傷胃中有宿食宜下之妙丸子下益黃散補若此吐唾者停飲在胃黃龍丸以白朮橘皮煎湯送下孫氏云小兒飲乳吃水正乳吃食正食飲水併成痰飲錢氏云口中吐沫後必蟲痛面黃目白少精光多睡咨煎被食傷嘔逆出聞酸氣息時時腹痛陳難當先下後補右驗實積痛錢氏云凡積痛面黃目白無精光多愛睡畏食大便酸臭輕者磨去其積重者下去其積腹痛亦去矣時行瘡豆數日前狀似傷風面臉鮮乍熱乍涼頭有汗虛驚虛悸手多牽唇紅體熱時加喘鼻清耳冷只貪眠目澀氣粗頻嚏噴定知瘡疹有相傳瘡疹多驚悸時行候一同憎寒偏要水發熱又嫌風目澀雙睛白疱浮兩臉紅嗽涎聲啞嗄呵欠睡矇朧瘡豆相傳染時行若感風唇乾唇緑白目澀目微紅疹出眉先皺瘡來鼻不通皮毛寒聳立麩豆隱其中時氣行瘡豆形青面臉鮮咨煎頭有汗恍惚手多牽嚏噴兼微嗽噓呵只愛眠睡中驚起哭瘡豆欲相傳孩兒驚搐定體熱狀如湯班疹藏肌肉身涼出豆瘡身熱心煩躁驚來耳似冰指梢俱帶冷豆搐甚分明湯氏雜病形證歌鬼氣皮膚里相傳臟腑間腫虛知水病瘛瘲似風癇發熱渾身澀頭痛心腹攢小兒還有此服藥急醫看時氣皆因節令虧頭疼壯熱汗微微良工仔細看時候但作傷寒病治之宜服羌活散惺惺散熱氣流傳脾胃居致教黃色在皮膚須知其病真何似可用燒錢問女師此證宜服五苓散煎茵陳湯調熱氣還逢府氣衝便成結毒在腸中身體若煩多燥渴更兼尿糞不能通此證宜利下輕則利之用四順飲重則下之用金星丸時氣還須早早醫變成敗氣切須知差乍寒乍熱無時度或往或來體漸羸小兒骨蒸者皆因時氣不治療療漸成敗氣羸瘦寒熱往來便是疳勞宜服地骨皮散次服星露膏鱉甲散陰陽邪氣兩相併臟腑陰陽各競爭發作有時名是瘧早須醫治莫留停此疾宜服正氣散並瘧藥草果飲雖然吐下熱猶余蓋為元因臟腑虛熱盛虛時皮肉澀致令燥渴不能除此候宜服五苓散以上俱是時氣傳變有此等候初無治法學者當審其根源量其輕重虛實用藥何患不痊時氣雖然瘥猶多餘熱停氣填須不食頰冷麵皮青熱盛血兮血散行鼻出血兮人可驚皆因汗而不得汗上壅喘兮聞有聲大凡時氣與傷寒病相似初病在表速而汗之庸醫恐誤失表漸入腠理其熱循於經絡血得熱即散從鼻中出故其名紅汗也宜服小柴胡湯大便祕用大柴胡湯病未入而先下之乘虛入腹怎生醫痞滿喉中生喘急結胸之候切須知傷寒熱毒胃中存久作班瘡發滿身若見舌唇渾似墨直教性命在逡巡黃病皆因胃熱為痢加腹滿脈沉微見此候時休用意若言魂去定難醫百日孩兒忽作黃非干瘟疫及時殃只為胎中遭熱盛勿令人灸作成瘡此候乳母宜服生料四物湯用生地黃赤芍藥乃是也兒亦服之瘧疾因何渴皆因臟腑虛熱余多飲水結塊腹中居小兒胎里受風寒生下令兒不得安腹痛躽身頻哭泣良工依此細尋看此名躽啼宜服鉤藤膏木香乳香等藥風冷傷筋脈四肢全不仁痛因風熱搏緩是熱傷筋寒客於喉里啼聲似啞人溫和用湯藥不爾損精神小兒虛腫一似吹蓋是風邪夾氣為若見皮膚如熟李此名疳水聽因依此候宜服塌氣散並五苓散加木香青皮用燈心煎脾為土壞不剋水便為腫滿入於脾腫毒赤時還熱痛水居血氣即成之若看此候須審細莫教差誤使傾危太陽入耳助聽聰氣滯多應耳必聾鳴是風並氣相系痛因腦戶有邪風腎熱鬱蒸聤耳患漸深疼痛出稠膿不痛即非風與氣蓋緣風水入其中熱氣薰肝眼必昏有其輕重必須分輕疾熱多多熱淚重生白翳色如銀赤目眥頭成努肉矇朧睛上似浮雲洗肝飲子頻頻服只此良醫是異人小兒飲水久停肝翳障全無辨物難夜裡不明為雀目青盲晝夜一般般小兒眼裡熱班瘡爛發渴無時癢復疼蓋為熱氣傷眼瞼世人俗語號胎風毒熱喉中熱作癰名為喉閉食難通馬脾頷間生腫痛重必心煩命必終凡有此證急宜吐出惡涎為佳胃熱皆因血氣強四肢溫壯小便黃表裡熱時煩燥甚渴多身體恰如湯客忤多因人物沖更遭鬼氣亦相逢吐下青黃並白沫水穀悶脹痛又攻面色青紅時變色脈弦急數不幹風一似驚癇無上視早須醫治莫從容小兒氣弱命中衰魂魄多因被鬼持其候痿黃頻哭泣沖人冷氣早須醫乘年衰兮逢月空失時和兮三虛中遇賊風兮還卒死一如鬼氣候須同臟腑未絶兮須再活急須救療莫從容疝氣因何得邪風在腎經流傳並血聚如此漸成形冷氣結在臟因茲小腹疼本經無補法疏利藥通靈霍亂因風冷忽然吐瀉並有時連腹痛或即繞臍鳴乳母因傷冷孩兒有宿症夾風身發熱臟實更頭疼小兒吐痢早須醫總是腸虛胃逆為更有中他湯藥毒必加煩躁在心脾風冷傷於乳變壞汁須凝孩兒生嘔逆氣喘腹彭亨解脫當風處洗浴向簷楹哭中還餵奶氣逆在胸停嘔吐從茲發良醫諳本經當令乳母服順氣釀乳藥血為榮兮氣為衛二氣相須無阻滯忽然血被氣來侵所以妄行不循位血隨氣上奔心來吐出鮮紅爭忍視便須服藥急醫看解熱涼中依次第備急即服藕汁及蘿蔔汁治法當順其氣次行血産母懷胎忌數般莫令傷冷或傷寒生下嬰兒不吃乳更加腹痛肚皮堅乳哺寒溫不著量致令壅滯在胸堂更兼新乳相投觸不得安和亂胃腸因成吐哯須醫治診脈輕浮壽必長衣厚傷熱損小兒熱蒸津液透膚皮致令身體連頭上汗出流珠汙濕衣小兒血氣未調和腠里開疏易染疴將養傷濕成盜汗早須醫治莫蹉跎此候有二般有虛汗有心血溢汗治法不同切宜詳審虛汗乃脾虛不能剋制津液當補脾心虛溢汗兩臉赤當斂心氣涼血為佳飲乳並傷水為痰結在胸令兒乳不下吐沫似癇同實則身烘熱譫言入夢中早須藥醫療取久變驚風三焦若不調胸中寒氣極煩滿喘氣粗噯出酸氣臭乳哺不能消結聚成症癖有形名曰症浮動為症積弦強癖之元分明記胸臆胸中熱兼實榮衛不通徹臟腑不調和經中名痞結氣滿腹肚脹時時加壯熱不用問神明此是分明訣察形證神色凡看小兒疾病先觀形證神色而切脈次之面青眼青肝之病面赤心之病面白肺之病面黃脾之病面黑腎之病先欲別其五臟各有所主次看稟受盈虧胎氣虛實陰陽二證補過瀉多當救其失兼五臟六腑表裡各有相應配若能明其標本則神聖工巧自然有之察形證歌搖頭揉目肝熱生風眵淚憎明三焦積熱鼻生清涕肺受其寒頰赤面黃風傷脾熱霍亂吐逆胃積氣傷瀉痢不常氣攻腸滑面青呵欠驚風傳肝盜汗頻頻臟腑虛熱傷寒驚搐風盛發狂胃熱生斑氣傷冷厥長吁齧齒風盛氣生上竄搖頭流涎胃熱肺壅氣傷咳嗽咯血涎盛發齁積傷風熱小便淋積熱聚膀胱疝氣因啼胎中積結奶脾痞癖因物所傷喉閉丹瘡肺之受熱愛吃泥土脾臟生疳嘔逆痰涎蛔蟲上出鶴膝解顱因風腑熱審而用之細詳使藥病症疑難逆證似順順逆有別陰陽不均證候相加色脈致亂惟是驚風發作按脈察證以較之陽候證脈俱得其陽陽者順也陰候證脈俱得其陰陰者逆也陽候有陰脈者其證欲傳陰候得陽脈者其證反是也謂如急驚風乃是陽癇得脈沉細遲弱浮數洪弦陽中之陽又有得脈沉緩陽中有陰慢驚風乃是陰癇得脈沉細遲弱陰中之陰又有得脈浮大陰中有陽所言逆證似順乃謂陰乃謂陰中有陽助陽不醒回陽不生其候偏虧雖則陰中有陽其陽非真脈使有疑二不可攻理詳而知之察其可否而後已陰證反陽小兒傷寒惟察表裡而理之不以陰陽證候究竟者蓋無關前關後之脈所謂純陽之孩合而言之此説驚之陰候慢驚是也凡兒吐瀉疾作慢驚其候無反證良由急驚傳來已成陰癇藥用寒涼證入慢脾藥用燥熱其候反陽者反從陽也其脈愈盛其證愈逆故云反也陰陽俱壞實為難治醫工不知所以但見其搐搦肆意退熱截風良久卻不引搐但只合眼聚痰冥冥如睡證候有如此何藥理之陰盛強陽慢驚風候謂之陰盛及其欲絶之時虛痰上攻咽喉引氣呼吸粗大其脈浮數其證強陽得之醫工將謂陽回以得其所之宜與下痰藥用大迅痰涎隨藥而下兒命隨藥而亡衆言醫殺之非也謂不識證絶而用之雖不下藥亦死矣虛極生熱疳疾有作斯證初發即謂疳氣次第傳至疳極是謂虛極之後陰陽二氣不勻上下氣不升降榮衛兩虛臟腑滑泄豈可攻療善醫疳者隨順藥餌以助之淡薄飲食以扶之榮衛善得均勻氣脈方得升降既而陰陽二氣已得調和臟腑已自充實肌膚已自肥壯醫工已知疳傳虛候名作疳極遂與補氣藥服之稍多反生大熱所謂虛極勿補熱盛煩渴疾作疳勞名曰丁奚皆由藥助虛極生熱而致之也冷極必寒症積已作證候所傳自是孩童飲食不化氣滯中脘再食停氣復傷前積積之為病皆致其冷冷之既久脾胃虛怯虛怯既存陰陽相勝寒熱間發痞癖有加脈氣無定醫工不理陰陽令其勻平但作痰瘧治之利下大速疾不去根為患反重難施和劑良由動利臟腑虛必入腹發作煩燥腹肚脹緊氣喘短促難以調治此等證候究心無忽保全是幸熱多作燥熱分內外身藉陰陽一氣受邪三焦致熱三焦者本質無狀隱伏得名所通五臟六腑相干血脈皮毛溫平由實燥熱由虛靜則為一名動則分三所上焦喉管至於臆中焦至於中脘下焦至於丹田以大拇指展中指作一握自咽喉坎處分作三停則知上中下三焦所寓也溫極則熱熱盛則燥燥盛則焦寄於其中矣大人患此猶尚不可況小兒三焦隱伏熱多作熱寒涼之藥所投不堪畢竟從長何劑調理若不早療疾作無辜理實致虛虛則作疾實亦是病按實理虛遣病去疾內知其冷熱外審其證候三實兩虛神不安居三虛兩實人有得失虛之為病其候則速實之為疾其候則緩實未致害虛則作禍迅矣肝心脾肺腎子母相生肺肝脾腎心五臟相剋且如脾胃經虛嘔噦不食又心氣不足驚悸有作所療子母俱虛小便閉澀利之可乎所以知其內者母虛靠子實子虛藉母榮又肺家有熱宜瀉之否大腸滑利宜溫之可醫工但究母虛脾病理其子實若攻其子則母亦虛所謂母能令子實子能令母虛脾病瀉心理實致虛矣利表傷里傷寒痘疹皆論表裡二義不同所受反是傷寒所傳從表入里痘疹所發自里出表作熱形證與傷寒頗似病家不究輕重所受相尚與服升麻葛根湯或過劑飲餌其表裡已解其汗不止汗出稍多裡虛作渴且熱乘機悉化疹痘自然迥出所緣逐其熱利其表遍出雖多疹亦不成痘亦不是比比小赤由其熱尚是有限裡外不相續榮衛不加助即於中道而廢漸加黑陷非食毒感風之咎自是助發大過失其自然之理至死莫知其由是謂利表傷里也退熱作渴小兒發熱一證與大人同熱在三焦方渴肺驚不利虛煩方渴上盛下虛方渴水火不相濟方渴伏暑蘊熱方渴津液燥竭方渴渴證本無但有其熱熱在乎表攻動其里里自無熱受之以虛表熱傳裡反致其渴表裡俱虛引飲入脾頭面手足受濕虛浮作腫醫工下之徒增其病宜與扶表救里庶幾有命療驚發風有痰者必有熱隨之有驚者必有風繼之利其驚風必先散其熱則痰不生此醫者流所得其宜調理證候截風定搐以明其要也常見豪貴家才見孩童有熱不問原因便投驚藥日輒數粒月既積多雖則驚悸不作忪恐無妨其兒所服寒涼藥多脾胃虛弱不吐即瀉遂成慢風更與驚藥愈加其疾調理醫工當究之也風痰隱久風者肝主之肝稍不和則風所由縱痰者脾主之脾若不壯則痰所由盛痰之與風驚之與熱四證互在流行於經絡傳變它疾風痰和襲久而不化隱在肝脾所由飲食冷熱相干不散雖則療理愈而復作以至長成且風痰常在牙頰之間吐茹無盡生髮有因或作齁䶎或喘息或硬牙關或腫頤頰臨於肺則咳嗽干乎心則恍惚善術醫士未能速下其痰恐風猖狂者逐其風又疑痰作梗須是風痰並化妙藥奇方逐漸減瘥可也食不禁戒服藥無功若療風痰不可緩致久則發疾宜深究之驚熱無時因驚而得熱其熱常發不繫乎心而屬乎血更加氣血榮衛不得循還驚熱時常發作或生疥癬或發瘡痍熱來神困心虛熱去唇焦口苦呻吟求飲恍惚忘飢兒孩受此艱辛藥餌如何救療人參羌活蠍尾當歸之類總不相關更尋妙餌可也恐悸喘息驚悸心屬喘息得同而言否愚曰非心主之若心所受其疾不作喘發是知肝臟魂魄不安恐悸傷乎肝肺肺受其驚而受其喘須求水飲肝受其驚發喘細細若張口大喘者肝肺俱不利鎮心安神調氣定喘未必盡善當於損益魂魄丸散瀉心補肝立見功效食噎咳逆兒孩睡息魂魄恬遊擊響高聲傷乎其神睡中不穩乃心不寧乳幼飢渴飲食宜細掇物觸志傷乎其氣令肺作噎肺脾發噫其氣逆不升降其志分不伸舒陰陽差忒胸襟鬱悶良久取氣發聲含飯面黑啼哭聲焦輕則咳逆致燥盛則咽塞不通所受之後常作咳逆者良由食噎觸擊悶挫關竅宣通臟腑即宜升降榮衛乃利若不早治咳逆肝傷終身致疾而難療矣令子無辜夫人所藉者陰陽而生所宜者氣血而長血氣不順則五臟以違其和陰陽不均則百脈亂其體流之於表裡相參注之於經絡致急凡周晬乳兒等間捉拿又更齊齒身體檢束頭目搖動此乃陰陽有虧榮衛失正疾名胡孫禁十二種無辜疾之一也母情不識見之喜笑復作體態教令如其然也久而不已愈加其遍次非風痰之所攻無驚熱之致作當為舒其氣調其脈均其陰陽適其寒溫受氣不足三才降氣數成方謂為人萬象論功道合始知得志胞胎既備心定神全血脈未充骨萎髓薄筋力藉乎骨體智謀出乎心神為人恍惚者斯可知多忘者應由是傴僂者乃如然侏儒者必告此不及數人重者候存五軟太過受之深者身負五硬由其肺心肝腎所屬者氣血脈筋骨所受者體舌臂項膝其或有疾於證候不及議者往往無辜無辜形體必定受氣不足謂之五硬五軟只許聞名稍有求醫難著方藥後進孰謂堪與療理者野老付之一笑飯多傷氣幼孩未降形處胞胎藉母氣血滋蔭由如養素已誕之後繼時吻之以乳乳者化其氣血敷養肌膚百脈流和三焦頤順身體漸舒骨力漸壯三周所庇一生為幸其或母因産得疾血竭氣耗乳不成汁當召奶子看顧貧乏之家食不繼口奚能講此其乳少其食多不益兒體其有不産之婦抱幼繼宗終夜號啼惟飼飯食初傷其氣次傷其形久傷其神重傷其命萎羸聲急躁哭皮皺項軟足垂唇焦骨露但見有眼時光將久氣散神敗凡人生子吮乳為上獨以穀食扶持十中未保一二抑服圓散堪笑強為勉之急假乳蔭庶得為人死中半活矣臍腫受熱初生未及蔭乳洗罷便用斷臍帶留一握綿裹三重受氣根全者其臍自深成胎數闕者其臍自突臍者受質之根也為人之本也形體之基也元命之壽也迭月之前一臘之後其兒臍紅高腫不作水濕亦無風候但將胸堂仰起厄厄作聲闔家無見責之老嫗有傷臍帶致之非也召愚一觀察之知心氣受之胎熱與利丁火少頃不展胸堂厄聲遂止越宿視之臍根復本醫工與傳故書於楮果其宜哉謾舉捧頤以誚之云爾治胎中受病諸證鬼胎婦人産育有患鬼胎者庸鄙謂婦人納鬼之氣而受之實非也鬼胎者乃父精不足母氣衰羸滋育涵泳之不及護愛安存之失調方及七八個月已降生又有過及十月而生初生胎氣血虛羸降誕艱難所言鬼胎者即胎氣怯弱榮衛不充致子萎消猶如果子結實之時有所蔭藉不到灌溉為物褊小其形猥衰無有可愛如此之謂胎氣怯萎常與丸散扶挾乳哺勻調氣血充蔭腸胃固壯即保其盡善蓋由受氣不足稟賦不全忽而橫殤非可惜耶魃病小兒有患魃病者非五臟傳變亦非六腑所主也緣兒生後方且周晬母腹有孕血氣所蔭分之兩端是故胚胎漸傷乳汁成毒虛邪相攻兒吻致疾斂率其氣郁傷其神魄令兒疳虛尫羸枯憔悴煩燥朝昏嘔噦日夜不可得療但速與斷其乳溫平胃氣和順血脈自然而愈其有萎怯致病乃成無辜證巢氏病源小兒被魃病者婦人懷妊有鬼神導其胞中胎嫉妒而致服他故令小兒病也妊娠婦人不必悉能致魃人時有此耳魃之為疾頻頻下痢寒熱往來毛髮髦鬡情思不悅是其證也千金又論曰魃者小兒鬼也凡婦人先有小兒未能行母繼有胎妊兒未節乳漸覺羸瘦骨立毛髮稀黃不長時作壯熱大便不勻乃魃之證也胎氣初生芽兒三朝之後滿月之前所受諸證作疾輕重不同者蓋由胎氣稟賦有強弱其母飲食恣令飢飽起止無忌坐臥不擇令兒得疾不寒即熱不虛即怯熱乃作壅寒乃作泄虛即作驚怯即作結寒則溫之熱則涼之虛則壯榮怯則益衛驚用安神結用微利詳審用之不必過劑胎病芽兒胎病謂月數將滿母失護愛或勞動氣血相干或坐臥飢飽相役或飲食冷熱相制或恐怖血脈相亂胎氣有傷兒形無補或因動土與工或由營葺臥房或移安居或更床席雖不犯凶神惡煞終干礙子體兒身有因如此得疾者乃成終身或傳成風為之患重則損根廢枝輕則拳攣跛躄者也胎病由氣致患乃尚可療疾者斷不可醫初生幼兒又被邪干即時和順調理胎病作熱兒在胎中母多驚悸或因食熱毒之物生育之後兒多虛痰氣急短滿眼目眵淚神困呵欠不發伸舒厄厄作聲大小便不利或通利即有血水盛則手常拳緊腳常搐縮眼常斜視身常掣跳皆因胎中受熱宜速與大連翹飲子解散諸熱次與消風散數服無恙胎氣蘊熱兒在胎中母多憂怒鬱悶之情不散又因胎氣燥熱兒生艱難母生驚悸以致乳汁不和兒吻成毒故能作熱令兒食即嘔吐眠不定席神不安穩聞響即掣若不解蘊毒熱相干久作無辜成疾害生先宜順氣次服四順若不安愈蔥根必效胎病風熱兒在胎中母常喜食動風之物熱毒流傳致兒受之隱在經絡則手足拳攣注入血脈則肌體枯稿其兒眼常喜竄血不蔭心神不守舍怯人怕物視作定目若不早療恍恍惚惚形體雖長情性乖拙為人多荒朝記夕忘雖久受病不如無生蓋父母但知惜其嬌姿安養無用之兒如此者凡胎氣服藥至用貴細若以常方難言功效胎病驚熱兒在胎中母因驚悸驚氣入胎兒當受之生育之後其兒精神不爽顏色虛白初則溫溫有熱其後頰赤饒驚物動則恐聲響即悸若不繃抱安床取次難為調適既有胎驚將傳胎風之候産母謹謹忌食一切熱毒之物若作尋常畢竟難拯蓋是血脈柔弱臟腑虛怯不堪重劑何可攻擊是使智者怯懼受之若輕熱已自散即於項上生癤其大如拳名曰驚氣須當破之而後合之勿敷毒藥恐傷肌體不惟傷壞深恐為禍胎病風痰兒在胎中母喜食熱毒之物熱即生風脾肺不利遂有風痰雖不能損肌傷體其痰與風相襲痰多風不散熱盛痰復生風痰能作熱更加暖被紅爐母食炙煿淹藏動風之物即時害生藥非不驗乳汁之咎也如兒或患風痰不必下截風化痰藥但清心肺涼膈利順三焦則自然安愈亦不可太涼恐寒傷臟腑宜以消風散吞下白丸子至良合小作丸胎病結熱兒在胎中母失調理恣縱飲食不加將護蘊熱頗久及至生育熱氣隱蔽傳入於裡遂作閟結由熱極得之大便不通利衝心腹脹臍突撮口弩力停郁急以三黃丸或四順七寶以通為度不必過劑切不可積丸子藥不惟無益恐反為害胎病為寒邪兒在胎中母因感受寒邪熱氣煩蒸傳入胎臟兒當受之及至生育令兒關竅不通精神昏濁作熱加蒸啼聲不響號叫駭人未知之者將謂驚風妄動臟腑或妄鎮心良由所受寒邪初只在表久則傳裡邪氣亂真血脈皮毛皆不得其便腠理所拘邪不得解變蒸有違氣血致傷煩燥益增無能自暢但與小柴胡湯服之稍輕次以人參羌活散然胎中所受未分表裡既生蔭庇當議和解為良胎病榮熱兒在胎中母喜啖薑瓜古人有云修灶缺唇食薑余指蓋薑性至熱又是淹藏攻及血脈傳入經絡輕則令兒遍體生疽瘡延毒熱瘡丹瘡之類經年發作或於頭額生核重則大發癰癤潰則爛壞皮膚十死一生何堪忍見初生幼孩毒氣加盛肌肉柔弱參朮托裡互柏扶肌常與清心平調血脈母慎其口父抱令暖醫工順理以扶其危胎病衛熱兒在胎中母傷和氣飢飽勞役神疲力倦否則憂愁思慮役乎其中動其真氣攻以陰邪干亂心魂流入胎臟兒乃受之既生之後兒常昏困腹急氣粗重則喘急睡思不穩狂啼煩哭肌肉不滋亦生瘡痍熱食早晚精神少具宜平調臟腑臟腑既正熱自散止胎病臟寒兒在胎中將順其月母喜食諸生冷物過度冷盛既寒腸鳴泄利時時有作生育之後兒腹青脈膨脹虛緊乃是虛氣入腹厄厄作聲日夜不禁雖則漸長終是臟腑陰陽二氣受不勻調若不溫平分氣長成痞結陽結易治陰結難醫誠宜抑母服藥庶得乳溫令子調和胎病潮熱兒在胎中母曾發作子瘧或是因患瘴氣母或飲酒無厭或是冒風傷暑經絡榮衛為熱所傷母雖分娩以脫其難兒襲其氣陰陽不解初生嫩弱血氣不和作熱潮來先寒關緊身體作顫庸工未諳其理即以艾炷灸之經絡未痊用之枉究但與調中均其陰陽若是肚緊宜以全條蛇蛻米醋炒令熱手帕盛系臍上漸安證候發端急驚風候醫雲陽癇也手足搐搦涎潮大熱醫家下之往往利以輕粉或水銀巴豆皆有毒藥既已蘇省精神猶向昏沉未快乳食者或有餘熱其候欲得安痊平和只可用平穩藥調胃氣不可便與燥熱藥若與服之其候復作矣小兒驚風之後胃氣多虛不食沉沉默默或瀉尚不止只可助胃生氣以截風藥移在生胃散或觀音散中謂用全蠍天麻殭蠶白附防風羌活之類生薑棗子同煎自然胃壯瀉止諸風不作雖則驚熱及搐搦皆去其精神未爽不可便謂無事若用補藥助虛乾薑豆蔻硫黃附子之類則熱復來其候又發凡治急驚之候正謂醫療豈可遽云調理用藥乃在一時之久若竟寬緩證候轉加深重醫者既知當下即可量其輕重如病五六分只下三四分許隨通且利熱去痰消則病徐徐減差若不揣度一概並蕩下之太過傷害臟腑疾轉陰候乃作慢驚風候豈可臨時生胃回陽慢驚風候醫云陰癇也良由急驚用寒涼之藥太過轉動深重傳作慢驚或因吐痢不止而成慢驚或因澡浴感風不解而作慢驚或因風食二癇不治而變成慢驚或因咳嗽下痰轉虛而成慢驚因由甚衆概而舉之病家怕驚不怕瀉良醫怕瀉不怕驚其瀉不止驚風愈盛若與治驚更用寒涼之藥且瀉轉多病加進重矣小兒脾胃虛怯方作吐瀉其證有五有熱吐冷吐虛吐痰吐食吐所言熱吐者謂母飲酒吃肥炙煿淹藏或冒風傷暑致熱兒吻乳入胃遂成熱吐冷吐者謂兒胃冷加以宿冷之物與食即吐虛吐者其兒肌熱神困疳積未消胃堂久虛即吐痰吐者其兒胃氣本虛復感寒邪生痰作熱留滯胸膈故吐食吐者其兒胃弱飲食不節強食傷脾作熱神困吐後即吐之病家但知其吐不明所以且吐兼瀉作名曰霍亂其吐候又推輕重有五初則乳自流出謂之哯哯之不已即謂之吐吐之不已即作嘔嘔之不已即作逆逆之不已即作噦自嘔逆噦皆有出聲動氣嘔者口開而作逆者心胸上下氣逆郁築噦者無物可出即膈虛胃寒引氣噦噦作聲此等候惡須臾變證即慢脾風熱吐者先去風痰冷吐虛吐與生胃氣痰吐即與下之次與正氣食吐宜與拓氣豈可一概理之吐瀉不止脾虛風生眼開慢驚眼合慢脾治之不當更下驚藥旋踵而死豈可得而救療兒分長幼病察虛實有吐瀉三五日發風者有一日半日而發者大抵女孩以吐為急男以瀉為速若氣虛暴瀉暴吐才作便得之惟有疳瀉不成風候久則虛之矣但治腸止瀉為良吐即生胃為正截風之藥加而用之凡驚藥及寒涼之藥切不可用亦不可用大熱藥其候乃屬陰證小兒熱證古分十種為總例有驚熱疳熱風熱潮熱傷風寒熱瘧熱積熱丹熱瘡疹熱餘毒熱十種熱證病各不同已有觸類而作潮熱者即痞癖熱也類近積熱證先腹肚熱腳冷者是傷寒熱與瘡疹熱亦相類且傷寒有三種皆從表發入里瘡疹隨五臟所受從里出表故不同根風熱與驚熱亦相近疳熱與餘毒熱相類疳有五證瘧有五候皆由脾家陰陽不順若驚熱盛即風熱作丹毒熱有數種皆五臟熱毒所作自上發下曰毒自下發上曰丹總之曰丹毒各隨輕重又有一種名曰龍帶橫腰過肚上或至胸前相交者重有如火燔其候亦同丹治病後餘毒熱諸證皆有之須適輕重類諸證而調解不可越前病用藥如傷寒後有餘毒熱即於傷寒調理不及而解余皆放之大抵驚熱涼之風熱化之疳熱補之潮濕散之傷寒熱解之瘧熱分之積熱利之丹熱消之瘡疹熱順表之諸證餘熱皆和證不可直便獨下熱積虛極先和脾調胃令其充實次以與服下若積證二二並作何證先下而急與調胃藥服之稍用倒置不免為它咎乃計利害所議積證作疾無可與之安和一味當下斯為良法有積不可安養久則為它病矣惟痞癖證先宜定去寒熱寒熱已去方可後下以適為度下之太過反生重熱雖有重熱即不宜用涼藥宜以調理胃氣藥與之尤宜深究小兒傷寒正受夾驚夾食正受傷寒所由感受寒邪胃冷脫著傷於腠理輕則傷風重則壯熱頭疼鼻塞流涕斯乃正傷寒候又有傷風傷暑傷冷傷濕皆能作熱困乏但不咳嗽又有因驚之時而傷寒故云夾驚又有因食之時而感寒氣者故曰夾食大抵傷寒或有它證似積之類切不可妄下若下之太早表裡俱虛難以調理謂之壞證大人壞證尚猶可藥小兒壞證救療無門凡傷寒有驚候亦不可下驚藥雖夾驚證亦不可用下驚藥幼兒傷寒只可解表雖曰用表不可令兒汗出如王氏杜薄荷散和劑方人參羌活散之類若熱在裡譫語鄭聲於證當下只用散末藥七寶洗心散四順飲犀角飲之類不可用丸子或以取積藥下之其熱不去反成無辜夾食者於理用下宜以紫霜丸量虛實而用須問先傷寒後夾食後傷寒然傷寒夾食乃在於食時之間惟母覺知其先後多是不覺若知之以後受者先調理之既不明其先後即可解表以俟里證有者方可與下為尤善也且下與表二理不可並行且如三日前在表三日後在裡斯乃大概約而言之恐後人傳之不當反為其害凡傷寒在表即解在裡則下不可以日限為拘其或有在表裡之間亦宜和解如又不愈小柴胡湯治之又不愈俟傳裡下為良大者譫語小即煩啼切不可意急取愈宜在用心明究表裡小兒積證積證最為要緊病家將作尋常醫者不急治之及至傳變方覺困重東漢王氏不言疳與瀉及痢即述證而已所以治未病之病凡小兒自幼及長不患驚風癇痓癲痙有之矣未聞無患積證者五臟之所積名曰積六腑之所聚名曰聚且小兒只理五臟受病故不有大聚證者何腑屬陽雖有病不治而自愈且胃屬腑氣生於漸乃脾主食主有疾當治之臟屬陰治之尤難調治四季有積欲下之理皆可用下藥但當究其虛實然後利之既有積氣不能全實量其輕重故古人有挨積磨積消積化積無下積之説小兒有患驚風痰熱四證如何用藥小兒有熱熱盛生痰痰盛生驚驚盛作風風盛發搐又盛牙關緊急又盛反張上竄痰涎擁牙關緊風熱極閉經絡即作搐搦涎擁胃口悶亂不省才入中脘手足拳攣關竅不通百脈凝滯有退熱而愈者有治驚而愈者有截風而愈者有化痰通關而愈者皆是依證用藥不可不究其所以凡病在熱不可妄言痰病在驚不可妄治風病在痰不可便治驚病在風不可便治搐凡治小兒病在驚由痰熱得只可退熱化痰其驚自止病在風風由驚作只可利驚化痰其風自散病在痰涎急須退熱化痰若有搐須用截風散驚若以意急雖治驚痰不化熱以不退驚如何自止化其痰熱若不退風亦不散痰如何去是知不治之治所以治之小兒泄瀉除疳瀉為虛熱余瀉皆臟腑虛寒怯弱得之小兒臟寒腑冷大腸不禁總謂之瀉分別輕重究竟緩速有溏有泄有滑有利有洞五者不同豈可一概而理溏者糟不聚由其尚濃似瀉非瀉泄者無時而作或出不知利者直射濺溜氣從中脫滑者穀食直過腸胃不化洞者頓然下之如桶散潰余更不留即知其兒臟寒腑冷瀉之作疾其來緩速輕重可知凡兒瀉糞出青色者蓋脾受肝經所制肝屬乙木能剋土所勝之功故見本質由其臟之虛寒非謂驚也又瀉初黃良久變青色乃臟寒之徵又瀉藥物直過尤為寒滑凡虛滑三五次即困乏若不急與溫其臟調其胃平順三焦和正榮衛即慢驚證候傳變如此之急欲以止瀉藥次第調理之往往不及惟務溫其臟腑臟腑既溫寒何能留於腸胃之間或以熱藥頓止則熱反為它疾須先投滯腸藥然後生胃正氣與服切不可意急過劑投之熱藥也稍或臟腑至虛寒孩童困乏四肢厥冷者是謂逆證當用黑附子白朮乾薑量輕重而用凡投熱藥瀉止則痢作無疑小兒痢疾醫云五疳八痢究其理種數多端輕重不一痢者利也痢之為疾無積不成及至積化成痢且脾胃亦虛即不可便下善治痢者生其胃溫其脾厚其腸和其氣無不愈也若成痢疾故不可下下之反虛作渴浮腫痞滿脹急不食亦未可便補補則傷熱能令脫肛先與禁卻一切毒食之物頻與生胃赤調氣或白即是冷熱不調或受暑致溫即與分陰陽氣利水穀道若裡急即與厚腸胃肚痛即與和順氣溫臟腑或純白者乃積冷毒加之即挨去其毒卻與溫其脾胃其痢自止凡痢疾能飲食可治不能飲食疾名禁口有不食至死又有毒氣侵胃口亦不飲食或患痢疾因食毒物不見腸頭鮮血頻滴肛門寬大深黑可畏腹肚㽱痛裡急後重名曰刮腸日夜頻並飲食在過者名曰滑腸此三種痢疾最為惡候乃是十二種中皆能傳變而作此候凡言小兒美飲食者飲謂飲乳食謂食飯若病中能飲水漿喜食果子魚肉之類者亦助其虛不能令臟腑充實須是白粽子爛煮飲可矣若以蔥粿䊦黏膩不堪脾胃之物尤其增困幼者吻乳克化漸安五臟平和六腑調貼然後陰陽自均氣脈自壯丸散湯劑不必抑之或有餘毒宜以順調緩助不可攻之又有時氣作痢熏習相染而成或由天氣晴雨不常陰濕冷熱相干腸胃糟粕不聚遂成其疾腹肚㽱痛裡急後重他藥莫治者宜服木香黃連地榆川當歸白芍藥肉豆蔻為末蒸烏梅肉丸棗子湯下三五十丸如麻子大加減神良小兒疳疾其證數端其候不同發作不常治療不一方論不等輕重斟酌隨宜設方必有可理者疳者甘也疳因脾家有積虛而致其積不可復食黏膩甘甜生冷炙煿之物故名曰疳初作名疳氣皆由飲食不節生冷相投積傷久滯不化而得之久則疳氣傳於五臟傳足名疳極候又反傳名疳逆候雖食不生肌肉作渴煩燥名疳虛候時發潮熱盜汗常有名疳勞候腹大喉細手足無肉者名丁奚候自丁奚翻食吐蟲虛熱來去名曰哺露十歲以下曰疳以上曰勞治勞之理悉不用疳藥蓋疾作傳足非常治疳之法理其氣虛助其血弱調令脈壯消其蟲子散去疳熱和順三焦無用急力攻治亦無勉強投藥只可循候而設不得過劑若冷藥易動臟腑燥藥易損三焦審察端的丸散隨其輕重無所失矣小兒諸證悉皆著載方藥療理法度惟有咳嗽一證究莫能盡月內芽兒難醫百日嬰孩亦難調理所言芽兒及嬰孩咳嗽難治者蓋為初生血氣微弱五臟未充肌體未固變蒸未周之兒所感寒邪攻及腠理表裡相干邪正相勝陰陽未和不可強生攻治妄吐妄下妄汗妄補皆令兒疾轉盛不惟無益甚有傷害幼兒咳嗽乳母之過丸散狼虎醫人之罪豈特芽兒及嬰兒難為調理小兒有咳嗽未許一二服藥便見安樂雖傷寒傷風證候已歸平復且咳嗽尚作大抵究竟小兒咳嗽先看有無熱與痰有熱在表無熱傳過或是未傳痰稠熱盛痰壅即吐宜服補肺散人參茯苓麻黃白朮杏仁甘草阿膠訶子地骨皮桑白皮桔梗有痰加半夏風熱加防風天麻服之自然痰化熱散咳嗽漸愈未可直用粗澀藥白礬南星石膏雄黃砒粉之類宜先滋潤脾肺次用王氏金華散少少時時與服或以白丸子加雌朱腦子隨大小作丸凡兒患咳嗽須究表裡未可一向攻嗽若用金石藥直入胃脘乃成脾風候手足勾曲又何所益巴豆輕粉砒霜藥下之腸胃不禁須臾成風亦何所益只用溫平與表順助其氣滋潤肺經和順三焦其痰漸化其熱自退不必攻擊所謂理嗽宜且補氣化痰益肺生胃胃開氣壯即嗽漸減胃正即痰不生肺滋即嗽不有然小兒氣弱其嗽作熱與大人一同而用藥調理實不同又有時氣咳嗽謂天時冷熱不同幼兒虛怯受患者衆其嗽日夜不輟或吐或喘痰熱壅盛至重者利之即愈謂用大黃朴硝枳實陳皮半夏人參厚朴柴胡心神煩悶胸膈不快方宜與服無熱與痰亦不可下審小兒得病之源大喜後乳食多變驚癇喜屬心大喜後乳食則傷心錢氏云心主驚驚是癇也素問云暴怒傷陰暴喜傷陽孫真人云傷陰則瀉傷陽則驚大喜後飲水多成喘急喜後飲水則停於膈上令胸喘急通真子云喜後飲水水傷於三焦令氣息喘急聖惠方云汗後飲水必成喘也蓋喜屬心汗亦屬心故也大哭後乳食多成吐瀉哭屬肺大哭後乳食則傷肺肺氣逆則作吐瀉故肺與大腸為表裡錢氏云大哭後乳兒多成吐瀉大哭後飲水多成嗽噎哭屬肺大哭後飲水則氣道不通成痰嗽氣噎聖惠方云飲水積結不散故成痰也又云肺水氣乘之則多咳嗽也倉公云哭人飲成氣噎嘔吐咳嗽痰水大飢後乳食多成腹痛修真祕訣云飢食過多則結積聚又云凡食不用急急則不細不細則傷損脾胃扁鵲云大飢急食久成癖塊面黃大飢後飲水泄瀉肚疼飢後飲水則冷濕傷脾脾氣受濕則令腹痛素問云濕勝則瀉聖惠方云飲冷過多結在心下故令心腹滿痛也大飽後飲水過多成氣逆素問云飲多則肺布葉舉是氣逆而上奔故能生痰疾道書云飲食過多成痰癖氣逆養生云飲水莫急咽久成氣病大飽後迎風多成暴厥大飽則食氣上衝心肺之間未散卒被風冷所傷故暴厥不醒如中