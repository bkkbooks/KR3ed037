癖積聚服之神效膽礬五錢緑礬五錢上用無油鹽蒸餅一個約重三兩去其頂捥去心裝二礬在內用生面糊其頂上用文武火燒黃色懸於屋梁上風乾碾為細末又用肥棗三十個無灰酒一大碗慢火熬成膏生絹濾並去滓再熬成膏子和丸如黃米大每服三十丸加至四五十丸溫米飲湯送下空心臨臥日進二服如男子婦人服之丸如梧桐子大每服三四十丸生薑湯送下忌一切生硬冷物中滿分消丸試效方黃連枳實麩炒厚朴薑製各半錢生薑薑黃豬苓各一錢橘皮白朮甘草各一錢砂仁澤瀉茯苓各三錢半夏四錢黃芩一兩二錢上為細末湯浸蒸餅為丸如黍米大每服三五十丸溫水送下食前消痞丸試效方黃連半兩枳實二錢黃芩二錢甘草三分人參四分厚朴七分生薑四分橘皮一分薑黃半兩上為細末蒸餅為丸如黍米大每服二三十丸隨乳下六神丸保嬰方治小兒久患脾癖面黃肌瘦肚大腹脹或有瘦蟲服諸藥不效服之如神蘆薈三錢大檳榔半兩血竭別研半兩使君子另搗極細肉豆蔻各半兩面裹燒熟去面不用京三稜一兩上除京三稜外為細末用烏雞一個去肚腸淨將京三稜裝在肚內縫合煮熟為度不用雞肉只用京三稜切作片子曬乾同前藥一處為細末棗肉為丸如黃米大每服三五十丸溫米飲湯送下或熬皂角子湯送下亦可空心食前日進二服忌一切等肉硬冷等物磨積丸保嬰方治小兒症癖塊硬腹脅刺痛不思乳食並宜服之常服消磨癖積美進乳食其效如神京三稜煨銼廣朮煨銼石菖蒲神麯炒麥糵炒杏仁湯浸去皮麩炒各一兩石碌礬二兩另研黑牽牛四兩炒熱取頭末二兩上為細末酸醋打麵糊為丸如黃米大每服三四十丸加至五六十丸溫米飲湯送下食後臨臥日進二服忌生硬冷物化癖丸保嬰方治小兒脅下癖積堅硬面色萎黃煩燥發熱口燥咽乾肌肉消瘦不進乳食心腹脹滿胸膈不利並宜服之常服此藥消化癖積寬胸順氣美進乳食大有神效京三稜煨銼一兩石三稜雞爪三稜廣朮煨銼木香茯苓去皮各半兩枳殼麩炒去瓤三錢半檳榔青皮去白蓽澄茄蓽撥各三錢硇砂另研二錢半枳實麩炒去瓤生一兩陳皮去白黑牽牛四兩取頭末一兩青礞石半兩另研香附子炒一兩大黃另取末一兩半上件除大黃末外為細末用米釅醋二升入大黃末同熬成膏子為丸如黃米大每服二十丸漸加至三四十丸乳汁送下或溫米湯亦可量兒大小添加丸數空心臨臥日進二服姜豉湯傅氏活嬰治閃癖走疰脅下疼痛黃瓜葉三片生薑塊一塊淡豉十粒上研取汁飲半盞必吐涎如不吐閃癖自然而愈鱉甲豬肚丸衛生寶鑑治癖發熱鱉甲九肋者七錢醋煮黃色青蒿七錢青皮去白半兩枳實麩炒半兩黃連七錢柴胡一兩去苗南木香半兩上為細末豵豬肚一個去脂盛藥蒸熱同和丸治小兒脾病不瘥如神栝蔞根一兩細辛五錢上為細末好釅醋調作膏藥於脾上貼之日一次換治小兒閃癖痞滿並瘧取土瓜根及葉搗絞汁服當吐下以少進之有小毒故也食症附論夫絶乳小兒寒溫失調飲食不化與臟氣相搏結聚不動名為症也其食結在腹喜寒四肢灑灑如瘧不能飲食常自隱隱而痛此則食症也方木香丸幼幼新書治小兒食症吃食不得四肢消瘦木香檳榔京三稜微煨銼當歸銼微炒杏仁湯浸去皮尖雙仁麩炒微黃犀角屑各一分鯊甲塗醋炙令黃去裙襴硃砂細研水飛過代赭各半兩細研巴豆半分去心研紙裹壓去油用上為末都研令勻煉蜜和丸如黍米大三歲兒空心以暖水下三丸晚再服量兒大小臨時加減代赭丸幼幼新書治小兒食症久不消代赭細研巴豆去皮心研紙裹壓去油丁香各半兩黃連去須五靈脂桂心各一分麝香細研膩粉各一錢蘆薈二錢細研上為末都令勻煉蜜和丸如緑豆大三歲兒空心以粥飲下二丸量兒大小以意加減當取下一切惡物為效硇砂丸幼幼新書治積年厭食並治血氣及症塊硇砂半兩細研青礞石細研穿山甲炙令黃焦磁石燒醋淬七遍搗碎研如粉京三稜微煨銼乾漆搗令炒令煙出赤石脂細研各一分虻蟲炒微黃去翅足水蛭炒令微黃各五十枚巴豆十五枝去皮心研紙裹壓去油脂上為末入巴豆都研令勻用軟飯和丸如小豆大每服三丸小兒一丸以燒蒸餅灰湯下一復時候取下惡物若是血氣塊當歸酒下不過五服瘥礞石丸一名三稜煎幼幼新書治小兒食症或時寒熱四肢黃瘦不欲飲食礞砂慢火燒乾薑炮裂為末杏仁湯浸去皮尖雙仁麵炒微黃各一分巴豆去皮紙裹壓去油硇砂各半兩以上五味研令細以米醋一碗煎如膏次用京三稜微煨銼皂莢去皮塗酥炙令黃去子蓬莪朮各一分上三味為末以前所煎膏和丸如緑豆大一二歲兒每服以茶清下一丸兒稍大臨時以意加之及治脾虛夾積時作吐利防葵丸幼幼新書治小兒食症寒熱羸瘦不能飲食防葵京三稜微煨銼各半兩肉豆蔻去皮木香枳殼炙炒微黃去瓤麝香各一分細研川大黃銼碎微炒鱉甲各一兩塗醋炙令黃去裙襴上為末煉蜜和丸如緑豆大三歲兒每服以粥飲下五丸日二三服更量兒大小臨時以意加減大黃丸幼幼新書治小兒食症大腸澀滯心腹妨悶川大黃銼碎微炒赤芍藥大麻仁鱉甲各三分塗醋炙令黃去裙襴防葵法曲炒微黃白朮青橘皮各一分湯浸去白瓤焙上為末煉蜜和丸如緑豆大三歲兒每早晨以溫水下五丸更量兒大小以意加減一方有木香無青皮治小兒癖氣腹痛四肢黃瘦芍藥丸聖濟總録治小兒食癖本於腸胃氣弱吃食不化結聚不散腹中隱隱成塊按之即痛芍藥大黃炒銼鱉甲醋煮去裙襴麻仁研各三分防葵神麯炒白朮各一分上為末煉蜜和丸如豆大一歲兒每服三丸三歲至五歲五丸並溫熱水下日再服更量兒大小加減治小兒食症大腸澀心腹妨悶幼幼新書膩粉一錢