body:
  text: 卷三百九十一嬰孩癖積脹滿門總論夫腹脹由脾胃虛氣攻作也實者悶亂喘滿可下之用紫霜丸白餅子不喘者虛也不可下若誤下致脾虛氣上附肺而行肺與脾子母皆虛肺主目胞腮之類脾主四肢母氣虛甚即目胞腮腫也色黃者屬脾也治之用塌氣丸漸消之未愈漸加丸數不可以丁香木香橘皮豆蔻大溫散藥治之何以然脾虛氣未出腹脹而不喘可以以散藥治之使上下分消其氣則愈也若虛氣已出附肺而行即脾胃內弱每生虛氣入於四肢面目矣小兒易為虛實脾虛不受寒溫服寒則生冷服溫則生熱當識此勿誤也胃久虛熱多生疸病或引飲不止脾虛不能勝腎隨肺之氣上行於四肢若水壯腎氣浸浮於肺則大喘也此當服塌氣丸病愈後面未紅者虛衰未復故也治腹脹者譬如行兵戰寇於林寇未出林以兵攻之必可獲寇若出林不可急攻攻必有失當以意漸收之即順也治虛腹脹先服塌氣丸不食腹中有食積結糞小便黃時微喘脈伏而實時飲水能食者可下之蓋脾初虛而復結有積所治宜先補脾後下之下後又補脾即愈也補肺恐生虛喘腹中有癖不食但飲乳是也當漸用白餅子下之小兒病癖由乳食不消伏在腹中乍涼乍熱飲水或喘嗽與潮熱相類不早治必成疳以其有癖則令兒不食致脾胃虛而時發熱故飲水過多則蕩滌脾胃亡失津液脾胃不能傳化水穀其脈沉細益不食脾曾虛衰四肢不舉諸邪遂生羸瘦而成疳矣曹宣得子三歲面黃時發寒熱不欲食而飲水及乳不止衆醫以為潮熱用牛黃丸麝香丸不愈及以止渴乾葛散服之反吐錢氏曰當下白餅子主之後補脾乃以消積丸磨之此乃癖也後果愈何以故不食但飲水者食伏於脘內不能消致令發寒熱服止渴藥吐者藥沖脾所也下之即愈食癖者其狀在右脅時復求衝心多驚叫是也宜服進食丸化之乳癖者其形在心時或上下疼痛啼叫時作壯熱此不可取宜用消乳丸疳癖者其狀在右脅下生如木梳子大致令肌肉不生漸成羸瘦或作潮熱及肚大急宜取之仍服進食丸痟癖者其狀或在左右脅間致令啼叫亦須取之驚癖者其狀在心頭不動常要驚啼此因小年驚積成塊涎里成癖伏之於心此病須要礞石藥方可取之大抵癖病宜服三稜蓬朮橘皮巴豆硇砂縮砂烏梅等藥漸磨化不可急取腹脹之狀膨䐜如鼓素問云濁氣上則生䐜脹如鼓之有聲心腹脹滿旦食不能暮食名為鼓腹榮衛隔塞鳴息喘粗背由冷氣所作寶鑑云凡冷結在脾因茲腹脹壅滯於脾內不通而外不散痞凝於胃上不降而下不升或乳食過度致傷脾胃脾胃氣弱則臟腑弱令腹脹有虛實二證亦有半虛半實者虛者腹脹不喘泄瀉不食實者朝寬暮急悶亂喘粗半虛半實者喘滿泄瀉或腹脹不喘小便如常皆半虛半實也虛者皆益黃散次塌氣丸導氣丸再益黃散實者妙丸子再下白朮散若心腹脹滿大便祕澀煎宣風散送下妙丸子半虛半實者益黃散補次妙丸子再下益黃散若腹脹不喘大便如常塌氣丸導氣丸漸漸消之有一等腹脹滿肚大青筋四肢瘦劣謂之疳蠱此病多死癥傷食得之痛刺脅肋心胸煩悶飲食不下吐逆噁心久不醫治漸成癥結又曰食結瘕傷血得之胸隔鬱悶痛引少腹時或攻築上搶心胸雖不阻食肌肉不生久而不治漸成癥結又曰血結痞傷氣得之心腹膨脹肚大脅滿痛刺往來注左右肋面黃肌瘦倦怠無力久而不治漸成痞塊又曰氣塊癖傷積得之其證如腸澼之疾便利無度滑不成糞似痢非痢似蟲非蟲腹肚干痛上築心胸滿悶久而不治頑結不散腸結成塊有類痞狀以上四證皆作寒熱有如瘧候一般悉由傷及五臟惟痞癖左脅肋塊其氣結聚男女皆在左脅四證大同小異凡治寒熱先以梨漿飲進一二服退其寒熱寒熱已消去三五日後方可與服磨痞丸即日日頻頻與服癥瘕之疾只與三稜丸下去積毒以通為度凡疳氣脹疳積脹氣積脹小兒患疳證候皆由虛所傳積乃為積既已作虛氣傳授遂成疳疾其名數種皆由漸所致不可更與通利尤如重候即宜和益消疳調氣若尚有虛積便白後重當兼塌氣以去之先與服神功保童丸以至泄氣若為快既泄虛氣即散不傷其氣功效至良應患疳積便利無度大有功效鎖肚脹急此一證候皆在胞胎中無病只由初生七日內有患觸受而成急如水火其作延久漸見加重以致肚上青筋撮口不乳其候甚速名脹急其兒感觸邪氣入腹衝心不能自化遂變風侯及至成風不可更投疳藥雖然鎖肚撮口不乳其色未變精神未亂者速用下藥以通為度才通便安宜服真珠天麻丸人才生下男女忽有一證男在三五七女即二四六日奇偶之有數陰陽之顯道者遂感客忤邪正相干亦令兒肚緊青筋噤口不乳此由客情外來致襲其邪陰陽不順冒觸其正初生男女氣脈未定精神未足總皆邪觸上古醫家著述繁雜難窮至要世俗雖有加文理總無用炙血氣發生豈因經絡若以艾炷即為虛設既受此厄越日移時母泣父啼痛心待斃凡上膈脹中脘脹食傷膨脹者膈與脘上下相承膨與脹輕重自別脘受疾久則痞悶膈則作病停則鬱結是知膈隱胸堂脘臨脾胃膈者猶隔也有如隔礙脘者猶管也通即流利二病皆由食傷宿冷眠臥過時停滯之氣不順於三焦怯弱脈虛傳於五臟所謂脾不磨食不化胃不化食無益所以膨脹若於膨脹之時不與消利遂致虛滿又於虛滿不為疏補其氣即攻中脘又於中脘不化即胃上膈既在上膈為疾必作形證傳即為重醫莫容易取愈食傷膨脹服三稜煎丸中脘痞脹服王氏塌氣丸上膈郁脹服大茱連丸楊氏曰小兒乳哺失調三焦關膈以致水漿乳哺停滯腸胃不能宣行冷氣結聚初則成積久則血膜包水時時作痛或為潮熱或生寒熱及瘧家多於中脘蓄積黃水日久結癖寒熱不已幼幼方曰由脾胃虛冷乳食積滯不能克化以致血膜頑廢里積而成癖湯氏曰食癖乳癖疳癖痞癖宜以甘遂芫花莪朮三稜巴豆等取之推驚積當於取積藥中加以南星半夏化痰之劑實者取而後補虛者補而後取補脾則實脾散磨積則消積飲用巴豆炒去巴豆或硇砂炒厚朴取積則紫霜丸神保丸五積丸重者消癖丸痞者塞也結者實也熱氣蘊於胸膈之間留飲聚於腹脅之內於是榮衛不得流行臟腑不得宣通由脹滿而至痞結勢使然耳此熱實之證也時或發為壯熱甘遂散主之原小兒癥瘕癖結候五臟不和三焦不調有寒冷之氣客之則令乳哺不消化結聚成症癖也其狀按之不動有形攻起者症也推之浮沉者瘕也其弦急牢強或在左或在右者癖也皆由冷氣痰水食飲結聚所成故云癥瘕癖結也夫小兒寒溫失調飲食不化與臟氣相搏結聚不動名為症也其食結在腹喜寒四肢灑灑如瘧不能飲食常自隱隱而痛此則食症也小兒瘕者在腹中疼痛無常不定在一處者瘕也小兒結症成塊者為不慎滋味嘗吃黏滑膩肥腥膻瓜果胃口不和結實難化症痞於胸膈之間攻衝脾胃則嘔逆頻頻喘粗眼澀更加煩渴或歸於下部則泄瀉頻並兩脅虛脹便只和脾胃或更疏瀉或則飲食不化漸次成症凡小兒生下有瘕癖氣有疳蟲攢心氣有胎驚疝氣有抱心吊氣瘕氣者發時橫來左右脅下築痛或多吐逆急下鮓湯圓通利後以勻氣散服之疳蟲攢心氣者其後伏面服去蟲藥如渴水未住便下塌氣丸夾黃連飲子服之胎驚疝氣者生下多夜啼或吊上腎乃以寬氣藥參苓散治之又用蔥涎膏貼外腎醒後汗出如喝水無時乃以槐角丸又寬氣藥調理二三日亦已通利與勻氣生下未周歲至兩歲一見陰腫者此胎中大受極熱或父之傳受先用牛黃丸療之後勻氣始用蕓薹子為末冷水調貼之如未退卻用寒水石白墡土酸醋調塗乃常吃鬱金甘草牙硝三味為末蜂糖熟水調下諸癖結脹滿方金露丸出楊氏寶書治心腹脹滿症癖氣塊大如鵝卵者及黃疸朝起嘔逆四肢沉重上氣盤結血氣衝心膀胱兩脅膨脹背連腰痛十種水氣五淋五痔骨蒸頑麻半身不遂眉毛脫落皮膚燥癢常如蟲行手足煩熱夜臥驚悸夢與鬼交年月深遠行成勞病尸蟲鬼疰久不能療及治室女經閉阻滯血脈不通羸瘦憔悴不思飲食人參官桂各半兩紫花術三分炒附子一枚炮去皮臍川烏半兩炮厚朴三分去皮製大黃半兩豬牙皂角二錢去皮菖蒲半兩桔梗三分乾薑一分炮川椒半兩去合口者柴胡一分吳茱萸半兩白茯苓半兩上為細末別研甜葶藶子半兩巴豆三分去皮膜油續隨子半兩後三味別研得所同前藥末一處麵糊為丸如麻子大及緑豆大以意加十歲兒空心米飲下五丸如覺攪觸為驗升陽補氣湯治小兒脾病發熱防風根三錢羌活一兩半柴胡一錢甘草三分荊子半兩升麻半兩葛根半兩獨活三分黃耆半兩人參三分當歸身三分酒浸陳皮三分黃柏三分酒浸生地黃三分酒洗地骨皮半兩上銼每服三錢水煎去滓溫服牛黃丸幼幼新書治小兒癥瘕百病疳痼腹脹黃瘦發渴不常客忤疳痢及吐逆不定心腹多痛急驚風天釣等症牛黃細研犀角屑各半兩木香當歸各微炒各半兩人參去蘆頭川大黃銼碎微炒光明砂細研水飛過檳榔各三分麝香細研鱉甲一兩塗醋炙黃去裙襴代赭二分巴豆淡漿水大碗煮盡去皮出油別研各一分肉豆蔻二枚去殼杏仁二十枚湯浸去皮尖雙仁麩炒微黃色上為末同研令勻煉蜜和丸如緑豆大小兒百日以下乳汁下一丸二三歲空心粥飲下二丸胸腹有病吐出臟腑有病即利出惡物為驗後只吃漿水粥一日其利自止五日至十日吃一服永無滯結更量兒大小加減服之牛黃鱉甲丸幼幼新書治少小癖實壯熱食不消化中惡忤氣牛黃厚朴薑製炮茯苓桂心芍藥乾薑各半兩鱉甲醋炙香熟麥面柴胡大黃枳實麩炒芎藭各一兩上為末蜜丸如小豆大日三服以意量之一方有麥門冬無枳實鱉甲丸聖濟總録治小兒症癖鱉甲醋煮去裙襴犀角鎊丹砂研桂去粗皮各半兩大黃銼炒當歸切焙萆薢炒代赭搗研巴豆去皮心膜研去如膏各一兩枳殼去瓤麩炒牛黃研麝香研各一分上為末煉蜜和丸如麻子大三四歲兒每服二丸至三丸空心新汲水下瘥即止更隨兒大小加減鱉甲丸幼幼新書治小兒症癖羸弱不能乳食鱉甲塗醋炙令黃去裙襴京三稜微碎銼川大黃銼碎微炒檳榔郁李仁各半兩湯浸去皮微炒木香青橘皮湯浸去白瓤焙肉桂去粗皮柴胡去苗人參桔梗各去蘆頭防葵各一分上為末煉蜜和丸如緑豆大五六歲兒空心以米飲下七丸晚後再服更隨兒大小以意加減木香硇砂煎丸幼幼新書消癥瘕積聚血結刺痛木香大黃炮京三稜生用巴豆去皮膜不出油用細研之官桂去皮筒子漆炒青橘皮去白蓬莪朮炮附子炮去皮臍乾薑炮各一分香墨一指節大細研硇砂半兩以好醋一盞浸一宿去砂石上將大黃末京三稜末巴豆等三味同於銀石器內以好醋一升煎一兩沸次入硇砂同熬成膏次入諸藥末和勻再入臼杵千百下為丸如緑豆大每服五丸傷冷食冷酒冷水結聚腹內氣塊痛用乾薑湯或橘皮湯下夾食傷寒白湯下亦得黏食不消或氣塊即用煮麵湯下食牛羊魚鱉肉成氣塊不散用所傷汁下宿酒不消酒下血氣當歸酒下妊娠不服要轉痰茶下加至七丸小兒三丸常服一兩丸鱉甲散幼幼新書治小兒癥瘕壯熱頭痛嘔逆腹痛寒熱頭髮作穗及食癖乳癖氣癖鱉甲一個塗醋炙令黃去裙襴枳殼麩炒黃去瓤木香川大黃銼微炒京三稜微煨銼檳榔各半兩人參去蘆頭赤茯苓柴胡去苗各三分桂心一分上為粗散每服一錢以水一小盞煎至五分去滓溫服日三服量兒大小以意加減聖效丹幼幼新書治癖結諸病久不瘥當歸洗焙乾木香細研水飛好硃砂細研水飛桂心各一兩甘遂慢火煨令黃色用京三稜炮乘熱銼鱉甲各半兩塗酥炙黃去裙襴以上搗羅為細末次用麝香蕤仁各一分湯浸去皮別研巴豆三七個去皮心用絹袋盛用好酒煮一宿取出別研上同研細用黃蠟六兩慢火熔化同諸藥攪成膏如黍米大每服未周歲小兒一粒二三歲二粒四五歲三粒六七歲五粒十歲以上七粒溫米飲下乳食後量兒大小加減京三稜散聖濟總録治小兒癥瘕食癖京三稜煨銼鱉甲醋炙去裙襴枳殼去瓤大腹子銼陳曲炒麥糵炒蓬莪朮煨銼厚朴去粗皮生薑汁炙訶黎勒皮半生半熟青橘皮去白焙各一分上為散六七歲每服半錢空腹米飲調下日三服更量兒大小加減鱉甲丸幼幼新書治少小腹中結堅脅下有疹手足煩熱鱉甲醋炙香熟芍藥大黃各三十銖茯苓柴胡乾薑各二十四銖炮桂心六銖䗪蟲蠐螬各二十枚上為末蜜丸如梧桐子大服七丸漸漸加之以知為度馬通粟丸幼幼新書治少小脅下有氣內痛喘逆氣息難往來寒熱羸瘦不食馬通中粟十八銖杏仁紫菀細辛各半兩五味子焙石膏秦艽半夏茯苓各六銖上為末蜜丸如小豆大每服十丸日三服不知加至二十丸大茱連丸活幼口議治小兒飲食過度膨脹胸膈上下氣不宣通鬱滯迷悶情思少樂大則作喘強食不化作渴煩躁坐臥不安肢體倦怠腹脅疼痛蓬莪朮京三稜各一分醋乾薑一錢炮青皮陳皮並去白木香丁香各二錢緑小細茱萸二錢巴豆二十一粒去殼心膜去油上為末醋糊為丸麻子大每服七丸至十丸大者加服生薑棗子湯下議曰痞鬱結注所因脾胃飲食生冷黏或積氣不化滯在胸膈胸膈乃總名上曰三焦下曰三脘上下相通滯因冷侵虛處所受弱處所發致疾有因久不克化成害或由結癖癥瘕痞癖積之所由生疳痢吐瀉積之所因作今用此方寬胸膈厚腸胃正氣溫中消疳磨積能止吐瀉進美飲食代赭丸治小兒腹中結癖塊痛代赭石研細川大黃各半兩木香五靈脂硃砂鱉甲塗醋炙黃桃仁浸去皮焙辣桂各一分巴豆去油半分上為細末糕糊如麻子大風乾每服五丸薑湯下撾脾散治小兒脾癖石燕一對醋蘸七次白丁香一兩定粉三錢人參二錢訶子一對丁香半錢輕粉五錢陀僧二兩舶上硫黃五錢上為極細末每服一錢量小兒大小加減大者二日一服小者三日一服早晨米湯調服食乳汁小兒即用乳汁麵湯亦可三歲服一字五歲服一錢雙紫丸幼幼新書治小兒身熱頭痛飲食不消腹中脹滿或小腹絞痛大小便不利或重下數起小兒無異疾飲食過度不知自止哺乳失節或驚悸寒熱惟此丸治之不瘥更可重服小兒欲下是其候哺食減少氣息不快夜啼不眠是腹內不調宜用此方序例中雲服紫丸者即前變蒸篇中四味者也云服紫丸不下者服赤丸赤丸差𫘆病重者當用之方中並無赤丸而用硃砂又力緊於紫丸疑此即赤丸也巴豆蕤核仁各十八銖麥門冬十銖甘草五鏈甘遂硃砂各二錢蠟八銖牡蠣八銖上以湯熟洗巴豆研新布絞去油別搗甘草甘遂牡蠣麥門冬下篩訖研蕤核仁令極熟乃內散更搗二千杵藥燥不能相丸更入少蜜足之半歲兒服如荏子一雙一歲二歲兒服如半麻子大一雙三四歲者服如麻子二丸五六歲者服如大麻子大二丸七歲八歲服如小豆二丸九歲十歲微大如小豆二丸常以雞鳴時服至日出時不下者熱粥飲數合即下丸皆雙出也下甚者飲以冷粥即止芍藥丸治小兒胎中宿熱乳母飲食粗惡辛苦乳汁不起兒乳哺不為肌膚心腹痛病痞滿萎黃瘦瘠四肢痿躄繚戾服之可令充悅榻子丸活幼口議治小兒陰陽不和臟腑怯弱乳食不消心腹脹滿嘔逆氣急或腸鳴泄瀉頻並服中冷痛食症乳癖痃氣痞結積聚腸胃或祕或利頭面腫滿不思乳食及療五種疳氣八種痢疾肌肉消瘦氣粗腹大神色昏憒情意不樂常服散冷熱氣調和臟腑去疳積止瀉痢進乳食生肌肉悅顏色蘿蔔子二兩微炒陳皮去白青皮去白各一兩京三稜炮一兩黑牽牛一兩半半炒半生煿尤佳蓬莪朮炮一兩胡椒半兩木香一分上為細末麵糊為丸麻子大每服三五十丸煎蘿蔔湯下一方加胡黃連半兩苦練半兩蘿蔔子為使一兩議曰證候不明醫之過也丸散不良士之繆也主醫裁藥審證察候猶若權衡以究標本醫藥純全之道凡調理小兒雜病須究疳證積候乃五臟所傳及至變作他患殊失源流迷而不反所以作疾此方寬腸下氣散結去郁疳積已作未作順傳逆傳並皆宜服凡痞癖之氣同根異名作疾有塊皆在左脅男女一同然痞者陽證癖者陰證小兒脾胃不和陰陽二氣交錯冷熱相制皆由積之所致故先寒後熱一如其瘧汗出則息若先下卻其積熱往往不去反增加重而又作腫虛滿頭面凡兒有是疾醫者不可輕易投砒治之其砒有大毒沖胃三焦作渴引飲水停在脾脾屬四肢亦作浮腫重則致喘煩燥虛悶倦怠不安砒之為藥豈可妄投宜先與服梨漿飲加湯使如法取令寒熱退三五日了卻與三稜丸磨化積毒以利為度去其根本若未通更服以上忌生硬冷物直指方加檳榔五靈脂各一兩吞紫霜丸治疳脹三稜煎丸活幼口議治嬰孩小兒食傷生冷黏膩熱毒等物脾胃積滯久不克化令兒肚熱腳冷痞癖寒熱及療癥瘕中脘不和膨脹上膈氣壅心腹不得宣通所以作疾此藥溫良但治諸積滯食不化京三稜蓬莪朮並炮各半兩芫花一分淡豆豉二錢鱉甲去裙米醋炙令焦半兩巴豆二十一粒去殼杏仁去皮尖一分炒令赤川當歸半兩上前六味一處以米醋一碗煮冷干仍就炒起更細韯焙為末次入當歸末又入杏仁巴豆淡豆和勻水煮麵糊為丸麻子大每服二十丸生薑湯下大小加減服之此方亦名消痞丸又名化積丸其藥破氣行血和脾開胃一應痞癖癥瘕諸積氣滯並皆療之夫脾胃者乃飲食之臟腑也然飲食有所宜則穀氣消血脈勻肌體壯精神爽有所不利則腸胃虛肢體瘦面目黃疾病作以是藥固其臟腑真胃氣和即穀食自然留之脾胃壯即穀食自然磨之若飲食遲化即氣弱飲食不化即氣虛小兒服此初安臟腑次益肌膚三焦既順百詠俱調效驗紅丸子治血膜包水僻側於脅傍時時作痛發寒熱瘧家中脘多蓄黃水日久結癖亦效三稜煨莪朮煨芫花桃仁去皮別研杏仁去皮別研硃砂烏梅炒巴豆各等分上為末醋糊丸小緑豆大硃砂為衣米湯空腹下七聖丸湯氏寶書治消積滯調脾胃及治小兒食不化成積積不消成癖久而作痛宜服三稜莪朮川練去核陳皮去白青皮去白芫花各等分上以芫花醋浸一夕炒漸干入三稜莪朮同炒又入川練陳皮青皮同炒燋取為末等分如各半兩杏仁亦用半兩去皮尖別研巴豆二十粒去油膜勻和醋糊丸黍米大一歲二丸臨睡米飲下此二方稍相似不若方中和桃仁與烏梅則尤妙又用蒜湯下蕩脾丸化痰涎一日一服或兩服日用如此服蟹水亦可日間所餐之物一夜而化永無府疾一方可去巴豆別入杏仁代赭丸幼幼新書一名小紫雙丸治少小及大人腹中宿食積成症癖兩脅妨滿氣息喘急不能食面黃日漸瘦腹大脹除百病代赭丹砂各研大黃各八分青木香五分聖惠用二兩當歸五分聖惠用二兩桂心四分聖惠用二兩巴豆六分去皮心別搗聖惠用半兩犀角屑三分聖惠用二兩上搗篩蜜和丸如梧桐子大小兒量之十歲兒服大豆許二丸六歲者小豆許二丸以下臨時斟酌要瀉病出為度久病日一丸以溏泄而已不在猛瀉忌如常法一方去桂心用杏仁持遂丸幼幼新書治小兒癥瘕脅下堅硬如石四肢黃瘦不欲乳食甘遂煨令微黃蕤仁各一分湯浸去皮研入雄黃細研丹砂石膏各細研水飛過牡蠣燒為粉各半兩麝香半分細研巴豆半分去皮心絹裹盛酒中煮半日取去焙乾上為末與巴豆研令勻煉蜜和丸如黍米大每服以粥飲下一丸日二服量兒大小加減服之大腹子湯幼幼新書治症癖腹滿小便不利大腹皮一兩銼檳榔枳殼麩炒去瓤赤芍藥人參去蘆頭知母陳橘皮湯浸去白各半兩甘遂二分慢火煨令黃上為細末每服一錢水一小盞煎至五分去滓溫服量兒大小加減七味進食丸幼幼新書治乳食不消心腹脹滿壯熱喘粗嘔吐痰逆腸鳴泄瀉米穀不化或下痢赤白腹痛後重及食症乳癖痃氣痞結並皆治之久痢有積不除或多壯熱或疳積肚痛常服消進飲食永無食癖痞結之疾余常用之效不可具述代赭石燒醋津研當歸去蘆微炒硃砂炒飛枳殼去瓤麩炒微黃木香各半兩麝香細研一分巴豆霜半分上為末入研藥和麵糊丸如麻子大每一歲兒服一丸溫米飲下更量虛實加減服之食後白丁香散瑞竹堂治小兒大人癖積白丁香雀兒糞也黑丁香二錢密陀僧三錢硫黃一錢訶子皮半錢輕粉半錢木香二錢上為細末每服一錢用乳汁調服女用男乳食男用女乳食調服食前半飢半飽服日三棗兒壓之大人米湯空心服牛黃丸幼幼新書治小兒結實乳食不消心腹痛牛黃甘遂各半兩真珠六銖杏仁湯去皮尖芍藥黃芩各一兩巴豆十八銖上為末蜜丸一歲兒飲服如麻子大二丸但隨兒大小加減服萬應丸聖濟總録治小兒陰陽氣不順虛痞脹滿嘔逆腹痛成癥瘕癖結等病檳榔二枚銼陳橘皮去白焙青橘皮去白焙各半兩木香黃連去須蓬莪朮煨銼桂去粗皮各一分上為末每服一錢匕入巴豆一粒去皮心膜醋煮紫色研杏仁一枚去皮尖燈上燒黑研將前藥末同二味合研勻細用白麵糊和丸如粟米大每服二丸食後生薑湯下更量兒大小加減牽牛子丸一名枳殼丸治小兒水癖按之作聲及治癖氣脅下妨悶手足微腫幼幼新書牽牛子炒枳殼去瓤麵炒半兩用蘗皮去粗皮炙甘遂炒桂去粗皮牡丹皮各一分大黃銼三分上為末煉蜜和丸如緑豆大每服五丸空心服溫湯下量兒大小加減雙參飲子幼幼新書人參胡黃連枇杷葉拭去毛乾葛甘草玄參麥門冬上各等分為末每服一錢水半盞煎兩三沸去滓服桔梗枳殼湯治熱氣痞滿胸膈兩脅按之則痛枳殼去瓤桔梗去蘆各五錢半夏湯洗黃芩栝蔞仁黃連去須各三錢上銼散生薑麥門冬去心煎服利黃涎沫即安蘆薈丸治小兒脾癖木香肉果丁香各五錢以上三味麵裹燒蘆薈一兩使君子訶子各五錢上為細末煮棗肉為丸如緑豆大每服二十丸空心白湯下日二服量兒大小加減雄鼠粥聖濟總録治小兒癥瘕腹痛脹滿或作塊或皮膚浮腫不能食雄鼠肉五錢切炙陳橘皮去白焙半兩鱉甲醋炙去裙襴京三稜煨銼郁李仁去皮研各三分生薑切焙半兩上粗搗篩分作三貼每貼以水一升煎去滓取半升入粳米一合加五味煮作粥空心食之知母大黃丸幼幼新書治小兒癥瘕腹痛黃瘦川大黃三分銼碎微炒知母牡蠣燒為粉枳殼麵炒微黃去瓤當歸各半兩銼微炒鱉甲一兩塗醋炙令黃去裙襴上為末煉蜜和丸如緑豆大三四歲兒每服空心以粥飲下五丸晚後再服量兒大小以意加減鱉頭丸幼幼新書治小兒痞氣脅下腹中有積聚堅痛鱉頭一枚甘皮半兩虻蟲䗪蟲桃仁各十八銖上為末蜜丸服如小豆二丸日三大便不利加大黃十八銖以知為度聖惠方同但用大黃無甘皮白餅子一名玉餅子錢氏治小兒腹中有癖但飲乳者及嗽而吐痰涎乳食輕粉半夏湯浸七次去涎天南星各一錢為末巴豆二十四個去皮膜水一升煮水盡為度滑石一錢上研勻巴豆後入衆藥以糯飯為丸小緑豆大捏作餅子三歲以上三五餅子以下一二餅子煎蔥白湯下臨臥服之人參蘿蔔飲活幼口議治小兒痞癖因食砒藥丸子作渴煩燥頭面浮腫腹肚緊脹喘促坐臥不得肌體羸瘦寒熱尚在白朮苦梗甘草炙人參麥門冬去心上等分為末每服一大錢取生蘿蔔汁盞半煎至半候冷與服消