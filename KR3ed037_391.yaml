大每服二丸蔥棗湯下小兒二歲以上服如麻子大一丸日二服忌海藻菘菜野豬肉蘆筍生血物燒青丸治小兒諸癖每至午後時作寒熱微有咳嗽脅肋癖硬知母丸幼幼新書治小兒腹痛不調兼癖氣知母六分鱉甲四分炙枳殼三分麩炒去瓤大黃十二分紙裹煨熱牡蠣三分上為末蜜丸如緑豆大飲下五丸大人以意下服二丁散幼幼新書治小兒諸癖久不消腹痛乍寒乍熱泄瀉無時多渴黃瘦或下痢腹脅有塊如掌癖側石硬揀丁香白丁香沒石子各二錢硫黃密陀僧各三錢上為細末研勻每服一字至半錢白湯調空心臨臥日二服以消為度大戟餅子幼幼新書治小兒食癖脅下有一塊飲食不生肌肉大戟半兩勻切作片子以好醋浸一宿取出焙乾為末用藥末一錢好面一錢上滴水和丸捻作餅子如小錢大厚三分𨫼上煿熟米飲嚼下一餅兒小減服治大人小兒痃癖氣塊來往疼痛不止又治心氣痛不可忍者白玉赤玉各等分上為細末用水和為丸如麻子大每服三十丸生薑湯下治癖牛蒡子草烏生各等分上為末以雞子清調先用厚絹數重安癖上仍以厚紙包藥餅子安絹上以尉斗盛火尉之更易數餅其積內消又方以食茱萸半升銼細酒煮布包尉癖上冷則又炒頻尉如癖走隨癖尉之療大小兒癖氣幼幼新書取車下李仁微湯退去皮取仁與乾麵相拌搗之為餅如猶乾和淡水如常搜面大小一如病人手掌為二餅微灸使黃勿令至熟空肚食一枚當快利如不利更食一枚或飲熱粥汁即利以快利為度至午後利不止即以醋飯止之利後當虛病未盡者量力二三日更進一服以病盡為限小兒亦以意量之不得食酪及牛馬肉無不效但病重者李仁與面相半輕者以意減之後服者亦任量力頻試瘥治小兒癖氣幼幼新書用京三稜汁作羹粥以米麵為之與乳母食日取一棗大與小兒吃亦得作粥與癇熱食之治小兒十歲以下及新生百日無問癇熱無辜痃癖等皆理之祕妙不可具言大效治小兒閃癖頭髮堅黃瘰瀝羸瘦幼幼新書用林檎杵末以和醋敷上癖移虛就敷之治小兒閃癖幼幼新書宜用蝤令煮食之治小兒閃癖大腹痞滿用鸛骨及嘴並煮汁服之亦燒為黑灰飲服治小兒閃癖幼幼新書用苦瓠取未破者令熱解開尉之治小兒痃癖幼幼新書用質汗出西番如凝血番人煎甘草松淚柳乳地黃並熱血成之取半匙以水半盞研如稀糊更研硃砂調勻若五歲以下空心服只作一服服之得利惡物出如不利隨糞出瘥三五日大愈量兒大小與之治小兒閃癖以苦菜葉搗末敷之治小兒閃癖本草用若耽苗子研敷之治小兒閃癖本草用胡瓜葉一歲服一葉以上斟酌與之生挼絞汁服得吐下治小兒閃癖本草搗苦𧄹葉敷之
