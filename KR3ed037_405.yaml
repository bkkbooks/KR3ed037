便溫暖漬之良又方用巴豆五十枚去心皮以水三升煮取一升以綿內湯中拭病上隨手消並治癮疹又以大戟煎湯淋三五遍風毒癮疹即消又方治小兒患癮疹入腹體腫強而舌乾用蕪菁子為末酒服方寸匕日三又方用蠶砂三升以水三升煮去滓洗之良亦治丹毒又方用車前子為末粉之良又方用鹽湯洗了以蓼子挼敷之治癮疹用白芷針刺燒存性為末溫酒調下二錢又以根葉煮汁洗之又方治風疹亦治風熱皮膚瘙癢因而生瘡用赤石脂不拘多少研細每服二錢荊芥湯調下食後荊芥酒調亦得如氣實用蜜水調亦妙又方治瘙癢成瘡者用殭蠶炒黃末酒調服立瘥療丹癮疹用酪和鹽熱煮以手摩之即消療五野雞病小兒患赤疹用蝦搗碎敷之治大人小兒風疹用茱萸一升以酒五升煮取一升帛染拭之治腫毒遊風風疹頭痛用芭蕉根井水敷又治丹毒煎汁塗之土砂散治小兒風疹進退腫癢用土砂當歸等分為末冷酒調下一錢兼用塗之又慎火草生薑及鹽同研搽癢處消又方用石灰水醋調塗即消治小兒風瘙癮疹心中悶亂上川芒硝二兩以清酒三大盞煎至二盞放溫洗癢處燥復洗之癢瘥乃止避風又方用虎睛摩之即愈五香枳實湯治小兒著風熱㾦癗堅如麻豆粒瘡癢搔之皮剝汁出或遍身頭面年年常發者青木香九銖麝香六銖漏蘆半兩升麻黃芩白蘞雞舌香熏陸香沉香防風秦艽麻黃各一兩枳實一兩半大黃一兩八銖上㕮咀以水五升煮取一升八合兒五六歲者一服四五合七八歲者一服六合十歲至十四五者加大黃半兩水一斗煮取二升半分三服之枳實丸治小兒病風瘙癢痛如疥搔之汁出遍身㾦癗如麻豆粒年年喜發面目虛肥手足乾枯毛髮細黃及肌膚不光澤鼻氣不利此則少時熱盛解體當風風熱相搏所得也不早治之成大風疾枳實一兩菊花蛇床子防風蒺藜子白薇浮萍各一兩天雄麻黃漏蘆各半兩上為末蜜和丸如大豆許五歲兒飲服十丸加至二十丸日二五歲已上者隨意加之兒大者可為散服治小兒風疹走帶方薑黃荊芥黃連土朱赤小豆爛石膏各等分上為末撲之二聖散治癮疹肌肉青黑胡粉一兩苦參一兩上為末每服一錢溫酒下兼塗患處消毒飲治麻風身或熱或不熱遍身紅疹如此者是麻風宜硃砂雄黃等分為末井水調塗後服藥牛蒡子炒六兩荊芥穗一兩防風甘草炙升麻各一兩半上㕮咀水煎食後溫服又方用土硃砂酒服並搽之
