body:
  text: 卷四百五嬰孩諸瘡腫毒門癰疽附論夫癰疽瘡癤瘰癧結核疥癩毒腫赤癮疹併火疸等症皆由風邪客搏經絡澀滯經曰五臟不和則九竅不通六腑不和則流結為癰或積毒熱氣不得宣行入於皮膚間或發頭面或發虛處無故身熱微覺憎寒或有痛楚處按之必熱乃癰癤欲發也其有火疸立名多端乃是古人強為之名大抵治法同一理也母患血熱兒在母胎中受之其血亦熱母患氣壅兒在母胎中受之其氣亦壅初生受母血熱壅氣聚在經絡臟腑之間積滯而不散久則成毒毒氣相交內不通利即從外消外無可消處其血與氣壅在一處則是生背膂或脊督脈腫形大如拳紅赤似血其兒遍體是一塊腐血又加生一腫塊壅毒卒未能消醫有何法善術之士俾勞以針灸及尉𤋲取次攻之十不得一外敷用朴硝天南星當歸身秋芙蓉葉黃蜀葵花乳香木鱉子無名異其癰已熟透即研白丁香少許津唾調敷緑豆大良久破潰膿血自迸出宜先與服托裡排膿消毒散血藥用生甘草瓜蔞根苦桔梗枳殼川當歸綿頭漏蘆錦紋大黃等分為細末服一錢匕煎熱為服以利為度克效萬一不可先慌亂意欲速消以惡毒草藥致難保小兒因五臟不和寒邪壅滯榮衛閉塞逆於膚肉遂生疽腫其狀腫結皮強上如牛領然疼焮堅硬深附筋骨既得膿後則其疽可愈更須用排膿換肌之藥若餘毒未去封斂或稍疾則源流復至或癢或痛肌汁不斷瘡竅不得合矣陳氏子四歲忽二月患核塊五六枚不赤不腫塊亦不疼痛大小如雞鴨子皮不突硬從肉內透起即召愚視之曰素問云榮不從逆於肉裡乃生癰腫此因疳疾成瘰癧惡核也寶鑑云惡核而肉裡頻生瘰癧而項邊暗長萬金丸大黃丸治無辜疳瘰癧惡核愚曰此子病不可醫通真子云核塊結實經久不破破則膿大潰經久不合者肉死不治且漫與藥和肌兼用外醫膏藥敷貼治月餘無效覺微軟內有自破者有開破者膿潰不止已經兩月瘡口不合或一日發熱與四順飲大黃丸並用涼肌藥鎮驚藥熱除尚有進退雖飲食如舊日漸黃瘦矣主人曰服藥多日何效遲遲愚曰藥非無效也病有終身不除者也藥非無驗也病有決不可救者也此子病決不治後七月間忽傷食吐數口神昏不省因驚而卒核塊之有惡者如此後之學者不可不知也方五香丸治小兒癰疽癤毒未破或膿未潰憎寒壯熱木香一分沉香銼蘇合香研各三分麝香研半分犀角鎊二兩大黃生銼一兩半吳藍葉二兩梔子仁二兩熟乾地黃二兩白芍藥一兩雞舌香二兩人參一兩去蘆頭白茯苓一兩上搗羅為末煉蜜和丸如梧桐子大每服二十丸煎黃耆湯食前服木香散治小兒熱毒疽腫及赤白諸丹毒腫或生瘰癧瘡癤身中風疹瘙癢木香一分熏陸香一分雞舌香一分黃芩一分麻黃一分去根節連翹半兩海藻半兩洗去鹹味射干半兩川升麻半兩枳實半兩麩炒微黃牛蒡半兩微炒川大黃二兩銼碎微炒上羅為散每服一錢水一小盞煎至五分去滓入竹瀝半合更煎三兩沸量兒大小不計時分減溫服五香湯治小兒一切癰疽腫毒瘡瘰癧癮疹火疸赤遊等疾連翹木香沉香熏陸香即乳香射干升麻獨活桑寄生通草麝香丁香各一兩大黃半兩上㕮咀三歲用一錢瀝煎汁去滓服藍葉湯治小兒疽瘡方見吳藍葉散五香連翹湯治小兒風熱毒腫腫色白或惡核瘰癧附骨癰疽節解不舉白丹走遍身中疹瘙不已治小兒大腸頭惡瘡熱癰用蜣螂白汁敷其上即安或燒為末醋和塗數過先以鹽水洗之妙犀角知母湯治小兒癰疽犀角鎊知母焙黃耆銼黃芩去黑心人參丹參葛根銼大黃銼炒甘草炙各一兩玄參三分麥門冬去心焙一兩半上粗搗篩每服一錢匕水半盞入生地黃汁半合同煎至四分去滓食後臨臥溫服量兒大小加減漏蘆湯治小兒熱毒癰疽赤白諸丹毒瘡癤漏蘆連翹肘後用白薇白蘞芒硝肘後用芍藥甘草各六銖大黃一兩升麻枳實一方不用麻黃黃芩各九銖聖惠方用赤芍二分上㕮咀以水一升半煎取五合兒生一日至七日取一合分三服八日至十五日取一合半分三服十六日至二十日取二合分三服二十日至三十日取三合分三服三十日至四十日取五合分三服肘後治大人各用二兩以水一斗煮取三升分三服其丹毒須針鑱去血經心録無黃芩有知母芍藥犀角各等分黃耆湯治小兒癰疽瘡癤腫毒黃耆連翹升麻惡實炒各半兩玄參丹參露蜂房枳殼去瓤麩炒甘草炙各一分上粗搗篩每服一錢匕水七分煎至四分去滓食後臨臥溫服量兒大小加減木通湯治小兒疽瘡木通銼升麻赤芍藥黃芩去黑心山梔子仁麥門冬去心焙各二兩大黃銼炒一兩枳殼去瓤炒半兩上粗搗篩每二錢匕水一盞入生地黃汁半盞煎至七分去滓分溫二服食後臨臥服量兒大小加減治小兒疽瘻丹砂大黃各三十銖雄黃䕡茹漆頭者各二十四枚礬石馬齒者十八銖雌黃二十四銖莽草十八銖黃連三十六銖上㕮咀以豬脂一升三合微火煎三上二下膏成去滓下諸石末攪凝敷之黃耆湯治小兒瘡腫癰疽黃耆銼葛根銼麥門冬焙去心黃芩去黑心犀角鎊升麻甘草炙各一兩木香半兩上搗篩每服一錢匕水七分煎至四分去滓食後服量兒大小加減黃耆湯治小兒疽腫及瘡癤身體壯熱口乾心躁黃耆銼半兩連翹半兩川升麻半兩玄參一分丹參一分露峰房一分微炙枳實半兩麩炒微黃去瓤甘草一分炙微赤銼上羅為散每服一錢水一小盞煎至五分去滓放溫量兒大小加減服之犀角散治小兒疽毒腫硬壯熱大渴犀角屑三分葛根銼半兩麥門冬去心焙一兩川升麻半兩木香半兩黃耆銼半兩黃芩半兩甘草半兩微炙赤銼上羅為散每服一錢水一小盞煎至五分去滓放溫服量兒大小加減服之雞舌散治小兒疽瘡雞舌香一兩木香一兩沉香一兩麻黃海藻洗去鹹味大黃炮各半兩上為搗羅粗散每服一錢水一大盞竹瀝三兩點煎至五分去滓溫服兼放冷溫熱淋泄患處清水膏治小兒疽腫毒堅硬疼痛攻衝四畔焮赤宜用抽熱毒消腫氣羊桃根銼一兩川大黃銼生用一兩黃芩半兩赤小豆半合黃蘗銼半兩緑豆粉半兩上羅為散用蕓薹菜搗取自然汁以蜜少許相調令稀稠得所著四畔腫赤處大小剪生絹上勻攤可厚一錢貼之干即換之天烏散貼方南星赤小豆草烏黃柏各等分上為末生薑自然汁調貼患處或用米醋調尤佳治發背癰疽羌活一兩為末麝香少許穿山甲醋炒焦半兩土龍骨煅存性半兩上件煎麻黃薄荷酒調如陰瘡頭向平者服之即突其功效不可具述若小兒痘瘡黑陷者只一服而起萬不失一龍角散治小兒癰疽腫癤一切等瘡或發頭面或發虛處無故身熱微覺憎寒或有疼處皆癰癤證也地龍去土一兩荊芥穗一兩甘草一兩角刺三兩杵去骨用皮濕稱上為末每服一錢酒水合半盞煎至三分去滓調入乳香末半錢加減服又方忍冬花甘草大黃各等分上為末依前法煎調乳香末服之黃連散治小兒疽已潰黃連半兩去須黃蘗銼半兩白芷半兩上搗為散每用雞子白調塗於故細布上貼之又方白芷半兩黃連半兩去須地榆銼半兩白蘞半兩上羅為散每用雞子白調塗於故細布上貼瘡日三四度換之密陀僧散治小兒疽腫穴後及惡瘡膿水雖軟肌肉不生密陀僧一兩黃連三分去須檳榔三分上羅為散用糝瘡上日三用之治小兒疽腫硬已成膿未成膿貼熁方鹿角屑燒灰二兩白蘞一兩粗理黃石三兩洗淨以酒淬九次上羅為散以醋調稀稠得所厚塗之干即更塗五七度即效松脂餅子治小兒疽瘡久不瘥松脂一兩熏陸香一兩上合研內少許鹽為餅子貼於瘡上汁出盡即瘥治小兒癰疽癤毒未破或膿未潰憎寒壯熱用干蝦蟆一個燒灰細研以豬脂和敷之又方用敗鼓皮不拘多少燒灰細研以豬脂和敷之備急神驗方治未結之初微有頭紅癗子起隱疼者急用不語唾夜半頻頻塗之即消散飲了酒不可用若已結成當用治小兒疽腫結硬已成膿貼熁方用蛇蛻皮貼之經宿自消又方用商陸爛搗敷之又方用芫花搗羅為末水和如膏塗之又方用蠐螬研塗之鰻鱺魚膽汁及血各用塗之並效癰瘡附論夫小兒六腑不和寒氣客於皮膚寒搏於血則壅遏不通稽留於經絡之間結腫而成癰其狀腫上皮薄而澤是也熱氣乘之熱勝於寒則肉血腐敗化為膿膿潰之後其瘡不瘥故曰癰瘡也方黃芩湯治小兒癰瘡煩熱疼痛黃芩去黑心梔子仁玄參升麻大黃銼炒黃耆銼連翹藍葉甘草芎藭木香犀角屑各半兩上粗搗篩每服一錢匕水半盞煎至三分去滓溫服量兒大小加減吳藍葉散治小兒心肺熱毒攻於諸處生癰瘡及項腋下有結核煩熱疼痛不得睡臥吳藍葉半兩黃芩一分大青一分犀角屑半兩玄參半兩川升麻半兩梔子仁半兩川大黃三分銼碎微炒黃耆銼半兩連翹子半兩甘草半兩上為散每服半錢水一小盞煎至五分去滓量兒大小不計時分溫服黃耆散治小兒癰瘡膿潰數日不止致體虛煩熱頭痛昏悶宜服黃耆銼半兩防風去蘆頭半兩川升麻半兩羚羊角屑半兩芎藭一分甘草半兩地骨皮半兩人參去蘆頭半兩白茯苓半兩石膏半兩上羅為散每服一錢水一小盞煎至五分去滓量兒大小不計時候分減溫服犀角散治小兒癰腫成瘡臟腑壅滯犀角屑半兩麥門冬去心焙三分玄參半兩赤芍藥半兩薺苨半兩葳蕤半兩川升麻半兩甘草一分紅雪半兩上為散每服一錢水一小盞煎至五分去滓入竹瀝半合更煎一兩沸服一方無紅雪入硝石末一字煎溶去滓溫服量兒大小加減麥門冬散治小兒癰瘡膿水出不盡心中煩悶不已麥門冬去心焙三分紫葛半兩黃耆半兩川升麻半兩犀角屑半兩甘草微炙赤銼半兩木通半兩上羅為散每服半錢水一小盞煎至五分去滓量兒大小不計時候溫服大黃散治小兒癰瘡臟腑壅熱心神煩躁大小便不利大黃銼炒升麻梔子仁朴硝別研枳殼去瓤麩炒黃耆銼各半兩上粗搗篩每服一錢匕水七分煎至四分去滓溫服量兒大小加減連翹散治小兒癰癤等瘡連翹一兩沉香半兩白蘞一分朴硝一分川大黃炮一兩甘草一兩上搗羅為細末每服一錢水一小盞炒麝香一分煎至五分食後溫服大麻仁丸大麻仁二兩木香半兩枳殼半兩麩炒微黃去瓤牛蒡子一兩微炒甘草炙微赤銼半兩川大黃銼一兩上羅為末煉蜜丸如緑豆大每以熱水下十丸取利為度更量兒大小加減服之黃蘗散治小兒一切癰腫毒諸風神驗黃蘗去粗皮蜜炙鬱金各一兩陳橘皮湯浸去白炒人參葛根銼各半兩上搗羅為末用溫水調下一錢匕量兒大小加減日三兩服大黃散治小兒癰瘡臟腑壅熱太過心神煩悶大小便不通川大黃半兩銼微炒川升麻半兩梔子仁一分川朴硝半兩葵子半兩上搗為散每服一錢水一小盞煎至五分去滓溫服以利為度量兒大小加減服之益母散治癰疽皆可用益母草燒灰二兩鹽花炒乾一兩伏龍肝半兩上研為細末每用一錢新汲水調稀稠得所旋取塗上瘡口消毒散治小兒癰瘡腫毒熱赤川大黃生銼三分杏仁湯浸去皮別研三分鹽花二分上羅為散入杏仁以新汲水和稀稠得所旋取塗瘡腫上干即易之以效為度益母草飲治小兒癰瘡腫痛用益母草不拘多少洗銼搗取汁每服二三分服之量兒大小加減以滓敷癰上干則易之又方用豬腦塗紙上貼之干即易日數遍又方用芥子爛研水和塗紙上貼之又方用馬齒莧搗敷之又方用地龍糞新汲水調塗之一方薄荷汁調塗之又方用豬膽塗白姜石末和蒜搗封上又方用馬鞭草搗敷之即消又方用蕓薹菜搗塗之又方用雞腸草搗爛敷之又方用伏龍肝末以好醋調作膏塗於故帛上貼之又方用地