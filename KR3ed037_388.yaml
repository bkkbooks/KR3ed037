body:
  text: 卷三百八十八嬰孩大小便淋祕門淋祕附論夫淋者有熱淋有血淋石淋氣淋寒淋五者大同小異熱淋者三焦熱氣傳膀胱飛仙論云熱氣傳於膀胱吃腎為熱淋也血淋者久熱積聚結澀脬中巢氏云熱甚入脬多成血淋也石淋者腎熱水結化為砂石孫氏云腎熱水結化為砂石巢氏云腎為熱所乘則石淋也其狀如莖中痛甚者令人悶絶故也氣淋者膀胱受冷小腹脹滿巢氏云腎虛膀胱受肺之熱氣氣在膀胱則脹肺主氣氣為熱所乘故流入膀胱氣壅不散腹氣滿水道不通利故小便結滯而成氣淋寒淋者取冷過度顫後尿巢氏云取冷過度下焦受之冷氣入脬不能禁約於水小便者水溢之餘膀胱者為津液之腑既受冷氣脬中衰弱不能禁約於水故遺尿成寒淋其狀先寒顫後尿是也皆由冷熱之氣客入腎與膀胱流滲脬中之所致也小腸乃心之腑也水竇流行隨其氣而利之心氣若壅小便不通心氣若冷小便多灑心氣若寒小便多旋心氣若熱小便艱澀心氣積熱小便赤白先赤而復白者是也所言閉小便者醫謂下結腹肚脹緊膨滿不通氣結熱盛用力努旋點滴而出乃是閉也不通利干心疼痛精神昏悸速即用生地龍數條蜜少許研敷莖卵仍燒蠶蛻紙灰留性用豬腦子麝香同研煎麥門冬燈心湯調下與服一時見效湯氏歌云五般淋瀝病相傳一一須分病本源或見叫啼傷水積或然餐食入脾間次更因循傳入臟致令淋病小便乾但看微紅筋上有熱入相和汗又連肚上青筋至腹足熱結石淋最難安唇上乾燥如皮退此是風淋定惡泉外腎不腫氣不急下陰刁腫氣相連先與寬膈疏導氣定知醫藥可安痊諸淋皆腎虛而膀胱生熱也水火不交心腎氣鬱遂使陰陽乖舛清濁相干蓄在下焦故膀胱裡急膏血砂石從水道出焉故有欲出不出淋瀝不斷之狀甚者窒塞其間或令人悶絶大凡小腸有氣則小便脹有血則小便澀有熱則小便痛痛者為血淋不痛者為尿血敗精結者為砂敗精散者為膏金石結者為石揣本尋源各從其類治法並用流行滯氣疏通小便清解邪熱調平心火蓋心清則小便自利心平則血不妄行切不可姑息用補氣得補而愈脹血得補而愈血熱得補而愈盛水道不行加之穀道閟遏關格不通未見其能生者也又有腎氣虛熱囊中受寒夾冷而小便淋澀者其證先寒戰而復溲便蓋冷氣與正氣交爭冷氣盛則寒戰而成淋正氣盛則寒戰解方得便尿也小兒諸淋者由腎虛而膀胱熱故也膀胱與腎為表裡俱主水入小腸下於胞行於陰為小便也腎氣通於陰津液下流之道也若乳食無節悲啼不恆虛實不調則腑臟不和致腎虛而膀胱熱也膀胱津液之腑熱則津液內溢水道不通水不止不下停積於胞腎虛則小便數膀胱熱則水下少數而且澀致淋瀝不宣故謂之淋又有熱淋血淋氣淋石淋寒淋三焦壅盛移熱於膀胱則溲便赤者為熱淋熱甚而搏於血脈流入胞中溺血者為血淋小腹滿溺澀有餘瀝者為氣淋溺出砂石者為石淋寒淋之病本於寒客下焦余皆本於膀胱有熱令少腹急痛水道不利故數起而不能出也方五淋散治五淋赤茯苓赤芍藥山梔子生甘草當歸黃芩車前子淡竹葉燈心木通滑石葵子葶藶炒各等分上末燈心蔥白煎或入生車前草擂水調五苓散服或調消石末服血淋白茅根燈心煎氣淋小腸脹滿尿後有餘瀝木通煎服熱淋便赤而淋瀝臍下痛新水調下或黃芩湯下石淋莖內痛尿澀有沙石令人悶絶消石隔紙炒焦研末用葵子煎湯下石葦散治諸淋瀝水道中痛臍下妨悶石葦去毛一兩冬葵子木通赤茯苓各半兩車前子瞿麥榆白皮滑石甘草各一分上為細末每服一錢水一盞蔥白五寸煎至七分去滓溫服如人行十里再服大小加減一方無甘草立效飲治小兒諸淋不通莖中疼痛木通甘草王不留行竹胡荽滑石海金沙山梔子檳榔各等分上㕮咀每服一錢水半盞煎三分去滓葵子散治諸淋兼小便不通葵子車前子木通瞿麥桑白皮炒赤茯苓山梔子仁甘草炙各等分上銼散每服一錢井水一小盞蔥白二寸煎食前服桑白皮湯治小兒淋或澀痛小便如血色桑根白皮銼焙乾山梔子仁蘆根銼茅根赤茯苓去黑皮冬葵子甘草炙各一分滑石研入半兩上粗搗篩五六歲兒每服一錢水一小盞煎至五分去滓食前日二量兒大小加減瞿麥丸治小兒淋及治遺尿瞿麥穗龍膽石葦去毛桂去粗皮皂莢炙去皮子各半兩雞腸草人參各一兩車前子一兩一分上搗羅為末煉蜜丸如梧桐子大每服六丸至十丸空心熱湯研下更量兒加減桃仁湯治小兒氣淋水道不通餘瀝疼痛茴香紫蘇檳榔各一兩木通當歸人參巴戟去心赤茯苓各三錢桃仁炒去皮半兩上㕮咀每服一錢水半盞煎三分去滓食前服牽牛子丸治小兒諸淋澀臍下連膀胱妨悶及大腸氣壅牽牛子微炒川大黃銼微炒川升麻郁李仁湯浸去皮微炒研入川朴硝以上各半兩滑石一兩細研海蛤一兩細研上搗羅為末煉蜜和丸如緑豆大每服以溫水研下七丸日三四服量兒大小加減順經散治十餘歲因驚之後心氣下行小便淋瀝日夕三四十次漸覺黃瘦宜服韭子炒琥珀別研益智去殼金毛狗脊去毛白茯苓去皮石燕子火煅醋淬研細各半兩石葦去毛一錢上為末每服一錢韭湯調日二服石燕丸治小兒諸淋腹妨悶心神煩熱石燕子研瞿麥穗梔子仁滑石研木通銼葵子海蛤研各半兩上搗研為末煉蜜丸如緑豆大每服七丸蔥白湯下日三量兒大小加減石葦湯治小兒淋或澀痛小便如血石葦去毛赤芍藥大黃銼炒滑石研甘草炙麥門冬去心焙升麻各一分上粗搗篩每服一錢水一小盞煎至五分去滓食前服日三量兒大小加減一方有川朴硝無滑石木通湯治小兒諸淋及熱結赤澀不通木通銼研桑根白皮銼焙滑石研芒硝葵子陳者各三分上粗搗篩每服一錢水一小盞煎至五分去滓溫服食前日三量兒大小加減一方蔥白湯下半錢石燕丹治小兒淋澀痛悶石燕醋淬燒赤放冷研細瞿麥滑石各半兩木通銼海蛤研各半兩上為細末煉蜜和丸如黍米大每服十粒以蔥白湯下食前大小加減金沙散治小兒小便淋瀝不通鬱金海金沙滑石甘草各等分上為末三歲一錢煎落帚母湯調下燈心木通湯亦得木通散一名葵石散治熱淋小便不通啼叫小腹痛悶亂者木通二錢滑石一錢牽牛子一錢炒葵子一錢上用燈心蔥白車前草同煎服一方無葵子不用車前草煎一方周歲小兒一服作一錢五歲以上倍之龍香丸治小兒寒淋因熱淋服冷藥太過小便不禁或取冷過度下焦受冷氣入脬不能禁止故遺尿龍骨煅牡蠣煅各一兩茴香炒白茯苓各半兩上為末糯米糊丸如小豆大三歲三十丸茴香湯一方加赤石脂半兩又方同前治及久患寒淋進退不定尿如脂膏遍數無度茴香炒一兩金液丹二兩糯米二兩炒龍骨半兩煅上為末糯米糊丸小豆大每服百丸鹽湯或溫酒送下車前子湯治諸淋澀心煩悶亂車前子石燕麥門冬去心焙各半兩上搗篩每服一錢水一小盞煎至五分去滓不計時候溫服葵子湯治小兒諸淋葵子三分陳者石葦去毛三分滑石別研兩半上粗搗篩五六歲兒每一錢水一盞棗二枚同煎取五分去滓分溫二服早晚食前各一量兒大小加減滑石散治小兒諸淋澀每尿之時啼叫不出滑石半兩甘草一分炙微赤銼川朴硝三分上搗細羅為散每服以蔥白湯調下半錢日三四服量兒大小加減玉漿散治小兒小便不通莖中淋痛心燥煩渴滑石一兩甘草二錢炙上為末三歲一錢燈心湯調下亂髮燒灰酒調最治小便不通二神散治諸淋急痛海金沙七錢半滑石五錢上末煎燈心木通麥門冬車前草入蜜調服榆白皮湯治小兒淋兼石淋及治水道中澀痛榆白皮銼焙瞿麥穗各一兩半上粗搗篩每一二歲兒每服一錢水一小盞煎至五分去滓分溫二服空心日晚各一服量兒大小加減麥蔥湯治小兒諸淋閉澀不通小麥一合蔥白兩莖切上以水一盞煎至五分去滓不計時候溫服量兒大小加減滑石散一名車前子散治小兒小便淋澀或尿血滑石研車前子各半兩上搗羅為散二三歲每服半錢空心粥飲調下近晚再服量兒大小加減蜂房散治小兒淋蜂房炙亂髮各三分上同燒灰研令細每服半錢米飲並水調下日三量兒大小加減一方無亂髮有桂小麥湯或酒調服治氣淋一名檳榔散赤芍藥一兩檳榔一斤麵裹上末同燈心同棗子煎湯調下治小兒諸淋澀心煩悶亂冬葵子一兩蘧麥半兩上搗為散每服一錢以水一小盞煎至六分不計時候量兒大小加減溫服治小兒諸淋水道中澀痛取臘月豬脂煉過去滓每服一栗殼大用暖酒一合研攪令勻空心午間各一服量兒大小加減服之治小兒淋及水道中澀痛用車前子一升水二升煮取一升分服一方為散每服一錢水一盞煎服大小加減溫服不計時候又方用煮冬葵子汁服之一方為散每服一錢煎服量大小加減服之不計時候治小兒淋疾用槲葉三片煎湯服一雞子小便即時下文仲療小兒淋兼石淋及血淋日夜淋瀝陰中疼痛取牡牛陰毛燒灰末以漿水服一刀圭日再服一方粥飲調下半錢大小加減服一作牯牛治熱淋用五苓散加辰砂煎燈心淡竹葉湯調下犀灰散治小兒心經虛熱小便澀痛筒管內疼不可忍者用蠶蛻紙不拘多少燒留性為末入麝每服半錢燈心湯調下備急車前草方治小兒腸有血熱淋痛用生車前草洗搗細井水調取清汁食前服阮氏方治熱淋取大田螺十五個以新水養候螺吐出泥澄去清水以底下泥膩粉調塗臍上尿即通便將螺放江中若殺之病不愈桃膠丸治小兒諸淋並小便出血陰莖中痛用膠一塊如棗大水半盞煎三分日進三服下石子如豆石盡止又方船下清苔煮汁治淋孫氏云尿在脬中為屈僻津液不通以生蔥葉尖內陰莖中深三寸用口吹令脬脹滓液大通便愈一法生薑切作槌子樣內陰莖孔中深三二寸便利又方琥珀為末燈心湯調下立效紅龍散治淋甚妙又方臍中著鹽炙之即通一法炒用鹽帛包尉小腹治諸淋及大便五六日不通心腹煩滿用海鹽不拘多少燒鹽尉小腹即通於臍中以手摩良久即通大人用之亦得一方青顆鹽地膚子湯治小兒熱毒入膀胱中忽患小便不通欲小便則澀痛不出出少如血須臾復出方見地膚子散治寒淋小便不禁或睡中遺出不覺方見楊氏雞腸散石葦散治熱淋石葦半兩洗海金沙三錢車前子三錢海蛤一錢瞿麥半錢上加木通石燕子同煎一方為末用燈心金銀湯下龍骨散治寒淋小便不禁或睡中遺出不覺雞腸草一兩牡蠣粉三錢龍骨半兩茯苓麥門冬半兩去心桑螵蛸半兩上㕮咀每服一錢水一小盞棗子同煎服治小兒淋閉取生魚摩臍及小腹溺即通石淋附論夫小兒石淋者為小便中出石也腎主於水水結則化為石故腎為熱所乘熱則成淋其狀小便莖中痛尿不能出時時小便痛引膀胱裡急甚者水道塞痛令悶絶也方葵子散出聖惠方治腎熱水結化為石淋甚者水道中澀痛不可忍冬葵子一兩石南榆白皮石葦去毛木通各半兩上為細末每服半錢以蔥白湯調下日二服量大小加減一方有滑石一兩滑石散出聖惠方治證同前滑石栝蔞根石葦去毛各一兩上羅為散每服半錢煎大麥飲清調下日二大小加減石葦散出活幼口議治小兒熱淋沙淋石淋石葦去毛海金沙木通滑石上為末水一小盞煎至半盞通口服治小兒石淋水通中澀痛出聖惠方石葦五分去毛滑石二兩子芩三分上細研為散每服以粥飲調下半錢日三四服量兒大小加減治小兒石淋澀痛心煩出聖惠方甘草一分炙赤銼雞糞白半兩微炒乾薑一分炮製銼上搗細羅為散每服