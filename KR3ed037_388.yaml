平愈第三方不曾用也治小兒卒不尿出本草用安鹽於臍中灸之祕結附論夫五味之精華清者以養臟腑五味之糟粕濁者皆歸大腸司出而不納也熱邪入里則胃有燥糞三焦伏熱則津液中干此大腸之夾熱也宿食留滯則腹脹痛悶胸痞欲嘔熱氣蕃灼則受風熱涸燥祕塞熱宜疏利三黃湯積宜挨積脾積丸胃中活法治之三黃丸三黃湯治熱祕凡小兒大人大小便不通內經所謂三焦約約者不行也可用流水煎八正散時時灌之大小便利則止若不因熱藥所攻而致此者易治或用多服熱藥而燥劇至此者非惟難治不幸夭枉亦可用蜜水調益元散送痛隔丸方握宣丸出濟生拔粹方治小兒大小便難嘔吐藥食不下命在頃刻巴豆一錢半硫黃良薑附子檳榔甘遂各半分上為末粟米飯和丸緑豆大用椒湯洗小兒男左女右手握之用綿裹定看次數多少置藥洗去不用即止治小兒大小便不通出經驗良方甘草木通梔子仁各等分上為粗末水一大盞燈心一莖連根蔥白七個煎半盞服郁李丸出錢氏方治襁褓小兒大便不通小便澀滯並驚熱痰實欲得溏動者郁李仁一兩川大黃一兩酒浸炒滑石半錢上另為末將郁李仁研為膏和末為丸如黍子大量兒大小與之以乳汁或薄荷湯下服食前甘枳湯甘草一錢枳殼煨一錢上以白水煎服膠蜜湯治虛祕用蔥白三莖入水煎去蔥入炒阿膠及生蜜溶化空心服獨棗湯用大棗一枚去核入輕粉半錢以棗相合縛定慢火煮熟食棗以棗湯下治小兒大小便不通出肘後方上蜂房燒末酒服二錢日二服一方炙微焦為散粥飲調下半錢大小加減服之治小兒大小便不通用搗白花胡葵子末煮汁服之治大小便不通掩臍法取連根蔥一莖去泥土生薑一塊淡豆豉二十一粒鹽一匙同研爛捏作餅烘熱掩臍中以帛扎定良久氣透自通不效再用一餅五和湯出宿州陳氏方調氣血疏通臟腑當歸半兩茯苓半兩去皮甘草半兩炙大黃七錢半枳殼去瓤麩炒七錢半上為㕮咀每服三錢水一盞煎至七分去滓稍熱不飢不飽服治小兒大小便不通妨悶方用白蜜一合以鐺中煎為丸內下部中即通小便不通嚼生蔥以綿裹少許內小便道中即通千金紫雙丸主小兒身熱頭痛食飲不消腹脹滿或小腹絞疼大小便不利或重下數起小兒無異疼唯飲食過度不知自止哺乳失節或驚悸寒熱唯此丸治之不瘥或可再服小兒欲下是其蒸候哺食減少氣自不快夜啼不眠是腹內不調悉宜用此丸不用它藥數用神驗巴豆去皮心熬蕤核仁各十八株搗麥門冬去心十株甘草五株炙甘遂一銖真珠二銖牡蠣煅蠟各八銖上為湯熟洗巴豆研以新布絞去油別搗甘遂甘草牡蠣麥門冬細篩畢搗巴豆蕤仁令極熟乃內諸藥散更搗三千杵如藥燥入少蜜足之半歲兒可服如荏子一雙一二歲兒服如半麻子作一雙三歲兒服如麻子一服收作一雙四歲兒服如麻子二丸五六歲兒服如麻子一丸七八歲兒服小豆大二丸九歲十歲兒微大於小豆二丸常以雞鳴時服之日出時不下者飲粥汁數合即下丸皆雙出也下甚者飲冷粥止之滑石湯出聖惠方治小兒大小便不通心腹滿悶坐臥不安滑石研川大黃銼冬葵子甘草各半兩炙上粗搗篩三四歲兒每服一錢水一盞入燈心七莖同煎至五分去滓溫服更隨兒大小加減一方入蔥白五寸通膈丸出濟生拔粹方大黃牽牛木通各等分上為細末滴水丸粟米大每服三五十丸量虛實大小加減大便不通附論夫水穀皆入於上焦至中焦而腐熟下焦而化出小兒腹臟挾熱三焦壅滯津液枯少不能傳導實熱之氣歸於大腸故大便燥澀而不通也方代赭丸治小兒大便不通代赭研丹砂研大黃銼炒各二兩木香當歸各一兩一分焙桂去皮一兩生犀角鎊三分巴豆炒熟去皮心搗一兩半上搗研為末煉蜜丸如小豆大每服一丸至二丸空心米飲化下六七歲三丸二百日兒半丸但得溏利為度大黃散出聖惠方治小兒臟腑壅熱心神煩悶燥大便不通川大黃一兩銼微炒犀角屑半兩川升麻半兩當歸一分赤芍藥一分紅雪一兩甘草一分炙微赤上粗羅為散每服一錢以水一小盞煎至六分去滓三四歲溫服一合量兒大小加減服之日三四服以利為度沒藥散出直指方治小兒風與滯血流蓄上焦胸膈高起大便不通並皆治之沒藥大黃枳殼炒北梗各二錢木香甘草各一錢炙上銼每一錢薑二片水煎服牛黃丸出聖惠方治小兒大便不通心中煩熱牛黃一分細研川大黃三分銼微炒為末上都研令勻煉蜜和丸如麻子大每服以粥飲下七丸以利為度量兒大小加減服之橘皮湯治小兒大便不通陳橘皮去白焙一分大黃銼炒半兩上粗搗篩三四歲兒每服一錢水一小盞煎至五分去滓溫服更量兒大小加減鱉甲丸治小兒大便不通不能飲食鱉甲醋炙去裙襴防葵訶黎勒煨用皮人參當歸銼炒郁李仁湯浸去皮尖炒別研入上等分搗為細散入郁李仁和勻煉蜜丸如緑豆大粥飲下五丸微利即瘥桃葉湯出聖惠方治小兒大便不通臍腹妨悶桃葉一握木通二兩燈心五根川朴硝一分蔥白七莖上細銼用漿醋水三大碗煎十餘沸去滓傾向盆中稍溫便坐兒在盆內將滓以手帕裹尉於臍下令兒即出之後吃地黃粥半盞良久便通犀角丸出聖惠方治小兒臟腑壅滯腹脅妨悶大便不通犀角屑半兩當歸半兩銼炒川大黃一兩銼炒巴豆十枚去心研紙上去油丹砂半兩研細水飛上為末入巴豆丹砂同研令勻煉蜜和丸如緑豆大三歲兒以溫水下三丸量兒大小加減大黃丸出聖惠方治小兒大便不通心腹壅悶大黃銼炒一兩一分枳殼去瓤麩炒梔子仁郁李仁炒去雙仁大麻仁研炙三分上搗研為末煉蜜丸如麻子大一二歲兒每服五丸熟水下空心午後各一服更隨兒大小加減一方無大麻仁蜜導法出全嬰方治小兒大便結熱不通用蜜不拘多少銅器中微火煎之稍凝如餳糖狀攪之勿令焦可丸捻作挺如指許長一寸以上當熟時急作令兩頭尖內穀道中以手急抱欲大便時去之橘皮湯出聖惠方治小兒大便不通及腹脅妨悶陳橘皮去白焙牽牛子炒甘草炙川大黃銼炒各一分上粗搗篩五六歲兒每服一錢水一小盞入蔥白一莖同煎至五分去滓溫服未通再服更量兒大小加減硃砂丹出聖惠方治小兒大便不通小便澀心神煩熱臥忽多驚腹脅妨悶硃砂半兩細研水飛過續隨子三分膩粉一錢上研令勻煉蜜和丸緑豆大三歲每服溫水下三丸量大小加減乳後食金花散出王氏方治小兒大腸祕不通兼血痢郁李仁一分炒檳榔一枚生甘草一錢上為末每服一字或半錢沙糖熟水調下治小兒大便不通出肘後方用豬苓一兩以水少許煮雞屎白一錢調服立瘥調中二黃丸治小兒大便不通口燥頰赤大黃一兩銼炒牛黃研甘草炙人參各一分上搗研為末煉蜜丸如小緑豆大每服二丸米飲化下日再服得利即止一方有甜消一錢為散新水調服通中丸出聖惠方治小兒大便不通心腹壅悶臥即煩喘川大黃一兩銼微炒巴豆霜三分皂莢一兩不蚛者去皮子燒令焦黑上大黃皂莢搗羅為末入巴豆霜同研令勻煉蜜和丸緑豆大四五歲以溫水下三丸量兒大小加減木香湯治小兒大便不通木香銼大黃銼炒陳橘皮去白焙各一兩上粗搗篩三四歲兒每服一錢水一小盞煎至五分去滓溫服更量兒大小加減丹參湯治小兒大便不通妨悶丹參滑石碎甘草炙各一分上粗搗篩五六歲兒每服二錢水一盞棗二枚同煎至七分去滓分溫二服更隨兒大小加減黃連丸治小兒風熱壅滯大便祕澀黃連去須大黃銼炒各一分巴豆三粒去心膜皮出油研上搗研為細末麵糊為丸如麻子大每服三丸至五丸臨睡柳枝湯調下芎黃散出聖惠方治臟有熱小便澀大便不通腹脅妨悶芎藭一兩川大黃三分炒郁李仁去皮炒三分上搗為散每服一錢以溫水調下大小加減走馬箭方出聖惠方治小兒大便不通連腰滿悶困重氣急羊膽一枚蜜一合鹽花半兩上同煎如餳捻如筋粗可長一寸內下部中須臾即通蜂房散出聖惠方治小兒卒大便不通用蜂房一枚炙令微焦細羅為散每服粥飲調下半錢量兒大小加減服之治小兒大便五六日不通心腹煩滿出聖惠方取青顆鹽末放臍中以手摩良久即通大人用之亦得大便血附論夫小兒大便血者為心主於血脈心臟有熱熱乘於血血性得熱流動妄行不依常度其血流滲於大腸者故令大便血出也方槐花散出聖惠方治小兒大便出血腹痛黃瘦不欲飲食槐花微炒熟地黃芎藭以上各半兩黃耆銼木香當歸銼微炒甘草炙微赤銼以上各一分上羅為散每服一錢水一小盞煎至六分去滓不計時候量兒大小加減服之卷柏丸出聖惠方治小兒大便出血久不止面色萎黃肌體羸瘦或時腹痛不欲飲食卷柏半兩赤石脂半兩阿膠半兩搗碎炒令黃焦槐花微炒黃牛角腮炙黃焦當歸銼微炒黃耆銼芎藭以上各一分上為末煉蜜和丸如麻子大三歲兒每服以粥飲下七丸日三服量兒大小加減羚羊角散出聖惠方治小兒大便出血體熱黃瘦不能飲食羚羊角黃耆銼川升麻黃芩地榆銼甘草炙微赤銼以上各一分生乾地黃半兩上羅為散每服一錢水一小盞入苦竹茹半分煎至六分去滓不計時候量兒大小加減溫服治小兒大便後出血方出聖惠方用鱉甲一枚塗醋炙令黃焦去裙襴細羅為散每服以粥飲調下半錢日三服量兒大小以意加減一方用鱉甲頭一枚又方出聖惠方燒車釭一枚全赤投於陰陽水中每服半合日三服看兒大小以意加減又方出聖惠方用甑帶燒灰細研每服用乳汁調下半錢量兒大小加減又方出聖惠方用鹿角燒灰細研以粥飲調下半錢日三服量兒大小加減箬葉散出全嬰方治小兒大便中有血或純下血用茶箬燒灰存性為末米湯調下食前五倍丸出全嬰方治小兒大便下血如腸風臟毒用五倍子焙乾為末煉蜜丸如小豆大三歲三十丸米湯空心下訶灰散出全嬰方治小兒因瘧大便中有血用訶子燒存性為末米湯調下食前三歲一錢一方橡斗子合白梅濕紙裹燒灰存性為末米湯調下食前三效散出全嬰方治小兒糞前後血下並腸風下血久不瘥糞前下血石榴皮為末煎茄枝湯下糞後下血五倍子為末煎艾湯調下糞夾血或腸風下血茄蒂燒灰存性為末米湯下上每服半錢大小加減與之食前五倍子為末米湯調下最治泄痢艾葉湯治吐血瀉血治小兒中蠱下血欲死用青藍汁頻頻服半合治小兒下血用雌雞翅下血服之治小兒若隨落有痢血壯熱不食乳哺者用大黃黃連蒲黃各二分芒硝一分半以水二升煮取一升去滓內芒硝分二服大小便利即愈犀角丸出湯氏寶書治小兒搖頭下血乃肝血液盛外有風熱乘之肝屬木木盛而脾土為木所克脾與肺是子母俱為肝所勝而血遂浸漬於大腸故便血不止犀角屑一分栝蔞根半兩蛇蛻皮炙赤色鉤藤鉤子麻黃去節各一分黃耆蜜炙羌活防風白芍藥各半兩甘草一分上為末棗肉丸食後薄荷湯下只二服作效頭搖即止便血愈多次間胃風湯服之日減一日鄭都承令嗣患七年搖頭三年下血已服百餘方前後服治搖頭者無非風藥止血者或作痢或作腸風百藥備嘗偶安撫王尚書挽留都下先君宰錢塘時與之有分一日招飲令其子勸酒因視其疾又扣其詳亦不能曉其標本酒罷退思遂處此方但損肝祛風益脾數服而愈十餘日後血止而下白膿自此斷根今數年矣保嬰槐花散出永類鈐方治熱便血荊芥穗槐花枳殼麩炒去瓤甘草各等分上為末蜜湯調服大便青附論夫小兒大便青者因驚風及脾氣不和大腸虛冷乳食不消全氣搏於糟粕故令大便青色也方訶黎勒丸出聖惠方治小兒內冷腹脅妨悶大便青色不欲乳食訶黎勒一兩煨用皮白朮半兩陳橘皮半兩湯浸去白瓤焙白茯苓一錢當歸一分銼微炙白芍藥半兩厚朴半兩去粗皮去薑汁炙令香熟甘草半兩炙微赤上羅為末煉蜜和丸如梧桐子大三歲兒每服以粥飲研下五丸日三服量兒大小加減木香丸出聖惠方治小兒胎寒腹痛大便青木香蓬莪朮白朮參去蘆頭當歸銼微炒以上各半兩麝香一分細研白芍藥一分上羅為末都研令勻煉蜜和丸如緑豆大三歲兒每服以溫粥飲下七丸日三服量兒大小加減芎藭丸出聖惠方治小兒胎寒腹痛大便青芎藭三分黃耆三分銼牛黃半兩細研蟅蟲微炒三分麝香一分細研當歸半兩銼炒白芍藥一分上羅為末研令勻煉蜜和丸如麻子大每服以粥飲下五丸日三服看兒大小加減陳橘皮丸出聖惠方治小兒內冷大便青不欲飲食皆是胎寒陳橘皮湯浸去白瓤焙當歸銼炒人參去蘆白芍藥各半兩芎藭以上各半兩甘草一分炙上羅為末煉蜜和丸如緑豆大三歲兒每服以溫粥飲含下七丸日三服量兒大小加減白朮丸出聖惠方治小兒大腸虛冷乳食不消大便青色白朮白芍藥木香當歸銼以上各一分炒麝香一錢研上羅為末煉蜜和丸如緑豆大每服粥飲研下五丸日三服量兒大小加減服之當歸丸出聖惠方治小兒大便青不欲飲食皆是胎寒當歸銼炒人參去蘆白芍藥芎藭以上各半兩甘草一分炙赤銼上羅為散煉蜜和丸如麻子大每服以乳汁下三丸日三服量兒大小加減
