body:
  text: 卷四百一嬰孩雜病門客忤附論少小所以有客忤病者是外人來氣息忤之一名中人是為客忤也雖是家人或別房異戶雖是乳母及父母或從外還衣服經履鬼神粗惡暴氣或牛馬之氣者皆為忤也執作喘息乳氣未定者皆為客忤其乳母遇醉及房勞喘後乳兒最劇能殺兒也不可不慎凡諸乘馬行得馬汗氣臭未盥洗易衣裝便向兒邊令兒中馬客忤兒卒見馬來及聞馬鳴驚及馬上衣物馬氣皆令小兒中馬客忤慎護之特重一歲兒也凡小兒衣布帛綿中不得有頭髮履中亦爾白衣青帶青衣白帶皆令中忤凡非常人及諸物從外來亦驚小兒致病欲防之法諸有從外來人及有異物入戶當將兒避之勿令見也若不避者燒牛屎令常有煙氣置戶前則善小兒中客為病者無時不有此病也而秋初一切小兒皆病者豈是一切小兒悉中客邪末小兒所以春冬少病秋夏多病者秋夏小兒陽氣在外血脈嫩弱秋初夏末晨夕時有暴冷小兒嫩弱其外則易傷暴冷折其陽陽結則壯熱胃冷則下痢是故夏末秋初小兒多壯熱而下痢也未必悉是中客及魃也慎不可先下之皆先殺毒後下之耳凡中客忤之為病類皆吐下青黃白色水穀解離腹痛夭糾面色變易其候似癇但眼不上插耳其脈急數者是也宜與龍膽湯下之加人參當歸各如龍膽稱分等多少也亦宜蘇合香丸真珠散小兒中客忤急視其口中懸雍左右當有青黑腫脈核如麻豆大或赤或白或青如此便宜用針速刺潰去之亦可爪摘決之並以綿纏叉頭拭去血也方蘇合香丸出湯氏寶書治傳尸鬼症客忤卒驚及治骨蒸殗殜肺痿氣卒心痛霍亂吐痢時氣鬼魅瘴瘧赤白暴痢瘀血月閉痃癖疔腫驚癇小兒吐乳大人狐貍等病蘇合香油一兩入安息香膏內白朮丁香青木香白檀香熏陸香別研沉香硃砂水飛烏犀屑安息香以上各二兩用無灰酒熬膏和蘇合油蓽茇二兩香附子二兩訶子二兩龍腦一兩麝香二兩上為末研勻用安息香膏並煉白蜜和劑每服旋丸如緑豆大空心井花水下四五丸老人小兒三丸溫酒化亦得並宜早朝服用蠟紙裹一丸如彈子大絳紗袋盛當心帶之能闢一切邪祟故治客忤中惡中鬼也又方研雄黃麝香煎降真香湯下真珠散出醫方集成治客忤驚風鬼注驚邪痰熱心舍不寧精神不定心常怔忡睡臥驚跳時或咬牙五心煩熱有汗煎啼面赤舌白呵發煩渴小便赤色或吐利黃沫常服闢驚邪順經安神舍真珠末二分海螵蛸滑石各一錢茯苓人參白附子各二分甘草炙半錢全蠍五分生珠一錢別研腦子半錢別入麝香半錢別入金銀箔金二片銀二片上為末每服半錢煎燈心麥門冬湯入蜜調下日午臨臥服之人參湯治小兒客忤腹滿痛大便不通人參龍腦鉤藤柴胡去苗黃芩去黑心桔梗炒赤芍藥茯神去木當歸切焙各半兩大黃銼炒二兩蜣螂去足炙二枚上粗搗篩每服一錢水一盞煎至五分去滓分溫二服量兒大小加減雄黃丸出聖惠方闢小兒諸般驚叫顫瘛瘲初養不便與乳母帶闢諸驚忤之氣雄黃一兩虎頭骨三分微炙麝香一分猢猻頭骨三分微炙白龍腦一分大蛇頭一枚微炒乳香一分降真香一兩末煎香一兩白膠香一兩鬼臼一兩去刺為細末上都研令細用熟棗肉和丸如彈子大初在兒前先燒一丸次用緑絹袋帶一丸於身上闢一切驚忤之氣麝香丸出聖惠方治小兒新生中客忤發熱乳哺不消及中風反踧口出舌並吐逆面青目戴上視腹滿或癇羸瘦及三歲不行麝香牛黃各半兩細研黃連一兩去須特生礬石半兩細研附子半兩炮裂去黑臍雄黃半兩細研丹砂半兩細研水飛過桂心半兩烏賊魚骨半兩巴豆三十枚去皮心別研如膏赤頭蜈蚣一枚炙焦上為末都研令勻煉蜜和丸如黍米大兒生一月至十月日服一丸四十日至百日服二丸一歲至三歲以上加減服之以乳汁下米飲亦得犀角散出危氏方治小兒客忤驚啼壯熱天麻犀角麥門冬鉤藤各一錢鐵粉半錢硃砂研一錢雄黃半錢麝香少許上為末每服半錢以金銀煎湯調下薄荷湯亦可仍以母衣覆兒身以厭之即愈白鮮皮湯出千金方治少小客魃挾實白鮮皮大黃甘草各一兩芍藥茯苓細辛桂心各十八銖上㕮咀以水二升煮取九合分三服犀角散出聖惠方治小兒客忤驚啼壯熱犀角鎊鉤藤丹砂研各一分牛黃研半分麝香研三大豆許麥門冬去心焙一分上為末每服半錢煎金銀湯調下不計時候安神丸出直指方治客忤驚啼客熱生犀末人參茯苓菖蒲硃砂雄黃各等分上為末研桃仁膏為丸如麻子大每服三丸紫蘇湯下麝香湯治小兒客忤卒痛及滿氣常腹痛半夏湯浸十次生薑汁炙黃耆各一兩甘草炙乾薑炮桂去粗皮各半兩上粗搗篩一二歲兒每一錢水七分煎至四分去滓內麝香少許分溫二服不拘時候更量兒大小加減安神犀角丸治小兒客忤驚邪鬼魅犀角鎊車前子白茯苓去黑皮人參各半兩雄黃研一兩上為末取柳白皮十兩桃仁十兩水二升煎一升去滓煎成膏和前藥丸如麻子大每服三丸桃柳枝湯下白石脂湯治小兒客忤吐利白石脂一兩蜀漆半兩牡蠣煅一兩附子炮裂去皮臍一兩上銼如麻豆一二歲兒每一錢水七分煎至四分去滓溫服分為二空心一午後一量兒大小加減伏龍肝膏出千金方治小兒卒中客忤驚啼大叫伏龍肝研二兩雞子去殼二枚地龍糞研一兩上研勻或干更入少許水調如膏先用桃柳湯浴兒後將藥塗兒五心及頂門上母衣髮乳出千金方治中客忤用燒母衣帶三寸併發合乳汁服之雄黃散出聖惠方治客忤腹痛危急雄黃一錢明乳香半錢生麝一字上為末每一字刺雞冠血調灌之一方無乳香還魂湯救卒死客忤死麻黃三兩去節杏仁去皮尖三十個甘草一兩炙上水八升煮取三升去滓分令咽之通治諸感忤韭根散治症同前韭根一杷烏梅二七個吳茱萸半升炒上水一斗煮之以病人櫛內中三沸櫛浮者生沉者死煮取三升去滓分飲之龍骨散治小兒中客忤體熱白龍骨一分牛黃半分細研葛根一分銼上為散每服以溫水調下半錢日三四服治小兒客忤病出千金方上用豉數合水拌令濕搗熟丸如雞子大以摩兒囟上手足心各五六遍畢以摩兒心及臍上下行轉摩之食頃破視其中當有細毛即擲丸道中痛即止三物燒發散出千金方治少小見人來卒不佳腹中作聲者上用向來者人囟上發十莖斷兒衣帶少許合燒灰細末和乳飲兒即便安愈又方用水二升煮萹蓄冬瓜各四兩取浴之牛黃乳出聖惠方治小兒客忤驚啼牛黃一字豬乳一栗殼許上相和漸漸滴兒口中一方竹瀝一字雀屎丸出聖惠方治小兒卒忤躽啼腹堅滿雀屎一兩一分當歸切焙半兩上為末煉蜜丸如麻子大五十日兒每服一丸以奶汁下空心午後服量兒大小加減桂參湯出十便良方治小兒中客忤吐青白沫及食飲皆出腹中痛桂去粗皮一兩人參一分上粗搗篩一二百日兒每半錢匕水半盞煎至二分去滓分溫三服兒大以意增之治卒客忤停尸不能言者上燒桔梗二兩為末米飲服仍吞麝香如大豆許佳治之立效治卒客忤停尸不能言者用細辛桂心等分內口中治小兒客忤中人吐下黃水上為水一斗煮錢十四枚以浴之又取水和粉及熟艾各為丸雞子大摩小兒五心良久擘之毛出差桂枝湯治小兒中客忤吐青白沫及飲食皆出腹中痛氣欲絶上用桂一味去粗皮一兩粗搗篩一二百日兒每半錢匕以水半盞煎至三分去滓分溫三服空心午後更量兒大小加減或濃煎去滓塗兒五心麝香飲治客忤口噤項強欲死上用麝香少許研細乳汁調塗口中仍以母衣覆其身即愈一方醋調服一方吞麝香大豆許立愈一物豬通浴湯治小兒中人忤躽啼面目青腹強者上猳豬通二升以熱湯灌之適寒溫浴之治少小中客忤強項欲死上取衣中白魚十枚為末以敷母乳頭上令兒飲之入咽立愈一方二枚著母手掩兒臍中兒吐下愈亦以摩兒頂及脊強處一方書中白魚亦可治少小犯客忤發作有時者用母月衣覆兒上良治小兒卒中忤上煎取驢前膊胛上旋毛大如彈子以乳汁煎之令毛消藥成著乳頭飲之下咽即愈又方取牛口沫敷乳頭飲之一方取牛鼻津服之治少小卒中客忤不知人者上取熱馬屎一丸絞取汁飲飲下咽便愈亦治中客忤而躽啼面青腹強者一方以馬通三升燒令煙絶以酒一斗煮三沸浴兒名馬通浴湯治小兒驚悸客忤上用蛇蛻皮煎汁治客忤者中惡之類也多於道間門外得之令人心腹絞痛脹滿氣衝心胸不即治亦殺人上用鉛丹一方寸匕蜜二合和服之口噤者折齒灌之一方用墨水和服一錢匕治小兒卒中客忤上用銅照子鼻燒令赤著少許酒中淬過少與兒服之即愈治小兒客忤蠱毒用烏雌雞糞炒服之治小兒驚癇客忤用家桑東行根研汁大驗治小兒客忤欲狼狽方抱兒於廁前取屎草燒灰為末水調服少許即愈伏龍肝方灶中黃土和醋搗丸如球子大摩兒頭及五心客忤夜啼灶心土蚯蚓屎上研水敷頭上五心伏龍肝散治客忤驚啼不止伏龍肝硃砂山藥麝香上為末薄荷湯調服或煉蜜丸如緑豆大燈心湯下睡驚丸治小兒客忤驚熱夜啼煩躁搐搦口噤上視或冷或熱痰涎壅盛青黛硼砂腦子麝香山藥茯苓甘草金箔上為末煉蜜為丸如皂角子大硃砂為衣薄荷湯臨眠化下治客忤驚啼不止出傅氏活嬰方柏子仁白茯苓甘草各等分上為末每服一錢麝香湯調下龍齒散出傅氏活嬰方治客忤夜啼驚悸石膏人參龍齒硃砂麝香甘草各等分上為末每服一字金銀薄荷湯點服當歸飲出傅氏活嬰方治客忤腹內有惡血夜啼如鬼祟腹痛唇青口紫當歸赤芍藥白朮甘草桂皮各等分上為末每服一字初生兒腹有惡血而成血病服之效治客忤躽啼晝夜不止驚悸少臥出傅氏方川芎當歸各等分上為末乳汁調下治客忤狂啼腹痛出傅氏活嬰方硃砂麝香雄黃上研勻塗乳上令吮之治小兒客忤驚啼叫方灶中黃土二兩研雞子一枚去皮上件藥相和入少許水調先以桃柳湯浴而後將此藥塗五心及頂門上治小兒客忤吐奶不乳頭面青黃色脈結急浴法出聖惠方青銅錢一百二十文上水一斗煮取五升適寒溫以浴兒立效治小兒客忤壯熱浴方出聖惠方白芷根苗苦參上件藥等分粗搗為散用清漿水煎入鹽少許以浴了用粉摩佳治小兒客忤消食及冷氣本草方以鐵屑煎汁服之治小兒客忤以熊骨煮湯浴之又方用墨搗篩和水溫服之又方出本草以殭蠶七枚為末用酒調下量服之中馬毒附論凡人乘馬到人家身有馬汗不暇湯浴則須換衣服不暇換衣服則須食頃間歇定方得親近小兒若不如此則小兒中馬毒客忤或初卸馬馬氣未歇將鞍轡等物逼近小兒聞馬嘶便驚皆因中馬毒客忤其肚腹痛吐下青黃白色水穀解離甚者致大患也方治小兒中馬毒汗氣臭忤馬嘶驚忤宜服此方出聖惠方上取馬尾於小兒前燒令小兒咽氣及每日燒之瘥為度又方取馬口角沫塗兒口中效卒死附論夫小兒卒死者是三虛而遇賊風故無病倉卒而死也三虛者乘年之衰一也逢月之空二也失時之和三也有人因此三虛復為賊風所傷使陰氣偏竭於內陽氣阻隔於外而氣壅閉陰陽不通故暴絶如死若臟腑未竭良久而蘇亦有兼挾鬼神氣者皆有頃邪退乃生宜以藥療之也方治小兒卒死方出聖惠方上取女青末半錢用牛乳汁調服之又方同前取牛糞絞汁內少許口中瘥又方同前上燒獖豬糞水解取汁服又方同前上以苦參醋煮汁取少許口中即蘇水煮亦得又方出聖惠方用爛棺木板酒煮取汁服少許效又方同前上煎鹽湯令極咸以物開口灌之令入腹即活又方同前上以熱湯和灰厚擁身上逡巡即蘇破棺散一名半夏丸朱氏驗方治魘死縊死溺死卒死惡死五絶心頭暖者宜服此方用生半夏末量大小或一字或半錢吹鼻中一方以水調塞鼻中一方用皂角末吹鼻中並瘥一方用雄黃末桃枝湯灌之愈治小兒卒死而吐利不知是何病者出肘後方用馬屎一丸絞取汁以吞之無濕者水煮取汁救小兒卒死而吐利不知是何病也出金匱方用狗屎一丸絞取汁以灌之無濕者水煮乾者取汁一方狗齒燒灰服之治氣閉不通死絶方但尸厥脈動者可治用菖蒲屑內鼻兩孔中吹之又以糝著舌下又剔取左角發方寸燒末酒和入喉立愈卒腹皮青黑附論夫小兒因汗腠理則開而為風冷所乘冷搏於血隨肌肉虛處停之則血氣沉澀不能榮其皮膚而風冷客於腹皮故青黑也方七氣湯出危氏方治挾冷作痛面色或白或青四肢冷甚青皮陳皮桔梗蓬莪朮煨辣桂藿香益智仁各一兩香附子一兩半半夏湯洗三分甘草炙三分上銼散每服三錢水一盞姜三片棗一枚煎服不拘時候治小兒卒然腹皮青黑若不急治須臾即死出聖惠方上用酒和胡粉塗其腹干再塗又灸臍上下左右去臍各半寸並尻尾骨下一寸凡五處各灸三壯治小兒卒腹皮青黑赤不能喘息及吐利卒死出聖惠方上用女青末內口中酒服之亦治大人又方出聖惠方以苦參一兩搗羅為散不計時以醋湯調下半錢更量兒大小加減又方出聖惠方取爛棺木半兩以醋一中盞煎至六分去滓溫服半合量兒大小以意加減又方出聖惠方上取荊芥搗入少水絞取汁暖服半合量兒大小以意加減五硬五軟附論湯氏五硬五軟集歌云仰頭取氣動搖難氣壅疼連胸膈間手腳心如冰樣冷硬頭直頸未能彎肚大青筋急不寬急亦作硬冷風積氣病難安面青心腹還多硬此時性命已自拚五疳喜笑無常度看人不轉睛眼乾啼少淚此候實堪驚此乃肝疳也搭口搖頭熱呼漿上膈干脾間津液竭多睡不能安此脾臟疳也大腸乾熱結啞啼汗似珠便時多泄氣性命在須臾此肺疳極候腎疳因熱極瘡痍發不安便時乾澀痛體熱四肢寒此腎疳也瘦瘁更喉干多啼睡不安皮膚無色澤骨立不堪看此心疳也五軟天柱骨倒軟無故如何不舉頭都緣項頸軟難收腎疳熱病今雖減難保他年發不休懷抱何緣腳手垂四肢無力懶抬眉若得聲圓還受食脾里風寒漸可醫吃食如何不長肌皮寬肉少痛支離莫教瀉痢當時作靈藥難醫命自危五歲孩兒不解行腳虛軟弱痛難名若將榮衛多培植長大應教肉自生參耆等藥可榮氣亦可服錢氏地黃丸唏噓舌出卻無妨陽盛陰虛著意防此證不須先治膈唇青氣喘命須傷雖然天柱倒難醫此證元來不在脾患後也須曾吐瀉本非久病與尩羸亦有傷寒無汗脈應須妙藥辨幾微無事卒然成此疾人形本瘦四肢肥項軟還知頭似石面紅唇赤臉如緋此病只因肝膽熱致令筋軟不相隨肝受熱風天柱倒祛風退熱速為之項軟更貼強筋藥立見安和請勿疑全兒方云高伸承務女三歲七月間泄瀉一醫治之月餘不效其證大渴不止羸瘦不食手足漸冷召愚視之日氣已將脫急以朮附膏四服手足微溫但一時辰內可三十餘次飲水與魚涎散一服立止再朮附膏二服並麝沉膏沒石膏六甲丸參朮散等服五日減半愚曰此病虛中有積當以黃土丸瀉三五行再煎藥補之主人曰首因瀉今方漸退何再瀉也答曰譬之不去稂莠則禾稼不實不去奸猾則良民不寧主人曰何治也答曰補不足瀉有餘也補者補其久瀉脾虛不足之氣瀉者瀉其久滯腸中有餘之積主人曰此理出何書答曰素問云實瀉虛補此所謂順天之道損有餘補不足蓋醫合陽陰藥合天道主人聽用黃土丸瀉三五行再煎藥相間進五日病除八分一日忽天柱骨倒主人甚驚愚曰無慮瀉久則傷脾脾引於肝風肝受賊風故頭垂而頸筋軟也所幸者瀉已退遂用金靈散一服生筋散貼項一日如舊後更前藥二服安全無恙方小鹿茸丸出醫方集成治胎中受熱遍身筋軟鹿茸川牛膝蓯蓉木瓜杜仲菟絲子當歸熟地黃天麻青鹽各等分上為末用蜜丸鹽湯溫酒化下皆可羚羊角散出醫方大成治面紅唇白腸熱項軟熟地黃酒浸白茯苓羚羊角酸棗仁炒虎脛骨酒炙肉桂防風甘草各等分上為末溫酒鹽湯化下皆可貼項方出醫方大成治肝膽停熱致令筋軟用此藥貼項附子生去皮膚南星上末生薑自然汁調攤貼患處次服防風丸並瀉青丸五加皮散出仁存方治小兒頸軟用五加皮為末酒浸調塗敷骨上健骨散出仁存方治小兒久病疳疾體虛不實飲食不進及諸病後天柱骨倒醫者不識謂之五軟用白殭蠶為末三歲兒半錢薄荷酒調下後用生筋散貼上生筋散出危氏方治如前木鱉子六個去殼萆麻子六十個去殼上研細先抱起顱摩項上令熱津唾調貼之二方全愈天柱丸出仁存方治風氣頸垂軟頭不得正或去前或去後蛇含石大一塊煅七次用醋淬七次川鬱金末少許上碾細又入鉢內研極細和前藥末入少許麝香和勻用雪白大米飯丸如龍眼大每服一丸荊芥湯化下或又入生薑汁一二滴或用金銀薄荷湯早辰不拘時下風熱項軟合用涼肝丸手拳不展附論夫小兒手拳者由在胞之時其母臟腑氣虛為風冷所乘兒生之後肝氣不足致筋脈攣縮不得伸展故令拳不展也方薏苡仁散出聖惠方治小兒手拳不展是肝氣不足內傷風邪薏苡仁三分當歸一分銼微炒秦艽半兩去苗防風半兩去蘆桂心一分甘草半兩炙微赤銼酸棗仁半兩微炒上為散每服一錢水一小盞煎至五分去滓量兒大小分減不計時羚羊角散出聖惠方治小兒手不展是風邪滯氣所客令榮衛不通羚羊角屑羌活五加皮白鮮皮桂心以上各一分麻黃半兩去根節甘草半分炙微銼上為散每服一錢水一鍾煎至八分去滓量兒大小加減不時溫服又方麻黃半兩去根節桂心赤芍藥羌活細辛甘草炙微赤銼以上各一分上為散每服一錢水一鍾煎至五分去滓不計時候量大小加減分增溫服薏苡丹出古方妙選治手拳不展所受肝氣怯弱致兩脈攣縮或伸展無力薏苡仁一兩湯浸去皮細研當歸一兩洗焙乾秦艽一兩去苗防風一兩酸棗仁一兩羌活一兩上件搗羅為細末煉蜜和如雞實大每服一粒至二粒麝香荊芥湯化下不拘時候腳拳不展附論夫小兒腳拳由在胞之時其母臟腑內有冷積為風邪所乘兒生之後腎氣不足氣血未榮故令腳指拳縮不展也方當歸散治小兒腳不展趾拳縮當歸銼微炒麻黃去根節各半兩羌活酸棗仁炒人參去蘆頭杜仲去粗皮微赤銼桂心以上各一分上為散每服一錢水一小盞入生薑少許煎至五分去滓量兒大小乳食前分減服山茱萸散治小兒腳拳不展筋急干細山茱萸羌活薏苡仁桂心羚羊角屑當歸銼微炒甘草炙微赤銼黑豆炒熱白茯苓防風去蘆頭以上各一分生乾地黃半兩麻黃半兩去根節上為散每服一錢水一盞煎至五分去滓於乳食前量兒大小分減溫服生乾地黃丸治小兒腳趾拳縮生乾地黃半兩郁李仁半兩湯浸去皮尖微炒牛膝去苗防風去蘆頭桂心海桐皮羌活白茯苓薏苡仁以上分各一分上為末煉蜜丸如緑豆大每於乳食前以溫酒下七丸量兒大小加減行遲附論凡兒生周歲三百六十日膝骨成乃能行近世小兒多因父母氣血虛弱故令胎氣不強筋脈無力不能行步又有所受肝氣怯弱致筋脈攣縮兩手伸展無力又緣稟受腎氣不足者血氣未榮腳趾拳縮無力不能伸展此皆不能依常期以致此疾治法當用錢氏補腎地黃丸再加鹿茸五加皮麝香髓生而骨強自然行矣外甥黃知録之子還增三歲不行遂據此方服之有驗方羚羊角丸治小兒五六歲不能行者骨氣虛筋脈弱宜服益肝腎二臟羚羊角屑白茯苓虎脛骨醋塗炙黃酸棗仁炒生乾地黃各半兩黃耆桂心防風去蘆頭當歸炒各一錢上藥搗羅為末煉蜜為丸如緑豆大食前以溫酒碾破五丸服之漸漸即行也五加皮散治小兒三歲不能行者由受氣不足體力虛怯腰脊腳膝筋骨軟故不能行用五加皮為末粥引調下用酒少許調每服一錢日進三次麝茸丹治數歲不能行者曾經大效麝香別研鹿茸酥炙黃生乾地黃當歸洗焙黃耆銼虎脛骨塗酥炙黃上為末用羊骨髓四兩煮爛和成膏如黍米大每服十粒磨沉香下食前日三服虎骨丸治小兒五六歲不能行者骨氣虛筋脈弱宜服益肝腎二臟虎脛骨酒炙赤生乾地黃酸棗仁酒浸去皮炒香白茯苓辣桂防風當歸川芎牛膝各等分上為末煉蜜和丸麻子大每服五丸酒吞下或木瓜湯下夫骨者髓之所養小兒血氣不充則髓不滿骨故軟弱不能行抑亦肝腎俱虛得之肝主筋筋弱而不能束之一方有黃耆無牛膝海桐皮散治稟受腎氣不足血氣未榮腳趾拳縮無力不能伸展海桐皮牡丹皮當歸焙熟地黃牛膝各一兩湯浸焙山茱萸補骨脂各等分上為末每服一錢水八分入蔥白二寸煎食前服生乾地黃丸治小兒十歲以來血脈不流筋脈緩弱腳膝無力不得行步生乾地黃當歸銼微炒防風去蘆頭酸棗仁微炒赤茯苓黃耆銼芎藭羚羊角屑羌活甘草炙微赤銼桂心以上各半兩上為末煉蜜丸如緑豆大食前以溫酒下十丸更量兒大小加減服之五加皮散出直指方治十二歲不能行者真五加皮一分牛膝酸木瓜干各等分上為末每服一錢半粥飲調次入好酒兩點再調食前服二劑八味丸出如宜方治稟氣虛骨弱七八歲不能行立牡丹皮茯苓澤瀉各三兩山茱萸山藥各四兩附子制桂各二兩熟地黃八兩上為末蜜丸梧桐大每服十二三丸至二十五丸溫酒空心日二服服一料自愈功在澤瀉耳治小兒數歲不能行方出千金方用葬家未開戶時盜食以哺之日三便行起鶴節附論夫小兒鶴節者由稟賦不足血氣不榮肌肉瘦瘠則骨節皆露如鶴之足皆腎虛不生骨髓之故夫腎者精神之所舍原氣之所繫若其氣強則骨髓滿溢肌體盛充若氣不足者臟腑勞傷真氣不守邪氣所侵腎氣虛弱骨髓枯竭而不榮故令骨痿而羸瘦也治法當用補腎宜服錢氏地黃丸本方加鹿茸酥炙川牛膝各三錢修合餌服一周三歲以下與十丸三歲以上與十五丸方錢氏地黃丸出錢氏方治小兒鶴節數歲不能行及治頭囟不合體瘦骨露皆由稟受血氣不足則髓不滿骨故軟弱腎虛故以此藥補之疾自愈熟乾地黃八錢山茱萸乾山藥各四錢澤瀉二錢牡丹皮白茯苓各三錢加鹿茸炙牛膝各四錢上為末煉蜜丸如麻子大空心溫水送下三歲以下十丸以上倍之龜背龜胸附論夫嬰兒生後一百八十日始骼骨成方能獨坐若強令兒坐之太早即客風寒吹著兒背及脊至骨敷入於髓使背高如龜之狀乃曰龜背又乳母乳兒常捏其宿乳夏常洗乳捏去熱乳若兒感餘熱即傷肺氣胸膈脹滿令兒胸高如龜乃名龜胸又稟受血氣不足不能榮於發故頭髮不生呼為疳病非也及稟受腎氣不足者則髓不強骨不堅蓋骨之所絡而為髓髓不足不能充於齒故不生且心之聲為言若兒稍長合語而遲語由妊娠時母因有驚怖內動於兒臟邪氣乘於心使心氣不足舌本無力故語遲也方松蕊丹出危氏方治龜胸龜背嬰兒生下不能護背客風吹脊入於骨髓致之又或坐太早亦致傴僂背高如龜多成痼疾凡兒生至周歲三百六十日膝骨成始能行近世小兒多因父母氣血虛弱故令胎氣軟弱筋脈攣縮兩手伸展無力又緣稟受腎氣不足者氣血未榮腳趾拳縮無力不能伸展此皆不依常期並集經用得效方治之松花焙枳殼炒防風去蘆獨活各一兩麻黃去根川大黃炮前胡桂心各半兩上為末蜜丸黍米大每服十粒粥飲下量兒加減百合丹出聖惠方治龜胸龜背胸高脹滿其狀如龜此肺經受熱所致也乳母酒面無度或夏月熱煩熱乳與兒得之或乳母多食五辛而亦成此疾川大黃三分焙天門冬去心焙杏仁去皮尖炒百合木通桑白皮炒甜葶藶紙上炒爛石膏各半兩上為末煉蜜丸如緑豆大每服五丸食後臨臥熟水化下一方有朴硝無爛石膏名大黃丸三歲以上化二丸又方出聖惠方甜葶藶隔紙炒令紫色杏仁湯浸去皮尖雙仁麩炒微黃麻黃去節根川大黃銼微炒以上各半兩桂心一分上羅為末煉蜜丸如緑豆大不拘時以溫水研下五丸量兒大小臨時加減麻黃丸治小兒龜胸麻黃三分去根節桂心獨活防風去蘆頭赤芍藥川大黃銼微炒枳殼麩炒微黃去瓤松花以上各半兩上羅為末煉蜜丸如緑豆大每服以粥飲下五丸日三服量兒大小加減又方檳榔半兩川大黃半兩銼微炒桂心前胡防風赤芍藥獨活訶黎勒皮枳殼炒微黃去瓤麻黃去根節以上各一兩上羅為末煉蜜丸如麻子大每服以粥飲下五丸日三服量兒大小加減治小兒龜背上龜尿摩背上點背上骨節瘥取龜尿之法放龜於荷葉上候龜頭四顧急用鏡子照之其尿自出百合丹治龜胸病百合一兩川朴屑半兩杏仁半兩湯浸去皮尖桑根白皮半兩木通半兩天門冬半兩去心川大黃半兩上件搗羅為細末煉蜜和丸如黍米大每服十粒米飲下量兒大小加減龜背散大黃三分炒天門冬去心焙百合杏仁去皮尖炒木通桑白皮蜜炙甜葶藶隔紙炒朴硝制枳殼各等分上為末蜜丸食後溫湯化下誤吞諸物附論夫小兒多以珠璣叉鐶之類為玩弄之具或藏於口中因驚或啼遂誤吞咽倉卒不得出為害亦大當隨物所宜以方術治之方治誤吞錢在喉中不下用麩炭研為末以指彈少許入喉中少頃自吐出治誤吞針用磁石一塊小彈子大吸鐵緊者入口內吸令針出或絲系定送咽喉引出或如棗核大磨令光鑽作孔絲穿令含亦得治誤吞鉤繩凡吞鉤繩猶在手者莫伸引但以珠璫若穿了薏苡子之類就其繩穿稍稍推去至鉤畔即急推前入才鉤離刺處復緩緩引出治誤吞珠璫方燒銅弩牙令赤淬水一碗旋飲其物即出治誤吞銀鐶及叉方以飴糖隨兒大小多少食之若能多飲食叉鐶即隨出治誤吞金銀或錢在腹內不下孫用和方石灰一杏核大硫黃一皂角子大用研為末酒調下不計時候服治誤吞發用木梳燒灰細研粥飲調下半錢匕不下再服治誤吞梅李核以溫水旋從小兒頭淋下卻接其水與兒飲之治誤吞銅鐵在咽喉內不下用南燭根燒灰細研熟水調下一盞服之又方用艾蒿一把銼以水五升煮取一升半服之即下又方取貘齒骨燒灰細研如粉每服以磨刀水調下一錢治誤吞鐶若指彄方取鵝毛半兩燒灰細研如粉以粥飲調半錢服之未效再服治誤吞鉤繩方取常思草頭一把以水一大盞搗絞取汁分三四遍飲之效又方若是桃枝竹叉鯁但無數多食白糖即自消治誤吞鉤方以琥珀珠穿貫著鉤繩上推令前入至鉤所又復推以牽引出療小兒桃李鯁用狗頭煮湯摩頭上瘥治誤吞錢入腹用羊脛骨燒成灰碾為末每服二錢用溫水調下或米飲下泥薺取汁呷之自化又方出海上名方用蛀栗子燒灰存性為末每服半錢米飲調下治小兒誤吞銅錢等物不出出聖惠方煮葵菜多食之即下如神一方用冬葵子根煮汁飲之即出治誤吞銅鐵物出經驗良方細研硬炭為末飯飲調下於大便內瀉下如烏梅狀方用炭燒通紅急搗為末米飲調下亦治誤吞針釘等物連數服乃驗又方經驗良方用荸薺不拘多少研爛水咽吃即下非時收下干為末冷水調灌治骨鯁方楊氏寶書用筒子極硬白炭碾為末濃米飲調下無效再吃神驗治小兒大人一切骨鯁或竹木簽刺喉中不下出肘後方於臘月中取鱖魚膽懸北檐下令乾每有魚鯁取一皂角子許以酒煎化溫服若得吐其骨即隨頑涎出若未吐更飲溫酒但以吐為度酒隨量飲之若不便出再煎一塊無有不出者若鯁在臟腑中日久黃瘦甚者服之皆出於倉猝不得鱖魚或蠡魚鯇魚鯽魚俱可皆以臘月收之為佳治小兒誤為諸骨及魚骨刺入肉不出者同前煮白梅肉爛研後調象牙末厚敷骨刺處自軟一方無象牙末用沙糖含下須臾自下誤吞錢出傳信適用方濃煎艾湯一二盞又餳頓服半斤通氣散出古方妙選治誤吞銅錢鐵物及鉤繩之類在咽喉不下鵝毛一錢燒灰磁石一皂角子大燒灰象牙末一錢燒存性上件搗細末每服半錢新汲水調下食治諸病附論夫生民之道莫不自小至大若無其小卒不成大故易曰積小成高大也凡小兒之病狀證甚多造次之間遍載不盡其諸藥方備在諸經今聊舉食治單方以救倉卒之要耳方四味粱米湯治小兒泄注粱米稻米黍米各三合蠟如半彈子大上以東流水二升煮粱米三沸絞去滓以汁煮稻米三沸絞去滓用汁煮黍米三沸絞去滓置蠟於汁中候消每服半合空心午後各一隨兒大小增減牡丹粥方治小兒癖瘕病牡丹葉漏蘆去蘆頭決明各一兩半雄豬肝去筋膜切研二兩上水三升煎牡丹葉等三味去滓取一升半入豬肝及純粳米二合煮如常粥空腹食之隨兒大小加減人參粥方出聖惠方治小兒冷傷脾胃嘔逆及痢驚癇人參半兩去蘆頭白茯苓三分粟米半合麥門冬一兩去心上細銼每服半兩以水一大盞煎諸藥至七分去滓下米作粥食之雞子餅治小兒秋夏中暴冷忽下痢腹脹乍寒乍熱渴食之雞子二枚去殼胡粉半兩炒令黃黃蠟一棗大上先下蠟於銚內微火上熔次下雞子黃及胡粉調和候冷作餅與兒空心午後食之量大小加減淡竹葉粥方出聖惠方治小兒心臟風熱精神恍惚淡竹葉一握粳米一合茵陳半兩上水二大盞煎二味取汁一盞去滓後投米作粥食之郁李仁粥方出聖惠方治小兒水氣腹肚虛脹頭面浮腫小便不利郁李仁一兩湯浸去皮尖微炒桑根白皮一兩銼粟米一合上搗碎每服半兩以水一大盞煎至七分去滓下米作粥入少生薑汁任意食之黍米粥方出聖惠方治小兒下痢日夜數十行漸至困弱黍米一合雞子一枚黃蠟半兩上煮粥臨熟下雞子蠟攪令勻空腹食之馬齒菜汁粥方出聖惠方治小兒血痢不瘥馬齒菜汁一合蜜半合粟米一合上以水一大盞煮作粥後入二味和調食前服之萹豆粥方治小兒霍亂母食萹豆莖切焙一升人參二兩上以水三升先煮萹豆莖令熟下人參煎至二升去滓取汁煮粟三合為粥與乳母食臨乳兒時先挼去少許冷乳汁然後乳兒母常食此粥常服為佳牛乳飲治小兒噦吐牛乳一合生薑汁半合上於銀器中慢火同煎至六七分沸一歲兒飲半合仍量兒大小以意加減牛蒡粥方出聖惠方治小兒心臟積熱煩躁恍惚牛蒡根汁一合粳米一合上以水一大盞煮粥臨熟投牛蒡汁攪勻空腹溫溫食之雞子粥方出聖惠方治小兒下痢不止瘦弱雞子一枚糯米一合上煮粥臨熟破雞子相和梨湯粥方出聖惠方治小兒心臟風熱昏憒躁悶不能下食梨三枚切粳米一合上以水二升煮梨取汁一盞去滓投米煮粥食之葛根粥方出聖惠方治小兒風熱嘔吐頭痛驚啼葛根一兩銼粳米一合上以水三盞煎至一盞去滓下米作粥入生薑蜜各少許食之蘆根粥方出聖惠方治小兒嘔吐心煩熱渴生蘆根二兩銼粟米一合上以水二大盞煎至一盞去滓投米作粥入生薑蜜汁少許食之漿水蔥白粥方出聖惠方治小兒小便不通肚痛粟米二合蔥白三七莖去須細切上以漿水煮作稀粥臨熟投蔥白攪令勻溫溫食之治小兒驚風方用白羊頭一個丁香一兩同熬至軟同乳母空心盡食之豬子肝治小兒久痢用豬子肝一具切片炙熟空心食之落床損瘀附論夫人血之在身隨氣而行常無停積凡小兒若因墮落傷損則血行失度隨傷損之處則停積若流入腹內亦積聚不散皆成瘀血在內顏色萎黃氣息微喘嗇嗇小寒翕翕微熱或時刺痛也方地黃散出聖惠方治小兒落床傷於肢節青瘀疼痛生乾地黃銼微炒甜瓜子蒲黃桂心赤芍藥川大黃銼微炒當歸銼微炒桃仁浸去皮尖雙仁炒黃各一分上為細散每服不計時候用酒半合生地黃汁半合相和令暖酒調下半錢量兒大小加減服之蒲黃湯出聖惠方治小兒落床墮地如有瘀血腹中疼痛寒熱不肯乳哺但啼哭喚叫者蒲黃麥門冬大黃黃芩各十銖甘草八銖芒硝七銖黃連十二銖上㕮咀以水二升煮取一升去滓內芒硝分三服消息視兒羸瘦半之大小便血即愈忌冷食茯神散治小兒落床體熱驚悸茯神半兩龍膽去蘆頭犀角屑子芩麥門冬去心焙人參去蘆頭甘草炙微赤銼以上各一分上為粗散每服一錢以水一盞煎至五分去滓不計時候量兒大小加減溫服蒲黃湯出古方妙選治打撲或落床墮地至損血氣羸瘦痿黃或時刺痛遊走不定蒲黃當歸洗焙生地黃各一兩琥珀赤芍藥桂心上為細末每服一錢水一小盞煎至五分去滓溫服大小加減服之又一方川大黃銼微炒茯神丹出古方妙選治證同前茯神當歸麥門冬去心各一兩人參黃芩草龍膽桃仁湯浸去皮炒各半兩上為細末拌勻煉蜜和丸如黍米大每服十粒生地黃汁少許同酒下大小加減犀角散治小兒落床體熱疼痛犀角屑赤芍藥芎藭當歸銼微炒甘草炙微赤銼以上各一分川大黃半兩銼微炒上為粗散每服以水一小盞煎至五分去滓不計時候溫服量兒大小加減服之治攧撲傷損出湯氏寶書用蘿蔔切細研碎以榼盛之用紗帛裹患處過宿臭甚即愈如覺骨損絞生藕汁和酒飲之即效一方用蘿蔔子湯傷愈亦損氣又方出湯氏寶書用半兩錢不拘多少煅通紅醋淬令酥脆研令細麝香調下如攧撲折損立見接續微響其效如神接骨丹出衛生家寶治小兒攧撲傷折筋骨通神大礬六個臘月豬脂去膜淨熬過四兩黃蠟熬淨稱密陀僧別研稱自然銅如荔枝皮者細研和黃丹細研稱四味各二兩血竭別研稱沒藥別研稱滴乳香別研細稱各半兩上研各制精細先將豬脂再熬成汁次下蠟攪勻次下密陀僧及大礬等六味皆逐旋下只留乳香末下用微火不得住手攪火才猛即藥無力矣將欲成膏取下一茶少頃候藥不至大熱投乳香攪勻衆手乘溫熱急丸如彈子大以新磁罐子收之須厚蓋扎之每一大丸治兩人大人可治一人或作小丸乳香酒下空心服但不可多吃恐生骨耳
