body:
  text: 卷三百七十九嬰孩諸疳門總論凡兒童二十歲以下其病為疳二十歲以上其病為勞疳與勞皆氣血虛竭腸胃受傷致之同出而異名也疳之為候頭皮光急毛髮焦稀腮偏口乾鼻嚏唇白兩眼昏爛揉鼻撏眉脊聳體黃鬥牙咬舌焦渴自汗尿白瀉酸肚脹腸鳴癖結潮熱酷嗜瓜菜咸炭生米泥土而飲水吐飲者其候也心疳即驚疳由乳食不調心臟受熱所致也蓋其血氣未定乳哺有傷易生壅滯內有滯熱未得疏通故心神驚鬱而作驚疳之候外證身體壯熱臉赤唇紅口舌生瘡胸膈煩悶小便赤澀五心皆熱盜汗發渴齧齒虛驚是謂心疳肝疳即風疳由乳食不調肝臟受熱所致也若乳母寒暄不調滋味不節或外感風寒內傷喜怒邪氣未徹遽爾乳兒多成風疳風入眼腫翳生眵疳眼外證搖頭揉目白膜遮睛眼多清淚頭焦發立筋青腦熱甲癢筋攣躁渴汗多下痢瘡癬是謂肝疳腎疳即急疳由乳食不調臟腑伏熱所致也凡甘味入於脾而動蟲蟲動則侵蝕臟腑遂使孩提心下擾悶若上蝕齒齦則口瘡出血齒色紫黑下蝕腸胃則下痢肛爛濕癢生瘡療治不早精體消耗難以有瘳蟲名䘌也目為濕䘌多因疳傷久痢腸胃受濕得之狀如外感傷寒齒蝕之證或以走馬命名蓋齒屬腎主虛才受熱邪疳氣直奔上焦故以走馬為喻初作口氣名曰臭口次第齒黑名曰崩砂盛則齗爛名曰潰槽熱血迸出名曰宣露甚者齒皆脫落名曰腐根其根既腐縱得全活齒不復生外證腦肌削手足如冰寒熱時來滑泄肚痛口鼻乾渴齒齦生瘡爪黑麵黧身多瘡疥是謂腎疳肺疳即氣疳由乳食不調壅熱傷肺所主乎氣鼻乃肺氣所通其氣不和則風濕乘虛客於皮毛入於血脈故鼻下兩傍赤癢瘡濕是為鼻疳瘡濕不通汁所流處隨即成瘡亦名疳䘌外證咳嗽喘逆壯熱惡寒皮膚粟生鼻癢流涕咽喉不利頤爛唾紅氣脹毛焦泄利頻並是謂肺疳脾疳即瘡疳由乳食不節脾胃受傷所致也或乳母恣食生冷肥膩或乳兒過傷或飯後與乳致使吐乳多脹久則變為乳癖腹脅結塊亦名奶疳外證面黃身黃肚大腳細吐逆中滿乏力酷啼水穀不消泄下酸臭合面困睡減食吃泥是謂脾疳析而論之曰五疳出蟲曰蛔疳曰脊疳曰乾疳曰疳渴曰疳瀉曰疳痢曰疳腫脹曰疳勞曰無辜疳曰丁奚曰哺露證狀非一五疳出蟲者疳之源雖起於乳哺不調然臟腑停積已久莫不化而為蟲或如絲髮或如馬尾多有此積者皆於頭項腹背之間黃白或赤者可醫青黑則難療也疳者失乳飯早食肉太早或腸胃停蓄甜膩化為蛔蟲皺眉多啼嘔吐清沫腹中乍痛肚脹青筋唇口黑紫傷齒頭癢是也蛔雖食蟲不可動從口鼻出者難治脊疳者蟲蝕脊膂身弱羸黃積中生熱煩溫下痢拍背如鼓鳴脊骨如鋸齒或十指皆瘡頻齧爪甲是也腦疳者胎中素挾風熱生下乳哺越常頭皮光急滿頭餅瘡腦如火髮結如穗遍身多汗腮腫囟高是也病在腎聲焦皮燥大便乾結其病在肺搭伏癡眠胸脘乾渴其病在脾總為乾疳是也疳渴者臟中夙有疳氣加乳母恣食五辛酒面炙煿使小兒心腹壅熱日則煩渴乳食不進夜則渴止是也疳瀉者毛乾唇白額上青紋腹脹腸鳴瀉下糟粕是也勿用熱藥止之疳痢者挾受風寒暑濕或冷暖不調或停積宿滯水穀不聚頻下惡物是也疳腫脹者虛中有積其毒與其積交併故令腹肚緊脹由是脾復受濕攻令頭面腳手虛浮是也法當磨積調氣疳勞者潮熱往來五心煩熱手足心及腦前熱而發瘡盜汗骨蒸嗽喘枯悴是也或渴而復瀉飲水惡食肚硬如石面色如銀斷不可活無辜疳者腦後項邊有核如彈手披之轉動軟而不疼其間有蟲如米粉不速破之則蟲隨熱氣流散淫蝕臟腑以致肢體癰瘡便利膿血壯熱羸瘦頭露骨高是也針刺破膏藥貼一或朝濯兒衣露於檐下為雌鳥落羽所汙兒著此衣蟲入皮毛亦致無辜之疾兒衣已曬須微火烘之其若手足極細小骨高尻削體痿腹大臍突號哭腦陷或生瘕症是為丁奚虛熱來往頭骨分開翻食吐蟲煩渴嘔噦是為哺露皆因脾胃久虛不能化水穀以榮血氣故肌肉消鑠腎氣不足復為風冷所傷使柴骨枯露亦有胸中毒臟腑少血致之皆無辜種之疾病而至此不幾殆哉又有小兒久患腎疳內虛不食甚者天柱倒治法當用錢氏地黃丸加驅疳等劑仍與貼項強筋不識證謂之五軟非也天柱骨例凡有三種有吐瀉日久羸弱成者有肝膽伏熱面赤唇紅忽變此者有傷寒不及發表或更被風邪入肝以致筋絡放弛吐瀉者當調胃氣肝熱者隨輕重以涼肝並與強筋貼項惟傷寒天柱骨倒者難療聖惠方云凡小兒疳在諸腹脹痢色無常或如內脹日漸羸瘦此可療若鼻下赤爛自揉其鼻頭上有瘡嗅癡痛癢其漸可治泔澱流引繞於兩耳時時目赤頭髮稀疏腦皮光緊頭大項細肌體羸瘦亦可治也若唇口被蝕齒齦作五色或盡黑舌下有白瘡上齶有竅子下痢時有臭氣齒齦漸欲軟爛不可治也若下部開張有時亦爛癢不可忍脊骨如鋸無完亦可治也若疳蝕脊膂十指背癢自咬指甲發豎作穗有時腹脹有時下痢若急治之無不瘥也凡小兒肝臟疳若睛帶青脈左脅下硬多吐涎沫眼角左右有黑氣所腫不可治也心與脾疳若受驚啼好飲水便食辛味耳邊有脈舌上有靨者不可治皮枯藏疳若肚大唇無血色人中平陷下痢無度水穀不消好吃泥土骨露不可治肺臟疳若案此處缺心脾腎各臟疳及熱疳前半心煩熱掀衣氣粗飲冷水煩躁臥地肚熱腳冷潮熱往來皆熱疳也冷疳病多在內痢色無常其吻青白肢體軟弱目腫面黧又一證燥渴臥地似有熱狀惟飲食不進滑瀉無已亦冷疳也其有瀉多膿血日加瘦弱此則謂之冷疳大抵疳之受氣皆虛使然熱者虛中之熱冷者虛中之冷治熱不可妄表過涼治冷不可峻溫驟補故錢氏又曰小兒易為虛實脾胃虛不受寒溫服寒則生冷服溫則生熱當識此而無誤上醫處此消積和胃滋血調氣隨順藥餌以扶之淡薄飲食以養之榮衛調和臟自然充實去積之法又當權衡積者疳之母由積而虛謂之疳極諸有積者無不肚熱腳冷須酌量虛實而去之若積虛甚則先與扶胃使胃氣內充然後為之微利若積勝乎虛則先與利道設得一泄急以和胃之劑為之扶虛然去積雖疏利如白豆蔻蘿蔔子縮砂蓬朮消痰亦不可無脅間癖痛亦為虛之中積也先寒後熱飲水不食或飲水以致喘嗽錢氏有癖為潮熱之治法解散寒熱即與下癖合是而觀法作不同療治不一又可無權度於此哉若夫諸疳惡證心疳飲水不已食則驚啼耳邊紋多舌上黯黑者不治肝疳右脅結硬頻數吐涎目睛青筋眼角黑氣者不治腎疳飲水好鹹小便如乳耳焦肩聳牙黑骨枯者不治肺疳咳逆氣促頻瀉白沫身上粟生其色斑黑者不治脾疳吃泥泄痢水穀不消唇白腹高人中滿者不治其或滑泄不休脫肛咳逆抱起昏沉手足垂軟襯及腳心全不知覺項筋舒展身體變冷是則為五絶證候甚者胸陷喘噦乳食直瀉腫滿不痢腹脅脹疼皮發紫瘡肌肉光紫與夫疳勞渴瀉面槁色夭骨露齒長肚硬不食者皆危篤矣凡疳在內目腫腹脹利色無常或沫青白漸瘦弱此冷證也疳在外鼻下赤爛自揉鼻頭上有瘡不著痂漸破鼻瘡繞耳生瘡爛蘭香散諸白粉散主之肝疳當補肝地黃丸主之脾疳當補脾益黃散主之心疳當補心安神丸主之腎疳當補腎地黃丸主之筋疳瀉血而瘦當補肝地黃丸主之肺疳當補脾益黃散主之骨疳喜臥冷地當補腎地黃丸主之諸疳皆當補其母及與治疳藥冷則木香丸熱是脾臟虛一臟實而內發虛補當補母而瀉本臟則愈假令日中發潮熱是心虛熱也肝為心母則宜先補肝肝實而後瀉心心得母氣而內平而潮熱愈也醫見潮熱妄謂其實乃以大黃牙硝諸冷藥利之利既多矣不能禁約而津液內亡即成疳也又有疳癖其疾發作寒熱飲水脅下有形硬痛治癖之法當漸消磨醫反以巴豆硇砂等下之小兒易虛易實下之既過胃中津液耗損漸冷疳瘦有病傷寒五六日間有下證以冷藥下之太過致脾胃津液少即使引飲不止而生熱也熱氣內耗肌肉外消他邪相干證變諸端因亦成疳多又有吐瀉久病或醫妄下之其虛益甚津液燥損亦能成疳又有肥疳即疳脾也身瘦黃虛干而有瘡疥其候不一種種異端目澀或生白膜唇赤身黃干或黑喜臥冷地或入泥土身有瘡疥瀉青白黃沫水痢色變易腹滿身耳鼻皆有瘡發鬢作穗頭大項細極瘦飲水皆其證也大抵疳病當辨冷熱肥瘦其初病者為肥熱疳久病者為瘦冷疳冷者木香丸熱者黃連丸主之冷熱之疳尤宜如聖丸故小兒之臟腑柔弱不可痛擊大下必亡津液而成疳丸有大小可量虛實而下之則不至為疳也初病津液少者當生胃之津液白朮散主之唯多則妙積痛口中氣溫面黃白目無精光或白睛多及多睡少食或大便酸臭者當磨積宜消積尤甚者當用白餅子下之後和胃白朮散主之小便初出微赤良久白濁者乃是熱疳疳之新也初黃白久白濁者乃是冷疳疳之久也熱疳牛黃丸大黃丸冷疳益黃散六甲丸冷熱之疳蘆薈丸香蟾丸小便白濁厚朴丸諸失津液成疳參朮散大便如油珠妙丸子下黃散補更於後擇用馬氏女五歲病疳黃腹大消瘦骨熱盜汗或時飲食全然不吃或時乳食不知飢飽但好食泥土炭灰紙一醫用千金方豬肉一斤繩系曳地行數里勿燒大炙與無效一醫以疳藥服半年無效召愚視曰食已如飢者胃熱也好食泥土者脾胃有疳熱積主人曰何知也愚曰素問云食已如飢者胃疳是腸胃熱也胃熱則消穀故令已食如飢也寶鑑云與乳食而不吃逢泥土而須吞要訣云脾疳食土面痿黃蓋胃有積熱脾有疳積所以不知飢飽好食泥土主人曰何治也答曰去胃熱逐脾疳當以黃土丸瀉十餘次次日熱脾疳積等俱下後益黃散輔蘆薈丸香蟾丸治之七日平愈張氏女十歲忽臍下疼痛臍下透起自言覺腹囊轉痛不可言有時面青吐清水小便如常一月一發半月一發十數日一發進退不定似此一年屢醫或作淋治者小便不澀或作腹冷者小便如常或作腹熱者小便不赤或作積痛止腹中或作蟲痛者只口水蟲痛不在臍下衆醫不解召愚視之此證亦不曉諸書不曾該省移時思之錢氏用百祥丸治瘡案此處原文缺兵不必衆而收功藥不必多而取效蓋醫者能機變即可用也後別一女十四歲與前證同三月一發每發時五六日方退屢藥無效病起先從心腹中疼後至臍下其病先至心腹者有食積也後至臍下者膀胱病也調大戟散送下紫丸子瀉十餘次即安又一小女三歲與前證同屢藥以木通滑石之類無效召愚視之用大戟茴香等分微炒為末每服一錢鹽湯調下小兒奶疳者面色青黃或口內有瘡或哯乳多睡久則成奶癖結塊腹中皆乳食不節故也又有小兒疳積者其狀漸黃者拍背如鼓鳴脊骨如鋸乃積而生熱成疳也宜服蘆薈丸又宜服豬肚丸又宜服露星膏又小兒冷疳多渴好臥冷煩躁啼叫飲食不進漸成羸瘦其候難明上件證候有若熱證但大便滑泄百藥不效者是已唯錢氏論此冷疳候宜服木香丸余用之經驗久矣初因女子病此方以三歲百藥俱試而無偶中者因閲錢氏方遂合此木香丸數服而愈自後凡有此證無不獲痊治小兒一切疳附論夫小兒疳者其狀多端雖輕重有殊形證各異而細窮根本主療皆因乳哺乖宜寒溫失節臟腑受病氣血不榮致成疳也其五疳及諸疳等今以一方同療之故謂一切疳也方青黛散出聖惠方治小兒一切疳腹肚脹滿手腳枯細眼目口鼻生瘡身體壯熱痢下泔澱日漸羸瘦面無光澤青黛細研雄黃細研硃砂細研水飛過石鹽研細白礬燒令沫盡薰陸香研入以上各一錢麝香細研蚺蛇膽研入細辛黃連去須青礬燒令通赤鹽緑黃蘗銼苦參銼桂心杏仁湯浸去皮尖炒微黃乾薑炮製銼藜蘆去蘆頭以上各半分莨菪子水淘去浮者水煮令芽出焙乾炒令黑黃色附子炮裂去皮尖熊膽研入石膽細研以上各一分蝦蟆一枚塗酥炙微焦黃礬燒令通赤用半分上為散同研令勻如疳在內三歲每服以井新水一合調下半錢一歲一字三歲以上臨時加之若口內疳瘡以蒜一片研和少許散每夜塗之須臾自然流引涎出若鼻內瘡用蒜如皂莢子大研和少許散內入鼻中麝香丸治小兒一切疳黃連洗淨青皮去白三稜炮莪朮炮檳榔鶴蝨炒蕪荑川楝肉苦楝根使君子神麯麥芽厚朴薑製川芎胡黃連夜明砂蘆薈各五分蟾一枚炙上研麝香末拌勻蜜丸量大小米飲湯下五疳陳米飲下寒熱往來薄荷湯下蟲動苦楝湯下疳痢紫蘇木瓜湯下退疳熱麥門冬湯下冷痢丁香湯下不思飲食縮砂仁湯下腹脹木香陳皮湯下井黃煎出全嬰方治小兒諸疳諸痢食傷氣脹頭大體羸頭髮作穗壯熱不食多困齒爛鼻瘡丁奚潮熱腹急骨蒸消瘦發堅面黃蝦蟆一枚去皮骨腸胃炙焦搗末以無灰酒一盞獖豬膽一枚取汁熬成膏訶黎勒皮炮使君子去殼胡黃連蟬蛻無食子蘆薈研蕪荑熊膽夜明砂丹砂研雄黃木香各一分肉豆蔻去殼春夏半分秋冬一分牛黃研一錢麝香研一錢上搗研十六味為末豬膽膏丸如麻子大每服五七丸米飲下驚疳金錢薄荷湯下疳瘡腹脹桃仁蘹香湯下疳蟲東安石榴苦楝根湯下此丸尤治疳痢若挾熱而痢者不可服一方有龍膽無熊膽使君子蕪荑煉蜜為丸案此方缺方名及症狀天漿子七枚去殼青黛研烏蛇酒浸去骨蒸熱麝香研各一分丹砂研葶藶隔紙炒過去龍腦研雄黃研膩粉各半分白附子炮獨角仙去翅足各一錢乾蠍五枚炒蟬蛻十枚去足蟾酥一分上為細末用生豬膽為丸如黃米大一服一粒早晨日晚各一服五疳丸出聖惠方治小兒五疳乳食不成肌膚心腹脹滿或時下痢壯熱昏沉眼澀口乾愛吃生冷毛髮乾堅揉鼻多吃日漸羸瘦青黛細研雄黃細研麝香細研蘆薈研熊膽研入胡黃連黃連去須龍膽去蘆頭苦楝根白鮮皮炙黃蝦蟆灰蝸牛炒令微黃夜明砂微炒蟾頭一枚炙令焦黃五倍子上為末都研令勻日三服量兒大小以意加減夜明丹古方妙選治五疳腹脹目澀多睡夜明砂微炒胡黃連草龍膽苦楝根各半兩干蝦蟆五個燒存性以上為細末青黛麝香蘆薈各一分並研細上一處拌勻粳米飯和丸如黍米大每服十粒米飲下不拘時候量兒大小加減敷藥危氏方治疳後虛熱小便腫上以韭菜內地龍糞煅為末出火毒清油調敷五疳保童丸治小兒五疳蓋其骨肉軟輕腸胃微細若乳哺有節則臟腑相調或乳母寒溫失理飲食無常醉飽喜怒及小兒百晬以後五歲以前乳食漸多不擇生冷好食肥膩甘酸之物即成五疳一曰肝疳其候搖頭揉目白膜遮睛流汗遍身合面而臥目中澀癢肉色青黃發立頭焦筋青腦熱腹中積聚下痢頻多久而不痊轉甚羸瘦二曰心疳其候渾身壯熱吐痢無常頰赤面黃胸膈煩滿鼻乾心躁口舌生瘡痢久不痊多下膿血有時盜汗乃或虛驚三曰脾疳其候腹多筋脈喘促氣粗乳食不多心腹脹滿多啼咳逆面色痿黃骨立毛焦形枯力劣胸膈壅悶水穀不消口鼻常干好吃泥土情意不悅愛靜憎明腸胃不和痢多酸臭四曰肺疳咳嗽氣逆皮毛乾焦饒涕多啼咽喉不利揉鼻咬甲壯熱憎寒口鼻生瘡唇邊赤癢腹內氣脹乳食漸稀大腸不調頻頻泄痢糞中出食皮上粟生五曰腎疳其候肌肉消瘦齒齦生瘡寒熱作時口鼻乾燥腦熱如火腳冷如冰吐逆既增乳食減少瀉痢頻並下部開張肛門不收疳瘡癢痛以上疾狀並皆治療黃連去須白鱔頭炙令焦黃無即炒白蕪荑充代草龍膽去蘆雄黃研飛青橘皮去五倍子夜明砂微炒蟾頭一枚炙令黃色苦楝根天漿子微炒胡黃連麝香青黛研熊膽研蘆薈研各等分上為細末用糯米飯和丸如麻子大每服一歲兒一丸不計時候溫米飲下日進三服尤妙一方有蠋蟲微炒一分肥兒丸治肥熱疳案此方症狀原文不全寒熱往來乃欲傳疳候宜補脾進食磨積消疳又實皮散飲米湯調空心服以補脾青皮去白陳皮去白各一兩三稜炮莪朮神麯麥芽各五錢巴豆十五粒去皮作二片上銼將巴豆同炒少時傾去巴豆不用川楝肉五錢使君子一兩黃連蕪荑各三錢胡黃連五錢蘆薈青黛末各三錢蝦蟆去足灰三錢上銼一處入銚內再用巴豆微炒去巴豆不用和前藥同為末麵糊為丸米湯下凡久積欲傳疳宜作虛中損乏虛則補而後取實則取而後補不必便用胡黃連蘆薈等治疳藥使君子檳榔丸活幼口議治嬰孩小兒食肉太早傷及脾胃水穀不分積滯不化痰作疳氣等候宜服之肉豆蔻二個炮檳榔一個生黃連胡黃連陳皮青皮川楝子少去土蘆薈川芎各一錢麝香使君子上為末獖豬膽汁薄荷為丸如麻子每服三五十丸溫飲下議曰積是疳之母所以有積不治乃成疳候又有治積不下其積存而臟虛成疳尤重大抵小兒患疳泄瀉無時不作風候何惟疳瀉名熱瀉其臟腑轉動有限所以不成風候雖瀉不風亦轉他證作渴虛熱煩躁下痢腫滿喘急皆疳候虛證古云疳虛何補虛是知疳之為疾不可更利動臟腑發作之初名曰疳氣腹大脹急名曰疳虛瀉痢頻併名曰疳積五心虛煩名曰疳熱毛髮結穗肚大筋青好吃異物名曰疳極受病傳臟已極發熱往來形體枯槁面無神彩肉無血色名曰疳勞手足細小項長骨露尻臀無肉肚脹臍突名曰丁奚食加嘔噦頭骨分開作渴引飲蟲從口出名曰哺露此皆疳候又因多食生冷甘黏肥膩積滯中脘不化亦以成疳治疳之法量候輕重理其臟腑其中脘自然調貼氣脈和順疳消蟲化漸次安愈若以藥攻之五臟疏怯腸胃不去積毒取出蟲子雖曰醫療即非治法蓋小兒臟腑虛則生蟲虛則積滯虛則疳羸虛則腸滿何更痢下若更轉動腸胃致虛由虛疳虛證候乃作無辜無辜之孩難救矣小兒疳藥十分有效經驗紫蘇嫩梗陳皮甘草乾葛香附子白茯苓白朮青皮茅香淨藿香淨苦楝皮三稜蓬朮檳榔川楝子去皮各等分使君子加倍上㕮咀水二盞姜三片煎八分去滓但通口食前服如為丸米飲湯空心送下亦得小兒三歲以下每服一錢半服藥停一個時辰方可食乳食三歲以上每服三錢上半月服去蟲下半月散積如咳嗽加人參地骨皮桑白皮蘆薈丸出聖惠方治小兒五疳面黃發枯頭熱盜汗臥則合面飢即食土疳蟲蝕於口鼻瀉痢目疾無恆肌體羸瘦無力蘆薈半兩細研硃砂半兩研細水飛過麝香半錢細研龍腦半分細研胡黃連半兩牛黃細研蟬殼蝸牛殼微炒夜明砂蜣螂微炒去粗足熊膽研入蚺蛇膽倒釣棘針瓜蒂以上各一分蟾酥一錢研入上為末都研令勻煉蜜和丸如緑豆大每服以奶汁研一丸點入鼻中後以桃柳湯洗兒以青衣蓋裹候有蟲子自出即以粥飲下三丸三服三歲以上加丸服之使君子丸出聖濟總録治小兒五疳羸瘦腹脹下痢不思飲食使君子用水和麵裹炮以面熟為度取使君子用丁香無食子熊膽研胡黃連夜明砂微炒青黛研肉豆蔻仁黃連去須微炒蘆薈研各一兩蟾頭乾者一枚炙黃蟾酥一皂子大麝香一錢研龍腦半錢研上為末拌令勻棗粟米飲和丸如麻子大每三歲服五丸至七丸用溫水飲下日食遲進黃耆湯出仁指方黃耆蜜炒當歸川芎白芍藥生地黃蝦蟆去足炙焦鱉甲醋炙焦各三分人參白茯苓橘皮半夏曲北柴胡使君子略煨甘草炙各二錢上銼散每服三錢水一盞姜二片棗二枚煎食前服蘆薈丸出聖惠方治小兒一切疳頭髮成穗面目痿黃鼻癢口乾愛吃泥土心腹虛脹肚有青筋四肢壯熱蘆薈半兩細研麝香一分細研胡黃連一分木香一分牛黃一分細研龍腦一錢細研熊膽半錢細研狗膽一枚牛蒡子一分雞膽十枚蟾頭一枚酥炙微焦蝟膽七枚上為末用豬膽汁和丸如麻子大每服以冷水下一丸二歲以上加丸數服之保童丸出聖惠方治小兒五疳驚熱青黛細研乾蟾頭炙微焦黃黃連去須蘆薈細研熊膽研入以上各半兩夜明砂微炒蝸牛殼微炒使君子地龍微炒牛黃細研蟬殼微炒以上各一分龍腦細研一錢硃砂一錢細研麝香一錢細研上為末入研了藥令勻以糯米飲和丸如粟米大每服以粥飲下五丸量兒大小加減服之乾蟾丸出聖惠方治小兒五疳不生肌肉乾蟾一枚用無灰酒一升煎其酒半升已來卻去蟾骨更煎令熱爛後於乳鉢內並酒一時研如膏次用後藥肉豆蔻二枚去枝檳榔一枚甘草一寸炙微赤銼乳香半兩研入硃砂一錢細研麻黃半兩去根節膩粉一錢研入胡黃連半兩黃連去須半兩丁香一分蘆薈一分研入麝香一錢研細牛黃一錢研細上為末都研令勻入蟾膏內和丸如緑豆大每服以粥飲下五丸日三四服胡黃連丸出活幼口議治嬰孩小兒一切疳候及一切虛痢他藥無效而此藥極效胡黃連蘆薈肉豆蔻炮桂人參硃砂使君子去殼木香鉤藤龍齒白茯苓以上各一錢上為細末取獖豬膽兩枚裂汁和末令勻卻入袋內盛之以繩扎定湯煮半日取出切破袋子更入莨菪子二錢微炒黃丹一錢二味別研如粉入前藥和勻搗五百杵為丸如緑豆大但是疳與痢用粥飲下五七丸子幼者三四丸不吃粥飲乳頭令吻能治一十二種疳痢及無辜者功效非常議曰疳之疾危發由於漸痢之後逆傳至於延久為逆初見其輕延之日長後知其重告之無門是以疳痢皆由積毒驕恣口腹因虛以致虛用害而傷害醫工見有此等自是憂疑病家欲得便蘇豈無性急更遷取治展轉愈深或疳極而復下痢或熱盛而加作渴或煩躁四體虛浮或飲食一時嘔吐常方不能安愈快劑恐越傷和惟宜服此熊膽散出聖濟總録治小兒二十四種疳熊膽牛黃雄黃五靈脂丹砂麝香各半兩蚺蛇膽以上各研黃連去須乾蠍去土天麻蝸牛炒馬兜零根干香大黃銼碎炒各一分上熊膽等七味研令如粉黃連等六味再同研令極細每服一分至半錢用飲調下早晨午間臨臥各一服量兒大小加減服之或以蜜為丸如麻子大每服三丸至五丸使君子丸出聖濟總録治小兒疳氣身體壯熱毛髮焦黃兩目有淚滿口生瘡手腳細弱腹脅脹滿好吃泥土使君子去皮夜明砂炒白蕪荑炒各半兩胡黃連一兩麝香半錢研細辛去土蘆薈研雄黃研蟾酥檳榔銼蟬蛻去翅足炒各一分蝸牛十枚干蝦蟆二枚酒一斤熬成膏腸肚用溫水洗去慢火炙黃色為度搗羅要細併骨爪為末用上除蝦蟆外搗研為細末入膏子和為丸如麻子大每服五丸至七丸米飲下不拘時候一日三服青金定命丸出聖濟總録治一切疳氣胡黃連一錢為末蘆薈研三分肉豆蔻二枚去殼為末青黛研三分訶黎勒五枚炒去枝為末麝香研丹砂研密陀僧木香為末紅雪研鶴蝨為末各一分上同研令勻用酒煎獖豬膽膏丸如緑豆大每服五丸至七丸奶疳臘茶下氣疳丁香湯下腦疳黃連湯下急疳干筍湯下食疳生薑湯下脾疳棗湯下疳鹽湯下豬肚黃連丸出危氏方治疳瘡自孩提至弱冠潮熱發瘡乃疳氣使然疳蟲食其肌膚空疳熱流注遍身熱瘡發歇無已蟾酥丸相間服尤妙雄豬肚一具淨洗雁瓜黃連去須淨一兩上銼作小截少水和納豬肚內用線縫密頓在五升粳米上蒸十分爛取於臼中入紫蘇飲搗千餘杵黏實得所衆手捏丸如小豆大每服二十丸米飲下童子倍之冠者又倍之仍以川芎生地黃茯苓茯神與之調血清心熱多者間服生犀散方見前二十歲以上潮熱發瘡為虛勞皆此種病也用藥同前凡兒童病不出於疳則出於熱熱則生痰當須識矣異香散治疳脹乃虛中有積其毒與氣交併故令腹脹脾土受濕腎水不能宣通故頭面手足乳腫三稜炮莪朮青皮陳皮半夏曲藿香苦楝根益智仁枳殼煨香附子炒縮砂仁各五分丁香二錢甘草炙三分上銼薑棗煎服一方加五靈脂胡黃連丸治小兒毛髮焦落腹大氣喘肌體羸瘦吃食灰土生米寒熱往來下痢脫肛亦治咬奶不長肌肉性情不悅咬奶者乳母又有孕也陳皮去白一兩川楝肉炒宣連神麯青皮去白使君子煨去殼麥芽龍膽草各半分胡黃連夜明砂白蕪荑炒乾薑烏梅各二分上為末麵糊丸如黍米大飲下三十丸煞疳丸治小兒五疳寒熱腹脹四肢羸弱青黛二錢蟬殼五枚微炒硃砂一錢細研雄黃一錢細研胡黃連一分瓜蒂二七枚蛇蛻皮灰一錢田父一枚炙令黃膩粉一分研入龍膽一錢研入熊膽一枚細研麝香一錢細研蟾酥兩皂莢子許大研入上為末都研令勻熱獖豬膽湯化破三丸服量兒大小以意加減使君子丸治小兒五疳面色痿瘁頭熱發乾胃氣不和心腹滿悶宿食不消或時下痢瘦熱無力宜常服使君子丁香沒石子熊膽細研胡黃連夜明砂微炒青黛細研黃連微炒去須肉豆蔻去殼蘆薈細研以上各一分龍腦一錢細研蟾頭一枚炙焦黃麝香一錢細研上末燒粟米飯和丸如緑豆大每服以粥飲或新汲水下五丸日三服三歲以上加丸服之膽礬丸治消疳癖進食止瀉和胃遣蟲緑礬須真者二兩膽礬真者一錢為粗末大棗四十個去核好醋一升以上四物熬令棗爛和後藥使君子二兩去皮枳實二兩去微炒黃連一兩巴豆二十個去皮破之訶黎勒去穰取一兩各為粗末以上五味同炒令黑直入後藥夜明砂一兩蝦蟆灰存性五分苦棗根皮末半兩以上三味同炒候乾同煎三物杵羅為末上同煎膏和一臼中杵下千如末成旋入熟棗肉亦可多恐服之難化太稠則入溫水可丸如緑豆大每服十丸米飲水下不拘時五疳保童丸治五種疳疾青黛夜明砂布裹洗五倍子生苦楝根蘆薈熊膽研入黃連去毛龍膽草生乾蟾炙去皮骨麝香研入蕪荑取仁蟬殼去土等分上為末用粟糊為丸如麻子大一歲兒二十丸飯飲下二三服磨積丸專治小兒疳積泄瀉等疾京三稜蓬莪朮陳皮去白青皮附子炒去毛與三稜莪朮陳皮青皮五件一處用米醋煮一晝夜焙乾麥芽炒川鬱金胡黃連神麯炒雷丸白者使君子肉切焙蘆薈以上各等分上為末米醋糊為丸如緑豆大每服三十丸糯米湯下茶湯亦可虛弱加木香虛極加附子疳極加癩蚵蚾肉香膽丸治小兒疳氣面黃肌瘦發熱多困好吃泥土揉眉咬甲時伏土地亦皆治之乾蟾一枚炙焦麝香研半錢牛黃研蛇蛻燒灰雄黃研天竺黃研熊膽研蟬蛻炙各一分天仙子半合水浸出芽子為度焙乾為細末肉豆蔻一枚去殼上為細末糯米飯為丸如黃米大每服七丸至十丸米飲不拘時候一日三服生熟地黃湯治疳搖頭揉目白膜遮睛流汗合面而臥肉色青黃發立筋青腦熱羸瘦及眼合不開內生朦霧生乾地黃洗熟地黃各半分川芎半夏茯苓枳殼煨去瓤杏仁炙去皮川黃連去須半夏曲天麻地骨皮甘草炙當歸各二錢半上銼散每服二錢生薑二片黑豆十五粒水煎臨臥溫服一方無當歸通治蟾酥丸治諸疳殺蟲止腹痛虛熱大效或因病後通泄成疳蟾酥二個油炙去骨胡黃連宣連去須龍膽草陳皮川楝子木香使君子去殼蕪荑各一兩麝香半分或不入巴豆三七粒去油茴香一兩炒上為末豬膽汁丸或糊丸青黛為衣常服紫蘇湯下使君子丸出聖惠方治小兒一切疳神效使君子沒石子木香胡黃連黃連去須天靈蓋塗酥炙令黃熊膽細研蘆薈細研訶黎勒皮阿膠搗碎炒令黃燥仙靈脾以上各半分麝香一分細研上為末用水浸蒸餅和丸如麻子大每服以粥飲下三丸日三服隨兒大小加減用之蟾頭丸治小兒五疳毛髮乾枯羸瘦煩熱肚大腳細蟾頭一枚炙黃令焦青黛研細龍腦研細巴豆去皮心研去油乾蠍微炒白附子炮製膩粉研入牛黃細研麝香細研天竺黃研細雄黃細硃砂研細各半分上為末青黛等同研令勻以水浸蒸餅和丸如緑豆大每服一歲粥飲下一丸麝連丸出全嬰方治小兒疳積多汗不思乳食黃連一兩酒浸一分使君子鱉甲米醋炒柴胡各半兩陳皮半分蕪荑去皮半兩青皮以上銼碎巴豆七粒炙黃去巴豆檳榔木香各一分麝香半錢秦艽半分上為末酒糊丸如豆大三歲三十丸米湯下無時候無食子丸出聖濟總録治小兒五疳無食子三枚大者煨熟用牛黃研麝香研丁香雄黃研水飛青黛木香丹砂研水飛各一分蟾酥三片如柳葉片焙過研熊膽研半分蝸牛殼乾者取三枚上水浸蒸餅為丸如粟米大一二歲臨臥乳汁下一丸三四歲二丸五六歲三丸七八歲五丸米飲下亦得日再服之青黛丸出聖濟總録治五疳殺蟲化食長肌肉退風熱青黛別研半分使君子檳榔銼夜明砂白蕪荑醋炒令紫各三分蛇蛻一條炙肉豆蔻炮裂煨去殼一分巴豆半分用面炙令紫去殼別研麝香一錢研黃連去須炒一分蝦蟆一枚酒浸衣令黃紫色去骨上先研巴豆令細冷用豬膽一枚取汁同研令勻旋入其餘藥末溲和為丸未就更用少軟飯再研得所丸如麻子大每三歲以下者一丸湯下五丸至七丸以通利為度金膽丸出經妙良方治小兒一切疳疾三服見效黃連黃蘗青皮陳皮三稜莪朮檳榔鶴蝨蕪荑川楝子煨苦楝根等分上為細末椎豬膽汁浸蒸為丸如黍米大疳瀉黃柏紫蘇木瓜鹽米飲下疳蟲蝕腹痛使君子湯下傷食不止藿香湯下退疳熱麥門冬湯下脹腹脾虛木香陳皮湯下不思乳食棗湯下取小兒蟲清油湯下赤白痢乾薑甘草湯下赤痢甘草湯下白痢乾薑湯下常服磨積肥兒丸出經效良方治消疳退黃神麯半兩川楝子去核半兩青皮陳皮使君子去皮殼各一兩麥芽黃連蕪荑三稜莪朮各三分巴豆十粒去皮膜上先將三稜莪朮陳皮青皮神麯麥芽同巴豆慢火炒少時急傾將使君子川楝肉黃連蕪荑都一處以厚紙緊裹延半個時辰候令揀出巴豆八粒止留二粒研細末糊丸如黍米大每服三十丸米飲下無時四膽丸出聖惠方治小兒一切疳龍膽去土虎膽熊膽豬膽蘆薈研麝香研白礬炙荊芥穗各一分不用研上為末先取東引石榴根半斤研銼以水三碗煮至半碗去滓以慢火煎如膏下諸藥末又熬丸如緑豆大用瓷器收之如遇諸疳有蟲或揩鼻眼手剜指甲及下部者取一丸以荊芥湯化為汁候兒睡後點少許於鼻中腦上十指下部蟲聞藥氣皆化為水黃連豬膽丸一名蘆薈丸出王氏小兒科治小兒五疳瘦弱不思乳食黃連去須蘆薈研蕪荑青黛研檳榔銼各分蟬蛻二十一個去土胡黃連半兩麝香研半兩上為末以豬膽丸如麻子大每服七丸量兒大小加減米飲下甚效用益母草絞汁稍稍服五疳良方出仁齊直指方川黃連去須蕪荑取仁神麯炒麥糵炒橘紅木香蝦蟆燒存性各半錢使君子三十個煨去殼肉豆蔻生一個雞心檳榔二個麝香一錢上為末雄豬膽二個取汁入好酒打清麵糊為丸芥子大每服十五丸米飲下金粟丹出聖方妙選治小兒腹大疳瘦好食泥土泄痢不調母丁香一兩乾蟾五枚塗酥炒焦黃川黃連各二兩下用一兩草龍膽一兩厚朴一兩夜明砂半兩蟾殼半兩訶子半兩以上為細末以用好硃砂研麝香半錢研上為細末煉蜜和丸不拘時候量兒大小加減夜明砂丸出聖惠方治小兒一切疳面腫項細腹肚脹滿四肢羸瘦身上生瘡鼻流清涕頭髮稀疏日漸煩弱夜明砂微炒蘆薈細研熊膽細研硃砂細研蜣螂微炒去翅足蛇蛻皮燒灰青黛細研以上各十兩蟬蛻微炒蟾頭一枚微黃焦麝香一分細研牛黃一分細研上為散以糯米在豬膽中水煮熟取出糯米和丸如黍米大每服以薄荷湯下五丸量兒大小加減服之熊膽丸出聖惠方治小兒一切疳肌體乾瘦發豎毛焦心神煩熱熊膽研發入蝸牛炒令微黃黑狗膽黃連去須胡黃連丁香麝細研沉香水銀以棗肉少許研令星盡鯉魚膽青黛以上各一分上為末都研令勻煉蜜和丸如黃米大不拘時候以冷水下五丸粥飲下亦得量兒大小加減服之龍膽散出聖惠方治小兒一切疳日漸黃瘦無問遠近皆效龍膽草去蘆頭木香熊膽細研蝸牛炒黃蘆薈細研夜明砂微炒地龍微麝香細研以上各一分青黛細研半兩硃砂半兩乾蟾頭一枚錢令焦黃上為末每服以粥飲調下半錢量兒大小以意加減更吹少許入鼻中蟲子自出白色可醫黑色難療蘆薈丸出聖惠方治小兒八般疳疾蘆薈研宣連去須為末水銀瓜蒂為末陳皮蝸牛麝香當門子另研龍腦另研硃砂另研同水銀再研不見星犀角為末蟾酥剪研同草藥一處為末蟬蛻去土各等分上為末丸如黍米大三歲以上三五丸五歲五六丸腦疳即鼻疳黃連湯下肺疳即氣喘促陳皮湯下食疳即吐瀉生薑湯下脾疳即羸瘦棗湯下氣疳即吐脹青皮湯下筋疳即瀉血鹽湯下肝疳即目澀甘草湯下骨疳即愛臥冷地及吃泥土茶清下奇妙不可盡述香膽丸出全嬰方治小兒疳面黃干蚵蚾酒浸炙黃去骨甲一兩青黛使君子各一分定粉天竺黃青皮各一錢麝香二錢研上為末三歲三十丸飯丸如小豆大米湯下蝦蟆煎丸出聖濟總録治小兒疳氣蝦蟆一枚用頭炙黃為末胡黃連地龍去土炒木香肉豆蔻一枚去殼麝香研黃連去須各一錢夜明砂白蕪荑各一錢為末丹砂研上蝦蟆蕪荑末獖豬膽二枚酒一盞煎成膏和其餘藥末為丸如粟米大每服五丸至七丸米飲下日三四服金膽丸出聖濟總録治小兒五疳心臟驚疳肝臟風疳肺臟滑疳腎臟急疳皆治之常服蟾酥一字胡黃連使君子熊膽研各一分木香一錢麝香研少許牛黃研半錢丹砂研水飛二錢大黃半兩虎睛研一對上為末燒粟米飯丸如麻子大荊芥湯下三丸至五丸量兒大小加減服之吹鼻散出聖惠方治小兒一切疳及有名瘡疥孩子頭干腦有無辜子或時喉閉並用蝦蟆灰一分甘草末一分地榆末麝香半錢蝸牛殼一分青黛一錢人糞灰一錢蚺蛇半分蘭香半錢龍腦半錢上都研細每日取少許吹入鼻中其患潮差其發生出皆如漆色切忌五辛金膽丸出聖惠方治小兒五疳頭熱眼澀胸高腳細頭大腹脹面黃鼻乾驚悸盜汗肌肉羸瘦寒熱不定宜服乾蟾一枚大者塗炙令焦黃胡黃連一分地龍半兩微研硃砂一錢細研蛇蛻皮灰一分雄黃一分細研天竺黃一分細研麝香半分細研莨菪子半合去浮者水煮令水淘茅出候乾炒令黃黑色蟬蛻一分微炒上為末都研令勻以糯米飯和丸如緑豆大每服以粥飲下三丸量兒大小加減服之蘆薈丸出全嬰方治小兒疳氣腹急蘆薈木香檳榔黃連一兩蕪荑去皮陳皮各半兩青皮蚵蚾酒浸炙黃去骨一兩巴豆二七粒用上四味炒黃去巴豆上為末豬膽糊丸小豆大三歲三十丸米飲下大蘆薈丸出錢氏方治疳殺蟲和胃止瀉胡黃連黃連蘆薈研木香白蕪荑去苗雷丸破開白者佳赤殺人勿用青皮去白鶴蝨微炒以上各半兩麝香二錢另研上為細末粟米飯和丸如緑豆大米飲下一二十丸無時服胡黃連丸出聖濟總録治小兒五疳胡黃連蛤蚧酥炙牛黃研犀角屑天麻人參肉豆蔻仁大黃炒細研各半兩雄黃研如粉一分上為末煉蜜和丸如麻子大每服五丸空心午後一服溫水下楬子丸出危氏方治疳腫脹因虛中有積腹肚脹緊頭面虛浮蘿蔔子炒一兩陳皮青皮好檳榔黑牽牛取仁半生半炒五靈脂赤茯苓蓬莪煨各半兩木香二錢半上為末飛羅麵糊丸緑豆大每服十五丸紫蘇桑白皮煎湯下一方大異香散加五靈脂末煎紫蘇湯調下少吞紫霜丸治疳腹肚皮緊使君子丸出醫妙選方治小兒五疳下痢能食不生肌肉或抓頭揉目或頭焦筋青下痢頻久而不痊轉羸瘦並皆治之亦治小便白濁使君子三兩炒丁香木香厚朴沒石子胡黃連肉豆蔻各一兩蘆薈麝香各一兩上為末粟飯為丸黍米大每服十二丸米湯送一方煎陳皮湯乳前下千金丸出經效良方治小兒五種疳氣面色痿黃飢瘦不食乳川芎川楝肉煨等分上為細末獖豬膽汁和丸麻子大空心食前米飲下三十丸日進三服即愈更量歲數加減與之蟲上旬頭向上五服若中下旬則不效經驗方云此得於上蔡朱函相之孫子新所藏疳方最多未若此簡而效者淡豆豉丸治小兒一二歲面色痿黃不進飲食腹脹如鼓或生青筋日漸羸瘦此是乳母未斷乳而又致孕其乳為交乳實者取而後補虛者補而後取淡豆豉十粒巴豆一粒略去油上研勻如泥丸粟米大每服十丸薑湯下無時服取下魚凍汁病根除矣急與補脾脂連丸出仁齊直指方治五疳潮熱肚脹發焦胡黃連半兩五靈脂一兩上末獖豬膽汁和丸麻子大每服十五丸米飲下五疳潮熱謹勿用大黃黃芩桃柳湯出醫妙選方治小兒疳服諸藥後用此法助之桃枝二兩柳枝二兩上銼碎水兩大碗煎數沸通身浴兒畢用一青衣蓋疳蟲自出為驗吹鼻散出聖惠方治小兒一切疳棘針瓜蒂等分上搗細羅為散每服用黍粒大吹鼻中日二度一方有棘刺花消疳麝香丸出鮑氏方治疳勞肌熱面黃發穗骨立羸弱減食嗜臥蟲積驚癇並宜服之麝香研蘆薈研胡黃連為末各等分上研為細末滴水丸如黃米大一歲兒三丸三歲兒五丸至七丸人參湯下日進三服奇效無比止後於本方中加宣黃連青皮陳皮使君子肉木青檳榔上以糕糊丸黍米大每服十丸米飲下食後臥前各一服消疳化蟲長肌肉止疳痢療瘟瘧尤勝凡癲癇驚風五疳三蟲服之立效蛔動作形神枯瘁久痢不止調護最難用此如神疳藥雖多功效皆不若此香橘丸治小兒疳瘦泄瀉無時不思飲食使君子去皮一兩訶子仁面麥糵甘草厚朴薑汁製各半兩陳皮木香各二錢半上為細末蜜丸櫻桃大米湯化下一丸丁香丸出聖惠方治小兒一切疳脹母丁香二七枚胡黃連半兩黃連去須半兩硃砂一分細研蕪荑一分豬膽五枚取汁牛黃一分細研蝦蟆一枚用酒二升煮爛去骨入豬膽汁更熬成膏上為末入諸藥蝦蟆膏內和丸如粟米大空心粥飲下五丸日晚再服蝸牛丸出聖惠方治小兒一切疳蝸牛四十九枚蛇蛻二條乾蟾一枚截去前肢以前用之以上三味都燒為灰細研蘆薈一分研入夜明砂一分微炒瓜蒂二七枚黃連去須一分麝香半分細研熊膽一分研入上為末都研令勻用獖豬膽汁和丸如緑豆大每服以溫水下三丸量兒大小加減服之保童丸出聖惠方治小兒一切疳體瘦皮乾毛髮焦黃心熱煩渴殺五疳宜服青黛一兩熊膽一分黑狗膽一枚麝香半分蘆薈一分鯉魚膽五枚蟾頭灰一分蝸牛一分炒令黃為末水銀一分棗肉研令星盡上以青黛等細研次下豬膽研令勻煉蜜和丸如黃米大每服以冷水下五丸量兒大小加減服之通頂散出聖惠方治小兒一切疳吹鼻黃連一分去須白礬灰一分細研赤小豆一百粒藜蘆一分去蘆頭丁香一分干蝦蟆灰一分細研麝香一分細研熊膽一分細研上為細末都研令勻每用少許吹鼻中當有蟲出保生丸出聖惠方治小兒五疳能充肌膚悅澤顏色常宜服此干蝦蟆一枚於小罐子內以瓦子蓋勿令透氣燒灰蜣螂去翅足微炒母丁香麝香研細夜明砂微炒甜葶藶隔紙炒令紫色葫蘆子明黃連熊膽細研以上各半分上為末以軟粟飯和丸如緑豆大每服以粥飲下三丸量兒大小加減服之牛黃丸出聖惠方治小兒五疳百病無辜一切泄痢肌膚羸瘦牛黃一分細研代赭半兩細研赤石脂半兩細研牡蠣粉一分人參一分去蘆頭虎睛一對酒浸一宿微炙硃砂一分細研杏仁一分湯浸去皮尖雙仁研如泥巴豆十粒去皮心研紙裹壓去油上件藥除杏仁巴豆外為末都研令勻煉蜜和丸如緑豆大每一歲以冷水下一丸治大人小兒腹中諸疳濕用羊尿煮湯飲下治小兒腹中疳出本草以蜘蛛燒灰啖之治小兒疳後虛熱尿莖見腫出經驗良方以火煻煤灰為末清油調塗尿莖上並腹子上又方出危氏方以朴硝為末雞子清調塗尿莖上蒸雞丸一名雞肉前丸出全嬰方治小兒疳勞骨蒸潮熱盜汗瘦弱腹急面黃飲食不生肌肉日哭夜啼多渴少餐黃連一兩柴胡一兩蕪荑鶴蝨各半兩秦艽知母茯苓使君子炮去殼各一兩上為末黃雄雞一隻重一斤籠之專以大麻子飼之至五日後去毛令淨於臂後開孔去腸肚淨試干入前藥於雞腹內以綿縫之取小甑先以黑豆鋪甑底厚三寸安雞在甑中四旁以黑豆圍裹上亦以黑豆蓋好自日出時蒸至晚候溫冷取雞淨肉研和得所如硬入酒麵糊同藥末為丸如小豆大二歲十二丸以意加減米湯下無時服如下五歲病者以溫酒送下忌豬肉一方麥門冬湯下空心臨臥服香黃丸出全嬰方治小兒疳黃腹大殼熱心躁臟腑不調食物不化飲食雖多不生肌肉黃連木香肉豆蔻青皮陳皮使君子蚵蚾酒浸去骨炒蘆薈以上各一兩上為末糊丸小豆大三歲三十丸米湯下人參散出活幼口議治小兒疳熱虛煩作渴不思飲食四體沉重人參蓬莪朮川當歸龍膽草根去泥土炒令黃色炙甘草赤芍藥枳殼浸去瓤切作小片用炙令赤色白茯苓以上各等分上為末每服半錢煎麥門冬湯調服無時通神丸出仁齊直指方治小兒冷熱疳其症瀉多膿血日加瘦弱胡黃連川黃連各三錢木香蕪荑炒各二錢丁香肉豆蔻使君子炒肉各一錢大蝦蟆干一枚銼碎水煮爛研膏上為末膏和丸麻子大每服十丸米飲下集聖丸德生堂經驗方治諸疳通用蘆薈北五靈脂夜明砂焙縮砂橘皮青皮去白蓬莪朮煨木香使君子略煨取肉二錢鷹爪黃連蝦蟆干炙各三錢上末雄豬膽二枚取汁和藥糕糊丸麻子大每五十丸米飲下疳勞瘦弱本方加當歸一錢半川芎三錢治小兒疳上用茺蔚子益母草絞汁稍服疳啞不能發聲出仁齊直指方上以肥兒每服十五丸用蘇合香丸一粒入硃砂五靈脂末各少許菖蒲煎湯調下靈砂丹出醫方妙選治因嗽成疳最宜服之人參半兩甜葶藶五靈脂胡黃連各一分辰砂半兩麝香蘆薈杏仁炒去皮尖各一分上細末粳米飯和丸如黍米大每服十粒煎人參湯下量兒大小加減豬肚丹出醫方妙選治小兒疳瘦盜汗多倦少力大便有蟲曾經大效川黃連胡黃連木香各一兩羌活蘆薈肉豆蔻鱉甲酥炙白蕪荑各半兩上為細末獖豬肚一個洗淨先以好香白芷二兩內肚蒸熟去白芷不用卻入諸藥縫合再蒸如泥取出同豬肚搗二三百下成膏丸如黍米每服十丸米飲下不拘時候量兒大小加減青金丸出聖惠方治小兒一切疳蝦蟆三分塗酥炙黃焦夜明砂微炙鶴蝨半兩黃連去須麝香研細膃肭臍酒刷炙微黃砒霜以熱絹裹取生豬肉止二十斤重裹炙豬肉熟取出上為末研入麝香令勻煮棗肉和丸如梧桐子大三歲以上以粥飲破研一丸服五歲以上相度加丸服之通頂散出聖惠方治小兒一切疳白礬灰一分赤小豆一百粒藜蘆一分去蘆頭丁香二十枚黃連一分去須田父一枚麝香一錢細研定粉一錢上為散入麝香同研令勻每使時候兒睡著以粳米添內入鼻中有蟲出似馬尾長二三寸便去病也延命牛黃丸出聖惠方治小兒五疳羸瘦牛黃硃砂雄黃麝香龍腦以上各一錢瓜蒂三十枚為末丁香一分末蟾酥半分上細研用溫水浸蟾酥和丸如黍米粒大每服先以溫水化二丸滴兩鼻中令嚏五七聲再溫水下三丸日三服肥兒丸出全嬰方治小兒疳病者多關乳食不節至此或因久患臟腑胃虛蟲動日漸羸瘦腹大不能行走好食泥土發豎發熱面無精光此藥殺蟲黃連神麯炒各一兩使君子炮去皮麥糵炒各半兩肉豆蔻炮檳榔三錢木香炮三錢上為末糊丸小豆大三歲三十丸米湯送下無時日進三服量兒大小以意加減忌生硬冷物一方豬膽汁為丸鱉甲散出楊氏寶書治疳勞骨蒸鱉甲九肋者沸浸洗用童子小便塗炙黃連黃耆蜜炙白芍各一兩生熟地黃地骨皮當歸去蘆人參去蘆各半兩上為粗末每服二錢水半盞煎至三分去滓不時服宮氣方出政和本草治小兒一切疳疼日漸羸瘦取舊死蝸牛殼七枚皮薄色黃白者浮洗不得小有塵滓曬乾內酥於殼中以瓷盞盛之紙糊盞面飯蒸之下饋時坐中甑裝飯再蒸即已取出細研如水澱漸漸與吃令一日盡為住一方用蜜同蒸名蝸牛煎蘆薈丸出聖濟總録治小兒氣疳蘆薈研鉤藤別搗末各一兩雄黃青黛研各半兩蟾酥研熊膽研麝香研水各一錢上同研勻入豬膽為丸如緑豆大每服日二空心臨臥荊芥湯下三丸至五丸二歲以下兩丸肥肌丸出仁存方治小兒疳瘦羸手足枯細腹大筋青食不生肌苦參一兩龍膽草一錢上為末以糊丸如麻子每服二三十丸米飲下與下藥相間服川楝子去枝川芎各一兩上為末以糊丸如麻子大每服三十丸米飲下鱉血丸出危氏方治疳癆人參半兩川芎蕪荑北柴胡各一兩使君子二十一枚胡黃連川黃連各三兩上用鱉血一盞吳茱萸一兩拌和二連淹一宿次早炒乾透出茱萸並血只用二連夾余藥杵末粟米粉糊丸麻子大每服二十丸食前熱水下木香丸出錢氏小兒方治小兒冷疳多渴好睡冷地煩躁啼叫飲食不進漸瘦其候難明上件證候有若熱證但大便滑泄百藥不效者是也木香青黛別研檳榔白豆蔻去皮各二錢半續隨子去皮炙一兩淨麝香少許小蝦蟆三枚須用街市間活者連皮燒灰存性上為末煉蜜為丸麻子大薄荷湯下一歲十丸加至三十丸香蟾丹出醫方妙選治肌瘦面黃胸高腳細乾蟾五枚水浸去骨用瓦一個頂頭上取間入蟾瓶內鹽固濟米炭火燒留竅子煙息為度取出放地一宿出火毒蛇蛻皮一兩燒灰地龍半兩炒天竺黃一分蟬殼一分以上併為細末次入硃砂半兩研麝香一分研胡黃連二兩上一處研勻糯米飯和丸黍米大每服十粒米飲下不拘時候量兒大小加減金靈散出全嬰方治小兒久患疳疾體虛不食及諸病候天柱骨倒醫者不識謂之五軟白殭蠶直者炒上為末三歲半錢薄荷酒調下用生筋散貼之方在本類後椿白皮丸出本草治小兒疳以椿白皮日乾為末淘粟米去泔研濃汁糊和丸如梧子大十歲三四丸量數加減一丸內竹筒中吹入鼻中香甲湯出醫方妙選治截疳辟邪藜蘆一兩沉香牛蒡子微炒訶子肉微炮安息香鱉甲塗酥炙黃乳香各半兩上為細末同乳香拌勻每服一錢水八分人參少許煎四分去滓放溫服量兒大小加減青金丹一名奪命保生丹治小兒一切疳神祕百發百中極驗方雌蟾三枚仍以端午日午時取之繩手系兩腳稍寬得所勿令損傷以胡黃連一寸許當以線系一半令入蟾口中須系定令倒懸之以生銅器盛取蟾涎至黃昏卻解放勿令傷損只取其涎蟾肚下有斑點者是雄不堪用白淨者是雌蟾也青黛蘆薈人糞蟬殼豬牙皂莢雄黃上各一分上用瓷瓶一所內藥入瓶中密蓋瓶口黃泥固濟候乾以炭火燒之令通赤去火待冷打破瓶取藥細研為末用蟾涎並麝香一分和研令勻丸如緑豆大生銅盒子盛之如有小兒患一切疳先令暖漿水浴以軟帛子拭乾後便以溫水下五丸量兒大小加減服之若藥干便以乳汁浸化破與服須臾似醉勿怪此是藥力蟾涎較少和藥較硬即便添入乳汁相和研為妙田父丸出聖惠方治小兒一切疳田父一枚塗酥炙蛇蛻一條母丁香二七枚夜明砂一分微炙乾漆半兩搗碎炙令煙出硃砂半兩研細麝香一分研細上為末先取半兩用醋一中盞熬成膏後入余藥和丸黍米大每服以粥飲下三丸量兒大小以意加減青黛散出聖惠方治小兒一切疳吹鼻間命散如嚏多疾輕易療如不嚏者必死矣青黛半兩細研細辛半兩瓜蒂一分麝香一分細研乾地龍一分微炒蘆薈一分細研黃連一分去須上為細散每用少許吹在鼻中得嚏即吉蘆薈丸出和劑方治疳氣羸瘦面色萎黃腹脅脹滿頭髮作穗揉鼻咬甲好吃泥土痢色無定寒熱往來目澀口臭舌齦爛黑常服長肌退黃殺蟲進乳食大皂角燒存性一兩青黛研一分蘆薈硃砂研水飛麝香研各一錢干蝦蟆燒存性為末一兩入上項藥上研勻用湯浸蒸餅和丸如麻子大每服三歲兒服三十丸不拘時候溫水飲下更量兒大小加減蛇蛻皮丸出聖惠方治小兒五疳形體羸瘦蛇蛻皮燒灰一條麝香半分研細蚱蟬四枚微炒去翅足夜明砂一分微炒地龍一分微炒乾蟾一枚炙令黃焦青黛一兩細研上為末以糯米飯和丸緑豆大每服以粥飲下五丸日三服量兒大小加減服之胡黃連丸出聖惠方治小兒五疳面色黃瘦身體壯熱雖吃乳食不能消化眼澀疼胸膈痰涎愛食酸鹹常多瀉痢胡黃連母丁香黃連微炒去須蘆薈研細熊膽以上各半兩蟾頭一枚塗酥炙焦黃麝香一分細研上為末用牛黃丸如緑豆大若小兒心臟疳煎蕪荑甘草湯下三丸食疳瀉血成赤白者以新汲水下三丸吐逆不止及水瀉生薑湯下三丸眼疳羊肝血和酒看多少微煎過下三丸量兒大小以意加減服之雄黃丸治小兒五疳毛髮乾黃吃食不恆雄黃細研麝香細研蟾頭一枚炙令黃焦胡黃連蘆薈細研以上各二分硃砂半兩細研水飛過上為末都研令勻以豬膽汁和丸如緑豆大每一歲一丸以新汲水下日三服麝香丸出錢氏方治疳氣羸瘦白蟲作胡黃連白蕪荑去扇各一兩半黃連木香各半兩辰砂一分別細研麝香一錢別研上為細末麵糊為丸如緑豆大米飲下五七丸至十丸五歲以上者可十五丸至二十丸服無時麝香丸出全嬰方治小兒諸疳消瘦骨熱面黃愛吃泥土灰炭茶紙發稀焦黃小便白濁口鼻生瘡腹脹氣粗常服化蟲蚵蚾酒浸去骨炙黃胡黃連蘆薈各半兩使君子半兩炒木香二錢半麝香一分上為末豬膽為丸小豆大三歲三十丸米湯下豬肚丸出楊氏寶書治骨蒸疳勞人羸瘦神效木香半兩宣連生地黃青皮各一兩銀州柴胡去蘆鱉甲九肋者童子小便炙如前法一兩上末用豬肚一枚入藥於內麻線扎定口內懸肚煮取出細研豬肚為丸如麻子大米飲下不計時日三服大小以意加減肥兒丸出活幼口議治小兒一切疳氣肌瘦體弱神困力乏常服殺蟲消疳開胃進食黃連一分去須川楝子肉炒半兩川芎半兩木香二錢陳皮香附子各一分上為末水煮細麵糊為丸麻子大每服三五十丸溫飯飲下之議曰驚疳積痢各分證候用藥今有小兒患疳虛因久作痢疾二候相加最為患重疳前並行臟腑虛乏之極熱毒差重皆系積之久滯雖系積無積可療乃虛受之然謂其虛之不及所見其證不得良方以何對治雖獲良方不審其候亦難療也良由脈與病同藥與證對醫工運巧扶而起之必得安樂胡黃連丸無以加諸肥肌方亦名佐勝六神丸出全嬰方治小兒羸瘦臟腑怯弱泄痢虛滑乳食減少引飲無度心腹脹滿丁香木香肉豆蔻去殼各半兩三味用麵裹同入慢灰煨令面熟為度取出放冷訶子煨去核使君子各半兩蘆薈細研一兩上為細末以棗肉和丸如麻子大每服三五丸至七丸溫米飲下乳食前服爛飯丸如黍米大一歲二十丸一方黃羸指大熔入雞子一個碎和炒熟令兒食盡吞下上丸並治休息疳瀉如神湯氏方一不用棗肉為丸飯飲入脾也五疳消食丸出和劑方治小兒五疳八痢腹臟蟲蝕療疳榮及走馬牙疳齒疼唇爛肚大筋青此藥大能進食悅顏色長肌膏麥糵使君子炒去皮黃連去須微炒橘紅草龍膽蕪荑各等分上為細末粟米糊為丸如粟米大每服二三十丸空心米湯吞下不拘時候量兒歲數加減蝦蟆丸出和劑方治小兒五疳八痢腹脹面黃肌膚瘦癢時作寒熱不思乳食愛吃泥土揉鼻咬甲頭髮作穗不長肌肉多生瘡癬大便無時小便如泔嘔吐乳食痢色無定或吃交奶日漸黃瘦變成疳疾並宜服之蝦蟆使君子炒皂角燒各二兩青黛研二兩半龍膽草去蘆四兩雄黃研水飛二兩上為細末入研藥令勻水糊為丸如粟米大每服一歲兒七粒二歲十粒三歲二十粒隨乳下飯飲亦得不計時候使君子丸治小兒五疳使君子一兩黃連二兩丁香五錢訶子二兩煨用皮木香一兩肉豆蔻一兩上用麵裹煨去面為末用薄荷糊為丸小豆大每服二十丸米飲下
