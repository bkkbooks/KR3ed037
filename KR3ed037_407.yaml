body:
  text: 卷四百七嬰孩諸瘡腫毒門赤瘤附論夫小兒身上或一片片赤色如胭脂染及熱漸引者此名丹毒俗謂之瘤若因熱而得者色赤或因風而得者色白皆腫而壯熱也可用一小鈹刀鐮盡去惡血其毒未入腹者可療也方升麻散治小兒心熱煩躁遍身赤色如胭脂皮膚上壯熱川升麻半兩川大黃半兩微炒犀角屑一分黃芩一分川朴硝半兩梔子仁一分木通一分玄參半兩甘草一分炙微赤上搗羅為散每服一錢以水一小盞煎至五分去滓放溫不計時候量兒大小分減服之木通散治小兒身體赤流片片赤色如胭脂染毒氣漸引者川大黃半兩炒川朴硝半兩梔子仁一分甘草一分川升麻半兩木通一兩上搗羅為散每服一錢以水一小盞煎至五分去滓量兒大小加減溫服大黃散一名截毒散治小兒赤流熱如火川大黃半兩生用鬱金半兩黃蘗半兩膩粉半兩豬牙皂莢去皮各半兩上搗為散以生油調塗之一方無黃蘗有芍藥又方護火草汁三合赤地利末一錢膩粉一錢上藥相和量兒大小分減服之良久瀉下血片為效其滓敷在赤處亦佳治小兒赤流半身色紅漸漸展引不止川大黃一兩生用赤小豆半合炒令紫色川朴硝三分上羅為末以雞子清調塗干則易又方牛膝一兩去苗甘草半兩生用上細銼以水一大盞煎至五分去滓調伏龍肝末塗之效驗又方李子油三兩硃砂一分末上藥調如膏塗之又方用醬汁塗之又方用摩蘿汁塗赤處隨手便瘥又方用蕎麥麵以醋調塗之不過三兩上瘥又方用胡荽汁塗之又方用白礬一兩以水煮冷熱得所洗之又方用燒粉家洗甕水塗之又方用紅藍花末以醋調塗之又方用蕓薹葉搗爛塗之又方用砒霜不限多少細研於硯中著水入霜以墨濃研用筆點塗之良久以冷水洗後更塗以瘥為度又方用栝蔞根搗末以醋調塗之干即再塗又方用糯米水研如粥塗干再塗又方用粟粉炒令黑以唾調塗之朱流朱風針刺流頭出血點麻油刺用朴硝赤小豆大黃薄荷側柏上為末水調苦菜汁刷赤處周匝仍服羌活散柴胡湯並加荊芥防風蟬蛻仍審虛實用藥可也身有赤處附論夫小兒因汗為風邪毒氣所傷與血氣相搏熱氣蒸發於外其肉色赤而壯熱是也方丹參散治小兒身上有赤引於頰上或口傍眼下赤如胭脂四上皮即皺剝漸漸引多此是心熱血凝所為其治法宜以小刀子鋒頭鐮破令血出後宜服此藥丹參一分黃芩一分麻黃半兩去根節葛根一分枳殼一分麩炒微黃犀角屑一分上搗羅為散每服一錢以水一小盞入竹葉十片竹茹半分煎至五分去滓放溫不計時候量兒大小分減服之麥門冬散治小兒身上有赤煩熱麥門冬半兩去心蘆根半兩銼葛根半兩銼犀角屑半兩漏蘆半兩甘草半兩炙微赤上搗羅為散每服一錢以水一小盞入竹葉十片煎至五分去滓放溫不計時量兒大小分減服之鉛霜散治小兒身上有赤瘀腫或如火丹煩渴渾身赤引壯熱鉛霜半兩緑豆粉半兩上細研為散以蕓薹菜汁調塗之又方伏龍肝半兩亂髮二兩燒灰上細研為散以水調塗赤處效一方以膏和敷之又方用桃仁湯浸去皮研令爛以面脂和塗又方用黃蒿穗以水濃煎湯入鹽少許溫溫洗之又方用白礬細研以生油調塗之又方用芭蕉根搗絞汁塗之又方用水中苔搗末以水調塗之又方用川芒硝以水研塗之又方治小兒身有赤腫起者用熬米粉令黑以唾和敷之熛瘡附論夫小兒熛瘡者由風熱毒之氣所傷客於皮膚生熛漿而潰成瘡故名熛瘡也方梔子膏治小兒熛瘡梔子仁川升麻犀角屑各半兩蛇銜草三分藍葉一兩生地黃一兩黃芩半兩川大黃一兩上細銼以豬脂一片同放鍋內以微火煎令藥色變濾去以磁盒盛候冷塗之水銀膏治小兒熛瘡水銀一兩膩粉一分與水銀於手掌中以津研如泥松脂一兩土蜂房一兩黃蘗一兩川大黃一兩生用上搗羅為末以煉成豬脂一斤與藥末同入鐺中慢熬令稀稠得所將水銀膩粉入膏中攪令勻膏成以磁合盛候冷塗之不過三五上瘥硃砂膏治小兒頭上熛漿起如釘蓋一兩日後皮面及胸背生瘡硃砂半兩胡粉二兩水銀半兩上點少水都研令水銀星盡以臘月豬脂三兩入銚子內慢火上熔化去滓入硃砂等攪成膏以磁合盛候冷塗之瘥治小兒卒得熛瘡赤爛用牛糞燒灰細研敷瘡上日三用之治小兒瘡初起熛漿似火瘡名曰熛瘡亦名爛瘡用桃仁熟搗以面脂和敷之亦治遍身赤腫起又方用馬骨燒灰敷之治小兒卒得熛瘡爛瘡用鐵煅淬水中二七遍以浴兒二三遍起作熛漿瘡生地黃膏治小兒熛漿瘡毒氣發於遍體者生地黃川升麻藍葉梔子仁川大黃各一兩上細銼以豬脂八兩同於鍋內以慢火煎令藥色變濾去滓以磁合盛候冷每用少許塗患處疥附論夫小兒瘡疥率因於蟯蟲變化而生小兒多此疾仍喜生於手足指縫間浸淫遍體近暖及衣服過厚則癢悶不任搔之黃汁出疼痛不止蓋由風熱客於脾肺散於肌肉熏發皮膚使然有人來買苦參欲治疥不識藥性緩急但問人參可治濃煎碗服之須臾大吐涎一盆三二日疥即痂矣方苦參丸治小兒風熱肺疳皮膚生疥鼻內瘡癢苦參四兩以酒三升熬成膏胡黃連二分楝實去皮炒蕪荑炒蜣螂去足翅炙木香各二兩上搗羅六味為末入苦參膏內和搗如硬入蜜少許和丸如麻子一二歲兒每服五丸食後溫水下更量兒大小加減治小兒瘡疥體熱黃連去須為末糯米粉各二兩水銀一兩研胡粉炒一兩半吳茱萸湯浸炒為末赤小豆為末各一分上先以水銀和津於手中研如泥次以豬脂四兩入磁器內慢火化去滓下五味藥末攪勻成膏先洗瘡拭乾塗之雄黃膏療小兒瘡疥瘙癢搔之成瘡膿不止宜用膏拭乾塗之雄黃研雌黃各一兩烏頭一枚松脂亂髮各一雞子大許豬脂一斤上件藥除雄黃雌黃外以煉成豬脂一斤於鐺中煎出油下烏頭松脂亂髮等候烏頭色黑亂髮消盡膏成綿濾去滓入雄黃雌黃攪令勻盛於不津器中候冷塗瘡上日三用之黃蘗散治小兒疥身上熱瘡並治之黃蘗一兩炙黃連一兩去須赤小豆一兩臭黃一兩水銀半兩硫黃一分水銀結為砂子上搗羅為末與臭黃水銀砂子同研令細用生油調日三塗之效一方無硫黃名三黃散黃連散治小兒瘡疥體熱黃連去須黃蘗去粗皮炙秫米炒各一兩赤小豆膩粉研各一分上搗研為散油塗舊帛上先洗去瘡痂封之蛇床子散治小兒瘡疥瘙癢不止蛇床子茱萸湯浸焙炒硫黃研蕪荑仁研各一分膩粉少許研上搗研為細末用油一合入蔥一莖同煎候蔥黃色停冷調藥塗之硫黃同研黃連散治小兒疥遍身皆有疼癢不止黃連二兩去須胡粉吳茱萸一兩赤小豆一百粒水銀二兩與胡粉點少水同研令星盡上除胡粉水銀外搗羅為末入胡粉水銀同研令勻以臘月豬脂和塗之亦治瘑瘡苦參湯治小兒疥及諸瘡洗浴苦參丹參苦楝根各半兩防風半兩去蘆頭蒴藋根三兩上細銼和勻以水一斗煎至五升濾去滓於密室中洗浴兒以故帛拭乾即塗前膏臭黃膏治小兒胎中受風長後身體生疥瘙癢不止臭黃二分硫黃一分蔥白一莖細切上研細用清油一兩入鍋子內熬令熱下少許臘及蔥白次下硫黃臭黃攪令勻膏成以磁閣中盛漸漸塗之治小兒疥癢不止方硫黃二兩白礬灰四兩上細研為散以烏麻油調如稀麵糊炙令熱薄塗摩之治小兒疥瘡用亂髮灰以豬膏和塗之治小兒疥癢痛不可忍硝石一兩上細研為散以生油調如膏每用時先以故帛拭乾塗之又方用羊蹄根搗末以豬脂和塗之又方用硫黃細研以醋調敷之治小兒疥用燒竹葉為灰雞子白和敷之日三次亦治疥瘡又方用臭酥胡粉敷之治小兒頭面瘡疥用麻子五升為末以水和絞取汁與蜜和敷之若得白犬膽敷更佳治小兒去瘡疥鬼疰驚癇用虎骨煮汁浴治小兒壯熱一切瘡疥皮膚瘙癢用梓白皮煎湯洗之梓白皮有數般惟楸梓佳余不堪治小兒瘡疥以繭子蛹汁為湯浴之故能殺蟲治小兒瘡疥以枕村煮湯浸洗之良癬附論夫小兒體有風熱脾肺不利或濕邪搏於皮膚壅滯血氣皮膚頑厚則變諸癬或長或圓漸漸長大得寒則稍減暖則癢悶搔之即黃汁出又或在面上皮如甲錯乾燥謂之奶癬此由飲乳乳汁漬著乃生復以乳汁洗之即瘥方雌黃膏治小兒瘑癬風癢不計乾溼瘙癢不絶雌黃研黃連去須莽草蛇床子炒黃蘗去粗皮炙苦參蕪荑炒各半兩藜蘆硝石研各一分松脂二兩半杏仁湯浸去皮尖雙仁別研如膏一兩上除雌黃松脂杏仁外搗羅為末取臘月豬脂入鐺中煎令沸下杏仁次下諸藥末攪勻凝為膏每用先以醋泔洗拭乾塗之一方於故帛上貼日二換之雄黃膏治小兒癬久不瘥雄黃細研多年薤根白礬藜蘆去蘆頭瓜蒂胡粉各一分水銀三分與胡粉點少水同研令星盡上搗羅為末入胡粉水銀同研用豬脂調為膏輕擦塗之附子散治小兒濕癬附子生用去皮臍雄黃研白礬燒灰研吳茱萸湯浸炒各一兩米粉半兩上搗研羅為散每日三次用綿搵撲之白礬膏治小兒癬痛不止白礬灰硫黃膩粉各一錢緑礬半兩川大黃一分末上藥同研為末以米醋一升熬如黑餳收於磁器中旋取塗之妙金華散治小兒一切乾溼瘡癬疳瘡等黃蘗末黃連各半兩為細末黃丹一兩水飛輕粉一錢麝香一字研上用研勻先以溫水洗後貼之如干癬瘡用臘月豬脂和敷如無用麻油亦可桑螵蛸散治小兒一切瘡癬癢痛不止桑螵蛸十枚燒存性二分膩粉一錢麝香半錢上研為散生油角調翎掃候乾有裂處再掃青金散治小兒濕癬浸淫瘡白膠香二兩研蛤粉半兩青黛二錢半上研勻為細末干糝瘡上治小兒癬雜瘡白膠香黃蘗輕粉各等分上為細末以羊骨髓調塗癬上桃紅散治小兒奶癬瘡明礬煅二兩嫩松香四兩末黃丹二兩煅上為末用燭油調敷之雄黃散治小兒乾溼癬雄黃麝香各一分上細研為散山甲煎油調塗之干再上治小兒癬不計乾溼瘙癢不絶羊蹄根一兩干筍一兩燒灰上為末以麻油調塗之治小兒久癬獨蓄根去土一把附子二枚去皮臍生用上搗令爛以好酒和塗之每塗藥時先以皂莢湯淨洗拭乾後用藥日二塗之治小兒乾癬方水銀半兩胡粉一兩上二件藥點少水同研令星子盡以雞冠血和塗之治小兒諸瘡及瘙癢用羊蹄根取汁以蜜和勻先刮瘡四邊以藥塗之半日許拭去更以陳米醋和羊蹄根滓敷瘡上又方用槐白皮五兩銼以水一升煎三五沸候冷數洗之治小兒乾溼癬用乾蟾燒灰細研以豬脂和塗之治小兒癬久不瘥黃礬一兩燒灰上細研每用先以水淨洗拭乾塗之又方用薤根以醋搗和塗之又方用醬瓣雀糞相和研塗之又方用楮樹白汁塗之治癬瘡內有蟲癢不可忍兼治濕癬蛇床子一味碾為細末上以滓泡湯洗拿令破次用臘月豬脂和敷患處一日二次用一方先煎韭菜湯洗炙甲散一名前甲散治眉叢中生瘡名曰煉銀癬用川山甲前膊鱗炙焦為末清油輕粉和敷治小兒濕癬用桃樹青皮為末和醋敷上日二又方用枸杞根搗作末和臘月豬脂敷之又方用煎馬尿以洗之甚妙效又方上揩破以牛鼻上津敷之治癬及室女花癬小兒奶癬用韭菜根汁先搽破次塗之治襁褓小兒面上生奶癬用白膠香碾為極細末酸漿水調敷一日兩上治小兒奶癬瘡用燒狗屎灰和豬脂塗之摩風膏治小兒遍身疥癬癢苦參瀝青蕪荑炒黃臘各一錢巴豆五粒去殼輕粉五分真麻油半兩蠍二個上同油煎至巴豆焦濾去所煎物入輕粉和勻敷疥切效黃連膏治小兒癬疥赤腫及濕癬久不瘥黃連去須黃蘗去粗皮炙蛇床子炒䕡茹礬石炙微別研水銀手掌內唾研如泥入膏中各一兩上搗羅前四味為末以臘月豬脂四兩同入銚子內煎四五沸下礬石末又煎三兩沸取下良久下水銀攪如稀泥候冷先以清泔皂莢湯洗拭乾以火炙癢塗之日三芍藥散治小兒奶疥癬癩赤芍藥黃連蛇床子上為末入輕粉半錢麻油調塗洗破立效忌動風物羊蹄散治小兒頑癬久不瘥羊蹄根四兩銼白礬半兩上爛研末入醋小半盞塗不住手塗之候覺癬癢至痛即止至隔日去浴不過三兩次愈絳玉散治小兒頭上並身上疳癬時復癢痛皮膚破爛濕潤不可黃丹炒紅二兩緑豆粉炒黃二兩上為細末雞羽清油調掃於瘡上後摻聖金散大有神效聖金散石膏一兩黃芩一兩上為細末每用不以多少乾摻在瘡上復以絳玉散摻神效月蝕瘡附論夫小兒耳鼻口間生瘡者世謂之月蝕瘡其瘡隨月生死因以為名也世云小兒見月初生以手指指之則令耳下生瘡故呼為月蝕瘡也凡日月蝕時忌食飲腹中生𧈟蟲及房室生子不具足必患月蝕瘡亦不得與兒乳日月生後乃不忌令人口臭齒齦宣露常有血出舌上生瘡者皆由犯此所致耳日月蝕時須救不救出行逢暴雨其救月杖須收取治𧈟之神藥患此者以之救療方水銀膏治小兒月蝕瘡生在兩耳上出膿水不止水銀二兩胡粉一兩點少水與水銀同研令星盡黃連二兩去須搗羅為末松脂一兩上入乳鉢內研令勻以粉瘡若干用煉成豬脂和如膏每用先以鹽湯洗瘡令淨拭乾然後塗之治月蝕惡瘡硫黃䕡茹斑蟊上治下篩敷瘡上乾者以獖脂和敷之日三夜一又方地榆根薔薇根吳茱萸根各三兩上治下篩以鹽湯洗瘡敷之日三白礬散治瘡生於兩耳鼻口間時瘥時發乃是濕搏血氣之所生也世謂之月蝕瘡隨月生死因以為名世云小兒見月初生以手指指之則令耳下生瘡白礬蛇床子各一兩黃連半兩上為細末乾摻瘡上水停塗亦得一方加黃柏三錢薔薇散治小兒月蝕瘡薔薇根一兩細銼地榆根銼虎頭骨各半兩上搗羅細末每用一字先以溫鹽湯淨洗拭乾敷之治月蝕瘡久不瘥乾蟾一枚五月五日者燒灰硫黃一兩細研白礬二兩燒令汁盡上細研為末用敷瘡上治小兒月蝕瘡蜻蜓一枚母豬蹄甲一枚救月杖一合上燒為灰研為散以蜜水和塗治小兒耳邊鼻下赤爛濕癢名月蝕疳瘡黃丹煅令赤色一錢緑豆粉一錢白礬一錢飛過上研細干敷瘡上唾調亦可治小兒月蝕瘡立效方敗鼓皮一兩燒灰蝦蟆一枚燒灰上細研為散煉成豬脂和如膏塗之即瘥治小兒疽極月初即生常有黃水出上用酢和油煎令如粥及熱敷之二日一易欲重敷則以皂莢湯洗瘡乃敷之為妙治小兒月蝕瘡隨月生死上以胡粉如酥敷之五日瘥又方以水和塗之治月蝕九竅皆有瘡者耳後或耳下或鼻內生瘡是也上燒蚯蚓屎末和豬脂膏敷之清油亦可治小兒初得月蝕瘡用五月蝦蟆燒杵末豬脂和敷之療月蝕瘡用虎頭骨二兩杵碎同豬脂一斤熬令骨黃取瘡塗上治小兒初生月蝕瘡及惡瘡用蛇蛻皮燒灰為末和豬脂敷上治小兒月蝕瘡用小麥糵搗羅為末敷之又方用黃連為末敷之又方用胡粉和土等分研如粉敷之上用東方壁土又方用敗鼓皮燒灰細研以豬脂和敷之治月蝕瘡用蟾酥燒灰為末豬脂和敷之又方治瘡發用桃仁搗和蕎麥敷砂糖拂之熱瘡附論夫小兒熱瘡者是諸陽氣在表陽氣盛則表熱小兒解脫腠理開則為風邪所客風熱相搏留於皮膚則生瘡初作癛漿黃汁出風多則癢熱多則痛血氣乘之則多膿血故名熱瘡也方黃芩膏治小兒熱瘡黃膿出黃芩一兩半黃蘗三兩梔子仁三分黃連三分去須竹葉二兩生地黃二兩半胡粉三分川大黃一兩水銀一兩入水少許與胡粉同研令星盡上除水銀胡粉外並銼如豆大以新綿裹用豬脂一斤半入鐺內於慢火上煎十餘沸候藥色紫去綿以布絞取汁候凝下水銀胡粉以柳木箆攪令勻膏成以磁合盛日夜三四度塗之黃芩散治小兒熱瘡生於身體黃芩三分川升麻一兩石膏一兩甘草半兩炙微赤玄參半兩柴胡一兩去苗川大黃一兩銼碎微炒上搗為散每服一錢水一小盞煎至五分去滓令溫量兒大小加減服之梔子膏治小兒熱毒瘡梔子仁一兩川升麻一兩犀角屑三分蛇銜草一兩藍葉切五合生地黃二兩黃芩一兩上細銼以豬脂一斤半同入鐺中於微火上煎令十餘沸濾去滓膏成於磁閣中盛塗於故帛上貼之水銀膏治小兒熱瘡水銀胡粉松脂各三兩上以豬脂四升煎松脂水氣盡下二物攪令勻不見水銀以敷之枳殼散治小兒身上生熱瘡心燥皮膚焮痛枳殼半兩麩炒微黃去瓤甘草半兩炙微赤銼黃連半兩去須上羅散每服以蜜水調下半錢量兒大小加減治小兒熱瘡黃膿出黃蘗一兩銼白礬一兩燒令汁盡上羅為散敷於瘡上日三用之又方黃連半兩去須為末膩粉一分上研令勻以甜菜汁和塗於瘡上日三用之又方治小兒熱瘡黃膿出及治惡瘡用豆豉炒乾搗末敷之又方用伏龍肝搗末用雞子白和塗之雞子膏治孺子熱瘡以亂髮一團梨許大雞子黃煮熟二物相和於銚子內炭火上熬初甚干少頃發焦遂有液出旋取置一磁盞中以液盡為度取此液敷熱瘡上即以苦參粉之劉禹錫云豫在朗州生一子在於蓐中便有熱瘡出臀腿間初生以他藥敷無益日加劇蔓延半身壯候至重晝夜啼號不乳不睡豫閲本草見發髲云合雞子黃煎之消為水治小兒驚熱注云今俗中嫗母為小兒作雞子煎用發雜熬久得汁令小兒服去痰熱治百病凡用發皆取梳頭亂者又檢雞子云治火瘡因而用之果驗已後用之無不瘥治小兒熱瘡身頭熱煩蝕瘡以梓白皮作湯浴之並封敷臍中瘡附論夫小兒臍瘡者由初生斷臍洗浴不即拭乾濕氣在臍中因解脫遇風風濕相搏故臍瘡久不瘥也臍瘡不瘥風氣入傷經脈則變為癇也方治小兒臍瘡黃蘗一兩釜底黑煤三分亂髮灰一分上先搗黃蘗為末入二味合研令勻以敷臍中治小兒臍赤腫杏仁半兩豬頰車髓十八銖上先研杏仁如脂和髓敷臍上腫處治小兒臍瘡久不瘥干蝦蟆一兩燒灰白礬一分燒灰上合研令細以敷臍上又方黃連半兩為末胡粉半兩上合研令細以敷臍中治小兒臍中生瘡用桑汁敷乳上便飲之又方用飲羖羊乳及血治小兒風臍遂作惡瘡歷年不瘥用東壁上土敷之大佳若汁不止燒蒼耳子粉敷之又方用干蠐螬蟲末粉之不過三四度瘥治小兒臍不合用車轄脂燒灰日一敷之又方用燒蜂房灰為末敷之治小兒臍中生瘡用燒甑帶灰和膏敷之白石脂散治小兒臍汁出不止兼赤腫用白石脂研熬令微暖以粉臍瘡日三四度治小兒臍風瘡久不瘥用馬齒莧葉燒末敷之治小兒瘡久不瘥用龍骨燒灰細研敷之治小兒臍中汁出不止並赤腫用礬燒灰細研敷之治小兒臍腫用桂心炙令熱尉之日可四五度治小兒臍瘡久不瘥用蝦蟆一枚燒灰細研敷之又方用香豉炒令焦搗羅為末敷之又方用伏龍肝細研敷之治小兒臍瘡不合以黃蘗末塗之凍爛瘡附論夫小兒肌肉柔脆外邪易侵故風寒搏於肌肉凝於氣血則致皴裂而生瘡或癢或痛其狀焮腫破出血汁在兩耳或手足間故謂之凍爛瘡方柏葉膏治小兒凍爛瘡手足指欲墮及耳欲落柏葉炙乾為末三兩麻油三兩頭髮一團如雞子大鹽研一分乳香研半錢蠟半兩杏仁二十枚湯浸去皮尖別研如膏上先煎油蠟沸即下諸藥以發消為度攪勻貯磁器中每用先以小便洗瘡綿纏手指挹干厚塗膏即以軟帛裹之如腳指相淹處尤須多用膏裹帛紗厚以綿裹勿令寒氣得入每兩日一洗瘡換藥稍愈後三四日一換治小兒手足被凍皹裂欲脫方川椒芎藭各半兩白芷一分防風一分乾薑一分上搗碎以水一大盞煎令濃去滓稍熱數用塗之白蘞湯小兒冬日乳母不慎調適為寒氣傷於皮膚搏於血令焮腫生瘡俗呼為煉瘡或偏發耳上及手足是也一名白蘞散一名黃蘗膏白蘞二兩白芨半兩生麻油一兩生搗爛上將白蘞白芨同搗羅為散與油同研勻更入炊萊蔔一枚爛以酒調如糊先以童子小便洗手後塗手上一方有黃蘗蜀椒散治小兒冷手皴折痛及腳瘃腫硬宜用淋蘸方蜀椒去目並閉口者炒去汗鹽各二兩上以清酒五升煎至二升數蘸之其藥可五六日用附子散治小兒冷足爛瘡附子生搗二枚乾薑炮二兩上搗羅為散入綿中裝襪如有瘡膿即調臘月豬脂塗之小麥湯治小兒冷腳或癢或痛成瘡小麥半升稻草三握銼上用醋一升水二升同煎至二升去滓放溫洗足夜間頻洗之效白蘞散治凍耳成瘡或癢或痛一名黃蘗散黃蘗白蘞各半兩上為末先以湯洗瘡後用清油調塗獖豬𦚠膏治小兒凍耳並手面皴痛用獖豬𦚠一具研如膏入漿水少許候稀稠得所先用童子小便洗手面後以匙抄少許勻塗手面上一方以熱油浸一宿洗之藺花散治凍瘡久不瘥用馬藺花子為末煎湯帶泄淋洗生附散治腳凍爛成瘡用生附子半個去皮臍為末面水調貼之立愈治小兒凍瘡用雄雀兒腦髓塗之立瘥治小兒指凍傷皸裂腫痛欲墮方馬糞十枚上以水三升煮令沸看冷暖浸之冷即再暖用之半日當愈治小兒入水手足皴裂腫痛血出用生胡麻搗爛塗之又方用棗煮取肉研細敷之一宿後用甘草湯洗即瘥又方用豬脂日三二度塗之陰瘡附論夫小兒下焦有熱則熱氣衝陰陰頭或腫便溺不得乃至生瘡俗云尿灰火所為也方粉連散一名胡連散治小兒陰腫生瘡胡黃連胡粉各半兩白礬一錢煅上為末生油塗調一方用蛤粉三錢川烏頭一錢為末以水調塗一兩日即瘥治小兒陰瘡及腫黃連去須胡粉各半兩上等分以香脂油和敷之一方以面脂調塗又方白礬灰一分胡粉一分微炒上同研令勻細用槐枝煎汁調塗兒陰囊上治小兒陰瘡用人屎燒灰敷之瘥又方用狼牙草濃煎汁洗之又方用狗屎燒灰敷之用狗骨亦得又方用豬屎五升水煮沸布裹安腫上治小兒陰瘡不瘥貓兒骨燒灰上細研水調敷之又方用狼骨濃煎汁洗之又方用狐陰莖炙微黃搗羅為末以水調敷之又方用蔓青根搗研敷之又方用馬骨燒灰研如粉敷之又方用雄雀糞以陳漿汁敷之治小兒股間連陰囊生瘡汁出先癢後痛愈後復發以火炙瘡抓去痂令乾上以蜂蜜敷卻搜面作燒餅炙熱以餳糖塗在餅上乘熱尉之冷則再炙再尉三度即瘥治小兒陰囊上瘡罌粟殼蚯蚓糞蔥地內者好淡豆豉各等分又用生地黃薄菏同研勻敷之一二次即愈治小兒陰莖上瘡大柏皮白藥滑石各等分上為末敷之又方蜂蜜槐花等分輕粉少許上研敷之治女子陰門瘡桃仁炒杏仁炒等分上件搗爛敷陰門即效有葉但採二葉炙用治小兒㿉卵腫以狐肉煮汁任食之良治小兒陰囊忽虛熱腫痛用蚯蚓屎以生甘草汁調輕輕塗之惡瘡附論夫小兒氣血純陽肌肉柔脆風熱邪毒易以致傷若榮氣不從逆於肉理結成悍毒疼痛腫焮非常故名惡瘡其候或癢或痛或赤根隱肉硬不作膿或穿穴作膿久不得瘥治法隨內外證療之則瘡可愈方神水膏治小兒惡瘡密陀僧半兩細研栝蔞根半兩靛花半兩丁香半兩附子半兩去皮臍麝香半分細研莨菪子半合水淘去浮者皂莢一挺去皮子防風半兩去苗硃砂半分細研土花硝一分沙參半分去蘆頭芎藭半分龍骨半分檳榔半分桂心半分清麻油一升黃蠟二兩上羅為末先以油入鐺中下諸藥末以慢火煎三兩沸後下黃蠟令消次下麝香攪勻膏成以磁閣中盛但小兒瘡不識者塗於故帛上貼之不過三五上去除根本雄黃散治小兒惡瘡人不識者雄黃半兩細研赤小豆半兩胡粉半兩研入吳茱萸半兩生用黃連半兩去須黃蘗半兩銼乾薑半兩生用蛇床子半兩膩粉半兩研入上羅為末以生油旋調如面脂塗於瘡上每用先以槐枝湯洗瘡令淨拭乾然後敷藥䕡茹散治小兒惡瘡久不瘥䕡茹一兩桑螵蛸一兩地龍一兩乳香一兩黃丹一兩黃蘗一兩銼細麝香細研糯米粉膩粉各一分上羅為散每使以井水和砂糖調藥敷之大黃湯治小兒惡瘡洗方大黃生銼黃連去須黃芩去黑心澤蘭白礬枯石南各一兩戎鹽一分蛇床子炒三分上粗搗篩每以二兩用水三升煮取二升去滓適寒溫以綿絮內湯中蘸洗之日三走馬膏治小兒諸般惡瘡及軟癤未穴作膿攻刺疼痛不可忍坐拿一兩黃蘗一兩銼甘草半兩木鱉子半兩白狗糞半兩緑豆一兩石榴皮一兩上羅為末每使取牛蒡根搗取自然汗調藥末塗於瘡癤上三換之如已破即不用貼此藥茵芋湯治小兒惡瘡浴方茵芋一兩甘草銼苦參各三兩細辛去苗葉黃連去須各二兩蕤仁二十枚去皮上粗搗篩每以三兩用水五升浸汁煮取三升去滓浴兒逐日用之甘草散治小兒惡瘡遍身如麻豆包裹膿汁乍痛乍癢亦治王爛瘡甘草銼生用芍藥黃芩去黑心白蘞銼黃連去須黃蘗去粗皮各半兩上搗羅為細散用蜜和塗於瘡上日再亦可湯浴之雄黃膏治小兒惡瘡久不瘥並瘻瘡及疥癬等並治之雄黃一兩研細䕡茹一兩蛇床子一兩礬石一兩銼搗為末水銀半兩於手掌內以津研如泥上羅為末與水銀相和以臘月豬脂同研如膏於磁盒中盛每用先以泔清洗瘡令淨拭乾後塗瘡上仍以黃蘗末用綿搵撲之令不汙衣日三兩度用之黃連散治小兒惡瘡焮腫疼痛黃連末一兩硫黃一分細末膩粉一分松脂一兩臘月豬脂一兩上先取豬脂入銚子內以慢火煎令化去滓次下松脂候溶次下黃連等末以柳木箆子不住手攪勻候膏成以磁盒盛塗於瘡上日用之黃粉膏治小兒頭上惡瘡胡粉黃連末各一兩赤小豆十四粒和黃連糯米二十二粒研水銀三分上先將水銀於手掌中唾研後卻以麻油調藥入水銀和塗瘡上鉛丹膏治小兒惡瘡鉛丹十兩風化石灰豬脂各一斤上將二味同研以豬脂攪作餅子燒通赤如此五度藥成搗羅為末濕瘡干貼如干瘡即作膏用豬脂調紙上貼胡粉散治小兒惡瘡人所不能知者胡粉炒令黃色五兩黃連去須黃蘗去粗皮銼各三兩上搗羅二味為散與胡粉相和一處研勻敷瘡上日再立驗集驗黃連胡粉膏治小兒惡瘡又方膩粉三分黃連去須三分蛇床子二分上搗為散每使時先用溫鹽湯洗瘡令淨拭乾以生油塗調之不過三五上永瘥治小兒諸般惡瘡土藜蘆取皮焙乾為末別研入不夾石雄黃輕粉水粉蚌粉等分上和勻先用鯽魚一斤入真清油內煎候熱去魚以油攤冷塗藥敷瘡三日後以蔥湯遍身洗浴所穿衣服並脫去淨去乳母忌油膩肥汁燒酒煎炙及熱物等立效癬瘡用真米醋調立效治惡瘡久不瘥五倍子海螵蛸等分為末加白膠香上先煎蔥椒湯洗次摻患處即成黶子仍服四順飲忌毒物治身面卒生諸惡瘡胡粉一兩水銀一兩黃連去須為末一兩上為末敷之瘡干則和豬膏敷之一方用蜜調敷瘥又方用蛇蛻皮燒灰豬膏和敷之豬膏須用臘月者妙又方用燒雞子殼豬膏和敷之治身有惡熱氣數起瘡者用熬豉令黃研末敷之兼數煮桃葉浴之治小兒惡瘡人所不識者用蝦蟆一枚燒灰搗羅為細散入麝香一分一處同研勻干敷上又方用柳枝葉三握銼用水五升煮至三升去滓入鹽少許淋洗瘡上治小兒惡瘡楸樹葉一兩乾者乾漆一分搗碎炒令煙盡上羅為散以大麻油調塗日三用之又方藜蘆一兩去蘆頭燒為灰虎頭骨一兩燒灰上研為散以臘月豬脂調塗日三用之治小兒惡瘡及沙蝨水弩甲疽凡是惡瘡並用此方用蜣螂十枚端午日收者佳搗羅為末以生油調敷之立效治小兒卒得惡瘡不可名識宜用此方用淡竹葉二兩燒為灰細研以雞子黃調塗之又方用馬骨燒灰細研以臘月豬脂和塗之又方用頭垢膩以臘月豬脂和塗之治小兒身上惡瘡用皂角水洗拭乾以闕油麻搗爛頻敷即瘥治小兒身中惡瘡用竹筍煮汁自澡洗又燒筍皮作灰敷之治小兒惡瘡匝身衆藥所不能療者用取父根洗取汁以浴兒勿使母知良治惡瘡有死肉者追膿白丁香輕粉粉霜雄黃麝香各一錢巴豆三個去油上同研細新飯和作錠子用之諸般惡瘡生膿者及瘡疹後膿水不幹者貼衣及流膿成片難痊逐年復發及熱瘡諸藥不效悉治之川黃連二兩曬乾碾末輕粉少許上用香油稠調黃連攤於瓦碗內卻收蘄艾揉軟燒煙覆碗在煙上熏之艾三團為度令熱透碗底候覆碗冷再用香油旋化開入輕粉調勻敷於瘡上日換二次三日即平若小兒頭瘡加松香在內同敷魚臍瘡附論夫小兒魚臍瘡者此瘡頭黑深破之黃水出四畔浮漿起狹長似魚臍故謂之魚臍瘡也方治小兒魚臍瘡芫花根二兩細碾豬牙皂角五挺黑豆三合白礬三兩燒灰盡碎上藥用醋七升先浸芫花根及皂角黑豆三日於釜中以文火煎至二升去滓後卻於別鐺中煎至一升入白礬灰攪令勻膏成以磁盒盛攤於故帛上貼又方蛇蛻皮一兩炙微黃雞子一枚打碎取清上以水一大盞煎蛇皮至五分去滓入雞子清攪令勻更煎三兩沸放溫量兒大小分減服之又方用臘月豬脂並髓以雞子清調令勻塗之又方用寒食餳燒灰細碾敷之又方用白萵苣搗取汁先以針刺瘡上及四畔滴汁於瘡中即瘥又方治瘡頭黑深破之黃水出四畔浮漿起四角長似魚臍及身體生瘡一云雞清方用蛇蛻皮燒灰存性碾細以雞子清調塗於瘡上又方上當瘡上切大蒜片子貼以艾灸二七壯換蒜灸畢碾豆豉厚罨定效浸淫瘡附論夫小兒五臟有熱熏發皮膚外為風濕所折濕熱相搏身體發瘡其瘡初出甚小後有膿汁浸淫漸大故謂之浸淫瘡也方苦瓠散治小兒浸淫瘡漸展不止身體風濕發瘡膿汁浸淫漸大苦瓠二兩蛇蛻皮半兩燒灰露蜂房半兩炙梁上塵一合上為細末以生油塗調故帛上貼乾癬宜用羊蹄根絞自然汁調二粉塗之濕癬宜用青金