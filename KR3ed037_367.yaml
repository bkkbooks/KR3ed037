斜身上頑麻方篦麻子一兩別研樗根皮一兩為末甜𧁾瓤一兩炒乾為末上同研令勻以大麥麵餅子糝藥末在上左患貼右右患貼左以慢火熁正急去之身上有頑麻津唾調藥摩之二聖散一名二聖膏治小兒口眼喎斜治小兒中風口喎斜僻宜塗用甜𧁾瓤以水絞取汁和大麥面搜作餅子炙令熱熨正便止勿令太過殭蠶散治偏身口流涎沫蔓荊子黃耆茯苓人參南星天麻殭蠶炒獨活羌活葛根甘草荊芥各等分上為散姜三片薄荷同煎服之中風四肢拘攣附論夫小兒肌肉嫩弱易傷於風風冷中於膚腠入於經絡搏於筋脈得冷則急故四肢拘攣也方硃砂丸治小兒中風四肢拘攣心神煩熱硃砂半兩細研水飛過牛黃細研麝香細研蠶紙微炒乾蠍微炒天麻白附子炮製龍腦細研羌活以上各一分上為散都研令勻煉蜜丸如綠豆大每服以薄荷湯研下三丸日三四服量兒大小以意加減服之獨活湯治小兒中風四肢拘攣心神煩亂不得睡臥獨活去蘆頭一兩黃耆銼一兩防風去叉三分白鮮皮三分茯神去末一兩羚羊角屑三分桂去粗皮半兩酸棗仁一兩一方無甘草炙半兩上粗搗篩每服一錢水七分煎至四分去滓量兒大小加減獨活黃耆湯治中風拘攣桑根白皮半兩銼獨活一兩綿黃耆一兩酸棗仁一兩麻黃半兩去節羚羊角屑半兩肉桂半兩川芎半兩上都搗羅為末每服一大錢水一盞生薑薄荷各三片煎五分去滓放溫服桑根白皮散治小兒中風四肢筋脈拘攣桑根白皮一兩銼羚羊角屑三分漏蘆三分敗醬一兩茯神三分木通一兩銼芎藭三分上為散每服一錢以水一小盞煎至五分去滓入生地黃汁半合更煎一兩沸量兒大小以意加減服之一字散治小兒中風手足筋脈攣急硃砂半兩細研水飛過蟬殼微炒乾蠍微炒半夏末用生薑汁拌炒令熟白殭蠶微炒天南星炮製各一分上為末每服一字以荊芥薄荷湯調下量兒大小加減服之日三四服效牛黃丸治小兒中風手足拘攣身體強直口噤壯熱牛黃犀角屑麝香胡黃連乾蠍硃砂羚羊角鉤藤雄黃天竺黃水銀棗肉研星盡以上各一分蛇肉半兩酒浸去皮骨焙上為末蒸餅和丸如黍米大每服五丸薄荷湯下量兒大小加減服之麝香丸治中風四肢拘急心神昏亂腰背強直膩粉麝香牛黃白附硃砂槐子炒麻黃去節半夏犀角防風靈脂全蠍金箔銀箔甘草各三分上為末麵糊丸如綠豆大每服十丸白水吞下中風痙病附論夫小兒風痙之證由風傷於太陽之經或解脫或臍瘡未合而感傷濕致之又虛極生熱熱極生風之甚者也傷風發熱頭痛汗出自嘔吐醫者不明汗之必發痙濕家發汗稍多亦發痙其狀可謂病在足太陽經痙有剛柔亦如陽隔陰陰隔陽之類其證始則發熱腸痛喘急次則牙關緊頭搖十指微動漸加項背強直轉側不仁甚者昏困失音目睛直視滑泄不禁身體反張痙最難痊十救其一過三日不治項背強直腰身反張搖頭掣瘲噤口不語發熱腸痛鎮日不醒剛痓無汗面紅眼赤牙緊手張痰涎壅盛昏燌煩渴小便赤澀先譫語而發柔痙有汗大便滑泄不渴不語先手足冷而發剛柔不分之證身體壯熱譫語口乾手足反微寒大便反滑泄治法先與消痰順氣為上痰消則風止順氣則神醒病勢稍定然後審其熱之輕重解利之熱輕者敗毒熱重者小柴胡湯壯熱胸滿口噤咬牙而大便秘結是為內實大承氣下之得病以來無汗用麻黃按方有汗則麻黃湯慎勿用也其若痰塞氣盛則南星半夏茯苓以消其痰枳實陳皮紫蘇木香以順其氣剛痙為之發汗柔痙為之解肌並以小續命湯加減痰盛搐掣大便秘結當以枳殼大黃靈脂甘草利之小便赤澀心熱狂風當以辰砂五苓散入燈心行之既利大腸矣小便澀而風證乍作面色乍紅常有拂鬱之狀何耶表熱表邪猶未解也人參羌活散加青皮紫蘇薄荷主之參蘇飲亦可也方牛黃丸治小兒中風痙牙關緊急項強直及一切驚癇牛黃細研天竺黃細研雄黃細研龍腦細研犀角屑麝香細研水銀入少棗肉研令星盡乾蠍微炒附子炮製去皮臍以上各一分硃砂細研水飛過天麻白殭蠶微炒蟬殼微炒桑螵蛸微炒羚羊角屑香附子羌活白附子炮製獨活蔓荊子麻黃去根節野狐肝微炙各半兩烏蛇一兩酒浸去皮骨炙令微黃上為末研入了藥同研令勻煉蜜和丸如麻子大不計時候以薄荷酒研下三丸量兒大小以意加減烏蛇丸治小兒中風痙及天瘹驚癇一切諸風一名烏梢丹烏蛇一兩酒浸去皮骨炙令微黃天漿水二十枚去殼天麻半兩天南星半兩炮製乾蠍一分微炒白附子半兩炮製附子一兩炮製去皮臍防風半兩去蘆頭半夏半兩湯洗次去骨以上五味都以酒浸七日後取出炮干搗羅為末牛黃龍腦麝香硃砂雄黃以上各一兩以上五味同研如粉上都研令勻用糯米飯和丸如黍米大不計時候用金錢薄荷湯下三丸量兒大小加減服之一方有人參無牛黃治吐利後生風及心肺中風尤宜服之烏犀丸治小兒中風痙及驚癇諸風手足搐搦不定烏犀角屑天南星炮製白附子炮製乾蠍微炒雄黃以上各一分白花蛇半兩酒浸去皮骨炙令微黃以上六味搗羅為末以無灰酒一小盞同入銀器內煎令稠則入後藥牛黃細研膩粉龍腦細研水銀用冬瓜瓤研令星盡各一分硃砂半兩細研水飛過虎睛一對酒浸微炒上為末入前藥煎和丸如麻子大不計時候用竹瀝下三丸量兒大小以意加減服之小續命湯治剛柔不分之痙及中風等證麻黃去節人參黃芩川芎芍藥甘草炙杏仁去皮尖炒防己官桂去皮各五錢防風七錢半附子炮去皮二錢半上銼用生薑煎服剛痙去附子用麻黃柔痙去麻黃用生附子剛柔不分加生附子大便自利厥冷加熟附敗毒散消痰順氣疏風方見十味湯螳螂丸治小兒中風痙身背強直牙關緊急棘剛子去皮三十枚烏頭炮製去皮臍二枚天南星中者炮一枚防風去叉二分細辛去苗葉一錢螳螂一枚大去翅足炒令乾乾蠍白附子大者一枚丹砂研一分麝香研半錢上為細末用石腦油為丸如綠豆大每服一丸至二丸薄荷水化下不計時候如小兒目睛上視口噤不開用醋化一丸灌入鼻中男左女右灌之狐肝膏治痙病心肺中風並宜服之桑螵蛸炒一兩羌活一兩蔓荊子一兩麻黃一兩去節烏蛇肉一兩酒浸一宿焙乾以上搗羅為末硃砂半兩牛黃一分麝香一分上拌勻用野狐肝半具石臼中同搗二三百下成膏如皂角子大每服一粒用薄荷自然汁入酒三兩點同化下奪命散治小兒痙病心肺中風並宜服之干蛇頭一個酒浸炙黃蜈蚣一條赤頭者炙黃色干全蠍一分草烏頭大者一枚炮去皮麻黃一分去節以上搗羅為末次用硃砂一分牛黃一錢腦子一錢上拌勻細研每服一字溫酒調下天南星膏治痙病心肺中風並宜服之天南星一兩用細研慢火酒熬成膏赤頭蜈蚣半兩酥炙全蠍半兩烏梢蛇半兩酒浸焙乾以上三味為末次用硃砂一兩水飛牛黃一分麝香一分上用天南星膏子拌勻於石臼中搗成膏每服一皂角子大用薄荷自然汁入酒一滴同化下牛黃丸治小兒中風痙頸強直及風癇潮發牛黃研丹砂研天竺黃研蠍梢白殭蠶天南星白附子各一分上並生用搗研令細煉蜜丸如梧桐子大每服金錢薄荷湯化下一丸至二丸服之桂枝葛根湯治柔痙有汗桂枝赤芍藥各六錢三字葛根一兩三錢甘草炙六錢一字生薑一兩大棗四錢上銼每服三字水煎服小柴胡湯治剛痙有熱通聖散治小兒中風痙病昏悶不醒一名至聖散蠍尾二十一枚晚蠶蛾一十四枚天漿水一十四枚白附子半兩以上搗羅為細末次入硃砂一分水飛麝香一錢研上拌勻細研每服一錢至半錢薄荷湯調入酒三兩滴同調下烏犀煎治痙病心肺中風並宜服之烏犀角一兩屑天南星半兩炮天麻半兩蠍梢半兩白附子半兩白花蛇半兩酒浸去皮骨炙黃上為末用無灰酒兩大盞入銀器中慢火熬成膏如皂角子大每服一粒點麝香湯化下麻黃葛根湯治剛痙無汗麻黃去節赤芍藥各一兩半乾蠍五錢蔥白三根豉三合上銼用水煎每服三字一方服了以厚衣蓋覆如人行四五里間再服良久如未得汗出更煮蔥粥少許乘熱投之取汗硃砂散治小兒中風痙項強腰背硬四肢拘急牙關緊神思昏悶硃砂三分雀兒飯甕五枚蠍尾二七枚白附子二枚炮製為末晚蠶蛾七枚上都研勻細不計時候以薄荷酒下一字量兒大小加減服之大承氣湯治剛痙胸滿內實口噤咬齒理中湯治柔痙厥冷自汗人參乾薑炮甘草炒白朮等分上銼散每服三字煎服三生飲治柔痙自汗肢體厥冷川烏生附子各半兩木香一分天南星生一兩上銼散每服一錢生薑五片慢火煎取其半通口服
