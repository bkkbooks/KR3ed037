body:
  text: 卷三百六十七嬰孩諸風門總論夫風者百病之長善行而數變小兒血氣未定肌肉脆弱腠理虛疏為邪風所中以春甲乙得之則中於肝以夏丙丁得之則中於心以季夏戊己得之則中於脾以秋庚辛得之則中於肺以冬壬癸得之則中於腎各隨其腑臟之俞所中則為臟腑之風或客於皮膚肌肉榮衛或留於節膜骨髓隨其變化為病不一各有微甚之狀大率與大人所得證候皆同特小兒治之分劑多寡差殊宜消息以調之楊氏曰血氣未定寒溫失調內則盛熱蘊蓄外則腠理虛開致風邪自背上五臟俞而入乘其外虛而暴中之其狀昏不知人壯熱狂燥搐制氣粗口噤痰潮必有五臟中風之證蓋風寒暑濕亦入楊氏曰又有小兒多因感風久嗽不能發散致風邪入肺臟之絡遂中肺風目能視人口不能言是其候也楊氏曰是風也始入於腠膚次達於經絡而搏於筋脈風入頷頰之筋則口喎而牙緊風塞咽喉聲音之門則語不出而失音風與氣搏以痰隔則喉間如鼾䶎之響搏於筋脈得寒則拘急攣痛脈必浮緊得熱則緩弛不隨脈必浮洪風夾寒邪即攣風濕夾熱氣即緩弛宜追風毒銼散等大抵脈浮病在表脈實病在裡脈洪病在上在表宜散發在裡宜促導促於上胸膈澎湃者宜吐之若虛寒者附子川芎不可缺古人治法以灼艾為本又當消息權度而投劑焉朱氏曰凡治風先理氣不可專服風藥攻之愈急則風勢愈甚且調治氣血和平榮衛調暢則風疾不治而自愈風證其中人也卒其眩人也暈激人痰潮昏人神亂邪氣反緩正氣反急正氣引邪為喎斜為竄視為掣縱為搐搦為癱瘓為反張在陽則皮膚緩緩則四肢不收在陰則腹裡急急則一身不能俯仰隨其邪氣表裡深淺受證也偏枯者血氣偏虛半身不遂股肉枯瘦骨間疼痛風痱者神智不亂身體不痛四肢不拳一臂不隨能言者可治風癔者忽然迷僕舌強不語喉中窒塞噫噫有聲身軟有汗則生風痹者風寒濕三氣合而為痹其人肉厚身頑不知痛癢風多則走注寒多則疼痛濕多則重著在筋則筋屈不伸在脈則血凝不流在肉則不仁內經曰榮氣虛則不仁明理論曰不仁者不知痛癢也在骨則癃重心中風偃臥不能傾側發失音其舌焦赤若汗流唇赤可治灸心俞若唇上白黑青黃乃心壞為水不治肝中風踞坐不能低頭上視多在脅偏疼諸筋攣急頭目瞤動若其目青繞兩目連額微青面黃者可治灸肝俞若大勢青黑目一黃一白不治脾中風踞致腹滿皮肉瞤動四肢不收若唇黃身通黃吐咸汁可治灸脾俞若手足青足冷或目下青不治肺中風偃臥胸滿有短喘息時嗽燥悶汗出目能視人口不能言若鼻四圍至口及目下色白者可治灸肺俞若鼻口目下色黃乃肺壞為血及尋衣摸空不治腎中風踞坐面浮腰脊痛引小腹其耳黑視左右脅點點黃色可治灸腎俞若脅上黃點面如土色鬢須直齒黃赤不治胃中風腹滿脹膈塞不通張口喘息額上多汗楊氏曰或曰中風諸臟不關諸腑然胃為五穀之海皆取氣於胃孫真人曰所謂所食竟取風於胃風是也中風多是惡風自汗心風脈浮洪肝風脈浮弦腎風脈浮滑肺風脈浮澀脾風脈浮緩或以三部候之或以本臟脈取之不可一概論也中風惡證詩曰中風惡證細推求口噤虛遲脈數憂眼合不開並竄證面誹面黑手難收口開吐沫氣粗大髮直頭眩汗不流鼾䶎哀鳴兼鼻冷遺尿瀉血並皆休中風者人之驟病一時倉卒若未能精審五臟受證且先與搐鼻開關豁痰氣蓋中風皆因痰鬱氣滯而作痰消氣下病勢稍蘇然後辨證灸治凡治風先理氣治風良劑小續命湯為首排風湯次之然二藥主風不主氣須以人參順氣散烏藥順氣散佐助其間氣一流行則風自疏散矣順氣則蘇合香丸南木香輩消痰則白丸子南星半夏可用如銀粉鉛硝等謹勿妄施寒毒入胃則血脈凝滯真氣銷鑠而成廢人俗云熱則生風大綱然耳亦有胃虛氣虛血虛而生風者則天雄附子官桂川芎不可缺也又小兒三五歲或七八歲至十餘歲發驚涎潮搐搦如拽踞不省人事目瞪喘急將欲死者內經曰此者得之在母胞胎之所受悸惕驚駭恐懼之氣故令小兒輕者為驚風天吊重者為癇病風搐胎中積熱者為劑風以上諸風證可用吐涎散吐之吐訖宜珠犀龍麝清涼墜痰之藥其食乳子母皆宜服之安魂定魄之藥定志丸之類是也故婦人懷孕之月大忌悲憂驚怖縱得子必有前疾小兒風熱涎嗽者以通聖加半夏同煎溫服中風附論夫小兒中風者由氣血未定肌膚嫩弱者若將養乖宜寒溫失度腠理虛開則為風所中也方蛇頭丸若兒搐搦不已驚狂迷悶角弓反張或昏沉齧齒雙目直視頻喚不省變為癇證亟宜服此藥以除之卻不可多進須臾以疏風藥相間調理凡服此藥亦須先以木香烏藥枳殼檳榔磨少許灌之卻服庶使關節通透藥力無不利硃砂三錢紫粉五錢全蠍十五個去毒生麝香半錢花蛇頭酒浸去皮骨五錢沉香真鬱金五靈脂白附子各五錢金銀箔各五片片腦子半分蛇含石二兩炒煅令赤濃煎甘草湯淬以手捻得蘇為度方可用白殭蠶南星天麻各五錢上為末煉蜜如小指頭大每服大者一丸小者半丸隨證依然大風膏湯引下一方加防風大風膏定諸般風搐天麻三錢防風一兩天竺黃五錢花蛇酒浸去皮骨蛇含石二兩燒紅醋煮七次青黛紫粉各三錢殭蠶炒去絲五錢蜈蚣酒浸去糞一條大赭石一兩燒醋淬七次白附子辰砂各五錢麝香半錢全蠍五個去毒天南星三兩薑汁浸焙乾上為末煉蜜丸久留用麵糊丸如小指頭大每服大者一丸小者半丸慢驚冬瓜子仁湯下搐搦雞冠血薄荷急驚班竹葉薄荷湯下化涎桑白皮湯退潮熱薄荷磨刀水止嗽北五味子杏仁夜啼燈心灶心土蟬蛻濃磨灌下天南星丸治小兒中風四肢拘急心神悶亂腰背強硬天南星一分泡製膩粉一分研入白附子半兩炮裂半夏半兩湯洗二次去滑麻黃半兩去節根五靈脂一兩乾蠍一兩微炒金箔銀箔各二十片槐子微炒防風去蘆頭硃砂細研水飛過犀角屑各半兩牛黃細研麝香各一分細研上為末入研了藥都研令勻用醋一大盞入藥末一半以慢火熬成膏次入余藥末和丸如綠豆大一歲一丸二歲二丸三五歲至三丸以溫酒下日三四服長理石湯治小兒卒中風狀如欲絕增損續命長理石碎赤石脂碎石膏碎滑石碎桂去粗皮白石脂碎大黃銼炒令香防風去叉牡蠣燒碎龍骨碎麻黃去根節先煎掠去沫焙栝蔞根銼各半兩甘草炙一兩寒水石一分上粗搗篩一二歲小兒每服一錢水半盞煎至三分去滓溫服服後汗出以粉敷之若有熱者增大黃不汗者加麻黃無寒水石以朴硝代之日三服量兒大小加減牛黃丸治小兒中風手足搐搦及驚風牛黃細研乾蠍微炒防風各一兩去叉犀角屑半兩麝香細研鉛霜各一分細研天麻天竺黃細研白附子炮製烏蛇肉各半兩炙令黃天南星一分炮製膩粉一錢硃砂半兩細研水飛過上為末入研了藥令勻煉蜜和丸如綠豆大每服用溫薄荷酒研下三丸更量兒大小加減服之續命湯治小兒卒中風惡毒及久風四肢不隨並軃躄不能行步角弓反張一名苦生湯甘草炙半兩黃芩去黑心一兩石膏一兩人參一分麻黃去根節先煎掠去沫焙二兩芎藭葛根升麻杏仁十枚湯退皮去尖雙仁麩炒令熟當歸切焙桂去粗皮獨活去蘆頭各半兩上粗搗篩三四歲兒每服一錢水七分煎至四分去滓連夜三四服量兒大小加減服之汗出水敷之避風青黛膏治中風昏悶呵欠手足微冷天麻半兩白附子三錢蠍梢半兩麝香一錢花蛇肉酒炙天竺黃二錢青黛二錢硃砂三錢上為末煉蜜丸皂角子大薄荷湯下花蛇丸治中風項強天吊驚風癇疾殭蠶炒白附子南星硃砂全蠍花蛇肉酒浸炙十次去骨各等分上為末爛飯為丸如粟大麝香湯下大續命湯治中風痱身體不能自收口不能言冒昧不知疼痛筋脈拘急小兒凡得中風之疾未作余病可服麻黃去節一兩半桂去皮當歸洗去土人參石膏白姜各一兩甘草炙川芎白芍藥各半兩杏仁分去皮尖炒銼入以上十件系本方續加防風去蘆犀牛角屑各半兩上㕮咀每服二錢水半盞薄荷二葉煎三分去滓服排風湯治中風狂言失音不語精神昏困諸般惡證白鮮皮白朮白芍藥桂去皮當歸洗酒浸一宿芎藭防風杏仁去皮尖雙仁麩炒甘草炙半兩川獨活去蘆白茯苓去黑皮麻黃去根節各一兩半上㕮咀每服二錢水半盞生薑三片煎至三分大小以意加減熱盛痰壅大便不利當用金星丸下自利可服奪命散小續命湯治中風不省人事涎鳴反張失音厥冷銀箔散治或吐或瀉涎鳴微喘露睛驚跳槐子煎治小兒中風不省槐子一兩炒白殭蠶一兩炒防風一兩白附子一兩乾薑半兩麻黃半兩去節半夏半兩湯洗七次以上搗羅為細末用好醋兩大盞慢火熬成膏次用硃砂半兩水飛牛黃二分麝香一分金箔二十片細研上拌勻和成膏如綠豆大每服五粒溫酒下量兒大小加減若牙關緊急即化破灌之石膏湯治小兒風痱不能語口眼喎斜四肢不隨石膏碎一兩甘草炙半兩射干半兩桂去粗皮半兩麻黃去根節先煎掠去沫焙一兩芍藥半兩細辛去苗葉一分當歸切焙半兩上粗搗篩二三歲兒每服一錢水半盞煎至三分去滓溫服日三量兒大小加減服羌活散治小兒中風筋脈拘急或手足瘛瘲等羌活去蘆頭三分芎藭三分防風去叉三分天麻半兩白附子一分當歸炙乾切焙三分麻黃去根節煎掠去沫焙半兩甘草炙一兩上為散一二歲兒每服半錢乳汁調服三四歲兒服一錢匕日三服如無乳熱水調服亦得量兒大小加減服之乳母亦用暖酒調下一錢大黃湯治少小中風狀如欲絕大黃牡蠣龍骨栝蔞根甘草桂心各十二銖赤石脂寒水石各六銖上㕮咀以水一升內藥半兩煮再沸絞去滓半歲兒服如雞頭子大一枚大兒盡服入口中即愈汗出粉之藥無毒可每日二服有熱加大黃不汗加麻黃無寒水石以朴硝代之螵蛸散治小兒中風痰盛桑螵蛸天麻各一兩天南星炮白殭蠶炒干全蠍一分以上搗羅為末次用膩粉牛黃麝香各一錢研上同拌勻再研細每服一字至半錢溫酒調下量兒大小加減羚羊角散治小兒中風筋脈拘急項強腰背硬手足搐搦發渴不定羚羊角屑防風去蘆頭麻黃去根節黃芩桂心細辛甘草炙微赤銼以上各半兩羌活三分上為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎一兩沸溫服量兒大小加減頻服汗出效一方無竹瀝用木瓜同煎或麝香硃砂丸治小兒中風口眼偏斜筋脈拘急及胎中疾病硃砂半兩研細水飛過牛黃細研麝香細研乾蠍微炒天麻白附子炮製白殭蠶微炒乾薑炮製以上各一分上為散入研了藥令勻用軟硬米飯和丸如黍米大每服以乳汁化下日三服更量兒大小加減服之一方無干姜攝生飲治中風一切卒中不論中寒中暑中濕中氣及痰飲之類南星大者濕紙略炮用二錢半夏用白者湯四七次南木香各二錢細辛石菖蒲蒼朮甘草炒各二錢上銼散每服一錢姜三片慢火煎取其半調蘇合香丸一粒灌下痰盛者又加全蠍防風溫膽湯消痰順氣疏風半夏枳殼去瓤麩炒茯苓各半兩陳皮防風各二錢半甘草一錢半人參二錢上銼散每服一錢入生薑紫蘇藥同煎服效一方無人參白玉丹治小兒中風涎潮天南星用生一兩半夏用生一兩白殭蠶一兩炒桂心一兩石菖蒲一兩一寸九節以上搗羅為末次用膩粉一分龍腦一分並細研上拌勻取生薑汁和如黍米大每服十粒煎人參湯下追風散治小兒因驚中風角弓反張及慢脾風全蠍一個母丁香一個瓜蒂七枚赤小豆四十九粒上為細末大小加減一字許米飲調灌之吐出風涎方