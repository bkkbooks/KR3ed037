body:
  text: 卷三百六十八嬰孩傷寒門總論夫小兒未能冒涉霜雪乃不病傷寒也大人解脫之冬傷於寒冷則不論耳然天行非節之氣其亦得之有時行疾疫之年小兒出腹便患者也治其時行節度故如大人法但用藥分劑少異藥較少耳傷寒者冬時嚴寒而人觸冒之寒氣入於腠理搏於血氣即寒熱頭痛體痛謂之傷寒其兼驚者是熱乘心心主血脈小兒心神易動為熱所乘故發驚其大便不通是寒於氣而生熱熱流入大腸故燥澀而不通其咳嗽者邪在於肺肺主氣傷寒邪氣先客皮膚隨氣入肺故令嗽重者有膿血也其自汗者陽虛受邪陰氣又虛邪氣又乘於陰陰陽俱虛不能固津液所以汗出也其寒熱往來是邪氣與正氣交爭正氣勝則邪氣卻散故寒熱俱歇若邪氣未盡者時干於正氣以邪氣所幹則壅否還熱故寒熱往來不已其嘔者是胃氣虛熱乘虛入胃得熱則氣逆故嘔也其渴者是熱入臟髒得熱則津液竭燥故渴也其鼻衄者是熱搏於氣而乘於血血得熱則流散發從鼻出也夫小兒傷寒得之與大人無異所異治者兼驚而已又多因夾食而得仲景云冬受寒毒之氣即發者為傷寒其寒毒藏於肌骨之間至春而發者為溫病至夏而發者為熱病又以冬氣溫春氣寒夏氣冷秋氣熱謂之時氣萬全方云熱病傷寒溫病時氣傳變無異也凡時氣者四肢之間有不正之氣也為春應暖而反寒夏應熱而反冷秋應涼而反熱冬應寒而反溫非其時有其氣其氣傷人則身疼壯熱咳嗽氣粗煩渴心躁恍惚驚悸傳變與傷寒無異俗呼謂天行者是也辨三陽受病訣詩云足太陽膀胱經頭痛腰脊痛項強轉筋難面赤心煩躁尿清熱惡寒足陽明胃之經潮熱時微汗譫言臥不安尿紅多糞結飲水舌咽乾足少陽膽之經來往發寒熱苦口連唇舌耳重脅胸疼嘔吐喉中噎辨三陰受病訣詩云足太陰脾之經胸滿腹䐜脹疼因冷氣攻大便常自利噎嘔實難通足少陰腎之經心煩但欲寐或渴或自利欲吐吐難通惡寒多恐悸足厥陰肝之經飢來不欲食食則吐蛔蟲渴瀉心間疼四肢冷似風其間有陰極發躁陰證似陽學者當以脈別之諸數為熱諸遲為寒無如此最驗也小兒有證陰者即變為慢驚今列陰證庶幾識之小兒傷寒候診其脈來一投而止者便是得病一日假令六投而止者便是得病六日其脈來洪者易治細微者難治也小兒傷寒可醫者七鼻內清水鼻者是肺之外應傷寒故外風吹著身皮毛及發皆主於肺故令外傷流出清水身寒毛立後則身熱躁叫口乾耳冷汗出傷寒者是邪氣傷正氣正氣軟弱則不能主於身被邪氣攻出故為汗汗出多則冷面黃無力後若不止則體虛生風宜補實之鼻塞傷寒是外邪氣肺所受則正氣旺肺邪氣傷正氣則滯榮衛不通故乃鼻塞是發後更與通關藥耳面赤傷寒是傷氣及邪氣入腹其肺當旺不肯受邪肺者受患其初傳心則心氣弱故令面赤則口乾夜間不臥陰陽相剋日中可以解涼藥服之吐白水何以吐白水其傷寒受在於胃氣胃邪所傷胃弱則吐白水若吐食則入脾瘥後須變身黃脾胃俱象土故色黃宜早暖脾胃耳兩眼黃赤傷寒是先受在脾其色黃次傳在肝主眼故邪傷於肝故共脾邪入之故令眼黃赤宜先以洗肝後發汗耳小便黃赤傷寒者寒氣傷肺肺虛故不受於心心實傳腑心以小腸為腑受邪則滯榮氣則赤後則尿如血通小便後則取之不可醫者六傷寒面黑者不治傷寒氣傷皮膚本人肺肺傳腎腎主水水屬北方其色黑復傳心心屬火其水大能剋火故令面黑不治耳傷寒大小腸痛不治其傷寒受在肺肺以大腸為腑臟不能受倒傳出一藏不再傳入心則火剋金心小腸依為腑故大小腸痛耳傷寒忽作鴉聲不治此是傷寒邪氣傷肺肺主聲肺被邪傷絶則聲出不回如便作鴉聲是肺絶也傷寒叫聲不出不治此是傷寒入腎失解腎氣絶不能作聲乃死耳傷寒糞黑不治何以瀉黑血糞其傷寒邪傷肺肺絶不能行血其血黑色從大腸中下如死鵝鴨血一般即死如無大便赤黑不妨卻是熱盛宜與涼藥耳傷寒爪甲黑不治爪黑者傷寒傳肝其邪勝正氣絶肝主筋及主諸爪甲肝絶則不能濚於爪甲者故為死之形也上傷寒皆是邪氣傷於臟腑滯其血氣則寒熱血脈亂不能飲食其頭疼面赤者則是陽毒其面青不語多哭身寒是為陰毒凡傷寒三日前宜汗三日後宜轉又云陰毒宜回陽先與熱藥後方汗陽毒宜解表先與涼藥後與汗之取轉亦此說三日前汗三日後轉此大略之言耳有初得便宜轉者有得之三兩候宜汗者不可拘此傷寒外證一見眼睛黃赤及鼻塞遍身壯熱口鼻出清水非時冷汗加之咳嗽氣閉毛起小便如粉汁此皆是傷寒候傷寒候如覺面帶黑色大小腸干痛上吐下瀉氣又刺痛耳內膿及眼生浮膜皆惡候也凡治傷寒須辨表裡分汗下古人曰桂枝下咽陽盛即斃承氣入胃陰盛乃亡孫真人云汗下相反其害甚速如魚出水若蛾入湯傷寒有表證有里證有半在表有半在裡有表裡兩證俱見有無表有里有無里有表在表宜汗在裡宜下半表裡和解表裡俱見兩證參詳無表裡證大柴胡湯下審驗汗下吐證者千金云陽盛陰虛汗出即死下之當愈陽虛陰盛下之即死汗出即愈身熱憎寒汗出陽虛宜汗身熱潮熱汗出陰虛宜下調經論云陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒以此別之不汗強汗津液枯竭而死合汗不汗竅閉悶絶而死不下強下洞泄不禁而死合下不下腫脹煩亂而死惡寒者不當風而憎寒惡風者當風而憎寒皆屬表又云大法春宜汗秋宜下發熱惡寒身體痛而脈浮凡傷寒發表須當隨輕重而汗有發汗者有和解者兼四時發汗亦自不同春不可大發汗以陽氣尚弱可用小柴胡湯之類冬不可發汗者以陽氣伏藏不問傷寒病數用桂枝麻黃各半湯或得少汗而解或無汗自解病勢甚者不拘此夏月天氣大熱而脈洪大宜正發汗不可用麻黃桂枝熱性藥須是桂枝麻黃加黃芩石膏知母升麻夏月有桂枝麻黃證不加黃芩輩服之轉助熱氣發黃斑太陰脈浮少陰發熱亦須發汗脈經云汗不出不至足者死熱病得汗大熱不去者死脈沉數細熱多寒少脈微虛煩腹間有動氣衄血壞病已發汗吐下不解為壞病不惡寒反惡熱手掌心並腋下濈濈汗出胃中乾燥糞結聚潮熱大便硬小便如常腹滿而喘或譫言浮脈而滑或心胸連臍腹大段注悶腹中痛坐臥不安冒悶喘急不候他證便下之凡大便祕妨悶恐尚有表證者亦少少飲小承氣湯微解之不可過多令大瀉也若失下則氣血不通四肢便厥醫人不識反疑是陰厥復進熱藥禍如反掌不可不察陽明病自汗若發汗小便自利不可下宜密導法通之脈浮惡寒脈虛不轉失氣是腹中動氣也大便堅下小便少未可攻之恐津液還入胃必先硬後溏也小便如常乃可攻之當問其小便日幾行若大小便日三四行今日再行故大便不久出今為小便數少以津液還當入胃故大便不久必通也王氏云傷寒有承氣之戒又問轉藥孰緊答曰大承氣湯最緊小承氣湯次之大柴胡湯又次之仲景治法蕩滌熱積皆用湯液不可用丸子孫真人云服大承氣湯得利瘥忌不可服補藥熱氣得補復盛便下之是重困也凡病人非大渴不可與冷水若小渴口燥咽乾小小呷滋潤之若大渴煩躁能飲一升者與半升隨力量多少但減一半若不與則無由作汗乾燥煩喘而死者多矣但莫令足意飲也若大汗將來躁渴甚者足意飲之勿疑常見人因渴飲水而得汗見小而渴遂強與之致停飲心下滿結喘而死者亦多矣其熱脈數尚可作汗而解得出於幸也胸膈痞滿痰壅塞礙脈浮或滑並宜瓜蒂散吐之虛人當吐不敢吐宜枳實散壓氣毒痰水過則毒入胃乃可微吐枳實散枳實為細末每服半錢米飲調下驗陰陽二厥者各自不同陽厥者微厥卻發熱若陰厥卻不發熱四肢逆冷惡寒脈微而細大小便滑泄又一法陽厥手掌中心溫熱陰厥俱冷驗表裡兩證俱見者傷寒表證當汗里證當下不易之法也發表攻裡本自不同甘遂神丹不可合飲桂枝承氣安可並進假令病人脈浮而大是表證當汗其人發熱煩渴小便赤卻當下此皆表裡俱見五苓散主之假令傷寒不大便六七日頭痛有熱者是里證當下其人小便清者知不在裡仍在表當鬚髮汗此是兩證俱見即未可下宜與桂枝湯假令病人心不滿口燥不欲食大便堅脈沉細是里證當下頭痛汗出微惡寒手足冷卻當汗此兩證俱見者仲景所謂半在表半在裡是也小柴胡湯主之假令病表證未除而醫數下之遂協熱而利利不止心不痞硬仲景謂之表裡不解桂枝人參湯主之假令本太陽病醫反下因而腹痛是有表復有里仲景用桂枝加芍藥湯痛甚者桂枝加大黃又云太陽病桂枝證醫反下之利不止脈促者表未解而汗出者葛根黃連湯主之凡小兒單受傷寒與升麻惺惺散小柴胡湯如大便堅或焦黃洗心散四順散八正散兼瘡痘皆可服如夾食傷寒法當以紫丸子隨食後與加減惺惺散果有食方可用如無食證欲利大便宜湯液利之若時行瘡痘兼有痘症未可用丸子下之宜與消食藥隨證調理如夾驚傷寒與紅龍散紅連散紅綿散紅桃散鎮驚藥更與傷寒正方中對證擇用之三傷寒詩驗夾驚傷寒頰赤身多熱心煩又畏寒唇紅微有渴驚哭睡難安驗夾食傷寒頭疼並腹痛嘔逆又咨煎臟腑腥酸臭蒸蒸熱不眠驗單受傷寒咨煎多困倦身熱燥皮膚鼻內流清涕頭疼嗽喘粗馬詹都巡孫男二歲夾驚傷寒潮熱大便堅忽吐數口發驚召醫視之見吐而驚搐便認為慢驚用溫驚藥治之三日病色危余曰兒本傷寒因熱盛欲發急驚偶因傷乳吐數口發搐看見兒舌白唇紅大便黃實目青身熱吐出酸臭此食癇也煎四順飲送下紫丸子瀉數行主人曰因吐生驚豈可雙下此藥答曰不入虎穴安得虎子況此病是食熱證不以下藥瀉熱無由驚定主人聽用瀉數行後以青金丹二服驚搐小定並琥珀散三服病退一半來日仍舊驚搐目鮮面赤唇紅小便少赤與洗心散驅風膏琥珀散各二錢病除主人以為愈更不服藥余曰病未全除血氣盛則當再發矣後五日果發搐再為驅風膏琥珀散洗心散治之安愈此兒名曰再生林有編修孫男二歲夾驚傷寒召醫視之五日忽發驚搐用珍珠丸下痰愈而復作召余視之曰兒本傷寒有下證為失下熱不去故驚搐也余以調胃承氣湯瀉數行與琥珀散驚搐遂定後有潮熱發時氣粗昏困大便焦黃絶熱退則連聲咳嗽氣粗延盛嗽退仍舊潮熱如此五日調理未退林友問此何病也答曰諸書皆不言嗽退而熱熱退而嗽古人立法止說大綱要之隨機應變不可膠柱調瑟也今此子餘邪流入心肺二臟相傳故曰熱退而嗽嗽退而熱經曰七傳者死間臟者生此乃七傳當死經曰七傳者心傳肺肺傳肝肝傳脾脾傳腎腎傳心一臟不再傷故言七傳者死也可喜者是秋八月肺旺受心之邪里兼食而不瀉尚可療救問曰何治法曰對證潮熱來時與小柴胡湯大柴胡湯各加黃連黃連能瀉心乃瀉其強也咳嗽來時與補肺散參杏膏潤肺散補肺者恐心傷肺故補其弱也錢氏云瀉其強而補其弱果愈主人曰兒病雖安願聞其理答曰以斧伐薪可謂必克矣然不修其理則斧可缺薪不可破以藥對病可謂必安矣然不修其證則藥不效病不得愈今二證交互嗽熱相刑當分證而治之主人曰善哉全嬰論云張氏二子大者十三小者十歲俱患頭疼發熱召余視之曰大者當汗小者當下主人曰所苦正同何異治也答曰大者病在表小者病在裡所以異治也即各與藥翌日俱安主人曰何知在表裡也答曰大者頭疼發熱但惡寒緣陰邪頗盛知病在表法當汗之小者頭疼潮熱不惡寒緣陽邪頗盛知病在裡法宜下經云陽盛陰虛下之當愈陽虛陰盛汗之即安汗與麻黃湯下與調胃承氣湯丁松秀才二女大者十五小者十三俱患頭疼大者不熱面青鼻塞小者頭疼有熱面紅鼻乾召余視曰大者瓜蒂散小者通頂散並吹鼻即安主人曰受病無殊用藥何異答曰孫氏云頭疼鼻塞因中寒濕頭疼鼻乾因受風熱今大者頭疼不熱面青鼻塞為中寒濕詢之病因沐頭倉公論曰沐頭未乾而臥則厥頭疼至肩瓜蒂散吹鼻出清水並溫水調服令吐涎未全退惺惺散加川芎小者頭疼有熱面紅鼻乾為風在腦詢之未病之前目青多眨肉多瞤動通頂散吹鼻令涕噴則可以知消息矣卻並以朴硝水調頂囟之上若未全退則又服消風散俱安主人曰小兒疾雖痊瘥然而其理則某未聞也余答曰鼻出清水者去其寒濕之病吹鼻噴涕者去其風熱又病同藥異之說故引素問云陽病治陰陰病治陽退熱以寒藥退寒以熱藥實病虛之虛病實之知斯道者用則必中小兒傷寒證候止議三種乃為正要有正受夾驚夾食前述傷寒並用脫甲散其病既分三種須當究論輕重鼻塞小便赤咳嗽關竅不通壯熱面紅頭疼體重渾身手足俱熱凡治小兒正受傷寒及感寒邪傷風諸證宜服人參羌活散小便赤色或心神不寧病在表裡之間或再復發宜與小柴胡湯一二服凡治小兒夾驚傷寒神困昏悸頭疼氣粗宜服王氏杜薄荷防風散凡小兒夾食傷寒即先與微利次與脫甲散或人參羌活散下之紫霜丸為取微利為度大抵小兒傷寒不可重表亦不可重下亦不可重行表之理令兒虛乏困重即成壞證難療凡小兒傷寒雖無多事須是認證分明應傷寒傷風只可表惟有夾食宜下之凡夾食傷寒腳微冷似有積證相類但此等傷寒自是不同不可不問知其端的然後次第進藥仍丁寧病家令避風濕與忌生冷弗令強力無恣飽餐恐勞胃氣其病再復且醫家調理即須審度有無是瘡疹盛時及左右鄰舍有無所患之者若或有之亦不妨事但表解藥與服不可妄投驚藥余無恙矣惟有壞證蓋由前人用藥不當撥亂陰陽故致為壞或因觸受風邪故致為壞或因強力食毒故致為壞或因冷濕傷於經絡故致為壞壞則極難治小兒傷寒候惟有咳嗽一證不為容易若有此證宜服人參枳實湯克效萬萬不可攻擊善醫者察之為良也傷寒是寒氣客於皮膚寒從外搏於血氣腠理閉密氣在內不得外泄蘊積故頭疼壯熱體疼所以須解其皮膚令腠理開津液為汗發泄其氣則熱歇凡嬰孩傷寒不可以燥藥發汗也發汗則孩子一向燥極於臟腑熱極傷於心氣多厥不可治也若以性寒湯藥陽受於冷冷熱相擊孩子一向驚叫不睡熱衝於腦頭縫開張皮肉筋脈四肢汗出如油手足或熱或冷多狂癲驚應即不可治也小兒身微熱口孜啀吐乳鼻塞咳嗽此候因母抱兒子當風處吹著背脊至此所治者當日下天麻散二服硃砂膏二服其患即愈不得誤動臟腑傷寒變證夾食夾驚中風傷寒各證不一因依根原各別下藥有殊如調理上件傷寒傳變吐不止大小便不通大渴耳內膿出身上生斑點赤心狂眼視鼻口乾燥死候不治嬰孩小兒單傷寒者渾身壯熱鼻流清涕身上寒毛起咳嗽欲喘宜用解傷寒紅綿散三二服間調胃氣進乳食觀音散一二服如有餘熱未退睡里多驚須進七寶輕青丹三二服胃氣觀音散二三服尋常風壅發熱鼻涕痰嗽煩渴惺惺散主之咽喉不利痰實咳嗽鼠黏子湯主之頭額身體溫熱大便黃赤腹中有熱四順散連翹飲三黃丸主之頭額身體溫熱大便白而酸臭者胃中有食積雙丸主之小兒無異痰惟飲食過度不能自節心腹脹滿身熱頭痛此雙丸治之小兒身體潮熱頭目發痛心神煩躁小便赤大便祕此熱劇也洗心散調胃承氣湯主之頭疼發熱而偎人寒者此傷寒證也升麻湯主之無汗麻黃黃芩湯有汗者升麻黃芩湯皆要藥小兒尋常不可過當服涼藥胃冷蟲動其證與驚相類醫人不能辨往往復進驚藥加麝腦之類遂發吐胃虛而成慢驚者多矣小兒須有熱證方可疏轉仍慎用丸子藥利之當以大黃川芎等㕮咀作湯液以蕩滌蘊熱蓋丸子巴豆乃攻食積耳問小兒傷寒疫者為何答曰神氣雖完性情靡定衣裳不擇於厚薄或恣情悅而著嬌縱不常生冷任意或過餐寒食之物因此致患頭疼寒促發熱憎寒或飲多尚渴或虛寒連連精神口孜啀困睡綿綿用藥須精審其根源察病表裡仍看脈體未可便下切須要知虛實消停藥分切須在意處方治之小兒傷寒形候分數類有兼驚挾實驚氣溫壯四證一兼驚者因患驚風三日治得驚退第四日至五日復有喘息粗大面色恍惚變動無時煩渴不止急且治脾宜下麥湯散平胃丸附子散萬萬記之不得冷藥恐冰卻脾氣伏熱不退二挾實者本因孩兒肥實吃食無度傷飽而閉卻胃氣其候嘔逆一見唇紅面赤便問曾吐嘔逆無如已曾吐嘔逆必須頭痛或瀉不止乃用鮓湯丸通利後勻氣散夾麥湯散服之三驚氣者本因氣膨脹咳嗽咽喉中涎響心間煩躁臟腑疼痛夢中虛驚烏犀膏滾涎次下麥湯散及大驚丸相夾服兩日後方下鮓湯丸通利一二日氣行後常服醒脾平胃湯藥如傷寒後或遍身生黑黯血所謂蘭斑形證不可用藥四溫壯者亦渾身微熱面紅常困睡微汗因客氣吹著毛竅冷氣急鼻塞大體與變蒸相似只在麥湯散紅綿散治之亦安小方脈論傷寒皆因三陰三陽受病緣未辨東西不能言語雖即遍身壯熱四肢不任其狀多喘難為識候凡傷寒與諸熱疾皆同奈諸熱不生呻吟惟傷寒呻吟眉聚是也宜服煎散茅先生小兒初受傷寒候歌小兒傷寒身壯熱面赤唇紅眼赤黃身上寒毛初凜凜更兼冷汗潤汪汪鼻中清涕涓涓滴小便如粉又如漿上喘鼻塞將加嗽口乾嘔逆是尋常看有諸般難治療別為章句好推詳茅先生小兒傷寒死候歌傷寒吐不止便溺更難通汗後發熱渴耳中瘡潰膿身生斑黑點鼻血出傾筒咳嗽四肢厥心狂下所攻體軟睡不寤腹脹喘聲雄手足心熱痛此候命須終又傷寒死候歌小兒傷寒面色黑耳內有膿聲噎塞氣逆吐瀉轉加增大腸乾涸浮脹極醫了精神還更昏千萬歸泉休費力玉訣小兒傷寒候歌鼻多清涕肺傷風寒氣相傳鼻不通壯熱脈浮生內熱發驚涎盛轉加濃此患先與治風後與下涎次調胃氣也玉訣小兒傷寒候歌鼻塞傷風肺受寒喘咳驚啼臥不安頰赤口乾頻發熱吐瀉邪攻臟腑傳此患先與解熱後下風涎次平胃氣故無誤也石壁經三十六種正傷寒候歌傷寒初得渾身熱惡哭多啼無喜悅眼紅臉赤類驚風鳳髓經無一句錯只看眼急似驚風卻被醫人道驚熱但須涼膈莫令渴渴便飲水無休歇若將三黃飲子服汗出身輕便無熱夫風寒邪客肌體汗閉熱氣內蘊致使煩躁而多渴喘嗽汗不得泄發熱不止若服冷藥太甚則使汗不出而反作劇也須先出汗次涼膈方愈若不然則慢脾慢驚緣此得之小兒目急壯熱氣喘嗽面赤先與解表散吃後用南星丸退風熱如不退將三黃散與吃小兒傷寒惡風惡風者必偎人藏身引衣密隱是為表證可為取其汗也惡熱內實者必出頭露面揚手擲足煩渴燥糞掀衣氣粗是為里證可略與疏利也至若頭額冷手足涼口中氣冷面色黯淡大便瀉青此是陰病裡虛當以溫藥救其里也舉是三者汗下溫之法可以類推矣發汗用桂枝麻黃各半湯加黃芩解肌用香蘇散加乾葛通利四順清涼飲微利人參散溫里理中湯厥冷甘草乾薑湯尋常感冒惺惺散或參蘇飲傷風發熱人參羌活或天麻防風丸壯熱者升麻葛根湯潮熱者生犀散小柴胡湯加大黃小便不通者導赤散五苓散甘露飲表裡俱熱加表裡俱見之證洗心散主之咳嗽則人參潤肺散加紫蘇夾食則異香散紫霜丸輩然亦視小便或赤或白可以知裡熱之有無或清或濁可以知裡熱之輕重幼兒嬰孩則以虎口指紋之紅色驗之長而童孺則一指按其三關據左手人迎之緊盛者斷之所謂七十二證其證其方皆無越張朱格例將不過小小分劑而中病則止也夫小兒傷寒與大人不同也小兒奇經未盛精神未全八脈皆虛七神尚弱語言不正喜怒不節性情未定非食穀味專於精神也真牙未生變蒸尚在豈不異於大人哉設令小兒十歲以上卒暴身壯熱惡寒四肢冷或耳鼻冷鼻中熱氣或為斑疹也與傷寒表證相似胎氣始發自內之外與傷寒表證同治者誤也當作小癍瘡治小兒傷寒身熱頭痛面赤者在表也粗氣腹滿小便赤澀者在裡也小兒形後雖有汗下之病未及五歲可以視聽未可脈別故不行於診五歲以上穀氣漸實可以脈別浮沉遲數表裡寒熱察色聽聲而得其全故知小異大同也辨小兒傷寒一口熱二口中醋氣三奶瓣不消四腹中疼痛也十二件傷寒雜證頭疼體痛是傷寒鼻塞或流涕是傷寒喉內喘息是傷寒兩手脈洪數是傷寒頰赤眼澀是傷寒身上寒毛起是傷寒口鼻出水是傷寒眼赤黃是傷寒口乾澀者是傷寒咳嗽者是傷寒山根赤色是傷寒噴嚏是傷寒凡傷寒發熱之初不問大人小兒急須表汗次當發散然調理須在一晝夜得熱退乃保無虞今之醫者多不用麻黃但初用惺惺散羌活散之屬此乃常法致有三失五日熱不除入於經絡搏於血氣傳變多證或作驚風漸至危篤傷生之命可不慎乎小兒傷寒當辨其證即投解肌湯三服汗透而熱漸輕次用人參羌活散或渴間以白虎湯次用參耆等藥夫毒斑有二證有溫毒發斑有熱毒發斑因冬月觸冒寒熱毒之氣至春始發熱溫毒發斑因夏觸冒暑毒發汗已經汗下熱毒發斑大抵斑毒四時感於乖戾之氣或未發汗下熱毒不散表虛里實血澀不行故遍身發出斑瘡及癮疹如錦紋巢氏云發斑不可用表藥夫陽毒傷寒者蓋言陽氣勝而為毒害其脈浮大而數身重頭疼面赤有斑斑如錦紋狂言見鬼咽喉腫痛下利膿血五日可治七日不可治也方加減惺惺散治小兒傷寒無汗頭疼發熱惡寒並天行熱氣生䵟豆瘡不快煩躁昏憒或出瘡痘身疼體熱者蒼朮茅山者川芎細辛羌活防風白芷栝蔞根甘草赤芍藥桔梗麻黃去節荊芥當歸上等分為末沸湯調下半錢或作飲子水煎亦可羌活散治大人小兒四時傷寒熱病時行疫癘山嵐瘴氣早晚中露霧及暴中風寒並宜服之不論陰陽證候老幼虛實服之使無變動汗出即安川羌活獨活柴胡去蘆水洗前胡去蘆川芎桔梗白茯苓蒼朮防風各一兩細辛去苗葉好者官桂甘草炙各半兩枳殼湯浸去瓤細切焙乾麩炒一兩上為細末每服三錢水滿盞姜三片棗二枚同煎八分去滓熱服連三服汗出便安小兒看多少加減服並乳下一吃如路行不及煎白湯點熱酒亦可人參飲治大人小兒傷寒候神聖方人參荊芥甘草防風乾葛肉桂五加皮桔梗川芎柴胡陳皮芍藥各半兩麻黃一兩去節依法制上為細末每用一錢水一盞入烏梅一枚煎六分服常服出汗熱進三二服大黃散治小兒壯熱實滯不去寒熱往來微驚悸人參羌活散治傷寒發熱及煩渴痰實咳嗽小兒寒邪溫病時疫瘡疹頭疼體痛潮熱羌活獨活柴胡去蘆川芎人參甘草炙白茯苓各一兩前胡桔梗地骨皮天麻酒浸焙各半兩枳殼一兩去瓤炒上㕮咀每服一錢水半盞姜一片薄荷一葉棗子半枚煎至三分大小加減瘡疹未發之前亦可服一方作細末大效人參枳實湯治傷寒後氣不和順喘急咳嗽胸膈鬱塞日夜煩悶神困力乏不思飲食仍治虛痰煩滿頭目昏暈但是傷寒感冷咳嗽並宜服之枳實四個米泔浸去瓤麩炒桑白皮甘草炙半夏湯泡七次仍切以薑汁浸白茯苓切片款冬花五味子阿膠麩炒細辛各半兩去葉人參一分麻黃去節苦梗各半兩上㕮咀每服小一撮水一盞姜三小片棗半個烏梅少許同煎至半盞去滓通口服二滓並煎凡小兒傷寒作熱頭痛等證或已發散退熱化痰定喘或已安神定志開胃進食孩兒平復父母忘憂喜之尚有咳嗽不愈由邪氣入肺無能得出不堪吐利何由而安凡兒傷寒後及感風咳嗽不愈者宜服之此藥瀉肺補氣寬膈化痰滋潤五臟和益三焦不惟治嗽調中更良大青散治小兒傷寒頭痛壯熱煩渴大青半兩知母半兩柴胡半兩去苗葛根半兩銼甘草半兩炙微赤銼川升麻半兩石膏一兩黃芩半兩芒硝一分赤芍藥半兩梔子仁半兩上為散每一錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意加減五味子湯治小兒傷寒病久不除瘥後復劇瘦瘠骨立升麻湯治小兒傷寒變熱毒病身熱面赤口燥心腹堅急大小便不利或口瘡者或因壯熱便四肢攣掣驚成癇疾時發時醒醒後身熱如火悉主之一名十物升麻湯升麻白薇麻黃去節萎蕤柴胡甘草各半兩黃芩一兩朴硝大黃鉤藤各六錢上㕮咀以水三升先煎麻黃去上沫內諸藥煮取一升兒生三十日至六十日一服二合六十日至百日一服二合半百日至二百日一服三合臨熱入硝再煎服麥煎散治傷寒咳嗽大便不通麻黃去節貝母炒知母大黃蒸羌活甜葶藶地骨皮炒石膏煅甘草炙滑石各一分上為末每服一錢水半盞小麥十粒薄荷一葉煎至三分服之十味湯一名敗毒散治小兒傷寒身熱頭痛咳嗽喘鳴鼻乾不得臥前胡去蘆頭柴胡去苗甘草炙銼人參獨活去蘆頭桔梗炒赤茯苓去黑皮枳殼去瓤麩炒芎藭羌活去蘆頭上粗搗篩每服二錢水一盞入生薑三片大棗二枚擘破同煎至七分出滓分溫三服一方加防風等分入薄荷煎服錢氏加甜葶藶半兩薄荷葉半兩一名羌活散麻黃湯治小兒傷寒寒熱往來麻黃去節牡蠣雷丸各分乾薑桂心枳殼厚朴炙各四分白蘞四分一去四合大黃六分蜀椒研一合上取豬脂一斤細切合藥杵熟入絹袋中炙微熱摩兒腹背手足令遍如袋汁盡絞令汁出摩訖粉之厚衣抱汗出宜於春夏用之至秋冬不可用也取汗湯治四五歲小兒傷寒麻黃三分去節射干甘草炙升麻芍藥貝母石膏碎各二分桂心一分杏仁去皮二十個上切以水三升煮至一升二合兒強者三合弱者二合便令臥取汗如人行十五里再服之辛梗湯理感風傷寒風熱頭疼熱壯鼻涕咳嗽有痰人參乾葛各三兩白朮茯苓去皮甘草炙細辛去土桔梗各一兩炒柴胡升麻各三分上㕮咀每服二錢水一盞生薑兩片薄荷三葉煎至五分去滓服不問傷寒傷風發熱宜先用此藥調之麻黃湯治小兒傷寒發熱咳嗽頭面熱者麻黃生薑黃芩各一兩甘草桂心石膏芍藥各半兩杏仁十枚上㕮咀以水四升煮取一升半分二服兒若小以意減之小青龍湯治傷寒瘟疫表未解惡寒體熱水停心下乾嘔發熱咳嗽喘急及主肺脹胸滿鼻塞清涕咳逆上氣喘鳴迫塞仲景治表不解心下有水氣乾嘔發熱而咳或渴或痢或小便不利或噎小腹滿而喘者主之麻黃三分去節微利者去麻黃加蕘花如彈子大炒令赤色若噎者去麻黃加附子半錢炮若小便不利小腹滿者去麻黃加茯苓一兩喘去去麻黃加杏仁三分去皮尖用赤芍藥三分半夏三分炮若渴者去半夏加栝蔞根三分細辛乾薑甘草桂枝去粗皮各三分五味子半兩上㕮咀每服三錢水一盞煎七分去滓加減服之八正散治小兒傷寒壯熱及潮熱積熱斑瘡水豆心躁發渴大便不通小便赤澀口舌生瘡大黃梔子木通滑石甘草炙瞿麥車前子炒各半兩地扁蓄一兩上為粗末水煎去滓量大小加減瘡豆中加紫草煎服不拘時一方為末每服嬰孩一字二三歲半錢四五歲一錢射干湯治小兒四五歲傷寒壯熱頭疼取汗射干甘草炙銼升麻芍藥石膏搗研各半兩麻黃去節根三分杏仁二十枚湯浸皮尖雙仁麩炒桂心去粗皮一分上粗搗篩每服一錢水一小盞煎至五分去滓溫服後以衣蓋覆出汗量兒大小加減犀角散治小兒傷寒頭痛壯熱犀角屑黃芩川大黃銼碎微炒赤芍藥麻黃去根節栝蔞瓤各一分柴胡半兩去苗石膏半兩細研上粗羅為散每服以水一小盞煎至五分去滓量兒大小以意加減溫服抵聖丸治傷寒五日不能言語熱在胸中犀角屑麻黃去根節黃芩釜下黃土梁上塵灶突墨各半兩川大黃銼碎微炒川朴硝各一兩上為末煉蜜和搗三二百杵丸如彈子大每服不計時候以新汲水研服一丸如渴飲新汲水當有汗出良久未汗即更服一丸汗出熱退能語若小兒即量力服之當歸湯治小兒傷寒發熱服解肌湯當歸桂心甘草炙黃芩芍藥人參乾薑各一兩大黃三兩上切以水三升煮一升去滓下芒硝一兩再煎三兩沸三百日半合二歲一合如不利加之取利為度輕青丹治嬰孩變蒸及小兒傷寒溫吐斑瘡水豆夜啼驚叫諸驚餘熱口內生瘡小便赤色一名七寶輕青丹葛粉鉤藤炒為末稱天竺黃各一分螺頭青黛半兩白附子三字丁香一字炒麝香一字別研用半皂子大亦得鉛錫灰二錢一名鉛白霜上為末粉粟米煮糊為丸如黃豆大嬰孩每服一丸分三服三二歲每服一丸分二服四五歲每服一丸薄荷蜜熱水磨下地骨皮散治虛熱潮作亦治傷寒壯熱及餘熱往來知母柴胡銀州甘草炙半夏湯洗切焙人參去須切焙地骨皮赤茯苓等分上為細末每服二錢姜五片水一盞煎至八分食後溫服量兒大小加減服之桂枝麻黃各半湯治太陽病得八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發微緩者欲愈也脈微而惡寒者此陰陽俱虛不可更發汗吐下也面色及有熱者欲未解也以其不能得小汗出身必癢桂枝去皮八錢一字芍藥生薑甘草去節各半兩杏仁十二枚去皮尖大棗二枚麻黃去節半兩上為細末每服三錢水一盞煎至八分去滓酌兒大小加減溫服大青龍湯治太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者宜用若脈微弱汗出惡風不可服及治傷寒脈浮緩身不疼乍輕乍重無少陰證者麻黃三兩去節桂枝一兩去皮甘草炙一兩杏仁二十個去皮尖大棗五枚生薑一兩半石膏如半雞子大上㕮咀水一盞煎至七分去滓每服三錢汗出為度量兒大小加減五味子湯治傷寒喘促脈伏而厥人參一分杏仁一分去皮尖炒五味子半兩麥門冬一分去心橘皮一分生薑一分棗子五個上為飲子水一盞煎至七分加減服小柴胡湯治太陽病十日以後脈浮細而嗜臥者外已解設胸脅滿痛宜服傷寒五六日中風往來寒熱胸脅苦滿默默不欲食心煩喜嘔或胸膈煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身微熱或咳者宜服血弱氣盡腠理開邪氣因入與正氣相搏結於脅下邪正分爭往來寒熱休作有時臟腑相連其痛必下邪高痛下故使嘔也宜服傷寒五六日身熱惡風項強脅下滿手足溫而渴宜服傷寒五六日頭汗出微惡寒心下滿不欲食大便硬脈細者為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉在裡也此為半在表半在裡也脈雖沉緊不得汗非少陰病所以然者陰不得有汗今頭汗出故知非少陰也宜服設不了了得糞而解陽明病發潮熱大便溏小便少胸脅滿宜服陽明病脅下硬滿不大便而嘔舌上白者宜服陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及目悉黃小便難有潮熱而嘔身前後腫過十日脈續浮宜服傷寒瘟疫身體壯熱頭痛項強腰脊四肢腫痛脅下牢滿乾嘔逆不能餐食及病瘥後往來寒熱痰實嘔逆肌體羸瘦倦怠少力活人書云身熱不渴表有熱小柴胡加桂閻氏云小柴胡治瘡痘甚驗柴胡二兩黃芩人參甘草炙各三分半夏一兩半炮生薑三分大棗十枚上為飲子加減煎服孫兆改名黃龍湯近世此藥盛行患傷寒不問表裡陰陽皆令服之甚誤矣此藥傷寒論雖主數十證其間有二證不可服有五證最的當服之必愈不可服者有二證一者因渴飲而嘔二者身不溫熱當識此二證明矣可服者五證一者身熱心中逆或嘔逆二者寒熱往來三者潮熱四者心煩脅下痛或渴或不渴五者傷寒已瘥後更發熱此五證但有一證更弗疑便可服之必瘥餘證候子細證詳方證及脈後相當方可用不可一概用也世人但知小柴胡湯治傷寒不問何證便服之反有所害緣此藥稍寒也唯此五證按而行之庶無失也不可不察也本方更有加減法雖不在此五證內用之亦效今亦載於此若胸中煩而不嘔去半夏加人參栝蔞根各一兩腹中痛去黃芩加芍藥三分極效常時腹痛亦療脅下痞硬去大棗加牡蠣一兩若心下悸小便不利去黃芩加茯苓一兩若不渴外有微熱去人參加桂枝三分溫覆微汗愈若咳嗽去人參大棗加五味子半兩乾薑半兩元祐二年時行無大小皆咳嗽服此皆愈常無上壅痰實只依本分臨臥食後服甚效赤白痢中藥無如此驗蓋痢多因伏暑此藥極解暑病凡傷寒之人審是暑不問是何候連進數服即解一方治傷寒發渴鼻衄加生地黃上㕮咀每服二錢水半盞生薑三片棗子二枚煎至二分去滓溫服溫病中暑熱甚宜服葛根橘皮湯治小兒冬寒未即病至春積寒所折不得發至夏得熱其寒解冬溫始發肌中斑爛癮疹如錦紋而咳心悶但嘔清汁者宜服葛根橘皮杏仁去皮尖炒知母黃芩麻黃甘草炙各半兩上㕮咀白水煎加減服大黃散治小兒陽毒傷寒未解熱結在內恍惚如狂大黃一兩桂心三分甘草木通大腹皮各一兩芒硝七兩桃仁二十一粒去皮尖麩炒上為末白水煎服通利為度清神散治小兒傷寒無汗咳嗽身熱無時潮熱鼻中塞一名惺惺散方見加減惺惺散和解湯治小兒四時感冒寒氣壯熱煩渴鼻多涕驚悸自汗肢節疼痛及瘡痘已發未發者皆可服羌活防風川芎人參各一兩乾葛川升麻輕者甘草微炒各半兩上為粗末每服三歲兒一錢水一小盞生薑半片棗子少許同煎至七分去滓服不拘時量兒大小加減柴胡散治小兒傷寒壯熱頭疼體痛口乾煩渴石膏黃芩甘草赤芍藥葛根各一兩麻黃去根節柴胡去苗各半兩上為散三歲兒每服一錢水一小盞入生薑少許蔥白三根豉二十四粒同煎至五分去滓溫服不拘時汗出為效量兒大小加減白朮湯治小兒傷寒頭痛肌熱喘粗白朮人參麻黃去根節甘草炙銼葛根藿香去根桔梗炒各半兩上粗搗篩每服一錢水半盞煎至三分去滓不計時候溫服石膏湯治小兒傷寒頭痛肌熱喘粗石膏碎一錢白朮半兩麻黃去根節桔梗炒甘草炙水萍暴乾杏仁湯浸去皮雙仁炒各一分上粗搗篩每服一錢水小半盞蔥白少許煎至三分去滓溫服不拘時候黃芩湯治小兒傷寒體熱面赤口乾或咳嗽黃芩二兩去心麻黃一兩去根節桂心去粗皮甘草炙石膏芍藥各半兩杏仁十枚湯浸去皮尖雙仁炒上七味粗搗篩每服一錢水一盞生薑三片煎至二分去滓量兒大小加減七物黃連湯治夏月傷寒四肢煩疼發熱其人喜煩嘔逆滿劇如禍祟寒熱相搏故令喜煩黃連茯苓黃芩芍藥葛根各一兩甘草炙一兩六錢小麥三合上㕮咀以水七升煮取三升冷分三服不能一升者可稍稍服之湯熱便吃藥去毒氣服湯之後胸中熱及咽喉痛皆瘥其明日後煮一劑如法服之此湯無毒但除熱下氣安病人小兒服者取二分之一以水四升煮得二升稍稍服乳香丸治小兒百日內患傷寒壯熱速宜療之鏵鐵一斤燒令通赤以水二升淬之如此三七次煎取二停更入柳葉七片浴兒取用胡油麻二十一粒松柏葉二七枚牙硝乳香各一分金箔白芥子二七粒上並搗為末蜜丸如彈子大以青物裹一丸如燒香法熏兒雙足微有汗出便瘥紅綿散治嬰孩小兒單傷寒及夾食傷寒麻黃去節焙全蠍炒甘草炙蘇木炒大黃用濕紙裹炮令熟切焙天麻生白附