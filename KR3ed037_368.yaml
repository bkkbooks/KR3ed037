渴瘡疹並宜服之石膏三錢水飛膩白滑石一兩甘草炙銼七分上為細末每服三錢煎薄荷湯下白湯亦可不拘時候傷寒挾實附論夫小兒傷寒而臟氣實者即寒氣相搏而壯實者謂之挾實也挾有二種有冷有熱其熱實者能食糞堅而臭氣也其冷實者食不消糞白而酸氣也以此推之雖冷熱相殊外皆壯熱也方赤芍藥散治小兒傷寒挾實壯熱憎寒頭痛赤芍藥知母子芩人參去蘆頭枳殼麩炒微黃去瓤甘草炙微赤銼石膏川升麻各一分柴胡半兩去苗上為散每服一錢以水一小盞入青竹葉七片煎至五分去滓不計時候溫服隨兒大小以增減服之柴胡散治小兒傷寒挾實壯熱心煩柴胡三分去苗當歸一分赤茯苓川大黃各半兩銼研微炒甘草炙微赤銼赤芍藥各一分上為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小以意加減犀角散治小兒百日以來傷寒挾實壯熱多驚心躁犀角屑川朴硝龍膽各一分去蘆頭川大黃半兩銼碎微炒甘草炙微赤銼枳殼各一分麩炒微黃去瓤上為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意加減厚朴散治小兒傷寒挾食心腹脹滿不欲乳食厚朴半兩刮去皮塗生薑汁炙令香熟川大黃銼碎微炒人參去蘆頭陳橘皮湯浸去白瓤焙甘草炙微赤銼朴硝各一分上為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意加減大黃散治小兒四五歲傷寒壯熱挾實心腹脹悶川大黃一兩銼微炒甘草炙微赤銼麥門冬去心焙細辛黃芩各半兩上為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意加減夾驚傷寒附論夫小兒傷寒是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積生熱故頭痛體疼而壯熱也其兼驚者是熱乘心心主血脈小兒血氣軟弱心神易動為熱所乘故發驚驚不止則變驚癇也治小兒中驚兼傷寒候大熱狂躁荒虛亂言煩渴此候因驚熱所傳治者急用麥湯散三服微汗出次日下硃砂膏二服熱漸退第三日下金青丹通三次用勻氣散惺惺散相夾與服第四日身體有伏熱即下大附散夾回陽散與服即愈治夾驚傷寒候渾身壯熱心躁發渴睡里多驚手足不定面額赤色兩眼睲瞪小便赤宜薄荷散三二服間用調胃氣藥更進七寶牛黃丸治驚及金蓮散三二服退熱如次依用藥不退往往變作驚風玉訣小兒傷寒驚搐歌傷寒驚搐即生涎胃熱乘虛變身斑額赤口乾脾受熱涎高風盛發狂言風盛太過胃邪乾燥先與解之涎實下之傷冷溫之熱即利之利涎調氣即無誤也又曰傷寒熱病胃邪攻燥渴頻頻面色紅本是先傳心與肺急須解利治驚風此乃傷寒在表宜坯煎散次烏犀膏利涎又與調榮衛忌用熱藥石壁經三十六種夾驚傷寒候歌腳冷頭燒氣不和漸生喘急愛眠多不時夢裡頻頻搐鳳髓經注云夢裡驚擲極嗽生涎可奈何吐休汗止方為解解熱消涎去久疴汗出除驚方已疾其餘平藥與調和先調氣次發汗和解次即涼膈膈涼則涎自化矣涎化則搐自住此患有先受傷寒後受驚亦有先驚而後受傷寒即先退傷寒後退驚先受驚即先退驚也如退驚與南星丸如有餘熱更一服大青膏如退傷寒即與解表散後服調胃散小兒傷寒夾驚候其脈浮洪傷寒者小兒內停冷乳包嚼之食外傷冷風於腠理令兒面黃色兩頰紅色鼻塞氣喘身上寒毛起鼻流清涕咳嗽噴嚏煩躁吐食頻多下泄小便如粉皆是傷寒候若加睡中驚擲狂叫睡臥不安穩是夾驚傷寒宜與坯煎散並三服取汗次與鎮心丸若加大喘啼叫是傷寒正受後宜與三黃散三服次與麥湯散三服退熱方乳香膏治小兒夾驚傷寒壯熱涎鳴風熱壅盛鎮心化涎退熱定搐搦硃砂鉛白霜天竺黃葛粉人參茯苓各半兩天麻甘草各三錢炙白附子一分乳香二錢牛黃麝腦各半錢上為細末煉蜜為丸如梧桐子大薄荷湯化下二丸坯煎散治夾驚傷寒及解驚發汗全蠍川烏炮去皮尖甘草硃砂大黃羌活川芎麻黃去節天麻酒浸腦麝白殭蠶去絲以上各等分上為末每服一錢半入坯子五粒蔥白半寸煎三四沸通口服二三服出汗麥煎散治小兒夾驚傷寒吐逆壯熱表裡不解氣粗喘急面赤自汗或狂言驚叫或不語無汗及癮疹遍身赤癢往來潮熱時行麻豆疹子餘毒未盡渾身浮腫痰涎咳嗽或變急慢驚風手足搐搦眼目上視及傷風涎喘頭疼並治之知母陳皮地骨皮揀淨白茯苓去皮甘草炙石膏葶藶子赤芍藥人參滑石杏仁去皮尖麩炒各半兩麻黃一兩去根節上為末每服一錢麥子煎湯調下如初生牙兒感冒風冷鼻塞身熱噴嚏多啼每一錢許並用麥煎湯下一方用肉桂無赤芍藥有知母金泥膏治傷寒邪熱乘心兼發驚病菖蒲一十九節者遠志去心鉤藤各一兩人參去蘆頭草龍膽甘草炙令半兩以上搗羅為細末次用水銀一分牛黃別研一錢金箔二十片同水銀和研如泥麝香研一錢上件勻用蜜半斤酥四兩用銀鍋或石鍋中先入水二升除去金泥酥蜜外先入諸藥慢火熬至一升用新綿濾去滓再下酥密金泥攪勻用柳枝不住手攪熬成膏用瓷器盒盛每用一豆大薄荷湯化下防風天麻散祛風鎮驚及傷寒夾驚坯煎散治小兒夾驚傷寒渾身壯熱睡擲咳嗽煩躁下泄多川烏頭半兩炮去皮尖大黃蒸熟三錢雄黃白附子甘草炙川芎去皮天麻去梢殭蠶去足各一錢麝香少許麻黃去節四錢上為末每服一錢或半錢大者一錢半水半盞入坯子五粒蔥白半寸同煎數沸溫服如出汗並三服紅綿散治小兒夾驚傷寒頭疼壯熱心煩氣粗驚悸天麻白附子全蠍去足殭蠶炒去絲嘴大黃炮麻黃去節甘草炙硃砂一方不用蘇木炒南星炮上等分為末每服半錢紅綿少許水半盞煎三分麥湯散治夾驚夾食傷寒氣急嗽涎滑石石膏知母貝母麻黃杏仁炒制研甘草葶藶薄紙盛炒人參地骨皮去骨各等分上為末每服一錢小麥二十粒煎湯下涎盛氣促桑白皮湯下梨漿餅子治小兒傷寒驚搐治風下涎輕粉半兩鐵粉荊芥穗辰砂臘茶各一錢郁李仁七個去油粉霜半兩牽牛二十七個微炒腦麝少許上為末煉蜜為餅子加減用梨汁薄荷湯化下三十六種白附子散治夾驚傷寒白附硃砂各三分全蠍一分半黑附子炮去皮臍雄黃羌活各半兩石膏七錢半麻黃一兩去節腦麝隨意別入研上為末每服半錢薄荷臘茶湯下有熱再服麥湯散治小兒蒸伏熱傷寒咳嗽嚏噴體熱面赤麻黃去節滑石甘草杏仁去皮尖大黃蒸地骨皮芍藥北葶藶子上各等分為末每服半錢一錢或一字小麥薄荷湯下薄荷散治夾食傷寒熱極生風頭疼壯熱嗽涎鼻塞及時行瘡痘已發未發皆可服薄荷葉半兩羌活全蠍麻黃去節甘草各半錢殭蠶天竺黃白附子炮各一分上為細末每服一錢水小半盞煎至三分加竹瀝少許妙一方為末薄荷茶清調下孩兒一歲至三歲半錢白霜丸治小兒驚風傷寒四五日未得汗搖頭揚手上竄多啼叫不睡吃水不休鉛白霜硃砂馬牙硝天竺黃人參甘草炙各半兩山梔子一兩上為末煉蜜為丸如梧桐子大每服一丸令熱蜜湯化下沒石子膏治驚風胃氣虛弱吐後手足搐搦眼下及唇青者不進飲食是夾驚傷寒沒石子三個生用人參訶子炮白朮各二錢丁香五七個甘草炙半兩香附子三十七個去皮上為末勻煮硃砂研丸如桐子大不進飲食白朮湯下鐵刷散治夾驚傷寒麻黃去根節一兩甘草炙半分細辛半兩石膏葶藶青皮各一分杏仁十一個上為末如小兒傷寒三二日壯熱不曾調理外風把定關竅傷寒面黃色白壯熱微渴此是傷寒候三五日內心臟熱面赤唇紅多燥壯熱熱極生涎即為驚也元初傷寒傷風為傷寒此候為夾驚傷寒也如此患先下異攻散二服柴蘇木瓜湯煎服後以此藥半錢水一盞姜三片煎至四分溫服頭面微有汗解傷寒不退如壯熱煎勝金散如壯熱後多睡更煩躁口乾手足冷此是外風把定關竅用綿煎散一服發汗汗出關竅通只用異功二服和氣更服此藥解傷寒回陽散治小兒夾驚傷寒蒼朮一兩米泔浸一宿甘草炙半兩白朮炮半兩陳橘皮去白半兩木香大附子炮去皮臍各一分上為末每服一大錢用鹽湯空心點服看形候下之紅綿散治小兒夾驚傷寒吐逆燥悶熱渴夜啼不睡常服溫平鎮心不涼過一百日後六七日間進一服不妨全蠍人參白茯苓天麻各等分麻黃半兩去節大辰砂一錢上為細末將辰砂細研一同和勻每服一小錢少許薄荷葉同煎十沸溫服天竺黃散治小兒傷寒退驚涎白殭蠶鬱金天竺黃山梔子蟬蛻甘草炙各等分上為末每服半錢金銀薄荷煎湯下治小兒夾驚傷寒渾身壯熱涎盛發搐搦蠍七個荊芥麻黃去節白附子白礬各一錢蘇木少許上為細末每服一錢水一盞煎至五分服之金蓮散治嬰孩小兒潮熱傷寒夾驚連翹山梔子去殼甘草炙防風蟬殼洗去土令淨各等分上為末每服嬰孩一歲二三歲半錢四五歲一錢用水一藥注或半銀盞煎十數沸溫服千金丸治小兒夾食夾驚夾風傷寒微轉硃砂末一錢膩粉一分麝香半錢白丁香全蠍各七個末上為末和勻白飯為丸如蘿蔔子大薄荷湯下每服三丸綿煎散治傷寒退熱麻黃一兩去節天麻紫蘇天南星油煎赤色殭蠶各半兩上為末小兒傷寒驚風壯熱面赤沉困頭疼不進飲食用水一盞藥半錢綿一片薄荷湯調下睡時更煎鐵刷散一服夾驚傷寒無驚只是傷寒二日進二服一方無麻黃紫散子治傷寒夾驚通利發汗用紫散子但是傷寒身熱急服如是積劫服經驗銀液丸天麻一兩川芎半兩鐵粉三分土色者硼砂一錢上為末入腦麝各少許同研每服一次半錢金錢薄荷湯下並二服汗自出紅蓮散治小兒夾驚咳嗽氣急體熱驚悸和順瘡痘硃砂一錢麝香一字腦子少許南星一兩薑汁浸一夕煮乾皂角水一盞浸一夕煮乾荊芥水一盞浸一夕煮乾再焙上為末三歲兒服一字薄荷湯調下一方用天麻一錢紅龍散治小兒夾驚傷寒額赤氣粗睡臥不安及治驚熱小便不通服之海金砂半兩硃砂二錢腦麝各半字桂府滑石一兩半上為末燈心湯調下紅桃散治小兒夾驚傷寒頭疼壯熱涎潮驚悸多哭氣粗心煩及治氣壅膈節不通石膏寒水石各一兩腦麝各半字上為末燈心湯調下大小加減服之勝金散治小兒傷寒熱驚風麻豆瘡疹潮熱天南星一兩白附子半兩雄黃二錢上為末每服一錢水一盞蔥白三寸同煎三分作三度與一匙服無惜散治夾驚傷寒浮萍紫背者一錢犀角屑半錢鉤藤鉤三七個上為末每服一錢蜜水調下連三服出汗為度後常服亦佳
