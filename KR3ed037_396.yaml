body:
  text: 卷三百九十六嬰孩下痢門一切痢附論夫小兒八痢曰冷曰熱曰疳曰驚曰冷熱不調曰休息曰瀼曰蠱毒諸痢無積不能成冷痢白積熱痢赤積冷熱不調積下赤白疳痢黃白積下無度驚痢青積休息痢糞黑如魚腸愈而復作瀼痢停積不下肚大飲食不為肌膚氣息大便利澀疼痛啼叫蠱毒痢下紫黑不可不詳參略具數方量大小以方藥斟酌用之痢與瀉名雖不同感受之源一也胃為水穀之海其精華則流布以養五臟其糟粕則傳送以歸大腸葛氏曰內由腸胃虛冷乳食積滯外因感冒寒熱所傷遂成瀉痢楊氏曰傷風者自汗惡風痛引腰脊鼻塞項強夾寒者筋節拘急面慘惡寒傷暑者面垢煩躁渴飲水漿背寒自汗傷濕者肌肉虛浮身痛重著冷則腸鳴肚疼而手足清冷熱則煩躁身熱而手足溫熱不調者乍澀乍冷熱積於內者不能去其積徒以冷藥解之熱氣無所發泄故冷熱相搏而下注或冷積於中不能去其滯徒以熱藥壓之冷積不能宣通故冷熱相干而成泄下傷食一證食飢傷飽胃不能消心腹膨脹所下酸臭夜熱晝涼泄者若脾胃合氣以消水穀水穀既分安有所謂脾積而泄也痢之赤白其赤者熱乘於血血滲大腸則赤也若風邪夾熱則所下黃而赤焉白者冷搏腸間凝滯則白也若寒邪並之則所下白而黑焉冷熱相交故赤白相半重者狀如膿涕而雜之輕者白涕中間微有黑縷內挾風邪故清血汪毒於腸胃之間則下如豆汁或有瘀血也痢頻不食腹脹喘粗下糞如黑漆身熱渴脈大者皆不可治也楊氏曰究以受病之源決以對病之藥大要散風邪行滯氣消積滯開胃脘為先不可便用肉豆蔻訶子白朮輩補住寒邪不可誤投罌粟殼龍骨榴皮等閉澀腸胃邪氣得補而愈勝腸胃澀滯則腫脹日久淹延而未愈也至若泄瀉之後腹滿身疼厥逆是為表裡俱病急與理中湯溫里仍以桂皮湯解表活人書已言之泄瀉而面色青慘者肝經受寒寒為肝之賊木能勝土古人慮之特設當歸厚朴湯以活之玄機論曰大便黑者雖瘥痢出於積滯積物積也滯氣滯也物積欲出而氣滯之不與出是以下墜裡急乍起乍止日夜頻並多因傷暑伏熱食啖熱毒之物而得物積用巴豆大黃輩氣滯用枳殼桔梗青皮蓬朮等以黃連丸佐之阿膠丸乃大腸虛滑有熱毒留滯則能疏導無熱毒則能安愈無阿膠丸即以當歸青皮赤茯苓黃連阿膠炒作劑入烏梅濃蜜同煎甚能蕩滌惡穢積滯既去痢數漸疏調以木香茯苓縮砂白豆蔻陳皮甘草和胃食後以真人養臟湯易簡斷下湯可止則止下痢雖曰有積有暑如用藥不效即是腸胃有風邪冷熱如熱者赤者宜敗毒散冷者白者宜金不換正氣散加木香下痢壯熱須用敗毒散如陳米飲調五苓散佐之或下阿膠丸凡卒暴注下皆因乳食不節脾胃傷胃濕熱水穀不分洞泄不止夏熱飲水食冷之由多有之有可便服止瀉及溫暖之劑必成裡急後重成痢積也凡痢疾不進乳食此乃邪氣疫毒敷入臟腑必成噤口痢九死一生先當用敗毒散加陳糯米一百二十粒服之效傷食痢乃哺乳太飽損傷脾胃不能消化遂成積痢其證夜熱晝冷氣急發渴目胞腫肚硬下痢酸臭湯氏曰此瀉難止亦不宜補當應紫霜丸或五積丸白湯下取其積虛者調消積飲吞下補脾止痢消積飲同益黃散煎縮砂湯調服熱血痢裡急而痛已疏通而下吐乃榮血虧少當於藥中以川芎為佐以調榮血凡小兒患痢之時發熱久積氣虛其臟腑虛急作熱此屬惡候終見痢後作熱此兒臟腑虛弱同於虛熱主治其或三焦熱引飲不歇四肢浮腫者理宜溫補臟腑散除濕氣喘則難治凡痢熱疳熱吐瀉熱不可發散退熱不佐寒涼藥但理其病源調其臟腑和其榮衛生其胃氣令進飲食加與痢藥服之參酌赤白多少膿血相雜裡急後重用行血厚腸胃和中脘溫臟腑其熱自然退愈凡小兒患痢不問輕重悉忌葷腥冷熱炙煿醃咸陰毒之物若恣口腹愈而復作若要永安須用戒絶之矣赤痢當用黃連地榆罌粟殼阿膠等藥白痢當用乾薑訶子龍骨人參豆蔻等藥赤白痢當用沒石子黃連豆蔻噤口痢治當用先助胃壯脾漸能入食始用木香橘皮等藥若更虛弱加以附子依此調理數日飲食頗進漸有黃糞夾雜脾胃漸能布化當以去積藥下之若據幼幼新書皆用褊銀丸今之小兒非上古稟受之比久痢腸胃已薄豈宜用膩粉藥以取之若執方反成大害余治痢之法若欲取積只用官局進食丸甚穩雖取積而又能治痢萬無一失積已下急以四君子湯加豆蔻訶子補之以常服厚腸藥丸此得效之法然有準定恐孩兒有虛實又當隨機變化虛極者加以附子之屬凡痢久則冷腫滿下焦偏冷上焦熱結熏蒸於肝則服昏生翳古今八痢者因觸八邪所得故名八痢八邪者飢飽勞疫風驚暑濕八般痢者強而為名其實皆冷熱所作也下痢舌黃燥不渴胸中實熱腹滿身熱譫語者復有燥糞大柴胡湯下之後與澀腸痢藥如覺有食積或久痢不退先補脾次與妙靈丸下之後再補脾胃若下痢者舌白而渴小柴胡加罌粟無如此妙也大柴胡湯亦宜加之虛腫者女面散痢後成疳眼生翳者六甲丸並去濕平疳藥治之楊達神綱子五歲七月中患痢自與治不退召愚視之見兒攢眉乃痢之後作煩主人問兒欲思酒可與否遂問兒平日曾飲酒曰不曾飲痢忽思酒時欲飲之答曰此病不治素問云病不治者治之無功蓋痢欲思酒者是大腸已虛津液已枯榮衛不能相滋是猶日薄西山無住之況主人怒曰兒痢方十餘日久又能食而不熱證候平穩何相駭也若果不能治幾日當絶答曰今未絶直候兒兼食藥喉中鳴響三日內涎潮肺絶當卒有氣急者五日不退再七日而死矣肺與大腸為表裡俱絶即死正如齊侯抱將死之疾怒扁鵲之先見也乃長揖而退楊別易數醫旬日病雖不退皆言不妨忽一日咽湯飲喉中鳴響再告召愚楊慚對曰果如斯言能救之否答曰不可果三日內涎潮而卒後楊請問此二證出何書而説死答曰諸書皆不載歷試三十年纍見斯證試之多驗故敢言不治也知縣冷世修子三歲夏中患膿血痢纍醫作食痢或作暑痢或作疳痢或用感應丸或用胃風湯紫丸子下之並雜藥共治五十餘日皆無應效召愚視之其證面黃憔悴多睡露晴溫熱腹疼大便黯血或如豆汁雜色腥臭愚曰病久證危可喜者面白而不昏是形氣相得色黃而滋潤是色澤以浮脈沉而有力是脈從四時素問曰形氣相得謂之可治色澤以浮謂之易治兼脈從四時又手足不冷雖危可治蓋此病脾胃有風虛中有積前後醫者雖以胃風湯去風下氣紫丸子下積滯但積滯猶在所以進退日久也問曰何知有風積錢氏曰多睡露睛身溫風在脾胃故大便不聚孫氏曰大便雜色米穀不化腥臭肥膩虛中有積或腸中沉冷今用四君子湯胃風湯四物湯此三藥助氣和胃調脾活血共治五日各二服次與宣風散連進二服令微微去脾間風再進前藥二日空心與妙靈丸一服去沉積瀉數行再以四君子湯加訶子末一日六服後以訶子膏駐車丸治愈方大效至聖千金飲子活幼口議治小兒脾積虛痢下五色先由嘔吐復作泄瀉臍腹㽱痛脅肋脹滿受濕虛鳴膿血相雜下如豆汁亦如瘀血日夜無度食少飢羸宜服綿黃耆蜜炙甘草陳皮罌粟炙木香白芍藥地榆川當歸枳殼制炒黑豆炒烏梅淮棗白朮訶子炮去核稱黃連上等分㕮咀每服一錢水一小盞煎至半去滓通口與服議曰臟腑虛中加燥故患熱痢或爾虛寒或患冷痢或有暑氣胃之水穀不分或受濕氣臨之腸胃有因食毒傷觸脾肺或因宿冷停積臟腑或因表裡不解因冷熱相承或因飲饌過多或因飲饌不及多食醃咸常啖魚腥或是母懷胎恣其口腹積之日久氣不宣通遂令患疾再加發作無度畢竟腸胃虛損日夜呻吟痢下頻並宜服此方效驗生熟飲子活幼口議治嬰孩小兒虛積痢腹肚疼痛裡急後重日夜無度罌粟殼大者四個一半炙此一味去盡內瓣者佳陳皮二片半炙甘草二寸半炙烏梅二個半煨淮棗二個半煨生薑二塊指大半煨木香一兩作兩片半煨訶子二個大者半煨黑豆六十粒半炒黃耆二寸半炙白朮二塊半煨當歸二寸半煨上件各半生熟㕮咀和勻每服三錢水一小盞入磁瓶內煮濾去滓任意與服至多勿慮所有生黑豆不要破只完全同煎效議曰病有冷熱藥有生熟病有陰陽藥有造化病有虛實藥有君臣按君臣以理虛實分生熟而均冷熱治療主本之法也平和腸胃之方也順益三焦之功也安調五臟之至也陰陽既分冷熱既散腸既厚三焦既益五臟既順良由藥有造化且水穀自分榮衛自正糟粕自聚其瀉與痢何患不愈生熟飲子之功乃盡天下之妙不可忽澤漆茱萸湯治小兒夏月暴寒寒入胃則暴下如水四肢被寒所折則壯熱經日熱不除經月許日變通身虛滿腹痛其脈微細服此湯一劑漸漸安神澤漆青木香海藻各二分吳茱萸茯苓白朮桔梗芍藥當歸各三分大黃一分上㕮咀以水四升煮取一升半一百日至一歲兒一服二合半一歲以上至二歲一服四合養臟湯治冷熱不調泄瀉裡急後重木香白芍藥各八分訶子肉三錢人參白朮當歸各三錢甘草炙肉桂各四錢罌粟殼去筋蔓蜜炙一兩上銼薑棗煎服生金牛黃湯千金方治小兒積下不止因發癇生金二銖一方用六銖無生金用熟亦得法應作屑今方用成器者牛黃三銖麻黃二分黃連乾薑人參甘草各一分細辛半分上㕮咀以水一升六合煮取八合去滓臨服研牛黃以煮湯中如兒熱者用生薑代乾薑今世之生金但用成器金亦善二三兩皆得用也胃風湯全嬰方治小兒風冷乘虛客入腸胃水穀不化泄瀉注下胸脅虛滿腹鳴肚疼及腸胃溫毒下如豆汁或下瘀血日夜無度身熱不食人參白茯苓去黑皮白朮白芍藥當歸切焙川芎官桂去粗皮罌粟少許上等分為末每服三錢水半盞煎三分空心日二服量兒大小加減訶子湯醫方大成治冷熱不調泄瀉裡急後重訶子肉炮人參去蘆白茯苓去皮白朮各一兩木香炮陳皮去白甘草炙肉豆蔻各等分上末薑棗煎服手足厥冷加附子梅肉散醫方大成治渴痢不止眼生翳障身體浮腫烏梅肉炒綿黃耆乾葛各一兩川黃連栝蔞根乾薑甘草各半兩上為細末每服一錢水一盞煎至六分去滓時時服厚朴丸治小兒腑臟怯弱風冷邪氣客之令兒腹脹氣不宣通甚者變為下痢厚朴薑汁塗丁香木香白朮各一兩青皮去白半兩牽牛子一分炒上為細末煉蜜搗成膏如黍米大每服十粒煎陳皮湯下木沉散醫方妙選治證同前方木香沉香益智各一兩去皮草豆蔻麵裹煨蓬朮白豆蔻各半兩上為細末每服一錢水八分生薑三片煎至五分去滓溫服丹砂丸聖濟總録治小兒一切痢疾丹砂研半錢砒霜研半錢巴豆霜研硫黃研麝香研緑豆粉研各一分上細研令勻燒飯為丸如豆大每服二丸血痢煎黃芩湯下白痢煎附子湯下疳痢蛤粉湯下龍骨丸一名香連丸和劑方治小兒冷熱不調泄瀉煩渴米穀不化腹痛腸鳴或下膿血裡急後重夜起頻並不思乳食肌肉消瘦漸變成疳龍骨白石脂乾薑炮黃連去須微炒白礬煅各半兩上為末醋煮麵糊和丸如麻子大每一歲兒服十丸米飲下乳食前服如煩渴煎人參湯下更量兒大小加減日三四服益黃散儒門事親治小兒一切痢冷熱不調泄瀉裡急後重脾胃虛弱腹痛泄痢不思乳食嘔吐不止困乏神懶心脅膨脹顏色青黃懨懨不醒陳皮去白訶子肉丁香甘草炙青皮去瓤各等分上為末米湯調服楊氏曰本用青皮陳皮太疏利宜加肉豆蔻去青皮久痢由腸胃虛冷滑泄下痢罌粟訶子龍骨等皆澀腸止痢之藥必先以縮砂湯下感應丸去積等劑候其積消方可服此粟殼本用治嗽今用治痢功能澀氣令人滿悶不食能消息去之尤為妙也一方水煎服梅煎散治小兒暑毒下痢煩渴肚疼發熱赤芍藥黃連甘草各一兩罌粟殼三兩上為細末三歲一錢水半盞烏梅一個煎三分去滓食前服訶子膏全嬰方治小兒久新痢疾煩渴不食訶子炮赤石脂甘草罌粟殼炒等分上為末煉蜜丸雞頭大每服一丸米湯化下豆蔻散活幼口議治嬰孩小兒腸胃虛弱糟粕不聚泄瀉不止或赤或白冷熱不調日夜頻並愈而又發宜服殢腸豆蔻散良方肉豆蔻火煨一個胡粉炒二錢龍骨生一錢白礬枯一錢上為末每服一錢溫飯飲調服不拘時薄糊丸麻子大五十丸議曰胡粉即真鉛粉也以鉛法造出韶州名韶粉定州名定粉總名光粉其性殢故用之以殢其腸令不虛滑豆蔻溫臟之藥安和腸胃龍骨白礬澀腸止痢所患大腸虛滑下痢日夜無度者服之隨時痊瘥一應葷腥之物醃咸之屬悉與禁止亦治秋間白痢至效白餅子活幼口議治小兒秋痢號曰毒痢純下自腹肚痛白礬枯白淨膩粉一錢白麵半兩胡粉炒一分上件和勻水搜作餅如錢大每服半餅大者一餅飯飲磨化議曰秋氣金旺則母虛矣夏月火燥則子困矣夫人五臟六腑乃循四時而行故曰秋溫脾胃若胃中有毒禁閉不食輕粉卻毒次用豆蔻面吃兼雞子清生熱飲子間服開胃醒脾乃愈等住丸出危氏方治溏瀉並一切瀉痢立效當歸硫黃牡蠣煅木香各一分上為末麵糊丸粟米大每服二十七丸糯米飲入薑汁一二滴送下小駐車丸出危氏方治小兒冷熱不調或乳哺失節泄瀉不止或下痢鮮血或赤多白少腹痛裡急後重腸胃虛滑便數頻並減食困倦一切泄痢並宜服之當歸去蘆二兩訶子炮去核一兩乾薑炮黃連去須各三分上為末用阿膠一兩三分煎成汁搜和為丸如粟米大每一歲兒服十粒至二十粒三十粒溫飯飲下隨乳亦得更量歲數加減與服一方無訶子醋糊丸草罌飲出仁存方治小兒久新痢疾不食身熱木瓜草一兩一方用馬齒莧罌粟殼甘草各半兩上㕮咀三歲一錢水半盞煎三分去滓食前服神效雞清丸醫方大成嬰孩小兒一切痢疾久瀉無度冷瀉白痢木香二錢土黃連一分去須肉豆蔻一個大者生上三味先碾為粗末取雞子清搜藥作餅於慢火上炙遇冷黃色變紅者稍干劈破碾羅為末白麵糊丸麻子大每服三五十丸溫飯飲下一方以黃連半兩用茱萸一分同炒令紫色去茱萸不用肉豆蔻半兩煨木香一分用雞子糊丸如麻子大每服五丸飯飲下赤痢粟米湯下白痢厚朴湯下名木香丸一方粟米飯為丸如米粒大米飲下治泄瀉陰陽不調腹痛腸鳴名豆蔻木香丸治泄瀉痢赤白議曰木香黃連一陰一陽藥木香善導水利氣脈黃連厚腸胃二味君臣相佐陰陽相順加之豆蔻溫和臟腑止瀉痢功效彌良凡兒患瀉與痢不問證輕重並宜攙先與服不問臟腑冷熱愈多愈效然雞清為物有毒是以毒氣引藥致效若去此一味其功不作矣治惡痢家傳方湯氏方南沒石子豆蔻上於砂器上磨水煎數沸服之肚疼加木香血多加臘茶此乃備急妙方香連丸湯氏方厚腸胃除余積黃連一兩一半生一半熟茱萸炒木香半兩炮上為末化蒸餅丸如黍米大米湯下一歲十丸大小以意加減一方煉蜜丸治冷熱痢橘薑湯治小兒痢後虛手足心熱痢縱未斷亦可服之橘皮生薑各三分上切以水一升煎取六合分服雜痢此方並治之烏賊骨散全嬰方治小久痢肚疼後重用烏賊骨為末三歲半錢米湯調下一名海螵蛸炒雞子方危氏方治休息痢疳瀉日久不能安者兼小兒痢日夜數十行者遷延日久百藥俱試飲食不方便下痢不止百用百中無不獲安神效昔項文學從龍在臨安見鄉人潘省干之子其子方三歲有此證服之效用雞子一枚打破用黃蠟一塊如指大銚內以雞子拌和炒熟空心食之一方雞子白和釀醋攪如白酒煎如餳灌之勿令吐一方用黃腳雞子和蠟作煎餅與兒食之止痢治小兒水痢形羸不勝大湯藥用白石脂半兩研如粉和白粥空肚與食治小兒痢用林檎構子同杵取汁服以意多與服之瘥乳母方肘後方用扁豆莖一升炙令為炭切之人參三兩以水三升煎取一大升去滓取汁煮粟粥與乳母食良仍復乳勿令住又法乳母常食粥仍欲乳母先捻去少許即當療小兒三歲即患痢初患膿少血多四日膿多血少日夜四十餘行肘後方用生地黃汁五小合入羊腎脂令暖分三四服立效預知丸傅氏治嬰方治一切痢疾預知子一錢去殼別研訶子二錢煨去核木香半錢白附子半錢海金沙半錢炒石決明二錢煅研肉豆蔻一錢上為末冷水滴丸如緑豆大每服二十丸藿香湯下調中散傅氏治嬰方治下痢純白人參一錢白茯苓一錢白朮一錢煨木香御米各一錢扁豆一錢藿香一錢訶子二個煨甘草一錢石蓮肉一錢上為末每服一錢陳米飲下或甘草湯下如和氣紫蘇木瓜湯下吐瀉氣虛不食頭汗不止鹽湯下胃氣虛弱嘔吐腹脹陳皮湯下盤腸氣痛木瓜鹽湯下一方加丁香枳殼蓽澄茄肉豆蔻四味尤佳黃連散治小兒肝受疳氣相刑于脾所下之痢多是鮮血忽是膿血忽赤白相雜宜吃此方楊子建萬全護命方防風地榆白蒺藜去刺川芎各一分使君子半兩蒸四五回焙乾木香甘草各三銖黃連四銖上為細末每服一錢半無時食任意煎冷吃香連丸儒門事親木香訶子肉麵炒黃連炒以上各半兩龍骨二錢上為細末飯丸如黍米大每服二十丸米飲湯下硃砂丸楊氏家方治一切小兒泄瀉痢疾硃砂半錢人言半錢黃丹三錢上為細末水丸如粟米大每服五七丸乾薑甘草湯下雞子湯肘後方小兒病食不消腹滿下痢用亂髮如雞子一枚去垢㕮咀之雞子七枚去白以黃併發煮雞子汁熟數按之令汁出取服大小無毒治小兒下痢腹大且堅方千金方用故衣帶多垢者切一升水三升煮取一升分三服又方以