粟米飲和丸如緑豆大每服以粥飲下五丸日三四服量大小加減草節丸治小兒冷痢或下青白或下瘀黑或凝脂相似烏頭炮製去皮臍黃連去須吳茱萸湯洗焙乾乾薑焙各一錢上為末醋煮麵糊丸如黍米大每服七丸草節湯下朴附丸治小兒滑冷下痢不禁厚朴附子乾薑陳皮各一兩上為末糊丸粟米大每服三十丸米飲下日三服養脾丸治便膿頻數附子一枚重半兩炮製去皮臍赤石脂川薑訶子各一兩上為細末粟米飲和丸黍米大每服十粒食前粥飲下陳橘皮湯治小兒冷痢心腹脹滿乾嘔不止陳橘皮湯浸去白焙一分人參一分甘草炙半兩上搗篩一歲兒每一錢水半盞生薑二片同煎至三分去滓分溫二服食前日再服隨兒大小加減訶黎勒丸治小兒冷痢訶黎勒煨去核半兩桂去粗皮一分赤石脂半兩上為末煉蜜和更入臼中搗三五百杵丸如麻子大一二歲兒三丸三四歲五丸空心午後各一服米飲下阿膠飲治小兒白痢阿膠炙令燥一兩一分黃芩去黑心一兩黃連去須半兩上銼末一二歲兒每服一錢水半盞煎至三分去滓分溫二服空心日晚各一量兒大小加減蜀椒丸治小兒秋深冷痢止腹痛蜀椒去目及閉口者炒汗出一兩乾薑炮製一分上為末煉蜜和丸小豆大一歲兒空心麵湯下五丸未止日午再服量大小加減木香丸治小兒冷痢白膿臍下絞刺痛木香一兩訶黎勒煨去核一兩上為末以粳米飯和為丸如麻子大一二歲兒三丸五歲兒五丸米飲下食前服酸石榴皮散治小兒冷痢百藥無效醋石榴皮一兩銼碎炒令微焦硫黃一分上為細散每服以粥飲調下半錢日三四服量兒大小加減麝香丸治小兒久患冷痢脾胃冷極致使大腸滑泄不絶麝香一分細研鹿茸一兩去毛塗酥炙令黃上為末煮棗肉合丸如緑豆大每服以粥飲下五丸日三四服量兒大小加減又方當歸半兩銼微炒大蒜一顆上為細末燒蒜熟和丸如緑豆大每服以粥飲下七丸日三四服量兒大小加減治小兒冷痢方用蓼葉搗汁量兒大小與之一方作芥菜治冷痢內因脾胃虛冷外觸冒風涼啖食冷物積滯下痢其證面青或白腸鳴腹脹乳不化手足清冷下痢青白或成白凍用不換金正氣散理中湯加茯苓厚朴入燒鹽下感應丸或實脾散加白薑下五積丸或五積散加白薑棗子粳米煎空心服治患冷痢用附子一枚炮水五升合煮雞子一枚令熱以哺兒瘥治小兒冷痢多時宜服此方用川椒三分去目及閉口者微炒去汗為末煉蜜和丸如緑豆大每服以粥飲下五丸日三四服量兒大小加減調胃散治冷痢人參去蘆陳皮去白白朮蒼朮白茯苓去皮桔梗炒縮砂仁厚朴薑製肉豆蔻扁豆薑炒薏苡仁炒山藥石蓮肉去心粉草以上各等分上為末豬肉拌食痢不止加訶子肉吐不止加丁香吐痢內虛可酌加附子木香重者加白薑保嬰艾葉湯治冷痢肚痛陳艾葉炒當歸各一兩乾薑木香厚朴制肉豆蔻各半兩草果半兩良薑丁香各一錢甘草五分上為末粟米煎服溫臟湯治小兒因驚滯乳氣不宣導冷搏腸間下痢青沫或乳多傷脾奶癖不化常服溫臟腑暖脾胃化消宿冷進乳食人參去蘆一兩白附子炮陳皮去白白朮三味半兩神麯炒黃麥糵炒黃甘草炙黃丁香以上各二兩上為細末每服半錢空心棗湯調下雄朱散方治嬰孩小兒腸胃虛冷下痢頻並日夜痛不可忍雄黃一分細研飛過乳香一錢細研白礬一錢煨上為末每服嬰孩一字二三歲半錢陳米飲調下一日三服雞子餅療小兒秋夏冷痢腹脹乍熱白滯下方用雞子一牧胡粉一丸碎絹篩合雞子黃共搗研調熬令熱如常雞子餅兒年一歲食半餅日再不過二餅即瘥兒大倍之凡羸弱治冷痢用生薑汁蜜水各半佐以木香豆蔻
