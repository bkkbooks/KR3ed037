癇亦能除之此藥所以神效者蓋癇病皆心血不足此物可守宮其心血血之類也助以二陳湯與之若無生蠍虎當取帶性雄豬心血代用入於代赭石散中一作效取下如室女之於心故能補也心全則病瘥豈非神聖工巧乎余侍郎之子也是廢人服之全愈余常試之必效但害一物而救一人此乃怪蟲去其足而復能行又再生而活密陀僧飲治驚癇入心不語神效諸驚失音大人通用上用陀僧為細末每服一字米醋湯下大人用二錢熱酒調下治小兒驚癇補虛氣上用豆牙豬頭一枚治如食法煮令極熟停冷作鱠以五辛醋食之治小兒汗出舌上白受驚者衣厚過熱也鼻上青及下痢青乳不消喜啼者衣薄過冷也小兒多患胎寒如啼晝夜不止因此成癇急宜與當歸散上用當歸末取小豆大取乳汁以咽之日夜三四度即瘥若不瘥當歸半兩小豚卵一具並切之以酒一升二合用煮取八合服半合至一合隨兒大小日三夜四神效又方治驚癇上用以雞子黃和乳汁量兒大小服之不過三兩枚自定五味麝香餅子治小兒驚風發癇目睛邪視胸膈多痰搐搦不定神昏不醒又治變蒸溫壯不解麝香半錢研青黛三錢研全蠍去毒生用一十五枚蜈蚣一對生用石膏飛研細一兩上為細末研勻湯浸油餅為丸如梧桐子大捏作餅子每服五七餅子用金錢薄荷水化下粉紅丸又名溫驚丸治小兒驚癇搐搦目睛上視天南星入臘月釀牛膽中百日陰乾取出研末四兩另研如無釀者只銼炒熱用硃砂一錢半研天竺黃一兩研坯子胭脂一錢研丸染胭脂龍腦三分上同牛膽汁和丸雞頭大每服一丸小者半丸沙糖溫茶化下紅丸子治一切驚癇化痰白礬一二枚出火毒半夏一分炮雄黃一錢三分半硃砂二錢二分半上將半夏末作生薑自然汁煮糊丸如緑豆大每服二十七丸以痰盡為度以一半硃砂為衣治小兒驚癇大人見鬼方上用狐肉作羹食之良治孩子驚癇不知人迷悶嚼舌仰面者方上用犀角末半錢入水二大合服之立效太醫局紫雪療腳氣毒遍內外煩熱不解口中生瘡狂易叫走腫疫毒厲辛溫瘧五尸五㾏心腹諸疾癘刺切痛及解諸藥毒發邪熱辛黃等並解蠱毒魅野道熱毒又治小兒驚癇百病黃金一百兩千金翼用十六兩石膏寒水石磁石滑石各三斤搗碎千金翼無滑石以上用水一斛煮至四斗去渣入下項玄參洗焙搗碎升麻各一斤羚羊角屑犀角屑青木香沉香並搗碎各五兩丁香一兩搗千金翼用四兩甘草炙銼八兩以上八味入前藥汁再煮取一斗五升去渣入下項硝石四升芒硝亦得每升重七兩七錢半朴硝精者十斤千金翼用四斤以上二味入前藥汁中微火煎柳木棍攪不住手候有七升投在木盆中半日欲凝入下項硃砂飛研三兩麝香當門子一兩二錢半研千金翼用麝香粉半兩餘斤兩不住者皆同以上二味入前藥中攪調令勻寒之二日上件藥成霜雪紫色每服一錢或二錢用冷水調下大人小兒臨時以意加減食後服牛黃保勝丸治小兒驚癇衆疾身熱急驚可服天麻一兩明亮者白附子一兩米泔浸一宿南木香一兩丁香一分牛黃半兩黃耆一兩地榆半兩湯浸麝香一兩犀角末一分大附子一兩生薑半兩不蛀棗子二枚水一大碗慢火用煎附子水盡去皮切上件為末煉蜜和丸如梧桐子大每服一粒用薄荷湯化下烏蛇散治小兒驚癇並急慢驚烏蛇三寸去皮骨鼠糞新者五十粒無蛀皂角一定上用新瓦上煅存性入麝香少許為末金銀湯下服少許硃砂丸治小兒心肺積熱發驚癇煩悶吐逆心氣昏迷痰涎壅滯硃砂牛黃鉛霜各細研乾蠍蠶蛾並微炙炒各一分膩粉腦麝各細研半分天漿子二七枚內有物者微炒上為末都研令勻煉蜜和丸如黍米大每服薄荷湯化五丸量兒大小加減保安丸治小兒諸風驚癇潮發搐搦口眼牽引項背強直精神昏困痰涎壅塞哽氣喘急目睛邪視一切虛風並皆治之附子半兩炮去皮臍白附子炮天麻全蠍去毒微炒蔓荊子防風去蘆皮頭羌活去蘆頭川芎肉桂去粗皮白殭蠶炒去絲並嘴當歸洗焙十味各一兩麻黃烏蛇酒浸去骨肉焙乾利半兩乳香一分另研上件為細末次入乳香研勻煉蜜為丸每一兩作四十丸每服一丸煎荊芥湯化下不拘時服治小兒諸熱驚癇發熱方上以青黛水研服治小兒天瘹驚癇客忤方上用家桑東行根研汁服之治小兒驚癇客忤鎮心安神方上以麝香當門子一粒如丹砂相似細研熟水灌下治驚癇精神恍惚言語錯謬歌笑無度兼五臟積冷蠱毒寒熱上以狐肉一片及五臟治如食法豉汁中煮五味和作羹或作粥炙食並得京中以羊骨汗鯽魚替豉汁治小兒驚癇壯熱方上以槐葉煎湯服皮莖同用治小兒壯熱痞疾驚癇方上以李葉作湯沐之治小兒驚癇方上取雁毛自落者小兒帶之又雁喉下白毛療小兒癇有效治小兒驚癇方上以馬齒水磨服之又方上以棘枝上雀甕研其間蟲盡灌之治小兒驚癇方上以磁石煉水飲之治小兒驚癇方上以雞腦燒灰酒服之治小兒鬼驚癇方上以虎睛煮汁浴之治小兒發熱驚癇方上以風涎母煮服之癇瘥復發附論夫小兒患疾瘥後更發候癇發之狀或口眼相引目睛上搖或手足瘛瘲或背脊強直或頭項反折或屈指如數皆因當風取涼乳食失節之所為其瘥之後而更發者是餘熱未盡小兒血氣軟弱或飲食不節或風冷不調或更驚動因而重發如此者多成常疹方紫金散治小兒諸癇復發不問風之與熱發作多少般數紫金粉一兩半一名赤烏角牡蠣粉麻黃去根節川大黃銼碎微炒各三分石膏細研飛過地骨皮赤石脂各一兩烏蛇肉炙令黃黃芩炙微赤銼防風去蘆頭赤芍藥葛粉牛黃研細甘草炙微赤銼秦艽去苗各半兩羌活桂心各一分半當歸一分銼微炒朴硝寒水石去苗各半兩虎睛一對微炙上搗細羅為散都研令勻每服煎竹葉湯調下半錢更量兒大小加減服之百病欽丹丸治小兒驚癇復發眩悶倒蹶或湯火不避及除百病鉛丹硃砂細研水飛過鐵粉牛黃雄黃各細研細辛獨活露蜂房炙黃人參去蘆頭漢防己桂心甘草川椒去目及閉口者微炒去汗各一分蜣螂五枚微炙蛇蛻皮五寸炙黃雞頭一枚炙赤銼赤茯苓一兩上為末煉蜜為丸和搗三二百杵如緑豆大每服一粥飲下五丸量兒大小加減服之鴟頭丸治小兒驚癇發動經年不斷根源鴟頭一枚自死者炙令黃色桂心茯神赤芍藥露蜂房炙黃甘草炙微赤銼當歸銼微炒芎藭丹參蜣螂七枚去翅足微炒麝香一分細研牛黃細研蛇蛻皮五寸炙黃莨菪子炒令黑各半兩蚱蟬十枚微炙上為末煉蜜和搗三二百杵丸如緑豆大每服以溫水下看兒大小加減服之鎮心銀屑丸治發癇雖瘥余疾慮動防疾銀屑黃耆大黃鱉甲炙甘草炙各四分細辛桂心各三分茯苓柴胡黃芩人參芍藥各三分葵子二分牛黃一分上為末蜜丸大豆大一服五丸日三服大良天漿子丸治小兒諸癇復發使斷根源蠐螬三分微炒芎藭半兩知母半兩天漿子十四枚去殼別研人參去蘆頭生乾地黃桂心各半兩川大黃一兩半銼碎微炒嬰孺用十分蜣螂三枚去翅微炙蚱蟬去翅足微炙半兩嬰孺用一分牛黃一分細末嬰孺用三分虻蟲三枚炒黃嬰孺用三分上為末煉蜜和搗三二百杵丸如緑豆大每服以粥飲下三丸日一服量兒大小加減服之除病銀屑丸治發癇雖已瘥而根源不斷至長不除銀屑一針紫菀細辛麻黃去節黃芩各一分人參大黃甘草炙各三分牛黃四銖上為末蜜丸小豆大一服二丸三丸化痰丹治胞絡痰涎諸癇瘥後皆宜常服此方半夏一兩湯浸七次乾薑微炮川黃連去頭桂心南木香各半兩以上先搗羅為細末次用牛黃麝香各研一分硃砂一兩細研水飛巴豆十個去皮心微炒黃別研上拌勻滴水和丸如黍米大每服三粒至五粒溫粥飲下未周晬嬰兒乳汁調下如三歲至五歲不過五粒量兒大小加減斷癇丹治癇瘥後復作證候多端連綿不除用驗黃耆蜜水塗炙鉤藤鉤子細辛去根土葉甘草炙各半兩蟬殼四個炒出洗去炒去足牛黃一字別研蛇蛻三寸酒塗炙上為末煮棗肉為丸如麻子大煎人參湯下一歲十丸大小加減一方面糊治癇三十年患者一瘥方苦參二大斤童子小便一斗二升煎苦參取出六升上以粥米及面和前汁作酒十餘日當熟澄清一服半雞子許四五歲服一升永瘥非止癇疾但腹中諸病悉治神驗曾試亦治一切氣塊宿冷癖心痛惡病皆治放二三年酒不壞可多作救人神效癇瘥身面腫附論夫小兒發癇瘥後身體頭面悉腫滿候七癇發之狀或口眼相引或目睛上搖或手足掣瘲或背脊強直或頭項反折或屈指如數皆由以兒當風取涼乳哺之所為也其癇瘥而腫滿者是風癇因小兒厚衣汗出因風取涼而得之其癇雖瘥而熱血尚未盡在皮膚與氣相搏致冷氣不宣泄故停併成腫也方黃芩湯治小兒癇瘥後血氣尚虛而熱在皮膚與氣相搏通身頭面皆腫黃芩澤瀉通草木通也各八分桑白皮各七分澤漆葉四分木豬苓去皮杏仁湯浸去皮尖各六分柴胡三分上為粗末每服方寸許水一大盞煎至五分小兒乳食後服甚效又方龍腦葵子萎蕤茯苓前胡以上各一分上為粗末每服方寸許水一大盞煎至五分小兒乳食後服一合癇瘥不能語附論夫發癇瘥後六七歲不能語者心之聲為言開竅於口其癇發雖止風冷之氣猶滯心之絡脈使心氣不和其聲不發故不能言也方補心湯治小兒癇瘥後風冷留滯於心絡使心氣不和語聲不發宜千金大補心湯黃芩附子炮去皮臍各一兩甘草炙茯苓桂心各三兩石膏半夏遠志去心各四兩生薑六兩大棗二十枚飴糖一斤熟地黃阿膠麥門冬去心各三兩上㕮咀每服一大撮入前飴糖半匙許水一盞半煮至半盞量大小加減乳食前服日三羚羊角散木通銼防風去蘆頭川升麻羚羊角屑桂心以上各半兩甘草炙一分上件藥搗為粗散每服一錢水一小盞煎至五分去滓入竹瀝少許更煎一兩沸不計時服量兒大小加減服之肥兒丸治驚風后失音楊氏曰咽喉為之道路風傷其氣故掩閉聲音道路之門亦有血滯於心竅不通不能言也可服蕪荑炒神麯炒麥芽炒黃連去毛各等分上用豬膽汁糊為丸木通湯送下或木香陳皮甘草煎湯吞下木通湯木通石菖蒲防風去蘆頭枳殼全蠍焙殭蠶焙甘草木香南星上銼豬心二片或紫蘇生薑煎服排關散一名通關散治小兒諸癇退後不能言上用天南星泡為細散每服一匙許豬膽汁調下咽入喉中即能言量兒大小加減一方用生薑薄荷蜜酒調下一方用臘月牛膽釀南星不拘多少每服半字薄荷湯調下臥時服兒大者服一字至半錢截癇法附論夫小兒未發癇之先及欲發癇之後或壯熱連滯或搖頭弄舌或眼目抽掣如此是欲發癇宜療之也小兒驚不已即變成癇疾又有不因驚而變成癇者然初亦有證可驗未發之前身體壯熱連滯不歇素有痰涎咽喉呀呷作聲或搖頭弄舌眼目斜視眠睡驚掣如此必是欲發癇之證宜截之方防病牛黃湯治少小心驚又治癇發衆醫不復治者牛黃芍藥杏仁炒去皮尖蜣螂蜂房黃芩人參葛根甘草炙蚱蟬炙芒硝川芎桂心各一分大黃三分聖惠用半兩當歸三分石膏四分碎聖惠用半兩上細切取豚五臟及卵以水一斗煮臟卵得三升去滓澄清納諸藥煮取一升三合去滓入芒硝煬盡一服一合日三夜一臨臥末牛黃納湯中常用大驗一方蚱蟬蜣螂各五個無芒硝用生薑三分水一升煮取二停茯苓湯治少小滯實不去內有熱搖頭弄舌欲作癇茯苓二分蚱蟬三個炙雀甕二個炙蛇蛻皮半分鐵精芍藥麻黃去節黃耆柴胡當歸人參各一分上切以水三升先煮麻黃十沸去沫納諸藥煮一升五合為四服百日兒一日服盡大小加減消熱定驚煎治小兒驚熱欲發癇柴胡升麻梔子仁芍藥各七分子芩知母各八分寒水石十二分竹葉切一升杏仁六分去皮尖炒別研甘草二分炙上以水四升七合煮取一升半絞去滓內蜜葛汁於文武火煎攪勿住手至一升二合一月及初滿月兒一合為三服中間進乳出一月一服半合五六十日兒一服一合百日兒亦一合出百日服一合半一二歲二合日二夜一冬溫服之牛黃散治小兒未滿百日聚口吐沫此欲作癇候腹內有冷熱癖實宜服之牛黃細研細辛黃芩當歸研微炒甘草炙微赤銼防風去蘆頭各一分柴胡一分半去苗川大黃銼細微炒蜣螂炙各二分蚱蟬三枚微炙上搗細羅為散每服一錢以水一小盞煎至五分和渣不計時候量兒大小加減溫服藍葉散治小兒頭額體背俱熱大便祕澀眼赤心悶乍睡乍驚精神昏濁與人不相主當欲作癇狀藍葉人參去蘆頭知母各半兩鉤藤川升麻葛根子芩犀角屑射干各一分玄參二分上細羅為散每服以竹瀝半合調半錢服日三服量兒大小加減服若未辨合煎藥可服玄參生犀升麻葛根竹瀝生薑汁大豆汁地黃汁皆可單服又取少蚯蚓糞水調服良鉤藤散治小兒壯熱飲發癇或時四肢抽掣多吐白沫宜服之鉤藤甘草炙赤銼川升麻石膏各半兩人參去蘆頭子芩犀角屑蚱蟬三枚微炙川大黃銼碎微炒各一分上粗羅為散每服一錢以水一小盞煎至五分去滓入竹瀝半合牛黃末一字看小兒大小分減服之茯神散治小兒心腹結實身體壯熱四肢不利心神多驚欲發癇茯神玄參各一兩半川升麻秦艽去苗龍膽去蘆頭各一兩寒水石三兩川大黃銼研微炒川芒硝各三兩上粗羅為散每服一錢以水一小盞煎至五分去滓分溫二服早晨午後各一服更量兒大小加減龍齒散治小兒壯熱欲發癇心驚神悸多啼或口吐白沫龍齒川芒硝各一兩鉤藤川升麻子芩防風去蘆頭犀角屑各三分麥門冬一兩去心焙上粗羅為散每服一錢以水一小盞入竹葉七片煎至五分去滓分為二服量兒大小加減安神散一名安神湯截癇安神除熱白茯苓二兩石菖蒲一寸九節者白鮮皮人參去蘆頭遠志各一兩石膏半兩犀角甘草炙各半兩上為粗末每服一錢水一盞入麥門冬少許煎至五分去滓放溫服時與服退熱清涼散治小兒壯熱欲發癇宜服白藥子甘草炙微赤銼鬱金黃芩天竺黃細研各一分麝香半分細研硃砂半兩細研水飛過上細羅為散都研令勻不計時溫水調下半錢量兒大小加減牛黃丸治小兒驚熱入心擬成癇疾面色不定啼哭不出發熱作時不吃乳食大便祕澀眼翻露白手足逆冷牛黃細研川大黃銼細微炒獨活各一分川升麻琥珀緑豆粉大麻仁各半兩上搗羅為末煉蜜丸如梧桐子大不計時候以熟水研一丸服之至五七歲金銀箔各五片藥兩丸研化下獨活散祛風截癇獨活羌活川升麻細銼酸棗仁揀淨人參去蘆頭以上各一兩川大黃細銼微炒各半兩上為細末每服一錢水一小盞入金銀薄荷各少許放溫服不拘時候定心膏安神治欲發癇竹瀝半合依法旋取大麻仁研一分生葛根取汁合許如無生者只用乾葛銼細水浸一宿慢火熬取汁以上三味同研次入硃砂半合依法旋取牛黃麝香各一錢緑豆粉一兩以上並研勻上於石臼中搗二三百下成膏如雞豆大每服一粒至二粒煎人參湯下清涼丹治壯熱連滯欲作癇鬱金黃芩犀角末各一分白芍藥半兩以上搗羅為細末次用腦麝各研一錢天竺黃一分細研好硃砂半兩細研水飛上拌勻煉蜜和丸如雞豆大每服一粒至二粒煎人參湯化下知母散治心熱弄舌欲作癇知母一兩鉤藤升麻葛根銼黃芩各一分藍葉人參去蘆頭各半兩上為細末每一錢水八分入竹瀝三兩點同煎至五分去滓放溫服地黃汁湯治少小始滿月變蒸時患驚欲作癇已服四味湯及紫圓已大下熱猶不折腹滿眼目視高者宜此除熱地黃升半合黃芩三分大黃甘草炙各一分梔子仁二分上切以水八合煮至四合去滓下地黃汁服一合日進三服夜一服洗浴菖蒲湯散風截癇菖蒲三兩一寸九節者防風荊芥穗各二兩石膏梅根各一兩上為粗末每用五匙頭水三碗煎三五沸適寒溫浴兒先頭面次浴身體為佳救急中軍候黑丸療諸癖結痰飲等大良及治小兒欲發癇杏仁去皮尖五分兩仁者熬桔梗桂心各四分巴豆八分去心皮熬芫花十二分熬上先搗桂心桔梗芫花成末別搗巴豆杏仁如膏合和又搗一千杵下蜜又搗二千杵丸如胡豆大漿水服一丸取利可至二三兒生十日欲癇發可與一二丸如黍米大諸腹不快體中覺患便服之得一兩行利即好忌豬肉生蔥蘆筍等物不拘時服雞腦丸治少小癇候夜啼不止雄雞腦丹砂各二分牛黃當歸各一分上為末以雞腦和杵七百下丸如麻子大百日兒服一丸日二服量兒大小加減服茯苓湯治七日兒生後有熱欲作癇茯苓黃芩鉤藤大黃各一分上切以水一升煮三合為三服或五服多者加黃芩一分生三七以後者加大黃一分量兒大小加減生葛汁飲子治小兒欲發癇極熱不已生葛根汁竹瀝各一分牛黃如杏仁大細研末上相和每服半合量兒大小加減服洗浴石膏湯治小兒欲發癇壯熱如火石膏五兩菖蒲二兩雷丸三兩上搗碎以水煮取三升適寒溫浴兒並洗頭面佳雀屎丸治少小癇候胎寒舌下唾聚夜啼不止雄雀屎炒麝香牛黃研入各一分上為末蜜丸如黍米大一月兒與一丸日一服時極送藥著咽中吃乳食令即咽喉不久停口中而散也後稍加之百日兒麻子大一丸日三臨服旋丸勿先丸下四十日後牛黃雞麝香可加使多也為是一歲兒也五苓散治小兒因吐利欲作癇宜服方見寒暑濕門中暑類按原方澤瀉二兩半桂心一兩豬苓去皮赤茯苓去皮白朮去蘆各一兩半上為末每服二錢沸湯調下不拘時候服訖多飲熱湯汗出即愈
