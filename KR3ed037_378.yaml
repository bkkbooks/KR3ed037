body:
  text: 卷三百七十八嬰孩一切癇門驚癇附論夫小兒氣血微弱易為病若卒驚動傷亂精神心氣不定因驚而發則驚癇凡養小兒當須持護或見異類必當撫摩無令恐怖若初覺兒驚急保抱之其驚自止若忽因驚成癇宜按圖灸兼以摩膏不可大下蓋以心氣不足若下之則內愈虛手足抽掣者並不可持捉使氣血失道傷經絡耳夫驚癇忤三候大抵略似皆口面青黑嘔吐涎沫頸項強直手足搖動但驚即發拳搐癇搦忤即掣瘲驚則喉中涎響癇則口中涎出響忤則口吐青黃白沫驚則雙目上視癇則口眼相引而目睛上搖忤則眼不上插不可得而同也方歸魂散治小兒驚癇忤手足掣瘲頭項強直狀似角弓蠍梢一錢半炒蜈蚣赤足者半條炙水銀粉腦麝各一字花蛇肉酒浸炙黃色稱一錢川烏頭炙七個生天南星切碎用生薑汁浸一日為末稱半錢上為末每服嬰孩半字二三歲以上一字四五歲半錢金錢薄荷湯調下量兒虛實加減清心丸治小兒驚癇潮搐精神昏慢痰涎流溢並虛實煩躁頭疼噁心風眩不語嘔吐倦怠牛黃三錢腦子雄黃各二錢麝香一錢川芎茯苓柴胡桔梗各四兩蒲黃芍藥各二兩犀角屑白朮黃芩黑豆炒阿膠炒各半兩麥門冬去心半兩杏仁去皮尖半兩人參神麯炒各三錢肉桂去皮一分羚羊角一兩乾薑炮一分山藥一兩三分甘草一兩半金箔三百片上為末煉蜜丸如雞頭大金箔為衣每服一丸竹葉湯化下蚱蟬煎治小兒驚癇頻發動經久不瘥肌體瘦弱蚱蟬三枚去翅足微炙麻黃去根節鉤藤各一分柴胡去苗白芍藥牛黃犀角屑知母沙參去蘆頭甘草炙微赤銼杏仁湯浸去皮尖雙仁研如膏各半兩蛇蛻皮五寸燒灰生地黃五分石膏子芩蜜龍齒各一兩生薑汁三合上除薑汁地黃汁蜜杏仁牛黃外並細銼先以水二盞煎至一盞去滓入竹瀝一小盞入煎五七沸內杏仁蜜薑汁地黃汁慢火煎攪不停手約十餘沸放冷於瓷盒中盛牛黃攪令勻每一盒分為三服量兒大小加減烏蛇牛黃散治小兒驚癇風癇手足瘛瘲口眼相引烏蛇項下七寸酒浸一宿去皮骨炙稱一錢青黛研二錢蠍梢十枚炒牛黃炒半錢麝香研一字蓬研龍腦研水銀沙子各半錢金箔銀箔並研各十片蛇黃醋淬三次天南星用生薑一同搗作餅子焙乾墨燒半夏用生薑同搗作餅子焙乾烏蛇尾酒浸一宿去皮骨炙稱各一錢上研為散每服半錢量兒大小加減金銀薄荷湯服鎮心丸治小兒驚癇百病鎮心氣銀屑十二銖水銀二十銖牛黃六銖大黃六分茯苓三分茯神人參遠志防己白蘞雄黃芍藥各二分紫石英真珠防葵鐵精各四分上先以水銀和銀屑如泥別治諸藥和丸三歲兒如麻子大二丸隨兒大小加減一方無牛黃延壽丹治小兒驚癇及大人卒中惡風涎潮昏重口眼喎斜四肢痑拽口噤不省大效辰錦砂膩粉鐵焰粉白附子各二兩蛇黃用醋浸少時以大火煅過大附子炮各九兩天南星生淨洗羌活巴豆捶碎用新水浸逐日換水七日後以紙裹壓去油牛膝去苗酒浸焙蠍梢各三兩生金生銀各別研一分麝香真牛黃各別研一兩一分上為細末以蜜及粟米飲搜和為丸如雞頭大每中惡風痑緩及五廡疾薄荷酒磨下一丸嬰兒半丸小兒驚癇十歲以上一丸石膏散治小兒一歲至四歲壯熱大驚發癇牛黃酒治少小驚癇經年小勞輒發牛黃鍾乳研各八分麻黃去節秦艽人參各八分桂心七分龍角白朮甘草當歸細辛各五分杏仁四分蜀椒蜣螂九枚炙上切以絹袋中酒五升浸之隨時月數半合日三案此方缺方名及症狀麝香當門子一粒丹砂一塊大小相似上細研熟水灌之鴟頭丸治小兒驚癇發動經年不斷根源鴟頭炙焦一枚蜣蟬去足炙七枚桂皮去粗皮一兩一分芍藥一兩蛇蛻炙五寸蚱蟬去翅足炙十枚白茯苓去黑皮一兩一分一方用茯神半兩露蜂房炙半兩甘草炙銼黃芩去黑心當歸切焙芎藭丹參各一兩麝香研一分牛黃研半兩莨菪子酒浸一宿曝乾蒸熟八合大黃濕紙裹煨二兩上搗羅為末煉蜜和丸如小豆或如黍米大臨時量兒大小虛實與服溫酒下牛黃散治小兒驚癇發無時候牛黃細研赤芍藥露蜂房黃芩人參去蘆頭葛根銼甘草炙微赤銼碎蚱蟬去翅足微炒芎藭川芒硝蜣螂微炙桂心各一分當歸銼微炒石膏各半兩蛇蛻皮五寸炙黃川大黃半兩銼碎微炒杏仁一分湯浸去皮尖雙仁麩炒微黃上件藥搗羅為末散每服一錢水一小盞煎至五分去滓溫服更量兒分四服四歲以下一丸分五服新生孩兒一錢分七服並用蜜水磨下如中風者髮直面如桃色口眼俱閉喉中作聲汗出如油及汗出不流多要下泄或瀉血者並是惡候更不用服唯口噤眼開者藥下立瘥如患纏喉風壅塞氣息不通將絶者急化一丸生薑薄荷酒下必效牛黃丸治少小痰實結癖或腹內堅強驚癇百病牛黃玄參乾薑各二分苦參丹參桔梗甘草人參各四分甘遂炒沙參各五分䗪蟲十四個大黃十二分蜀椒四分出汗巴豆一百枚去皮心炒別研葶藶一合半炒上為末蜜丸如小豆大一服二丸米飲下歸魂丸治小兒驚癇搦搐涎潮昏塞使君子二枚以麵裹於慢火中煨候黃為度去皮不用水銀結沙子香墨蘆薈熊膽研臘茶研乳香研龍腦各一錢研蠍梢三十枚炒天竺黃青黛研丹砂研各半錢輕粉二錢寒食麵一錢半上同研令勻細滴水丸如緑豆大每服一丸薄荷蜜水化下如小兒稍覺驚者化半丸與吃若能常服永無驚疾量兒大小加減鎮心丸治小兒驚癇金銀箔各細研五十片防葵半兩水銀以小棗瓤研令星盡鐵粉細研真珠末紫石英細研水飛過雄黃細研人參去蘆頭白芍藥各半兩牛黃細研遠志去心白蘞各一分漢防己川大黃銼碎微炒茯苓各三分上為末入研了藥都研令勻煉蜜和丸如緑豆大每服以薄荷湯研下三丸日三服看兒大小加減柴胡煎治小兒驚癇欲作癇柴胡去苗升麻梔子仁芍藥各三分鉤藤各一分凝水石研黃芩生葛汁知母切焙各一兩甘草炙一分蜜二合杏仁湯浸去皮尖雙仁炒別研半兩淡竹葉切銼三握上粗搗篩以水三升入銀石銚內文武火煎至一升綿濾去滓再入鍋內下蜜並葛汁杏仁等煎如餳以瓷器盛百日兒每服如緑豆大一歲如杏仁大日三服更量兒大小加減至用溫漿水化破服萬病丸治小兒驚癇乳癖雄黃研丹砂研麝香研龍腦研蘆薈研木香檳榔銼各一枚牛黃研半兩胡黃連一分青黛研半兩巴豆去心皮膜研出油盡桂去粗皮人參各一分上研為末煉蜜為丸如小緑豆大每服一丸至二丸溫水下更量兒大小加減十五歲以下常服永無諸疾虎睛丸治小兒驚癇邪氣皮肉壯熱嘔吐心煩不得安睡虎睛一對細研牛黃天竺黃麝香細研各一分川大黃一兩銼碎微炒川升麻鉤藤甘草炙微赤銼犀角屑梔子仁各半兩蚱蟬蜣螂去翅足微炒各三枚蛇蛻皮五寸燒灰上為末煉蜜和丸如緑豆大三歲兒以粥飲研三丸量兒大小加減鉛霜丸治小兒驚癇發熱搐搦不定鉛霜細研馬牙硝各半兩硃砂細研水飛過鐵粉細研各一兩麝香細研半分川大黃細研微炒人參去蘆頭各三分羌活芎藭白茯苓牛黃細研乾蠍微炒龍膽草去蘆頭各一分上為末入研了藥同研令勻煉蜜和丸如緑豆大每服不計時候荊芥薄荷湯下五丸量兒大小加減牛黃豚血湯治小兒驚癇掣縮不止豚血牛黃當歸大黃人參各四分蜣螂蚱蟬各三枚炙川芎黃芩各八分葛根十二分鼠屎四兩蛇蛻五寸露蜂房八分上以酒五升煮取四升去滓服二合日三夜二此論一歲兒耳三歲兒服三合神效保和丸治小兒癇身熱手足瘛瘲目睛上視狀如中風丹砂研一錢蠍梢二十個雄黃研二錢蘆薈研熊膽研各半錢蛇蛻燒灰一錢瓜蒂二七枚蟾酥一皂子大湯浸膩粉研龍腦研麝香研牛黃研各半錢上搗研如粉用浸蟾酥並麵糊同研為丸如黍米大每服用倒流水先化一丸滴鼻內良久嚏訖即用薄荷水下一丸青金煎治小兒驚癇積熱痰涎咳嗽天南星牛膽內匱者半馬牙硝研天竺黃研各一分青黛研一兩龍齒研蟬蛻去土為末各半兩鉛白霜研硼砂研各一分甘草生末三分麝香研一錢牛黃研各一錢上研勻細蜜和為膏瓷盒內收貯每服一小雞頭實大更量兒大小加減薄荷水化下大鉤藤飲治小兒驚癇壯熱鉤藤黃芩去黑心麻黃去節各一兩一分龍齒研一兩甘草研二兩半石膏研二兩半赤芍藥桂龍膽去土牛黃研一兩杏仁去雙仁皮尖麩炒研半兩上粗搗篩十味每服三錢七分水一盞煎至六分去滓下牛黃加白蜜竹瀝各少許煉如餳湯調服如人行五里再服虎睛丸治小兒驚癇邪風身熱嘔吐下痢五色虎睛一枚研牛黃研麝香研各半兩升麻鉤藤生犀角桂去粗皮各一分山梔子一兩蚱蟬炙去頭翅足蜣螂蛇蛻皮五寸燒灰大黃蒸二次銼焙二兩上研為末煉蜜為丸如梧桐子大每服三丸至五丸食後米飲研下日再服癲癇湯治大人風引少小驚癇瘛瘲日數十發醫所不療除熱大黃乾薑龍骨各四兩桂枝三兩去皮千金用五兩甘草炙牡蠣各二兩熬千金同各五兩外臺各三兩凝水石滑石赤石脂白石脂石膏紫石英各六兩外臺此六味各八兩上杵粗篩以韋囊盛之取三指撮井花水三升煮三沸去滓溫服一升巢源腳氣宜風引湯千金紫石英散與此方治療藥皆同外臺崔氏紫石英湯療藥味亦同有分兩不同者各注於下注云永嘉二年大小兒頓行風癇之病得發例不能言或發熱半身掣縮或五六日或七八日死張思推合此散所療皆愈此方本仲景傷寒論方鎮驚丸治一切驚癇紫石英燒醋淬研鐵粉茯神遠志肉薑汁製焙人參琥珀滑石南星炮蛇黃煅醋淬各一分龍齒熊膽半分輕粉上為細末煉蜜丸硃砂為衣如桐子大每服一丸金銀湯調下或用豬乳調收入口中牛黃丸治少小癖實驚癇百病牛黃芒硝甘草炙人參各四分甘遂炒沙參各五分䗪蟲十四枚大黃十二分蜀椒四分去汗巴豆百枚去皮心炒黃別研入葶藶一合半炒真珠末二分上為末蜜丸如小豆大一服二丸米飲下紫石英散治小兒風熱驚癇手足掣縮日數發者紫石英一兩寒水石一兩龍骨半兩牡蠣半兩滑石一兩赤石脂半兩藍葉一分川大黃一兩銼碎微炒石膏一兩白石脂桂心甘草各半兩炙微赤銼上件藥搗羅散每服一錢水一小盞煎至五分去滓量兒大小加減溫服人參湯治小兒邪熱驚癇口噤人參一兩木通銼黃芩去黑心升麻各半兩龍齒研三分犀角鎊炒赤茯苓去黑皮銼鐵粉研各半兩蜣螂十枚去翅足炒鉤藤半兩蚱蟬去足翅炙二七枚上粗搗篩三四歲兒每服一錢水一盞煎至五分入竹瀝少許更煎三兩沸去滓分為三服日三更量兒大小加減虎睛丸治小兒諸驚癇兼壓驚鎮心藏丹砂研一兩虎睛一對研牛黃研麝香研犀角末各一兩鉤藤四兩白茯苓去黑皮銼黃芩去黑心人參梔子仁各一兩大黃濕紙裹煨熟銼二兩上搗研為末煉蜜丸如雞頭實大每服一丸五歲二丸煎金銀湯化下人參湯亦得更量兒大小加減聖濟用龍腦一錢半鎮心丸治小兒驚癇銀箔研一百片大黃銼炒丹砂研各一兩蜣螂三枚去頭足炒升麻黃芩去黑心犀角屑梔子仁龍齒麥門冬去心焙鐵粉各一兩上搗研為末煉蜜為丸如梧桐子大食後及乳後新汲水研一丸灌之三歲及五歲兩至三丸七歲至十歲五丸如大人患者溫漿水下十五丸如冬月以溫水研灌之鉤藤子芩湯治小兒驚癇體虛升麻一兩黃芩沙參各三兩知母焙犀角鎊各一兩鉤藤蛇蛻皮蚱蟬三枚炙去翅頭足柴胡去苗甘草炙銼白朮各半兩各粗搗篩以水二升煎去滓取六合入蜜二合竹瀝三合再煉如餳每服一錢微微與服以意量之竹瀝湯療暴得驚癇立驗方鉤藤茯神黃芩升