body:
  text: 卷三百七十五嬰孩驚風門急慢驚風附論夫急驚因聞大聲而發或搐發過則如常此無陰也當下利驚丸主之小兒急驚者本因熱生於心身熱面赤引飲口中熱氣大小便黃赤劇則搐也蓋熱甚則風生風屬肝此陽盛陰虛也故利驚丸主之以除其痰熱不可與巴豆及溫藥大下之恐搐虛熱不消也小兒客痰熱於心胃因聞聲非常則動而驚搐矣若熱極雖不因聞聲及驚亦自發搐慢驚因病後或吐瀉脾胃虛損遍身冷口鼻氣出亦冷手足時瘛瘲昏睡露睛此兒無陽也栝蔞湯主之凡驚陰陽異證切宜辨而治之急驚合涼瀉慢驚合溫補市間俗方多不分別誤小兒甚多又小兒傷於風冷病吐瀉醫謂脾虛以溫補之不已復以清涼藥治之又不能察其本末之病而任意亂攻之因脾氣即虛內不能散外不能解至十餘日其證多睡露睛身溫風在脾胃故大便不聚而為瀉當去脾間風風退則利止以宣風散主之後用使君子丸補其胃亦有吐利久不瘥者脾虛生風而成慢驚驚癇發搐男發搐目左視無聲右視有聲女發搐目右視無聲左視有聲相勝故也更有發時證早晨發搐因潮熱寅卯辰時身體壯熱上視手足動搖口內生熱涎項頸急此肝旺當補腎治肝也補腎地黃丸治肝瀉青丸主之日午發搐因潮熱巳午未時搐發心神驚悸目上視白睛赤色牙關緊口內涎手足動搖此心旺也當補肝治心治心導赤散涼驚丸補肝地黃丸主之日晚發搐因潮熱申酉戌時不甚搐而喘目微斜視身熱如火睡露睛手足冷大便淡黃水是肺旺當補脾治心肝補脾益黃散治肝瀉青丸治心導赤散主之夜間發搐因潮熱亥子丑時不甚搐而臥不穩身體溫壯目睛緊斜視喉中有痰大便銀褐色乳食不進多睡不省當補脾治心補脾益黃散治心導赤散涼驚丸主之傷風后發搐傷風后得之口中出氣熱呵缺煩悶手足動搖當發散大青膏主之小兒生來怯弱者多此病也傷食發搐傷食後得之身體溫多唾或吐不思食而發搐當先定搐搐退白餅子下之後服安神丸百日內發搐真者不過三四次必死假者頻發不為重真者內生驚癇假者外傷風冷蓋血氣未實不能勝任乃發搐也欲知假者口中氣出熱也治之可發散大青膏主之及用塗囟浴體法李司戶孫病百日發搐三五次請衆醫治或作天瘹或作胎驚或作驚癇皆無效後錢氏用大青膏如小豆許一服發之復與塗囟法封之及浴法三日而愈何以然嬰兒初生肌膚嫩怯被風傷之子不能任故發搐頻發者輕何者客風在內每遇不任即搐搐稀者是內臟發病不可救也頻搐者宜散風冷故用大青膏不可多服蓋兒至小易虛易實多即生熱止一服而已更當封浴無不效者李寺丞子三歲病搐自卯至已數醫不治召錢氏視之搐目右視大叫哭李曰何以搐右錢曰逆也李曰何以逆錢曰男為陽而本發左女為陰而本發右若男目左視發搐時無聲右視有聲女發時右視無聲左視有聲所以然者左肝右肺肺金肝木男目右視肺勝肝也金來刑木二臟相剋故有聲也治之瀉其強而補其弱心實者亦當瀉之肺虛不可瀉肺虛之候悶亂哽氣長出氣此病男反女故男易治於女也假令女發搐目左視肺之勝肝若病在秋即肺兼旺位肝不為任故哭叫當大瀉其肺然後治心續肝所以俱言目反右視者乃肝主目也凡搐者風熱相搏於內風屬肝故引之見於目也錢氏用瀉肝湯瀉之二日不悶亂當知肺病退後用地黃丸補腎三服後用瀉青丸涼驚丸各二服凡用瀉心肝藥五日方愈不妄治也又言肺虛不大瀉者何也曰設令男目右視木反剋金肝旺勝肺而反瀉肝若更病在春夏金氣極虛故當補其肺慎勿瀉也凡治急慢驚風古人多用一藥有性涼者不可泛用宜審別之錢氏云急驚合涼瀉慢驚風合溫補此是定法也其間有急驚涼瀉而不愈變為慢驚有慢驚溫補而不愈變為急驚至相更變者多矣所以古人撰一方一藥治急慢驚觀前互變之證其意有理惜乎當時有失詳注如兩證交互者宜用通治急慢驚藥急驚變為慢驚者因壯熱情神恍惚忽發驚搐醫以吐下藥太過多以涼驚藥不愈荏苒經曰脾虛不實昏睡露睛涎鳴氣粗肢冷腹疼時作瘛瘲此急驚變成慢驚也張氏云急驚不除進退不定荏苒經曰乍靜乍發嘔吐痰涎氣鳴氣潮搐為慢驚慢驚變為急驚者因傷乳食或吐或瀉時作瘛瘲醫以溫熱藥太過以暖驚藥不愈體熱涎盛面紅目赤大便不通小便赤澀舌白唇紅忽發驚搐此慢驚變成急驚也錢氏云慢驚多因性太溫及熱藥治之有驚未退而別生熱證者有病愈而致熱證者有反為驚者甚多以上二證互相更變者蓋小兒易虛易實也夫驚搐握拳者有陰陽兩證陰者拇指在內陽者拇指在外陽拳者順陰拳者逆也夫因驚則氣亂氣亂則上下不通並於中焦氣壅則痰聚痰聚則不散故氣結則噎哽抑而虛嘆此驚之先兆也有久患癇疾者必須哽氣實者天霜散吐涎或珍珠丸利驚丸下涎或問命散吹鼻令關膈通利更與安神膏補之琥珀散除驚氣虛者對證用藥驗驚搐先證目鮮目眨目白目青目斜目鬥目轉目瞪聲焦聲啞聲顫聲輕咂口弄舌捲舌露筋噓氣哽氣噎氣撮唇吐乳噎食忽然定睛吐涎吐沫拗頸仰身搖頭擦面藏頭畏明手攣手顫腳彎不伸忽撩忽亂精神恍惚失張失志眠睡不寧睡中喜笑因憂齒齦心煩躁熱啼哭咬人面臉弄色或紅或青伸舒用力微微作聲以上證候不久必發驚癇須預防之驅風膏琥珀散更擇對證藥頻頻哯乳日日便青吐痰吐食瀉酸瀉腥吐嫌多困瀉怕脫形晝眠默默夜起頻頻瀉痢無度涎喘作聲虛腫臟冷盜汗骨蒸諸竅失血諸渴亡津諸病進退必成慢驚以上證候久則必發驚風預防安神膏琥珀散更擇對證藥治之活幼口議云驚者總名也嬰孩小兒心氣不足智志率伏恍惚無定神不守舍怯人怕物漸成怖畏怖畏之盛已作恐懼恐懼之多乃抱怔忡怔忡久之則自惕愕惕愕既有瘛瘲已為斯乃心氣不足而生之漸但分輕重耳又有心氣虛弱暴觸作驚更不由漸便即面青唇白視之定睛目無所睹聽之昏憒耳無所聞精神頓亡心智全失及至良久收斂且五臟六腑虛處所受驚風而作疾世之幼幼者多因乳母不意之間耗其心氣乃以漸而作驚凡小兒因水火所加者悸也自跌撲所致者恐也人物所觸者愕也惕惕不散鬱郁悶於胸堂者怔忡也是知積驚難散由其平日氣壅不能自化如恐恐悸悸者蓋亦不能自知之矣不為積聚且怖畏之誠常在其中無以自遣偶因觸悶心神發驚其肝主風其脾生痰其肺作熱其心發驚四證相臨重者先發假如雷聲霹靂至響不為咎者何蓋聲相應情無所加矣惟有小兒在僻靜處或神廟中心存怖畏之時忽被無知小人戲叫鬼來鬼來且致兒奔走無門驚氣入心若不速利其驚氣少頃則指甲黑唇口青所受重害不可得療理自古及今調理嬰孩最為難事悉皆憑藥取愈且驚風至難也慢驚又難也慢脾候尤難也急驚頭額心背原被灸了者決定發癇不可常藥僕嘗謂風癇可灸驚熱不可灸蓋風與癇痰涎壅盛冒觸胸堂昏亂迷悶不能省知心如所失既灸著穴痰化心開即漸安愈驚之與熱心神常存聞知被灸忍痛不能驚悸轉盛其疾差重所以用艾在先藥在後驚風疾愈未嘗見因灸而活每見老嫗鄙婦無術只投艾炷兒生三日五日之間便以艾燒之不惟失穴因痛增悸經絡未全如何愈病智者消詳不可枉灸小兒急慢驚風古所謂陰陽癇是爾急者屬陽陽盛而陰虧慢者屬陰陽虧而陰盛陽動而燥疾陰靜而遲緩其治也皆因臟腑虛而得之虛能發熱熱則生風是以風生於肝痰生於脾驚出於心熱出於肺而心亦然天官疾醫疾注云肺氣熱心氣次也驚風痰熱合為四證四證已具於是八候生焉搐搦掣顫反引竄視曰八候凡搭眼搖頭張口出舌唇紅臉赤面青眼青唇青瀉青太陽髮際印堂青筋三關虎口紋紅紫或青者皆驚風狀也大抵熱論虛實證別逆順治有後先蓋實熱為急驚風虛熱為慢驚風慢驚本無熱所以發熱者虛使然耳急驚屬陽用藥以寒慢驚屬陰用藥以溫慎不可以陰陽無別故曰熱論虛實者此也男搐左視左女搐右視右男眼上竄女眼下竄男握拇指出外女握拇指入里男引手挽左直右曲女引手挽右直左曲凡此皆順反之則逆亦有先搐左而後雙搐者但搐順則無聲搐逆則有聲其指紋形勢彎弓入里者順出外者逆出入相半者難痊目屬肝肝受風熱則目直視或上竄或兩眥頻搭若無臉赤五心煩熱之證卻不發搐必挾心熱則肝風心火二者交爭而發搐也但竄視直視者與瀉青丸更加發搐者以導赤散兼之大抵肝風心火乃急驚受病之處瀉青丸去肝風導赤散降心火幼幼新書以為要藥故曰證別逆順者此也陽病陰脈陰病陽脈亦為反症熱盛生痰痰盛生驚驚盛生風風盛發搐治搐先於截風治風先於利驚治驚先於豁痰治痰先於解熱其若四證俱有又當兼施並理一或有遺必生他證故曰治有先後者此也綱領如此若析急慢脾風而言之則暴烈者為急驚沉重者為慢驚而慢脾則重而深矣急驚之候牙關緊急壯熱潮涎竄視反張搐搦顫動搦者十指開合唇口眉眼眨引頻並口中熱氣頰赤唇紅大小便黃赤其脈浮數洪緊蓋由內有實熱外挾風邪心家受熱而積驚肝家生風而發搐肝風心火二臟交爭血亂氣並痰涎壅塞所以百脈凝滯關竅不通風氣蕃盛而無所泄故暴烈也治法大要用藥有序通關以後且與截風定搐痰熱尚作乃下之痰熱一泄又須急與和胃定心之劑如搐定而痰熱無多則但用輕藥消痰除熱可也然急驚雖當下切不可過用寒涼及銀粉巴硝輩蕩滌太驟水銀輕粉巴豆芒硝鉛霜蟾酥腦麝等劑醫家不得已用之僅去疾即止或不當用而用或當用而過焉往往由此成慢驚矣下痰熱不須用銀粉巴硝但能斟酌大黃可也欲下之法須當審問前人已下未下或曾經吐瀉否已下及吐瀉者不可再下但驅風化痰消熱而已大約痰熱十分且泄其三之二下劑中須以枳殼菖蒲寬氣通心之類佐之蓋急驚急在一時治之不可寬緩稍緩則證候轉深若一時體認未明又不可妄施藥餌截風定搐先與通關嚏驚輩次則人參羌活散截風丸一字散陽癇散擒風湯定搐散瀉青丸木通清寧散阿膠散以意擇用下劑有三輕下則用定命散利驚丸防風湯宣風散枳殼散小柴胡湯輩稍重下則用揭風湯硃砂膏疏風散柴胡加大黃湯輩重下則用青金丸天麻丸蘆薈散牛黃涼膈丸青金丹王監驚墨丸輩下後和胃助氣如生氣散銀白散茯苓二陳湯異功散天麻蘇合香丸參苓白朮散和中散醒脾散之類皆可選用定志寧神則以定志丸溫膽湯定心丸柏枝膏與之他如太乙保生丹聚寶丹蟬蠍散不冷不熱祛風鎮驚之劑又當繼此以防其再發也下之後諸證猶存者未易痊愈更勿再下當作慢驚理之其有搐搦反張斜視而牙關不緊口無痰涎者未可直指以為驚風恐是傷風傷寒傷食三等證或夾驚傷寒錢氏假搐之說傷風夾驚神困昏悸頭疼氣粗先用人參羌活散惺惺散消風散輩微取其表次與天麻防風丸傷食夾驚身熱溫壯或吐不思食大便酸臭先用人參羌活散加青皮紫蘇取表消積次用驅風鎮驚之劑凡搐搦者不可把握但扶持之否則風癇逆入經絡遂使手足拘攣以成廢疾此治急驚之大要也慢驚之候或吐或瀉涎鳴微喘眼開神緩睡則露睛驚跳搐搦乍發乍靜或身熱或身冷或四肢熱或口鼻冷面色淡白淡青眉間唇間或青或黯其脈沉遲散緩蓋由急驚過用寒涼或轉下太驟傳變成之又有吐利不止而成者有氣虛暴吐瀉而成者錢氏云夏月脾胃伏熱大吐瀉者當解暑熱不可專只固陽藥有臟腑虛洞泄成者風邪入於腸胃故大便不聚而瀉有久痢氣脫成者有下積取瀉成者有吐血瀉血者成者有感風不解誤藥成者有傷寒傳變成陰證者有得之久嗽作癇者有得之發癇不已者有得之蟲積衝心者有得之卵腫疝氣腹痛者其或日夜汗出脾困多睡煩燥引飲四肢浮腫大小便閉丹瘤腫毒龍帶纏腰走馬急瘡並傳慢候惟吐瀉積痢或虛致之則證變甚速才經吐瀉便是慢驚須用溫中扶里或搐來緊急及慢驚初傳尚有陽證不可誤作急驚用藥世言搐慢為慢驚非也若泥此往往指慢脾為慢驚矣凡慢驚男子以瀉得之為重女子以吐得之為重治法大要須當審問源流不可概曰慢證如吐瀉得之則理中湯加木香以溫其中五苓散以導其水臟寒洞泄得之則先與朮附湯下積取轉得之則先與調氣散外感寒邪得之則先與桂枝湯解肌湯輩其他可以類推矣然慢驚雖屬陰亦須准較陰陽虧盛淺深如何不可純用溫藥及燥烈太熱之劑惟於生胃氣中加以截風定搐如全蠍花蛇殭蠶白附天麻南星輩為良方傳慢驚候而尚有陽證者八候尚在不必回陽但與截風調胃可冷可熱均平陰陽而已太乙保生丹聚寶丹蟬蠍散神保既濟丹來復丹王氏惺惺散醒脾散大醒脾散大溫白丸可選用之若陽虧陰盛病已傳過純屬慢驚無搐掣反引竄視之證而但昏沉者與星香全蠍散定命飲四聖散烏蛇四君子湯天南星散烏沉湯沉香散之屬若手足冰冷者方可回陽用硫黃附子慢驚下痰身暖者天南星丸蘇合香丸白丸子痰盛者神保既濟丹礞石散虛甚而不可下痰者靈脂丸七珍丸如腦麝銀粉巴霜如寒涼通關利腸輩一切禁止麝雖溫然性屬陰能化陽通腠其有陽已傳陰或者不知但有見引搐誤用腦麝銀粉及寒涼輩必為慢脾陰逆者若慢驚之候其眼半開半合則當預作慢脾風調理之於斯時也陰氣易盛陽氣易微時刻少延則藥力不及頻並投藥則勢又不可才進一二劑須審有無傳變稍定則和平為愈勢篤則以剛劑投之此治慢驚之大要然也慢脾風之候面青額汗舌短頭低眼合不開困睡中搖頭吐舌頻嘔腥臭噤口咬牙手足微搐而不收或身冷或身溫而四肢冷其脈沉微陰氣極盛胃氣極虛十救一二蓋由慢驚之後吐瀉損脾病傳已極總歸虛處為脾所受故曰脾風若逐風則無風可逐若療驚則無驚可療但脾間痰涎虛熱往來其眼合者脾困氣乏神志沉迷痰涎凝滯然爾世所謂慢風難療者慢脾風是也然慢脾一名虛風凡小兒或吐或瀉之後面色虛黃大勢虛損若因虛而發熱繼此必得慢脾風才見搖頭斜視以手摸人昏困喜睡額上汗多身亦黏汗其聲沉小而焦即是脾風之證不必皆由急慢風傳次而至又當識之治法大要生胃回陽黑附湯川烏散金液丹白丸子各半生附四君子湯可斟酌用胃氣漸復則異功散輩溫平而調理之如蠍附散陰癇散靈砂震靈等亦可參用若其眼半開半合手足不冷證候尚在慢驚則勿回陽或已入慢脾而陽氣未甚脫者亦不可用硫黃附子凡服回陽湯劑手足漸暖者仍以醒脾散等繼其後以調之慢脾下痰輕者神保既濟丹白殭蠶丸重者人參膏甚則七寶散妙丹砂矣慢驚慢脾逆惡證侯諸藥不效者如有太衝脈則取百會穴灸之此治慢脾風之大要然也雖然小兒有病問之則幼不能言望之則易驚易喜診之則或惕或動自六歲以下黃帝不載其說者以其難也又痓痙發癇卒中天瘹撮口亦風之種類焉痓者手足冰冷痙者舉身僵仆痓痙本一病當以陽剛陰柔別之剛者有汗柔者無汗肢體強直腰身反張甚於風癇大抵不治癇者目瞪涎流神氣鬱勃四體不牧沉默昏憒似死似生其聲惡叫身軟時醒有聲者為癇身強不醒無聲者為痓痙凡治驚遇咬牙啼叫者須與通心利小便劑癇亦多種錢氏有牛羊雞犬豬之說大抵以風驚食三證別而治之中風者五臟各有脈證隨五臟俞以施灸法與大科則同特少小分劑耳天瘹者身體壯熱翻眼抬睛手足搐掣其狀如魚之上鉤又內腹痛多啼唇黑陰腫傴僂反張眼有紅筋班血乃寒氣壅結兼驚得之撮口者一臘內之篤疾臍風胎風鎖肚瘹腸卵疝俱至撮口蓋風入心脾故令小兒氣促口撮如囊而不乳也其有初生百日頻頻吐哯呵來噴去睡里多驚眼翻肚脹手足緩怠煩燥多啼者當作胎驚風理之又有變蒸亦發微驚不治自愈又瘡痘欲發亦或搐掣如風右鼻冷腳冷尻冷耳後有紅脈赤縷者必是瘡痘之證戒不可以腦麝開腠及銀粉巴硝轉下而冰壓之是辨析之不可不審也至若眼陷無光瞳人無色爪甲青黑四體垂嚲一臟氣絶不可勉強下藥面赤如緋面青背冷頭目仰後足冷目青腹脹胸高手拿胸膈唇舌鼻黑魚口氣粗囟腫囟坑啼哭無淚冷汗不止汗出如珠如油眼青瀉黑血悶涎入心肺噓舌出口咬人五硬五軟五冷五干皆惡證也急驚眼睛翻轉口中出血兩足擺跳腹肚搐動或神緩而摸體尋衣或證罷而神昏氣促噴藥不下通關不嚏心中痛絶忽大叫者難愈慢驚四肢厥冷泄瀉加嗽面黯神慘胃痛鴉聲兩脅動氣口生白瘡胃閉損也髮直搖頭眼睛不轉涎鳴喘噎口眼手足一邊牽引者難痊慢脾身冷黏汗直臥如尸喘嗽頭軟大小便不禁背冷口噤頭搖者最難為力或者慢驚欲絶之時虛痰上攻咽喉引氣呼吸粗大六脈浮數是謂陰盛強陽錯認以為陽氣已復直與峻藥下痰痰隨藥下氣隨痰絶人以醫殺咎之此則不識覆燈將絶之證雖不下藥亦無生意矣又有喉中痰涎聲如拽鋸一兩日間但閉目不開者此為虛候之極虛痰飽養其氣然也若遽下痰亦未可保姑以蘇合香丸白丸子輩與之他如急驚安靜之後兩日再發面色變易又三四日定而復發其後淹延必至沉重若急驚證候徒知定搐不去驚熱才見搐定遂指為安未幾復搐是為過街候若慢驚之候藥服已瘥尚虛乏數日未省者或妄攻之則前功俱廢是體認之不可不精也方南星丸治小兒急慢驚風經久諸般癇病纍醫無效但是惡候不問陰陽灌藥一服得睡即效蛇含石一分石燕併火煅酒淬三五次代赭石硃砂鐵粉雄黃各一錢五靈脂乳香川烏去皮炮天漿子二十七粒炒烏蛇肉酒浸炙去骨一錢蛇皮炙蛇頭一個酒浸炙殭蠶皂角水浸一夕微炒蟬蛻天麻蜂房炒蜈蚣大赤足者二錢全蠍二錢新薄荷自然汁浸一宿焙微炒白附子南星薑汁浸一夕牛膽拌炒羌活川芎麝香各一錢腦子半錢上為末糊為丸雞頭子大金箔為衣三歲一丸薄荷湯入酒少許磨或作散亦可一方酸棗仁炒去皮二錢如吐瀉後加附子炮去皮髓輕重入藥鎮心丸治小兒一切諸風急慢驚癇常服此藥一應瘡毒不生其驗不可盡述烏鳥屎一應烏鳥飛禽皆是又名燕子屎用新瓦焙乾京香墨醋煅虎睛麻黃豆豉牛黃黃蠟麝香少許珍珠地龍活者全用乾蠍十個炒南星作薄片用童子小便浸三日陰乾焙防風白鮮皮猢猻骨硃砂風化硝上除麝蠍另外余藥各等分研為細末用水飛過用銀圈杵作餅子另用麝砂為衣用井水磨一錢臨臥服如時病身熱疳癤熱毒用薑汁磨化服急驚用水磨二錢服其或傷風傷寒傷暑傷濕傷食停積疳勞煩渴盤腸肚瘹諸瘡疽證此因之而發風須當體認隨其證療其病證病證去則風自去矣按錢氏方小兒抽搐身熱喘急目斜露睛四肢逆冷李醫業概以定驚搐一劑與之無殊主對錢遂白之曰發搐為肝實身熱喘急為肺虛目斜露睛為肝肺相勝四肢冷為脾虛治法先用益脾補肺胃氣稍復然後瀉肝定驚而安一證直視而不能食或謂神祟使然錢知其為肝旺勝脾與之瀉肝而愈一證吐瀉或利小便過多以至脾虛不食錢用益黃散作效已經數日忽爾不語衆醫類以失音湯劑治之竟無寸效錢氏用地黃丸數劑補腎於是能言究其所以然者前乎清利小便太過遂致脾腎俱虛雖已補脾而腎尚虛故爾至論肺虛痰實治法當下故下之必先益脾然後瀉肺經云欲瀉其子先補其母此錢氏要訣錢氏方瀉青丸瀉白散導赤散瀉黃散宣風散乃瀉五臟藥益黃散白朮散阿膠散地黃丸皆補五臟藥心中驚熱清心而熱不退則與之助胃胃不虛則熱不生或胃虛不實又且大小便難則不為之疏利蓋利之則胃愈虛而身必冷其有傷風寒而吐瀉者欲止吐瀉不恃溫脾須以發散之劑先之風寒散而吐瀉自止矣不特此爾小兒平常服藥過多而臟腑調和之劑不愈則易之以攻擊固守之劑太過則恃乎疏利之藥大概小兒臟腑柔嫩易實易虛易冷易熱兒有大小壯弱病有輕重淺深所貴乎目視之切意度心惟醫權衡斟酌對證用之得中為上矣頂門百會上慢驚用藥封臍或吐瀉立效睡紅散治小兒急慢驚風手足搐搦目瞪神昏口眼相引牛黃硼砂腦子珍珠水銀砂子各半錢麝香一分青黛蠍尾炒京墨燒煙盡南星薑汁浸一宿半夏薑汁浸一宿蛇含石醋淬六味各一錢金箔十片銀箔十片烏蛇尾並項下七寸並酒浸一宿取出去皮骨炙一錢上牛黃麝香腦子硼砂金箔銀箔先研細次入水銀砂子再將余藥搗羅為末一處研勻每服嬰孩半字半歲一字一二歲半錢三四歲一錢以意加減金錢薄荷湯下如一服搐定即便用調胃氣觀音散二三服如小兒再作氣粗發搐宜進雞舌香散二三服一方有薄荷無南星加味至寶丹雞嗉一個烏骨者尤妙去淨牛膽膏半兩天南星取心三錢血竭三錢如無以獖豬心血代之馬牙硝二錢半硼砂一錢蠍梢九個枯礬二錢半腦子麝香少許以上為細末入雞嗉內扎了用碗蒸一飯久取出懸掛卻入後藥至寶丹二兩沉香木香各一錢白芷梢一錢半豬牙皂角三條去皮弦上為末夏加花蜘蛛十個和前藥糊丸如蘇合香丸大硃砂金箔為衣每服一丸薄荷湯磨服奪命金丹治急慢驚風無藥可理者一服見效天南星為末用臘月黃牛膽汁拌和入於膽內掛當風處陰乾百日可用天竺黃天麻防風去蘆白附子炮白殭蠶炒去絲嘴硃砂別研各一兩蟬蛻去土半兩麝香二錢別研天漿子炒二十一個牛黃半錢蠍梢四十九個炒赤足蜈蚣一條脊上開路入麝香一錢卻用紙裹焙乾用干膽一枚炙黃去足上為細末用東流水煮白麵糊為丸如雞頭子大金箔為衣每服先下白末子即和劑方青州白丸子研為末每服半錢薄荷湯下後用生薑自然汁磨下一粒立見功效量兒大小增減不拘時牛黃散子治小兒驚癇壯熱心燥發歇不定宜服牛黃一分馬牙硝鐵粉龍腦各三分上為細末為散每於乳食後以熟水調下半錢量兒大小加減一方用龍齒蛇黃丸治小兒驚癇蛇黃三枚大者細研麝香半分鬱金三分為末金銀箔各細研五十片上同研令勻以粳米飯和丸如緑豆大每服用磨刀水煎一兩沸溫如人體下三丸更看兒大小加減一方無金銀箔極妙方治小兒驚癇鐵粉石膏牡蠣粉各一分黃丹半兩上細研為散以井華水調下半錢量兒大小加減服之子芩散治驚癇發熱如無癇但似熱即與服升麻子芩犀角屑各三分大黃六分上水二升半煮一升二合候溫漸與服微利三兩行忌面豬魚醋物葛散子方治少小驚癇掣瘲一日一夜百餘發葛炒雄黃甘草炙各六分當歸三兩好者上為末取一小豆乳汁和令咽之日夜三四服不能服用當歸半兩小豚卯一具並切酒一升二合煮八合服半合至一合量兒大小日夜三四服大妙二氣蠍梢散治小兒驚癇青州白丸子半兩陰陽硫黃系生熟者各用緑豆大蠍二個全者不得用火焙要曬乾一法用蠍梢上為細末每一歲至五歲半錢六歲至十歲一平錢用無灰好酒下忌動風物小兒奶母亦忌口若驚發作用無灰酒下一大錢病深者過十服辰砂乳香丸亦名鎮驚安神丸治驚癇胎風壯熱瘛瘲弄舌搖頭眠睡不穩目睛上視口眼牽引痰實咳嗽咬齒譫語半夏炮乳香硃砂各研上各等分為末麵糊丸每服十丸乳食後溫薄荷湯下量兒增減琥珀丸治小兒急慢驚風涎潮昏冒目瞪搐搦驚釣腹疼及和順瘡痘小兒驚哭眠臥不安入口立效驚癇時復發作常服永除病根辰砂一錢半琥珀牛黃殭蠶炒去絲嘴全蠍去毒南星水浸夏三日春秋五日冬七日牛膽中制佳白附子代赭石天麻乳香蟬蛻各一錢麝香半錢腦子一分上為末一歲半字薄荷湯調下慢驚加附子保命丹治小兒急慢驚風潮作不定涎盛氣急精神不爽病退常服永除根牛黃辰砂各二錢麝香半錢腦子乳香五靈脂鐵粉代赭石各一錢全蠍半錢蜈蚣一條附子炮殭蠶炒蛇含石煅醋淬三次各半兩上為末白麵糊丸如雞頭子大每服一丸薄荷湯磨下萬金丹治小兒急慢驚風硃砂五錢別研麝香錢半別研珍珠一錢半白殭蠶十個炒琥珀一錢明者全蠍十個去尾火炙腦子別研犀角銼干胭脂以上三味不以多少天南星一錢鉤藤五錢巴豆五粒去油上為細末薄荷湯打糊為丸如麻子大二歲小兒服一十八丸看兒大小加減丸數服之急驚煎薄荷湯送下慢驚煎地龍湯送下神應丸治小兒急慢驚風及卒中並五種癇疾或髮直目直視面如桃花口眼俱閉或即俱開喉中作聲汗出如油驚風下泄時瀉黑色以上惡候但一服救之灌藥一粒立效真牛黃麝香輕粉各半兩金銀箔各百片磁石石緑硃砂蛇含石火煅醋淬七次粉霜雄黃各一兩石燕子兩個火煅醋淬七次上為末酒糊丸梧桐子大一歲一丸薄荷湯化下入酒少許尤妙癇病薄荷自然汁和酒化下香金丸治小兒急慢驚風來去不定涎鳴昏瞀天麻雄黃全蠍各半兩白附子大川烏炮去皮鐵粉青黛南星炮各一分麝香半錢石燕子醋煅硃砂各一分上為末糊丸如雞頭子大每服一丸薄荷湯磨下蛇頭丸治小兒急慢驚風涎盛痰塞搐搦來去不問陰陽但是驚後服之立效蛇頭一個炙蜈蚣三條赤足者硃砂三錢鉛白霜輕粉各二錢腦子一錢麝香一錢鐵液粉百草霜各半兩蛇含石一兩醋淬上為末糯米糊為丸雞頭子大每服半丸薄荷湯磨下一方慢驚加附子半兩去皮尖血竭一分一方加全蠍一分睡紅散治小兒急慢驚風手足搐搦目瞪口眼相引烏蛇項下肉七寸用酒浸一宿去皮骨炙黃一錢青黛二錢牛黃半錢蠍梢一十個炒麝香一字硼砂半錢水銀砂子半錢金箔十片真珠末半錢烏蛇尾酒浸一宿去皮骨炙黃色一分蛇黃入水內燒令紅醋淬如此三度上牛黃麝香硼砂金箔先研極細令勻次入水銀砂子再研將余藥搗羅為末作一處研勻每服嬰孩半字一二歲半錢以意加減金銀薄荷湯調下如一服搐定即便用調胃氣藥服之兼治一切風癇上視涎盛宜服如吐瀉後成驚手足冷者不可服麝香膏治小兒急慢驚風涎熱發搐麝香防風草龍膽各三錢甘草炙四兩龍腦一錢硃砂研三錢乳香半兩研天南星燒半錢膩粉一錢墨半錢青黛半兩上研勻蜜和成膏每二歲兒服半皂子大薄荷湯化下天王補心丸治小兒急慢驚風金箔鎮心丸蜜丸加金箔為衣硃砂半衣半夏浸十日換水十遍每換水攪一次人參南木香各三錢琥珀杏仁炒黃色卻以湯泡去皮尖麝香青木香檳榔葶藶子炒黃色各一錢江子七粒去皮去油上各研細面為丸蘿蔔子大每服一歲五七丸三歲二十七丸虛者減丸數壯者加丸數硃砂為衣荊芥湯下用蜜丸如雞頭子大為金箔鎮心丸磨化服麝香餅子出全嬰方治小兒急慢驚風進退不定日久乍靜乍動嘔吐痰涎潮搐風癇潮熱口眼偏斜項背強直目睛上視及因吐利生風心肺中風尤宜服之麝香蠍尾去毒南星炮蜈蚣二條赤足酒浸酥炙川烏炮去皮尖白花蛇酒浸一夕去骨皮焙各半兩乳香鐵粉硃砂牛黃各一錢上為末酒糊丸如雞頭子大拍作餅子三歲一餅人參薄荷湯化下大小加減烏龍丹一名烏梢丹出全嬰方治小兒急慢驚風潮發不時神昏涎盛及因吐利後生風及心肺中風尤宜服之白附子人參南星炮半夏泡洗七次烏蛇尾酒浸去皮骨焙一方用三兩水浸天麻全蠍去毒防風川附子炮各一兩天漿子二十七個炒一方二十一個上作一處酒浸二宿取出焙為末次用水磨雄黃一兩辰砂一兩並飛同和拌入麝香二錢生龍腦一錢糯米飯為丸如黍米大三歲十丸薄荷湯下有效亦作散子調下尤妙睡安散出全嬰方治小兒急慢驚風潮搐不定不得安睡辰砂乳香血竭各一錢麝香半錢人參酸棗仁炒南星炮白附子各半兩全蠍二十一個蜈蚣一條酥炙黃酒浸一宿上為末二歲一字薄荷汁好酒煎令沸調下得睡是效至聖保命丹出鮑氏方治小兒胎驚內瘹腹肚堅硬夜啼發熱目睛上視手足搐掣角弓反張但是痰涎壅盛一切急慢驚風並皆治之全蠍十四個白附子天南星炮白殭蠶直者炒硃砂研麝香研各一分防風去蘆叉天麻各二錢金箔十片蟬蛻去泥二錢上為細末入研藥和勻粳米灰飯取中心軟者搜為丸每一兩作四十丸初生兒半丸乳汁化下周歲兒一丸金銀薄荷湯化下一歲以上有急候者二丸薄荷湯化下常服鎮心安神化痰除一切驚風證候一方無金箔硃砂為衣一方無天麻蛇頭丸出和劑方治小兒急慢驚風手足抽掣眼睛直視角弓反張證候危急者蛇含石十個煅三度醋淬卻用甘草湯煮出酸氣研飛為細末鐵膩粉五靈脂酒浸去砂辰砂炒蠍梢白附子炮鬱金炮各二兩麝香研一兩龍腦別研半兩花蛇頭一個酒浸用齒並肉上為細末麵糊為丸如雞頭子大每服一丸薄荷自然汁磨以井花水化開量大小加減與服大天南星丸出御藥院方治小兒急慢驚風涎潮發搐目睛上視口眼相引牙關緊急背脊強直精神昏塞連日不省龍腦研牛黃研乳香研各一錢天南星牛膽制者半兩人參天麻去蘆防風去蘆各一分硃砂研三錢麝香研一錢半乾蠍十四個湯浸潤去土微炒上研杵令勻煉蜜和丸如雞頭子大每服一丸荊芥薄荷湯化下量兒大小加減服不拘時生朱膏出醫方集要治急慢驚風天麻一分硃砂二錢殭蠶白附子煨全蠍二十一個黑附子一錢炮麝香半字蜈蚣一條酒浸南星一錢半煨花蛇酒浸炙乾各二錢上為末和勻煉蜜為丸如雞頭子大每服一丸用金銀薄荷湯化下扁銀丸治小兒急慢驚風積青黛三大錢水銀一皂子大同黑鉛結砂子寒食麵黃明膠炒令焦為末各二錢輕粉炒五錢雄黃粉霜硃砂各一兩巴豆十二個去油腦麝少許上都研細勻滴水為丸如麻子大捏令扁曝乾磁合盛一歲一丸隨意加減煎皂角子湯送下不得化破龍腦散出錢氏方治小兒慢驚多用性太溫及熱藥治之有驚未退而別生熱證有病愈而致熱證者有反為急驚者甚多當問病者幾日因何得之曾以何藥療之可用解毒之藥無不效宜此大黃蒸半夏湯洗銼薑汁浸一日焙乾炒甘草炙金星石銀星石寒水石禹餘糧不灰木青蛤粉各半兩上同為細末研入龍腦一字再研勻新水調一次字至半錢量大小與之通解諸毒本舊方仲陽添入甘松三兩枝藿香葉末一錢金牙石一分減大黃一半治藥毒吐血神效奪命散出全嬰方治小兒急慢驚風諸藥不效者一服見效白附子黑附子炮去皮南星炮天麻防風半夏泡七次麻黃去節硃砂全蠍新薄荷葉裹生薑汁蘸炙三兩度黃色各一錢上入麝香半錢為末三歲半錢薄荷薑汁更同酒泡湯調下急驚硃砂輕粉二味加入治急慢驚風大有神效蘇合香丸一貼鎮心丸一貼牛黃清心丸一貼天南星丸一貼硃砂一錢重貫珠子根不拘多少為末地龍九條用半錢真沙糖不拘多少麝香不拘多少上為末極細一處拌勻每服抄一錢無根水調下黑神丸一名醉驚丸出幼幼新書治小兒急慢驚風膩粉一錢半墨白麵蘆薈研各一錢麝香研龍腦研牛黃研青黛研使君子去殼麵裹炮熟各半錢上同研勻細麵糊為丸如梧桐子大每服半丸薄荷湯研下止利即服一丸俗名睡驚丸少不同耳前後用之重者一服即瘥一方有麻糖三個或二個不用牛黃德生堂云昔有小兒王醫賣此藥以效至富豫因得方與常人治驚風極效本堂用之神驗妙香丸出全嬰方治小兒急慢驚風及傷風壯熱或結胸五七日以上面赤大躁腹脹喘粗面易五色者以龍腦水吞下一丸下惡物並藥丸即瘥硃砂一兩牛黃腦子麝香輕粉各三字金箔十片巴豆二十五粒去油黃蠟六錢上為末熬蠟為丸如小豆大三歲一丸薄荷湯下或以腦子水下如驚癇年深不過五服更不復作如驚熱驚風可芥子大三兩丸驚涎積熱頰赤口乾患經五七日以上但是驚疳食病小方脈不能曉者十歲緑豆大七丸虛中有積吐瀉諸痢不止臟腑㽲痛者服之立效食前一方入白沙蜜三分同研令勻為丸黑龍膏出全嬰方治小兒急慢驚風潮搐頻並胎癇發歇不定烏蛇尾去皮骨酒浸一宿蠶紙一張燒灰蟬蛻全蠍各半兩硃砂半兩腦子麝香各半錢金箔二十片上為末煉蜜為丸如皂角子大三歲一丸薄荷湯化下一方人參湯薄荷湯一名烏金膏銀硃丹出全嬰方治小兒急慢驚風搐搦不定涎壅不通並胎癇全蠍去毒天漿子炒蜂房各一分硃砂半兩水銀黑鉛錫各一兩二味結沙子牛黃麝香各一錢上為末糊為丸如小豆大二歲五丸金銀薄荷湯下保安膏出全嬰方治小兒急慢驚風潮作不定心肺中風蛇頭一個酒浸蜈蚣一條酥炙全蠍一錢草烏一個去皮尖麻黃去節一錢硃砂一錢半腦子麝香各一字上為末一錢一次薄荷湯酒調下全蠍散全嬰方治小兒急慢驚風諸癇涎盛頭頸強直如弓蠍尾一錢半炒蜈蚣一條炙麝香一字腦子一字川烏尖七個生南星半錢薑汁浸一個花蛇肉酒浸炙一錢上為細末一歲一字薄荷湯調下定命丹一名定生丹旅舍方治小兒急慢驚風天吊臍風撮口搐搦奶癇壯熱蠍尾十四個炮天麻半分天南星炮末膩粉各一兩半青黛分半硃砂研白附子炮各半兩麝香二字上再研勻用燒粟米飯為丸如緑豆大薄荷湯化下一丸凡急驚者水化滴入鼻中立即搐定一方用腦子一字麝香丸一名天漿子丸出聖惠方治小兒急慢驚風上膈多涎精神昏悶麝香一分細研牛黃半兩細研白附子半兩泡製犀角屑三分蟾酥如柳葉大兩片於鐵器上焙豬膽一枚乾者一方取汁入麵糊同和為丸天漿子十枚麩炒令黃去殼半夏一分湯洗七次去滑上為末用麵糊為丸如黍米大一二歲兒每服五丸未瘥頻服量兒大小以意加減薄荷湯下三丸龍骨散出全嬰方治小兒急慢驚風諸藥不效者可用天漿子三十一粒炒蜈蚣一條炙蠍尾去鉤子烏蛇肉酒浸焙硃砂各一錢腦子一分麝香一分上為末三歲一字薄荷煎湯調下七味羌活膏出御藥院方治急慢驚風壯熱發搐胎癇昏困不省天麻全蠍人參白殭蠶各半兩羌活獨活烏蛇肉酒浸一宿焙各一兩上為細末煉蜜和丸每兩作五十丸每服一丸煎荊芥薄荷湯化下一方麝香荊芥湯化下辰砂茯神膏出永類鈐方治小兒急慢驚風涎潮搐搦手足抽掣心膈煩躁治驚啼睡不安帖腹中㽲痛酸棗仁淨去殼代赭石燒醋淬研乳香別研各一兩炙茯神去木一兩半硃砂研飛半兩麝香研一錢上為細末煉蜜為丸如雞頭子大每服一丸用金錢薄荷湯研下更量歲數加減與服常服鎮心安神定志此藥與他驚藥大不同溫平不冷定命丹出幼幼新書治小兒急慢驚風天吊撮口潮發搐搦奶癇及壯熱昏塞不省青黛研半錢蟾酥乾者酒浸一宿一分乾蠍全者七枚微炒麝香研一錢白附子搗為末半錢一方生用天南星炮為末一分上細研令勻以粟米粥和丸如緑豆大別以青黛為衣每服一丸荊芥薄荷湯化下後困睡無疑但有患者先化半丸滴入鼻中嚏噴者必瘥一方不用天南