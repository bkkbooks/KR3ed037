薄荷生薑自然汁浸一日一夜焙乾用上件研為細末每潮一搐時男左女右用一米粒大吹入鼻中神應散治小兒急慢驚風出東坡家藏方有應雄黃二兩硃砂一錢全蠍七個去毒蜈蚣一條炙殭蠶一個直者炒上為細末每用半錢薄荷湯調服萬應丹出東垣蘭室祕藏方一斗紅雲一斗雪神妙卻在青蒿節不論急驚與慢驚臨時須用生人血上於七月二十五日取青蒿上物研和為丸如梧桐子大每服量大小輕重加減乳汁磨下半歲一歲者一丸二歲二丸三歲三丸如黃豆大延壽丹出東垣蘭室祕藏方治小兒急慢驚風胃受驚氣腹痛盤腸內吊鴉聲邪叫角弓反張眼或視上手足搐搦痰涎潮壅塞不醒或一切心神煩悶睡臥不安並宜服之天南星白附子蛇黃辰錦生朱當門子上細末和勻糯米粉糊為丸如雞頭子大周歲兒每服一丸嬰兒半丸薄荷湯浸軟磨化乳後服傷寒疹痘俱不妨礙藥性溫平治小兒急慢驚風出得生堂經驗方上速以男左女右之手第二指屈勾拳取其第二縫頭用麻子大艾炷一丸炙之即愈危者二三壯此法本堂試用萬無一失其應效如響治小兒急慢驚風乳香半兩味辛熱微毒甘遂半兩味苦寒有毒及甘草水浸三兩日換東流水淘淨候乾炒脆用之上二味同研細末每服半錢用乳香湯調下或小便調更妙治小兒急慢驚風並慢脾風上用青州白丸子並金液丹等分為末飯飲調下量虛實大小與服黑子散治小兒急慢驚風上用豬牙皂角不拘多少燒為炭為末入麝香少許金銀薄荷湯調下一字量兒大小與服燒時令帶性不得過至聖保命丹出保生集方小兒急慢驚風並皆治之全蠍五兩南星十兩蚯蚓屎十兩硃砂一兩輕粉二錢岸螺螄二百個上為末糕糊為丸如雞頭子大每服一丸用薄荷湯化下蔥湯丸治小兒急慢驚風滑石一錢輕粉一錢全蠍半錢白附子一錢半半生半熟巴豆七粒去油南星一錢半半生半熟上為末蒸餅丸如麻子大每丸對歲數一歲以下七丸未出月一丸氣積驚積金銀薄荷湯下礬皂丸治小兒急慢驚風涎及去風痰疾利胸次常服永無痰疾北礬二兩半飛過半夏薑汁浸一宿焙南星切作片濃煎皂角水浸一宿慢火焙乾殭蠶直者可用一兩醋浸一宿半生半熟各半兩上為末姜糊丸桐子大每服十粒至二十粒薑湯下如喉閉熱痛含化爛嚼薄荷新汲水送下甚者及纏喉風皂角水一搽腳研一二十粒灌下小兒急慢驚風涎盛皂角水研揩齒上常服食後臨臥薑湯下不損津液化痰為水問命散出保生集治小兒急慢驚風發搐蜈蚣一條殭蠶一條比如蜈蚣長上為細末男左女右搐一字
