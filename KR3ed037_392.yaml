糯粥研為丸如黃米大若腹內有症積臨臥時炮皂角子煎湯下驚著用蔥白湯下若有涎吐逆用丁香母一個煎湯下每服一丸至三丸量兒大小加減麥門冬雙丸子治小兒痰實結聚麥門冬去心四分蕤仁二百枚去皮膜丹砂三分巴豆四十個去皮心炒上為末蜜丸黍米大一歲二丸二歲服麻子大四丸一方用真珠不用丹砂白湯下聖餅子治一切積及虛中積下風延其藥取病甚穩全不搜攪時作壯熱煩渴腹臟不調輕粉粉霜各四錢石燕子大者二枚先為細末延胡索大者二十八個為末上同研勻滴水和丸如大棋子大仍候陰乾每服一餅子先用熟水浸軟冷漿水調下臨臥更深服後急嗽口此藥只取積滯並不損氣更臨時加減若要下驚積則每料更入硃砂生龍腦各一錢重小兒一餅分為四服或便捏成小餅子桃紅散治小兒驚積疳積常服進食面如桃花馬牙硝硃砂茯苓人參等分上為末二歲服二字一歲一字三歲亦二字四五歲三字新汲水入蜜少許調下蜜水約盞內三分五聖丹治一切遠年近日酒食所傷漸成積塊兼消化冷果食逐五飲服餌消積塊大烏梅巴豆大者各十個半夏大者用三十個丁香新好者五十個上為細末滴水為丸如麻子大硃砂為衣小兒一兩丸大人每服三五丸至七丸量虛實加減生薑湯下不計時候紫金丸治小兒大人因驚積聚黏滑毒物在脾胃纍曾用藥取不下變成虛中積大人吃食吐逆心腹脹滿夜有虛汗日漸羸瘦惡蠍梢三十個犀末銀末硃砂各一錢上為末極細用水麵糊為丸緑豆大用薑棗湯下七丸婦人血氣米飲下五丸至七丸小兒驚疳積體熱困重目不開用黃連甘草桃仁薄荷湯化膩粉一字許下一歲以上三歲以下三丸小兒只可一二丸浮珠丸子治小兒取積雄黃水飛過硃砂細研膩粉各半錢巴豆五粒去油上和勻以天南星末酒煮糊為丸小兒粟米大大人梧桐子大用金錢薄荷湯下加減服之磨刀丸取小兒久困驚積滯食急慢驚風積奶不下作躁作熱作吐瀉多叫不睡全蠍硃砂一錢粉霜二錢半夏湯洗七遍去涎各七個上為末巴豆十四個都研不出油細研蜜浸蒸餅心為丸入麝香少許丸如緑豆大磨刀石水下一歲一丸看虛實加減服食如吐瀉不妨吐瀉即用驚藥調理不得吃和氣散恐渾身驚氣取積青榴丸幼幼新書輕粉五錢匕青黛三錢匕腦麝各半字重巴豆去心油春冬三十五粒秋夏二十四粒上為末麵糊丸如緑豆大每服五丸米飲化下五珍丸治酒食積通用青皮不去白炒焦黃乾薑燒帶生存性北五靈脂蓬莪朮各一兩上為末夾和稱藥末一兩用肥巴豆肉以石壓準去半油稱一錢研細拌和粳米飯丸麻子大每服三五丸米湯下飢飽時服蔥湯丸治積神效巴豆二十五粒用水浸一宿五更初去水後去皮殼心膜不去油另研滑石五錢輕粉半錢鷹糞一錢上為末研飯為丸如粟米大周歲以下每用三丸以上四丸未效再加丸數膈上有涎或吐亦無妨如有蟲用苦楝皮少許甘草二寸煎湯五更初先將化蟲藥服了後用此取下春季燈心湯下夏季蘇鹽湯下秋季蘇湯下冬季蔥白湯下初生兒以一粒放口中乳汁下化鐵丹治食積肚硬帶熱渴瀉或嘔皆因飲食無度多食過飽飽後即睡得之烏梅八個取肉巴豆十六粒去殼青皮五錢去瓤陳皮五錢去白上為末米糊丸粟米大每服七丸米飲下化銅鐵亦消消積丸一名丁香丸治小兒食積口中氣溫面黃白多睡及乳積吐乳瀉乳此由啼哭未已以乳與兒停滯不化得之縮砂三十個丁香九個烏梅肉二個巴豆一個去油上為細末糊丸如黍米大三歲以上五六丸以下二三丸用溫水下無時服凡小兒身溫壯熱非變蒸之候大便白而酸臭為胃有蓄冷宜丸藥消下後服溫胃藥若身溫壯熱大便赤而酸臭為胃有蓄熱亦宜丸藥消下後服涼胃藥無不愈一方用藿香湯下乳後一方加百草霜和勻三味紫霜丸消積聚巴豆去泊心膜杏仁去皮尖各二十一個代赭石一錢研細水飛上為細末飯丸如粟米大每服三五丸至十丸煎皂角仁湯下無時兒小者減之一方巴豆七枚代赭石二兩杏仁一錢治乳食不消炊餅和丸溫米飲下雄黃丸治取積雄黃三錢鬱金半兩巴豆二十粒去皮膜去油上為末麵糊丸如蘿蔔子大加減服每五丸空心茶清下追魂散治果子傷積白丁香輕粉官桂去皮各三錢上為末冷水調下半錢睡時服來日取下所傷物用異功散煎紫蘇木瓜湯調三服和氣木香散治小兒諸般氣積或驚結不通此藥立取下木香末一錢半陳皮二錢巴豆五粒去心膜上將陳皮巴豆用炒黃色只取下巴豆五片余不用與前木香末同研勻每服半錢或一字陳米飲下若吐瀉瓦缸內煎香附子湯下大小加減青黛三聖丸治小兒痰涎隔實奶癖驚風消奶食蛔疳疳積腹痛青黛一分牽牛末二分膩粉一錢上為末麵糊為丸米飲下靈砂丹下虛中積臟腑虛滑泄瀉久經取轉裡急後重久積惡痢暴瀉久不止神效無比通明硼砂一錢細研顆塊神砂通明有牆癖者一分細研上二味滾研極細用蠟半兩先於盞內銷成汁入去皮巴豆取三七粒全者煎候巴豆紫色為度即漉出巴豆細研入前二味再研勻於黃蠟內三分中取一分再熔成汁傾藥於內急攪令勻刮出於瓷盒內收之每服暴瀉惡痢旋絶三丸如緑豆大濃煎艾湯先呷三五口然後吞下水瀉冷水吞下如取積每服三丸如梧桐子大濃煎甘草湯放冷吞下臨臥服其久積隨藥而下不動便安飛霜丹理一切虛中積下痢膿血裡急後重臍腹撮痛硇砂三分去砂石稱粉霜三錢稱上同研勻用薄紙拗作小紙箱子方闊二寸半深四分許將藥末鋪在箱內次掘子地坑深三四寸其闊約碗蓋得著用火燒令極熱即去燧火惟留熟火三兩挺鋪在坑底置藥廂子在內火上急用瓷碗蓋坑口周回以細土壅塞無令透煙凡燒須防蓋定後火滅頻以手按試碗足熱可燒時須用好熟炭火即不滅燒如兩炊飯久即藥成也如火滅即再裝火燒之及兩炊飯久候碗冷即開碗取出藥燒碗上有藥煙著碗亦一處揩下再研令細凡藥得熟自於火上凝更次入膩粉九錢龍腦一錢再滾研令勻水浸蒸餅心丸如緑豆大大人每服十丸至十五丸乳香湯下小兒三五丸如有積可一兩日方徐徐利下也治小兒脾積獨顆蒜香白芷等分上為末將蒜搗爛入臘胭脂等分同白芷蒜同搗成膏子貼小兒臍中用牛角盒兒男用上蓋覆臍女用下蓋然後用無糨粉絹帛勒之待小兒口鼻中出蒜氣者去藥其病自愈效驗蘇感丸治氣積腹痛啼叫利如蟹渤皆由觸忤其氣榮衛不和去臟腑有積下利蘇合香丸感應丸各等分上和丸如粟米大紫蘇湯下二十丸一方淡薑湯空心下滋氣和胃消積縮砂香附湯平胃散上和合每服一錢蘇鹽湯下多服尤妙治小兒積滯腹脹食傷等病用芫花未開者及時採取曬乾摘去枝梗用和淡米醋或粳醋浸藥面上醋高一指隔宿取出控起帶醋於鐵銚內以慢火炒之不住手攪拌水脈斷即以碗器蓋之候冷傾出著底焦者不用洗過銚子揩淨再炒香熟焙乾為細末卻以先浸藥醋打硬糊為丸如粟米大每服二三十丸米飲下不拘時候一時許再進必利一兩行即止甚快而無所損若去脾胃停滯即用炒糖水或紫蘇湯下打糊醋須澄清者用或少卻添醋丸時更作一如緑豆大者治大人酒食所傷丸數量患隨虛實服之芫花海藻甘遂大戟四者皆反甘草服此藥了須忌他藥臟腑既動當以白粥補之青礞石丸治小兒臟腑積聚脅肋脹硬肌肉消瘦不能飲食一應奶癖食積悉皆治之青礞石木香乾薑各一兩京三稜煨切枳殼麩炒去瓤皂角去皮醋炙黃去子丁香各半兩巴豆二錢半去殼出盡油取霜上為細末煮神麵糊為丸如黍米大周歲兒每服十丸溫生薑湯送下乳食後三稜丸治停積不散腹脅脹滿乾噦噁心全不入食京三稜煨香切木香神麯炒黃陳橘皮去白半夏入生薑四兩同搗成膏炒令黃各一兩上為細末煮麵糊為丸如黍米大每服二十丸溫生薑湯送下乳食後磨積褐丸三稜蓬朮青皮陳皮香附子木香蘿蔔子炒牽牛子半生半炒神麯麥糵檳榔各等分上為末糊丸如黍米大蘿蔔湯下丁香脾積丸治一切積氣腹肚堅脹不進飲食皂角燒一兩青皮半兩三稜二兩莪朮三錢丁香半兩砂仁半兩麥芽三錢炒青黛一錢巴豆三七粒去油上為末烏梅肉搗糊為丸空心飯飲吞下茶清亦可日進三服其丸如麻子大三稜煎丸治虛中有積腹痛不進飲食三稜炮莪朮炮各半兩芫花三錢三味同醋煮一夕焙乾南木香二錢烏梅肉二錢半用巴豆三七粒同炒黑色去巴豆不同丁香二錢上為末醋糊為丸如緑豆大每服二十丸飯飲吞下亦能退面目浮腫鮓湯丸治虛中堅積外疾氣蠱腹大膨脹遍身浮腫雷丸二錢甘遂一錢粉霜半錢研滑石二錢白墡土一錢輕粉半錢芫花少許用醋炒或醋調麵裹煨青黛三錢水銀同鉛煅入腦麝少許上為末爛飯搗成丸如菜子大未周者隨月數與之半歲不可喂如驚或奶疳金錢薄荷湯下或蔥白湯下三歲二十丸疳瘦五十丸滿身浮腫毛髮黃堅用淨洗魚鮓煎湯下疳癆腹大湯使如前一日止可兩服不可連進五六歲常服只十五丸自然疏泄利去滯積如未甚退加一二服積盡而泄自疏但吃白粥補之不可用甘草藥調理則成相反忌甜物一月為妙延胡索散治氣積食積成塊及盤腸氣痛延胡索茴香炒甘草蓬朮各三錢上㕮咀每服一錢水五分煎至三分溫服如取後腸中一切冷痛並皆治之塌氣丸治積水驚水飲水多停積於脾肢腫而熱赤小豆陳皮蘿蔔子甘草炙各半兩木香炮一分上為末用神麯末煮糊為丸如緑豆大每服十丸薑湯送下麻仁丸破氣消積心腹痞塞並能治之麻仁半兩芍藥八錢大黃一兩半蒸枳殼八錢炒厚朴半兩薑製杏仁半兩去皮尖上為末蜜丸如緑豆大每用十丸溫水吞下外宣藥治小兒積氣腹大如吹氣塞痞滿郁李仁一錢巴豆炒去皮烏梅肉一錢皂角炙桃膠二錢朴硝少許檳榔枳殼各一錢上為末煉蜜令竭入藥搗成令如棗子樣納入大腸荊黃湯治氣閉不通臟腑痞結枳殼大黃荊芥朴硝梔子甘草各等分上為末每用一錢燈心湯調服立下日與兩三服克效聖餅子治癖積陳皮去白十兩巴豆百個同陳皮炒黃色去巴豆廣朮炮京三稜炮香附子炒去毛各半兩上為細末打麵糊為丸如緑豆大捻作餅子每服三十餅溫水送下橘皮丸治癖積堅硬不消橘皮二兩巴豆半兩去皮上將橘皮銼碎將巴豆炒令重黃色為度揀去巴豆不用只搗陳皮為細末用軟飯爛研為丸如緑豆大每服二十丸溫淡生薑湯送下食前量小兒歲數旋丸大小廣朮潰堅丸治小兒癖積脅腹脹滿發熱咳嗽喘促不思飲食青皮陳皮廣朮炮木香烏梅三稜炮各一兩大椒巴豆去皮心膜研各半兩上為細末麵糊為丸如麻子大每服五七丸溫米飲湯送下量小兒大小為丸加減服之食遠服六味三稜丸曠明仲云五六個月小孩兒未吃食有癖積者保安丸太重只服此六味為佳莪朮煨銼三稜煨神麯炒麥糵炒青皮陳皮上等分為細末水煮清糊為丸熟水下丁皮散治小兒脾積疼痛有效丁皮白朮茯苓青皮良薑縮砂神麯麥糵甘草真桂心陳皮上各等分為末燒鹽湯點服剪紅丸一名神應丸保嬰方磨癖積殺諸蠱進飲食神效無問男子婦人小兒老幼看虛實加減服之有孕婦人不可服乾漆銼炒令煙微盡稱一錢紫芫花錯淬炒一錢巴豆七個去皮心膜不去油斑蟊七個去足頭翅微炒研上為細末米醋打麵糊為丸如梧桐子大每服一丸細紗包紅線系定剪下來因此立為剪紅丸每服一丸同後藥服之南木香雷丸京三稜生百部微炒廣莪朮生各半兩貝母檳榔大黃生各三兩使君子仁四十九個半炒半生牽牛生取頭末三兩上為細末外用皂角肥者一十錠捶碎山茵陳一兩銼苦楝根皮二兩銼水四五碗慢火砂鍋內熬至一小碗以上藥搜和為丸如小梧桐子大小兒粟米大曬乾每服二錢半重各各隨後證引子湯送下但服此藥至五更雞叫服之忌一切腥葷生硬蔥蒜油膩之物此方與諸方甚異幸毋忽焉𠯜呷喘急咳嗽煎桑白皮湯送下取寸白蟲煎石榴湯送下蛔蟲苗蟲沙糖水送下腳氣腫不能行蜜水送下木瓜湯亦可酒痢酒積百藥煎湯送下大小便不通淡醋湯送下婦人血蠱病煎蔥白湯送下婦人血脈不調淡醋煎紅花湯送下小兒一切諸證蜜水送下沙糖水亦可腸風下血山梔子煎湯送下食積氣塊諸證並用溫蜜水湯茶湯送下傷飽附論夫小兒傷飽候小兒食不可過飽飽則傷脾脾傷不能磨消食也令小兒四肢沉重身體苦熱面黃腹大是也又小兒食不知飽候小兒有嗜食食已仍不知飽足又不生肌肉其小腹大其大便數而多泄亦呼為豁此腸胃不守故也方檳榔散治小兒傷飽太過脾氣消壅面色赤黃手足俱熱心腹脹悶檳榔枳殼麩炒微黃去瓤人參去蘆頭川大黃銼碎微炒各半兩赤茯苓神麯炒微黃陳橘皮湯浸去白瓤焙甘草炙微赤銼麥糵炒微黃各一分上搗粗羅為散粗每服一錢以水一小盞入生薑少許蔥白二寸煎至五分去滓溫服日三四服更量兒大小以意加減服之前胡散治小兒傷飽心腹滯悶不能乳哺前胡去蘆檳榔川大黃銼碎微炒枳殼麩炒微黃去瓤赤茯苓沉香各半兩訶黎勒皮三分木香甘草炙微赤銼各一分上搗粗羅為散每服一錢以水一小盞入生薑少許煎至五分去滓溫服日三四服更量兒大小以意加減赤芍藥丸治小兒傷飽心腹妨悶脅下或痛赤芍藥柴胡去苗赤茯苓訶黎勒皮檳榔各半兩川大黃銼微炒鱉甲塗醋炙令黃去裙襴各三分桂心木香各一分上為末煉蜜和丸如緑豆大每服以粥飲下五丸日三四服更量兒大小以意加減大黃丸治小兒傷食苦飽臥失衣當風居濕地其為病腹大膨脝時泄因甚如寒熱狀又如霍亂動作時痢腸出膿血大黃苦參人參桔梗杏仁去皮尖芎藭各三分半夏洗黃芩各二分葶藶四分炒上為末蜜為丸如小豆大每服一丸日進三服白湯下半夏散治小兒吃食太多傷脾即不食吐逆半夏三分生黃葵子防風遠志款冬花桂心前胡乾薑各一分上並搗為散空心米飲下一錢服之立效乳母不可服芍藥丸療四五歲兒因食及在胎中宿熱乳母飲食粗惡辛苦乳汁不起兒哺不為肌膚心腹痞滿萎黃瘦瘠四肢痿疒躄繚戾服之令充悅芍藥十分炙令黃黃耆鱉甲炙人參各四分柴胡八分茯苓六分甘草乾薑各三分如熱以枳實代上搗篩蜜和丸如大豆大服五丸日二服忌如常法一方有大黃無黃耆云服一丸一歲以上乳服三丸七歲兒服十丸日二服芍藥丸治傷飽羸瘦不生肌肉乳食不化芍藥七分炙柴胡四分大黃三分桂心一分茯苓乾薑鱉甲炙各二分上為末蜜丸一歲兒先哺乳吞小豆大三丸日三服木香丸治小兒乳食過度腹中脹滿木香鱉甲塗醋炙令黃去裙襴牽牛子微炒川大黃銼碎微炒各半兩赤茯苓一分上搗細羅為末每服以溫漿水調下半錢晚後再服更看兒大小以意增減服之調脾丸治小兒脾疾腹虛等證丁香半夏各四十九個巴豆四十九個胡椒四十九個上為細末棗肉為劑入臼杵一千五百下為度如粟米大隨湯水送下食後每服一丸如胸膈不和煎生薑下瀉痢乾薑湯下如脾大者皂子湯下如喘嗽桑白皮湯下治小兒食不知飢飽用鼠屎二七粒燒為末服之
