甘遂煨令微黃一分青橘皮湯浸去白瓤焙黃芩川大黃銼碎微炒各半兩上搗羅為散每服一錢以水一小盞煎至五分去滓量兒大小分減溫服以利即止利後以糜粥放冷補之無不效鱉頭丸幼幼新書治小兒痞氣脅下脹滿腹中積聚堅痛鱉頭一個虻蟲桃仁炒各三分蟅蟲炒三分上為末煉蜜丸小豆大二丸日進三服以知為度如不利加大黃三分甘遂湯楊氏寶書治小兒服湯已得大利溫熱已解而滯實不去心下堅痞滿不可按按之輒啼內有伏熱諸候集成此疾宜服破痞除熱甘遂甘草炙各二分黃芩大黃各四分上以水二升破雞子二個和取白投水中攪令沫上吹去之內藥煮合為二服治小兒患腹中痞結常壯熱幼幼新書大黃炙煙出鱉甲炙黃茯苓等分上為末蜜丸大豆大飲下日三服量兒加減服之一方用龜甲雞子湯肘後方治小兒六七歲心腹堅痞時時寒熱如瘧服紫丸六十日吐下痞乃堅以此湯一劑去惡物數升遂愈常用之效甘遂七銖甘草炙黃芩各五錢上以水二升雞子一枚少打開出白投水中熟攪吹出去滓內藥煮取一升隨小兒大小許可得下合和與之藥無毒下痞未盡更合堅實多者加芒硝細辛各一兩大效治小兒痞滿幼幼新書用三白草搗絞汁服令人吐逆除胸膈熱疾亦主瘧及小兒痞滿按此草初生無白入夏葉端半白如粉農人候之蒔田三葉草白便秀故謂之三白又方幼幼新書除小兒痞滿閃癖用甜藤葉搗敷之積聚附論夫小兒有奶積候但是吐下奶來有臭酸氣此候因兒啼未住母將奶與吃致不消化日久停滯胃冷而致此所治者先用丁香散調胃後下食積牛黃丸取下奶積後下勻氣散補氣常服健脾散即愈食積候夜間肚微微作熱或嘔或瀉此因飲食傷飽而更睡致此所治者下食積牛黃丸通下後用勻氣散補氣常服萬靈丸即愈氣積候面黃白不進食肚微痛夭矯啼叫此因患諸般氣候久而不安傳歸氣積致此所治者用萬靈丸勻氣散醒脾散健脾散相夾調理即愈脾積候面黃如土色或滯黃而面帶虛腫臍下微痛肚皮熱飲食減少才食便言臍上及肚中痛所食不化頭微熱此因先食硬物不然冷物所傷在脾所治者先下青金丹取下脾中積後用勻氣散醒脾散補氣常服健脾散萬靈丸即愈虛中積候渾身微熱不思飲食渴目多昏昧抱著時一似睡未覺此候多因久泄瀉不止而虛得此候所治者先下青金丹通盡肚中積後用勻氣醒脾散調理常服萬靈丸保童丸調理即愈實積候大便不通風毒瘡癤喉閉赤腮喉中涎響此因兒子生來飢猛飲食無度至有前件候所治者先用奪命散吐下熱涎後勻氣散醒脾散調理常服牛黃膏鎮心丸天竺黃散與服即愈小兒積病可醫者九面上虛腫者是脾之所繫脾主身之肌肉故應面故知是脾積其脾系土土無正形故早晚浮腫不定多則早浮其睡則脾不磨上面作腫若病後有此證則是虛中積宜用調脾消積行氣等藥面合地臥是脾積何以合地其受積在脾是冷積何以知之其脾好土故知在脾其冷者屬陰故知傷冷硬食得之宜下熱積氣藥兒腹脹其積在肺何以知之其肺主於氣才當受積其氣不調腹脹滿氣急故知在肺如腹脹先宜調氣後轉轉後更宜調氣小便如油其積在小腸何以知之其積受於脾脾當傳心心不受觸則入小腸小腸是心之腑故知在心小腸則節其水道小便如米泔油相似也發黃是積氣傷心心主血脈蔭遍身毛髮被積氣所幹則發黃故知是積傷心宜下空心散及取積藥此人必時復發熱也赤白痢其積在肺受傳大腸及有外傷冷而得何以知之其肺主西方庚辛金其色白後赤則是外邪故知肺傳大腸則為赤白痢也宜取後調氣兩眼黃赤睛青其積在肝何以知之肝主東方甲乙木色青卻被積氣所幹即黃赤睛青者眼屬五臟肝是其主肝若受積故令眼黃赤睛青者是肝受積若傳膽其人口苦不要吃物宜涼藥退之遍身虛腫其積不在臟只在腑何以知之為其積曾取後被藥發動即不在臟故出皮膚之間為腫也只宜下取虛中積藥然後補之耳多瀉白糞是受冷積在脾何以知之脾主化受冷積在脾冷滑而瀉白糞故知在脾宜先轉後熱藥補之小兒積病不可醫者六喘急是肺積肺主氣其喘急則肺絶其人當面白全無血色故不可醫也面黑是腎積其人面黑者是腎絶也人當不辨好惡眼直無光只得一日而死也吐熱氣是榮積其不醫者是血絶不可治也血主心心不能管故出熱氣不治耳手腳心生瘡是衛積衛者氣也胃氣不生故手足生瘡若衛絶則氣不回只得半日也噁心吐乾嘔是胃積何以不醫胃主化食胃絶則惡吐故不治其人必食乳不化不食亦干吐嘔面色青黃無血色也瀉久住又瀉是積咬脾爛何以知其脾爛其人當瀉白糞為食不消住了卻放糞赤黑而死即知脾爛不可治積病口中氣溫面黃白目無精光或白睛多及多睡畏食或大便酸臭者當磨積宜消積丸甚者當白餅子下之後和胃小兒五積為臟氣不行蓄積一處不動故曰積夫心為伏梁在臍上上攻其心下攻胃口脾為痞氣在胃口上橫之肝為肥氣在臍之左邊肺為息賁在臍之右畔腎為賁豚在臍下各有變動非食之所成乃氣積也臟屬陰故在一處而不動也小兒有聚謂六腑之氣留聚也腑屬陽陽氣運轉不停故其聚不定一處發兒腹痛積聚之候皆面黃瘦劣嘔咂不生肌肉發立或肌體浮腫腹急及多困多為水氣凡驚中虛積者謂因驚取復驚發動是也所下糞青穢凡虛中有積者因傷食而瀉又吐如此漸虛其病未瘥故曰虛積也又虛中之積有積而頻頻取轉取轉不著致其積尚伏故亦曰虛中積若驚積取下則糞隨驚青如是食積即糞成塊子凡疳中虛積者因疳病轉瀉虛而疳不退故虛中爾所取下糞里白色也小兒八種積病多吐多瀉多困多熱是也面腫手腳腫是虛中有積腹脹不思飲食是胃中有積合面吃土炭痢痛大腹中有積面多黑困眼不開脾臟中有積小便似油腳手腫腎臟中有積渴瀉不止膀胱中有積腹內虛鳴小便赤黃小腸中有積多吐逆不吃食上膈中有積渾身虛腫者脾之有積久取不下號曰虛中積先塌氣候取之肚腫四肢黃色者受水氣須取之小便如米泔肝臟受積此後用取之頭髮黃者疳勞候欲發此背之積用取之眼睛黃鼻出水者肝肺有積乃風疳之候當取之赤白滯痢者此臟腑內久積用取之腸內虛鳴者此氣蟲之候用取之多吐逆或日近及氣酸臭可取若已久不可遽取恐作慢脾且調理合地而臥此疳蟲攢心用取之也小兒積病其脈沉實積者小兒恣餐毒食瓜桃李果肥滑黏膩之物蘊成積聚若小兒肥實宜與蔥湯丸取次銀白散補之小兒積病其脈洪大下黑血形瘦不行坐久患積腹急如鼓項軟四肢冷口噤都不食並是死候積有虛有實木香丸虛者少與之實者倍用之小兒消積多用青皮然青皮最能發汗有汗者勿與之凡有積滯須辨虛實虛則補之實則取之古方不問四季令服四味大黃飲子錢氏論小兒當服紫霜丸二者俱不可用況孩兒肥瘦不同長短不同孩兒黑白亦自不同南北方之地不同而又況古今不同豈可一概而論也大法實者可服進食丸虛肥白者及疳瘦孩兒宜服肥兒丸風積者眼白青孩子壯熱形瘦也疳疾者眼黃肚急大便無禁食積者能食不生肌但腹大耳奶積者乳食過多少時必哭多即嘔吐壯熱是也驚積者大便青眼亦青夜啼宜用妙香丸取大抵取積之法只用巴豆膩粉藥或宣取藥皆可量兒虛實大小壯者一歲五六丸虛者三四丸用雞子一枚箸頭扎一竅入藥於內再塞之蒸熟空心連藥與兒吃盡良久取下積臭穢之物只白粥補之此余嘗用取積之藥卻以雞子引引入於脾其積取盡雞子至溫補食之大能溫益脾産婦吃此可謂良也藥取而食補也方五積丸治一切食積乳積積痢此藥內有溫胃補脾理氣之劑不損胃氣有積則利積去則止無積則不利凡治積痢先服之以去其積縮砂仁五錢木香二錢丁香二錢肉豆蔻三個麵煨大麴餅生三稜煨莪朮煨白茯苓去皮各三錢膩粉二錢炒人參去蘆頭白朮代赭石火燒醋淬各三錢白薑炮二錢麥芽三分生百草霜一錢炒巴豆三錢去殼紙捶去油上除巴豆百草霜另研外餘味各製為細末再入巴豆百草霜拌勻搗飯為丸大小隨意空心白湯吞下五更服如取積未動早晨再一服乳飯放遲溫食免藥食相忤吐逆噁心如止痢食白粥即止湯氏方取虛中積以熟雞子黃和丸在內與兒食之蓋藥取積而食補消積飲治脾胃虛冷不能消化乳食致成積痢及治冷氣疝虛瘧虛積吐利常服調脾進食縮砂仁五錢陳皮去白三錢良薑油炒二錢丁香粉草炙各二錢茴香炒三錢香附子炒去毛麥芽生三稜炮蒼朮米泔浸各三錢莪朮炮厚朴薑製青皮炒去瓤枳殼煨捶油大麴餅生各三錢上為細末米湯調入燒鹽空心服或冬瓜仁湯下虛中積米湯調下五積丸磨化積滯將以巴豆去殼炒藥料仍去巴豆久癖用硇砂炒厚朴治冷氣加白薑治疝木饅回香湯入生鹽下消積丸白薑炮肉豆蔻麵裹煨各一兩枳殼炮三稜炮莪朮炮薑黃炮蓽澄茄各五錢百草霜微炒陳皮去白粉草炙大麴餅生各三錢巴豆五十枚去油杏仁五十粒去皮尖青油半兩酒煮黃蠟二兩上除巴杏另研外余為細末入巴杏拌勻以清油熔蠟化開入藥末搗千百杵令勻作一蠟匱丸合收臨用旋丸空心薑湯下一丸凡用蠟丸取其入於腸臟消化積也百當膏治一切積聚心腹疼痛年月深久者皆治之百日至一歲皆可服丹砂研膩粉黃蠟各半兩水銀陽起石研粉霜研蠍梢炒末鉛結沙子各一兩牛黃鉛霜研龍腦各二錢巴豆肥者二十粒去皮心膜研去油取霜半夏一錢湯浸七次搗羅為細末上件令研極勻熔蠟並熟蜜少許同和成膏旋丸如梧桐子小兒如黍米大每服三丸至五丸量大小虛實加減服吐逆藿香湯下取熱積生薑蜜水下取冷積乳香湯下風涎薄荷湯下便利米飲下磨積丸瑞竹堂治疳積泄瀉京三稜蓬莪朮陳皮青皮神麯麥芽鬱金胡黃連雷丸白者使君子肉蘆薈以上各等分香附同三稜莪朮青皮陳皮五件一處好米醋煮一晝夜焙乾用上為細末米醋為丸如緑豆大每服三十丸糯米湯下虛弱加木香虛極加附子疳極加癩呵蚾肉蘆薈丸幼幼新書治驚疳積滯或渴或瀉或熱蘆薈一錢先入鉢內研使君子不去皮殼蕪荑半錢去皮取仁檳榔一個胡黃連沉香木香各一錢麝香少許龍膽草硃砂各半錢夜明砂二錢絹袋洗去土上焙乾末用醋膽汁丸如梧桐子大每服十粒米飲下常服妙龍虎丹幼幼新書療虛中積泄痢腹痛後重硃砂稱膩粉炒粉霜炒礞石稱白丁香稱枯礬炒各一錢定粉炒二錢黃丹硝石硇砂各炒半錢上研勻蒸餅心水浸和丸如櫻桃大大人每服二丸小兒一丸米飲下調中檳榔丸聖濟總録治小兒食疳長肌膚益顏色化宿食治腹脹破積聚和氣檳榔銼丹砂研阿魏麵裹煨熟代赭乳香研木香五靈脂炒肉豆蔻去殼各一兩巴豆去皮心膜出油盡半兩蟾頭一枚炙焦上研勻細麵糊和丸如黍米大每服二丸溫生薑湯下更量兒大小加減一方有麝香妙香丸治小兒虛中積潮發寒熱心腹脹滿疼痛辰砂一兩牛黃生龍腦麝香各一分金箔十四片粉霜膩粉各一錢蠟二兩巴豆一百二十個肥者上丸如彈子大量虛實加減龍腦漿水下夜半後服臟虛即以龍腦米飲下每服三丸如小豆欲藥勢緩即按令扁疾堅者加至十丸皆以針刺作數孔以行藥力小兒取積如緑豆大治小兒吐逆尤效此藥最下胸中煩及虛積紫霜丸出幼幼新書治消渴去積代赭石木香炮乳香肉桂杏仁去皮尖丁香各一錢陳皮一錢半去白肉豆蔻一個炮巴豆十五粒去油上為末煮麵糊丸如緑豆大每服七丸飯飲下惺惺丸出幼幼新書治小兒疳勞黃瘦虛中伏積久患赤白痢但是虛中伏積宜用此藥陽起石輕粉粉霜黃鷹屎白丁香各一錢硃砂一錢半硇砂挑一錢匕小銀砂一錢石燕一個火煨五次浸淬五度上為細末湯浸蒸餅為丸如梧子大每服七丸十丸至十五丸用火煅皂角蔥白湯下非時服不動臟腑蠟丸子出幼幼新書治一切積滯瀉痢或纍經取轉氣已虛為病未去者大人小兒並宜服之硇砂粉霜辰砂並研膩粉各一分川烏頭去皮臍生用一兩半取細末青橘皮去白取末一兩黑牽牛取粉稱一兩巴豆肥者一兩去皮膜用鹽四兩同炒訖至紫色去鹽不用又生巴豆去皮乾稱一分去心膜與炒熟巴豆同研極細入前件衆藥末再同研勻上藥末每一兩用黃蠟二兩先消作汁次投藥末攪令極勻放溫丸如梧桐子大每服量人虛實五粒如藥經年加至七粒小兒虛積潮熱寒熱亦與服緑豆大三粒生薑木瓜湯下夜臥服凡有冷積胸膈不利先吃一服冷瀉不止或赤白痢尤宜服藥即愈如痢甚者三更初一服次日更一服立效真珠丹治小兒久積驚疳退積滯化風涎利膈真珠末巴豆霜去油用霜滑石各一分半夏三分薑浸七次續隨子仁三分白附子半兩寒食麵一分天南星半兩薑浸七次上末滴水丸如桐子大每服一丸二歲者一二丸加減用蔥白湯下疳疾使君子湯下木香丸治乳積食積氣積木香蓬莪朮縮砂仁青皮去白硃砂研細代赭石研各二錢大丁香一錢川巴豆紙壓去油一錢上為細末和勻飛羅麵糊丸麻子大風乾每服二三丸乳傷乳汁下食傷米飲下後與大異香散或和劑異香散亦得氣積橘皮煎湯下下後與和劑流氣散異香散取積後調理石蓮肉一兩蓬莪朮益智仁京三稜甘草各六兩青皮去瓤陳皮去白各三兩厚朴薑汁炒二兩上銼散每服二錢水一盞生薑二片棗一枚鹽少許煎通口服鹽湯點鹽酒調亦可不拘時服消食丸化積滯香附子一兩縮砂仁一兩橘皮甘草炙神麯炒麥糵炒三稜炒莪朮炒各半兩上為末化蒸餅為丸如黍米大食後溫水下一歲十丸加減曾青丸療大人小兒久寒積聚留飲宿食天行傷寒者服之二十日愈久服令人延年益壽殷仲堪云扁鵲曾青丸療久癖積聚留飲宿食天行傷寒咳逆消渴隨病所在久病羸瘦老小宜服藥或吐或下或汗出曾青朴硝各二分茯苓寒水石大黃附子炮各三分巴豆二分去皮心膜炒上搗下篩巴豆硝石合搗六千杵次內附子搗相得次內茯苓搗相得次內大黃搗相得次內曾青搗相得次內寒水石搗相得次內蜜和搗千杵大人服如大豆二丸小兒五歲以下如麻子大一丸二三歲兒如黍米大一丸如服藥以薄荷粉粥清下當覆臥令汗出吐下氣發作服二丸霍亂服三丸泄瀉不止服一丸可至二丸一方用曾青三分忌豬肉冷水蘆筍大酢七宣丸療風氣結聚宿食不消兼沙石皮毛在腹中及積年腰痛冷如冰石腳氣衝心煩憒悶亂頭旋暗倒肩背重悶心腹脹滿胸膈不開寒風毒氣連及頭面大便或祕小便時澀脾胃氣痞結不能飲食腳轉筋掣痛攣急心神恍惚眠寢不安等疾大黃濕紙裹煨十五兩桃仁去皮尖煨六兩枳殼炒木香柴胡去苗洗訶黎勒皮各五兩甘草炙四兩上為末煉蜜為丸如桐子大每服二十丸米飲下食後或臨臥服稍增至四十丸取宣利為度量虛實增減覺病勢退即服五補丸不問男女老少並可服量方加減青金丹治小兒諸積病滑石末白丁香羅過天南星各二錢匕青黛羅過平滿挑二錢輕粉重二錢水銀稱二錢先以錫二錢於銅銚內煮熔便以水銀拌和瀉出於地冷用川巴豆去皮心膜七十二斤無缺損者井花水浸一宿懸當風處吹乾研爛上前件藥同拌合用軟飯為丸如桐子大巴豆不出油依形證用湯使下項傷寒後取積淡煎蔥湯吞下取疳蟲用牛肉炙汁下驚風肚中緊硬麵青黑金錢薄荷蔥湯吞下因傷看肚中及腹皮上微熱肚脹夜間作熱似疳又不是疳面青黃色眼微黃此腹中有積用皂角子二七粒灰內煨過用水一盞煎至半盞下有積作瀉魚鮓湯下氣積炒茴香湯下凡下此藥周歲十四丸三歲十八丸七歲二十四丸看大小加減下須是四更初下至天明通下積來盡時可依形證候下藥補之臨吃此藥恐先吐下痰涎亦不妨軟金丸治驚疳下積聚青黛膩粉胡黃連麝各一分寒食麵三錢使君子三個天漿子三七個上研勻滴水丸梧桐子大每一丸用金錢薄荷湯化下三出丸去積聚陳皮去瓤縮砂藿香京三稜蓬莪朮芫花各一分同醋煮乾為度巴豆五十粒和殼瓦上焙焦為度上先六味為末次杵巴豆令爛與諸藥拌勻以醋麵糊為丸如緑豆大硃砂為衣每服三五丸薄荷湯化下乳食後服膽礬丸治小兒脾積肌瘦石膽礬研蘆薈研各半兩龍腦研麝香研各一錢丹砂研各一分黃連末一兩用獖豬膽一枚入末在內以好醋煮十餘沸取出挂候乾研為末胡黃連末一分上同研勻細醋煮麵糊丸如緑豆大每服十丸早晨臨臥溫米飲下更量兒大小加減抵聖丸治下虛中積久曾取轉不得者犀角鎊末二錢蠍梢三七個銀末硃砂各一錢芫花二錢同巴豆用好醋二盞煮令盡揀出巴豆以冷水浸洗控干芫花再炒令乾搗末取二分用巴豆二十八枚去皮膜上同為細末再研如面將巴豆別研如糊和勻以水煮麵糊為丸如小緑豆大如小兒因驚積聚黏滑毒物在於脾胃纍曾取下變成虛積棗湯下體熱因困眼合不開黃連甘草薄荷桃仁湯化膩粉一字許下一歲以上三歲以下二丸小兒只可一丸米飲下大人吃食吐逆心腹脹滿夜有盜汗日漸羸瘦用薑棗湯下婦人血氣米醋湯下五七丸更在臨時約其虛實加減用之名紫金丹萬靈丸治小兒諸積依形證用之木香黃連蓬莪朮各半分陳橘皮青橘皮各去瓤一分檳榔一個重錢半已來者用上為末每服藥一