body:
  text: 卷三百九十二嬰孩癖積脹滿門乳癖附論夫小兒脾胃氣弱保養不慎則令三焦不調乳飲不化聚而成痰流於脅下寒氣乘之遂成癖聚久而不消橫連小腹上至心下按之苦痛肌膚漸瘦面色青黃多睡目澀寒熱往來嘔吐咳嗽故謂之乳癖世呼為奶脾是也小兒乳癖者由乳母食飲無常醉飽過度便即乳兒不知撙節小兒脾胃虛嫩不能消化或乳母偏臥一向乳兒不能回轉兒亦睡著乳滯偏於脅下因茲結成塊而痛者是也其候面色青黃發渴壯熱吐乳多唾口內生瘡腹脹筋青時或渴飲漸漸黃瘦腹內結塊不散故名乳癖也小兒生下遍身忽發寒候遍身黃腫小便赤黃體微蒸熱此候本因胎熱又因哭後母愛惜將奶與吃不消化遂為奶積所治者先用牛黃膏天竺黃散調中飲三藥與服即愈如見黃色入眼睛直視氣喘魚口手握拳惡候不治此患先解利後取積次調胃氣無誤矣又云先用惺惺丸次取銀白散調氣方人參丸幼幼新書治小兒乳癖手腳心熱面色青黃不下乳食日漸羸瘦人參去蘆頭生薑切乾炒桂心川大黃銼碎微炒各半兩赤茯苓白朮枳殼麩炒微黃去瓤檳榔木香當歸銼微炒京三稜微煨銼鱉甲塗醋炙令黃去裙襴川大黃銼碎微炒各半兩上為末煉蜜和丸如緑豆大每一歲以粥飲化下三丸日三服看兒大小以意加減牽牛丸聖濟總録治小兒乳癖腹脅緊硬時作寒熱白牽牛末二錢粉霜一錢膩粉三錢硇砂研一錢半黃鷹屎末一錢白丁香為末一錢石燕子搗研一錢延胡索大者七枚搗末白麵五錢沒藥研白滑石末各一錢上為細末拌和勻滴水和作餅子先於火上炙乾次入灰火煨熟為度放冷細研更入硫黃一錢同研勻滴水和為丸如緑豆大看兒大小每服三丸至五丸煎柳枝幹柿湯下臨睡時服之鱉甲丸聖惠方治小兒乳癖面色黃悴食乳微少日漸羸瘦鱉甲塗醋炙令黃去裙襴京三稜微煨銼檳榔各半兩人參去蘆頭赤茯苓白朮木香枳殼麩炒微黃去瓤當歸銼微炒桂心各一分川大黃一兩銼碎微炒上為末煉蜜和丸如緑豆大每服以粥飲研下三丸日再服以利為度更量兒大小以意加減水銀丸幼幼新書治乳癖積熱發疳水銀結砂一錢硇砂白丁香各半錢腦子少許輕粉少許香墨鷹屎巴豆醋煮令乾青黛羅過百草霜黃明膠用蚌粉炒黃色各一錢上為末滴水和丸如緑豆大用薄荷湯下三五丸看大小加減惺惺丸幼幼新書治小兒虛積及實積乳癖白丁香硃砂各一錢陽起石一分黃鷹屎稱二錢輕粉一錢半麝香少許末之硇砂一字醋化黃連七分續隨子一百個去殼出油石燕子五個醋淬煅七次上為末浸蒸餅丸如黍米大每服三十丸量兒大小加減皂子並蔥白煎湯臨臥服木香丸聖惠方治小兒乳癖不消心腹脹滿木香京三稜微煨銼檳榔青橘皮湯浸去白瓤焙人參去蘆頭赤茯苓各一分牽牛子煨炒草豆蔻去皮各半兩郁李仁一兩湯浸去皮微炒上為末以醋煮麵糊為丸如麻子大每服以粥飲下三丸量兒大小加減服之硇砂丸聖濟總録治乳癖硇砂礞石粉霜鷹屎無食子京三稜各用末一錢七分膩粉三字龍腦研一字上同研勻以麵裹大棗燒熟取棗肉和丸丸如緑豆大每服三丸或五丸古老錢湯下量兒大小加減兼治久積面燒棗不燒藥次用外貼藥外貼散聖濟總録治乳癖蕓薹子末三錢寒食麵一錢半上同研勻用新水調如糊紙上攤貼乳癖上頻以水潤之聖餅子聖濟總録治虛中挾積並乳癖石燕子末二錢粉霜三錢膩粉硇砂研各二錢白麵四錢丹砂研一錢延胡索一分為末鷹屎白研一錢上為末雞子和丸如雞頭大作餅子煻灰火內微燒過每服米飲化下半餅子軟金丸幼幼新書治小兒虛積乳癖膩粉二錢蓬砂研皂子大黃連去須半錢硇砂研半皂子大粉霜半錢黃鷹屎半錢巴豆一枚半生半燒太陰玄精石研半錢上為末再同研勻棗肉和用面劑裹文武火中煨以面熟為度去面取藥旋丸如黃米大每服一二丸甘草薄荷湯下量兒大小加減大黃丸聖濟總録治小兒初生至百日周歲腹內有氣衝心喉及壯熱頭疼嘔逆腹痛寒熱乳癖宣下腹中宿物大黃銼炒一兩丹砂研人參枳殼麩炒去瓤各一分半柴胡去苗桂去粗皮各半分木香一分白茯苓去黑皮一分半上為末煉蜜丸如緑豆大每服五丸乳汁下日三服大者加至二十丸大黃丸幼幼新書治小兒乳癖脅下堅硬大便難小便赤川大黃銼研微炒訶黎勒皮各半兩烏梅肉微炒陳橘皮湯浸去白瓤焙木香各一分郁李仁湯浸去皮微炒川朴硝各三分桔梗一分去蘆頭上為末煉蜜和丸如緑豆大一歲兒每服以粥飲研下五丸晚後再服更量兒大小以意加減治奶癖訶子五個磨去兩尖密陀僧二錢硫黃輕粉白丁香黑丁香粉霜硼砂各一錢上為末每服半錢男用女兒奶汁化服女用男兒乳汁化下二香散聖濟總録治小兒乳癖密陀僧研硇砂研各三錢硫黃研三錢石燕子一枚搗研白丁香直者四十九枚丁香二十一枚為末膩粉炒二錢匕研上同研勻為細散每服一歲半錢匕二歲一錢匕十歲以上二錢匕用麵湯調下如左肋下病臥左邊右肋下病臥右邊至曉取下癖積為驗水銀丸聖濟總録治小兒乳癖脅肋堅硬喘粗時作痛水銀一錢硫黃二錢同研膩粉三錢密陀僧二錢搗研硇砂研半錢石燕子搗研二錢巴豆二粒去皮膜心研出油盡上同研勻白麵糊為丸如黃米大每服三丸煎槐葉湯下乳食後臨臥服更量大小加減滴水丸聖濟總録治小兒乳癖黃蘗去粗皮銼輕粉研巴豆十粒去心皮出油盡水銀結沙子半皂子大丹砂研天南星炮半夏生薑汁浸一宿湯洗去滑焙各一錢上為末再同研勻滴水和丸如緑豆大每服二丸或三丸煎生薑蔥白湯下量兒大小加減服之妙應丸一名萬應丸治小兒乳癖積聚按之苦痛肌膚漸瘦面色青黃方見萬應丸枳殼丸一名調中丸幼幼新書治小兒乳癖嘔吐腹脹寒熱枳殼麩炒微黃去瓤木香赤茯苓各半兩人參去蘆頭柴胡去苗各三分桂心一分川大黃一兩銼碎微炒上為末煉蜜和丸如緑豆大每服以溫水化破三丸服日三服量兒大小加減治小兒奶癖幼幼新書白丁香黑丁香各二十個石燕子舶上硫黃寒水石密陀僧各三錢膩粉二個上為末每服一錢用第二遍米泔水調服即取下病如未下更一服三稜散幼幼新書治小兒乳癖結實不瘥京三稜炮銼碎赤茯苓當歸洗焙乾鱉甲塗醋炙令黃去裙襴各一兩枳殼麩炒去瓤白朮木香各半兩上為細散每服一錢水一盞入生薑七片煎至五分去滓放溫時時與服挨癖丸治乳癖谷症腹中塊痛代赭石火煅醋淬至碎研十分細青皮去白木香蓬朮五靈脂北大黃各二錢巴豆壓出油盡一錢上為末醋麵糊為丸麻子大每服二丸食後搽薑泡湯下積氣散聖濟總録治小兒乳癖粉霜研硫黃研各一錢半密陀僧研五錢白丁香研二錢京三稜為末七錢訶黎勒皮為末四錢上搗散再研勻每服一錢生薑漿水調下後五更服青靈丸聖濟總録治小兒乳癖粉霜丹砂研膩粉各一錢水銀二錢用鉛少許結沙子麝香研半錢青黛二錢巴豆三十粒去皮心膜出盡油研上各細研再同和勻麵糊為丸如黃米大薄荷湯下五丸至七丸新水亦得三稜散幼幼新書治小兒乳癖結實或有滯惡停積不散令兒日漸羸瘦面色萎黃春夏多發不欲乳食京三稜微煨銼川大黃銼碎微炒檳榔鱉甲塗醋炙令黃去裙襴赤茯苓各半兩枳殼一分麩炒微黃去瓤上為散每服一錢以水一小盞煎至五分去滓分為二服日三四服下惡物為效硃砂丸幼幼新書治小兒乳癖壯熱體瘦寒水石龍腦各細研膩粉檳榔末各一錢硃砂半兩細研水飛過雄黃細研一錢半上同研令勻煉蜜和丸如緑豆大三二歲兒以生薑湯下三丸日再服量兒大小以意加減化癖丸幼幼新書治小兒乳癖結塊久不消化巴豆霜半兩膩粉硃砂研細各一錢黃鷹屎一分硇砂雄雀糞各一字上同研如粉用糯米飯和丸如黍米粒大一歲兒每服空心煎皂莢仁湯下二丸取下惡物為度軟銀丸幼幼新書治小兒奶癖水銀結成沙子白丁香末膩粉各一錢鷹屎末一錢續隨子四十九個去殼巴豆二十一個去心膜研略去油上同研勻棗肉為丸如緑豆大一歲兒一丸溫水下銀白散幼幼新書生胃氣取下後宜服人參茯苓甘草炙白朮麥麵炒白扁豆去皮藿香葉上各等分為末每服一錢紫蘇湯調下如聖散幼幼新書治小兒奶癖發寒熱肌瘦不思飲食漸漸黃瘦欲成一切疳硇砂一錢粉霜一字半密陀僧半兩大丁香二十一個白丁香四十個全者舶上硫黃二錢半上為末每服半錢冷麵湯下日一服正午時見效三歲以上每服半錢三歲以下每服一字一方無大丁香男病女乳調女病男乳調銀粉丸一名木香真珠丸治小兒奶癖潮熱驚涎宿食時作肚疼及治腹脹取虛中積行滯氣方見木香真珠丸消堅丸全嬰方治小兒奶癖及下塊奶消痰退熱膈實取積硇砂輕粉巴豆去油各一錢阿膠炒半兩好墨少許水銀三皂子大結成砂子上為末白飯為丸如小豆大三歲三丸皂子泡湯送下食前一方用倒流水下燒青丸一名煉青丸幼幼新書治小兒乳癖食癖每至午後時作寒熱微有咳嗽脅肋癖硬輕粉二錢太陰玄精石研一分粉霜硇砂研各一錢白麵三錢上再同研細滴水和為餅子以文武火燒熟為度再研滴水和丸如黃米大三歲以上每服五丸漿水下三歲以下以意增減或飯飲下錢氏加白丁香真者一字定粉一錢半研龍腦半字研此方至天明取下惡物是效如奶癖未消盡隔三兩日又一服癖消為度金花散聖濟總録治小兒乳癖神效白丁香真者微炒七十粒丁香十五粒二味為末密陀僧研硫黃研黃鷹屎白研各半錢上合研勻每服三歲以下一字三歲以上半錢至一錢並用奶汁調下臨臥服至來日取下青黑稠黏物即愈未盡再服化癖丸聖濟總録治小兒乳癖肌瘦寒熱脅下硬痛丹砂研生薑切片暴乾為末各二錢巴豆霜一字硇砂研白滑石搗研各二錢上同研勻粟米飯和為丸如黃米大每服二丸薄荷湯下奶食後臨臥服治小兒奶癖幼幼新書密陀僧訶子丁香豆蔻木香各等分上研羅為細末入膩粉少許再研每服一錢半米飲下如不動來日再服立效如神散聖濟總録治小兒乳癖攻脅肋緊痛獨頭蒜一顆研樓蔥一寸研膩粉半錢凌霄花末一錢上同研勻調塗脅肋上硬處用醋麵餅子貼蓋之候口內聞蒜氣急用溫湯洗去硫黃散聖濟總録治小兒乳癖硫黃研密陀僧別研膩粉研訶黎勒皮為末各一錢上和令勻每服一錢奶汁調下更量兒大小加減又方幼幼新書黑丁香二十個舶上硫黃半兩白丁香五個密陀僧半兩上生用為細末如一歲者只一字臨臥服三兩歲者服半錢用奶汁如男兒用左奶汁下女兒用右奶汁下二丁丸全嬰方治小兒乳癖在於兩脅下或左或右如狗舌之狀令兒面黃腹大潮熱多渴日中咨煎夜間多哭丁香半錢白丁香一兩密陀僧輕粉各一錢上為末糊丸如小豆大三歲五丸水下惡物下為效消癖丸聖濟總録治小兒乳癖積塊牽牛子一兩半生半炒皂莢肥者三枚燒令煙盡為度巴豆去皮心研出油夏秋半兩春冬一兩上除巴豆外搗末後入巴豆再同研勻用粟米飯丸如緑豆大每服三丸橘皮湯下如常服丸如粟米大茶湯下三丸量兒大小加減又方幼幼新書治小兒奶癖羸瘦危困脅下硬有形寒食麵一錢半汞半錢青礞石末半兩上研令勻以乳汁和分為二十餅子尉斗上以慢火煿干一餅子分為四處隨飲食化服四分之一隔日一次服八服取效未能吃得飲食者化如糊扼在口內治小兒奶癖幼幼新書芫花一兩醋浸三日淨洗大黃半兩為末蒜一斤上研同藥末研