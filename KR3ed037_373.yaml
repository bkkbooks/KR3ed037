body:
  text: 卷三百七十三嬰孩驚風門總論夫驚者七情中之一也古人於小兒論中不言喜怒悲憂思恐而獨言驚者小兒初生氣脈未足精神未全天之所稟者混然一真七情雖具而未有愛憎但念乳食余無所知喜怒悲憂思恐皆動於中惟驚從外來神氣無雜一有所觸悸動不安啼叫搐搦嘗原喜怒悲憂思恐字皆從心驚之為字從馬古人因字命名亦有深意蓋以是馬也適於善則為善適於惡則為惡其機甚可畏也驚之為病有急有慢留於陽則為急伏於陰則為慢亦猶馬之有善惡也馬以喻氣非銜轡則不能制驚之為病非藥石則不能調信知性之不可以不善猶驚之不可以或有也是以驚風有急慢二證而古方止曰陰陽二癇所謂陰陽者急慢之異名耳凡嬰孩十歲以下曰癇十歲以上曰癲陽癇屬腑為陽證俗曰急驚其證身熱面赤發則搐搦兩目上視牙關緊硬宜用涼藥陰癇屬臟俗曰慢驚其證因吐與瀉或吐不瀉積日漸困面白脾虛不甚搐搦目微上視手足振動宜用溫藥不可一概施治也嘗見後人不明乎此但知急驚用涼藥不知太過則反成慢驚至於慢驚但知用溫劑不知太過則反成急驚迄無定見用藥舛逆縱能取效於目前而不知釀成癲癇為終身之痼疾欲全嬰者幸加意焉驚積者受驚日久而積成之其狀額上有汗喘息煩渴潮熱往來睡中覺腹內有物跳動瀉下如白脂豆沙是也治法量輕重而疏導之仍與調氣和胃取愈大凡小兒肚腹或熱或脹或硬皆為內實法當疏利天瘹壯熱驚悸眼目翻騰手足抽掣或啼或笑喜怒不常甚者爪甲皆青如祟之狀蓋由乳母酒肉過度煩毒之氣入乳遄復乳兒遂使心肺生熱痰鬱氣滯加之外挾風邪致有此耳治法解利風熱取愈驚風內瘹腹痛多啼唇黑囊腫傴僂反脹眼內有紅筋血斑者是蓋寒氣壅結兼驚風而得之又盤腸氣與蟲證亦令腹痛多啼傴僂相若但盤腸氣痛則腰曲乾啼額上有汗是小腸為冷氣所搏然爾蟲痛則嘔吐清沫痛有去來是疳化為蛔臟腑留滯然爾內瘹用調氣疏風鎮驚之劑盤腸氣用溫和調氣之劑蟲證用殺蟲之劑驚熱者內蘊實熱鬱勃發驚甚則搐掣變而癇耳治法疏導熱氣利驚定心亦有變蒸微驚以其熱盛得之但與輕藥或不治亦自愈通關定驚方論云諸風搐搦關竅不通皆由痰塞中脘留滯百節所致痰之所為潮塞者氣實使之治風痰雖不出南星半夏全蠍殭蠶數輩亦須先用蘇合香丸入硃砂少許以薑汁浸薄荷湯調和與之蓋使氣下則痰下痰下則關竅自通若搐鼻不嚏者不治王氏曰退熱疏風凡驚搐多因感冒風熱及諸熱失表以致熱極生風當以先解表通熱人參羌活散加麻黃荊芥穗王氏惺惺散加荊芥麻黃小柴胡湯加枳殼防風表實加麻黃裡熱加大黃本方青龍湯解肌湯加麻黃生蔥金銀薄荷湯下又曰驚風難治凡小兒驚風緊急先用搐鼻開關下痰利驚病勢稍定仍用退熱疏風之藥蓋熱退痰下可免驚風再潮之患柳氏曰驚風初作便用青龍三解散合和研玉餅子同服最為要法驚風虛惕怔忪氣怯神散痰涎來去其瀉必青漸生風而未致風也驚邪入心則面紅臉赤惕惕夜啼驚邪入肝則面目俱青眼睛竄視驚邪入腎則面黑惡叫齧奶咬牙驚邪入肺則面色淡白喘息氣乏驚邪入脾則嘔吐不食虛汗多睡面色淡黃據脈觀之虛則散而濡實則數而駃治法鎮驚化痰安神定志亦須究竟某臟受病之處而調理之然有所謂溫驚有所謂利驚有所謂涼驚虛者補之實者利之熱者涼之是為活法睡中驚啼聲浮者易治聲沉不響者難全急慢脾風不治證眼陷無光白睛灌人爪甲青黑四肢垂嚲一藏既絕不可強用藥面赤而緋面青背冷頭目仰後足冷目青腹肚胸高手挐胸膈唇舌鼻黑魚口氣粗囟腫囟陷啼哭無淚冷汗不止汗出如珠如油眼青瀉黑悶痰入心肺噓舌出口咬乳咬人五硬五軟五冷五干急驚危證目睛番轉口中出血兩足擺跳腹肚搐動或神慢而摸體尋衣或證罷而神昏氣促噴藥不下通關不嚏心中痛絕魚口鴉聲左右搐逆小兒驚風死候歌曰小兒如得驚風候指甲青兼黑似煙口吐白蟲便黑血眼開不閉半抬肩白日咬人多驚汗忽作鴉聲不可看又小兒驚風死候歌曰項軟都無力喉中似鋸枋面紅妝色見目暗杳無光魚口開粗氣腳項直偏長齧衣胡亂咬瘀血瀉於床晴開還又閉渾身硬似僵十般驚候病休用更思量又歌曰壯熱頭旋不舉頭目黃眼澀也堪憂有時哯奶兼翻食四體如冰痛入喉須信本因驚患得連綿日久更何求只應命盡歸泉壤脈亂浮洪卻似鉤患驚風痰熱痓痙癲癇此八種候惟痙與痓少有識者類同驚風發作之狀痓手腳冰冷痙舉身僵仆癇癲不殊目瞪流涎手足搐搦急風為疾其證有四有驚有風有痰有熱或因驚而有風而生痰作熱或有熱而作驚成風生痰或積痰而發熱熱盛生風而轉驚或素有風痰因驚而發熱孩童之患不外乎此善明脈醫士於其暴作即當察其所因疏風化痰散熱鎮驚四證相須用藥斟酌古人處方各有深意後學宗之隨症施治總以疏風散熱為主如兼有痰涎尚未轉驚者只化其痰不得妄投驚風藥何也驚風之藥性多寒涼經絡本自無恙反因攻擊痰涎且風熱乘虛而入於經絡卻成搐搦為難愈也嬰孩五臟經絡虛即生風既虛所受且驚自然而有作驚風且作八候次第而生所謂兒童無病不可與服攻擊之藥嬰孩有大小有壯弱驚風發作有淺深有輕重大者加分劑重者多與服數乃合其理嬰孩聞響即掣跳者乃肝肺不足魂魄不穩故神有不安即聞響掣跳者非謂驚也犀角地黃丸主之又小兒心氣虛怯神不安定連並掣跳者宜與四君子湯加辰砂脾胃氣壯魂魄俱清自然不恐嬰兒欲發驚風候先神不定顧左復右覷上及下或已定其睛凝其神恍恍惚惚怕物懼人不若常日自嬉嬉戲者急當療之如有熱先退熱有驚先散驚熱退不生痰驚散不作風良久自然安定神情和悅氣脈舒暢若待風變而理驚痰盛而退熱病勢尚緩未至四證俱全猶可療治嬰孩有患風痙風中等證候皆上竄拳搐號曰天吊書載甚多初無痰後有痰初作搐後不搐不拳身直皆風之惡候已是傳過若作驚風更與下之為害必也驚風諸症皆已盡去但神情昏慢氣不足者未可保治驚風證候已住倘其兒拈物不捨情性緩緩於中非謂十全必有再發之時如或再發不可調治矣驚風屎尿已遺者難治大小便閉者易治也驚熱或並風痰未發陰陽二癇之前醫者即先與化痰御風退熱利驚如此逐病推究不惟繁難乃無法所治是故難於療理若已向昧於證何憑凡此四證相隨不可攻其一利其驚則風縱退其熱則痰壅久尋茲理未究盡善忽一日省悟錢氏方宣風散正為此等兒孩病設有痰即壅有熱即閉有風即隘有驚即悶昏昏沉沉輕藥不能散重劑恐傷害但與服疏風散較之宣風只欠一味一服之間風痰驚熱悉皆消去神情慶悅四體知安觀其此藥似有虎狼用之卻和順推痰利驚散風解熱只與一服不移其肘可見功效嘗見醫工調治此等證候多是疑貳進退怯懼若過其時延其日則候傳變驚自驚作風自風生痰自痰壅熱自熱聚或急或慢八候相從反復傳變遞互發越之時不可得而進此藥然疏風所療四證相待如賊方會極力一沖盡使散敗不至作害及其聚而自散者流入諸經或絡或經或脈故作搐搦引掣等證矣論小兒驚風可醫者十一非時竄眼驚入肝何以知在肝肝主筋肝受邪故搐於眼若眼赤是肝之外應故非時竄眼必糞青也夢裡咬牙驚入腎何以知在腎腎主骨骨者齒也其齒癢及夜屬陰乃咬牙故知驚入腎也夜啼至曉驚入小腸何以知在小腸小腸是心之腑心屬南方丙丁火陰陽相剋故入小腸至曉乃歇日屬陽夜屬陰乃相剋故啼爾面青下白驚入膽何以知在膽肝屬木其色青膽是肝腑故面青下白而知在膽必須吐奶也氣喘吃水者則是肺虛熱故吃水驚入肺何以知在肺肺主氣被驚所折其氣即喘要知在肺要吃水也臉面紅赤驚入心何以知入心其心屬火又主血外應臉故令臉赤是知入心也喘氣微細驚入肝何以知入肝其喘即是肺也肝屬木肺屬金故知陰傷陽也其人當糞青睡時手腳俱搐不定如治驚宜下洗肝圓散矣前後五心熱驚入脾何以知入脾胃與脾俱像土胃四肢故主脾主脾故知入脾也胃者是脾之腑其人必當吐後發熱不時是也喉內如鋸驚入大腸何以知入大腸大腸是肺之腑肺為諸臟之上蓋又主於氣入大腸則上衝咽喉作聲而響如無痰故知入大腸宜下取驚積藥無時乾嘔驚入胃何以知入胃其胃在咽喉下主化穀食被驚風入其中則癢而時時乾嘔故知在胃也宜調胃氣後下驚風藥耳睡中驚哭在三焦何以知在三焦其三焦無形狀只是脂膜睡著時上焦被驚邪所感即乃驚起而哭故知此患在於三焦發後日久自瘥只宜下驚藥也又論小兒驚風不可醫者七凡驚風爪黑不醫其爪甲主肝肝絕則不蔭其爪甲黑不醫者一為血絕血不蔭於爪甲十無一存也驚風瀉黑血不醫此為心絕心主血心絕則不能榮於血此人不得一周時也何以知之心是五臟之主主若絕故只得一日而死也驚風日多盜汗不醫何以不醫汗者主於氣是衛之所繫衛絕則不營於氣故令汗出不止數日而死耳驚風忽作鴉聲不醫此為肺絕聲只有出而不回肺主聲肺絕則聲一去而無回其人三日必死也驚風咬人不醫其咬人者是骨絕主在齒其骨若絕故令齒癢便咬人約七日死為從里損出則遲故在七日矣驚風眼半開半合不醫此謂之腎絕腎是五臟之根本外應其眼其眼黑腫其腎絕則無光無光不能開閉其眼四日而死何以知之其腎屬北方而居末其病從下上故知只四日而必死驚風口鼻乾黑不醫此為脾絕何以知其脾絕脾主津液脾絕則津液俱無乃知是脾絕兩日而死死時須寅卯時木剋土也凡是驚風者則身體壯熱臥則驚叫不時脾風多因吐而得必有風痰急驚風者只是中外邪也慢驚風者是虛積生驚胎驚熱之所為也論小兒驚候其脈急數驚者乃腎受驚也驚熱之氣流灌於心心為帝王不受觸搦即受觸若便生風素問云腎主怒小兒才受觸搦便有面青呵欠候孩兒面青色是驚若一次受驚看太陽左側青脈朝眼是也男左女右第二次受驚耳根上青脈是也第三次受驚眼下臉連金匱有青見是也三處皆有青者皆是受驚極候主小兒睡中驚擲見人恐怖咬齒無時喉內有涎渾身抽掣手足瘛瘲吐食非時吐舌將手拿人多哭不住凡有此者皆驚候若小兒風熱盛乃驚痰流灌肝心二臟令小兒忽然眼目上視手足急搐惡叫暴絕悶死此名急風疾候宜與壓涎乳香散二服次與生銀丸三服下驚涎若小兒臟腑虛薄驚涎灌心胞絡令兒眼目緩慢手足微動喉內涎響渾身不熱此是慢驚風候宜與生銀丸次與鎮心丸若驚風死候則其脈弦大急口開氣粗喉中如牽鋸項軟無力腳面直囟陷目似開不開瀉如痢血身體軟無力以上並是死候不可用藥醫救小兒急慢驚古書無之惟曰陰陽癇所謂急慢驚者後世之名耳正如赤白痢之類是也陽動而速故陽病曰急驚陰靜而緩故陰病曰慢驚此陰陽虛實寒熱之別治之不可誤也急驚由有熱熱即生風又或因驚而發則目上逆流涎潮熱搐搦身體與口中氣皆熱及其發定或睡起即了了如故此急驚證也當其搐勢漸減時與鎮心治熱藥一二服候其驚勢已定須臾以藥下其痰熱利下痰熱心神安寧即愈慢驚得於大病之餘吐瀉之後或誤取轉致脾胃虛損風邪乘之似搐而不甚搐似睡而精神慢四肢與口中氣皆熱合睡露睛或胃痛而啼哭無聲此證已危蓋脾胃虛損故也一切驚風方潤體丸幼幼新書治諸風手足不隨神志昏憒語言謇澀口眼喎僻筋脈攣急骨節煩痛頭旋眼暈恍惚不寧健忘怔忡痰壅滯及皮膚頑厚麻痹不仁小兒驚風諸癇雄黃辰砂各水飛牛黃乳香生犀末羚羊角末沉香麝香七味各別研如粉木香丁香藿香葉白龍腦別研極細檳榔肉豆蔻仁白殭蠶微炒蒺藜子微炒蔓荊子去白皮各一兩人參半兩去蘆黑附子炮裂去皮臍尖一兩羌活銼去蘆頭白附子桂去粗皮各一兩半防風去蘆頭枝一兩麻黃去根節一兩白茯苓去黑皮晚蠶蛾微炒芎藭以上各一兩半乾蠍微炒半夏水煮三十沸大者薄切焙乾入生薑汁炒川烏頭泡製去皮臍尖搗碎炒黃色以上各二兩白花蛇酒浸炙去皮骨取肉天麻去苗各三兩白豆蔻仁南番琥珀別研如粉膩粉研各半兩珍珠末別研如粉獨活去蘆頭各三兩金箔六十片上為細末入研藥令勻煉蜜搜和為丸如雞頭子大每服一丸細嚼溫酒下荊芥湯下亦得加至二丸如破傷中風脊強手搐口噤發癇即以熱豆淋酒化破三丸斡開口灌下少時再服汗出即愈若小兒驚風諸癇每服半丸薄荷湯化下不拘時候服大聖奪命金丹治驚風至重者急慢驚風癲癇天瘹客忤物忤中惡及初生臍風撮口著噤胎驚胎癇牙關緊急驚風痰熱搐搦掣顫反引竄視昏悶不醒但是一切驚風危惡者緊急之證並皆治之其效如神其他驚藥功力俱不及此真起死回生良劑天麻炮全蠍去毒防風去蘆羌活天南星大者白附子炮茯神白殭蠶炒川芎遠志肉桔梗去蘆石菖蒲半夏生人參去蘆白朮白茯苓去皮烏蛇尾酒浸炙五錢酸棗仁炒荊芥穗北細辛各五分大川烏炮焦粉草三錢大赤足蜈蚣一條薄荷汁浸焙以上除全蠍蛇尾蜈蚣外余藥各制同研細為末入全蠍三味沉香三錢如法研細方入後藥辰砂三錢龍腦三錢珍珠三錢金箔三十片銀箔四十片真琥珀三錢麝香一錢雄黃一錢以上於乳缽內細研和合令勻薑汁麵糊丸硃砂為衣金錢薄荷湯研化服如欲存久宜安暖處常加曬焙免失藥味驚風牙關不開搐鼻不嚏上以藥入搐鼻開關至聖奪命丹治驚風重者急慢驚風風癇中惡客忤恍惚口眼喎斜痰壅搐掣等證人參去蘆五錢白朮三錢天麻炮三錢南星五錢薑製全蠍去毒三錢防風去蘆三錢羌活三錢北細辛去葉三錢獨活三錢荊芥穗三錢茯神三錢川烏炒去皮三錢半夏湯炮五錢殭蠶炒三錢酸棗仁炒遠志肉川芎白附子炒川白芷桔梗去蘆甘草石菖蒲各三錢蟬蛻十四個各制碾為末去土雄黃一錢金箔二十片銀箔三十片麝香一錢上四味乳缽內研白茯苓去皮三錢上合和令勻薑汁麵糊丸硃砂為衣臨用研化金錢薄荷湯下搐不止雞冠血下蛀皂角子下雄朱丹出幼幼新書治小兒驚風雄黃硃砂麝香各研膩粉各半兩白附子半夏湯洗七遍天南星炮川烏頭生去皮臍乾蠍羌活天麻附子生去皮臍川芎肉桂去粗皮白殭蠶木香白鮮皮烏蛇花蛇並酒浸去皮骨取肉炙用以上各一兩巴豆半兩去心膜薄荷汁煮五七十沸淨洗紙裹壓出油用上為末令勻粟米粥為丸如綠豆大常服茶酒下三丸冷氣生薑湯下宿食不消橘皮湯下大小便不通甘草豆淋酒下急風薄荷酒下癱瘓豆淋酒下酒食傷生薑湯下風氣茴香酒下血氣荊芥湯下或醋湯下大腸秘澀生薑湯下白痢椒湯下坐間便退風頭槐枝湯下風疹蜜酒下赤白痢二宜湯下頭痛傷寒鹽湯下赤痢甘草湯下小兒疳米飲下治風眼古井水下小兒風眼古井水煎淡竹葉湯下小兒驚風薄荷乳汁下天竺黃丸出衛生家寶方治小兒驚風天竺黃三錢蛇肉一分酒浸坼肉如有花蛇肉更妙全蠍一分略炒金箔十片人參一分鐵粉一分硃砂二分牛黃一錢最要真正者蜈蚣一條赤足者略炙麝香一字腦子半字天麻一分上為末用酒煮天麻糊為丸如蘿蔔子大臨臥用薄荷湯下或十粒或十五粒神效如涎盛不能吞丸子即用薄荷湯化開服之心脾散出楊氏家藏方治小兒脾困昏睡面色青白內生虛風不進乳食人參去蘆頭白扁豆炒白朮白附子炮天麻酸棗仁生用以上六味各等分上件為細末每服半錢煎生薑棗湯調下乳食後服大鎮心丸出御藥院治小兒精神不爽寢寐必驚心忪恐悸四肢戰掉舉動欲倒狀類暗風或煩躁而多啼退驚風化痰涎壯心氣益精神生犀角鎊末鐵粉研各一兩羚羊角鎊末龜甲鎊末赤苓麝香研菖蒲各半兩牛黃研茯神去木遠志去心珍珠末研龍腦研天竺黃研肉桂去粗皮蛇蛻皮全者人參各一分金箔研丹參研半分銀箔各五十片上為末煉蜜和丸如梧桐子大每服一丸至二丸食後臨臥薄荷湯化下更量兒大小加減牛黃散出幼幼新書化風涎治積年心疾諸癇風癲謬忘昏亂及小兒驚風益精神開心志鎮驚消痰牛黃一分犀角屑一分羚羊角屑一分雄黃一分腦麝各半分人參一分硼砂一分鐵粉一分鉛霜一分金箔五十片鬱金一分膩粉一分白礬一分辰砂一分天南星去皮心銼如骰子大入良煞黃牛膽內懸東北方上百日令乾取三兩未乾則曝令乾用如要用搗天南星末膽汁和為餅子曝乾用上為末常服一字小兒半字薄荷湯調下中風涎甚及心疾每服一錢小兒一字薄荷自然汁調下如中風吐涎臨時加膩粉半錢同服黑神丸出幼幼新書治一切左癱右瘓小兒驚風婦人產後中風心神恍惚頭目昏眩常服活血駐顏及治傷風鼻塞頭痛善治山嵐瘴氣其效如神桔梗麻黃去節川芎防風香白芷木賊桂枝去皮紅豆縮砂仁釜墨以上各四兩大川烏頭湯洗去皮臍一斤天南星灰炮黃裂為度半斤天台烏藥沉香各一兩麝香一錢上為末煉蜜為丸如龍眼大每服半丸蔥白一寸同嚼茶酒任下不計時候三解散治夾驚夾食傷寒丹瘡赤眼驚風痰熱等候一解驚風二解積熱三解傷寒藥性稍涼虛者莫服白附子炮三錢防風