兩葉煎至五分去滓稍熱時時灌之溫白丸出直指方驅風豁痰人參防風白附子生白殭蠶全蠍各焙並一錢南星湯洗七次焙乾天麻各三錢上為末飛白麵糊為丸如梧桐子大每服一丸薑湯化下黃耆湯出幼幼新書治小兒七日以後患驚吐哯眼中淚黃耆芍藥芎藭黃芩當歸各一分細辛半分上水八合煮取二合用牛黃一小豆大分為四服若生二七日以上熱多者加一分生三七日而胸上聚唾口青熱甚者加黃芩黃耆各三分益水二合煮四合一歲以上隨意增水藥服之睡驚丸出幼幼新書治小兒一切驚疳食積風癇之證使君子五個燈上燒成炭金箔五片一方十片銀箔五片一方十片香京墨似棗尖大腦麝各少許一方各半錢膩粉約用挑半錢一方抄二錢上研如粉生面糊丸豌豆大每服一丸溫水化下一方薄荷湯下或膈上有涎即吐出腹中有積滯即瀉出如蝦蟆青苔之類大段驚風一切不須三服必效如小兒有疾即灌良久便睡如睡驚常服一丸分兩服小兒則間日可服半丸極妙一方不用腦子睡驚丸出幼幼新書治小兒驚渾身壯熱但染著驚便與服之粉霜京墨燒過蘆薈各半錢天南星一錢湯浸去皮臍巴豆二粒去油使君子四個去尖麩炒黃上入腦麝少許滴水丸梧桐子大一歲半丸量兒大小金錢薄荷湯化下三歲以上一丸治小兒童子一百二十般雜驚出幼幼新書天南星青黛併為末各挑三大錢麝香少許水銀一粒赤豆大輕粉挑一大錢巴豆七粒去油上為末一處用煮麵糊為丸如綠豆大十歲以下至一歲以上每服十丸用生蔥湯吞下早晨日午至晚連宵空心各進一服子母皆忌生冷莧菜炙煿淹藏花色酒肉又云十五以下至七歲十五丸七歲以下至周歲十丸周歲以下至百日七丸皆蔥白湯下乳母依前百日以下至滿月五丸荊芥湯下滿月至三朝三丸用蜜薑汁少許調下以上乳前空心日進三服但是不安看輕重加減與服金箔鎮心丸出幼幼新書治小兒一切驚氣夜睡不穩喉中涎聲夢中狂叫精神躁悶並宜服之此藥不涼兼醒脾過百日後四五日間服半丸甚妙如睡不穩便宜服之白附子一分白殭蠶直者半兩用麩炒赤色去麩硃砂一錢研腦麝各少許金銀箔各十片牛黃半錢上為細末麵糊為丸如梧桐子大留硃砂一半為衣服一丸或半丸煎薄荷湯化下臨臥服一方無牛黃一丸分作兩服蜂糖薄荷熟水磨下如天瘹驚疾發作一丸只作一服又名大驚丸硃砂丸出幼幼新書治小兒鎮心壓驚墜涎硃砂細研急水飛過候灰池滲干尤佳白殭蠶擇去絲直者洗過焙乾新羅白附子以濕紙裹煨候冷紙干取出細切成片子焙乾天南星炮裂去粗皮臍切成片子各半兩麝香半錢研入和勻乾蠍一兩銚子內慢火炒令極熱不可太過上為末煮白麵糊為丸如粟米大每服十丸煎金錢薄荷湯吞下如遇驚取下後以此六味藥研勻為末與之一二服無不效或有虛汗用麻黃根煎湯下七寶散出幼幼新書治小兒退驚化痰硃砂生犀末牛黃珍珠末腦麝各一錢金箔五片上研如粉每服半錢薄荷水調下硃砂丸出幼幼新書治驚硃砂馬牙硝甘草炙各一錢甜硝一錢硼砂半錢腦麝各少許上為末煉蜜為丸如梧桐子大看大小薄荷湯化下一丸或半丸紫霜丸出幼幼新書治驚風紫粉天竺黃甘草炙茯苓硃砂各等分龍腦少許上為細末煉蜜為丸如皂子大一歲半丸薄荷湯化下牛黃丸出幼幼新書治驚鎮心全蠍一個巴豆二粒牛黃雄黃銀粉硃砂各一錢上為細末用蒸餅心丸如綠豆大每服三丸薄荷湯下驚叫夜啼煎燈心石蓮心湯下治小兒驚退後手足攣屈不能舒展出幼幼新書羌活芎藭當歸微炒防風去蘆天麻甘草炙以上各三分白附子炮一分上為細末每服一錢以薄荷湯酒調下日三服量兒大小加減神聖當歸散出幼幼新書治驚風癇咽喉有涎四肢壯熱大小便秘澀兼心神亂者當歸甘草滑石通草各一分大黃芍藥各二錢上為細末每服二錢水一盞生薑三片薄荷五葉燈心少許同煎至五分量兒分數服大人作一服虀半散出衛生家寶方治驚風涎潮搐搦大人亦可服去涎去風半夏二兩厚朴二兩上二味用漿水一斗煮一復時去厚朴只月半夏為細末入真生腦子少許和藥周歲半錢臘茶清調下日二服久服不妨不是風候不入腦子
