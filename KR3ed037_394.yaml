龍骨一分附子一枚七錢者炮去皮臍炙藿香葉去土一分上件為末滴水為丸每一兩作五十丸捏餅子每服一餅子煎杉木湯下不拘時候山薊湯治小兒胃氣怯弱乾噦嘔吐精神困昏乳食減人參去蘆白茯苓去皮白朮甘草炙藿香葉去土各錢半丁香一錢糯米一百粒炒令黃白扁豆三十粒上件為細末每服一錢煎生薑棗調下乳食前紫神湯治小兒陰陽不和中脘痞悶涎盛嘔逆吐驚不定藿香葉去土一錢水銀一錢硫黃二錢同水銀結砂子丁香二錢滑石一錢紅曲一錢上件為細末每半錢乳食前用壁土湯調下養胃散養胃氣快胸膈定噦逆止嘔吐進飲食丁香藿香去土陳橘皮去白白豆蔻縮砂仁各等分上件併為細末每服半錢煎生薑棗湯調下乳食空三神散治小兒痰乳停積煩渴喜飲嘔吐不定乾葛一兩甘草微炙三錢半夏湯浸七次去滑一兩上件為㕮咀每服一錢水六分盞生薑三片青竹茹少許同煎至二分去滓放溫服乳食空和胃膏治小兒胃虛嘔吐氣不升降胸膈噎塞漸成驚風人參去蘆頭藿香葉白茯苓甘草炙肉豆蔻麵裹煨熟枇杷葉去毛薑汁焦炙香舶上硫黃細研入鐵銑將水銀一處研勻下以微火溫之不住手研攤沾在銑上候火冷取下水銀同硫黃制以上各一兩上將前六味同為細末將硫黃水銀砂子先於乳鉢內研細入諸藥同研勻煉蜜和成膏每一歲兒服一丸如梧桐子大薑棗湯下白朮散治小兒嘔吐兼治冷利常服此藥調理三焦大進飲食白朮丁香肉豆蔻麵煨陳皮甘草上等分為末白湯調下慢驚沉困冬瓜子煎湯下若見水即吐進藥不得吐止用棗子點藥干吃凡嬰兒百日內或嘔吐乳或大便糞青者胃寒脾弱也其證最為難治上用年少婦人乳汁一盞入丁香十枚去瓤陳皮一錢磁器內煮十數沸去丁香陳皮稍熱與兒乳食前服嘔吐必止
