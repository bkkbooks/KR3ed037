body:
  text: 卷三百九十四嬰孩吐瀉門總論夫小兒吐瀉因外傷風冷或內傷乳食或兒啼未定氣息未調以乳乳之氣逆於上則停滯胸膈致令嘔吐氣逆於下則傷腸胃致令泄瀉上下氣逆吐瀉俱作若只吐不瀉者逆其吐必有痰發驚者十無一生若只瀉不吐或吐瀉俱發者日久不退亦變陰癇治之當斷其乳輕者周時重者三日宜頻與稀粥服藥速效十全八九或者不信是言以小兒藉乳為本慮其咨煎不肯暫斷然乳固不可斷也殊不知因乳所傷致令此病若以所傷之乳乳之如抱薪救火藥何功之有不然則難以安痊其間不斷乳服藥得安者蓋輕患也亦有因輕致重夭橫者多矣凡小兒初吐發驚者尚可救治以玉散子青金丹不退珍珠丸急下之次與神寶丹若唇紅焦者琥珀散蓋內熱故也不退必死又云吐奶不止大便不通面黑氣喘必死不治須權斷乳候吐瀉定捻去乳少少與之使不再作凡吐瀉服藥須要令飢如服了不得便吃物吃乳則引吐最為害也凡小兒暑月吐瀉冷熱輕重各有治法不可概用如吐瀉身熱煩渴心躁大便黃沫小便赤少暑瀉也黃龍丸甘露散白虎湯香薷湯五苓散杏仁丸有傷食者必吐瀉酸臭妙丸子下之次益黃散二者不退如小便通利大便白色腸鳴吐瀉多渴少食附香丸參朮附散朮附膏半硫丸神寶丹驚癇其間有糞白腥臭油膩便成疳瀉有久成疳瀉者亦有治法小兒泄瀉傷積而作瀉者初以補藥治不止之時須當下去其積積下其瀉自止下之宜與小沉香煎丸理虛中積甚良多與服之或以小拓氣丸又不下更與三稜煎服切不可以意轉藥恐成滌蕩矣積滯已下與服調胃溫脾藥及既濟丹此乃理積瀉夏月暴瀉由其臟寒虛滑利泄速與契聖丹如滑不禁進滯腸散次與契聖既濟丹若洞利其瀉不常發作駭人速與滯腸散次與朮附湯稍與遲緩其候必更甚療瀉之理豈可相待夫自汗不利者由血不榮虛於表也自利無汗者由氣不衛虛於裡也其或有自利亦自汗者榮衛皆虛也凡為人全藉血榮氣衛扶育身體血既不榮氣又不衛裡外不相參上下不升降關竅不開通經絡不調適榮衛不循環臟腑不充實則醫工何以良餌性命何以保持夫水穀不分自利腸胃怯弱自利臟腑不和冷熱相制自利陰陽不調自利榮衛不順自利以上自利皆由氣虛得之初生小兒忽爾自利者與順胃平調陰陽制其冷熱和其臟腑分其水穀生其胃氣則內外充實何泄利之有宜以參苓白朮散加以車前瞿麥薑棗同煎更量虛實加減錢氏論篤病訣有云黃承務子二歲病瀉衆醫止之十餘日其證便青白乳物不消身涼加哽氣昏睡醫謂病困篤錢氏先以益脾散三服補肺散三服三日身溫而不哽氣後以白餅子微下之又與益脾散二服利止何以然利本脾虛傷食初不與大下措置十日上實下虛脾氣弱引肺亦虛補脾肺病退即身溫不哽氣是也有所傷食仍下之也何不先下後補曰便青為下臟冷先下必大虛先實脾肺下之則不虛而後更補之也又云小兒傷於風冷病吐瀉醫謂脾虛以溫補之不已復以涼藥治之又不已謂之本傷風醫亂攻之因脾氣即虛內不能散外不能解至十餘日其證多睡露睛身溫風在脾胃故大便不聚而為瀉當去脾間風風退則利止宣風散主之後用使君子丸補其胃然錢氏用宣風散去脾風使君子丸補胃雖用有理其治未周錢氏治此病先以益黃散三服補令脾胃氣實蓋宣風散用牽牛檳榔等利藥先補脾後宣風散去脾風後神寶丹使君丸治之此法多愈語人曰錢氏經用宣風其理若何答曰失多矣余所以先用益黃散者譬曰彭祖觀井自系大木仍以車輸覆其上然後敢觀之為防其虛而無失也趙不群鈐轄女四歲七月中泄瀉食物不化水穀不分多渴少食進退四十餘日召醫或作食或作水瀉疳瀉或用五苓散紫丸子六神丸益黃散並雜藥攻之無效在後見聞食名掩口哭而噦時時煩召余視曰渴飲過多脾胃受濕則水穀不分兼畏食而物不化是脾虛中有積主人曰何知也咎曰素問云脾胃受濕則水穀不分孫氏曰脾虛者畏食進退者有積又問曰何治也答曰益黃散紫丸子二藥可主人笑曰服多矣答曰譬如聚千夫舉重不如得一烏獲挾萬矢以妾射不如得一逢蒙大抵藥不得其當雖多亦奚以為蓋前醫用藥不知次序連服不知多少補瀉不知輕重所以無效今用益黃散補一日六服連進三日即微欲食與紫丸子瀉三五次再用益黃散補一日六服連進三日喜食瀉止尚有渴以參朮散十日安主人問曰久瀉之病何再瀉也答曰經云邪之所湊其氣必虛補其虛而後病除也今病因食積留滯先補次滌所蓄之物然後再補之主人曰善國學劉傑祕校子四歲六月中泄瀉米穀不化醫數止轉月餘不退召余視之見兒食田雞肉少頃所食肉即從大便中經過遂問莫先食肉否曰近日食物不化並藥丸隨大便中出余曰倉廩不藏是門戶不守也得守者生失者死此子脾虛之甚余自歷醫未嘗見有經過之食乃失守之病也須用附子主人曰莫太燥余曰江河欲竭引別派以還流燈燭將殘假他油而再焰此蓋陰之至極須當以陽藥急救之主人聽余用附子灶心土訶子為丸米湯下一日六服連進三日即大便漸疏食尚未化與朮附膏煎冷一日四服病退一半與益黃散頓服一日冷進六服進三日糞稠而米穀化後參朮散六神丸前後共治十日安愈主人曰灶心土何意也余曰治病之法須揣本以尋末沂流而討源其所由蓋脾屬土益土以附子訶子接助脾氣問曰藥何冷服曰冷服熱不炎上曰治法出何書余曰若執古法守株待兔也林友編修孫男三歲六月中瀉利不止視之見瀉糞酸臭奶片不化又有黃水小便赤少知傷熱乳也當斷乳一日服千金丸五苓散即效林惜不肯斷乳服藥三日病增欲以感應丸下益黃補助林不信自將白朮散金粟服三日不效又易一醫以火煅龍骨赤石脂炮木香訶子服三日瀉甚召余曰宜當斷食斷乳即安今病虛耗亦當斷乳非附子不能起生林大不信至長揖而退至三更驚疼氣急唇口手足俱冷煩渴大瀉乃急召余曰病已後時素問曰夫病已成而後藥之亂已成而後治之譬猶渴而穿井鬥而鑄兵不亦晚乎林慚請試救之余曰還舞為戲則宮室皆動何不止其舞則宮室自定傷乳吐瀉則精神昏憒何不止其乳則吐瀉自止巢氏云小兒霍亂須暫斷乳今當斷乳三日頻與稀粥隨證服附子林從以附子末半錢薑棗煎水中頓冷服半盞至四更又進二服病少減五更與神寶丹二服退七分來日依前一服相間神寶丹後參朮散千金丸三日病除時與少奶調理五日全安林問曰純陽小兒何敢用附子余答云譬賊害良民兵刃不可不用病勢既成毒藥不可不投蓋攻其外邪客氣烏能傷其本哉陳氏二子大者五歲腹疼陳陳嘔吐酸臭次者三歲食物不化瀉糞酸臭召余視之並用紫丸子下之益黃散補之主人曰受病不同何用藥同答曰大者腸疼吐酸因食傷也宜下之孫氏云腹內疼成陳來時嘔吐酸如因傷食得瀉下自然安小者泄瀉酸臭亦傷食也法當溫之虛祕方云食瀉重當瀉脾虛用補虛再傷宜再取何患病難除二子瀉補俱安凡有積聚當下即下凡有虛損當補即補宜隨其虛實而用也仁存孫氏曰吐瀉才生便噁心干吐霍亂汗相侵舌出唇緋雙眼閉搖頭髮直硬如針心悶氣粗而脅動口生白沫命難存來生此候須早理有瘡脾閉命沉沉錢乙論云小見初生三日內吐瀉壯熱不思乳食大便乳食不消或白色是傷食當下之後和胃下用白餅子和胃用益黃散主之又云小兒初生三日以上至十日吐瀉身溫涼不思乳食大便青白色乳食不消此上實下虛也更有兼見證肺主睡露睛喘氣心主驚悸飲水脾主困倦多睡肝主呵欠頓悶心腎主不語畏明當瀉見兒兼藏補脾益黃散主之此二證多病於秋夏也又云秋夏吐瀉五月十五日以後吐瀉身壯熱此熱也小兒臟腑十分中九分熱也或因傷熱乳食吐乳不消瀉深黃色玉露散主之六月十五日以後吐瀉身溫似熱臟腑六分熱四分冷也吐嘔乳食不消瀉黃白色似渴或食乳或不食乳食前少服益黃散食後多服玉露散七月七日以後吐瀉身溫涼三分熱七分冷也不能食乳多似睡悶亂哽氣長出氣睡露睛唇白多噦欲大便不渴食前多服益黃散食後少服玉露散八月十五日以後吐瀉身冷無陽也不能食乳乾噦瀉青褐水當補脾益黃散主之不可下也又云廣親宅四大王宮五太尉病吐瀉不止水穀不化衆醫用補藥言用薑汁調服之六月中服溫藥一日益加喘吐不定錢曰當用涼藥治之所以然者謂傷熱在內也用石膏湯三服並服之衆醫皆言吐瀉多而米殼不化當補脾何以用涼藥王信衆醫又用丁香散三服錢後至曰不可服此三日外必腹滿身熱飲水吐逆三日外一如所言所以然者謂六月熱甚伏入腹中而令引飲熱傷脾胃即大吐瀉他醫又行溫藥即上焦亦熱故喘而引飲三日當死衆醫不能治復召錢至宮中見有熱證以白虎湯三服更以白餅子下之一日減藥二分二日三日又與白虎湯各二服四日用石膏湯一服旋合麥門冬黃芩腦子牛黃天竺黃茯苓以硃砂為衣與五丸竹葉湯化下熱退而安又云馮承務子五歲吐瀉壯熱不思食錢氏曰目中黑睛少而白睛多面色㿠白此子必多病面色㿠白神怯也黑睛少腎虛也黑睛屬水本怯而虛故多病也縱長成必肌膚不壯不耐寒暑易虛易實脾胃亦怯更不可縱恣酒欲若不保養不過壯年面上常無精神光澤者如婦人之失血也今吐利不食壯熱者傷食也不可下下之虛入肺則咳入心則驚入脾則瀉入腎則益虛此但以消積丸磨之為微有食也如傷食甚則可下不下則成癖也實食在內乃可下之下畢補脾必愈若隨其虛實無不效者又云廣親宮七太尉七歲病吐瀉是時七月其證全不食而昏睡睡覺而悶亂哽氣乾噦大便或有或無不渴衆醫作驚治之疑睡故也錢曰先補脾後退熱與使君子丸補脾退熱石膏湯次日又以水銀硫黃二物下之生薑水調下一字錢曰凡吐瀉五月內九分下而一分補八月內十分補而無一分下此者是脾虛瀉醫妄治之至於虛損下之即死當只補脾若以使君子丸即緩錢又留溫胃益脾藥止之醫者李生曰何食而啘錢曰脾虛而不能食津少即啘逆曰何瀉青褐水曰腸胃至虛冷極故也錢治而愈又凡小兒吐瀉當溫補之余每用理中丸以溫其中以五苓散導其逆連與數服兼以異功散等溫藥調理之往往便愈若已虛損當速生其胃氣宜與附子理中丸研金液丹末煎生薑米飲調灌之惟多服乃效候胃氣已生手足漸暖陰退陽回然猶瘛瘲即減金液丹一二分增青州白丸子一二分同研如上服以意詳之漸減金液丹加白丸子兼用異功散羌活膏溫白丸鉤藤飲子之類調理至安依此治之仍頻與粥雖至危者往往死中得生十救八九儒門事親書云小兒身熱吐瀉腹滿不進飲食可急與牛黃通膈丸下過四五行則自愈矣蓋乳食便屬水甚則成濕以治濕法治之用燥熱之藥非也又水瀉不止可用五苓散益元散各停用新水調下二三錢頻服不拘時候若暴速注下甚者屬火涼膈通聖等散亦可治之用者勿輕非深於造化者未易語此又久瀉不止至八九月間變為秋深冷利泄瀉青白時時撮痛乳瓣不化可用養脾丸如黍米大每服二三十丸米飲送下日進三服則愈益黃散亦可用之湯氏云小兒熱瀉者大便黃而赤或有沫乃臟中有熱積或因乳母好飲酒或嗜熱物或生下傷溫蘊熱醫者不明但用訶子豆蔻等藥如水澆石既不識其證故不辨冷熱用藥又不得其法所謂讀方三年而恨無病可治及至治病三年無方可用信乎紙上之語不可全憑一則悟得其理二則求師指迷三則聞見頗多如此方有通透之理不然咫尺千里也雖有治法妙方而不能別其寒溫虛實又安得其理哉宜服黃連等藥小駐車丸亦可服之又冷瀉者乃脾虛受冷致令水穀不化泄瀉注下若依錢氏當以益黃散主之古人以此藥為補殊不知今人所稟不同內青皮有劫吐安可服又傷食瀉者又名聚腹不宜即補先用食藥或紫霜丸取其積盡然後可補又曰此瀉難止亦不宜補再傷又瀉宜節飲食用進食丸取下積令盡次以錢氏加減益黃散一服可止此切要治法漢東王先生兒吐乳有數般或風疾致吐勿止吐奶夾痰才吐即生風若止卻後其風無止處更入外風則潮心閉胃管後變驚風胃主四肢被痰涎閉即搐心主神被外邪干即驚不定故變驚風也故止住吐即驚風發手足搐搦口眼反張頭項強直雖多服名藥亦不能救又小兒吐奶鼻青客風傷肺客風外風也鼻肺之外應也夜間煩躁肺氣逆而為之也身上發熱肺主身之毛皮外邪所傷故發熱宜下傷寒藥後平胃氣耳又小兒吐奶唇黑多哭唇是脾之外應被食所傷故黑夾痰者脾能生涎故疾沖胃而吐奶食又小兒吐奶身熱其奶成片子者是胃有熱積久則生風也其人必四肢生瘡多渴面黃是也若吐不化夾青水是胃冷其人必面青唇白是也宜緩胃止之又小兒乳食不化腹急氣逆須進塌氣丸二三服下卻胸膈卻進觀音散二三服但生胃氣藥皆可以意與兒吃乳母不忌日食生冷物冷氣入乳則腹變瀉又不捻除之仍以此乳乳兒冷乳入腹與胃相逆則腹脹氣逆肚疼或為瀉亦依前項藥調理如果不退卻用羌活膏治之錢氏論云生下吐初生小兒拭掠小兒口中穢惡不盡咽入喉中故吐木瓜丸主之又曰傷風吐瀉身溫乍涼乍熱睡多氣粗大便黃白色嘔吐乳食不消時咳嗽更有五臟兼見證當煎入藏君臣藥化大青膏後服益黃散如先曾下或無下證慎不可下也此乃脾肺受寒不能入食也王氏子三歲只吐不瀉自吐數次昏困連日不醒大便堅實召余曰是本傷食吐逆不合昏困唇紅此疾大逆以妙丸子定吐琥珀散鎮驚權住奶一日吐定吃物不困大便未通主人以為無事更不服藥因與乳多再吐痰乳而復昏困愚曰不可再吐又時時虛氣大便亦不通面黑氣粗是形氣相失靈祕方云吐奶不止大便不通面黑氣粗必死急以珍珠丸下痰食主人曰既吐何不用慢驚藥防之而用涼藥下痰食答曰本欲生急驚為傷乳食為作吐法不當溫藥蓋兒大便三日不通唇紅顴赤小便赤皆熱證也故先治食後以涼藥今吐雖定大便首尾五日不通內以四順飲外以蜜導法得通不甚通以宣風散去脾間風再利糞令稀仍困下醒睡散三服困退喜食愚曰雖食而目鮮唇紅察拭面目微腫虛氣不悅必欲發驚急以青金丹壽星丸麝香餅琥珀散各二服不退乃辭曰萬靈之要所全者形一身之先所存者氣今形氣已失知不久生也主人曰醫人之好利如此後易數醫因驚而卒別一子只吐神昏又一女只一吐聲嗄二子皆三歲更不可救信乎吐之為害甚也吐哯附論夫小兒吐哯者由乳哺冷熱不調故也兒乳哺不調則停積胸膈因更飲乳哺前後相觸氣不得宣流故吐哯出診其脈浮者無苦也又云哯乳與嘔逆不同宜細詳之哯乳乳飽後哯出者是又云小兒吐哯候吃奶不穩而從口角頭流出身微熱口鼻微冷面目青黃眼慢此候因乳母房室淫佚兒子叫便將乳與吃而陰陽不順胸膈不快乳停胃不消而胃冷所致先以睡驚沉香飲子夾丁香散與服夾活脾散調理即愈歌曰乳丹寒濕不節量致令壅滯在胸膛更加新乳相投觸不得通宣入胃腸此名哯奶須調理診得輕浮尚不妨口眼時時動不停吐中時覺乳生腥眼渾青碧生白膜汗出津津腳似冰氣細元因傷胃冷氣粗卻是欲生驚是風從脾宜醫治暖胃和脾氣乃平此候寒熱相勝使然也氣急則是胃實當涼則愈若囟門陷下氣細當生胃氣若渾身熱甚者氣出喘粗若不急治必作瘛瘲又云此候是驚奶沖胃氣或交奶沖脾或是氣奶或是病奶致吐遠聞腥氣與蛜𧌴丸氣細脈沉與調胃散方當歸湯治小兒吐哯當歸黃芩甘草芎藭黃連各一分細辛乾薑各二分半上切以水二升煮取八合服半合日三溫服黃耆湯治小兒吐哯胸中冷氣停結黃耆人參各三分當歸切焙芍藥甘草炙銼芎藭各一兩細辛去苗葉一分上粗搗篩每服一錢水七分盞煎至四分去滓分溫二服早晚各一量兒大小加減藿香散治小兒吐哯嘔逆身熱面青不進乳食藿香一錢半丁香人參白朮茯苓神麯扁豆各半錢上為末每服半錢罌粟米湯調下陳皮煎米飲亦得豆蔻散治吐奶肉豆蔻麵裹炮赤熱去面為末草果炮去皮各一兩縮砂去皮甘草炙肉桂不見火各一錢陳皮半錢去白上為末每服半錢米飲調下麝香湯治小兒吐哯胸膈痞滿乳飲停積麝香研木香人參沉香銼赤茯苓去黑皮各一分丁香半分上粗搗篩每服半錢水半盞煎數沸去滓分溫二服藿香散治吐奶藿香半兩何首烏白扁豆甘草炙糯米各等分上為細末半錢用水一小盞入淡竹茹煎至七分臨臥空心服治吐奶腹脹方代赭石麝香巴豆各一分赤石脂杏仁各半兩上為細末蜜丸如桐子大米飲下日三百日一丸一歲二丸橘皮湯治小兒吐哯膈上冷消乳丹治小兒飲乳過多胸膈不快或多吐哯大便奶片不消亦宜令乳後常服木香丁香青橘皮炒黃肉豆蔻各半兩牽牛子炒黃一錢上為末滴水和丸如針頭大每服三粒至五粒黏在奶頭上令兒吮之鹽黃散治小兒初生吐不止鹽兩黃米大牛黃兩粟米大研人參白茯苓各小一豆大甘草兩小豆大炙上搗研四味為末以乳半合煎三五沸入牛黃末攪勻分減服之小兒哯乳方此證哯哺吐下狀如霍亂甘草炙人參當歸乾薑各一分上為末水一升煮取五分服日三內麝香半分尤佳菖蒲丸治小兒吐乳喘促菖蒲人參去蘆頭赤茯苓各半兩上為末煉蜜和丸麻子大每服三丸以生薑湯化下量兒大小以意加減人參散治小兒吐乳令乳母服人參一兩去蘆頭生薑切焙乾陳橘皮湯浸去白瓤焙各半兩上為散每服三錢以水一中盞煎至六分去滓分溫二服令兒久飲稍停乳效一方有蘇葉治小兒吐奶方雄黃馬牙硝各一分壁目兒五枚上藥入磁碗內研如泥以乳汁半合調之使藥注子口內灌少許把兒抬頭項吐出黑血即定治小兒咬奶吐下方豆蔻母丁香宣連各一兩上為散空心米飲調下半錢玉真散治小兒吐乳白朮半兩半夏半個椒半分去目汗上為末每服半字水一呷調下大者一字青皮散治哯奶青皮滑石硫黃研各一錢上為末每服半錢藿香湯調下麝香丸麝香一錢研丁香搗末杏仁去皮尖雙仁炒研各一分上為末以粟米飲丸如麻子大每服五丸人參湯下量兒大小研下傅氏活嬰內有麻黃無丁香棗肉為丸丁香散治小兒乳後吐哯不止治小兒傷食吐乳方丁香石蓮肉枇杷葉薑汁塗炙熱各等分上為末每服一錢半米飲調下玉露散治小兒吐奶面色赤熱煩躁不灰木煅滑石等分上為細末每服半錢或一字生油並水調下治吐奶方母丁香三七粒殭蠶七個淨洗去粉炒上焙乾為末每服一字煎棗湯調治小兒吐奶方生薑橘皮等分上煎湯與乳母服訖即乳兒效枇杷葉散治小兒吐乳不定枇杷葉拭去毛微炙黃母丁香各一分一方只用丁香上為散令乳母乳頭上塗一字與兒吮之兒大煎棗湯調下不拘時又方生地黃汁人參各一合上粗和煎三五沸徐令兒服之鹽豉丸治小兒哯乳不止宜服此立效兼服小沉香煎丸鹽豉七粒口內含去皮膩粉一錢匕上研丸如麻子大每服三丸至五丸藿香湯下乳頭吮亦得莎草根散治小兒吐乳莎草根炒去毛甘草炙銼各半兩上為散每服一錢水一盞煎至七分去滓分溫二服早晚各一量兒大小加減人參丸治小兒吐哯乳母服妙功散治小兒吐奶不止用藜蘆洗焙為末以少許吹入鼻中噴三兩次立止治小兒吐乳四肢皆軟用桂心三兩水二升煮取一升半分三服又以濃汁塗五心常令溫暖暖胃正氣湯治小兒吐乳及治霍亂吐瀉用柵木皮以水煎服生廣南如桑樹治小兒吐奶方取用地龍糞一兩研末空心粥飲調下半錢不過二三服愈又方以韭根汁滴豇豆大入口中瘥治小兒吐乳黃色方以驢乳吃令大腸稍稍得利即毒氣便散又方取新熱馬屎一塊絞汁半合灌之效小兒百日內積痰在胸膈吐乳方取書中白魚七枚燒灰細研以乳調一字服之又方取故壁下鼠婦七枚炙令焦細研以乳汁調半字服保安散治小兒胃氣虛損因成吐奶五倍子一個生用一個濕紙裹煨上為細末每服一錢米泔水調下不拘時候若稟受怯弱用湯略蕩過平江所刊李侍郎朝正編類集本草方余長子小孫服之皆效異功散治吐乳胃虛人參白朮茯苓陳皮肉豆蔻木香藿香葉甘草各等分上為末每服一錢冬瓜仁湯下欲止吐住瀉陳皮米飲調下觀音散治身冷吐乳加全蠍治慢驚陰癇人參白朮白茯苓陳皮扁豆蓮肉藿葉薏苡仁丁香甘草各等分上為末每服一錢木瓜蘇鹽湯下如風痰在胸停積而吐則與小紅丸治小兒吐乳母丁香不拘多少上為末飯丸如芥子大每服五七丸鉛白霜湯下作散子煎亦得吐乳不止恐成慢脾方靈砂一粒青州白丸子上為同研末米飲調下量兒大小與之吐久虛者對用靈砂親試有效治小兒吐乳大人吐食用仙人杖水煮服治小兒吐乳補虛羸止渴以牛乳入生薑蔥白煎量服噦逆附論夫小兒氣弱不能勝乳致乳滿胃中氣既不得傳導復遇呼吸風冷則使胃氣上逆故令噦又胃中虛冷其人不能食者飲水即噦能節其乳食仍溫胃氣則噦自愈矣方木香丸治小兒脾胃虛寒噦逆不止木香草豆蔻去皮青橘皮去白焙檳榔銼陳橘皮肉豆蔻去殼一果京三稜炮銼一兩上為末麵糊和丸如緑豆大每服五丸溫生薑湯下或棗湯下量大小加減人參丸治小兒胃寒多噦人參白茯苓去黑皮陳橘皮去白焙白朮半夏湯洗去滑各半分甘草炙銼乾薑炮各一分上為末麵糊和丸黃米大每服十丸或十五丸煎藿香湯下量兒大小加減肉豆蔻丸治小兒胃虛不思乳食噦逆膈悶肉豆蔻去皮一枚生薑切作幹一錢木香一錢青橘皮浸去白焙一分人參一分白朮一分上為末白麵糊丸如緑豆大每服五丸米飲下不拘時訶黎勒散治小兒吐噦不止訶黎勒皮一分人參檳榔銼甘草炙陳橘皮湯浸去白切炒沉香銼各半兩上為散每服一字或錢半至一錢匕量兒大小煎麥糵湯調下人參丸治小兒胃寒多噦不入乳食人參白茯苓去黑皮各一分白朮木香山羊丁香各二分上為細末白麵糊丸如緑豆大每服七丸乳煎生薑湯下量兒大小加減丁香補胃丸治小兒胃氣虛噦逆丁香一錢藿香葉一分附子炮裂去皮臍二錢定粉炒研檳榔銼各一分上為末滴水丸如桐子大每服一丸至二丸米飲下不拘時量兒大小加減丁香散治小兒噦不止丁香藿香白茅根銼各一分人參半兩去蘆頭干桑葉一兩微治吐逆不定方各一分上為散三四歲兒每服一錢以水一小盞入生薑少許煎至五分去滓不拘時熱服量兒大小加減治乳兒生薑不用人參散治小兒噦逆不止心神煩悶人參去蘆頭白朮白茯苓各半兩甘草炙微赤銼碎上為散每服一錢以水一小盞煎至五分去滓不拘時稍熱服量兒大小以意加減麥門冬散治小兒多噦心胸煩悶麥門冬一兩去心焙甘草一分微炙赤銼人參去蘆頭陳橘皮湯浸去白瓤焙厚朴去粗皮薑汁塗炙令香熟各半兩上為散三四歲兒每服一錢水一小盞煎至四分去滓稍熱頻服量大小加減枇杷葉散治小兒胃氣虛冷噦逆不止枇杷葉炙去毛丁香各一錢白