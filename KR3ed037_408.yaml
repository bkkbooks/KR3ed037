body:
  text: 卷四百八嬰孩諸瘡腫毒門王爛瘡附論夫小兒臟腑有熱熱熏皮膚外為濕氣所乘則變生瘡其熱偏盛者其瘡發勢亦盛初生如麻子須臾漸大汁流潰爛如湯火所灼故名王爛瘡也方芍藥散治小兒王爛瘡一身盡如麻子有膿汁乍痛乍癢或時壯熱方見本門惡瘡類方見甘草散治小兒王爛瘡用蘿蔔根燒灰敷之佳效秫米散治小兒王爛瘡及惡瘡秫米竹條等分上燒灰細碾為末以田中禾下水調之黃連散治小兒王爛瘡初患一日肉色變二日疱漿出或四畔時赤漸若漿匝身即不可療其狀如湯火傷宜速用此藥黃連末一兩胡粉一兩上細碾令勻以生油塗之治小兒王爛瘡四交道中土灶下土上各等分為末以敷亦治夜啼治小兒王爛瘡初起疱漿似火燒瘡宜用此方桃仁湯浸去皮上搗令細以面脂和塗之又方用吳茱萸酒煎汁塗之又方用赤地利搗末以酥和塗之又方用燒艾灰敷之如瘡干即以生油調塗之又方用燒牛屎敷之亦可滅瘢痕亦治瘭瘡頭面身體生瘡附論夫小兒臟腑熱盛熱氣衝發皮膚而外有風濕折之與血氣相搏則生瘡其壯初赤起㾦癗後乃生膿汁隨瘥隨發或生身體或生頭面或身體頭面皆有也方大黃湯治小兒上下生瘡芍藥黃連五兩黃芩各三兩苦參八兩大黃二兩蛇床子一升黃蘗五兩菝葜一斤上㕮咀以水二斗煮取一斗以浸浴兒吳茱萸散治小兒頭面風瘡及身上或如麻豆多癢吳茱萸半兩微炒赤小豆半兩熏黃半兩碾入鴿糞半兩微炒葶藶子一分微炒藜蘆一分皂莢一錢燒灰白礬灰半兩上羅為散以生油旋調塗瘡上以瘥為度漏蘆散治小兒頭面身體生赤瘡濕癢黃水不止漏蘆一分當歸一分微炒黃蘗一分銼黃連一分去須五倍子一兩燒令煙盡麝香一分碾細膩粉二錢碾入上羅為散入碾了藥更碾勻每用時先暖鹽漿水洗瘡令淨拭乾以生油調稀稠得所塗於瘡上如干處即不再塗余濕赤處即更塗之以干為度藥後不得洗之苦參湯治小兒頭面身體上下百瘡不瘥苦參八兩地榆黃連王不留行獨活艾葉各五兩竹葉二升上㕮咀以水三斗煮取一斗以浴兒瘡上干敷黃連散治三五日小兒頭面瘡起身體大熱升麻柴胡石膏各六銖甘草當歸各十一銖大黃黃芩各十八銖上㕮咀以水四升煮取二升分服日三夜一量兒大小用之青砂散治小兒身體頭面諸瘡青黛硃砂硫黃研水銀以棗瓤研令星盡各半兩胡粉赤小豆各一分上拌勻碾細每用少許以生油膩粉調塗患處治小兒頭面身體生瘡累醫未效宜用此方貼之吳茱萸半兩微炒川大黃一兩膩粉一分麝香一分細研龍膽一兩去蘆頭上羅為散以生油調塗瘡上日二用之黃連散治小兒頭面身體生熱瘡黃連一兩去須黃蘗一兩銼胡粉一兩苦參一兩銼水銀一兩與胡粉相和點水少許碾令星盡上羅為散入水銀胡粉碾勻如瘡在面上以面脂和塗之如在頭及身上以生油塗之黃蘗散治小兒頭面身體生瘡熱痛黃蘗一兩銼水銀半兩苦參二兩銼黃連一兩去須上羅為散以豬脂和攪乳入碾水銀星盡每使先用泔酒洗瘡令淨拭乾敷之日三上效黃連散治小兒頭面身體生熱瘡黃連一兩去須蛇床子二兩微炒黃蘗一兩銼胡粉半兩炒令黃色上羅為散若頭上身上生瘡以生油調如泥塗之若面上生瘡以豬脂塗之蕪荑散治小兒頭面及身體生瘡久不瘥瘙癢殺蟲蕪荑三兩微炒葶藶子一兩微炒白礬一兩燒令汁盡吳茱萸半兩微炒上羅為散以生油調塗瘡上日二用雄黃散治小兒身體生瘡皮膚赤痛瘙癢雄黃三分細研白礬半兩燒令汁盡井鹽一分莽草半兩上羅為散以生油調塗瘡上日三用之胡粉膏治小兒頭面身體生瘡久不瘥胡粉一兩水銀一兩與胡粉相和點少許水研令星盡白松脂一兩豬脂二兩上先將松脂豬脂入鐺中煎成膏以綿濾過入水銀胡粉攪令勻日二塗之黃連湯治小兒頭面身體生瘡出黃膿水黃連二兩去須甘草二兩苦參五兩柳枝並葉一握上細銼和勻每用三兩以水五升煮至三升去滓看冷熱洗浴即愈黃連散治小兒頭面身體生瘡黃水出黃連一兩去須胡粉三分甘草三分銼上羅為散以臘月豬脂和如膏塗於故帛上貼之又方豆豉一合炒令焦黃蘗一兩銼上羅為散每用先以熱灰汁洗瘡令淨拭乾敷之黑豆散治小兒頭面身體生瘡黑豆二兩大麻仁二兩上羅為散著竹筒內橫插熱灰火中以銅器承受當有汁出取之令汁盡便塗瘡即愈又方用榆白皮一兩炙令焦銼羅為散以醋和塗之以綿覆之蟲出為度或以豬脂和塗之又方用黃黍米一升炒令黑焦羅為散以蜜水調和塗之又方用赤地利半兩搗羅為末以水浸梔子濃汁調塗之又方用膩粉以蔥汁和塗之又方用菟絲子二兩搗令碎以水五升煎取三升去滓看冷暖洗治小兒頭面身體生瘡赤腫焮痛用地榆八兩細銼以水一斗煮至五升去滓適寒溫洗浴瘡日二效治小兒頭面身體有惡氣數起生瘡用豆豉炒令焦搗羅為末每用先煮桃葉湯洗令淨拭乾敷之治小兒頭面身體生瘡肉突出方用烏梅肉微炒搗羅為末敷瘡效治惡瘡生頭面用貝母南星等分用湯泡七次碾為細末入土砂少許干則清油調搽濕則乾摻治年少氣盛面生疱瘡用角麋脂塗即瘥治小兒面上忽生瘡黃水出用鯽魚頭燒灰末和醬清汁敷日易之治小兒遍身瘡疱用茅香花桃葉同煮浴之集驗黃連胡粉膏治小兒頭瘡月蝕瘡口邊肥瘡瘑瘡身體卒生惡瘡黃連二兩胡粉水銀研入各一兩上搗為散相和水銀研令相得以敷瘡上縱黃汁引成瘡亦以粉之即瘥一方用白礬一兩燒蛇床子一兩末入用亦甚妙至耳邊到項上並用一方以豬脂調之治小兒身上生赤疵方用馬尿洗日四五度治小兒身上有赤黑疵以針父腳中取血貼疵上即消又方用狗熱屎敷之皮自卷落苦參湯小兒遍身生瘡宜用此方洗浴苦參大黃赤芍藥各一兩黃蘗二兩蛇床子二兩菝葜四兩上件㕮咀每用一兩水三升煎至數沸去滓通手洗之治一切滿身手足爛痛鷹爪黃連為末用水調塗碗內覆碗又用艾煙燻過令乾割下輕粉少許草烏燒存性黃柏皮三味等分上為末臘煎香油調搽累有神效治小兒面上生瘡子出膿消瘢法急以真酥潤之頻潤為佳才有瘡痂急割去更潤之痂硬不落有礙生肉遂成瘢子此理昭然人多不曉反謂剝早成瘢甚誤也防風散治小兒身瘡防風天花粉各一錢半川芎荊芥牛蒡子連翹各一兩上為細末每服二錢水一小盞煎五分去滓空心服風丹加薄菏下又方以連翹煎下四君子湯蠼螋繞腰腹成瘡附論凡蠼螋蟲長一寸許身有毛如毫毛長五六分腳多而甚細居屋壁之間其遊走處遇人則尿人影隨所尿著影處人身即應之生瘡世病之者多著腰瘡初生之狀匝匝起初結㾦瘟小者如黍粟大者如麻豆染漸生長闊大繞腰生膿汁成瘡也方治小兒蠼螋瘡用燕窠土碾細以豬脂和敷之治小兒蠼螋瘡繞匝即死用蒺藜葉搗敷之無葉用子亦可又方用敗蒲扇以水煮濃汁塗之又方用扁豆葉搗爛塗之又方用生甘草搗末敷之又方用鹿角燒灰細碾以酒和塗之水磨亦可又方用道邊蒲席燒灰細碾敷之又方用槐白皮半斤細銼以醋二升浸半日以醋洗之日五六度又方用赤小豆搗末以醋和塗之干再塗小兒以水和又方用大麥爛嚼敷之日三上瘥又方用梨子嚼塗之干則再塗之梨葉亦可又方用栗子爛嚼敷之又方用扁竹汁敷之又方用生白礬細碾以生蔥汁調厚塗之代指附論夫小兒代指者其指先腫焮焮熱痛其色不黯然後方始爪甲結膿劇者爪甲脫也亦名代甲亦名糟指亦名土灶夫爪筋之餘也由筋骨熱盛氣澀不通故結腫生膿而指甲脫也方治小兒代指腫痛方用麻黃三兩搗碎以水二碗煎至一碗乘熱略浸指在其中日十餘遍即愈治小兒代指逆腫方用雜毛和黃土作泥泥指上令厚五分內煻火中暖之令微熱可忍候泥漸漸干即易不過二三度即愈又方用豬脂和曲蟮研敷之數易之又方用取梅核中仁熟搗以醇苦酒和敷之即瘥又一古方入麻黃三兩又方用梁米粉鐵鍋中熬赤以眾人唾和之敷上令厚一寸即消又方用小便和鹽作泥厚裹之數易即瘥更用鑱針刺血出最妙疿瘡附論夫盛夏之月小兒膚腠開易傷風熱風熱毒氣搏於皮膚則生疿瘡其狀如湯之沸輕者匝匝如粟粒重者熱汗浸漬成瘡因以為名世呼為疿子也方龍腦散治小兒盛夏月因汗腠理開疏風熱毒氣客之則生疿瘡其狀如湯潑或紛紛如粟粒呼為疿子甚者磨破經效一名赤石脂散龍腦研半兩黃蘗末半兩白麵二兩臘麵茶二兩上同研令細每用新綿搵藥撲於瘡上破者敷之以瘥為度一方有赤石脂半兩一名赤石脂散葛粉散治小兒夏月疿瘡及熱瘡葛粉三兩甘草一兩生銼石灰一兩炒上羅搗末以綿搵撲於瘡上以瘥為度滑石散治小兒體熱疿瘡滑石末三兩白礬灰一兩棗葉四兩上羅為末先以溫漿水洗瘡後取藥敷之即瘥又方葛粉半兩白龍腦一錢上細研先用棗湯洗後以散摻一方用棗葉治小兒疿瘡熱瘡破痛不止干藕節二兩生麻油三合上先搗油麻如膏後下藕節末和別入生蜜稀稠得所塗於瘡上不過三五度效療小兒熱疿以菟絲子莖挼汁煮湯浴兒湯火瘡附論夫小兒被湯潑火燒者初時慎勿以冷物井下泥及尿並蜜塗搨之其熱氣得冷即深搏至骨爛入筋也所以人中湯火筋脈攣縮者良由此也方羊髓膏治小兒火燒瘡敗壞羊髓一斤柏白皮一兩生地黃一兩蛇銜草一兩黃芩一兩梔子仁一兩苦竹葉一兩上細銼先於鐺中煉羊髓令沸次下諸藥同煎候地黃色黑為度以綿濾去滓傾於磁器中候冷塗於瘡上日二度用之白膏方治小兒湯火瘡白松脂白蘞白芨定粉各半兩乳香一分清油二合黃蠟一兩上羅為末先以油入磁鍋內用慢火熬令香下黃蠟令溶次下諸藥末不住手攪熬成膏以磁盒盛候冷日三四度塗之大麻膏治小兒卒被湯潑火燒苦劇者大麻子仁一合柏白皮白芨甘草梔子仁各一兩上銼以豬脂一斤煎黃色為度以綿濾去滓盛於磁閤中候冷日三度塗之一方用生地黃無梔子仁生地黃膏治小兒湯潑火燒赤痛生地黃一兩柏白皮二兩苦竹葉一兩甘草一兩上細銼以豬脂一斤煎令地黃色黑以綿濾去滓盛於不津器中候冷日三度塗之治小兒火燒湯潑百草霜黃丹茶末蛤粉各等分上為細末用新汲水調搽治小兒湯火瘡柏葉一兩梔子仁一兩胡粉半兩上羅為末以羊髓五合入鐺中於微火上化之後下諸藥末不住手攪熬成膏盛於不津器中候冷塗之以瘥為度又方白礬二兩燒灰梔子三七枚燒灰煙盡為度上細研為散以雞子白調塗之又方柏白皮半斤研細上以豬脂五兩入銚子內與柏白皮同煎焦黃色取下綿濾去滓內入磁閤中候冷塗之又方用丹參搗末以羊脂和敷之又方用死鼠一枚以清油一斤煎令黑焦去滓日三度塗之又方用榆白皮嚼熟塗之又方用梔子仁以水浸汁日五六度塗之又方用栝蔞根去土燒灰研細以雞子白和塗之又方用柳白皮細銼半升以豬脂一斤相和煎候柳皮黑去滓放冷日三塗之又方用雄黃末以醋調塗之又方用浮萍草搗末以溫水調塗之又方凡初被湯火所傷使取狗毛碎剪消膠和之遍塗於瘡上以帛封之一封以至痂落更不易之亦不痛甚良又方用新牛糞取汁塗之又方用粟米熬令焦投水中卻漉出爛研敷之效又方用黍煮粥以雞子白和敷之又方用乳頭香水研薄荷塗之又方治小兒卒破湯潑用牛皮膠以漿水同入磁器以慢火煨令化厚塗之立瘥又方用煮生大豆汁塗瘥無斑一方黑豆濃汁塗又方用窯中新磚瓦末經雨濕者磨取末麻油塗調敷又方用蛤蜊殼燒成灰細研如粉以臘月豬脂調如無豬脂以麻油亦可疼即止其瘡即干功效不可具述磁石散治小兒湯火傷用景鎮磁器不拘多少打碎埋土內炭火鋪上經一宿取出放地上出火毒碾為末入黃丹水調敷患處治小兒不覺墜火上用醋和泥敷之即無痕黃金散治小兒湯燙火燒破瘡大有神效燒破重者不過三上立效白芨四兩碾為細末黃蘗二兩碾為細末上二味同研勻如有湯火燒燙破瘡上用新井花冷水調成膏敷貼燒破瘡上用兔毛蓋之如無兔毛絨羊毛蓋之第三日用小油潤去痂再重不過三上立效治小兒湯火瘡用大豆水煮取汁塗上易瘥無斑瘑瘡附論夫小兒瘑瘡者由風濕搏於血氣所成多著手足節腕間匝匝然搔之癢痛浸淫生長呼之為瘑以其瘡有細蟲如瘑蟲故也方蛇床子治小兒瘑瘡及濕癬蛇床子一分附子一分雄黃一分細切吳茱萸一分白礬一分苦參一分上搗羅為末敷瘡上日三用之螺殼散治小兒瘑瘡癢痛螺殼一兩爛者亂髮半兩燒灰龍膽末半兩胡粉半兩上細研為散以油腳調塗之水銀膏治小兒瘑瘡及疥癬惡瘡水銀白礬蛇床子黃連共四兩去須上除水銀外搗羅為散以臘月豬脂七兩入和研以不見水銀星膏成敷瘡即效治小兒濕瘑瘡胡燕窠一枚取大寬抱子處余處不用上細羅為散每使時先以水煎甘草入鹽少許作湯溫溫淨洗瘡拭乾以散敷之三兩上便瘥若患惡刺以醋用帛裹之日二易當愈治小兒瘑瘡及疥癬苦參三兩銼上為末以蜜和塗之治小兒干瘑濕瘑疥瘡用棗根皮蔥白搗如膏以豬脂和塗治小兒久瘑瘡及疥癬內黃水汁出用羊蹄草搗爛以白蜜和絞取汁塗之治小兒瘑瘡用桃搗以醋和塗之白禿瘡附論夫小兒白禿瘡者由頭上白點斑剝初似癬而上有白皮屑久則生痂癝成瘡遂至遍頭洗刮除其痂頭皮瘡孔如箸頭大里有膿汁出不痛而有微癢時其里有蟲甚細微難見九蟲論云是蟯蟲動作而成此瘡乃至自小及長大不瘥頭髮禿落故謂之白禿瘡也方皂莢散治小兒白禿瘡瘥而復生皂莢二挺燒灰黃芩一分硃砂一分細研麝香一分細研黃丹一分炒檳榔一分白芨半兩乾薑一分燒灰上搗羅為末以濃醋調塗之甚者不過三上瘥松脂膏治小兒白禿瘡及諸癬松脂半兩天南星川烏頭去皮臍膩粉各一分杏仁一分湯浸去皮清油三兩黃蠟一兩上搗羅為末先取油蠟入於磁器內以慢火溶之後下諸藥末和攪令勻熬三五沸膏成候冷塗瘡上日再用之又方蕪荑一分豆豉一分川椒二十粒去目上搗如泥以陳醬汁調塗之又方柳葉枝一握水銀半兩以唾研令星盡皂莢一挺去皮子上細銼以醋一升煎令濃去滓再熬成膏下水銀攪勻以磁盒盛之日二塗之野葛膏治小兒白禿瘡無發苦癢野葛末豬脂羊脂各一兩上藥同煎三五沸攪令勻濾去滓盛於磁器中候冷塗之不過三上瘥黑豆瀝方治小兒白禿瘡及疳頭髮連根作穗脫落發不生者黑豆三合巨勝子三合訶黎勒皮一兩上為末以油水中拌令勻內在竹筒中用亂髮塞口以煻燒瀝取膏於不津器中每使時先以米泔皂莢洗淨然後塗之日二用十日內發生矣又方巴豆十枚去皮心研細裹壓去油鹽一塊如栗子大麻油一合上藥都入乳缽內研如膏日三度塗之瘥治小兒白禿瘡痛癢不瘥赤桑根一兩桃花一兩三月三日取未開者陰乾上羅為散以臘月豬脂和如膏每使時先以桑柴灰淨洗拭乾塗之瘥黃蘗散治小兒白禿瘡發落苦癢黃蘗末一兩熏陸香一兩上細研以生麻油調稀稠得所塗之干即更塗不過三四度即瘥治小兒白禿瘡馬腸根一兩銼微炒藜蘆半兩去蘆頭銼炒令焦上為末每用時先以泔清淨洗瘡拭乾敷之鯽魚方治小兒白禿瘡鯽魚一尾三兩重去腸肚以亂髮填滿濕紙裹燒存性上為末用生麻油調敷先以虀水洗拭乾後用藥以豬脂調亦可治小兒白禿瘡發不生用蔓菁子川烏頭等分燒灰細研以生油和塗之治小兒白禿瘡發不生瘡有汁出或無汁乾燥痛用雞子七枚用黃以銅器中急火熬令乾細研敷之治小兒白禿瘡用東引楝樹枝皮銼碎搗羅為末以豬脂和敷之一方燒羊骨灰敷之亦效又方用梁上塵五兩細研每用時先以皂莢湯溫溫淨洗拭乾敷之又方用芫花搗末以臘月豬脂和塗之又方用雄雞糞白細研以陳醬汁調敷之又方用熊脂五兩溶令消塗之又方用瓦青衣細研以油調塗之又方用醋泔洗頭後淋蕎麥灰汁再洗之又方用葵根燒灰細研敷之又方用蛇蛻皮燒灰細研豬膏調敷又方用大蒜研令爛敷之又方用牛糞塗之又方用苦葶藶子微炒搗如膏敷之又方用桑榆白皮為末醋調敷之如聖散治小兒禿瘡白痂癢不可忍立效生白礬一兩瀝青末一兩輕粉二錢半上三味同研勻先用蔥白槐枝熬湯洗瘡淨絹帛拭乾摻藥上再用小油調搽三五上發自然生出神效瘡禿取虎膏塗之治小兒白禿發不生汁出慘痛以陳香薷濃煮汁少許脂和胡粉敷上瘻瘡附論夫小兒瘻瘡者由寒熱邪氣客於經絡使血氣否澀初生作細瘰癧或作梅李核大或如箭簳或圓或長者至五六分不過一寸或一或二三相連時發寒熱潰膿血不止者謂之瘻也是皆五臟六腑之氣不和致血氣不足而受寒熱邪氣所為也然瘻者有鼠瘻螻蛄瘻蚯蚓瘻蠐螬瘻今各以一方治療之也方丹砂膏治小兒諸瘡久不瘥作瘻孔疽瘻丹砂半兩細研雄黃一兩細研苦參一兩白礬灰半兩細研川大黃一兩黃連一兩去須莽草一兩䕡茹一兩上細銼用煉了豬脂二斤於鐺中煎藥候紫色以綿濾去滓入丹砂雄黃等二味以柳木篦攪令勻磁盒盛塗放瘡上每日換之妙一方有雌黃無苦參烏蛇散治小兒諸般瘡瘻久不瘥烏蛇肉三分炒令黃蒺藜子三分曲頭棘針半兩亂髮半兩燒灰馬齒莧三分牆上者雄黃一分細研緋帛半兩燒灰上羅為散以酒調內瘡孔中以瘥為度夜明砂散治小兒久瘻移易三數處皆生瘡孔者夜明砂一兩白殭蠶半兩乳香半兩臘麵茶半兩上細羅為散敷於瘡上瘥赤小豆散治小兒一切瘻出膿水項強頭疼四肢寒熱赤小豆一合炒熟白蘞一兩露蜂房一兩燒灰蛇蛻皮二寸燒灰上細羅為末每服以粥飲調下半錢量兒大小加減服之治小兒諸瘻穿穴成瘡痛不可忍者馬齒莧八兩檞樹白皮三兩麝香三錢細研杏仁三兩去皮炒令微黑研如膏上除麝香杏仁研細銼以水五升煎至一升濾去滓澄清入麝香杏仁相和令勻更煎令稀稠得所以磁盒盛每使塗於故帛上貼日二換之又方用牛糞堆上赤菌一名朝生暮落花乾者搗末敷瘡上立效又方用干楸葉搗羅為末以生油調敷之又方用塚中石灰細研敷之厚著之良又方用煉成松脂末填瘡孔令滿日三用之效又方用霜下匏花曝乾末敷之又方用燒桑根灰敷之並燒烏羊角作灰相和敷之又方用煉成松脂末併發灰生黃丹敷之備急若患漏瘡頭盡開出膿夜復合者用大附子一顆內鯽魚腹中炭火上燒灰以研敷之更搗蒜封之良一方用鯽魚諸漏方百日兒屎密器封五日取塗之惡核漏瘡並戒怒氣不然核則大漏則水多漏瘡方真龍骨蜂房炙黃各二錢黃丹炙五倍子降真香節骷髏骨各一錢上為細末敷之疣目瘡附論夫小兒疣目者由附著皮肉生與肉色無異如麥豆大俗謂之疣子即疣目也亦有三數個相聚而生者割破里狀如筋而強亦微有血而亦復生此多由風邪客於皮膚血氣變化所成故亦有藥治之亦有法術治之而並得瘥而多生於手足也方治小兒疣目桑柴灰四升以湯淋取汁入砂盆煎如餳附子二枚去皮臍生用硃砂一分研入糯米五十粒上羅為末煎調令勻每取少許點疣目上即自落兼治黑痣又方桑柴灰一作桑皮艾灰各三升上藥以水五升淋之又重淋上遍以五色帛以汁中合煎令稍點少許於疣目上則爛脫矣又方用糯米五十粒於濕石灰里埋之以爛為度用針撥破疣目敷之經宿自落又方用硫黃細研以醋調塗疣目上七度又方用松脂柏脂搗末以石灰汁調點少許於疣目上自落又方用七月七日以大豆一合拭疣上三遍即令病人自種豆於南屋東頭第二流中豆生四葉以熱湯浴之瘥又方用石灰以醋漬六七日取汁點疣目上小作瘡即愈又方用蜘蛛網纏疣目即落又方用杏仁燒令黑研膏塗之又方用牛涎數塗疣上自落又方用針及小刀子決目四面令似血出取患瘡人瘡中汁黃膿敷之莫近水三日即膿潰根動脫落治小兒遍身如魚目無膿謂之疣目瘡東坡謂之徵虜瘡用升麻一味銼煎百沸卻入蜜一二匙以磁器內盛之用鵝翎拭瘡上諸瘡附論夫小兒傷濕血氣壅滯則生瘡多有父母奶子不潔淨衣褥不與頻換洗滌或尿屎穢惡連日不洗亦能浸漬而生瘡天氣溫合頻與澡洗更衣名曰外宣亦不須服藥小兒不得已而服藥此乃下策將養合宜何病可侵更令乳哺有節勿令過飽其身乃如藥樹此養生之理也凡小兒甜瘡久不愈者俗呼為香瘡是也多在面部兩耳前一法令母口中嚼白米成膏子臥塗之不過三上則愈矣小兒並母皆忌雞豬魚兔酒醋動風發熱之物如治指疽亦同此法凡人自孩提以至弱冠潮熱發瘡只是疳氣使然蓋疳蟲耗其精髓蝕其肌膚體虛膚空疳熱流注遂至遍身熱瘡發渴無已須用豬肚黃連丸主治仍以大腹皮苦參白芷煎湯浴之蘆薈丸肥兒丸二藥夾和佐之可也方甘草芍藥湯治小兒火灼瘡一身盡如麻豆或有膿汁乍痛乍癢甘草芍藥白蘞黃芩黃連黃蘗苦參各半兩上為末以蜜和敷之日二夜一亦可作湯洗之水銀膏治大人小兒一切瘡不識者神效方水銀甘草黃蘗黃連松脂膩粉土蜂窩等分上取水銀放掌中唾碎為青泥入瓦碗中以生油和餅研生絹濾如稀餳和藥末再研如稠餳先以溫水洗瘡布拭乾塗之治一切無名瘡此藥搽之立效聞香散治一切瘡硫黃蛇床子黃連黃蘗輕粉大椒等分上為細末以芝麻油調搽瘡上將手鼻內聞香馬莧散治小兒諸瘡久瘻不瘥馬齒莧牆上者烏蛇肉酒浸一宿焙各一兩蒺藜半兩頭棘針半兩燒灰亂髮半兩灰緋帛半兩燒灰上搗羅為末每用量瘡大小用白酒調以帛子貼瘡上生肌散治小兒角腫生瘡及諸瘡口不合真地骨皮五倍子甘草各生黃蘗黃連炒等分上為細末乾摻瘡上以粗末用沸湯泡蘸洗干處津調敷敷瘡藥治濕瘡剪草宣連苦參各等分上為細末洗了次用麻油輕粉調敷治小兒一切毒瘡並豆風瘡大黃鬱金甘草上等分為細末以臘月豬脂熬沸濾去滓入明礬末攪勻放冷搽加料四物湯治血熱遍身生瘡腫癢及脾胃常弱不禁大黃等藥冷劑宜服之生乾地黃赤芍藥川芎當歸洗去蘆加黃芩減半加防風各等分上㕮咀水煎去滓大小以意加減忌酒面豬羊肉豆腐洗疳瘡用甘草節香白芷五倍子煎湯洗之備急治小兒疳瘡用艾葉一兩水一升煮取四合分三服瘥千金云艾葉切五升以水一斗煮汁取一升半分三服治小兒面湮瘡俗云煉銀瘡者是母受胎之日食酸辣及邪物過度多生此瘡用百葉煎半兩白礬二錢為末小油調搽之神效治刀傷成瘡用鼓捶草根即鬼箭草根取出不見水去土銼碎搗更入鹽同搗忌銅鐵器敷之治火灼瘡此候乃血氣熱肌熱又而傷熱其狀一身盡如麻豆先起疱而次黶成瘡宜用牛黃散仍用敷之一名疱瘡黃連苦參等分上為末加輕粉和糝患處洗方棗葉無葉用根菊花上煎湯用豬膽水湯和浴次用煎藥干糝之仍服牛黃散無不瘥者治無辜瘡毒用黃連大柏為末以芭蕉汁調敷角留口搽瘡加輕粉有汁加黃丹煅麝香各少許和勻干糝治小兒疳濕瘡用鐵衣著下部即瘥治小兒疳瘡用豬脂和胡粉敷之五六度油亦可又方用麻子嚼敷之日六七度又方用羊膽二枚和醬汁於下部灌之豬脂亦佳治濕瘡用濃煮地榆汁洗浴每日二度又浴方春用柳條荊芥夏用棗葉槐枝秋冬用苦參頻浴身安外宣無病治甜瘡用大棗去核實以綠礬火燒微存性研細貼之如瘡干小油塗之治胎毒瘡方治一歲二歲內滿頭延及遍身生瘡皆因在胎中父母恣情交合所致名曰胎疽經久不瘥先用化毒丹消毒飲服卻用父小便以鵝翎刷洗瘡上青黛為細末干糝效治小兒口瘡兼治風臍瘡久不瘥用五月五日蝦蟆炙杵末敷瘡上即瘥又治小兒蓐瘡月蝕瘡癰疽癤毒末破者用豬脂和敷之療小兒面上瘡痘子滅瘢法用黃明膠慢火炙為末溫酒調服一錢已出者服之無瘢未出服之瀉下又治小兒火燒瘡滅瘢痕黃明膠末雞翎掃之治小兒諸瘡用燒卵殼研和豬脂敷之治小兒尿灰瘡及臍瘡久不瘥用伏龍肝和雞子白塗之臍中瘡以末敷之治小兒尿灰瘡用大黑豆皮熟嚼敷之治小兒風瘡久不瘥用燒菰根節末以敷之治小兒蓐瘡用澤蘭心嚼敷之治小兒火灼瘡一名瘭漿瘡一名火爛瘡用酒煎茱萸拭乾治小兒患風瘡久不瘥用當歸末敷之治小兒蓐瘡兼治白禿瘡用燒葵根末敷之香粉散治諸瘡久不瘥用白膠香半兩碾末輕粉二錢研和豬脂調敷治小兒急黃並爛瘡用赤小豆取汁冷洗不過三度瘥能令人美食末與雞子白調塗熱毒癰腫瘥通氣健脾胃治小兒吐逆止鼻紅並瘡壁錢蟲上滴汁敷鼻中及瘡上並敷瘻瘡治刀傷成瘡用真降香為末糝之如未尋得鼓棰草根用降香共為末糝之連翹散治驚瘡煩躁啼哭能清心解熱久服自然輕減也防風羌活連翹荊芥甘草赤芍藥梔子蟬蛻黃連等分上為散每服用燈心薄荷生地黃同煎當歸散治驚瘡顏色清淡川芎當歸白蒺藜白芷甘草人參荊芥穗防風羌活等分上為散每服用鉤藤鉤子同煎烏犀膏治一切驚熱瘡疾玄參荊芥大黃等分上為末煉蜜為丸如指頭大每服用一丸薄荷湯下神異一搽光治小兒諸般疥白禿瘡肥爛瘡癢痛如水流者神效白芷四兩硫黃三兩白礬枯一兩樟腦一兩上為細末生油調成膏於瘡搽之再搽如此上三五次剋日見效本當用之誠不負一搽光之名也用豬膏亦妙先以皂莢蔥白熬洗淨後上藥柴胡通經湯治小兒項側有瘡堅而不潰名曰馬刀瘡柴胡二分連翹二分當歸尾二分紅花少許黃連三分黃芩三分生甘草二分黍黏子二分桔梗二分京三稜二分上件㕮咀麻豆大都作一服水一大盞煎至一盞去滓稍熱服食後忌涼藥泄大便乳香膏治小兒煉銀瘡水浸徹或遍身瘡痂癬癢並皆治之世俗亂傳小兒煉銀瘡搽之入腹勿信謬也明瀝青一兩黃蠟一兩芝麻油四兩上三味一同煉開綿濾去滓入後項藥黃丹另研一兩枯白礬一兩研乳香半兩另研沒藥二錢半研輕粉二錢上五味一同研令入於前三味瀝青蠟油抬於地下不住手攪令成膏子如硬再入小油少許熔開熬五七沸搽於煉銀瘡癬上日搽兩三次大有神效香瓣散一名香瓣瘡一名月耳瘡一名浸淫瘡治小兒耳邊身面上胸項上浸微黃水到處成瘡用此藥其效如神荊芥一兩半小棗兒一十個二味先燒存性羖羝羊須一兩燒灰燒存性枯白礬二錢半另研細上件三味同研極細再入輕粉一錢半調研勻每用少許小油調搽重者不過三上立效立效散治小兒大人黏瘡浸徹經年不效枯白礬一兩黃丹紙上飛一兩白膠香一兩另研上件三味一同研勻極細先用蔥白荊芥熬湯洗淨揩乾上藥後用小油調搽三五上即瘥黃柏皮散治小兒滯頤生瘡赤爛與干搽之不問脾虛驚熱並可服之柏皮白礬枯朴硝等分上為末搽患處即安豆風瘡不可者用真厚朴依燒瀝油法燒油搽治小兒馥瘡以葛粉挹之妙治小兒腳凍如有瘡取蠟濃煎塗之主小兒醋瘡以產死婦人塚上草作浴湯洗之不過三度佳取時勿回顧治小兒酢瘡以仙人草煮湯浴亦搗敷之酢瘡頭小而硬者此瘡或有不因瘥而瘥者當丹毒入腹必危可預飲冷藥防之兼用此藥洗瘡諸蟲咬傷方治小兒蛇咬白礬甘草半分上搗羅為末如蛇咬著心神熱躁眼前暗黑用新汲水調下半錢如有腫赤用白礬鹽漿水萵苣根等水煎三五沸淋洗即腫氣自消如大段蛇咬著未及修合藥用耳塞少許入在咬著處瘡口內以酸醋一滴滴在瘡口痛即止又方合口椒蒼耳苗各一兩上藥和搗敷之又方椒豉散生椒三兩去目豆豉三合炒黑焦上搗羅為末以津調看多少敷之立定又方用遠志嚼令爛敷之並內瘡孔中又方用白芷為末干糝患處次用井水調白芷末敷之治小兒蠍螫用半夏以水研塗之立止又方用桂心水磨敷之又方用乾薑爛嚼敷之又方用大蒜研令爛塗之治小兒蜈蚣咬頭垢苦參末各一兩上用研令勻以酒和塗之又方用桑白皮汁塗之又方用蝸牛活者生研厚塗之又方用姜自然汁煎作濃膏入白礬末少許調厚塗之又方用麻油燈心熏患處次用雞屎塗之良治小兒蜘蛛咬棗葉柏葉五月五日取生鐵衣等分上搗羅為末以生油和如膏先火炙瘡然後塗咬處神效又方雄黃一分麝香半分上細研以藍汁一大盞攪令勻點咬處立效又方五加皮一兩半夏四兩上藥燒灰研細以醋和塗之又方用生鐵上衣醋研濃汁塗之又方用菝葜苗一握搗如泥敷之又方用白姜蠶末以津和調敷若有絲出盡差矣又方用雄黃末以蔥汁調厚塗之又方用生白礬末一兩以醋調成膏厚塗之又方用驢溺及乳以物盛敷之亦取驢溺處臭泥敷之亦佳治小兒卒被諸蜂蠆螫露蜂房白礬各半兩上搗羅為末以水煎如膏厚塗螫處效治小兒卒被狗咬用乾葛搗羅為末敷瘡上更濃煎葛汁與兒飲之又方用熱牛屎塗之立效又方用黃蠟溶灌瘡中效又方用蔥搗取汁每服半合日三服之又方用地龍糞封之毛出即瘥又方用杏仁湯浸去皮搗爛敷之不三五度效治小兒卒被貓兒爪及咬損痛方用剪刀草搗取汁塗之治小兒被鼠咬痛瘡不能合者一二次愈用貓尿塗於患處治犬咬癲犬瘡發者能殺人用韭葉挼敷患處及令服韭汁數日雄黃散治蛇蠍蜈蚣所傷痛不可忍貼之立愈雄黃另研生半夏川烏尖乾薑各等分上為細末干搽痛處如痛不止用酸醋調搽其痛立止蠍螫南星散治蠍螫蜈蚣所傷痛不可忍蓽茇三錢半半夏生二錢半南星生一錢半白礬生一錢雄黃二錢上為細末用一捻就痛處搽之醋調貼之立效靈聖散治大人小兒瘋狗咬破瘡犬吠所傷瘡其效如神天南星生銼防風去蘆等分上二味研為細末先用蔥白槐枝熬湯洗淨干貼瘡口上日用二度上膏藥蓋之
