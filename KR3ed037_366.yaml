body:
  text: 卷三百六十六嬰孩唇舌口齒咽喉門牙齒疼痛等疾附論夫牙齒者是骨之所養手足陽明之脈併入於齒若血氣充實則骨髓強盛雖其齒損落猶能更生也若虛弱者血氣衰耗風冷乘之致令齒久不生假令生者或齲或蟲落不能生也小兒齒痛風齲者手足陽明之脈併入於齒風氣入其經脈與氣血相搏齒即腫痛膿汁出謂之風齲小兒牙疳齒齲者是齦腐爛也下牙屬手陽明大腸之經燥金為主上牙為足陽明胃經濕土上下是腸胃二經也或積熱於內或因服銀粉巴豆大毒之藥入於腸胃乳食不能勝其毒毒氣循經而至於齒齦牙縫嫩薄之處反內害也可以麝香玉線子治之乳母臨臥常服黃連解毒湯一服牙疳病則愈矣全嬰方云紀全助教子七歲每夜睡中咬牙不絶聲業醫者纍與驚藥並靈寶丹及用聖惠方治睡中咬牙密取患人臥薦下塵一捻內口中勿令知之亦不退諸法治之一季無效其妻慮有祟求祝無驗召愚視之則兩耳前微赤疳攻必耳聾微黃驚入腎咬牙睡魂中此子腎經有風腎主骨骨齒也腎有風則齒癢齒癢則咬牙腎屬陰故夜睡中咬牙知驚入腎也紀曰專醫小兒實不曉治願請教益答曰以大戟散一錢豬腎湯調臨睡一服減半次夜更一服退七分後以人牙火煅蠍尾麝香三味豬腎湯調三服全瘥紀曰大戟散何意也答曰大戟瀉其膀胱之腑去腎經風腎與膀胱同腎虛不受瀉故不多服豬腎湯入腎人牙入骨古者用人牙燒灰治痘毒入腎腎旺瘡黑寒顫戛齒者是腎經受毒今用人牙者逐腎經病蠍尾麝香治腎風邪大抵用藥當究其原歸其本素問曰治病必求其本前者所用驚藥乃治其心所以無效也小兒齒不生者由骨之所終而為髓之所養也小兒有稟氣不足者則髓不能充於齒骨故齒久不生也方芎黃散治齒不生齒者由骨之所終髓之所養稟氣不足則髓不能充於骨故齒久不生川芎乾地黃當歸山藥一名山薯芋白芍藥各一兩沉香半兩粉草三錢上為末溫鹽湯調服錢半用少許揩齒腳亦佳一方無沉香牢牙散搽牙茯苓石膏龍骨各一兩寒水石白芷各一兩細辛三分石燕子大者一枚小者一對上為細末早晚刷牙蟾蜍丸治齒不生一名香附丹沉香一兩檳榔半兩雄鼠糞半兩燒灰大香附子一兩乾蟾半兩燒灰上為細末用羊髓四兩煮爛和成膏丸如黍米大每服十粒麝香湯下量兒大小加減香附丸治小兒長齒不生香附子大者去皮沉香各半兩檳榔雄鼠糞兩頭尖者燒各一分上為末羊髓二兩煮爛和成膏丸如小豆大每服十丸麝香湯下治大人小兒生齒神效方用雄雌雞糞各十四顆焙乾同研如粉入麝香少許仍先以針挑破損齒腳下血出將散子敷之年高者不過二十日生年少者十日不計傷損及少自退落並再生治小兒大人牙齒不生用黑豆三十粒牛糞火內燒令研盡細研入麝香少許一處研勻先以針挑不生牙處令血出用末少許揩不得見風忌酸鹹物治因落齒不生取牛糞中黑豆二七粒去頭上皮以此豆開處注於齒根上時時用之即效又方取雄鼠糞二七枚以一糞拭一齒根處盡此上二十一日即生雄鼠屎頭尖一方用雌鼠糞頭圓者治齒久不生取雄鼠脊骨為末敷之即生又方取路傍遺卻稻粒於齒落處點三七下其齒自生神效療小兒齒不生用入尿坑中竹木以正旦刮塗之即生含漱湯治齒痛獨活黃芩芎藭當歸各三分細辛蓽茇丁香各一兩上㕮咀水五升煮取二升半含漱之食頃乃吐更含之一方有甘草二兩藁本散治卒齒痛藁本白附子川芎莽草各半兩用搗羅為細末次用青黛蘆薈麝香各一錢細研上研勻每用一字塗揩患處雄黃丸治小兒牙齒黑蛀氣息疼痛雄黃二錢麝香半錢上為末軟飲和為梃子安在牙內治牙疼方用蒼耳子五升以水一斗煮取五升熱含之疼則吐吐復含不過一劑愈無子莖葉皆可用之又方用莽草五兩切以水一斗煮水五升含嗽之一日令盡又方用藜蘆末內於牙孔中勿咽汁神良又方用取門下桃橛燒取脂汁少少內孔中以臘固之治小兒齒牙黑蛀氣息疼痛含白馬屎隨左右含之不過三口瘥治裂齒以腐棘針三百枚以水二升煮取一升含漱之日三五次瘥止又方取死曲蟺末敷疼處即止麝香散治小兒唇口臭爛齒齦宣露麝香雄黃生蘆薈白龍骨各一錢密陀僧二錢石膽半兩生乾蟾一個重半兩者入瓶燒存性上研勻令細先用綿子纏箸頭上以鹽礬漿水輕洗過然後貼藥地骨皮散治骨槽風牙齒宣露腫癢浮動疼痛時作或齦爛生瘡兼治大人小兒口瘡地骨皮麥糵各一兩青皮一分豬牙皂角半兩上同研令勻入鍋內燒過再研末每服看患大小用之仍先以鹽漿嗽口了糝搽治小兒牙宣齒縫血出苦參末二兩白礬灰一錢上為末一日三次揩牙上立驗也治齒間出血取苦竹葉不拘多少濃煎取汁入鹽少許寒溫得所含冷即吐治小兒牙宣常有鮮血不止齒齦臭爛砒黃炒一錢麝香炒半錢上同研細先用紙條子以生油塗之後糝藥末在上少用末剪作小片紙棋子大者大小插在爛腫處治齒血出不止刮生竹茹二兩酢漬之令其人解衣坐乃別令一人含噀其背上二過並取竹茹濃煮取汁勿與鹽適寒溫令嗽之終日為度治牙齦宣露出血凡遇日月蝕未平復時特忌飲食小兒亦然並宜治之用蚯蚓糞水和作稠泥團以火燒之令極赤末如粉以臘月豬脂和敷齒齦上日三即瘥止及治小兒風齲齒痛並蟲蝕疼痛黑爛治齒間血出用童子小便半升分為三兩次含之冷即吐之治齒根腫痛取松柏槐枝同燒令熱拄病齒孔須臾蟲緣枝出治齒根腫以松葉一握鹽一合好酒三升煎取一升含之治齒根空腫痛困斃獨活四兩酒二升上於淨器中漬之煻火煨令暖稍稍沸得半去滓熱含不過四五度治牙齦疼痛杏仁一百枚去皮尖雙仁者鹽末方寸匕上以水一升煮令沫出含之未盡吐卻更含不過再三瘥治小兒牙牛蒡子炒香一分乳香一錢上為末入白麵少許溫水調塗治牙根腫痛生地黃獨活各三兩上切以酒漬一宿含之治小兒牙痛用大硼砂研細水化雞羽掃牙上治齒根腫痛常以白鹽末對齒齦上日三夜二治齒牙根搖欲落用生地黃大者一寸綿裹著牙上嚼咽汁汁盡去之日三咽十日即愈一方用火炙令大熱著木捶碎用綿裹著牙上蝦蟆散治小兒齒痛齲風連腮微腫干蝦蟆一枚燒灰青黛細研柑子皮細辛白雞糞雄黃各一兩麝香細研乾薑炮裂銼各半分上為散研令勻以薄綿裹少許內齲齒孔中日一易之治小兒風齲齒痛及蟲蝕疼痛黑爛出聖惠方青黛雞糞白燒灰藁本細辛麝香少許細研上為末旋取少許敷於齒上治小兒齒痛風齲連腮微腫出聖惠方白附子藁本細辛芎藭莽草各一分上為散以薄綿裹少許著齲齒上治小兒齲齒風痛及蟲蝕疼痛出聖惠方干蝦蟆一枚燒灰青黛一分蘆薈半分上同研令細以生地黃汁熬作膏塗齒上治小兒風齲齒痛及蟲蝕疼痛黑爛出聖惠方以郁李根白皮五兩銼水一盞煎熱含冷吐當蟲出又方用松柏脂捏鋭如錐拄齲孔內須臾齲蟲緣出瘥又方用雞舌香半兩銼水一鍾煎六分去滓熱含冷吐治齲齒出聖惠方用白馬懸蹄切碎可孔塞之不過三度一方用夜眼亦可又方出幼幼新書以皂莢炙去皮子搗末取少許塗痛齒上瘥二聖散治小兒風蚛牙疼威靈仙白茯苓去黑皮各一兩上為末每用一錢水一盞醋半盞蔥白一握切煎至六分熱炸冷吐黃龍散治齒齦疳蟲有竅子不合者出幼幼新書龍實龍骨中有之淡黃或淡黃褐色緊黏人舌者是白蘞灰蝸牛殼南䊅牛黃各一錢上為末每用少許貼竅子內時時用之治小兒齒疳蟲䘌五倍子炙為末鉛丹研各一分上和勻以綿裹貼齒齦上塗亦得治蟲蝕齒根肉黑方出幼幼新書燒腐棘取脂塗之十遍雄黃末敷即愈齒根黑者以松木灰揩之細末雄黃塗齦百日日再塗之七日慎油豬肉神效治小兒蚛牙出幼幼新書濃煎郁李仁水含之治牙車急口眼相引舌不轉方出幼幼新書牡蠣熬伏龍肝附子炮去皮礬石燒各等分上為末以白酒和為丸敷其上干則易之取瘥止治失缺頰車蹉出幼幼新書消蠟和水敷之立愈四物湯治稟氣不足齒久不生骨髓不生當歸白芍藥地黃川芎等分上㕮咀水煎加山茱萸甘草服草龍膽散治牙根宣露草龍膽鉤藤枳殼升麻各等分上件煎水日日灌漱之越涎散牙硝白礬枯北細辛各等分上為末揩擦牙上出涎立效法治失缺頰車蹉閃不合用一人以手指牽其頤以漸推之則復入矣推當疾指出恐誤齧傷人指也治齒蟲方出幼幼新書以擔一條令病人蹲坐橫擔於膝上引兩手尋使極住手伸中指炙中指頭擔上三壯兩頭一時下火病人口誦咒曰啖牙蟲名字鶻莫啖牙莫啖骨大人亦念之治牙根腫痛出幼幼新書扣齒三百下日一夜二即終身不發至老不病齒治痛齒出幼幼新書宜夜向北鬥手拓地灸指頭地咒曰蠍蟲所作斷木求風蟲所作灸便休疼痛北斗收即瘥治牙痛出幼幼新書取桑東南引枝長一尺余大如匙柄齊兩頭口中拄著疼牙上以三姓火炙之咒曰南方赤帝子教我治蟲齒三姓炙桑條條斷蠍蟲死急急如律令大效咽喉等疾附論夫咽喉者肺脾經所主也小兒脾肺有熱蘊積上焦熏發喉間故令咽喉赤腫吞吐不利或塞或壅憎寒壯熱咳嗽痰涎是其候也昔人謂藏熱則咽門腫而塞閉豈虛言哉喉痹之病喉中腫塞痹痛水飲不下呼吸有妨寒熱往來得之風熱客於脾肺熏發咽喉小兒純陽尤多是疾若不速治毒邪入於心則煩悶懊憹立致危殆歌曰咽喉腫閉肺家殃積熱於中舌有傷風盛氣攻丹腫毒卻愁生出腦疳瘡此患先解利宣泄臟腑壓熱調氣即安也人以胃氣為主無問大小兒或有痰實風涎灌心切不可吐惟喉痹別無治法非吐不能生金星丸當先投之痹者膈塞也萬一危亟煎劑難效急用官局碧霞丹研細用薄荷自然汁入醋調用雞翎蘸藥送入喉管內徐徐導引得吐出為佳或云碧霞金虎二丹能殺人不可用此大不然小兒馬痹者與喉痹相似亦是風熱毒氣客於咽喉頷頰之間與血氣相搏結聚腫痛其狀從頷下腫頰下應喉內痛腫塞水漿不下甚者膿潰毒若攻心則心煩懊悶至死小兒生下中詐腮風壅喉渾身壯熱耳邊連珠赤腫喉中或肉瘤起有此為詐腮喉壅此候本因積熱積甚衝上乃如此所治者先微下奪命散略與吐下風涎用勻氣散補又用硃砂膏夾天竺黃散與服又用蔥涎膏貼腮腫處如此調理三日即愈如此惡候恐傳急驚方牛黃散治咽喉項腫啼聲不出牛黃研半分代赭三兩麝香研半錢玄參半兩厚朴去粗皮生薑汁炙三分升麻一兩射干半兩大黃銼炒一兩一分木香三分白朮半兩犀角鎊屑三分甘草炙半兩上為細散入研藥和勻一歲至二歲每服半錢以人乳汁一蛤蜊殼許調下空心服日一服三歲至五歲以上每服一錢棗湯調下米飲亦得日再服升麻湯治小兒咽喉腫塞疼痛方升麻木通川大黃銼微炒絡石葉犀角屑甘草微炙銼各一分石膏三分川朴硝二分上搗羅為粗散每服一錢以水一小盞煎至五分去滓不拘時候量兒大小加減溫服射干散治小兒脾肺壅熱咽喉腫痛射干川升麻百合木通銼甘草炙微赤銼桔梗去蘆頭各一分馬牙硝半兩上為散每一錢以水一盞煎至五分去滓不計時候量兒大小以意加減溫服龍腦膏治小兒風熱咽喉腫痛塞悶生瘡搖頭燥悶蟲咬心痛龍腦半錢玄明粉二錢牛黃少許白礬一分銚子內煉通煎卻磨汁泣干為度蟬蛻三十個去足炒研末蛇蛻皮一條長二尺用鐵器上煉焦為度旋除下黑者生者再煉須緊按實著鐵器焦後研為末上同爛研入沙糖少許和丸梧桐子大冷水化破一丸服之絳雪散治大人小兒咽喉腫痛氣息難通硼砂少許白礬如皂子大馬牙硝三分硝石四兩黃丹半兩巴豆六枚上粗瓷罐子一個先煨令熱後次第漸漸下藥巴豆逐個打破候有火焰盡更入一個續入蛇蛻皮一條謂之七擒以火養成汁候結硬乃成也每用少許竹筒子吹在患處忌雞犬婦人見唯臘月合之地龍散治小兒生熱咽喉腫痛鬱金用皂角水煮乾甘草炙白殭蠶地龍二條馬牙硝一兩上為細末每用一錢薄荷湯調下兒小半錢款冬花丸治小兒咽喉中鳴咳嗽喘急款冬花甘草炙紫菀去苗皮麻黃去根節煎去沫焙乾各半兩貝母麩炒麥門冬去心焙各三分上為細末煉蜜丸如緑豆大每服三丸至五丸食後米飲下五歲以下以意加之日三服麻黃湯治咽喉腫熱肺脹氣急喉中似有物塞麻黃去根節煎去沫焙乾桑根白皮銼桂去粗皮各半兩大黃生一分射干一分杏仁湯浸去皮尖雙仁二分上粗搗篩每服一錢以水半盞煎三分去滓溫服治熱病口爛咽喉生瘡水漿不得入當歸射干升麻各一兩附子半兩炮去皮白蜜四兩上㕮咀以豬膏四兩先煎之令成膏下著地勿令大熱內諸藥微火煎令附子色黃成絞去滓內蜜復火上令相得成器中令凝取如杏子大含之日三四輒咽之瘥半夏湯治小兒咽喉病不利乳哺半夏二個洗棘荊半升陳者麥門冬半兩人參甘草炙各一兩上㕮咀以水三升煮一升稍稍飲之牽牛散治咽喉中鳴咳嗽痰壅牽牛子炒半生半熟二兩杏仁去皮尖雙仁炒甘草炙吳茱萸湯洗焙乾炒陳橘皮去白焙各一兩上為細末每服半錢空心服以沸湯調下微利出惡物即瘥量兒大小加減服升麻湯治小兒喉痛若毒氣盛便咽塞並治大人咽喉不利升麻生薑射干各二兩橘皮一兩上㕮咀以水六升煮取二升去滓分三服玉芝飲子治小兒膈上壅熱唇口生瘡咽喉腫痛甘草銼作半寸許擘破湯浸一日微炒過吳石膏研如粉各四兩山梔子六兩去皮炒令香藿香三分上為細末每服二錢新汲水調下不以老幼加減可服射干湯治咽喉腫痛及風熱上搏於咽喉之間血氣相搏而結腫乳食不下名咽閉方射干川升麻各一兩馬牙硝馬勃各半兩上為末每服一錢水一盞煎至五分去滓食後溫服備急丹治咽喉腫疼青黛三兩芒硝二兩白殭蠶一兩甘草四兩上為細末用臘月牛膽有黃者盛藥其中蔭四十九日多時為妙加些小麥腮腫喉閉用皂角子研碎以竹筒子吹之咽喉內愈治小兒卒腫毒著咽喉頸壯熱妨乳升麻射干大黃各一兩上㕮咀以水一升五合煮取八合分三服不拘時候溫服以滓敷腫上冷更暖以敷大兒以意加之青木香湯療春夏忽咽喉痛而腫兼不利者青木香黃連白頭翁各一兩上㕮咀以水五升煮取一升半分溫三歲小兒一服一合忌豬肉冷水朴硝散治小兒咽喉腫脹咽氣不利朴硝一分衣中白魚炒三枚鹽少許上為末每服以指搵少許在舌上龍石散治大人小兒咽喉腫塞疼痛口舌生瘡膈上壅熱毒生腦子一錢寒水石一斤燒一日硃砂一兩一分飛研上為細末每用少許擦患處咽津無妨小兒瘡疹毒氣攻口齒先用五福化毒丹掃次用此藥擦立愈治小兒咽喉腫痛塞悶方馬勃半兩桑株上螳螂窠一兩燒灰上同研令勻煉蜜和丸如桐子大三歲以下每服煎犀角湯研下三丸三歲以上漸漸加之治咽中瘡腫萆麻子去皮一枚朴硝一錢研勻上用新汲水調作一服未效再服治咽喉腫痛閉塞白殭蠶生去絲嘴馬牙硝各二錢上為末每服半錢生薑汁調下不拘時服得效方凡咽喉之證最急初覺咽喉腫脹痛速宜服此用白殭蠶馬牙硝二味等分為末研生薑水調下一錢不過二服即愈如是噤定牙關用巴豆七粒剝去皮擦巴豆油在四指大四方紙花子上用紅箸斜角卷之卻徹去紅箸男左女右簪在鼻孔中存一半外用燈點著外相紙花捲兒頭即時煙透喉中牙關隨手便開以白礬少許吹在喉中壓下熱涎即安此病暴速非其他病之可擬也倉卒害人性命不可不慎白礬散治大人小兒風熱咽喉腫痛及卒然閉塞又治纏喉風急喉閉白礬一兩巴豆二十粒瓶內火煨上為細末每服一字吹入口內或鼻內亦可又一方同熬枯干去巴豆碾礬令細冷水調灌治懸癰乘熱暴腫長乾薑半夏各等分上為末每用少許著舌上又一方白礬鹽等分為末箸頭點少許懸癰上黃蘗湯治咽喉腫脹咽氣不利黃蘗去粗皮蜜炙甘草炙各一分上粗搗篩每一錢用水半盞煎至三四分去滓溫服不拘時苦藥子散治咽喉腫痛苦藥子白殭蠶等分上為末每服半錢白礬水調下量兒大小加減蜂房散治忽腫毒著咽喉露蜂房燒灰白殭蠶各等分上細研每服半錢用乳香湯調下看兒大小加減治咽中腫垂內不得食以竹筒內口中燒鐵從竹中拄之不過數度愈一方全蠍白姜蟬花蟬蛻紫石英各等分上為末入硃砂麝香各一錢研勻燈心湯點服人參羌活散治壯熱涎潮牙關緊急方見本門傷寒類蠍附散治小兒吐瀉日久或大病後生風時發搐搦目睛斜視南星一枚重二兩者打碎附子一枚重七錢者生去皮劑銼以上二味用生薑四兩取汁入好酒一盞於銀石器中同煎令汁盡焙乾為末又方白附子七枚泡製全蠍七枚去毒用炒代赭石二兩火煅為末辰砂半兩上為細末入腦子麝香各一錢研勻每服一字用酸漿水半盞入麻油兩滴冬瓜子三粒同煎三五沸放冷約一茶腳許調服候少時再服如無漿水並冬瓜子只用薄荷湯調服不拘時候中風口噤附論夫小兒中風口噤者是風入頷頰之筋以手足三陽之筋入結頷頰足陽明之筋上於口膚腠虛風冷客於諸筋筋得寒冷則攣急故機關不利而口噤也方犀角散治小兒中風口噤腰背硬強搐搦犀角屑獨活麻黃去根節白附子炮製乾蠍微炒牛黃細研以上各一分天麻半兩天南星半兩炮製麝香半兩細研上為散入研