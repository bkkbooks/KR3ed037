時候治小兒喉痹用葛蔓燒灰水服一錢又方用棘刺燒灰水調服半錢治喉痹以繩纏手大指刺血出一大豆以上瘥刺小指亦佳刺小指爪文中出血即瘥右左刺出血立效慎酒面毒物異功散治纏喉風詐腮喉閉及咽喉一切病證盆硝一兩甘草炙六錢訶子肉白殭蠶貫衆馬勒蛇蛻皮點油醋慢火炒黃色各半兩硼砂一錢玄精石一錢上為末每服用一字以蘆筒子吹咽喉內纏喉風磨刀水調下半錢尋常置舌根下用解毒雄黃丸治纏喉風及急喉痹卒然倒僕失音不語或牙關緊急不省人事雄黃飛鬱金各一分巴豆去油二七個上為末醋煮麵糊為丸如緑豆大用熱茶清下七丸吐出頑涎立便蘇省未吐再服善治纏喉風及走馬喉閉卒死倒地失音不語以至牙關緊硬不知人事如至死者心頭猶熱灌藥不下即以刀針匙斡開口灌之但藥下喉嚨無有不和吐瀉些小無妨及上膈壅熱痰涎不利咽喉腫痛赤眼癰腫一切毒熱並宜服之如小兒患喉嚨赤腫及驚熱痰涎壅塞二丸或三丸量兒大小加減生薑飲治風邪風毒纏喉不語南星略炮半兩生薑四錢橘皮五錢上銼每服三錢紫蘇五葉煎服治纏喉風喉痹牙宣牙癰走馬疳口瘡等用蠶退紙燒存性少入龍腦蜜丸如雞頭大含化小兒減少如牙宣癰腫揩貼齦上如走馬疳加麝香擦貼立愈治小兒急喉閉及纏喉風玄參鼠黏子半生半熟炒為末各一兩上為末新汲水調下立瘥治纏喉風咽中如束氣不得通蛇蛻炙當歸切焙等分上為末溫酒調一錢得吐為良未效再作切忌針灸纏喉風藥以火炊草一大把舂爛用水一鉢沖取汁漱咽中漸寬即下小續命湯入蔓荊子何首烏薄荷荊芥各少許與小續命湯多少相等咽下使一人守之連數服腫消乃退治噎方用酥蜜生薑汁和微火煎二沸每服以兩棗內酒中溫服之治尸咽語聲不出用酒二合酥一匙薑末一錢和服之日三食後服亦治肺病治噎方以手巾布裹舂杵頭糠拭齒治尸咽喉中癢痛吐之不出咽之不入如中蠱毒方含生薑五十日瘥勾藤散治風熱喉痹勾藤玄參升麻黃芩赤茯苓苦梗甘草山梔子各等分上為末煉蜜為丸如皂角子大每服燈心淡竹葉薄荷湯化或細研雄黃調下越涎散鴨嘴膽礬烏梅一個大者去皮用巴豆三粒去殼入紙裹火煨去巴豆用上為末用黃秋串根煎吞醋調少許點入口內令含咽少頃必吐出痰治小兒重齶重齦腹痛以蛇蛻炒末敷之效語音不出等疾附論夫心為言肝為語其經屬手少陰足厥陰其氣上通於舌舌者聲之機若稟受之初母懷驚怖則子之心火不足而肝木弱故令機關不利氣不宣揚而語遲甚者有經數歲不能言者蓋咽喉者氣之道路喉掩者聲音之門戶舌者聲之機唇者聲之扇風寒客於喉掩即不能發聲故卒然而失音錢氏云口噤不語失音也孫氏云口開不語音啞也閉目不語卒疾而失音目開不語久病而無聲有口開失音為風邪客於肺肺主聲而通於氣今外邪與真氣相搏真氣虛而邪氣勝故聲不通有因病吐瀉大病之後雖有聲而不能言又能咽藥此非失音為腎怯不能上接於陽故也當補腎地黃丸癇病瘥後不語者為風邪流滯於心絡使心氣不和其聲不發又云寒客於喉掩啼聲似啞人其有驚風盛發因此不作聲者蓋風涎灌於心肺也宜吐之急驚先吐後補驚癇先補後吐吐後再補有慢驚瘥後不語者並與對證驚藥並服通關散自然聲出首尾補助安神膏驚藥擇用之夫腎虛為病不能納諸氣以歸元故氣奔而上咳嗽痰壅或喘或脹髓虛多唾足冷骨痿胸腹百骸俱為之牽制其嗽愈重其氣愈乏其聲愈干君子當於受病之處圖之可也按錢氏方小兒吐瀉利其小便過多以致脾虛不食錢用益黃散作效數日以後忽爾不語錢知其脾氣已復腎氣尚虛投以地黃丸益腎相繼數劑於是能言方人參平補湯治腎虛聲不出人參川芎當歸熟地黃洗曬白芍藥白茯苓菟絲子酒浸爛研細北五味子杜仲去粗皮銼薑汁製炒去絲巴戟酒浸去橘紅半夏曲各半兩牛膝酒浸焙白朮補骨脂炒葫蘆巴益智仁甘草炙各二錢半石菖蒲一錢半上銼細每服三錢姜五片棗二枚食前煎吞山藥丸七十粒五更頭腎氣開不得咳嗽言語默然再進之杏仁煎治咳嗽暴重聲音不出杏仁水浸去皮研膏冬蜜沙糖薑汁各一錢桑白皮去赤炒木通貝母去心各一兩半北五味子紫菀茸各一兩石菖蒲半兩上㕮咀以水五升煎半去滓入杏薑糖蜜夾和微火煎取一升半每服三兩日夜服之木通湯治諸風失音木通石菖蒲防風羌活桑螵蛸全蠍白殭蠶炒各三分甘草炙三分圓白南星略炮半兩上銼每服二錢半紫蘇五葉姜五片水煎熱服之荊蘇湯失音通用荊芥蘇葉木通橘紅當歸石菖蒲桂上等分銼水煎四錢服之殭蠶散治小兒失音不語關膈不通精神昏憒殭蠶半兩羌活一錢麝香半錢上為末每服半錢薑汁少許調和沸湯浸服又以菖蒲末著舌根上頻用之又方以細辛去苗為末先用皂角一莖去皮淨刷子蘸少水就上刷令珠起然後以指蘸皂角珠點細辛於牙緊處擦之千金湯治小兒失音不語以桂心㕮咀每服一錢水半鍾煎三分去滓無時服為末著舌上即語又竹瀝飲之並瘥治氣腸聲沉用心氣湯加枳殼甘草水煎服之金花散治失音亦治喉痹用槐花新瓦上炒香熟三更後床上仰臥隨意食之熱證通用並驗菖蒲丸治受胎其母卒有驚怖邪氣乘心故兒加受母氣心官不守舌本不通四五歲長猶不能言人參石菖蒲麥門冬去心遠志取肉薑汁炒川芎當歸各二錢滴乳香硃砂各一錢細研上為末蜜丸麻子大每服粳米飲下十丸菖蒲丹治小兒數歲不語石菖蒲一寸九節遠志去心桂心去皮各一兩人參黃耆酸棗仁炒去皮黃連各半兩上為末煉蜜丸雞頭子大每服一丸用生薑湯化下不拘時服菖蒲丸治小兒心氣不足五六歲不能言舌本無力發轉不得石菖蒲二錢人參去頭焙半兩丹參三錢麥門冬去心一兩焙稱天門冬去心一兩赤石脂二錢上為末煉蜜丸緑豆大或麻子大溫水下五七丸至一二十丸不計時日三四服效又有病後腎虛不語宜兼服錢氏地黃丸一方加黃連一方無人參芍藥湯治小兒心氣不足舌本無力語遲赤芍藥一兩黃耆銼三分犀角鎊檳榔銼甘草炙各半兩上粗搗篩每服一錢水一小鐘煎至五分去滓量兒大小不計時加減溫服治小兒五六歲不語者為心氣不足舌本無力氣轉不得用赤小豆搗羅為末以酒和塗於舌上即語神效桂菖散治小兒急中卒風失者不語立效一名二物湯桂心去皮一兩石菖蒲一分上為末每服一錢水半盞煎至三分不拘時候若大病之後不語者用豬膽汁調下未語再服一方治風寒邪氣留滯失音無語豬膽汁飲之菖蒲散治小兒卒然音啞以菖蒲為丸每服一錢麻油泡湯調下如卒然不語吐出風涎即瘥用好竹瀝飲之亦治噤口心熱不語粉姜散治小兒急中卒風不語以粉乾薑為末安少許在舌上時時用之立效雞頭丸治小兒諸病後不能語雄雞頭一個炙鳴蟬三個炙焦甘草一兩銼炒大黃一兩取實處濕紙裹煨熱當歸去蘆頭三分兩切焙木通半兩黃香切焙川芎遠志去心麥門冬去心焙各三分人參半兩切去頂焙上為細末煉蜜丸小豆大旦米飲下五丸空心日進三四服兒大者加之九服效雞蟬二物宜求死者用之不可旋殺孫真人所謂殺生求生去生更遠不可不知也犀角地黃散治血證心怯語短眩憒迷忘生地黃四兩淨犀角牡丹皮芍藥上銼每服四錢入桃仁去皮尖七粒煎服如無犀角以升麻代之亦治吐血衄血治䘌桃仁湯治狐惑蟲食其臟上唇其聲啞桃仁浸去皮槐子艾葉各一兩大棗十五枚上用水二鍾煎至一鍾半分三次服之治濕證聲啞以不換金正氣散加石菖蒲水煎服如寒證啞加桂少許治之治痰症聲啞以二陳湯加石菖蒲水煎吞白丸子妙治小兒遲語取白勞所踏枝鞭小兒令速語治小兒久不語取百舌鳥主蟲咬炙食之治孩兒語遲用社稷胙酒以少許吃治伏暑發熱汗渴暑入心胞不語以小柴胡湯加茯苓水煎服之
