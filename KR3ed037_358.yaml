山根若見有此青此則名為兩度驚赤黑因兼時吐瀉紅汗多啼夜不停青脈生於左太陽一度虛驚易審量赤是傷寒微燥熱黑青聲色乳為傷右邊青脈不妨多有則頻驚歎奈何紅赤為風抽眼目青黑三朝命不過小見初誕月腹痛兩眉頻病號盤腸氣時時哭又惺翻眼仰頭者天吊腰腳曲者內瘹也小兒初誕月肢體瘦形骸頭髮毛稀少元因鬼疰胎外八片錦眼上赤脈定難量數內之中一不祥或有亂紋鋪目下更加赤脈解瞳光赤脈貫瞳人乃惡候也囟門腫起定為風此候應須也不中忽陷成坑如盞足七日之內命必終鼻乾黑燥渴難分面黑青時命不存肚大青筋無死候只恐連心直大紋目多直視白睛黃聲細牙疼不可當更兼看物騰騰慢不久應須命也亡指甲青時黑又多惡瘦唇青怎奈何忽作鴉聲心氣急此時應不免沉疴虛舌出口軟無妨氣急唇青命即亡叩齒醫人難定死聲孤魚口謾堤防蛔蟲出則有三般口鼻之中出不歡或若白蟲兼黑色靈方任選命須棄腳手生瘡痛不常下氣頻頻更滑腸氣喘汗流身不熱手拿胸膈命遭殃已上八候病中犯得一證者危惡之候也內八片錦紅黃安靜體則寧如逢紅黑便須驚更兼紅亂煎人甚轉下除驚藥有靈赤段輕微是外驚若如米粒熱非輕紅散多因喜怒乳搐搦將來豈得平忽逢相間有其青看看立便有風生紅青競碎風將起不見風疳氣隔澄亂投湯藥紫兼青急急醫持命免傾若如淨紫體還熱須知五臟有風生黑輕可治死還生紅赤傷寒痰疾停赤青已受脾風了青黑脾風作慢驚紫細紅曾六畜驚紫赤相兼則疳成紫若一同如米粒夾食傷寒事可聽紫散風傳脾臟間紫青多渴即風癇隱隱紫深難治療去風痰毒命須還紅赤連兮赤若輕必然乳母不相應有時兩手俱無見定知衝犯惡神明已上歌訣無形但觀五色浮沉長短可定死生小兒面部氣色總觀五位總作流波泛澱隔窗照藍青色者驚積不散欲發風候其神彩觀覷不穩上上下下證變風生五位總作閃爍焰射丹爐映火紅色者痰積壅盛驚悸增進其神形視物不定恍恍惚惚候變驚速五位總作混袞泥漿衣傳土牆黃色者食積症傷欲作疳候或痞癖有之其神看顧散漫昏昏沉沉其候寒熱潮發飲食不欣氣粗短滿困倦喜睡嘔噦瀉痢皆有之五位總作濈濈浮虛野露入谷白色者肺氣不利大腸滑泄水穀不分欲作吐利其眸凝濁失其精神矇矇朧朧性情不有光滑全無五臟少實百脈多虛或吐利之後有失調補五位總作漫漫黯黯塵灰彌覆黑色者傳不順證變即逆候表裡有虧臟腑欲絶其血不榮其氣不衛失序經絡流注凝滯於脈為疾危惡其神昏冒沉沉默默者為人不久虎口三關指掌虎口叉手處是也三關第二指側三節是也風關第一節寅位氣關第二節卯位命關第三節辰位夫三關者正謂男左女右手第二食指三節也頭節為命關次節為氣關下節為風關後歌所謂寅赤者正謂下節屬寅位中節屬卯位上節屬辰位也又謂上青者即第一節青也下黑者即第三節黑也非謂寸關尺也活幼口議詩小兒初生一塊血也無形證也無脈有驚須知是胎驚有熱須知是胎熱小兒生下一月餘有病如何為分別男左女右虎口看若是紫紋胎驚熱青色受胎氣不全亦有驚積多搐掣赤色必因數日前有驚因跌蹼嗔顛孩兒一歲至三歲虎口脈內看兩邊若過一關長一米定是驚風傳候起半寸病因是驚傳先須用藥鎮心裡若過第二第三節並同驚積一般説似出不出隱隱紋此乃驚傳脾臟結若還紫色難醫療青色其驚入脾竅此病呼作慢脾風好手醫人急須療或紅顏色便心寬用藥之時立見安脈過三關連指面孩童死候立須見不拘顏色白與紅十死一生休怨嘆虎口亂紋多因知氣不和色青驚積聚不亂瀉相和青即慢驚發入掌內吊多三關若通過此疾必沉疴脈候若深青情知四足驚赤因水火得紅色是人驚曲反風熱盛紋彎食上停但看叉手處方可辨真形青色大小曲人驚並四足赤色大小曲水火飛禽撲紫色大小曲傷米麵魚肉黑色大小曲脾風微作搐三關詩左有紅紋似線形定知發熱又兼驚右有紅紋如左樣脾傷驚積一齊生紋頭若似三叉樣肺熱風痰夜有聲青赤應是傷寒候只見空紅定瀉生命關上辰位氣關中卯位風關下寅位寅赤因驚積在心口乾發渴即呻吟若逢中赤還須解不解之時命必沉寅黑鬚知腎臟傳中關黑色病纏綿水驚人驚相夾雜目反直視有痰涎上青肝臟本傳留目閉身疼四肢柔一則冷邪侵胃氣中青胃逆幾時休下青驚是再驚來用藥追風可免災上下若青唇又白四肢逆冷葬泉臺上赤由兼黑脈沉或涼或熱糞多青上下一同煩渴熱更兼尿赤解方醒下黑赤脈共同隨氣粗下泄病須知漸變慢脾風證候心虛體熱早求醫赤傳辰位亦相通大便祕結熱兼風上下若逢煩熱燥小便赤色熱來攻不黑鬚紅定是驚但宣驚積自安平上下若逢因打跌熱來眼閉沒心情三關紋色形狀魚刺形主初驚在風關主壯熱吐痢在氣關主初驚風在命關極難治懸針形主瀉痢在風關主傷冷在氣關瀉傳主驚風在命關傳慢脾極候水字形主肝驚在風關主痰嗽虛損在氣關發驚喘哽在命關困不治乙字形又名曲形主食驚在風關主食傷吐痢在氣關傳變為肝刑于脾在命關困不治走蛇形主內虛外實在風關主病積在氣關主勞帶驚在命關不治來蛇形主外實內虛在風關主病積在氣關主勞帶驚在命關不治蛇中倦形內外俱虛在風關主病積在氣關主勞帶驚在命關不治弓形環形主疳積在風關熱吃主吐逆疳在氣關疳極羸瘦在命關不治亂紋樣主蟲痛在風關主蟲積食生物在氣關蟲咬心痛在命關痛熱難治珠形死候此形不拘三關見者皆死候三關指紋要訣末關命門中關氣候初關風候流珠形主膈熱三焦不和氣不調順飲食欲吐或瀉作熱或腸鳴自利煩燥啼哭環珠形主氣不和脾胃虛弱飲食傷滯心腹膨滿作熱夾食虛煩懶悶槍形者主邪熱痰盛生風神情恍惚睡不安穩欲發搐搦驚風傳授魚骨形主驚風痰熱證候已定可以截風化痰利驚退熱不作諸惡候若已傳過必作他證水字形主驚積食積膈熱煩躁心神迷悶夜啼三焦不順痰涎壅盛涎潮口禁漸加搐搦針形主心肺受熱熱極生風驚悸煩悶沉沉默默不食神困四肢垂嚲及驚風暴發痰涎壅盛搐搦等候透關射指面主驚風痰熱四證皆聚停在胸膈不能散其候所受雖重證順亦可治透關射甲主驚風惡候受驚傳入經絡風熱發生併入八候虛痰不下危急惡證難可療治黃色無形者即安樂脈也紅若無形者安寧脈有前件形者即病之脈次第而變初作一點子氣關多紅脈至於風關其色方變紫色病已傳過青色已受之極黑色其病危急純黑分明不可療治三歲已上病重危急指甲口鼻多作黑色蓋兒脈絶神困證候惡逆流珠只一點子紅色環珠其形差大長珠其形圓長以上非謂圈子總皆紅脈貫氣之如此來蛇即是長珠散一頭大一頭尖去蛇亦如此乃分其上下故曰來去角弓反張分其裡外向里為順向外為逆槍形直上魚骨分開水字即三脈並形針行即過關一二粒米許射甲命脈外透射指命脈曲里一十三位悉有輕重元由一氣自微至著從漸至總輕重參詳有云五色者曰紅黃紫青黑由其病盛色能加變又傳加進即越黃紅之色紅盛作紫又有紅紫之色紫盛作青紋又有青紫色之色青盛作黑又有青黑之色至於純黑之色不可治矣虎口手紋脈訣夫脈者血氣之先也有血氣則有脈然小兒初生至於五歲血氣未定呼吸至數大過必辨虎口色脈參合三部脈法方可察其病之善惡也男以左手女以右手觀之其色赤者主心驚顏容憔悴壯熱多啼睡中頻驚眼視直少精神其色黑者主痰毒積冷在脾與肺咳嗽重者又加氣喘其色青者肝家受氣涎熱壅閣眼如醉久則變慢驚風也其脈上出者主疳氣逆食乳知積吐逆其脈縮見入內至虎口者主食乳不消化赤白痢泄瀉脈紅可療面唇黑冷逡巡死青色難治夜多涎嗽及主天吊風寒目帶上搐搦或熱或冷面白肺風咽喉破而無聲面赤生瘡癬其脈紋彎者主冷乳在脾宿食積滯忽熱忽冷及脾寒變成瘧疾如青彎過第二節者有難消瘀水在脾腹肚虛脹小便難出大便積冷與脾虛藥服之如黑彎過三關者飲食不化吃水之時更加嘔吐肚大青筋蛔蟲頻出急與安脾胃藥服之遲即死也其外曲脈者主因驚而受風邪或即吐瀉如療之遲脈過第三節變成慢驚必死也其里曲脈者主傷熱身體壯熱頭痛多啼哭不睡時時咬人只在其中節風熱灌於心臟而眼赤與涼風藥治之其脈過第一節可治過第二節為難治過第三節為靠甲名曰絶脈不拘顏色俱死證也如紋紫色白日死如青色黑色夜死指脈紋色樣深青色主驚悸淺青主便青肚痛青黑主驚搐內吊紅赤色主驚熱淺紅主下痢腹痛如不痢主吐瀉不食深紫色主驚哭淺紫主煩渴紋彎主傷乳不吐即瀉脈紋透起指面者必發熱驚臥不安不熱則受病日深不久必變風搐若指紋生枝節者不治或有進退咨煎多睡精神不爽指紋不見者久必發驚候不治脈指訣歌小兒食指辨三關男左女右一般看皆知中初氣風候末是命關易亦難要知虎口氣紋脈倒指分形看五色黃紅安樂五脈和紅紫依稀有損益紫青傷食氣虛煩青黑之時證候逆忽然純黑在其間好手醫人心膽寒若還直下到風關粒米短長分兩端如槍沖直驚風至分作支叉有數般弓反里順外為逆順逆交連病已難叉頭長短猶可救如此醫人仔細看男兒兩歲尚為嬰三歲四歲幼為名五六次第分少長七齠八齔漸論情九歲為黃十稚子有病關隔辨其因十一癇疾號癲風疳病還同勞病攻痞癖定為停積候退它潮熱不相同初看掌心中有熱便知身體熱相從肚熱腳冷傷食定腳熱額熱是感風額冷腳熱驚所得瘡疹發來耳後紅小兒有積宜與塌傷寒三種解為宜食瀉之時須有積冷瀉須用與溫脾水瀉且與澀臟腑先將滯腸散與之孩兒無事忽大叫不是驚風是天吊大叫氣促長聲粗誤食熱毒悶心竅務須解熱卻和脾若將驚藥真堪笑痢疾努氣眉頭皺不努不皺腸有風冷熱不調分赤白脫肛因毒熱相攻十二種痢何為惡禁口刮腸大不同兒但有病不可下不熱自汗兼自瀉神困囟陷四肢冷乾嘔氣虛神怯怕吐蟲面目毛焦穗疳氣潮熱食不化鼻寒咳嗽及虛痰脈細腸鳴燥煩訝若將有積與疏通下了之時心生詫孩兒實熱下無妨面赤睛紅氣壯強脈大弦洪肚上熱胙腮喉痛尿如湯屎硬腹脹脅肋滿四肢浮腫夜啼長遍體生瘡肚隱痛下之必愈世為良凡看小兒初生至半晬之間有病即與看額前眉上髮際下以名中食三指輕手滿曲按之兒頭在左舉右手在右舉左手食指為上中指為中名指為下若三指俱熱感受寒邪鼻塞氣粗三指俱冷臟寒吐瀉若食中熱上熱下冷若名中指熱夾驚之候若食指熱胸堂不寬若名指熱乳食不和五指梢冷主驚中指熱傷寒中指獨冷主痘分男左女右看之半晬以上方可看虎口周晬以上看虎口兼一指脈若五百七十四日變蒸滿足只與看一指脈以食指袞轉分取三部此三部非寸關尺也看面氣色為一部虎口紋脈二部寸口一指脈三部五脈者上按額前下診大沖並前三部謂之五脈凡兒有患不屬惡候即不可與診大沖之脈其脈定生死之要會也其證危惡故當診之驗五臟氣絶證心絶囟腫囟陷汗出不流汗出如珠如油舒舌出口舌腫發驚瀉黑黯血髮直如麻皮膚無血色並死壬癸日肝絶啼哭無淚不哭下淚爪甲青黑眼深如陷舌卷囊捲縮發搐目斜連唇口動手如抱頭之狀或腳面直素問云其華在爪其充在筋並死庚辛日脾絶人中滿或黑唇縮翻張唇焦枯燥唇乾紫黑唇不蓋齒舌腫尿血舌縮或卷鼻孔開張齒噤冷涎如油撮口如囊面如土色四肢逆冷如濕石之狀吃乳不收瀉糞赤黑並死甲乙日肺絶有病咽湯水並藥食喉中鳴是胃管直水不能蔭肺此證醫書罕有蓋纍曾有驗必死不治目直青解目氣喘不回吃食多噎嗽痰眼上頑涎塞口喉中鳴響鼻乾黑燥鼻不通肺脹胸膈頭汗肢冷並死丙丁日腎絶面黑神昏眼黑睛腫目無光彩耳輪青黃耳輪焦枯牙齒焦枯疳牙齒落發疏黃燥膚黑皮燥驚風咬奶驚風戛齒泄屁發驚黑色繞口並死戊己日五臟相剋雜證心病目黑腎克心壬癸日絶肝病皮黑肺克肝庚辛日絶脾病唇青肝克脾甲乙日絶肺病頰赤目腫心克肺丙丁日絶腎病面腫唇黃脾克腎戊己日絶五軟惡候手軟腳軟頸軟背軟腰軟五硬惡候手硬腳硬頸硬背硬心硬五冷惡候手冷腳冷氣冷唇冷面冷五縮惡候手縮腳縮舌縮唇縮陰縮五反惡候眼反唇反舌反項反腳反五緊惡候咽喉緊唇口緊眼梢緊手腳緊陰囊緊五陷惡候囟門陷太陽陷眼輪陷胸下陷肩胛陷五腫惡候五心腫人中腫舌頭腫膝脛腫陰莖腫五喘惡候瘡豆喘驚風喘虛腫喘吐瀉喘下痢喘五盲惡候瘡豆盲驚風盲久渴盲久痢盲久瀉盲辨表裡諸證及治法表證屬陽陽病外證壯熱煩渴大小便祕澀頭面有汗昏憒氣粗揚手擲足三陽乃足三陽自頭至足太陽屬膀胱其證腰脊強頭項痛發熱惡寒乃陽證之表陽明屬胃其證目疼身熱鼻塞不惡寒反惡熱自汗不寐內實大便難乃陽證之裡少陽屬膽其證胸膈痛或口苦咽喉干目眩往來寒熱而嘔病在三陽三陰之間表證發熱頭疼惡風惡寒或身體疼痛小便清其脈浮洪浮緊浮數表虛脈浮而緩其證自汗惡風小便自利明理論曰汗出而惡風為表虛當解肌楊氏參蘇飲羌活散香蘇散加乾葛本方惺惺散解肌湯小柴胡湯表實脈浮而緊其證無汗惡寒大熱小便赤澀明理論曰無汗而惡寒為表實當表汗楊氏解肌湯楊氏麻黃桂枝湯加黃芩本方青龍湯解肌湯惺惺散並加麻黃論汗下活人書曰表病里和汗之則愈下之則死楊氏曰陽證體輕脈輕而浮於外在臟為表表有邪則知陽虛而陰盛發表之藥宜溫抑陰助陽也湯氏曰凡小兒發熱之初急須表汗次當發散然後調理要在一晝夜熱退為佳今之醫者多不用麻黃但用惺惺散羌活散之類乃常法致令失表三五日熱不除入於經絡搏於血氣表裡受邪內外蘊熱變證蜂起或作驚風或成痘證傷生性命皆失表之過當汗而不汗仁齋曰則汗血化為毒血則熱閉眩悶昏迷讝語心怯氣短發燥喘滿小便多皆血證也當汗而誤下明理論曰表未解而醫反下之胃中空虛陽氣內陷則為懊憹楊氏曰誤下則內泄其真氣邪氣得以深入為痞滿為結胸為懊憹為衄血張氏曰承氣入胃陰盛乃亡乃陰盛出外而誤投承氣下之外得寒而助邪內受虛而損正安得不亡述之為妄下之戒里證屬陰陰病外證脈沉而微其證厥冷自利煩躁無汗身熱頭疼太陰屬脾其證腹滿或痛手足溫自利不渴咽乾腹滿時痛有積少陰屬腎其證口燥舌乾而渴惡寒欲寐不欲見光明咽乾口燥胃汁干也厥陰屬肝其證唇青煩滿筋冷或渴不欲食舌卷囊縮毒入腎也里證不惡寒反惡熱手足心腋下有汗口燥胃干身熱腹滿小便如常大便堅硬其脈滑實弦緊中間數盛此里證也裡實脈沉而實腹滿身熱口氣熱大便堅明理論曰腹脹滿而短氣者邪在裡為實法當下之楊氏四順清涼飲本方解肌湯惺惺散並加大黃虛者煨用裡虛而傳陰證脈沉而微細其證自利厥冷身清四逆口氣冷煩燥而無汗身熱唇青舌黑或白胎或卷頭強額冷手足溫面色黯淡瀉青明理論曰腹濡滿而短氣者里邪虛也宜溫之仁齋曰陰病裡虛當用溫熱藥救里楊氏溫里理中湯厥冷甘草乾薑湯本方實脾散四君子湯加乾薑重加附子論汗下溫活人書曰里病表和下之則愈汗之則死仁齋曰里病體重脈重實而不浮其病在裡屬陰謂之裡有邪則為陰虛而陽盛是以攻裡之藥性宜寒抑陽助陰也又曰陰病亦謂之裡陰經受邪則成臟病里者胃腑之主而臟受病又深於里焉又當助陽以救里法當溫之是以溫陰之藥性宜熱助陽抑陰也當下而失下楊氏曰致血氣不通是以熱燥而厥深厥者手足冷也陽盛則厥其脈滑數指爪時溫當下而誤汗楊氏曰外泄其正氣內邪乘虛而出為讝語為亡陽動經下厥上竭至於陽厥似陰張氏曰桂枝下咽陽盛則斃正恐陽盛而入誤以桂枝汗之內得熱以助邪外受虛而損正安得不死述之為誤汗者戒小兒諸病惟熱最多先當辨其虛實隨證治之虛熱其證面色青白身微溫口氣冷手足心不熱大小便自利恍惚神慢噓氣軟弱泄瀉多尿虛汗自出叔和曰虛熱不可大攻熱去則寒起惺惺散豬苓湯四君子湯錢氏白朮散實熱其證面赤氣粗口熱燥渴唇腫大便難掀揭衣被煩啼暴叫在表宜汗青龍湯解肌湯並加麻黃在裡宜下四順飲解肌湯加大黃黃芩麻黃鬱金冷熱不調其證身體乍清乍溫乍涼乍熱上盛下泄水穀不分楊氏敗毒散加木香本方解肌散加肉桂木香汗下熱不除仁齋曰退表熱宜微汗退裡熱宜微利汗下而熱又在表乃表裡俱虛氣不歸元陽浮於外不可再用涼藥及再汗下當和胃氣使陽氣收斂歸內其熱自止宜參苓白朮散本方實脾散柳叔舉云若已經汗下大熱未除恐防痘證不可妄用涼藥餘熱不除仁齋曰用涼藥不可十分盡蓋熱去則寒起古人戒之或餘熱不除不足關心但用川芎茯苓甘草白朮少用白水煎以和胃氣收斂浮陽纍用取效又曰凡壯熱煩躁已用柴胡黃芩大黃解利之其熱乍輕乍進宜用黃連能瀉心川芎活血赤茯苓利小便生地黃退熱入燈心一捻水煎服心血一調其熱自退冷證其脈沉而微遲其證面色青白身溫冷口氣冷大小便自利手足冷乳食不化隨證用藥治之寒熱往來明理論曰陽勝則熱陰勝則寒乃陰陽相勝也寒為陰熱為陽里為陰表為陽邪客於表與陽爭則為寒邪入於裡與陰爭則為熱邪在半表半裡外與陽爭為寒內與陰爭為熱邪在半表半裡則寒熱亦半矣審其寒熱多少知其表裡邪氣淺深小柴胡湯主之內經曰熱淫於內以苦發之必先散熱以苦寒為主柴胡為君黃芩為臣以成徹熱發表之劑人參味甘平邪氣傳裡甘以緩之用人參甘草為佐以扶正氣半夏味苦辛微溫邪初入里辛以散之以三味佐柴胡和里生薑味辛溫大棗味甘溫經曰辛甘發散是以生薑大棗為使和柴胡以和表七味相合兩解之劑則當矣仁齋曰小柴胡非獨和解表裡大能解血熱消惡血蓋傷寒一二日調治失宜必致傷血此藥內有黃芩柴胡最能行血但藥性差涼宜以寒熱輕重用藥溫涼加減得法本方解肌湯內此方藥味俱用詳審用之毋為熱過冷誤乃良工也素問虛實五虛身寒脈細不食前後和汗出五實身熱脈大能食悶瞀大小便不利石壁胡大卿痘疹方論虛實飲食進退則知人穀氣之虛實大便滑澀則知人臟腑之冷熱實者稟氣壯實夏酷暑而不畏熱冬嚴寒而不畏寒虛者稟氣怯弱易寒易熱見天氣寒陰則感寒而腹痛遇天氣稍炎則中暑發熱朱氏集驗方論虛實小兒面如桃花色乃童顏也大便黃稠小便清徹手足和暖乃表裡俱實其子易養無病不必服涼藥恐傷胃氣證傳吐利不可服熱藥者七足脛熱兩腮紅大便祕小便赤渴不止上氣急脈緊數不可服涼藥者七足脛冷腹虛脹糞色青吐乳食眼珠青面青白脈沉微楊仁齋論虛實貴賤五實脈盛大熱腹脹前後不通瞀悶五虛脈細皮寒氣少前後泄利乳食不進貴賤膏粱之腹與藜藿之腹不同韋布之軀與純綿之軀各異論曰諸病出者為虛入者為實陰出乘陽陽入乘陰言者為虛不言者為實緩者為虛急者為實陰靜則緩陽燥則急濡者為虛堅者為實療者為虛痛者為實外痛內快者外實內虛外快內痛者外虛內實其有心腹皮膚內外俱痛按之而止虛也按之而痛實也經所謂皮虛則熱脈虛則驚肉虛則重筋虛則急骨虛則痛髓虛則惰腸虛則泄三陽實三陰虛汗不出三陰實三陽虛汗不止錢氏治法出潔古錢氏補遺五臟五邪在前為實邪子能令母實拒賊不敢傷於母其子又引母所克者妻相助故曰實邪也在後為虛邪母引子之賊至由此此母能使子虛也內經曰子能令母實母能令子虛此之謂也妻來乘夫為微邪夫來乘妻為賊邪法當瀉賊補本臟本臟自病為正邪法當虛則補之實則瀉之內經曰滋苗者必固其根伐下者必固其上逆其根則伐其本伐其本則敗其真矣心主熱自病或大熱瀉心湯主之實則煩熱黃連瀉心湯主之虛則驚悸生犀散主之肺乘心微邪喘而壯熱瀉白散肝乘心虛邪風熱煎大羌活湯下大青丸脾乘心實邪泄瀉身熱瀉黃散腎乘心賊邪恐悸惡寒安神丸肺主燥自病喘嗽燥則潤之實則喘而氣盛瀉白散主之虛則喘而少氣先益黃散而後阿膠散心乘肺賊邪熱而喘嗽先地黃丸中導赤散後阿膠散肝乘肺微邪惡風眩冒昏憒嗽羌活膏腎乘肺實邪憎寒清利百部丸脾乘肺虛邪體重吐痰泄瀉嗽人參白朮散肝主風自病則風搐拘急肝苦急急食甘以緩之佐以酸苦以辛散之實則風搐力大瀉青丸虛則風搐力小地黃丸心乘肝實邪壯熱而搐利驚丸涼驚丸主之肺乘肝賊邪氣盛則引伸呵欠微搐法當瀉肺先補本臟補肝地黃丸主之瀉肺瀉白散主之脾乘肝微邪多睡體重搐先當定驚搐瀉青丸主之搐止再見後證則別主法治之腎乘肝虛邪憎寒呵欠搐羌活膏主之脾主濕自病則瀉泄多睡體重昏倦脾苦濕急食苦以燥之實則泄赤黃睡不露睛瀉黃散虛則瀉白色睡露睛白朮散肝乘脾賊邪風瀉而嘔茯苓半夏湯主之心乘脾虛邪壯熱體重而瀉羌活黃芩蒼朮甘草湯主之肺乘脾實邪能食不大便而嘔嗽煎檳榔大黃湯下葶藶丸腎乘脾微邪惡寒泄理中丸之類腎主寒自病則足脛寒而逆人之五臟惟腎無實小兒瘡疹變黑陷則是腎實水克心火是以水能制火也心乘腎微邪內熱不惡寒桂枝丸肺乘腎虛邪喘嗽皮澀寒百部丸肝乘腎實邪拘急氣搐身寒理中丸脾乘腎賊邪體重泄瀉身寒理中丸本臟虛弱是自己正令不行乃賊之所克害當補本臟之正氣假令肺病喘嗽時於初春見之法當補腎見於夏救肺見於秋瀉肺見於冬補心瀉本臟乃名寒嗽大抵五臟各至本位即氣盛不可更補逢所克位不可更瀉外感風寒小兒外傷於風拘急呵欠頓悶皮毛澀口中氣熱當發散秋冬用溫熱藥春夏用涼寒藥若不熱飲水能食不大便用大黃丸作散子服之如身表無大熱而小便不利是為有濕熱結膀胱仍用勝濕藥白朮茯苓之類利小便則其熱自退如清便自調慎不可妄下恐外熱逐於內而變結胸危證多矣肝熱肝主謀勇熱則尋衣捻物瀉青丸肺熱肺主氣燥熱則壯熱飲水喘悶鼻乾燥手捫眉面瀉白散肺證復有風冷胸滿短氣氣急喘嗽上氣皆是肺氣有餘復感風邪之所傷謂之微邪先瀉肺瀉白散而復發散大青膏肺臟虛怯唇乃肺所主紅則肺虛熱少服瀉白散色白者肺虛怯也可補之阿膠散若唇白無澤者難治心熱是積在心經內心自主熱合面而睡有就涼之意口中氣溫上竄搖頭咬牙皆心熱也導赤散主之心實則上下氣壅喜仰臥氣得上下通也瀉心湯主之溫中丸亦妙腎氣不足下竄者是也兩足熱不喜衣服臍以下皆腎之所主緣心氣下行於腎部也此乃腎不足而心有餘宜地黃丸肝勝肺肝病身熱發搐又見肺虛喘而氣短病見於申酉戍時是肝真強也內經云受所制而不能制謂之真強法當補脾肺而後瀉肝導赤散瀉青丸肺勝肝肺病喘嗽氣盛見於寅卯辰時木之位又以見肝怯弱少力正謂賊邪所克法當補肝瀉肺若肺病嗽久虛羸無實不得瀉肺只宜用地黃丸補之不可用瀉白散何謂也經云虛則補之實則瀉之肝風目連札目直視不能轉視或極則身反折強直皆風熱也瀉青丸導赤散地黃丸主之目者肝之竅屬木木性急故如是也當補腎瀉心發搐相勝男為木左視木位右視金位相擊則有聲男反右視女反左視亦皆有聲早辰發搐潮熱於寅卯辰木之位是肝旺也當補腎水以制心火瀉肝以止其搐日午發搐巳午未火之位而發潮搐者心熱也導赤散涼驚丸日晚發搐肺之位而肝強法當補脾恐被木之賊所克害先瀉心肝以挫其強勢瀉心導赤散瀉肝瀉青丸而後補脾益黃散夜間發搐皆因大病之後脾胃虛損多有此疾法當補脾涼心益黃散傷風發搐因傷風而得之口中氣熱呵欠頓悶項急強手足搖如此者同大人傷風寒疾病之類當辨有汗無汗陰陽二證用大青膏小續命之類開發則愈小續命湯方當用仲景方中者是也非局方也傷食發搐謂不因他病忽然而發搐此因飲食過度致損脾胃故見多睡或吐不思飲食脾胃既虛引肝風則發搐當先定其搐加羌活防風煎下瀉青丸後用白餅子下其食漸漸用調中丸異功散養其氣急驚陽證也俱腑受病爾小兒客疾熱於心膈是少陽相火旺經云熱則生風因聞大聲而作蓋謂東方震卦得火氣而發搐火本不動得風而動當用利驚丸導赤散瀉青丸地黃丸主之搐止服安神丸慢驚陰證也俱臟受病爾蓋小兒吐瀉病久脾胃虛損若不早治則成慢驚風名曰瘛瘲似搐而不搐也因脾胃虛損故大便不聚當去脾間風先以宣風散導之後用使君子丸益黃散則其利自止既以失治則脾肺俱虛致被肝木所乘是為慢驚也當用溫補羌活膏論瘡疹素問云諸痛癢瘡皆屬於心夫癍疹者相行君命三焦真陽之氣所作也若陽氣入於脾則變膿胞入於肝則成水癍自病為癍也心之君火入於肺作癮疹謂肺主皮毛君火不害肺金此乃君之德也辨傷風與癍疹凡傷風則皮澀拘急鼻塞癍疹則睡中發驚悸呵欠嚏噴足為是識也瘡疹輕重候凡未出而發搐者是外感風寒之邪內發心熱之所作也當用茶粉下解毒湯犀角地黃湯主之一發便密如針頭形勢重者合輕其表而涼其內連翹升麻湯若癍已發密重微喘飲水者有熱證用去風藥微下之若出不快清便自調知其在表不在裡當微發散用升麻葛根湯若青乾黑陷身不大熱大小便澀則是熱在內煎大黃湯下宣風散若身表大熱者表證未罷不可下若癍疹已出見小熱小便不利當利小便已發後有餘毒未散復有身熱瘡腫之類當用茶粉下解毒丸瘡疹已出後有聲音者乃形病氣不病也若瘡疹出而聲音不出者是形氣俱病也當清其肺氣當用排風湯並涼膈散去硝大黃亦可吐瀉脾胃病夏月心火用事治吐瀉不可用溫暖藥秋用溫藥秋深用暖藥更有五臟兼見證如有風瀉防風羌活有熱瀉黃芩大黃有寒瀉附子有濕瀉白朮茯苓有肺瀉芍藥桂定喘荊芥人參如甚加檳榔木香大便不通則加大黃更詳看病新舊新則止之久則有腸風之患宜推陳致新法當宣風散導過以間藏君臣藥調之益黃散凡大瀉引飲者其病不以新久皆宜服白朮散痢病亦可吐瀉咳嗽是風木入於脾母虛其子亦弱法當煎榨榔豆蔻湯下大青膏後服益黃散身熱吐瀉大渴小便必少是熱入膀胱亡失津液此為大逆是陰陽相乘也五苓散主之身涼吐瀉不渴則知為寒瀉當補之煎附子桂枝湯下大青膏陰陽相乘肝入於胃故發熱而嘔當服白朮散後煎檳榔木香湯下大青膏腹脹虛實凡久病吐瀉之後虛則其脈微細肺主目胞及腮脾主四肢若色淡黃目胞腮虛腫手足冷合先服塌氣丸復服異功散和中丸四君子湯益黃散之類諸溫藥以養其氣實則脈洪實不因吐瀉久病之後亦不自利不腹脹而喘急悶亂更有痰有熱及有宿食不化而腹脹宜服白餅子大黃丸解毒丸下之兼須詳認大小便如都不通先利小便後利大便傷寒表裡攻發有表證者惡風惡寒當發表如氣盛能食不大便無表證可攻裡春主生屬木身溫當發汗夏主長屬火身熱而煩躁合大發散長夏主化屬土及居四季同當調其飲食秋主收屬金身涼內溫合微下冬主藏屬水身大寒內熱合大下其溫熱而惡風寒是也熱在外而寒在內身涼寒而惡熱是熱在內而寒在外惡風者白朮湯惡寒者神術湯能食便結無表可攻裡通膈丸五黃丸春身溫可汗神術湯夏身熱煩躁可發散神術加黃芩湯長夏四季同調飲食四君子湯秋身涼內溫微下通膈丸金花丸冬身大寒內熱合大下宜調胃承氣湯熱在外寒在內調中湯凡熱在內寒在外三黃湯後有潔古老人法是依四時陰陽升降順剛柔而施治氣升則發之氣收則下之有汗發熱惡風脈浮緩者風傷衛桂枝湯無汗發熱惡寒不當風而自憎寒脈當浮緊者寒傷榮麻黃湯有汗發熱惡風脈浮緊無汗惡風脈浮緩謂之榮衛俱傷青龍湯桂枝麻黃各半湯無汗發熱不惡風寒脈沉洪者可下之更詳其厥與不厥量寒熱淺深而治之有汗四肢厥脈沉微名陰厥四逆湯無汗四肢厥脈沉滑者名陽厥大承氣湯加膩粉如四肢不厥身熱內外皆陽不動涼藥三服下之黃芩甘草湯連翹飲子黃芩芍藥湯小柴胡湯黃芩梔子湯涼膈散黃芩白朮湯八正散黃芩蒼朮湯白虎湯之後忽然而作二者因久病或取轉過度致脾虛引飲白朮散三者因患溫熱病熱結膀胱小便不利大渴引飲有表裡證者五苓散亡失津液脾胃病若病後久虛亡水者是飲食不能榮養致脾胃久虛亡失津液合榮養胃氣白朮散或初病大小便澀亡津液飲水者是為陽合用勝濕利小便藥五癇如有客疾發熱而有聲煎大黃湯下五色丸為心之所主潮熱有時積熱也桂枝丸主之壯熱不退當用地骨皮散五色丸白虎湯蒼朮防風湯風熱當用防風黃芩湯下大青膏穩妥下熱當用白虎湯加蒼朮五色丸黃病陽黃則大便赤澀身熱是脾土與心火相搏故為陽病法當先利小便後下大便陰黃則清便自利面目及身黃四肢冷是脾虛不能制腎水當用益黃散下使君子丸凡治黃病脹當用茵陳蒿湯調下五苓散若先利小便去大黃利大便則加大黃之類有陽證者可服謂面赤飲水者是也黃病血氣不足疸病一身盡黃大小便澀煎茵陳蒿湯調下五苓散病後身微黃者胃熱也瀉黃散淡黃白者胃不和也平胃調中丸渴者人參白朮散諸疳證疳者小兒病癖或久吐瀉醫者妄投轉過之藥小兒易為虛實致之胃虛而失津液內發虛熱外消肌肉一臟虛則諸臟皆弱其病目胞腫腹脹痢色無常漸加瘦瘁久不痊可是腸胃有風積法當用宣風散導之後各依本臟補其母脾肉疳益黃散肺皮疳阿膠散心血疳安神丸肝筋疳地黃丸腎骨疳亦宜地黃丸大抵小兒疳病肌瘦血氣不足同大人癆瘵之疾乳食不消初起忽然氣不和四肢亦冷面目色白無光澤精神不定此乃胃氣不和可以大溫藥治之使君子丸益黃散若病泄瀉日久不瘥乳食不化是脾胃有風合先服益黃散二服後用宣風散導之後更宜再補胃咳嗽肺之生病而成咳嗽大抵秋冬病則實春夏病則虛更詳五臟兼見之證以辨虛實若實則面赤飲水身熱痰涎盛涕唾稠黏咽乾不利喘而面腫吐食皆當先補脾後瀉肝益黃散瀉青丸若咯膿血是肺痿也用清肺藥治之若虛則面白脫色氣少不語喉中有聲唾痰清利法當用阿膠散補之若亡津液用白朮散目內有五色五色甚者瀉本臟色淡淺者宜補之不澤不常者死黑是閉合發散抵當湯白是寒小便清四逆湯黃赤是熱用承氣湯瀉本臟青是腹痛捻頭散主之或桂枝湯五臟標本肝在天為風在地為木在人為肝在時為春腎水為母心火為子克脾土主筋主藏魂其聲呼其液泣其味酸上應眼外應爪甲其色青不欲如藍青欲如蒼玉之澤不欲如藍肝主風風喜疏暢鬱則傷肝病主驚風怒氣逆則傷肝氣痘主水疱燥氣勝則病面白為逆金邪剋木也肝病面青筋急多怒目閉不欲見人臍左動氣肝實目赤多怒頭眩痛引兩脅小腹之下肝虛目昏胸痛筋縮拘拳恐懼如人將捕肝絶唇吻反青四肢多汗平脈春王七十二日春則弦緩而長春弦者端直之狀細弱而長賊脈浮澀而短金剋木也危脈弦如張弓弦心在天為熱在地為火在人為心在時為夏肝木為母脾土為子克肺金主血主藏神其聲言其液汗其味苦上應舌外應掌其色赤赤欲如帛裹朱不如赭心主熱熱則傷心病主驚熱憂愁思慮則傷心神痘主紅班寒氣勝則病面黑為逆水剋火也心病面赤喜笑心煩掌熱口乾開目妄語臍上動氣心熱口乾喜笑身熱汗出胸脅膺背痛滿心虛恍惚多驚憂煩少色咳唾舌強腰背痠疼心絶搖頭直視形如煙燻平脈夏王七十二日夏則洪緩夏洪者大而散來疾去遲賊脈沉澀而微水剋火也危脈鉤如操帶鉤脾在天為濕在地為土在人為脾在時為四季心火為母肺金為子克腎水主肌肉主藏意智其聲歌其液涎其味甘上應口外應四肢其色黃黃欲如羅裹雄黃不欲如黃土脾主濕濕則傷脾病主乳食飢飽則傷脾痘主濕風氣勝則病面青為逆木剋土也脾病面黃善思善嗜體重節疼四肢不收怠惰脾實肢體重著而不舉腹脹尿祕而苦飢脾虛吐逆泄痢乳食不消腹脹腸鳴四肢無力脾絶臍突唇反環口黧黑柔汗發黃平脈四季之月各王十八日土之脈溫厚氣行臟腑之間平和不得見其衰則見焉賊脈弦長而緊木剋土也危脈狀如雞雀啄止而復來肺在天為之燥在地為金在人為肺在時為秋脾土為母腎水為子克肝木主氣主藏魄其聲哭其液涕其味辛上應鼻外應皮毛其色白白欲如白玉之澤不欲如堊肺主燥燥則傷肺其病嗽形寒飲冷則傷肺痘主膿疱熱氣勝則病面赤為逆火邪乘金也肺病面白悲愁嚏哭吐衄喘咳寒熱脅右動氣肺虛呼吸少氣鼻涕嗌乾喘亡咳血肺實喘促咳嗽上氣鼻塞脛股肩疼胸滿肺絶汗出發潤喘而不休毛焦皮枯平脈秋王七十二日秋則脈浮秋毛者稀軟之狀輕虛以浮賊脈浮大而牢火剋金也危脈毛如風吹毛腎在天為寒在地為水在人為腎在時為冬肺金為母肝木為子克心火主骨主藏精與志其聲呻其夜唾其味鹹上應耳下應腰腎其色黑黑欲如漆重澤色不欲如炭腎主寒寒則傷腎其病疝淫欲則傷腎痘主黑陷濕氣勝則病面大黃為逆土邪乘水也腎病面黑恐欠足寒逆氣腹痛飧泄後重臍下動氣腎實腹膨體重少氣不言骨痛飧泄小便少腎虛心懸如飢胸痛引脊厥逆泄多耳鳴腎絶反目直視狂言遺尿腰折骨枯平脈冬王七十二日冬則沉濡而滑舉指來疾賊脈緩而大土剋水也危脈石來如奪索去如彈石
