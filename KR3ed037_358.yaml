body:
  text: 卷三百五十八嬰孩門總論夫醫之道誠為難矣而治小兒為尤難理寧醫十丈夫莫醫一婦人何也丈夫者營衛氣壯婦人血脈相沖兼産難治千金云婦人之病比男子十倍難療寧醫十婦人莫醫一老人何也婦人者氣血尚盛老人元陽枯竭氣血皆衰故老人為難治寧醫十老人莫醫一不語小兒何也老人雖元陽枯竭氣血皆衰疼痛即能言小兒不能言精神尤未備骨肉尤未堅形聲尤未正脈息尤未全所以難治者語不能問其得病之由脈不能診其必然之理故黃帝云若吾不能察其幼小也寶鑑云冠壯易明幼童難治活幼論危氏得效方云嘗謂木有根荄水則有源根荄盛則枝葉暢茂源深則其流必長小兒稟父母元氣而生成元氣盛則肌膚充實驚疳積熱無由而生風寒暑濕略病即愈元氣虛則體質怯弱諸證易生所患輕則藥能調治所患重則可治者鮮故試晬之後或不能言或不能行或手拳不展或發不生斯猶可治甚則初生之時臍風撮口吊腸等證鎖肚重舌無聲舌焦遍體青黑如此病狀非急療則百無一活若其餘諸病不一治之之道當觀形察色聽聲切脈觀形則先觀其眼若兩眼無精光黑睛不運轉目睫無鋒芒如魚眼貓眼者不治或神藏於內而外若昏困神氣不悅則豈無再活之理察色者若面目俱青眼睛竄視此為驚邪入肝面紅頰赤惕恐夜啼則驚邪入心面青惡叫齧奶咬牙乃驚邪入腎面色淡白喘息氣乏則驚邪入肺面黃嘔吐不食虛汗多睡乃驚邪入脾皆隨其狀而治之聽聲則睡中驚啼聲浮者易治聲沉不響者難痊或聲如鴉中彈者不治至於切脈虛則細而遲實則洪而數次當看紋候男左女右手辨之從虎口內至第一節是風關第二節是氣關第三節是命關第一節風關赤紋乃飛禽內外驚赤紋微乃火驚黑則水驚兼打撲驚青色乃天雷四足驚內隱青紋微屈則是急風候紋彎乃停食候第二節氣關紫色紋是驚疳青色紋乃疳傳肝經白則疳傳肺經若黃色乃傳脾經黑色難安第三節命關青黑紋現三關通度斜歸指甲則不治至於驚疳積熱四證驚者虛惕怔忪氣怯神散痰涎來去其瀉必青積漸生風其證有冷熱虛實冷則燥之熱則涼之虛則溫之實則利之是為活法急驚之候通關截風定搐去痰其熱尚作則當下之一泄已後急須和胃鎮心不可過用寒涼等劑其或口中出血兩足擺跳腹肚搐動摸體尋衣神昏氣促噴藥不下通關不嚏心中痛絶忽大叫者難愈慢驚之候宜於生胃氣藥和以截風定搐不可太燥其或四肢厥冷吐瀉加嗽面黯唇慘胃痛鴉聲口生白瘡髮直搖頭喘急涎鳴口眼手足一邊牽引者難愈慢脾十救一二只當生胃回陽如太衝脈在則取百會穴多灸之若身冷黏汗直臥如尸喘嗽頭軟大小便不禁虛痰上攻呼吸氣粗脈來浮數是謂陰盛強陽錯認陽氣已復直與峻藥下痰痰隨氣下人以醫殺咎之此則覆燈將絶之證雖不藥亦無生意矣又有喉中痰涎聲如拽鋸一兩日間閉目不開此為虛痰保養其氣勿遽下痰亦未可保蘇合香白丸子輩姑與之痙病發癇天瘹亦風之種類舉身僵仆有汗不惡寒手足冷口噤為柔痙無汗惡寒身反張咬齧為剛痙得之未易施治諸癇八證馬癇張口搖頭馬鳴反折羊癇喜揚吐舌犬癇手屈兩足拳攣雞癇搖頭反折並屬陽豬癇口吐涎沫振目視人牛癇目視腹脹鳥癇唇口撮聚手足俱搖蛇癇身軟頭舉吐舌視人並屬陰治法須辨其冷熱順氣平血豁痰除風其或目睛不轉口噤無聲唇面青黑肚脹不乳身熱下血厥逆吐利汗出壯熱不止體軟不睡眼生白瘴不治之候天瘹者壯熱翻眼手足搐掣如魚之上鉤皆由乳母過食熱毒遄復乳兒兼挾風邪所致但當解利風熱則應手而愈驚風諸證有不可治者總而論之項筋無力魚口氣粗齧齒咬人瀉下如瘀血手足搐搦不停目似開不開身軟口噤不食木舌乾澀反張脊強囟陷不動啼不作聲冷汗如雨慢脾灸不醒視物不轉睛眼上赤脈雖盧扁復生亦無如之何若疳候兒童二十歲已下為疳二十歲以上為癆癆與疳皆氣血虛憊臟腑受傷故有肝心脾肺腎五疳外有蛔疳脊疳腦疳乾疳疳渴疳瀉疳痢腫脹疳癆無辜疳丁奚哺露治之各有方其病多因乳哺失常腸胃停滯或妄服吐下藥津液內竭而得之故其為候頭皮光急毛髮焦稀腮縮鼻乾口淡唇白兩眼昏爛揉鼻撏眉脊聳體黃鬥甲咬牙焦渴自汗漩白瀉酸肚脹腸鳴癖結潮熱或身多瘡疥酷嗜瓜果鹹酸炭米泥土多飲水者皆其證也惟腎疳害人最速者蓋腎虛受邪熱疳氣奔上焦故以走馬為喻初作口氣次第齒黑盛則齦爛熱血迸出甚則齒脫宜急治之縱得全活齒不復生其餘諸疳如或飲水不止滑泄不休舌上黯黑目睛青筋眼角黑氣小便如乳牙黑骨枯脫肛咳逆氣促身上粟生斑黑唇白腹高人中平滿抱著手足垂嚲無力襯著腳心全不知疼身體變冷為五絶積者面目浮黃肚緊脹痛覆睡多困酷啼不食或大腸祕澀小便如油或便利無禁糞白酸穢皆其證也其或面黑瀉黑肚腸泄下不止氣粗身必有瘡瘦弱柔軟亦莫能療熱之為病有實有虛實者兩臉深紅唇口紅紫燥渴焦煩大小便難啼叫無時身發極熱虛者面色青白恍惚微潮口中清冷泄瀉虛汗或乍冷乍溫上壅下利水穀不分乃冷熱不調外有十證熱者潮熱如瘧風熱不減乳食積熱多吐傷寒腳手冷耳鼻腳梢手指尖冷乃麻疹之證唇汗口珠乃變蒸候也多瀉多渴疳之為熱面青脈大驚熱的矣脾痛啼聲不息疸毒瞭然目閉面如丹胎中全不受熱諸吐乳食不化面色黑隨食隨吐通身冷則為不治諸瀉日久不宜緊澀之藥卒止先須調氣和中若洞瀉不止乳食不進無有愈期汗多舌出唇紅眼閉搖頭氣粗兩脅動口生血瘡吐瀉得之名曰胃爛夭亡轉盼至於八痢則有魚口噤口五色脫肛臟毒脾毒冷積疳痢無非便下膿血裡急後重臍腹急痛日夜無度治之須究其因先以去積寬腸通氣之劑續為之斷下鮮有不愈其或所下如魚腸血水壯熱煩渴不食自汗小便不利未知有瘳一瘡疹一證乃表虛里實其根於臟腑所患之重麻疹表實裡虛其根於皮膚所患之輕不治亦自愈至若痘疹多因時令不正氣候轉染加之外感風寒內積邪熱而得大抵與傷寒相類發熱煩燥臉赤唇紅身疼頭痛耳鼻腳梢手中指俱冷噴嚏呵欠喘嗽痰涎或乍寒乍熱疑似之間當視其耳後有紅脈赤縷及見心胸間細點如粟起為真首尾不可汗不宜溫涼之劑解毒和中安表大要如疱人作籠炊樣務得松耳其或熱極生風或發驚搐但當清心散風切不可投冷驚之藥及灼艾蓋灼則火助熱熾投冷驚藥則毒氣內伏反為大害仍忌諸般臭穢煎炒油煙父母行房梳頭等觸犯未發而觸則毒氣入心悶亂而死已發而觸則瘡痛如割以至黑爛切宜禁戒仍燒帶諸香及打醋炭噴胡荽酒於遍房以闢穢濁之氣卻不可以田舍兒不忌無恙為常法病此者多不服藥豈知未發已發則合解散正發則合活氣血若依此非惟出疏亦易干斂仍免後慮若不依此則邪盛瘡密收亦費力餘毒為患致生癰疽疥癆赤眼咽喉口瘡之疾至於善惡之證猶當細認如善證則乳食如常大便或一日一次或兩日一次通者只須用和不冷不熱之藥自保十全如惡證則春夏屬陽為順秋冬為逆冬月寒腎水得時多歸於腎或先如瘧後發渴其瘡色如黯血此腎證也不治春膿疱為金剋木夏黑陷為水剋火秋斑子為火剋金冬疹子為土剋水並逆鼻有黑氣或舌黑瘡已出而譫語燥渴小便澀泄瀉不入食瘡成餅塌黯慘不發其聲焦啞兩眼閉而黑睛矇昧面腫鼻陷目閉頻齧齒頭面腫硬胸高而突以上證狀均不可治外此至於風寒暑濕之感與大人無異治之法特劑量差少耳雜證則隨方備治辨形色附論全嬰方論云夫嬰兒未能言有病固難治也唯察形色而已蓋形有五色應其五臟五色青黃赤白黑五臟心脾肝肺腎心赤肝青脾黃肺白腎黑是五臟所主人蘊其內必形於外故小兒有病先見於面部也如形病不相應者更切脈聽聲分五臟五色應面部形骸左頰屬肝東方之應其位居左脈訣云色青形象木位列在東方右頰屬肺西方之應其位居右脈訣云兌為八卦地金屬五行牽額上屬心南方之應火性炎上脈訣云象離隨夏旺屬火向南生鼻上屬脾中央之應其位居中脈訣云旺時隨四季自於土為根下頦屬腎北方之應水性潤下脈訣云旺冬身屬水位北定無疑難經曰五臟有五色皆見於面素問云神之變也其華在面又云視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也錢氏云左頰為肝右頰為肺額上為心鼻上為脾下頦為腎赤者熱隨證治之定四季色各歸部位驗病春色左頰微青者平深青者病白色者絶夏色額上微赤者平深赤者病黑色者絶秋色右頰微白者平深白者病黑赤色者絶冬色下頦微黑者平深黑者病黃色者絶季色鼻上微黃者平深黃者病青色者絶季色者四季月各其十八日土旺脾分五臟面部病證額上心證赤色者心經有風熱主心躁驚悸睡臥不安青黑色心中有邪主驚風腹疼寶鑑云心乃中邪手瘛瘲而啼叫青黑甚則心腹疼微黃色皮乾燥主盜汗頭髮干黃燥主驚疳骨熱微渴王氏云毛髮黃必時復發熱故也左臉肝證赤色身熱拘急肝風熱也青黑主驚或腹痛淺赤潮熱心躁有一等小兒夜間潮熱日中面臉不赤必唇紅乾燥恐驗不真兼診脈緊數右臉肺證赤色身熱淺色潮熱或大便堅而氣粗壅嗽青白色主咳嗽噁心青色主風入肺時時嗽青黑主驚風欲發或腹疼盤腸內吊鼻上脾證赤色身熱不思飲食深黃色小便不通鼻孔乾燥氣粗主衄血鼻孔乾燥不氣粗是肺熱夜間多哭鼻上淡白色主泄瀉食不化王氏云鼻青主吐奶鼻口乾燥主大小便不利下頦腎證赤色主裡有熱則水道不利令小便不通分面部雜病證面目證青色驚肝風熱赤色心肝熱主煩躁風熱黃色主脾積口臭不食目鮮主驚目眨肝風熱主驚目疱浮腫主久嗽噁心如不嗽主疳食積夏秋大便不調春冬主骨熱或時腹痛亦主夜起王氏云兩目疱腫早晚面浮是脾受積目睛黃赤主早晚發熱兩目深沉色微黑眼睛微赤主耳聾聹耳是疳氣攻腎眼尾有細碎紅紋主驚風內吊已上四證王氏云眼矇朧主肝熱多變雀目其狀黑睛外如金線緣是也靈祕云盛熱眼矇朧又曰睛黃臟腑有積寶鑑云青在兩眼是驚欲發在左上必多驚悸右上風入肺為嗽脈要云目赤偏多怒孫真人云揩拭眉眼是欲生風印堂證青黑色主腹疼夜啼如傷風主頭疼不傷寒主久痢靈祕云痢候眉頭皺王氏云眉心中淡白色主泄瀉糞白食物不化人中證寶鑑云人中左右兩邊黃主傷食人中下青主乳不化便青唇口證唇白主吐涎嘔逆亦主吐血便血唇紅赤乾燥而皺者主渴唇紅赤不皺主口臭大便不通夜間心躁不睡紅乾而燥主熱王氏云口臭唇黃脾受積後必發腫亦主夜起糞白不化又云唇紅口紫吐涎主蟲痛飛仙論云唇口紫不吐涎是積痛千金云唇纈赤主心熱口舌生瘡至聖訣云唇紅赤主衄血唇白亦然唇口動主驚熱靈祕云口滴清水欲生重舌又主口瘡有一等小兒脾冷流涎下頸常濕名滯頤不在此條錢氏云口頻撮氣不和益黃散又云血虛怯為冷所乘則唇青孫真人云唇青主脾寒或時肚疼乳食減少舌上證舌乾舌黑舌燥舌胎黃舌赤腫主大便不通設或通利大便必焦黃舌裂舌上芒刺舌上出血皆極熱陽毒也舌上生瘡心脾熱舌卷主驚有久瀉痢舌黑必潤不可認為熱蓋久痢上焦虛久瀉舌黑者多死不治氣噎證氣噎不通必主驚候靈祕云噎欠須知死嘆氣哽氣下氣頻呵欠主驚兩耳證王氏云耳前微赤主耳聾微黃主腎驚睡中咬牙耳