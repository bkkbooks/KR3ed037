body:
  text: 卷三百八十六嬰孩諸熱疸腫門熱渴附論夫小兒血氣本自盛實腑臟之間易為生病熱氣熏蒸津液乾枯故令兒渴而引飲方天麻人參煎治小兒上焦風熱渴引飲不止天麻人參白茯苓去黑皮各一分甘草生用一錢天竺黃研一錢鉛霜白研一錢龍腦研半兩丹砂研一錢上將先四味為細末再入所研四味和勻煉蜜煎為膏每服一大豆許用金錢薄荷湯化下枇杷葉湯一名香葛散治小兒上焦虛熱飲水不止枇杷葉去毛尖葛根胡黃連甘草炙銼玄參麥門冬去心焙等分上粗搗篩每服一錢水一盞生薑一片煎至六分後入蜜少許再煎至五分去滓放溫分二服食後服之栝蔞散治小兒熱渴或虛熱吐下除熱止渴栝蔞三分黃芩去黑心一分知母焙小麥粟米各半兩上除粟米小麥外余為粗末每二錢水一小盞入小麥粟米各一撮同煎至六分去滓分作三服一日吃盡量兒大小以意加減麥門冬散治小兒夏天服藥大下後胃中虛熱渴唯飲水麥門冬去心焙龍膽各一兩甘草炙黃黃芩去黑皮各三分葛根銼一兩半上粗搗篩每服一錢用水七分煎至四分去滓溫服量兒大小以意臨時加減黃連飲治小兒多渴黃連去須半兩冬瓜瓤一分上細銼水一盞半同煎至八分去滓分溫三服量兒大小臨時加減蓮實湯治小兒熱渴不止蓮實三十枚炒黃連研浮萍一分上用水一盞生薑少許煎至五分去滓分溫三服量兒大小加減黃蘆散治小兒熱渴不止黃連去須炒蘆根上細銼水一盞半煎至五分去滓旋與服治小兒熱氣熏蒸臟腑煩躁津液枯竭欲引飲方上取桑枝一握細銼水一盞半煎至八分去滓分作三服如熱水與飲治小兒熱渴不止上用葛根半兩細銼水一鍾煎六分去滓頻溫服治小兒渴不止蘆蘀扁豆藤各半兩人參一兩去蘆上細銼分為六服以水一小盞煎至五分去滓不拘時候量兒大小加減稍溫服治小兒煩熱渴以方諸向月取水飲之方諸水半諸大半鍾水地向月取之得三二合可葛根湯治小兒體熱煩渴者尤宜服之葛根人參各一兩麥門冬白茯苓甘草澤瀉各半分上為細末每服一錢水八分入生薑二片薄荷三葉煎至六分去滓服寒熱往來羸瘦附論夫小兒風邪客於皮膚痰飲侵於臟腑使血氣不和陰陽交爭故發寒熱往來也胃氣挾熱則消穀消穀則引飲使陰陽氣血不和不能充養身體故寒熱雖能食不生肌肉也方鱉甲散治小兒寒熱往來腹脹漸瘦不能飲食宜服之有效鱉甲一兩塗酥炙黃去裙襴柴胡去苗訶黎勒皮陳橘皮湯浸焙各三分檳榔三枚赤茯苓子芩赤芍藥當歸炒川大黃甘草炙各半兩上為散每服一錢水一小盞入生薑少許煎至五分不拘時候溫服量兒大小加減三服為度柴胡散治小兒寒熱往來乳食不下四肢無力心腹脹滿上焦痰壅漸羸瘦柴胡去苗鱉甲塗醋炙黃去裙襴各一兩人參去蘆赤芍藥桔梗去蘆訶黎勒皮地骨皮杏仁湯浸去皮尖麩炒黃前胡去苗陳橘皮去白甘草炙銼各半兩上為散每服一錢水一小盞煎至五分去渣不拘時候溫服量兒大小加減五味子散治小兒寒熱往來不欲乳食羸瘦心腹脹甘草半兩炙麥門冬半兩去心焙五味子當歸炒人參去蘆白朮赤茯苓桔梗前胡黃芩各一分上為散每服一錢水一小盞煎至五分去滓服日三服更量兒大小以意加減人參散治小兒寒熱往來食少羸瘦人參去蘆黃耆柴胡去苗白茯苓鱉甲塗醋炙去裙襴木香各半錢訶黎勒皮二分白朮一錢杏仁一分湯浸去皮尖麩炒微黃甘草一分炙上為末不計時以粥飲調下半錢量兒大小加減服之馬通粟丸治小兒脅下有氣腹痛喘逆氣息難為往來寒熱羸瘦不食馬通內粟細辛紫菀洗去土苗杏仁浸去皮尖麩炒各三分五味子石膏秦艽去苗茯苓半夏湯浸法七次一分上為末煉蜜和丸如麻子大每服以粥飲下五丸日三丸量兒大小以意加減香甲散治小兒寒熱往來肌瘦木香鱉甲酥炙黃去裙襴各一兩檳榔三枚川大黃陳皮去白柴胡知母甘草當歸各半兩洗焙上㕮咀每服一錢水一小盞生薑二片煎至六分去滓溫服量兒大小加減黃耆丸治小兒往來寒熱多汗心煩小便赤黃不欲乳食四肢羸瘦黃耆麥門冬去心焙赤茯苓白朮黃芩甘草炙各一分柴胡去苗鱉甲炙去裙襴各半兩上為細末煉蜜和丸如綠豆大每服以粥飲下五丸日三服量兒大小加減服之訶黎勒丸治小兒寒熱往來頭痛嘔吐並乳癖訶黎勒皮木香人參去蘆赤茯苓桂心川大黃炙銼各半陳皮半兩湯浸去白瓤焙柴胡去苗三分上為末煉蜜和丸如麻子大每服以薄荷生薑湯下五丸日三四服量兒大小以意加減檳榔丸治小兒乳食不節傷於脾胃致成往來寒熱時復嘔吐不欲飲食潮至羸瘦宜服檳榔丁香桂心人參去蘆各一分川大黃銼炙陳橘皮湯浸去白訶黎勒皮各半兩上為末煉蜜和丸如綠豆大不計時候以薄荷生薑湯研下五丸看兒大小加減赤芍藥散治小兒寒熱往來啼呼腹痛宜服赤芍藥寒水石黃芩當歸炒甘草炙銼半兩桂心一兩上為散每服一錢水一小盞入生地黃半錢煎至五分去滓不計時候溫服量兒大小加減柴胡散治小兒寒熱往來面色萎黃柴胡去苗半兩石膏一兩川大黃炒麻黃去根節秦艽去苗恆山各一分上為散每服一錢水一小盞煎至五分去滓溫服日三服更量兒大小以意加減莽草湯治小兒寒熱往來不休不能乳食浴時避風及陰莽草丹參各一兩菖蒲三兩蛇床子桂心各半錢雷丸一合上都銼以水五升煮至三升去渣適寒溫以浴身宜避風冷芍藥湯治小兒寒熱往來赤芍藥一分黃芩當歸洗焙乾柴胡甘草各一分上㕮咀每服一錢水八分生薑二片棗子一枚煎至五分去滓溫服大小加減秦艽湯治寒熱往來秦艽鱉甲醋炙微黃去裙襴川大黃微炒麻黃銼各半兩去根節竹茹甘草各一兩上㕮咀每服水一盞蔥白二寸煎五分去渣溫服大小加減草果飲治小兒寒熱盜汗不思飲食面黃腹急草果一兩厚朴二兩甘草棗子各半兩生薑四兩不去皮同杵淹一宿焙上㕮咀三歲一錢水半盞煎至三分去滓一方治五瘧夜明砂為末冷水調下半錢即效鱉甲散治小兒寒熱往來四肢羸瘦鱉甲三分塗醋炙黃淡竹茹川大黃炒各一分恆山一杏仁許大上為散每服一錢水一小盞入蔥白二寸煎至五分去滓入麝香一豆大煎一沸溫服日三服更量兒大小以意加減生地黃散治小兒寒熱進退啼呼腹痛生地黃桂心上以水三升煮取一升周歲以下服二合以上服三合一方七味有芍藥寒水石黃芩當歸甘草各半兩地骨皮散治小兒寒熱更作肌體羸瘦煩渴引飲不思乳食人參去蘆白朮白茯苓去皮三味各一兩前胡地骨皮當歸洗焙陳橘皮甘草半夏曲桔梗去蘆頭七味半兩上件㕮咀每服二錢水六分生薑一片棗一枚同煎至四分去滓溫服不拘時候寒熱結實附論夫小兒寒熱結實者此由風邪客於皮膚內有痰飲侵於臟腑使氣血不和陰陽交爭則發熱而臟本實復為熱所乘則積氣在內使人胸脅心腹煩熱而滿大便難小便澀是為寒熱結實也方柴胡丸治小兒寒熱結實或熱氣衝心肺氣急盡晝夜有汗日漸瘦不吃乳食柴胡半兩去蘆赤茯苓一分人參一分去蘆木香一分桂心一分川大黃半兩炒枳殼一分麩炒甘草一分炙鱉甲半兩塗醋炙微黃去裙襴上搗羅為末煉蜜丸如麻子大每服溫水下五丸日三服量兒大小加減服之大黃丸治小兒憎寒壯熱發渴不定腹中結實不能乳食川大黃半兩炒柴胡赤茯苓一分木香一分桂心一分枳殼一分麩炒桃仁一分湯浸去皮尖炒黃檳榔半兩人參去蘆頭一分上為末煉蜜和丸如麻子大每服以溫水下五丸日三服量兒大小加減服之芒硝丸治小兒宿食痰癖寒熱腑臟結實宜服之川芒硝半兩川大黃半兩炒甘草一分半夏一分湯洗七次巴豆二十枚去皮心膜紙裹去油杏仁二十枚去皮尖別研代赭半兩上為末與巴豆仁膏一處研勻煉蜜和搗二三百杵丸如綠豆大五六歲兒空腹以溫水下一丸利為度鱉甲散治小兒寒熱結實脅下妨悶不欲乳食鱉甲半兩塗醋炙黃赤茯苓半兩川大黃一大兩炒枳殼二兩麩炒川朴硝一分上為散每服一錢以水一盞煎至五分去滓溫服不計時大小加減服五靈脂丸治小兒腹有積滯致生寒熱腑臟結實心腹氣脹五靈脂半兩陳橘皮三片湯浸去白木香半兩川大黃一分炒巴豆霜一分上為末入巴豆霜同研令勻用軟飯和丸如粟米大每服以粥飲下兩丸小兒一丸爽神湯治小兒清寒壅爽精神白朮人參去蘆白茯苓各一兩桔梗瓜根甘草各半兩細辛一錢上㕮咀每服一錢水八分入荊芥薄荷各少許煎至五分去滓溫服冷熱不調附論夫小兒冷熱不調者蓋為乳食乖度寒溫失節或陰陽相盛氣血不調致令冷歸下焦熱衝上膈若風冷入於腹胃則瀉痢不定或腹中氣滿或時嘔逆不能乳哺故謂之冷熱不調也方犀角湯療小兒上冷下熱上熱下冷難將息方犀角末甘草生地黃芍藥白朮茯苓梔子各三分柴胡人參大黃生薑各四分黃芩二分桂心一分上㕮咀水三升煮取一升分溫服之木散香治小兒冷氣不調胃氣壅滯少思飲食木香一分大腹皮一分人參赤茯苓青橘水浸去皮訶黎勒皮桂心前胡半夏丁香甘草各一分上為散每服一錢水一小盞入生薑半片大棗一枚煎至五分去滓放溫量兒大小以意加減犀角散治小兒冷熱不調或時下痢腹痛不能飲食犀角屑桂心甘草炙當歸炒黃連陳皮浸去白人參乾薑炮各半兩上為散每服一錢水一小盞煎五分去滓日三服大小加減訶黎勒散治小兒冷熱不調大便或壅或通不欲飲食訶黎勒皮半兩人參一分去蘆檳榔一分木香一分川大黃半兩炒桂心一分川芎一分上為散每服一錢水一小盞入生薑少許煎至五分去滓不計時候大小加減溫服赤芍藥丸治小兒冷熱不調不思飲食食積不消赤芍藥三分桂心一分柴胡去苗半兩川大黃三分炒赤茯苓半兩鱉甲一兩塗醋炙令黃去裙上為末煉蜜丸桐子大二歲以上粥飲化破三丸服日三服如四歲以上至七歲七丸以粥飲下白朮散治小兒冷熱不調腹內疼痛發渴不定白朮半兩當歸半兩炒芎藭半兩乾薑一分炮青橘皮一分湯浸去皮甘草一分炙上為散每服一錢水一小盞煎至五分去滓不計時候量兒大小加減服之當歸丸治小兒冷熱不調大便青黃心腹多痛不欲乳食當歸炒人參去蘆白芍藥芎藭甘草炙白朮各半兩上為末麵糊和丸如麻子大每服以粥飲下至五丸日三服三歲以上加丸數服之香連散治小兒冷熱不調腹痛下痢木香當歸微炒乾薑炮各一分黃連去須阿膠炒黃各半兩上為散每服以粥飲調下半錢量兒大小加減頻服木香丸治小兒冷熱不調腹痛不可忍或時寒熱下痢膿血木香一分芎藭當歸銼炒桔梗去蘆黃芩各半兩上為末煉蜜和丸如桐子大不計時候以溫生薑湯研破二丸服之量兒大小以意加減赤茯苓丸治小兒冷熱不調腸胃滯結壯熱時作兩脅刺痛赤茯苓川大黃銼微炒鱉甲塗醋炙令黃去裙襴各三分當歸芎藭各一分上為末煉蜜和丸如綠豆大每服以粥飲下五丸日三服量兒大小以意加減調氣散治小兒四五歲腹內冷熱不調不能食飲白朮人參去蘆甘草炙各三分厚朴一兩去粗皮薑製上為散每服一錢水一盞入生薑少許煎至五分去滓放溫量兒大小加減服之黃疸病附論夫黃疸以身皮皆黃者病也身痛體背強大小便澀一身面目指爪皆黃小便如屋塵色看物皆黃濁者難治此黃疸也此證多病於大病後身微黃者胃熱也大人亦同又有面黃復大食吐渴者脾疳也又有自生而身黃者胎疸也古書云諸疸皆熱色深黃者是也若淡黃兼白者胃怯胃不和也黃疸者由內脾胃氣實外有溫氣乘之與胃合候變生熱必脾色生黃胃為水穀之海熱搏水穀氣蘊積成黃熏發於外身疼背強大小便澀皮膚面目齒爪皆黃此或傷寒或溫病皆由熱不時解而入於胃也宣利者易治澀者難治宜服五苓散加茵陳煎湯又宜服導赤散加茵蔯煎或身熱宜服小柴胡湯甚者服承氣湯陽明病無汗小便不利心中熱壅必發黃凡發黃其寸口無脈鼻氣冷並不可治凡發黃而下痢心腹滿者必死診其脈沉細者亦死人有百日半歲小兒非傷寒溫病而身微黃者亦是脾胃熱忌不可灸也灸之則熱甚此是將息過度所為微薄其衣數與除熱粉散之自歇不得妄與湯藥服及灸方犀角散治小兒黃疸一身盡黃者犀角一兩茵蔯栝蔞根升麻龍膽草甘草生地黃各半兩寒水石三分上白水煮服一方治小兒忽發黃面目皮肉須盡黃土瓜根汁和蜜服茵蔯散治小兒黃病身如橘色茵蔯川芒硝各一兩梔子仁川大黃炒黃芩犀角屑木通銼寒水石各半兩上為散每服一錢水一小盞煎五分去滓不計時候溫服量兒大小加減瀉黃散一名加減黃連散治小兒體熱胸膈煩滿皮膚如潰橘之黃白睛亦然濕熱所致也並治痿獨取於陽明證也加減瀉黃散主之加減黃連散亦主之黃連茵蔯各五分黃蘗黃芩各四分梔子茯苓澤瀉各三分內經曰土位之主其瀉以苦又云脾苦濕急食苦以燥之以黃連茵蔯之苦寒除濕熱為君腎欲堅急食苦以堅之故以黃蘗之苦辛寒強筋骨為臣濕熱成煩以苦瀉之故以黃芩梔子之苦寒止煩除滿為佐濕淫於內以淡滲之以澤瀉茯苓之甘淡利小便導濕熱為使也上㕮咀都作一服水一大盞煎至六分去滓稍熱食前一服減半時五日再服而愈升麻丸治小兒熱毒攻脾胃遍身俱黃小便赤澀大便難心神燥熱兩目赤黃川升麻龍膽梔子仁黃芩川大黃炒秦艽甘草炙銼各半兩上為末煉蜜和丸如梧桐子大不計時候以新汲水研下三丸三歲以上加丸數服三黃丸治諸熱黃疸及衄血黃連去須一分黃芩去心半兩大黃去皮濕紙裹煨上同細末麵糊丸如綠豆大或麻子大每服五七丸至十五丸二十丸食後米飲送下一方用煉蜜為丸如衄血濃鹽水下便血荊芥薄荷湯下一名三黃散治黃病每服一錢水一盞煎五分去滓溫服食後白朮散治小兒結熱於內口乾而渴身黃體重者人參白朮白茯苓甘草炒葛根藿香各一兩上為粗末每服一錢至二錢水煎服治小兒黃病土瓜根汁方土瓜根汁上一二歲兒取半雞子殼分二服三四歲取一雞子殼分二服早晨晚後各一一方用蜜半匙相和漸漸服之茵蔯丸治小兒脾胃熱毒致肌肉變黃小便變赤心中煩懊茵蔯梔子仁川大黃炒秦艽去苗甘草炙各一分川朴硝半兩上為末煉蜜和丸如綠豆大不計時候溫水下五丸量兒大小加減服之一方有郁李仁無甘草瀉黃散治小兒身涼身黃睛黃疳熱口臭唇焦瀉黃沫脾熱口甜胃熱口苦不吮乳藿香七錢山梔子一錢石膏半兩甘草三兩防風四兩上銼細同酒蜜微炒香為末每服半錢水半盞煎三分去滓服清汁亦治弄舌一方每服一錢溫熱水調下不拘時候服之子芩散治黃病黃芩栝蔞根茯神各一兩甘草胡黃連各半兩每服一錢水八分煎至五分去滓溫服蘆根湯治黃病蘆根銼一兩茵蔯山梔子黃芩甘草各半兩上搗羅為細末每服一錢水八分入薄荷三葉煎五分去滓服大黃散治小兒諸黃川大黃炒黃連栝蔞根黃芩梔子仁各半兩上為散每服一錢水一小盞煎至五分去滓不計時候溫服量兒大小以意加減黃瓜蒂散治小兒諸黃三歲忽發心滿堅硬腳手心熱則變為黃病不急治殺人瓜蒂一十四枚小豆二十粒糯米四十粒上搗羅為散吹少許入鼻中令黃水出殘藥末盡水調服之得吐黃水即愈一方瓜蒂一兩赤小豆四兩為末每一錢溫水調服藥下便臥即當有吐以吐為度出清黃汁為妙若小病不除者次日如前法更服可再三不令虛也藥力過時不吐即服熱湯一盞以助藥力若服藥過多者飲冷水解之又方瓜蒂炒赤小豆各等分為末三歲半錢濃豉汁調下溫服不吐少加得吐而止虛人不可用茵蔯湯治小兒黃疸身體目睛小便並黃山茵蔯一分大黃銼炒半兩山梔子五枚用仁上粗搗篩五六歲每服一錢水七分煎四分入朴硝半錢更煎一兩沸去滓分溫日三服量兒大小加減大黃丸治小兒諸黃心胸壅悶宜服川大黃銼炒茵蔯甜葶藶隔紙焙令紫色各半兩上為末煉蜜和丸梧桐子大不計時候以新汲水研下三丸量兒大小增減服之治小兒黃病青麥汁方青麥自然汁上二歲兒取半雞子殼分二服三四歲兒取一雞子殼分二服早辰後午各一服葶藶丸治小兒黃疸大小便難喘粗氣急甜葶藶一兩炒大黃一兩炒上為末煉蜜丸如小豆大每服十丸米飲送下秦艽湯治小兒身目俱黃秦艽三分上粗搗篩每服一錢牛乳一合同煎至五分去滓分溫日三服量兒大小加減苦參丸治小兒谷疸其候食必頭眩怫鬱不安而發黃皆由飢飽過甚攻衝脾胃腹滿氣粗煩渴苦參一兩龍膽半兩上為末牛膽汁和搗三五百下丸如綠豆大每服二十丸米湯下不拘時雙連丹一名黃瓜丸治疸病渾身及面色俱黃川黃連去須胡黃連各一兩上為細末用黃瓜一枚去瓤留一小蓋子入藥末後以蓋子蓋定用麵裹火燒令面焦去面搗熟丸如綠豆大每服七粒至十粒溫水下大小加減寒水石散治小兒胃熱身體黃除熱粉之方見本門諸熱類逐黃散治小兒黃疸脾熱眼黃上以栝蔞青者焙為末每服一錢水一盞煎七分去滓臨臥服立效五更初瀉下黃立可治酒黃極妙治小兒黃病韭根汁方韭根汁味溫無毒洗淨去泥不計多少於石器搗爛漉取自然汁上滴少許入鼻中出黃水即瘥諸腫附論夫腫病腎熱傳於膀胱盛逆於脾胃虛而不能制腎水反剋土脾隨水脾主四肢故流走而身面皆腫也若大喘者重也何以然腎水勝而克退脾土上勝心火心又勝肺為心克故喘或問曰心刑肺肺本見虛今何喘實曰此有二者肺大喘此五臟逆二者腎水氣上行傍侵於肺故大喘此皆難治腫者疳腫風腫氣腫積腫虛腫五者大同小異疳腫者肌體浮腫通身明亮狀如熟李寶鑑云若見大膚如熟李此名疳水定無疑而或有陰囊腫似琉璃疳水也或因疳食傷脾變為疳水風腫者面目浮腫色帶紫赤時常多癢陶隱居云風腫紫色而癢進退不定忽即有發牽牛散主之或有如痛癗有成片腫者搔之隨手而起風疹也素問云風邪客於肌中肌膚虛真氣逆散寒搏於皮膚發腠理淫氣行之則為腫癢也又云面腫曰風癇雖氣血尚虛而熱末盡從皮膚與氣相搏致令氣不宣泄故停留成腫也治之先益黃散以後牽牛散利之氣腫者目疱浮腫久嗽為之氣粗有痰倉公曰目上先腫次面背腫者久嗽為之日氣腫目下臉先腫次面背腫者脾積為之曰水腫素問云目下微腫如臥蠶起之狀曰水評熱論曰水者陰目下亦陰也腹者至陰之所居也故水在腹中者必使目下腫也又曰脛腫也又曰脛腫曰水千金云有人患氣急久不瘥遂成水疾麻黃甘草湯主之積腫者遍身浮腫因食傷脾久瘧亦成日華子云人久患寒熱不退必變浮腫因脾積氣所作也寶鑑云因宿痰飲成塊散後遍身浮腫喘粗或因不便食即飲水誤必作者也虛腫者四肢浮腫久痢為之多渴少食凡痢久不退虛腫少食瀉久不退虛煩渴大抵痢久則脾土虛虛則不能制腎水反剋土故胕腫於肌肉也其病十死八九若用涼藥立死益黃散女面散五苓散候脾氣實則腫自消十愈五六凡嗝久能變虛腫也皆由不忌生冷恣食甘酸脾胃不調之所致也然取水之法諸有水人微腫見於目下水者陰也腹者至陰之所居故水在腹必使目下腫而不得臥臥則驚驚則咳甚夫取水法若不頓收盡必當再發則難治如病甚治者初隔一日一取候減三二分又隔兩日一取候退六七分又隔三日一取減去八九分又隔四五日取其不取日即服補腎行水氣之藥全嬰方云丁氏二子大者七歲自七月內寒熱四十餘日小者五歲自七月內瀉痢四十餘日二子後來俱發浮腫招愚視之大者水寶散瀉十餘行五苓散二服翌日病除八分後商陸散二服平愈小者益黃散女面散五苓散日二服三日服藥尚未見效主人曰大者服水寶散立效何不投之一服答曰服之即死是謂醫之用藥療病如將之用兵料敵當其虛實隨其機變必獲勝效也蓋大者因食傷脾小者因痢損脾素問雲陽病治陰陰病治陽大抵退熱以涼藥退寒以熱藥實病虛之虛病實之今二子證候虛實不等若水寶女面服之交互二病俱亡小者止用益黃散服之十月脾實平安腫脹二證此由虛中有積久患失治漸傳作證候傳化多端隨虛實按輕重察勝衰審表裡主治先固其本後正其標得無恙矣凡腫有受濕腳手面目虛浮毒氣腫腹肚堅蠱脹急傷寒虛氣入腹腫氣虛腫瀉痢虛氣入腹脹腫血虛腫榮衛俱虛腫凡脹疳極脹疳積脹氣積脹痞氣脹癖氣脹症積脹鎖肚脹急膈脹中脘脹食腸膨脹蛔蟲脹脾氣脹冷積脹虛積脹以上腫脹虛積並當下之用藥各有法度凡受濕腫傷寒虛氣入腹腫食毒氣腫瀉痢虛氣入腹腫此四腫所患病不相同皆因虛盛而得之受濕謂脾胃受濕冷久不克化氣浮四肢頭面皆腫食毒氣由脾胃傷之冷積毒氣停留胃脘致虛入腹作腫傷寒由下之太早乘虛入腹作腫瀉痢之久脾氣亦虛是以致腫以上宜平調胃氣補臟充實方可去腫先服四味理中丸減半乾姜加白朮桑白皮同煎傷寒虛腫加枳實作喘加淡豆豉瀉痢虛腫服正氣調胃胃氣既壯以致生丹利之其腫即退再調補臟腑用觀音散良蓋固平復矣又有氣虛腫亦名氣毒榮衛俱虛亦名氣血蠱錢氏小兒所患腫脹一門最為要急前人少有究意然腫脹已作皆由榮衛不順臟腑怯弱壅滯三焦流注百脈表裡俱虛邪正相亂所以致受四肢浮盛腹肚膨滿多由食毒得之飲冷得之症傷得之食飽得之積久不化諸虛所入故成斯病病由虛得或則妄亂通下因虛致虛根不能去疾加已盛是謂壞證危甚智者怯而為辭庸者暴以致擊二醫不同誠屬難治原夫智者商之謂商量斟酌輕重良者審之雖曰良工猶宜審其可否之意疑者調之疑其病盛不可利只宜與塌其氣明者起之明虛實已定良方起活謹遵其理始可調治藥用至真對證克效即無恙矣以上先與服榮衛飲子次服分氣飲子小兒臟腑嬌嫩乳食過傷脾胃虛冷不能消化乳食停滯腹間脾受積傷脾土衰弱不能制水故流溢漬於皮膚腫有三證疳水積水驚水也蓋疳水者其候心中虛腳腫不可取宜用藥消之若積水者五積在於腹結化為水其候或冷或熱四肢頭面俱浮作虛中積治之宜補而後取此是積在腹結後化為水其病難治而不可作虛中積治也驚水者前後重疊受驚致令心火燥渴飲水過多停積於脾其候四肢腫身上熱若其脈大者生小者死叔和曰水氣浮大得延生沉結應當是死別尺脈如絲或浮洪按之無根乃絕脈楊氏曰賈洛陽以腫為痼疾則知病之危惡非他疾比也夫人全性命者水穀而已水則腎主之土谷則脾主之惟腎虛不能行水脾虛不能制水胃與脾合氣胃為水穀之海又因虛而不能傳化故腎水泛溢浸漬脾土於是三焦停滯經絡壅塞水滲於皮膚注於肌肉而發腫矣其候目胞上下微腫四肢重著咳嗽喘怔忡股間清冷小便澀黃皮薄而光手按成窟舉手即滿治法楊氏曰身有熱者水氣在表可汗身無熱者水氣在裡可下次則通利小便順氣和脾不可緩也然證雖可下當審其虛實權其輕重不可過用芫花大戟猛烈之劑用之太過吾恐峻決者易固閉者難水氣復來何以治之也凡虛腫先起於腹而散於四肢者可活先自四肢而後歸腹者不可治蠱脹肚上有筋腹滿而大便滑泄久瘧而轉作虛浮及唇黑傷肝缺盆平傷心臍突傷脾足平傷肺背平傷肺或男從足腫而上女從身腫而下或肉硬或手掌平皆不治凡小兒通身浮腫是風水腫也小便不通者宜利小便則愈內經曰三焦閉塞水道不行水滿皮膚身體痞腫是風乘之故可用長流水加燈心煎五靈脂時時呷之更於不透風處浴之汗出則腫消一汗減半再汗減七八三汗消盡內外俱行也治水之法當利小便此乃要妙之理則愈矣小兒浮腫有飲食所傷有濕傷皮膚有氣化為水治法當腰以上腫宜汗腰以下腫宜利小便然後調理脾胃也方榮衛飲子調理嬰孩氣血俱虛榮衛不順四肢頭面手足俱浮腫以至喘急者並宜服此川當歸熟乾地黃洗淨白茯苓川芎白朮甘草炙白芍藥枳殼炒洗制黃耆蜜炙陳皮上等分㕮咀每服二錢水一小盞煎至半去渣通口不拘時候榮者血溫流於脈衛者氣順調和於絡是故榮行脈內陰陽相合循環無止自年幼至長不難呼吸無少滯礙其脈方調其氣乃順呼吸之間脈不應息氣有違滯流注經絡隱伏臟腑虛熱則發癰疽背癤實熱則患瘡疾瘑疥況其榮與衛陰及陽偏枯有作易感寒邪亦易致虛百病皆由茲始此方最良雖兒幼小並可與服以杜其根使血榮氣衛順且和矣腑寒臟虛溫且壯也盈虧自然而平怯弱自然而正陰陽均調氣脈充實分氣飲調理小兒腫脹作喘氣短促急坐臥不安四體浮腫飲食嘔逆神困喜睡即宜服之五味子桔梗白茯苓甘草炙陳橘皮桑白皮草果去殼大腹皮白朮枳殼去瓤切炒川當歸紫蘇蘇子半夏曲上等分每服二三錢水一盞生薑二片棗子半個煎至半去滓通口不拘時候兼八味理中丸煎服以上宜用救生丹通利清濁無混邪正不幹上焦得之清涼下部受之溫暖氣滯則少升降血虛則多流注雖是乳子呼吸一息其脈有數徐徐應指不違其數者亦同大人流行但在小兒受之短淺而已若留滯其脈遲速於病太過不及者作病善主療治鬱則分之逆則順之停則利之滯則降之調理之先宜以順其氣大抵嬰孩氣順即易治脈壯亦易理證候稍傳郁逆停滯當以先明不待傳入而究竟此方分氣預宜進服與分水穀之方者不同為用大效神功救生丹治小兒氣虛喘息四肢浮腫腹肚脹急沖滿脅肋乍寒乍熱或瀉或秘皆由久停虛積榮衛不順宜用此法雄黃別研硃砂另研各一分巴豆二十粒去殼乾薑一錢上用米醋一盞以巴豆姜就煮令乾去姜不用將巴豆出油和雄朱研勻雪糕搜丸如麻子大每一歲三丸並用酒浸赤芍藥少許送下夫幼小受疾其未發端無過驚風痰熱疳積吐痢而已前賢眾多述論證候編著方藥究竟推詳各有碓實奧見其有無辜疳積異作證候著於篇集或有罕見其證未詳其理者究難用前賢之方而治今人之病也又復有壞證惡候自服諸家丸散輕重相投愈之不得全功疾之反加為他害者脾風之類是也悠悠既久方法何疑學醫之士遇此等病未審告辭而去若能於此觸類調理雖則未效猶尚庶幾多是肆意勉強而為稍或得失利害甚重今議救生丹方載譚氏所療無辜積證效驗至良晚進後生聞而知之且驚且喜蓋渠未嘗知用苦功參究而又隨意立方所以鮮能奏效孩提之子受其戕害者正復不少醫工於此等證候而能至誠參究活幼起孩十學十全百發百中矣案以上一節議論與前後各方不合當是他處錯簡而來療小兒身體滿氣急夜臥不得方上用郁李仁一合搗末和麵溲作餅子如常法與兒吃微利即瘥一方為末六分水七合和調去滓煮粥與兒吃之寬腹丸治小兒疳氣腹脹不思飲食或面腫者牽牛蘿蔔子陳皮青皮木香炮各一兩檳榔紫蘇子木瓜半兩巴豆七粒不去殼同炒黃去巴豆上為末糊丸如小豆大三歲三十丸紫蘇木瓜湯下黃耆茯神散治小兒榮衛氣虛精神不爽面無顏色唇口青白噦逆昏睡全不思食身體微腫黃耆蜜炙茯神去末天南星炮白扁豆炒黃防風去蘆白附子炮肉桂去皮白芍藥山藥各等分上每服二錢水一小盞生薑三片棗一枚同煎七分去滓食前溫服加味五苓散治腫滿因積而得既取積而腫再作小便不利豬苓赤茯苓白朮澤瀉各一兩木香沉香檳榔各三錢白豆蔻一錢縮砂仁五錢上味煎樟柳木通燈心湯調下大黃湯治小兒咳腫壯熱有實方麝香三銖別研大黃四分甘遂石膏各三分黃芩甘草青木香各三分前胡四分上為粗末水七升煮一升九合每服三合日四服夜三服塌氣散治腫滿因積而得既積而腫再作小便不利赤小豆陳皮去白蘿蔔子白朮炒茴香炒各五錢木香二錢炮甘草一錢炙青皮五錢加以巴豆二錢去殼炒去巴豆不用上末飯湯下或薑棗湯下治疳水燈心湯下治小兒臍赤腫以杏仁杵如脂內體中相和敷臍腫上治男子婦人小兒積年腳氣腫痛及腹肚蠱腫服之痛止腫消方見大人腳氣腫滿門椒目飲治小兒痢後虛腫並頭面浮腫或身熱白朮秦艽椒目甘草香薷通草上等分為末一錢水盞煎三分去滓食前不宜吃蠡魚鯉魚二物皆能腫使君子丸治小兒面黃大小便赤遍身浮腫此脾疳食積氣滯而成使君子一分麵裹熟去面黑牽牛末一兩靈脂半兩黃連陳皮一分江子七粒同陳皮黃連炒江子不用上為末粟米糊為丸如綠豆大每服五七丸生薑橘皮湯下神助散治小兒頭面手足浮腫澤瀉豬苓去黑皮各二兩黑牽牛二兩半微炒取末葶藶三兩炒香別研椒目一兩木香一兩上為細末每服以蔥白三莖將水一盞煎至半盞調藥三錢絕早面向東服如人行十里久漿水蔥白煮稀粥至蔥爛入酒五合熱啜量人啜多少須啜一升許不得吃鹽並面自早至午當利小便三四升或大便利喘定腫減七分隔日再服五皮散治小兒諸般浮腫氣急不食桑白皮大腹皮茯苓皮姜皮陳橘皮各等分上㕮咀三歲一錢紫蘇葉三五片水半盞煎三分去渣無時澤苓散治小兒遍身浮腫氣急不食木通一兩半澤瀉蘿蔔子各半兩木豬苓漢防己各一兩上㕮咀一錢水酒共半盞蔥白三寸煎三分去滓小便通利即瘥內消丸治小兒頭面手足虛浮木香一錢煨防己一錢半丁香二十五粒青皮五錢去瓤銼用巴豆十四粒去殼同炒候黃色去巴豆不用上末飯丸麻子大每服二三歲五丸四五歲七丸或十歲小兒陳皮湯下女兒艾葉湯下一日三服實脾散治積飲能補脾消積進食五苓散通利水道三藥合和用蘿蔔子木通薏苡仁車前子草赤小豆冬瓜仁糯米湯調入燒鹽蓋脾土固實水去腫消一方五味同炒黃色去巴豆麵糊為丸小豆大三歲三十丸橘皮湯下紅粉散治小兒渾身虛腫氣喘不思飲食硃砂一錢檳榔一錢輕粉半錢上為末每服一字或半錢薄荷湯調下吃一服則取下仍用前觀音散人參散神朮散調其胃氣忌生冷粗硬等物檳榔丸治小兒遍身浮腫黑牽牛三兩炒青木香青皮防風檳榔各一兩上為末麵糊為丸如芥子大每服二十丸桑白皮湯下香橘丸治小兒四肢腫滿杏仁十四個巴豆十四個青皮陳皮各半兩麩半升上一處炒白為細末醋糊為丸如綠豆大每服十丸至二十丸冷薑湯下宣氣散治小兒腹急氣粗並治風腫氣腫通身腫及瘡痘盛出身熱煩渴腹脹喘促大小便澀面青悶亂又治久瀉不退脾虛生熱止與一服後補之木香一分檳榔橘皮甘草各半兩黑牽牛一兩半生半炒上㕮咀一錢水半盞煎三分去滓三歲一錢香檳散治小兒疳食氣腹大氣粗應有浮腫並療木香檳榔黑牽牛青皮各半兩商陸一兩上為末三歲一錢煎木通湯調下或為糊丸小豆大三十丸米湯下肚大常服自消分氣飲治腫脹作喘氣短而急北梗赤茯苓陳皮桑白皮炒大腹皮枳殼制半夏曲真蘇子微炒紫蘇甘草各二錢炙草果仁一錢上銼散每服一錢半水一盞生薑三片棗子一個煎服若心臍起掌心平缺盆平背心平不治大喘氣粗不食乃腎水盈溢上行傍浸於肺亦不治葶藶煎治小兒腫滿服藥不退葶藶紙上炒三分防己一兩半澤瀉三兩澤漆葉一兩一錢赤茯苓去黑皮三錢郁李仁去皮尖炒一兩下柴胡去苗二兩杏仁湯浸去皮尖雙仁炒研如膏三兩上七味粗搗篩水一斗煎三升半去滓入杏仁膏又白蜜一斤慢火煎如稀餳每半錢溫水調下漸加之更量兒大小加減甘遂丸治小兒腫滿結實諸治不瘥甘遂炒葶藶紙上炒車前子豬苓去黑皮杏仁湯浸去皮尖雙仁炒研芍藥各三錢澤漆葉黃芩去黑心鱉甲去裙襴醋炙各半兩上搗研為末煉蜜和丸如綠豆大五六歲兒每服五丸竹葉湯下以利為度量兒大小加減塌氣散退腫治積水驚水或飲水過多停積於脾故四肢腫而身熱宜用內消之藥其腫自退赤小豆陳皮蘿蔔子甘草各半兩木香一分炮上末薑棗煎去滓大小加減通口服牽牛丸治小兒疳氣頭面及四肢腫黑牽牛白牽牛各半兩青皮陳皮上等分為末糊丸如小豆大三歲三十丸米湯下些小腫常服自消塌氣丸治小兒疳氣腹脹喘急並面浮腫丁香胡椒炒一分蘿蔔子炒白牽牛生各一兩上為末麵糊丸小豆大三歲三十丸米湯下治小兒身腫並手足腫兼癮疹用巴豆五十枚去皮心水二升煎取一升用帛於湯中隨手拭之治小兒毒氣攻腮腫赤可畏者皂角二兩去核天南星二錢生用糯米一合為末上為細末薑汁調塗立效郁李丸治小兒疳食氣急腫滿郁李仁湯炮去皮炒檳榔各半兩牽牛一分炒上等分為末糊丸小豆大三歲三十丸蔥白湯下不拘時量兒大小加減塌氣散治小兒腹脹氣粗並疳食攻面目浮腫木香一分青皮半兩巴豆三十粒同炒黃色去巴豆上為末三歲半錢米湯調下食前連進即效治小兒浮腫蒲種殼天羅燈草上用蔥濃煎湯服之又煎洗淨尤妙即愈郁李仁湯治小兒通體腫滿腹脹氣喘郁李仁湯浸去皮尖炒搗研大黃煨銼柴胡去苗各一兩半芍藥豬苓去黑心澤瀉各一兩赤茯苓去黑皮麻黃去根節一分升麻杏仁湯浸去皮尖雙仁炒鱉甲去裙醋炙各三錢黃芩去黑心各一兩上粗搗篩每用二錢水一盞煎至五分去渣分溫二服日再以利為度量兒大小加減商陸散治小兒浮腫腹滿氣急利小便澤瀉商陸各等分上為末一歲一錢煎桑白皮湯調下商陸醋炒為末調塗腫毒妙醋調並治咽喉腫治小兒臍腫上取桂心炙令熱熨之日可四五度治小兒熱腫上用鯉魚膽塗之甘遂丸治小兒腫滿結實諸治無益者方見澤漆丸二牛丸治小兒腫病大小便不利黑牽牛白牽牛各四兩炒上為末井花水為丸如綠豆大每服二十丸蘿蔔子煎湯下沉附湯治腫面滿因積而得既取積而腫再作小便不利若再用利小便藥性寒而小便愈不通到此則束手矣蓋中焦下焦不升降為風寒痞隔故水凝而不通宜服沉附湯則小便自通喘滿自愈大小便通用久服無礙附子一粒生皮去臍切成片子上用生薑十片水三盞煎至八分次用沉香一錢磨水入藥再煎三沸空心服胃苓丸治腫滿因積而得既取積而腫作小便不利平胃散五苓散上等分和合蒸為丸木通湯下又方治腫滿因積而得既取積而腫再作小便不利平胃散二錢上煮蘿蔔子一碗取青汁一盞入藥用薑棗再入蘿蔔子同煎服附豆丸治脾虛受濕虛腫附子一個生去皮切作四片赤小豆一盞上用水浸慢火煮候豆熱附子透軟取附子焙乾為末以薏仁糊煮糊丸空心蘿蔔子煎湯送下仍以燒鹽和所煮赤小豆空心食之緊皮散治一切腫經取已消脾胃虛弱白朮炮赤茯苓木香澤蘭厚朴薑製續斷肉桂檳榔陳皮去白麥芽炒神麯青皮椒目木通扁豆上㕮咀每服姜煎棗子蘇葉同煎空心溫服之海蛤散治小兒腫病大小便不利水腫附論夫小兒水氣腫滿者由將養不調腎脾二臟俱虛故也腎主水其氣不通於陰脾主土候於肌肉而剋水腎虛不能傳其水液脾虛不能剋制於水故水氣流溢於皮膚故令腫也其水腫者則皮薄如熟李之狀也若皮膚虛受風風搏於氣致腫者但虛腫如吹此風氣腫也方檳榔散治小兒水氣腫滿喘促坐臥不安檳榔煨熟炒大黃銼炒各三錢葶藶紙上炒牽牛子炒各半兩上搗羅為散三四歲每服半錢熟水調下以利為效量兒大小加減葶藶散治小兒水腫氣粗葶藶炒防己甘遂大戟上等分為末三歲一錢桑白皮湯調下食前澤漆丸治小兒水腫腹大諸藥不瘥澤漆葉葶藶紙上炒各半兩黃芩去黑心甘遂炒郁李仁湯浸去皮尖炒研芍藥豬苓去黑皮杏仁湯浸去皮尖雙仁炒研車前子各三錢鱉甲去裙醋炙柴胡去苗各半兩上搗羅為末煉蜜和搗三五百杵丸如綠豆大五六歲兒每服五丸溫水下更看兒大小增減一方用竹葉湯煎下大戟丸治小兒水氣浮腫大戟葶藶炒各一錢青皮三錢江子半錢上為末飯為丸每五丸茶湯下如瀉後用人參白朮散補之葶藶散治小兒水腫葶藶隔紙炒牽牛炒桑白皮炒檳榔等分上為末生薑蜜湯調下聖丸子治小兒水腫腹腫霍亂嘔逆腹冷食不下兩脅痛並下痢膿血小便赤澀又理肺氣喘急咳嗽上葶藶案此下有缺文下痢松樹皮湯小便赤澀燈心湯喘急咳嗽人參杏仁湯送下如痢後腫先服益黃散次與之二物湯有患氣積急積久不瘥遂成水病攻面目身從腰上腫此湯發汗悉愈麻黃去節四兩甘草一兩上㕮咀三歲一錢水半盞煎三分去滓構皮湯治小兒腫滿構木白皮切五合即椿樹也赤小豆四合赤茯苓去黑皮一兩半上㕮咀每服一錢水七分煎至四分去滓溫服日更再量兒大小增減桑根白皮散治小兒水氣腫滿上氣喘促小便赤澀大便稍難一名豬苓湯一名海蛤湯桑白皮半兩銼海蛤一分漢防己一分赤茯苓甜葶藶隔紙炒令紫色豬苓去黑皮各一分川朴硝一兩上搗粗羅為散每服一錢水一小盞煎至五分去滓溫服日三四服更量兒大小加減服之桑白皮散治小兒水氣遍身腫滿喘促小便不利桑根白皮半兩炒射干赤茯苓黃芩木通銼澤漆澤瀉漢防己各半兩上搗細末為散每服以煮赤小豆湯調下半錢每日三四服看兒大小加減服之牡蠣散治大病瘥後腰以下有水氣者宜服之牡蠣煅澤瀉蜀漆洗炒商陸葶藶海藻栝蔞根各等分上末三歲一錢燈心湯調下小便利止赤茯苓散治水氣腫滿咳嗽喘不止赤茯苓桑根白皮銼貝母煨令黃各半兩川升麻甜葶藶隔紙炒令紫色杏仁湯浸去皮尖雙仁麩炒微黃桔梗去蘆各一分上搗粗羅為散每服一錢水一小盞煎至五分去滓溫服日三四服量兒大小加減服白朮散治小兒水氣腫白朮木香炮甘草炙茴香炒青皮浸去皮切各半兩巴豆三十枚去皮膜同青皮一處炒了仍去巴豆不用上為末飯飲調下茯苓丸治小兒水氣面目腫小便澀腹脹滿赤茯苓杏仁湯浸去皮尖雙仁麩炒微黃陳橘皮湯浸去白瓤焙漢防己紫蘇子微炒甜葶藶隔紙炒令紫色各半兩上搗羅為末煉蜜和丸如綠豆大每服煎桑根白皮湯下十丸日三服五歲以下減丸服之甜葶藶丸治小兒水氣通身腫滿心腹妨悶坐臥不安甜葶藶隔紙炒令紫色牽牛子微炒雄雀糞各半兩大戟一分巴豆去皮心七粒研紙裹去油膩粉一錢研入上搗羅為末都研令勻用棗瓤和丸如綠豆大每服以溫茶下一丸日二服五歲以上加丸服之甘遂散治小兒水氣遍身腫滿大小便難喘促不得睡臥甘遂炒大黃銼炒牽牛子炒各三錢葶藶紙上炒一錢檳榔炒銼上搗羅為散每服一錢匙熟水調下以利為度量兒大小加減水寶散治小兒疳水通身虛腫狀如熟李者童子青橘皮珠子甘遂微炒上等分為末三歲一錢用麥糵煎湯點臘茶清調下食前通利為效忌鹹酸食三五日凡治腫者氣虛只與五苓散補甘遂檳榔散治積水疳水並宜服之甘遂青皮去白陳皮去白檳榔一錢生用上末紫蘇木瓜湯點下忌服甘草藥積水疳水皆宜服之此候久而不痊必連陰腫脾腎俱壞之然如此已是危證不可取下只可利水道固脾土當用之五苓散和平胃散加麥門冬薑棗煎服一方無陳皮燈心蘿蔔子湯下腳腫木瓜湯下又方上用錢氏益黃散去丁香加木香去訶子加蘿蔔子為細末大小以意加減煎湯調下海蛤散治小兒疳水腫滿氣急澤瀉海蛤防己各一分蘿蔔子三十粒上為末三歲一錢酒調下連進二服小便利即效葶藶散治小兒水氣腫滿甜葶藶隔紙炒紫牽牛略炒取仁白桑皮炒雞心檳榔川大黃各等分上為末每服半錢水半盞姜三片蜜半匙煎湯調下或煎大流氣飲研青木香丸灌下禾里豆根湯治小兒氣腫滿小便澀禾里豆根車前草桑根白皮各半兩葵子赤小豆各半兩上細銼和勻每服取一分水一小盞煎至五分去滓分為二服日三四服隨兒大小以意加減豬苓散治小兒水氣腫滿小便不利臍腹妨悶喘促豬苓去黑心桑根皮銼赤茯苓海蛤甜葶藶隔紙炒紫色各一分上搗粗羅為散每服一錢水一小盞煎至五分去滓溫服日三四服量兒大小加減木香散治小兒水氣四肢浮腫腹脅妨悶木香赤茯苓各一分鱉甲塗醋炙令黃去裙襴川大黃銼碎微炒各半兩牽牛子微炒三分上搗細末為散每服以溫水調下半錢以利為度隨兒大小加減檳榔餅子治小兒水氣四肢浮腫脹脅妨悶檳榔一分郁李仁半兩為浸去皮微炒上搗羅為末以大麥面一兩和作餅子煻灰內煨熟量兒大小與吃即得通利氣下也以溫水下之冬瓜丸治浮腫水氣大冬瓜一枚先於頭邊切一蓋子取去中間瓤不用以赤小豆水淘淨填滿冬瓜中間再用蓋子合了用竹籤定以麻線系紙筋黃泥通身固濟窨干用糯米殼破取糠片兩大籮埋冬瓜在內以火著糠內煨之候火盡取去泥利冬瓜令盡薄切作片子並豆一處焙乾上為細末以煮麵糊為丸如梧桐子大每服五十丸煎冬瓜子湯送下不拘時候小便利為度
