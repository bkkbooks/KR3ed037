body:
  text: 卷三百八十五嬰孩諸熱疸腫門風熱附論夫小兒體性純陽熱氣自盛因觸犯風邪與熱氣相搏外傷皮毛內壅心肺其狀惡風壯熱胸膈煩悶目澀多渴是也方珍珠丸治小兒風熱心神驚悸夜臥不安珍珠末羌活去蘆頭防風去皮鉤藤龍膽天竺黃別研升麻牛黃研各一分茯神去皮人參羚羊角鎊犀角鎊各一分鉛霜研龍腦研麝香研各一分上搗研為細末煉蜜和丸如緑豆大每服五丸荊芥薄荷湯送下日三服治一切驚涎量兒大小加減牛黃丸治小兒風熱身體困倦利膈化涎安神鎮心牛黃研龍腦研麝香研各半錢甘草炙銼雄黃研天竺黃研丹砂研人參遠志去心乾蠍去土炒山芋白殭蠶各一錢天南星水煮一日透要切焙天麻各一字上搗研為末煉蜜和丸如雞頭子大每服一丸分四服金銀薄荷湯化下不拘時候量兒大小加減丹砂丸治小兒風熱多驚丹砂研水飛柴胡去苗鐵粉研麥門冬去心焙白茯苓去黑皮各半兩天竺黃研人參黃耆銼黃芩去黑心甘草炙銼各一分牛黃研麝香炙各一錢上搗研為末煉蜜和丸如緑豆大每服五丸煎竹葉湯化下量兒大小加減一方有茯神半兩犀角丸治小兒風熱心神驚悸犀角屑半兩牛黃研一錢硃砂半兩研飛天竺黃半兩細研鉛霜一分研細鐵粉人參半兩去蘆赤茯苓半兩蚱蟬一分微炒龍腦一錢細研麝香一錢細研白附子一分炮上搗羅為散入令勻煉蜜和丸搗一二百杵如桐子大每服以薄荷湯送下三丸量兒大小以意加減鉤藤湯治小兒風熱驚疳潮熱鉤藤一兩使君子去皮乾蠍炒人參子芩川大黃銼微炒犀角屑各一分蚱蟬三枚微炒甘草半兩炙微赤銼石膏半兩川升麻半兩上搗篩為末每服一錢以水一小盞煎至五分去滓入竹瀝半合牛黃末一字看大小分加減寸金湯治小兒風熱鬱金大黃各一兩皂莢二兩一碗薑汁滓浸煎二味共煮軟片切暴乾馬牙硝當歸切焙山梔子仁各半兩人參甘草炙赤芍藥各一兩雄黃少許好者上粗搗篩每服半錢水七分薄荷三葉同煎四分去滓冷服日一服牛黃丸治小兒風熱心神煩躁少得睡眠牛黃一錢細研硃砂半兩研水飛黃芩犀角屑半兩川升麻半兩人參去蘆麥門冬去心焙防風去蘆赤茯苓甘草炙微赤各等一分上搗羅為散入研了藥研勻煉蜜和丸如緑豆大每服竹葉湯下五丸三日四服量兒大小以意加減服之茯神丸治小兒風熱潮作肌體煩倦不思飲食安鎮心神茯神去木麥門冬去心焙各半兩犀角梔子仁白鮮皮升麻玄參車前子各一分鐵粉研丹砂研各半兩上搗羅八味為末與鐵粉丹砂研勻煉蜜和丸緑豆大每服五丸溫熟水下不拘時量兒大小加減鉛霜丸治小兒風熱宜服鎮心安神化涎鉛霜研細天麻牛黃研細天竺黃研細甘草麝香研細各一錢茯神二錢龍腦一分研細人參硃砂半兩細研飛上搗羅為末研了藥令勻煉蜜和丸搗一二百杵丸如梧桐子大不計時候以薄荷湯研下一丸量兒大小以意加減化涎餅子治小兒風熱涎盛發喘嗽鐵粉研人參白朮硼砂馬牙硝粉霜牛黃麝香各一錢丹砂二錢研上搗研為細末煉蜜和丸如皂子大捻作餅子別以丹砂為衣二歲兒服半餅子薄荷湯化下羚羊角湯治小兒風熱心膈悶身體壯熱少睡多渴羚羊角鎊麥門冬去心焙甘草炙銼各三分白茯苓去黑皮一方有茯神白鮮皮升麻人參黃耆各半兩上粗搗每服一錢水一小盞煎至五分去滓入竹瀝半合更煎沸分為二服量兒大小加減桔梗煮散治小兒風熱及傷寒時氣瘡疹發熱等證桔梗銼炒細辛去葉人參白朮栝蔞根甘草炙銼白茯苓去黑皮芎藭各等分上搗羅為散每服二錢水一盞生薑一片薄荷三葉同煎至六分去滓服三歲以上至五歲連進二三服即瘥小兒發熱不問傷寒熱便與數服無不愈兼服小黑膏丸白鮮皮散治小兒心肺風熱壅滯胸膈不利白鮮皮防風去蘆黃芩犀角屑知母沙參去蘆人參去蘆各半兩甘草炙微赤銼一分上搗篩為散每服一錢水一小盞煎五分去滓量兒大小溫服鎮心鉛霜散治小兒肺心風熱多驚鎮心鉛霜二分細天竺黃一分細研硃砂一錢研細柏子仁白附子炮煨等分上搗羅為散入研了藥都研令勻每服以荊芥薄荷湯調下半錢日三四服量兒大小以意加減桃符丸治小兒風熱大黃郁李仁黃蘗宣黃連鬱金各一分巴豆二七七個去皮油為霜輕粉二錢上為末滴水為丸如緑豆大以硃砂為衣每服二丸用桃符煎湯看人大小加減人參湯治小兒多驚風熱人參白茯苓去黑皮甘草炙銼大黃微炙芍藥鉤藤當歸焙各半兩上搗粗篩每服一錢水八分入竹葉五片煎至五分去滓溫服麻黃湯治小兒風壅痰實經絡邪氣頭疼麻黃去根節煮掠去末焙防風去叉芎藭羌活去蘆頭葛根銼甘草炙各一兩荊芥穗二錢上粗搗篩每服一錢水一盞煎至五分去渣溫服鬱金散治小兒風熱胸膈煩悶目澀多渴鬱金半兩蟬蛻四個龍膽白附子焙各半兩大黃炒乾蠍炒甘草各一兩上搗羅為散每服一字至半錢量兒大小空心煎薄荷湯調下大麻仁散治小兒肝肺風壅心膈不利痰嗽大麻仁半兩百合半兩犀角屑半兩杏仁湯浸去皮雙仁麩炒微黃半兩牛黃一錢研檳榔一分龍腦一錢細研上搗羅為散每服煎生薑甘草湯調下半錢量兒大小以意加減白朮生犀散治小兒一切風熱白朮桔梗微炒甘草炙銼馬牙硝研各半兩麝香研一錢生犀角半兩上搗羅四味為散與二味研者和勻每服半匕蜜熟水調下薄荷熟水亦得量兒大小加減犀角丸治小兒風熱痰實面赤大小便閉澀三焦邪熱臟腑蘊毒犀牛角半錢人參半兩切去蘆黃連一兩枳實去瓤炙銼一兩大黃一兩酒浸切片巴豆去皮一百十粒在大黃上紙煨節上蒸三次切炒令黃焦去巴豆不用檳榔半兩上為細末煉蜜為丸如麻子大每服一二十丸臨臥熟水下未動加數丸治大人孕婦無損緑霞散治小兒風熱身如火炭夜則多哭柏葉半兩全蠍鬱金殭蠶炒去絲土嘴雄黃各一分南星薑汁湯炮三五次後干炮煨一分上為末三歲一錢薄荷蜜湯下涼心煮散治小兒風熱連翹防風去叉甘草炙銼山梔子仁雞蘇惡實炒各半兩上為散每服二錢水一盞煎三五沸量兒大小加減天竺黃散治小兒驚風風熱天竺黃蟬蛻白殭蠶炒山梔子仁甘草鬱金上等分搗羅為散每服一錢熟水調下三歲兒可服半錢天竺牙硝散治小兒風熱天竺黃馬牙硝各半兩研丹砂生龍腦各半分研栝蔞根滑石各一分上搗研為細散每服半錢新汲水調下防風湯治小兒風熱止煩渴除風疹治驚悸防風去叉黃耆甘草炙銼人參連翹各半兩山梔子仁一分上粗搗篩每服一錢水八分煎六分去滓溫服抱龍丸治小兒風熱壅遏關膈滯塞涼心壓驚上以臘月豬膽一枚天南星好者炮去皮臍搗為細末填滿膽中緊扎通風處陰乾去膽皮取藥每一兩以金銀箔小者各十片丹砂一錢半龍腦麝香各一字同研細煉蜜和丸如雞頭實大每服一丸竹葉水化下歲數小者半丸柴胡木香湯治小兒風熱潮作不思飲食肌體消瘦柴胡去苗十兩木香一兩人參半夏湯洗七遍去滑石各二兩黃芩去黑心甘草炙各三兩上粗搗篩每服二錢水一盞入姜二片大棗一枚擘煎至六分去滓溫服不拘時候龍膽丸治小兒肺心風熱龍腦三錢去蘆胡黃連二錢牛黃一錢研川大黃二錢犀角屑二錢上搗羅為末入牛黃都令研勻煉蜜和丸如緑豆大每服以薄荷湯化破服五丸量大小以意加減宣風散疏導風熱越桃飲治小兒風熱越桃去皮一兩甘草銼一兩藿香葉石膏飛過各半兩上用蜜二匙塗在銚子內先炒甘草赤色次下越銚藿香葉炒微黑為度搗羅為末入石膏研勻每服一錢匕新汲水調下人參桔梗散治小兒風熱人參白茯苓去黑皮桔梗微炒甘草炙銼上等分搗羅為散每服半錢匕熟水調下牛黃散治小兒風熱心胸煩悶牛黃一分研鬱金半兩取末人參一錢取末上細研令勻每服半錢荊芥調下日進三四服量大小以意加減珍珠散治小兒挾風蘊熱太陰玄精石一兩石膏三分龍腦半錢上搗研極細每服半錢新汲水調下鉤藤散治小兒風熱驚悸大小便赤澀方見本門壯熱類連翹瞿麥車前子牛蒡子赤芍藥滑石各一兩梔子木通當歸防風各半兩荊芥黃芩各半兩柴胡甘草各二兩蟬殼二錢半上㕮咀燈心煎惺芎散去風邪退身熱茯苓去皮川芎各等分人參甘草炙桔梗去蘆細辛去苗白朮上為㕮咀每服三錢水一盞煎至七分去滓稍熟不飢不服大黃丸治風熱裡實口中氣熱大小便祕赤飲水不止者宜服之川芎半兩銼黑牽牛半兩半生熟炒大黃一兩酒洗過飯上蒸熟切片暴乾甘草一分銼炙上為細末稀糊為丸如麻子大二歲每服十丸溫蜜水下乳後服溏利為度未利加丸數再服量兒大小虛實用之紅綿散治風熱頭目不清白殭蠶二兩宜煮炒天麻一兩生南星一兩切浸黃蘇木二兩上為末每服一錢入紅綿少許煎六分食前傷寒有表證發熱者每服入去節篩麻黃末一字有里證心躁熱渴入滑石末半錢或一字同煎惺惺散治風頭痛壅疼咳嗽清涕或生疹瘡半夏制南星蘇葉草果陳皮制厚朴制檳榔秦艽柴胡蒼朮烏梅良薑上㕮咀酒水各一盞桃柳枝各七寸甘草一寸煎去滓露一宿癸日雞鳴時服又方用常山生煨生草果煨一錢東方桃枝七寸煎入生薑汁半盞露一宿五更服壓熱抱龍丸治小兒風熱痰盛驚癇搐搦五心煩熱睡臥不寧精神不悅天南星一兩切作片子用雪水一碗甘草一兩匙碎煮軟切焙別為主雄黃一錢水飛過研細硃砂一錢用乳鉢研細牛黃半錢為末研天竺黃二錢研為末麝香一字研入諸藥拌和上件和勻滴雪水為丸如雞頭子大每服一歲以上一丸用薄荷湯化下日午臨臥服三歲左右一丸半余長子周晬糞長青到永州方脈蔣宜用此藥數服即變黃今家間小兒常服之清心丸治風熱不睡天竺黃大黃黃連牡蠣遠志梔子仁炒黃芩甘草上為末煉蜜和丸如緑豆大新汲井水吞下茯神散治風熱驚悸心虛盜汗茯神山藥全蠍遠志甘草白附子荊芥蟬蛻硃砂金箔麝香上為末燈心湯調下蠍尾散治風熱茯苓蠍尾飛羅面硃砂山藥麝香甘草上為末麝香湯入酒數滴調下升麻飲治小兒臟腑積熱面赤煩渴痰實不利腸胃燥澀一切風壅並皆治之山梔子仁防風甘草大黃連翹升麻各等分上件㕮咀每服二錢水六分盞煎至四分去滓溫服乳食後如大便尚未通入芒硝半錢再略煎熱服地黃煎丸治小兒血熱風壅大人亦宜服之生地黃洗切焙乾熟乾地黃洗切焙各二兩薄荷葉二兩半洗去土甘草一兩半切微炒山梔子仁二兩半片白腦子一兩別研上件為末後以腦子同研勻煉蜜為丸每一兩作四十丸每服兩丸溫水化下乳食後服大人每服五丸至十丸淡竹葉粥治小兒臟腑風熱精神恍惚淡竹葉一切至粳米一合茵蔯半兩上以水化下一大盞煎二味取汁一盞去滓投米作粥食之羌活丸治風熱化痰安驚羌活荊芥穗甘草桔梗白朮白附子川芎防風茯苓各二兩硃砂二錢一半入藥一半為衣上為細末煉蜜為丸如皂子大每服一丸至兩丸薄荷湯化如涎盛加藕湯下此方最穩防風湯治風熱痰壅大便不通羌活防風枳實各半兩川芎甘草炒大黃濕紙煨各二錢半上銼末每服三字薑棗煎服阿膠散治風熱涎潮喘促搐掣竄視透明阿膠炒二錢半紫蘇一錢上為末每服一錢入烏梅肉少許煎灌下神效熱出於肺熱則生風阿膠清肺行小便故也驚涼丸治風熱相搏手足搐搦目睛上視草龍膽末防風末青黛研各三錢龍腦一錢匕鉤藤三錢末黃連五錢匕牛黃麝香各一匕上為細末麵糊丸粟米大每一二十丸金銀湯服下麥門