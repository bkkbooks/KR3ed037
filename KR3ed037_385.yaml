為胃之經主身之肌肉其胃不和則氣行壅澀故蘊積體熱令兒多睡名為溫壯小兒大便若糞黃而臭此腹內有伏熱宜便服龍膽湯若糞白而酢臭則挾宿寒不消當服紫雙丸輕者少服令默除之甚者增令微利皆當節乳哺數日令胃氣和若不節則反復傷其胃氣令腹滿再三利尚可過此傷小兒矣方竹葉湯治小兒五歲溫壯腹中急滿便臭不利或有微腫亦主極羸不下飲食及手足逆冷竹葉切一升小麥半升甘草炙黃芩栝蔞根澤瀉茯苓知母白朮大黃各一兩生薑一兩半桂心二銖嬰孩用三錢麥門冬半夏各二兩當歸十八銖人參三兩上㕮咀以水七升煮小麥竹葉取四升去滓內藥煎取一升六合分四服消滯丸治小兒熱疾後腹中不調飲食不節腹滿溫熱及中客忤兼乳冷有所傷一名雀屎丸雀屎白牛黃研各一錢芎藭芍藥乾薑甘草炙各半兩麝香研小麥面大黃銼炒當歸焙人參各三分上為末煉蜜和丸如麻子大溫熱水下三丸欲令下都服五丸一方加黃耆黃芩各二分炒柴胡湯治小兒脅下實肌惕惕已發溫壯傷寒柴胡當歸細辛各三分黃芩大黃升麻五味子紫菀各二分牛黃杏仁四十個去皮炒上切以水五升煮取一升每服二合日進三服夜二服量兒大小以意用之無牛黃以麝香代之竹葉湯治小兒夏月患腹中伏熱溫壯往來或患下痢竹葉切小麥去五合黃芩一兩六銖茯苓柴胡人參麥門冬甘草炙各半兩上㕮咀以水四升煮竹葉小麥取二升去竹葉小麥下諸藥煮取一升半分作三服若小兒夏月忽壯熱炙手洞下黃溏氣力惙然脈極數用此方加大黃二兩再服得下即瘥胡黃連散治小兒溫壯常欲飲水胡黃連犀角屑牛黃細研入龍膽去蘆頭川大黃炙微赤銼知母各一分麥門冬半兩心焙上為散每服以沙糖水調下半錢量兒大小以意加減牛黃丸治小兒溫壯驚熱牛黃天竺黃腦麝並細研熊膽各一分犀角屑胡黃連末山梔子仁末郁李仁湯浸去皮研各半兩上同研令勻以糯米粥和丸如麻子大不計時候以薄荷湯下三丸量兒大小以意加減生犀牛黃丸治小兒風邪溫壯發熱壓驚止頭痛化涎犀角屑一分牛黃一錢研龍腦麝香各半錢研天南星牛膽內者末藿香葉為末各二兩甘草生雄黃各半兩研上合研和粉煉蜜和丸如雞頭子大每服一丸不計時候薄荷湯下柴胡湯治小兒腹中伏熱溫壯往來一名柴苓散柴胡去蘆頭三分黃芩去黑心一兩人參甘草炙赤茯苓去黑皮各半兩麥門冬半兩上㕮咀每服一錢水七分小麥五七十粒竹葉十片煎四分去滓溫服量兒大小加減服之麝香丹治溫壯人參去蘆頭胡黃連鉤藤赤芍藥各一分上為細末次入好麝香一錢牛黃半錢拌糯米粥和丸黍米大每服五粒至七粒煎陳橘皮湯下不拘時候天南星丸治小兒挾熱痰盛溫壯夜臥不穩天南星炮為末半夏湯浸七次焙為末膩粉研滑石研各一分巴豆二十四粒去心以水浸一宿不去油上先研巴豆令熟次下藥末以糯米粥和丸如緑豆大每服三十丸更量兒大小加減瀉痢米飲下取食蔥湯下驚悸薄荷荊芥湯下清涼飲子治小兒溫壯熱實及面頰赤口渴五心煩躁睡臥不寧四肢驚掣因乳哺不時寒溫失度令兒血氣不理腸胃不調或連滯欲成伏熱或欲發驚癇或風熱結核頭面瘡節目赤咽痛瘡疹餘毒一切壅滯並宜服之大黃甘草炙當歸芍藥上水一升六合煮取八合為三服此方四味飲而元和紀用經乃有療小兒百疾加減四味飲仍來自四味飲以下紫丸等方謂之育嬰七實紫陽道士一名保子七聖至寶方專一書者此方是也此飲理小兒胎寒腹脹痛乳哺不時溫壯發熱吐利不常諸驚掣縮二十五癇肌膚喜瘡遇時而發作口瘡惡積赤目黃瘦大小變蒸用芍藥白者赤者各半如宣泄即用純赤者生用二分癘疫溫壯肺邪不利寒熱者加二分通用四分也利小便用赤色者及驚狂瘡疥赤目如血當歸肉多枝少而氣香者生用二分欲血脈流暢不為瘡瘍惡核者及止腹中痛胎寒腹痛啼聲不已者加二分通用四分也如理寒熱破積解溫壯以下加大黃如牛舌緊硬用蜀中者如欲泄痢宣蕩推陳去熱即用河西錦紋者生用二分葛氏元用四分紫陽保子方減二分下痢者又減一分只用一分也甘草赤黃斷理脆而易折者炙銼二分虛熱者加一分通用三分也及解煩止渴寒熱邪氣大能安神定驚和而不去有國老之尊號也四味以水三升煮去滓月內兒服一杏核大量之日三百日而服一粟殼量之日三三歲兒粟米殼量之為一服日三三歲兒以上隨大小增之兼乳母服尤良依上法增減正藥外若發驚及溫壯外有冒寒邪以去節麻黃一分水三升煮去沫去滓內正藥如本方服之若驚風反折戴眼掣縮者加細辛四分內一料正藥增水至四升煮取一升五合若中風身體強戴眼者加獨活二分內一料正藥用水如正方煎服大神驗二黃湯治溫壯大黃黃芩各四分甘草三分炙細辛二分上水五升煮取一升二合三服此方小兒數服不癇若著驚加鉤藤二分大效胡洽云此治小兒有病甚效牛黃散治小兒溫壯身體常熱不止牛黃細研甘草炙微赤銼各半分梔子仁子芩柴胡去苗龍膽去蘆頭各一分上為散入研藥令勻每服半錢以金銀溫水調下不計時候服量兒大小臨時加減服之升麻湯治小兒溫壯不解升麻柴胡去蘆頭麥門冬去心焙黃芩去黑心甘草炙銼各半兩黃耆銼人參各一兩上粗搗篩每服一錢以水八分煎取五分去滓量兒大小加減服黃芩散治小兒溫壯或下之後而熱不除舌大不含乳胸中有痰口中生瘡兼驚悸宜服黃芩一兩鉤藤半兩甘草炙微赤銼半兩川芒硝半兩川大黃別研微炒一兩蛇蛻三寸炙黃上為散每服一錢以水一小盞煎至五分去渣入牛黃少許量兒大小加減溫服犀角散治小兒身體壯溫心神不安犀角屑鉤藤黃芩梔子仁川大黃銼研微炒半兩甘草一分炙微赤銼上為散每服一錢水一小盞煎五分去滓量兒大小加減溫服天竺黃散治小兒受驚溫壯不可吃乳天竺黃細研鉤藤赤芍藥人參去蘆頭甘草銼微赤炒牛黃細各半兩上為散入研藥更研令勻不計時候以蜜水調下半錢量兒大小以意加減七寶散治小兒溫壯伏熱傷寒煩躁面赤氣喘夜熱晚涼當歸芍藥甘草炙大黃蒸熟一麻黃去節三分白朮麩炒荊芥穗各二錢上細末每服半錢至一錢水半盞蔥白一寸薄荷一葉煎至三分俟溫並三服要瀉熱服百病飲子治小兒患溫壯熱實大黃四分甘草炙芍藥各二分上以水一升六合煮取八合分為三服五味子湯治小兒有熱服藥大下後身溫壯胸中有結熱及治傷寒病久不除瘥後復劇瘦瘠骨立五味子五分黃芩柴胡芒硝麥門冬去心黃連石膏末各二分甘草炒當歸各一分大黃四分上水二升七合煮一升三合去滓內芒硝令煬二百日兒服三合日進三服夜一服有痰必吐得下便止一方有前胡無柴胡煩熱附論夫小兒臟腑氣實血氣盛者則表裡俱熱其狀煩躁不安兼皮膚壯熱也方大青散治小兒氣壅煩躁心熱目赤大青半兩川大黃半兩微炒牛黃半錢研細硃砂細研甘草炙犀角屑玄參川升麻梔子仁各一分上為散入研了藥都令勻不計時候以沙糖水調下半錢服量兒大小以意加減黃芩散治小兒臟腑壅實心神煩熱睡臥不安黃芩酒炒銼細大黃銼微炒甘草炙川芒硝麥門冬去心石膏各半兩上為散每服一錢水一小盞煎至五分去渣量兒大小以意加減不計時候溫服人參散治小兒煩熱多驚人參一分去蘆天竺黃一分細研甘草半兩炙鉤藤一分牛黃半分研細上為散不計時候煎竹葉湯調下半錢量兒大小以意加減龍膽丸治小兒心臟氣壅煩熱悶亂龍膽草一兩去蘆黃連一兩去須鉛霜半兩細研牛黃一錢細研鐵粉一分細研上為末都研令勻以粟米飯和丸如緑豆大不計時候以薄荷蜜水下五丸量兒大小以意加減犀角散治小兒煩熱昏悶多睡犀角末半兩青黛一分硃砂一分蛇蛻灰一錢上為散每服以溫水調下半錢量兒大小加減服之一方有代赭一分朱麝散治小兒煩熱昏悶多睡青黛一分乾地龍七條微炒為末麝香半分硃砂一分上研為散每服以飲調下半錢量兒大小加減服之治小兒寒熱噦方上用乳二合薑汁一合銀器中慢火煎過五六沸一歲兒飲半合量兒大小加減服之治小兒煩熱驚風以慎火草即景天草水煎洗浴潮熱附論夫小兒潮熱者身體發熱作止有時故謂之潮熱由保養失宜風冷邪氣客於肌膚之間每於衛氣至則真邪相搏故令發熱五欲知在何經絡當觀其發之時屬何腑臟各循其經以調之治潮熱五者一因傷寒之後餘毒不解或成潮熱宜服脫甲散兼小柴胡湯二因痞氣有塊陰陽不均成潮熱先服梨漿飲次服後煎丸三症積食傷冷滯脾胃不和成潮熱先服脫甲次塌氣下之後調胃四陰陽不和臟腑虛怯成潮熱或冒暑濕脾虛成潮熱單服煨姜散五瘡疹後餘毒不解成潮熱宜服大連翹飲子更與助胃氣潮熱謂熱來之有期或一日一發或二日一發不越三日先寒後熱正定來者易治亂日者難理疾起脾胃即似瘧候同出而異名又有單熱潮發久作疳長作症積滯痞氣皆腳冷渾身熱若有蟲積其肚亦熱如火凡兒有患腳冷肚熱者便與下之須量熱輕重分數而治之蟲多者取之少則安之取蟲宜在於春旺冬實之時其或兒壯蟲盛不拘此說方大連翹飲治證在前論連翹瞿麥穗滑石車前子牛蒡子炒紅芍藥各一兩山梔仁木通川當歸防風各半兩黃芩去心荊芥穗各一兩半柴胡去蘆甘草炙各二兩蟬蛻去腳一分上㕮咀每服一二錢水一小盞煎取半盞風痰熱變蒸熱麥門冬去心煎實熱丹熱加大黃燈心煎瘡疹熱未出前已出後紫草當歸煎胎熱肺熱傷寒後餘毒熱瘡疹餘毒熱加薄荷煎癰癤毒熱加大黃朴硝煎此方解利心經邪熱心與小腸受盛小腸乃水竇常宜通利壅則結滑則脫熱則澀盛則淋平涼心經三焦自順不得疾作而解證成而療者疏怠有之矣十五味加湯使再煎才覺蘊熱寒邪風邪冒入肺經將之心心不受觸傳於小腸或閉或澀或赤或白淋瀝不通榮衛不順壅之作疾其發多端以至膈熱眼目腫赤唇口白瘡津液不生唾涕稠盛雖在表裡但得其宜驚風悉皆能散化痰熱亦自消除連翹之功不虛設耳梨漿飲治證在前論柴胡人參黃芩去心前胡秦艽去土甘草炙青蒿取在頭用童子小便浸一二次日乾為度上件等分每服一錢水一小盞入生藕生梨各一片薄荷二葉生地黃一寸同煎至半去渣通口空心食前服兩滓並煎作一服一歲兒半錢此方治脾積寒熱其狀如瘧乃由脾氣陰陽相勝故也其寒在先陰盛於陽其熱在後陽盛於陰陰陽循之經絡傳歸於本依前復作不越三日而止重則頭疼嘔逆久則二三歲不歇左脅有塊小者如桃李大者如杯碟治法下去症積痞塊自消然寒熱亦能自解宜先與服梨漿飲連渣並三服定去寒熱了方可下積問云藥性寒涼何以御之答曰所謂先寒後熱猶陰陽勝伏遞相更變陰積陽虧逆虛愈重所復梨漿飲以毒攻毒藥以青蒿以寒禦寒其熱不有寒必無加自然榮與衛和陰與陽合寒熱再潮未之有也梨漿之功妙哉絶倫稍能知用無不獲安若患三載不過服兩服曾經十年只此方妙用至純使人欽嘆而已犀角散治小兒骨蒸肌瘦頰赤口乾日晚潮熱夜有盜汗五心煩躁四肢困倦飲食雖多不生肌肉犀角末地骨皮麥門冬枳殼去瓤麩炒大黃蒸柴胡茯苓赤芍藥桑白皮黃耆人參鱉甲塗醋炙焦各等分上為細末每服二錢入青蒿少許水煎量兒大小加減一方有秦艽無大黃人參柴胡湯治小兒潮熱不解長肌肉飲食人參柴胡去苗白茯苓去黑皮芎藭各一兩知母焙升麻藁本去苗土甘草炙天門冬去心焙各半兩獨活去蘆頭柏子仁研各一分上粗搗篩每服一錢水半盞入生薑二片青蒿一穗同煎至三分去滓食後溫服五歲以上十五以下入醋炙鱉甲半兩每服二錢水一盞煎六分服柴胡飲治小兒潮熱柴胡去蘆人參知母焙羚羊角鎊甘草炙陳橘皮湯浸去白焙赤茯苓去黑皮半夏湯浸七日去滑焙木通銼芍藥各等分上粗搗篩每服一錢水一盞入生薑一片同煎至五分去渣溫服日二白鮮皮湯治小兒潮熱白鮮皮人參白芷防風去叉黃芩去黑心知母焙沙參犀角鎊各半兩甘草炙一分上粗搗篩每一錢水八分入薄荷三片煎五分去渣分溫二服青蒿湯治小兒潮熱青蒿焙知母焙甘草炙各二兩半夏湯浸七次薑汁製一分常山銼焙二兩鱉甲醋炙黃去裙襴枳殼去瓤麩炒秦艽去苗切各四兩上粗搗篩每服半錢水半盞入生薑一片烏梅肉少許同煎三五沸去渣溫服犀角湯治小兒潮熱骨蒸羸瘦久咳嗽喘生犀角鎊半錢柴胡去苗秦艽去苗土各一兩白朮赤茯苓去黑皮木香各半兩甘草炙一分上粗搗篩每服一錢水七分入小麥三七粒同煎至六分去滓溫服日三二連丸一名豬膽丸治小兒血熱每日午間發熱遇晚則涼胡黃連宣黃連赤芍藥各半兩上為末獖豬膽汁和成劑入在膽中懸胎用漿水煮熟取出飯為丸如小豆大三十丸米湯送下日三服無時又有瘰壅證相似兒多鼻結泄瀉或腹中氣滿或時嘔逆宜服之秦艽散治小兒潮熱減食蒸瘦秦艽去頭切焙甘草炙各一兩干薄荷葉半兩切焙上為粗末每服二錢水一盞煎至八分食後溫服龍齒湯治小兒潮熱往來睡多盜汗肌體瘦久不瘥者麥門冬去心地骨皮遠志去心人參去蘆頭白茯苓去皮甘草微炒防風去蘆頭以上七味各二錢紫石英一錢石膏一錢羚羊角一錢龍齒二錢上件每服二錢水六分煎至四分去渣溫服乳食後臨臥服天竺黃散退潮熱理驚解唇紅面赤煩躁焦啼瓜根甘草鬱金天竺黃連翹防風牙硝別研各等分上為末每一錢潮熱燈心茅根煎湯下急驚竹葉湯下黃雞煎丸治小兒潮熱肌瘦盜汗黃連去須二兩鶴蝨蕪荑仁各半兩秦艽去苗土柴胡去苗知母焙各一兩使君子去皮一兩上搗為末以黃雌雞一隻重一斤許者籠之食以麻子候五日去毛令淨於毛下開竅去腸肚洗淨干入前藥末於腹內以線縫之取小甑先以黑豆鋪甑底厚三寸安雞在甑內四旁以黑豆圍裹上以黑豆寸半蓋之自巳時炊至申時住候取雞去腹中藥及筋骨翅以淨肉研和得所更少入酒麵糊丸如小緑豆大每服十丸量兒大小加減空心臨臥麥門冬熟水調勻送下十五歲以上溫酒下鱉甲丸治小兒潮熱煩渴引飲脅腹滿脹羸瘦多汗鱉甲醋炙去裙襴黃耆銼柴胡去苗各一兩枳殼去瓤麩炒白朮人參各半兩木香一分上搗羅為細末浸炒餅心和丸如麻子大二歲兒十丸溫粥米飲下量兒大小加減服之人參芎歸散治小兒虛勞潮熱或遍身生瘡人參當歸前胡柴胡遠志浸取肉薑汁焙地骨皮防風北梗半夏曲各一錢半川芎茯苓麥門冬去心各二錢枳殼制一錢半赤芍藥一錢甘草三錢焙上㕮咀每服二錢水一小盞姜三片紫蘇三四葉煎服發瘡者兼服豬肚黃連丸方見疳類別作小丸不惟治瘡治渴其發熱而肚脹者米飲常服二十丸地骨皮飲治小兒潮熱盜汗心怯及骨蒸勞熱地骨皮白茯苓去黑心瞿麥穗赤芍藥山梔子仁生乾地黃焙甘草炙各一兩大黃銼炒柴胡去苗木通銼各一兩人參木香各半兩青橘皮湯浸去白焙一分上粗搗篩每服一錢水七分入竹茹少許同煎至四分去渣溫服不拘時候量兒大小加減六合湯治小兒血熱每日巳午間發熱遇晚則涼當歸大黃川芎熟地黃白芍藥柴胡各二兩一方加桂半兩各琴飲子亦治頭熱身涼並五心熱名四順飲加川芎一倍上為末一錢水半盞煎三分服無時三歲用一錢酸棗仁飲治小兒風虛潮熱齗齒譫言酸棗仁一兩蛇蛻皮炙五條人參羌活去蘆頭各半兩甘草炙一兩上粗搗篩每服二錢水一盞入薄荷三葉同煎七分去滓分溫三服量大小加減百一羌活餅治小兒潮熱羌活去蘆頭芎藭白殭蠶炒雞蘇各一兩乾蠍全者十四枚微炒上粗羅為末煉蜜和丸如雞頭子大捏作餅子每服一餅荊芥湯化下連翹湯治小兒潮熱方見金蓮散克效散治小兒潮熱往來久而不解煩渴昏倦肌瘦減食地骨皮二兩防風去蘆一兩半人參去蘆黃芩甘草炙葛根各半兩上件每服二錢水半盞煎至三分去渣溫服不拘時候柴胡地骨皮湯治小兒潮熱飲食不知肌肉黃瘁夜臥不安時有虛汗柴胡去苗地骨皮桔梗焙各一兩甘草炙半兩上搗羅篩每服一錢水一小盞煎至五分去滓食後臨臥溫服量大小加減甘露飲治潮熱乍來乍去心煩面赤口乾如瘧寒水石石膏鬱金甘草薄荷各半分上為末每服一錢食後薄荷湯調下牡蠣散一名黃耆散治血虛自汗潮熱牡蠣煅黃耆生地黃各等分上㕮咀每服二錢水半盞煎至三分去渣服一方浮麥煎蜀漆湯治小兒潮熱及百日兒壯熱氣息雖得歇眼不開小便赤黃蜀漆甘草知母龍骨牡蠣各半兩上㕮咀水四升煮取一升去渣一歲兒少溫服半合日再保童丸治小兒肌瘦五心潮熱解骨熱長肌肉益氣丹砂研一分大黃銼微赤芍藥梔子仁各半兩知母切焙一兩人參胡黃連各半兩鱉甲去裙襴醋浸炙各一兩上件搗為細末入丹砂同研浸蒸餅為丸如緑豆大每服五丸至十丸以蜜湯或人參湯下通心飲治心氣通小便退潮熱分水穀及治旋螺風木通去皮節連翹瞿麥梔子仁黃芩甘草各等分上銼散每服二錢水一盞燈心麥門冬煎春加蟬蛻防風夏加茯苓黃芩車前子秋加牛蒡升麻冬加山梔子連翹瘹氣用鉤藤川煉子加白茅根竹葉口瘡地黃野苧根湯旋螺風如赤腫而痛者先用土牛膝澤蘭煎水洗
