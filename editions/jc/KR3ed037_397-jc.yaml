body:
  text: 卷三百九十七嬰孩下痢門熱痢附論夫小兒挾熱痢此由邪熱在於腸間因胃氣不和乳食傷動故令腹痛腸鳴下痢黃赤名熱痢者由本挾虛熱而又為風熱所乘風之與熱俱入於大腸而為熱痢也非是水穀之痢而色黃者為熱也方犀角丸治小兒赤痢經時不止犀角鎊屑一兩一分黃連去須一兩半女萎一兩白頭翁去蘆頭一兩半茜根三分枳殼去瓤麩炒黃三分甘草炙半兩赤石脂一兩一分黃芩去黑心一兩乾薑半兩桂皮炙三分龍骨一兩黃蘗去粗皮炙半兩上為細末煉蜜和搗五百杵丸如梧桐子大一二歲兒每服三丸三歲至六歲兒可四五丸空心午後各一服米飲下黃蘗湯千金方治小兒夏月傷暴寒寒折大熱熱入胃下赤白滯如魚腦壯熱頭痛身熱手足煩躁此太陽之氣外傷寒使熱氣便入胃服此方良若誤以痢藥下之或以溫脾湯下之則熱劇以利藥下之便數去赤汁如爛肉者或下之不瘥後以澀熱藥斷之下既不止倍增壯熱者服之即效或是溫病熱盛復遇暴寒折之熱入腹中下血如魚腦者服之良方黃蘗黃連升麻白頭翁一作白蘞當歸牡蠣石榴皮黃芩桑寄生甘草各二分犀角艾葉各一分上㕮咀以水三升煮一升二合百日兒至二百日一服三合二百至期歲一服三合半赤石脂湯治小兒卒下熱痢赤石脂一兩黃連去須石膏碎甘草炙龍骨知母焙前胡去蘆頭赤茯苓去粗皮桂去粗皮芍藥各一分上搗篩一二歲兒每服半錢入棗一枚水七分煎至四分去滓溫分二服空心午後各一服栝蔞根散治小兒熱痢體瘦口乾煩躁不欲飲食栝蔞根白茯苓知母黃芩地榆微炙銼甘草炙微赤銼各半兩人參三分去蘆頭黃蘗半兩微炙銼赤石脂一兩上為粗散每服一錢水一盞煎至五分去滓不計時量兒大小加減服之龍骨湯治少小壯熱渴引飲下痢龍骨甘草大黃赤石脂瓜蔞根石膏寒水石桂心各二兩上治下篩以酒水各五合煮取二合二沸去滓量兒大小服之除熱結腸丸斷小兒熱下黃赤汁沫及魚腦雜血肛中瘡爛坐䘌生蟲黃連蘗皮苦參鬼臼獨活橘皮芍藥阿膠各半兩上為末以藍汁及蜜丸如小豆日服五丸至十丸如無藍汁可用藍子一合舂蜜和丸亦不得傷飽傷則再作犀角散治小兒熱痢煩悶腹痛面黃體瘦犀角屑半兩赤芍藥三分黃連三分去須微炒黃芩半兩知母三分葳蕤三分地榆半兩微炙銼甘草半兩炙微赤銼上為粗散每服一錢水一小盞煎至五分去滓量大小日三四度分減服之牡蠣丸治小兒熱痢牡蠣煅黃連去須黃蘗去粗皮炙龍骨赤石脂人參甘草炙各一兩上為末煉蜜和搗千餘杵丸如麻子大一二歲兒每服三丸四歲至六歲兒五丸米飲下空心午後各一服龍骨散治小兒熱痢煩悶口乾不欲乳食龍骨一兩黃連三分去須微炒地榆三分微炙銼黃芩三分烏梅肉半兩微炒赤地利三分鼠尾花三分上為細散每服以粥米飲調下半錢日三四服量兒大小加減熊膽散治小兒熱痢壯熱全不食乳食乳即吐熊膽半兩黃連去須三分馬齒莧乾者炒一兩無食子煨一枚蚺蛇膽半兩犀角鎊屑一兩上為細末一二百日兒每服一字匕新汲水調服空心午後各一服大小加減烏梅湯治小兒熱痢壯熱多渴而痢不止烏梅肉去核二枚焙黃連去須藍葉各一分犀角鎊屑阿膠炙燥甘草炙各半兩上搗篩三歲兒每服半錢水七分煎至四分去滓分溫二服空心午後各一大小加減麥門冬湯療小兒夏月伏暑吐痢過後胃中虛熱渴唯飲水麥門冬去心甘草炙各四分枳實炙黃芩人參各三分龍骨六分上切以水二升煮取九合去滓分溫服黃連丹治熱痢便血頻並黃連二兩去須當歸一兩焙白頭翁蔓菁葉各三分焙木香川練子各半兩面裹煨上為細末糯米飯丸如麻子大每服十粒米飲下大小加減地榆散治小兒痢腹痛心煩不欲飲食地榆三分微炙銼黃連半兩去須微炒赤石脂一兩人參去蘆頭赤芍藥各半兩杏仁湯浸去皮尖雙仁麩炒微黃上為粗散每服一錢水一小盞煎至五分去滓不計時量兒大小分減溫服子芩散治小兒熱痢腹痛壯熱心煩不欲飲食四肢瘦弱子芩一兩知母三分女萎三分黃蘗半兩微炙銼甘草半兩炙微赤赤芍藥半兩上為粗散每服一錢水一小盞入竹葉七片煎至五分去滓不計時量兒大小分減服黃芩知母湯治小兒熱痢不止黃芩去心知母焙各一兩山楂三分黃蘗去粗皮炙半兩甘草炙半兩上搗篩一二歲兒每服半錢水七分煎至四分去滓分溫二服空心午後各一服一方加竹葉梔子丸治少小熱痢不止梔子七枚大棗四枚炙黑黃蘗三分礬石四分黃連五分上為末蜜丸如小豆大每服五丸日三夜二服不止稍加至十丸梔子仁散治小兒熱痢腹痛心煩口乾小便赤黃不欲飲食梔子仁半兩黃蘗三分微炙銼當歸半兩銼微炒地榆三分微炙炒黃連一兩去須微炒熊膽散治小兒熱痢全不欲食乳身體壯熱熊膽一分蘆薈三分黃連半兩去須微炒沿籬豆一枚干馬齒莧一兩上為細散每服以粥飲調下半錢日三四服量兒大小加減白頭翁湯治小兒熱毒下痢如魚腦手足壯熱黃連去須一兩白頭翁酸石榴皮炙犀角鎊屑各半兩上搗篩一二歲兒每服半錢水七分煎至四分去滓分溫二服空心午間晚各一服一方無犀角量大小加減梔子丸治小兒熱痢不止梔子仁七枚黃蘗去粗皮炙三分白礬熬汁枯一兩棗大者三枚燒令黑色上為細末煉蜜和丸如麻子大三歲兒每服三丸三四歲兒每服五丸米飲下空心午後一服黃連湯治小兒熱痢黃連去須一兩黃蘗去粗皮炙半兩阿膠半兩炙燥上除阿膠外搗篩每服半錢酒半盞入阿膠一片同煎至二分去滓空心日午後近晚各一服三物湯一名大黃湯治小兒久痢不食乳大黃生銼甘草炙銼麥門冬去心焙等分上搗篩每服三錢水一盞煎至五分去滓分溫三服空心服量兒大小加減犀角散治小兒熱痢不瘥犀角屑半兩桂樹皮一兩銼黃連半兩去須微炒上為粗散每服一錢水一小盞煎至五令去滓不計時量兒大小分減溫服黃連湯治小兒熱痢腹中疼痛或血痢黃連去須山梔子仁各三分上搗篩三歲兒每服半錢水七分煎至四分去滓分溫二服空心午後各一服訶黎勒散一名訶梔散治小兒赤痢血痢腹痛煩渴訶黎勒煨去核梔子去殼各一兩上為細散一二歲兒每服半錢米飲調下空心午後各一服黃蘗丸治小兒熱痢下血黃蘗去皮半兩赤芍藥四錢上為細末和丸如麻子大每服一二十丸食前米飲送下兒大加數丸杏仁湯治少小夏月伏暑吐痢過後胃中虛熱渴唯飲水杏仁五十枚去皮炙鹽一合上以苦酒一升煮取一半量與服之治小兒熱痢方煮木瓜葉飲之又方搗蒜敷兩足下治熱痢備急方用井水調臘茶蜜磨生薑渴則飲之治熱痢方小兒冒暑中熱積熱在臟或母觸冒熱毒乳兒內因臟腑積滯外因觸中暑熱之毒及內外因時行疫氣傳染致成下痢或血痢治以豬苓湯解除熱毒敗毒散去風邪行滯氣四順飲蕩除熱毒平胃散補養脾胃五積丸祛除積滯以四藥合用米湯煎調吞下五積丸消積去熱其痢自止若患血痢則變白痢服以溫脾之劑立可收功治熱痢用五苓散入車前子末米湯調吞服黃連阿膠丸或用香薷湯倍加赤茯苓黃連酒水煎服或用久年白鹽梅以蜜水各半並好茶煎服治小兒熱痢不瘥用蒲根一兩細切以粟米一合水一大盞同煮米熟去滓取汁不計時量兒大小加減溫服黃白散治小兒大小便出黃沫如蟹吐沫者良久即青脾之虛熱大黃白朮各半分上為末每服半錢水半鍾煎三分空心服加味豬苓湯治熱痢血痢豬苓去皮赤茯苓去皮澤瀉白朮麥門冬去心百藥煎黃連去須大黃煨甘草炙各等分上㕮咀水煎溫服血痢加阿膠蒲黃赤白痢附論夫小兒痢下赤白由脾胃不和乳食所傷留滯腸中與津液相搏腸虛則泄故為痢也虛而有熱則赤虛而有寒則白冷熱不調則赤白相兼膿血雜下故名赤白痢方藿香散治冷熱不調赤白五色諸般瀉痢陳皮去白厚朴甘草炙枳殼蒼朮米泔浸烏豆炒去皮縮砂仁白芍藥當歸藿香葉川芎木瓜百藥煎阿膠炒各等分上為末白痢加白薑木香赤痢加黃連赤白痢加薑黃連用生薑茶芽蜜水煎調服血痢加訶子肉治中桔梗丸斷冷滯下赤白青色如魚腦脫肛出積日腹痛經時不斷赤石脂五分吳茱萸乾薑附子當歸厚朴白朮木蘭皮白頭翁黃連石榴皮黃蘗各二分上為末蜜丸如大豆二歲兒服五丸三歲以上服十丸十歲以上二十丸暴下者服少許便瘥即下者盡一劑更合龍骨散治小兒赤痢白痢龍骨研白石脂研胡粉炒白礬枯過各一兩訶黎勒皮二兩黃連去須陳橘皮去白麩炒阿膠炙燥當歸切焙人參厚朴去粗皮生薑汁炙各一兩半上為散每服一錢空腹煮白粥飲調下日二服赤石脂丸治小兒赤白痢腹肚㽲痛不思食羸瘦赤石脂白礬燒冷汁浸訶黎勒皮白朮黃耆銼厚朴去粗皮生薑汁炙銼酸石榴皮乾木瓜焙各半兩肉豆蔻去殼一枚乾薑炮一分上為末煉蜜丸如麻子大每服五丸溫米飲下空心午後服量大小加減溫中大黃湯出千金方治小兒暴冷水穀下或乳冷下青結不消或冷實吐下乾嘔煩悶及冷滯赤白下者良若已服諸利湯去實胃中虛冷下如水乾嘔眼陷煩擾不宜利者可除大黃若中乳冷乳母洗浴水氣未消飲兒遂為霍亂者但用大黃小兒諸霍亂宜利者便用大黃不須利宜溫和者除之大黃六分桂心厚朴去粗皮薑製甘草炙乾薑炮以上各一分人參茯苓去黑皮白朮當歸切焙以上各二分桔梗三分微炒上以水三升半煮取八合凡兒三十日至六十日一服二合七十日至一百日一服二合半二百日已來一服三合白朮散治小兒赤白痢腹內㽲痛羸弱不能飲食白朮人參去蘆頭各半兩厚朴三分去粗皮途生薑汁炙令香熟黃連去須銼微炒當歸銼微炒地榆銼木香桂樹皮微炙炒甘草炙微赤各半兩上為散每服一錢水一小盞煎至五分去滓不計時量兒大小分減溫服地榆散治小兒赤白痢煩渴寒熱腹痢羸瘦不欲飲食地榆三分微炒銼酸石榴皮半兩銼微炒龍骨一兩燒赤當歸半兩銼微炒黃耆半兩銼阿膠三分搗碎炒黃連三分去須銼微炒赤石脂一兩燒赤烏梅肉半兩微炒上為細散每服以粥飲下調半錢不計時量兒大小加減服之訶黎勒散治小兒赤白痢腹脹疼痛不飲食四肢瘦弱訶黎勒三分煨用皮當歸銼炒黃芩龍骨地榆微炒銼乾薑炮製銼陳皮湯浸焙白朮甘草炙微赤各半兩上為散每服一錢水一小盞煎至五分去滓不計時量兒大小分減溫服小香連丸治小兒瀉痢赤白脾胃虛弱糟粕不化腹痛煩渴身熱並裡急後重黃連三兩乾薑炮一分當歸一兩半阿膠炒為末醋煎成膏一兩半上為末以膠膏為丸如小豆大三歲三十丸米飲下食前服一方醋糊丸大小加減當歸丸治小兒赤白痢不止腹痛當歸切焙半兩黃連去須龍骨人參各一分無食子炮二枚鹿角鎊豉焙各一分上為末煉蜜丸如麻子大每服五十丸溫米飲下空心午後服量大小加減訶黎勒丸治小兒赤白痢裡急後重訶黎勒煨去核地榆去苗微炒酸石榴皮炙焦高良薑赤石脂各半兩吳茱萸湯洗炒一分黃連去須三分上為末煉蜜為丸如麻子大每服七丸溫米飲下空心午後各一看兒大小加減小兒暑月多吐瀉其證最宜詳審用藥不可差謬有伏暑吐瀉者小水必不利宜服五苓敝香薷散有傷食吐瀉者其吐及糞皆有醋臭氣宜感應丸三方易知今不復載瀉多日口唇齒俱白及瀉糞頗多者因成冷也宜以六神散每二錢匕加附子末一錢煎三四服防變癇也白者疳瀉宜官局六神丸瀉者不可急以熱止之若止變成痢凡痛