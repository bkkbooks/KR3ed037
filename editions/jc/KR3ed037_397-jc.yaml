炒淨陳皮淨青皮炒製厚朴罌粟殼醋炒等分上以水煎空心服痛加赤芍藥白芍藥制枳殼烏梅膿血痢附論夫小兒膿血痢者由腸胃虛弱冷熱不調寒多則色白或如凝脂與膿兼下熱多則色赤或似梔子汁甚則純下鮮血冷熱交攻膿血雜下治法當分其冷熱疳蠱而治之則無不瘥方療小兒膿痢直從春夏至秋冬以來不瘥者薤白切一合生薑蕪荑各一分子芩黃蘗當歸各二分香豉一合綿裹上切以煮銀水重濾者一升半煮取九合分服以瘥為度秋末冬末加赤石脂半兩乾薑一分白朮二分大小量之忌如常法黃連湯一名當歸散治小兒膿血滯痢並冷痢腹痛當歸切一兩黃連去須三分桂去粗皮三分赤石脂一兩一分人參三分乾薑三分龍骨一兩白頭翁三分甘草三分附子一兩炒上銼如麻豆大每一錢水七分煎至四分去滓二服空心午後量大小加減冷去白頭翁加牡蠣三分羚羊角湯治小兒熱痢下血並體熱心煩口乾不欲飲食四肢羸瘦羚羊角屑茜根吳藍各三分黃連去須赤石脂地榆當歸銼炙阿膠各一兩炙黃芩去心甘草各半兩上搗篩每服二錢水一盞煎至五分去滓溫分三服人參散治小兒膿血痢久不瘥腹痛不欲飲食人參去蘆當歸炒地榆銼阿膠炒黃黃連炒子芩黃蘗炒赤芍藥蕪荑炒厚朴生薑汁炙令熱以上各半兩上為散每服一錢水一盞入薤白一莖豉五十粒煎至五分去滓不計時量大小各分減赤石脂散治小兒下痢膿血腸鳴腹痛亦治赤白痢赤石脂研龍骨研地榆黃連去須各一兩人參三分厚朴去皮生薑汁塗五次炙當歸焙乾薑炮製各半兩上為散每服半錢用米飲調下日三或煉蜜丸如梧子大乳汁下五丸至七丸空心午後各一服量兒大小加減肉豆蔻散治小兒膿血痢肉豆蔻二枚去殼當歸焙密陀僧研訶黎勒去核黃連去須枳殼去瓤麩炒各一分龍骨半兩乾薑炮一兩上為散每服半錢空心米飲調下隨兒大小加減沉香丸治小兒乳哺失宜冷熱不調熱衝上膈冷歸下焦致虛實不等水穀不化遂傷泄痢夾積則變為下痢膿血當歸木香白朮各一兩沉香白芍藥人參蓬莪朮縮砂仁各一錢半上為細末麵糊丸如黍米大每服十丸二十丸米飲下量大小加減黃連丸治小兒膿血痢並赤白痢黃連去須一錢龍骨研黃芩去心白石脂研當歸焙赤石脂研各一二分烏梅肉炒半兩上為末入研藥和勻煉蜜丸如麻子大每服五丸空心服食前米飲下量大小加減鮓湯丸治小兒瀉痢五色膿血如爛魚腸並無大便只是膿血腸中攪痛粉霜輕粉硃砂硇砂各一錢白丁香四錢乳香半錢巴豆七粒去皮心不去油上為末蒸棗肉丸小豆大三歲二丸煎鮓湯吞下候積下與調胃氣並食前服建胃丹治泄痢並膿血日漸羸瘦黃連一兩炒龍骨白石脂神麯炒烏梅肉炒乾薑各半兩白礬一錢上為細末醋煮麵糊和丸如黍米大每服十粒米飲下量兒大小加減乾薑散治小兒下痢膿血腹痛腸鳴乾薑炮製一分黃連去須三分人參三分肉豆蔻去殼一枚當歸銼焙三分厚朴去皮塗生薑汁五遍炙五錢上為細末每服半錢以粥飲調下空心午後各一服量大小加減肉豆蔻丸治小兒下痢膿血腹痛虛煩肉豆蔻去殼訶黎勒炮去核各三錢密陀僧一錢人參白茯苓去黑皮各一分上為細末用燒粟米飯丸如綠豆大每服七丸溫米飲下蠟茶丸治小兒下痢膿血寒熱不除豉八十粒炒令黃焦大豆炒令黃焦去皮半兩黃連去須消石各一分黃瓜醋炒焦七分巴豆二十枚去皮麩炒令出香油上為細末入熔蠟一分並煉蜜和丸如黍米大一二百日內兒每服二丸一二歲兒每服可五丸三四歲兒每服七丸米飲下空心隨兒大小加減服之樗根皮散治小兒膿血痢如魚腦後重臭樗根皮一分銼炒黃枳殼半分麩炒黃去瓤黃連半分去須蕪荑半分炒赤芍藥半分上為散每服一錢水一小盞入豉三十粒蔥白一莖煎至六分去滓不計時量兒大小分減溫服雞屎礬丸治小兒膿血痢不瘥漸加瘦弱雞屎礬一兩燒灰胡粉一分炒黃龍骨阿膠搗碎炒黃黃連去須各一兩上為末煎釀醋為膏和丸如綠豆大每服以暖漿水下七丸日三四服量大小加減石榴皮散治小兒膿血痢酸石榴皮微炒乾薑炮製黃連去須訶黎勒煨去核各一分上為細散每服半錢空心午後服米飲調下各隨兒大小加減干藍湯治小兒百晬內下痢如魚腦赤白雜痢腹痛多啼干藍葉升麻芍藥各一兩梔子仁四枚上搗篩百晬至二百日兒每一錢以水半盞入香豉七枚薤白一莖煎至三分去滓分溫三服食前隨兒大小增減一方有龍骨如金散治小兒瀉痢頻並不食多渴膿血相雜腹中疼痛裡急後重心燥身熱甘草半兩炙烏梅半兩罌粟殼三十個蜜炙陳皮一分上為散㕮咀三歲一錢水半盞煎三分去滓食忌魚腥油膩肥甜肉食一方用枳殼無烏梅白石脂散治小兒腸澼下膿血白石脂炒令赤一分亂髮燒灰一分甘草炙令赤半兩上為細末每服一字至半錢早晨午後各一服米飲調下隨兒大小加減如聖散治小兒臟毒久痢下膿血鉛丹半錢硇砂一皂子大膩粉一錢甘草三分上研為末用好棗一枚去核用大麥麵裹焙灰燒香熟為度去面研為粉每一枚棗分兩服煎槐花湯調下二服定治小兒膿血痢每日三二十行立效方方見神捷散治小兒水氣腹腫兼下痢膿血小便澀用葶藶子半兩微炒搗如泥以棗肉和搗為丸如綠豆大每服五丸棗湯下空心晚後量兒大小加減服之治小兒久痢膿血濕䘌方用艾葉五升以水一斗煮取一升半分三服治小兒下痢膿血日夜無度腹痛裡急後重罌粟殼去瓤梗炙人參陳皮甘草炙地榆阿膠木香各等分上為粗末一歲每服二錢水一盞煎至四分去滓溫服如冷痢純白即加乾薑炮等分如熱痢純赤即加黃連炒等分忌一切毒物
