body:
  text: 卷三百八十四嬰孩諸熱疸腫門諸熱附論經曰火氣不調舉身蒸熱風氣不調令身強直水氣不調身體浮腫土氣不調四肢不舉凡小兒之疾多因風熱不順乳氣不調致生諸疾潮熱驚熱夜熱餘熱食熱疳熱壯熱煩熱積熱風熱虛熱客熱癖熱寒熱血熱疹熱十六者大同而小異凡熱必乘陽邪而發經云邪之所湊其氣必虛留而不去其病則實邪正分爭客於皮膚或恍惚啼叫或悶亂喘粗其變多端或在表而在裡或似實而似虛或半表而半里或半實而半虛皆由血氣盛實臟腑生熱陰陽氣交薰蒸於外致令身熱焉凡病熱者左臉先赤肝受熱也額上先赤心受熱也右臉先赤肺受熱也頤間先赤腎受熱也鼻上先赤脾受熱也熱極則生風生風則驚悸潮熱發歇有時驚熱顛叫恍惚譫語夜熱夕發旦止餘熱寒邪未盡食熱肚背先熱疳熱骨蒸盜汗壯熱一向不止煩熱心躁不安積熱頰赤口瘡風熱汗出身熱虛熱困倦少力客熱來去不定癖熱涎嗽飲水寒熱發如瘧狀血熱辰巳發熱疹熱耳鼻尖冷諸熱得之各有所歸其間有三兩證交互者宜隨其輕重而治之潮熱者血氣盛實臟腑生熱或傷寒時疫觸受邪氣陰氣不足陽氣有餘陽邪暴傷則血氣凝滯不即通流壅遏無歸傳於陽明之經遂成潮熱休作有時其夜間發熱者乃是陰中有陽邪也潮熱或夾伏熱或留宿寒夾伏熱者大便黃而臭氣滯宿寒者大便白而酸臭潮熱者實熱也當日間潮熱或即憎寒手足俱冷能乳即熱有如盜汗此食疳之候也發熱之日夜間熱甚天明覆涼謂之傷寒餘熱失解小兒傷乳者或時發熱發熱有退時熱退後又復熱或夜間熱者此傷乳食也夜熱者凡宿食在小腸者當暮熱明旦復止諸家所說夜熱各自不同皆有應驗食疳亦能夜熱傷寒失解亦能夜熱風傷脾胃亦能夜熱寒熱者陰陽盛也先寒而後熱陽不足先熱而後寒陰不足寒多而熱少陰也熱少陰勝陽也寒熱相半陰陽交攻也寒熱隔日陰陽乍離也陽盛發熱陰盛發寒而頰赤陰中有陽邪也熱而面青陽中有陰邪也寒而面青陰中有陽邪也熱而頰赤陽中有陽邪也熱而面青陽中有陰邪也寒而面青陰中有陰邪也其有頭疼汗出者有嘔吐不食者有憎寒而飲水者壯熱而欲湯者有筋骨疼痛者或秘或瀉或內寒而外熱或內熱而外寒又有寒而腹中疼熱而腸中鳴是有食積也大抵寒熱因於露風或觸暑毒致陰陽不順邪正不和逆順之法當從乎天地順乎陰陽順之則安逆之則危小兒寒熱多因食積而得當下之次用補助先寒後熱寒多熱少小柴胡湯加桂先熱後寒熱多寒少白虎湯加桂寒熱相半小柴胡湯壯熱者亦由血氣盛實五臟生熱邪火蒸鬱於內則眠臥不安精神恍惚熏發於外則連滯不已舉動驚惶表裡俱熱則煩躁喘粗甚則發癇也風熱者因其解脫風邪所傷客於皮毛入於臟腑則惡風發熱呵欠面青目澀多睡陽氣有餘身熱無汗陰氣有餘身寒有汗陰陽有餘無汗而寒素問云汗出而身熱者風熱也錢氏論云風溫潮熱者時間發熱過時即退來日依時發此風熱壯熱相似朝潮發驚也壯熱者一向熱而不已甚則發驚癇也風熱者身熱口中氣有風證渴壯者但溫而不熱也急飲乳者不能食者由客熱入兒臍流入心脾經即舌乾唇燥口不能生津當涼心脾也積熱者由陽氣盛實積於臟腑上盛則唇舌生瘡下盛則腰腿癰腫表裡俱盛則精神恍惚頰赤口乾大小便澀遍身發熱下之即退有後熱者是裡熱已去表熱未退汗之則解表熱去後再熱者表裡俱虛陽浮於外陰沉於內所以又熱者乃虛者因傷寒及諸熱汗下之後去津太過氣血未調食飲勞傷致令虛熱困倦其有久嗽久瀉久痢久血久瘧致諸疾之後而成者皆虛熱也凡病久者則氣血虛氣虛則發厥血虛則發熱血氣虛則身熱而足手厥疳熱者由乳母好飧肥膩恣食甘酸或喜怒氣浮醉飽勞傷即便成疳熱或兒食無當生冷過度致令骨熱不除羸瘦煩渴頰赤面黃不長肌肉凡疳食之熱先起於腹背皮膚不甚熱近之骨間如火或睡中有汗久變疳勞者渾身如火手足如冰孫氏云骨熱如湯蒸退時常有汗癖熱者由兒不肯食哺而但飲乳乳壅不能消化伏結腹中致成涎癖塊也或痰嗽而驚或嘔逆而渴日中嗞煎夜間啼叫辰熱申涼與潮相類也先與白朮散滋養津液次珍珠丸下痰涎食積再白朮散及妙丸子磨積血熱者每日巳午間發熱而遇夜則涼是陽中有陰血氣盛實也蓋血者榮也氣者衛也榮行脈中衛行脈外營周不息巳午者當心火用事之時也心生血氣行至巳午則陽氣盛陽氣盛則與正相擊故至期而發熱非其時非血熱也客熱者為陽邪干於心也心苦受邪則熱形於額故先起頭面次而身熱恍惚多驚聞聲恐悸良由真氣虛而邪氣勝邪氣魄勝正邪交爭發歇無時進退不定如客之往來故曰客熱湯氏曰第一傷寒熱痰嗽熱非時耳紅連頰赤毛髮起疏稀鼻塞兼多涕呵氣早尋醫苦逢肢節冷傷寒治便宜第二變蒸熱唇上珠生旁四肢兼熱渴食乳不如常熱躁還啼哭須當解膈涼三旬余兩日度定非常第三食積熱氣急不尋常寒熱常如瘧渴瀉要水漿眼澀頻出淚圊膿便滑傷睡要合地臥本是積為殃此候先當取積了只用胃散補之次常服進食丸第四慢驚熱驚啼汗出多糞青兼哯乳兩眼慢雲和咬乳流涎出腳冷病纏疴若逢頭仰視早治莫蹉跎此候宜服薄荷散並紅綿散急退熱解驚第五麻豆熱中指冷如冰目澀長如睡乳食不曾名耳冷眼中赤麻豆出將星或時寒熱起困惡沒心情此候乃天行之病又乃時熱不除發出胎毒故成此疾不可妄攻起當溫涼藥治之法與傷寒相似先當發散得毒氣出腑則出細疹俗云膚瘡也若不發散便是傷寒失表一也則毒氣在臟故發痘瘡遍身無縫又出又熱變成惡證十死八九凡小兒瘡疹之熱寒涼之作腹疼而腮燥赤呵欠睡困眼澀多膿乃瘡疹欲出之候急於羌活防風湯三服如未有前證則不可別先用解肌散二服未表汗毒氣已發出臟如汗後熱退只用升麻湯汗後尚熱宜服羌活散如已見三兩點於皮膚加紫草少許如熱平瘡出少輕也但用辰砂米飲調下半錢其痘稀而輕蓋欲制其胎毒也故第六疳為熱鼻赤齒頻搖乳食常無飽頭瘡髮色焦土炭餐如飯肌膚不長膏五心煩熱盛只此是疳勞此候當用進退丸常服磨化積仍間服化疳丸後服鱉甲散退熱次服肥兒丸第七虛積熱渾身熱只羸腳手看看網肚急硬如吹見食還憎受渴瀉糞如脂終日無歡色唇紅不可醫此候不可取只宜補脾仍服十金丹去其積第八風痰熱晚熱早還涼吃水無時度粥飲食如常日夜多喘息叫號豈為昌患宜頻進藥莫待眼驚張此候乃痰作而朝而涼實即宜去痰用塗星丸或氣弱不了宜服奪命散如控下涎次服惺惺散加南星與白附子溫壯者由臟腑不調內有伏熱挾宿寒皆搏於胃氣致令不和氣行壅澀故蘊積體熱名曰溫大便黃而臭者內有伏熱大便白而酸臭挾宿寒故也而又有小兒壯熱者是熱氣熏發於外故令身體壯熱其發無漸大體與溫壯相似有小異者熱加甚也此候宜服輕藥惺惺散羌活散皆可如有宿寒宜服四味理中湯加桂煎服若有內熱宜服五苓散並白虎湯二藥俱效有驚熱即有風熱此言驚風熱又有邪熱乃感風成病類同傷寒又傷寒熱類同瘡疹熱又瘡疹麻痘之後有餘毒作傷寒後亦有餘毒作熱積有熱發來潮作又作膚熱總曰潮蓋熱發有期丹熱疳熱不類諸證血熱即遍體生瘡痍瘑疥瘙癢及重發作丹毒龍帶之屬骨熱即外冷內熱其病骨蒸熱也實熱即氣脈壯實五臟六腑氣充大便硬少或閉不通虛熱三焦不順五臟不和欲作疳候啼哭煩躁夜出虛汗或瀉疾後有熱三焦熱即上膈虛煩作渴頰赤驚悸夜復啼哭睡中言語五心發熱虛煩多驚小便赤澀睡不安穩氣粗或作瘛瘲肝經發熱眼目赤腫疼痛多淚羞明或筋脈拘急有夾風痰肺經熱鼻塞生瘡不聞香臭或餘毒不散胎熱兒在胎中受母飲食榮衛不順有餘毒之熱發作眾疾或從降生之後常作熱證傷寒後餘毒熱雖曾解表餘熱搏脈或入經絡久而不散瘡疹餘毒熱其兒所患瘡不甚快速有餘熱留滯在百脈之間項上生核作熱軟大微紅者名驚氣核小小三五連連長短相類雜者皆餘毒熱亦名驚瀝初生乳幼者患之三焦蘊毒熱上攻咽喉之外名炸腮熱氣血凝滯經絡不行熱毒攻注故生癰癤痲痘作熱類似疹候痲子乃腑受病屬陽故易調理雖不服藥亦能自愈只恐吃毒胃風為之逆也溫氣熱襲而成小兒又另有時氣之溫未經患瘡疹者即熏蒸之氣相搏也皆作是疾小腸熱心經不利小便淋澀或管內疼痛胃熱作氣口臭或發嘔逆不思飲食亦有胃家虛熱得之脾熱口苦昏困喜睡因吃毒物積聚在脾不化腳稍冰冷邪熱肺經或受寒邪陰陽二氣不正痰涎咳嗽寒熱往來先寒後熱其狀如瘧乃虛中有積凡兒患痞癖癥瘕皆作寒熱潮發傷風熱鼻聲重頭疼腳熱類如傷寒候傷暑熱煩躁引飲頭目昏重時正盛暑或曾感冒榮熱即血熱也衛熱即氣熱也榮衛不順即氣血不相參虛所致也筋熱咬指甲見血腎熱病作崩砂黑齒爛齦以至走馬疳極候煩熱即啼之不已躁熱即哭之不已皆由三焦不順心中積熱虛煩躁悶變蒸熱只在五百七十四日之內三十二日一變六十四日一蒸其數在發作者應也大腸熱肺家有熱在裡流入大腸秘結不通癮疹熱乃是肺經有風在表肺主皮毛故生癮疹風痰熱因感風生痰在上膈久不化熱吐逆噁心經氣熱良由小兒受驚其驚氣不散留在上膈無得自化故作熱毒多在頤項之間壯熱即是積熱證若加腳冷當與下之客作熱初生之兒親戚外來兒觸其邪以亂其正故作熱癇熱驚風不散聚在經絡或入臟腑其候常發不省人事瘛瘲熱驚之所受入經絡未傳五臟作搐搦小兒有病惟熱最多明理論曰發熱者怫怫然發於皮膚之間熇然散而成熱也輕重不齊有所謂翕翕發熱者若翕所覆明其熱在外在表乃風寒客於皮膚陽氣結郁所致宜發汗而散之所謂蒸蒸發熱者謂若熏蒸之蒸明其熱在內屬裡乃氣下陷而入陰中也法當攻下以滌之表證未罷邪氣傳裡里未作實是為半表半裡之間則表裡俱發熱又輕於專在表也發熱惡寒發於陽也無熱惡寒發於陰也陽明裡實熱盛當攻之以散裡熱太陽風寒外搏陰盛惡寒雖熱尤當溫散少陽宜和解惟用小柴胡湯如微熱不渴又當加桂明理論曰發熱傷寒之常經云脈陰陽俱虛熱不止多下痢發熱傷寒汗後復熱忽發狂言而脈躁疾不為汗衰飲食停滯是為陰陽交皆不治之證小兒熱證內有實熱喘咳面赤口熱燥渴唇腫大小便澀掀揭露衣煩啼暴叫虛則面急青白恍惚神緩口中清冷虛氣軟弱泄瀉多尿夜出虛汗其或伏熱怫鬱悸惕上盛下泄水穀不分此則冷熱不調之候虛熱惺惺散實熱四順涼清飲加柴胡冷熱不調則敗毒加木香當歸若夫升降陰陽則來復丹三丸薄荷湯研下小兒表裡俱熱面黃頰赤唇燥口乾小便赤澀大便焦黃先以四順清涼飲為之疏利其熱熱既去而復熱者里已消而表未解也隨當用惺惺散或即用紅綿少許加去節麻黃以取微汗則表熱盡除其或里已解而熱又時發此由表裡俱虛氣不歸元陽浮於外不可再用涼藥再與解表當為和其胃氣使陽斂而身體大涼參芩白朮散薑棗略煎服熱重者用銀白散朱監簿子三歲忽發熱醫曰此心熱也腮赤唇紅煩躁引飲遂用牛黃丸三服以一物瀉心湯下之來月不愈反加無力而不能食又便利黃沫錢曰心經虛而有留熱後以生犀散治之朱曰大便黃沫如何曰胃氣正即瀉自止此虛熱也朱曰醫用瀉心湯者如何錢曰瀉心湯者黃連性寒多服則利能寒脾胃也坐久眾醫至曰實熱錢曰虛熱若實熱何以瀉心湯下之不安又加面黃頰赤五心煩燥不食而引飲醫曰既虛熱何大便黃沫錢笑曰便黃沫者服瀉心湯多故也錢後與胡黃連丸治愈朱監簿家五歲小兒病夜發熱曉即如故眾醫有作傷寒者有作熱治者以涼藥解之不愈其候多涎而加睡他醫以鐵粉丸下涎其病益甚至五日大引飲錢氏曰不可下之乃取白朮散末一兩煎藥汁三升使任其意取足服朱曰飲多不作瀉杏錢曰無生水不能作瀉縱瀉不足怪也但不可下耳朱曰先治何病錢曰止渴治痰退熱清裡皆此藥也至晚服盡錢曰更可服三升又煎白朮散三升服盡得稍愈越三日又服白朮散三升其子不渴無涎又投阿膠散三升二服而安鄭人齊郎中者家好收藥散施人其子或臟齊自取青金膏三服並一服而餌之服畢至三更瀉五行其子困睡齊言子睡多亦驚又與青金膏一服又瀉二行發熱而兼痢召錢氏曰成虛羸先多煎白朮散時時服之後用香枚瓜丸三十三日方愈皇都徐氏子三歲病潮熱每日西則發搐身微熱而目微斜反露睛四肢冷而喘大便微黃錢與李醫同治錢問李曰病何搐也李曰有風何身熱微溫曰四肢所作何目斜露睛曰搐則目斜何肢冷曰冷厥必內熱曰何喘曰搐之甚也曰何以治之曰嚏驚丸鼻中灌之必搐止之錢又問曰既謂風病溫壯搐引目斜露睛內熱肢冷及搐甚而喘並以何藥治之李曰皆此藥也錢曰不然搐者肝實也故令搐也日西而身微熱者肺潮用事肺主身溫且熱也為肺虛所以目微斜露睛者肝肺相勝也肢冷者脾虛也肺若虛甚用益黃散阿膠散得脾虛調退後以瀉青丸導赤散涼驚丸治之後九日愈幼幼新書云張戶侍其子女蘊積結聚已經年矣其候腹滿肚熱大小便閉遍嘗諸藥醫者皆云虛熱兼胃寒下食既不能食自然大小便少或作疳熱有藥俱投而無一中時已窘迫一日簡來招扣之曰合服何藥余答曰當服甘遂大黃驚驗其說言以前諸醫皆補助此人久已不食豈宜利動余答曰信我者生逆我者死侍郎云更有何法悉當如命余曰證宜下之而畏不敢服何以愈因即令服大承氣湯二劑而愈次日見之尚餘滯實必過數日而復閉須服前藥後果然再閉滿痞結再與以此藥一服而痊全嬰方云朱氏子五歲六月中身熱五心煩躁渴不食召一醫作傷寒治用溫熱藥取汗不令見風治之三日其證熱盛狂躁煩渴昏悶驚搐醫見證變以滾痰丸下痰熱後用驚藥又易一醫作痘搐有作急者無效其證潮搐神昏怕明就暗大便不常召余視之日伏熱生痰燥多因見食悲嚮明增不樂入暗稍相宜或即先閉雙目無時動四肢渴燥尋冷地暑毒作驚危蓋見兒怕明就暗目赤面紅唇口乾燥身熱煩渴手足投定令拖虛冷處漿傾颺兒見水欲懷衿內知其暑熱之甚也以甘露散雪水或新汲水調二錢再頓冷服飲七分坐須潮熱稍輕進之一服更以白虎湯頓冷服半盞少時又一服諸證減半即思食後以承氣湯亦冷服之同煎藥相間治之三日而安主人曰前日用驚藥不退今不用驚藥何搐定也答曰孫氏云熱多不安煩久而驚風多不定躁久而搐所以知其潮搐也蓋因暑熱燥甚心神不定引於肝風熱相搏加之昏冒所以潮搐也解暑熱而安若認為驚風則無效後之學者當察其寒暑也錢塘尉王觀國子五歲六月中身苦心燥煩渴吐逆不食召三二醫俱作傷寒用溫熱藥取汗不令兒見風治三日其證熱盛狂燥喘噦胸膈涎流吐逆全不作聲手青唇黯面黑自汗驚搐神昏狀若角弓召愚視曰暑毒傷心狀若驚風喘咳痰嗽神思昏沉喘噦涎微汗手足搐抽面赤唇紅因受熱發驚非傷寒也以甘露散下偏銀丸須臾神定王觀國問曰何知傷伏暑答曰傷寒者惡寒伏暑者惡熱蓋見兒雖身熱神昏驚搐大欲飲水喜風涼處知其暑熱之盛以向不速用寒冷消暑藥則致躁而死又問吐逆不食如何答曰是暑毒痰熱所作不食亦畏熱不食也主人聽令兒就地上周回以水近風涼遇以甘露散水調送下褊銀丸百餘粒少頃下痰而愈吳亨秀才子三歲身熱微汗自與惺惺散升麻湯黍黏湯並驚藥調治四日熱盛召愚視之其目青舌紅臉赤氣粗精神恍惚大便如常余曰風熱也主人曰何知風熱答曰素問云汗出兒身熱風熱也今熱盛驚候即日之間必發驚搐主人駭然答曰無異素問又云水寒而靜故為陰火熱而燥故為陽譬之水性靜因風而波濤生火性炎因風而煙焰生其病風熱盛則引於肝風肝有風則心火生心火生則肺金熔故風火相搏則正壅而驚搐當以驗風膏連進三服風止則火滅火滅則金堅更與定驚珍珠丸下其熱毒風止火滅驚搐即定也主人曰何不用驚藥而更安對曰先退肝風熱心火即自滅再下肺經熱驚風方始歇傳曰揚湯止沸不若絕其火澄波不若清其源大抵治病不可不究其源也小友四歲六月中潮熱心躁大便如常與四順飲三服微利熱或再日復作又與四順飲雖大便燥焦黃熱微從來舌白乾燥仍舊潮熱自此逐日四順飲雖大便利十餘日才瀉退來日依然不免大柴胡湯服而熱減來日復熱自得病不減食愚妻曰自得病用藥瀉半月餘熱尚未除若更瀉別生患否愚曰能久勝寒藥必有大熱能久勝熱藥必有大寒此而久勝寒藥熱尚未退知有大熱甚明瀉之不妨與調胃承氣湯連三服瀉數次尚未全除又二服自此五日服承氣湯前後二十日服冷藥才始熱除後忽左膝疼伸縮艱難將患結癰腫又無紅腫處但筋骨間疼行立不能將藥淋洗膏藥貼治十餘日不退遍尋小兒方書皆無此證惟有嬰童寶鑑云風冷侵寒筋四肢全不仁疼因失夾冷熱暖是邊生又無治法素問云熱中血則痛痹不仁寒中氣傷形故為腫痛又云寒傷形熱傷氣傷形痛氣傷腫亦無治法思之病在筋則屈而不能伸病在骨則伸而不屈風冷傷筋骨則疼因閱蘇沈方左經丸稱女子膝腕軟不能行立治愈遂合二服即秤三分逐日進服十餘日如舊後有一兒十餘歲膝腕疼軟舉動叫與左經丸乳香酒化下三兩服即時全效治熱涼同病身熱強直者欲作急驚肝經風熱驅風膏四順飲或加細辛或加獨活兼用涼藥身涼強直者欲作慢驚肝經虛風神寶丹琥珀散續命湯若大便實無虛證驅風膏琥珀散身熱不能食者脾胃熱不能食必大便堅或焦黃四順飲或洗心散八正散身涼不食者脾胃氣虛或因吐瀉後以益黃散並食藥或傷食不食必噯哺與食藥如大便食不化紫丸下後補脾身熱飲水者熱在內或中暑吐瀉渴者服五苓散香薷散白虎湯甘露散大便堅或寒邪所作四順飲身熱不渴熱在外宜解表薄荷麻黃黃芩湯活人書云身熱不渴表有熱小柴胡湯加桂身熱自渴不吃水但要湯者是內寒故也五苓散薑棗煎連進則退身涼飲水者因吐瀉失亡津液多與白朮散如大渴不止龍涎散藕漿散魚涎散擇用之或以四君子湯加訶子汁身熱身黃者傷寒小便不利必發黃茵蔯湯並煎茵蔯汁調五苓散三四服立效身涼身黃者瀉黃散涼疳熱並三黃丸如大便實煎牽牛子汁吞下與取食積藥下之後並益黃散身熱咳嗽者寒邪在表無汗而嗽五味子麻黃湯洗心散潤肺散涎盛鐵粉丸下之嗽而有汗羌活散惺惺散鼠黏湯涎盛下之有傷食嗽其狀嗽嘔吐下之痰涎乳食不化或間發熱者傷食也食氣衝肺肺逆而嗽其狀嗽嘔下之小兒嗽此證多下之立效參朮散人參丸更於嗽方中擇用之身涼咳嗽者寒邪在肺失解潤肺散款冬散胃冷嗽喉中呀呷乳食不化因胃寒肺冷人參丸又因久嗽咯膿血者肺虛難治補肺散阿膠散如久嗽膿血喘急聲嗄膿如黃泡瘡內膿者必死又一等因傷暖嗽急咯血者易治柏枝散犀角地黃湯胃冷嗽不因傷風得名胃嗽藿香散身熱喘急者麻黃杏仁散或五味子湯潤肺散身涼喘急者蘇子阿膠散甚者凝氣杏霜丸人參丸身熱有痰者小柴胡湯生銀丸南星丸生金丸身涼有痰者人參丸黃龍丸南星丸身熱夜啼者寧眠膏大青膏蘇香丸琥珀散身涼夜啼者安神補膏鉤藤膏琥珀散蘇香丸身熱肚疼者四順飲送妙丸子涼肚疼者消食藥紫丸子令微利後益黃散身熱腹急者宣風散牽牛散並子醜散身涼腹急者宣風散導赤散豬肚丸塌氣丸分氣丸身熱浮腫者宣風散子醜散凝目飲商陸飲後以益黃散身涼浮腫者如久瀉痢浮腫者女面散益黃散五苓散大便堅金蓮散身熱嘔吐者陰陽丸玉散子夏月五苓散黃龍丸身嘔吐者妙丸子感應丸消食藥微下送下後沉香丸身熱泄瀉者黃龍丸五苓散香薷散杏仁丸身涼泄瀉者千金丸益黃散人參膏川椒丸身熱吐瀉者五苓散香薷散黃龍丸白虎湯身涼吐瀉者千金丸金粟散消食丸益黃散身熱下痢者胃風湯金粟散並如聖丸身涼下痢者小車丸阿膠丸如聖膏金粟散身熱瀉血者胃風湯刺薊湯三效散五倍丸身涼瀉血者磁灰散若葉桂心散三效散身涼衄血者柏枝散蕊皮散龍膽丸身熱衄血者犀角地黃湯青苔散並龍膽丸身熱吐血者黃芩膏獨金散桂心散身涼吐血者桂心散秦艽散膠黃散刺薊散身熱淋瀝者玉漿散立效八正散桃膠丸身涼淋瀝者龍香丸桃符丸身熱自汗者麻黃散參耆湯鱉甲丸粉汗丸身涼自汗者麥煎散鱉甲丸參朮散黃耆湯粉汗散凡驚熱癇熱驚風氣熱瘛瘲熱客忤心熱傷寒熱傷風熱傷暑熱夾食熱疳熱虛熱煩躁熱筋熱骨熱腎熱以上並宜與服蔥根脫甲散風熱痰熱變熱蒸熱肝熱大腸熱癮疹熱並宜加麥門冬丹熱食熱三焦小腸熱龍帶熱並宜加大黃及燈心瘡癮疹熱麻子熱已出證熱溫氣熱未出證熱並宜加紫草川當歸餘毒熱瘡疹後餘毒熱並宜加薄荷項上生核作熱乍腮熱癰瘡毒熱宜並加大黃朴硝以上宜服大連翹飲子隨證加前件湯使潮熱榮熱衛熱瘴氣兩日一發熱三日一發熱積熱脾熱胃熱痞熱肚熱瘧熱邪熱寒熱脾熱瘧鬼瘧後發熱單瘧獨熱以上宜服梨漿飲子八種虛痢作熱吐熱瀉熱霍亂吐瀉熱以上並宜服正氣丸調胃散調助胃氣不可以涼藥退熱胃氣和其熱自散虛中積熱腹痛積熱以上並推下積方龍膽湯治因胎驚月內氣盛心驚發熱兼胎風攝口壯熱皆可服龍膽草鉤藤柴胡赤芍藥茯苓甘草炙各半兩蜣螂二枚翹足炙大黃一錢濕紙裹煨黃芩一錢半防風麥門冬去心各一錢上㕮咀每服一錢水一小盞北棗二枚同煎七分疑神散出永類鈐方收斂胃氣清涼肌表人參白朮茯苓山藥各一兩白扁豆粳米知母生地黃甘草各半兩淡竹葉地骨皮麥門冬各一分上㕮咀每服二錢水一盞生薑二片棗子二枚煎至七分去滓不拘時候凡經汗下熱已去而復作者由表裡俱虛氣不復元陽浮於外熱自發也非實熱證當和其胃使六陽真氣復歸於內身體即涼凝神散一方神異所施輒效不可不知也寒水石散出千金方治小兒身熱不能服藥粉兒方寒水石碎芒硝滑石碎石膏碎赤石脂碎青木香大黃銼黃芩去黑心防風去皮芎藭麻黃根上各等分為細末蛤粉一升藥末三合相和再篩細粉兒日三外臺以牡蠣代防風余並同清解散一名歡喜散出直指方治感風發熱頭疼鼻塞涕流無汗惡風溫壯嚏噴北參防風天麻北前胡茯苓二錢北梗三錢枳殼甘草各一錢細辛柴胡各一錢半川芎三錢上末每服一錢水小盞干薄荷三葉略煎溫和服五福化毒丹出和劑局方治小兒蘊積毒熱驚惕狂躁頰赤咽乾口舌生瘡夜臥不寧譫語煩渴頭面身體多生瘡癤服此清膈涼血防風白芷當歸三錢陳皮貝母花粉各一錢半黃芩一錢上為末煉蜜為丸每兩作一十二丸每一歲兒一丸分服用薄荷水入研化下及瘡疹毒上攻口齒瘡生犀水下涎血臭氣以生地黃自然汁化