益黃散治胃中風熱大益黃散理中丸養神丸比治脾胃寒溫大勝之藥也若得脾胃中伏熱火勞役不足及服熱藥巴豆之類致胃虛瀉成慢驚之症用之必傷人命慢驚風者皆由久瀉脾胃虛而生也錢氏以羌活膏療驚風誤矣脾虛者由火邪乘其土位故曰從後來者為虛邪火旺能食其木木旺故來剋土當於心經中以甘溫補土之源更於脾土中瀉火以甘寒更於脾土中補金以酸涼致脾土中金旺火衰風木自虛矣損食多進藥愈黃耆二錢人參一錢黃連少許生甘草炙甘草各半錢芍藥七錢陳皮一錢不去白上㕮咀每服二錢水一盞煎半盞食前服東垣益黃散辯閻孝忠論集錢氏方益黃散補土又言風旺必克脾昧者不審脾中寒熱一例作補脾藥用之又不審藥中有丁香青橘皮辛熱大瀉肺金豈可脾虛之證反瀉其子蓋為寒水反來侮土中寒嘔吐肚腹痛瀉痢青白口鼻中氣冷益黃散神治之藥也如因熱藥巴豆之類過劑損其脾胃或因暑天傷熱乳食損其脾胃而成吐瀉口鼻中氣熱而成慢驚者不可復治今立一方治胃中風熱人參安胃散人參一錢黃木香二錢生甘草炙甘草各五錢白芍藥七分白茯苓四兩陳皮三錢黃連二分內經云熱淫於內治以甘寒以甘瀉之以酸收之甘草人參黃耆之甘溫能補元氣甘能瀉火補土白茯苓甘平白芍藥酸寒補肺金之不足加陳皮黃連以為佐以退火邪土金得平風證無由作矣上件為細末每服二錢水一盞半煎至一盞去滓食前溫服大益黃散理中丸養脾丸之類治脾胃中寒濕大勝神品藥也若服熱藥巴豆之類虛其胃氣脾胃中伏熱火及大人勞役不足之症或吐嘔不止不宜用之故陶隱君云醫者意也古之所謂良醫蓋以其意量而得其節也治病必察其本不可執方療之或病髣髴合方未對其證不察病機妄自用藥失宜致令乖舛以取危亡可悲也蘆根散治小兒胃中熱煩悶不食蘆根銼茅根赤茯苓黃芩麥門冬去皮甘草炙微赤各半兩上為散每服一錢水一小盞入麥五十粒糯米五十粒生薑少許煎至五分去滓量兒大小以意加減梔子仁散治小兒胃中熱日漸肌瘦梔子仁甘草炙銼黃連去須黃芩半兩上為散每服一錢水一小盞煎至五分去滓量兒大小以意加減竹茹湯治胃中熱嘔苦汗青竹茹彈子大半夏三個湯泡七次粳米四十粒乾葛上㕮咀一服薑湯三片水一盞煎至半盞去滓量兒大小以意加減與服大黃散治小兒胃中熱日漸瘦甘草半兩炙川大黃半兩炙栝蔞根三分上為散每服一錢水一小盞煮至五分溫服量兒大小以意加減骨熱附論夫水為陰骨熱火為陽火精骨熱氣也火精者陽氣也小兒精氣和盛體性多熱若常發熱因過食熱物或患時氣大病之後重亡津液陽氣偏盛水不足腑臟積熱熏灼肌體甚則消鑠骨髓是為骨熱之病久不已變成骨蒸凡小兒一歲至十歲衣服皆不得著新綿又忌冬天以火烘炙衣服與兒亦令體熱忽食桃杏令兒體熱因傷寒病後未滿百日忽食羊肉狗肉令兒體熱或作骨蒸也方龍膽丸治小兒骨熱生風龍膽一兩熊膽研一分馬牙硝研山梔子去皮朴硝研玄參人參枳殼去瓤炒陳橘皮去白焙各半兩柴胡去苗當歸切各半兩焙赤茯苓去黑皮一兩甘草炙銼一兩麝香研半錢沉香半兩上除研外搗羅為末共研勻煉蜜為丸如梧桐子大一歲一丸溫水化下生犀散治骨熱蒸肌瘦頰赤口乾日晚潮熱夜有盜汗五心煩躁大病瘥後餘毒不解犀角地骨皮秦艽麥門冬去心枳殼煨大黃煨柴胡茯苓赤芍藥桑白皮黃耆人參鱉甲醋一錢知母各等分有痰加半夏上銼散每服二錢水一盞陳青蒿少許煎溫服加桃枝三寸亦可疳病熱似骨蒸者及久病後或虛熱時復來瘧痓亦用胡蜣螂散治小兒骨熱黃瘦不食多臥胡蜣螂兩個去翅足微炒赤芍藥七分柴胡半兩去苗川大黃一分銼炙微炒牛黃一分研赤茯苓鱉甲一個塗醋炙令黃去裙襴枳殼一個麩炒微黃去瓤紫菀一個洗去土苗甘草一分炙微銼炒蛇黃一兩細研人參一分去蘆頭熊膽半分細研生薑半分切燒灰麝香一錢細研上為細散每服以溫水調下半錢日三服量兒大小以意加減羚羊角湯治小兒骨蒸潮熱瘦瘁頰赤煩燥盜汗食不生肌病後餘毒久不解者及五心燥熱四肢困倦或傷寒病後因食羊肉體熱不除並宜服之一名生犀散羚羊角鎊地骨皮秦艽去苗土麥門冬去心焙大黃銼炙枳殼去瓤麩炒柴胡去苗赤茯苓去黑皮桑根白皮銼芍藥黃耆銼人參鱉甲去裙襴醋炙各一兩上粗搗篩每服一錢水一盞入青蒿少許煎至六分去滓食後溫服量兒大小加減胡黃連丸治小兒骨熱煩躁黃瘦飲食無味胡黃連一分人參一分去蘆柴胡半兩去苗羚羊角屑二分麥門冬半兩去心焙鱉甲半兩塗醋炙黃地骨皮一兩秦艽半兩去苗黃耆一分銼木香一分犀角屑一分甘草一分炙微赤銼葳蕤一分上為末煉蜜和丸如綠豆大每服以溫水下七丸日三服更量兒大小增減服之胡黃連散治小兒骨熱瘦瘁心神煩躁不得睡臥胡黃連一分知母一分鱉甲半兩醋炙去裙襴柴胡半兩去苗地骨皮一分黃芩梔子仁川升麻犀角屑各一兩甘草一分炙微赤銼杏仁一分湯浸去皮尖雙仁麩微炒黃上為粗散每服一錢水一小盞煎至五分去滓不計時候溫服量兒大小分減服之獺肝丸治小兒骨熱羸瘦雖食不生肌肉獺肝半兩微炙麥門冬一兩去心焙人參半兩去蘆黃芩半兩黃連半兩去須龍膽半兩去蘆白朮半兩柴胡半兩枳殼半兩麩炒微黃去瓤鱉甲半兩塗醋炙令黃去裙襴桃仁二十枚湯浸去皮尖雙仁麩炒微黃色上為末煉蜜和丸如綠豆大每服以溫水下七丸日服三更隨兒大小以意加減犀角湯治小兒骨熱日曉發熱面赤五心煩燥四肢無力飲食減少夜多盜汗面色萎黃亦治大人盜汗犀角鎊柴胡去苗枳殼去瓤麩炒麥門冬去心焙芍藥鱉甲去裙襴醋炙各半兩上粗搗篩每服一錢水一盞入桃仁七枚去皮尖將水煮過麥門冬四十九粒去心煎至七分去滓分溫三服食後臨臥服麥門冬丸治小兒不生肌膚羸瘦骨熱小便黃赤麥門冬去心焙一兩人參黃耆銼青蒿子黃連去須柴胡去苗三分地骨皮各半兩桑根白皮銼半兩枳殼去瓤麩炒半兩上搗羅為末煉蜜和丸如綠豆大每服五丸至七丸溫熱水下量兒大小加減柴胡飲子治小兒自小傷抱腳脛細無力行立不得或骨熱疳瘦柴胡三分去苗鱉甲半兩醋炙令黃去裙襴知母半兩桔梗半兩去蘆豆玄參半兩川升麻半兩枳殼半兩麩炒微黃去瓤桃嫩枝三分銼甘草一分炙微黃上細銼和勻每取一分水一盞煎六分去滓不計時候分為三服更量兒大小以意加減知母飲子治小兒骨熱口乾煩悶不欲飲食四肢羸瘦知母半兩柴胡三分去苗胡大黃半兩銼研微炒去瓤恆山半兩犀角半兩鱉甲半兩塗酥炙透去裙襴枳殼半兩去炒微黃去瓤龍膽半兩去蘆頭甘草一分炙微赤銼上細銼和勻每取一分水一中盞煎至六分去滓分為三服或吐瀉三兩行便安更量兒大小臨時以意加減服之連翹湯治小兒骨熱皮膚生瘡肌體瘦弱身熱連翹山梔子去皮甘草炙黃芩去皮黑秦艽去苗土防風去皮知母焙荊芥穗各半兩麥門冬去心焙一兩上粗搗篩每服一錢水七分煎至四分去滓食後臨臥溫服秦艽散治小兒五歲至十歲以上骨熱及心腹煩悶不欲飲食秦艽去苗甘草炙銼各一兩上為粗散每服一錢煎至五分去滓不計時候溫服更隨兒大小以意加減鱉甲飲治小兒骨熱潮熱盜汗咳嗽不食多渴心躁多驚面黃消瘦鱉甲醋炙地骨皮秦艽柴胡枳殼麩炒知母當歸各等分上一錢水半盞桃柳枝各三寸烏梅一個煎三分去滓無時服犀角散飲治小兒骨蒸潮熱盜汗肌瘦犀角屑鱉甲酥炙柴胡知母地骨皮胡黃連各一兩大黃桃仁各半兩上㕮咀每服一錢水半盞煎三分去滓無時服一方用桃柳枝光明砂丸治小兒骨熱日漸瘦弱不能飲食光明砂半兩細研水飛石子花半兩雄黃半兩細研檳榔三枚遠志一分去心金箔三十研桃仁一分湯浸去皮尖雙仁麩炒微黃紫石英半兩細研水飛過上為末都研令勻煉蜜和丸如麻子大每服以粥飲下五丸日三服更量兒大小加減服之胡黃連丸治小兒骨熱勞疾面黃肌瘦發熱夜臥有汗胡黃連夜明砂五靈脂各半兩柴胡去苗一兩麝香研半兩人參各半兩鱉甲去裙襴醋炙上搗羅為末用豬膽汁煮麵為丸綠豆大每服十丸十五丸米飲下不拘時服桃仁青蒿煎丸治小兒十五歲以下骨蒸勞役盜汗體熱咳嗽煩躁發渴不長肌肉桃仁湯浸去皮尖研半兩麝香研一分柴胡去苗紫菀去苗上丹砂研鱉甲去裙襴醋炙各一兩上除麝香丹砂外並搗羅為末共研勻用青蒿汁童子小便生地黃汁各半兩於銀石器內熬汁入藥末一半火再熬所餘藥末盡和勻杵三二百下丸如綠豆大每服五七丸至十丸空心食前煎陳粟米飲下日三服連艽散治小兒骨熱肌瘦黃連秦艽各一兩天靈蓋一枚酥炙黃甘草半兩上為細末每服半錢粥飲調下大小加減胡黃連丸治小兒骨熱胡黃連乾蟾酒浸去皮骨微炙各三分麝香一分細研上為末都研令勻煉蜜和丸如綠豆大每服以粥飲下五丸日三四服更量兒大小以意加減丹砂丸治小兒骨熱十五歲以下骨熱勞倦身如火日漸黃瘦夜臥多汗咳嗽煩渴丹砂二兩水飛過柴胡去苗末四兩上研勻用獖豬膽汁拌和飲甑上蒸一次丸如綠豆每服十丸用桃仁烏梅煎湯下日三服天靈蓋散治小兒骨熱體瘦心神煩躁天靈蓋一枚塗酥炙黃黃連半兩去須上為細末每服粥飲調下半錢日三服更量兒大小加減生犀散治小兒骨熱肌瘦頰赤口乾晚潮熱夜盜汗五心煩躁四肢困倦飲食不生肌肉及大病瘥後餘毒不解或傷寒病後因食羊肉體熱不除並宜服犀角散治骨蒸熱肌瘦頰赤口乾日晚潮熱夜有盜汗五心煩躁四肢困倦飲食不生肌肉及大病瘥後餘毒不解或傷寒病後因食羊肉體熱不除宜之犀角地骨皮芍藥柴胡甘草乾葛等分上銼散每服二錢水一盞薄荷五葉煎服瘧疾生薑二片薄荷五葉煎一方不用薄荷生薑煎肥兒丸治小兒蒸熱腹脅脹滿面色萎黃飲食遲化大小便不調川黃連去須大蕪荑各半兩胡黃連麥糵炒神麯炒各半兩上為細末雄豬膽丸如麻子大每服十丸溫米飲送下食前乳母忌酒濕面靈犀散治小兒骨蒸潮熱盜汗肌瘦犀角屑胡黃連各半兩人參川芎秦艽甘草羌活柴胡桔梗地骨皮各一兩上㕮咀每服一錢水一盞烏梅竹葉各少許煎團參丸治小兒肌瘦骨蒸潮熱夜多盜汗人參去蘆草龍膽防風去蘆枳殼炒白茯苓甘草炙黃耆胡黃連炒鱉甲醋炙上等分為末以豬膽汁為丸如綠豆大每服十五丸食後米飲下
