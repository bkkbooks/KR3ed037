不大便可稍稍與之大黃一兩微炒厚朴半兩炙枳實一個大者良上㕮咀同煎陽明病潮熱大便微硬可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者必初硬後溏不可攻之攻之必腹滿不能食也欲飲水者與水則噦其後發熱者必便硬而少也以小承氣湯和之不轉失氣者忌不可用也夫實則譫語虛則鄭聲鄭聲者則重語也直視譫語喘滿者死下利者亦死發汗多若重汗者亡陽譫語脈短者死脈和者生傷寒若吐下後不解本不大便五六日以上至十餘日日晡時發潮熱不惡寒獨語如見鬼狀若劇者發則不能識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之陽明病多汗以津液外出胃中乾燥大便必硬硬則譫語小承氣湯主之若一服利者止後服調胃承氣湯治傷寒發汗後惡寒者虛也不惡寒但熱者實也當下傷寒十三日過經譫語者當下之若自利者脈當微厥反和者此為內實當下之太陽病過經十餘日心下溫溫欲吐而胸中實大便溏腹微滿鬱郁微煩當下之太陽病三日發汗不解蒸蒸熱者當下之大黃一兩炒芒硝九分甘草半兩炙上㕮咀大黃甘草二味以水一盞煮至七分去滓下芒硝更煎二三沸頓服之梔子仁湯治陽明病脈浮咽乾口苦腹滿汗出而喘不惡寒反惡熱心燥譫語不得眠胃虛客熱舌燥宜服陽明病下之其外有熱手足溫者心中煩熱飢不能食頭有汗宜服傷寒五六日吐後發汗虛煩不得眠劇者心神顛倒宜服傷寒六七日大下之後身熱不去心中結痛此為欲解宜服梔子仁甘草炙各一兩上為末每服三錢水一盞豆豉十五粒煎七分去滓溫服白虎湯治傷寒脈浮而微厥表裡有熱三陽合病腹滿身重難以轉側口中不潤臥後譫語遺尿發汗則譫語下之則額上生汗手足逆冷自汗出並宜服之服桂枝湯後有大汗出煩渴不解脈洪大傷寒嘔吐若下後七八日不懈結實在裡表裡俱熱時時惡寒大渴舌上乾燥而煩欲飲水數升傷寒無大熱口乾燥渴心煩背微惡寒渴飲水無表裡證者並宜白虎湯加人參湯脈浮發熱無汗不可服諸亡血不可服活人書曰脈厥而滑里有熱白虎加人參黃濟云傷寒及溫熱病脈洪大憎寒壯熱煩渴欲飲水及夏月傷暑發熱惡寒身體疼重大渴不止躁煩汗出脈細小手足微冷並時疾未經轉瀉胃熱發斑兼痘疱麩疹天行後餘熱不解但是一切伏熱並可服董氏云小兒瘡痘其證未全或未明者與白虎湯如秋冬及春寒不宜用白虎湯之時但加棗葉煎不必拘常法知母一兩半甘草半兩粳米一合半上㕮咀白水煎加減服加人參半兩名白虎加人參湯又方加石膏四兩亦作四錢一方棗一枚同煎每服一錢水一小半盞煎三分去滓服之三和湯治小兒傷寒鼻塞聲重痰嗽體熱煩躁麻黃三兩去節杏仁二兩去皮尖甘草一兩炙上為末每服三錢水半盞煎三分熱服進三服蔥粥投之衣被蓋汗出立瘥團參湯治小兒傷寒發汗吐下後毒氣不散表虛里實熱發於外故身斑斑如錦紋甚則煩躁譫語兼治喉閉腫痛團參川麻甘草上等分㕮咀白水煎加減服茯苓湯治小兒傷寒口孜啀喘粗肌熱煩躁傷渴白茯苓一兩烏梅肉半兩微炒乾木瓜一兩上搗篩為粗末每服一錢以水一小盞入生薑一片煎至五分去滓溫服不計時候量兒大小加減治小兒傷寒梔子仁一枚棗一個燒灰牙硝少許上以古字錢兩文燒令赤水淬七度將此水調三味灌之立愈走馬散治小兒三歲以下忽患傷寒陰陽二毒此因母之毒氣所致庸醫多不會意見壯熱不食多睡便以冷物與吃即兒轉不安加甚蓋藥熱動風藥寒嘔逆宜服之大黃末一兩米醋炙令如夫用乾地龍一枚末入馬牙硝一分上為末同研三百下令蔭干再搗為末生薑汁調灌立見神驗量多少灌黑散方治小兒傷寒退熱上方見初生門變蒸類治小兒傷寒壯熱頭痛口乾心煩生薑少許竹瀝一合蜜半合上相和令勻二三歲兒分為三服發汗散治少小傷寒發熱解肌芍藥黃芩葛根各六分上切以水三升煮一升為四服一歲兒為三服金花散治小兒傷寒肥皂角子一百個鉦內炭灰炒裂取黃子訶子皮五個甘草二寸清油煎黃色上為末每服錢半溫水調下治五歲以下四十八候三黃散治證受傷寒麻黃不去節大黃蒸各一分黃芩半分上為細末每服半錢蔥湯下日進二服治胸口不悶但嘔者此名溫毒也宜服之生薑地黃半斤好豉上以豬膏二斤合研絞汁用麝香雄黃和服毒便從皮膚中出則愈忌蕪荑熱病附論夫小兒熱病者是冬時嚴寒人有觸冒寒氣入於肌肉當時不即發至春得暖而發則病頭痛壯熱謂之心熱疾又冬時應寒而反暖其氣傷人即發亦使人頭痛壯熱謂之冬溫凡邪之傷人皆由觸冒所以感之小兒雖不能觸冒其乳母抱持解脫不避風邪冷熱氣所感病也黃帝曰傷寒熱病不可刺候有九四曰老人嬰兒熱病腹滿者死方石膏散治小兒熱病煩熱驚悸石膏細研川大黃銼碎微炒甘草炙微赤銼各半兩大青黃芩梔子仁知母葳蕤升麻葛根銼龍膽去蘆頭各一分上為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減服之吳藍散治小兒熱疾頭痛心躁眼黃吳藍大青蘆根銼石膏細研各一兩甘草炙微赤銼麥門冬去心焙黃芩各三分茵蔯梔子仁各半兩上為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服犀角散治小兒熱病煩熱不解大小便秘澀心胸悶亂煩躁犀角屑赤芍藥黃芩升麻梔子仁地骨皮甘草炙微赤銼各一兩半麥門冬去心川大黃銼微炒各三分上為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服珍珠散治小兒熱病心神狂躁身熱如火頭痛煩渴眠臥不安珍珠末馬牙硝寒水石太陰元精各一分龍齒鉛霜硃砂各半兩牛黃麝香各半兩上研令細不計時候以新汲水調下半錢量兒大小加減服珍珠散治小兒熱病口乾心神煩躁珍珠末牛黃龍腦各一錢並細末瓜根茯神硃砂研水飛過各半兩馬牙硝寒水石併為細末各一分上拌勻每服半錢蜜水調下量兒大小加減解肌散治小兒熱病口乾身體壯熱心神煩躁宜服麻黃三分去根節葛根銼赤芍藥川升麻黃芩甘草炙微赤銼各半兩上為散每服一錢以水一小盞入蔥白五寸煎至五分去滓不計時候量兒大小加減溫服令有汗出即瘥一方白水煎茵蔯散治小兒熱病心煩壯熱口乾多渴宜服茵蔯麻黃去根節赤芍藥甘草炙微赤銼黃芩葛根銼各半兩上為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小增減溫服汗出為效牛黃散治小兒熱病壯熱心悶牛黃半分硃砂各細研茯神栝蔞根銼苦參甘草炙微赤銼各一分上細羅散入研藥同研勻不計時候以新汲水調下半錢量兒大小以意增減石膏散治熱病石膏白茯苓乾葛根各一兩甘草炙黃芩芍藥各半兩上為細末每服一錢水一小盞入竹葉薄荷各少許煎至五分去滓溫服犀角飲子治小兒熱病口乾心神煩躁犀角屑川大黃炮細銼川升麻各一兩人參去蘆頭赤芍藥甘草炙各半兩上為細末每服一錢水一盞入竹葉三片煎至五分去滓溫服地骨皮散治證同前地骨皮洗焙乾川大黃微炮黃芩各一兩麥門冬去心黃耆甘草炙各半兩上為細末每服一錢水八分盞荊芥少許煎至五分去滓溫服子芩散治小兒熱病皮膚壯熱子芩川升麻梔子仁大青甘草炙微赤銼各一分上細羅為散不計時候以新汲水調下半錢量兒大小加減以意服之胡黃連散治小兒熱病壯熱心悶胡黃連梔子仁牛黃細研甘草炙微赤銼各半兩子芩一兩上細羅為散研入黃芩牛黃令勻不計時候以蜜水調下半錢量兒大小加減服之地黃散治小兒熱病生乾地黃一兩棗葉一握焙乾梔子仁黃芩陳橘皮湯浸去白各半兩上為細末每服一錢水八分盞入蔥白鹽豉各少許煎至五分去滓溫服生地黃湯治小兒熱病煩渴頭痛壯熱不止用地黃汁三合濾淨入生蜜半合和勻時時與一合服量兒大小加減服治小兒熱病煩渴取栝蔞根為末不計時候以乳汁調半錢量兒大小加減服之治小兒熱病腹脹大腸不通用牽牛子半兩微炒搗細羅為散每服以橘皮湯調下半錢稍利為效量兒大小以意加減服之發黃附論夫發黃皆由濕熱之氣蘊結在於脾胃蒸發而成也陽明病無汗小便不利心中熱壅必發黃凡發黃寸口無脈鼻氣冷並不可治巢氏云凡發黃而不利心腹滿者必死診其脈沉細者亦死又有百日半歲小兒非傷寒溫病而有微黃者亦是脾胃熱忌不可灸也灸之則熱甚此是將息過度所為衣當薄數與除熱粉散粉之自愈不得妄與湯藥及灸小兒瘀熱在胃或濕熱相搏熏肌散肉其證目黃身或疼痛肌肉如橘色或得之傷寒或得之時氣或得之風溫皆脾胃氣虛邪熱與穀氣相搏所致也利其小便則愈方升麻湯治小兒發黃升麻黃芩去黑心山茵蔯柴胡去苗瓜蒂知母藍葉各一兩山梔子仁一兩一分大黃銼炒石膏搗碎各一兩半甘草炙芍藥各半兩羚羊角鎊三分上粗搗篩三四歲兒每服一錢水七分煎至四分去滓溫服早辰午後近夜各一服量兒大小加減連翹赤小豆湯治小兒傷寒發黃身熱麻黃去節連翹甘草炙生薑赤小豆各二兩杏仁四十一個生梓白皮銼二兩大北棗一十二個上㕮咀白水煎又一方生小麥苗搗汁服之立效桑白皮湯治小兒發黃桑根白皮銼麻黃去根節湯煮掠沫秦艽去苗土各一分大黃銼炒半兩上粗搗篩每一錢水七分牛乳一合同煎至五分去滓分溫食前日三服量兒大小加減茵蔯湯治小兒陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗齊頭頸而還小便不利渴欲飲水者此為瘀熱在裡必發黃傷寒七八日身黃如橘色小便不利腹滿者並皆治之山茵蔯梔子仁川大黃上等分㕮咀水煎加減服日進三服小兒小便當利尿如皂莢汁狀色正赤一宿腹減黃隨小便中去也梔子蘗皮治小兒傷寒身黃髮熱梔子仁十五個甘草一兩炙黃蘗二兩上㕮咀白水煎加減服三黃湯治小兒天行發黃心腹脹急大黃銼炒黃芩去黑心各一兩半山梔子仁三分上粗搗篩三四歲兒每服一錢水七分煎至四分去滓溫服取利為度瓜蒂散治小兒傷寒發黃栝蔞根飲治小兒忽發黃面目皮肉並黃用生栝蔞根搗取汁二大合入蜜一大匙和令勻火暖分為三服治小兒傷寒發黃方用土瓜根搗汁三合服之又方用韭菜根搗汁澄清取如大豆許瀝兒鼻中即出黃水病瘥又方用青麥搗汁服之治小兒四歲發黃出本草生搗正瓜絞汁三合與飲不過三飲已足茵蔯湯治小兒發黃等病身如橘色山茵蔯山梔子各一兩川大黃芒硝寒水石木通各半兩上㕮咀每服一錢水八分煎至五分去滓溫服傷暑附論凡大人小兒中暑悶倒急扶在陰涼處切忌與冷水得冷即與暑相擊而死當以帕子或布巾蘸熱湯熨臍腹間暖即瘥頻用熱湯或懷抱小兒道途中無覓湯處即掏熱土於臍上仍撥開小窩子尿於中當日處稍熱可代湯熨之良久嚼大姜一塊以水嚥下續用解暑藥黃龍丸五苓散白虎湯隨證用之方枇杷葉散治冒暑伏熱引飲過度脾胃傷冷飲食不化胸膈痞悶嘔噦噁心頭目昏眩口乾煩熱肢體困倦不思飲食或陰陽不和致成霍亂吐瀉枇杷葉去毛尖陳橘皮去白丁香各半兩香薷三分去土梗厚朴四兩薑製麥門冬去心焙乾木瓜白茅根甘草炙各一兩上㕮咀每服二錢水一小盞生薑二片煎至七分去滓溫服或作細末煩躁引飲用新汲水調下不計時候三歲以上分作三服一方加百藥煎清膈飲子治小兒伏暑嘔吐香薷淡竹葉去枝節各一兩白茯苓人參去蘆檀香半夏曲各半兩甘草炙半兩白粳米一合上㕮咀每服一錢水半盞生薑一片煎至一半去滓溫服量兒大小加減與之香薷丸治大人小兒傷寒傷暑伏熱躁渴瞀悶頭目昏眩胸膈煩滿嘔噦噁心口乾舌苦肢體困倦不思飲食或發霍亂吐利轉筋並宜服香薷去土一兩白茯神去木半兩乾木瓜紫蘇莖葉並用去粗根各一兩丁香藿香葉去土甘草炙銼檀香銼各半兩上為細末煉蜜和丸每兩作三十丸每服一丸至二丸細嚼溫湯下或新汲水化下亦得小兒服半丸不計時候家傳異功丸消暑生津治渴澤瀉一兩二錢豬苓湯浸去皮三分官桂半兩減半茯苓三分白朮半兩人參半兩去蘆辰砂半兩另研上為末煉蜜丸如芡實大或夏月走路轎里含化免吃水妙若小兒夏月心熱煩渴引飲煎燈草竹葉湯化遇渴投之止治小兒中熱面赤身如火熱或眼赤當歸二錢馬牙硝鬱金三枚用皂角水煮乾各一分甘草一分上為細末研一字或半錢冷水調下治小兒中暑吐利用白蒺藜苗研汁服治中暑悶絕宜急扛在陰處切忌不可飲冷水急取大蒜及路中日曬熱土同研新水調去滓灌服香薷散治身熱惡寒頭痛或往來寒熱如瘧煩燥渴甚嘔吐背寒面垢泄瀉昏悶脈伏宜用香薷散每服二錢水一盞茵蔯車前各加莖煎熱服嘔吐加茯苓藿香木瓜泄瀉加烏梅陳米熱瀉加黃連每服各加少許一方上為末用燈心車前子同煎吐瀉加茵蔯生薑汁調服其效如神又方用五苓散平胃散合和紫蘇葉烏梅煎湯下五苓散治冒暑伏熱吐瀉煩渴陰陽不分表裡未解傷風受濕並宜服之豬苓澤瀉白朮赤茯苓官桂木通山茵蔯天花粉瞿麥上為散用燈心車前子同煎如熱甚加小柴胡湯去官桂各味等分煎吃消暑丸治中暑煩悶嘔吐多痰大半夏四兩醋煮白茯苓二兩甘草一兩上為末薑汁煮糊為丸每服三十丸空心溫水下
