body:
  text: 卷三百六十九嬰孩傷寒門夾食傷寒附論茅先生治小兒中夾食傷寒候大熱嘔逆肚膨上渴泄瀉此候因與物食所傷而五臟結實所得治者先用青金丹與下三四次方下醒脾散勻氣散與服如有咳嗽即下麥湯散調理治之即愈漢東王先生家寶云夾食傷寒並單有積證候稍異如從膝下冷者為單有積必潮熱宜治之以補如膝下熱者並渾身熱面色青則是夾食傷寒須先理傷寒後取之以上病證並在審度用藥無不應驗漢東王先生家寶治夾食傷寒病證面青吐逆渾身發熱或發渴煩躁頭疼宜用水精丹取之至天明須取下准前用觀音散三二服補之後下薄荷散三二服解其寒氣如漸有退候恐餘熱未退宜進七寶輕青丹三二服間以人參散三二服調之石壁經三十六種夾食傷寒候歌夾食傷寒先自熱內中有物傷形節面上紅斑有似丹口中時時生躁渴先表方知醫有功次治亦為神妙訣微微取動一兩行臟腑調和自安悅此因氣血弱即所食物滯在脾胃使肌肉上或面上如豆大或如指面大赤斑點主至夜間不眠多渴看輕重先取其積次和胃氣退熱再看證候調理三十六種內夾食傷寒候云此候宜服白附子散小兒形證論四十八候夾食傷寒候云此候面上有點子多作疹方水精丹治嬰孩小兒夾食傷寒又治蟲積食積貼積驚積惡物食傷天南星一錢滑石各為末二錢水銀粉秤半錢蕪荑取仁一百片巴豆五十粒去殼不出油上先研巴豆令極細再下蕪荑仁復研方入眾藥研令極勻以爛飲為丸如黃豆大每服三五丸以歲數加減米湯泡生薑蔥吞下服時須令嬰孩小兒空心不可吃乳食稍飢方可進藥如膈上有食物先須吐出如膈下有食方得轉瀉切忌生硬果實肉食等物近夜臥服佳人參散治夾食傷寒症解熱補虛調胃氣進乳食止吐瀉人參蓮肉去心炒茯苓各一分黃耆半兩捶蜜水拌炙甘草炙二錢上為末每服嬰兒一字二三歲半錢四五歲一錢以水一藥注或半銀盞入棗子半斤煎十數沸服升麻散治小兒時氣頭痛壯熱川升麻赤芍藥石膏細研麻黃去根節各半兩貝齒一枚甘草炙微赤銼半兩上為末每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服得微汗為效麥門冬散治小兒時氣咳嗽壯熱麥門冬去心焙川升麻各一兩貝母煨微黃甘草炙微赤銼各三分赤芍藥杏仁湯浸去皮尖雙仁麩炒微黃各半兩上為末每服一錢以水一小盞煎至五分去滓入淡竹瀝半合更煎一二沸不計時候量兒大小加減溫服生乾地黃散治小兒時氣壯熱咳嗽心胸脹悶乳食不下生乾地黃麥門冬去心焙各一兩款冬花杏仁湯浸去皮尖雙仁麩炒微黃陳橘皮湯浸去皮瓤各三分甘草去心焙微赤銼上為末每服一錢以水一小盞入竹茹半分煎至五分去滓不計時候溫服量兒大小增減服之人參飲子治時氣病人參去蘆頭生乾地黃各一兩犀角末黃芩柴胡去苗各半兩甘草炙一分上為粗末每服一錢水一小盞入生薑二片煎至五分溫服八物吳藍飲子治小兒傷寒天行頭痛壯熱吳藍大青各二兩半甘草炙茵蔯一分半麥冬去心三分梔子仁一十五個上每服三錢水一盞入蘆根半握生薑五片煎至七分去滓服之水解散治小兒天行時氣瘡庖身體壯熱頭疼煩渴心躁或已出尚熱天麻去節四兩大黃黃芩桂心甘草白芍藥各等分上為末熱水調下連二服汗出為瘥或熱甚此謂風實之人三伏中亦宜用只去大黃春夏並用麥門冬散治小兒時氣壯熱心腹煩悶麥門冬一兩半去心焙人參去蘆頭甘草炙微赤銼各半兩葛根銼茅根一兩炒上為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服麥門冬散治小兒時氣五六日體熱不止麥門冬去心焙大青各半兩甘草炙微赤銼吳藍各一分梔子仁五枚上為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服葛根散治小兒時氣煩渴腹中痞實葛根銼黃芩柴胡去苗各半兩川大黃一兩銼碎微炒甘草一分炙微赤銼上為散每服一錢以水一小盞煎至五分去滓不計時候溫服以稍利為度量兒大小加減服之貝母散治時氣病黃耆青皮茯苓栝蔞根甘草紫菀白朮各一兩百合一兩半上為細末每服一錢以水八分盞煎至四分通口服得少許為妙麥湯散治小兒傷風傷寒渾身壯熱咳嗽痰盛知母石膏煅赤葶藶隔紙炒杏仁湯浸去皮尖細研地骨皮滑石末麻黃去根節生薑汁浸一宿各等分上為末每服半錢煎小麥湯調下七寶散治小兒傷寒傷風渾身壯熱天麻炙白殭蠶羌活各一錢麻黃去節蠍一分白附子一分麝香少許上為末每服半錢或一字用生薑薄荷蜜水調下大小加減惺惺散治小兒傷風壯熱及瘡疹毒氣時氣濕氣風熱傷寒鼻塞清涕驚悸頭痛咳嗽喘粗目澀多睡及氣不和人參白茯苓甘草炙白朮栝蔞根細辛桔梗上七味等分焙乾為末每服一大錢用水半盞姜一片薄荷三兩葉同煎三五沸二三歲一服分三服五歲以上只作一服如傷寒欲出汗以蔥白豆豉薄荷同煎溫服一方無白朮有乾葛甘草減半治壯熱入薄荷生薑冷氣入薑棗水一盞煎傷風發熱加防風咳嗽氣不和加川芎又一法海藏云此加減四味亦各隨經證也兼下小黑膏妙錢氏方謂小兒壯熱昏睡傷風風熱瘡疹傷食皆相似未能辨認間服惺惺散小柴胡湯升麻湯此數藥均能治療不若參蘇飲治諸般發熱不問何證每每用之甚效須逐日多服以熱退為期不可遽止惟傷寒一證則大便酸臭水穀不化畏食吐食宜以藥利之先服紫霜丸感應丸仍以參蘇飲與服尤驗若發熱耳冷骫冷足冷四肢乍冷乍熱腮赤面赤噴嚏呵欠驚跳不止昏昏多睡皆瘡疹之候也當用溫涼之藥切忌妄下已發未發並用升麻湯消毒飲若三日未見形跡當以生酒塗其身上時時看之狀若蚤痕者是也或發不透及倒擫黑陷極為利害紫草木通甘草枳殼黃耆等分白水煎服名四聖散若小兒咽喉疼者用生甘草桔梗等分白水煎服名如聖散更有小兒頭昏頰赤口內熱氣小便赤澀大便秘結此為裡熱當用大黃當歸芍藥甘草等分白水煎服名四順飲若審是瘡疹之證不宜用此蠍梢散治傷風發熱睡臥不安直視涎盛時作驚掣全蠍十四個甘草炙川芎各二錢麻黃去節秤防風薄荷葉各一錢上為末入硃砂一錢細研入藥內令勻每服一錢水半盞煎至三分溫服厚朴散治小兒外傷風冷壯熱憎寒頭痛體重寒氣逆嘔吐噁心或手足厥冷及脾胃不和並皆治之乾葛三分蒼朮陳橘去瓤用皮厚朴去皮以薑汁塗炙令香各一兩上為末每服一錢水一盞入姜二片棗一枚同煎至六分熱服升麻黃芩湯治小兒傷風有汗頭疼發熱惡寒升麻黃芩葛根芍藥各三錢甘草一錢半炙上銼如麻豆大每服二錢以水一中盞煎至六分去滓溫服若時行瘡痘出不快煩躁氣悶者加木香一錢半解肌湯治小兒頭痛傷風憎寒壯熱肢體疼痛鼻乾不得睡兼治大人小兒瘡疹已發未發皆可服乾葛芍藥升麻甘草上等分㕮咀每服二錢用水一盞煎至半盞去滓服此藥兼治寒暄不時人多疫疾乍暖脫衣及暴熱之次忽變陰寒身體疼痛頭痛如石加黃芩名黃芩升麻湯瘡痘已發未發及瘡痘不快熱盛者加大青等分煎服瘡痘不快加紫草糯米煎傷風身熱鼻流清涕心中煩躁加防風羌活薄荷煎服若寒即熱服若熱即溫服瘡疹亦准此服藥身涼止藥小兒量度多少服活人書云如老人吃去芍藥加柴胡一兩人參半兩雪白芍藥一分名升麻葛根湯驚調散治大人小兒老少但是諸般傷寒傷風體虛熱上膈有涎煩躁不省人事腦一分麝香半錢荊芥穗一兩微炒焙末之上將腦麝各研入藥令勻每服好茶半盞調半錢和滓服重者二錢小兒少許不計時候治小兒傷風以豆豉及蔥生研作靨貼囟上如有邪氣者以豆豉及蔥頭生研如前方參苓散治小兒風吹著渾身壯熱頭疼面赤多渴人參茯苓甘草炙白朮各一分黃芩乾葛各半兩上為細末每服一錢水五分姜一片棗半個煎至四分通口服之清神散治傷風身熱咳嗽不進乳食鼻塞氣促睡臥不安並宜服之人參茯苓各一錢川芎五分防風苦梗羌活麻黃荊芥甘草各一錢上為末每服一錢蔥白薄荷煎水調下荊術散治小兒傷風傷寒或瘡或疹服此藥無寒無熱能分陰陽疏風順氣一切諸證服之應手而效更有加減法開列於後荊芥穗一兩淨蒼朮三兩銼炙微黃赤芍藥一兩甘草半兩銼炙上為細末每服一二錢量兒大小加減服之傷風傷寒壯熱嗽咳身重或瘡疹未出生薑蔥白湯調下傷風潮熱煎薄荷湯調下邪風傷肺鼻出清涕氣粗煎紫蘇湯調下卒暴驚風抽宜服四味奪命散一服立效久病後慢驚搐服全蠍散即瘥瘡疥出發不快加炒牛蒡子煎湯調下發汗不出煎去節麻黃湯調下心神不寧恍惚不安煎白銀散調下變蒸發熱煎薄荷湯調下盜汗自汗煎牡蠣浮麥湯調下風毒丹毒赤腫四順飲子湯調下眼暴赤腫痛隱澀難開煎羌活黃芩黃連生地黃湯調下口舌生瘡加白銀散同煎服之立效腮項腫痛加牛蒡子防風湯調下咽喉腫痛重舌加升麻枳殼桔梗薄荷防風煎湯調下日進二服肺熱喘急痰涎壅塞連服四味奪命散立愈肺虛上氣喘滿咳嗽加款冬花五味子人參桑白皮紫菀煎湯調下驚風后手足拳攣不舒加當歸熟地黃天麻羌活細辛木瓜虎骨川烏頭炮去皮臍一同為細末熬木瓜湯調下脾胃虛弱嘔吐不利乳食不化宜服後安胃和脾散日進二三服立愈脾胃久虛肢體羸瘦嘔吐下痢乳穀不化宜常服安胃和脾散日進三服剋日痊安淋澀小便不通加萹蓄木通燈心滑石煎湯調下歸命散治小兒傷風身壯熱氣粗咳嗽或傳瘡疹並宜服之荊芥穗半兩白朮去蘆二錢半人參去蘆三錢淨蒼朮銼炒二兩白茯苓去皮二錢石膏半兩甘草二錢半炙上為粗末每服三錢水一盞同煎至八分去滓乳母多宜服之小兒任意服不拘時候加減小柴胡湯治小兒傷風傷寒瘡疹陰陽不和寒熱往來口苦舌乾及氣喘咳嗽並宜服之淨柴胡一兩去蘆人參三錢去蘆半夏湯洗七次切作片子甘草炙各二錢半防風去蘆三錢熱甚大便秘澀加大黃同煎服上㕮咀每服五錢水一盞入生薑五片棗一枚同煎至七分去滓溫服不拘時候薄荷散治小兒傷風傷寒肢體壯熱手足冷呻吟驚悸睡臥不安宜服此藥發散薄荷葉一兩蠍一分天南星半兩灰炒通黃赤色上三味為細末周歲半錢連根蔥白煎湯下不拘時候若只傷風並進二服立愈若小兒傷風因寒邪相搏或成驚風者吐痢及寒邪不能發散宜服此退了壯熱寒邪若解驚亦不作卻服硃砂丸尤佳若不先用此藥便用驚風藥吐利即寒邪不能發散隨虛入臟遂成疾而難治也貼囟藥治小兒百日內傷風鼻塞服藥不退乃是出胎時被風吹所以有此用天南星一味為末生薑自然汁內調成膏貼囪上鼻不塞便去之天麻散治小兒傷風清涕鼻塞咳嗽身熱並皆治之天麻防風甘草川芎羌活白芷麻黃去節上等分為細末蔥湯調食後服之麻黃湯治傷風發熱咳嗽喘急若無汗者宜服之麻黃去根節寸銼三錢以水煮去沫漉出控干肉桂去粗皮二錢不得見火杏仁湯浸去皮尖及雙仁者七個麩炒黃色別搗入膏甘草炙一錢上為粗末入杏膏拌勻每服一錢水六分煎至四分去滓溫服不計時候以汗出為度大小加減若有自汗者不宜服之敗毒散治傷風時氣塞壅咳嗽方見十味湯時氣附論夫小兒時氣病候時氣病者是四時之間忽有非節之氣如春時應暖而寒夏時應熱而冷秋時應涼而熱冬時應寒而溫其氣傷人為病亦頭疼壯熱大體與傷寒相似無問長幼其病形證略同言此時通行此氣故名時氣世呼亦為天行又小兒天行病發黃候四時之間忽有非節之氣傷人謂之天行其熱入於脾胃停滯則發黃也脾與胃合俱象土其色黃而候其肌肉熱氣蘊積其色蒸發於外故發黃也又小兒時氣腹滿候時氣之病腹滿者是熱入腹與臟氣相搏氣痞澀在內故令腹滿若毒而滿者毒氣乘心煩懊者死又小兒時氣病結熱候時氣之病熱入腹內與肺臟之氣相結謂之結熱熱則大小腸痞澀大小便難而苦煩熱是也又小兒患時氣病候時氣之病若施治早晚失時投藥不與病相合致令病連滯不已乍瘥乍劇或成敗壞之證無常候也又小兒傷寒時氣病兼瘧疾時氣之病又兼瘧者是日數未滿本常壯熱而邪不退或乘於陰或乘於陽其乘於陽陽浮則熱其乘於陰陰浮則寒陰陽之氣為邪所並互相乘加故發寒熱成瘧也又小兒時氣病得吐下後猶熱候時氣之病得吐下之後壯熱猶不歇者是腸胃宿虛而又吐利則為重虛其熱乘虛而入里則表裡俱熱停滯不歇故雖吐下而猶熱也又小兒病後不嗜食面青候時氣病熱渴之後不嗜食而面青者是胃內餘熱未盡氣滿故不嗜食也諸陽之病俱上榮於面陽虛未復本滯風邪挾冷冷搏於血氣故令面青也又小兒時氣病發復候時氣之病發復者是熱之後氣血未和臟腑熱勢未盡或起早勞動或飲食不節故其病重發謂之復也然發覆多重初病者血氣已虛重傷故也嬰童寶鑑小兒時氣歌時氣皆因節令虧頭疼壯熱汗微微良工若得看形候須作傷寒病有歸熱毒還從腑氣衝便成結實在腸中身體若還多煩渴更兼便溺不能通時氣還須早早醫變為敗氣切須知乍寒乍熱無時度或減或增體漸羸誰言吐下熱無餘只為元因腑臟虛熱盛更虛皮肉澀致令煩渴躁難除陰陽邪氣兩相併臟腑陰陽彼此爭發作有期名是瘧直須療理莫留停時氣雖然已漸停尚餘虛熱體伶仃心胸氣滿還憎食夾冷須憂面色青石壁經夜熱晝涼歌夜間遍體猶如湯才到天明又復涼非是鬼神為祟禍都原臟腑有風傷先將妙藥調脾臟次用神方瀉大腸患候但觀喉厭動更看眼急鼻頭光須知此病傳瘟疫辨別分明用藥良此內因傷物外因傷邪所致也先當表散其毒邪次用藥去其積亦主至夜多汗只在其頭額上有之亦口中涎響也脾風則然多言有禍祟非也更請細看前候此患緣飢飽過度冷食滯脾胃氣不行於諸經夜熱晝涼先進南星丸三五服後進檳榔散相間與服然後平和又須當與白丁香膏治或只以磨積方調氣只不得更取難動止為肚大恐成疳疾也方人參散治解利傷寒四時氣疫上焦虛弱心神恍惚脾胃不和飲食無味口苦舌乾渾身煩熱人參茯苓羌活桔梗知母麻黃去根節枳殼麥炒去瓤甘草炙川芎白朮陳皮去白厚朴薑汁製茱萸水煮桂心不見火前胡蒼朮甘草節獨活上各等分為末二錢水一盞薑棗煎七分如要汗出蔥白豆豉生薑煎服嗽入杏仁麻黃同煎小兒入薄荷煎婦人止入生薑煎去瘧用桃柳條二十七節同煎葛根散治小兒頭疼時氣體熱煩渴葛根銼麥門冬去心三分黃芩人參去蘆頭赤芍藥犀角屑甘草炙微赤銼升麻各半兩石膏一兩細研上為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服治小兒壯熱時氣驚悸並熱瘡鉤藤炙人參蚱蟬炙子芩各一分防風二分龍齒四分澤蘭二分石蜜一兩湯成塗之竹瀝一升蛇蛻皮三寸炙上切以水三升煮至七合量兒大小服之解肌散治小兒時氣壯熱頭痛壯熱咳嗽不能食麻黃三分去根節赤芍藥貝母炮微黃柴胡去苗杏仁湯浸去皮尖雙仁麩炒微黃葛根半兩銼石膏一兩細研甘草炙微赤銼秤半兩上搗篩為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服八味麥門冬飲子治小兒天行壯熱咳嗽心腹脹麥門冬去心茅根各六分甘草炙人參各二分紫菀升麻貝母竹瀝各三分上切以水二升煮取八合分服忌如常法細切生薑蔥白皮湯並附子煮黃雞入牙硝一二分調作羹與兒食上用附子煎湯去滓煮黃雌雞肉入姜牙硝作羹空心服之丁香丸治積食傷寒烏梅一個切片用去土瓦焙乾丁香三個縮砂四個去殼巴豆兩個去殼用薛子葉打碎去巴油入缽內研爛上除巴豆為細末入巴豆研勻卻用研細百草霜和勻麵糊為丸如綠豆大一歲一丸米湯飲下積塊不妨常服有功小麥煎湯治小兒夾食夾驚傷寒正受傷寒嗽咳夜熱晝涼傷風瘡疹之疾大效麻黃半兩去節湯炮白朮炮干根二錢半白茯苓甘草各二錢半上㕮咀入麥子二十一粒同煎一方用蔥白二寸煎服傷風附論夫傷風貪睡口中氣熱呵欠頓悶當發散與大青膏解不散有積食當下大黃丸主之大飲水不止而善食者可微下余不可下也傷風手足冷脾臟怯也當和脾後發散和脾益黃散發散大青膏主之傷風自利脾臟虛怯也當補脾益黃散發散大青膏主之未瘥調中丸主之有下證大黃丸主之後服溫驚丸傷風腹脹脾臟虛也當補脾必不喘後發散乃補脾也去脹塌氣丸主之發散大青膏主之傷風兼臟兼心則驚悸兼肺則悶亂喘息哽氣長出氣嗽兼腎則畏明隨補母臟虛見故也傷風下後餘熱以藥下之太過胃中虛熱飲水無力也當生胃中津液多服白朮散方金箔丸治小兒驚風奶食不化成外傷風壯熱氣粗慢風搖頭口眼不開及赤白痢消風散治小兒因解脫風邪傷入皮毛入於臟腑則惡冷壯熱胸膈有涎目澀多睡虛風神慢小兒有病服之無變動一方加朱麝尤佳人參白茯苓川芎厚朴制羌活防風蟬蛻藿香殭蠶炒陳皮甘草荊芥上各等分為末每服一錢茶清調下大小加減服之大青膏治傷風自利脾臟虛怯也當補脾此藥主之又云肝主風實則目直大叫虛則前牙多欠胸滿短氣氣急喘嗽故上氣當發散之天麻末一錢蠍尾去毒生半錢硃砂研一字匙白附子生一錢半青黛一錢研天竺黃一分烏蛇梢骨酒浸焙乾取末半錢麝香一分上同再研細生蜜和成膏每服半錢為丸生一皂子大月中兒粳米大同牛黃膏溫薄荷水化一處服之五歲以上同甘露散服信效方云小兒諸方書皆行於汝仁錢氏其間大青膏減天麻添大青生研一分其於藥味分料和制與此皆同載證治云治小兒傷風其候伸欠頓悶口中氣熱惡風脈浮只用薄荷湯下百解散治小兒傷風瘡疹之類貝母炒黃麥門冬去心川升麻各一兩赤芍藥甘草炙各半兩上為細末每服一錢水八分盞入竹葉二片煎至五分去滓溫服棗葉湯治證同前棗葉一兩去細焙乾黃芩柴胡去苗人參去蘆頭甘草炙各一兩上為細末每服一錢水一小盞入生薑二片煎至五分溫服人參生犀散解小兒時氣寒壅咳嗽痰逆喘滿心怯驚悸臟腑或秘或瀉調胃進食又主一切風熱服尋常涼藥即瀉或減食者前胡去蘆八錢桔梗五錢人參切去須三錢甘草炙黃二錢杏仁去皮尖微曬乾為末秤五錢上先將前四味為末後入杏仁再用粗羅為末每服二大錢水一盞同煎至五分去滓溫食後服一方無甘草五味人參飲子治小兒天行壯熱咳嗽心腹脹滿人參甘草炙各半兩生地黃一兩半如無只用乾地黃半兩麥門冬一兩半上每服三錢水一盞入茅根半握煎至七分去滓溫服治小兒心經熱天行夜發壯熱夜啼並解傷寒諸症荊芥去枝梗桔梗苦者各二兩甘草一兩半牛蒡子二兩略焙上為末每服二錢溫點服食空時服蘆根散治小兒時氣嘔吐不止生蘆根人參去蘆頭各一兩竹茹半兩上細銼和勻每半服以水一小盞煎至五分去滓不計時候量兒大小加減溫服犀角散治小兒心經熱天行夜發壯熱夜啼並解傷寒諸病犀角屑甘草牛蒡子荊芥各等分上粗末每服一錢水八分煎至五分溫服臨臥食前服棗葉飲子治小兒傷寒天行五日以後熱不歇棗葉半握麻黃半兩蔥白切一合上豉一合內藥以童子小便二鍾煎至一鍾去滓分二服青木香散療小兒天行頭痛壯熱青木香六分白檀香三分上為細散以清水和服之以水調塗頂頭痛立瘥量兒大小以意加減治小兒時氣用桃葉三兩搗以水五升煮十沸取汁五六遍淋之若復發燒雄鼠屎二枚水調服之聖惠方用桃葉七兩水五升升麻葛根湯治大人小兒時氣瘟疫頭痛發熱肢體煩疼及瘡疹已發未發疑二之間並宜服之今人謂此藥寒冷多不肯服今釋其疑說並方詳見傷寒內小兒量大小加減服之一名解肌湯一方有桔梗羌活生薑煎服可加四君子湯料同等分煎一方加半夏前胡治時氣咳嗽者天時冷熱不調而虛得之日夜或吐不止或喘痰熱壅盛至重者利之大黃朴硝枳實陳皮人參半夏柴胡各等分以有胸膈煩悶不快宜服無熱與痰亦不可下惺惺散治小兒傷寒瘟病時疫瘡疹頭痛壯熱多睡潮熱煩渴痰實咳嗽方見加減惺惺散瘟病附論夫小兒瘟病者是冬時嚴寒人有觸冒之寒氣內入肌肉當時不即發至春得暖氣而發則頭痛壯熱謂之瘟病又冬時應寒而反暖時氣傷人即發亦使人頭痛壯熱謂之冬瘟病凡邪之傷人皆由觸冒所以感之小兒不能觸冒其乳母抱持時解脫不避風邪冷熱之氣所以感病也小兒瘟病下利候瘟病下利者是腸胃宿虛而感於溫熱之病熱氣入於腸胃與水穀相搏陽虛則泄故下利也又小兒瘟病鼻衄候瘟病鼻衄者熱乘於氣而入血也肺候身之脾毛主於氣開竅於鼻瘟病則邪先客皮膚而搏於氣結聚成熱熱乘於血血得熱則流散發從鼻出者為衄也凡候熱病鼻欲衄其數發汗汗不出或初染病已來都不汗而鼻燥喘息鼻氣有聲如此者必衄也小兒衄止至一升數合熱因得歇若至一斗數升則死矣又小兒瘟病結胸候凡溫熱之病四五日之後熱入里內熱腹滿者宜下之若熱未入里而下之早者裡虛氣逆熱結胸上則胸脹滿短氣謂之結胸也方萎蕤湯治風瘟冬瘟及春月中風傷寒發熱頭痛咽乾舌強胸腹滿腰脊強葛根半兩萎蕤三分石膏一兩白薇羌活麻黃川芎杏仁炮去皮尖甘草炙各半兩青木香一分初春用半兩寒熱加芒硝大黃上㕮咀每服三錢水一盞煎至八分日三服柴胡石膏散治時行瘟病壯熱惡風頭痛體疼鼻塞咽乾心胸煩滿寒熱往來痰實咳嗽涕唾稠黏柴胡去苗石膏前胡去苗乾葛銼赤芍藥各五十兩升麻二十五兩黃芩桑白皮銼各十兩上為粗末每服二錢水一盞入生薑三片豉十餘粒同煎七分去滓稍熱服小兒分作三服更量大小加減不計時候甘桂湯治春間疫氣欲作為先氣壅畏風痰嗽頭昏鼻塞困悶是其疾也當先以甘桂湯理之凡春氣動先以此湯驅之大人小兒皆可服甘草炙官桂去皮五味子黃芩各一兩柴胡四兩上㕮咀每服三兩水一盞姜五片煎七分去滓溫服次以滓再合煎一服昔政和二年春澧陽疫疾大作服此藥皆免防風散解時疫瘟病嗽喘煩渴頭痛體疼目澀多睡肌肉蠕動痰逆忪悸防風川芎甘草炙香白芷各二兩菊花一兩上為細末每服一錢煎荊芥湯調放溫服除瘟散治三十六種夜熱晝涼瘟病候大黃朴硝研各一分牽牛粉半兩檳榔二個上為末每服半錢煎黃芩湯調下臨臥時服香蘇散治四時瘟疫傷寒香附子炒去根紫蘇葉各四兩青橘皮二兩甘草一兩炙上為粗末每服三錢水一盞煎七分去滓熱服不拘時日三服解肌加葛根煎若作細末只服二錢入鹽點服黑膏子治小兒初春病入肌肉發斑癮疹如錦紋咳嗽心煩紅綿散治傷寒及咳嗽歌曰頭疼壯熱口難傳懶倦終朝只愛眠面赤更加小便赤良方有劑裹紅綿麻黃半兩去節天麻蠍甘草炙人參白朮各半兩上為末每服半錢水六分入蔥白一寸紅綿裹煎四分服治小兒大人傷寒一二日頭疼發熱憎寒體痛麻黃湯浸焙乾石膏各一兩蒼朮水浸去皮桔梗山茵