body:
  text: 卷四百嬰孩雜病門雜病附論夫小兒百病者由將養乖節或犯寒溫乳哺失時乍傷飢飽致令血氣不理腸胃不調或欲發驚癇或欲成伏熱小兒氣血脆弱病易動變證候百端若見甚微證即便治之使不成眾病故謂之百病也治之若晚其病則成凡諸病至於困者汗出如珠著身不流者死也病如胸陷者其口唇乾目反張口中氣出冷足與頭相抵臥不舉手足四肢垂其臥正直如縛狀其掌中冷至十日必死不可治也方虎睛丸出聖惠方治小兒百病療寒熱鬼氣症癖羸瘦諸痢驚癇腹脹喘促痰結胸中滿悶虎睛一對微炒牛黃一分細研真珠末一分犀角屑半兩巴豆霜半分杏仁一分湯浸去皮尖雙仁麩炒微黃吳藍半兩赤芍藥半兩牽牛子半兩微炒桔梗一分去蘆頭漢防己一分牡蠣半兩燒為粉鱉甲半兩塗酥炙令黃去裙襴上搗羅為末都研勻煉蜜和搗三五百杵丸如綠豆大每服以溫水下二丸量兒大小加減服之龍膽散出聖惠方治小兒百病療骨蒸客忤驚癇壯熱不解龍膽一分去蘆頭鉤藤二分柴胡一分去苗黃芩一分桔梗一分去蘆頭赤芍藥一分茯神一分甘草一分炙蜣螂二枚去翅足微炒炙微赤銼蟲入川大黃一兩銼碎微炒人參一分去蘆頭當歸一分炒微黃上搗粗羅為散每服一錢以水一小盞煎至五分去滓分為二服日三四服量兒大小以意加減牛黃丸出聖惠方治小兒百病驚癇魍魎三十六種無辜癧子疳濕閃癖天行急黃赤眼等悉主之牛黃麝香各半兩細研光明沙一兩細研水飛過真珠末一分甘遂一分煨令微黃虎睛二枚細研赤芍藥赤茯苓一分巴豆霜一分杏仁一兩湯浸去皮尖雙仁麩炒微黃牡蠣一分燒為粉上搗羅為末都研令勻煉蜜和搗三五百杵蓐中兒如粟米大一二百日兒如黍米大一二歲如麻子仁大三四歲如麻子大五歲以上如綠豆大每服平旦以粥飲下二丸至午食時不吐利便更服一丸仍與少許湯飲投下當下諸惡物效牛黃丸出聖惠方治小兒百病及一切難治之疾牛黃一分細研大戟一分硃砂麝香各一分細研當歸半兩微炒枳殼一分麩炒微黃去瓤鱉甲半兩塗酥炙令黃去裙襴巴豆霜半分川大黃半兩銼碎微炒黃上搗羅為末都研令勻煉蜜和搗三二百杵丸如黃米大每服以粥飲下三丸量兒大小加減服之銀白散出醫方集成治小兒百病升麻知母甘草白扁豆山藥人參茯苓去皮白朮各等分上為細末每服一錢慢驚搐搦麝香少許飯飲調下急驚定後陳米飲調下驚吐不止丁香湯下天柱倒腳軟濃米飲調下夾驚傷寒薄荷蔥白湯調下疳氣吐脹氣急多渴百合湯下渾身壯熱面赤驚叫金銀薄荷湯調下赤白痢不思乳食姜三片棗三枚煎湯下吃食不知飢飽不長肌肉炒麥芽一撮生薑煎湯調下暴瀉紫蘇木瓜湯飲下神形脫言語不正及大人吐瀉藿香湯下諸病後無精神少氣力不思食煎生薑棗湯下稟受氣怯可每日一服最妙常服沸湯點不拘時一方無知母大效雙丸出聖惠方治小兒百病身熱頭痛飲食不消心腹脹滿或心腹㽲痛大小便不利或重下數起或別無異疾唯飲食過度不知自止哺乳食積或驚寒熱或蒸候哺食減少氣息不快夜啼不眠是腹內不調悉宜服甘遂半兩煨微黃巴豆霜半分麥門冬半兩去心焙牡蠣一分燒為粉蕤仁一分湯浸去皮研入真珠末一分上搗羅為末入研了藥都研令勻煉蜜和半歲兒以溫水服一雙如荏子大一歲服一雙如半麻子大二歲三歲服一雙如麻子大常服不拘時雞鳴時服至日出當下如過下者以熱粥飲投之即止加減四君子湯出活幼口議理小兒諸疾和胃調心怡神養氣人參去蘆白茯苓去皮白朮各一兩甘草半兩炙上為末每服一錢鹽湯點服或㕮咀薑棗尤佳常服調氣加山藥和氣加生薑心神不定加辰砂棗子心忪心煩心神不寧加茯神驚啼手足瘛瘲睡臥不安加全蠍鉤藤白附子脾虛胃弱生風多困加半夏曲沒石子冬瓜仁傷風身熱頭痛氣促加川芎防風八分細辛川羌活減半發渴加乾葛木瓜枇杷葉去毛煩渴加黃耆胃冷嘔吐涎沫加丁香嘔逆加藿香葉脾胃不和加白朮薑棗脾困加人參木香縮砂仁脾弱腹脹不思飲食加扁豆粟米傷食加炒神麯胸滿喘急加白豆蔻涎嗽加杏仁桑白皮半夏曲風壅邪熱加生薑荊芥咳嗽紫蘇湯調胃怯汗出炒大麥煎湯調飲食不進加薑棗經絡蘊熱頭面及身體生瘡加栝蔞桔梗傷寒時氣風熱痰壅咳嗽及氣不和加細辛栝蔞根桔梗生薑薄荷煎加防風川芎尤良有寒及遇天寒發熱去栝蔞根桔梗瘡疹已出未出大便閉澀發渴加栝蔞根桔梗若不渴膽寒下痢加乾薑勞熱往來加川芎盜汗加陳浮麥虛汗多夜啼喘加犀角麥門冬小便赤澀加麥門冬大便閉去白朮加陳皮溫中和氣止吐瀉思飲食渴加陳皮薑棗若要生胃氣即加白扁豆陳皮薑棗煎吐瀉腹痛煩渴加黃耆白扁豆藿香乾葛薑棗吐逆四肢厥逆腦門低陷加藿香丁香吐痢過多脾胃虛乏欲生風候加白附子生薑泄瀉加陳皮製厚朴並薑棗作痢加炒罌粟赤痢加赤芍藥當歸粟米白痢加炮薑粟米臟腑滑泄加煨訶子肉一方名四聖湯治二十一證云治久吐胃寒加石蓮子木香黃耆名生胃散治嘔逆吐噦不止加白扁豆薏苡仁並炒藿香名銀白散治胸膈煩悶冷熱不調痰涎咳嗽不美飲食日夜壯熱加知母貝母烏梅乾薑名寬中散治肚腹疼痛加陳皮青皮棗子生薑名溫中散治夜啼煩躁肚腹疼痛加沉香硃砂名鎮心嘔邪散治表裡虛弱時氣作熱欲傳疹候加細辛栝蔞名惺惺散治脾寒胃熱陰陽不順冷熱常作加滑石地骨皮名六神散治霍亂吐利神不安穩加藿香丁香名藿香散治脾胃虛弱飲食不進加製厚朴陳皮等分名平胃散治吐食不納穀氣加丁香半夏曲名益神散治脾胃久虛不納飲食頻吐或瀉不止加肉豆蔻青皮天台烏藥名理中散治熱瀉水穀不分加瞿麥車前子名導赤散治虛熱煩躁定神安志加犀角川芎名安神散治心氣不足神情恍惚加石菖蒲石蓮子肉石膏名補心散治體熱夜啼煩躁加白附子全蠍膩粉名清神散治脾虛肌瘦神困面無顏色食不克化腸胃久寒吐逆無時加黑附子枳殼吳茱萸艾葉細辛名溫脾散治霍亂吐瀉嘔逆無時腸鳴自利腹肚疼痛加川白姜名人參散治傷寒身熱頭痛煩渴加麻黃乾葛天麻硃砂名解肌散治心神不寧驚悸煩燥瘛瘲加硃砂羌活防風天麻名鎮心散治脾胃虛弱腹肚泄痢調中進食加訶子陳皮名益黃散治虛積痢腹肚痛裡急頻並加陳皮罌粟殼名調中散治小兒百病及一切難治之疾出聖惠方夜明砂半兩細研甘草一分炙微赤銼芫花一分醋拌炒令乾巴豆十枚去皮心研紙裹壓去油上為末都研令勻煉蜜和丸如麻子大每服以溫水下二丸量兒大小加減加減四味飲子出聖惠方治小兒百病當歸孩子體骨多熱多驚則倍用之川大黃先蒸二炊飯久薄切焙乾或兒小便多熱倍用赤芍藥細銼炒兒四肢多熱多驚大便多瀉青黃色宜倍用甘草兒熱即生用兒寒多泄多即炙倍用上等分各細銼和勻每服一分以水一盞煎至五分去滓溫服半合日三四服量兒大小以意加減醒睡散出危氏方治小兒諸病後多睡白殭蠶二錢威靈仙三錢大戟一錢上為末每服半錢臘茶清調二服便醒畫眉膏出危氏方治斷乳梔子三枚燒灰存性雄黃硃砂各少許上為末入清油少許輕粉少許調勻候兒睡著濃抹於兩眉醒來自不吃乳未效再用即驗治小兒不能乳出千金方用雀糞四枚為末著乳頭飲兒兒大十枚治小兒食不知飢飽出千金方用鼠屎二七枚燒為末服之失笑散出全嬰方治小兒諸病並汗後不得睡莨菪子草烏頭醋炙切片麩炒酸棗仁炒去皮各等分上為末每服半錢水醋各半盞煎至三分服兩服便睡治小兒祟病百邪鬼魅癰腫及熱結腫殺疳蟲鼠瘻惡瘡以端午日取蝦蟆不拘多少取眉脂以硃砂麝香為丸如麻子大小孩子疳瘦者空心一丸如腦疳以奶調滴鼻中青金丹治小兒諸病青黛羅過滿挑二錢滑石末天南星丁香羅過各二錢水銀二錢先以錫二錢於銚子內煮熔便放水銀拌和瀉出放冷用輕粉二錢川巴豆去皮心膜七十二片無鐵損者井花水浸一宿懸當風處吹乾爛研上同拌合用軟飯為丸如梧桐子大巴豆不去油依形證用湯使傷寒後取積淡煎蔥湯吞下取疳蟲用牛肉汁下驚風肚中緊硬面青黑金銀薄荷蔥湯吞下因傷食肚中及腹皮上微熱肚脹夜間作熱似疳又不是疳面青黃色眼微黃此腹中有積用皂角子二七粒煨過用水一盞煎至半盞下有積作瀉魚鮓湯下氣積炒茴香湯下周歲十四丸三歲十八丸七歲二十四丸看大小加減仍須四更初下此藥天明通下積盡可依形證候下藥補之臨吃此藥恐先吐少涎亦不妨人參羌活散出德生堂治小兒感冒諸疾麻黃去節五錢冬用七錢半人參半兩川芎半兩前胡二錢半獨活半錢羌活半兩上㕮咀每服下水半盞生薑一葉薄荷一葉煎至三分去滓服三歲之下一歲之上一服木香散出德生堂能和表裡通行津液官桂木香大腹子前胡甘草陳皮丁香人參訶子肉半夏砂仁赤茯苓以上各三錢上㕮咀每服三錢水一盞姜一片煎六分去滓稍熱服乳前千歲丹傅氏活嬰方治飲交奶而致疾者伏翼大者三五十個去肚內糞糟鹽酒炙令赤色去骨蕪荑炒二錢上為末用醬及豆豉姜搗為丸如菜子大茶酒任下又宜用伏翼酒洗浴藥出傅氏活嬰方治氣浮身腫退浮消腫憑洗浴腫退風消便散浮凌霄花根並大蓼蠶砂馬蓼香茹投白茅質汗宜多用蟬蛻五加皮可收皂角紫蘇俱碎銼忍冬藤向籬邊求苦參白芷隨多少清水濃煎入艾頭天晴日暖頻頻浴兒身腫退可無憂交泰丸出衛生家寶方治小兒因驚飲食失節致陰陽不和臟腑生病中滿氣急噎塞不通飲食下咽即成嘔吐服之立效驗水銀生硫黃各等分上同研不見水銀為度蒸肉為丸如粟米大每服一歲兒七丸溫米湯飲下黃耆白朮散出十便良方治諸虛不足面色萎黃臍腹痛脹不思乳食骨肉消瘦喘促氣粗四肢倦怠五心煩熱口燥咽乾頰赤心忪日晚潮熱發竭有時或冒風寒悉皆治之黃耆官桂甘草白芍藥人參茯苓白朮神麯各一兩上為粗末每服一大錢以水一大盞入生薑二片棗一個煎至七分去滓溫服食前銀白散出百一選方治小兒諸疾慢驚搐搦麝香飲調下日進六服急驚定後陳米飲調下驚吐不止陳米飲調下天柱倒腳軟濃米飲調下夾驚傷寒發搐薄荷蔥白湯調下疳氣脹急多渴百合湯調下發熱面赤渾身壯熱忽然驚叫金銀薄荷湯下赤白痢不思乳食生薑三片棗五個陳米一合煎飲調下吃食不知飢飽不長肌肉麥冬黃蘗一撮同炒薑湯調下暴瀉紫蘇木瓜湯調下形神脫改語言不正及大人吐瀉藿香湯調下二錢海上名方甚妙白朮細銼以綠豆一合炒香去豆黃耆微炒勿令焦人參乾山藥白扁豆微炒黃香勿令焦各一兩白茯苓兩半白附子文武火炒微黃地上去火毒天麻生如雞子大麩炒黃各半兩白殭蠶洗去灰微炒勿焦木香濕紙裹煨川升麻水浸過生用甘草銼炙勿令焦各一兩真糯炒黃藿香去土生用半兩上為細末患依湯使服常服米飲調下小兒半錢或一錢婦人產後亦可服麻黃柴胡升麻湯出東垣蘭室秘藏方治小兒寒鬱而喘喉鳴腹中鳴腹滿鼻流清涕脈沉急而數麻黃一錢半草豆蔻一分半升麻半分益知仁一分半厚朴二分甘草一分當歸稍一分曲末半分吳茱萸二分柴胡稍一分蘇木半錢紅花少許生黃芩一分全蠍二個上件銼如麻豆大分作二服每服水一盞煎至七分去滓稍熱服食後忌風寒微有汗則效補陽湯出東垣蘭室秘藏方時初冬一小兒二歲大寒證明堂青脈額上青黑腦後青絡高起舌上白滑喉鳴而喘大便微青耳尖冷目中常常淚下仍多眵胸中不利臥而多驚無搐則寒柴胡三分升麻二分麻黃三分吳茱萸半分地龍半分蠍稍炒生地黃半錢當歸身三分炙甘草一分黃耆二分黃柏一分橘皮一分葛根一分連翹一分上㕮咀都作一服水一大盞半煎法如常乳食後熱服服藥之後添喜笑精神出氣和順乳食旺消痞丸出東垣蘭室秘藏方快利黃連半兩枳實二分黃芩二錢甘草三分人參四錢厚朴七分薑黃五分乾生薑四分橘皮一分上為細末湯浸𩚫餅為丸如粟米大每服三十丸隨乳下塌氣丸出衛生寶鑑治中滿下虛單腹滿虛損者陳皮去白蘿蔔子炒各半兩胡椒木香青皮去白草豆蔻去皮各三錢蠍稍去毒二錢半上為細末水糊為丸如梧桐子大米飲下三十丸食後日三服輕者百日重者一年小兒麻子大桑白皮湯送下十丸日三服大人桐子大四十丸如陰囊紅腫冰冷次用滄鹽乾薑白麵各三錢水和膏子攤紙上塗於陰囊上二聖丸出鮑氏方小兒病中足冷為虛寒腹脹足冷肚中氣鳴足冷水瀉足冷糞青足冷頭熱足冷脈沉微足冷陳方以為腫病用石亭脂一兩大附子半兩炮上為末飯丸米大一周十丸乳汁下空心或急風足冷者不用牽牛散出全嬰方治小兒膀胱實熱腹脹小便赤澀水氣流腫又主治結胸傷寒心腹硬痛又兼治疳氣攻腎耳聾上以牽牛生為末三歲一錢青橘皮湯調下食前結胸傷寒白湯調下耳聾陰腫並用豬腰子半個薄批糝藥一大錢重重令遍外以少許鹽搽之濕紙裹煨熱空心吃此藥又治遍身風疹薄荷湯調下大便利立效白糊丸小豆大三十丸茴香湯下治陰疝常服消核腫治小兒核食吐方出本草用合明草搗絞汁服療小兒鬼舐方出本草以狐屎燒灰和臘月豬脂塗療小兒痔下部癢悶方枳殼二兩鬼箭羽青木香鬼臼各二兩上為末以釅醋和藥青布裹熨之如瘡頭破令拔去根立瘥療小兒臟腑寒肚疼作啼其證必下青白黑糞為驗宜服此方先以蔥湯洗次用熟艾紙上烘熱以帕子裹熨臍腹間頻易之痛止服藥大妙如病久體虛天柱骨倒宜白殭蠶末三歲用半錢薄荷湯服治小兒吃土用鴝鴿肉炙食之不過一枚瘥楊氏產乳出本草凡子不得與桑椹子食令兒小寒魃病附論夫魃病是陰制小兒所有此魃病者由婦人懷娠之時有惡神導其腹中胎妒嫉而制伏他小兒令病也其妊婦不必悉招魃魅人時人有此耳兒魃之為疾喜微微下痢往來寒熱毛髮鬇鬡不悅是其證也方龍膽湯出直指方治魃病龍膽草微炒鉤藤皮柴胡桔梗芍藥川芎茯苓甘草炙各二錢大黃半錢半炙濕紙裹煨人參一錢上銼散每服二錢井水煎服仍以紅紗袋夜明砂與兒帶甘草散出聖惠方治小兒中魃面色白赤而復變青者如醉色故復發作面赤若青黑色繞口不治覺病候晚者死覺之早者所中邪色氣未入臟腑又微引乳者可服如經有熱小便赤澀夜啼甘草一分炙微赤銼龍骨一分赤茯苓一分牡蠣一分燒為粉生乾地黃一分黃耆一分當歸半兩銼微炒桂心一分上為粗散每服一錢以水一小盞入淡竹葉七片煎至五分去滓入白蜜一錢更煎一兩沸量兒大小以意分減溫服一方加麥門冬三五粒同煎大黃散出聖惠方治小兒中魃挾實川大黃半兩銼碎微炒赤芍藥一分白蘚皮半兩甘草半兩炙微赤銼黃芩一分犀角屑一分赤茯苓一分上為粗散每服一錢以水一小盞煎至五分去滓量兒大小加減日三四服虎骨丹出醫方妙選治被魃病虎頭骨炙鬼臼草龍膽鬼箭各一兩琥珀白膠香各半兩上為細末煉蜜和丸如黍米大每服十粒乳香湯下量兒大小加減服之魃奶散出全嬰方治小兒飲母魃奶黃瘦豆蔻母丁香宣連胡黃連各等分上為末三歲半錢空心米湯調下出客氣方治小兒繼病服藥不效者繼病母有娠乳兒有病有瘧痢他日亦相繼腹大或瘥或發他人相近亦能相繼北人未識此病取伯勞毛與妊娠婦帶之立瘥一方令兒帶之又方用絳紗袋盛夜明砂令兒帶勿令乳母及外人知之伏翼散出聖惠方治小兒生十餘月後母又有娠令兒精神不爽身體委瘁名為魃病上取伏翼去毛爪腸燒為灰細研以粥飲調下半錢日四五服效若炙令香熟嚼之哺兒亦效又方出聖惠方用冬瓜四兩切篇竹四兩銼以水三升煎作湯放溫以洗浴兒效又方出聖惠方用龍膽半兩去蘆頭以水一盞煎至六分去滓量兒大小漸漸分減服之龍膽湯出危氏方治孕婦被祟惡導其腹中令兒病其證下痢寒熱去來毛髮鬇鬡不悅懌及治婦人有兒未能行時復有孕使兒飲此乳亦作此病方見雜病類龍膽散治小兒魃病出本草取白馬眼母帶之白虎病附論夫小兒白虎候者按堪輿歷遊年圖有白虎神云太歲在卯即白虎在寅准此推之知其神所在小兒有居處觸犯此神者便能為病其狀一身微熱有時啼喚有時身小冷屈指如數似風癇但手足不瘛瘲耳乃名白虎候又有小兒妊娠時其母被惡神導其腹中胎不肯長及至生下小兒往往多羸弱寒熱去來毛髮鬇鬡不悅或謂疳非也乃名被魃候方張渙順正集香散出醫方妙選治小兒白虎病降真香沉香檀香銼乳香研安息香人參去蘆頭各一兩茯神酸棗仁各半兩上為細末每服一錢水八分一盞入麝香少許煎至五分去滓溫服留藥滓臥內燒之香蠍丸出全嬰方治小兒白虎癧癤諸風疼痛遊走無定狀如蟲齧晝靜夜作及一切手足不時作疼巢氏云按堪輿歷遊年圖有白虎神太歲在卯即白虎神在寅也若准此推之知其神所在小兒有居處觸犯此神者便能為病聖惠云白虎風者是風寒濕之毒因虛所起將攝失理受此風邪經絡停滯百氣不行蓄於骨節之間或在四肢肉色不正其疾晝靜而夜作即徹骨髓痠疼其病如虎之齧故名曰白虎風也其狀身微熱有時啼叫有時小冷屈指如數似風癇但手足不瘛瘲此藥能治之甚驗川烏頭大八角者二個生用全蠍二十一個生用黑豆二十一粒生用地龍去土半兩生用上為末麝香半字研拌糯米糊丸如麻子大三歲十丸酒送下臨臥服微有汗即瘥治白虎病出本草鬼臼苗在糞堆中亦云是糞神今時人往往掃糞堆近宅處令人感而病此療之法取雞子揩病處咒愿送著糞堆頭勿反顧不過三度瘥白虎是糞神變吃雞子治白虎病關東人呼為歷骨風出本草置白獅子於病者前自愈此壓伏之義也屍注附論夫小兒屍注者是三尸之中一屍注也人無問小大腹內皆有屍蟲屍蟲為性惡多接引外邪而共為患小兒血氣衰弱者精神亦羸故屍注因兒為病其狀沉沉默默不的知病之處或寒或熱涉引歲月遂至於死死又注易傍人故名之為屍注也人有三尸能為人患無問老幼但精神衰弱血氣不足者率多被害小兒血氣未具精神未全因有屍注之病其狀沉沉默默不的知病之所苦或寒或熱彌引歲月遂至於死死後注易傍人故名屍注方金露丸出醫方集成治小兒癆瘵屍蟲作痛面目羸瘦五心煩熱如其他食積冷氣痛又非其的治臨證審之又有心痛欲絕一時無藥可療急用艾灸大拇指中男左女右人參去蘆官桂去皮川椒去合口者白茯苓川烏炮菖蒲大黃吳茱萸各半兩附子一個炮桔梗去蘆紫花木炒各三分乾薑炮柴胡去蘆各一分厚朴去皮薑製二分豬牙皂角二分上為末別研葶藶子半兩巴豆三分去油膜續隨子半兩同煎藥一處麵糊丸如麻子大以意加減空心下桃仁散出聖惠方治小兒屍注鬼癖心腹往來疼痛或加寒熱恍惚形色多般桃仁二七枚湯浸去皮尖雙仁麩炒木香人參桂去粗皮虎頭骨酥炙檳榔銼京三稜煨銼芥子炒各一分麝香研一分款冬花丹砂研水飛干桃柳葉各半兩上為散每服半錢以溫水調下更量兒大小加減保童丸出聖惠方治小兒屍注魃擊驚癇魍魎三十六種無辜天行急黃牛黃研麝香甘草炙銼真珠末各一分赤芍藥丹砂水飛一作光明砂杏仁湯浸去皮尖雙仁麩炒各半兩甘遂炮半兩巴豆五枚去皮心膜研紙裹壓去油盡虎睛酒浸一雙赤茯苓去黑皮用半兩上為末和勻煉蜜丸如麻子大三四歲每服二丸荊芥湯下更量兒大小加減犀角散出聖惠方治小兒屍注及中惡諸病犀角鎊升麻木香檳榔銼各半兩麝香細研一錢桑根白皮銼大黃銼炒各半兩桃仁湯浸去皮尖雙仁炒二七枚上為散每服半錢以溫水調下日四五服量兒大小加減服雄黃丸出聖惠方治小兒屍注病諸蟲魅精氣入腹刺痛黃瘦雄黃研如粉雌黃研如粉各一兩丹砂研如粉半兩白頭翁去苗三分麝香研半錢徐長卿二分羚羊角鎊炒大黃坐炒各一兩一分上為末以青羊脂煉過和丸如麻子大一二歲兒每服三丸熱水下空心午後服各一更量兒大小加減雌黃丹出醫方妙選治小兒屍注雌黃研雄黃研大黃炮鬼臼去毛各一兩白頭翁半兩桃仁三十個浸去皮炒巴豆去皮心膜去油十粒麝香研一分上研勻羊脂五兩熔和諸藥成膏如黍米大每服三粒至五粒荊芥湯冷下量兒大小加減立效散出醫方妙選治小兒屍注川大黃炮干桃柳葉各一兩梔子赤芍藥硃砂水飛各一兩麝香研雄黃研各五分上為末拌勻每服一錢用蜜湯調下大小加減木香散出聖惠方治小兒屍注心腹滿脹疼痛不可忍木香鬼箭羽當歸銼炒桔梗炒檳榔銼各半兩紫蘇莖葉半兩上粗搗篩每服一錢匕水七分生薑二片煎至四分去滓不拘時溫服量兒大小加減溫服生犀湯生犀鎊取末二錢地骨皮赤芍藥柴胡乾葛銼各一兩甘草半兩炒上為末每服一二錢水煎服太一神精丸治小兒客忤霍亂腹痛脹滿若屍注惡風癲狂鬼祟蠱毒妖魅瘟瘧無所不治丹砂曾青雄黃各等分研雌黃研各四兩金牙研二兩半磁石煅醋淬三次搗研四兩上為末先將丹砂等五味用酸醋漬之唯曾青用好酒銅器中漬以紙蜜封頭日中曝乾經夏急待用亦須五日無日以火暖之其丹砂等五味日數亦然各研如粉以釅醋拌令乾濕得所內土釜中以六一泥固濟令密候泥干然後安鐵環施腳一尺五寸置釜於環上初取熟炭火兩枝各長四寸置於釜下待三分消盡二分更如熟火兩枝如此三度然後用生炭燒增之漸多乃至一復時火近釜底即使滿其釜下炭經兩度即罷待火盡極冷然後出之其藥精飛化凝著釜上光明皎潔如雪者最佳若飛上不盡更合舉火如前以雄雞翼掃取多少不定和以棗肉丸如黍米平旦空腹服一丸又常以絳囊帶之男左女右小兒系頭上闢瘴毒惡氣射工小兒患可以苦酒和之塗方寸紙帖兒心腹上亦有已死者冬二日夏一日與藥得下便活若服藥悶亂可煮防風湯飲之則定兼治大風惡癩偏風風癲歷節鬼擊痎瘧小兒驚忤不能乳哺癰疽痔瘻腹內積冷婦人產死未經宿狂狗所齧丁腫蟯蟲寸白惡腫邪鬼精妖並去一切惡疾鬼臼丸出聖惠方治小兒屍注勞瘦或時寒熱鬼臼去毛半兩升麻三分麝香細研柴胡去苗一兩上搗羅三味為末入麝香研勻煉蜜和丸如綠豆大每服十丸暖酒下日三服量兒大小加減立效散出聖惠方治小兒屍注邪氣入腹㽲痛雄黃細研一分赤芍藥半兩梔子仁十枚上搗羅二味為末入雄黃研勻每服半錢匕溫水調下更量兒大小加減灶煤散出千金方治小兒屍注灶突中煤三指撮鹽少許上為散一二歲兒每服半錢以熟水調下空心午後各一服量兒大小加減一方相和熬熨之桃仁湯出聖惠方治小兒屍注勞瘦或時寒熱用桃仁一味二十枚湯浸去皮尖雙仁生研以水一盞煎至五分去滓量兒大小分減與服以吐為效如不吐即非注也鱉頭散出聖惠方治小兒屍注用鱉頭一枚燒灰以研為散每服半錢以新汲水調下治小兒諸疾治小兒屍注勞瘦或時寒熱出聖惠方用雞子一枚打破生吞之已困者內入喉中搖頭令下即瘥中蠱附論夫人有聚毒蟲為蠱者隨飲食入腹能變惑食人五臟小兒時有中之者遂心腹刺痛懊悶急者即死緩者涉歷年月漸至羸困若注易傍人則為蠱注之病方雄麝散出醫方妙選專治蠱毒雄黃研麝香研羚羊角屑赤芍藥敗豉皮炙令黃各一兩馬兜鈴根薺苨鬼臼去毛各半兩上為細末拌勻每服半錢煎甘草湯調下食前服羖羊角湯出聖惠方治小兒中蠱毒腹內堅如石面目青黃小便淋瀝變易無常羖羊角屑蘘荷各一兩梔子仁七枚黃連去須赤芍藥各一分犀角屑半兩牡丹皮各一分上粗搗篩每服二錢取水一小盞煎至六分去滓分溫二服日三更量兒大小加減麝犀湯出醫方妙選專治蠱毒犀角屑鬼箭安息香各一兩苦參牡丹皮各半兩雄黃研一兩麝香研半兩上㕮咀和勻每服一錢水一大盞煎至五分去滓時時服之升麻湯出聖惠方治小兒初中蠱毒升麻桔梗銼炒栝蔞根各半兩上粗搗篩每服一錢以水半盞煎至三分去滓溫服日三更量兒大小加減豉皮湯出聖惠方治小兒蠱毒腹內堅痛敗鼓皮三分炙令黃銼苦參銼蘘荷根各一兩上粗搗篩每服二錢匕以水一盞煎至六分去滓分溫二服日三更量兒大小加減雄黃散出聖惠方治小兒飛蠱狀如鬼氣雄黃研麝香研犀角鎊搗為細末各半兩上同研令勻每服以溫水調下半錢匕日四服更量兒大小加減比聖湯出聖惠方治小兒五種蠱毒用馬兜鈴根一味粗搗篩每服二錢以水一小盞煎至五分去滓空腹頓服當時隨吐蠱出未快吐再服又方出聖惠方用敗鼓皮一片燒灰細研如粉空心粥飲調服一錢匕須臾病兒呼蠱主姓其病即愈又方出聖惠方用薺苨一兩搗羅為末以粥飲調服一錢匕量兒大小加減神效散出肘後方治小兒中蠱毒腹內堅痛面目青黃羸瘦骨立病變無常及淋露用桃上寄生二兩搗羅為散每服半錢每以茶點服日三又方出聖惠方用麝香一味細研每服一字須空腹溫水調下即吐出蠱毒未效再服治小兒中蠱毒欲死出聖惠方用甘草半兩生銼粗搗篩水一中盞煎至五分去滓分溫二服當吐蠱出若預防蠱者宜熱炙甘草煮汁服之即內消不吐神效治小兒中蠱下血欲死出聖惠方搗青藍汁頻頻服半合又方出聖惠方取生赤雌雞翅下血服之立效治小兒患蠱毒痢出本草用生地黃汁一升二合二三四服立效中惡附論夫小兒無故卒然心腹刺痛悶亂欲絕者中惡也蓋由兒陰陽氣血不調神守不強故鬼毒惡氣得以中之凡腹大而滿脈緊大而浮者死緊細而微者生若余勢久留再發則變為注夫小兒中惡者是鬼邪之氣卒中於人也無問大小若陰陽順理榮衛調平神氣相守則強邪不能幹正若精氣衰弱則鬼神毒惡氣中之其狀先無他病卒然心腹刺痛悶亂欲死是也方鬼箭羽湯出聖惠方治小兒中惡心腹卒痛鬼箭羽半兩朴硝細研真珠末一分羚羊角鎊桔梗炒升麻各一兩黃芩去黑心大黃銼炒鬼臼各一兩半芍藥一兩桃仁三十枚去雙仁皮尖麩炒微黃柴胡去苗一兩上粗搗篩每一錢匕以水一小盞煎至六分去滓分溫三服空心午後各一服量兒大小以意加減一方無鬼臼芍藥湯出聖惠方治小兒中惡心腹堅脹痛顏色青黑大便不通芍藥桔梗炒黃芩去黑心柴胡去苗升麻各一兩大黃銼炒二兩桃仁七枚去皮尖雙仁炒一方作五枚鬼臼炙一兩甘草炙一兩麝香半錢研杏仁四十枚浸去皮尖雙仁炒上粗搗篩入麝香和勻每一錢匕以水一小盞煎至六分去滓分溫二服空心午後一服以利為度量兒大小加減辟邪膏出醫方集成治中惡暴卒亦宜服此藥立至蘇蘇中毒心腹刺痛悶亂欲死凡腹大而滿診其脈緊細而微者生緊而大浮者則死急服蘇合香丸再以皂角末觸鼻次服沉香降氣湯加人參茯苓不愈進以辟邪膏無不效者降真香白膠香沉香各半兩虎頭骨鬼臼去毛龍膽草人參茯苓各半兩上為末入雄黃半兩麝香一錢煉蜜丸如雞頭實大每服一粒煎乳香湯下又令兒帶及燒於臥室內尤妙無不見效亦治客忤一方無鬼臼有甘草雄黃丸出聖惠方治小兒中惡辟邪氣雄黃研真珠研各一兩麝香研半錢牛黃如棗大研巴豆四十枚去皮膜心研去油盡大棗十四枚蒸熟去皮核研膏上除棗外同研為末入棗膏和少許蜜塗臼中一千杵搗為膏丸如粟米大每服三丸薄荷湯下空心午後各一服量大小以意加減療小兒中惡等疾鹿角大豆各等分上為末相和勻乳汁塗奶上令兒飲之治小兒中惡暴死出經效良方用蔥白納下部糞門及鼻中活一方以菖蒲末著舌底一方吹兩鼻兩耳中效豬蹄散出聖惠方治小兒寒熱及惡氣中人取豬後腳懸蹄燒灰末以乳汁飲一撮立效治小兒沖惡熱毒煩悶用生銀水磨服之忌生血治小兒辟惡氣用虎頭骨煮湯浴小兒數數用之為佳治小兒寒熱惡氣中人以濕豉為丸如雞子大以摩腮上及手心六七遍又摩心臍上旋祝之了破豉凡看有細毛棄道中即瘥半夏丸出經驗良方治小兒腹暴滿欲死用半夏隨多少微火爆搗末酒和為丸如粟米大每服三五丸淡薑湯蜜湯服治小兒中猢猻噤出幼幼新書凡身微熱雙手捉拳按胸前口撮不開縮肩身體一似活猢猻此候因受胎六個月日母見人弄猢猻開口吸著其氣生來被風邪相擊致發此候若不速治即死上取貓兒糞燒煙燻之即解治小兒生下多被惡氣息衝著成疾方出鮑氏方急取麝香一顆冷水調搽之灌之辟惡方出本草以瑿令小兒帶之能辟惡瑿琥珀千年為瑿用與琥珀同瑿烏芍切
