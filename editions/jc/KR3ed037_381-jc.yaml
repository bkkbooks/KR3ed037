body:
  text: 卷三百八十一嬰孩諸疳門急疳附論夫小兒急疳者由乳食不調甘肥過度之所致也凡甘味入於脾而動於蟲因甘而傷於臟腑若上蝕齒齦則生瘡出血齒色紫黑下蝕腸胃則下痢無時肛門開張生瘡赤爛皮焦毛立乳食不消肌體羸瘦若不早療便至膏肓故曰急疳也聖濟云急疳謂疳熱急暴其狀唇口忽變青白齒齦腮頰疼痛赤黑朽爛膿血出宜針去惡血脈絡死肌此卷謂甘肥過度風熱內積五臟俱虛蟲因虛動上蝕口齒疳過齦頰罕活死於旬日俗謂之走馬疳也方雄黃丸治小兒急疳羸瘦下痢口內生瘡殺蟲雄黃細研蘆薈細研青黛細研硃砂研細龍膽去蘆黃蘗微炙銼黃礬燒令通赤當歸銼微炙白礬燒令汁盡細辛莨菪子水泊去浮者水煮芽出令黃甘草炙微赤銼以上各一分麝香一錢細研蚱蟬三七枚微炙去翅足干膽一枚塗酥炙黃上為末入研了藥令勻以麵糊和丸如綠豆大不拘時候以粥飲下五丸量兒大小以意加減三礬散治小兒急疳蝕口唇鼻黃礬青礬各半兩燒令枯白礬燒枯研麝香研石膽莨菪子微炙人糞燒灰莽草雄黃研白狗糞燒灰地龍各一分上搗研為細散每用半錢糝患處有涎吐之蝸牛灰散治小兒急疳瘡瘰藥醫未效蝸牛灰白狗糞灰蜣螂灰白礬灰人糞灰蘆薈蝦蟆灰蘭香乾灰蚺蛇膽蜘蛛灰地龍以上各一分上細研如粉葦管斜批吹少許入鼻中如齒齦上有瘡即和蜜塗於紙上貼之下部有瘡即內之黃耆散治腎疳腐根候黃耆蜜炙牛黃人參天麻全蠍炙杏仁炙茯苓川當歸熟地黃洗生地黃洗上等分為末每服小者半錢煎天門冬熟水調服麥門冬亦可白礬煮散治小兒牙齒急疳蟲齒狀及口面腫開口不得臭爛疼痛不可忍白礬燒灰防風去蘆細辛去苗葉附子生用乾薑炮白朮甘草炙半兩蛇床子微炙一分藜蘆去蘆頭川椒去核各一分上羅為細散每用一錢以無灰酒一盞煎十餘沸含冷吐出日三以瘥為度熊膽散出聖惠方治小兒急疳蟲傷臟腑上蝕口內齒齦作瘡赤爛世呼為走馬疳熊膽細研甜葶藶微炙蝦蟆灰人糞灰白礬灰麝香細研雄黃細研蘆薈細研硫黃細研以上各一分上為細散拌勻於有瘡處宜薄敷之如治鼻即取少許吹鼻中日三次以瘥為度一方無甜葶藶人糞灰用荊芥湯調下麝香膏一名九仙膏治小兒齒損爛及走馬急疳諸候麝香研一分豬牙皂莢三定燒存性白礬二兩綠礬一兩半同杵碎入銚內白礬互燒令枯研膩粉研水銀各半兩黃蘗去粗皮苦楝根白皮各一兩密陀僧一兩上研為細末用無灰酒三升熬成膏先淨漱口塗之如久患者取藥半匙並砒霜粉末少許杵拌勻使含有津吐之白楊皮湯治小兒急疳蝕唇口鼻白楊皮銼一撮地骨皮一兩蜀椒去閉口者並炒炒出汗三十粒杏仁湯浸去皮尖炒蒼耳子各一兩高良薑炙生乾地黃切焙細辛去苗葉各半兩上銼如麻每用五錢水二盞煎十餘沸去滓熱含冷吐以瘥為度蟾灰丸出聖惠方治小兒急疳口內生瘡腹大瘦弱蟾灰地龍炒蝸牛殼炙狗頭灰人糞灰蘭香根灰麝香各一兩上研為細散用漿水調在紙上時用貼瘡如鼻中有瘡紙裹安鼻中有疳入腹以水浸蒸餅丸如綠豆大不計時候以粥飲下五丸日三服量兒大小以意加減治小兒急疳蟲蝕唇口及齒齦爛疼痛出聖惠方砒霜人糞灰麝香膩粉以上各半分銅綠胡桐律蝦蟆以上各一分上研令細先用鹽醬水洗過後用藥少貼之龍骨散出錢氏方治疳口疳瘡走馬砒霜一字粉霜半錢龍骨一錢定粉龍腦各半字蟾酥一字上先研砒霜極細次入龍骨再研次入定粉等同入每用少許敷之護命散治小兒急疳唇齒臭爛宣腫乾蟾一枚五月五日取燒存性白龍骨搗研雄黃麝香石膽蘆薈研各一分上研為細散每用少許敷瘡上治小兒急疳口中腫起鼻內生瘡出聖惠方人乳汁一合黃礬一棗大青礬一棗大石膽一豇豆大川升麻半分上都細研以綿裹內乳食中浸經一宿看有味即用塗於口裡如鼻中有瘡滴如少許若有腫處先以三稜針刺破除去上血煞後即塗此藥熊膽膏治小兒急疳口生瘡及諸疳麝香散治小兒走馬急疳口臭牙齦損爛致蝕唇鼻腮頰累治未效此方立驗麝香一錢黃蘗一兩青黛半兩蘆薈雄黃水飛過各一錢上為細末有患者先以綿纏箸展搽卻齒齦蝕損死肉以輕綿拭去惡血量瘡大小干貼之日夜五次用之惡血並不多者加定粉半錢同研一方無雄黃獨活飲子出活幼口議治腎疳臭息候牛黃大黃生地黃木香青黛各等分上為末每服一錢熟水調下人參散治腎疳潰槽候肉豆蔻炮胡黃連人參杏仁甘草炙上等分為末每服一錢小者半錢溫熟水調服檳榔散治腎疳宣露候木香檳榔人參黃連甘草炙各等分上為細末每服一錢小者半錢熟水調服一捻金散治走馬牙疳不能治者黃丹飛白礬飛青鹽飛錦草燒灰麝香少許上各等分為細末先用溫漿水淨洗無糨帛溫干貼藥酸漿膏治小兒牙疳出血牙齦臭爛風牙走馬疳等醋漿草根生者一握細刮次淨洗亂髮纏裹成一圓酥草成小窠子結實紅色似抱子中心有如櫻桃又名苦脯也皂莢一挺不蚛者搗銼附子去皮臍生為末半兩白礬研一錢麝香一皂大研在乳缽內上先用米醋一碗入酸漿草根皂莢兩味慢火煎至半碗去滓入附子白礬末更熬成膏取出候冷刮入麝香乳缽內研勻瓷合取盛患者先用鹽湯漱剔牙縫令淨然後以指蘸藥膏揩之如齦爛以帛子攤藥貼蟾蜍散治小兒走馬疳蟾蜍一枚去頭足及腸胃燒灰龍柏花地骨皮各分無食子兩枚麝香一錢研上羅為細散每先以鹽漿水淨漱口後以硝石末少許先貼上次以此藥一錢貼之日三治小兒急疳蟲蝕口鼻及下部皆赤爛大蒜二兩甜葶藶半兩干蝦蟆一兩地龍二枚去土炙亂髮灰一分上搗篩相和入竹筒內置瓦中以糖灰火燒之取瀝少許塗口鼻腮頂及穀道等處蝦蟆丸治小兒急疳蝦蟆一枚去爪燒作灰熊膽研麝香研白蕪荑各一分豬牙皂莢去皮子炙一分上為末煉蜜丸如綠豆大每服五丸至七丸米飲或溫水下日三服如急疳曾退落牙齒者以倒流水化五七丸塗齦上治走馬疳方上用竹園中蚯蚓泥火煅通紅放冷為細末如在唇鼻面上不得用手以篦子調生油好粉敷瘡上先以鹽湯洗瘡淨方上藥只一兩次第三日和皮都落如口內疳瘡用藥干敷立正散治馬疳牙疳人中白枯白礬各一分銅綠一分輕粉一分麝香少許上為細末先洗淨疳然後上藥每日三次二次貼之大效粉霜散治小兒走馬疳瘡宜塗粉霜一兩天南星末二分黃丹半兩炙葉色麝香半兩定粉一分上藥相和研令細先用鹽漿水洗過以紙捻子搵藥掃在瘡上每日三四度瘥蚺蛇膽散治小兒急疳癢隨爪作瘡瞬息大如錢或在頭面口齒中宜敷蚺蛇膽三大豆許黃礬白礬灰蘆薈麝香各一錢上為細散若頭面身上有瘡以清泔洗浥干敷一大豆許良久水出即止重者不過三度瘥如在口齒宜頻貼之麝香丸治小兒急疳口鼻生瘡時癢不止宜服此者大麻子一升以竹箇中燒取膏蝦蟆灰一分麝香一分人糞灰一分鹽綠半分上細研如粉以麻子膏和丸如綠豆大內入兩鼻並口中須以水更為點之日夜各一度點如下部有瘡即一日兩度內之一方敷瘡上必須慎口微有效即減藥治走馬疳牙關風壅口氣吹膿或無臭牙焦落膽礬蕪荑等分上煅研末干糝又方白礬枯麝香炙上為末淨洗牙了撲牙根數次用之良治小兒急疳蟲蝕口鼻及下部生瘡出聖惠方干膽一兩半兩為末半兩燒灰銷金銀甘堝一兩銀末一大豆許人糞灰一兩麝香上為細散有蟲蝕處即著藥粉之三七日以來勿食一切肥膩又方出聖惠方精白羊肉二兩蕪荑仁半兩豉一合川椒二七粒去白醬豆一匙上件藥相和爛研令細每取一棗大敷瘡上日三易之銅青散出危氏方治走馬疳口內生瘡牙齦潰爛齒黑欲脫或出血臭川白芷半兩馬牙硝一錢銅青一分麝香一字上為末干敷口角及搽齒上妙仍服蟾酥丸效青牛散出傅氏家藏方治小兒走馬疳牙齦潰爛由臟腑壅熱乳食不調內有疳蟲上蝕齒其候唇癢痛牙齒焦黑上生瘡腦中乾熱氣熏蒸多臭氣蝸牛一枚大者燒存性青黛半錢麝香一字別研黃蘗一錢上為細末先以鹽水洗患處搵干用鵝毛點藥少許敷掃患處一方無黃蘗地骨皮散出活幼口議治腎疳齦齶牙齒肉爛腐臭鮮血常出生乾地黃半兩真地骨皮細辛各一分五倍子炙焦二錢重上為細末每用少許敷之議曰本經所載疳證有五謂五臟所受故得其名今述腎疳一臟有證五候者最為要急不可同常此疾具陳有五種候傅迅疾可畏乃知走馬之號不誣初發之時孩兒口臭上干胃口氣臭蒸郁漸進損筋齦內生瘡或腫或爛其齒焦黑又進從牙槽內發作瘡疱潰膿爛又進熱逼入脈時時血出其熱注入牙齦腐壞槽寬齒脫六七歲孩落盡不復更生豈可治療今以妙方宜速與隨其傅變而先理不待後候而後藥也秋霜散出王氏博濟方治小兒走馬牙疳蝕唇頰牙齒浮動宣露口臭至妙砒一錢粉霜膩粉各半錢麝香少許上研令勻每用一米粒許揩患處乳香丸治走馬疳如神乳香輕粉各半錢麝香少許砒半錢研上先將乳香研細入輕粉麝砒共再研用薄紙一韭葉闊藥內按過撏紙少許丸如黃米大臨臥將藥填在疳處至明則愈四物散治小兒走馬疳粉霜麝香石灰鉛丹炙紫色各一分上先研前三味細為散後入鉛丹再研勻如桃紅花用雞翎掃之立瘥雄黃散治小兒急疳乃脾毒骨䐬風蝕動唇口雄黃一分水銀半錢與雄黃同研令星盡銅綠一錢麝香一字上用研勻以瓦合盛先以新綿搵去血甚者剪去惡肉貼之一日三敷之立聖膏出醫方妙選治急疳侵蝕人乳汁半分黃礬一粟大白礬一棗大石膽一豆大上件研細以綿裹內乳汁中浸經一宿看汁有味慢火熬成膏每用少許塗於口裡如鼻有瘡滴入少許若有腫處先以三稜針刺破除去血然後即塗此藥黃龍散治小兒疳蝕唇鼻銷金鍋下黃龍灰細研一兩麝香研一分銀末小豆大蟾蜍一枚一半燒灰一半炙乾搗末上為細散但有蟲處瘡上敷之又方出聖惠方青礬半兩燒通赤黃礬半兩燒令汁盡麝香一分上件藥相和細研如粉有疳瘡處時用少許貼之五靈散出典藥方治小兒走馬牙疳漸漸臭氣或連腮近耳壞爛並不知痛至於曾有落去下頰數日方死者梧桐律定粉砒霜雪白者麝香當門子各等分上各研細先洗患處淨糝上一日未效再煎甘草湯淨洗再糝以知痛見血出者肉漸生長而愈蟾酥散出全嬰方治小兒走馬疳牙齦臭爛侵蝕唇鼻先用甘草湯洗去皮令血出塗之亦理身上肥瘡但是疳瘡用之立效瘡幹好麻油調濕則乾用蚵蚾黃紙裹火煨焦黃連各末一兩青黛一錢上為末入麝香研和依方用之又南星入雄黃煨入麝香為末敷之蘭香散出活幼口議治小兒走馬疳牙齒潰爛以至崩砂出血齒落輕粉一錢重蘭香子一錢末密陀僧半兩醋淬上研如粉敷之齒上立效議曰嬰孩受病證候多疳良由氣鬱三焦疳分臟內有腎常虛得疳名之曰急以走馬喻治療頗難此等一證初作口臭多曰臭息次第齒蝕名曰崩砂盛作齦爛名曰潰槽又盛血出名曰宣露重則齒自脫落名曰腐根既腐何由理之嗟乎豪家育子哺以甘肥腎常受之虛熱或緣母在難月恣食珍羞令兒所招即非偶然而作今將秘方述於後硫黃散治小兒急疳蟲蝕唇鼻口齒硫黃研半兩乾漆一兩炒煨盡大蛤燒灰二兩上為散每用半錢入麝香少許研令細取做綿拭去瘡上惡血然後用藥敷之膽礬散治小兒走馬疳膽礬飛乳香研鉛丹飛各一錢上研為細散每用紙捻子點少許貼患處如肉紫爛臭藥到便紅麝香散治小兒急疳齒牙腐爛惡血口臭齒牙脫落麝香研銅綠研各一錢黃連去須二錢上搗研為散以棗肉一枚水一盞研如泥入前末共研令勻患處敷少許以爛丁香葉覆之瘥肉消者可待肉生神效走馬疳出仁齋直指方治口齒出血臭氣銅綠半錢朱蜘蛛一枚上為研入麝香少許夾和搽齒如無蜘蛛即用蝸殼二個立應散治小兒走馬疳諸藥不效者紅棗三十枚信少許上將紅棗去核卻內信末少許裹定燒存性放冷為細末每用少許干黏牙疳瘡上敷齒立效散出活幼口議鴨嘴膽礬一錢重匙上煅紅研麝香少許上研勻每服以少許敷之齦上一方蟾酥一字加麝香和勻敷之議曰血之流行者榮血氣環轉者衛也變蒸之後飲食之間深恐有傷於榮衛而作眾疾或其傷於毒血傷於熱攻之臟所受何臟蓋小兒腎之一臟常生於虛不可令受熱毒攻及腎臟傷乎筋骨惟齒受骨之餘故先作疾名曰走馬非徐而作所宜服藥甘露飲地黃膏化毒丹消毒飲其外證以前件立效散及麝酥膏敷之切忌吃食熱毒之物此疳不同常證及系無辜有作醫深究保全為上若用常方難擬愈活雄黃散出經驗良方治小兒因痘瘡牙齦生疳蝕瘡雄黃一錢銅綠五錢上同研極細量瘡大小干貼其上治走馬牙疳及治一切疳瘡惡瘡赤爛等疾出百一選方上用小遺盆內白屑取出磁罐內盛貯用泥固濟炭煅紅取出將白屑細研入麝香少許貼於患處不過三二次必效治小兒走馬牙疳上壁上蟲兒人中白末相和為末敷干貼亦可附子丸治小兒急疳蝕唇鼻附子炮裂去皮臍黃蠟各半兩上附子搗為末消蠟為丸內蟲孔中天南星散一名除疳散出全嬰方治小兒走馬疳蝕透損骨及小可攻蝕天南星一枚大者雄黃皂子大上先用天南星當心剜作坑子次安雄黃一塊在內用麥麵裹合炭火內燒令煙盡取出候冷入麝香一字同研為細末先以新綿搵血然後於瘡上摻藥一日三次敷之一方加輕粉二金散出聖惠方治急疳毒盛蟲蝕卻口鼻牙齒砒霜一分麝香半兩上件藥先將砒霜去紙上炙過後入麝香同研令細每用一字以鵝翎掠在瘡上日使三兩度隨時展去藥無令咽津治小兒走馬疳瘡蝦蟆一個活者螻蛄一個內在蝦蟆口中以線縫口用黃泥裹火燒乾用炭煅存性麝香少許上研為細末少許貼患處大效黃連散專治疳黃連一錢輕粉半錢別研上為細末干貼諸瘡上大效治小兒牙疳上用甘草二寸棗兒核七個燒灰搽牙妙治小兒疳蟲齒雄黃葶藶上末取臘豬脂熔以槐枝綿包頭四五枚點藥格之治走馬疳出百一選方上用蛇吞蝦蟆逐蛇而取之瓶盛一枚黃泥固濟煅煙盡存性取出研為細末入麝香少許於患處貼之即止治小兒走馬疳出百一選方上取花蜘蛛一枚以濕紙裹荷葉包火中煅令存性研入少許麝香敷之又方出百一選方上取芭蕉杆或葉即用燒存性入麝香輕粉敷之治小兒走馬疳出百一選方上用干篛葉不拘多少裹軟土一塊同燒成黑灰用輕粉相和敷乾者用油調塗治諸疳走馬疳出百一選方上蛆不拘多少用河水浸三日新瓦盆內頓外以火煏干入麝香少許在內用貼患處吃亦不妨治走馬疳一名礬石散出百一選方上蟹殼十個白礬五錢棗子三個一處灰火煅過為末入麝香少許同研干揩方又方一名倍子散一名麝香散出余居士選方治走馬疳上用倍子全者不拘多少炭灰燒候煙欲盡取出放地上盆覆之存性去灰碾為細末入麝香少許如牙藥敷患處雖咽津亦亦無礙先以鹽湯漱口一敷即愈一方用陳者敲開只取細末入麝香同研和勻先以漿水洗瘡裛干敷藥乾者油調塗新者和皮用亦得又方一名桃花散出百一選方上用白礬上色坯子各少許細研敷牙上療齒疳出聖惠方上用蚺蛇膽末敷一方研細水調下亦可其蛇出嶺南欲辨真偽割膽開內網如粟米水乳走者真也沉而散者非也此法不可不辨勝金散一名黑棗散出經驗良方治小兒走馬疳齒臭爛上用黑棗一個去核鴨嘴膽礬內滿使濕紙包慢火煅成灰入麝香少許搽牙上一方加輕粉小兒走馬疳出經驗良方治牙齦腐爛惡血口臭牙落上用雞內金清油燈上燒存性為末摻瘡上干則清油調敷雞內金即雞䏶胵紅鉛散一名香礬散出衛生家治走馬牙疳綠礬不拘多少上相礬色鮮明者入甘鍋用炭燒赤傾出好酒灑拌勻再入鍋如此數遍紅研細入麝香少許先以溫漿水漱淨用藥有瘡處貼之又方出本草治走馬疳上用蠶退紙燒灰存性加麝香貼患處佳代赭石散治小兒走馬疳上用代赭石頂頭者不拘多少用炭火燒赤醋淬七遍濕地上以物蓋出火毒搗研為散患者不拘大小兒設皮破唇上下如針眼子者先用漿水漱口剪好紙作細條醮薄藥於牙齦上貼之紙落再貼隔宿即生肌如榴子甚者不過再上尋常宣露牙齒亦可用藥貼之巴豆丸治小兒急疳蝕唇鼻上用巴豆十七枚冷水浸一宿去皮研與蠟為丸如桐子大每用一丸含之仍吐其汁若誤宴下倏腫閉塞吐痢者急煎黃連湯及藍葉汁等解之治小兒走馬疳上用飛白礬皂角子七個燒過同為細末虀水洗漱淨瘡貼上紙花封子即愈治急疳蝕口鼻者生瘡上用沒石子為末吹下部即瘥治急疳蝕口鼻數日欲死上用藍澱敷之日十度夜四度瘥治小兒急疳瘡神效方出聖惠方蔓菁花成時並根枝取陰乾上件根莖一握去頭尾以大麥面並漿汁和作團裹之炭火中燒令煙盡取出候冷入麝香一錢同研為末每貼時先以米泔淨洗故帛拭乾可敷藥若兒小恐痛甚以意少少敷之不過三數遍瘥口鼻及下部瘡悉治之地黃丸出百一選方治腎疳即急疳由乳食不調臟腑伏熱凡滋味入於脾而生蟲蟲大則動侵蝕臟腑遂使小兒心悶若上蝕齶齦則口瘡出血齒色紫黑下蝕腸胃則下痢肛爛濕癢生瘡療治不早則消蝕精髓不治蟲齒目為濕䘌多因