麝香一分同研為末用麵糊和丸綠豆大每一歲以乳汁研一丸服之或為敷瘡上亦良吹鼻散治小兒鼻疳常用地榆一分銼青黛一分細研人糞灰一錢麝香半錢細研蝸牛殼二七枚炒令微黃上為細末每用兩黃米大吹鼻中蘆薈散治小兒鼻疳蟲蝕鼻癢不止蘆薈一分黃蘗末青黛半兩雄黃半兩上都細研為散日三度以少許敷瘡上瘥治小兒疳癢方益母草根末一分麝香一錢定粉一分密陀僧一分上都研令細干貼鼻內立效吹鼻方治小兒鼻疳瘥地龍二條瓜蒂一分麝香半錢細研蝦蟆頭一枚燒灰上為細散同研令勻日二三度用少許吹鼻中吹鼻散一名海半散治小兒鼻眼耳癢類橘子皮發乾毛豎宜用蝸牛殼一分燒令微黃蝦蟆灰一錢麝香一錢細研瓜蒂七枚上為細散研入麝香令勻用少許吹入鼻中日三四度兼點少許口中甚佳後更煮益母草葉粥與吃澤瀉散治小兒肺積鼻內生瘡及鼻下赤爛川澤瀉鬱金甘草炙山梔子炒上各一分為末每服嬰孩一字二三歲半錢五七歲一錢甘草湯調下一日二服宜再用紫金散敷之良麝香散治鼻疳肺氣通於鼻其鼻中赤癢壯熱多啼毛髮乾焦肌膚瘦削鼻下連唇生瘡赤爛麝香半錢研雄黃研升麻各二錢半白礬枯半兩上為末每用少許乳調白敷於瘡上乃服蘆薈丸等藥蝦蟆灰一分人中白半分麝香一錢上都研細干貼鼻內日三用之又方黃蘗一分雄黃一分細研麝香一分細研上都研細令勻以生油調日三四上塗之青金散治小兒鼻疳爛銅青白礬生等分上為末每用少許敷鼻下治小兒鼻口疳蝕生瘡黃瘦不食乳石膽一分蘆薈一分上細研為散糝在蝕處其糝傷內當化為膿但頻糝即在好肉亦不有損動漸瘥治小兒疳瘡蝕鼻黃連半兩去須搗為末石膽一分細研上都令勻以生油調塗於鼻中又方雄黃一分細研瓜蒂一分上細研為散令勻以生油調塗於鼻中又方干蝦蟆一枚塗酥炙焦黃麝香一錢蘆薈一分細研黃蘗一分銼上為細散以水一合於瓷盞中浸經一食久用雞毛點於鼻中清膈散一名清肺湯治肺疳即氣疳由乳哺不調壅熱傷肺肺主氣通於鼻風濕之氣乘虛客於皮毛入於血脈故鼻下兩傍瘡濕癢爛是名䘌其瘡痛汁所流處卻又成瘡外證咳嗽喘逆壯熱惡寒故膚粟生鼻乾流涕咽喉不利頤爛唾紅氣脹毛焦泄痢頻並多啼揉鼻咬甲寒熱一方有生乾地黃桑白皮五錢炒研用紫蘇黃芩當歸前胡連翹防風桔梗天門冬去心赤茯苓甘草炙各二錢半上銼散每服二錢水一盞煎溫服不拘時候次服化䘌丸化䘌丸蕪荑蘆薈青黛川芎白芷梢胡黃連上末豬膽汁浸糕糊丸麻子大每服二十丸食後臨臥杏仁煎湯下其鼻常用熊膽泡湯小筆蘸洗候前藥各進數服卻用青黛當歸赤小豆瓜蒂地榆黃連蘆薈等分雄黃少許細末入鼻斂瘡食疳附論夫小兒食疳者由脾胃不調乳食過度傷於臟腑之所致也是以小兒百日之內腸胃尚微哺乳猶少三歲之外氣血漸盛乳食則多其乳母須在調適寒溫節減五味令氣血和平則孩孺無病也若飲食不節生冷過多積滯不消在於腸胃致成食疳也其狀面貌萎黃肌體羸瘦腹大腳細毛髮乾焦鼻口常干好吃泥土胸中大熱肚上青筋口舌生瘡水穀不化下痢無度漸漸困羸者是其候也方木香丸出聖惠方治小兒食疳腹中多痛大腸或痢鼻癢乾瘦時有體熱木香麝香細研胡黃連蘆薈細研蟾酥炙令焦黃香墨青黛細研熊膽以上各一分使君子半兩雄黃研細上為末煉蜜和丸如綠豆大每服以粥飲下五丸量兒大小以意加減大黃丸出聖惠方治小兒食疳心腹空脹煩悶或時熱渴川大黃銼微炒黃連去須桂心代赭細研以上各一兩硃砂一分細研木香半兩麝香一分細研肉豆蔻二枚去殼杏仁半兩先洗去皮尖入麩炒黃研細巴豆一分去皮心研紙裹去油上為末入杏仁巴豆都研令勻煉蜜和丸麻子大每服粥飲下三丸量兒大小加減服之檳榔丸出聖惠方治小兒食疳氣長肌膚益顏色化宿食治腹脹利氣調中能破積聚檳榔硃砂細研代赭細研乳香研入木香五靈脂麝香阿魏麵裹煨面熟為度肉豆蔻去殼以上各一分蟾頭一枚炙黃色巴豆七枚去皮心研紙裹去油上為末同研令勻以麵糊丸黍米大每服以溫薑湯下二丸量兒大小以意加減桃花散出聖惠方治小兒食疳腹脹桃花一分乾蟾塗酥炙令黃青黛細研赤芍藥肉豆蔻去殼紫筍茶以上各半兩上為末每服以溫粥飲調下半錢看兒大小臨時加減代赭丸出聖惠方治小兒食疳腹脹體瘦宿食不消多啼壯熱代赭一分細研赤石脂一分硃砂一分細研巴豆十枚去皮心研紙裹去油杏仁二七枚銅針穿燈上燎作聲為度別研上件藥並須新好入乳缽同研令勻用飯和丸如粟米大每服以粥飲下一丸乳汁亦可量兒大小以意加減抵聖散出聖惠方治小兒食疳不欲乳食羸瘦蟾一枚塗酥炙微黃蜣螂一分去翅足微炒麥糵一分微炒神麯一分炒微黃上為散每服以粥飲調下半錢量兒大小加減服之靈脂丸治脾疳即食疳由乳食不節脾胃受傷或乳母恣食生冷甘肥或乳兒過飽後與之乳致吐乳多睡久則成癖腹脅結塊其證面黃身黃肚大腳小逆吐中滿乏力多啼水穀不化泄下酸臭合面困睡減食吃泥北五靈脂縮砂仁麥芽白豆蔻仁莪朮炒青皮去白蝦蟆灰使君子肉炒胡黃連各三兩乾蟾二個酥炙巴豆七粒去心膜去其油研麝香一分研上為細末滴水於石臼中搗一二百下和丸如黍米大每服二粒至三粒溫生薑湯送下乳食後加減訶子散治小兒脾疳丁香白丁香舶上硫黃密陀僧訶子一對石燕子一對輕粉少許上為細末如病大者七歲以下每服半錢七歲以上每服一錢溫水調下治小兒脾疳蘆薈使君子以上各等分上為細末米飲調下一二錢服之治小兒未行或乳母有孕飲交奶羸瘦方上伏翼熟炙啖之日三兩度食之一名蝙蝠黃連丸治小兒食疳氣頭面虛腫腹內泄瀉面色痿黃頭髮作穗心腹脹滿肚上青筋疥蝦蟆一個去腹肚酒浸炙令香黃木香一分胡黃連半兩木鱉子半兩燒令煙盡研沉香一分丁香少許乾薑一錢燒灰存性巴豆二十一枚以水淘洗去心膜並油並紙裹用重物去油再研如面止上細杵為末以水浸蒸餅為丸如蘿蔔子大空心臨臥米飲下一丸三歲以上二丸至三丸忌黏滑物
