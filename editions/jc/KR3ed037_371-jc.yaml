恍惚惚生驚但胃氣未脫速與服之若是危急不待作丸子只以溫飯飲調與服以愈為度若腳手冰冷者服之立溫未止者服之立止雖慢驚慢脾風候宜與服仍加薄荷湯尤良竹瀝膏出全嬰方治小兒久患脾虛發搐慢驚潮歇附子炮一錢厚朴薑汁浸一宿焙乾白朮蜜炒各一分麻黃去節炒半錢犀角屑一錢焙乾全蠍二十七個薄荷汁浸一夕焙乾上為末竹瀝為丸如雞頭實大每服一丸薄荷湯化下無時治慢驚出楊氏寶著赤腳蜈蚣一條頭尾全者酒塗炙白殭蠶七個炒辰砂一字別研麝香少許別研青州白丸子三十粒全蠍七個頭尾全者各用生薄荷葉裹定外以麻線系定火上炙上為末將人參麥門冬湯調下急驚加腦子牛黃各少許煎金銀薄荷湯調服之一方水化蒸餅為丸續經驗治法前件藥如俱用不效危困可憂須診衝脈未絕在兩足面間當灸百會取前後髮際兩耳尖折中乃是穴也方書所載但云頂上旋毛中殊不審有雙頂者又有毛旋不正者庸庸之輩只循習舊本誤人多矣灸後即當控涎青州白丸子末再煎如稀糊入蜜冷熱得所調奪命散服之良久涎下細研靈砂米飲調和旋抹口中如證漸退而風未除服八仙散昏困服醒脾散常令減乳奶子服釀乳藥如此調理無不更生間有稟受不齊本氣素弱五行修短雖有神聖工巧靈丹妙劑不能奪其造化此乃曉然之理學者不可不審若涎已滿膈但有喉中如鋸藥不能入又不可控當別法療之然搐鼻噴嚏得出次服奪命散庶免再潮溫白丸出全嬰方治小兒脾胃氣虛困頓泄瀉冷疳洞痢及吐瀉之後或病久變成慢驚身冷瘛瘲天麻半兩殭蠶去嘴白附子全蠍南星炮七次各一分上為末寒食麵煮糊為丸如小豆大每服三十丸薑湯下食前如作散姜煎尤妙漸加服一方加附子一分五靈脂丸出全嬰方治小兒因吐瀉之後變為慢驚發歇不定蟬蛻一分附子炮去皮臍一作白附子五靈脂南星薑汁浸一宿焙乾蠍各半兩麝香一字一方不用麝香上為末酸酢一盞藥末半兩同熬成膏次入余藥拌麝香和為丸如雞頭實大三歲一丸乳汁化下金錢薄荷湯服亦得鼻上汗出為效定命飲子出活幼口議治嬰孩小兒吐瀉脾胃虛弱發作慢驚風候搐搦不已醫工截風不止取痰不下散熱不退即驚不去其證欲傳慢脾風候天麻散治急驚風半夏揀羊眼者半分天麻一分甘草炙白茯苓白朮老生薑各二錢上用水一盞瓷器內煮令水乾將半夏天麻白朮茯苓切焙為細末每服半錢或一錢生薑棗子湯調與服無時一方用半夏七錢天麻二錢半甘草等四味各三錢一方有木香無天麻此方健脾化痰去風散熱功效如神醫工少有知用初學之士只知有腦麝者方用之俗夫便言好藥殊不知腦麝乃醫家出不得已用之其物通關竅開閉塞疏腠理利骨節其藥屬陰能化於陽只有急驚宜用慢驚慢脾傷寒等患悉宜禁止其或疳痢藥用之虛者亦禁惟有痙痓癲癇宜用定命飲子屢經效驗野老處定此方其功造化深智高明往往能銷痰搦連並脈息怯不敢頓下者宜與靈芝丸若手足厥冷連進回陽行醫用藥至於此等證候乃主活治法勿傷權也乾蠍天麻散出御藥院治小兒慢驚風乾蠍全者十枚炒蔓陀羅七朵重一字天麻二錢半乳香研天南星炮丹砂研各一分上為細末每服半錢薄荷湯調下不拘時快脾湯出直指方治慢驚脾困不食和胃祛風天南星一個銼如棋子塊生薑一兩切川厚朴一兩銼碎水三升同煮令南星透姜樸去只用南星切焙白茯苓半兩木香人參天麻各二錢半全蠍七個焙上為末每服半錢甘草生薑煎湯調下桃紅散治小兒慢驚風手足瘛瘲神情如醉天南星炮烏頭炮製去皮臍白附子炮天麻各半兩乾蠍微炒二十一枚丹砂研一分上為細散每服一錢或半錢牛黃龍腦各少許煎麻黃湯調下日三服珍珠丸出聖惠方治小兒慢驚風墜涎珍珠牛黃丹砂雄黃膩粉各一分研上藥合研勻細用粳米飯和丸如黃米大一二歲兒每服三丸薄荷湯下日三更量兒大小加減辰砂膏出活幼口議治嬰孩小兒慢驚風傳脾風傳慢候有冷痰在膈潮作不散此疾虛久不可頓下其兒搐緩昏困至重者大黑附子一個八九錢者去皮項上刻一孔入粉霜硇砂各半錢內在孔中用附子末塞燒灰存性天南星炮半兩蠍梢羌活各一分硃砂半兩飛過上為末以硃砂和勻煉蜜為丸雞頭實大每服一丸至兩丸金錢薄荷入酒三五滴點化與服一方麝香薄荷湯下此方用黑附子直不可謂性熱兒在幼小礙與服之兒患脾風腳手冷者有微有暴審其輕重服之必效須候手足暖陽氣回即為之快矣既以溫暖更以醒脾正胃藥兼服除是慢驚傳入慢脾候方可與服硫黃其功甚速又且逐風化痰醒脾正胃溫暖臟腑補益腸胃奪命回陽省活危困至良至驗功不可述愴惶妄投丸散或爾太過不及之時則致咎於後萬宜孚受不至誣誕故也天南星丸出直指方治慢驚痰壅惟身熱者可服南星一斤每重一兩上下者用溫湯浸洗刮去裡外浮皮並虛軟處令淨用法酒浸一宿用桑柴蒸不住添熱湯冷釜滿甑內氣猛便不住灑酒常令藥潤七伏時滿取出用銅刀子切開一個大者嚼少許不麻舌為熟未即再炊候熟用銅刀切細焙乾麝香研丁香各一兩龍腦研一兩半辰砂別研水飛二兩用一半為衣上為細末入研藥勻煉蜜並酒丸硃砂為衣每服一豆許生薑煎湯調下蠍附散出危氏方回陽氣豁風痰全蠍七個附子炮二錢南星炮白附子木香各一錢上為末每服半錢姜四片慢火熟煎旋服黃連丸出聖惠方治小兒慢驚風心胸痰涎腹內壅悶或搐搦黃連一分末青黛一分麝香一分硃砂一分細研巴豆霜半兩上都研令細用豬膽汁和丸如黍米大每服以薄荷湯下三丸量兒大小加減服之乾蠍丸治小兒慢驚風乾蠍五枚全者炒細辛去苗葉乳香研各一分青黛研白附子炮各半兩上為細散每服半錢煎冬瓜子湯調下不拘時丁香丸治小兒慢驚風吐逆不定胃虛生涎多驚饒睡丁香一分為末半夏三枚湯洗十次焙乾為末蠍梢四十九枚炒為末水銀鉛各一分二味結沙子上合研勻細用熟棗肉和丸如綠豆大每服五丸至七丸量兒大小加減並用荊芥薄荷湯下大人虛風痰涎丸如梧桐子大一服七丸至十丸麝香散出聖惠方治小兒慢驚風及天瘹麝香一分細研膩粉一分牛黃一分細研乾蠍一分白附子一分炮製上為細散不計時候以薄荷汁調下一分量兒大小加減服之硃砂散出聖惠方治小兒一臘後月內忽中慢驚風及無辜之候硃砂一分細研牛黃一分細研麝香一分細研乾蠍十四枚微炒雀兒飯甕十枚麩炒令黃去殼上細研為散不計時候以乳汁調下半錢薄荷湯調下亦得更量兒大小以意加減回生丹出聖惠方治小兒慢驚風痰涎壅悶發歇搐搦天麻一分白附子一分炮製白殭蠶一分微炒桃膠一分天南星一分炮製上為末以爛飯和丸如黍米大每服以溫薄荷湯下三丸量兒大小加減服之返魂丹出聖惠方治小兒慢驚風及天瘹夜啼蝙蝠一枚翼腸肚炙焦黃人中白一分細研乾蠍一分微炒麝香一分細研上為細散入人中白等同研令勻煉蜜和丸如綠豆大每服以生薑汁送下三丸量兒大小加減小黑膏一名小黑散出鮑氏方治傷寒風發搐及慢驚脾風鼻流清涕及傷寒風癇南星三個燒存性川烏三個燒存性玄參四錢大薄荷葉四錢上為末煉蜜和丸如龍眼大每服一丸煎薄荷湯化下蘇沈良方與此同星烏各一個薄荷玄參各五錢一方作散每服一豆許蜜和蔥白同研細白湯調下如筋脈緩急乳香同蔥白煎湯下羌活丸治小兒慢驚虛困痰涎不利羌活去蘆頭一兩白殭蠶炒半兩二味搗末硫黃水銀各半分二味結沙子研上藥合研勻細煉蜜和丸如豌豆大四五歲每服二丸三歲以下一丸煎金銀荊芥薄荷湯化下理中湯人參去蘆白朮白殭蠶炒甘草炙各等分上為末薑棗煎服手足厥冷加附子炮姜回陽犀角散出活幼口議治嬰孩小兒因吐瀉神困力乏欲傳作慢驚風候犀角鎊一錢白朮二錢水煮過甘草炙半錢陳皮舊者良去白一分上為末每服一錢水一中盞金銀薄荷同煎三五沸通口無時服此方治小兒吐瀉神困力乏欲發慢脾風候正謂救急不可令緩若已傳受即風即熱即驚交相致作神散不定上竄搐搦悉由脾虛之所致也脾經既虛次第胃虛其藥白朮陳皮預理脾胃犀角退熱去風熱既不作痰無發生醒脾壯胃風何得有漸見蘇省兼與醒脾散及既濟丹相間服一向取愈為良其方全不用逐風化痰之藥者蓋是證候欲作慢驚所以未宜先投緊藥故用此方調之和劑一是正其脾氣得無傳變不勞療理簡徑微妙稽首智者作之施功利益而已療痰方出湯氏寶書川烏尖附子尖各七個去皮生用蠍梢七個石綠少許上為末和勻用軟雞翎黏藥入喉中逐旋惹出頻用帕子拭之定吐截風回陽出湯氏寶書金液丹青州白丸子五靈脂一錢青皮末一錢上和劑蒸餅糊丸如黍米大米湯送下大小加減服之丁附湯出危氏方治吐瀉虛脫成慢驚風困而不醒用大附子生或炮製去皮臍銼散每服一錢水一盞生薑五片丁香五粒煎五分更量大小與之急無丁香亦可屢收奇效豆卷散治小兒慢驚多用性大溫及熱藥治之有驚未退而別生熱證者有病愈而熱證者有反為急驚者甚多當問得病幾日又何以得之曾以何藥治之可用解毒無有不效蟬蠍散出直指方治方傳慢驚及驚風積熱全蠍七個去尾尖蟬殼二十一個甘草二錢半炙大南星一個爐香上為末每服半錢生薑棗煎服積熱加薄荷煎四聖散出直指方治慢驚痰滯虛熱若有竄視搐搦證狀以少許用管吹入鼻中全蠍七個白殭蠶十四個天南星七錢半真川烏三錢三分並生用上將南星為末水調作餅裹蠶川烏外用濕紙重包漫火中煨令赤色頓地上一伏時為末每服煎金銀湯點好茶清少許調下黑附湯出直指方治慢脾風盛四肢厥冷天南星煎丸出聖惠方治小兒慢驚風天南星一兩細銼水二盞微火熬至半盞去渣重熬成膏白附子半兩炮製天麻一兩乾蠍一分炒上搗羅三味為末入天南星膏內和丸如綠豆大三五歲兒每服二丸薄荷湯下五六歲兒三丸日再服更量兒大小加減不拘時一方無干蠍又方出聖惠方雀兒飯甕三枚有蟲者白殭蠶三枚微炒乾蠍三枚微炒上為細末每服以麻黃湯調下一字日三服汗出為效三歲以上即加之玉液丹出聖惠方治小兒慢驚風及天瘹熱疳心驚悸等證白附子一分生用赤箭一分白殭蠶一分生用膩粉一分上以三味搗羅為末入膩粉同研令勻煉蜜和丸如麻子大二歲兒每服以熟水下三丸三四歲每服五丸日二三服量兒大小以意加減天漿子散出御藥院方治小兒慢驚風天漿子有蟲者白殭蠶炒乾蠍各二十個炒上為細末每服一字煎麻黃湯調下或薄荷湯下無時日三隨兒大小加減之大有效南星飲出危氏方宣利過多脾困眼慢涎盛四肢不舉不思飲食天南星三個炒赤令熟冬瓜子仁白扁豆各一兩上為末每服一錢姜二片防風少許煎湯調服川烏散出直指方驅風回陽附硫丸一名小續命丸出活幼口議治嬰孩小兒慢脾風四肢厥冷服之方見小續命丸南附湯出危氏方治泄瀉虛脫生風名慢驚風及因服冷藥多者南星生附子二錢全蠍五個去毒上銼散每服二錢水一盞生薑三片煎五分量兒大小旋服麻黃散治小兒慢驚風因轉瀉虛極多睡醫所不能療麻黃七節以兒中指節比薄荷全者七葉乾蠍全者一枚上各炒黃色合搗研為細散每服半錢溫薄荷水調下更量兒大小加減服後略以衣被蓋之汗出立瘥麝香餅子治小兒慢驚風涎塞咽喉服利藥過度麝香研膩粉各三錢七分定粉一錢上研令勻細以香墨研濃汁和丸捏如扁豆大每服一餅薄荷湯化下治小兒慢驚風生菜薄荷荊芥上各等分搗滴汁數點於口滓繫於臍中乳香丸治小兒慢驚風心神悶亂煩懊不安筋脈拘急胃虛蠱動反折啼叫乳香盞子內熔過研半錢胡粉一分上合研勻細用白頸蚯蚓生捏去土爛研和就為丸如麻子大每服七丸至十五丸煎蔥白湯下更量兒大小加減烏頭丸出醫方集成治小兒慢驚百藥不效者及驚風手足搐搦涎潮上壅大川烏頭去皮臍生用全蠍各等分上㕮咀每服半兩水兩大碗生薑五十片煎至三四分去滓逐旋以藥注灌之薰陸香丸出御藥院方治小兒虛風慢驚潮搐瘛瘲安魂益心氣血竭半兩乳香二錢半上同研細用火上炙乾時滴水丸如酸棗大每服一丸薄荷酒化下不計時候如夏月嬰兒患此證為細末薄荷人參湯調下不拘時候天玉散出全嬰方治小兒吐瀉或誤服冷藥脾虛生風成慢上用南星一個重八九錢以上取地坑子深三寸炭火五斤燒通赤入好酒半盞然後以入南星卻用炭三兩條蓋卻坑子候南星微裂取出銼碎再炒熟為末用半兩天麻一錢麝香一字和拌三歲半錢生薑防風湯調下亦治久嗽噁心厭食七寶妙砂丹出活幼口議治嬰孩小兒慢驚風及慢脾痢疾奇效須以木香佐之其候神情昏睡因膈上有虛痰不能得化不可服巴豆輕粉恐動臟腑只將神仙所留妙方與服其痰須臾自下良久神情已定眼目微開漸與溫平藥調理胃氣兼順理驚風藥與服勿更攻擊其方乃一文開元通寶銅錢名七寶妙砂丹開元錢樣其錢背上下有兩月子只有一個月子者不用錢色淡黑小於諸錢將錢頓鐵匙頭於炭火內燒霎時羅上下各出黃白珠子遍匙都是將出候冷傾放茶盞中入硃砂末少許只作一服煎金錢薄荷湯送多收此錢準備緩急或先燒成珠子收舍亦得此方墜下小兒虛痰別無他者用之乃保十全功效一方用南木香煎湯送下或人參湯下調治嬰孩小兒慢驚風候無過前件藥對證克效須審慢脾已傳未傳之理其兒眼開未合上有慢驚腳手不冷之時未可便與回陽且與七寶妙砂丹一二服眼合沉困陰證極盛者方可與服回陽醒脾湯劑手足漸暖仍與觀音全蠍散兼服凡慢脾風候最為惡證只可前方調治雖曰急緊不得夾雜用之泛泛為無益枉勞其功虛誕其候閒養其疾此疾傳陰陽重病盛如燈無油只見次第脫去若不助陽生胃只知截風去驚兒疾轉見增重且兒陰證未至十分與藥如太寒涼攻得陰重虧難以救療也失其陽氣隨陰而化所謂制之於未然醫慢脾風證如其所述用藥猶可救活若鄙夫意見不同難以省活噓哉羌活膏出錢氏方治脾胃虛肝氣熱盛生風取轉過或吐瀉後為慢驚者亦治傷寒用無不效羌活去蘆頭川芎人參切去頭白附子炮赤茯苓去皮各半兩天麻一兩乾蠍焙去毒白殭蠶酒浸炒黃方可用白花蛇酒浸肉焙乾取下各一錢川附子焙去皮臍防風去蘆頭切焙肉豆蔻麻黃去節各二錢雞舌香即母丁香藿香葉沉香木香各二錢輕粉一字真珠末牛黃各錢半龍腦半字麝香一錢半雄黃一錢辰朱一錢以上七味各別研入上為細末熟蜜和劑旋丸黃豆大每服一二丸食前薄荷湯或麥門冬湯化下實熱急驚勿服性溫故也服不拘時古今論雞舌香者同異紛紛或以為番棗核或以為母丁香互相排抵竟無定說忠孝以謂最為易辨所以久無定說者惑於其名耳古人論藥多以其形似者名之如烏頭狗脊鶴蝨之類是也番棗核母丁香本二物以其皆似雞舌故名適同況藥物名同實異如金櫻地歸之類不足怪也如雞舌香二種各有主療番棗核者得於乳香中今治瘡疥藥多用之母丁香即丁香之老者極芳烈古人含雞舌者乃此類也今治中風藥多用之所謂最為易解者青金丸一名二神丹出續易簡方用青州白丸子金液丹等分同研為細末麵糊和丸如黍米大量兒大小服二十丸至三十丸薑湯下一方用泡蒸餅糊為丸如綠豆大溫熱水下未能咽者清米飲調服痰多者加白丸子未瀉多者加金液丹末證候退即以六神散調補小兒胸膈痰喘吐逆欲生風者及作泄瀉並皆治之陳米飲下麝香六神膏出楊氏家藏傳治小兒慢驚潮作口噤不止手足瘛瘲發歇無時麝香一字別研白花蛇頭一枚酒浸一宿烏蛇尾五寸酒浸一宿全蠍七枚去毒炒焦蜈蚣一條塗酥炙焦棘剛子七枚去殼取蟲微炒上件為細末煉蜜和丸每一兩作四十丸每服一丸煎人參麻黃湯化下不拘時候香蠶散出楊氏家藏方治小兒慢驚涎盛口禁昏塞項背強直手足搐搦進退不定睡臥多驚白附子一兩炮天麻全蠍去毒微炒白殭蠶炒去絲嘴天南星炮製人參去蘆頭附子去皮臍各二兩甘草炙黃硃砂別研鉤藤各一錢腦子一分別研麝香一字別研上為細末半歲兒每服一字一歲兒服半錢煎荊芥湯下不拘時雀甕散出楊氏家藏方治小兒慢驚潮搐口眼相引目睛上視頭項傴折痰涎壅閉神志昏憒棘剛子十枚去蟲微炒全蠍三十枚去毒炒蓖麻子二十枚去皮研石榴一枚大者去殼盛前三味藥在內用黃泥裹作球慢火煨乾燒赤候聞藥味透出紅熱候冷取出去泥細研次入後藥白殭蠶炒去絲嘴天南星炮半夏湯浸七次去滑白附子炮四味各一分乳香一錢別用上件後四味為細末次入乳香並燒者藥同研勻半歲兒每服一字一歲兒服半錢煎荊薄荷湯入酒兩三點同調下不拘時候截驚散出楊氏家藏方治小兒慢驚潮搐目睛斜視口眼牽引牙關緊急胎風胎癇悉皆治之麻黃去根節秤一錢麝香一錢別研烏蛇頭一枚酒浸焙乾蜈蚣一條塗酥炙焦全蠍一錢去毒微炒川烏頭一分炮去皮臍上件為細末次入麝香研勻半歲每服一字周歲兒服半錢煎荊芥湯調下不拘時候加減定命丹出楊氏家藏方治小兒慢驚瘛瘲目睛斜視身體強硬昏塞如醉及治胎風成癇發歇不足荏苒經時蟾酥酒浸一宿牛黃別研硃砂別研甘草炙黃胡黃連麝香別研使君子肉犀角屑當歸洗焙天麻細松煙墨燒灰煙盡地上去火毒羌活去蘆頭十二味各一字全蠍二枚去毒微炒半夏湯洗七次棘剛子五枚去殼取蟲微炒天南星牛膽制者附子炮去皮臍虎骨醮酒酥炙烏蛇酒浸一宿取肉炙乾乾薑炮丁香沉香肉桂去粗皮人參去蘆頭白茯苓去皮肉豆蔻麵裹煨熟去面白朮以上十五味各一錢上為細末煮粟米粥和丸如黍米大青黛為衣每服十丸荊芥湯下不拘時候桃仁方出王氏博濟方治小兒慢驚墜涎安蟲其狀多因久患脾胃虛弱風邪中入而作此候綠礬一兩半赤腳烏半兩上二味同研為細末稠麵糊為丸如綠豆大每服溫米湯下三丸次吃補虛丸新羅白附子一兩湯浸去皮臍大半夏一兩上二味各用白湯浸三日每日換水三度取出焙乾為末以生薑自然汁著兩錢薑末煮糊和為丸如綠豆大每服三丸溫粟米湯飲下醒脾散出朱氏集驗方治慢驚吐瀉不止肉豆蔻檳榔各一個胡椒二十四枚茯苓二錢木香藿香各一錢上為末每服一錢用水一盞煎溫麝香餅子出楊氏家藏方治小兒吐瀉之後內虛生風成慢驚涎潮搐搦頭項反折精神昏困全蠍二十一枚每一枚用薄荷二葉裹定先以生薑汁浸軟麻黃逐枚以麻黃纏定卻蘸薑汁老慢火上炙令麻黃黃色又蘸薑汁炙如此三次焙乾用乳香別研雄黃別研白花蛇酒浸取肉焙乾天南星炮製入生薑汁一宿切焙乾用烏蛇尾酒浸取肉白殭蠶炒去絲嘴附子一枚炮去臍尖取末以上八味各三錢麝香半錢焙乾上件為細末以入研者藥和勻別用天南星一兩調生薑汁煮糊與前藥和丸如梧桐子大捏作餅子略見日色陰乾每服一餅子煎荊芥湯化下不拘時候補脾益真散湯宿州陳氏方治小兒胎稟怯弱外實裡虛因嘔吐乳奶糞便青色而成陰癇俗曰慢驚風氣逆涎稠眼珠直視四肢抽掣或因變蒸客忤而所作或持拖驚嚇而所作或因誤服鎮心寒涼藥而所作此藥和溫而不燥木香當歸去蘆人參黃耆丁香訶子肉陳皮去白厚朴薑製甘草肉豆蔻草果茯苓去皮白朮官桂不見火半夏薑製附子炮上十六味各半兩全蠍去毒一服加一枚上各修製為㕮咀每服三錢重水一盞半生薑一片肥棗一枚煎至六分去滓稍熱服壯飢時服訖揉動心腹以助藥力後方可乳食渴者去附子加茯苓人參丁香甘草肉豆蔻瀉者加丁香訶子肉嘔吐加丁香半夏陳皮腹痛加厚朴良薑腹脹加厚朴丁香前胡枳殼咳嗽去附子加前胡半夏肉豆蔻官桂草果痰喘去附子加前胡枳實肉豆蔻赤茯苓丁香草果氣逆不下去當歸加前胡枳實檳榔附子肉豆蔻惡風自汗加官桂黃耆足冷加附子丁香厚朴以上增藥與正方分兩同又方出百一選方用正生大附子去皮臍為末以白項蚯蚓令拴藥末內滾候定刮蚯蚓上附子為丸如黃米大每服十丸溫米飲下八仙散傅氏活嬰治一切身冷瘛瘲四肢弱吐瀉不食精神困慢面色青黑不省人事天麻一錢熱湯炮洗人參一錢白朮一錢白茯苓一錢半御米一錢炒去油糯米薑汁浸七次扁豆一錢炒陳皮一錢蓮肉去心一錢藿香葉一錢甘草一錢炒上為細末如常調勻用鹽湯下或鹽米飲下如吐瀉霜梅湯下慢驚者冬瓜仁陳皮煎湯下入鹽少許不拘時候羌活鉤藤散傅氏活嬰治慢驚風可與宣風散八仙散相間服鉤藤二錢蟬蛻三錢洗防風三錢人參一錢天麻一錢蠍梢半錢川芎一錢麝香一字上為細末每服一錢用薄荷湯調服溫茶清調亦得不計時候
