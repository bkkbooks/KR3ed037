body:
  text: 卷三百七十一嬰孩驚風門慢驚風附論夫慢驚風病後或吐瀉脾虛胃損遍身冷口鼻氣出亦冷手足瘛瘲昏睡露睛此無陽也栝蔞湯主之錢氏曰無陽何用栝蔞湯內用栝蔞根白甘遂按本草栝蔞根味苦寒無毒主心渴身熱甘遂味苦甘大寒有毒主腹滿面目浮腫留飲宿食又曰驚急合涼瀉慢驚合溫補錢氏既云急驚涼瀉慢驚溫補乃用栝蔞湯寒毒之藥又無溫補為佐首尾亦無輔助兼主對不親如此治之怪也經曰實實虛虛損不足益有餘如此死者醫殺之慢驚虛病寒毒之藥甚戾人正合難經虛虛之論乃錢氏之非也愚常治此病以神貫丹寬筋湯治之多愈錢氏方脈議論優長甚為可取其間如治慢驚法栝蔞湯陰癇壞病內亦用此方錢豈不知栝蔞湯反為害也觀其知識必不如是倘或說但取其所長略其所短庶幾不誤後人徐仲秀子三歲七月中因傷乳食嘔吐數次而後作瀉召一醫視之三日不退加之眼露後因囟陷氣粗面白形青虛煩腹痛忽發驚風進退召愚視曰此子雖是慢驚法當斷乳三日頻與稀粥服藥可安主人曰小兒以乳奶為本豈可遽然舍乳也答曰舟非水不能行然波濤沸湧則有覆舟之患兒非乳不養然吐瀉過傷則有傾人之患波濤非自生其所以生者風鼓不平之勢作之也吐瀉非自生其所以生者風冷不便乳引之也風息則水勢平乳少則吐瀉止善行舟者不逆波濤而懼舟之不固善為醫者不懼吐瀉而懼乳之不節蓋乳猶水也水能載舟亦能覆舟此之謂也始因傷乳為病若以所傷之乳乳之如以酒解醉轉加昏憒固能節乳使藥速驗也主人乃聽用神寶丹續命湯安神膏日各三服頻與稀粥至夜驚不再潮翌日噯哺尚困是中脘有食脾胃有風主人曰何知也答曰噯者有食困者有食有風當用宣風散汁調下紫丸子令微利再用神寶丹安神膏琥珀散日各二服調治三日時與稀粥止奶至五日全安主人曰慢驚風何能復生答曰病雖至困神清而不昏肚痛而手足常溫驚搐無痰喘氣微熱是胃氣未脫經曰胃者水穀之海主稟四時故皆以胃氣為本此子病雖至危而胃氣尚未脫可以復生也蘇氏子半年自生下時即缺乳一日吐而身熱召愚視曰心者精神之本清虛不欲昏不可昧昏昧則氣濁氣濁則神亂神亂則血脈不榮冷者血脈俱虛精神離散不可治主人曰何便不治答曰緣見兒目解而囟腫面白而唇青兼繞口鼻人中肉內隱出黑色是精神散失素問云得神者昌失神者亡設或苟安猶若輕漚浮水暫駐目前豈真能久微燭乘風其不亡者何待主人大怒後易數醫果驚而卒大便青臟冷也或初出微黃良久則青者亦然也靈秘云瀉下如藍靛胎中受積驚蓋惟心主驚心驚則膽怯膽者與肝為表裡也膽怯則肝冷肝傳脾受邪故大便初出微黃脾之色也良久後青肝之本色肝熱則外發目赤肝冷則內作便青又有不因驚而得此證者蓋稟胎氣怯弱內受風寒故也有便青夾白膿稠黏如涎者亦是腸寒久冷則令兒面白形青腹痛驚啼失治則變陰癇也凡慢驚風候若是急驚傳來而尚陽證其陽既虧不必回陽又不待治陽只可截風而調胃均平陰陽陽可冷可熱可緩可急是也若直便為服附子硫黃之屬使陽歸陽又是急驚學者理宜知之既治陽證傳作陰證即與服保命丹三二服兼前牛黃清心丸子其有四證且八候稍緩疾陰癇者即與服之若已傳過八候不作四證尚在者只宜與服定命飲子若腳手冰冷者乃四逆候方可回陽次第閤眼者即傳作慢脾風候塞而驚風痰涎壅盛搐搦不止不可下者宜與五靈膏脂丸其痰壅盛口角垂者白姜丸功效驚風搐搦身體雖暖風痰不化宜服天南星丸嬰孩所受此等證候無他疑者只將下項用藥無不蘇省切不可延久其陽易化陰氣漸盛藥力不及使人難治又不可一向連並投藥每次一二服了須審察證候緩急有無傳變稍覺寬定其藥放慢或勢漸緊宜以次第緊急藥與服不可一藥帶一藥又不便換湯餌連並與之所謂察其輕重審其進止而後已慢驚若是急驚傳來是知前人不曾截風定搐陽脫而傳陰陰重陽虧其風與熱惟流縱經絡又有曾服大寒涼之藥過多又有下積取瀉致作又有臟腑虛寒洞泄而為其所受多端理慢驚當知陰癇之脫其證屬陰臟寒氣虛尚或泄瀉不止且驚正作多因無識之人一向治驚更不理瀉藥用寒涼投之令氣愈虛泄瀉不止陰證愈作驚搐愈增若用止瀉藥稍熱八候復加四證不退慢驚雖曰難治蓋醫亦不曾究竟病作加進深為重害慢驚當察知所視為要眼睛昏定為重竄視為重四肢厥冷為重睛定不眨為重雖眨不左右顧為重汗出如流亦重面忽作黔黯色至重感風搐搦慢驚眼在半開半合之間者乃知陰氣所盛傳入臟間陽氣已虧脾經屬陰次第入脾故言慢脾風候醫慢驚與急驚風候自是不同未可一向下定搐藥急驚謂關竅不通故以腦子麝香藥通稍定其搐搦慢風陰重陽虧諸經已虛不宜通關又涼其臟易作慢脾風醫慢驚不可爭攻急驚陽癇稍易理慢驚陰證最難服藥已愈而尚虛乏未省三五日之間者有之俗謂過街候發無定論不可輕易妄劑投之攻擊則前功俱喪慢驚所治之理須究問原因所發若是急驚傳陰為慢驚者乃癇所作陰癇也當察陽氣為重即陽脫而陰盛小兒有長幼之別臟腑有虛實之分有瀉三五次便成風候乃由虛之盛也或二三日泄方成風候或有五七日瀉不止而成風候暴瀉成風猶可速治蓋回陽調中補氣之為易若久瀉漸傳成風候者為虛為乏故難療理嬰孩小兒洞泄成風以補藥治之宜用附子臟寒洞瀉或因服藥下積取瀉成風宜以溫脾壯氣藥調之宜服觀音散全蠍散有服寒涼藥成風下藥太涼致令臟腑先寒遇發藥吐瀉即傳成風候以助氣醒脾藥溫之即王氏大惺惺丸大喝起散與服之效若手足冷回陽宜朮附湯效陽癇傳作陰癇者急驚傳作慢驚風候以截風藥定搐藥若在前三者慢驚候便以截風往往未為當蓋由病自虛得之所以云調補之理慢驚之候其意在慢急驚之候其意在急何也且急無過因熱生風作驚跌撲作驚他物觸之作驚驚熱傳極即變生風搐搦等候皆熱所乘若順證依法下之諸候自息慢驚所作不常當宜省察用意仔細所至療為難以故宜消息為之慢也不可愴惶恐懼失治躊躇疑二之為慢也又曰慢驚無爭攻蓋所至療為難事嬰孩所患急驚慢驚慢脾三者皆由風痰所作以漸傳及未有初得病而便慢脾者或急驚傳來或吐瀉而得或久利氣虛脫而得傷寒表裡既虛傳入陰證亦成慢候久嗽成癇亦傳慢候霍亂吐痢亦傳慢候脾困久睡亦作慢候吐血亦傳慢候蟲積衝心亦傳慢候肝風筋急大小便閉心虛煩躁煩渴引飲腹痛吐瀉睡里咬牙日夜汗出走馬疳急諸般丹毒龍纏腰膀胱吊疝卵腫莖曲四體浮腫以上諸證皆傳慢候有如此者其所患諸疾皆能作慢驚乃傳作慢脾脾氣既絕胃氣已盡無可得而治療故也嬰孩五臟易冷易熱易虛易實醫方並不治腑受病曰脾不病耳曰非也小兒在腑有疾自息愈者有之在臟不可不治臟者陰屬腑者陽屬謂小兒先陰而後陽又曰小兒乃純陽之氣在腑則順在臟則逆故前賢皆理其臟未言治腑也又腎一臟常主虛不可攻療若有腎臟但清心肺緣心與腎既濟也肺與腎乃子母也無與腎藥及諸補藥若治腎臟即他病發生故戒止不可療湯氏曰吐瀉才生便噁心胃虛脾弱汗相侵舌出唇緋雙睛閉捶頭髮穗起如針喘悶氣粗兩脅動口生瘡白命難任未生此證宜先治有瘡胃閉命須沉未發慢脾先要困夢中吐舌更搖頭吐奶作腥生氣息額頭千顆汗珠流睡里多驚驚哭起面黃脈細最堪憂醒脾助胃成功效傷奶依前命也休凡有此疾宜暫斷乳控令胃干飢甚當用藥令乳母釀其乳與之十救一二矣全嬰簡易方云驚風似是而非若同而異受證非一治法不同此病之惑人也醫者當首辨明而治之宿州陳氏曰驚風二證驚自驚急驚慢脾也風自風五臟中風也當分別治之世言熱極生風而不知風寒暑濕之氣亦能生風錢仲陽云傷風傷寒傷食麻痘變蒸等候亦能搐所謂斷搐者是也陳氏曰醫者每見小兒發搐不辨是否驚風用蜈蚣腦麝牛黃巴粉等寒涼毒劑多致夭傷或成慢候蓋真氣者元陽也如用藥性溫則固養元陽用藥性冷則敗傷真氣宜用溫涼之劑則無過與不及楊氏曰驚風暴烈惟蜈蚣能截能擒貴乎藥病相當辨認的是驚風之證方可用之或一字半字而止或傷風等證假搐不可妄投中毒非淺或有誤焉急以桑白皮蚯蚓為解錢氏湯氏胡氏楊氏辨云傷風傷寒熱盛生驚必有傷風傷寒之證但牙關不緊麻痘搐及熱乘於心心火炎上故目瞪上竄乃痘證欲出之狀心中缺冷耳後紅缺乃四臟之證但無痰潮食積發搐必有面黃吐利夜熱晝涼等證變蒸微搐但唇上白珠生厥多似慢驚但唇口紫吐清涎癇者四肢柔軟發而時醒痓病一身強直終日不醒痙則舉身強直痓則手足冰冷剛痓無汗柔痙有汗中風口眼喎必有五臟中風之證天吊或啼或笑狀似鬼祟頭目仰視如魚上鉤內吊傴僂反張唇黑陰腫眼有紅筋血斑客忤物忤中惡面變易五色狀似驚癇但目不上視楊氏曰慢驚本無熱乃虛熱也當用藥以溫之又曰才經吐痢便是慢驚由虛使之須用溫中扶里抑陰助陽用理中湯加木香錢氏云夏月脾胃伏熱當解暑毒不可便曰回陽楊氏曰方傳慢驚當有八候竄視反張搐搦掣顫也但昏沉者不可回陽宜調胃截驚可涼可熱均平陰陽而已用全蠍觀音散又曰若陽虛陰盛病已傳過無搐掣反視之證昏沉者用四君子湯加附子三分病之重者對加又曰手足冰冷方可回陽用附子理中湯慢驚下痰用蘇合香丸白丸子又曰若眼半合半開手足不冷不可回陽其證尚在慢驚用調中湯參苓白朮散或用實脾散楊氏截驚用太乙保生丹或用奪命丹柳氏曰凡吐瀉氣虛體弱者調胃用實脾散研服奪命丹以截其驚方實脾散治脾胃虛冷吐痢不止不進乳食慢驚慢脾等證及治痘證下痢不能收澀者人參白朮白茯苓縮砂仁各五錢丁香二錢木香炮二錢麥芽石蓮肉曲餅陳皮去白山藥良薑油炒青皮去白冬瓜仁各五錢肉豆蔻三個煨薏苡姜炒三錢香附子炒去毛三分扁豆姜炒三錢甘草炙三錢陳米一撮炒上為細末常服棗湯調或米湯燒鹽調服吐痢脾胃虛弱加消積飲同服慢驚慢脾手足厥冷加附子理中湯同服下回陽丹吐痢加附子訶子肉慢驚慢脾研奪命丹同服蘆薈散治小兒慢驚風胸膈痰涎咽喉壅塞身體壯熱筋脈拘急時或發渴蘆薈研龍骨雄黃研麝香研各半分胡黃連青黛研木香丁香牛黃研天竺黃熊膽研乾蠍炒膩粉研丹砂研犀角鎊附子炮製去皮臍人參沉香各一分上搗研為散每服半錢薄荷湯調下牛黃丸治小兒慢驚風及治風涎積聚牛黃細研甘草炙微赤銼陳橘皮湯浸去白瓤焙黃連去須天南星炮製白附子炮製附子炮製去皮臍乾蠍微炒半夏湯洗七次去滑犀角屑硇砂細研硃砂細研各一分水銀半兩燒棗瓤一處別研星盡金箔二十片細研硫黃半兩細研麝香半分細研巴豆十枚去心皮殼別研壓去油上為末都研令勻以麵糊和丸如黍米大每服以甘草薄荷湯下三丸至五丸烏犀散出聖惠方治小兒慢驚風或發即戴眼向上手足搐搦烏犀角屑一分獨角仙三枚微炙去翅足驢胎耳一分燒灰雀兒飯甕五枚乾蠍一分燒灰白殭蠶一分微炒硃砂一分細研雄黃一分細研丁香一分蠶紙一張出子者燒灰麝香一分細研牛黃一分細研羌活半兩青黛一分細研天竺黃一分細研上為散都研令勻不計時候以溫水調下半錢量兒大小加減服之龍腦散出