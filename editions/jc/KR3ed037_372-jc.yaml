body:
  text: 卷三百七十二嬰孩驚風門慢脾風附論小兒生下中慢脾風候時吐嘔頻咬牙手足掣瘲舌卷頭低兩眼上視先頭低而次第高此候久瀉痢而下冷藥只止瀉痢不得活脾是以脾虛弱臟腑乘虛故此所治先用均氣散調一日後便下一醉膏下後困治脾散夾鎮心丸建脾散常服之即愈若更喘吐咽哽角弓反張死候不治小兒慢脾風候是傷寒疹子庸醫未明表裡便即宣利臟腑更使冷熱藥相通故小兒眼不倒脾困極不省手足不收此病但回陽醒脾調治方愈若更吐瀉必定損命也曾經吐利不止損傷脾胃或慢驚之後病已傳極總歸虛處推脾所受故曰脾風若逐風則無風可逐若治驚則無驚可治但脾間痰涎虛熱往來爾其眼合者脾困氣乏神志昏迷痰涎凝滯然耳所謂慢驚難治者慢脾風是也一名虛風凡小兒或吐利之後面色虛黃大勢虛損若因虛而發熱即傳慢脾矣才見搖頭斜視以手摸人昏迷喜睡額上汗多身亦黏汗其聲沉小而焦是脾風之證未必皆由急慢驚風傳次而得醫者詳之三關紋紫絲或青絲或黑絲隱隱相雜似出不出其證面青額汗舌短頭低眼合不開搖頭困睡常常吐舌頻嘔腥臭噤口咬牙手足微搐而不收或身冷身溫而四肢厥脾氣困乏神志昏迷虛熱往來痰涎凝滯治法大要醒脾回陽黑附湯川烏散生附四君子湯靈砂若眼半開半合手足不冷尚在慢驚不可回陽或已傳慢脾陽氣未脫服姜附回陽之劑手足漸暖宜漸退回陽熱劑以醒脾等藥調理慢驚慢脾危惡之證可畏而大沖有脈眼中睛光瞳人動活囟門未陷面色不至黯黑襯腳知癢猶可用力即灸百會次服附子理中湯研回陽丹同服之百會穴取前後髮際至頂門折中又取兩耳尖至頂門折中是穴用線量之艾炷麥子大或五壯七壯慢脾風候兒病至此所以難醫蓋由其證為驚與風傳經已極總歸虛處惟脾所受故不曰胃風胃屬陽其病即傳陰臟故無胃候兒既尚有胃氣可以一向生胃兼與回陽即漸蘇省若更欲攻擊驚風脾亦不受而又傳散諸經不可得而加藥若見眼合即是脾風宜服下項藥治慢脾風乃是不得已而設其疾危如燈無油漸見昏滅錢氏所用金液丹及青州白丸子各半細研和勻飯後薄荷湯下一錢半錢許此乃截風回陽一方四君子湯加黑附子末四分之二腳手冰冷者可和對半生薑棗子煎為服此方古人用之豈不周常所錄下項良方亦盡世之善也治慢驚慢脾須禁腦麝膩粉水銀粉霜之類及寒涼動臟等或以燥熱俱不可用只宜回陽醒脾湯使與服慢脾風候十個孩兒有九個以艾灸之須當斟酌病候已未脈絕之理若一臟絕即不可用藥調如眼無光指甲四肢垂軃五體俱冷不可勉強用藥慢驚慢脾欲絕之時虛痰上攻咽喉引氣粗大脈來浮數是謂陰盛強陽或誤認為陽氣已復又喉中有痰不識覆燈怦絕之證又行用藥痰隨氣下氣隨痰絕人以醫殺咎之茅先生小兒受慢脾風歌脾胃伏邪涎擁肺心生毒熱面青時如此呼為慢脾候更加喘嗽不通醫小兒形證論四十八候慢驚傳慢脾歌慢脾只因脾傷起吐瀉虛涎脾胃存四肢逆冷頻頻嘔沉困難醒豈易明唇紅目閉手微搐病行心臟及脾神醫者鎮心為上法更開關竅細詳論莫令加喘頭先嗽眼白矇矇命不存四十八候兼有虛涎下大青丹一二服更將搐鼻散開關次用醒脾散四十八候慢脾將死候歌驚入風癇傳在脾直視不動臥如屍搐搦已休牽掣定為他安好不生疑便無大小難收乳遍體若冰又若泥眼目不開常似睡睡中不覺赴幽明又四十八候慢脾侵肺歌慢脾多睡重記取口瀉傳脾胃傳虛逆冷四肢多重困虛涎脾伏盛難除生風肺臟添邪推任喚千聲總不舒其使目瞑兼項軟十中難保一人蘇方大醒脾散治脾風內虛昏迷不醒亦可釀乳全蠍焙白附子炮天麻炮甘草炙人參去蘆白茯苓去皮木香炮石菖蒲白朮陳皮去白南星炮石蓮肉肉豆蔻山藥各二分縮砂仁一分丁香一分上㕮咀薑棗煎服回陽加附子白殭蠶烏蛇丸出傳信適用方治小兒慢脾風及慢驚風白蛇一兩酒浸一宿天漿子二十個去殼天麻半兩乾蠍一分天南星半兩炮白附子半兩川附子一兩炮防風半兩半夏半兩洗七次方用以上並酒浸半日焙乾為細末入後藥牛黃硃砂麝香雄黃以上各一錢上並研膩以糯粥和丸如黃米大每服十丸不計時候煎荊芥湯下以風搐止為度鉤藤煎治小兒虛風鉤藤防風去皮芎藭天麻酒浸切焙麻黃去根節各一分荊芥穗蟬殼去土蠍梢炒各半兩白殭蠶十四枚炒薄荷心二十六枚酒浸焙龍腦麝香各一字研上搗研為細末煉蜜和成丸每服皂子大荊芥紫參湯下羌活膏出幼幼新書治小兒急慢驚風或因吐瀉後脾胃虛傳作慢脾之疾羌活獨活人參白茯苓肉桂木香防風以上各三錢水銀硫黃全蠍各三錢金銀箔各十片真麝香一錢上為細末蜜和為膏每服一黃豆大薄荷湯化下醒脾散四君子湯加全蠍陳皮木香白附子炮南星炮陳米川烏銼半夏曲上等分為末薑棗煎逐旋服急服則吐醒脾丸出十便良方治小兒慢脾風因吐痢後虛困昏睡欲生風癇厚朴白朮舶上硫黃天麻各半兩全蠍防風人參官桂各一分上為末酒浸蒸餅和丸如雞頭實大每服一丸捶研溫米飲下沉附湯出直指方治慢脾風厥冷吐瀉沉香丁香木香黑附子炮白附子焙全蠍藿香天麻各等分上為末每半錢炙甘草生薑煎湯調下身溫則去附子硃砂散出幼幼新書治慢脾風硃砂天麻各一錢殭蠶七個天南星一個白花蛇項下肉一塊皂子大麝香少許蜈蚣一條上為末每服一字薄荷湯下沒石散出幼幼新書治慢脾候此藥醒脾沒石子二個硃砂三錢滑石研白礬丁香各三錢半夏一兩生薑三兩捶爛同浸水一宿後將半夏擘碎又以水同煮乾取出以面一錢乳缽捶爛捏作餅子炙熟為末上為末每服半錢以冬瓜子煎湯調下不拘時候醉膏出幼幼新書治小兒慢脾風候花蛇鼻蠍尾天南星心川烏臍大附子側白附子耳蜈蚣蟲肚上各半錢生用以棗肉五十個和前藥研成一塊以腦麝滴水和丸如梧桐子大每服一丸用薄荷自然汁磨化下後通不可復補後用一串藥子調理銀白散出幼幼新書治小兒胃虛吐瀉煩渴成慢脾者乾葛人參去蘆白茯苓山藥白扁豆各半兩半夏一分湯洗去滑薑製成餅炒黃糯米一合淘盡薑汁浸一宿炒黃上為細末每服二錢水八分生薑二片同煎溫服丁沉散治小兒慢脾驚風似搐此名瘛瘲常似睡而四肢與口中氣溫合睡露睛或啼泣如鴉聲丁香沉香人參白茯苓白朮炒白扁豆上各等分為末每服半錢飯飲調下看大小加減白殭蠶丸出活幼口議治嬰孩小兒慢風候痰涎盛不化牛膽制南星一錢白殭蠶去絲炒錢子地龍五靈脂川者全蠍炒用前牛黃清心丸以牛膽制者一分半夏末用生薑汁浸各一錢上為末水煮半夏末糊丸麻子大每服三十丸煎金錢薄荷湯下一方薑湯下脾家有風乃虛所致驚搐所由生也痰涎是故作也陰癇不暴其實駭醫若以沖烈之味投之愈見害重誠為不可所以禁卻腦麝通利關竅之藥悉無利益治法所宜者即今選用妙方賴以活人白殭蠶一味去痰尤能截風既已傳入慢脾則風痰混致驚熱交臨醫工看候用藥當權緩急決其可否候未脫去陽者直宜與服之若陽虧陰盛至危至急候變非常精神色脈俱足駭人者當服下項良方一方無南星鉤藤飲子出幼幼新書治嬰孩小兒因吐瀉體虛發搐作慢脾魚口眼直視睡不醒目不開鉤藤防風麝香麻黃各一分去節用蠍梢蟬殼各半分上為細末每服一字半錢一錢大小加減薄荷湯調入醋一滴調勻服如四梢厥逆入附子三兩片同水五分薄荷一葉煎二分熱服連進三二服或吐瀉體冷多睡用附子半錢炮去皮臍為末或作銼散白朮一錢白豆蔻一個甘草炙一寸棗一個水八分慢火煎至三分溫服作兩服體便暖只煎四君子湯加入沉香橘皮吃五六分更吃暖驚藥三兩服乳母忌口不再驚黑附湯出活幼口議治慢脾痰盛四肢逆冷黑附子炮取末二錢重白朮一錢南星炮一錢甘草炙一錢半夏湯洗七次一錢上㕮咀每服二錢水一小盞生薑三小片棗一個煎至半盞去渣通口以時時與服所覺手足暖其候漸省藥即止之朮附湯出古方集成治慢脾風身弓髮直吐乳貪睡汗流不已大附子一個炮白朮一兩煨木香半兩甘草半兩肉豆蔻一枚麵煨上㕮咀每服二錢水半盞姜三片棗一枚煎服辰砂膏治慢脾冷痰壅滯手足冷而微搐黑附子一枚八錢重者去皮臍頂上刻一孔入辰砂一錢用附子末塞之以炭火燒存性南星炮半兩白附子炮川五靈脂蠍梢各一分上為末煉蜜和丸如梧桐子大每服一丸生薑汁泡調下白殭蠶丸治慢脾陽未甚脫者可用亦能截風方見本門慢脾風類厚朴去粗皮以水一盞煮盡後細切焙乾白朮湯浸半月切片子用蜜炙香黃色硃砂各一分麻黃半分長直者以熱湯浸軟用薑汁浸半日乾蠍七個尾梢全者每個用大葉薄荷裹上用浸者麻黃纏了微以薑汁再浸以竹箸上炙令表裡焦黃色上並搗羅極細再入乳缽內與硃砂研千百遍每服半錢或一錢煎金錢薄荷湯調下但小兒服藥後微汗出是效凡小兒欲作慢驚必先壯熱多睡頻吐若吐即驚止不止定作慢驚為難治吐證以金液丹研令細滴水為丸黃米大用硃砂青黛為衣每服五十丸以上以下不濟事用米飲下定吐救生丹亦甚佳然十有三四不能止者此方百無一失者但費心力耳不然十有八九不救此二方不可具述千萬秘之非至誠好事者不可妄傳丁香餅子丸出幼幼新書治小兒吐瀉後生風慢脾者及久瀉亦治胃虛丁香五十粒藿香葉一分木香韶粉大附子炮各一棋子大一云各二錢上為末攪勻生薑自然汁作餅子用粗燈盞內水煮軟化開服或要急用作餅子入棗子一枚煎大白再生丸治小兒慢脾驚風似搐此名瘛瘲常似睡而四肢與口中氣溫合睡露睛或啼泣如鴉聲陽起石煨浸酒釀生硫黃南星炮大附子炮去皮臍上等分為末用蒸餅為丸如綠豆大陳米飲下五丸至七丸更量兒大小加減服之治小兒慢驚風吐乳霍亂吐瀉出幼幼新書丁香一錢藿香三分上為細末煉蜜和丸如綠豆大每服三丸或大段吐瀉水飲下半錢治脾風出楊氏寶書附子炮二錢蠍七枚白附子三個炮南星炮二錢上為末每服半錢水八分盞生薑一片冬瓜子仁五粒擘破同煎至五分量兒大小加減黑附湯出危氏方治慢脾風面青額汗舌短頭低眼合不開睡中搖頭吐舌頻嘔腥臭口噤咬牙手足微搐不收或身冷或身溫而四肢冷其脈沉微陰氣極盛胃氣極虛十救一二蓋由慢驚之後吐瀉損脾病傳已極總歸虛處惟脾所受故曰脾風若逐風則無風可逐若療驚則無驚可療但脾間痰涎虛熱往來其眼合者脾困氣乏神志沉迷痰涎凝滯而然爾世所謂慢風難治者慢脾風是也附子炮去皮三錢木香一錢半白附子一錢甘草炙半錢上銼散每服三錢水一盞生薑五片煎取一半以匙送下若手足暖而蘇即止醒脾散治小兒吐瀉脾虛生風天南星一個重七錢者去心入縮砂一錢丁香一錢南星內上面卻用南星心末封口慢火煨熟切碎藿香葉人參白茯苓各一錢上為細散每服半錢入冬瓜子仁少許同煎至三五沸溫服治小兒慢脾風眾醫不效用此藥瘥附子炮製去皮臍木香不見火懷干肉豆蔻洗生硫黃去漿水煮黃煮赤者不用其間夾石者須去上等分為細末每用冬瓜子四十九粒水六合煎至三合入藥一錢再煎至一合為一服治身冷汗出至虛緩搐者醒脾虛風出幼幼新書大附子一錢去皮臍炮大全蠍七個大白附子三個炮天麻二錢上為細末每服半錢濃煎冷冬瓜仁