九竅壅聚痰塞經絡關膈不通潮涎灌心眼目翻騰頭項仰強赤蜈蚣一條酒炙滴乳香一錢別研天竺黃二錢半臘茶二錢雄黃二錢別研甘草二錢炙荊芥穗一錢炒白礬一錢煅綠豆半生半炒上為末每服半錢每一歲一錢煎人參薄荷湯調下天麻丸治小兒天瘹眼目翻上手足抽掣發歇不定天麻末硃砂龍齒鉛霜天竺黃以上各一分射香半分五味並細研白芥子微炒一分天漿子七枚上為末煉蜜和丸如黃米大不計時候以薄荷湯研下一丸稍急加三丸或五丸立效牛黃散治小兒天瘹眼目喎斜手足驚掣發歇不定牛黃細研乾蠍生用各半分木香一分羌活獨活白殭蠶生用硃砂細研水飛過各半兩乳香一顆如粟米大上為末羅為散同研令勻不計時候以干槐枝煎湯調下一字量兒大小加減服之胡黃連丸治小兒驚風天瘹並一切疳痢胡黃連半兩肉豆蔻去殼一枚檳榔微炒紅雪訶梨勒煨去殼密陀僧丁香各半兩上為末麵糊和丸如麻子大每服三丸至五丸空心米飲下心疳黃連湯肺疳米飲脾疳羸瘦紅棗湯食疳吐血生薑湯驚疳瀉血鹽湯肝疳自皮中生瘡甘草湯骨疳冷地臥食泥吐紫筍茶湯氣疳脹橘皮湯下一方入麝香一分和勻牛黃膏治驚風天瘹白附子蠍鬱金雄黃各一分蟬蛻六十個膩粉半錢巴豆肉一分水浸一宿上研極細蜜和丸入腦麝各少許每服皂子大薄荷冷水下硃砂丸治小兒天瘹心神煩亂搐搦不定硃砂細研白殭蠶微炒胡黃連熊膽各一分牛黃麝香並細研各半兩乾蠍二七枚微炙上為末同研令勻以粟米飯和丸如綠豆大不計時候以金銀薄荷湯下三丸量兒大小加減服之定命丸治小兒慢驚風天瘹撮口搐搦奶癇壯熱困重一名定命丹蟬蛻散利驚治驚風天瘹搐搦奶癇心熱夜啼驚癇蟬蛻六十個去土足翅荊芥穗一兩甘草半兩蜜炙大黃半兩紙裹煨黃芩半兩生用蠍梢五十個去毒上銼散每服二錢水一盞白茅根溫服夜啼蟬蛻疹瘡紫草得利止木香丸治驚風內瘹肚痛驚啼木香沒藥舶上茴香炒鉤藤等分全蠍乳香各半兩上先乳香沒藥別研次入諸藥末合畢大蒜少許研細和丸桐子大曬乾每服二丸鉤藤湯調下蕓薹散治小兒瘹氣治腹肚瘹蕓薹子炒蓬莪朮炮茴香炒青橘皮去白甘草炙以上各一兩木香炮一分上為末每服半錢用鹽酒熱調下抵聖丹治天瘹胸膈不利乳食不下急驚風錫吝脂一兩細研水飛淘去黑水令盡牛黃鉛霜熊膽各一分並細研麝香蟾酥一錢研上研勻粳米飯和丸如黍米大每服五粒至七粒新汲水下牛黃散一名清心散治天瘹清心截風牛黃半兩細研硃砂細研水飛麝香細研各一錢鉤藤蠍梢各為末天竺黃研一分各半兩上研勻每服一字新汲水調下膩粉丸治小兒天瘹臟腑風熱壅滯四肢抽掣大小便不利膩粉巴豆霜麝香細研各半兩鬱金地龍馬牙硝各一分上研令細以糯米飯和丸如綠豆大一歲一丸以薄荷湯下三歲以上即服二丸牛黃丸治小兒天瘹牛黃硃砂鉤藤各一分末蟾酥麝香蝸牛去殼十枚上研令細以糯米飯和丸如黍米大不計時候先以水化破二丸滴在鼻中相次即以溫水更下三丸量兒大小加減服之保生定命丹治小兒天瘹四肢抽掣眼目戴上精神恍惚皮膚乾燥身體似火夜臥不安心中煩躁熱渴不止宜服此藥光明砂研水飛過水銀煮棗肉研令星盡各一兩膩粉牛黃腦麝金箔四十片上研細粉入水銀更都令研勻用粟米飯和丸如麻子大三歲兒每服用新汲水研破三丸服之三四歲兒每服五丸不計時候量兒大小以意加減服之鉤藤飲治天瘹潮熱鉤藤人參去蘆犀角屑各半兩甘草炙半分全蠍天麻各一分上為末每服一錢水半小盞煎至一半去滓服赤靈丸治小兒瘹癇病急慢諸風丹砂研水飛人參為末各一兩酸棗研二兩白麵二錢乳香研半兩上和研令勻用生蜜和膏入新竹筒內以油紙封扎定坐飯甑上炊候飯熟為度分作三十丸每一丸分四服薄荷湯下化更量小兒大小以意加減麝香散治小兒驚風天瘹小兒卒然驚悸眼目翻騰壯熱不已四肢抽掣上仰如釣縛之狀名曰天瘹乍作乍止此風熱痰涎之所發也良由乳母恣啖五辛熱酒之類毒熱氣流入乳中因即乳兒兒飲乳臟腑風熱脾胃生涎痰涎既生心肺壅滯不得宣通致令心神不安為天瘹之病麝香研膩粉研牛黃研乾蠍去土炒白附子炮各一分上研極細每服一字薄荷湯調下早晚各一服乳香丸治驚風內瘹腹痛驚啼雞心檳榔一錢半乳香半錢沒藥沉香各一錢蠍梢十四個上為末煉蜜和丸如梧桐子大每服二丸菖蒲鉤藤煎湯調下靈花歸丹治感厥急風心邪癇疾小兒天瘹驚風及疳熱等病蛇黃四兩紫色者佳用火煅令通赤取出以紙襯地上出火毒一宿杵羅為末更入乳缽研如面獖豬糞二兩野放小硬者用瓶子固濟燒煙盡為度勿令白過恐藥劣候冷研令細硃砂半兩鐵粉一兩麝香一錢研上乳缽內同研極細以糯米粥為丸如雞頭實大一切風用薄荷湯酒磨下一丸小兒半丸疳熱用冷水磨下一丸分作四服修合時忌婦人雞犬見如是大人小兒中風口噤反張涎滿者灌下一服立醒小兒被驚急發熱並以薄荷煎湯化下此藥又名神冗丹合子挑漆盤內於日下曬之及干翻看每丸下有一小穴通丸內其藥中空也舊法須用端午及甲午日合急即不須靈砂丹治眾疾及小兒瘹風硃砂半兩大附子炮青橘去白杏仁去皮尖各一兩巴豆春冬用一百個秋夏用五十枚以水五升慢火煮三十沸上先將巴豆以水五升煮令油出水盡為度細研與眾藥末和勻以粳米飯和為丸如豌豆大小兒瘹風桃柳枝一握煎下小兒肚脹石榴湯下小兒及患人相度虛實加減服一方用乾薑一兩炮南星丸治小兒天瘹口噤戴目手足搐搦不定天南星天雄白附子水銀於銚子內先熔黑錫半分後下水銀結為沙子細研半夏湯洗七次去滑各一分上為末用槐膠和丸如黃米大一歲一丸三歲三丸不計時候以溫薄荷湯化下治小兒天瘹多涎搐搦發歇不定乾蠍微炒羌活鉛霜細研各半兩麝香細研一錢蟾酥研入半錢上為末同研令勻煉蜜和丸如綠豆大不計時候以薑汁研破兩丸服之更量兒大小以意加減茴香散治四十八候茴香炒蕓薹子各半錢田螺殼二錢甘草三寸炙川練子一分用肉上為末每服半錢煎沉香湯調下木香湯亦得治小兒天瘹牙關急硬筋脈搐掣乾蠍七枚生用硃砂一分細研麝香牛黃各細研猢猻頭骨塗酥炙黃各半分上細羅為散不計時候用新汲水調下半錢極者不過三服瘥量兒大小以意加減服之一字散治小兒天瘹四肢拘急時復搐搦喉內多涎夜即驚厥宜服天南星炮製蕎麵研入各一分壁魚兒十枚半夏七枚生用酸石榴殼一顆上為末入在石榴殼內以鹽泥封裹於灶下慢火燒以泥乾燥為度取出去殼焙乾搗細羅為散如孩兒小只用一字以乳汁調灌之一歲以上用酒調一字服汗出為效殭蠶散治天瘹白殭蠶炒馬牙硝研鬱金乾蠍去土炒各半兩上搗研為末每服一字乳汁調服甚者半錢不計時候治小兒天瘹驚風搐搦牙關緊閉目吐涎天竺黃雄黃胭脂各一分阿魏半分上同研為末以醋一茶碗煎成膏入蛜𧌴天麻烏蛇末各半分和丸米粒大不計時候溫酒下三丸乳汁下亦得量兒大小加減服之治小兒天瘹多涎搐搦發歇不足天竺黃硃砂各細研乾蠍微炒白附子炮製各一分上為末同研勻以煉蜜和丸如綠豆大不計時候以淡竹瀝研下二丸量兒大小臨時加減治小兒天瘹臟腑風熱壅滯四肢搐掣大小便不利巴豆霜一分乾蠍微炒藿香白殭蠶微炒各半兩上為末以麵糊和丸如綠豆大三歲以金銀犀角煎湯下一丸如無動靜更服兩丸下惡物炲煤及瓜汁相似便瘥量兒大小加減服之一字散治天瘹醒風爽精神天南星半兩微炮製蟬殼一分微炒白殭蠶乾蠍各一分上為細末次入蕎麵一分用酸石榴殼一枚將諸藥入在石榴殼內以鹽泥封裹於灶下慢火燒之泥乾燥為度取出再研勻每服一次溫酒調下歸命丹治小兒天瘹多涎及搐搦不定水銀一分以小棗肉研令星盡牛黃麝香各半分錫吝脂一兩細研水淘黑水令盡上細研用軟粳米飯和丸如黍米大不計時候以新汲水下二丸量兒大小增減服之治小兒天瘹及驚風永不發方鸛鵲糞微炒牛黃細研半分乾蠍五枚微炒麝香一錢上為末不計時候新汲水調下半錢量兒大小加減服之蚱蟬散治小兒天瘹眼目搐上筋脈急蚱蟬微炒牛黃雄黃並細研各一分乾蠍七枚生用上為散不計時候薄荷湯調下一字量兒大小加減服之治小兒天瘹臟腑壅滯壯熱搐搦五靈脂一兩白附子生用南星生用各一分上為末以頭醋一升熬成膏後入蝸牛末二錢麝香一錢和丸如綠豆大每服一丸以乳汁研破服之如無乳汁即以金銀湯下入口瘥保生丸治小兒天瘹臟腑壅滯壯熱搐搦巴豆七枚生用去皮心天南星一枚炮製蛜𧌴五枚生用上將前藥清明時初夜於北極下露之一宿明旦搗羅為末取豉四十九粒口內含不語脫卻皮爛研和丸如黍米大隨年丸數以溫水下殭蠶散治小兒天瘹及急驚風搐搦白殭蠶一枚微炒蛜𧌴一枚微炒莨菪子一枚微炒令黃上細羅為散用溫酒調注入口中令睡汗出即瘥如睡多不用驚起如一二歲患急即頓服之稍慢即分三服玄參丸治小兒天瘹驚風搐搦牙關急閉目吐涎玄參水銀各半兩乾蠍一分微炒上為末以棗穰研水銀星盡內少煉蜜用藥末和丸如綠豆大三歲以下用薄荷湯破研三丸服之三歲以上即加丸數服定命散治小兒天瘹驚風不能哭泣藜蘆鬱金川芎各等分上為細末鼻中滴㗜之如哭可醫鬱金散治小兒天瘹急驚風盛熱治天瘹翻眼向上硃砂通明者三綠豆大乾蠍一個全者銚內炒過上為細末以飯少許和丸如綠豆大患者用硃砂少許細研入酒內化下一丸頓愈塗囟法治小兒天瘹驚風草烏炮亦作川烏蕓薹子等分上為末用新汲井水塗囟頂上雙金散治天瘹驚風目久不下眼見白睛兼角弓反張聲不出者蜈蚣一個去頭足尾真酥塗慢火炙黃置砧子上面南用竹刀子當脊縫中停割作兩個左邊者入一貼內寫左字右邊者亦入一貼子內寫右字不得交錯大誤矣麝香一錢細研分二處先將左邊者同入乳缽內研作細末卻入在左字貼內收起別用乳缽將右邊字者入麝香同研極細卻入右字貼內不得相犯收之每有病者眼睛上吊見白睛兼角弓反張更不出聲者上以細葦筒子取左字貼內藥少許吹在左邊鼻右亦如之用藥不可多若眼全未下更添些少其眼便下即止治小兒天瘹眼目搐上並口手掣動宜服此方用壁魚兒一十五枚乾者五枚以奶汁相和研爛更入奶汁用灌入口立效南星散治小兒天瘹用天南星大者一枚掘地作坑安瓦子一片先用火燒赤後放天南星於熱瓦上用酒半升傾天南星上即以盞子蓋之候冷銼搗羅為散每服一字溫酒調下二歲以下以乳汁調
