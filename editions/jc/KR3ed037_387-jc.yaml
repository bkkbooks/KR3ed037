body:
  text: 卷三百八十七嬰孩咳嗽喘門總論夫咳者謦咳之咳俗謂之嗽肺主氣形寒飲冷傷之使氣上而不下發而不收衝擊咽膈令喉中淫淫如癢習習如梗而咳也甚者連連續續不止坐臥不安引動百骸聲聞內外矣皮毛者肺之合也皮毛受之寒氣從其合內外邪客之為嗽也楊氏曰肺為嬌臟外主一身之皮毛內為五臟之華蓋形寒飲冷最易得寒燥氣鬱蒸最易生熱為其易為冷熱而成咳嗽痰塞胃脘氣逆不下衝擊動肺與夫肺實肺虛皆能壅痰而發嗽也其證感風者鼻塞聲重停寒者涕清怯寒挾熱則焦煩受濕為壅滯瘀血則肺間腥悶停水則心下怔忡或實或虛痰之黃白唾之稀稠可知也治嗽之法肺脈實為氣壅內熱而清利行之肺脈濡散為肺虛宜補肺以安之其間久嗽曾經解利以致肺胃虛寒飲食不進則用溫中助胃加以和平治嗽之劑調理然諸氣諸痰嗽喘之類雖用枳殼為佐此藥不獨寬中最能行其氣氣下則痰下他證自平矣且嗽者肺感微寒八九月間肺氣大旺病嗽者其病必寒實非久病也其證面赤痰盛法當以葶藶丸下之若久者不可下也十一月十二月嗽者乃傷風咳也風從背脊第三椎肺愈穴入也當以麻黃湯汗之有熱證面赤飲水延熱咽喉不利者宜兼甘桔湯治之若五七月間其證身熱痰盛唾黏者以褊銀丸下之有肺熱者咳而後喘面腫欲飲水有不飲水者其身即熱以瀉白散瀉之若傷風咳嗽五七日無熱證而但嗽者亦葶藶丸主之後用化痰藥有肺虛者咳而哽氣時時長出氣喉中有聲此久病也以阿膠散補之痰盛者先實脾後以褊銀丸微下之涎退即補肺如上法有嗽而吐水或清綠水者以百祥丸下之有嗽而吐痰涎乳食以白餅子下之有嗽而咯膿血者乃肺熱食後服甘桔梗久嗽者肺亡津液阿膠散補之而痰實不甚喘而面赤時飲水者可褊銀丸下之治嗽大法盛即下久即補之更量虛實以意增損東都藥鋪杜氏云上歲自十月病嗽三月未止始得嗽而吐痰內外風寒肺病嗽而吐痰風在中故也宜以麻黃輩發散後用涼藥壓之即愈時醫與鐵粉丸半夏褊銀丸諸法下之其肺即虛而嗽甚咳嗽屬肺經所主氣外屬皮毛腠理凡諸牙兒嬰兒日夜切與保持毋令風吹腦囟背腠致使肺受寒邪咳嗽不已作熱多痰若被風吹即日感受次第傳之五臟虛處即所任入蓋初生兒氣微以得傳變良由頓動五臟有傷和氣五臟不和三焦不順故有傳變是以我生於一腎水也腎主虛邪生我在五脾土也脾主食吐逆虛痰四肢唇口我生於三肝木也肝主風癲癇眼目克我則二心火也心主驚恐悸頑涎血脈䑏臉其嗽傳受或吐或嗽痰涎或厥冷或恐悸至眼目兩眶黑紫如被物傷或重發癇古人云久嗽成癇謂藥力不及候已傳過難可療理預當告之儒門事親誤中湧法張板村鹿子春一小兒八歲夏月病嗽羸甚戴人欽湧之子春以為兒幼弱懼其不勝少難之一日固飲酒家人與之酒傷多乃大吐吐定而嗽止蓋酒味苦屬湧劑子春乃大悟戴人之言也咳嗽附論夫小兒咳嗽者由風寒傷於肺也肺主氣候之皮毛而俞在於背小兒解脫風寒傷於皮毛隨氣入於肺肺感微寒則咳嗽也故小兒恆須令背暖夏月亦須著單背襠若背冷得月內可治百日外嗽者十中一兩人瘥矣方疹後咳嗽最未易治加減方出永類鈐方人參白朮煨白茯苓桔梗炒防風淨細辛枳實炒款花蕊杏仁炒五味子粉草炙製半夏升麻上各等分生薑桑白皮煎服治百日內咳嗽出如宜方宜天南星末薑汁調敷囟門又宜人參消風散薑汁調敷囟此病蓋因乳母鼻氣吹而成竹瀝湯出千金方治小兒出胎二百日許頭身患小瘡治護小瘥復發五月中忽小小咳嗽微溫和治之因變癇一日二十過發四肢縮動背脊身夭䠷眼皮須臾氣絕良久復甦已與常治癇湯得快吐下經日不間爾後單與竹瀝汁稍進一日一夕合進一升許發時小疏明日與此竹瀝湯得吐下發便大折其間猶稍稍與竹瀝汁竹瀝五合黃芩三十銖木防己羚羊角各六銖大黃二兩白朮六銖茵芋三銖麻黃白薇萆薢甘草各半兩上㕮咀以水二升半煮取藥減半內竹瀝煎取一升分服二合相去行人行五六里以來再進一合停許久進一服一方無萆薢五味子湯出千金方治小兒風冷入肺上氣逆面青喘迫咳嗽晝夜不息食則吐不下五味子當歸各半兩麻黃乾薑桂心人參紫菀甘草各六兩細辛款冬花各二銖大黃一兩半白朮六兩上㕮咀以水二升半煮取九合去滓兒六十日至百日一服二合半一百日至二百日一服三合其大黃別浸一宿下一方無款冬花大黃有棗三枚菖蒲丸出千金方治小兒暴嗽及積風寒冷嗽兼氣逆鳴菖蒲烏頭杏仁礬石細辛皂角莢各六銖款冬花乾薑桂心紫菀各十八銖蜀椒五銖吳茱萸六合上為末蜜丸如梧子三歲兒飲服五丸加至十丸日三兒小以意減之兒大以意加之暴嗽數服便瘥貝母散出聖惠方治小兒咳嗽心胸痰壅咽喉不利少欲乳食貝母煨微黃桔梗去蘆馬兜鈴百合款冬花半夏湯泡七次乾薑漢防己麻黃去根節以上各一分甘草半兩炙銼杏仁半兩湯浸去皮尖雙仁麩炒色面黃如膏上為散每服一錢以水一小盞入生薑少許煎至五分去滓溫服日三五服量兒大小以意加減盆硝丸出聖濟總錄治小兒哽氣咳嗽痰熱盆硝馬牙硝甜硝鉛白霜丹砂續隨子青黛白礬燒汁盡膩粉各一錢龍腦麝香各一字上並細研為末粳米飯為丸三歲以上如雞頭實大二歲以下如梧桐子大兩三個月兒如小豆大一丸並用茶湯送下紫菀湯出直指方治小兒喘嗽紫菀茸貝母真蘇子微炒北梗陳皮杏仁水浸去皮焙黃麻黃去節半夏曲赤茯苓桑白皮炒甘草微炙等分上銼細每服一錢姜三片紫蘇三葉並嫩梗佳水煎服紫菀湯出千金方治小兒中冷及傷寒暴嗽或上氣咽喉鳴氣逆或鼻塞清水出紫菀杏仁黃芩當歸甘草橘皮青木香麻黃桂心各六銖大黃一兩上㕮咀以水二升煮取九合去滓六十日至百日兒一服二合半一百日至二百日兒一服三合杏仁湯出聖濟總錄治小兒一切咳嗽解寒壅杏仁生去皮尖雙仁知母焙貝母去心款冬花仙靈脾麻黃去根節人參甘草炙赤茯苓去黑皮玄參上粗搗篩每服一錢水七分煎至四分去滓溫服如傷寒嗽入蔥白鹽豉煎更量大小加減百部飲出全嬰方治小兒咳嗽喘急日夜不得睡目鮮如突出之狀百部生薑各八錢細辛三錢甘草炙二錢貝母白朮五味子各二錢桂心四錢麻黃二錢上為末三歲服一錢水半碗煎至三分去滓無時服阿膠丸出全嬰方治小兒久嗽肺虛氣粗有痰噁心不食阿膠一兩糯米一合炒焦不用米甘草炙蛤粉炒漢防己杏仁去皮麩炒款冬花香白芷馬兜鈴各半兩乾薑一兩上為末煉蜜丸如雞頭大每服一丸水煎服一方有乾葛無干姜加味半夏茯苓湯治痰嗽半夏曲二兩茯苓一兩半陳皮五味子各一兩人參北細辛羌活桔梗去蘆葶藶各炒一兩上銼生薑桑白皮煎服九寶湯治一切嗽蘇薄荷葉紫蘇大腹皮麻黃去根節肉桂去皮桑白皮炙杏仁去皮陳皮去白甘草炙上㕮咀薑棗煎服有痰加半夏人參枳實湯出直指方治感冒嗽喘胸滿痰滯人參一分枳實制桑白皮炒半夏制赤茯苓五味子細辛淨桔梗麻黃去節阿膠炒酥甘草炙各半兩上銼散每服一錢姜三片紫蘇三葉水煎服凡治喘嗽不論其肺實肺虛可汗可溫可下藥中須用阿膠便得安肺潤肺其性和平肺經要藥訶黎勒散出聖惠方治小兒胸膈有寒或時嗽逆不欲乳食訶黎勒一兩炒用皮白朮半兩五味子麥門冬去心白茯苓甘草炙人參陳皮湯浸去白各半兩細辛一分上件為散每服以水一小盞煎至五分去滓不計時候溫服大小加減服之治小兒咳逆喘息如水雞聲一名七味半夏湯出千金方半夏四兩紫菀桂心生薑細辛阿膠甘草各二兩款冬花二合蜜一合上㕮咀以水一斗煮半夏取六升去滓內諸藥煮取二升五合五歲兒服一升二歲服六合量大小多少加減服之射干湯出千金方治小兒咳逆喘息如水雞聲射干麻黃紫菀甘草生薑各一兩半夏五枚桂心五寸大棗二十枚上㕮咀以水七升煮取一升五合去滓內蜜五合煎一沸分溫服二合日三八味生薑煎出千金方治少小嗽生薑七兩乾薑四兩桂心二兩甘草款冬花紫菀各三兩杏仁一升蜜一升上合諸藥為末微火上煎取如飴餔量其大小多少與兒含咽之百日小兒如棗核許日四五服甚有驗杏仁煎治時氣暴嗽失聲語音不出杏仁三兩去皮研細桑白皮生薑取自然汁糖蜜各一兩木通貝母各一兩三錢紫菀茸五味子各一兩上將桑白皮木通貝母紫菀茸五味子㕮咀以水三升慢火熬取一升去滓再入杏仁砂糖蜜薑汁和一處熬成膏子用罐盛旋含化麻黃散麻黃二兩甘草人參知母去心各二兩半陳皮一分桔梗阿膠炒百部各半兩上為末三歲一錢水半盞煎三分服參杏膏出全嬰方治小兒久新咳嗽氣急噁心有痰不食咯血人參阿膠炒杏仁麩炒款冬花五味子甘草訶子炮去核貝母上等分為末煉蜜丸如雞頭實大三歲一丸白湯下千金治咳逆短氣胸中汲汲咯涎吐唾嗽出臭膿用淡竹瀝再煎沸一歲一藥注潤肺湯出衛生寶鑑治小兒塞壅痰涎咳嗽不止相交肺氣不利咳嗽喘急語聲不出痰涎壅塞胸膈煩悶鼻塞清涕咽喉干痛麻黃去根節煎掠去沫焙人參各二兩杏仁湯浸去皮尖雙仁炒貝母去心各二兩半甘草炙一兩陳橘皮去白焙一分桔梗炒阿膠炒令燥各半兩上八味粗搗篩每服一錢水七分煎至四分去滓溫服不拘時候量計兒大小加減百合湯出醫方妙選治小兒調肺解風壅百合紫菀白朮人參各一兩白茯苓青皮甘草麥門冬去心各半兩上為細末每服一錢水八分竹葉三片薄荷兩葉煎至五分去滓溫服人參散出聖惠方治小兒咳嗽心胸壅悶喘粗不欲乳食人參三分去蘆桔梗去蘆赤茯苓麥門冬去心焙前胡去蘆子芩款冬花甘草炙以上各半兩上件藥搗為散每服一錢以水一小盞入竹葉七片煎至五分去滓量兒大小以意加減溫服天門冬散出聖惠方治小兒心胸煩悶體熱咳嗽天門冬去心焙桑根白皮赤茯苓柴胡去苗紫菀洗去苗土百合藍葉甘草炙各半兩上件藥為散每服一錢以水一小盞入生薑少許煎至五分去滓量兒大小以意加減溫服又方款冬花甘草炙微赤銼紫菀洗去苗土各一分麻黃去節根川貝母煨黃麥門冬去心焙赤茯苓杏仁湯浸去皮尖麩炒黃細研以上各半兩上件藥為末入杏仁研令勻煉蜜和丸如綠豆大每服以青粥飲研化五丸服之量兒大小以意加減紫菀散出全嬰方治小兒咳嗽上氣喉中如水雞聲射干紫菀款冬花各三兩麻黃四兩細辛二兩半夏半兩五味子六兩上㕮咀三歲一錢水半盞薑棗少許煎三分去滓無時服均氣散出醫方大成治脾肺氣逆喘嗽面浮胸膈痞悶小便不利桑白皮二兩陳皮去白一兩半桔梗甘草炙赤茯苓各一兩藿香葉半兩木通四兩上為粗末每服一錢水一盞入生薑二片煎至五分去滓食前溫服金沸草散治傷風鼻塞流涕痰壅熱嗽荊芥穗一兩麻黃去節北柴胡旋覆花各五錢半夏湯泡赤芍藥甘草以上各二錢半上銼生薑桑白皮煎食後服小品七物小五味子湯出聖惠方療少小咳嗽腹脹兼治上氣睡臥不安五味子碎紫菀各二分黃芩甘草炙麻黃去節生薑桂心各一分上藥㕮咀以水一升煮取七合分五服忌如常法量兒大小以意加減杏仁膏出直指方治小兒久患咳嗽杏仁一兩半去皮焙茯苓一兩紫菀茸皂角去皮弦核蜜炙黃各半兩上末每服半錢生蜜調入薄荷湯泡開服四生化痰丸治一切咳嗽人參半夏杏仁各一兩白礬六錢上為細末麵