滿心神迷悶盛則加之喘促不得傳變宜速降下寬中補肺利膈化痰用氣即愈唯有驚喘暴急肝肺亂停積不散金火相剋逆而不實錯亂血脈擊觸臟腑速療乃瘳緩即加重重即傳變方犀角地黃膏天門冬麥門冬去心白茯苓茯神生地黃各洗秤前胡柴胡人參玄參甘草炙川芎天麻防風羌活上等分為末煅金墨一錠留性煉蜜丸如芡實大金箔為衣每服一粒薄荷湯化服大效雄朱化痰定喘丸治小兒因驚發喘逆觸心肺暴急張口虛煩神困雄黃硃砂各一錢研蟬蛻全蠍炒地龍白殭蠶天南星白附子輕粉半錢上為末麵糊為丸麻子大每服三十丸薄荷茶清送下食後服之定喘飲子天麻防風羌活甘草炙人參桔梗白朮川芎半夏曲上等分㕮咀每服二錢水一小盞入麥門冬子十四粒同煎去滓通口食後服八味理中丸治小兒心脾肺不和息數脈急上下不升降中膈痞滿胸臆鬱抑坐臥煩悶精神不樂飲食不下人參甘草炙白朮乾薑枳實治炒白茯苓五味子去梗桑白皮去赤皮上等分為細末煉蜜為丸小指大每一丸淡豆豉五粒水一小盞煎至半去豉通口服無時麻黃湯治小兒卒肩息上氣不得安此惡風入肺亦治咳逆上氣喘促不得安臥麻黃四兩甘草一兩桂心五寸五味子半升半夏生薑各三兩上㕮咀以水五升煮取二升百日兒服一合小大節度服之便愈方用蜜煎服無價散治風熱喘促悶亂不安俗謂之馬脾風者辰砂二錢半輕粉半錢甘遂一錢半麩炒裹煮焙乾上為細末每服一字用溫漿水少許上滴小油一點抄藥在上沉下去腳灌之立效治小兒哮喘黃丹砒霜上各生用為末用棗肉為丸如麻子大每服三丸臨臥冷茶清下治暴喘俗傳為馬脾風也大小便硬宜急下用牛黃散奪命散後用白虎湯下之麻黃升麻湯治小兒寒鬱而喘喉鳴腹中鳴腹滿鼻流清脈沉急而散數麻黃草豆蔻仁各一錢半益智仁一分半厚朴二分甘草一分當歸尾升麻曲末各半分吳茱萸二分柴胡一分蘇木半分紅花少許黃芩生一分全蠍二個上㕮咀如麻豆大分作二服每服水一大盞煎至七分去清稍熱服食遠忌風寒微有汗乃效定喘丸治痰喘麻黃去節三分杏仁去皮尖炒半錢甘草豬膽十個炙三錢梔子三錢上為末煉蜜為丸如綠豆大桑白皮湯吞下雞青膏治小兒涎鳴喘急服藥不退者氣實而可用用無雄雞子一個取清入輕粉炒十錢拌和銀器盛湯瓶上頓熱下之用珍珠丸等
