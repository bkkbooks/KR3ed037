body:
  text: 卷三百八十九嬰孩諸血痔疾門總論夫鼻衄者是五臟熱結所為也血為氣行通流臟腑冷熱調和不失常度無有壅滯以不流溢血得寒而凝結得熱而流散熱乘於血隨氣發溢出於鼻竅也又有因傷寒溫疫諸陽受病不得其汗熱每停聚五臟故從鼻而出也病瘥後唾血咯血下血者此熱毒積瘀犀角地黃湯主之初病亦宜服之夫吐血者由榮衛氣逆也榮者血也衛者氣也榮衛相濟不失常道一有所勝則致妄行血者水也決之東則東流決之西則西流氣之使血其勢如此巢氏云吐血者是有熱氣勝而血虛熱乘於血血性得熱則流散妄行氣逆則血隨氣上故令吐血也又或飲食大飽之後脾胃內冷不能消化所食之物氣血相沖因傷肺胃亦令吐血若久嗽氣逆面目浮腫而嗽血者是肺虛損也夫大便血者大腸熱結損傷所為也臟氣既傷風邪自入或蓄熱或積冷或濕毒傳於脾胃或疳食傷於臟腑因茲冷熱交擊疳濕互作致動血氣停留於內凝澀無歸滲入腸中故大便下血也又有或腹脹冷氣在內攻衝亦令大便下血又因風冷乘虛客入脾胃或瘀血腸胃濕毒一如豆汁又疳傷於臟亦能便血若上焦心肺積熱流注大腸亦令大便下血也亡血脾弱必渴久則血虛其人必肌體萎黃頭髮不黑矣沈氏子十歲鼻衄不止或以茅花煎湯或以犀角地黃湯並龍骨末吹鼻數法不效其血注下召愚視曰急以濃鹽水下龍膽丸一服減半再進全除主人曰鹽水有何故愚曰夫血得熱而流溢鹽水鹹冷能凝其血譬之屠豬就血得鹽水而凝結黃連龍膽味苦寒能堅其血所以知其鹹苦入口即立效也凡兒生七日之內大小便有血出者此由胎氣熱盛之所致也母食濃酒細面炙煿醃咸等流入心肺兒在胎內受之熱毒亦傳心肺且女子之臟其熱即入心故小便有之男子之臟其熱即入於肺故大便有之血出淡淡有似坯水盛即其血加解凡遇有此不可它藥盡以生地黃根研取自然汁五七匙蜜半匙和勻溫溫與服移時安愈男女皆效不須疑誚甘露飲宜兼與服不必他藥萬一無恙勿遽妄投丸散吐血附論夫小兒陽氣盛壯上焦有熱伏於肝心二臟搐流脈中血得熱俱妄行下入胃中胃受之則脹滿與氣俱上衝擊故令吐血方紫參散出醫方妙選治吐血紫參山梔子乾生地黃各一兩刺薊一分燒灰亂髮燒灰一分蒲黃伏龍肝各一錢細研上都研勻每服半錢至一錢煎竹茹湯調下犀角散出聖惠方治小兒四五歲以上非時吐血犀角屑梔子仁生乾地黃子芩紫蘇刺薊各一分上為散每服一錢水一小盞煎至五分去滓不計時候量兒大小加減溫服茜根散出聖惠方治小兒吐血心躁煩悶茜根半兩犀角屑川升麻川大黃銼微炒黃芩甘草炙微赤銼以上各一分上為散每服一錢水一小盞入黑豆三十粒淡竹茹半分煎至六分去滓不計時候量兒大小加減辰膠散出全嬰方治小兒吐血阿膠炒蛤粉等分辰砂少許上為末和粉紅色三歲一錢藕汁和蜜調下一方藕節日乾為末人參湯調下能消瘀血蒲黃散出聖惠方治小兒吐血不止蒲黃一分伏龍肝半兩亂髮灰一分上研勻細不計時候暖生地黃汁調下半錢量兒大小加減服之治小兒吐血不定刺薊自然汁不計多少朴硝半兩上先研朴硝為末二百日兒及晬兒每服用刺薊汁調朴硝末一字至半錢七日再服量兒大小加減大黃銼炒黃芩去黑心各一分上粗搗篩三四歲兒每服一錢匕水七分入黑豆三十粒同煎至四分去滓溫服日三更量兒大小加減治小兒積熱攻肺卒吐血飛羅面二兩生地黃汁三盞上相和勻曝乾研為末每服半錢匕新汲水調下日三隨兒大小加減蒲黃散治吐血咯血生蒲黃油發灰等分上研細每服一錢暖生地黃汁調下米飲亦可一方無油發灰治小兒吐血用蛇蛻皮燒為末以乳服並治重舌又方用油三分酒一分和之分而再服青苔散治小兒鼻衄吐血並治淋瀝小便不通用船底青苔日曬乾為末三歲一錢藕節汁入蜜少許調下淋瀝木通湯調下獨聖散治小兒吐血嗽血用赤芍藥為末取生地黃藕汁入蜜少許調下食後又方桔梗煎湯調下及治衄血下血雙黃散治小兒吐血無治不瘥十無一失用大黃為末取生地黃汁微煎入蜜調下量兒大小加減服之三兩服立效又一方以白膠香為末新汲水調下桂心膏治小兒十歲以上久吐血氣虛胸隔不利用桂心為末取生地黃汁薑汁蜜等分熬稠為丸如雞子大十歲兩丸取藕汁入蜜白湯化下一方為末藕汁蜜調下三歲半錢亦治便血名桂心散又方胃氣湯亦治下血生地黃汁方治小兒吐血衄血用生地黃汁取一合發灰半錢調分作兩服食後少頃灌之治小兒吐血不止用黃連去須一兩搗為散每服一錢水七分入豉二十粒同煎至五分去滓溫服量兒大小加減進之治小兒積熱攻肺卒吐血用刺薊花曝乾不拘多少搗為末每服黃牛乳調下一錢七日三治小兒吐血心燥煩悶用刺薊自然汁一合暖令溫不計時候調下玄明粉半錢量兒大小加減又方用亂髮燒灰細研每服以溫水調下一字備急方治吐血即研藕汁或蘿蔔汁灌下即止次用小柴胡湯加生地黃煎吃治小兒吐血不止以蒲黃細研每服半錢用生地黃汁調下量兒大小加減進之鼻衄附論凡小兒體本挾熱舍於經絡血脈陽溢則為鼻衄蓋氣與血循行經脈通於腑臟邪熱乘血血得熱則妄行隨氣上溢出於鼻者為鼻衄血虛受熱散漫失度出於七竅者為大衄小兒傷寒鼻衄者由熱搏於氣而乘於血肺候身之皮毛而主氣開竅於鼻傷寒先客皮膚搏於氣而成熱熱乘於血血得熱即流散發從鼻中為鼻衄也凡候熱病如應衄者其人壯熱頭疼發汗汗不出或未及汗而鼻躁喘急鼻氣鳴即衄也凡小兒衄半升或數合者即熱因之得歇若出一二升以上不止者即死方生地黃煎治小兒鼻衄不止生地黃半斤取汁刺薊半斤取汁杏仁一兩湯浸去皮尖麩炒別研生蜜一合阿膠半兩搗碎炒令黃燥為末上都入銀鍋內以慢火熬為膏不計時候用新汲水調下一錢量兒大小加減服之地黃湯治榮中有熱及肺壅鼻衄生瘡一切丹毒生地黃赤芍藥當歸去蘆淨洗川芎各等分上㕮咀水煎去滓大小以意加減鼻衄臨熟入生蒲黃少許生瘡疥遍體加黃芩一處等分同煎丹毒加防風去蘆等分同煎用之纍驗蘗皮湯治小兒衄血至一二升悶絶蘗皮一兩梔子一兩甘草半兩炙上㕮咀三歲一錢水半盞煎至三分去滓服一方剪金花莖葉陰乾水煎服之又方白芨末調塗鼻上並囟門立止又方萆麻葉塗油炙熱尉兒囟上血止槐花散治衄血槐花一兩炒蒲黃半兩川面薑一分上搗羅為細末每服半錢新汲調下抵聖散治不以疾病鼻衄不止盆硝研亂頭髮燒灰研紅藍花各末一分上同研勻細以綿纏搵藥塞鼻中柏枝散治小兒衄血吐血柏枝乾者藕節乾者上等分為末三歲半大錢藕汁入蜜沸湯調下一方白芍藥為末磨犀角汁調治咯血衄血又方龍骨為末吹鼻治衄血吐血咯血用藕汁調下半錢又方治吐血不止及唾血蒲黃冷水調生地黃汁龍膽丸治小兒衄血不止黃連龍膽草上等分為末糊丸如小豆大三歲三十丸或作散子以濃鹽水送下三黃丸效一方研好墨滴鼻中一方燒亂頭髮吹鼻內茅花湯亦得石粉散治小兒衄血日夜不止頭痛心煩寒水石煅牡蠣煅上等分為末三歲半錢冷水調下連進二服一方人中白燒灰為末吹鼻立止一方青竹茹燒灰入麝香吹鼻立效一方蒜去皮研細攤餅子如錢大厚一豆許左鼻出血貼左足心系定右亦如之兩鼻出血兩腳如之血止即洗去龍肝散治小兒壅腫鼻衄下血夜啼臍濕火丹赤遊腫湯火熟油瘡等用灶心土名伏龍肝經十年以上者為末醋調塗腫處鼻衄入蜜水調服腸風下血米湯調服嬰兒夜啼鉤藤湯調下少許臍中瘡濕久不瘥乾用火疸屋漏水調塗冷水亦可赤遊腫行於身上至心即死雞子白調塗一方治湯火灼陰瘡石灰水調塗一方治衄釜底黑灰吹鼻即止一方治熱油湯火燒痛不可忍石膏末敷之又白石脂火煅為末干敷並臍中汁出赤腫治春冬衄者此候乃血熱不循經而壅從鼻出也血隨其氣而肺主氣屬鼻故自鼻出而衄蓋榮衛者血氣之循位苟或血熱不循經氣盛而上升則血壅從鼻中出也出永類鈐方用生地黃細研取汁加生蒲黃少許沙糖井水浸服之愈治秋夏鼻衄用車前草一握洗淨研取自然汁同生薑一處研取汁入生蜜一匙先用滓塞兩鼻次用新汲井水和蜜並車前草薑汁飲之即愈凡有此候皆由榮熱可服涼血地黃湯若傷寒證小柴胡煎入地黃汁服妙治小兒鼻衄不止痛急以生蘿蔔取根搗自然汁仰頭滴入鼻管中即止次以新汲水和蘿蔔汁薑蜜飲之良治小兒心肺蘊熱及心血妄行鼻衄出血不止良方用故藤紙被一片作捻子包麝燒熏入鼻或吹鼻中又令患人吸呷尤佳故藤紙被舊亦得或燒內小瓶中留性用酒調下量兒大小與服極妙黃芩膏治小兒衄血吐血下血用黃芩為末煉蜜丸如雞子大三歲一丸濃鹽湯下一方石榴花為末吹鼻治衄血吐血一方定州瓷器末治吐血下血破血又方鼻血久不止用剜耳入鼻立效又治小兒面目卒得黑丹如芥狀不急治遍身即死以豬脂調塗之即愈玉屑散治小兒中熱積驚及時疾後鼻衄寒水石研馬牙硝研各一兩貝母去心知母各一分半荷葉一兩水煮七次焙上搗研為細散每服半錢七蜜水調下食後茅根湯出活幼口議治小兒傷寒後有後證忽然鼻中出血五七歲以上至大人亦有此證為紅汗為不曾解表其汗出血故從鼻中出者自解生地黃汁生蜜酒各一小盞茅根一握搗煎汁如稠糖上同煎一盞相和溫服小小一盞立效立應散出聖惠方治傷寒血熱妄行血衄不止蒲黃研乾葛根石榴花各半兩上為細末每服半錢取生地黃汁調下並服一方無干葛根用新汲水調服治小兒傷寒鼻衄已經數日不止出聖惠方生地黃汁一小盞白蜜一小盞蒲黃一兩上相和微暖過每服半盞量兒大小分減頓服治小兒傷寒壯熱鼻衄不止出聖惠方用生地黃二兩銼於銀器中以酒一中盞煎至七分去滓不計時候分溫三服又方出聖惠方用生葛根汁一小盞分作二服即止治小兒傷寒鼻衄數日不止出聖惠方用亂髮燒灰細研頻頻吹少許於鼻中良九竅出血方膠黃散出全嬰方治小兒大衄口鼻耳出血不止十五六歲兒陽盛多此病阿膠一兩炒蒲黃半兩上為末每服半錢生地黃汁微煎調下以帛急系兩乳頭隨血左右兩竅俱出並系兩乳刺薊散出全嬰方治小兒九竅出血用刺薊一握絞汁入好酒合和服之如無青者乾者為末冷水調下每服一錢痔附論夫痔者有牡痔脈痔腸痔血痔皆因酒食勞傷過度損動血氣所生小兒未有虛損而患痔者是大便有血出腸內有結熱故也方鱉甲散出聖惠方治小兒痔疾肛邊生結核疼痛寒熱鱉甲一兩醋炙黃去裙襴蝟皮一兩炙黃蛇皮三分燒灰露蜂房半兩微炙豬懸蹄甲七枚炙黃檳榔三分麝香一分細研上搗細羅為散入麝香研勻每服食前以粥飲調下半錢量兒大小加減服之桑木耳散出聖惠方治小兒痔疾久不瘥肛邊痛癢桑木耳微炒蝟皮炙黃當歸炒羌活以上各半兩枳殼一兩麩炒上藥搗細羅為散每服以粥飲調下半錢日三四服量兒大小加減服之龜甲丸出聖惠方治小兒痔疾結硬焮痛不止龜甲二兩酥炙蛇蛻皮一兩燒灰露蜂房半兩炙麝香一分研豬後懸蹄甲一兩炙焦上細羅為散入麝香研令勻每服以溫酒調下半錢日三服量兒大小加減服之一方無麝香忌生冷以粉和丸槐蛾散治小兒痔疾下血不止熱毒氣流注發歇疼痛槐蛾側柏炙黃荊芥穗棕櫚燒灰黃牛角腮燒灰牛膝去苗以上炙半兩上細羅為散每服以粥飲調下半錢日三四服量兒大小加減服之蝟皮散治小兒痔疾下血大腸疼痛蝟皮炙枳殼去瓤麩炒木賊當歸銼炒槐鵝炒各一兩上細羅為散每服以粥飲調下半錢日三四服量兒大小加減服之櫸樹角子丸治小兒痔下血不止肛邊生鼠乳疼痛櫸樹角子一兩蝦蟆一枚炙黃葫荽子一兩黃牛角腮一兩炙鰻鱺魚頭一枚炙黃上羅為末以水煎白膠香和丸如彈子大用瓶內如裝香法燒一丸熏下部瘥治小兒痔疾下部癢悶慰藥方枳實二兩麩炒鬼箭羽木香鬼臼以上各一兩上搗為散以頭醋和勻炒熱用青布裹尉日三用榼藤子散治小兒痔疾下血無時榼藤子一枚去殼炒皂莢子一百枚與榼藤子瓤同酥炒黃牛角腮灰醋石榴皮灰半兩上細羅為散每服以溫酒調下半錢日三四服量兒大小加減服之雞冠散治小兒痔疾下血不止雞冠花一兩焙棕櫚二兩燒灰羌活一兩上細羅為散每服以粥飲調下三錢日三四服量兒大小加減服之黃耆散治小兒痔疾下血不止黃耆銼枳殼去瓤麩炒側柏葉各一兩炙黃上細羅為末每服以粥飲調下半錢日三四服量兒大小加減服之治小兒痔疾下血發歇不止荊芥薄荷枳殼麩炒微黃去瓤各一兩上羅為末每服以粥飲調下半錢日三四服量兒大小加減服之木賊丸治小兒痔疾痛不可忍木賊一兩榼藤子一兩去殼塗酥炙黃烏賊魚骨二兩上羅為末煉蜜和丸如緑豆大不計時候以溫酒下五丸量兒大小以意加減服之治小兒痔疾疼痛腫硬不消宜用生藥方蛇床子半兩末荊芥半兩末蝸牛七枚上爛研塗紙上每發時先用白礬熱水洗痔頭子後用被褥上安藥紙坐三兩次瘥槐子丸治小兒痔痰鼠乳生肛邊煩熱疼痛槐子一兩微炒黃芩一兩榼藤子二枚去殼炙令黃上羅為末以水浸蒸餅和丸如緑豆大每服以桑耳湯下五丸日三四服量兒大小加減服之穿山甲散治小兒痔生肛邊如鼠乳及成瘡痛楚至甚宜服穿山甲二兩炙令黃麝香半分細研上搗研令勻細每服於食前煎黃耆湯調下半錢量兒大小加減服之治小兒腸痔下血不止方榼藤子三枚大者上以七八重溫紙裹煨良久起出取去殼用肉細切碾為散以黃耆湯調下半錢量兒大小加減又方用牛角腮二兩炙令黃焦搗羅為末每服食前以溫酒調下半錢量兒大小加減服之又方用蝟皮細銼於瓶內燒煙熏痔上瘡
