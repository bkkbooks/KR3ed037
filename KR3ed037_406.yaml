散治熱毒與血相擊而風乘之所以赤遊腫走北梗天花粉乾葛川升麻川芎赤芍藥獨活柴胡甘草上銼散每一錢薑二片井水煎服水磨膏澤蘭黃白皮雄黃白蘞白藥子南星黃丹赤芍藥赤小豆青黛寒水石硝石上等分為末用生地黃芙蓉葉雞子清同研塗角腫處立效治驚瘤大如碗者南星半夏赤蘞蒲黃黃丹各等分上為末用生地黃芙蓉葉同研敷角腫處又方金星草根大蒜苧根各等分上件搗爛敷角腫處治驚瘤已熟欲破用此藥點之白丁香即雄雀屎三粒醋研點熟處即效牛黃散治三兩歲驚風赤瘤走遍四肢牛黃硃砂蝸牛肉糯米炒全蠍天麻白附子乳香殭蠶炒各一分麝香少許螳螂翅五雙腦子少許上為末每服一錢薄荷湯下如初生時用乳香湯調塗口胎疾永除黃柏散治丹瘤赤腫未破赤芍藥白藥子小黃柏皮白芷稍青黛上等分為末用藕節地黃研汁調敷腫處如腐爛乾粉之糝藥白石脂滑石五倍子龍骨小黃柏皮上等分為末干糝患處蠍星丸治痄𤸛風痰全蠍十五隻南星白附子殭蠶白礬各二錢上為末蒸餅為丸如粟米大硃砂為衣每服用蔥白薄荷湯下仍以青金丹服之如未見其速效可加巴豆二三粒出油磨霜和丸加減與之疏通宣下頑痰驚積瀉出白糞方如退驚伏了驚瘡便作瘤血來聚斂大如甌一個排膿初試作又從別處起羅頭風血聚凝堅又硬腫高不赤養膿頭身作煎寒口常淡恨啼眼澀鼻清流小兒瘤腫或成丹手腳看看漸漸行用藥切須塗腫處病危還是腹中膨溫中活血十宣散散血消風敗毒寒肉桂麻黃添莫減黃耆芍藥木香攢曾見驚瘤歸伏肉更無名手善調安此候榮衛不和血氣壅滯熱毒流入皮膚之間腫焮作熱先用神仙膏塗角次與升麻散加黃芩麻黃煎服解肌湯亦可神仙膏南星滑石等分麝香少許上為末生地黃汁鐵槽泥調成膏敷之黃耆散治驚瘤大如碗實硬如石難破者黃耆當歸白藥子人參川芎桂皮白芷甘草上等分為散白水煎服十宣散治冷瘤癰毒腫起難消者木香人參當歸川芎赤芍藥桔梗白芷陳皮大腹皮黃耆甘草各等分上為散每服一錢蘇葉煎水澄膏治丹瘤癰腫寒水石白藥子何首烏赤小豆天南星白蘞青黛滑石赤芍藥上為末用槽泥雞子清調塗腫處地黃積雪藕汁亦可全蠍湯治小兒痄𤸛痰多天麻防風白膠甘草全蠍蘇木南星二三片皆生用上用水煎時與少可清毒散治小兒腮耳頷赤腫紅暈之證寒水石煅黃柏末各一兩黃丹炒半兩朴硝半兩上為細末每服少許涼水調雞翎蘸藥掃上干則再換可服後藥消毒犀角飲消毒犀角飲治證見前牛蒡子炒研二兩荊芥一兩防風升麻豆豉各五錢甘草五錢犀角二錢上㕮咀每服三錢水一盞煎至七分去滓溫服乳母亦可服小兒丹溜毒走注皆因內積熱毒發為丹證或在心胸手足皮膚之上紅暈紫黑悉是血毒服藥決不得效急宜用剃頭快刀刺破紅暈上下皆用刀微刺則其黑血自出病自愈矣可服前消毒飲臟腑實加大黃至於一二斤即安又一法于丹毒紅暈多處以刀刺破些小卻用一雙六馬兒樣內腹空直至把手上皆空開一孔將馬兒按在刀刺開處以口於馬兒孔上扎血口吐出再扎又吐去無血則止其病頓消磨風膏治赤腫胎毒在腮頸上萆麻去殼雄黃一錢上先將雄黃碎研卻將萆麻同研勻水調搽腫處搜風散治腮下腫大戟甘遂大黃檳榔牽牛炒透各一錢青皮半錢上為末每服一錢用蜜湯下
