body:
  text: 卷四百六嬰孩諸瘡腫毒門五色丹毒附論夫丹之為候由熱毒之氣搏於榮血而風乘之所以赤浮肌肉而為之走注也外因乳母食啖熱毒物藥及烘衣不候冷便與兒服而得之其證或發於手足或生於頭面胸脅令兒煩悶腹脹其熱如火痛不可言赤腫遊去遍體也湯氏所謂丹有十五種又有赤遊風及熛瘡本事方以十種治之然丹不特色赤或青或黃或白或黑是血熱風毒有盛有衰挾冷挾熱故其色變易又不同焉要之諸瘡皆屬於心心為血之主血為熱之媒古人以丹命名蓋謂心應火色尚赤揣本揆元大概心家血熱所致風以動之於是遊赤而遍體也蔓衍而不歇則爛肌自四肢而入腹入腎則殺人惟初生於胸腹然後流散於四肢者易愈夫小兒五色丹者由丹發而變改無常或青黃白黑赤此由風毒之熱有盛有衰或冷或熱故發為五色丹也赤丹者由風毒之重故使赤也初發疹起大者如連錢小者如麻豆肉上生粟如雞冠故謂之赤丹亦名茱萸丹也白丹者由夾風冷之氣故使色白也初發癢痛微虛腫如吹疹疹起不痛不赤而白也黑丹者由風冷傷於肌肉故令色黑也初發癢痛或熛腫起微黑色者是也丹發於肉中有赤如丹色大者如手劇者遍身赤癢故號天火丹丹發於兩脅及腋下膀上此謂之殃火丹也丹發兩膀不過一日便赤黑謂之神火丹也丹發赤斑斑如梅子遍背腹謂之野火丹也丹初發著兩腋下兩膀上謂之家火丹也丹發如灼在脅下正赤初從骼起而長上痛謂之螢火丹也朱田火丹者由丹先發背起遍身一日一夜而成瘡謂之朱田火丹者是也丹發兩膀里尻間正赤流陰頭赤腫血出謂之天灶火丹也丹發從足趺起正赤者謂之廢灶火丹也丹發膝上從兩股起及臍間走入陰頭謂尿灶火丹也有肌肉虛者為風毒熱氣所乘熱毒搏於血氣則皮膚赤而腫起其風隨氣行遊不定故名赤遊腫也凡患諸瘤腫毒必須先服升麻飲之類導氣藥以散其毒方可用藥調塗不然恐毒氣入腹則殺人也凡小兒丹瘤腫毒赤走引遍身者乃邪熱之毒在表以磁片刺出紫血其病立愈如不愈者後用涼膈散加大黃芒硝利三五行次用拔毒散掃三五度必愈矣經曰丹煉赤瘤火之色也相火主之凡小兒有赤瘤暴腫可用黃連通膈丸瀉之後用陽起石散敷之則腫毒自消如不消可用排釘砭刺血出而愈矣風熱發丹古方謂小兒得之最忌以其氣血未定肌膚柔脆無以勝悍毒故也是以諸丹不同其發無定處俗又謂之溜流走經絡散發肌表如塗丹之赤有法可鐮泄去毒氣不爾則丹毒入腹近心即死但初發於心頭者不可鐮耳方藍青散治丹毒火赤腫身壯熱百治不瘥寒水石十六銖石膏十三銖藍青十二銖冬用乾者犀角八銖柴胡一銖知母半銖羚羊角六銖杏仁八銖芍藥七銖黃芩七銖梔子二銖竹瀝一升生葛汁四合澄清蜜二升上㕮咀以水五升並竹瀝煮取三升三合去滓內杏仁脂葛汁蜜微火煎取二升一二歲兒服二合大者量加之米飲化下大黃拓湯治小兒腫丹方大黃甘草當歸芎藭白芷獨活黃芩芍藥升麻沉香青木香木蘭皮各一兩芒硝三兩上㕮咀以水一斗二升煮取四升去滓內芒硝以綿搵湯中適寒溫拓之干則易取瘥止藍葉散治諸丹發熱赤腫白芷柴胡知母杏仁去皮尖川芎赤芍藥生地黃川升麻生甘草各一分乾葛一分爛石膏梔子各半兩藍葉日乾一分上銼細每一錢半新汲水煎服熱甚加黃芩玄參煎服藍青散治一切丹毒赤腫身熱如火已服諸藥不退由風熱毒氣在於腠理熱毒搏於血蒸發於外其皮上熱而赤如丹塗之狀故謂之丹若久不治則肌肉壞爛若青氣入腹則殺人也今以一方同療之藍青知母甘草梔子各半兩黃芩一兩杏仁去皮尖半兩升麻柴胡寒水石石膏各一兩赤芍藥四錢羚羊角三錢上㕮咀每服三錢水一盞煎六分三次溫服升麻膏治小兒一切丹發無常處體熱如火燒川升麻川大黃景天草蛇銜草梔子仁寒水石川芒硝藍葉生地黃芭蕉根羚羊角屑梧桐皮各半兩上細銼以竹瀝浸一宿明日漉出卻入鐺中用臘月豬脂一斤於慢火上熬一食久承熱以綿濾去滓候冷成膏以磁合盛旋取摩之兼以膏如棗核大以竹瀝調服之升麻膏治小兒赤毒腫川升麻白蘞漏蘆川芒硝各一兩黃芩枳殼連翹蛇銜草各一兩半梔子仁二兩蒴藋二兩上細銼以豬脂一斤入於鐺中以慢火煎諸藥令赤色去滓放冷以磁合盛旋取塗之麻黃湯治小兒丹毒風腫及風疹麻黃一兩半獨活射干甘草桂心青木香石膏黃芩各一兩上㕮咀以水四升煮取一升三歲兒分為四服日再升麻黃芩湯一名藍葉散治小兒月內發丹升麻黃芩去黑心犀角鎊大黃銼柴胡去苗梔子仁各半兩石膏三分甘草炙銼一分藍葉切二合上搗篩每服二錢匕水一盞煎至半盞去滓食後分溫二服再量大小加減外臺祕要用竹瀝四合同煎治小兒惡毒丹及風疹麻黃升麻葛根各一兩射干雞舌香甘草各半兩石膏半合上㕮咀以水三升煮取一升三歲兒分三服日三治小兒大腹痞滿丹毒寒熱取狼牙根莖煮服之治小兒沖惡熱毒煩悶及諸熱丹毒以生銀水磨服功勝紫雪忌生血內托散紅內消當歸茄片甘草節羌活黃芩各半兩麝香半錢上為末每服二錢茄蒂煎湯調成或生地黃亦可金花散治一切丹毒鬱金黃芩甘草山梔大黃糯米黃連上各一兩為末蜜和冷水調以鵝毛摻上患處淋洗方防風桑白皮黃菊花丹參莽草荊芥棗木根各等分上銼煎水避風浴之大黃散治小兒一切丹遍身赤痛川大黃銼微炒半兩防風去蘆半兩川升麻一兩黃芩一分麻黃去根節一分秦艽去苗一分川朴硝三分上羅搗為散每服一錢以水一盞煎至五分去滓放溫不計時候量兒大小分減服之防己散治丹腫候熱毒之氣極與血相搏而風乘之故赤腫及遊走遍體者又名赤遊風入腹入腎則殺人也漢防己半兩朴硝犀角黃芩黃耆川升麻各半錢上㕮咀每服半錢水一盞加竹葉煎去滓大小以意加減服之一方加川芎蜜煎升麻飲一名消毒散治一切丹遍身壯熱煩渴赤流初發甚者升麻黃芩大黃各一錢麥門冬去心葛根朴硝研各三錢上為細末和勻熱水調下半錢一方煎服無葛根量兒大小加減黃芩湯治小兒丹毒遍身黃芩去黑心麻黃去根節秦艽去苗土升麻各一分大黃銼炒防風去蘆各半兩上搗篩每一錢匕水七分煎至四分下朴硝末半錢匕去滓空心分溫二服晚再服更量大小加減寄生散治毒腫甚者桑寄生獨活川大黃各一兩犀角朴硝甘草各半兩上搗羅為末每服一錢煎五分去滓溫服量兒大小加減升麻膏治小兒赤丹初發肉色如硃色如雞冠又名茱萸丹川升麻白蘞漏蘆川芒硝各一兩連翹梔子各半兩上銼細以豬脂半斤入鐺中用慢火煎諸藥令赤色去滓放冷以磁合盛旋取每用少許塗患處升麻湯治小兒黑丹以此藥拓之升麻二兩漏蘆二兩川芒硝二兩黃芩三兩梔子仁一兩蒴藋半兩上細銼和勻每用三兩以水五升煎至三升去滓微溫以軟帛旋蘸拓病上以消為度牛黃散退丹毒鬱金甘草炙桔梗天花粉葛粉上等分為細末每服一錢薄荷湯入蜜調下淋洗方防風桑白皮黃菊花丹參莽草上等分加荊芥煎湯浴患處黃耆湯治小兒丹毒黃耆銼蒺藜子炒去角黃芩去黑心大黃銼焙甘草炙各一分上搗篩每一錢匕水七分煎至四分下朴硝末半錢匕去滓食前分溫二服更量兒大小加減吳藍湯拓方治小兒發丹毒熱痛吳藍大黃槐白皮商陸榆皮各二兩上細銼每用二兩以水五升煎至四升去滓入朴硝半兩攪勻以綿二片浸於湯中更用拓丹上日三五度即瘥祛毒膏一名祛毒散治小兒丹黑色癢痛腫起川升麻漏蘆芒硝各二兩黃芩一兩梔子一兩上為粗末每用兩匙頭以水三盞煎至二盞去滓微熱以軟帛旋蘸拓瘡上以消為度治小兒五色丹川大黃黃芩川芒硝梔子仁干藍葉商陸各一兩上羅為散以水調塗之立效治小兒天灶火丹薺葉三分赤小豆一合鍛爐門上灰一兩青羊脂三兩蔥白二莖切上相和搗如膏摩之燥更摩之拔毒散治小兒丹毒肉色變異或著四肢或在胸背遊走不定焮熱疼痛拔毒消腫散熱痛石膏三兩甘草黃蘗各一兩寒水石七兩上為細末每用水調時服以雞翎刷掃以芭蕉汁調妙朱黛散治解丹熱諸毒青黛土朱各一兩軟滑石荊芥穗各半分上為末每一錢半蜜水調下兼與撲身寒水石散治角疸遊走不定焮然赤腫疼痛用藥角歸手足上為妙後取碎寒水石石膏黃連黃柏各一兩上為末水調刷治小兒野灶丹從膝起薺葉塗方干薺葉末香薷末赤小豆末各半兩生蒴藋葉莖細銼一撮上細銼蒴藋入諸藥末和調如糊塗丹處干即易之以瘥為度治小兒天灶火丹發尻間正赤流陰頭赤腫血出蔥薺苨塗方蔥五莖和須切碎薺苨五莖生者和梗切碎赤小豆末灶門上灰研各一合上合研勻細以青羊脂三兩調勻塗之以瘥為度治小兒天火丹發遍身赤如絳色癢痛甚者桑根白皮二兩丹參二兩甘菊一兩半莽草一兩上細銼和勻每二兩以水三升煎至二升去滓溫暖避風浴兒棗根湯治小兒丹發而變改無常五色丹遍身宜用洗浴棗木根四兩丹參二兩干菊花二兩半上細銼煎湯避風冷處浴之次敷藥每用二兩以水五升去滓丹毒至效散治小兒一切丹毒及龍帶發作先服消毒散次用敷之黃丹一錢朴硝一錢赤小豆兩頭合者為末半合上研令勻井水調以雞毛刷立效麻黃散治小兒丹毒入腹及下部陰卵百藥不瘥麻黃去根節升麻各半兩硝石研一兩上搗羅為散每服半錢匕井花水調下空心日晚各一三黃散貼一切丹腫毒大黃黃蘗黃連各等分上為末獖豬膽汁調塗頭心及貼腳心又方硝石白麵等分研勻井水調稀睡時塗腳心效硝石散治小兒丹發如灼初從額起至脅下大痛又名螢火丹硝石半兩寒水石一分赤小豆一合上搗羅為細末每用半錢以冷水調塗患處一方用豬脂莽草散治小兒丹發從足趺起正赤乃名廢灶火丹莽草寒水石硝石各半兩上搗羅為散每用以新汲水調塗患處一方每服半錢一日三服量兒大小加減服之慎火草散治小兒一切丹通用慎火草半兩紫葛半兩硝石半兩上搗羅為散用冷水調塗之干即再塗以瘥為度治小兒黑丹茺蔚子蛇銜草護火草各二兩上搗令爛以雞子白調塗之治小兒天灶火丹細辛一兩糯米一合景天草三兩上搗如泥塗丹上瘥白玉散治赤遊丹毒白玉一兩寒水石二兩上為末米醋調敷貼患處或腫至外腎有破處只用水調亦可保嬰方用白土無白玉如干上用水雞翎掃之治小兒天灶火丹病從髀間起其小兒未滿百日犯行路灶君若熱流下令陰頭赤腫血出方鯽魚肉銼五合赤小豆末三合上二味同搗水和敷之良薑礬散治小兒火丹並一切風疹赤腫生薑五兩切片子白礬二兩半同上調日乾不見火上為末生薑自然汁調鵝毛拂之又方牽牛末薄荷蜜水調下食後大便利是效治小兒丹瘤綿羊腦子生用朴硝上調勻貼於瘤上備急治白丹苧麻根三斤連葉赤小豆四升上以水三斗煮浴日三四遍浸洗妙看冷熱避風甘草散治小兒丹毒防入腹甘草炙銼一分為末麻油半斤上先取油麻去皮研細絞取汁一合調甘草末半錢匕服日再服青藍汁治小兒丹毒青藍汁一合竹瀝二合上和勻空心溫服一合日晚再服以瘥為度鯽魚塗方治小兒丹毒遍身絳色生鯽魚一頭三兩麻油二兩上搗魚令細入油研勻塗丹上日三五度即瘥梓木灰塗方治小兒家火丹發如大指日長一寸遍著兩脅傍兩頰上梓木白皮蓼葉各一分上燒灰研末以雞子白調如糊塗之以瘥為度豬槽泥塗方治小兒煙火丹從身起豬槽下泥一合生麻油一兩上和調如糊塗之以瘥為度廢磚塗方治小兒地灶丹從陰下起入踝骨上廢灶磚末屋四角茅燒灰各一兩上和研勻細以新汲水調如糊塗丹干即易之以瘥為度戎鹽塗方治小兒鬼火丹發兩臂赤起如李子及從面上起戎鹽二分附子一枚上燒過研細用雄雞血調塗丹上日三五遍以瘥為度一方用雄黃半兩雌黃塗方治小兒野火丹發遍身斑如梅李狀雌黃戎鹽研各一兩上以雞子白調塗丹上日三五次以瘥為度一方有雄黃無雌黃豬屎灰塗方治小兒白丹豬屎灰雞子白上調和如糊塗之以瘥為度茅灰塗方治小兒尿灶火丹從踝及背起茅草屋四角者取燒灰研雞子白上和調如糊塗之以瘥為度拔毒散治小兒丹發生於兩脅及腋下又名殃火丹川朴硝一兩梔子仁一兩上羅為末每用半錢好醋調塗患處次用山梔膏治丹發生於兩脅及腋下乃名殃火丹山梔子四兩生鯽魚半斤上藥同搗如泥看丹發處每用少許以醋化塗患處竹葉散治小兒丹發斑如梅子遍背腹乃名野火丹青竹葉二兩燒灰灶中黃土一兩上細研為散看丹發處每用少許以雞子白調塗患處赤豆散治小兒丹發於兩膀里尻間正赤流至陰處乃名天灶火丹赤小豆研一分伏龍肝研一分上再同研勻每用一分以雞子白調塗患處二根湯治小兒丹發膝上從兩股至臍間走入陰處乃名尿灶火丹桑根白皮李子根各四兩上細銼每用三匙頭以水兩碗煎至一碗去滓看冷熱避風處淋患處硝石散治小兒一切丹遍身體熱硝石一兩乳香一分上細研為散以雞子白調塗之又方太陰玄精一兩白礬一兩上細研為散以調塗之治小兒白丹方酸母草五葉草各五兩上搗絞取汁塗之治小兒黑丹風花石灰二兩屋四角茅草燒灰三兩上細研為散以雞子白調塗之日三五度效治小兒天火丹發遍身赤如絳色虎脂二兩黃丹一兩上研為膏塗之即瘥治小兒鬼火丹景天草五兩蛇銜草三兩上搗如泥以雞血調塗之治小兒野火丹白殭蠶二七枚慎火草一兩上搗令爛塗之治小兒螢火丹灶中黃土一合生油二合上調如泥時用塗之以瘥為度若痛上陰不治即殺人治小兒廢灶火丹赤小豆末一兩牛角燒灰二兩上細研為散用雞子白調如泥塗之治赤遊毒腫此方尤妙於前白玉散行在潘術干傳尤妙於前方只一晝夜消盡用花蕊石散生薑薄荷自然汁調鵝毛刷上患處妙治小兒丹毒及火丹熱如火繞腰者用搗馬齒莧一握取汁飲之以滓敷其上塗之亦可又方用煎大豆汁塗之良瘥後亦無瘢痕又方用臘月豬脂和釜下土敷之干則易治小兒五色丹方用豬槽下爛泥敷之干則易又方服黃龍湯二合並敷患處佳治小兒赤丹方用蕓薹葉搗取汁服三合滓敷上良千金翼以蕓薹末用雞子白和塗治小兒赤丹斑駁者方用唾和胡粉從外向內敷之一方粉熬過又方用鍛鐵屑以豬脂和敷之又方用屋塵以臘月豬脂和敷之治小兒火丹赤如朱走皮中方用醋和豉研敷之又方用鯉魚血敷之良又方用荏子搗敷之良亦治天火丹又方用豬屎水和絞取汁取服少許良治小兒天火毒肉中有赤如丹色大者如手甚者遍身或痛或癢腫方用赤小豆二升為末雞子白和如薄泥敷之干則易便瘥一切並用此方皆瘥一方用五合水和取汁飲一合取滓塗五心一方水調鵝毛拂上大妙又有雞冠丹大者如豆粒肉上生粟一名茱萸火療同前天火法治小兒骨火毒其瘡見骨方用搗大小蒜厚封之著足踝者是也治小兒殃火丹毒著兩脅及腋下者方用伏龍肝為末油和敷之干則易若入腹及陰以慎火草取汁服之治小兒屎灶丹初從兩股起臍間走入陰頭皆赤色用切桑白皮二升以水二升煮取汁浴之良又方用燒李根為灰以田中流水和之良一方半斤治小兒朱田火丹病一日夜即成瘡先從背起漸至遍身如豆棗大正赤色者亦治茱萸丹五色丹用濃煮棘根汁洗之以成瘡者赤小豆末敷之未成瘡者雞子白和豆末以敷凡方中用雞子者皆取先破者用之完者無力治小兒廢灶火丹初從足趺起正赤色者用棗根煮汁沐浴五六度治小兒丹毒用白豆末水和敷之勿令乾黃皮散治小兒遍身火丹並赤遊用黃皮山梔子等分為細末雪水調塗即瘥又方緑豆大黃為末薄荷蜜水調塗又方藍澱塗之並藍青汁飲之獨效散治小兒諸丹毒並赤遊腫用柏枝研細塗立效又塗白礬汁頻刷之即消又方以芒硝泡湯拭之亦效又方治小兒丹毒腫痛如火用土蜂窩為末入麝香少許蜜調塗之水調與吃尤妙治小兒丹毒入腹即殺人用水苔生大黃生菘菜豆葉蒴藋浮萍護火草五葉藤苦硝海藻菜蕓薹大黃梔子黃芩但得一味研末水調敷之良治小兒熱丹瘡成片及治大人用絲茅草葉破即愈治小兒丹瘤用萆麻子五個去皮研如面一匙以水調塗之甚妙又方用木鱉子新者去殼研如泥淡醋調敷之一日三五次便效治急救丹毒方用白扁豆末水和塗若入心腹者以慎火草取汁一盞服干即末之水調服本事方治小兒十種丹瘤腫毒所起形候一飛灶丹從頂起先腫用蔥白研自然汁塗二古灶丹從頭上紅腫痛用赤小豆末雞子清調塗三鬼火丹從面上起赤腫用灶心土末雞子清調塗四天火丹從背起赤點用桑白皮末羊脂塗五天灶丹從兩腎赤腫黃色用柳木燒灰水調塗六水丹從兩脅虛腫用生鐵末豬糞調塗七胡吹丹從臍上起黃腫用檳榔末米醋調塗八野火丹從兩腳赤腫用乳香末羊脂調塗九煙火丹從兩腳有赤白點豬槽下土清油調塗十胡漏丹從陰上起黃腫用屋漏處土羊脂調塗上此十種丹毒變易非輕治之或緩終不能救余不惜是方逐一仔細辨認依方法治之萬不失一如經三日不治攻入臟腑則終不可救治之也治丹瘤方用大黃朴硝大土蜂窠三味為末篾箍子箍定真赤處將刀子刺破令出惡血然後用井水調塗毒處效又方用茅屋上經年青苔焙乾為末醋調塗赤腫處消治小兒瘤初發用麻子擂為漿井水調下治小兒丹瘤服托裡散消毒飲外用白芨白蘞研為細末搽無病肉上而截之令不得過腳用紫浮萍爛搗敷瘤上萬不失一治大人小兒纏蛇丹初發便用用蚯蚓糞連皮生薑研爛敷即愈亦治火丹以水和泥敷之米醋調亦可又方用大黃為末搗爛馬齒莧取汁調塗已成丹亦治又方用蓼葉燒灰雞子清和數數塗之又方用桃仁湯浸去皮爛搗塗之又清油調白礬末亦妙治小兒風疹丹用蜜調赤土朱入酒二三滴服之亦研塗疹上治諸丹用人參羌活散惺惺散夾和用竹葉煎湯調下熱證加黃芩玄參冷證加黃耆白芷疏風解毒散治丹毒敷方用紫浮萍一碗活地龍中等者七條同研細敷之又方用水藻搗敷又方用芭蕉根搗汁敷之又方用蠶砂一升井水煎溫和蜜洗之亦治天灶火丹治青白丹毒癢痛虛腫如吹用灶中黃土一分豉半分為末麻油調敷患處蜞針法用水蜞數條以青苔蓋覆或濕紙亦可去血即消未消再用丹毒滿身遍黑入腹入陰難治平血飲治風熱積毒或發於頭面手足熱者如胭脂色其熱如火輕輕著手痛不可忍以紫草與犀角消毒飲相間煎服赤疸丹火疸紫萍疸並治壯熱煩渴甚者加黃芩麥門冬去心朴硝各半錢一方與敗毒散和生薑薄荷蟬蛻去足翼防風去蘆細切煎湯加天花粉少許又方治角疸用青黛土朱為末井水調入蜜敷角亦可又方用黃丹不拘多少磨刀水調刷治丹毒腫如火用大黃朴硝為末調塗腫處立效水苔生地黃菘菜浮萍梔子皆可研爛水調敷洗方用防風車前赤豆灶心土煎水洗又方洗角後用小驚丸壓邪大驚丸鎮驚治丹發疼痛用搗篇竹汁服一日一兩服立瘥若未瘥再服之治赤白遊疹及癰疽腫毒用水蛭十餘條令啖病處取皮皺肉白無不瘥也冬月無蛭蟲地中掘取暖水中養之令動洗去皮咸以竹筒盛蛭綴之須臾便咬血滿自脫更令飢者崔知悌令兩京預養之以防緩急收干蛭當展其身令長腹中有子者去之此物難死雖加火炙亦如魚子煙燻三年得水猶活也治小兒赤遊行於體上下至心即死方用芒硝內湯中取濃汁以拭上又方以水調塗之治一切丹毒瘤腫治小兒丹毒破作瘡黃水出亦治惡瘡用豉炒令煙絶為末油調敷之治小兒丹毒用柳葉一斤水一斗煮取三升以滓拓洗赤處日七八度治小兒赤丹不止用番黃米粉雞子白和敷之治丹火惡毒之瘡五色無常用蜜和乾薑末敷之良治丹火毒偏身睡不安亦治赤流用藦蘿草搗絞取汁或搗敷上隨手消治小兒熱毒遊腫用故麻鞋草鞋和人亂髮燒作灰醋和敷之治火丹毒用梔子和水調敷之一方用醋和塗之亦治神火丹治五色丹俗名遊腫若犯多致危急不可輕之用敗蒲席燒灰和雞子白敷之治小兒赤遊行於體上下至心即死用水中苔搗末敷上良治小兒暴熱丹毒寒熱腹內熱結用搗積雪草絞汁服之治小兒丹毒皮膚熱赤用寒水石半兩白土等分搗羅為末米醋調敷之愈治白丹用取白磁末豬脂和敷之治小兒丹毒從臍起方用伏龍肝或年深灶下黃土研為末用漏水和如糊敷患處干即易以瘥為度用新汲水調亦可一方用雞子白相和塗良治天灶火丹風熱赤遊腫以豬脂塗之治小兒赤遊行於體上下至心即死用蒴藋煎汁洗之一方搗葉敷之治丹毒五色者治小兒遊丹赤腫用蕎麥麵醋和敷之良療螢火丹從頭起用慎火草搗和苦酒塗之療煙火丹發從背起或兩脅及兩足赤如火用景天草即慎火草真珠末一兩搗和如泥塗之治小兒赤遊行於體上下至心即死用慎火草生一握搗絞汁以拭之拓上日十遍夜三四遍治小兒赤丹不止用胡荽汁敷之瘥療灶丹從兩腳起赤如火燒用五茄皮葉根燒灰五兩取鍛鐵家槽中水和塗之治五色丹遊腫不可輕之用牛屎敷之干則易治赤丹用研粟米敷之治熱遊毒赤腫用栝蔞末二兩酸醋調塗之治小兒丹毒用青黛和水服之又以汁敷之熱則易治小兒遊瘤丹毒諸惡瘡腫用爛搗剪刀草莖葉如泥敷之又以此草膏化如糊以雞翎掃上腫便消殊效根煮熟未甚干時又作果子常食無毒治小兒丹毒熱用旋覆花根苗搗絞汁服之治小兒風熱丹毒瘡用水甘草同煎飲服之又方用杵菘菜敷之治小兒火焰丹消赤腫用老鴉眼睛草根與木通胡荽煎湯服通利小便治小兒丹用杵黃芩末水調敷之香欒皮散治諸腫丹毒發於四肢腹背頭面或赤或白或癢或痛或寒或熱用香欒皮一兩水一大碗同煎取半碗以翎毛刷患處效蠐螬散治丹走行皮中浸廣者名丹火也入腹殺人用蠐螬乾者為末油調塗之以瘥為度泥醋塗方治小兒胡吹灶丹從陰下起用磨刀水棚下泥和醋調膏塗之干即更塗以瘥為度鐵槽水洗方治小兒飛灶丹從項起用浸槽中水日三五度又方飲一合治熱毒遊腫犬骨灰塗方治小兒神氣丹從項起用犬枯骨為末以青羊脂調如糊塗之日三五次治白丹針挑方上於兒男左女右大拇指面螺文上以針挑有筋斷之即瘥羊脂塗方治小兒伊火丹從兩脅下起青黑色用鍛鐵下槽中鐵屑搗研為末半兩羊脂二兩豬糞燒灰一兩同研如糊塗之以瘥為度治小兒患赤白遊疹用蝦蟆搗碎得之煮熟色正赤小兒及雞狗食之腳屈不行治一切丹毒用梔子大黃蜜水搗敷治小兒一切丹遍身體熱用浮萍草研如泥敷之又方用韭畦中土以水調塗之又方用粟米水煮濃汁洗之又方用地龍煮以水研如泥塗之治小兒一切丹及諸腫毒用鼠黏子根洗去苗土搗絞取汁每半合量大小分減服之治小兒一切丹用水苔搗爛頻頻敷之又方用景天草搗爛敷之一方取汁先微搽丹上後塗以瘥為度治小兒丹發惡毒五色無常用青栗球有刺者搗碎以水煮洗之治小兒五色丹遍身熱如