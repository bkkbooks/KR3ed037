送下無時玉桂杖丸治小兒飲食減少臟腑不調厚朴藿香陳橘皮神麯訶子皮各二錢川芎丁香木香白朮甘草各一錢人參二錢上為細末煉蜜和丸如櫻桃大每服一丸至二丸生薑湯下食前服小兒一丸分二服米飲化下羸瘦附論夫小兒羸瘦不生肌肉者皆為脾不和不能飲食故血氣衰弱不能榮於肌膚也凡小兒在胎而遇寒冷或生出時挾伏熱皆令兒不能飲食故羸瘦也挾熱者則身體壯熱肌肉微黃其挾冷者時時下利唇口青色也方秦艽丸治小兒羸瘦體熱心神煩悶小便赤黃秦艽去苗桑根白皮銼枳殼麩炒微黃去瓤地骨皮黃耆銼人參去蘆頭赤茯苓犀角屑甘草炙微赤銼各半兩龍膽去蘆頭一分柴胡去苗三分上為末煉蜜和丸緑豆大不計時候用粥飲下五丸更量兒大小增減訶黎勒散治小兒羸瘦脾胃氣弱挾於宿食不欲乳食四肢不和訶黎勒皮陳橘皮湯浸去白瓤焙甘草炒微赤銼各半兩黃耆銼人參去蘆頭白朮藿香桂心白茯苓各一分上搗粗羅為散每服一錢以水一小盞入生薑少許棗一枚煎至五分去滓溫服日三四服量兒大小以意加減丁香散治小兒羸瘦脾胃虛冷四肢不和少欲乳食丁香桂心白朮高良薑甘草炙微赤銼各一分白茯苓厚朴去粗皮塗生薑汁炙令香熟陳橘皮湯浸去白瓤焙各半兩人參去蘆頭半兩上搗粗羅為散每服一錢以水一小盞入棗一枚煎至五分去滓量兒大小加減溫服日三四服黃耆丸治小兒羸瘦體熱面色萎黃不欲乳食黃耆銼赤芍藥人參去蘆頭胡黃連甘草各微炒銼各半兩麥門冬去心焙鱉甲塗醋炙微黃去裙襴各一兩柴胡三分去苗上為末煉蜜和丸如麻子大不計時候以粥飲下五丸量兒大小以意加減麥門冬丸治小兒雖食不長肌膚羸瘦骨熱小便赤黃麥門冬一兩去心焙人參去蘆頭黃耆銼青蒿子黃連去須桑根白皮銼枳殼麩炒微黃去瓤地骨皮各半兩柴胡三分去苗上為末煉蜜和丸如緑豆大不計時候以熱水研五丸服量兒大小以意加減燒黃瓜丸治小兒羸瘦體熱乳食全少黃瓜大者一枚黃連去須陳橘皮湯浸去白瓤焙各半兩胡黃連柴胡鱉甲童子小便浸三宿炙微黃去裙襴各一兩上搗細羅為散以黃瓜切開頭去瓤內藥末令滿以切下蓋子蓋之用蕎麥麵和溶固濟可厚三分於粳灰火內燒令面焦黃為度取出去面放冷入麝香一錢都研和丸如緑豆大每服食前米飲下七丸更量兒大小以意加減甘草丸治小兒羸瘦氣惙惙宜常服不妨乳用甘草二兩炙微赤銼搗羅為末煉蜜和丸如緑豆大每服以溫水下五丸日二服量兒大小加減服之又方治小兒癆瘦並疳疾本草以黃色大蝦蟆謂之山蛤煮食之以去皮並肚腸等和肉作餅煎熟食又方治孩子瘦損本草用蘆薈子煎服
