body:
  text: 卷三百九十三嬰孩癖積脹滿門宿食不消附論夫小兒腸胃嫩弱飲食易傷若將養失宜乳哺不節致脾胃不能傳化水穀之氣故令乳食宿久停滯不消其候腹滿壯熱眠寐不安診其三部脈俱沉滑者乳不消也經云人以胃氣為根本而以飲食為命脾為中州乃土也胃受土象之氣滋榮萬物玄機曰食入胃而脾為磨化布五味以養五臟榮養百骸潤澤四肢固其根本也巢氏曰胃氣調和則乳哺消化脾胃虛冷則宿食不消楊氏曰驚惕不食者心為脾母火能生土當用心藥入脾胃藥中母能令子實古人進食方用益智等者此也小兒宿食不消身體發熱或發吐瀉宜用水精丹利之卻不用補藥調理如身上熱不退瀉不止仍發渴心躁宜進玉珍散二三服如更不退須進銀涎散一二服卻將調胃氣藥相間服若只瀉清水宜用白龍丸二三服錢乙論食不消脾胃冷故不能消化當補脾益黃散主之方金箔丸治小兒驚風奶食不化或外受風傷冷毒瀉血一切諸疾悉皆治之金箔四十九箔硃砂水飛水銀牛黃青黛各研白殭蠶微炒蟬殼洗去泥土麻黃去節白附子天麻酒浸炙麝香別研犀角鎊末乾蠍天南星炮各一分膩粉一錢研上修事畢入乳鉢內研令勻細用生蜜和為錠子以油單子裹每服二丸梧桐子大薄荷汁化下傷寒用生薑薄荷湯化下小兒諸疾無不效胡黃連丸治小兒驚疳化涎消食胡黃連牛黃硃砂麝香少許蘆薈四味各研青黛鉤藤炙貫衆膩粉少許鶴蝨雷圓天竺黃研各等分上為末麵糊為丸如粟米大每服三丸至五丸如有驚食只取下食如無不動牛黃鱉甲丸治少小癖食壯熱食不消化中惡忤氣並宜治之代赭丸治小兒驚熱腹脹宿食不消積年瘦弱代赭搗研一兩丹砂別研麝香別研犀角鎊各一分大黃銼炒三分牛黃研各三分當歸切焙鱉甲酥炙去裙襴巴豆去皮心出盡油別研枳殼去瓤麩炒各半兩上搗羅九味為散入巴豆再同研勻煉蜜和搗一二百杵丸如麻子大二三歲兒空腹熱水下二丸四五歲兒以上量大小加之丁香丸治小兒宿食不消心腹虛脹丁香木香乳香細研雄黃細研青橘皮湯浸去白瓤焙各一分肉豆蔻去殼檳榔各二兩巴豆霜半分硫黃一錢細研硃砂細研水飛過半兩上為末入藥同研令勻煉蜜和丸如黍米大每服以粥飲下三丸量兒大小加減服之九味當歸湯療小兒宿食不消發熱當歸甘草炙芍藥人參桂心黃芩乾薑各一分大棗五枚大黃二分上藥切以水一升半煎取六合去滓分服增減量之真珠丸治小兒驚熱化聚滯奶食墜涎利大腸真珠細研水飛天竺黃為細末硃砂研水飛各一分丁頭代赭雄黃研水飛麝香研各半兩杏仁三十粒湯浸去皮尖雙仁者麩炒令微黃巴豆十粒去皮用油煎令褐色杏仁同研上為細末研令勻煉蜜為丸如緑豆大每服以生薑湯下一丸三歲以上加減服之快膈消食丸又名消乳丸湯氏寶書縮砂仁橘皮炒京三稜蓬莪朮炒神麯炒麥糵炒香附子甘草炙以上各半兩上為末麵糊丸如麻子大食後白湯送下大小加減一方無甘草三稜丹調冷熱消宿食京三稜炮裂神麯木香各一兩乾薑半兩半夏一兩生薑八兩用搗成膏炒黃丁香陳橘皮去白桂心各半兩上為細末煉蜜和如雞頭大每服一粒薑湯化下消穀丸治小兒宿食不消體熱多眠嘔噦氣上陳曲炒木香人參乾薑炮麝香研甘草炙銼枳殼去瓤麩炒微黃上各等分搗研為細末煉蜜為丸如黃米大每服二十丸溫米飲下犀角丸治小兒宿食不消心腹脹滿止痰逆利胸膈進乳食犀角一錢青橘皮去白炒京三稜炮銼木香各半兩黑牽牛炒二兩巴豆去心膜出油盡取霜炒半錢皂莢三挺不蛀大者銼炭火內燒煙絶為度浮水內蘸去火毒上搗六味為末與巴豆研勻麵糊丸如麻子大每服七丸至十丸食後生薑橘皮湯下量兒大小加減平胃丸治丈夫小兒食實不消胃氣不調或溫壯熱結大小便不利者有病冷者服露宿丸熱藥後當進此丸調胃大黃二兩小草甘草炙芎藭葶藶各一兩芍藥一兩杏仁湯浸去皮尖五十個上為末蜜丸飲服如梧子大五丸日三一歲兒二丸漸加之千金翼有菖蒲當歸乾薑茯苓麥門冬細辛無杏仁為十二味訶黎勒散治小兒宿食不化少欲飲食四肢消瘦腹脅多脹訶黎勒皮三分白朮麥糵炒令微黃陳橘皮湯浸去白瓤焙檳榔各半兩甘草一分微赤人參去蘆頭半兩上搗羅粗為散每服一錢以水一小盞煎至五分去滓量兒大小分減溫服日四五服代赭丸治小兒宿食不消壯熱腹脹代赭細研當歸銼微炒硃砂細研水飛過枳殼麩炒微黃去瓤木香各半兩麝香一分細研巴豆霜半分上搗羅為末入研了藥更研令勻煉蜜和丸如麻子大每服以粥飲下二丸更隨兒大小以意加減黃芩散治少小腹大短氣熱有進退食不安谷為之不化黃芩大黃甘草炙麥門冬去心芒硝各二兩石膏一兩桂心八銖上切以水三升煎取一升分為三服一歲以上為五服麝香安中丸治小兒飲食不化寬中止吐甘松葉二兩去土益智陳皮香附子各三兩蓬莪朮一兩南木香半兩麝香一錢上除麝香別研外余藥同為細末白麵糊為丸更用生蜜熟油少許一處和劑量兒大小丸如黍米大每服二十丸至三十丸薑湯下不計時候木香丸治小兒氣弱開胃進食木香人參白茯苓青皮陳皮各去瓤肉豆蔻以上各一分京三稜一兩炮上為末麵糊丸如麻子大每服十丸薑湯下七味進食丸常服消進飲食三稜散疏脾土消食化積三稜炮莪朮炮益智仁去殼甘草炙神麯麥糵橘紅各五分上為末白湯下香朴散治小兒脾胃氣弱乳食遲化宿昔成積久而不消兼和氣止瀉及腹肋刺痛起止疼痛不思飲食厚朴去粗皮生薑汁炙銼一兩木香麥糵炒陳曲炒青橘皮去白焙各一分陳橘皮去白焙一分上為細散每服半錢白湯調下陳橘皮散治小兒宿食不消心腹脹悶亦治嘔逆噁心背寒腳冷陳橘皮湯浸去瓤焙高良薑銼人參去蘆頭檳榔各一分白茯苓甘草炙微赤銼各半兩上搗粗羅為散每服一錢以水一小盞入生薑少許棗一枚煎至五分去滓不計時候量兒大小加減溫服檳榔丸治小兒宿食不化發熱有時檳榔牽牛子微炒川大黃銼碎微炒各半兩乾薑炮裂銼枳殼麩炒微黃去瓤甘草炙微赤銼各一分上為末煉蜜和丸如緑豆大每日空心溫水下五丸晚後再服更看兒大小臨時增減服之人參丸一名參朮丸治小兒宿食不消吐痰涎亦治逆食及乾嘔食少人參去蘆頭丁香乾薑炮裂銼白朮陳橘皮湯浸去白瓤焙各一分半夏半兩湯洗七遍去滑上為末煉蜜和丸如麻子大每服以溫水下五丸日三服量兒大小以意加減褊銀丸歌曰壯熱時時又作寒都緣食積未能安早求良藥須清肺免得兒啼心欲酸白朮陳皮同桔梗巴霜和蜜去頑涎水銀磨入生犀服銀箔為衣病永痊白朮桔梗陳橘皮各一分銀箔三片水銀一錢同結成砂了犀角末一錢研巴豆二粒去皮棗一個裹燒熟上為末蜜丸小豆大捻令褊薄荷湯研下一丸玉珍散治嬰孩小兒乳食不消腮腫舌青驚躁渴瀉驚熱驚疳滑石白者佳石膏煅各半兩甘草炙白附子白殭蠶直者去絲炒以上各一分蚌粉水淘澄去砂石卻連盞在火上煅通紅刮下水飛過細紙研稱上為末入腦麝各少許每服嬰孩一字二三歲半錢五七歲一錢麥門冬熟水調下如渴瀉烏梅湯調下驚疳燈心湯調下小兒氣怯者腦麝須極少許千金丸治小兒食不消木香烏梅炒肉桂各一錢硇砂半錢胡椒半分巴豆三十粒取霜上為細末稀糊為丸芥子大每服十丸或十五丸紫蘇湯下挨積丸治小兒脾胃不和宿滯不化腹脹腸鳴嘔逆噁心便利不調乳食減少或疳瀉積瀉大便酸臭亦治丈夫婦人胸膈不快酒積食積嘔逆噁心吐瀉脾疼京三稜炮陳皮不見火各三兩丁香不見火青皮去白各一兩乾薑炮巴豆去皮膜二錢半分上為細末入巴豆拌勻面醋糊為丸如粟米大每服五十丸至六十丸二歲兒可服七丸至十丸生薑湯吞下熟水亦得不拘時候更量兒歲數加減與之此藥不用大黃硇砂汞粉之類並是溫性之藥常服清積滯進乳食退黃令兒長肌肉芍藥丸治小兒不生肌膚腹大食不消化芍藥大黃銼炒各一兩一分桂去粗皮赤茯苓去黑皮各三分柴胡去苗一兩上末煉蜜和搗三二百杵丸如麻子大五六歲兒空腹米飲下三丸日晚再服量兒大小加減人參湯治小兒胃氣虛宿食不消吐利人參赤茯苓去黑皮白朮各半兩甘草炙一分半夏半兩浸過薑汁炒乾上粗搗篩每服二錢水一盞生薑二片煎至五分去滓溫服不計時候日三量兒大小加減牛黃丸治小兒宿食乳不消腹痛驚啼牛黃二銖附子炮裂去皮臍二枚真珠巴豆去皮膜杏仁湯浸去皮尖各一兩上五味搗附子真珠為末下篩別搗巴豆杏仁令如泥內藥及牛黃搗一千二百杵藥成若干入少蜜足之百日兒服如粟米一丸三歲兒服如麻子一丸五六歲兒服如胡豆大一丸日二服先乳哺了服之膈上下悉當微轉藥丸全出者病愈散出者更服以藥丸全出為度青木香丸治大人小兒寬中利膈行滯氣消飲食治胸膈噎塞腹脹痛心下堅痞腸中水聲嘔噦痰逆不思飲食木香二十兩補骨脂炒香四十兩黑牽牛二百四十兩炒香別搗取末一百二十兩蓽澄茄四十個檳榔四十兩酸粟米裹濕絹包灰火中煨令紙焦去飯上為細末入牽牛末令勻漸入清水和令得所丸如緑豆大每服二十丸茶湯熟水任下食後服每酒食後可服五丸七丸小兒一歲服一丸懷妊婦人不可服進食丸一名木香丸安和脾胃消化積滯止咽噦吐利除心腹脹滿利胸膈散滿痞常服丁香一錢肉豆蔻二個木香半錢巴豆九個去皮生用五靈脂七錢上為細末麵糊為丸如緑豆大每一歲一二丸食後生薑湯下桃葉湯下亦得一方用陳皮湯送下磨積丸治小兒臟腑怯弱內受積冷脅肋脹痛嘔吐痰逆腸鳴泄瀉日夜頻並四肢困倦面無顏色肌肉消瘦不進飲食及疳氣羸瘦肚大青筋口乾煩渴小便白濁食不生肌或發虛腫寒熱往來或因食甘肥蟲動作痛叫哭合服並能治之乾漆炒丁香各一兩青皮去白京三稜炮各六兩蓬朮半斤上為細末水糊為丸如粟米大每一二歲兒可服五丸淡薑湯吞下不拘時候更量歲數虛實加減與之順氣丸治小兒乳食不化腹急氣逆巴豆十粒去皮分作二十片胡椒二十粒丁香二十粒青橘皮二十枚全者浸湯去白每枚入巴豆半粒胡椒丁香各一粒用線纏之上用米醋一升煮候醋盡取出焙乾為末爛飯丸如粟米大每服二丸米飲下更量兒大小加減延年草安神導氣消酒食益脾老人小兒皆可服青皮一斤湯浸三日日三換候若沫去盡然後去瓤切作指面大方片子甘草六兩銼稱炙上等白鹽花五兩再淋煎要雪花白新舶上茴香四兩上用甜水一斗同藥入金鍋內熬銀鍋亦得不住手攪勿令著底置密器中收不得走氣候水盡取出慢火炒令乾不得有焦氣選謹慎者一人專主之去甘草茴香不用只收貯青皮如傷生冷果實菜蔬之類即嚼數片隨即無恙常服一兩片極佳以其尤宜老人邢和璞所以名萬年草斯立又以延年草目之也白芷丸小兒常服消乳食白芷半兩檳榔一個青橘皮一分去白巴豆四粒炮去皮出油上為末同研麵糊為丸如粟米大溫水下三丸至五丸常服三味紫霜丸治小兒乳食不消五靈脂丸治小兒宿食不消心腹脹悶五靈脂代赭各一兩巴豆霜一分上為末入巴豆霜同研令勻用麵糊和丸如粟米大每一歲以溫水下一丸加至三丸洗心散治小奶食傷心作壯熱喘息不調咳逆多睡甘草一錢生麥門冬一分半洗淨皂角半兩入沙糖塗酥炙後於盆下蓋良久出火毒方用上爛杵不羅每服二錢水一盞煎