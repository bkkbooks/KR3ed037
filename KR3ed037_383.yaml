body:
  text: 卷三百八十三嬰孩諸疳門疳瀉附論全嬰論云賈公賓監酒子四歲六月中泄瀉黃水身熱小便赤少或夾白酸臭召一醫作伏暑與五苓散黃龍丸不退一醫作食瀉以感應丸小益黃散補因兒恣食病多進退至月餘目疱浮腫面黃消瘦腹大氣粗渴飲不食糞食不化腥臭肥膩召愚視曰本傷水食因瀉久則亡津液變成疳瀉主人曰何傷暑食與疳瀉兒平日不曾食甜物何便成疳也答曰傷暑瀉黃身熱小便赤少傷食者瀉白酸臭食物不化疳瀉者瀉腥肥膩腹急氣粗錢氏云疳皆脾胃病亡津液之所致也蓋脾胃有疳食積所以進退不已此病以補之法去其積主人曰小兒瀉久憔悴難動臟腑答曰積聚之病終身為憂況疳病已成虛中有積若不以補瀉之法恐久害身主人聽先以麝沉香膏益黃散補三日各三服第四日與二黃丸止瀉餘次除積再前藥補二日病退七分後投石膏六甲丸治愈方人參散治疳瀼瀉湯氏曰此瀉與積瀉相類但臭如抱退雞子瀉又不止有如水聚作一次只難得止實者宜微取積宜食先服麝香散常服六神丸次服人參丸人參去蘆白朮炒黃耆蜜炙茯苓去皮甘草炙各一錢丁香二錢肉豆蔻一錢使君子肉五個白姜五分木香一錢胡黃連二錢上末陳米煎空心服一方加白豆蔻大小以意加減吳婆散治小兒疳瀉不止日夜遍數不計漸漸消瘦木香炮丁香沒石子蜜炙檳榔黃連炒厚朴制桃根白皮各等分苦楝根白皮各等分上為末三歲半錢柴胡木瓜湯下食前一日三服一方有蕪荑東坡家小兒曾患此症百藥不效因得此方多人服之皆愈錄此示人藥性少溫暴熱瀉者或不相當如先生之說果驗也保命丸治小兒瀼瀉傷食瀉香附一兩淨白姜炮青皮陳皮去白各一兩砂仁一兩三稜炮莪朮半兩甘草炙半兩上為末麵糊為丸如綠豆大每服一十二丸淡薑湯下食前服麝沉膏治小兒疳瀉白濁腥臭肥膩骨熱多渴腹痛不食羸劣無力頸骨垂倒乳香一錢木香一錢炮訶子炮四錢麝香半錢沉香半錢蚵蚾酒浸去皮骨炙黃六錢豆蔻半兩取訶子入乳香在內薑汁麵裹炮焦去皮上為末煉蜜丸如雞頭大三歲一丸米湯下沒石膏治小兒疳瀉白濁腥臭肥膩骨熱多渴沒石子二個香附子四錢人參訶子炮去核丁香各一錢白朮炙二錢巴豆十粒針穿燒存性上為末煉蜜丸如雞頭大三歲一丸米湯化下至聖丸治冷疳不時泄瀉虛汗不止丁香青皮各一錢木香紫厚朴制橘紅使君子焙肉豆蔻濕紙裹煨各二錢上為末神麯糊丸麻子大每七丸食前米湯下調中散治小兒瀼瀉傷食瀉香附甘草白茯苓天仙藤藿香白芍藥葛粉上各等分為末烏梅甘草湯調一錢食前服加聖丸治冷熱疳瀉胡黃連川黃連白蕪荑去皮各三分使君子一兩去皮殼秤麝香別研半錢干蝦蟆五個銼熬成膏上煎藥為末與膏丸麻子大每服人參湯下二三歲五六丸以上十至十五丸香蔻散治疳瀉黃連三錢炒肉豆蔻生木香訶子煨縮砂仁茯苓各一錢上末粳米飲丸如麻子大每服十丸食前米飲下沒石子丸治疳痢及治瀼瀉血痢滑腸腹痛木香黃連各二錢半沒石子一個炮肉豆蔻一個煨訶子二個煨蠟茶半兩上為細末爛飯丸如黍米大白湯下量兒大小服之日進二三服食前米飲湯送下亦可一方無蠟茶龍粉丸治疳瀉渴飲草龍膽定粉微炒烏梅焙秤黃連各二分上為末煉蜜和丸麻子大米飲下一二十丸無時疳虛極用補藥太過反生大熱而渴當審六甲丸治小兒疳瀉白瀉腥臭肥膩骨熱多渴復疼不食體倦少力六甲日修合黃連炒五錢肉豆蔻木香上為末白麵糊丸如小豆大三歲三十丸米湯下食又一方木香一分肉豆蔻半兩薑汁面炮訶子水炮去核一兩黃連二兩治法一同木香丸治小兒疳渴不止腹急亦理尋常腹脹木香炮肉豆蔻炮各一分牽牛半兩半注半炒上為末糊丸如小豆大三歲三十丸米湯送下芎樸丸治小兒疳瘦瀉白水腹脹芎藭厚朴各一兩白朮半兩上為末煉蜜丸如小彈子大每一丸米飲下三歲以下半丸京芎散治小兒疳瀉進退京芎赤石脂各等分上為末三歲兒半錢米湯下飢服又方加蚵蚾灰訶子炮黃連炒肉豆蔻炮當歸焙作丸子尤妙香糖丸治小兒吃泥害肚進退不定並治疳瀉上以輕粉一錢糖沙溲和為丸如雞頭肉大三歲一丸米湯化下食久瀉下泥土後以益黃散若以陳皮地榆煎湯化下治疳瀉痢治小兒疳瀉上用赤石脂杵羅為末如面以粥飲調半錢服立瘥或以京芎等分同服更妙治疳瀉疳痢百藥不效只一服取安方上用雞子一枚打破黃臘一塊大如指面熔鍋內傾雞子炒熟令兒空心吃盡此乃隨藥作效百發百中凡瀼瀉亦與傷瀉不相遠也治法亦須略取然後服前件藥若小兒稟賦平常亦如前法只用官局進食丸取之若充實頑健飲食如常者當峻取之方上用雞子一枚箸頭孔竅入金星丸一歲五丸二歲十丸大小加減入藥於雞子內紙塞蒸熟取出去殼空心令兒連藥吃盡良久取下臭穢滯積卻再吃前方蠟雞子一枚仍忘魚肉一日只吃蔥白粥百無一失治小兒水瀉奶疳上用川椒一分去目為末醋調之少敷腦上日可三度四香三米飲治小兒疳傷緊瀉遺糞帶餿酸臭氣穢至二三尺遠最有神效木香丁香檀香各等分藿香葉加兩倍用早米晚米或陳倉米尤妙糯米各等分炒熟上每服米藥三錢重水一盞煎不拘時候六神丸治疳氣消瘦臟腑怯弱泄瀉虛滑乳食減少心腹脹滿肉豆蔻麵煨木香炮一兩丁香訶子肉炮各半兩使君子二兩半蘆薈一兩半另研上為末棗肉和丸加減米湯下緊瀉不止須紫霜丸推之直指沒石子丸沒石子一個白豆蔻一個訶子煨二個取肉木香炮一兩黃連各一錢上為末粳米糊丸梧子大每服十五丸米飲下神效豆蔻散治小兒疳瘦弱或泄瀉無度神麯半兩炒肉豆蔻三兩裹煨麥糵半兩炒黃連去須半兩使君子十枚去殼蘆薈二錢半另研上為細末獖豬膽汁為丸如黍米大每服二三十丸米飲下空心食前木香散治小兒腹脹不消疳瀉白色乳食不化木香一錢青橘皮去白一兩陳粟米一合豆巴去殼三十粒同粟米炒令巴豆黑去巴豆不用只用粟米肉豆蔻二十枚上用一枚麵裹煅過蜣螂二枚去頭足翅糯米炒焦不用糯米上件為細末每服半錢溫米飲調下乳食空服香連散治五疳瀉痢龍膽草一錢胡黃連一錢五靈脂一錢炒丁香半錢赤剪子一錢麝香半錢蘆薈龍骨半錢上為末爛飯為丸如粟大飲湯吞下使君子丸治五疳瘦悴面色萎黃發豎眼澀瀉痢穢惡並宜服之蕪荑一錢苦楝皮一錢使君子二十個去殼炒訶子一錢煨陳皮一錢青皮一錢檳榔一錢木香半錢硫黃丸治小兒疳瀉不止色如米泔者巴豆肉二十枚去殼裹出盡油硫黃別研五靈脂一錢炒丁香半錢上件為細末蒸餅丸如黍米大每服七丸溫米飲送下乳食前服玄明粉丸治瀉通因通用也罌粟殼上為末再入玄明粉一錢麝香少許再取豬膽汁煮粉為丸每服五十粒陳皮湯下如水瀉陳米飲下煩渴罌粟殼湯下澀石榴皮湯吞下木香丸治小兒吃食大早遂成疳疾腸脹疳瀉及瀼瀉等病木香沉香青皮去白各一分肉豆蔻一錢麵裹煨黑牽牛二炒上為細末醋麵糊丸如麻子大二三歲兒服三粒五六歲服五七粒濃煎蘿蔔子湯下疳渴不止附論夫小兒宿有疳氣肌膚瘦瘁內亡津液心肺壅熱則為疳渴蓋因乳母不慎恣食熱物不擇酸鹹致令壅熱潛流乳脈或即乳兒致臟腑生熱疳熱相搏上焦乾燥津液枯少故煩躁而渴方龍膽丸治小兒渴疳黃瘦日飲水無定龍膽研麝香研丹砂研牛黃研胡黃連熊膽蘆薈丁香木香黃連去須大黃銼麒麟竭各一分蟾酥研一錢上研為細末再研勻和飯丸如綠豆大每服三丸至四丸薄荷湯下地骨皮丸治小兒疳瀉不定黃瘦不思食地骨皮龍膽黃芩去黑心枳殼去瓤麵炒木香赤芍藥豬苓去黑皮海蛤研各一分紫參研大黃銼炒各半兩郁李仁炒研一兩一分上為末煉蜜和丸如綠豆大每服五七丸溫湯下微利即止量兒大小加減蟾酥丸治小兒疳渴不止及急慢驚風膈有痰涎天釣疳風並皆治之蟾酥麝香研犀角鎊牛黃研丹砂研蘆薈研天竺黃各一半兩益知去皮十枚青黛研半兩干牛膽五枚全者白花蛇一寸去皮骨炒上為末用獖豬膽汁和丸如米粒大丹砂為衣每服五丸至七丸煎薄荷湯下驚風用剪刀股研薄荷湯下慢驚煎荊芥湯下疳氣麝香湯下驚風搐搦目睛上視煎金銀酒化下此藥兼利胸膈墜涎壓心臟腑積熱順氣進奶食開胃小兒諸疾皆治量兒大小加減天竺黃散治小兒多疳渴體熱煩躁少得睡臥天竺黃半兩細研黃連半兩去須馬牙硝半兩梔子仁半兩葛根半兩銼甘草一分炙微赤銼牛黃一分細研款冬花一分紫苑一分洗去苗土犀角屑一分土瓜根一分上為細散都研令勻不計時候以蜜水調下半錢量兒大小加減服之參苓白朮散治疳渴由臟腑宿有疳氣加之乳母恣食甘肥酒面炙煿使邪入心肺壅熱日則煩渴飲水乳食不進夜則渴止白朮人參去蘆甘草炙山藥石蓮肉桔梗去蘆炒薏苡仁縮砂仁各三錢白扁豆薑製一錢白茯苓去皮一兩上為細末蜜水調下一錢全生方白朮丸疳病皆因津液亡竭凡飲食之中此藥食之王氏曰仍以前藥加黃連入豬肚內縛口煮爛入臼杵丸食後米飲下可以生津清心止渴調脾諸疳皆可常用龍膽散治小兒疳渴羸弱龍膽熊膽研蝸牛炒令黃蘆薈研夜明砂炒麝香研青黛研丹砂水飛各半兩乾蟾頭炙焦一枚上研為散每服半錢米飲下量兒大小加減金粉地黃膏治小兒膈壅渴干涼心經鬱金一兩皂莢水煮軟切焙蛇黃粉半兩銼雄黃水飛一分綠豆粉半兩白朮人參甘草炙各一分牛黃一錢上為末煉蜜和丸如綠豆大二歲一丸薄荷湯化下一歲半丸更量大小加減烏梅丸治小兒渴疳飲水不止烏梅肉焙茜根去土木瓜焙葛根炮各一兩人參一分白朮一分赤茯苓去黑皮半分甘草炙半兩上為末沙糖和丸如皂子大每服一丸新汲水化下蘆薈丸治小兒渴疳肌膚消瘦乳食不進蘆薈研硼砂研麝香研馬牙硝研人參熊膽研甘草炙搗為末各半兩上為末煉蜜為丸如綠豆大每服五丸或七丸薄荷湯下鉛霜丸治小兒疳鉛白霜鉛丹定粉鐵粉龍腦蛤粉馬牙硝上等分為細末入麝香少許蝸牛肉研和為丸如梧桐子大每服一丸倒流水化下大棗湯治小兒久疳多渴不慕乳食大棗去核人參白朮白茯苓去黑皮陳曲炒各一兩甘草炙檀香銼各一分上搗篩一歲兒一錢水半盞入棗一枚擘煎至三分去滓溫服日三服量兒大小加減服之胡黃連丸治小兒疳渴黃瘦壯熱不欲乳食胡黃連半兩旱蓮子半兩龍膽半兩去尖頭牛黃一分研細青黛半兩細研烏梅肉半兩微炒上為末以棗瓤和丸如綠豆大每服以甘草湯下五丸日三服量兒大小加減黃連丸治小兒疳熱煩渴乾瘦黃連一分去須天竺黃一分細研甘草一分炙微赤銼梔子仁一分款冬花一分牛黃一分細研葛根一分銼紫菀一分洗去苗土犀角屑一分川朴硝半兩竹瀝二合上為末先用竹瀝拌和更入熟蜜和丸如綠豆大每服以新汲水研破五丸日四五服量兒大小臨時加減黃連散治小兒渴疳引飲不止胡黃連葛根銼玄參枇杷葉拭去毛炙黃甘草炙各一分麥門冬去心焙半兩上為散每服一錢水一盞生薑少許煎至五分去滓入蜜少許再煎一兩沸放溫服愈金湯治小兒渴疳喜水小便淋山梔子炒黃一兩瞿麥半兩木通銼半兩滑石研一分甘草炙一兩竹葉一兩切焙上搗篩二歲兒每服一錢水一盞沙糖皂子同煎至五分去滓溫服日兩服更量兒大小加減人參散治小兒宿有疳氣心腹壅熱內亡津液煩渴不止