小兒無辜疳面黃髮直時時壯熱飲食不加肌肉漸瘦棘剛子為末如無以水銀化之麝香研蟾酥研牛黃研各一分白附子末半兩犀角末半夏末各三錢干豬膽少許上同研細麵糊丸如黍米大每服七丸薄荷湯下或乳汁亦得鱉甲丸治小兒無辜疳腹中癖四肢瘦弱宜常服鱉甲醋炙黃去裙襴黃連去須桔梗炒夜明砂各一兩麝香一分研訶黎勒皮兩枚一生一熟干蝦蟆雄者一枚塗酥炙令黃焦上為末以糯米飲為丸如綠豆大粥飲下七丸疳痢亦宜服日三次量兒大小加減一方有蠍虎無干蝦蟆煉蜜和丸麝香熊膽丸治小兒無辜疳面黃髮直時發壯熱飲食不長肌肉麝香研半兩熊膽研二錢蘆薈研三分胡黃連黃連去須各一兩使君子去殼十枚乾蟾大者一枚去足並腸胃燒灰研上研為細末以白麵稀糊丸如綠豆大每服十五丸至二十丸米飲下長肌丸治小兒無辜疳面黃髮直時時壯熱食不生肌胡黃連半兩木香無食子各一分蘆薈研麝香研牛黃研黃蘗去粗皮各半分上搗羅四味為末與三味研者拌勻滴水和丸如綠豆大每服五丸七丸溫水下量兒大小加減蠍虎丹治小兒無辜疳截疳祛毒乾蠍虎雄者微炙蝸牛殼蘭香根澱花各一分雄黃細研麝香研各一分龍腦研半分上為細末米醋打麵糊和如黍米大每服十粒煎芝麻湯下服乳食後蚺蛇膽丸治小兒無辜疳發作穗羸瘦腹脹面黃蚺蛇膽去脂炙黃芩去黑皮枳殼去瓤麵炒甘菊花牛膝酒浸切焙各一分赤芍藥升麻各半兩上為末煉蜜和丸如綠豆大每服五丸空心服米飲下更量大小加減蟬殼灰丸治小兒無辜疳宜常服蟬殼灰澱花蛇蛻皮灰乾蠍二十枚微炒附子去皮臍生用硃砂細研麝香細研以上各一分上為末都研勻以熟水浸寒食蒸餅和丸如麻子大每服以粥飲調下五丸量兒大小以意加減針烙法丸方治小兒無辜疳頭干發豎身無滋潤頭露骨出腦熱腹脹鼻中多癢好食醬肉數渴飲水痢如泔色背冷腹熱腹中有塊漸加黃瘦或有邪鬼之作亦是閃癖之類腦後兩邊皮中有筋肉結作小核如杏子大多時不除即流入腹中遂成前狀須烙破結子者或有炙其結子者有割皮挑出結子者稍勝於炙然病者至深小兒忍痛不任恐動其脈往往為疳疾今參詳最妙者是烙烙亦更無別法但看小兒病狀似有結子者速依此法烙之上以一銀針尖利者燒針頭似火色看核子大小作一紙鐶子束定無辜仍須捏定以針當中烙之可深二豆許即貼沉香膏治小兒無辜疳用苦耽苗子煮汁服亦生搗絞汁服鱉甲湯治小兒無辜項細腹大發乾作穗鱉甲去裙襴炙令焦陳橘皮湯浸去白焙蒼朮去皮米泔一宿切焙赤茯苓去黑皮赤芍藥各三分檳榔上粗搗篩一二歲兒一錢水七分煎至四分去滓分溫二服日再量兒大小以意加減鱉甲散治小兒無辜疳訶黎勒去核蒼朮去皮米泔浸切焙鱉甲去裙襴醋炙焦牽牛子焙各一分木香赤茯苓去黑皮上搗羅為散一二歲半錢熟水調下食前日二服量兒大小加減硃砂丸治小兒一切無辜疳黃瘦腹痛或有蟲冷與熱悉主之硃砂一分細研雄黃一分細研干膽一枚塗酥炙令黃漏蘆一兩麝香一兩研菖蒲一兩上羅為末都研令勻用粟米飲和丸如麻子大每服以粥米飲化下二丸空心午後各一服隨兒大小以意加減茯神散治小兒針後宣腹壓驚茯神半兩川升麻半兩犀角屑半兩代赭細研鉤藤川大黃銼碎微炒以上各一分上搗羅為散每服一錢以水一小盞煎至四分去滓放溫漸漸服之決明子丸治小兒冷熱無辜疳減時驚熱或時夜啼大便青黃自汗頭痛頭髮作穗四肢黃瘦不多食物馬蹄決明子二兩上為末煉蜜和丸如麻子大每服於食後以熟水下三丸更量兒大小加減蘆薈散治小兒無辜疳氣寒熱積滯不化心腹脹滿蘆薈研人中白研蝦蟆炙黃各半兩麝香少許上搗研為細散再合研令細每服一字至半錢熟水調下不拘時候日二服後當下惡物量兒大小加減四神散治小兒無辜疳瀉蝦蟆一枚炙黃連去須半兩鉛丹炒各半兩麝香半分上細研為散每服半錢陳米飲調下乾漆丸治小兒無辜疳陳粳米一合炒過去火毒黃連去須一兩銼炒放冷出火毒陳橘皮去白半兩乾漆一分炒去煙出火毒存性上為末豬膽汁煮麵糊為丸如小豆大每服七八丸用米飲下不拘時候青金丸治小兒無辜針烙後宜服巴豆一兩去皮心硫黃一兩苦楝根皮二兩醋石榴根皮二兩銼上件藥於鐵鼎子內滿煮水煮七晝夜如水耗即放添熱水日滿即去楝根石榴根取巴豆並硫黃同研更入桂心檳榔木香細辛末各一分馬牙硝橘皮乾薑藍花末各半分同研令勻面和丸如麻子大每日空心以溫水下二丸常得溏痢為效三歲以下日服一丸漏蘆丸治小兒無辜疳肌瘦有蟲漏蘆去蘆頭二兩豬肝煿干去膜楮根銼各一兩上為末煉蜜為丸如麻子大一二歲兒每服三丸三四歲兒每服五丸溫水下乳食前日三服如患瀉米飲下又方地膽草上為末每服以羊肉二兩藥末一錢入鹽少許以水煮熱空腹頓服救生丸治小兒無辜腹脹氣喘四肢空浮乍熱乍寒或即瀉痢心腹並疼痛巴豆去皮取仁半兩醋一升生薑半兩切同煮醋盡取巴豆研雄黃半兩細研丹砂一分研上各研勻以湯浸蒸餅心為丸如黃米大每日芍藥湯下二丸吹鼻散治小兒無辜疳腦熱發乾豎硝石三分熊膽一分麝香一大豆研上件藥相和細研為散取一小豆許吹兩鼻中得黃水出為效胡粉散治小兒諸疳無辜鼻中出清水眼上有白膜或患痢體熱口乾生瘡腳腫眼澀腹中有蟲喜飲冷水胡粉龍骨末各一錢上炒令黃以雞子清空心服半錢日三治小兒無辜疳方干蝦蟆三枚塗醋炙焦黃苣藤半兩微炒上為末入少許五味和為劑內入羊腸中兩頭緊繫於麩碗中安之上以紙覆之卻將碗合蒸一炊去麩取藥並腸細切搗如膏更入煉蜜和丸如綠豆大每服以粥飲下七丸日二服量兒大小以意加減沉香膏治小兒針無辜核後宜煉貼之沉香一兩銼黃丹六兩上件藥以清麻油一升先下沉香焦黑漉出下黃丹不住手攪以慢火煎之後滴於紙上如黑錫無油傍映即膏成每貼法以篦子於爛帛上攤膏令稍薄貼之一日一換勿令風吹著針處為妙雉肝散治小兒無辜疳上將雉肝一具乾者搗濕者熬為末分三服每服丹砂散後即一服米飲調下半錢蝸牛煎治小兒無辜疳上用蝸牛殼七枚舊死者皮薄黃白色者淨洗不得少有塵土漉干內酥蜜殼中以瓦盞紙糊頭炊飯上蒸之下饋時即坐甑中裝飯又蒸飯熟細研如水澱漸與服一日服盡大黃煎丸治無辜閃癖或頭干瘰癧頭髮黃聳落去或乍痢乍瘥諸狀既多不可備說四肢黃瘦飲食無節不生肌膚精神失緒大黃九兩錦文新實者若微朽即不用銼去蒼皮乃秤上搗篩為散以上好米醋三升和之置銅碗內於大鐺中浮湯上炭火煮之火不用猛又以竹木篦攪藥候堪丸乃停於小瓷器中蜜貯兒年三歲一服七丸如梧子大日再服常以下青赤膿為度若不下膿或下膿少者稍稍加丸下膿若多丸又須減病重者或至七八劑方盡根本大人小兒不等以意加減之此藥唯下膿及宿結不令兒痢禁牛馬驢雞豬魚兔肉生冷黏滑油膩小豆蕎麥乳母亦同此忌水下蝦蟆丸治小兒患無辜疳三焦虛熱飲水不歇下痢頻並日夜無度口燥乾嘔食入即吐如此惡證服藥取安一服虛熱去兩服煩渴止三服瀉痢住不過三服諸證悉應克效萬一神聖秘密蟾蜍一枚夏月取生活者乃是溝渠中腹肚大不能跳又不能鳴者身上多痱磊是也上取糞蟲一杓放於桶中更以尿灌四維令乾即留其蟲卻將蟾蜍打殺頓在蟲上任其蟲咀食兩日間用新布作袋包裹小麻繩繫於急流中確一宿明日取上滓干瓦上焙為末入麝香和勻湯浸蒸餅丸如麻子大每小者二十丸大者三十丸溫飯飲下或麥門冬子去心煎湯空心食前日進二服切效神妙卻宜至誠修合夜明砂炒為末入飲中啖之治無辜疳演山人參散治小兒疳熱虛煩作渴不思乳食四體腫脹服此吞前蝦蟆丸作效人參莪朮當歸龍腦苧根甘草炙赤芍藥白茯苓制枳殼上各等分為末麥門冬湯下漏蘆散治小兒無辜疳肚脹或時瀉痢冷熱不調宜服漏蘆一兩上為細散每服以水磨犀角湯下半錢空心午後各一服量兒大小以意加減療無辜腦後兩畔有小結者上無辜之病已結為根欲療者先看結之大小然後取細竹斟酌籠得此結便截竹使斷狀如指環形仍將此竹籠結自然不得轉動以火針針結子中央作兩下去針訖乃塗少許膏藥無者雜油亦得須待三兩日又如前報針更經一兩日當膿水自出若不出服如前針候膿潰盡結便自散俗多用刀子頭割者謂之割無辜此未參詳殊不如針之以絕根本恐後者不悉故重複說之治無辜疳其證腦後項邊有核如彈丸之轉動軟而不疼其間有蟲如米粉宜速破而去之免蟲如血氣流散侵蝕臟腑以致肌體癰瘡便痢膿血壯熱羸瘦頭露骨高急用竹刀刺破刮去核內蟲又楊氏方用夜明砂為末如飲食內食之膏藥貼則愈或因澣濯兒衣露於檐下為雌鳥落羽所灑兒著衣蟲入皮毛亦致斯疾丸曬兒衣須微火烘之疳䘌附論夫小兒嗜食甘味多而動腸胃間諸蟲致令侵蝕臟腑皆由是䘌也凡食五味之物皆入於胃其氣隨其臟腑之味而歸之脾與胃為表裡俱象土其味甘而甘味柔潤於脾胃脾胃潤則蟲動動則侵蝕成疳也但蟲因甘而動故名之為疳也若蟲食下部則肛門生瘡爛開急者數日便死宜速療之小兒宿有疳氣加以腸胃虛弱寒邪乘之則變下利久而不止腸胃益虛寒濕相乘蟲因虛動侵蝕臟腑或口齒生瘡或肛門傷爛故名疳䘌方緋帛青緋帛燒灰研一分倒棘刺四十九枚燒灰研雄黃研磁石搗研麝香研蚺蛇膽研各一分槐枝一條長八寸銼豬脂臘月者五兩上先研六味為細末次煉脂作油去滓下槐枝煎令焦黃去槐枝下六味藥末煎成膏以磁器盛每用少許塗下部日三次五福化毒丹治小兒䘌鼻疳瘡清膈涼血玄參一兩桔梗去蘆頭八錢淨赤茯苓人參牙硝青黛各三錢半甘草二錢麝香少許上除麝香牙硝別研餘一處為末以和青黛煉蜜為丸如圓眼大用金銀箔為衣薄荷湯化下瘡疥餘毒磨生犀水下如上焦熱口血臭氣用生地黃自然汁化開食後服麝香丸治小兒疳䘌下部開張痢有膿血爛癢赤腫麝香研蟬殼去足豬牙皂莢去皮子灰蘆薈研人中白研各一分青黛半兩研上為細末先取五月五日蝦蟆一枚以繩子雙系後腳倒掛用胡黃連一寸以綿系內蝦蟆口系定將下津器承蝦蟆涎從午至戌解放蝦蟆只取胡黃連並涎用將六味藥末涎和丸如黍米大每先暖漿沐洗兒軟帛拭乾後扶坐取一丸子以乳汁少許化下須叟如醉慎勿驚之即蟲自出若蟲色白或身黃頭黑皆是病淺易瘥若蟲子遍體亂出紛紛如碎剪馬尾此必死之候苦參丸治小兒疳蟲蝕下部久痢膿血舉體痛癢面色虛腫苦參雄黃研雌黃研白礬燒各半兩麝香少許研黎蘆去蘆頭一分上為末以一小棗許大內下部中日兩三上黃蘗散治小兒疳䘌瘡齒露宣黃蘗根皮炙銼黃連去須黃芩去黑心升麻銼各三分大青半兩干蝦蟆酥炙一分上為散以棉裹貼齒齦上吐涎麻子膏治小兒疳䘌下痢赤白大麻子二兩黑豆黃一兩青黛半升研蝦蟆一枚燒灰研上先研麻子搗研黑豆等四味為末稠餳入少許竹瀝和勻圓瓷合收口鼻疳瘡者每服半匙米飲調下日三服若腦脊疳每日塗鼻上若下部開以綿裹藥半匙內下部日二換量兒大小加減治小兒疳蛔蝕口鼻及下部赤爛方大麻仁三合地龍去土炒一兩亂髮如雞子大葶藶紙上炒半兩上除亂髮外並搗碎與發勻利都入在一枚新竹筒內置於瓦上以燋炭火燒取瀝少許塗兒口鼻項上及穀道中蝦蟆散治小兒下部疳䘌瘡干蝦蟆塗酥炒令黃蕪荑微炒乾薑炮製銼葵莖灰莨菪子水浮去者水煮令牙山候乾炒令黃黑色白礬燒令汁盡各半兩上為細散三歲兒每服以溫水調一字看兒大小以意加減又方干蝦蟆一枚塗酥炙令微黃蚺蛇膽半兩木香半兩硫黃半兩麝香二分上為細散都研令勻三歲兒每服以溫水調下一字日再服量兒大小以意加減苦參膏治小兒疳䘌蝕下部苦參五兩艾葉二兩青葙子甘草炙銼各三兩上先以青葙甘草為末決用水五升煎苦參艾葉成湯涼久去滓入二味藥末和作梃子長一寸如筋許大暴乾塗豬脂內下部日再貼不論日之多少總期於蟲出盡為度又方治小兒下部疳䘌瘡吳茱萸根白皮一兩桃白皮一兩上細銼以酒一大盞浸一宿看兒大小漸漸分服之又方治小兒疳䘌蟲蝕下部上以鐵衣小許研細綿裹內下部中黃連丸治小兒疳䘌或口齒生瘡或肛門傷爛黃連去須一兩白蕪荑半兩麝香一錢上為末麵糊和丸如麻子大一二歲每月十丸溫米湯飲下日三服治小兒下部癢悶方枳實二兩鬼箭羽一兩木香一兩上為粗散以鹽醋拌和炒令熱用青布裹日三度熨之治疳䘌口齒及下部以飛廉蒿燒灰搗篩以二錢七煮火痛處忍之若不痛非疳也下部蟲如馬尾相纏出無數十日瘥二十日平復雄黃散治小兒䘌蟲蝕下部雄黃胡粉熬各半兩上細研如粉每半錢乳汁調內下部中日三上以瘥為度豬膽飲治疳䘌蟲食肛門治不以時多至殺人豬膽一枚苦酒五合上同煎量力空心飲之蟲即死又方治小兒疳䘌蟲蝕大腸赤爛羊膽汁醬水各一分上藥相合令勻日三四度塗之治疳䘌無問去處皆治之上用蝦蟆燒灰好醋和敷日三五度治小兒下部疳䘌蟲蝕大腸赤瘡爛上用水銀一兩以醬水煮之取少許以唾研安著竹筒吹入下部中三度瘥又方大麻仁一分上以少水研取汁與飲之量兒大小臨時增減日三四服候蟲出盡即住又方扁竹一兩上以水一大盞煎至六分去滓看兒大小加減溫服又方艾葉一兩上以水大盞煮取六分去滓看兒大小加減溫服又方青黛一兩上為末散先用麻油塗上次用此藥貼之日三四度效又方胡粉二兩熬令黃色上細研豬脂和日三度塗之治疳䘌用雞腸草燒敷之五疳出蟲附論夫小兒五疳之疾皆由乳哺不調寒溫失節之所致也久而不瘥則腹內有蟲肌體黃瘦下痢不止宜服藥出之則疳氣漸退又因肥甘所致蓋臟腑氣血更相榮養逢甘則中緩而榮衛行遲故臟腑之間化為諸蟲其蟲狀如絲髮或如馬尾多出於腹背及頭頂上若蟲色黃白及赤可療青色者不可療也方月膽丸治小兒五疳眼鼻多癢寒熱往來臟腑不清或瀉膿血肌體瘦弱飲食不化多困少力眼澀多睡兼治驚風乾蟾一條大者端午取蛇蛻皮大者一條穀精草二兩三味同入一瓶子內以鹽泥固濟燒灰胡黃連甜瓜蒂母丁香各一分熊膽研天竺黃蘆薈雄黃各研一分丹砂研牛黃研龍腦研麝香青黛研各半兩上為末再研勻獖豬膽汁煮麵糊丸如綠豆大每服三五丸米泔下量兒大小加減服藥後以桃柳湯浴兒著衣蓋疳蟲出衣上及肩毛髮邊如細面片子或如摻面塵青黑色者難治黃白色者易治一方無熊膽水銀丸治小兒五疳四肢黃瘦腹脹氣粗發乾作穗眼鼻多癢精神昏悶不欲飲食宜出蟲仍宜粥飲下丸日三服甚者半月內瘥水銀三分硫黃半兩二味俱微炒之細研砒霜半兩蘆薈半兩細研硃砂半兩細研用水飛過蟬殼一分微炒天靈蓋一分塗酥炙焦黃鼓皮中蛀灰一分白豬糞灰一分蟬灰一分蛤蚧一枚塗酥炙令微黃烏驢蹄灰一分雄黃一分細研上為末入研了藥令勻以苦參半斤銼碎用水五升浸一宿煮至一升去苦參候熬成膏用諸藥丸如綠豆大後入去卻汁獖豬膽內盛懸於舍東陰七日候乾以麝香蜜水下三天後便煎桃柳湯浴兒了以青衣蓋遍身蟲出或泄惡氣並瀉惡物便是病源已出小兒每三歲加一丸服之蘆薈丸治小兒五疳黃瘦腹脹氣粗頻揉鼻腹宜服出蟲蘆薈一分細研田父一枚燒焦以絕便住青黛半兩細研膩粉一錢牛黃一分細研粉霜一錢硫黃一錢細研蟬殼一分蛇蛻皮一分燒灰麝香一錢細研巴豆十粒去皮心研紙裹去油上為末入研了藥令勻以粳米飲和丸如綠豆大每服溫水下二丸良久煎桃柳水浴兒後以青衣蓋遍身當有蟲出白黃色者可治青黑者難治青黛丸治小兒諸疳青黛研蘆薈研干浮萍草蝦蟆燒灰蟬殼去土綠豆故破手巾燒灰研豆豉炒白礬燒灰丹砂研麝香研各一分上為末和勻用粟米為丸如麻子大一歲兒每服一粒用熱水下先以桃柳湯浴兒後與藥服藥後得睡覆面看脊骨間必有蟲形狀不定甚者吐出或噎出即愈穀精丹治諸病下蟲如絲髮或如馬尾甚者便至夭殤穀精草三兩入餅子內鹽泥固濟用慢火煨通赤為度取出研胡黃連半兩乾蟾三枚五月五日取者用酥炙黃皂角三寸燒灰瓜蒂半兩母丁香半兩粉霜蘆薈麝香各一分並各研上件都拌勻用豬膽汁和丸如黍米大每服十粒米泔放溫下量兒大小加減田父丸治小兒五疳下痢羸瘦鼻癢田父三分炙微黃夜明砂半兩微炒蛇蛻皮半兩燒灰胡黃連三分白礬灰一分牛黃一錢細研硃砂一錢細研麝香一錢研細莨菪子一分水淘去浮牙炒令黃黑色用上為末都研令勻以糯米飯和丸如綠豆大一二歲空心熟水下三丸服藥後用桃柳湯洗浴兒了以青衣蓋覆良久當有蟲黃白赤者易治青黑者難治醫量兒大小加減青黛丸治小兒五疳體熱乾瘦發豎鼻癢不欲乳食青黛半兩蘆薈半兩蟬殼半分人中白半兩麝香一分胡黃連三分蟾涎少許人乳汁少許豬牙皂莢半分生用上為末五月五日午時修合以稷內棗肉丸及蟾涎乳汁和如黍米大先以桃柳湯浴兒後以粥飲下一二丸後著熱青衣裹兒看身上有蟲出青黑者不堪白黃赤者易瘥定命夜明砂丸治小兒疳夜明砂炒青黛蛇蛻蟬蛻麝香地龍干蝦蟆各一分蚱蟬炙四十枚上為末和勻粟米飯丸如麻子大一二歲一二丸三四歲五丸並用米飲下空心日午各一服更用水化一丸滴兩鼻中又以桃柳湯浴兒以青布裹良久蟲出青布上麝香丸治小兒諸疳麝香研熊膽研丹砂研牛黃研蚺蛇膽研瓜蒂一分赤小豆七粒蟾酥二片如柳葉大作蟾頭一枚炙焦黃上為末和勻面糊丸如麻子大每服一二丸至五丸米飲下空心日午近晚各一度量兒大小加減服後以桃柳湯浴兒即用衣蓋覆當有蟲出一方煉蜜和丸如兒小即乳汁化破與服麝香丸治小兒五疳瘦弱毛髮乾焦口鼻癢麝香一分蘆薈一分蟾酥一白豆許大皂莢三寸燒為灰蛇蛻皮一寸燒灰粉霜一分蝙蝠三枚取血拌入藥末硃砂一分細研上為細末以油熔蠟和丸如小豆大先以桃柳湯浴兒後用藥一丸塗於臍中醋面封之良久即蟲出黃白赤者易治黑者難療蘆薈散治小兒五疳煩熱乾瘦不欲乳食宜服蘆薈半兩細研胡黃連半兩雄黃一分細研熊膽半兩研入硃砂半兩麝香半兩細研乾蟾一枚塗酥炙焦黃代赭一分上為細散先用桃柳湯浴兒後以粥飲調下半匙然後著青衣覆其蟲子自出量兒大小加減服之螳螂散治小兒疳羸瘦腹脹不欲乳食宜服出蟲螳螂三分炒令黃蝸牛子七枚炒令微黃蟬殼七枚微炙丁香一分蟾酥一錢細研麝香一錢地龍三分微黃蛇蛻皮灰一錢上為細散先以桃柳湯浴兒後以粥飲調下半錢便以青衣蓋覆當有蟲子自出赤白者易治青黑者難治瓜蒂丸治小兒疳出蟲瓜蒂燒灰麝香研蟾酥各半兩烏尾蛇酒浸炙黃連去須各一分蛇蛻皮燒灰熊膽各半兩研上為末用粟米飯丸如麻子大溫熱水化破二丸滴於鼻中蟲出為效出蟲丸治小兒五疳久不瘥羸瘦極甚硃砂一分麝香一分牛黃一分蟾酥半錢熊膽一分蝸牛子一分炒微黃夜明砂一分微炒上都研細以麵糊和丸如綠豆大每服以溫水下三丸更別以水研一丸滴面鼻中得嚏四五聲良久當有蟲隨汗出立效麝香散治小兒疳氣麝香研白礬灰膽礬燒過皂莢燒灰各一分豬膽一枚去膜熬干膩粉研半錢上研令極細每服一字米飲調下服藥後以青衣蓋兒身上良久有蟲出即瘥除疳散治小兒五疳吐蟲腹脹羸瘦丁香生犀角末各半錢苦楝根有子者良赤者不用陰乾為末鶴蝨各半兩密陀僧白檳榔泡銼各一分上為散每服一錢米湯調下日三服蟲自出更量兒之大小加減天靈蓋丸治小兒五疳定命靈蓋灰一分蟾酥一片如柳葉大汗衣灰一分砒霜半分麝香一分驢蹄窩干灰一分上為末煉蜜和丸如麻子大空心以溫水下二丸後以桃柳湯浴兒了澄浴水清看盆內當有蟲如蟻子白即吉黑即凶更看兒大小以意加減熊膽丸治小兒五疳出蟲熊膽細研硃砂研細麝香細研蚺蛇膽細研蜣螂微炒瓜蒂以上各一分上為末入研了藥令勻用豬膽汁和如綠豆大先用桃柳湯浴兒了用粥飲下三丸以青衣蓋有蟲自出也蟾頭丸治小兒五疳手足乾瘦腹脹筋起鼻癢昏沉多睡宜服出蟲蟾頭青黛一分研硫黃一分研皂莢一分先放水中浸七日後以水洗淨刮黑皮炙令焦黃去子麝香半分細研巴豆七枚去皮研紙裹壓去油上為末煉蜜和丸如綠豆大空心以粥飲下三丸良久當有蟲出量兒大小以意加減乾蟾丸治小兒五疳出蟲乾蟾蟬殼麝香半分天靈蓋半兩鱉甲一分上為末用燒飯和丸如綠豆大二歲以下以蛤粉湯下一丸三歲以上至五歲二丸服藥後續以桃柳湯浴兒後以青衣蓋之當有蟲出赤白易治黑者難醫蘆薈丸治小兒疳殺蟲蘆薈蕪荑木香鶴蝨各半兩上為末水浸炊餅丸如黃米大每服十丸米飲下更量兒大小加減雄黃丸治小兒疳殺蟲雄黃研黃連去須木香各一分麝香半分上搗羅為散每服半錢米飲下量兒大小加減定命散治小兒疳干蝦一枚燒為灰蛇蛻皮一分炒令黃蟬殼一分上為末入麝香末半錢研勻凡是一切疳至午時後以暖水調半錢一二歲即服一錢後煎桃柳湯放溫浴兒了便用青衣蓋當有蟲出為有效雄黃丹治五疳羸瘦或多生蟲胡黃連乾蟾白蕪荑川黃連各一兩胡漆半兩雄黃半兩研麝香一分研上為細末豬膽汁和丸如黍米大每服十粒新水下量兒大小加減稷香丸治五疳多蟲羸瘦黃瘁瀉痢無常黃連青皮蕪荑仁胡黃連蘆薈神麯各半分麥芽木香當歸肉豆蔻使君子三稜蓬朮各一分上為末麵糊為丸如綠豆大每服二十丸米飲下化蟲丸治小兒因食疳肥致使蟲動嘔吐涎沫腹痛服此藥止痛下蟲五靈脂一兩半白礬一兩上為細末麵糊為丸如黍米大每服二十丸溫米湯飲送下不拘時候雷丸散治消疳殺蟲雷丸使君子炮去殼鶴蝨榧子檳榔五味各一分上件為細末每服一錢溫米湯飲下乳食前服之楝實散治小兒疳黃羸瘦好食泥土蛔蟲㽲痛發渴往來寒熱川楝子去核半兩微炒甘草半兩栝蔞根一兩上件為細末每服二錢煎紫蘇湯調下乳食前服又方治小兒疳毒生蟲肌肉消瘦頻頻腹痛臨痛時多在小腹上忽胃脘上忽上衝心前疼痛不可勝忍吃食減少非時只思清水吃其痛之極忽口中吐出蟲宜服此方但尋常好吃清湯忽痛時只思清湯吃即是有蟲之候使君子蒸二次方用萆薢狗脊檳榔川芎南艽二錢白蕪荑一分上細杵羅為末麵糊和丸如綠豆大一歲小兒二丸三四歲小兒四五丸一日兩服米飲下以蟲盡出為度三稜莪朮湯治小兒疳積青皮三稜莪朮北柴胡半夏大腹皮秦艽淨香附陳皮紫蘇青木香枳殼檳榔甘草上各等分㕮咀每服一錢生薑同煎余以意加減湯使服之又方治疳氣腹疼服藥不效以此藥治之檳榔三錢微炒蓬朮一錢陳皮二錢巴豆七粒去油茴香一錢炒枳殼一錢上為末麵糊為丸如粟米大每服二十丸陳皮湯下
