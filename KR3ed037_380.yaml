body:
  text: 卷三百八十嬰孩諸疳門治小兒一切疳吹鼻散出聖惠方治小兒一切疳腦悶昏沉宜先用青黛研躑躅黃連去須瓜蒂地龍微炒麝香各一兩上為細散每用少許吹鼻中看嚏噴多少嚏噴多即病輕嚏噴少即病重熊膽膏一名熊膽煎出聖惠方治小兒腦疳口生白瘡齒疳並諸般疳疾不能瘥悉主之熊膽蚺蛇膽蘆薈牛黃麝香龍膽各一分上六味並研如粉用新汲水兩盞入藥末攪令勻以銀器盛重湯煮之小隻可及瓷器五分以慢煮旋添暖水煮至半日更投三五粒糯米同煮米爛藥即成以篦子攪令勻勿令藥干欲點鼻中時先七日孩子與乳母忌冷醬豉五辛熱面魚肉並少食鹽然後取藥少許漸漸吹鼻中塗口瘡上頻使兩日即停一日看兒發變青即止至七度停藥後還須慎口一方有黃礬一方用薄荷湯下兼塗患處地黃丸出危氏方治腎疳極瘦身有瘡疥寒熱時作頭熱腳冷如冰生乾地黃八錢乾山藥山茱萸各四錢澤瀉牡丹皮白茯苓去皮各三錢上為末煉蜜丸梧桐子大每用一二丸化開服又方治交奶及一切疳毒上夜明砂洗淨留滓每用三四錢入瓦瓶內取獖豬肉三兩薄切入瓶內水煮取肉一半與兒母食澄清肉汁令兒飲汁食肉取下腹中胎毒次用生薑四兩和皮切炒黃色又以黃連一兩去毛二味同為末麵糊丸空心米飲下使君子丸出錢氏方治臟腑虛滑及疳瘦下痢腹脅脹滿不思乳食常服化蟲補胃消疳肥肌厚朴薑汁製半兩使君子一半麩炒熟一兩一半一兩焙陳皮一分甘草訶子半生半熟青黛各半兩如是兼驚及帶熱渴即入此一味如臟腑下調不用上為末煉蜜為丸如雞頭大每服一丸米湯化下兒生百日以上半歲以下服半丸乳汁下一方無甘草或作散每服一錢粥飲調下此方清涼有積熱者可用一方無青黛嚏疳散出仁齋直指方蘆薈黃連各一錢瓜蒂豬牙皂角蝦蟆各半錢麝香少許上末吹入鼻嚏則可療黃連肥兒丸出仁齋直指方治一切疳及眼赤腫痛癢昏暗雀目盲或經月閣眼鷹爪黃連淨一兩蕪荑焙麥芽炒神麯炒各半兩青皮使君子焙各二錢半上末獖豬膽浸糕丸麻子大每七丸米湯下如疳熱眼山梔仁煎湯下檳榔丸出醫方妙選治小兒能食不生肌肉常服此佳檳榔麵裹炮木香胡黃連各一兩代赭石研一分香墨燒存性研一分麝香研一分上為細末粳米飯和丸如粟米大每服十粒煎橘皮湯下食後服量兒大小加減肉豆蔻丹出醫方妙選治肌瘦挾積常服尤佳肉豆蔻使君子青橘皮炒黃各一兩牽牛炒一分蘆薈研一分麝香一錢上為末用糯米飯和丸如黍米大每服十粒生薑湯下食後量兒大小加減五靈脂丹出醫方妙選治久嗽恐成疳常服尤佳五靈脂蟬殼款冬花各半兩蟾頭一枚塗酥炙黃青黛研雄黃研各一分上細末拌勻糯米飯和丸如黍米大每十粒煎人參湯下量兒大小加減灌鼻丸出聖惠方治小兒一切疳心煩腦熱青黛一錢黃連末一錢蘆薈一錢瓜蒂一錢龍腦一杏仁大蟾酥半杏仁大上為末用粳米飯和丸如緑豆大以奶汁化破兩丸滴在鼻中每日三兩度用之效定命丸出聖惠方治小兒一切疳硃砂一分細研麝香半分細研瓜蒂二枚蛇蛻皮灰二分青黛一分研細乾蠍二十枚微炒上為研末令勻用狗膽汁和丸如黍米大每度以乳汁化破一丸滴入鼻中男左女右得嚏三五聲為效吹鼻散出聖惠方治小兒一切疳眼鼻癢腦熱發豎乾瘦宜用此熊膽一分丁香半兩黃蘗一分蝦蟆半兩五月五日者炙黃皂莢半兩麝香一錢細研上為細散每用小豆大吹於兩鼻中嚏出疳蟲為效通頂散出聖惠方治小兒一切疳青黛一分細研蟾酥半杏仁研入赤小豆二十粒麝香半分細研藜蘆一分瓜蒂七枚上為細散每度用一豆大吹入鼻中常有蟲子出如米心大黑者難治赤白黃者易療牛黃丸出全嬰方治小兒疳熱進退或即盜汗大便堅實時時心躁情意不悅或大便焦黃黃連黃芩龍膽草各一兩大黃一兩牛黃一兩上為末糊丸小豆大三歲二十丸米湯送下又治鼻衄鹽水送下入良久即效青黛丸出聖惠方治小兒五疳煩熱羸瘦不欲乳食青黛三分細研麝香一分細研訶黎勒皮三分蘆薈一分熊膽一分硃砂一分細研上為末以糯米和丸如緑豆大每服以粥飲下五丸日三服量兒大小加減服之一方沙糖水下三丸三歲以上加丸服生筋散出全嬰方治小兒五疳木鱉子六個去殼萆麻子六十粒去殼上研細先急抱頭捺項上令熱津唾調貼之神妙宜氣丸治小兒疳熱久蒸肌肉消瘦形容憔悴神情不樂飲食雖多不生肌肉宜服此方大有功效蓬莪朮炮赤芍藥川當歸鱉甲米醋炙焦為度去裙等分上為細末煮麵糊為丸麻子大一歲二十丸熱水送下量兒大小加減服之蚵蚾丸出和劑方治小兒五疳八痢乳食不節寒溫乖違發豎毛焦皮膚枯悴腳細肚大顱解胸高漸覺尫羸時時盜汗咳嗽腦後高起復生肉塊小便泔濁膿痢臀青揉眉咬指吃土甘酸吐食不化傾濁頻並心神昏瞀鼻赤唇燥小蠱既出蛔蟲咬心疳眼雀目名曰丁奚此丸救療效驗如神白蕪荑去皮黃連去須蚵蚾酒浸去骨焙胡黃連各一兩半青黛半兩為衣上為細末豬膽汁糊丸如緑豆大每服三十丸飯飲吞下食後臨臥日進三服鶴蝨丸出聖濟總録治小兒一切疳病鶴蝨輕炒胡黃連蘆薈研丹砂研各一分青黛研三分上為末更入乳鉢內研令細用米泔煮豬膽令熱取汁和為丸如麻子大每服三丸至五丸米飲下早晨午間日晚各一服量兒大小加減當有蟲出益容丸治小兒五疳羸瘦發熱白黃或脾虛減食泄瀉無時大治腹痛使君子取肉銼碎焙乾厚朴去粗皮米泔浸芎藭橘紅甘草各二錢上為末煉蜜丸如皂角子大二歲以上服一丸以下服半丸陳米湯化下無時胡黃連丸出聖惠方治小兒一切疳胡黃連蘆薈細研麒麟竭地龍微炒熊膽研入蟾酥以上各半兩上為末麵糊和丸如黃豆大空心以粥飲下三丸飯後再服通命散出醫方妙選治一切疳證可以卜輕重逆順瓜蒂半兩細辛一分乾地龍炒一分白礬一分藜蘆一分去蘆頭上為細末每用少許吹鼻中得嚏即吉若有蟲出即瘥白礬丸出聖惠方治小兒一切疳肌膚消瘦瀉痢不止口鼻生瘡腹脹腳細水穀不化白礬灰蝦蟆灰密陀僧燒酒淬三次烏賊魚骨炙焦黃麝香半兩上為末煉蜜和丸如緑豆大每服以溫水送下三丸日三服量兒大小加減服之青黛丸出聖惠方治小兒一切疳青黛一分龍腦麝香膩粉蟾酥以上各半錢上研令細用水浸蒸餅和丸如緑豆大每服以溫水下三丸量兒大小加減服之吹鼻散出聖惠方治小兒一切頭髮干疏腦熱煩悶瓜蒂七枚蔥白一莖切暴乾藜蘆半錢莢粉半錢麝香一字上為散每用緑豆大吹左右鼻中良久有蟲子出於鼻細看如斷線此是病根出也通頂定命散出聖惠方治小兒一切疳腦熱鼻塞宜用蘆薈細研一分瓜蒂一分麝香一錢研細鵝不食草一分豬牙皂角一分上為細散每取少許吹入鼻中當嚏出疳蟲黑者難治赤白黃者易醫又方出聖惠方治小兒五疳能充肌膚悅澤顏色宜常服此鯉魚膽二枚蝟膽二枚狗膽一枚白附子炮一分烏賊魚骨一分炙令黃上先搗烏賊魚骨並白附子為末相和入豬膽中候乾搗細羅為散每服以暖水調半錢服之量兒大小以意加減使君子丸出和劑方治小兒五疳脾胃不和心腹膨脹時復疼痛不進飲食漸致羸瘦並宜服之厚朴去皮薑汁炙陳皮去白川芎各一兩使君子仁浸去黑皮一兩上為細末煉蜜丸如皂子大三歲以上二粒以下一粒陳米飲下大治小兒腹痛消積丸錢氏方治一切積聚成疳腹脹丁香九個縮砂仁十二個巴豆二個去皮膜心烏梅肉三個焙上為細末麵糊丸黍米大三歲以上三五丸以下一二丸溫水下無時候服君朴丸出全嬰方治小兒諸疳小便白濁久則黃瘦不長肌肉使君子炮厚朴制黃連各一兩木香三錢同炒上為末糊丸如小豆大三歲三十丸米湯下五服效黃土丸出全嬰方治小兒疳積在脾面黃腹急咬指甲揉眉毛搔口鼻要吃泥土灰炭茶紙黃土陳皮各一兩木香一分巴豆三十粒不去油上為末糊丸小豆大三歲三十丸煎黑豆汁下直候瀉五七次疳積盡與益黃散助氣後與疳藥常服露星膏出經驗良方治小兒潮熱肌熟疳勞瘦弱肚拍如鼓鳴脊如鋸乃積熱而成疳黃耆蜜炙胡黃連地骨皮柴胡各等分上末煉蜜丸隔夜酒浸露星一宿次日澄去酒薄荷湯浸服之龍膽丸出和劑方治疳病發熱龍膽草黃連炒去須青皮去白使君子去皮炒上為細末豬膽汁和丸如蘿蔔子大每服二十粒以意加減臨臥熟水下黃連丸一名金粟丸一名金瓜丸出衛生家寶方治小兒諸疳壯熱肥兒神效黃連去須黃蘗去粗皮甘草炙銼青橘皮去白燒乾等分上四味搗羅末研麝香少許和勻獖豬膽內用麻系定於石器內漿水煮五七沸取出當風挂一宿去膽皮研熱丸如緑豆大每服五七丸米飲下漸加至十丸一方麝香下豬膽內煮五珍丸出危氏方治疳傷肚大青皮不去白炒焦黃乾薑燒蒂存性五靈脂蓬朮各一兩上為末溲和稱藥末一兩用肥巴豆肉去油稱一錢研細拌和粳米飯丸麻子大每服三五丸米湯不拘飢飽時下五疳蕪荑丸一名肥兒丸出續易簡方治一切疳氣瘦弱少食大抵疳氣其狀多端雖輕重不同形證亦異然窮其根本皆由乳哺乖宜寒溫失節臟腑受病氣血不榮致成疳也一曰肝疳其候搖頭揉目白膜遮睛汗流遍體肉色青黃腹中積聚自是肝疳亦名風疳二曰心疳其候身體壯熱及吐痢無時煩赤面黃胸膈煩滿鼻乾心躁口舌生瘡下痢膿血有時盜汗此是心疳亦名驚疳三曰脾疳其候心腹脹滿乳食不化喘促氣粗咳逆多啼骨立毛焦好吃泥土痢多酸臭此名脾疳亦名食疳四曰肺疳其候咳嗽氣逆咽喉不利揉鼻咬齒腹內氣脹大腸不調糞中米出此名肺疳亦名氣疳五曰腎疳其候肌肉消瘦齒齦生瘡寒熱往來口鼻乾燥吐逆少食泄瀉頻並肛門不收此是腎疳亦名急疳今以一方同療之黃連蕪荑麥糵神麯等分上為細末蜜丸粟米大量兒大小加減米飲下如五疳陳皮湯下寒熱往來薄荷湯下蟲咬心痛苦楝子湯下乳癖氣結或下痢赤白腹痛後重腸鳴泄米穀不化並陳倉米湯下一方豬膽汁為丸磨積丸出本事方治小兒疳積黃瘦吐食川烏一錢定粉三錢艾灰二錢龍骨二錢上為末滴水為丸龍眼大作餅子每服一餅飯飲磨下蘆薈丸出本事方治小兒疳積蘆薈荊芥黑牽牛青皮上精細銼治炮製為末麵糊丸如粟米大兒一歲以下一丸或二丸亦不妨自加減與之壁宮丸出聖惠方治小兒一切疳心腹虛愛食泥土四肢壯熱壁宮一枚頭腳尾麵裹煨熟熊膽一錢研入麝香半錢細研黃連一錢上為末蟾酥和丸黍米大每服米泔汁下五丸量兒大小以意加減吹鼻散出聖惠方治小兒一切疳瓜蒂二七枚赤小豆炒熱胡黃連半分倒鉤棘針二十枚上為細散每日早晨以半字吹兩鼻中兼用粥飲調一字灌之每一度吹鼻灌藥一服瀉腦散出聖惠方治小兒一切疳鼻塞壅悶宜用穀精草燒灰一分細辛一分蘆薈一分瓜蒂一分上為細散每用黃米大吹在鼻內當出惡物為效紫霜丸治小兒乳哺失節致傷脾胃停積不化變成疳疾腹脹乳食減少胸腹疼痛煩悶嘔逆並治傷寒溫壯內挾冷食大便酸臭或已得汗身熱不除及變蒸發熱多日不解因食痞癇或寒或熱並宜服代赭石二錢細研水飛巴豆二十個去皮尖上為細末飯丸如粟米大每服三五丸至十丸煎皂角仁湯下無時五蟾丸出聖惠方治小兒五疳齒焦四肢黃瘦百晬後至十五歲以前並宜服此乾蟾五個大者細銼和骨用酒七升文火煎至濾去骨砂盆內研以絹濾去滓入熱蜜四兩於重湯內熬令成膏胡黃連二兩黃連去須二兩白蕪荑二兩輕炒去皮上為細末入煎膏藥內和丸如麻子大每服用人參湯下三丸乳汁下亦得量兒大小加減服之蛇蛻丸出聖惠方治小兒五疳羸瘦蛇蛻皮一分乾蟾半兩乾地龍一分蝸牛以上四味入磁盒子內以泥封閉使炭火燒令通赤即住後取出硃砂羅為末更入黃丹一錢微炒同研丁香末半錢阿魏細研半錢硃砂一分細研上件藥同研令勻以蒸餅和丸如麻子大每於空心以熟水下二丸量兒大小加減服之金粟丸出聖惠方治小兒疳穀精草寒食前後花出時收合幹一兩白薔薇根花出時收用一兩丁香末一兩蝦蟆一兩炙上件藥取上二味端四日用水一斗宿浸五日煎至二升去滓澄清重於小鍋中煎成膏後入丁香蝦蟆末令勻和丸如黍米大懷在胸每服半丸一二歲一丸七歲二丸十歲三丸總服藥後以桃柳湯於盆中從頭沐浴之候湯冷以衣拭乾青衣蓋不得衝風恐蟲不出如睡最佳良久如醉疳蟲於頭面背汗中遂出如蟻子或如麩片並微細色白稀者七日內瘥不再服如色黃赤當隔日更依前法服蟲黑者不用服藥此方入硃砂為金粟丸入青黛為青金丸入麝香為方勝丸四靈丸出聖惠方治小兒五疳頭大項細心腹脹滿皮膚干鼓毛髮焦黃鼻下赤爛口舌生瘡瀉痢不止日漸羸瘦大蟾一枚去卻四足劈開肚腹入胡黃連末一兩在腹內以線縫合用濕紙三兩重裹以泥四面固合令微干使出陰氣便以炭火三斤燒令通赤即住待冷去泥及紙飛細搗羅為末更入後藥丸之蘆薈麝香熊膽以上各一分上同研令細以麵糊丸如麻子大每服以粥飲乳汁下三丸日三服五歲以上加丸服之蘭香散出錢氏方治一切疳瘡鼻下赤爛輕粉一字銅青半錢蘭香葉菜名二錢燒灰上為細末令勻看瘡大小干貼白粉散出錢氏方烏賊魚骨末三匕輕粉二匕白芨二匕上為末先用清漿水洗拭過干貼之無時青金丹加麝香用之佳定粉龍腦白丁香上乳癖古方敗毒散加甜葶藶薄荷荷葉名羌活散蚵蚾丸出全嬰方治小兒因有疳積腹脹面黃證候百出上以蚵蚾一個大者一兩入腹中黃泥裹火煅去丸分膩粉一錢稱同為末和丸小豆大三歲三十丸米湯送下飢最服候瀉數次取下疳積次與白朮散助氣後與常服疳藥蘆薈丸蘆薈丸出百一選方治煩熱燥溫泄瀉腹急脹滿面黃羸瘦一切蟲痛小兒五疳病證龍膽草去蘆黃連各半兩雷丸上為細末糊丸如黍米大每服三四丸米飲下此方費省而功效博蘇韜光家中小兒常服極佳不可一日無也苦連丸出百一選方治疳蕪荑三兩川黃連一兩半苦楝子三兩去光皮並核上為細末箬葉裹粟米煨成飯丸如黃米大每服十五丸至二十丸米飲下空心食前日三服蘆薈丸一名膽連丸傅氏活嬰方治脾胃積熱遂成疳疾宜服此藥龍膽草黃連去須同蕪荑蕪荑去皮洗炒黃色入前藥一處炒赤色各一兩上末別入蘆薈一分和勻爛飯丸如黍米大服三丸至三十丸空心米湯送下獲命方治小兒久患疳冷唇無血色氣脹腹滿頻多瀉痢惟是黃涕忽時嘔吐宜吃此方橘皮甘草炙豆蔻白朮人參防風各一錢使君子蒸三次半兩上為細末每服半錢或六分米湯一盞入藥在內重煎取五分空心吃兒大者服一錢治小兒疳出本草以甜瓜葉碾末酒服之胡黃連丸出危氏方治熱疳潮熱如火大便澀及截驚胡黃連川黃連各半兩硃砂一錢半研上二連為末和硃砂入豬膽內系定虛懸於銚中煮一炊久研蘆薈青黛各一錢半將蝦蟆灰二錢麝少許粳米飯丸麻子大每服十丸食後米飲下一方無青黛蝦蟆灰治小兒吃泥及壞肚用二膩粉一分沙糖溲和丸如麻子大空心米飲下一丸良久瀉出泥土瘥治小兒食土取豬肉一斤繩系拖地行數里勿洗火炙與食一方用羊肉四珍丹出醫方妙選治小兒諸疳氣瘦毛髮焦黃口鼻生瘡干大蟾一枚去卻四足擘開腹入胡黃連半兩在腹內以線縫合用濕紙二三重裹以泥四面固濟用木火燒令通赤去泥為細末蘆薈半兩麝香研半分上細研以白麵糊和丸如黍米大每服五粒粥飲下量兒大小加減定命通頂散出聖惠方治小兒一切疳羸困煩悶滑石一分蟾酥杏仁大干胭脂一分上為細末每用兩黃米大吹兩鼻中得嚏三五聲神效吹鼻散出聖惠方治小兒一切疳腦熱發乾熊膽一錢硃砂一錢麝香半錢上同研令細五月五日取蟾酥和丸如黍粒大取一粒研為末吹兩鼻中甚兼以奶汁調塗口中及齒齦上更甚者暖水下三丸通腦散出聖惠方治小兒一切疳頭髮干豎作穗眼睛有膜鼻頭上瘡宜用蚺蛇一錢研入犀角屑一分穀精草一分上為細散每日三兩度吹緑豆大於鼻中每吹藥後以新汲水調半錢服之三歲以下即服一字榆仁丸出錢氏方治疳熱瘦將有蟲久服光肥榆仁去扇黃連去須各一兩上為細末用豬膽七個破開取汁二藥同和入碗內甑上蒸九日每日一次候日數之研麝香半錢湯浸宿蒸飲同成劑丸如緑豆大每服五七丸至三十丸米飲下無時橘連丸出錢氏方治疳瘦久服消食和氣長肌肉陳橘皮一兩黃連二兩半去須米泔浸一日上為細末別研入麝香半錢用豬膽七個分入膽內漿水煮候臨熟以針微扎破以熱為度取出以粟米粥和丸緑豆大每服十丸至二三十丸米飲下量兒大小與之無時大黃丸出全嬰方治小兒無辜疳病急疳壯熱疳勞骨蒸頭髮作穗身上生瘡瘰癧核塊多惡煎劑服食不成肌膚腹大脛細大黃三兩木香半兩上為末米醋一升相和置銅碗下於鐺內煮浮於水上炭火煮竹篦子攪藥候可丸即丸入稠糊丸如小豆大三歲三十丸米湯下加減與之當下青膿為效一方治無辜疳病肚大常時瀉痢冷熱不調藜蘆為末每服一錢豬肝一兩鹽少許水煮熟空心服之槐子方出本草治疳濕及明目上以烏牛膽釀槐子服之彌佳麝香丸出楊氏家藏方治諸疳挾積肌體發熱漸致羸瘦蟲作無時阿魏半兩精真者於砂石器中文火入精羊肉內豬牙皂角炒去皮三分雄黃半兩蓬莪朮生用半兩柴胡去苗三分檳榔生用一兩半蕪荑生用一兩當歸半兩洗炒麝香一錢別研辰砂半兩別研上件為細末用精羊肉去筋膜一斤切細以法酒煮如泥取出細研入阿魏並諸藥同搗丸如蘿蔔子大每服三十丸溫水飲下不拘時候衛生湯出鮑氏方治疳熱肌瘦盜汗地骨皮洗四兩生乾地黃一兩甘草半兩白芍藥一兩上為散每服二錢小麥三十粒煎又方出全嬰方治吃土黃連黃土上等分為末糊丸如小豆大每服三十丸米飲下又方治小兒一切疳手腳枯細腹肚脹滿痿黃羸瘦不欲乳食宜服此方干蝦蟆一枚大者上以酒噴地上一夜令脹內莨菪子二兩在蝦蟆腹中封口入瓶子內燒令煙盡放冷取出搗羅為末入膩粉一錢以軟飯和丸如緑豆大每服以粥飲下三丸量兒大小以意加減洗方出危氏方大腹皮苦參川白芷上為銼散煎湯沐洗妙三和丸出聖濟總録治小兒諸疳肢體羸弱臟腑虛滑不思乳食胡黃連半兩木香半兩麝香研一錢上為細末滴水為丸如黍米大量大小加減丸數與服治小孩子疳瘦又取五月五日蟾酥以硃砂麝香為丸如麻子大空心服一丸如腦疳以奶調滴鼻中五疳保童丸出保嬰方治小兒五疳八痢面黃肌瘦頭髮作縷好食泥土不思乳食並宜服之大幹蝦蟆一枚燒存性皂角一定去皮核燒存性蛤粉三錢水飛麝香一錢細研上為細末打麵糊為丸如粟米大每服三四十丸溫米飲送下空心食日進三服福壽保生丸出德生堂經驗方治小兒一切脾疳癖積飲食無時諸物所傷脾胃因食寒熱積作成氣塊腹肚脹滿喜怒不常堅硬為脾身熱虛汗而且多睡或黑或瘦口鼻生瘡並宜服之蘆薈木香各一兩蕪荑仁使君子砂仁胡黃連神麯廣朮三稜炒陳皮干蝦蟆各七兩半上為細末水糊為丸粟米大每服五七丸溫米湯送下量歲數加服日進二服八九日後大便黑為驗切忌葷生冷硬物為妙磨脾化滯丸出德生堂經驗方蒙傳得效小兒諸脾疳服之者無不效木香蘆薈各二兩使君子仁蕪荑陳皮去白青皮去白砂仁神麯莪朮以上各七錢半蝦蟆一兩半燒灰胡黃連二錢黃連五錢九肋鱉甲醋炙一個上為細末醋糊為丸如粟米大每服百十丸飯水下無時量兒大小加減服日三服為妙化脾積二聖丸出德生堂經驗方逯公謹傳小兒脾疳得效方雷丸神麯炒麥糵炒陳皮青皮茯苓苦葶藶石三稜蘿蔔子炒別研阿魏白豆蔻沉香青木香以上各一兩廣木香一兩半莪朮二兩蒼朮四兩半夏三錢丁香二錢半上銼麻豆大用好醋五升生利牛兒鐵一斤捶碎同前藥浸春三夏二秋七冬十日去鐵將藥煮曬乾為細面糊丸如粟米大量兒大小服三歲以下三十丸四歲以上至七歲五十六十丸用作水空心服之若受濕黃腫腹脹者用木瓜煎湯下忌生冷鹽鹹海味毒物神聖化脾丸出德生堂經驗方專治小兒脾疳積聚成塊在皮膜外者發熱發渴乳食不進日漸羸瘦服諸藥不效者此藥主之大有功效京三稜炮廣朮炮青皮去白陳皮去白各五錢沉香二錢木香三錢檀香二錢半檳榔二錢半腦子半錢全蠍二錢上為細末煉蜜為丸如緑豆大二歲至四歲者三丸五歲至八歲者五丸九歲至十二三歲者七丸食前用引子送下服後食積推下便軟二服後漸消三服去病七分然後用藥磨脾去積順氣進食引子須要白曳刺馬溺半盞水中浸後送下五疳消食丸治小兒脾傷食疳積聚發為寒熱香附子京三稜石三稜青皮陳皮各二兩縮砂一兩半使君子一兩半黃連一兩莪朮一兩蕪荑一兩蘿蔔子二兩木香一兩干蝦蟆四兩燒灰蘆薈一兩檳榔一兩苦楝根三兩乾漆一兩燒去煙阿魏半兩另熬胡黃連一兩上為細末熬蘿蔔水調神麯末四兩糊丸如黍米大每服十五丸二十丸飯水下量大小加減丸數與服日三次妙神仙妙應丸專取大人小兒疳脾癥瘕氣積成塊或如小黃瓜橫擔腹肚脅左右青筋明現腹鼓急手足瘦小形貌焦枯黃黑髮直口乾病在膏肓本堂自至都下止以此藥治大人小兒蟲積盡在大便中一行之後地上便見諸積委有功效藥性平穩不損元氣老幼皆可服檳榔二兩黑白牽牛二兩大黃一兩使君子半兩蕪荑半兩雷丸半兩鶴蝨半兩乾漆五錢半去煙上為細末用皂角四兩去皮弦子切碎熱水浸泡搓搙濃水濾過和麵為丸如粟子大或粟豆大隨兒大小服一二百丸蔥白熬湯五更送下棗兒壓之次早大便見其得病根元之物年十歲服二三錢重方驗極妙選治五疳黃瘦不生肌肉肚脹多筋頭髮焦黃不思乳食糞中有蟲米穀不化小便如油睡中盜汗蘆薈二錢使君子七個木通炮一錢檳榔炮一錢黃連一錢去須蕪荑炒去膜雷丸銼炒一錢青皮炒一錢龍膽去須二錢上件為末雄豬膽汁蒸過為丸粟米大每服二十丸飯飲送下鮓湯丸治疳積南星乳香滑石白丁香青黛一錢輕粉二錢金箔五片巴豆十六粒去皮心錫末先將水銀安紙上溶入手挪碎上為末糊丸如粟米大每服三十丸薄荷湯下如疳積鮓湯下脹滿茴香湯下赤白痢甘草湯下瘧疾桃枝湯下麝香丸治小兒五疳麝香熊膽蚺蛇膽牛黃赤小豆為末以上各一分蟾酥如柳葉二片上件藥同研如粉用瓜蒂半兩煮取汁和丸如麻子大一歲每服空心以粥飲下三丸量兒大小以意加減抵聖丸治小兒一切疳麝香細研熊膽細研硃砂細研瓜蒂蚺蛇膽以上各一分蟾頭一枚炙令焦黃牛黃半分細研赤小豆半分炒熟上件藥搗羅為末都研令勻煉蜜和丸如緑豆大每服以粥飲下三丸如小兒即以乳汁破下與服量兒大小以意加減與之吹鼻散治小兒一切疳揉眼鼻揉耳發乾蝸牛殼二十七枚土淨土蝦蟆灰一分地榆銼一分青黛半分細研麝香半分細研上件藥搗羅為末相和更研令極細每日兩度以葦筒子吹半粳米大於鼻中覺有效即日一度吹之治小兒肝疳此由乳母多食酸物忽因乳母大便與兒乳致令毒熱之氣傳在於兒之肝經疳氣之盛相傳於脾故生斯疾其狀愛搖頭揉目白膜遮睛或時多汗目中澀癢頭髮焦枯腦熱如火非時下痢唇皮赤焦即為肚疳宜吃此方但目色常青左肋下堅硬多吐涎沫左右眼角有黑氣所沖者不可治也使君子蒸羌活防風延胡索天靈蓋酥炙黑色鱉甲酥炙香黃木香密蒙花決明子各一分山梔半兩上為細末每服一錢食前將薄荷湯調下去滓吃兒大者吃一錢半治小兒心疳此由乳母多食熱物血氣昏壅兒食熱乳傳在兒心經火能生土毒熱之氣傳入於鼻故生斯疾其狀非時道通身發熱面黃兩頰上赤心胸煩滿鼻乾心躁忽思飲水口舌生瘡忽時下痢久而不已忽時下膿血即為心疳宜吃此方但夜多驚啼耳邊脈動舌色黯黑者不可治胡黃連茯苓天靈蓋酥炙黑色鱉甲醋炙香黃木香沉香二銖使君子蒸三次半兩上為細末重羅如飛塵每服半錢以金銀湯調下食後溫和去滓吃兒大者吃一錢須是狀非時道通身發熱方可吃此方治小兒脾疳此因乳母飲食不節冷熱不調或飯食太多停滯不化兒食其乳不調之氣積在脾間故生斯疾其狀多乳食不消心腹脹滿面色痿黃口鼻常干肌體虛劣好吃泥土灰炭之類情意不悅愛近黑處下痢多酸臭此為脾疳宜吃此方但好食泥土水穀不化皮枯骨露者皆不治之候也訶黎勒麵裹火炮去核只用皮使君子蒸三次各半兩白朮厚朴去粗皮薑炙黃橘皮天靈蓋酥炙黑色檳榔鱉甲醋炙香黃甘草炙木香川芎白蕪荑各一分南根三錢去黑子上為細末每服一錢空心以米湯調下兒大者服一錢半治小兒肺疳此由乳母多食辛熱之物肺臟傷兒食其乳毒熱之氣傳在肺經故生斯疾其狀非時發嗽壯熱憎寒口鼻生瘡多饒涕唾毛髮焦枯多咬指甲頻頻氣脹六腑不調忽時下痢糞中下米是為肺疳並宜吃此兩方但皮上發瘡如粟色黑者不可治桑白皮白根入地一尺以下者二兩可用出土上者殺人使君子十銖蒸七次枇杷葉去毛令淨炙天靈蓋酥炙香黃黑色鱉甲酥炙香黃木香川芎密陀僧一分此味別研上杵羅為末另入密陀僧末更研令勻每服半錢黃橘皮一片六分水一盞煎取四分食後去滓吃兒大者吃一錢吃乳後服此藥於空心吃後方藥訶黎勒半兩面裹火炮去核只用皮白朮使君子蒸各一分甘草三錢上細杵羅為末每服一錢六分米湯一盞重入鐺內煎四五沸空心清晨吃治小兒腎疳此由乳母陰陽交接之後血氣未定便與兒乳其不調之氣傳在兒之腎經故生斯疾其狀骨肉消瘦齒上齦瘡頻發寒熱頭熱如火足冷如冰吃食減少瀉痢頻多其病至極即下部開張肛門搔癢不時蟲動名為腎疳宜服此方但寒冷無熱氣者不治之候也鱉甲酥炙香黃萆薢茯苓蕪荑天靈蓋酥炙黑色川芎烏藥各一分狗脊去毛半兩南椒二錢去黑子上為細末重羅如飛塵每一錢空心蔥湯下或白水兒大者吃一錢半兒小者吃一錢五疳丸治小兒疳瘦者面黃羞明眼澀好吃泥土乳食不消化常服退黃化蟲緑礬或塊者燒通赤取出稱一兩半密他僧火燒赤取出稱一兩夜明砂燒過一兩半上為細末熟棗穰為丸如麻子大每服三五七丸溫米湯送下量兒大小加減一日三服不拘時抱子茯苓湯治黃疳土色為熱為濕當小便不利令反利知黃色為燥伏腎經火熱發黃脫落知膀腎俱受土邪乃濕熱之症鼻下齦作瘡土逆行管氣上火也能乳者胃中熱也寒則食不入喜食者胃不足也面黑色者為寒為痺大便青寒褐色熱蓄血中間黃色腸胃直熱治法當滋陰潤燥耐熱避寒致生津液山梔子三分黃蘗炙甘草各二分大蕪荑半錢黃連一分麻黃不去根節羌活各二分柴胡三分防風一分白朮半分茯苓三分當歸四分上件銼如麻豆大都作一服水一盞半煎至一盞去滓稍熱食前下消疳丸治小兒諸疳肌肉消瘦日晡作熱引飲無度退疳熱長肌膚殺蟲進食熊膽硃砂別研水飛胡黃連鱉甲醋塗炙黃柴胡去土黃連去須微炒以上各半兩夜明砂微砂檳榔木香陳橘皮去白各一分青橘皮去白一分乾蟾二枚燒赤存性蘆薈別研麝香別研二味各一錢上件為細末研勻軟粳米飯和丸如粟米大每服二十丸溫水送下不拘時候蕪荑丸治小兒五疳骨蒸麵黃肌瘦飲食雖多不生肌膚牙齒宣露或自汗盜汗疳瘡濕癢小便白濁黃連去鬚髮微炒黃蘗去粗皮甘草炙青橘皮去白龍膽草去蘆以上各半兩乾蟾一枚酥炙白蕪荑仁炒胡黃連各一分青黛一錢使君子十四枚去殼麝香半錢別研上件為細末研勻用獖豬膽汁和得所分藥入豬膽內合令七分滿以線系定於銀石器中用漿水煮五七沸取出當風挂一宿剝去豬膽不用只取藥再和令勻丸如黍米大每服二十丸溫米湯送下不拘時至聖丸治小兒五疳黃疳食不生肌常服殺蟲長肉胡黃連黃連去須微炒陳橘皮去白龍膽草去苗焙以上各一兩五靈脂二兩川楝子去枝半兩蕪荑仁二錢半炒同研蟾酥半錢別研蘆薈二錢別研上件為細末煮麵糊為丸如黍米大每服二十丸溫米飲送下不拘時候麝香豬膽丸治小兒諸疳羸瘦齒齦潰爛或作蟲痛乳食雖多不長肌膚常服追疳黃肥肌肉美飲食胡黃連黃連去須研各一兩川芎三分沒石子半兩面裹煨黃去面使君子半兩醋炙十餘切焙冷干麝香二錢別研蕪荑一兩別研川楝子肉一兩銼碎炒黃上件為細末次入研者藥和勻用獖豬膽汁和蒸餅為丸如黍米大每服三十丸溫水飲送下不拘時候搜疳丸治諸疳羸瘦不生肌肉面色痿黃消腹脹殺疳蟲進飲食止汗寬胸膈磨滯京三稜半兩濕紙裹煨舌銼檳榔木香肉豆蔻