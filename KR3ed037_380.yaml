縮砂仁半錢枳殼一錢上為末每服一錢蘿蔔子煎湯調下泄去疳氣即消治小兒五疳小便白濁殺蟲用使君子煨食以使君子煎湯送下治小兒食土用好土濃煎黃連汁和成塊日乾與服治小兒疳瘦用蝦蟆燒灰清米飲服之蝦蟆即癩蚵蚾也大木香散治小兒腹脹似鼓兼日到晚壯熱名曰氣疳木香陳皮各二錢膩粉一字牛蒡子瓦上焙二錢上為末每服半錢用陳米煎湯送下玄梅散治小兒疳病取腹中疼痛玄胡索烏梅一錢上㕮咀每一錢水八分甘草一寸煎四分茯苓消氣丸治小兒脾疳手足浮腫漢防己茯神茯苓胡連各一錢麝香一分上末用蜜和丸如麻子大每服五丸米飲送下粉龍丸治小兒疳困龍膽草蚌粉上為末每服半錢用米飲調下黃耆散治小兒疳熱進食芰草柴胡茯神地骨皮白茯苓甘草上各等分末每半錢用白湯調下黃耆飲子治小兒五疳或傷脾脹發黃時時壯熱頭上虛汗日漸黃瘦或泄瀉黃耆茯神陳皮甘草白茯等分白檳榔小者肉豆蔻一個小者上㕮咀每三錢水一盞煎七分慢火煎時時溫服厚腸丸治小兒疳瘦泄瀉下痢脹進食生胃氣甘草炙厚朴各一兩使君子半兩去殼煨陳皮去白訶子各二兩去核半生半熟上為末蜜丸如雞頭子大二歲以上一丸以下半丸乳汁或清米飲化下亦可大神丸治疳瀉渴飲無度蘆薈一兩訶子皮半兩肉豆蔻麵裹三味火煨以面熟為度上為末棗肉為丸緑豆大三五丸米湯下黃耆散治身體潮熱煩燥不可安臥飲食不進小便如泔頭面赤色青皮陳皮黃耆茯神厚朴茯苓訶子砂仁丁香木香甘草白朮各等分上㕮咀每服三錢薑一片煎去滓服無時
