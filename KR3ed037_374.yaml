body:
  text: 卷三百七十四嬰孩驚風門一切驚風硃砂丸出直指方治驚風涎盛硃砂馬牙硝各二錢川靈脂蘆薈各一錢半麝半錢腦一字上研細甘草膏為丸緑豆大金箔為衣每服一丸薄荷湯調下生氣散出直指方諸風疏利後以此調氣丁香二個白朮青皮各二錢甘草微炙木香人參各一錢上為末每服半錢沸湯點服或用和劑調氣散亦得塗囟法一名塗囟麝香散出醫方集成不但初生但有風證即用麝香蠍梢薄荷葉蜈蚣牛黃青黛等分上為末研勻用棗肉膏調新綿上塗勻貼火炙暖手頻尉之百日外兒更可用浴體法浴體法出危氏方驚風及傷風不醒漸傳風證僵仆皆可用天麻蠍尾硃砂烏蛇肉酒浸白礬麝香青黛等分上為末每三錢水三碗桃枝一握並葉煎十沸溫熱浴勿浴背小牛黃丸出活幼口議治小兒膈熱痰涎稠盛心神不寧睡不安穩煩躁怔忡四體作熱宜服之但覺痰熱驚風常服有效乾葛切炒取末一兩甘草炙一分黃芩去心與浮皮一分防風半兩麝香半分山梔子半兩去皮取仁上為細末麝香少許和勻煉蜜為丸如皂角子大常服薄荷湯化下議曰此名四證已述前篇兼載八候續今復舉驚熱並風痰未發陰陽二癇之前醫者即先與此化痰御風退熱利驚如此逐病推究不惟繁難亦非所治是故難於療理若以向病於證何憑凡此四證相隨不可忽其一也利其驚則風縱退其熱則痰壅久尋此理未究盡善忽一日省悟錢氏方宣風散正為此等兒孩病設有痰即壅有熱即閉有風即隘有驚即悶昏昏沉沉輕藥不能散重劑恐傷害本體但與服疏風散較之宣風散只欠一味一服之間風痰驚熱悉皆消去神情慶悅四肢安和觀其此藥似有虎狼用之卻和順推痰利驚散風解熱只與一服不移其時可見功效嘗見醫工調治此等證候多是疑二進退怯怚若過其時延其日則後傳變自驚作風自風生痰自痰成熱自熱成慢八候相從反覆傳變遞互發越之時不可得而進此藥然疏風所療四證相待如賊方會極力一沖盡使散敗不致作害及其聚而自散者流入諸經或絡或經或脈故作搐搦引掣等證矣大效疏風散出活幼口議治嬰孩小兒驚熱風痰四證聚於胸臆之間令兒昏困沉重關竅不通諸脈氣閉所以默默欲食不食欲起不起倦伏不知其證候者但不經吐利宜與服之立見蘇省錦紋大黃緊實者三錢重雞心檳榔二錢舊陳橘皮去白二錢黑牽牛一分半熟朴硝一錢上為末二歲兒服半錢匕三歲一錢匕先用生蜜調就次煎薄荷湯服之不拘時候一方無朴硝風痰在上即吐在下即瀉謂膈上下也一服之間即便安樂未可便投他藥恐相致誤常人只知用腦麝參苓朮附香附子無擔負之藥似此四證如何調理也正舌膏出御藥院方治小兒風病搐搦機關不利吃乳難下至不能發聲者此因病作之後風邪客於舌中之絡脈而致此也服之纍效天麻明大者白殭蠶直者去絲炒大葉薄荷鄆州者各半兩麝香一錢研好硃砂飛研一分計三錢半入藥半為衣腦子少許上除研者外為末研勻煉蜜和丸如榛子大每服一丸薄荷湯化下時時服少許硃砂為衣清心散一名牛黃散出仁存方截驚風方見牛黃散星香全蠍散治小兒驚風人參陳皮各一錢全蠍炙三個甘草炙半錢木香一錢南星濕紙裹煨三錢上㕮咀每服一錢紫蘇薑棗煎服有熱加防風一方不用木香鐵粉丸出御藥院方墜風痰潮搐吐逆咳嗽涎盛水銀鉛二味同結沙子共稱一分硃砂鐵粉天南星去臍炮為末各一字輕粉一錢上一處研至水銀星盡為度生薑汁麵糊為丸如粟米大每服十五丸生薑湯下名太乙丹已風丹出醫方妙選祛風退驚天竺黃一兩研防風一兩鉤藤一兩白殭蠶半兩干全蠍半兩白附子半兩上為細末煉蜜為丸如雞頭子大每服一粒至二粒點麝香荊芥湯化下金箔膏出醫方妙選治大便不通者金箔十片另研水銀一分以棗肉少許另研星盡硃砂一分飛研雄黃一分研鉛霜一分乾蠍為末一分上研為細末取鵝黎汁和丸如緑豆大每服二粒至三粒麝香湯化下銀箔丹出醫方妙選治伏熱潮發者銀箔十片續隨子一分去皮研青黛一分蘆薈一分研胡黃連末一分麝香一錢上通研勻細以糯米飯和如緑豆大每服一粒至二粒煎薄荷湯下量兒大小加減白殭蠶丹出醫方妙選治驚風潮搐生涎上喘急宜服之白殭蠶一兩炒干全蠍二十一個白附子半兩天麻半兩半夏半兩湯浸七次以上搗羅為細末次用硃砂半兩水飛金箔十片研膩粉一錢研上同拌勻用棗肉為丸如黍米大每服七粒至十粒點麝香荊芥湯下量兒大小加減木通散出經驗良方能瀉肝風降心火利驚熱山梔一錢大黃紙煨一錢羌活二錢木通赤茯苓甘草各一錢上銼紫蘇煎服每服一字七珍丹出直指方治諸風頑痰壅盛大小通用細辛川靈脂白殭蠶炒各一錢半白附子一錢硃砂半錢全蠍四個焙上為末用大南星生為末煮糊丸麻子大每服五丸薑湯送下透關散出幼幼新書治卒中感厥諸癇小兒驚風涎滿口噤立效硃砂二錢龍腦一錢牛黃一錢膩粉一錢水銀同硃砂炒如鐵色無星為度一錢上同研為細末分作三服用煎薄荷湯調下取出惡物五七日後更一服一月更一服小兒每服一字薄菏湯下口噤者拗開灌之甚妙龍角丸一名大黃丸出幼幼新書治少小五驚及身熱龍角一作龍骨遠志牡蠣煅赤大黃各三分黃芩四分上為末蜜丸二歲兒小豆大五丸日再一歲麻子大成癇者入牛黃一分一方乳汁下五丸量兒大小以意加減硃砂散出幼幼新書治小兒驚熱和氣硃砂白茯苓人參山藥各等分甘草減半半生半熟上為末驚金銀薄荷湯下和氣米飲下熱竹茹煎湯下量兒大小下一字或半錢或三字天麻神妙丸出幼幼新書治驚風天麻殭蠶各酒浸一宿輕粉蠍炒白附子米泔浸一宿以上各等分上為末煉蜜丸如緑豆大入硃砂麝為衣每服一丸薄荷湯下分金散出幼幼新書治四時驚風大效硼砂馬牙硝各半錢腦麝各一字人參甘草炙各半兩上為細末每服一字四足驚風發動如羊眼喉內無涎用腦麝冷水下一字開關散出危氏方通關治驚赤蜈蚣一條炙白殭蠶南星炮各一錢麝香一字豬牙皂角三梃略燒存性上為末以手點薑汁蘸藥少許搽牙或用物引滴入藥兩三點入鼻內涎出自開開牙散出直指方華陰細辛南星朴硝各一錢麝香半錢蠍梢五條上為末以少許用烏梅肉搗末和搽牙並用細辛皂角荊芥末吹入鼻中一字散一名蜈蚣蠍梢散出衛生家寶方截風定搐全蠍褐色者一個赤腳蜈蚣一條並新瓦焙硃砂半錢腦少許麝少許上為末每服一字薄荷湯調下先以些少用管子吹入鼻中自然通竅一方無腦撩痰散川烏尖生附子尖生南星尖生半夏生蠍梢各一錢上為末鵝翎點酸醋蘸藥攪喉引痰出鎮肝丸治小兒失心驚氣風證全蠍一枚麝香少許酸棗仁一錢腦子一分辰砂一分上為細末豬心血丸如菜子大每服七丸燈心湯送下治小兒驚風方出本事方茯苓甘草硃砂青黛膩粉上各等分入麝香少許每服一錢蜜水調下抱龍丸出鮑氏方理一切驚風潮搐傷風瘟疫身熱昏睡氣粗風熱痰實壅嗽中暑沐浴後並宜進此及治瘡豆熱毒發搐並蠱毒南星四兩臘月醋浸陰乾一日夜如無以生者去皮臍炒熟一方臘月牛膽中陰乾如無生者水浸三日焙用辰砂別研麝香別研各半兩雄黃水飛一分天竺黃一兩上為末煮甘草水和丸指頭大每服一丸溫水化下百晬內者作三四服或用臘雪水煮甘草和藥尤佳一方溫薄荷湯化下壯實小兒宜時服控痰散出直指方治風噤先用控痰散吐風涎次與益脾散和胃又用辰砂膏利驚即愈或手足拳噤口不開者不治蠍尾銅青各半錢硃砂一錢膩粉一錢麝香少許上為末每服一字臘茶清調下先吐風涎然後和胃或後段甘草方吐痰隨輕重用龍腦膏出全嬰方治小兒驚風搐搦痰壅或者瞪目直視或眼不開口噤四肢或冷或熱大便或祕或泄等證腦子一錢石腦油冬半兩夏一錢南星炮二錢輕粉一分水銀半兩臘茶半錢酥一塊如棗大同研無星上為末研和為丸如小豆大一歲一丸乳香湯下不得化破比金丸一名小青丸出和劑方治小兒驚風體熱喘粗涎嗽心煩頰赤大小便不利夜臥不穩滑石膩粉研各十五兩青黛研二兩半天南星炮一十二兩半巴豆七百個上為末麵糊為丸如麻子大每服一歲一丸薄荷溫水下如急驚風頭熱足冷口噤面青筋脈抽掣上膈頑涎疾壯盛者加一兩丸煎桃符湯下疏利下蘊熱涎立便安愈小兒瘡疹後餘毒不解宜服食後一方無巴豆青黛加蠍梢半錢安神丹出醫方集成治小兒心神不寧困臥多睡及痰涎壅塞恍惚不定硃砂人參各二錢半南乳香半兩酸棗仁炒去皮一兩遠志去心一錢半上為細末蜜丸榛子大金箔為衣每服一丸人參湯化下每兩作三十丸辰砂膏出仁存方治驚風痰搐傷風咳嗽南星一兩同半夏用白礬水浸二十一日換曬乾又換浸焙乾半夏一兩全蠍十二個炒天麻半兩硃砂二錢上為末蜜丸如龍眼大每服一丸薄荷湯化下珍珠散一名珍珠丸出仁存方治驚風發搐化痰退熱硃砂一分珍珠末二錢雄黃一分全蠍一錢蟬蛻七個上為末每服一字至半錢煎金銀薄荷湯下竹瀝調尤好一方作丸有輕粉不用蟬蛻粳米飯為丸如粟米大每服二十丸薄荷湯下保生丸一名保生丹一名延壽睡驚丸出楊氏家藏方治小兒胎中驚積盤腸內瘹傴身返視啼哭不止或潮熱風痰驟成急驚吐瀉日久變成慢驚手腳搐搦哭如鴉聲脾胃虛損不進乳食如能常服令小兒永無驚風之疾眠睡安隱乳食增進雖是傷風瘡痘之候服之亦能解利寒邪透肌消毒大人手足頑麻運動疼痛睡中驚悸心神不寧以兩丸依方臨睡時化下硃砂一分一方用一錢飛麝香一分一方用一字研天南星炮半兩一方一兩半白附子炮半兩一方用一兩薑汁製蛇含石四個大者於地上依方位寫十二時辰字於辰字上用瓦襯如出炭火煅令通紅醋淬七次須預時煅下臨時入藥上為細末於重午日修合三五家粽子尖搜和為丸如梧桐子大每服一丸薄荷湯磨下若肚疼用鉤藤湯磨下未周歲兒只服半丸合時勿令婦人貓犬見之一方用荊芥湯磨化入薑汁兩三點調服一方每用一丸蘸竹瀝如膏服不食以乳解送下急風膏出醫方妙選治小兒截驚風利胸膈好硃砂半兩水飛天漿子二七個炒干全蠍二七個膩粉一錢青黛一分上都拌勻腦子半錢研細用軟飯和成膏如皂子大每服一粒煎人參荊芥湯化下碧霞丹出聖惠方治小兒膈實涎盛者硫黃一分膩粉一分青黛一分硃砂一分水飛巴豆五粒去油上都研令細滴水和如黍米大每服五粒以薄荷湯下一方無硃砂軟飯和丸聖金丹出醫方妙選治小兒痰實潮搐者白殭蠶一兩半夏一兩湯洗七次焙乾烏蛇頭一枚酥炙令黃以上搗羅為細末另研入青黛一分蟾酥三片如柳葉大鐵器上焙乾上都研勻酒煮麵糊和如黍米大每服十粒點龍腦湯下量兒大小加減祛風丹一名宣風丸出聖惠方治潮發痰盛者服之尤佳兼治急驚風頭熱足冷口噤面青筋脈抽掣多痰涎川烏頭一枚大者炮製去皮臍白附子一分天南星一分炮以上搗羅為細末次用巴豆五個去油膩粉一分研上再研勻以棗肉和如黍粟米大每服三粒至五粒煎生薑湯冷下量兒大小加減一方薄荷湯下追風丹一名追風丸出十便良方治潮熱至困者大川烏頭一枚去皮炮白殭蠶半兩炒乾薑半兩炮白附子一分天南星一分炮上搗為細末煮槐膠和如黍米大每服十粒溫酒下量兒大小加減一方有乾蠍每服五丸寸金丹出醫方妙選治吐利後生驚風及心肺中風尤宜服之蛇頭一個酒浸焙乾赤頭娛蚣一條炙干全蠍一錢草烏頭一枚炮去皮麻黃各一錢去節上為細末每服一字抄龍腦一字同溫酒調下量兒大小宜服加減鐵粉散出醫方妙選治小兒驚風或多面赤口乾大便不利尤宜服鐵粉半兩研珍珠一分研鬱金一分研胡黃連取末一分牛黃一分研上拌勻研細每服一字溫蜜湯調下油珠膏出經驗良方補脾胃潤心肺治氣逆嘔吐風痰作搐石亭脂即生硫黃選如蠟色者滑石各半兩附子炮去皮臍半夏湯泡去皮臍南星湯泡去皮臍各一錢半上為末每服一錢以清虀水半盞滴清油一點如錢大抄藥在油珠上須臾墜下卻去虀水止服油珠藥再服清虀水三五口並空心下候一時方與乳如痰壅涎塞眼睛斜視速宜服之生金湯出幼幼新書治小兒生七日後忽患口鼻青微驚胸中冷視物高生金黑豆大一粒無生用熟乾薑一分茯神一分甘草二分炙上水一升煮五合一服一棗大日五夜三人參丸出幼幼新書鎮心驚人參芍藥甘草炙各一錢大黃二錢蒸上為末煉蜜丸如麻子大每服一丸米飲下鉛白霜丸出幼幼新書鎮心驚鉛白霜人參茯苓各半錢麝香少許上為末煉蜜丸如青豆大薄荷湯下五丸鎮心丸出幼幼新書治驚硃砂犀角末升麻大黃各半兩上為細末煉蜜為丸如緑豆大每服三丸薄荷湯下天麻丸出幼幼新書治小兒諸驚風天麻炒全蠍炒天南星炮去皮白殭蠶直者炒各等分上為細末酒糊丸如大麻子大每服一歲十丸加至十五丸荊芥湯下藥性溫可以常服永除諸風茯神膏出幼幼新書治小兒驚風蠍梢茯神各半兩白殭蠶一兩硃砂一錢上為末用蜜為膏每服一皂子大煎金錢薄荷湯化下撫驚丸出幼幼新書治小兒一切驚風青黛茯苓各二兩天麻四兩蠍半兩上為末蜜丸如雞頭子大薄荷湯化下人中白一兩麝香一錢蜈蚣全者一條盆硝二錢上為細末每用少許鼻內搐宣風散出傅氏活嬰方治驚風四體不安膽星丸出直指方鎮心壓驚利痰解熱牛膽南星半兩硃砂防風各二錢麝香一分上用臘月黃牛膽汁和南星末作餅子挂當風處四十九日和下項藥末研細浸牛膽皮為丸如梧桐子大每服一丸井花水調下疏膈丸出宿州陳氏方治驚亦治疳青黛一錢干蝦蟆一枚燒存性木香一錢檳榔一錢麝香一錢續隨子一錢去殼上除青黛麝香續隨子仁三味外為細末共和再研細煉蜜為丸如緑豆大一歲時每服十五丸米飲送下量兒大小加減丸數延壽散一名雞舌香散出全嬰方治小兒驚搐不定或因驚風已經取下舊病復作雞舌香大者三粒硃砂半錢五靈脂錢半黃耆一錢上為末一歲半錢糯米泔調下飯湯亦可王氏曰用雞舌香一錢黃耆一分蜜炙辰砂兩錢五靈脂半錢治療亦同一字散出仁存方治驚風神困不醒又方出海上名方治驚風不省用藥無效者蜈蚣蠍梢白附子各一錢腦子少許上為細末每用一字薄荷水調勻吹兩鼻內得睡便安小兒驚風出本草殭蠶蠍梢等分天雄尖附子尖各一錢微炮上為末每服一字或半錢生薑酒灌之治諸風如吐不止用十一味藿香正氣散吐止後服此藥防風三兩南星二兩金沸草一兩硃砂少許上用無灰酒調服或用桐油煎豆腐食後吐痰淨用此藥丹砂散治小兒驚搐丹砂一錢研膩粉一錢蜈蚣一條酒浸炙蠍梢四十九枚炒上搗研為細散每服一字以薄荷汁調下犀角散治小兒多驚身體壯熱吐乳不止犀角鎊半兩青黛研牛黃研一錢龍膽研各一分上搗研為散再和勻每服一字乳汁調下日二隨兒大小加減安驚保命丹腦子一片硃砂一粒全蠍一個去尾足殭蠶一個上為細末用奶乳調服之立效軟紅膏出醫方妙選治小兒潮搐涎盛者天南星一兩生用硃砂半兩水銀一分用真石蠟油半盞同研細乾蠍梢四十九枚上一處入龍腦麝香各一錢再研棗肉和於石臼中搗三五百下硬軟得所成膏如皂子大每服一粒煎薄荷湯化下神驗大小加減萬金丸一名萬金丹出瑞竹堂方治慢驚風急驚風十無一失蒿節內蟲七月初五日或十五日取辰砂輕粉麝香少許一方不用上先以辰砂輕粉為末入蒿蟲研勻入麝丸如黍米大每服半歲一歲兒一丸二歲二丸三歲三丸乳汁下或冷水亦得一方男取女乳女取男乳名如聖丸定志丸一名遠志茯神丸出幼幼新書治心氣不定安神定志小兒驚風心忪多汗咽乾煩熱遠志去心苗三兩人參三兩石菖蒲三兩白茯苓三兩上為末煉蜜和丸硃砂為衣每服二十丸米飲下一方加桂一錢半荊芥湯下搐鼻藥出典藥方蜈蚣一條赤腳全頭者蠍梢四尾殭蠶七個直者去嘴生用上為細末用鵝毛管吹入鼻中便打噴嚏三五個更有啼哭者可治卻用妙濟散等藥治之如無噴嚏者不可治也弄舌散出全嬰方治小兒驚弄舌瀉黃散亦治蛇皮一分炙牛黃一錢硃砂一錢麝香一字上為末每服一字薄荷湯調下碧雲散出宣明論方治小兒驚風有涎膽礬半兩研銅青一分研粉霜輕粉各一錢上為細末每服一字薄荷湯下中風漿水下如吐多不定煎蔥白湯投之立效小丹砂丸出王氏博濟方治小兒驚積鎮心化涎小丹砂研一分巴豆去皮心膜出油盡三十粒半夏湯洗七遍為炒二錢匕杏仁先泡過後湯浸去皮尖雙仁研五枚上搗研為末麵糊丸如緑豆大每服一丸薄荷湯下三歲二丸五歲三丸如驚伏在內即驚積行盡仍舊藥出如無驚積藥更不下蠍梢丸治小兒胎虛氣弱吐利生風昏困嗜臥潮搐全蠍微炒白附子煨制各半兩半夏一兩切片薑汁製焙乾通明硫黃一兩上為末薑汁糊丸如麻子大每服三十丸荊芥湯下更看大小加減服硃砂散出幼幼新書治小兒不吃乳眼目不開手足牽挽此是驚風硃砂龍齒硝石各一分上細研為散每服煎竹葉湯放溫調下一字如二歲以上兒每服半錢殊聖辰砂膏一名保命丸出幼幼新書治小兒驚風手足動搖精神不爽一切驚邪狂叫不寧辰砂光明有牆壁者研極細一兩酸棗仁微炒為末一方用一兩乳香光瑩者細研各半兩上同研為膏每服兩大豆許煎人參湯化下一方煉蜜為丸棗湯下一方為末如發熱小麥煎湯調下名寧心散虎眼丸出幼幼新書鎮心化涎夜臥不穩夢中驚叫或多虛汗並宜服之硃砂白殭蠶天南星生各一分上為末麵糊為丸如緑豆大每服五丸至七丸薄荷湯吞下治驚和氣止瀉痢出幼幼新書白朮一錢切薄片蜜略塗紙襯銚慢火炒甘草半錢生一半炒一半蠍兩個全用龍腦薄荷葉裹線系竹夾炙候薄荷焦去之只用蠍如無生薄荷用乾者同炒令焦用上為末止驚金錢薄荷湯下和氣止瀉痢米飯湯下治驚風上吐下瀉吐痰涎方硃砂一錢麝香少許蠍一個上先研蠍為末後研硃砂麝香極細每服半字茶調下或乳汁下亦得瑞紅散出幼幼新書治小兒諸驚硃砂一分蠍梢三十條殭蠶三十個直者上為末每服一字半錢金錢薄荷湯調下逐日可常服之鎮心丸出幼幼新書治驚鎮心墜涎半夏十個大者硼砂硃砂各一錢為末上半夏以刀切開中心卻將硼砂等末納在內用好瓦一片安半夏卻將好醋滴在硼砂等內久炙取干碾爛用粟米糊和丸如桐子大每服五七丸金錢薄荷湯下珍珠丸出幼幼新書治小兒驚風又名白丸子腦麝各一字粉霜膩粉各一錢上研為細末用糯米汁為丸如芥子大每服三丸糯米湯下牛黃丸出錢氏方雄黃研水淹牽牛末一錢天竺黃一錢上同研麵糊為丸粟米大每服三丸至五丸食後薄荷水下兼治疳消積常服尤佳大者加丸數三聖丸出錢氏方化痰涎寬胸膈消乳癖化驚風食癇諸癇疳積小兒周歲已里常服極妙又名小青丸青黛一分牽牛末三分膩粉一分上研勻麵糊為丸黍米大薄荷湯下小黃丸出錢氏方生半夏末巴豆霜一字黃蘗末上研勻薑汁糊丸黍米大百日以上者各一丸一周者二丸隨乳下妙聖散出錢氏方治小兒驚風潮搐不定者蜈蚣一條蔥汁浸一周時焙乾麝香一錢草烏尖十四個薄荷生薑汁浸一日一夜焙乾上以腦子半錢同為末半字蘆管吹鼻搐定為效可兼服諸驚風藥分肢散出宣明論治小兒卒風大人口眼喎斜風涎裹心驚癇天瘹走馬喉閉急驚一切風熱巴豆不出油朴硝各半兩川大黃一兩上大黃為末後入巴豆霜朴硝一處細研用油單貼起如有前患每服半錢熱茶下吐下頑涎立愈如小兒胸喉驚吊等疾先服龍腦地黃膏一服次服此藥一字看虛實加減只是一二服見效不宜頻服如吐瀉不定以蔥白湯調立效控心丸出仁存方治驚風發熱涎盛喉內鳴天南星一個炮末干薄荷末一錢大活地龍九條入南星末令卷涎出盡取星末用上用白麵少許為丸如麻子大每服五丸薄荷湯化下治驚風不省用藥無效者海上名方蠍梢硃砂各半錢地龍二條上為末地龍水浸取涎和作丸子放地龍於舊穴煎金錢薄荷湯下鎮心丸出直指方治諸風頑痰喉纏風喉痹北礬火煅枯水飛過白殭蠶米醋浸焙各一分天南星切片濃皂角水浸一宿焙二分上為末稀糕糊為丸麻子大每服五丸薑湯下喉風用皂角水研開灌下寒水石散出經驗良方小兒之病多因驚風心氣不行鬱而生涎遂成大疾宜常服利小腸去心熱自少驚涎亦不成疾一名墜痰散寒水石滑石各三兩甘草半兩上以水研如泔漿細研無聲量兒大小暑月冷水調下寒月溫湯調下被驚及心熱坐臥不安者服之即安加薄荷龍腦尤好南星散一名南星飲出直指方驅風豁痰南星重八九錢以上者用一個就地上作小坑深七八寸用火炭五斤燒通紅以好米醋半盞灑入坑中即納南星於內以火炭條蜜蓋之又用盆蓋其上一伏時取出洗淨切焙琥珀全蠍各一錢上為末入琥珀全蠍末同研勻每服半錢生薑防風湯調下三黃丸出典藥方治小兒驚風入腹一切咳嗽氣急有痰解諸藥毒及三焦壅熱身上生瘡及消瘡氣雄黃研鬱金焙各一錢江子去皮不去油三粒上為細末和勻用飯丸蘿蔔子大每服五丸至八丸薄荷湯下米飲亦得此藥旋丸用通膈丸大黃牽牛木通上為細末滴水丸如粟米大每服三五十丸量虛實加減大黃散出幼幼新書治驚風貼囟大黃芍藥各等分上為末豬膽汁調貼之乳香散出幼幼新書治小兒驚風涎溢悶絶暴死宜用亦不吐出涎只此壓發搐甘遂乳香各一錢匕上為細末每服半錢或一字童子小便下妙注唇膏出幼幼新書治小兒常服永不生風痰症心無驚多紅潤唇臉如丹常服無疳積諸癖疾患白殭蠶一兩去頭足直者生為末以薑汁和為餅子於火上炙乾又再為末復以薑汁為餅子干為度硃砂二錢細研用水一碗浸淘三遍去黃色傾紙上候乾研如粉細上同合和研勻煉蜜為膏入磁盒子內貯每用如雞頭子大三歲只可一丸如三歲以上更加用之飲湯熟水化下嚏驚散出危氏方半夏生一錢皂角半錢上為末用一豆許用管子吹入鼻立醒開關聖散一名回命散又名聖散子出直指方治驚風釣眼赤足蜈蚣一條中分為兩片各用蔥汁浸一宿焙乾全蠍一個亦中分為兩片各記左右以二味記上各為末左眼翻左手搐以左藥末搐入左鼻孔右眼翻右手搐以上藥末入右鼻孔雙眼翻雙手搐兼用之神效不驚丸出鮑氏方治驚風上視氣急枳殼炒黃淡豆豉等分上為末每服一字或半錢急風薄荷自然汁下慢風荊芥湯下入酒三五滴非慢脾風足冷者不治救急稀涎散治風痰壅閉上膈昏悶豬牙皂角四足不蛀者去足白礬半錢上為細末小者一字大者半錢溫湯調下此藥不致大吐但微吐冷涎便醒驚風后瞳人不正阿膠三錢炒人參一錢上用白水煎服治小兒驚風出濟生拔粹方白羊頭一個丁香一兩上同熬至軟用乳母盡食之空心二聖膏一名蟬殼散治小兒眼口喎斜蟬蛻一兩五月五日取東行枝上者寒食日面一兩上為末釅醋調敷紙上攤如膏藥貼患處左斜貼右右斜貼左如口正水洗下一方取七月七日東行枝上蟬蛻依前法用防風丹出仁存方治驚風神困不睡全蠍白附子上為末蜜丸如龍眼大每服一丸用麝香荊芥湯下南星醒神散出直指方治小兒驚風痰熱天南星不去皮切片生薑切片上用竹籤一條以南星並薑相間插定次用輕粉些少摻南星生薑片間風乾為末每服一字薄荷紫蘇泡湯調下大人服半錢或吐或汗或下即病氣出也奪命散一名霹靂散出醫方大成大控風涎不問慢驚急驚風痰壅塞咽間其響如大潮百藥不能過咽命在須臾醫者技窮以待其靈殊不知世有妙方服此藥良久藥裹涎隨大便過如稠涕膠黏乃藥之神效然後隨證用藥調理如無此證不須服次服花蛇川烏全蠍蜈蚣等藥治慢驚此藥神驗不動臟腑不傷真氣青礞石焰硝各一兩上入沙窩子用鹽泥固濟炭火煅通紅須待硝盡為灰藥令如金色取出研為極細末煎膏薄糊丸緑豆大每服二丸如急驚風痰壅上身熱如火濃煎薄荷湯入蜜少許調勻微溫服之或荊芥湯調下如慢驚脾風用南木香煎湯調下礞石焰硝輩雖能利痰然其性非胃家所好須以木香佐之加青州白丸三粒研為細末用生薑自然汁調若稀糊入熟蜜調勻微溫服但先用此藥入喉其痰墜下功有萬全奪天地之造原得之聖僧纍試纍驗治小兒驚神不安出本草以虎膽研水服之治大人小兒口噤牙關不開者出衛生家寶方天南星生末一錢腦子少許上和研用指蘸生薑自然汁蘸藥於左右大牙根上搽之立開治小兒夜驚大人因驚失心方出幼幼新書取震肉作脯與食之此畜為天雷所霹靂者是也服之神效羚羊角丸出全嬰方治小兒驚風退後諸病之後筋脈緩弱骨氣虛衰脾腎不足五六歲不能行羚羊角虎脛骨酥炙生乾地黃酸棗仁炒去皮白茯苓各半兩桂心去皮不見火防風當歸黃耆以上各一分上為末煉蜜丸如雞頭子大兩歲一丸白湯化下薏苡散出全嬰方治小兒因驚風及諸病之後手攣不展是肝氣不足內傷風邪薏苡仁三分當歸桂心各一兩酸棗仁去皮炒甘草防風秦艽去苗各半兩上為末三歲一錢水半盞煎至三分去滓無時服當歸散出全嬰方治小兒因驚風及諸病後腳不展指攣縮不伸當歸麻黃去節各半兩羌活人參杜仲去皮炒酸棗仁炒去皮桂心去皮各一分上為末一歲一錢水半盞薑三片煎三分去滓無時服治小兒未滿月驚著似中風欲死者出肘後方用硃砂以新汲水濃磨汁塗五心上立瘥最有神驗小兒浴湯主驚忤出幼幼新書以升麻取葉搗汁作湯浴之治小兒驚邪方出幼幼新書取燕窠與燕屎同多少以作湯浴兒療驚邪也治小兒被驚方卒驚似有痛處而不知疾狀出聖惠方取雄雞冠血一二歲每服用少許滴在口中三四歲兒每服取一小橡斗子許滴在口中一日二服治小兒生便喜驚方出聖惠方用剪父母指甲燒作灰井花水調一麻子大日進三服夜一服亦治客忤一方面糊為丸全蠍散出直指方治小兒驚風不語通竅豁痰大小通用全蠍七枚各用紫蘇葉包塗蜜炙重包塗蜜炙為細末每服一字薑汁入蜜搜和含化亦治大人風涎一方薄荷葉裹炙同研為末湯下治驚風墜涎出傅氏活嬰方用天南星一個重一兩酒浸七伏時取出於新瓦上周回炭火炙令乾裂置於濕地去火毒用瓷器合盛之冷搗末用硃砂一錢研同拌每服半錢荊芥湯調下每日空心午時進一二服一方治小兒牙關不開用天南星一個煨熟紙裹封角不要透氣於細處剪雞頭子大一竅子透氣於鼻孔中牙關立開又方出全嬰方治小兒眼口喎斜以巴豆七粒爛研喎左塗右手心喎右塗左手心仍以暖水一盞安手心須臾即正便洗去藥並頻抽掣中指立效治小兒驚風出本草用蠍一個不去頭尾薄荷四葉裹合火上炙令薄荷焦同碾為末作四服湯下大人風涎只一服治小兒驚疾皆因積風熱成痰涎驚藥多用生朱蠍附性烈力大嬰兒腸胃脆弱多不堪任致害用遠志去心煎湯隨時飲之辰砂丸治驚風涎盛潮作反胃熱吐逆不止辰砂別研水銀砂子各一分龍腦麝香各半錢別研天麻一分牛黃半錢蟬蛻去頭足白殭蠶酒炒乾蠍去毒炒牛犀末麻黃去節天南星湯浸七次切焙乾各二分上同為末再研勻熱蜜為丸如緑豆大硃砂為衣每服一二丸或五七丸食後煎服薄荷湯送下大青膏天麻末一分白附子末生一錢半青黛一錢研麝香一字匕烏蛇肉酒浸為末半錢天竺黃一字匕上同再研細生蜜和成膏每服半皂角子大月中兒粳米大同牛黃膏溫薄荷水化下服之五歲以上同甘露飲服之匕謂匙也應服藥多少逐方説不盡並時以意加減也羌活散出直指方散風邪止驚搐退熱解肌羌活粉草天麻生茯苓川芎各二錢荊芥穗白殭蠶炒白朮白附子炮各一錢桔梗二錢半防風一錢半全蠍半錢去刺炒硃砂半錢天南星一字熟炮上為細末薄荷湯下如傷風鼻塞流清涕蔥白煎湯下或嗽氣促桑白皮煎湯下常服白湯亦可甘露飲出朱氏集驗方治驚風潮熱不退寒水石石膏防風荊芥薄荷甘草各等分上為末每服半錢用井花水下或薄荷湯調下桃黃散出朱氏集驗方治驚風潮熱煩悶天竺黃白茯苓硃砂各等分腦麝各少許上為末每服一字薄荷湯下一日二服酸棗仁丸出楊氏家藏方治小兒心神不安取睡不穩常服壓驚邪寧眠睡酸棗仁炒人參去蘆頭硃砂別研乳香別研白茯苓去皮真珠末六味各一錢上件為細末煉蜜為丸每一兩作四十丸每服一丸荊芥湯化下二歲以上小兒服二丸食後服透驚散出楊氏家藏方治小兒筋脈拘攣不舒暢手足軟弱虛羸無力驚搐之後偏廢不舉常服透經絡活血脈及治行步遲慢者天麻酒浸一宿焙乾白附子炮牛膝酒浸一宿木鱉子去殼別研當歸酒浸一宿焙乾羌活去蘆頭六味各半兩地龍去土一分微炒乳香二錢別研硃砂一錢別研沒藥二錢別研上件為細末次入木鱉子乳香硃砂沒藥研勻煉蜜為丸每一兩作四十丸每服一丸煎薄荷湯化下入溫酒少許同調下乳食空定痛散出楊氏家藏方治小兒因驚之後觸冒風邪客搏經絡走注疼痛或在手指或攻腿足往來刺痛不可忍者天麻去苗防風去蘆頭地龍去土微炒白殭蠶去絲嘴炒乳香別研五靈脂去沙石沒藥別研七味各等分上為細末次入沒藥乳香同研令勻三歲兒每服半錢溫酒白湯各一半調下不拘時候服蜈蚣丸出朱氏集驗方治驚風白附子天南星赤腳蜈蚣防風半夏各等分上銼碎諸藥剞地一小竅用炭火煅煉約半日一日尤好地脈透熱入好醋在竅八分滿傾諸藥入醋煮之用磁盆一隻快快蓋住以泥封四周至次日一周方取出焙乾碾為末用獖豬心血研同蜜煉熟為丸不拘丸子大小同薄荷湯下仍量兒大小投藥餘年七歲感患得此方而愈神效難比防風導赤散治小兒初驚生乾地黃川木通防風甘草各等分上生用㕮咀每服三錢水一盞竹葉少許同煎寧神膏後用此藥茯神硃砂各一兩麥門冬去心半兩麝香一分上碾細煉蜜為小餅子每服一餅臨睡同薄荷湯化服一夜一服二方何統制智大云昨在江州日兒子偶有驚作遂訪一老醫求藥劑服三服隨即全愈遂師問之渠云三代小兒科家傳只有四五藥加減愈人無數且如驚搐多是熱證若首先便用驚風藥白附子全蠍殭蠶川烏之類便成壞證家中驚藥只用導赤散加此防風進一二服導去心經邪熱其搐隨手便止次服寧神膏是家傳此本自後常以二藥救人取效甚多羌活膏祛小兒驚風定驚羌活防風川芎茯神去木各二錢茯苓白朮白附子白殭蠶薑汁炒各二錢全蠍半錢上為末煉蜜為丸每服紫豆大麥門冬薄荷湯化下防風天麻散治驚風頭疼防風天麻川芎白芷甘草川烏一個炮麻黃去節上等分為細末蔥蜜湯下薄荷湯亦可如驚搐加全蠍一個烏蛇肉尾白附子麝香各少許羌活煎湯下無不效者傷風加零陵香羌活辰砂丸治小兒伏驚積在內壅並痰涎及奶癖取虛中積轉驚辰砂一錢定粉半兩粉霜錢半膩粉一錢麝香少許乳香半字上同研細末方粟米飯和丸如緑豆大捏作餅子慢火內微炮令紫色用粟米飯飲化一丸微利為度錢湯丸治小兒驚積壯熱豬牙皂角灰一錢硃砂一錢天南星末半錢滑石末一錢輕粉三錢好者巴豆二十四粒去皮心上為細末以寒食麵為糊丸如緑豆大每服一歲二歲二丸三歲三丸煎錢湯下臨臥服睡應丸治驚吐漸止得睡方用之南星白附子青黛硃砂各一錢雄黃一錢輕粉一字全蠍一個金箔三片腦子麝香各少許巴豆七粒去殼心膜去油上為末用生薑汁糊為丸鐵鹽粉為衣每服七丸荊芥湯下如常服木瓜湯下如驚風麝香湯下金箔丸治一切驚風麻黃半兩羌活三錢殭蠶三錢炒南星二錢炮防風二錢蟬蛻三十個去頭足硃砂三錢麝香一錢人參半兩茯苓半兩茯神二錢全蠍半兩山藥三錢遠志去心半錢金箔十片銀箔十片上件為末砂腦麝別研入藥煉蜜為丸如指頭大每用一丸臨睡薄荷湯下痰多皂角子湯化下蛜𧌴丸治一切驚風心神驚悸夢中佯啼嘻笑潮熱上盛變蒸驚熱目青風丹火灼手足抽掣搐搦無時情性憔悴茯苓茯神山藥天麻殭蠶炒蟬蛻防風羌活人參白附遠志去心川芎白芷荊芥全蠍赭石粉草琥珀珍珠硃砂腦子麝香金箔牛黃別研早休即紫河車酒浸各等分上為末用木瓜蒸麵糊為丸剪作定子如粟米樣硃砂為衣如驚時麝香湯下如尋常薄荷鉤藤湯下小蛜𧌴丸治一切驚風手足搖動心神恐悸臥睡不安蛜𧌴蠍雄是白附子朵粉硃砂青黛香墨金箔青柳條細茶麝香防風羌活珍珠白礬天麻茯神遠志山藥各等分上為末用棗肉木瓜同搗爛飯為丸剪作定子硃砂為衣周歲一二粒金錢薄荷湯下或麝香湯下聖蠶丸出衛生家寶方治小兒胃虛生風壯熱精神恍惚痰涎壅塞目睛上視睡臥不安頭痛頰赤多驚恐四肢體倦不思乳食白殭蠶微炒防風去蘆天南星漿水煮五七沸人參各一兩半夏先洗淨用漿水煮五七沸白附子漿水煮五七沸藿香半兩去塵土上為細末面打薄荷糊為丸如麻子大周歲兒每服五七丸用生薑薄荷湯下不拘時候兩三歲兒可服十五丸余當以意加減青金丹以傅氏活嬰方治驚風身熱手足搐搦喉中涎鳴心中不快睡臥不安面赤咳嗽口眼喎斜不省人事或天吊角弓反張輕粉天南星滑石青黛各一字巴豆十粒去心皮油膜全蠍十個辰砂一字蟬蛻七個炒夜明砂半錢炒天漿子一錢炒白附子一錢麝香少許一方加天麻一錢酒浸殭蠶一錢炒半夏半錢炒或水煮上為細末用麵糊為丸如麻子大每服二十丸看大小加減與服如不利更加金銀薄荷湯下痄腮或痰甚蔥白湯下肺壅杏仁湯下如不語急與服之風痰退愈寬熱散出傅氏活嬰方治驚風潮熱客忤疳積等疾枳殼一兩大黃二兩朴硝研甘草半兩炙上為末用錫盒藏之每服一字薄荷七葉煎湯下茯苓散出傅氏活嬰方治驚風偏搐茯苓牙硝雄黃硃砂各半兩上為末金銀薄荷湯下蠍紅丸出傅氏活嬰方治驚風頑痰上視南星泡全蠍硃砂膩粉腦子上為末金銀薄荷湯下小驚藥出傅氏活嬰方下痰疏風茯苓茯神山藥防風羌活蟬蛻遠志去心殭蠶炒白芷白附子荊芥川芎赭石鐵朵粉硃砂金箔麻黃去節甘草上為末木瓜蒸過和爛飯搗成丸如粟米大剪成粒子每服用一定薄荷金銀鐶湯浸化或鉤藤木瓜皂角湯下羌活膏出衛生家寶方治驚羌活五靈脂荊芥穗末青黛蟬殼龍腦薄荷白殭蠶茯苓各一錢輕粉半錢天南星半錢灰炒赤色上一處為末煉蜜為膏每周歲一楊梅核大薄荷湯化下日三服與牛黃散相間服牛黃散出衛生家寶方治驚風搐搦心經伏涎不作聲悶絶身體強直雄黃一錢研極細地龍半錢布裹捶去土新瓦上焙乾上二味一處為末每服周歲半錢以下薄荷酒調下服一捻金再再作可進此藥一日二服不可多服要快用細赤地龍一條和酒研如糊防附湯出衛生家寶方治小兒驚風及一切頭風防風一分殭蠶一分炮白附子一分炮川芎二分荊芥一分雄黃一錢全蠍七個瓦焙乾硃砂一錢麝香少許上為細末每服半錢用好茶清調下小兒驚風用冬瓜子湯調下一日兩服育嬰丸出衛生家寶方治小兒驚風用京墨末不以多少入雞冠血拌和為丸如緑豆大用生薑薄荷湯吞下每服二三丸不計時候治小兒貓鼠驚風出十便良方用雄鼠糞七粒火煅出於地上去火毒研為細末薄荷湯調服麝香少許尤佳全蠍散出衛生家寶方治小兒驚風全蠍七個生薄荷麻黃不拘多少外以線纏縛定再用半夏末少許生薑自然汁同浸少時向火上炙如干又入薑汁內浸再炙以薑汁盡為度焙乾為末卻入後藥附子尖三個麝香一字真腦子一字上為細末同前藥拌勻煎金銀薄荷湯調下小兒半錢量歲數虛實加減服之銀箔散出衛生家寶方治小兒驚風白朮一兩細銼以一合緑豆炒香去豆乾山藥一兩白附子半錢以文武火上炮令黃地上去火毒人參一兩白茯苓一兩半白殭蠶一分洗去灰炒勿令焦木香一分濕紙裹煨黃耆一兩白扁豆一兩微炒黃川升麻一分洗過生焙乾糯粟米半兩炒黃天麻半兩銼如棋子大麩炒黃甘草一分銼炒令焦藿香半兩去土生用上為末以好磁罐盛遇有患依湯使用常服米飲調下小兒半錢歲數以上加減用慢驚搐搦用麝香湯調下日進六服急驚定後用陳米飲調下驚吐不止陳米飲調下天柱倒行步腳軟濃米飲下夾驚傷寒發搐者薄荷蔥白湯調下疳氣腹急多渴者百合湯調下赤白痢不思乳食者生薑三片棗五個陳米一合煎飲調下吃食不知飢飽不長肌肉麥糵一把炒生薑湯調下暴瀉紫蘇木瓜湯調下形神脫改言不正及大人吐瀉藿香湯下二錢牛黃膏出衛生家寶方常服鎮心化驚涎鬱金一錢天南星一錢粉霜一錢巴豆七粒連殼上一處為末麵糊丸如芥子大每服周歲四粒薄荷湯下日二服食後臨臥時服凡小兒驚涎未可與巴豆粉霜等藥恐虛劫脾轉不好治且宜服惺惺散涎積不退卻進此藥生犀散出衛生家寶方治驚積潮熱及五心積熱及驚吐或傷乳食眠睡不靜常服鎮心安神五靈脂一兩豬牙皂角一兩灰炒黃色芫花一兩醋浸炒焦上三味一處為末次用巴豆六十粒連殼碾如膏用小錢挑藥四十錢入巴豆內一處再碾萬百碾令極勻用醋糊丸如粟米大周歲四粒食後臨臥薄荷湯下日二服驚吐丁香湯下或淡醋湯下咳嗽皂角子煨軟捶泡湯下白痢甘草薑湯下潮熱薄荷磨刀水下驚熱亦用此湯下磨積及癖塊溫水下青州白丸子出錢氏方治小兒驚風大人諸風半夏七兩生天南星三兩生白附子二兩生川烏頭半兩生去皮臍上搗羅為細末以生絹袋盛用井花水擺未出者更以手揉令出如有滓更研再入絹袋擺盡為度放磁盆中日曬夜露至曉棄水別用井花水攪又曬至來日早再換新水攪如此春五日夏三日秋七日冬十一日法四時只浸一宿去水曬乾後如玉片研細以糯米粉煎粥清丸緑豆大每服三五丸薄荷湯下癱瘓風溫酒下並不以時候服不驚丸出宿州陳氏方治小兒因驚氣而吐逆作搐痰涎壅塞手足掣縮眼睛斜視若睛珠上視或上氣急足脛冷者難愈也枳殼去穰麩炒黃取末一兩淡豆豉七錢有鹽者不用蕪荑仁三錢半蠍梢十二尾炙去毒上四味同碾為細末醋糊為丸如麻子大每服百丸乳汁下清水飲亦得量兒大小輕重加減夫治驚各有所因用藥不同出東垣光生蘭室祕藏方外物驚宜鎮之以黃連安神丸若氣動而致驚宜寒水石安神丸大忌防風丸治風辛溫之藥必殺人何也辛散浮溫熱者火也能令無風處流動風之氣盛故殺人也因驚而泄青色先鎮平以硃砂之類勿用寒涼之氣大禁涼驚丸風木旺必克脾胃當先實其土後瀉其木閻孝忠編集錢氏方以益黃補土誤矣其藥有丁香辛熱助火火旺土愈虛矣青橘皮瀉肺金丁香辛熱大瀉肺與大腸脾實當瀉子令脾胃虛反更瀉子而助火重虛其土殺人無疑矣其風木旺證右關脈洪大掌中熱腹皮熱豈可以助火瀉金如寒水來乘脾土其病嘔吐腹痛瀉痢青白益黃散聖藥也令立一方先瀉火補金大補其上是為神治之法黃耆湯人參炙甘草黃耆上三味皆甘溫能補元氣甘能瀉火內經云熱淫於內以甘瀉之以酸收之白芍藥酸寒寒能瀉火酸味能瀉肝而大補肺金所補得金土之位金旺木虛風木何由散來剋土然後瀉風之旺上等分㕮咀白水煎服治小兒暴驚鬼魅寒熱用野獼猴頭煎湯浴之人家養者不治病不可用神仙聚寶丹出保集方治一切驚風內吊腹肚緊硬夜啼發熱目睛上視手足搐掣角弓反張忽然倒地不省人事系是急慢驚風悉皆治之全蠍二三個珍珠三錢硃砂五錢防風五錢天麻五錢蠶五錢白附子五錢半夏三錢南星三錢半蟬殼三錢法治麝香一錢金箔十五片上為末十三味用粟米粥為丸如雞頭子大每服一丸用薄荷湯磨化下如驚風痰實加南星末同研化下如驚風內吊用鉤藤湯化下神妙防風散出保生集治小兒一切驚風搐搦諸般惡候防風一錢細辛二錢殭蠶二錢白附子一錢火炮硃砂一錢地龍三錢灰炮荊芥一錢木香一錢全蠍三錢火焙蟬殼一錢蜈蚣三錢火炮天麻一錢麝香一錢甘草二錢白芷一錢辰砂二錢人參一錢金箔少許輕粉少許上為細末每服一字用燈心煎湯調下有痰薑湯下南星丸治小兒驚熱喉中響咬齒牙南星半錢泡天麻半錢酒浸一宿全蠍半錢麩炒硃砂麝香各少許上為末麵糊為丸每服七丸用金錢薄荷湯送下鎮心丸治小兒涎潮壅盛喘急壯熱膈上涎鳴如服此藥只取下涎藥立隨涎出辰砂研半夏生薑汁製取出切焙各半兩杏仁去皮尖研出油五分江子三十粒去皮膜去油五分上末拌勻和煮陳米粥為丸如芥子大量兒大小加減每服三五丸生薑薄荷湯溫下利涎消乳痰丸治小兒無痰亦宜常服大半夏半兩切作豆子大用蘿蔔一個也切作豆子大水一碗煮水盡為度神草二錢半去蘆取末二錢上二味焙乾為末生薑自然汁煮麵糊為丸如緑豆大每服二十丸薑湯下食後量大小加減牛黃丸治小兒驚風涎盛上用天南星二兩為末取臘日牛膽黃牛者良一枚以汁和之卻入膽內陰乾為細末入研硃砂一錢麝香少許煎甘草水和丸如雞頭子大一歲半粒熱水下不拘時日進二服墜驚散治小兒驚熱甚效天竺黃鉛霜馬牙硝上為末每服半錢用熱水調下青雲散孩兒咬齒即因驚唇赤饒於面色青夢裡有時頻叫喚青雲散下早惺惺石蓮心一錢南星炮殭蠶直者全蠍鉛霜一錢雄黃鬱金皂角煮乾上為末每服一字或半錢用蜜調下羌活膏出保生集治肝驚壅目直視手足拳攣伸舒立地不得寬筋定搐牛膝羌活蠍梢回草即防風天麻神草木瓜當歸紫蘇根洗焙麝香各一分硃砂白附子各半錢上除麝香外細銼用酒浸一宿來日慢火焙乾為末入麝香和勻用炒沙糖為膏常服一皂角子大如驚急作搐瘛瘲每服一龍眼大荊芥湯化下先搐鼻後下藥若不噴嚏難治玩月散出保生集治小兒驚風搐搦眼目上視此藥搐鼻目睛便下搐搦便定絶搐鼻如嚏噴可治不爾死也獨角仙一個竹刀中切作二片輕粉大全蠍一個酒浸軟竹刀切作二片上用輕粉拌和炙令乾二味左邊歸左右邊歸右各為細末入細辛末半錢麝香一豆大研勻成藥左邊獨角仙同前法卻書藥上記左右邊二字男左女右用奪命散出保生集治小兒驚風涎潮搐搦眼上不下喘急急慢驚風並皆治之赤腳蜈蚣一條去足生用瓜蒂藜蘆蔥白去須一分上為末每發搐用一字吹鼻中琥珀珍珠散出保生集治驚風全蠍殭蠶硃砂輕粉上各等分為末每服一字用奶乳調下辰砂妙聖丸治小兒驚風生涎時作搐搦壯熱驚掣夜臥不安牙關緊急麝香川芎羌活天麻當歸膽釀南星半夏湯洗七次煮一伏時各半錢蠍梢殭蠶辰砂一錢半一半入藥一半為衣上末拌勻糯米清糊為丸如雞頭子大每服一丸荊芥湯化下如噤口用藥擦牙上滾痰丸治小兒喉中涎響手足瘛瘲目睛上視即急慢驚風證江子半夏硃砂膩粉雄黃鬱金或加南星尤妙上等分為末飯丸如麻子大每服七丸用薄荷湯送下量大小加減服之利痰涎為度未利再服辰砂丸出保生集治驚證嘔逆乳食不下夜臥不寧人參一兩茯苓半兩防風半兩山藥甘草半兩黃耆三錢牙硝三錢麝香三錢硃砂一兩上為末蜜丸每服一丸薄荷湯化下
