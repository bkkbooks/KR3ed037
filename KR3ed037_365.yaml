小兒口噤鹿角粉大豆末各等分上藥貼乳上飲兒立瘥二乳飲治小兒口噤驢乳豬乳各二升上合煎一升五合服如杏仁許三四服瘥治小兒口噤不開舌不能吮乳方出聖惠方蜘蛛一枚去足及口炙令焦細研豬乳一合上以豬乳和勻為三服徐徐灌之神效治口噤赤者心噤白者肺噤出千金方用雞屎白如棗大綿裹以水合煮二沸分服之一方治小兒燕口瘡用溫酒和服之一方治小兒口噤吐沫不能乳哺取雞屎白如豆大三枚以水下瘥治小兒十月內口噤出聖惠方以豬乳滴口中瘥治小兒口噤胸胃熱氣取蛇莓以汁灌口中死以再活莓如有蛇殘者不得食治小兒口噤體熱者及口噤吐沫不能乳哺者出聖惠方以東行牛口沫塗口中及頤上一方塗口中及額上即效治小兒初生者口噤不開不收乳者出聖惠方用赤足蜈蚣一枚去足炙令焦細研如粉用半錢以豬乳二合和之分三四服灌之瘥水銀方治小兒口噤其病在咽中如麻豆許令兒吐沫不能乳哺以水銀如黍米大與兒服覺病無早晚水銀下咽便愈以意量之不過麻子許為度也以意少加百日兒不可過如半麻子也又方取牛口齝草絞汁塗上瘥又方用雀兒糞一粒細研乳汁調下瘥又方取白牛糞塗口中瘥又方燒葛蔓灰細研以一字和乳汁點口中即瘥治初生兒至七日以來口噤方用牛黃一錢細研以竹瀝調一字灌之更以豬乳點口中瘥雄黃散治小兒口瘡爛痛不問赤白或生腮頷間或生齒齦上雄黃硃砂各細研硝石蚺蛇膽黃連去須石鹽苦參銼各一分雞屎白半分麝香一錢細研上為細末研令勻日可三五度塗之石膽散治小兒口瘡赤爛右膽半錢蚺蛇膽龍齒各一分上細研為散每用少許塗於瘡上日三用之以瘥為度治小兒口瘡赤爛膩粉一錢黃蘗末一兩上相和令勻薄薄摻之治小兒口瘡爛幼幼新書羊乳汁黃連上以乳汁浸黃連著口中三上愈又方幼幼新書羊脂薏苡根各一兩上煎熟去滓雞翎塗瘡上神驗散治小兒口瘡爛臭寒衣面五錢硝石七錢上同研過夜新水調藥半錢塗在紙花子上男左女右貼於腳心治小兒口瘡爛用赤葵莖炙乾為末每用一字蜜和含之羊乳飲治小兒口瘡赤爛取羊乳五合令點口中不過三兩上瘥一方取羖羊生乳含之一方治口瘡驚癇疾亦以羊乳含之治口乾幼幼新書羊脂雞子大酒半升大棗七枚上相合漬七日取棗食之瘥治口乾除熱下氣石膏五合研蜜二升上以水三升煮石膏取二升內蜜煮取二升去滓含如棗核大咽汁盡更含之治口乾用羊脂若豬脂雞子大劈切之內半升醋中漬一宿絞取汁含之佳又方用含一片梨即愈夜睡當時即定又方以木履尾內煻灰中令熱取炷兩吻各二七遍治口臭橘皮五錢木蘭皮一兩桂心二分大棗四十枚去核蒸之去皮上為末以棗肉丸如桐子大每服二十丸日二服稍稍至三十丸一方有芎十八銖又方桂心甘草炙等分上為末三指撮酒服二十日愈又方蜀椒浸桂心各一兩上為細末以酒服方寸匕二十日愈又方幼幼新書濃煮細辛含汁令久即吐三日即愈又方幼幼新書用井花水三升漱口吐廁中治口瘡白漫漫出千金方先以父淨髮拭口次取桑汁塗之白礬散出傅氏方治鵝口瘡白礬硼砂各一錢硃砂半錢上為末燈心蘸點舌上下治口瘡服藥無效者此方治鵝口瘡等神效出傅氏方草烏吳茱萸各等分上為末蜜調塗貼腳心立效如神又方出傅氏方升麻朴硝龍膽草上為末點服即安赴筵散出保嬰方治小兒赤白口瘡用之立效芝麻花不以多少上為末干糝口內用五七遍立愈治小兒重舌鵝口瘡以鹿角炙熱尉之小兒口瘡出肘後方上燒黃葵花敷之良惠眼觀證丹蜜膏治牙兒口瘡方幼幼新書上用黃丹一分炒令紫黑色蜜一分同黃丹於飯上蒸兩次以竹篦子攪勻以手點少許入口千金翼又方治口乾上遇夜勿食酸食及熱面又方用雄鵝糞眠倒者燒灰加麝香末吹入口中治小兒口瘡及風疳瘡等齣兒宮氣方取晚蠶蛾細研貼瘡上妙晚蛾即夏生者封臍散出衛生家寶方治小兒口瘡細辛不拘多少為末以醋調塗臍上鵝口重舌口瘡出鮑氏方硼砂硃砂青黛朴硝少許研水敷舌上下量與治孩子口內瘡上以鍋底墨細研無時指頭揇擦之透水散治胸膈熱口內生瘡朴硝龍粉甘草各一錢上為末干糝入口內治口瘡雞子黃梧桐子不拘多少二味燒灰刷入口中金花散治口瘡潮熱呷疾雄黃牙硝鬱金甘草栝蔞乾葛上為末一字新汲水薄荷水調下生下滿月以前麻口粉草國丹煅少許攪勻蜜糖調刷瘡上小兒口舌生瘡或生白胎皆心脾經熱出永類鈐方用洗心散服之自佳又方名鵝口瘡自內生出可治自外生內不治出永類鈐方用鵝所食草下青糞者濾汁加以糖調搽口中效舌腫等疾附論夫小兒重舌者因脾熱故也心候於舌而主於血脾之脈絡又出於舌下心火脾土二臟母子也有熱則血氣俱盛其狀輔於舌下近舌根生形如舌而短故謂重舌也小兒木舌其狀舌漸粗大若不急治滿口當塞殺兒也小兒初生六七日後血氣收斂成肉舌喉頰裡冷冷然爭也若喉舌上有物如蘆籜盛水狀者名懸癰有氣脹起者可以綿纏長針留兩處如粟米許大以刺之冷氣泄去亦出潰黃血汁也一刺之止消息一日若不消又刺之不過三刺自消或除小小未消三刺之必自然得消也有著舌下者如此名重舌有著頰裡及上齶如此者名重齶有著此齦者即名重齦皆刺之去血汁即瘥也若舌上黑有數孔血出如湧泉此心臟病也若弄舌者脾臟微熱舌絡紫色治法勿用冷藥下之當少與瀉黃散若肥實者用牛黃散治之小兒重舌宜急治之刺法中論刺舌下兩邊出血後以藥治之不然即滿口塞喉便致危殆經云血則腫熱砭射之先宜砭射後以藥治之方治舌上黑有數孔血出如湧泉此心臟病也戎鹽黃芩黃蘗大黃各四兩人參桂心各二兩甘草炙一兩上為末煉蜜和丸如梧桐子大飲服十丸日服三仍燒鐵烙之烏魚散出仁存方治重舌烏魚骨一兩燒灰干蜣螂半兩蒲黃半兩研枯白礬一分研上研為末每服半錢以雞子黃調塗舌上咽津無妨川硝散出仁存方治重舌及木舌川朴硝半兩真紫雪一分鹽半分上研細每服半錢入竹瀝三兩點白湯調塗舌上咽津一方治木舌並水調敷之三物備急丸治心脾經為邪若所客重舌腫脹語聲不出水飲不下木香銼炒乾薑炮巴豆去皮心膜各等分上為末蜜丸如緑豆大每服五丸溫水下大便利為度蒲黃散出聖惠方治小兒重舌口中生瘡涎出蒲黃霜蜂方各一分白魚燒灰一錢上研令勻用酒少許調敷重舌上日三祕録方出湯氏寶書治重舌用海螵蛸燒灰以雞子清敷患處一方用黃一方生用亦可及治小兒鵝口不乳治重舌木舌先用新水搽口並舌上下後用皂角刺燒灰入腦子少許每用半字糝舌上下出涎定有立效治重舌出湯氏寶書用竹瀝浸黃蘗點之焰硝亦好又方煮小豆汁和鹿角灰安重舌下日三度桂礬方治小兒重舌口中生瘡涎出治小兒重舌方用桂心半兩為末以薑汁相和令勻每用少許塗舌下再塗之治重舌舌強不能收唾用鹿角末如豆大許安舌下一日三四度亦治小兒不能乳飲一方用水磨鹿角服之如小兒鵝口重舌令炙尉之治小兒重舌取衣魚塗舌上燒灰塗之亦可又方取灶月下黃土末以苦酒和塗舌上愈又方取三家豬肉切令如指大摩舌上兒立能啼又方出聖惠方取赤小豆為末醋和調舌上又方出聖惠方燒簸箕灰敷舌上一方用簸箕尖蒲黃散出簡易方治重舌夜啼用真蒲黃敷上不過三四次即愈更以溫水蘸熱帛裹指輕輕按捺之然後糝藥一方用真蒲黃炒過出火毒用之治小兒重舌欲死者出聖惠方用亂頭髮不以多少燒灰細研末每用半錢敷舌下日數用之妙治小兒生重舌用白芨末以乳汁調敷小兒腳心治重舌鵝口用馬牙硝敷之日三度蛇蛻散出聖惠方治小兒重舌及重齶重齦腫痛用焦炙蛇蛻研末日敷三次舌下一度著一豆許一方用醇醋點掠舌下愈一方用唾和塗舌上治小兒重舌出聖惠方研蜣螂末和唾敷舌上又方用黃丹如豆大內管中以安舌下又方用木蘭皮一尺廣四寸削去粗皮用醋一升漬出汁注於重舌上又方出肘後方用粟米嚼哺之療小兒舐方用貍骨燒灰和臘月豬脂塗上治小兒重舌小兒重舌聽行藏中鎖尋來是妙方火內燒灰為細末水調吃下便安康治小兒重舌及口中生瘡涎出方出聖惠方取白羊尿塗少許口中瘥治小兒重舌重腫出聖惠方取牯牛乳與少許飲之治小兒重舌出聖惠方用甑帶燒灰細研敷舌下治小兒重舌欲死者方出聖惠方用桑根白皮一兩細銼以水一大盞煎至五分去滓漸漸以匙子抄少許令兒吮之一方取桑根白皮汁塗口中瘥治舌卒腫如吹泡滿口溢出氣息不得通須臾不治殺人幼幼新書以苦酒一升煮半夏一十枚令得八合稍稍含漱吐之宜熱洗去滑用之勿咽其汁一方加生薑一兩尤妙地黃湯治小兒舌胎舌黃出血舌腫舌裂舌芒刺舌卷舌黑舌赤並理諸舌病黃芩生地黃等分上㕮咀每服一大錢水半盞煎三分去滓一方加赤芍藥甘草如舌乾燥者調胃承氣湯並人參白虎湯治舌腫強滿宜滿口含糖醋甚良又方飲羖羊乳即瘥治舌卒腫起如吹泡狀滿口塞喉氣息欲不復須臾不治殺人者方以刀鋒決兩邊第一大脈出血勿使利著舌下中央脈血出不止殺人血出數升以燒鐵令赤尉瘡數過止血一方用針刺去惡血即愈又方令含甘草汁佳治舌卒腫如吹泡滿口溢出氣息不得通須臾不治殺人急以指刮破漬去汁即愈亦可以鈹刀於前決破之一云兩邊破之尤妙治舌腫以百草霜研細醋調成膏舌上下敷之以針決出血敷之彌佳一方舌卒腫加鹽和塗舌上下並瘥一方治腫舌水調塗舌下升麻煎治心臟熱舌上生瘡裂破引唇赤蜀升麻麝干各三兩柏葉切一升大青二兩苦竹葉切地黃汁各五合生蘆根薔薇根白皮各五兩生元參三合赤蜜八合上㕮咀以水四升煮取一升去滓下元參汁令兩沸次下地黃汁兩沸次下蜜煎取一升七合綿惹取汁安舌上含細細咽之敷涎膏治小兒新生三五日爛舌上白瘡吃奶啼叫黃丹一分輕粉一錢蜜少許上同勻以飯上蒸一度鵝毛掃入口舌上一二次安治小兒舌上瘡取蜂房燒灰屋間塵各等分和勻敷之又方取羊蹄骨中生髓和胡粉敷之妙治小兒重舌瘡飲乳不得以白礬和雞子置醋中塗足底二次即愈治大人小兒口舌生瘡龍腦半分寒水石半兩燒細研上每糝於舌上少許治小兒舌上瘡取胡粉末並豬𩩅骨中髓敷之日三度治小兒舌上白羔瘡用草鵝屎取汁調沙糖服之如鵝吃谷者不用治小兒舌瘡方見治口吻瘡方治小兒舌上生瘡如粥及重舌並口中生瘡涎出方三項用桑白皮不以多少搗取汁敷之三兩度一方塗乳與兒飲之亦可治小兒撮口但看舌有瘡如粟大者為驗用蜈蚣汁刮破指甲研兩頭內差如無生者乾者亦得治新生小兒未滿月及百日舌生瘡口中白膏厚如紙者並宜治之以杯子胭脂少許兒病用女乳汁女病用兒乳汁同調塗舌上一宿效牛黃散治小兒重齶重齦腫痛口中涎出一名聖散牛黃龍腦丹砂各一分鉛霜半兩太陰玄精石一兩上為末再和研勻每服半錢先於重舌上以鈹針破出血用鹽湯洗拭乾然後摻藥於口中神效又方玄明粉太陰玄精石各一分鉛霜半分上同研令細少少敷之二乳飲治證同前又方取露蜂房燒灰細研以水和塗口中立愈一方治重舌以田中蜂房燒灰酒和敷舌一作喉下又方取炲煤以水調塗之一方治木舌以醋和炲煤塗舌上當脫涎膜又塗之以涎膜盡舌如故即止人參散治小兒木舌日漸長大滿塞口中人參一兩白茯苓去黑皮二兩甘草一兩桃花二兩白藥子二兩白朮一兩白芷半兩上為散用薄荷汁調如糊塗舌上咽下不拘時如患重舌亦可服之硼砂散治小兒木舌長大硼砂研甘草炙各半兩白芷二錢白藥子二兩蒲黃一兩上為散每服半錢薄荷湯入蜜少許調下食後服三歲以上每服一錢朴硝散治小兒木舌治木舌方舌乃心之候脾之脈絡於舌臟腑壅滯心脾積熱熱氣上衝故令腫脹滿口若不急療必至害人竹瀝半合太醫局紫雪一分上研細紫雪以竹瀝和之時抹入口中以盡為度一方半夏醋煎灌漱吐即瘥治木舌舌忽吐出不復收者又歌曰木舌要可用黃葵更入鉛丹兩自宜七次點之便可愈神方不假乃為奇用葵花研細黃丹半之同研點七次木舌金絲膏治小兒心脾受熱唇口生瘡仍治幕口唇舌白鵝口重舌木舌以上皆繫心脾熱並宜用下項藥敷腳心次服連翹飲子仍與金絲膏刷口內舌上立效用吳茱萸不拘多少為末用釅米醋調塗腳心更以紙貼糊黏敷之立效一方云重齶一證於上齶另生一肉如指大小赤腫妨食及勿乳斯由熱極而作速宜下之不爾熱毒流咽喉加其腫塞悶絶而死宜服疏風散下之愈治木舌舌忽吐出不能復收者用竹紙捍巴豆油卻取油紙燃燒煙燻之立止治小兒木舌長大用鯉魚一枚去骨切肉作片將魚肉貼於舌上以線系定又方黃蘗一分細研銼上以竹瀝漬取汁細細點口中良治小兒重舌欲死方烏賊魚骨一兩燒為灰上研如粉以雞子黃和塗喉外及舌下牛黃散治嬰兒重齶重舌口內腫滿多涎咽喉不利牛黃硃砂龍腦鉛霜麝香玄精石上等分為末刺出血後用水洗拭之然後用此藥敷之朱礬散亦可治嬰兒木舌方凡療木舌如舌根強直腫滿不能吮乳者先用長針於口內舌根兩角邊刺之令血出黃丹朴硝輕粉白礬枯上等分研細針後用此藥摻之
