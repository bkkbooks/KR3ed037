頭及身即愈一法用菖蒲五兩煎如上法風癇附論論曰風之為病其狀多端皆由腠理疏弱榮衛虛怯經絡不順關竅閉塞其氣霾瘞郁艴其脈凝注徵役有同天地晦冥日月暈蝕飈暴發興精神俱潰者一身四體皆不我有是謂風癇之至也所謂化風化其所受之風不待久傳迅變凡該五臟蘊熱三焦作壅速與流利熱即風生壅即風長關竅不通其風何能自散若言化之即順助之其榮衛經絡即得流行自若也便與截風定搐為治已成癇其風不散若更攻擊即衝任百脈雖不發作畢竟隱伏久而再發無能去根此方得名化風下復加進矣比金丹人參白茯苓遠志去心山藥辰砂天麻各一兩石菖蒲川芎甘草炙各一分天南星炮二錢薑汁製麝一字上為細末煉蜜為丸皂子大每服一錢煎金錢薄荷湯化下議曰風行於四時和順於內外長養萬物能生能敗法令至周惟風之德夫人一身亦同天地順則和逆則害所發之風由其虛由作應其熱而生有痰與熱而發其驚關竅不通氣脈流注遂有傳變於身為害當用逐之何況童稚幼雛嫩嬌危脆百病總歸於風豈可取次疏怠此治風有法度不可極力施功若停待須臾而更愴惶即拙謬而失深意審詳隨其順逆以療之襲逐在後頂追不及所載在前釋化不盡者正謂庸醫之陋也善治驚癇者化其痰和其氣鎮心神安魂魄通關竅順經絡使其榮衛常順流行調其臟腑長和充實邪自何生風從何入雖有些小自然而散此癇由驚為疾豈可見留常令血脈充肌膚壯頭目清精神備飲食節睡臥穩寒暑知時臟腑常固其經絡自和榮衛自順比金之名決定不壞此乃順調善攝而已治心熱風癇以爛龍角濃汁研取汁食上服三合日再服食癇附論夫小兒發癇皆由乳哺不節而成者食癇也其證口眼相引目睛上搖手足掣瘲背脊強直或頸項反折此由臟腑壅滯內有積熱或乳母飲啖五辛毒物志怒無節致煩毒之氣入於乳中因積乳兒令氣血不調腸胃否塞故壯熱多驚四肢抽掣是為食癇之病方丹砂餅子方治小兒食癇及疳黃丹砂研一兩半黃鷹調揀淨白丁香各一分棘剛子二十五枚微炒粉霜研一錢半膩粉一錢乳香研末犀角屑天南星末麝香研各半錢蠍梢末滑石末蘆薈末各一錢金箔一片銀箔一片水銀沙子研一錢半上為末拌勻稀麵糊為丸如黃米大捏作餅子丹砂為衣每服三餅薄荷湯送下更量兒大小加減硃砂丸治小兒食癇硃砂一兩細研水飛過川大黃銼碎微炙礬石細研半兩牛黃雄黃並細研桂心雲母石半夏湯浸七次去滑黃連去須雷丸代赭真珠末乾薑炮製銼巴豆去皮心膜炒黃各一分上為末煉蜜和丸如黍米大百日內小兒以乳汁下兩丸三歲至七歲以粥飲下五丸量兒大小加減服代赭丸治小兒食癇四肢抽掣壯熱驚悸乳食不消痰涎壅滯發歇不定代赭硃砂各細研馬牙硝川大黃銼碎微炙水銀以小棗瓤研令黑星盡各一兩二錢金銀箔各三十片細研蟾酥一錢研入巴豆七枚去皮心研紙裹去油膩粉麝香各半分細研龍腦細研半錢蠍梢四十九枚微炒天漿子二十七枚內有物者炒上為末煉蜜和丸如黍米大每服以薄荷湯下二丸日三服量兒大小加減虎睛丸治小兒食癇及驚風百病虎睛一個微炒取入牛黃硃砂各細研真珠末甘遂煨黃赤芍藥赤茯苓甘草炙微赤銼牡蠣炒黃杏仁湯浸去皮尖雙仁麩炒微黃各一分麝香半錢細研犀角屑巴豆去皮心紙裹去油各半兩上為末用糯米飯和丸如緑豆大每服以荊芥湯下二丸量兒大小加減牛黃丸治小兒食癇瘛瘲及諸變蒸腹中宿痞飲食不節腹滿溫熱朝夕發甚大小便不通脾胃氣弱牛黃研一分雀屎白炒半兩芍藥一兩川藭一兩乾薑炮製半兩黃耆細銼一分甘草炙三分人參大黃銼炒各一兩當歸切焙黃芩去黑心各半兩白麵炒三兩巴豆去心膜別研如膏紙裹去油一兩上為末與巴豆膏和勻煉蜜為丸一歲兒如黍米大二丸二三歲兒如緑豆大三丸並用米飲下微利為度金箔丸治小兒食癇墜痰涎金箔五片細研膩粉三錢一分甘遂一分煨微黃搗為末上研令勻以棗瓤和成劑子以五片金箔裹上更著濕紙裹煻火灰煨勻熱候冷取研丸如緑豆大每服以人參湯下二丸量兒大小加減真珠丸治小兒食癇魍魎三十六種無辜五疳八痢驚風天瘹真珠細研一兩牛黃研細杏仁去皮尖雙仁炒研如膏各半兩丹砂牡蠣熬研粉各一兩虎睛一對炙睛干甘遂切炒半兩白茯苓去黑皮一兩芍藥三分甘草炙研半兩麝香研細一分巴豆去皮研如膏紙裹去油盡半兩上除別研外搗羅為末一處研勻煉蜜為丸如麻子大每服一丸至二丸米飲或桃仁湯下取下惡物如魚腦青色效量兒大小加減麝香丸治小兒諸疾一歲以上三十六種無辜疳濕閃癖食癇天行赤眼急黃一切病並皆宜服麝香細研一分牛黃細研半兩丹砂杏仁湯浸去皮尖雙仁研如膏芍藥白茯苓去黑皮各一兩甘遂一分真珠研為粉水飛過一分虎睛三枚微炒研巴豆去皮心微炒研如膏三分牡蠣熬別搗羅研如粉一分上除巴豆外各搗研為末入巴豆煉蜜和搗三十杵入密器中貯候服取一丸如麻子大溫水下隨兒大小加減牛黃丸治小兒食癇乳癖積聚壯熱心神多驚牛黃硃砂鉛霜各細研真珠末犀角屑牡蠣粉甘草炙微赤銼杏仁湯浸去皮尖雙仁研如膏各一分麝香半分細研巴豆去皮心七枚研紙裹去油上為末入研了藥同研令勻煉蜜和丸如麻子大三歲兒以金銀薄荷湯下二丸量兒大小加減妙聖丹治食癇利胸膈木香代赭石馬牙硝川大黃炮各一分蠍梢四十九枚微炒以上搗羅為細末次用硃砂半兩細研水飛麝香一錢研龍腦半錢研膩粉半分巴豆去皮心膜七枚紙裹出去油膩細研用上拌勻滴水和丸如黍米大每服三粒至五粒磨沉香湯下量兒大小加減雄黃丸治小兒七歲以下食癇壯熱無辜痃癖等症雄黃麝香牛黃各細研硃砂石膏各細研水飛過蕤仁湯洗去赤皮牡蠣粉巴豆去皮心膜紙裹出油半兩甘遂一分煨微黃上為末煉蜜和丸如黍米大每服以粥飲下三丸如利三兩度勿怪更隨兒大小加減真珠丸治小兒食癇化聚奶食痰墜涎利大腹雄黃細研代赭麝香細研蜣螂微炙板杏仁湯浸去皮尖雙仁麩炒黃各半兩真珠天竺黃並細研一分肥巴豆十粒用油煎令褐色與杏仁研硃砂細研用一分上件藥都研為末煉蜜和丸如緑豆大每服以生薑湯下二丸量兒大小加減陽葵丸治小兒食癇心胸痰滯大小便常多祕澀防葵末滑石各半兩牛黃麝香各半兩巴豆二十枚取霜膩粉硃砂蛇蛻皮一條燒上為末以糯米飯和丸如黍米大每服以粥飲下二丸量兒大小加減蟾酥丹治食癇毒盛湯藥不下蟾酥真珠末各研甘草慢火煨黃杏仁炒去皮牡蠣粉犀角麝香一錢巴豆去皮上為末糯米飯為丸如黍米大每服三粒煎荊芥湯放溫令下量兒大小加減妙聖丹治食癇通利代赭石煅醋淬一分雄黃蠍梢硃砂各一錢輕粉麝香各一錢巴豆二個去心膜杏仁去皮尖微炒二錢上為末蒸棗肉丸如桐子大每服一丸木香煎湯調下真珠丸治小兒食癇喘息真珠末天竺黃雄黃丁頭代赭搗羅為末巴豆去皮心出油麝香杏仁湯浸去皮尖雙仁研如膏各一分上為末研令勻煉蜜和丸如黃米大一二歲兒每服以溫水下五丸量兒大小加減雄珠膏治食癇利胸膈牛黃研真珠末研丁頭代赭石為末白殭蠶為末蕤仁湯浸去皮為末一分雄黃半兩水磨精明者細研上同拌勻煉蜜和丸如雞頭大服一粒至二粒參湯化下紫霜丸治乳哺失節宿滯不化胸腹痞滿嘔吐噁心便利不調乳食減少又治傷寒溫壯內挾冷實大便酸臭或已得汗身熱不除及變蒸發多日不解因食成癇先寒後熱並宜服之代赭石煅醋淬研赤石脂末各一兩巴豆炒三十粒去皮心出油細研杏仁五十枚去皮尖麩炒別研上件合研細湯浸蒸餅丸如麻子大每服三丸乳汁或米飲下微利為度量兒大小加減靈脂丸治小兒食癇乳食不消心腹壅滯四肢擎掣硃砂五靈脂各一分巴豆五枚去皮心紙裹出油炒研上研細如粉用燒粟米飯和丸如黃米大一二歲兒每服用溫水下二丸以吐利為妙量兒大小以意加減鉛霜丸治小兒乳食不消心腹結實壯熱煩悶搖頭反目口吐涎沫名為食癇鉛霜膩粉各二分巴豆去皮心研紙裹去油上為末以糯米飯和丸如粟米大每服以通草薄荷湯下一丸三歲以上加丸服熱癇附論夫小兒熱癇者由血氣不和內有積熱之所致也凡小兒骨體輕軟腸胃細微易為傷動若乳食不常臟腑壅滯溫搐生熱不得宣通熱極甚者則發癇也又心神多不寧將養過溫內生邪熱多所以驚甚者變成諸癇其狀口眼相牽手足抽牽口中吐沫鼻內作聲頸項反張腰背強直身體壯熱或叫或啼者是熱癇之候也宜服退癇除熱之藥方芍藥丸治少小一百二十癇止驚常服除熱痰芍藥石膏碎當歸切焙鐵粉各三分蚱蟬四個自死者大黃銼炒人參各五分桂心三分半銀屑研芎藭龍骨研細辛去苗葉黃芩各三分牛黃二錢上為末煉蜜和丸如麻子大一服二丸日三如不知稍增可至四五丸牛黃丸治小兒熱癇發歇不定眼目直視身體壯熱吐沫心神煩悶牛黃半兩研蚱蟬三枚微炒去翅足石膏研細水飛過龍齒研細各二兩梔子仁川升麻犀角屑胡黃連鉤藤龍膽草去蘆頭川大黃銼碎微炒杏仁湯浸去皮尖雙仁麩炒微黃各三分金銀箔各五十片細研上為末入研了藥同研令勻煉蜜和二三百杵丸如緑豆大每服以竹瀝研五丸服量兒大小加減服之紫石英散治小兒熱癇四肢抽掣每日數發宜服此除熱鎮心紫石英石膏各細研水飛過滑石白石脂寒水石各一兩川大黃銼炒硃砂細研水飛過甘草炙微赤銼犀角屑各半兩龍齒二兩細研牡蠣粉一分上為末每服以溫薄荷湯下半錢量兒大小加減鉤藤湯療未滿月小兒及出月小兒壯熱發癇鉤藤一分去皮蚱蟬一枚去翅熬為末湯沉下柴胡升麻黃芩去黑心甘草炙大黃各二分蛇蛻皮二寸炙竹瀝三合石膏三分碎上切以水一升煮三合半和竹瀝服一合得利見湯色停後服至五六十日兒一服一合以母忌海藻菘菜等若連發不醒加麻黃一分去節茯神散治小兒食癇皮肉壯熱煩燥頭痛宜服此藥茯神川升麻鉤藤甘草炙微赤銼犀角屑各三分白鮮皮羚羊角屑各半兩石膏二兩蚱蟬三枚微炙去翅足龍齒一兩上為散每服一錢以水一小盞煎至五分去滓量兒大小加減溫服白鮮皮散治小兒百日以來至三四歲發食癇瘛瘲身體如火白鮮皮黃芩川升麻地骨皮鉤藤犀角屑胡黃連各三分麥門冬去心焙龍齒各一兩甘草一分炙微赤銼上粗羅為散每服一錢以水一小盞煎至五分去滓入牛黃末一字量兒大小加減溫服升麻散治小兒熱過迷悶發癇川升麻鉤藤使君子子芩朴硝各一兩石膏龍齒各二兩柴胡去苗赤芍藥川大黃銼碎炒各三分嬰孺方用大黃八分別搗候湯成和用上為散每服一錢水一小盞煎至五分去滓溫服量兒大小加減鉤藤散治小兒風壅氣盛心胸痰滯壯熱發癇鉤藤一分蚱蟬二枚微炒去翅足川升麻麥門冬去心焙甘草銼川大黃炒碎子芩各半兩石膏一兩蛇蛻皮五寸燒灰上為散每服一錢水一小盞煎至五分去滓入竹瀝半合量兒大小加減犀角散犀角屑鉤藤玄參蚱蟬三枚微炒去翅足甘草炙微赤銼川升麻黃芩梔子仁各半兩麥門冬一兩去心焙上為散每服一小盞入苦竹葉七片煎至五分去滓溫服量兒大小加減虎睛丸治小兒食癇搖頭吐舌四肢抽掣心神驚悸虎睛一對酒浸牛黃細研鉤藤川大黃微炙人參去蘆茯神各半兩麝香犀角屑三分硃砂細研一兩上為末入研了藥同研令勻煉蜜和丸如緑豆大一歲兒研化一丸日三服治小兒癇病熱多者方牡荊根十五斤細洗淨生鐵一大片半研甘草一兩碎黑豆一大升半布袋盛上以水五大斗煎取一斗半去滓澄清濾煎如餳每食上取一匙和桑殼湯及酒服之日再服重者一月永瘥治小兒熱癇狂啼上以臘雪小溫服之蟬殼散治諸癇挾熱蟬殼人參去蘆頭黃芩川升麻茯神各一分以上搗羅為細末次用牛黃一分研天竺黃研牡蠣粉研各二分上細研勻每服半錢煎荊芥薄荷湯調下子芩散治小兒熱癇嘔逆煩悶體熱子芩人參去蘆頭犀角屑甘草炙微赤銼鉤藤各半兩赤茯苓川升麻各三分上為散每服一錢水一盞煎至五分去渣量兒大小加減服之麥門冬散治小兒體熱嘔吐發癇麥門冬一兩去心焙鉤藤半兩黃芩赤芍藥川升麻茯神川大黃一兩去土炒各三分上為散每服一錢水一小盞煎至五分去渣溫服梔子散治小兒熱癇不知人迷悶嚼舌仰目梔子仁半兩子芩赤鉤藤吳藍各一兩龍齒石膏各二兩川大黃炒銼上為散每服一錢水一小盞煎至五分去渣溫服更量兒大小加減服之鉤藤散治小兒熱癇時時戴眼吐沫鉤藤二分蚱蟬三枚微炒去翅足人參去蘆頭子芩牛黃細研零入川大黃銼碎炒各半兩上粗羅為散每服一錢以水一盞煎至五分入竹瀝少許去滓入牛黃末一字大小量服治小兒十歲以下及新生百日無問癇熱無辜疾癖上以京三稜汁作粥與食之妙不可具言大效治小兒痢熱時氣煩悶上渴上取瓦上青苔衣煮服
