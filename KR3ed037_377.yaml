body:
  text: 卷三百七十七嬰孩一切癇門癲癇附論黃帝曰人生有病癲疾者疾名謂何安所得之岐伯曰病名為胎病此得之在母腹中時母有所大氣上而不下精氣並居故令子發為癇也巢氏病源癇者小兒病也十歲以上為癲十歲以下為癇其發之狀或口眼相引兒目睛上搖或手足掣瘲或背脊強直或頸項反折由風邪熱毒傷於手少陰之故也心為帝王神之所舍其藏堅固不受外邪若風熱蘊積乘於心則令恍惚不安精神離散榮衛氣亂陰陽相病故發為癲癇也又小兒在胎之時其母卒有大驚精並居則令子癲癇也方虎睛丸治小兒一二歲發癇至大不瘥成癲病發無時口出白沫並大小便不知出虎睛一具酒浸一宿炙黃丹砂鐵精子芩大黃龍齒梔子仁銀屑各四分蜂房炙鉤藤鉤柴胡白鮮皮麻黃去節雷丸炙各二分羌活沙參升麻各三分牛黃半分蚱蟬四個去翅足自死者防葵蛇蛻皮各七分炙細辛一分半石膏五分上為末蜜丸四五歲服大豆大十丸與顱囟經藥味同多牛黃及分兩不同治小兒熱癇類上用蚯蚓破之用泥以鹽塗之化成水服虎睛丸治孩子從一歲致大癲發無時口出白沫小便淋瀝不利治之虎睛一隻左眼佳曝乾酒浸令黃色真珠蜂房各三錢麻黃二分去節鉤藤三分鐵精防葵大黃子芩龍齒銀屑梔子仁羌活各四分柴胡升麻白鮮皮雷丸燒令赤人參各三分細辛一分半蛇皮三寸炙石膏五分蚱蟬四枚去翅足炙上研為末煉蜜為丸四五歲如赤豆大五丸日再服大兒十丸米飲下忌生冷油膩等物虎睛丸治小兒癲癇至大不瘥或發即口出白沫並大小便出不知虎睛一對酒浸一宿微炙細研硃砂石膏各細研飛過水鐵粉龍齒細研各半兩露蜂房微炙羌活鉤藤防葵麻黃去根節川升麻各半兩細辛一分牛黃半分細研蚱蟬四枚去翅足炙上為末都研令勻煉蜜和丸如麻子大每服以溫水下五丸更量兒大小加減鐵粉丸治小兒心臟積熱時發癲癇嘔吐涎沫作聲迷悶鐵粉龍齒各細研一兩鉛霜麝香細研天南星各一分天麻三分硃砂細研水飛過水銀黑鉛各半兩與水銀結為沙子細研上為末都研令勻以煉蜜和丸如緑豆大每服以竹瀝研化五丸服之量兒大小加減雄黃丸治小兒癲發動無時心悶吐沫雄黃鐵粉各細研硃砂細研水飛過各一兩獖豬膽二枚龍膽一分鯉魚膽七枚烏牛膽半枚青羊膽二枚麝香一錢細研上以諸般膽汁相和令勻即入諸藥末和丸如緑豆大每服以金銀湯下五丸量兒大小加減天麻散祛風治癲癇天麻防風麻黃去根節各一兩甘草炙川麻黃羌活黃芩川大黃炮各半兩上為末每服一錢水一盞煎至五分去滓放溫服熊膽丸治癲癇鎮心安神真熊膽鐵粉各細研硃砂細研水飛生天南星末雄黃水磨精明者同研各半兩粉霜一分研腦麝研各一錢上同拌勻用獖豬膽一枚取汁和諸藥丸如黍米大每服十粒至二十粒煎金銀薄荷湯下雄黃丸療五癲牛癲則牛鳴馬癲則馬嘶狗癲則狗吠羊癲則羊鳴雞癲則雞鳴五癲病者臟腑相引盈氣起寒厥不識人氣爭掣瘲吐沫久而得蘇雄黃研雌黃一方無一方用一兩真珠末水銀各一兩千金水銀使八分鉛丹二兩熬成屑千金此一味是鉛丹砂半兩研千金使二兩上搗和以蜜又搗三萬杵為丸先食服胡豆大三丸日再驚癇亦愈千金範汪同兒三丸如小豆忌生血物黑錫丹治癲癇及諸癇胞絡涎盛黑錫二兩同水銀半兩慢火結沙子粉霜鐵粉各細研半兩麝香一分細研天南星一兩炮取末上同研勻滴水和如黍米大每服十粒煎竹葉湯下日應丹治癲連年不瘥金銀箔各三十片黑錫硫黃水銀研細鐵粉研各一兩上先將錫放鐺子內熔令消即放硫黃炒不住手就鐺研攪候硫黃煙氣似息次入水銀鐵粉金銀箔同攪用緊火燒少時都傾出露地一宿出火毒再研和勻用粟米飯和如緑豆大每於食後服五粒至七粒煎人參湯下量兒大小加減一方以硃砂為衣治小兒癲癇連年不瘥方名水銀丸鉛水銀各二兩硫黃鐵粉各一兩上先將鉛放鐺子中令消即下硫黃炒不住手就鐺研攪得硫黃煙氣似息入水銀又攪次下鐵粉以武火燒少時將出一夜露地出火毒後研令極細即以粟米飯丸如緑豆大每於食後以金銀湯下五丸量兒大小加減一方食前服硃砂丸治小兒癲癇發歇不定硃砂細研水飛過鉛霜鐵粉馬牙硝各一兩上研細如面以棗肉和丸如緑豆大每服於食後以熱水下三丸量兒大小加減雌黃丸治小兒癲癇欲發精神不足眼目不明瘛瘲惡聲嚼舌吐沫雄黃研細炒令褐色黃丹炒令合色一兩麝香一分上相和細研如粉用牛乳一升慢火熬成膏可丸即丸如緑豆大每服以溫水下三丸日三服量兒大小加減此方得自於明醫之家後余嘗傳與一醫用是藥醫道大行治小兒癲癇等疾方上以光明硃砂一兩顆塊者金箔隨硃砂顆塊大小各裹之用磁石固濟了瓶子竹實築中心留一坑子即以硃砂置坑子內上更以磁石末覆之瓶子口更以鉛片可瓶口大小蓋之以二人火養七日火常令露鉛以箸刺得一孔入七日後去鉛大小煅之後冷出於乳鉢中細研即置於通油鉢子內上以馬牙硝末遍覆之即置飯甑中蒸一炊久其硃砂化成水有患者食後以溫水調下半錢量兒大小加減服露珠丸治十歲以上癲狂夫陰盛為癲陽盛為狂陰陽相併則癲狂亂走語言錯雜悲歌不定憂喜無常上以辰砂一兩琉璃器內盛露四十九夜遇陰雨日不算入牛黃一錢煉蜜和如豌豆大空心一丸冷水下更常服寧心膏治驚邪癲癇小兒客忤消食及冷氣上以鐵屑煎汁服之真珠丸治小兒自一歲患癲癇發動無時口內沫出小便不覺呼喚不應真珠研一分虎睛左睛酒浸曝乾研一分露蜂房麻黃去根節鉤藤各半兩防葵一兩鐵粉細研三分大黃銼炒黃芩各三分龍齒研一兩銀屑梔子仁各三分獨活去蘆頭半兩柴胡去苗升麻白鮮皮各三分雷丸一分沙參細辛去苗葉各半兩蛇蛻燒灰一分石膏研半兩牛黃研一分蚱蟬去翅足熬四枚上研為末煉蜜丸如麻子大一二歲兒每服五丸研破米飲下量兒大小加減蛇黃丹治諸風癲癇掣放吐沫急慢風蛇含四個建盞內燒紅以楮木汁淬干南星白附子辰砂麝香上為末米糊丸梧桐子大每服湯化下一丸量與食前大人加丸數虎睛丸治小兒五歲至七歲發癲癇無時發動口出白沫遺失大小便不覺風癇附論夫風癇者由乳養失理血氣不和風邪所中或衣厚汗出腠理開張風因而入得之時先屈指如數乃發掣縮是也診其心脈滿大癇瘛筋攣肝脈小急亦癇瘛筋攣尺寸脈俱淨直上直下此為督脈必腰背強直不得俯仰小兒風癇三倍脈緊急其癇可治小兒其脈多似雀鬥要以三倍脈為主若緊者必風癇凡諸癇發手足掣縮慎勿持捉之則令曲捩不隨也方鉤藤丸治小兒風癇時發時止歲月不休常服除根鉤藤川升麻烏犀鎊黃芩去皮黑心玄參茯神防風去蘆頭一兩秦艽檳榔川黃連大黃地骨皮天竺黃甘草炙牙硝麥門冬去心青黛珍珠另研麝香牛黃龍齒琥珀丹砂別研龍膽各半兩蜣螂去頭足蚱蟬去頭足翅生用各三個人參虎睛一對浸焙乾金箔銀箔各四十片同研上除另研外為細末軟飯丸如黃米大每一歲兒服二十丸至三十丸參湯或薄荷湯下虎睛丸治小兒風癇自三歲已來至十歲不瘥發時口中白沫大小便不覺虎睛一對酒浸炙黃色硃砂細研水飛過麻黃去根節柴胡去苗鉤藤白蘚皮川升麻雷丸沙參去蘆頭牛黃細研各半兩防風去蘆頭子芩川大黃銼碎微炒鐵粉銀屑細研梔子仁羌活各三分龍齒細研石膏細研水飛過各一兩細辛一分蚱蟬四枚微炙去翅足上件藥搗為末煉蜜和搗三五百杵丸如緑豆大三歲以下以薄荷湯下三丸日三服三歲以上以意加丸服之天竺黃散治小兒風癇筋脈抽掣夜臥驚悸皮膚壯熱天竺黃研牛黃研知母銼焙鉤藤銼焙芍藥犀角鎊微炙龍膽去土柴胡去苗銼防風去叉銼升麻人參各半兩桔梗大黃炒銼令香山梔子玄參雄蠶蛾銼炒白茯苓去皮銼蜣螂去足微炙龍骨別搗研如粉各三分檳榔一枚紙內煨炙焙過銼上為散每服半錢用米飲調下如角弓等風用竹瀝調下連夜三四服隨兒大小加減鉤藤飲治大人小兒風癇卒倒嘔沫無省覺鉤藤皮麻黃去根節各二分龍齒六分研綿裹銀箔一片寒水石梔子擘知母石膏杏仁去皮雙仁尖研各二十分升麻十分子芩十四分蛇蛻皮七寸炙蚱蟬四枚去翅足炙柴胡十分芍藥沙參各八分生葛汁五分蜜七合牡牛黃如大豆十粒煎成研下之上切以水六升淡竹瀝二升煮取二升四合絞去滓內杏仁脂葛汁蜜於微火上煎攪不停手令餘二升三合成三四歲一服二合五六歲一服二合半日再服稍增兒若大便澀者加大黃六分慎熱面炙肉魚蒜黏食油膩冷水龍齒散療大人小兒風癇卒倒嘔沫不省麻黃去節大黃牡蠣熬黃芩各四兩寒水石白石脂石膏研赤石脂紫石英滑石研各八兩人參桂心各三兩蛇蛻皮一兩炙龍齒六兩研甘草三兩炙上搗為散以藥八兩用一薄絹袋盛散藥用水一升五合煮取七合絞去滓頓服之日再服一合水二升煮散方寸匕取一升去滓服之少小百日服一合熱多者日二服三五日一服亦得一方無麻黃龍齒蛇蛻皮忌海藻菘菜生蔥熱面蕎麥豬肉蒜黏食犀角散治小兒心臟壅熱變為風癇身體壯熱驚悸不安心神煩悶多啼少睡犀角屑羌活川升麻柴胡去苗各三分茯神白鮮皮葛根各半兩銼甘草炙微赤蛇蛻皮灰各一兩石膏一兩細研蚱蟬三枚微炒去翅足鉤藤麥門冬一兩半去心川大黃銼碎微炒子芩各一兩上粗羅為散每服一錢水一盞煎至五分去滓量兒大小加減服之天竺黃散治小兒風癇筋脈抽掣夜臥驚悸四肢煩躁皮膚壯熱天竺黃牛黃各細研龍骨知母赤芍藥犀角屑鉤藤玄參各細研桔梗去蘆頭白殭蠶微炒川大黃細研微炒茯神以上各一分蜣螂七枚去足微炒檳榔一枚紙裹微煨上為細末每服薄荷湯調下半錢一日五服隨兒大小加減烏犀丸治小兒驚風癇病及諸風手足搐搦不定天南星炮製白附子炮製乾蠍微炒烏犀角屑天麻各一分白花蛇半兩酒浸去皮骨焙乾稱用以上六味為細末以無灰酒一小盞同入銀器內煎令稠則入後七味同和為丸牛黃麝香膩粉龍腦各一分硃砂半兩水銀以棗少許研星盡一分虎睛一對酒浸微炙為末上都研令勻入前膏子為丸如麻子大每服三丸用竹瀝下不拘時候量兒大小加減木防己酒治小兒風癇發動手足不仁木防己一錢四分鉛丹防風桂心龍齒各八分丹砂甘草炙各六分獨活二分細辛當歸乾薑各五分莽草一分上切入絹袋中酒五升浸五熟初服半合日三服紫石酒治少小風癇發作言語謬錯紫石英八分附子炮三分鐵精茯神獨活各五分遠志去心桂心各六分蜂房炙牛黃各二分乾薑甘草炙人參各三分上絹袋盛清酒五升浸五宿初服一合日二服黃耆湯治小兒風癇發無時數下之後風虛不足黃耆銼麻黃去節甘草炙銼當歸切焙細辛去葉桂去粗皮芍藥人參各一兩牛黃研一分蛇蛻炙焦黃一寸蚱蟬炒蜣螂各四枚並微炙去翅足上粗搗篩三四兒每服一錢匕水七分煎至四分去滓放溫服日三服隨兒大小加減沉香湯治小兒風癇發作無度頸核瘰癧瘴毒乍寒乍熱欲成骨蒸腸滑骨熱多變疳痢皮肉乾枯不思乳食身熱生瘡喉閉腫痛悉主之沉香研人參各半兩木香銼厚朴去粗皮搽生薑汁炙乾薑各三分升麻玄參各一兩凝水石一兩半搗研知母地榆甘草炙銼一兩鉤藤一兩一分上為散三歲兒以水半盞藥末半錢匕煎至三分去滓不限早晚日三服量兒大小加減茵