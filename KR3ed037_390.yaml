一枚去裙襴醋炙柴胡去苗二兩甘草炙當歸切焙杏仁湯浸去皮尖雙仁研桔梗炒各一兩胡黃連一分地骨皮赤芍藥各一兩木香半兩黃連去須一分桂去粗皮半兩人參一兩麝香少許研酥蜜各三兩上除酥蜜外搗研為末用青蒿一斤銼小便五升好酒一升熬蒿至二升去蒿入酥蜜再熬成煎候冷入藥末和丸如綠豆大每服十丸米飲下日二服如秋冬合時更入桃柳心各七枚宜與後方柴胡人參湯相間服之柴胡人參湯治小兒骨熱盜汗肌瘦減食柴胡去苗人參白茯苓去黑皮當歸切桔梗青橘皮去白芍藥芎藭麥門冬去心白朮升麻桑根白皮甘草各一兩上並生銼如麻豆大每二錢水一盞煎至六分去滓分溫二服食後臨臥與前鱉甲柴胡煎丸相間服速效香瓜丸治小兒疳黃盜汗骨蒸潮熱腹大肌瘦胡黃連大黃瓜黃色者一個柴胡川大黃濕紙裹煨至底焦鱉甲醋炙黃黃柏削去粗皮秤黃連蘆薈青橘皮各等分上除黃瓜外同為細末將黃瓜割去頭填入諸藥至滿卻蓋口用杖子插定慢火煨熟將黃瓜及藥同用麵糊丸如綠豆大每服三二丸食後冷漿水或新水下大者五七丸至十丸服一方加木香麝香少許米湯下麥煎散治小兒榮衛不調夜多盜汗四肢倦怠消瘦面黃鱉甲一兩酒醋炙三五十次取淨好醋再炙黃柴胡去苗團參秦艽各一兩乾漆炒白茯苓人參乾葛大川烏炮去皮各半兩上為末每服半錢水半盞小麥三七粒煎三分黃耆散治小兒體熱盜汗心煩不欲乳食黃耆半兩硃砂半兩細研水飛龍腦一錢細研人參去蘆川升麻川大黃銼微炒甘草炙天竹黃牡蠣粉以上各一分上為散不計時候煎竹葉湯調下半錢量兒大小加減服之龍骨散治小兒夜常有盜汗黃瘦白龍骨牡蠣粉黃耆銼人參去蘆麻黃根熟地黃甘草炙銼各半兩麥門冬一兩去心焙上為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意加減犀角散治小兒盜汗肌瘦犀角鱉甲酥炙柴胡各半兩知母半兩地骨皮胡黃連各一兩大黃桃仁各半兩上㕮咀每服三歲兒一錢水半盞煎至三分去滓溫服不拘時候大小以意加減豬肚丸治小兒骨蒸盜汗乳食減少鱉甲去裙襴醋炙柴胡去苗木香生乾地黃焙各一兩青蒿去莖黃連去須炒二兩青橘皮去白焙半兩上為末用一枚嫩小豬肚淨洗入藥末在內系定蒸令極爛研和藥末丸如綠豆大每服十丸溫水下食前日午臨臥日三服看兒大小加減地骨皮湯治小兒骨蒸壯熱肌肉減瘦多困少力夜多盜汗地骨皮秦艽去苗柴胡去苗枳殼去瓤麩炒知母焙當歸切焙鱉甲去裙襴醋炙上粗搗篩每服一錢以水八分入桃柳心各五枚姜二片烏梅半枚同煎至四分去滓溫服空心臨臥各一五歲以下分作二服黃耆散治小兒榮衛不和肌瘦盜汗骨蒸多渴不思乳食腹滿泄瀉氣虛少力沉香黃耆炙人參當歸赤芍藥各一兩木香桂心各半兩上㕮咀每服一錢生薑二片棗子半個水半盞煎至三分去滓溫服香甲丸一名沉香鱉甲丹治小兒潮熱盜汗消瘦面黃煩渴可食沉香龍膽草鱉甲童子小便浸一宿炙當歸黃耆蜜炙各一兩大黃炒黃連各半兩上為末白糊丸如小豆大每服三十丸看大小加減米飲送下一方用蜜和丸麥門冬去心煎湯送下麻黃根散治小兒盜汗不止咽喉多幹心神煩熱麻黃根敗蒲灰麥門冬去心焙黃耆銼龍骨甘草炙以上各半兩上為散每服一錢水一小盞煎至五分不計時候服量兒大小以意加減犀角散治小兒盜汗體熱咽乾犀角屑茯神麥門冬去心焙黃耆銼人參去蘆各半兩甘草一分炙銼上為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小加減青蒿煎丸治小兒盜汗肌熱青蒿切一斤甘草炙銼為末杏仁湯浸去皮尖雙仁少許各一兩柴胡去苗為末一兩白蜜二分鱉甲去裙襴醋炙為末一兩半上用童子小便五升先煎青蒿取一升去滓更煎令如稀餳入酥少許及諸藥末等熬成煎丸如綠豆大每服十五丸至二十丸空心熟水下更量兒大小加減粉汗散治小兒睡中遍身盜汗牡蠣煅二兩麻黃根炒赤石脂糯米各一兩龍腦一錢麝香少許上為末用生綿絹包藥挨有盜汗出處一方無麝香麻黃散治小兒盜汗日久口乾煩渴消瘦少力人參茯苓黃耆蜜炙龍骨牡蠣煅麻黃根上等分為末每服一錢水半盞生薑棗子煎三分麻黃根散治小兒盜汗麻黃根雷丸牡蠣火煅過各一兩半甘草炙一兩乾薑炮半兩梁糧一半升上六味搗羅為散以粉兒身體及頭甚驗升麻湯治小兒肌熱盜汗日漸消瘦不食多渴升麻綿黃耆蜜炙人參各一兩熟乾地黃天竺黃牡蠣各半兩各研煅上件通拌勻為末每服半錢至一錢煎竹葉湯調下一方竹葉少許水煎服犀角湯治小兒盜汗睡中驚啼體熱瘦瘁此由心臟熱所感生犀角屑三分茯神去木一兩麥門冬去心焙一兩半白朮一分甘草炙銼半兩上粗搗篩每服二錢以水一小盞煎至五分去滓分溫二服食後臨臥量兒大小加減一方有龍齒一兩鱉甲丸一名蓯蓉丹治小兒久病盜汗血少氣虛面色痿黃骨蒸煩渴日漸消瘦情意不悅鱉甲醋炙肉蓯蓉酒浸一宿炙乾各一兩當歸黃耆蜜炙何首烏各半兩上為末煉蜜丸如小豆大每服三十丸米湯下食前粉汗散治小兒睡中遍身盜汗黃連生牡蠣煅貝母各七分糯米三兩一作粉上為細末用生綿絹包藥挨有盜汗處牡蠣散一名黃耆散治小兒盜汗汗者血也血虛亦能自汗又治小兒病後暴虛津液不固體常自汗夜臥愈甚久而不止羸瘠枯瘦短氣煩倦亦治虛熱盜汗或因病後血少虛弱消瘦潮熱煩渴腠理不密盜汗不止牡蠣煅二兩黃耆乾地黃生者麻黃根各一兩上㕮咀每服一錢水半盞小麥二十粒煎三分去滓溫服服無時一方無麻黃根牡蠣散治小兒自汗血虛亦能自汗作熱蒼朮米泔浸一宿去黑皮炒一兩白朮半兩防風去叉一兩龍腦一兩上末每服一錢米飲調下金瓜丸治小兒肌熱盜汗瘦弱飲食不進常服退肌熱肥孩兒大有神效黃連黃柏青皮甘草各半兩上為細末入麝香半錢取獖豬膽和釀在膽內用漿水煮十餘沸取出東房山頭掛一夜第二日丸如綠豆大每服十丸加至二十丸溫米飲下不拘時候衛生方治疳熱肌瘦盜汗地骨皮洗四兩生乾地黃三兩白芍藥一兩甘草炙半兩上㕮咀每服二錢水一盞小麥三十粒煎至七分去滓不拘時候芎藭湯治小兒心熱盜汗芎藭大黃煨銼羌活去蘆頭甘草炙銼各一兩上㕮咀每二錢水一中盞入薄荷數葉同煎至六分去滓分溫二服量兒大小加減治小兒盜汗不止宜用粉身麻黃根二兩雷丸一兩乾薑一兩梁米二兩上為末日三四度以粉其身汗即自止治盜汗外腎濕人參一錢苦參麻黃根各三錢上為末蜜丸梧桐子大炒麥麩煎湯下二十丸治睡中汗出酸棗仁人參茯苓各等分上為細末米飲下半盞團參湯治盜汗取斂心血人參一兩黃耆三兩甘草半兩上等分㕮咀姜三片加麥麩煎服又方治證同前羅參白朮白茯苓黃耆當歸甘草上㕮咀各等分姜三片加麥麩煎服二物茯苓粉散治小兒頭汗兼治盜汗不止宜用粉身茯苓牡蠣各四兩上治下篩以粉八兩各搗為散有熱輒取粉汗即自止故扇散治小兒盜汗故扇燒灰一分麻黃取根節三分上搗羅為散每服半錢乳食調下量兒大小加減丹砂散治小兒肌熱盜汗丹砂研一兩白礬熬乾枯研二錢上再同研勻細每服半錢薄荷自然汁調下重陽丸治小兒盜汗潮熱往來胡黃連柴胡去苗等分上為末煉蜜和丸如雞子大每服二丸至三丸銀器內用酒少許化開入水五分重湯上煮十二三沸放溫食後服量兒大小加減治自汗方白朮一分小麥一撮上用同煮去麥用白朮為末煎黃耆湯服之以愈為度小兒自汗切自此而止止汗散治小兒喜汗厚衣睡而額上汗出及遍身自汗肌肉虛也上用故蒲扇燒灰如無扇只將故蒲燒灰研細服三錢溫酒調下無時麥麩散治小兒盜汗不止日漸消瘦上麩皮炒黃為末每服半錢煎豬脊髓湯調下治盜汗上用鬱金為末水調塗兩乳下又方上用白朮銼碎用水濃煎時時與飲以知為度治盜汗不止用防風為末浮麥煎湯調服而愈又方用麻黃根節甘草節二味粗末水煎服虎杖散治實熱盜汗用虎杖銼水煎服量多少與之無時一方為末每服半錢水半盞煎服香粉散治盜汗不止藁本牡蠣粉川芎白芷蚌粉麻黃根各等分上為末周身敷之建中湯減桂加人參傅氏治嬰方治盜汗補虛和陰陽治傷寒自汗黃耆一兩白芍藥三兩人參熟地黃甘草炙各半上㕮咀每服二錢大麥同煎服之又方治小兒虛汗心驚恍惚而汗頻流體熱心煩硃砂黃耆人參升麻天竺黃牡蠣粉龍膽草甘草上為末每服半錢淡竹葉煎湯調下牡蠣散治小兒盜汗不止宜用粉身牡蠣粉一兩麻黃根一兩赤石脂一兩上藥搗細羅為散入米粉二合拌令勻每日及夜間常挨之
