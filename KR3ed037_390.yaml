body:
  text: 卷三百九十嬰孩心腹痛等疾門心腹痛附論夫小兒心腹疼者證候多端不可枚舉有蟲動者作疼面變五色口吐清水或涎沫或閤眼哭叫仰身撲手心神悶亂沉沉嘿嘿者是也宜先吃使君子次服官局化蟲丸小兒飲食不節或餐冷硬肥膩甘甜過度傷飽不得克化停積於臟或因冷氣所觸故作疼痛診其脈沉細者乃積也輕則京三稜莪朮橘皮縮砂重則取動非巴豆硼砂乾漆不可止也又有氣痛或因怒而食或傷風冷之氣或因體虛臟寒而作疼診其脈弦緊者是也當用木香紫蘇子沉香青橘之屬大人小兒皆可服四磨飲子沉香木香檳榔烏藥而有一般心疼大人小兒多患凡有此疾無藥可療急用艾灸足大拇指節中男左女右無問大人小兒又有一種勞瘵屍蟲作痛食不知飽人形羸瘦五心煩熱或骨蒸潮熱宜服金露丸小兒心痛者本起於心即邪氣客於心主之脈夫少陰者心也五臟六腑之所主也精神之所含其臟堅固邪不能幹干之即傷心傷心即神去神去即死矣故諸邪在於心者皆在於心包絡脈包絡脈者心之別脈也故少陰不病夫心痛者厥氣上逆痞而不散或傷寒氣邪冷搏於經絡故發心痛也小兒腹痛者多由冷熱不調冷熱之氣與臟氣相擊故為痛也其熱痛者則面赤或壯熱四肢煩手足心熱是也冷而痛者面色或青或白甚者乃至面黑唇口爪甲皆青是也方沉香煎丸治小兒嘔逆心腹疼痛化水穀消積緊沉香銼丁香木香胡椒沒藥研丹砂研水飛高良薑檳榔麵裹煨熟去面銼硫黃研水飛硇砂揀淨水飛慢火熟乾各一兩青橘皮湯浸去白焙一兩縮砂去皮吳茱萸湯浸焙乾阿魏醋浸研澄去沙和麵作餅子炙焦各半兩巴豆去皮心膜研去油盡一分上搗各研為末和勻煉蜜丸如綠豆大以瓷盒收密封每服二丸食前臨臥生薑橘皮湯下量虛實大小加減寬中湯治小兒心腹疼痛不可忍者高良薑木香各半兩丁香桔梗青皮甘草各一分上為細末每服半錢溫酒調下蓬莪朮丹治小兒心腹疼痛不可忍蓬莪朮炮當歸洗各一兩木香人參桂心各半兩黑牽牛一分微炒黃上羅為細末白麵糊和丸如黍米大每服十粒生薑湯下量兒大小加減服之參香丸治小兒心腹痛並腸冷便青腹急痛乳香木香石菖蒲人參良薑炒各等分上為末酒糊丸如小豆大一歲五丸米湯下治小兒心腹痛用三月三日桃花取曬乾杵末以水服半錢治小兒卒心痛腹脹堅如石滿氣喘息用好鹽如雞子大漿水三升煮取三沸內攪蜜半升分為三服紫沉消積丸治小兒心痛沉香銼硇砂各四兩阿魏巴豆霜各一兩以上研別為末用蜜一斤酒化熬成膏丹砂研丁香乾薑炮各二兩硫黃研青橘皮湯浸去白焙稱高良薑檳榔銼木香人參胡椒桂去粗皮各四兩上除前膏外一十一味搗研為細末入前膏和搗丸如綠豆大以瓷合收密封每服二丸食前橘皮湯下更量度加減桃仁湯治小兒邪氣攻心痛不欲飲食桃仁三七枚湯浸去皮尖雙仁炒黃厚朴去粗皮生薑汁炙一兩人參半兩陳橘皮湯浸去白焙一分麥糵微炒半兩檳榔銼半兩附子炮製去皮臍桂去粗皮當歸切焙各一兩上粗搗篩三歲兒每服半錢水半盞煎至三分去滓不計時候溫服更量兒大小加減硇砂丸治小兒積氣冷氣心痛硇砂二錢乾漆微炒五靈脂胡椒桂去粗皮京三稜炮銼蓬莪朮炮各一兩斑蟊二十一枚去翅足炒巴豆二十一枚去心皮膜煮令出油研上為末研令勻醋煮麵糊和丸如黃米大一二歲兒每服五丸三四歲每服七丸橘皮湯下余以意加減治小兒未滿百日患腹痛豚子卵一枚當歸一分上用水三升煮取七合塗乳頭上令小兒飲以意量佳獨聖散治小兒頭疼心痛用當歸近尾半節為末酒調服半錢亦治大人如嬰兒夜啼乳汁調下少許即瘥蓬莪朮散治小兒心痛發歇不定蓬莪朮人參桂心黃芩生乾地黃木香甘草炙黃各一分上為散每服不計時候以橘皮湯調下半錢量兒大小以意加減芍藥散治小兒心痛但覺兒將手數摩心腹即啼是心痛不可忍宜服赤芍藥人參去蘆白朮黃芩川大黃銼炒當歸各一分上為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服檳榔散治小兒冷氣心痛不欲飲食檳榔三分銼當歸一兩焙蓬莪朮三分焙銼木香三分吳茱萸一分洗焙阿魏一分麩炒令麩熟為度上為散二歲兒每服半錢溫酒調下不計時候蓽撥散治小兒心疼不可忍蓽撥一兩胡椒一分桂去皮一分木香半兩當歸三分焙桃仁去皮尖半兩炒上為細散一二歲兒每服半錢溫酒調下不計時候麝香丸治小兒心痛面色青黃不欲飲食麝香細研一分檳榔銼陳橘皮去白焙白豆蔻去殼吳茱萸燒焙木香各一兩上將吳茱萸米醋煮一二十沸後掘地坑可安茱萸以炭半稱燒坑令通赤以醋半盞及茱萸入坑內用瓷碗蓋之四面以炭擁勿令泄氣候冷取出與前藥一處搗羅為末入麝香和勻醋煮麵糊丸如黃米大一二歲兒每服五丸四歲兒七丸溫酒調下不計時候桃仁湯治小兒心痛不可忍桃仁去皮尖炒研赤芍藥桔梗炒桂去皮甘草炙各半兩上為末與桃仁同研每服一錢水一盞煎至半盞去滓溫服量兒大小加減不拘時服木香湯治小兒心痛不可忍木香良薑各一分炒白朮半兩桔梗半兩炒白茯苓去皮一方用赤半兩上粗搗篩一二歲兒每服一二錢水一盞煎至五分去滓溫服發時並吃量兒大小加減胡椒丸治小兒心痛胡椒四十九粒檳榔一枚銼斑蟊去翅足七個上為細末燒粟米飯為丸黃米大三歲兒每服三丸三歲以上五丸煎菖蒲湯下青橘皮散治小兒傷冷腹痛青皮湯浸去白桔梗去蘆赤芍藥各半兩上為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服桂心散治小兒心痛不止桂心半分當歸半兩銼炒梔子仁半分上為散每服不計時候以橘皮湯調下半錢量兒大小以意加減薑黃散治小兒心痛薑黃檳榔銼上等分搗羅為散溫酒調下一二歲兒每服半錢以下余以意加減鱉甲丸治小兒腹痛不可忍鱉甲塗醋炙黃去裙襴防葵訶黎勒用煨皮川大黃銼炒人參去蘆郁李仁湯浸去皮尖研炒當歸銼微炒冷半兩上為末煉蜜和丸如綠豆大不計時候以粥飲下五丸得微利瘥量兒大小以意加減溫胃丹治小兒腹痛啼哭不止人參白朮木香各一兩高良薑當歸五味子各半兩上為末麵糊丸如黍米大每服十粒米飲下橘香散治證同前青皮炒木香吳茱萸當歸各一兩乾薑丁香各半兩上為細末每服一錢水八分生薑二片煎至五分去滓溫服食前人參散治小兒卒吐血下腹痛不止人參半兩去蘆當歸半兩炒甘草一分炙乾薑炮一分黃耆一分細辛一分上為末每服一錢以水一小盞煎至五分去滓稍熱服量兒大小以意加減頻服治小兒傷冷腹痛木香高良薑白朮人參去蘆各一分厚朴半兩去粗皮塗生薑汁炙令香上為散不計時候以粥飲調下半錢量兒大小以意加減當歸散治小兒冷熱不調腹內多痛當歸炒枳殼麩炒去瓤赤芍藥川大黃銼炒各半兩上為散每服一錢以水一小盞煎至五分去滓放溫服量大小減服之凡脾家疼痛者皆因胃虛不究病源多用和養等劑以致掩蔽邪氣蓋腹痛多因邪正交爭與臟氣相擊而作也受證非一夾熱痛者壯熱面赤或四肢煩手足心熱藥宜四順飲加青皮枳殼夾冷痛者面白或青甚者面黑唇口爪甲皆青藥宜五積散重者理中湯冷熱不調邪正交爭宜枳湯加青皮陳皮木香官桂當歸有積傷脾則面黃腹脹夜熱晝涼宜紫霜丸去其積風冷入脾則脾胃積冷中滿疼痛荏苒歲月不可測識宜和劑抽刀散以伐其根脾間蛔痛則作乍吐嘔清沫宜檳榔丸主之三稜散益志炒去殼三稜莪朮青皮炒香附子青木香砂仁各半兩甘草二錢半上㕮咀姜煎服次與保童丸之類微利取效也治小兒心腹胸脅煩滿欲死用燒雞子殼末酒服方寸匕瘧疾附論夫時氣者是四時間或有非節之氣如春或寒夏或冷秋或熱冬或溫其氣傷人為病亦頭疼壯熱與傷寒相似其面黃者熱搏於胃脾胃停滯則發黃也治法亦如傷寒重用解肌湯表之輕用七寶散而又有時氣兼瘧者是日數未滿體常壯熱而邪不退此方失表故也或乘於陰或乘於陽其乘於陽陽爭則熱氣乘於陰陰爭則寒陰陽之氣互相乘加故發熱成瘧也歌曰瘧病是邪成陰陽各鬥爭早期風府會晏發脊俞停行速連朝發來遲間日迎小兒還驗此不用問神明風寒暑濕邪自外來飲食居處邪有內作湯氏曰是以外因感受邪氣客於皮膚達於經絡內因停積飲食痰飲會於臟腑此瘧疾之胚胎也楊氏曰豈但夏傷於暑秋必為瘧哉蓋古人以暑受病最多言之耳夫瘧者始而呵欠繼而足冷面色青黃身體俱急寒慓鼓頷腰脊俱疼寒去未幾內外皆熱頭痛而渴但欲飲冷嘔惡煩悶而不嗜食或內伏寒痰寒從背起冷如掌大瘧之寒熱豈非陰陽二氣互相勝負而作也邪並於陰則寒邪並於陽則熱陰盛則寒多陽盛則熱熾其寒也湯火不能溫其熱也冰雪不能寒衛氣與邪氣交爭病以作邪氣與衛氣相離故汗出乃解而病以休衛氣晝行陽夜行陰得陽而外出故發於日間得陰而內搏故發於暮夜或隔日或兩日三日一發乃衛氣行疾行遲耳若內外失守真邪不分陰陽迭勝寒熱互起則休作無定時矣聖惠曰凡瘧疾欲解則有汗汗出多則津液減耗又熱乘於臟則生虛燥故渴而欲飲張秘教曰若病瘥無汗非也夏傷於暑秋或痎瘧小兒血氣壅勝內挾實熱因犯暑邪客於皮膚分內之間至秋為風冷所折陽盛於外陰長於內陰陽相搏發而成瘧先寒後熱者寒瘧也先熱而後寒者溫瘧也熱而不寒者癉瘧也若汗出過多亡陽而渴當節其飲多飲而小便澀則變為飲癖矣楊氏曰其脈弦數者多熱熱則涼之弦遲者多寒寒則溫之浮弦浮緊浮數其邪在表宜汗弦實沉實數實其邪在裡宜下大抵瘧之初得一二日間如火燎原不可向爾波濤洶湧未易回瀾當俟其稍定而圖之所謂盛者待其衰也瘧方來與正發及將解不可投藥耗其真氣藥病相忤當於未發已前兩時之前或遇發日凌晨服之瘧有數種治法不同寒熱似瘧此傷寒二證非瘧也必肝脈伏盛頭痛怯風宜小柴胡湯加青皮紫蘇主之嘔者多用生薑渴者加烏梅若傷暑兼之小柴胡加香薷入生薑烏梅煎但寒熱之間非通利不能除根也當以四順飲加常山神保丸治乃先解後攻之意吐下汗三者治瘧總要不過汗吐下當下而不盡腹中余疼或一利之後不再泄時時點滴而出者須以常山大黃再下之當汗而汗不匝者或頭汗至胸而手足無者宜青皮佐紫蘇汗之令周浹一身也當吐宜常山須出盡其水飲也瘧利常用罌粟常山治瘧每每作效乃瘧家多蓄黃水蓋常山能攻其癖下其水也罌粟治痢然已經取積日久下痢腹中無痛腸胃滑泄以罌粟能澀腸也用常山須用大黃為佐大便點滴似泄不泄須用大黃佐之收效如發瘧嘔者及嬰孩中年人虛者勿用常山吐之瘧證寒熱不歇有根凡瘧別風寒暑濕治之汗下吐溫古今不可違活人書格法治之久不愈者有根在也根者何曰痰飲曰水飲曰敗血曰積癖惟癖為瘧之母敗血為暑熱之毒惟水惟飲皆生寒熱故暑之脈沉積癖之脈結聚或實脅腹必痛蓋巴豆功能下積常山能吐利痰水大黃能盪滌血熱隨證用之瘧瘥再病愈已後飲食失節恚怒傷中解脫傷風乳哺過飽又再發者熱多二陳湯加青皮甘草熱少者二陳湯加青皮草果堅守胃氣並用生薑烏梅煎空心服之更用巴豆丸子疏利大便以泄毒氣何病之有或服巴過多滑痢腹痛煎甘草生薑湯解之巢氏病源夫風邪所傷客於皮膚而痰飲積於臟腑致令血氣不和陰陽交爭