冬夏可用一方但用丹砂雷丸亦佳龍膽湯治小兒諸癇寒熱吐痢不能乳哺龍膽草當歸切焙大黃銼炒黃芩去黑心栝蔞根甘草炙桂心去粗皮人參切麻黃去根節牡蠣熬赤石脂研芍藥各一兩上粗搗篩二三歲兒每服一錢匕水一盞棗一枚擘同煎至五分去滓分溫二服更量兒大小加減祛風墜涎丸治小兒諸癇荊芥穗密陀僧白礬生各半兩硃砂一錢為衣上為細末水糊丸如黍米大硃砂為衣每服三十丸荊芥湯下乳後黃芩丸治小兒諸般癇疾口出白沫黃芩去黑心梔子仁犀角鎊各一兩麝香研一錢虎睛研一隻上為末切細煉蜜和丸如緑豆大每服一歲至二歲兒三丸三歲至五歲兒五丸並米飲下日四服更量兒大小加減雄黃丸一名五癇丸治小兒五種癇牛癇即牛聲馬癇即馬嘶狗癇即狗吠羊癇即羊鳴雞癇則雞鳴五癇病者臟腑相引邪氣盈起寒厥不識人手顫口吐沫須臾如蘇復作神效雄黃研水銀各二兩鉛熬成汁與水銀結作沙子三兩真珠末細研一兩丹砂研半兩上為細末煉蜜和丸如緑豆大每服五丸金銀薄荷湯下日再服錢氏名五色丸一方有金銀箔用豬心血為丸鐵精丸治初得癇雖時時發先服鉛丹丸後服此方鉛丹丸方見癇瘥復發門中百病鉛丹丸鐵精一兩研石膏甘草炙各二分當歸二分麝香半分上為末蜜丸小豆大一服二丸日服三服鐵粉丹治諸癇胸膈不利鐵粉一兩研干膽一枚生薑汁浸少炙焦黃為末乾蠍七個為末硃砂半兩細研水飛牛黃一分研上都拌勻糯米飲和如黍米大每服三粒至五粒煎人參湯下五星丸治暗風癇疾取涎積倒地不知人事此方神效取下病積白丁香赤小豆各三十粒乳香一分輕粉半錢重巴豆一十四個去油用上未滴水為丸分作十一丸每服一丸水半盞磨化下臨發時服取下積涎如青黑色是應如十年內此一服便瘥更無再作以上者半月日再一服永除次服硃砂鎮心藥全蠍散治證同前本類八味扁金丹全蠍半兩白附子硃砂別研三錢白殭蠶二錢麝香一錢別研上為細末每服半錢荊芥湯入酒少許用調服神效丹治小兒諸癇服絶根極有神效大人亦可用豬牙皂角不蛀者四兩重粗銼用羯羊肝一個切作片子用水三大碗煮數十沸去肝用皂角半夏揀大而陳者四兩重用薑汁浸三宿漉去曬乾每個切作四片生朱末一兩同於鐵銚內同炒以半夏黃為度揀出半夏生朱末別研入藥天南星二兩重生用白礬明者二兩重略枯存性黑牽牛二兩重炒紫色上為細末就用生薑汁打糊為丸如黍米大每服三十丸至四十丸生薑湯下鉤藤飲治小兒發癇時時戴眼口中沫出此是癇疾並宜服之鉤藤二分銼人參黃芩去黑心蚱蟬一枚去翅足炒大黃銼炒各半兩牛黃三豆大別研湯成下上搗篩每服三錢匕以水一盞竹瀝五合煎取五七分去滓入牛黃少許溫服若得微微溏利一兩度即止乳母忌蒜面炙煿物白金散治諸癇潮發不省者好白殭蠶半兩揀治淨湯洗炒散黃色搗羅為末次用天竺黃一分細研真牛黃一錢麝香龍齒各半錢上件同拌勻每服半錢用生薑自然汁調放溫灌之祛風散治胎癇多啼叫胡黃連半兩取末全蠍一分為末犀角一分屑取末天竺黃一分研麻黃一分去節為細末上都研令勻細每服半錢研入麝香一字乳汁調下獨活湯治小兒發癇手足掣瘲十指戰掉舌本強腫獨活去蘆頭人參各半兩大黃銼炒二兩麻黃去節水煮去沫二分上搗篩一二歲兒每服半錢水半盞煎至三分去滓溫服連夜三四服隨兒大小加減大有神效治小兒癇上以枯蟬燒灰服之即蟬蛻治小兒癇上以馬御煮汁服萬病湯主小兒癇當歸細辛礬石燒甘草炙各一兩上以水四升煮取一升去滓內白蜜雞子大分為五服當日令盡大黃湯治少小衆癇乳哺不時發溫壯吐利驚掣胎寒腹痛一十五癇案此方原缺藥味上以水三升煮取一升去滓一月兒服一杏核許日三服百日兒二杏核大小以此為率若發熱加麻黃二分去節有毒當切之先煮數沸去沫內諸藥若反折戴眼掣縮者加細辛四分若乳哺不消壯熱有實者增大黃令倍諸藥不爾等分大黃刀劈破勿令有碎末無其疾不須增益兒有大小強弱以意增減一方諸藥等分兒不痢者減大黃三分之一服湯令母抱之令小汗出病甚者令大汗出畢溫粉粉之下痢者勿令出汗也日夜可四服兒夜啼有微熱口御乳若不安皆可服一方治下粗篩盛以韋囊欲合小劑用水一升半煮三指撮藥內湯中更三沸令得六合絞出滓服之皆當取真新藥方可用也小兒氣弱惡藥不精非但無益乃更損兒可不慎乎此方屢試有驗王汝南方又戴眼中風身體常強增獨活二分火炒便是葛氏肘後及元和經四味飲子但分兩不同及又有加減藥耳肘後與元和經方已收溫壯門中茯苓鉤藤湯治少小七日以後患癇鉤藤茯苓各二分甘草炙大黃煨各一分上水一升煮去三合為五服當大驗勝金丸治因驚過發疳或受風熱積未洗除心臟積熱壅毒雖設湯散療治日久不退至熱過涎生膈上壅塞心胸氣亂交橫變生癇疾其候發未一日數變候轉頻吐瀉氣弱未曾補治腦麝蘆薈牛黃胡黃連末上等分研細熊膽汁為丸緑豆子大每服三丸米泔水研下療卒得癇用蚯蚓七個自死者取置新竹筒內水一升並蚯蚓炭火內煨水沸消盡蚯蚓去滓澄清每發即飲之不服三兩度立瘥余當舍諸兒服之皆驗也聖星丹治諸癇皆宜服之曾經大效天南星揀四十九個一般大者五月五日取活蠍四十九個用瓦器內盛以鹽泥固濟吊於淨室中至臘日取出揀天南星蠍蜇著處有小竅子者其餘不用只將蠍蜇天南星以酒浸一宿焙乾碾為細末次用好辰州硃砂五分細研水飛真牛黃麝香龍腦各一錢上一處研拌勻用生薑汁和梧桐子大每服一粒至二粒煎人參薄荷湯化下神驗青芝散乳母服之青黛二錢別研藍實二兩白芝麻九兩生用上為末入青黛令勻每服三錢沸湯點服食後日二服常服甚效蚱蟬散治小兒初生百日內發癇蚱蟬煅赤芍藥各三分黃芩二分上為末水一小盞煎至五分去滓服吐涎散治時發驚風變成癇疾膩粉一兩豬牙皂角末一分上研令勻每服半錢生油一橡斗水半盞同調勻分二服以吐為度保安丸治諸風癇久遠亦驗川烏生去皮炙二錢半五靈脂半兩上為末豬心血丸如桐子大每一丸薑汁泡湯調下星朱散定癇利痰南星濕紙炮香熟一兩硃砂一錢上為末用帶性豬心血為丸桐子大每服一丸煎防風湯調下雄朱散治諸癇口眼相引上視涎流手足抽掣頭項反張腰背強直雄黃硃砂等分上為末每一錢豬心血夾虀水調下治卒得癇鉤藤甘草炙上各二分水五合煮取二合服如小棗大日五夜三開關散治嬰孩小兒驚風癇疾喉閉牙關緊急蟾酥一小片鉛白霜一字上同研令極細用烏梅肉蘸藥入口兩角揩之良久便開如不開即用歸魂散一字許吹入鼻中候嚏噴即關開便下歸魂散一服如驚風癇再發須進睡紅散三服後下調胃氣藥看詳用之豬心湯治五癇癲癇及婦人心風血邪神效甘遂末一錢上用帶性豬心一個取三管頭三條和甘遂末如血多隻隨藥末得中和之將豬心批作兩片將所和藥入在內再合用綿縛定外以濕紙包慢火內煨熟不可過度取出去紙取甘遂研細次入硃砂末半錢和之分作四丸每服一丸以所煨豬心煎湯調下後別用豬心煎湯輕者只守本方重者加以蘇合香丸一粒服過半日不動又進一服如大便已下惡物即止後劑急與醒脾散以助胃氣治小兒癇疾上取牡鼠一枚取腹大貪食者以黃泥裹燒之細揀去骨皮取肉和五味汁作羹與食之勿令食骨骨甚瘦人治小兒一百二十種驚癇寒熱腸痔蠱毒諸䘌惡瘡安胎去邪明目上取蛇蛻皮熬用之治小兒卒得癇上用蜂房大者一枚水二斗煮令濃亦以浴小鬼日三四佳效萬全牛黃丸治小兒諸癇驚惕掣瘲及中客忤牛黃細研熊膽人參細辛赤芍藥當歸微炒栝蔞根防風去苗各半兩川大黃一兩微炒蚱蟬一枚去翅足炙蛇蛻皮五寸炙令黃色麝香一分研入甘草三分炙赤巴豆三十枚去皮心研如膏上為末入巴豆研勻煉蜜和杵丸如麻子大每初生一月至百日服一丸一歲至三歲服二丸四歲至五歲服三丸並用薄荷湯下快利為度犀角湯退癇鎮心神犀角屑一兩茯苓細研麥門冬去心焙乾人參去蘆頭甘草炙黃芩各半兩上為散每服一錢以水八分入生地黃汁少許同煎至四分去滓溫服治小兒癇方上用鱉甲炙令黃色搗為末取一錢乳服亦可蜜丸如緑豆大服之治小兒卒得癇疾上用白犬血一棗許含之又塗身上本草治小兒癇上用烏鴉一枚臘月者入瓦瓶泥煨燒為炭飲下治小兒癇上用刮青竹茹三兩醋三升煎一升去滓服一合兼治小兒口噤體熱病一方只用竹瀝一合溫與兒服之又方上用水銀小豆許安一瓷盞中沉湯煮之一食久服時勿大仰兒頭恐入腦亦可以壓一切熱矣近世多不煮只以紙裂過服治小兒癇方上用將馬絆繩煮洗兒煎金飲一名代赭石散治小兒不拘陰陽證發癇者並治之上用以代赭石為細末水飛極細日乾每服半錢或一錢用真金煎湯調下連進三服見兒腳脛上有斑赤色即是邪氣已出兒當安無斑赤出者不可治此藥本出保生方用之無效自後加麝香金箔同研細酒調連進三服用之有效鐵漿治癲癇發熱鎮心並六畜癇古鏡煎湯治驚癇邪氣中諸毒用好墨磨汁服卒中客忤其狀與癇一同眼睛下視鐵屑煎湯治驚邪癲癇客忤消食逐冷氣法煉靈烏散治小兒胎風諸癇目睛邪視涎潮壅噎吐咽不下口眼牽引身體強直烏鴉一隻臘月者良留毛去腸肚硃砂鐵粉蛇黃燒紅淬三次各半兩黑鉛半兩熔成汁入水銀半兩在內候沙傾出待冷用黃丹二錢半以上除烏鴉外並研細入在烏鴉腹內用線縫合入瓷罐內以鹽泥固濟日中曬乾用炭火三斤煅煙出為度次入後藥天南星生薑汁浸三宿焙乾防風去蘆頭羌活去蘆頭川芎四味各一兩荊芥穗全蠍去毒微炒白殭蠶炒去絲各半兩上搗為細末與前藥同研勻每服半錢麝香湯調下不拘時候
