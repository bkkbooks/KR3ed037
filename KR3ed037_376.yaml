body:
  text: 卷三百七十六嬰孩一切癇門總論論曰少小所以有癇病及痙病者皆由臟氣不平故也新生即癇者是其五臟不收血氣不聚五脈不流骨怯不成也多不全育其一月四十日以上至期歲而癇者亦由乳養失理血氣不和風邪所中也病先身熱掣瘲驚啼叫喚而後發癇脈浮者為陽癇病在六腑外在肌膚猶易治也病先身冷不驚掣不啼叫而病發時脈沉者為陰癇病在五臟內在骨髓極難治也病發身軟時醒者謂之癇也身強直反張如角弓不時醒者謂之痙也諸反張大人脊下容側手小兒容三指者不可復治也凡脈之浮沉以判其病在陰陽表裡耳其浮沉復有大小滑澀虛實遲駃諸證各依脈判為治神農本草經說小兒驚癇有一百二十種其證候微異於常便是有癇候也初出腹血脈不斂五臟未成稍將養失宜即為病也時不成人其經變蒸之復有病餘證並寬惟中風最暴卒也小兒四肢不收驚掣氣息小異欲作癇反變蒸者日滿不解者並宜與龍膽湯凡小兒之癇有三種有風癇有驚癇有食癇凡是先寒後熱發者皆是癇也驚癇皆按圖灸之風癇當與豬心湯食癇當下乃愈紫丸佳小兒所得風癇者緣衣暖汗出風因入也風癇者初得之時先屈指如數乃發作者此風癇也驚癇者起於驚怖大啼乃發作者此驚癇也驚癇微者急持之勿復更驚之或自止也其先不哺乳吐而變熱後發癇者此食癇早下則瘥四味紫丸逐癖飲最良去病速而不虛人赤丸即癖結脹滿中八味紫霜丸差駃病重者當用之凡小兒不能乳哺當與紫丸下之小兒始生生氣尚盛但有微惡則須下之必無所損及其愈病者則致深益若不時下則成大疾疾成則難治矣凡下四味紫丸最善雖下不損人足以去疾若四味紫丸不得下者當以赤丸下之赤丸不下當倍之若已下而有餘熱不盡當按方作龍膽湯稍服之並摩赤膏風癇亦當下之然當以豬心湯下之驚癇但按圖灸之及摩生膏不可大下也何者驚癇心氣不定一作足下之內虛亦令甚耳驚癇甚者特為難治故養小兒常慎勿令聞大聲抱持之間當安徐勿令驚怖又天雷時當塞兒耳作余細聲以亂之也凡養小兒皆微驚以長其血脈但不欲大驚大驚乃灸驚脈若五六十日灸者驚復更甚生百日後灸驚脈乃善兒有熱不欲哺乳臥不安又數驚此癇之初也服紫丸便愈不愈復與之兒眠時小驚者一月輒以紫丸下之減其盛氣令兒不病癇也兒立夏後有病治之慎勿妄灸不欲吐下但以除熱湯浴之除熱散粉之除熱赤膏摩之又以膏塗臍中令兒在涼處勿禁水漿常以新水飲之小兒衣甚薄則腹中乳食不消不消則大便皆醋臭此欲為癖之漸也便將紫丸以微消之服法先從少起常令大便稀後便漸減之不醋臭乃止藥也凡小兒冬月下無所畏夏月下難瘥然有病者不可不下下後腹中當小腹滿故節乳哺數日不可妄下又乳哺小兒當令多少有常劑兒漸大當稍稍增之若減少者此腹中已有小不調也便微服藥勿復哺之但當與乳甚者十許日微者五六日止哺自當如常若都不肯食哺而但欲乳者此是有癖為疾重要當下之不可不下不下則致寒熱或吐而發癇或更致下痢此皆病重不早下之所為也此即難治矣但先治其輕時不耗損而病可愈凡小兒屎黃而臭者此腹中有伏熱宜將服龍膽湯若白而醋臭者此挾宿寒不消也當服紫丸微者少與藥令內消甚者小增藥令小下皆復節乳哺數日令胃氣平和若不節乳哺則病易復復下之則傷其胃氣令復脹滿再三下之尚可過則傷矣凡小兒有癖其脈大必發癇此為食癇下之便愈當審候掌中與三指脈不可令起而不時下致於發癇則難療矣若早下之此脈終不起也脈在掌中尚可早療若至指則病增矣凡小兒腹中有疾生則身寒熱寒熱則血脈動動則心不定心不定則易驚癇發速也候癇法夫癇小兒之惡病也或有不及求醫而致困也然氣發於內必先有候常宜審察其精神而採其候也手白肉魚際脈黑者是癇候魚際赤者熱脈青大者寒脈青細者為平也鼻口乾燥大小便不利是癇候耳後完骨上有絡盛臥不靜是癇候青脈刺之令血出也鼻口青時小驚是癇候目閉青時小驚是癇候身熱頭常汗出是癇候身熱吐哯而喘是癇候身熱目直視是癇候喜缺目上視是癇候身熱目視不精是癇候目瞳子卒大異於常是癇候臥惕惕然而驚手足振搖是癇候意氣下而妄怒是癇候咽乳不利是癇候身熱小便難是癇候吐痢不止厥痛時起是癇候弄舌搖頭是癇候小兒發逆上啼笑面暗色不變是癇候以上諸候二十餘條皆癇之初也見其候便爪其陽脈所應灸爪之皆重手令兒驟動之足經脈亦依方與湯直視瞳子動腹滿腸鳴下血身熱口噤不得乳反張頸項強汗出發熱為臥不寤手足掣瘲喜驚凡八條癇之極者也如有此非復湯藥所能救便當時灸之若病家如發便來請師師可診候所解為發作次序治之以其節度首尾取瘥也病家已經無次序不能制病病則變異其本候後師便不知其前症虛實直後證作治亦不得瘥也要應精問察之為前師所配依取其前蹤跡以為治乃無逆耳前師處湯本應數劑乃瘥而病家服一兩劑未效便謂不驗矣以後更問他師不尋前人為治寒溫次序而更為治而不次前師治則弊也或前以下之後須平和療以接之而瘥也或前人未下之或不去者或前治寒溫失度後人調治是為治敗病皆須邀射然後免耳不依次第及不審察必重弊也錢氏云廣親太尉七歲潮熱數目欲愈錢謂其父三大王日七使潮熱將安八使預防驚搐王怒曰但使七使愈勿言八使病錢曰八使過來日午間即無苦也次日午前果作急搐召錢治之三日而愈預見目直視而腮赤必肝心俱熱更坐石枕子乃欲冷此熱甚也肌膏素肥盛脈又急促故必驚搐所言午時者自寅至午皆心肝所用事時治之瀉心肝補腎自安矣東都王氏子吐瀉請醫用藥下之至虛變慢驚其候睡露睛手足瘛瘲而身冷錢曰此慢驚也與栝蔞湯其子胃氣實即目開而身溫王疑其子不大小便令諸醫以藥利之醫留八正散等數服不利而身復冷令錢氏利小便錢曰不當利小便利之必身冷一二日已身冷矣因抱出錢曰不能食而胃中虛若利大小便則死久則脾腎俱虛當身冷麵目閉幸胎氣實而難衰也錢用益黃散使君子丸四服令微飲食至日午果能食所以然者謂利大小便脾胃虛寒當補脾不可別攻也後又不語醫作失音治之錢曰既失音問開目而能飲食又牙不噤而口不緊也諸醫不能曉錢以地黃補腎所以然者用清藥利小便致脾腎俱虛今脾已實腎尚虛故補腎必安治也半月而能言一月而痊也吐虛者慢驚風瀉虛者慢脾風吐瀉虛者曰陰癇壯熱搐曰陽癇慢驚風眼偏喜開慢脾風眼偏喜閉陰癇眼半開半閉陽癇半鮮半青急驚風十生一死慢驚風千死一生風癇者因將養失度血氣不和或厚衣汗出腠理開舒風邪所入之者曰風癇其病在肝肝主風驗其證目青面紅發搐是也驅風膏大青膏琥珀散鎮驚藥有熱四順飲退後與利驚丸下涎驚癇者因血氣盛實臟腑生熱或驚怖大啼精神傷動外邪所入為之者曰驚癇其病在心心主驚驗其證忽然叫聲發搐是也琥珀散紅龍散鎮心丸有熱四順飲利驚丸下之食癇者因乳食過多傷動脾與胃或食停中脘內生痰熱氣逆上衝為之者曰食癇其病之脾脾納食驗其證愛吐氣即發搐是也此病或大便酸臭紫霜丸下之以驚藥其食癇遇傷飽復作宜下三證大同小異並屬陽也各目睛鮮斜手足潮搐或作豬聲發過即瘥皆十生一死也所以陽癇眼半鮮半青者是肝有風熱飛仙論云目鮮則肝有風錢氏云目青者肝有熱大抵陽癇欲發先眼目青鮮其間有因驚食交互致熱盛則生風風屬於肝肝有風則旺於心火心火盛則熔動肺金生痰壅或聞大聲或大驚而發搐者有熱極雖不聞聲及驚亦自發搐蓋風熱盛故也慢驚者因久吐而胃氣先虛胃與肺母子也母虛亦令子衰二經虛則生黏痰者脾胃所出也痰則凝滯在於咽喉如牽鋸之聲時復瘛瘲是也所以慢驚風眼偏喜開者胃虛生風通真子云風能動能開慢脾者因久瀉而脾氣先虛脾與肺子母也母虛亦令子衰二經俱虛則生頑涎者脾肺所出也涎則溢流於咽喉如水雞之聲時復瘛瘲是也所謂慢脾之風眼偏喜閉者驚氣入脾通真子云氣能靜能閉陰癇吐瀉之久脾胃俱虛脾與胃表裡也二經俱虛則生痰頑涎相纏如膠塞於咽喉故聲鳴而喘時復手足顫搖或如角弓之反張是也所以陰癇眼半閉者是風氣並行脾胃也三證似同而異並屬陰也各目睛昏暈背脊強直或作鴉聲發頻難瘥皆十死一生也凡慢有汗多死仲景云不得有汗有汗者亡陽古人說慢驚瘛瘲是似搐不搐其間亦有慢驚如急搐者是死期之速也有嗽變驚者詳審治之身熱脈浮精神恍惚或吐或瀉不思飲食發搐即是半陽半陰合病身涼脈沉精神倦怠不吐不瀉又能乳食發搐者亦是半陰半陽合病正是傷寒半是表半是里之義也陰癇瘥後復發多死設有安者必須少神眼目鮮語言不正或口有痰涎流溢頤下或手足偏廢陽癇瘥後復多涎緣驚風有三種所作忽發癇荏苒失治風涎流滯心包絡間或因驚而再發或感風而發或傷食而發過如舊或進退不定潮作有時也夫癲狂癇痙始本於心心者精神之舍智意之源常欲安靜無諸觸犯疾何及焉若邪積於內熱搏於外脾胃因虛不能剋制腎水上刑于心火陰陽並虛遂致精神失守恍惚多驚癲狂癇痙之疾所由而生蓋重陰則癲重陽則狂癇則身軟而醒痙則身強而昏癲之來也發則異常或歌或哭乍喜乍悲狂之證也妄言不食而歌棄衣而走癇者發則臥地嚼舌吐味或作豬聲痙則腰背仰折狀如反弓痰壅而厥良由風涎流滯心包絡故也已而失治損傷於心心傷則神去神去則死也設有安者則語澀少神或緩弱為廢人小兒驚啼睡中四肢掣動變蒸未解慎勿針灸爪之也動其百脈因驚成癇也唯陰癇噤痙可針灸之耳凡小兒如有小疾早為尋醫勿致稽遲皆能害命凡有數疾久而不治盡變為癇壯熱久不治為癇夾驚傷不瘥為癇痰飲不瘥為癇洞泄不止為癇咳嗽不止為癇夜啼不瘥為癇客忤發不止為癇霍亂吐瀉不止為癇哯乳不瘥為癇臍瘡不幹常有黃水出久則為癇以上病狀皆能變為癇疾也小兒驚不醫者成風風不醫者成癇癇不醫者成痙既成痙則難以用藥癇亦分數種有驚風癇多驚疾發有乳風癇食乳沖肺即發發即吐乳有肝風癇四季多發發即寒熱噤有肺風癇冬月多發發即口噤面墨大抵癇病不能害命只邪氣在心須重吐更常服鎮心湯藥如覺發時一邊手足動此不可吐微覺麻癖不能舉手兼說話亦不分曉牙齒皆黑此風涎及邪氣閉塞竅內也見諸癇正發手足掣抽慎勿捉持之則令曲戾不隨也凡癇病有數般不可盡述且說五臟表裡受風形狀初受驚癇目反視踞坐舉頭唇皮青色面青黃此乃病傳於肝若唇黑眼慢旬日死風癇口吐白沫已傳受心臟放齒咬人或口頰手指青黑或醒而發若指黑色面青黑乃五日內死臍風發癇面虛腫搐搦手足搖動兩臉白病已傳肺面如土色七日而死搐搦或夢中啼哭下齒咬人乃以慢形狀若眉帶黑色病傳入腎已絶旬日而死脾癇之狀喉如鋸鳴多睡不進乳口乾唇赤眼白多此病旦夕而死肝癇之為病青目反視手足搖心癇之為病面赤心下有熱短氣息微數脾癇之為病面黃腹大喜痢肺癇之為病面目白口沫出腎癇之為病面黑目正直視不搖如尸狀膈癇之為病目反四肢不舉腸癇之為病張口搖頭馬鳴欲反折牛癇之為病目正直視腹脹羊癇之為病喜揚目吐舌豬癇之為病喜吐沫犬癇之為病手屈拳攣雞癇之為病搖頭反折喜驚自搖又有烏癇唇口撮聚目手俱搖蛇癇身軟頭舉吐舌視人牛癇即牛聲馬癇即馬嘶狗癇即犬吠羊癇即羊鳴雞癇即雞鳴五癇病者腑臟相引邪氣盈起寒厥口吐沫須臾如蘇復作神效雄黃丸方與錢氏五色丸同但博濟水銀用八分耳元中記曰天下有女鳥一名姑獲又名釣鬼星也喜以陰雨夜過飛鳴徘徊人村裡呼得來也是鳥淳雌無雄不産喜落毛羽於中庭置入兒衣中便使兒作癇必死即化為其鬼也是以小兒生至十歲衣裳不可露也八月尤忌之癇有八候前曰僕後曰僵晝曰陽夜曰陰罵人曰顛笑人曰邪一日十數次發曰癇少年有此患曰呆蓋陽證不可用溫陰證不可用寒風癇則先為之散風驚則先為之利驚食癇則先為之消積總以定癇等劑主之若臟若腑一陰一陽是固不可無別大概血滯心竅邪氣在心積驚成癇通行心經調平心血順氣豁痰又其要也繼令小兒有熱有痰不欲乳哺眠睡不安常驚悸此皆發癇之漸也即以紫霜丸導之時間量與紫霜丸減其盛氣則無驚癇風癇瘹之患者癇喑不能言者南星炮為末雄豬膽汁調和少許啖之輒效錢氏五癇丸並南星散以菖蒲湯調下甘遂豬心湯以和蘇合香丸皆治癇之要藥也一切癇方返魂丹和濟方治小兒諸風癲癇潮熱發瘛瘲口眼相引項背強直牙關緊急目睛上視及諸病久虛變生虛風多睡昏困荏苒不解速宜服之當歸酒浸切焙微炒烏犀各二兩乾薑炒枳殼去根麩炒白朮酒浸一宿微炒人參去蘆木香不見火茯苓去皮丁香不見火厚朴去皮薑汁炙熟藁本去土天竺黃研細桑螵蛸微炒敗龜酒醋塗炙黃蔓荊子去白何首烏泔浸一宿煮過焙白芷虎骨酒浸炙令黃晚蠶蛾微炒縮砂仁各三分麻黃去根節麝香研羌活去蘆羚羊角炒各一兩半夏湯洗七次薑汁浸三宿焙乾炒黃川烏頭炮製白花蛇酒浸一宿炙令熟去皮骨用肉防風去蘆白殭蠶去絲咀微炒檳榔白附子微炒天南星湯洗生薑自然汁煮軟切焙炒黃藿香葉去土阿膠碎炒萆薢微炙肉桂去粗皮細辛去苗陳皮去穰微炒槐膠烏蛇酒浸一宿炙熟取肉用沉香不見火乾蠍微炙獨活去苗天麻酒浸切焙各一兩硃砂細研水飛石斛去根雄黃細研水飛肉豆蔻去殼微炒牛黃別研龍腦別研水銀附子水浸後炮去皮臍蟬殼去土微炒川芎各半兩烏鴉一個去嘴翅足膩粉別研一分狐肝三具臘月採取同烏鴉一個入新甕內以瓦盆蓋頭泥固濟炙火一斤燒令通赤煙盡出候冷研細用硫黃研細用瓷盞盛慢火養成汗入水銀急炒如膏泥成沙再研半兩金箔二十片為衣上如法修制搗研令細煉白蜜各和入酥再搗三五千下丸如梧桐子大每一歲兒一丸溫薄荷自然汁化下不計時候丹砂丸一各虎睛丸聖惠方治小兒一歲至十歲發癇成癲發動無時口吐白沫遺失大小便丹砂研天麻露蜂房微炙麻黃去節黃芩去黑心鉤藤各半兩甘草炙銼防葵炒大黃炒蚱蟬去頭足炙龍滷研梔子各一兩銀箔十片細研虎睛一對研羌活去蘆頭柴胡去苗白鮮皮升麻雷丸炒沙參各三分石膏研一兩一分蛇脫皮炙黃麝香研細辛去苗葉牛黃研各一分上搗研為末煉蜜為丸如緑豆大每服一歲兒三丸二歲至三歲五丸四歲至五歲七丸六歲至十歲十丸並用米飲下空心午間臨臥各一服一方無細辛大金箔丸幼幼新書治一切風及大人小兒諸癇解心胸壅熱消痰墜涎無時發動吐涎沫背強直神志昏憒金銀箔各一百片辰砂一兩研牛黃研生犀末丁香沉香真珠末木香腦麝各一分琥珀末硼砂烏蛇肉酒浸炙去皮骨天麻酒炙浸雄黃研蠍梢白殭蠶附子炮去皮臍天南星炮防風白附子甘草炙以上各一分香墨半兩燒上為細末入研藥一處勻合將金銀箔入水銀三分同研如泥再同研合勻煉蜜為丸如緑豆大每服大人五丸用薄荷酒下小兒三丸薄荷湯化下天烏散一名狐肝散幼幼新書治大人小兒一切風及久癇患病臘月烏鴉一隻去毛羽嘴爪腸胃臘月野狐肝一具同前烏鴉入稍子內固濟燒為灰麝香研天麻犀角屑各半兩乾蠍白殭蠶蟬殼牛黃研更炙益妙荊芥取穗藿香天南星去心白附子膩粉研桑螵蛸須用臘月摻取桑上者佳各一兩烏蛇二兩酒浸炙去皮骨上為末每服半錢煎荊芥湯或豆淋酒調下空心小兒用薄荷湯調下奪魂散永類鈐方定癇良方白殭蠶去絲炒令黃色半兩白附子炮蛇含石燒紅醋淬七八次研碎各一分生銀生金白茯苓牛黃如無以膽治倍加用之烏梢蛇頭七八寸許酒浸天麻各一錢天南星稱末一分生薑汁浸一宿用腦子半夏末二錢重薑汁浸一宿各焙赤腳蜈蚣一條酒浸炙令焦上為末蒸棗肉為丸如麻子大每服十丸至十五丸二十丸煎金錢薄荷湯下硃砂為衣一方加代赭石一分醋淬如欲利痰加巴霜煮枳殼一分議曰癇之為疾八是一種證候若言驚風所傳古人有謂食風驚三癇若言不幹驚風所傳古云驚風三發便為癇且癇為疾痰熱壅盛傳入經絡塞於心肺是致關竅不通故作癇疾發作有如驚風吊或因經而生痰多或因熱而作風盛大小便不利上下氣不通心神悶氣亂若死而復生生而復死沉沉默默無由蘇省忽爾氣透關竅漸得開通魂魄稍得安定向後心被觸惱氣不宣利發作如前是知癇之為疾乃由虛痰冷涎頑結於胸臆驚風並聚於關膈常無精神心志不寧即存恍惚療理不專藥服不投必自致害何足怪者即奪魂散方經效祕傳修合如法治人神驗豈非至寶之謂也麻黃五癇湯幼幼新書又療百日及過百日兒癇連發不醒及胎中帶風體冷麵青反張宜服麻黃去節二分嬰孺方用一分羌活乾葛甘草炙二分嬰孺方用一分半枳實麵炒二分嬰孺方用三分杏仁二十枚去皮碎並尖嬰孺方用四十枚升麻黃芩大黃各四分柴