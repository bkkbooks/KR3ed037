服之硝石丸幼幼新書治少小痞癖結積除癇止瀉硝石三分柴胡細辛當歸茯神芍藥甘遂各二分大黃十分黃芩巴豆三十粒去皮心炒牛黃別研葶藶子炒研各一分上為末蜜丸一歲服胡豆大二丸日一服以微利為度牛黃雀屎丸幼幼新書治小兒百二十癇諸變蒸腹中宿痞及飲食不節腹溫滿壯朝輕夕甚大小便不通胃氣弱脾冷使之牛黃芍藥甘草炙巴豆去心皮炒研別入各三分雀屎白炒乾薑當歸黃芩各二分大黃五分芎藭人參各四分黃耆一分面炒一分上為末蜜丸胡豆大一歲兒未食與二丸三二歲小豆大二丸日三不知稍加之微利為度常服大良初生兒及二日五日以上腹中滿口急不得取乳大小便不通兒胸中作聲者服半黍大一丸十日兒一黍大一丸若頭身發熱惕惕驚不安腹滿吐乳皆主之百日兒二丸及寒熱往來朝夕溫壯或身體熱痢久不斷青黃五色又已發癇及如欲戴眼但欲眼上或通夜轉急不得須臾息及傷寒飲食不消化吐逆皆主之小兒如耐藥不止二丸量兒大小服之無不瘥也五癇丸治小兒五癇驚悸狂叫發搐上盛涎潮等疾或尋常涎盛皂角去皮捶碎水三四升浸取汁濾過銀器重湯熬成膏白礬枯過細碎各四兩半夏洗七次上等辰砂研天南星炮各一兩蠍梢白殭蠶直者炒上等雄黃研白附子各半兩麝香研烏蛇酒浸去骨焙乾炒一兩蜈蚣大者一條去頭足酒浸炙上為末先用皂角膏子和末能就次用生薑汁煮糊為丸硃砂為衣小兒六七歲如緑豆大每服三四十粒三四歲二三十粒一二歲如麻子大一二十粒並用薄荷湯下生薑湯亦得陽癇防風散一名硃砂散治小兒身熱面赤急驚風痰涎壅盛上視牙關緊硬者陽癇也硃砂一分一研膩粉麝香各半錢蘆薈白附子甘草各二錢胡黃連一錢蠍梢七個白殭蠶十個炒金箔七片赤腳蜈蚣一條炒上為末二歲以上服半錢匕以金銀薄荷湯調下三歲以上一錢匕如口不開灌入鼻中一方無蠍梢陰癇附子散治小兒吐瀉或只吐不瀉日漸困面色白脾虛或冷不搐搦目微上視陰癇慢驚也服此祛風豁痰回陽正胃及治唇青面黑四肢逆冷黑附子生去皮臍生天南星半夏各二錢白附子一錢半上研細井花水浸七日每日換水浸訖控干入硃砂二錢麝香一錢拌勻每一字薄荷湯調下量兒加減一方用附子生去皮臍為末每服二錢以水一盞半生薑二片煎至半盞分三二服量兒加減或入丁香五個煎至乳空時服或用水浸炊餅為丸如粟米大每服二十粒亦可一方入全蠍末二錢甘草湯一名鉤藤湯治小兒諸癇掣瘲吐舌甘草炙銼鉤藤栝蔞根黃芩去黑皮獨活去蘆皮桂心去皮芍藥當歸切焙石膏碎各半兩蛇蛻六寸炙黃麻黃去節三錢上粗搗篩三五歲兒每服一錢匕水一盞煎至五分去滓熱服日三隨大小加減當歸湯治小兒諸癇當歸切焙龍骨研各半分甘草炙三分大黃銼炒芍藥細辛乾薑炮石膏碎桂去皮青石脂黃芩各二分上搗篩五歲兒每一錢水一小盞入棗二枚同煎至五分去滓分溫二服日三服後瀉者加赤石脂一分若有熱驚者加黃芩去黑心半兩隨兒大小加減化涎丸治諸癇胞絡涎盛宜常服此藥半夏一兩生薑拌浸一宿乾薑炮黃連桂心木香四味各半兩牛黃一分別研麝香一分別研硃砂一兩研細水飛巴豆十枚去皮心膜炒令黃研細上件為末次入研者藥一處拌勻滴水為丸黍米大每服三丸至五丸溫米飲或煎荊芥湯送下乳食後蚱蟬湯治小兒五十日發癇諸藥無效及初生百日內發癇者蚱蟬去翅足微炙芍藥各三分鉤藤細辛去苗葉黃芩去黑心黃耆銼甘草炙令赤各半兩牛黃研麝香大黃銼炒香一兩一分上搗篩入牛黃麝香拌勻每服半錢水半盞煎至三分去滓分溫二服連夜五六服隨兒大小加減斷癇丸治諸癇痰盛皂角盈尺者三錢去皮捶碎水三升浸取汁漉過煨器內熬成膏白礬煅枯研細一兩半南星濕紙炮熟一兩蠍梢炒白殭蠶炒雄黃研硃砂白附子各半兩麝香一錢別研烏蛇酒浸取肉焙乾炒一分赤蜈蚣一條去頭足酒浸炙上為末用水煮半夏糊和前項皂角膏為丸桐子大每服一丸生薑湯下一方無麝香全蠍五癇丸赤蜈蚣二條去頭足酒浸炙南星炮熟二分半麝全蠍防風硃砂細研遠志肉薑汁浸炒白附子生蘆薈延胡索各一錢金銀箔各三十片上為末入麝糕糊丸桐子大每服一丸菖蒲紫蘇煎湯調下金朱丹定一切癇赤蜈蚣大者一條去頭足酒浸炙烏蛇頭酒浸炙取肉延胡索生各一錢半白附子遠志薑汁浸一宿鐵粉透明防風全蠍焙天麻各一錢金銀箔各三十片天南星二錢半末姜浸一宿上為末以圓白半夏為稠糊入黃牛膽汁並腦麝少許和丸桐子大硃砂為衣每服二丸金銀器煎湯泡薄荷調下麝香雙丸治新生兒客忤中惡癇發乳哺不消中風反折撮口吐舌並㾏忤面青目下垂腹滿丁奚羸瘦脛交三歲不能行者麝香牛黃黃連各二兩桂心蜈蚣一條去頭足雄黃丹朱烏賊魚骨炙附子炮巴豆六十枚去皮炒特生礬石燒煉半日各一兩上別研巴豆如脂和末勻蜜和杵三千下瓷盒收勿泄氣十日至一月兒服一米百日至三百日兒服二麻子許以意增減兒雖小病甚者增大其丸不必依此小兒病率多耐藥服當汗出若不汗及不覺瘥一日一夜四五服以汗出及瘥為限為嬰兒中人亦為客忤婦人月水來未盡了觸兒子亦為客忤若喜失子産生輒死者而落地啼聲未絶便以指刮舌上當時銜血如薤葉者便與二丸米大一日一服七日乃止無不全也若不全合半劑當半劑者用巴豆三十個若三分合一者巴豆二十七個亦不隨余藥減其然者正以此為良耳若無赤頭足蜈蚣者足取赤者三條斷其頭並項後二節用之其餘不堪用也鐵精丸治少小心氣虛或可以發癇及未發安五臟定心氣鐵精黃芩芍藥芫花炒人參甘遂炙