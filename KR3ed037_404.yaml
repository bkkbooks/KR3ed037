body:
  text: 卷四百四嬰孩痘疹門瘡疹大小便不通附論瘡痘本因熱而出熱勢甚則其出愈難蓋熱盛則榮衛為之閉塞毒氣滋蔓里毒盛者大便不通小便如血表毒盛者或為癰瘡身上破裂此由不善解利之故救之之法宜犀角地黃湯小柴胡加生地黃湯四聖飲牛黃散紫雪之類可選而用之凡瘡痘盛出身熱煩渴腹脹而喘大小便澀面赤悶亂宜八正散四順飲不通用宣風散方利毒丸治小兒瘡疹欲出胃熱發溫壯氣粗腹滿大小便赤澀睡中驚煩渴口舌乾手足微冷多唾時嗽涎實脈沉大滑數便宜服之大黃半兩膩粉炒一錢大青一錢龍腦硃砂各半錢檳榔生牽牛取末各一錢半黃芩青黛各一錢一方作二錢上為細末麵糊為丸如黃米大每二歲兒服八丸生薑蜜水下不動再服量兒大小虛實加減川黃散治麩瘡及斑瘡大便不通川大黃銼碎微炒川芎各一兩甘草炙黃芩微炙枳殼麩炒去瓤各半兩上為末每服一錢水一小盞入紫草少許煎五分去滓溫服敗毒牛黃丹治瘡疹出定大便不通瘡出膿汁不幹真牛黃川大黃末各一兩粉霜真珠末各一兩上同研勻煉蜜為丸如黍米大每服十粒煎人參湯下大小加減棗變百祥丸治斑疹大便祕結紅芽大戟去滑一兩青州棗去核三十個上用水一碗同煎至水盡為度去大戟不用將棗焙乾可和作劑旋丸從少至多以利為度治小兒四五日不大便者用肥豬膘一塊白水淡煮切如豆大與兒食之令臟腑滋潤大便通利燈心散治瘡疹出後煩喘小便不利者燈心一把鱉甲二兩醋炙黃上㕮咀白水煎服量兒大小為劑五苓散治小兒小便赤澀五苓散加燈心十莖麥門冬去心車前子各半錢煎湯調又人參湯加枳殼去穰切少許治大便祕結內煩外熱未效更加四順清涼飲少許瘡疹倒靨附論凡痘瘡內虛不能出者謂之陷伏外感風寒或被惡氣沖觸而不得出者謂之倒靨然有始末輕重不同如斑點之始熱毒方運出亦有陷伏亦有倒靨若外感風寒肌竅閉塞血凝不行必身疼四肢微厥斑點不長或變黑色或青紫癮疹此為倒靨也宜溫肌發散如紫草蟬蛻人齒殭蠶紫背荷葉之類溫散寒邪然後熱氣復行而其斑出矣若胃虛而不能副榮衛者出而覆沒斑點白色或黑色其人必不能乳食大便自利或嘔或厥此胃虛而不能出謂之陷伏也宜用溫中之劑令其胃暖榮衛復行則當自出矣宜理中湯丁香煮散之類甚至薑附硫桂亦可用血疱為中者是紅斑出齊之後其狀如豆起於肌皮之上乃未結膿疱痂疕之前證也血疱七日當結膿窠痂疕當此或風寒乘襲而為倒靨或胃虛吐利而為陷伏者治之亦如前法又有房室等雜氣觸犯而然者當用豬甲蒼朮乳香胡荽等法熏解之良方腦子豬血酒治毒氣入臟而不出瘡黑陷而耳尻反熱者瘡痘惟腎無證以其不納穢故也當其發作之初及血疱之際一身俱熱而尻耳自涼此即腎之平證也蓋尻耳皆屬於腎今一旦黑陷是變壞歸腎使尻耳亦為之熱其證為大逆錢氏立論用百祥丸瀉膀胱謂腎邪既衰脾土復旺身熱氣溫欲飲水者可治以脾能勝腎寒去而溫熱也百祥丸之意即活人書論厥陰陽寒土敗木賊急用承氣湯皆是不得已而用之僥幸十救一二而已瘡黑有順者大凡黑靨陷伏本是逆證然亦有順者謂脾強可以勝腎雖黑靨而忽瀉膿血痂皮者為順此必舊服補脾藥故令脾氣得不衰毒雖入腹皆瀉出也經云脾病則五臟危今脾土既盛他悉無慮矣黑靨而逆者謂脾虛不能制腎乳食不消水穀雜下脾虛受毒四臟皆困而危殆然古人云病在腑者易治在臟者難治瘡黑乃變壞入臟雖得脾胃強盛是亦九死一生之證耳瘡痘黑靨有四證一感風二毒氣太盛毒復入里三內虛無陽氣以應之四房室雜氣等觸犯所得之因既不同用藥救療豈得不異感風寒則宜溫散毒氣盛宜利小便解毒內虛宜溫里觸犯宜熏解大抵黑陷而發寒者重不發寒者輕其證乃脾弱為腎所勝錢氏用百祥丸以瀉膀胱之毒令陽氣復還脾土溫暖所謂瀉膀胱之水必令脾土自勝也方大快斑丸治斑疹倒靨黑陷惡候辰砂一錢紫草茸半兩川升麻鉤藤鉤赤小豆各半兩甘草炒一錢川地龍去土焙三錢上為細末煉蜜為丸如櫻桃大硃砂為衣每服一丸石榴湯化下或用溫水與乳汁化下治瘡疹倒靨黑陷一名豬尾膏用小豬兒尾尖取血三五點研入生龍腦少許新水調下食後治小兒伏熱在心昏瞀不省或誤服熱藥搐搦冒昧不知人事瘡疹倒靨黑陷時疾發豌豆及赤瘡子未透心煩狂躁氣喘妄語或見鬼神用生梅花腦子一字或半字取新殺豬心一個用心中血同研作大丸同新汲水少許如未醒再服如瘡疹陷伏者再將溫酒化下食後一名龍腦膏用紫草湯化下豬血膏治小兒瘡痘欲出及陷伏者皆宜速治不爾毒氣入臟必致危困臘月用豬血取鉢盛挂當風處令乾上取半棗大以龍腦如大豆許酒調下蘇沈方云加緑豆粉半棗許同研病微者消之甚者發瘡出而安一家小女病傷寒腹疼極甚晝夜號哭手足厥冷數日漸加昏篤形證危惡是時例發痘瘡豫疑其為陷以此服之先不收此藥急就屠家買生豬血時當盛暑血至已敗惡無可奈何多以龍腦香灌之一服遂得少睡須臾發身熱瘡點遂安不爾幾至不救矣又方用黑狗糞曬乾為末用麝香酒調下百祥丸治瘡疹倒靨黑陷寒顫噤牙戛齒身黃紫腫三服不愈死一名南陽丸上紅牙大戟不以多少陰乾漿煮極軟去骨日中暴乾後內汁中煮汁盡焙乾為末水丸如粟米大每服一二十丸研赤脂麻湯調下吐利同無時一方以前藥為細末三歲兒抄半錢研脂麻湯調下尋常小兒睡中戛齒者是腎經風熱一是驚風入骨一服即效後與驚藥更不再服宣毒膏治毒氣盛瘡疹已出不快倒靨急服此藥曾經大效臘八日刺獖豬尾取血一升用新瓦盆盛好硃砂別研水飛乳香別研各一分甘草末馬牙硝別研各半兩腦子別研麝香別研各一分上修事畢用豬尾血拌和用一寬舊竹筒底下留一節入藥在內以紙數重系合於筒口邊通一竅以麻索子縛了垂側屋梁上至清明日取出曝乾更入腦麝各一錢研細滴水丸如皂子大每服量多少人參湯化下若毒盛瘡黑倒靨者服之即紅活再長神妙治瘡疹大便不固其豆漸黑陷面即宜服此嬰兒乳母同服人參白茯苓白朮肉豆蔻黃耆各半兩甘草炙二錢上㕮咀每服一錢水半盞生薑一片棗子半枚煎至三分去滓服乳母倍之若大瀉手足厥冷加附子用驗方治小兒斑疹黑陷方用臘月禿梟腦子或一個或二個以好酒浸調服若干者以好酒浸少時化開依上調服立效治瘡疹不透乾黑危困神效用柿楂子不以多少為細末每服二錢紫草酒調下小兒量大小加減徐徐進三兩服即紅活蘇韜光云其家纍世用此甚佳柿楂子圖經本草名棠梂子惟滁州者入藥治瘡疹黑陷鐵腳威靈仙為末一錢炒腦子一分上用溫水調下服之取下瘡痂為效治斑瘡倒靨方胡桃一個燒灰存性干胭脂三錢上研為極細末用胡荽煎酒每服調下一錢無時服之立效再蘇散治小兒被諸觸著瘡子毒氣入里瘡變黑色須臾不救急宜用此藥服之白礬熬令汁枯地龍去土炒各二錢半上為末每服半錢用獖豬尾上血如龍眼核大同新水少許調服日三服效一方用蘇合香丸用胡荽酒化服或焚熏人齒散治小兒倒靨出不快發斑俗名蛇皮痘及變黑寒顫戛齒一名退陷散人齒五枚燒灰存性麝香半字上用研為末分作三服溫酒調下不飲酒湯亦可一方細研酒調入獖豬尾血三五滴同服之或紫草升麻湯皆可小兒齒尤佳治瘡子出未透黑靨者用干猴楂子肉為末湯調服微有汗出不妨才覺紅卻醋煮黃顙魚食之魚去腸肚不去涎立紅活又黑陷口渴荔枝殼煎湯溫服立紅活治瘡痘倒靨不出牛蒡子半兩炒紫草一分上為細末每服一錢麝香少許溫酒調下不過三服立愈又方乾葛一錢銼胡荽五文上用無灰酒一壺煎濃汁令子母俱飲效治小兒一切斑瘡倒靨欲死者上用十二月八角兒窠七個用火煅成灰於鼻內吹之用葦筒兒盛藥吹入八角兒用石榴樹上的不要空的燒時用瓦甑兒盛著燒過大有神效又方用人中白臘月者最佳通風處以火煅成煤水調三五錢陷者自出又方蟬蛻末一錢龍腦皂角子大豬心血三皂角子大上研為膏酒泡紫草化下即身熱痘紅活周天散治瘡黑陷項強目直視腹脹喘急發搐及一切惡候蟬蛻五錢地龍一兩去土上為末小者半錢大者一錢研乳香湯調服連二服瘡出即愈神通散治瘡疹毒氣少大小便利倒伏不出生乾地黃炒乾地龍緊確者去土微炒各一兩以上搗羅為細末次用好硃砂一兩細研水飛上同拌勻每服一字煎胡荽酒少許同溫湯調下倍金散療小兒瘡疹倒靨黑色木賊子炒二兩神麯炒半兩虎杖花山果子和核各一兩上為粗末每服一錢水八分入荊芥七穗紫草十根煎至四分去滓溫服抵聖丸治小兒斑瘡不及出而反入者上取十二月老鴉左翅不計多少風中令乾辰日燒為灰用中等獖豬觜上刺血為丸如雞頭大每一丸取獖豬尾上血少許溫水同化下未效三兩時間更一服救生散治小兒瘡疹膿疱惡候危困陷下黑色獖豬血臘月內以新瓦罐子內盛挂於屋東山陰乾取末馬牙硝研各一兩硼砂硃砂牛黃腦麝各一錢上同研極細每二歲兒取一錢新汲水調下大便下惡物瘡疱紅色為度不效再服脫殼散用雞抱出殼子於新瓦上焙乾去膜取殼搗研為粉遇小兒斑瘡倒靨不出或臟腑糞黑頭瘡昏睡不醒用酒調一字塗兒唇上令兒舐或以酒調塗風池背上心前或熱湯調一字吃化斑散治小兒斑瘡石膏火煅或用濕紙裹炮令透為末或用泥團燒之取出去火毒為細末知母切片焙乾為細末上對等分熟水調一字服之或調塗唇上去頭疼除昏發泄瘡子此名膏母化斑散治小兒斑瘡此二方極妙然後方恐太涼治小兒瘡疹倒靨不出者人齒一枚燒灰研細赤小豆七枚為末上同作一服薄荷溫酒調下治小兒斑瘡倒靨並黑色者謂之鬼瘡子初出壯光忽然黑陷心煩性燥氣喘妄語或見鬼神並宜速治不然毒氣入臟必死用人齒不拘多少炭火燒灰研細獖豬尾血調下二錢移時再服一方酒調下又方赤馬糞乾者白礬各一兩上入甘鍋子內以礬在下用泥固濟牢固用炭火三斤煅以火盡為度候冷取出細研入腦麝各一字再研勻十歲以下半錢匕十歲以上一錢匕芫荽酒調下更看冷熱加減治瘡子倒靨方用臘月中大糞燒灰為末入生龍腦少許細研每服半錢新水下治大人小兒瘡子倒靨方白花蛇連骨一兩慢火炙令乾勿焦大丁香二十一粒上為末大人每服一大錢小兒半錢以水解淡酒調下如黑搐者服之移時重紅生如聖治瘡子倒靨方用橄欖子核中截斷水磨少許服立發麻黃湯治斑瘡倒靨用麻黃三十寸去節蜜炒令香紫色為度水一盞煎至六分服余得此方後往知袞州仙源縣值工筆李用之子斑瘡倒靨已至危困投此藥一服瘡子便出其應如神未至胃爛便血者皆可治一法用無灰酒煎治瘡子倒靨用濕生蟲不計多少焙乾為末酒調下一字加味宣風散治腎虛證瘡疹變黑雞心檳榔二個陳皮去白青皮去瓤甘草炙各二錢半黑牽牛二兩半生半炒熟上為末蜜湯調下氣怯者加南木香一錢先下黑糞次下褐糞後以四君子湯加厚朴木香陳米湯服和胃良久糞黃瘡自微出又以胡荽煎酒服其身即發起獨聖散治疹瘡陷入不發黑色而氣欲絶服此漸蘇紅潤用穿山甲湯洗淨炒令焦黃為末每服半錢入麝香少許南木香煎湯調下一方蔥白煎湯調下或紫草煎湯入紅酒少許服之一方用麝香當門子少許每一歲半錢三歲一錢只溫酒調下一服見效雖遍身黑欲絶亦能漸蘇而發紅但目閉無魂者不復生矣靈砂酒治疹瘡黑陷不起用靈砂以好酒磨化三五粒服之效紫雪湯治小兒瘡疹倒靨紫草茸地龍去土等分上為粗末每服二錢用水酒共七分煎至四分去滓溫服丁香散治小兒瘡疹倒靨黑色及出不快丁香鹿肉乾者各半兩紫草一分上為細散每服二錢酒一盞入麝香少許煎至半盞放冷灌之如人行三二里再服立發紅色通神散治小兒瘡痘蓄伏黑陷雄黃通明者研水飛麝香用上當門子為末各半錢上同研細只作一劑一歲兒作三服溫酒調下治小兒瘡子倒靨陷方白殭蠶蟬殼去土等分上為粗末水一盞半煎至半盞去滓分作二服微熱服立出黑金散治小兒瘡子黑陷不出豬懸蹄甲半兩蛇蛻皮三條鯪鯉甲一分蝟皮一枚鴉翅一對蛤粉一分上六味都入在磁瓶內用鹽泥固濟燒一宿研為細散一二歲兒每服半錢豬尾血溫湯調下不出再服再生散治小兒瘡疱正出忽變紫色或作黑陷喘急神昏人齒五枚燒灰蠍蜥尾五條燒灰上件研勻每服半錢溫酒或煎蔥白湯調下不拘時服治小兒瘡痘作變惡證皆可人參一錢茯苓一錢紫草一錢木香半錢附子三片上為㕮咀生薑三片棗一枚水煎服神聖丸治小兒瘡疹黑陷倒靨服之速效無椒鹽𩚫餅一個去皮上用臘月活兔兒取血就和𩚫餅搗三四百下丸如梧桐子大每服三五丸好酒化下不拘時候若咽下咽喉須臾發瘡疹紅活大有神效發斑紫草散紫草甘草糯米亢云此味極好助胃氣黃耆等分上為末水煎服辛亥樵隱孫先出麻疹又發痘瘡黑陷亢拱辰出此方愈亢云錢氏紫草散有枳殼難服瘡疹發斑附論夫小兒斑毒之病者是熱氣入於胃也而胃主肌肉其熱氣夾毒蘊積於胃毒氣熏發於肌肉狀如蚊蚤所齧赤斑遍體此病或是傷寒或時氣或溫病此風熱不時故熱入於胃變成此毒乃發斑也凡發赤斑者五生一死黑者十死一生也楊氏曰或陽證而誤投溫藥或當汗不汗當下不下或汗下未解陽熱內盛蒸溽外迫熱毒入胃或胃寒毒至春始發或冬暖又受乖戾之氣至天氣暄熱始作皆能發斑蓋熱必傷血血熱不散裡實表虛以致熱氣虛出於皮膚輕則如疹子重則如錦紋謹勿妄汗汗之重令開泄瘡爛凡斑若見急宜早治日子稍延獨陽絶陽不可救治斑之方萌與蚊迹相似凡發斑之證必內外熱熾胃爛難救矣或如錦紋起如餅搭者難治若初發色紅漸次黯黑面色黧黑及初發便如黑痣不治紅斑五生一死黑斑十死一生蓋發斑者皆陽毒盛而陰脈伏或大便自利或氣短燥糞久不通皆危證也發斑多在胸腰間關前陽脈洪大病人昏瞶先紅後赤者斑也蚊迹多在手足之間關脈不洪病人自靜先紅後黃是也楊氏治法通用升麻葛根湯敗毒散犀角地黃湯熱盛玄參升麻湯生薑烏梅煎黃連一物湯米煎熱病發斑時氣發斑大青四物湯黑膏大熱可下少與調胃承氣湯孫兆用白虎加人參湯血熱內結小柴胡湯須用紫草川芎倍加生地黃為佐方犀角散治小兒陽毒壅盛發斑心躁皮膚焮痛犀角屑半兩川升麻半兩白鮮皮半兩梔子仁半兩漏蘆半兩寒水石一兩川大黃半兩炒銼甘草半兩炙赤芍藥半兩上為散每服一錢以水一小盞煎至五分去滓不計時量兒大小加減服之大青散治小兒熱毒發斑不止心神煩悶大青半兩玄參半兩川升麻半兩梔子仁半兩川大黃半兩炒甘草半兩炙銼上件為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減服之大黃散治小兒斑瘡大便壅滯宜服川大黃半兩銼炒甘草半兩炙黃芩半兩枳殼半兩麩炒黃上件為末不計時候以新汲水調下一錢三歲以下可服半錢又方犀角屑一分川升麻一分川大黃半兩炒甘草半分炙上為散每服一錢以水一小盞煎至五分去滓量兒大小加減服之葛根橘皮湯治溫毒發斑爛癮疹如錦紋或咳心悶但嘔清汁知母甘草麻黃杏仁葛根橘皮黃芩各半兩上㕮咀每服五錢水一盞煎至六分量大小溫服玄參升麻湯治傷寒毒氣不散表虛里實熱發於外身斑如錦紋甚者煩燥兼治喉閉腫痛玄參升麻甘草各半兩上㕮咀每服五錢水一盞煎至七分量兒大小服之調胃承氣湯治熱留胃中發斑及服熱藥過多亦發斑此藥亦主之大黃芒硝甘草各等分上用水盞半先煎大黃甘草薑三片煎至六分後入硝煎去滓溫服紫草散發斑疹鉤藤鉤子紫草茸各等分上為細末每服一字或半錢溫酒調下無時黑膏治溫毒發斑豆豉一合生地黃四兩切上用豬脂半斤合和露之煎令三分取二絞去滓再入雄黃麝末攪和量大小服之其毒從皮膚中出則愈忌蕪荑治小兒發斑散惡毒氣用葵菜葉絞取汁少少與服之治斑瘡用屋上爛茅和醬汁研敷之治小兒斑瘡及痘瘡心躁眠臥不安用川升麻不計多少細銼水一盞煎去滓取汁以綿霑汁洗拭瘡瘢上千金散治小兒發斑瘡用石榴葉不拘多少為散每服一字或半錢溫水調下發斑藥用珠子七個研碎用新水調勻服之瘡痘攻咽喉附論夫瘡痘攻咽喉者心胃有熱上攻於咽乾澀而疼如兼口舌生瘡齒浮齦腫者宜甘露飲水漿不下者紫雪最妙如神湯抱龍丸消毒飲皆可選而用之方神仙紫雪治大人小兒一切熱毒胃熱發斑消豆疱麩疹及傷寒熱入胃發斑並小兒驚癇涎厥走馬急疳熱疳黃瘦喉痺腫痛及瘡疹毒攻咽喉水漿不下黃金一百兩寒水石石膏各三斤犀角羚羊角各十兩屑玄參一斤沉香木香丁香各五兩甘草八兩升麻六兩皆㕮咀上以水五斗煮金至三斗去金不用入諸藥再煎至一斗濾去滓投上好芒硝二斤半微火煎以柳木篦攪勿停手候欲凝入盆中更下研硃砂真麝香各三兩急攪勻候冷貯於密器中勿令見風每服一錢溫水化下小兒半錢一字咽喉危急捻少許乾咽之地黃丸治小兒瘡疹口瘡咽喉腫痛牙疳臭爛天門冬麥門冬玄參各三兩甘草薄荷葉各一兩上為細末熬生地黃汁和丸櫻桃大每服一丸溫蜜水化服甘草桔梗升麻湯治小兒斑出欲透皮膚身熱咽喉不利甘草半兩桔梗一兩升麻半兩上銼細末每服二錢水煎桔梗甘草防風湯治小兒疹子出已發熱咳嗽或口舌生瘡咽乾壯熱飲水咳嗽痰涎不利服之無不愈者桔梗甘草炙防風各等分上為粗散每服三錢水一大盞煎至六分去滓溫服不拘時候量大小加減服甘露飲子治心胃熱咽痛口舌生瘡並瘡疹已發未發並可服之又治熱氣上攻牙齦腫牙齒動搖兼大便祕甘草銼炒山茵陳葉石斛去苗枇杷葉去毛枳殼麩炒去瓤黃芩去心生熟乾地黃焙稱天麥門冬去心焙稱上各等分為粗末每服二錢水一盞煎至八分食後溫服牙齒動搖齦腫熱含漱泄並服一方無枇杷葉如聖湯治小兒瘡疹毒攻咽喉腫痛及咽嗌口舌生瘡不能吮乳一名如聖麥門冬散桔梗甘草生牛蒡子炒各一兩麥門冬去心半兩上為細末每服二錢沸湯點細細呷服入竹葉煎尤妙一方加荊芥防風重者入竹瀝煎兒小乳母無孕者亦可服紫河車散療小兒斑瘡毒氣不解攻咽喉音聲不出舌頰生瘡渴逆煩悶潮熱面赤紫河車茜草根貫衆各一兩芍藥甘草炙各半兩上為粗末每服一錢水七分生薑二片煎至四分去滓溫服之一方加菜子一兩鼠黏子湯治小兒痘瘡收靨者身熱大便堅實口舌生瘡咽喉腫痛此是餘毒未散又名消毒飲鼠黏子一兩微炒甘草川升麻荊芥防風各二錢半上㕮咀每服三錢水一盞煎至六分量大小加減服解毒防風湯防風一兩地骨皮黃耆芍藥荊芥枳殼鼠黏子各半兩上為粗末每服四五錢水煎服桔梗湯如斑已出只時時與服之快咽喉寬利胸膈桔梗二錢生甘草一錢上㕮咀作一服水二盞煎一盞不拘時候服之如見傷食證又見斑證先於不犯大黃巴豆藥克化過再與升麻湯如食重傷前藥不能過再與犯大黃巴豆藥過之牛蒡散治小兒斑瘡及疹痘未出一切毒瘡咽喉腫痛涼膈去痰牛蒡子一兩炒荊芥二兩半白芷半兩全蠍三錢甘草三錢炙防風半兩上為末水七分煎服如大便自利者不宜服此治痘瘡後餘毒上攻咽喉閉塞語聲不出用蛇退不拘多少麻油燈上燒存性碾為細末以砂糖拌和捻作餅子嚼下瘡疹吐利附論凡痘瘡正出吐泄不食忽憎寒戛齒者瘡必黑陷喉中涎喘蓋兒先受風冷血氣虛弱即變此證難治多死宜用益黃散甚者金液丹並食前服若吐泄定後思食證平復方可用發瘡痘藥設或妄投亦必生癰腫也方一證紅斑方出胃虛吐利或傷涼藥侵損脾胃虛弱不食陷而不出宜用溫里之劑理中湯重者薑附靈砂大抵用藥或冷或熱隨證輕重以救一時之急不可拘以常法又不可太過也理中湯人參去蘆白朮白薑炮甘草炙各等分上銼薑棗煎重者加炮附子或稟受怯弱脾胃虛冷大便自利手足厥冷宜理中湯益黃散輩可救里溫出也胃愛散調理小兒脾虛吐瀉如斑瘡未出醫人不識形候便將冷藥冰卻瘡子致令內伏不出將此胃愛散調理如身體汗即不用控心散發也如無汗出即用控心散發之後下羌活散與胃愛散糯米一兩干淡木瓜三分甘草一分藿香葉紫蘇葉各一分丁香二十五粒以上六味一處同炒焦黃為度上件藥同一處令乾碾為細末每服一錢半錢煎粟米棗子湯調下量兒大小為劑紫草木香湯治瘡出不快大便泄利紫草木香茯苓白朮甘草炒各等分上銼散每服二錢水一盞煎加糯米三十粒煎溫服蓋紫草能利大便木香白朮所以佐之也肉豆蔻丸治痘瘡已出泄瀉發渴水穀不化或瀉或澀或瀉淡黃色者致令瘡痘難出難靨非特痘瘡一證其餘藏寒泄痢尤宜服之木香半兩縮砂仁三錢白龍骨半兩訶子肉半兩赤石脂七錢半枯白礬七錢半肉豆蔻半兩上為細末稠麵糊為丸如黍米大一周歲兒每服三五十丸三歲兒服百丸溫米飲下瀉甚者異功散吞下瀉止住服不止多服一方或瀉水穀白色淡黃色木香散下五味木香丸治瘡疹初出一日至七日如瀉一二行者便可服木香半兩白龍骨訶子肉赤石脂各半兩肉豆蔻二錢半上為細末麵糊丸如黍米大一周歲兒服三五十丸三歲兒服百丸溫米飲湯下日三服不拘時候三服不止者難救如瀉米穀者即難治之證瘡疹入眼附論凡痘瘡欲出先攻目赤腫不開次出瘡痘不甚紅活有痰者設有安者須損眼目宜以調肝散護目生銀丸並珍珠丸化痰更宜對證用藥也瘡痘盛出熱毒氣攻則斑瘡入眼多食毒物亦爾若覺眼腫或赤痛多淚時時與開看睛無瘡即不害若有瘡赤腫者宜用四順飲每日食後一服常令微利毒消平愈不爾害目幼幼新書云龍木論治小兒斑瘡入眼外障初患時覺瘡入眼中即須將息慎忌若不忌口將息即便疼痛淚出赤澀怕日難開腫便翳如銀色此為熱氣在肝上衝入眼肝膈壅毒致成障翳宜用秦皮湯洗之然後服涼肝丸亦不宜鐮洗出血點藥挑撥疼痛定後即點退翳藥亦得立效惠濟論小兒斑瘡入眼候歌斑痘才生眼不開淚流頻有熱橫腮如桃腫赤如錐痛此疾應知奔眼來因與毒餐同熱面或因雞鴨與鵝災急交製造威靈散百日無逾尚可回小兒疹痘初發便令煎油泄散子之類令兒看之每哺兒切忌醬醋五味馬牛雞鵝野味等物止令食淡熟豬肉淡粥飯餅餌之類不能久食淡入少鹽無害又於侵晨人未起時抱兒於井上令自投緑豆七粒於井中云使兒斑瘡不入眼又小兒瘡疹若食熟雞鴨等卵未有不損眼目者雖瘡疹已可尚宜數月勿食方調肝散治痘瘡熱毒大盛令不入目犀角如無以升麻代之大黃銼炒桑白皮鉤藤甘草炙各五錢天花粉石膏煅黃芩木通荊芥防風牛蒡子炒紫草陳皮去白龍膽草去蘆各二錢上銼白水煎食後溫服雞翎散治小兒斑瘡入眼輕粉半錢粉霜一錢上同研地上用炭火三兩塊傾在火上急以碗蓋之頻頻揭碗看才候無煙生即住揭用雞翎掃碗內水銀作一處是一服如人患左眼傾入左耳內患右眼傾入右耳內所患眼便開得其瘡自愈仙靈脾散治斑瘡入眼仙靈皮威靈仙各等分上為末食後米飲調下量兒大小用之黃蘗膏治小兒疹痘出後即須愛護面目勿令沾染欲用胡荽酒噴時先用此方塗面上然後方可噴四肢大人嬰孩有此疾悉用之黃蘗一兩緑豆一兩半甘草四兩生用上為末再研令細後以生麻油調如薄膏從耳前眼唇並厚塗日二五遍上塗面後可用胡荽酒噴早用此方塗於面上令不生疹痘如用此方塗遲縱出疹痘亦少諸家方愛護面目者皆用此方治療分兩用法皆同惟疹痘論用緑豆粉三兩半芥子膏治瘡痘令不入眼用白芥子為末水調敷足心熱毒歸下淨心散治痘瘡出盡便宜服之如入眼即自退蛇退一條燒灰甘草五錢銼為末不蛀皂角五定燒灰上研勻小兒半錢熟水調服治大人小兒瘡疹出護眼目上才覺患以鹽花少許湯浸了令溫洗兩眼晝夕可三兩度大人以指搵鹽花水點眼內旋以帛子拭之初用眼即多痛用三上後即不覺痛不計大人小兒或患欲退時眼內有餘熱者亦宜用此法洗點治瘡疹入眼馬屁勃半兩皂角子十四粒蛇皮半兩上入小罐子內鹽泥固濟燒存性研細溫酒調下三錢食後服蛇皮散治瘡疹入眼成翳一名子肝散栝蔞根半兩蛇皮二錢上為細末羊子肝一個批開入藥末二錢麻線纏定米泔煮熟頻與食之未能食肝與乳母多食如少小未能食即羊肝令熟研和為丸如黃米大以米泔下十丸或乳頭上與亦可日三服又方仙退散治證與前同用蟬殼末水煎羊子肝湯調服二三錢凡痘瘡才欲著痂用酥或面香油不住潤之可揭則揭去若不潤及遲揭瘡痂硬即隱瘢痕蟬蛻散治斑瘡如入眼半年已後者一月取效豬懸蹄甲二兩入罐內鹽泥固濟燒存性蟬蛻去土用末一兩上為末入羚羊角細末一分令勻每服一字百日外兒半錢三歲以上一二錢溫水或新汲水調下日三四夜一二食後服一年以外難治孝忠傾守官江南每置羚羊角輒得山羊角正如石膏寒水石之相易也羚羊角纖細而節紋極密京師僦馬人多用以馬銜鐵是也山羊角粗長又節紋稀當是京師用為正一方用豬肝湯調下穀精草散治小兒痘瘡已靨眼目翳膜遮障瞳人癮澀淚出久而不退者餘毒熏蒸眼目或因誤食煎煿熱物所致穀精草一兩生蛤粉二兩上為細末獖豬肝一葉用竹刀批作片子摻藥在內用草繩縛定以磁器內貯米泔一碗慢火煮熟令兒食之一方臨睡細嚼卻用原煮米泔送下忌一切毒物等項一方用豬肝煮熟入磁瓶內熏眼卻服之一方用青竹葉十片同煎熏服一方用生黑豆皮二錢決明散一名瓜蔞散治小兒瘡痘入眼決明子赤芍藥甘草炙各一分瓜蔞根半兩上為末三歲半錢蜜水調下食後日進三服效撥明散一名撥雲散治小兒瘡痘入眼生翳用桑螵蛸真者一兩炙令焦為末麝香少許和劑三歲半錢米泔湯調下食後通聖散一名豆皮飲治小兒瘡痘入眼及生翳障白菊花緑豆皮穀精草去根各一兩上為末三歲一錢乾柿一個生粟米泔一盞共一處煎候米泔盡只將乾柿去核食之不拘時一日可三枚五七日可救遠者半月餘效一方有夜明砂一兩又名白菊花散浮萍散治小兒患豌豆瘡入眼疼痛恐傷目用浮萍草陰乾為末三歲一錢羊肝一片入盞內杖子刺碎爛入沸湯半盞絞汁調下食後三兩服立效一方投水半合甚者一服瘥傷目者十服瘥一方用羊子肝又治陰囊腫色如琉璃三歲一錢蔥白湯調下兔肝丸治小兒斑瘡入眼雖赤白障遮交眼睛但得瞳子不陷皆可治黃蘗去皮石決明生用蒼朮各半兩上為末兔肝丸如小豆大三歲三十丸米湯下食後服涼肝丸防風二兩人參赤茯苓各一兩半黃芩茺蔚子黑參大黃知母各一兩上為末蜜丸緑豆大食後茶下量兒大小為劑秦皮湯秦皮二兩秦艽細辛防風各一兩甘草半兩上白水煎淋洗威靈仙散治小兒斑瘡雀目眼生翳障遮睛威靈仙仙靈脾甘草赤茯苓子苓青葙子大青赤芍藥大黃各等分上為末羊肝摻藥篛葉麻皮纏縛米泔煮熟放冷吃量兒大小用之一方用獖豬膽二個批開摻藥在內金華散治痘瘡入眼昏暗翳膜遮障黃連菊花枸杞子各一兩甘草三分牛蒡子半兩上為末薄荷湯調食後服量兒大小用之明目除昏暗退翳膜常服大效治小兒出瘡疹眼內有云翳輕粉黃丹各等分上將竹筒吹在耳內左眼有翳吹在右耳右眼有翳吹在左耳即退透耳藥治斑疹入眼硃砂一錢粉霜八分上研為極細末水調少許用銅杓頭傾一兩點於耳內後用前通聖散治小兒斑瘡入眼硃砂腦子水銀麝香以上各等分上為細末用水銀調滴入耳中治瘡疹入眼上法候瘡疹安後以兔屎焙乾為末茶清下頻頻服即安仍治昏翳羌蟬散一名羌菊散治小兒瘡疹後毒氣不散生翳障睛並治暴赤眼疼痛生翳遮障羞明羌活蟬蛻去足翼土防風蛇退菊花穀精草木賊甘草梔子白蒺藜大黃黃連沙苑蒺藜各半兩上為末每服半錢或一錢白湯調下或米泔調下護目膏一名黃蘗膏治小兒痘瘡入眼內及截斑毒或瘡痘後熱毒壅盛眼目障翳或瘡痘入眼而生翳者黃蘗一兩緑豆粉一兩半甘草四兩生用紅花二兩上為末生芝麻清油調塗兩眼外四畔頻塗之面上不生瘡疹若塗此藥瘡痘以少或胭脂敷之亦可若用胡荽酒尤能護目決明丸治小兒斑瘡入眼雖赤白障翳遮漫黑睛但得瞳子不陷者皆可治之石決明煅川芎黃蘗各一兩蒼朮半兩米泔浸上為細末用兔肝或無以羯羊肝代之研爛搜和丸如緑豆大每服三十丸食後臨臥米泔下治痘瘡入眼用穀精草煮白柿吃仍用緑豆根燒灰淋溓以上面澄清者洗下面濃者服之七退散治痘瘡後眼生翳雄雞腳粗黃皮鵝腳黃皮抱雞子殼人指爪蟬蛻豬後腳懸爪不點地者羚羊角上焙乾或日乾為細末煎羌活湯調下羊肝散治小兒痘瘡入眼及無辜氣入眼密蒙花三兩青葙子決明子車前子各一兩上為細末各別收之每取密蒙花末三錢余藥各一錢拌勻用羊肝一大片薄批摻上濕紙裹煨熟量多少空心食之一名密蒙花散治瘡入眼用局方洗心散洗肝散加乾柿菊花穀精草緑豆殼同煎嚼生蔥薄荷食後服養生必用治目暴赤腫痛小兒斑瘡入眼麻子炒香蔓菁子絹袋盛飯上蒸熟取出焙乾炒令香甘草炙木賊去節各等分上為末沸湯點一錢食後服日三決明丹治疹痘瘡後毒氣入眼決明子密蒙花各一兩青葙子車前子川黃連去須羚羊角屑各半兩上為細末煮羊肝一具切破同諸藥搗一二百下丸如黍米大每服十粒荊芥湯下乳食後量兒大小加減蕤仁散蕤仁去皮炙黃芩梔子仁黃連黃蘗皮川升麻甘草炙各一兩上為細末每服二錢用水一盞煎至六分去滓食後溫服量兒大小加減如生翳障重者兼密蒙花散密蒙花散治疹痘瘡並諸毒氣入眼昏生翳膜密蒙花三兩別為末井泉石青葙子決明子車前子各一兩上為細末密蒙花散半錢末與蕤仁散半錢相和合羊肝一片切破摻藥末在肝內濕紙裹火煨令熟空心量力服翳膜退即止泉石散治小兒風熱攻眼及斑瘡入眼井泉石先為末再研水飛蟬殼蛇皮甘草三味炙以上各一兩上為末每服半錢至一錢蜜水調下忌油膩羚羊角丸治眼昏澀赤脈侵睛淚多或作翳障羚羊角屑黃芩大黃芥菜子各二錢半當歸玄參甘草炙木賊蟬殼去足珍珠末一作硃砂決明子炒各半兩荊芥穗川白芷蒼朮用米泔汁浸一宿焙乾各二兩羌活一兩上為末煉蜜為丸如彈子大每服一丸食後用荊芥茶湯嚼下小兒斑瘡入眼看兒大小加減用蟬殼湯化下食後服治孩子痘瘡入眼蕤仁桃仁杏仁各七個去皮尖用膩粉龍腦硇砂牙硝各一錢研極細上用白沙蜜調末炙三次收之每用一粟米許點之立效治小兒斑瘡入眼黃連甘菊花密蒙花各半兩蛇皮一條燒灰存性甘草炙一分上為散煉蜜丸如緑豆大冷緑豆湯下五丸十丸加減用蛇退散治小兒斑瘡入眼蛇蛻皮馬屁勃皂角不蛀者穀精草上各等分同入瓦藏瓶內用鹽泥固濟木炭火燒令通赤於地坑子內出火毒候冷取出細研為末每服一字溫米泔調下樺皮散治小兒斑瘡入眼及裹黑睛樺皮頭髮蛇蛻皮各半兩上細銼淨器內點火燒之候煙盡研細每服半錢煎黑豆湯入酒三滴調下日五服又方用蠶砂燒灰為末每服一錢以米泔研生緑豆七粒調下每夜一服病去即止治斑瘡入眼方用黃芩為末臘月內黃牛膽內就吊於北陰中旋丸緑豆大曲湯下五丸只一服退隔年者三服至五服三年外者不醫治小兒瘡疹入眼方地骨皮鹽豉等分於新瓦上炙上為末服一錢陳粟米飲調下日三服神效治小兒斑瘡入眼用生鱔魚以針刺血貯器內點入眼即愈甚佳治斑瘡入眼方斑瘡入眼莫尋常熱氣流來到此方鶴頂一膏能取效時間病退號醫王黃芩散謂塗藥如鶴頂黃芩山梔子黃丹各等分上為末用牛蒡子葉杵汁調塗在頂門蟬蛻散治斑瘡翳障眼不見光明宜服之如睛爆破不可醫蟬蛻去土蛇皮炙川升麻洗蒺藜炒去角黃連炒穀精草大青草仙靈脾威靈仙井泉石各半兩硃砂研螺粉各一分上為細末每服半錢或一錢蜜水調下大人小兒加減服甘菊花散治小兒斑瘡入眼甘菊花穀精草石決明各等分上為末每服二錢水一盞入乾柿一個同煎至七分乾柿細嚼服治小兒目中痘瘡成翳方大黃炒為末挑二錢水銀半錢上用男子人津唾化水銀為泥次入大黃末方入冷水調塗囟上如干用水濕之極效治痘瘡入眼腫痛不可開黑靨不出用斷續即蟬蛻為細末以薄荷汁調敷一二次便能開若瘡黑靨不出溫熱水調下一二錢即出乳母服亦可凡小兒初患痘瘡先用胭脂塗眼令瘡不入眼中不得洗面生水入眼即損眼治眼諸翳昏風癢方用真杏仁三五七粒水浸去皮尖細嚼和津液吞五更端坐常服杏仁潤肝去塵滓也加減四物湯治斑瘡入目或瘡痘收後當歸尾芍藥川芎蒼朮白菊花乾葛羌活各等分上銼散每服水一盞藥末二錢入生地黃少許捶碎同煎至半盞量兒大小服之乳食後服忌一切動風毒物雖愈後忌三二日方可蟬菊散治斑瘡入目或病後生翳障蟬蛻淨洗去塵土白菊花各等分上銼散每服二錢水一盞入蜜少許煎乳食後量兒大小與之屢驗洗方用黃連去須白滑石銅青用絹帛包泡湯候溫洗塞耳丹治疹瘡入眼用水銀一錢虢丹五錢同丸作六丸入熔銀鍋中圓瓦上蓋濕紙糊護定用香爐盛灰燒一日後取出以薄綿裹之疹瘡在右則塞左耳在左則塞右耳立見墜下瀉青丸海藏云東垣先生治斑後風熱毒翳膜氣暈遮睛以此劑瀉之大效初覺易治補肝丸四物湯內加防風羌活等分為細末煉蜜為丸是也鎮肝散瀉青丸去梔子大黃治肝虛治小兒痘疹後眼生翳膜用淨洗手用磁片刮指甲屑焙令燥研細成末點如麻子大入翳上兩日間自落極妙透關散治小兒斑瘡初作眼患痛澀羞明怕日出淚頻多或已覺漸成白翳子宜用神效用蓽澄茄不拘多少為細末每以少許吹入鼻中於食後頻頻吹之諸證皆可用之大效點明膏治斑瘡眼患只在百日內治之容易久即氣定難以療理用掘取土中覆盆根處處有生路傍柱高五七尺者淨洗搗取粉澄濾令細日乾每用蜜和以少許點白丁上令其自消自散日二三次點用驗治小兒斑瘡入眼用麩炒蒺藜炙甘草羌活防風等分搗每服二錢漿水下撥雲見日直到老柴胡散治眼胞患斑瘡熱沖透睛中疼痛淚出翳如銀片腫澀難開柴胡黃芩芍藥各半兩甘草一分上銼散每服三錢水一盞煎大人小兒加減服兼以藥洗之治小兒痘瘡後眼上生膜威靈仙仙靈脾川芎等分上為末用不下水豬肝薄批片子撒藥末於上卷之用麻線縛之如此數卷碗內盛飯上蒸熟去線令兒吃之自然落下奇犀散治小兒斑瘡痘毒入眼但不枯破其餘證候悉治之半月即愈瘡子安後服此藥清肝膈永遠無疾證犀角鎊薄荷子如無以葉代之羌活麻黃去節木賊去節各九錢石決明赤芍藥甘草白蒺藜炒去刺瓜蔞根各一分人參去蘆九錢羚羊角鎊九錢上為細末每服一錢或半錢小兒蜜湯大人茶清調下夜臥食後服決明散治小兒斑瘡熱毒攻肝上衝目遂生障翳寒水石火煅通赤取出地上去火毒甘草生用各一兩坯子胭脂一錢上為細末每服半錢用生米泔水調下乳食後消翳丸治小兒斑瘡入眼生障翳硃砂研指甲末不拘男女先以水淨洗指甲拭乾用木賊草搽取細末上等分再同研令極細以露水搜和丸如芥子大每用一粒於夜臥時以新筆蘸水點在眼內至中夜更點一粒撥雲散治瘡入眼羌活去蘆防風甘草炒柴胡各等分上為細末每服二錢水一中盞煎至七分食後臨睡服忌藏鹽鮓醬濕面火上炙煿發風毒等物密蒙花散治如前密蒙花揀洗羌活去蘆菊花去枝梗並土石決明鹽同東流水煮一沸時漉出搗碎如粉杜蒺藜炒去尖木賊去根節上等分為細末每服一錢臘茶清調下食後日二服烏豆麥門冬湯治瘡痘眼目赤腫癮澀疼痛淚出羞明烏豆小者二兩麥門冬去心一兩上二味用水三升同煮令烏豆爛熟為度將藥湯放溫時時抄與兒服乳母吃烏豆麥門冬如三五歲兒可令嚼吃如烏睛突高者難治蒼朮散治斑瘡入眼蒼朮一兩槐花藁本蛇退防風枸杞白蒺藜各二錢黃芩川芎各半兩木賊甘草白菊花各二錢蟬蛻四錢乳香沒藥各半錢硬石膏煅半兩乾葛一兩上件為細末用白水煎食後加穀精草三錢半尤妙菊花散治痘瘡入眼白菊花三兩緑豆殼密蒙花旋覆花穀精草甘草各一兩上為㕮咀每服一錢乾柿一枝粟米泔一盞煎乾盡為度取乾柿食後服復明散治小兒大人斑瘡入眼或成翳膜或眼睛高出而不枯損者雖年歲深遠並可治之龍膽草去蘆頭麻黃去節上二味各等分為細末每服三錢食後炙鼠肝香熟蘸藥食之日二服服藥五六日後眼白睛與翳膜皆粉紅色眼覺癢澀不得揉動亦不可疑此是翳膜漸退也頻頻用溫鹽湯洗之瘡大者日三服小兒更量大小加減服之如不食鼠肝只用第二次淘粟米生泔水調下紫貝散治斑瘡丁子入眼紫貝一個即田螺也上生為末用羊子肝批開摻末一錢線纏米泔煮香熟入小口瓶器盛乘熱熏候冷於星月下露一宿來早空心吃不過一螺可愈治小兒痘瘡入眼方用蛇蛻五寸煮緑豆去皮只吃豆神效瘡疹便膿血附論夫瘡痘欲安而不曾傷食有肚疼者是痘毒太盛氣血凝結腹中不散久必作膿血痢宜用四物湯加罌粟皮大便堅實或瀉焦黃或熱或不熱有肚疼者四順飲若瀉白酸臭傷食肚疼者先益黃散後解毒丸令微利再用益黃散便血或下黑糞睡不醒者里毒太盛其證甚惡犀角地黃湯抱龍丸小柴胡加生地黃主之方薤白湯治小兒瘡疹或下痢赤黃膿血及渾身熱當服薤白半錢切豆豉一盞山梔子十枚上用水五盞同煎薤白爛為度去滓量大小服之解去惡積牛黃散治小兒瘡疹陽毒入胃便血日夜無節度腹痛啼哭牛黃一錢鬱金一兩上研為末每二歲兒服半錢以漿水半盞煎至三分和滓溫服量大小以此增減之日二服黃連阿膠湯治小兒斑疹餘毒下痢膿血黃連半兩微炒黃柏梔子微炒阿膠炒燥各三錢上為粗末每服二錢水半盞煎至六分去滓溫服量兒大小加減日進二服治小兒瘡疹之後大便膿血用山梔子當歸煎湯下黃連阿膠丸瘡疹後解餘毒附論病後解利當觀虛實瘡疹後當解利此世俗通論然小兒稟受既實榮衛充壯病後有餘熱者宜與解利其證大便難小便赤能食而渴大段熱甚者宜大黃散留熱在胃嘔吐而口舌生瘡而下利黃赤者宜黃連散煩渴而小便少者宜五苓散餘熱溫壯齒疼或腫者宜甘露飲咽疼者宜抱龍丸如聖湯肝熱毒者多怒叫而不得眠者宜調肝散大腸下血疼痛者宜牛蒡散三黃熟艾湯生癰者宜小柴胡加生地黃湯犀角地黃湯無熱證者但當隨時安養而已或其人所稟素弱瘡痘既出之後榮衛大虛坐立振搖大便不祕小便不赤飲食不甚進者宜胃愛散異功散雙和湯之類以扶持之候其飲食如故起居稍勝榮衛既充然後微微解利至虛之人不必解利常見虛怯小兒不應解利而強與解利遂為寒中為下利生病多端也餘毒作嘔吐者有冷熱之不同如心煩作渴食乳甚急聚滿於膈中吐出如射其人面帶赤手足心熱居處喜涼此熱吐也如乳食水漿隨吐面色清白手足冷大小便自利此冷吐也熱者竹茹湯五苓散竹葉石膏湯加橘皮之類主之冷者益黃散理中湯丸主之要之病後餘毒多是熱邪其間冷證十有一二也病後忽遍身青黑色手足瘛瘲口噤涎聲如鋸者此中風也宜消風散入蟬蛻投生薑薄荷汁酒各數點飲之或小續命湯去桂附加荊芥亦可也病後非時發搐搦者宜抱龍丸小柴胡加生地黃之類病後胃弱不能勝谷謂之食蒸發搐其人潮熱大便酸臭祕泄不調或嘔吐腸痛宜紫霜丸小承氣湯其作痘癰結腫者宜用小柴胡湯加生地黃為佳如升麻湯消毒飲犀角地黃湯皆可選而用也病後大小便不通者四順飲承氣湯五苓散導赤散之類便膿血者牛黃散犀角地黃湯黃連解毒湯三黃丸等選而用之餘毒咳嗽脅痛者赤茯苓湯小柴胡加五味子桔梗枳殼等作煩渴五苓散竹葉石膏湯黃連散燈心散主之方全功散治痘瘡收靨解利餘毒天花粉防風黃芩升麻羌活荊芥穗川芎牛蒡子炒鬱金紫草甘草枳殼木通豬苓赤茯苓黃連去須縮砂仁陳皮糯米炒當歸麥門冬去心上等分白水煎不拘時或肉櫓食連翹飲治瘡疹壯熱小便不通餘毒未解連翹瞿麥荊芥木通車前子赤芍藥當歸去尾防風柴胡去須滑石蟬蛻甘草炒各一錢山梔子去殼黃芩各一錢上銼散每服二錢加紫草煎溫服五福化毒丹一名青黛丸治瘡疹餘毒上攻口齒及治蘊積毒熱驚惕狂燥頰赤咽乾口舌生瘡夜臥不寧譫語煩渴頭面身體多生瘡癤赤眼等疾人參半兩玄參半兩茯苓一兩青黛甘草各五錢桔梗一兩牙硝枯過半兩麝香腦子各半錢一方無腦子有金銀箔上為末蜜丸每兩作十二丸一歲兒一丸分四服用薄荷湯下瘡疹上攻口齒涎血臭氣生地黃自然汁化一丸用雞翎刷在口內熱疳肌肉黃瘦雀目夜不見物陳粟米泔水化下食後臨睡服一方磨生犀水化下大和散治瘡痘後寒熱往來嗜臥煩躁悶亂生地黃川當歸洗去蘆地骨皮人參甘草赤芍藥各等分上㕮咀每服一錢水半盞煎至三分去滓通口服柴胡湯治痘瘡靨後渾身餘熱不退若有大熱經日不除一名二參飲一名柴胡麥門冬湯柴胡甘草炙黑參龍膽草各一錢半麥門冬三錢半去心人參去蘆二錢半上㕮咀每服三錢水一大盞煎六分去滓稍熱服不拘時候量兒大小加減服辛荑散治痘瘡出後有痘瘡生塞鼻中不能睡臥用辛荑即木筆花研為細末加麝香少許以蔥白蘸藥末入鼻中數次即通三黃熟艾湯治瘡正出下利黃赤膿血身熱大渴乃毒入大腸宜解其毒使瘡出也黃芩黃連黃柏熟艾各等分上銼水煎或加糯米紫草甘草煎服四順飲治瘡痘積熱壅盛心經蘊毒熱氣如體虛弱者不可服又治一切丹毒積熱壅滯咽喉腫痛當歸赤芍藥甘草大黃虛者煨用實者生用上四味等分煎服一歲兒服一錢重未通漸加半錢五歲以上服二錢未通更略加之但要大便通毒氣出即安一方用陳皮糯米煎服陳氏方用薄荷三葉煎服小承氣湯大黃五錢厚朴薑製一兩枳殼煨三錢上銼糯米煎服但令大便通潤大黃散一名參黃散治小兒疹痘瘡出盡後宜服之川大黃銼碎微炒黃芩黑參各半兩上粗羅為散每服一錢以水一小盞煎至五分去滓放溫量兒大小分減服之黃芩散若瘡毒出盡後宜服之以解餘毒黃芩大黃各半兩山梔子仁三錢玄參六錢上為粗末用末一兩水二升煎至八合去滓量兒大小服嘔吐當先定槐花散治嬰孩小兒斑瘡餘熱不退槐花赤小豆各炒二錢麝香少許研上為細末每服半錢用蜜湯調下三四歲一字以上用溫酒調下只進一服腹中微利即用調胃觀音散補之牛黃生金散解利瘡子虎杖滑石各一兩甘草二錢半藿香一錢上銼為細末每服一平錢水八分煎至三分去滓通口服兒大增之射干鼠黏子湯治痘瘡靨後身有小熱壯熱大便堅實口舌生瘡咽喉腫痛頤頷結核皆由瘡毒未盡而然鼠黏子炒一兩升麻甘草炙射干各三錢半上㕮咀每服三錢水一盞煎六分溫服不拘時消毒加味犀角飲治毒氣壅遏壯熱心煩瘡疹雖出未能勻透口舌生瘡不能吮奶牛蒡子三兩炒荊芥穗五錢甘草炙一兩防風川升麻各七錢半上銼散每服二錢水一盞煎去滓令溫時時令呷或頻灌之大便利者不宜服雄黃散治小兒因痘瘡牙齦生疳蝕瘡雄黃一錢銅緑二錢上同研極細量瘡大小乾摻其上解毒丸治小兒瘡痘毒勝身熱癰疽咳嗽有痰氣急並瘡痘正出傷食肚疼及解諸藥毒雄黃一分巴豆二十七粒去油鬱金一分上為末白糊為丸如小豆大三歲三丸薄荷湯下食前如咳嗽痰喘食後服一方加半夏一分百草膏治痘風瘡用羊糞曬乾燒灰清油調塗必勝湯治瘡疱將出未能勻遍透肌解毒用惡實不拘多少炒熟粗搗篩每服二錢入荊芥二穗水一小盞同煎至六分去滓放溫分作三服如瘡疹已出後與服亦妙黃連散治瘡毒出盡服黃芩散以解餘毒嘔吐先定尚口赤有瘡下部亦有瘡自下利者黃連厚朴陳皮杏仁枳實麻黃去節乾葛各半兩上㕮咀白水煎服量兒大小為劑大承氣湯厚朴八兩大黃四兩枳實一兩上為粗末每服五錢水二盞煎八分入芒硝一錢匕去滓服比金丸治瘡痘後餘毒不解輕粉滑石各一錢半南星一錢一字青黛半錢上為細末糊丸小豆大一歲二丸薄荷湯下清肌散治瘡痘後餘毒未除瘡痍濕爛皮膚未平復者黃蘗一兩豬膽炙烏賊魚骨去硬皮半兩上為細末以臘月豬脂調塗患處瘡疹後滅瘢痕附論凡痘瘡首尾不可出風宜於虛爽處坐臥寒溫得所忌動風物食白魚野味頻與稀粥易能安愈凡瘡痘才欲著痂即用酥蜜面油不住潤之可揭則揭遲則瘡硬成瘢痕也才發痂疕人多不以酥潤反以剝落早則成瘢痕誤也然既剝之後卻不可早見風冷須當愛護不剝去或出風致瘢痕密陀僧水調敷之蒺藜散鷹矢白散馬齒莧散青金散皆可選而用也傷寒發痘瘡後滅瘢候傷寒病發瘡者皆是熱毒所為其病折則瘡愈而毒氣尚未全散故瘡痂雖落其瘢猶黯或凹凸肉起所以宜用消毒滅瘢之藥以敷之方韶粉散治小兒痘瘡才愈而毒氣尚未全散瘡痂雖落其瘢猶黯或凹凸肉起當用此藥塗之韶粉一兩一用胡粉輕粉一錢一用膩粉上相研和入煉了豬脂油拌和如膏薄塗瘡瘢上如痘瘡欲落不落當滅瘢痕小兒痘瘡已靨未愈之間五臟未實肌肉尚虛血氣未得正復忽被風邪得於膚腠之間則津液澀滯故成疳蝕瘡也宜用雄黃散綿繭散等藥治之久而不愈者潰骨傷筋以致殺人一方用羊筒骨髓一兩煉入蜜滾三沸入輕粉一錢研成白膏磁合盛之塗瘡上如痘瘡癢甚誤搔成瘡及瘡痂欲落不落用上等白蜜塗之其痂落亦無紫黑瘢痕神妙蒺藜散滅瘢白蒺藜子淡豉各一兩山梔子仁二兩上為末用醋漿水調如泥每夜塗之來早以淡漿水洗去又方鷹屎白一兩衣中魚二十個上研細入白蜜調和塗之又方馬齒莧自然汁一升煉成豬脂三兩上以慢火煎之成膏日夜塗之簡易名必勝膏加白蜜青金散治瘡麩疹豆瘢不消白蒺藜子取末山梔子取末青黛別研各一兩膩粉一分上研勻生麻油調塗之瘡上治瘡痘瘢用櫻桃仁研細敷之百花膏治痘瘡癢甚誤搔成瘡及瘡痂欲落不落者用白蜜不拘多少塗於瘡上其痂易落且無疤瘢亦不臭穢故不盡述或用羊筒骨髓一兩煉入蜜滾三二沸入輕粉少許研成膏磁合內盛之塗於瘡上療小兒面上瘡痘子瘢用黃明膠慢火炙為末溫酒調服一錢痘出者服之無瘢未出服之瀉下療小兒痘瘡瘢靨以密陀僧細研水調夜塗之明旦洗去平復矣又方牡蠣煅為粉三兩土瓜根一兩上搗細羅為散每夜取二錢用白蜜調塗面及瘡瘢明旦以暖漿水洗之又方羊𦚟一具用酒一升浸一宿來日攪濾去汁取羊𦚟盡去筋膜牛酥四兩上入銀銚子內慢火煎三五沸新綿濾入淨器中盛每夜取塗面上來日用生甘草一兩以漿水二大盞煎七八沸去滓放溫洗面又方豬𦚟一斤天鼠二枚上細切入銚子內煎煉令天鼠焦絞濾取膏日夜摩塗瘡瘢上又方用鸕鷀糞二兩研如粉以煉了臘月豬脂三合調攪令勻塗於瘡瘢上效又方豉一升羊糞一合上相和以水一斗煎十餘沸去滓看冷暖洗浴瘡瘢又方用黃蘗細銼二兩以水二升煎取一升去滓摩拭瘡瘢上又方用赤小豆末一兩以雞子白調了如稀餳塗瘡瘢上療病豌豆瘡欲無瘢以頻揭去痂勿令隱肌乃不成瘢縱揭傷有微血但以面膏塗即無苦也瘡痂不可食雞鴨卵即時盲瞳子如卵白其應如神不可不戒楝實膏治小兒疹痘穴後滅瘢痕楝實去核炒槐子各一兩上並拍碎用狗脂鵝脂各四兩同於銅銚內以文武火煎一二十沸去滓入在磁閣中候凝塗瘢痕日二度又方用蜆子活者以淮水或江水養五日旋取此水洗手面日漸生肉乃無瘢痕一方用黃蜆煮汁洗面無蜆以螺螄代用治天行瘡斑發瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨決隨生不即療數日必死瘥後瘡瘢黯一歲方滅此惡毒之氣也世人云建武中南陽擊虜仍呼為虜瘡諸醫參詳療之方上取好蜜通摩瘡上以蜜煎升麻拭之治丹疹用蜜調上朱入酒服仍研搽之又方用蕎麥粉醋調敷又方用梔子仁末水調敷治瘡疹出後滿身腐爛臭穢槐花黃柏皮白藥子等分上為末瘡爛處粉之干處生地黃汁調敷
