body:
  text: 卷三百六十嬰孩初生門總論辨小兒初受氣凡小兒受氣在娠一月胚二月胎三月血脈生四月形體成五月動六月筋骨立七月毛髮生八月臟腑具九月穀氣入胃十月百神備而生生後六十日目瞳子成能頦笑識人百日任脈生能反覆百八十日尻骨成能獨坐二百一十日掌骨成能匍匐三百日髓骨成能獨倚三百六十日為一期膝骨成乃能行此是定法若有不依期者必不壽也相貌壽法兒初生叫聲連延相屬者壽聲絶而復揚急者不壽啼聲散不成人啼聲短不成人臍中無血者奸臍小者不壽通身軟弱如無骨者不壽鮮白長大者壽自開目者不成人目視不正數動者大非佳汗血者多危不壽汗不流不成人小便凝如脂膏者不成人頭四破不成人常搖手足者不成人早坐早行早齒早語者皆惡性非好人頭毛不周匝者不成人發稀少者強不聽人頭上有旋毛者早貴妨父母兒生枕骨不成者能言而死尻骨不成者能倨而死掌骨不成者能匍匐而死踵骨不成者能行而死臏骨不成者能立而死身不收者死魚口者死股間無生肉者死頤下破者死陰不起者死陰囊下白者死赤者死卵縫通達黑者壽兒三歲已上十歲已下視其性氣高下即可知其夭壽大略兒小時識悟通敏過人者多夭大則項橐顏回之流是也小兒骨法成就威儀回轉遲舒稍費人精神鵰琢者壽其預知人意回旋敏達者赤夭即楊修孔融之徒是也由此觀之夭壽大略可知也亦猶梅花早發不睹歲寒甘菊晚成凋於霜後是知晚成者壽之兆也論初生諸疾並治法夫今之孕婦懷胎習以為常飲食不節起居不宜未誕之間勞役衆苦男子視孕以為常恣其所欲任其所施頻受觸穢所以生兒之後百脈致虛三焦不順關竅不通榮衛不和者初生之間便作疾患怪異多端不可得而詳述今舉二十有六證候概而言之審其可否比附與之療理而助其榮衛調順經絡得宜而已呵者即張口而又合之缺者謂神不足故名呵缺非是疾病初生芽兒多有此作不足怪訝錢氏有謂呵缺遁悶良由胎氣怯弱榮血不壯衛氣少順即血不蔭心血不蔭心則神不守神不守則呵缺遁悶無他愧也古方有硃砂審法用煎人參湯調和飲之者不若定志丸五七粒麥門冬湯化開與服之妙也伸者突其胸堂展其氣脈舒者引其頭頸直其手足努而作之良久復作初生孩兒多有如此亦非病也良由母懷胎胞起坐不得寬展或將絹帛兜束肚皮或系襠褲勒縛大緊或臥己盤旋或睡不轉側是故偃傴胎囊氣失舒暢降生之後自然如此老嫗知與挼揉未知調其百脈宜將五木湯浴之功效用桃李槐柳皂莢各取枝煎湯候溫與浴仍與觀音散少少與服效肺之氣壅腠理不通外感寒邪或已傷風關竅閉塞鬱郁於中及至噴嚏方有少解不能發散漸入胸堂遂生痰熱痰熱既有即加之咳嗽輕則氣促短急重則驚風搐搦搐搦之利若在初生尚云不可宜與消風散服之咳嗽宜與金沸草散人參羌活散二藥皆和且順雖則嫩弱服之無恙其劑溫純化痰利膈胎乃育形臍乃根本胎氣固則形體壯肚臍深則根命長受氣乖遺形萎臍突凡兒斷臍利益漸長漸深吻乳調和愈固愈實是血脈之相順致形體之相資初生之兒有熱在胸堂則頻頻伸引厄厄作聲努脹其氣抑入根本之中所以臍突腫赤虛大無可畏無識之夫將謂斷臍之不利而使之然者非也臍斷不盈尺一臘之內隨其根蒂自腐實者深之弱者淺之深淺之理以其稟賦得之此乃多由胎中母多驚悸或因食熱毒之物有作宜與大連翹飲子其熱自散其臍歸本不必以藥敷之恐毒傷人為害初生三五日之間便有舉目上竄將身反張然其非疾所作情實駭人凡醫工必作驚風療之其候非也萬一所由兒在胎中受飲食熱毒之氣蘊在胸堂誕下三日之前宜與黃連去熱膩粉散毒古人預計利害其又與人參朱蜜湯皆清心肺積毒既化兒獲無恙若不如此所生個個反張上竄或有不患此者鄙婦不思恣食啖熱毒之物何可怪哉或投驚風涼藥亦愈但須明其所以用藥智者裁之萬一不由驚風所傳當與詳悉物萌失之灌溉長必焦萎兒誕違之乳哺壯必怯弱凡兒在胎前和氣養之降生則美乳蔭之其氣偎則胎不壯其乳敗則兒不長食不及乳乳飽即不食無致咎也雖食無乳禍害生焉是故乳不可失時食不可不節乳失時兒不病自衰食失節兒無疾自怯乳者壯其肌膚食者厚其腸胃所謂乳哺二周三歲則益其體今人未周奪其乳入月恣肥甘豈不致疾鍾鴻聲大澗遠流長形處胞胎之中受氣充足水火兼濟心腎不虧耳目兩竅相通大小二腸相佐發聲清響洪亮者根固本壯稟賦充實而自然之理也初生啼笑發聲不出厄厄而作鬱郁而為其或短汲上下氣不相乘醫與果訣云此由胎氣不足何更投藥假使成人父母不悅根本不壯何須藥餌如果木之萎水奚益也古意速用父母呼呵及以蔥尉令聲發越奈緣自無根本産子育兒當知其理人之受胎應數降生之後不以貧富其子皆以精神全氣脈壯視聽欣嬉取與喜怒周晬之間於人事情懷意旨撫叱以知其逆順方可謂孩兒性識之本也其或周晬已過不認名不偎親常常皺蹙顏容喎臉含啼東喚西向南呼北面其坐若木其臥若尸其行即蹶其立用掇筋骨氣脈柔怯虛弱食不辭飽渴不知飲若或長成亦則庸蠢如此胎氣月數不足者難保千日胎氣已滿産降必全盡一氣而包養開九竅以通運在乎十月之中形骸已具分娩片時之內穀道無穿所緣兒在胎中已空九竅若不通利如何四體百骸而能生長斯由熱壅所致肺經之極結於肚口閉而不通降生之後無復滋潤乾燥而合若投寒涼之藥愈閉不通若下溫平之藥而又不通者即是兒氣不順腸胃空澀穀道乾燥閉合可畏方不詳載藥無速驗至於此等所受須當以物透而通之金叉為上玉簪次之蘇合香丸內入孔中凡刺一二寸許屎為快色曾見肛門肉合小便通利大便至死無能通者愚鄙燒火箸刺之事出不得已既然肉合決無奇方試以金玉重力刺之有勝火箸又有初生胎熱一二日不通者與服洗心散以通為度四順飲加荊芥煎亦良産婦血敗者當下榮者化乳血下不盡母致其疾乳有不調兒招其病凡兒吻其乳有不到於胸堂氣滯積隘或冷或餿故以哯出或問之無恙否曰不宜也久哯令兒神困力乏氣怯肌羸脾家若虛遂作癇疾及至成疾脾風定矣初生與周晬之兒胃氣未備穀食未登全藉吻乳快活無恙自然臟腑充百脈順肌體壯神氣清其或母用性不順則氣血亂氣血亂則乳汁不和乳汁不和令兒哯逆宜其速與療理若作尋常必致害生小沉香煎及鹽豉丸兼與服之乳母宜服藿香正氣散加枳朮至良論新生將護法小兒初生先以綿裹指拭兒口中及舌上青泥惡血此為之玉衡若不急拭啼聲一發即入腹成百病矣兒生落地不作聲者取暖水一器灌之須臾當啼兒生不作聲者此由難産少氣故也可取兒臍帶向身卻呵之令氣入腹仍呵之至百度啼聲自發亦可以蔥白徐徐鞭之即啼兒已生即當舉之舉之遲晚則令中寒腹內雷鳴乃先浴之然後斷臍不得以刀子割之須令人隔單衣物咬斷兼以暖氣呵七遍然後纏結所留臍帶令至兒足趺上短則中寒令兒腹中不調當下痢若先斷臍然後浴者則臍中水臍中水則發腹痛其臍斷訖連臍帶中多有蟲宜急剔撥去之不爾入兒腹成疾斷兒臍者當令長六寸長則傷肌短則傷臟不以時斷若挼汁不盡則令暖氣漸微自生寒冷男臍風生兒宜用其父故衣裹之生女宜以其母故衣皆勿用新帛為善不可令衣過厚令兒傷皮膚害血脈發雜瘡而黃兒衣綿帛特忌厚熱慎之慎之凡小兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱宜時見風日若都不見風則令肌膚脆軟便易中傷皆當以故絮衣之勿用新綿也凡天和暖無風之時令母將兒於日中嬉戲數見風日則血凝氣剛肌肉牢密堪耐風寒不致疾病若常在幃帳之中重衣溫暖譬猶陰地之草木不見風日軟脆不堪風寒也凡裹臍法椎治白練令柔軟方四寸新綿厚半寸與帛等合之調其緩急急則令兒吐哯兒生二十日乃解視臍若十日許兒怒啼似衣中有刺者此或臍燥還刺其腹當解之易衣更裹裹臍時閉戶下帳燃火令帳中溫暖換衣亦然仍以溫粉粉之此謂冬時寒也若臍不愈燒絳帛末粉之若過一月臍有汁不愈燒蝦蟆灰粉之日三四度若臍中水及中冷則令兒腹絞痛夭糾啼呼面目青黑此是中水之過當炙粉絮以尉之不時治護臍至腫者當隨輕重重者炙之乃可至八十九壯輕者臍不大腫但出汁時時啼呼者搗當歸末和胡粉敷之炙絮日尉之至百日愈以啼呼止為候若兒糞青者冷也與臍中水同兒洗浴斷臍竟䙀抱畢未可與朱蜜宜與甘草湯以甘草如手中指一節許打碎以水二合煮取一合以綿纏沾取與兒吮之連吮汁計約一蜆殼入腹止兒當快吐吐去心胸中惡汁也如得吐余藥更不須與若不得吐可消息計如飢渴須臾更與之若前所服及更與並不得吐者但稍稍與之令盡此一合止如得吐去惡汁令兒心神智慧無病也飲一合盡都不吐者是兒不含惡血耳勿復與甘草湯乃可與朱蜜以鎮心神安魂魄也兒新生三日中與朱蜜者不宜多多則令兒脾胃冷腹脹喜陰癇氣急變噤痙而死新生與朱蜜法以飛鏈硃砂如大豆許赤蜜一蜆殼和之以綿纏箸頭沾取與兒吮之得三沾止一日令盡此一豆許可三日與之則用三豆許也勿過此則傷兒也與朱蜜竟可與牛黃如朱蜜多少也牛黃益肝膽除熱定精神止驚辟惡氣除小兒百病也新生三日後應開腸胃助穀神可研米作厚飲如乳酪厚薄以豆大與兒咽之頻咽三豆許指止日三與之滿七日可與哺也兒生十日始哺如棗核二十日倍之五十日如彈丸百日如棗若乳汁少不得從此法當用意小增之若三十日而哺者令兒無疾兒哺早者兒不勝穀氣令生病頭面身體喜生瘡愈而復發令兒尫弱難養三十日後雖哺勿多若不嗜食勿強與之強與之不消復生疾病哺乳不進者腹中皆有痰癖也當以四物紫圓微下之節哺乳數日便自愈小兒微寒熱亦當爾消息之要當下之然後乃瘥凡乳兒不欲大飽飽則嘔吐每候兒吐者乳大飽也以空乳乳之即消日四乳兒若臍未愈乳兒大飽令風中臍也夏不吃熱乳命兒嘔逆冬不吃寒乳令兒瀉痢母新房以乳兒令兒羸瘦交脛不能行母有熱以乳兒令變黃不能食母怒以乳兒令喜驚發氣疝又令上氣癲狂母新吐下以乳兒令虛羸母醉以乳兒令身熱腹滿凡新生小兒一月內常飲豬乳大佳凡乳兒母當先極挼散其熱氣勿令汁奔出令兒噎輒奪其乳令得息息已復乳之如是十返五返視兒飢飽節度知一日中幾乳而足以為常又常捉去宿乳兒若臥乳母當以臂枕之令乳與兒頭平乃乳之令兒不噎母欲寐則奪其乳恐填口鼻又不知飢飽也浴兒法凡浴小兒湯須令冷熱調和冷熱失所令兒驚亦致五臟疾也凡兒冬不可久浴浴久則傷寒夏不可久浴浴久則傷熱數浴背冷則發癇若不浴又令兒毛落新生浴兒者以豬膽一枚取汁投湯中以浴兒終身不患瘡疥勿以雜水浴之兒生三日宜用桃根湯浴桃根李根梅根各一兩枝亦得㕮咀之以水三斗煮二十沸去滓浴兒良久除不祥令兒終身無瘡疥治小兒驚辟惡氣以金虎湯浴金一斤虎頭骨一枚以水三升煮為湯浴但須浴即煮用之凡小兒初出腹有鵝口者其舌上有白屑如米劇者鼻外亦有之此由兒在胞胎中受穀氣盛故也或妊娠時嗜糯米使之然治之之法以發纏箸頭沾井花水撩拭之三日如此便脫去也如不脫可煮栗扶汁令濃以綿纏箸頭拭之若春夏無栗扶可煮栗木皮如用井花水法小兒初出腹有連舌舌下有膜如石榴子中隔連其舌下後喜令兒言語不發不轉也可以爪摘斷之微有血出無害若血出不止可燒發作灰末敷之血便止也小兒出腹六七日後其血氣收斂成肉則口舌喉頰裡清淨也若喉里舌上有物如蘆籜盛水狀者若懸癰有脹起者可以綿纏長針留兩處如粟米許大以刺決之令氣泄去青黃赤血汁也一刺之止消息一日未消者來日又刺之不過三刺自消盡余小小未消三刺亦止自然得消也有著舌下如此者名重舌有著頰裡及上齶如此者名重齶有著齒齗上者名重齗皆刺去血汁也小兒生輒死治之法當候視兒口中懸癰前上齶有胞者以指摘取頭決令潰去血勿令血入咽入咽殺兒急急慎之小兒初出腹骨肉未斂肌肉猶是血也血凝乃堅成肌肉耳其血沮敗不成肌肉則使面目繞鼻口左右悉黃而啼閉目聚口撮面口中乾燥四肢不能伸縮者皆是血脈不斂也主不育若有如此者皆宜與龍膽湯也論乳兒法擇乳母須精神爽健情性和悅肌肉充肥無諸疾病知寒溫之宜能調節乳食奶汁濃白則可以飼兒不得與奶母大段酸鹹飲食仍忌才沖寒或沖熱來便喂兒奶如此則必成奶癖或驚疳瀉痢之疾切須忌之夜間不得令兒枕臂須作一二豆袋令兒枕兼左右附之可近乳母之側蓋覆衣衾須露兒頭面一向仰臥恐成驚疾須時復回動之夏月須涼簟如夜間餵奶須奶母起身坐地抱兒喂之如陰陽交接之間切不可喂兒奶此正謂之交奶也必生癖或換易衣繃須三月後房中不可大暖奶母不可頻吃酒恐兒作痰嗽驚熱昏眩之疾至於變蒸次第奶乳所傷夜啼潮熱之類若能調和奶食並看承愛護如此則別無疾病亦不須令兒常服湯藥此尤宜審之也乳生病雜治凡小兒飲食乳哺不能無痰癖常當節適若微不進即當將護凡不能進乳哺則宜下之不致寒熱也又小兒始生生氣尚盛無有虛勞微惡即須下之所損不足言其益多矣若不時下則疾成難治冬月下之最難將護然有疾者亦不可不下夏月下後腹中常小脹滿當節哺乳護之兒之乳哺宜令多少有常兒稍大食哺自能稍增若減少者是腹中已有小不調便當微與藥勿復哺之但乳之而已甚者十餘日輕者五六日自當如常若都不食哺而但飲乳者此是有癖不可不下不下即致寒熱或吐而發癇或致下痢若先治其輕則病速愈矣小兒有少病癇者母懷娠時役動骨血即令氣強若侍御多血氣微胎養弱即兒軟脆易傷故多病癇兒須多著項衣取燥菊花為枕乳母乳兒時摸兒風池若壯熱即須尉使微汗微汗不瘥便灸兩風池及背第三椎第五椎第七椎第九椎兩邊各二穴與風池凡為十穴一歲兒七壯兒大者以意增之可至三十壯唯風池特宜多七歲以上多至百壯小兒當切慎護風池風池在頸項筋兩邊有病乃治之尋常不可妄施針灸亦不可輕於吐下緣針灸傷經絡吐下動臟腑故也但當以除熱湯浴之除熱散粉之除熱赤膏摩之又以臍中膏塗之令兒處涼時以新水飲之新生無疾慎不可逆針灸逆針灸即忍痛動脈因而成癇河洛間土地多寒兒喜病痙其俗生兒三日多逆炙以防之又炙其頰以防噤又決舌下以去血江東吳蜀地溫無此疾古方雖傳有逆針灸之法今人不詳南北之殊便按方用之為害最多惟田舍小兒任其自然皆無此患又云春夏不可下以小兒腑臟軟弱易虛易實下之則下焦必虛上焦生熱熱即增痰自非當下之病不可下也嬰兒初生斷臍之後宜著艾厚裹愛護若乳母不慎或因浴而水入或因屎於䙀袍之內濕氣傷臍或解脫風冷所侵令兒臍腫多啼不能乳哺即成臍風宜用裹臍法通大小便法兒初生腹脹欲絶大小便不通急令婦人漱口汲咂兒背心手足心臍下共七處以紅赤色為度須臾自通胎肥生下肌肉厚通身血色紅滿月以後漸漸肌瘦目白睛粉紅色五心熱大便難時時生涎浴體法主之又云胎怯生下面色無精光肌肉薄大小便白身無血色時時哽氣多噦目無精采當浴體法主之新生小兒煎益母草湯洗之則不生瘡又以薏苡葉煎湯浴則一生少病小兒初生七日內患臍風撮口百無一活坐視其斃良可憫哉惟有一法極驗世人罕知其兒齒齦上有小泡子如粟米狀但以溫湯蘸熟帛裹手指輕擦破即開口便安不用服藥或用真珠天麻丸治之胎驚風以胎婦調適乖常飲酒嗜欲忿怒驚撲母有所觸胎必感之或外挾風邪有傷於胎故子乘母氣生下即病也其候月內溫壯翻眼握拳噤口咬牙身腰強直涎潮嘔吐搐掣驚腮縮囟開或頰赤或面青眼合胎風眼合不可誤作慢脾妄用溫藥其有著噤撮口之類亦此一種之所發也視其眉間氣色紅赤鮮碧者可治若黯黑青黑者不治虎口指紋曲入里者可治紋反出外者不治治法解散風邪利驚化涎調氣貼囟甚則以朱銀丸利之初生方法虎頭湯方出聖惠方虎頭骨五兩苦參四兩白芷二兩上用水一升煮二十沸入豬膽汁少許適寒溫浴兒治兒少小身熱李葉湯方出聖惠方上用李葉不拘多少以水煮熟去滓適寒溫浴兒又方出聖惠方用白芷根苗煎湯浴兒良又方出衛生寶鑑方用苦參煎湯浴兒良浴體方出衛生寶鑑方天麻末二錢蠍尾去毒為末硃砂各半錢匕烏蛇肉酒浸焙為末白礬各三錢麝香一字匕青黛三錢匕上同研勻每用三錢水三碗桃枝一握並葉五七枚同煎至十沸溫熱浴之勿浴背御藥院名浴體天麻散治小兒百日內發搐真者不過三兩次必死假者發頻不為重真者內生髮癇假者外傷風冷蓋血氣未實不能勝任乃發搐也欲知假者口中氣出熱也治之可發風邪用浴體塗囟法凡尋常浴兒出聖惠方上以湯添水著少鹽浴兒後以粉敷之若無事勿數浴恐遇風冷令兒發驚成癇李梅湯出聖惠方浴兒闢瘟惡氣療百病去皮膚沙粟桃根梅根李根各一把細辛蛇床子各一兩上都銼以水二斗煎至一斗澄濾候冷暖得所浴兒佳一方加麝香少許不用細辛蛇床子治新生兒卒寒熱不住不能服藥用六物莽草湯浴之方出聖惠方莽草丹參蛇床子桂各三兩菖蒲半斤雷丸一斤上銼碎水五升煮三五沸適寒溫浴兒避日向陰處治小兒卒客忤吐下乳哺面色青黃脈變弦急浴之方出聖惠方用錢七十文以水三升煮令有味適寒溫浴兒浴兒法出聖惠方凡浴兒不可先斷臍帶候洗了方斷不致水濕傷臍可免臍風臍瘡等證仍以清油調發灰敷臍凡洗兒並不可用水打濕臍帶切宜戒之又法出聖惠方上益母草五兩銼水一斗煎十沸溫浴面不生瘡疥初生浴兒良日出聖惠方寅卯酉日大吉壬申丁己癸己大凶上用虎頭骨煎湯浴之令兒不驚辟邪惡氣金虎湯出聖惠方治小兒驚辟惡氣金十兩虎頭骨一枚上以水一斗煮至七升候冷暖得所將用浴兒心安甚良浴新生兒方出聖惠方上用豬膽一枚煎湯在盆中取膽汁投於湯中適寒溫以浴兒終身不患瘡切不得湯中入著生水甘草法出湯氏寶書妊婦臨月預辦甘草細切少許産臥時以綿裹沸湯泡盞內蓋定收生之際急以軟帛裹指蘸甘草汁拭其口次用黃連法黃連法出湯氏寶書産婦臨月內黃連細切槌碎將綿裹百沸湯同用甘草一處泡如前法拭口次用朱蜜法朱蜜法出湯氏寶書用甘草黃連法拭口吐其惡計稍定更與朱蜜安神定魄用硃砂一豆大細研以蜜一蜆殼許和硃砂旋抹口中非獨鎮心安神能解惡物之毒一生免瘡痘之患一方韭根汁灌之亦清血令兒無病牛黃法出湯氏寶書與朱蜜竟可與牛黃服牛黃法亦如朱蜜多少也牛黃益肝膽除熱定精神止驚邪辟惡氣除小兒百病也豬乳法出湯氏寶書取豬乳須令豬兒飲母次便提著豬兒後腳起口自離乳急用手挼之即得乳矣非此法不可取也千金張渙論初生嬰兒或未有奶子産婦之乳未下亦可用豬乳代之此法甚良先用朱蜜而豬乳次之可免驚癇瘡痘乳兒法出湯氏寶書湯氏云顱囟經論夏中盛熱時乳母浴後或兒啼不可與奶能使兒成胃毒秋成赤白痢凡浴後可令定息良久熟揉乳之乃無患也千金論凡乳兒不可過飽蒲而必溢則成嘔吐乳或猛取出挼後再乳凡初乳時須當捏去宿乳然後與之兒若臥乳母當以臂枕之令乳與頭平令兒不噎母欲寤即奪其乳睡著不知飽足而成嘔吐父母交合之間乳兒臥於側或驚哭起不可乳兒氣亂未定則殺人也巢氏云兒啼未定氣息未調乳母勿遽以乳飲之故不得下停滯胸膈而成嘔吐此患有之可不為之慮也擇母乳法出湯氏寶書乳母者其血氣為乳汁也五情善惡悉是血氣所生凡乳兒當宜善其喜怒若忿怒之氣未解忌勿乳兒必令逆也乳母形色美陋甚多不可求備但無狐臭癭瘻哮喘瘑疥癲癡白禿癧瘍缺唇耳聾齆鼻膁瘡麻風癇疾獨眼跛足龜胸駝背鬼形惡貌諸般殘患者余皆可用也沾染之久識性亦同猶如接木之造化也其理甚詳內八片錦紅淨為安體則寧如逢紅黑便須驚更兼紅亂煎人甚轉下除驚藥有靈赤段輕微是外驚若如米粒熱非輕紅散多因喜怒乳搐搦將來豈得平忽逢相間有其青看看立便急風生紅青兢碎風將起不見風疳氣膈證亂投湯藥紫兼青急急醫持命免傾若如淨紫體還熱須知五臟有風生黑輕可治死還生紅赤傷寒痰疾停赤青已受脾風了青黑脾風作慢驚紫細紅曾六畜驚紫赤相間則疳成紫若一同如米粒夾食傷寒事可聽紫散風傳脾臟間紫青多渴即風癇隱隱紫深難治療去風痰毒命須還紅赤兮連赤若輕必然乳母不相應有時兩手俱無見定知衝犯惡神明已上歌訣無形但觀五色浮沉長短可定死生小兒面部氣色總觀五位總作流波泛瀝隔窗照藍青色者驚積不散欲發風候其神彩觀覷不穩上上下證變風生五位總作閃爍焰射丹爐映火紅色者痰積壅盛驚悸增進其神彩視物不定恍恍惚惚候變驚速五位總作混袞泥漿衣敷土牆黃色者食積症傷欲作疳候或痞癖有之其神看顧散漫昏昏沉沉其候寒熱潮發飲食不欣氣粗短滿困倦喜睡嘔噦瀉痢皆有之五位總作濈濈浮虛野露入谷白色者肺氣不利大腸滑泄水穀不分欲作吐利其神眸凝濁失其精神矇矇朧朧性情不有光滑全無無臟少實百脈多虛或吐利之後有失調補五位總作漫漫黯黯塵灰稱覆黑色者傳不順證變即逆候表裡有虧臟腑欲絶其血不榮其氣不衛榮衛失序經絡流注凝滯於脈為疾危惡其神昏冒沉沉默默者為人不久虎口三關指掌飲食不禁雜物未能克化令之患食癖疳積肚疼面黃肚大脛小好覆冷地者得患皆由此也嬰兒生下兩月目瞳子成能識笑認人勿令生人抱之及不可見非常之物因成客忤百晬任脈生能反覆乳母當適寒溫半歲尻骨成乳母當令學坐二百日掌骨成當教匍匐三百日臏骨成當教獨立周歲膝骨成當令行步此皆定法今富貴之家不按此法但令奶子懷抱亦不令出見風日亦不曾見地氣致令筋骨緩弱雖生數歲亦未能行誠非愛護之法余觀田舍小兒未嘗愛護及此終日暴露拖泥帶土而絶無他疾者譬之草木生於深山峻嶺及大澤之中容易合抱至於園圃奇林異果縱加培壅多有秀而不實者此豈貴賤之理有異哉回氣法出危氏得效方小兒初生氣欲絶者必因難産或冒寒冷所致不可便斷臍帶急烘綿絮包抱懷中以胎衣置火中燒仍以大紙捻點清油燃於臍帶上往來燎之使暖氣入腹須臾氣回方洗洗了即斷臍帶聖惠方預治三證凡兒初生預防臍風著噤撮口最為急證十難救一以軟帛包指拭兒口牙根上如有青筋兩條便用竹刀輕輕刮斷以豬乳點之又用黃連半錢豉三十五粒白米四十九粒生甘草二寸蔥白二寸以童子小便煎取三合兒初生未吃奶前便以綿濡點藥口中二七滴逡巡兒腹中轉即利出臍糞後與吃奶至七月已來每日滴三七滴永無此疾經極效也又方抱兒嚮明看臍上有赤脈直上於赤脈頭上灸三壯可起死封臍散出醫方妙選川當歸半兩去土根天漿子三個亂髮灰一錢燒灰存性上末別入麝香一字乳鉢內一處研勻乾摻臍中一方臍瘡不合黃蘗塗之敷臍散出直指方瓜蒂南星白蘞赤小豆等分上為末每三錢用芭蕉自然汁調敷臍四邊剃頭法出集驗方京畿初剃頭俱不擇日但於滿月日剃之蓋風俗所尚前此産婦未得出房滿月與兒俱出以謂胎髮穢惡恐觸灶神令小兒不安故用此日當就溫暖避風處剃之即以生油杏仁膩粉頭上擦之以避風邪爾後剃頭皆宜用此外臺崔氏初剃頭良日出湯氏寶書寅日丑日吉丁日未日凶不可剃令生瘡塗囟法出錢氏方治傷寒百日內發搐麝香一字匕蠍尾去毒為末半錢匕薄荷葉半錢匕蜈蚣末牛黃末青黛末各一字匕上同研勻熟棗肉劑為膏新綿上塗藥貼囟上四方可出一指許火上灸手頻尉百日裡外兒可用此塗囟法哺兒良日法以平定成日大吉其哺不得令咸又寅醜辰己酉日良又男戊己日不得女丙丁日不得小兒初生不飲乳及不小便出百一選方上蔥白一寸四破之以奶汁二合銀石器煎至一合灌之效曾氏女生兒移時不飲乳及不小便皆驚以為惡證急撿外臺得此方用之即效木瓜丸出百一選方治兒初生下口中穢惡不盡入喉中即便自吐然後啼聲一發則又咽下因生異疾木瓜麝香膩粉木香檳榔末各一錢上水煮麵糊為丸如小黃黍米大每服一二丸甘草水下不拘時候米粉散出經驗良方治小兒初生下遍身無皮俱是紅肉宜速以白占米研為細末干撲候皮肉生干方止陀僧散出經驗良方治小兒生下遍身如魚泡又有如水晶破則成水流滲又生用密陀僧生研入紗絹滲之仍服局方蘇合香丸雄黃丸出御藥院方治小兒諸般驚顫瘛初降誕下便與乳母帶碎諸驚忤之氣雄黃一兩虎頭骨炙三分麝香一分猴孫頭骨三分炙白龍腦乳香各一分降真香末箋香白膠香鬼臼去毛各一兩為末大蛇頭一枚炙上細研勻用熟棗肉和丸如彈子大初降誕兒煎熱一丸次用緑絹袋子帶一丸於身闢一切驚忤之氣茯苓丸出直指方治小兒初出胞胎其聲未發急以手拭掠其口令惡血淨盡不得下咽則無他病若拭口不淨惡穢入腹則腹滿氣短不能飲乳或産婦取冷過度胎中受寒則令兒腹痛不肯飲乳惡穢入腹宜用赤茯苓川黃連去須枳殼炒等分上為末煉蜜丸桐子大每一丸乳汁調灌下丁香散出直指方治惡穢入腹令兒嘔吐不止方木香乾薑茯苓甘草焙各一分酸木瓜丁香各半分上粗末一捻水煎以綿與之初生小兒舌下有皮膜如榴中膜里舌或遍舌根出肘後方可以指甲刺破令血出燒礬灰細研敷之半緑豆許若不摘去兒必啞水銀膏出聖惠方療小兒噤其病在咽中如麻豆許令兒沫不能乳哺方上取水銀如黍米粒與服覺病無早晚水銀下咽便愈以意量之不過小麻子許與則也治小兒不能乳出聖惠方上將雀屎四枚為末著乳頭飲兒兒大十枚通便法出危氏得效方小兒初生大小便不通腹脹欲絶者急令婦人以溫水漱口了吸咂兒前後心並臍下手足心共七處每一處凡三五次漱口吸咂取紅赤為度須臾自通不爾無生意有此證遇此法可謂再生保命散出醫方妙選治初生七日間胎毒者其舌上有白屑如米連舌下有膜如石榴子大令兒語不發如鵝口狀名曰鵝口病白礬一分燒灰馬牙硝半兩細研硃砂一分水飛上同再細研每服一字取白鵝糞以水攪取汁調塗舌上頜頰內未用藥時先以手指纏亂髮揩拭舌上垢然後使藥敷之治小兒出腹六十日舌上喉里斷齶上有物如蘆籜貯水狀者出肘後方上以綿纏上針留鋒如米㓨以決之令去卻一㓨且止若不消待明後日各一㓨不過再㓨愈孩子要用藥物硃砂牛黃麝香蘆薈青黛蛇黃犀角蜣螂虎頭骨蝸牛殼蜈蚣雀兒飯甕天竺黃白藥竹瀝吹鼻散虎睛鉤藤飲子虎骨紫霜丸錦灰五味虎睛丸封臍散烙臍丸發灰好綿一兩黑散子胡粉紙燭子柔粉入紙作燭防暖撮口須要綿繩子二尺要系臍用上以上藥物入月皆須是一一題記與産婦藥相雜藏衣法崔氏凡藏兒衣法上兒衣先以清水洗之勿令沙土草汙又以清酒洗之仍內錢一文在衣中盛於新瓶內以青帛裹之其瓶口上仍密蓋頭且置便宜處待滿三日然後依月吉地向陽高燥之處入地三尺埋之瓶上土厚一尺七寸維須牢築令兒長壽有智慧若藏衣不謹為豬狗所食者令兒癲狂蟲蟻食者令兒病惡瘡大烏食之令兒兵死近社廟傍者令兒見鬼近深水汙池令兒溺死近故灶傍令兒驚惕近井傍者令兒聾盲棄道路街巷者令兒絶嗣無子當門戶者令兒聲不出耳聾著水流下者令兒青盲棄於火里者令兒生癇瘡著抹木頭者令兒自絞死如此之忌皆須慎之又安産婦及藏衣天德月空法正月天德在丁月空在丙壬二月天德在申月空在甲庚三月天德在壬月空在丙壬四月天德在辛月空在甲庚五月天德在壬月空在丙壬六月天德在甲月空在甲庚七月天德在癸月空在丙壬八月天德在良月空在甲庚九月天德在丙月空在丙壬十月天德在乙月空在甲庚十一月天德在丙月空在丙壬十二月天德在庚月空在甲庚凡藏兒衣皆依此法天德月空處埋之若有遇反支者宜以衣內新瓶盛密封塞口掛於宅外福德之上向陽高燥之處待過月然後依法埋藏之大吉又法甲寅旬日十日不得藏埋兒衣以瓶盛密封安置空處度十日即藏埋之又法甲辰乙巳丙午丁未戊申此五日亦不藏兒衣還盛瓶中密塞勿令氣通掛著兒生處過此五日即埋之亦不得更過此日又法甲乙日生兒丙丁日藏衣吉丙丁日生兒戊己日藏衣吉戊己日生兒庚辛日藏衣吉庚辛日生兒壬癸日藏衣吉小兒初生搜口法一出保嬰方嬰兒初出母胎者老娘不明保嬰之法兒啼一聲則口中惡物咽入喉腹令兒多病亦多瘡疹凡有孕婦臨月之家前一二日備下甘草黃連各半錢沸湯浸至次日去粗入細硃砂少許候時初出母胎老娘疾用左手托住嬰兒肩背以右手輕提兩足令兒倒啼一聲吐出口中惡物隨手用綿包手指蘸甘草藥水搜兒口中令淨然後以溫水浴之能令兒不生驚哭後出瘡疹必輕長大疾病亦少此乃保嬰之第一法也小兒初生斷臍法二出保嬰方初生斷臍者忌用冷鐵刃器蓋嬰兒柔弱易引寒氣入腹令臟腑滑瀉多致生病宜用火炙剪刀乘熱斷之更就斷臍袋上著艾如麥粒炙二十壯助暖氣入腹則臟腑堅固元氣充實令子病少壽長大有益焉浴洗初生小兒法三出保嬰方小兒初生浴法先用虎骨一兩捶碎入連根蔥白三莖同煎數沸去柤以豬膽一枚取汁入浴湯攪勻溫熱得所自首至足輕手浴洗令子肌膚通身瑩淨以後不生瘡疥可無驚風之患將護小兒法四出保嬰方小兒初生先要乳母將息氣體平和為上蓋熱即生風冷即傷氣乳母受病兒亦隨之況初生小兒肌膚軟脆腸胃細微宜得乳母按時乳無令兒飢亦不可令兒傷飽易致嘔吐切要調和臟腑所用襁褓衣絮宜時見於風日洗曝乾淨若見天氣中和令乳母抱兒日中嬉戲使氣血流通筋骨強徑外邪不侵每見富貴之家愛惜太過厚之以綿衣飽之以乳食閉於帷帳兒受客熱多致驚癇不保其生才有此證急令乳母依前法調理隨兒所感進所當服之藥如紫霜丸五色丸之類選而用之拭兒口法出淡寮方嬰兒在胎口有惡物生下聲啼未出急令軟綿裹指拭口惡汁古人有黃連共甘草法朱蜜法豬乳法用之則免使惡物咽下伏之於心遇天行時氣久熱不除乃乘於心心主血脈得熱而散流溢於胃胃主肌肉發出於外故成瘡疹之候世之小兒無有免者或幼年不出年至四十餘者亦未能免此嗚呼今之學者殊不知病之源流初生拭口若依此法得免痘瘡之患或有時氣侵染只出膚瘡細疹前輩方書雖多未嘗講究及此余嘗遇至人得其妙理況試之纍驗故編集成此方也水粉法出醫方妙選嬰兒初生第一日才斷臍䙀袍訖看兒形色若面紅潤色赤啼聲響快者宜用水粉半錢漸漸令兒吮之良久有臍糞便下為佳甘草法出醫方妙選用好原州甘草中指一節許拍碎以水二蜆殼煎一蜆殼以綿纏蘸令兒吮之若吐出惡汁為佳若服一蜆殼不吐即不須更服不問嬰兒虛實寒熱皆須服之朱蜜法出醫方妙選好硃砂一大豆許細研水飛煉赤蜜一蜆殼看稀稠和成膏每用一豆大乳汁化下時時滴口中三日內上三粒臨時更看形色多青白啼聲不響即不須服牛黃法出醫方妙選真牛黃一塊用好蜜煉熟和成膏每服一大豆大乳汁化時時滴口中形色不實者不宜多服若嬰兒胎熱或身體黃色宜多服之嬰兒初生至滿月常時時旋取豬乳滴口中最為佳妙出醫方妙選刺泡法出危氏方小兒才生下即死用此法可救活急看兒口中懸壅前齶上有泡以手指摘破用帛捏拭血令淨若血入喉即不可治小兒初生六日溫腸胃壯血氣方出肘後方煉成硃砂如大豆許細研以蜜一棗大熟調以綿蘸取令兒吮之一日令盡小兒初生畏寒出淡寮方候浴水未得且以綿絮包裹抱大人懷中平時亦當如此雖暑月亦未可遽去綿絮漸漸去之乍出母腹不可氣也預煎下沸湯以瓶收之臨時漸暖不犯生水則兒不生瘡如此一月為佳小兒初生服藥出淡寮方急以綿裹指拭盡口中惡血若不急拭啼聲一出即入腹成百病矣亦未須與乳且先與拍破黃連浸湯取濃汁調硃砂細末抹兒口中打盡腹中舊屎方可與乳兒若多睡聽之勿強與乳則自然長而少病地黃湯出傅氏方初生嬰兒吞惡血赤芍三錢當歸二錢桂心一錢茯苓二錢山藥三錢芷稍二錢粉草三錢生地黃三錢上等分為末每服半錢生地黃湯調下治小兒初生用五香湯熬水洗之出德生堂經驗方茅香藿香零陵香檀香木香各一錢上㕮咀水一升熬湯濾去滓以溫水洗小兒極妙治小兒一歲至兩歲號干無辜出本草上取夜明沙熬搗為散任意拌飯並吃食與吃治小兒初生六日助穀神以導達腸胃出本草研粟米煮粥飲厚薄如乳每日研與半栗殼哺兒浴兒易長出本草以兜納香與茆香柳枝合為湯浴小兒易長治小兒新生三日應開腸胃助穀神用碎粳米濃煎汁飲如乳酪與兒大豆許數含飲之頻與三豆令兒無病出本草小兒初生取韭根搗汁灌之即吐出惡血令無病治小兒未滿月驚著似中風欲死者本草方用硃砂以新汲水濃磨汁塗五心上兩手心兩腳心胸心立瘥最有神驗令小兒速語出本草以社酒納小兒口中小兒初生以虎骨煎湯浴其孩子長大無病臍風撮口附論臍風者斷臍之後為水濕風冷所乘風濕之氣入於臍而流於心脾遂令肚脹臍腫身體重著四肢強直日夜多啼不能吮乳其疾發為風搐若臍邊青黑撮口不開是為內搐不治爪甲黑者即死其或熱在胸堂伸引努氣亦令臍腫可與千金龍膽湯如前三者受病之源非一朝夕大抵裡氣鬱結壅閉不通並用取下胎毒天麻丸定命丹朱銀丸輩可量與之千金論云小兒始生其氣尚盛若有微患即須下之若不時下則成大病病成則難療矣紫霜丸紫丸子可量用之撮口者面目黃赤氣息喘急啼聲不出蓋由始氣挾熱驚風邪入臍流毒心脾之經故令舌強唇青聚口撮面飲乳有妨若口出白沫而四肢冷者不可救藥其或肚脹青筋吊脈卵疝內氣引痛皆腸胃鬱結不通致之治法貴乎疏利撮口最為惡候一臘內見之尤急斷臍後為水濕所傷或尿在䙀袍之內乳母失於覷視換䙀濕氣所侵及當風解脫風濕之氣傷於內即令腫突多啼漸致風搐也先撮口而生驚乃此候也初生當洗浴然後斷其臍後便當以熟艾封裹之或炙數壯勿令犯濕若先斷臍後洗後浴揩拭不幹或為邪氣所傷或為水入臍中皆致臍瘡也瘡過百日者雖差或風邪入里則變為癇矣小兒患諸風疾傳入惡候至於撮口病至危急凡有臍風撮口鎖肚撮口吊腸撮口卵疝撮口應病悉入成風風入心脾俱能撮口夫患在撮口者皆由結鬱於中干及腸胃閉澀不通氣不能化腹中滿脹肚上青筋撮口以為常則候傳入豈可投藥應患用以珍珠天麻丸利之才通疾去氣和兒活用者敬信而已治宜封臍散為主方封臍散巢氏曰因浴兒水入臍中或尿濕䙀袍致臍中受濕腫爛成瘡或解脫風邪所襲入於經絡則成風癇若臍腫爛不幹久者發搐甑帶灰亂髮灰白姜灰紅綿灰四灰不可加別灰南星白蘞當歸赤小豆五倍子各一錢為末血竭龍骨赤石脂煅海螵蛸百草霜胭脂六味各半錢別研上為末濕則乾摻干則清油塗忌生水撮風散赤足蜈蚣半條炙白殭蠶七個硃砂一錢麝香一字以上四味別研川烏炮半夏薑製南星薑製鉤藤天麻炮荊芥穗六味各一錢同研和前藥上為末豬乳或竹瀝或用東引槐枝十根各五寸槐枝入火煨候津液出拭去灰於烏驢乳或豬乳內浸以槐枝點藥滴口中丹砂丸治小兒臍風撮口丹砂研麝香研牛黃研各一分丁香白附子鐵粉研半夏湯洗之七遍切焙天麻天南星各半兩上搗研為末用粳米飯丸如麻子大每服五丸荊芥湯下空心午後各一服量兒大小以意加減天麻丸出危氏方治因斷臍後為水濕風冷所乘入於臍流於心脾遂令肚脹臍腫身體重著四肢強直日夜多啼不能吮乳甚則發為風搐此藥利驚下痰凡釣腸鎖肚撮口皆可用南星炮二錢白附子炮牙硝天麻五靈脂全蠍焙各一錢輕粉半錢巴霜一字上為末稀糊丸麻子大每服一丸薄荷姜煎泡湯送下若臍邊青黑及爪甲黑者不治益脾散此方在本類空延散後以四君子湯加陳皮厚朴木香薑棗煎服辰砂膏出直指方治噤風眼閉口噤啼聲漸小舌上聚肉如粟米狀吮乳不得口吐白沫大小便皆不通蓋由胎中感受熱氣流毒於心脾故形見於喉舌或為風邪系搏致之辰砂三錢硼砂馬牙硝各一錢半玄明粉二錢全蠍真珠末各一錢生麝一字上為末好油紙封裹自然成膏每服一豆粒許治諸驚月內用乳汁調敷乳頭上吮下金錢薄荷湯下有潮熱甘草湯服蠍梢散出危氏得效方治百日內撮口臍風及胎風上用蠍梢四十九個每一個用薄荷葉卷定以綿扎放砂銚中滾轉炒令薄荷干酥為度再用白殭蠶四十九個生薑汁炒乾去絲嘴同為末以腦子生麝香少許研勻紫雄雞肝三片煎湯調下撮風散出直指方治撮口紫腳蜈蚣半條炙鉤藤一分硃砂白殭蠶焙蠍梢各一錢麝香一字上為末每服一字取竹瀝調下竹瀝解熱神灰散出聖惠方治小兒臍風腫雄鼠糞七枚兩頭尖者是乾薑棗大一塊甑帶一團故緋綿胡粉炒微金色白石脂各半兩上存性燒為灰相和細研如少許麝香為散看臍欲落不落即封臍便差如未患敷之終不患也燒藥時不得令有別灰入外臺無甑帶白石脂聖惠方無白石脂有錦灰控痰散出聖惠方治噤口風撮臍風蠍尾甘草銅青膩粉麝香一方加半夏南星生薑煎調前藥入豬乳點入口中吐下風痰天漿子散一名安臍散出聖惠方治小兒初降誕斷臍了便敷此散免一臘內疾天漿子三枚亂髮燒灰存性半錢蜈蚣二寸燒灰羚半角燒灰一錢麝香一小豆大上研令極細斷了臍便用少許敷之哭風散出醫方大成噤風者一名著禁胎受熱毒流於心脾或生下為風邪侵襲自滿月至百二十日見此名犯風禁不治撮口者初生一臘乃由胎受風熱入臍流毒心脾之經或成臍風胎風鎖肚吊腸卵疝等證皆令氣促舌強唇青撮口如囊不乳其證面目黃赤撮口不乳臍風者由斷臍為水濕風冷之氣流於心包絡或䙀袍尿濕所侵或當風解脫為風邪所襲能令臍腫爛四肢強直多啼不乳先撮口而生驚若臍邊青黑撮口不開是為內搐不治爪甲黑青即死王氏曰其或熱在胸堂伸引弩氣亦令臍腫千金龍膽湯在胎驚類小兒始生其氣尚盛若有疾病即須下之若不時下則成大病小兒在胎受病非一大抵裡氣鬱結擁閉不通並宜取下胎毒紫霜丸或五積丸熱盛四順飲法當先與𠸻風散次與取吐控痰湯次為和胃益脾散方與利驚撮風散蜈蚣一條炙全蠍七個白殭蠶一錢炒瞿麥半錢半夏末半錢上為末鵝管吹入鼻中入如噴嚏啼叫則可醫一方無半夏用薄荷湯調服錦灰散出聖惠方治小兒初生至七日臍風發腫欲落者綿帛燒灰微存性一錢雄鼠糞微炒七枚大棗去核三分麝香研少許上搗研為散看臍欲下落即用藥封之切忌風入一方有胡粉半兩香礬散出聖惠方治小兒斷臍之後不幹及膿出耳中枯礬半兩龍骨一錢黃丹一錢麝香少許研上為細末每用乾摻之立聖散出直指方治小兒口噤蠍梢七個干蜘蛛一個去口足先以新竹於火上炙取竹油一個蛤殼許乃竹瀝也浸蜘蛛一宿炙令焦上同末研極細入膩粉少許每一字用乳汁調時時滴入口中鉤藤湯一名撮口散出聖惠方治小兒初生撮口鉤藤升麻黃芩去黑心各半兩蜣螂二枚去翅足微炒上粗搗篩每服一錢匕水一小盞入蘆根半分煎取五分去滓放溫徐徐服量兒大小加減一方有甘草用甘草湯時時點之當歸散出直指方治小兒著臍風汁出當歸切焙半兩甘草炙銼一分鉛丹研半分上除鉛丹外搗為散入鉛丹合研令勻以敷臍中瘥安臍散治臍中汁出赤腫疼痛因水與乳入臍所致上當歸為末敷蝦䗫燒灰白石脂末油發灰敷皆可蘗墨散治小兒斷臍後為水濕所傷或䙀袍濕氣傷於臍中或解脫風冷所乘致令小兒四肢不和臍腫多啼不能乳哺宜速療之黃櫱末釜下墨煤亂髮燒灰存性各等分上為細末每用少許敷之蜈蚣方治口噤不開不能收乳赤足蜈蚣半枚去足炙令焦上為末入麝香少許以豬乳一合和之分三服豬乳主小兒口噤不開最良麝香散治小兒生下三四日臍風撮口者蓋因生下時剪臍不定傷動臍帶外風入臍故有此證下乳不得其候面青啼聲不出唇青撮口若口出白沫四肢逆冷此惡候赤腳蜈蚣半條酒炙麝香少許川烏尖三個生上細末同麝香研極細每服半字先吹入鼻內連嚏可治次用煎金錢薄荷湯調下此方治小兒驚風尤妙若初生孩兒更斟酌多寡用之蜘蛛方治噤口不開不能吮乳蜘蛛一枚去足及口炙令焦細研上用豬乳一合調和為三服徐徐灌之神效牙疳亦用蜘蛛並麝香胡粉散治臍瘡腫濕經久不瘥若至百日即危急宜用胡粉一錢為末乾薑燒灰一錢為末白石脂一錢存性上同再研細用藥一字至半錢敷臍中時時用麝香散治小兒初生胎熱撮口麝香研丹砂研各一分蛇蛻皮一尺炙令赤為末上細研如粉每用半字以津唾調塗兒唇上日五七次金黃散治嬰兒臍瘡不瘥風氣傳於經絡變為癇疾者川黃連一錢胡粉一錢另研龍骨一錢燒灰另研上研為細末每用少許敷臍中時時用一方加亂髮灰三灰散治小兒臍濕逾月不止干蝦蟆燒白礬燒皂莢子燒各一分上細研少少敷臍中一方蝦蟆燒為末封臍烙臍丸豆豉一分黃蠟一分麝香少許上同搗令爛熟捻作餅子斷臍訖安臍上炙三壯艾炷如小麥大若不啼炙至五七壯炙了以封臍散封之不得令濕著恐臍腫白龍散治小兒臍風天漿子有蟲者一枚白殭蠶直者炒一枚上搗羅為散入膩粉少許以薄荷自然汁調灌之取下毒物神效量兒大小分作二服亦得牡蠣散治小兒臍風久不瘥腫出汁者牡蠣一枚蝦蟆一枚上並燒灰細研如粉每以少許敷臍中甚驗甘草散治小兒臍風汁出甘草炙銼螻蛄炙焦各一分上搗羅為細末摻敷臍中瘥枯礬散一名白龍骨散治嬰兒因剪臍風傷於外致臍瘡不幹白礬煅白龍骨上等分為末每用少許敷之一方用枯白礬末貼之烏蛇散治初生小兒撮口不收乳飲烏蛇酒浸去骨半兩麝香一分研上將烏蛇搗羅為末同麝香再研勻每服半錢煎荊芥湯灌之治臍風濕腫上以鹽豉相和炙熱安臍上亦用黃柏末敷之治小兒撮口病先拭小兒口傍令見血碎之上取雀甕搗汁亦生搗鼠婦並雀甕汁塗之小兒多患不得飲乳者是杏骨膏出聖惠方治小兒臍腫汁出久不瘥杏仁半兩湯浸去皮豬牙頰骨中髓半兩上先研杏仁如膏入髓和令勻以塗臍中蜈蚣丸出聖惠方治小兒撮口赤足蜈蚣一條棘剛子五枚上二味燒成灰飯和為丸如麻子大每服三丸至五丸乳汁下一方燒為末用一字飲湯調下牛黃竹瀝散出危氏效方治小兒胎風熱撮口發噤亦治心熱發驚牛黃研一分淡竹瀝半合上每服牛黃一字用淡竹瀝調下一二歲兒服之三四歲兒每服半錢匕日三服量兒大小以意加減一方豬乳點口中螵蛸散出聖惠方治小兒臍中膿出不幹上用胭脂海螵蛸為末油調搽蝸牛散出聖惠方治小兒胎熱撮口蝸牛子十枚去殼細研如泥蒔蘿末半分上同研令勻用奶汁和塗於口畔立瘥烏槐散出聖惠方治撮口當兩乳中高下平以線量灸之三壯起死仍用後方烏驢乳一兩合東引槐枝十根各長三寸上以煻火煨槐枝入火一半看不煨頭津出即取拭卻灰內於乳須浸須臾便以槐枝點乳於口中大驗白石脂散出聖惠方治小兒臍赤腫汁出不止初生未滿月多啼哭致使臍中血出上用白石脂一兩研為散熬令溫撲臍中日三未愈再貼仍不得剝揭又方出海上名方綿不拘多少燒灰為末乾摻之傅氏活嬰方名綿灰散一方舊者亦佳治臍傷水腫出醫方集成用肉桂碎如粟米粒大炙熱熟絹帛兜包尉臍即安治臍赤腫出醫方集成以杏仁爛研敷之牛沫方出聖惠方取未行牛口沫塗兒口及額上即效治小兒口噤乳不下出聖惠方用白棘燒末水服一錢匕或塗乳上治小兒臍濕將爛若不早治即成臍風或赤腫及膿水出出聖惠方以當歸為細末干滲濕處一方用胡粉等二味相和敷臍中頻用自瘥試之最驗此方一敷而干後因尿入瘡病復作又一貼愈治臍腫出危氏得效方上先用荊芥水洗了蔥葉一皮火上炙過地上出火毒以手指甲刮薄內搭放腫處次日便消用通心飲殭蠶方出聖惠方治撮口面目黃赤氣息喘急啼聲不出蓋由胎氣挾熱流毒心脾故令舌強唇青聚口撮面飲乳有妨及發噤口者用直殭蠶二條去嘴略炒為末蜜調敷唇中效又晚蠶蛾二枚炙黃末蜜敷治小兒撮口風但看舌上及上下齶有瘡如粟米大者是也以蜈蚣汁刮破指甲研敷兩頭間上瘥如無生以干作末點之治小兒臍風用獨頭蒜切片安臍上以艾炙口中有蒜氣即止立效治小兒撮口病取夜合花枝濃煮汁拭口並洗治小兒臍風濕腫久不瘥出聖惠方用蜜蜂房燒末敷之治小兒未滿月不飲乳亦不哭口吐白沫者用丁香七粒用乳汁於磁器內煎灌即愈治小兒臍風鎖口出聖惠方歌曰臍風鎖口為何緣千個醫來千個難收取猢猻拋下糞乳調吃下便安然治小兒撮口風出聖惠方又歌曰小兒撮口風猢猻糞最強燒灰兼奶汁塗口自然良又方出聖惠方取壁魚子細研作末每服少許令兒吮之又方出聖惠方以初生時豆牙爛研以乳汁調與兒吃或生研絞取汁少許與服亦得又方出聖惠方以蝸牛子五枚去殼取汁塗口上瘥即止又方出聖惠方取柏樹白皮穿作小孔安於臍上以艾炷入柏皮孔中灸之即瘥又方出聖惠方以甑帶燒灰研敷之效又方出聖惠方以瓜蒂燒灰研敷之良治小兒生來臍內有汁出經久不瘥方出聖惠方上燒緋帛灰研敷臍中演山真珠天麻丸出永類鈐方治撮口吊腸鎖肚鬱結腹脹青筋阻乳急與疏利量重輕截風定搐南星炮天麻白附子炮各一錢膩粉半錢巴霜一字蕪荑炮全蠍麵炒滑石各一錢半上為末麵糊丸麻子大芽兒三日三丸五日五丸七日七丸加青黛末名青黛丸薄荷湯茶清下治褓中小兒臍風撮口法出德生堂經驗方小兒生後至七日或臍口受風令兒生病宜囑老娘或乳母每日晌午前後仔細看兒口內上齶但有粟米白泡隨用手指輕輕磨破去之可免他疾治褓中小兒臍風撮口法出德生堂經驗方上治小兒上下牙齗當口中心處若有白色如豇豆大此病發之源也急以手爪正當中掏之自外而內掏令氣脈斷出亦不妨又於白處兩盡頭亦依此搗令內外斷只搗令氣脈斷不可見血破肉指爪勿令大銛恐傷兒甚此法乃東坡家藏方內具述趙郡一老人用此治小兒已活千餘人矣信哉是言用之大應治小兒撮口及發噤方出聖惠方上取鼠婦蟲絞取汁與兒少許服之又方出聖惠方上取棘科上雀兒飯甕子未開口者取甕子內物和奶汁研灌之五聖散出傅氏活嬰方治撮口朴硝一分豆豉二十粒白米五十粒蔥白二寸甘草炙一分上用童子小便半盞煎至二三分未乳前先用綿子拭口中一二次逡巡用之令兒腹中自轉然後護養至五七日再用五七滴與之永無胎疾蟬蛻散出傅氏活嬰方治撮口蟬蛻蛇蛻硃砂麝香腦子各等分上研令勻點兒唇上有效牛黃飲子出傅氏活嬰方牛黃君平少毒雄黃君平寒溫硃砂君平微寒上等分為末淡竹葉煎湯點服竹瀝湯出傅氏活嬰方治口噤體熱硃砂麝香上研細收之如用先將苦竹一束除去兩頭節火燒取油一二合入淡竹葉湯點服五靈丸出朱氏集驗方治臍風南星一錢五靈脂一錢草烏半錢為末上用羊膽汁調貼之又方出淡寮方謂臍濕而腫者可用枯過白礬末坯子同敷然恐小兒肉嫩用礬則痛痛則啼哭而又弩力迸損也代以烏賊魚骨為妙治小兒口噤出經驗良方上用麝香少許入大黑豆末中和乳飲之治小兒臍風瘡歷年不瘥方出子母祕授方上東壁土敷之治小兒臍中汁出不止並赤腫出本草用礬燒灰細研敷之治小兒患風臍及臍瘡久不瘥者出本草以蝦蟆燒杵末敷之日三四度瘥治小兒口噤出本草上以蛇莓草汁灌口中死亦再活治小兒口噤體熱者及吐沫不能乳哺者用竹瀝二合暖之分三四服兒新生切不可逆加針炙忍痛動其五脈脈因之成癇是以田舍小兒任其自然皆無此疾可審之治小兒牙關不開出本草用天南星一個煨熟紙裹封角莫要透氣於細處剪雞頭大一竅子透氣於鼻孔中牙關立開治小兒撮口用鹽豉敷臍上以艾於上灸之
