body:
  text: 卷三百八十二嬰孩諸疳門氣疳附論夫小兒氣疳者由乳食不調內有壅熱傷於肺也肺主於氣其氣不榮則皮毛枯燥咳逆上氣多涕交流發熱憎寒揉鼻咬甲唇邊赤養鼻內生瘡腦熱多啼腹脅脹滿乳食減少下痢無恆皮上粟生糞中米出漸漸羸瘦故名氣疳也方蘆薈丸治小兒氣疳毛髮乾豎口無津液或時下利多渴不欲乳食蘆薈細研青黛細研蟬殼微炒熊膽細研人參去蘆頭黃連去須雄黃細研麝香細研蜣螂去翅足微炒以上各一分蝦蟆一酥塗炙微黃訶黎勒皮三分上為末都研令勻以軟飯和丸如綠豆大每一歲以暖水下三丸常服令兒悅澤無病量兒大小以意加減麝香丸治小兒氣疳壯熱憎寒腹脹下痢皮膚乾燥眼澀揉鼻乳食難化日漸羸瘦麝香半錢細研赤茯苓一錢熊膽半分研入胡黃連一分檳榔一枚蘆薈一分微炮京三稜一分研細當歸半分銼微炒木香半分桂心一分川大黃一分銼炒上為末煉蜜和丸如綠豆大每服乳食前以溫粥飲下五丸量兒大小以意加減麝香丸治小兒氣疳頭髮干豎心腹脹滿肌體黃瘦乳哺不消麝香一分細研胡黃連半兩蘆薈細研肉豆蔻去殼檳榔夜明砂微炒青橘皮湯浸去白挖硃砂細研以上各一分乾蟾一枚塗酥炙微黃上為末都研令勻以棗肉和丸如綠豆大每一歲粥飲下三丸日三服青黛丸治小兒氣疳腹內有積惡滯結之物宜先服之青黛一分檳榔一枚木香一分麝香半分細研黃連一兩去須肉豆蔻一枚去殼巴豆半兩大黃半兩銼微炒鱉半兩塗醋炙令黃去裙襴上件藥先取黃連巴豆二味以淡漿水三碗煮令水盡候乾取出巴豆去皮心研如膏紙裹去油其黃連曝乾然後與諸藥都搗研為末用豬膽汁和丸如麻子大三歲每服空心以粥下二丸三四歲每服三丸至四丸每隔三日一服量兒大小加減服之取下惡物為效次宜服訶黎勒補之方在後代赭丸治小兒氣疳腹脹時痛體瘦代赭細研川大黃銼微炒桂心萆薢銼硃砂細研當歸銼微炒木香以上各半兩麝香半分細研巴豆一分去皮心研紙裹去油上為末入研了藥令勻煉蜜和丸如黃米大三歲兒每服用粥飲下三丸三四歲服五丸空心午後各一服量兒大小以意加減硃砂丸治小兒氣疳能益顏色長肌膚消積滯殺疳蟲宜常服硃砂細研麝香細研熊膽細研蘆薈細研蝸牛炒令微黃使君子五靈脂胡黃連以上各一分上為末都研令勻以燒飯和丸如綠豆大每服以粥飲下五丸量兒大小以意加減五靈脂丸治小兒氣疳漸瘦無力五靈脂蟾頭塗醋炙微黃蟬殼微炒夜明砂微炒蝸牛濕煮青黛細研以上各一分麝香半分細研雄黃半分細研上為末入研了藥令勻用糯米飲並蝸牛和丸如綠豆大每一歲以溫茶下一丸後用藿香湯洗兒後以青熱衣蓋令蟲盡出訶黎勒丸取下惡物後宜服訶黎勒皮草豆蔻去皮人參去蘆頭白朮陳橘湯浸去皮瓤焙白茯苓以上各半兩丁香一分研甘草一分炙微赤銼上為末煉蜜和丸如麻子大三歲每服以粥飲下三丸三四歲每服五丸空心午後各一服量兒大小以意加減檳榔丸治小兒氣疳腹脹煩熱大便難檳榔半兩木香半兩續隨子一分青黛半兩研細麝香半分研蟾頭一枚塗酥炙令焦黃上為末入研了藥令勻煉蜜和丸如綠豆大每服以溫水下三丸看兒大小臨時增減木香散治小兒氣疳不欲乳食時復腹痛木香胡黃連當歸銼微炒訶黎勒只用皮上各半兩青橘皮一分湯浸去白瓤焙麝香一錢細研上為末用粟米飲和丸如綠豆大每服不計時候粥飲下三丸量兒大小以意加減麝香丹治小兒肺疳皮毛枯燥咳嗽上氣胡黃連一兩半夏半兩紫酥子炒五味子各三分麝香研蘆薈研硃砂研各一分乾蟾一枚醋炙黃上為細末棗肉和丸如黍米大每服十粒煎人參湯下量兒大小加減一方米飲下消氣丸治小兒氣疳腹脹喘粗木香一錢蘿蔔子半兩巴豆一分炒黃色去巴豆不用上為細末糊丸如綠豆大三歲兒三十丸用米飲下量兒大小與服分氣丸治小兒氣疳腹脹膨脝壯熱有食木香一分黑牽牛半兩生上為末糊丸如小豆大三歲三十丸用米飲下子醜散治小兒氣疳腹急喘粗食氣攻目乳腫鼠糞黑牽牛等分上為末三歲一錢橘皮湯下二服立效檳榔丸治小兒氣疳腹脹胸膈痞悶喘急不安青橘皮去白巴豆肉五枚同研去巴豆不用檳榔蘿蔔子香附子炒香木香以上各五味各用一分黑牽牛半兩微炒上件為細末生薑自然汁煮麵糊丸如黍米大每服十丸溫米飲送下不拘時候烏金膏治小兒氣疳灌入陰黃亮色通草一分燒青皮一分燒大黃一分燒上各燒存性為末每用一錢獖豬膽調成膏於陰上塗未退煎蛇床子湯洗後再調塗之萬壽丸治小兒氣疳羸瘦腹大項小頭髮稀疏臟腑不調或瀉或秘干蝸牛半兩干蚯蚓半兩蛇脫皮一分干蝦頭三個黑醜五個炮麝香一分使君子五個炮上前四味藥入罐子內封閉口炭火燒通赤取出搗羅為末後三味為末同爛研入如粉用粟米飯為丸如綠豆大每服五丸米飲下一日兩服治小兒氣疳不可療神效出本草用綠礬火煅通赤取出用酸醋淬過復煅如此三度細研用棗肉和丸如綠豆大溫水下日兩三服一方三歲三十丸米湯下治小兒氣疳以豬肚蒸黃連為丸風疳附論夫小兒風疳者由肝臟壅熱乳食不調之所致也是以孩子十旬之內三歲之間氣血未調骨本輕軟凡於動靜易為所傷若乳母眛於寒暄失於調適滋味不節加乳無恆或外中風寒內懷驚恐便即乳兒邪氣未除傷兒臟腑致成風疳也其狀搖頭揉目眼赤多睡胸熱發焦百脈拘急漸漸黃瘦者是其候也方胡黃連丸治小兒風疳剜鼻揉眼不知癢處胡黃連人參去蘆頭地龍微炒代赭細研赤石脂以上各半兩蝸牛肉二十七枚青黛研入大蜣螂五枚去翅足微炒豬牙皂莢二十七枚去黑皮塗醋炙焦黃去子木香蟾酥研入黃連去須檳榔硃砂細研麝香細研天麻當歸銼微炒犀角屑乾蠍微炒蟬殼微炒蘆薈細研羌活使君子白蕪荑驢胎耳炙令焦黃蛤蚧頭尾全者塗酥炙微黃牛黃細研以上各一分上為末研了藥令勻以獖豬膽汁和丸如綠豆大每於空心以粥飲下三丸量兒大小以意加減蘆薈丸治小兒肝肺風熱心脾壅滯體瘦壯熱致成風疳宜常服解風熱殺疳蘆薈細研天竺黃細研胡黃連蚺蛇膽研入蛇脫皮灰各一分使君子天麻丁香黃連去須青黛細研木香硃砂細研以上各一分牛黃一分細研白龍腦一錢細研蟬殼半分微炒麝香半分細研上為末入研了藥令勻煉蜜和丸如綠豆大每日空心及近晚以粥飲下三丸量兒大小臨時加減龍腦散治小兒風疳日漸羸瘦多睡壯熱面色青黃或時吐乳龍腦研細黃連去須蛜𧌴微炒天麻馬兜鈴熊膽研入麝香細研牛黃細研蝸牛炒令微黃蚺蛇膽研入藍葉川大黃銼微炒雄黃細研五靈脂硃砂細研一分上為細末入研了藥令勻每服以溫水調下半錢量兒大小以意加減蟬殼丸治小兒初風疳漸羸瘦體熱心驚搖頭揉鼻四肢煩躁皮膚黃黑毛髮乾枯日夕不瘥蟬殼一分微炒全蠍半分微炒硃砂一分細研雄黃一分細研麝香一分細研青黛半兩龍膽半兩研膩粉一分研蜣螂五枚去翅足炒焦黃牛黃半兩研蟾頭一枚塗酥炙微黃烏蛇三分酒浸去骨炙令微黃甜葶藶一分隔紙炒令紫色巴豆十枚去皮心研以紙裹壓去油上為末入研了藥令勻用豬膽汁和丸如黃米大每服以粥飲下三丸量兒大小以意加減黃連丸治小兒風疳身體壯熱或時吐逆心神煩躁胡黃連蘆薈細研天竺黃細研犀角屑胭脂研入天漿子微研羚羊角屑麝香細研乾蠍微炒白殭蠶微炒牛黃細研硃砂細研雄黃細研以上各三分蟾酥一錢研入上為末都研令勻以豬膽汁浸蒸餅和丸如麻子大每服以粥飲下三丸不計時候量兒大小以意加減牛黃丸治小兒一切風疳搐搦牛黃細研黃連去須桂心白附子炮裂川大黃銼微炒膩粉研入人參去蘆頭茯神硃砂細研雄黃細研龍腦細研各一分巴豆三十枚去皮心研紙裹壓去油上為細末都研令勻以栝蔞和丸如綠豆大濃煎蔥白湯下三丸取下惡物為度量兒大小以意加減夜明砂丸治小兒風疳鼻口多癢肌體羸瘦搖頭揉目昏沉多睡夜明砂微炒白附子炮裂白殭蠶微炒牛黃細研乾蠍微炒麝香細研硃砂細研甜葶藶隔紙炒令紫色青黛細研以上各一分烏蛇三分酒浸去皮骨炒微黃蟾酥半分雀兒飯甕上為末用豬膽汁和丸如綠豆大每服以粥飲下三丸量兒大小增減服之蛇蛻皮丸治小兒風疳羸瘦蛇蛻皮微灰一分蘆薈一分細研蜣螂七枚去翅足微炒蟾頭一枚炙令黃蟬殼一分微炒硃砂一分細研天漿子七枚微炒乾蠍一分微炒青黛半兩細研天南星一分炮裂上為末用獨蒜燒熟並醋飲和丸如綠豆大每服空心以粥飲下三丸量兒大小加減蘆薈丸治小兒風疳肌體多熱煩渴心燥夜不得眠臥蘆薈細研天麻胡黃連以上各半兩麝香細研鐵粉細研水銀乾蠍熊膽硃砂細研以上各一分上為末以棗肉研水銀星盡都和丸如綠豆大每服以溫水下三丸量兒大小以意加減一方加雄黃烏膽丹治風疳羸瘦搖頭揉目百脈拘急烏蛇一兩酒浸去皮骨炙令黃干膽酥炙黃蛇蛻皮一兩胡黃連麝香一分蘆薈一分研熊膽一分研上為細末白麵糊丸如黍米大每十粒薄荷湯下量兒大小加減熊膽天麻丹治風疳羸瘦搖頭揉目百脈拘急天麻羌活熊膽蟬殼使君子去殼上為細末粳米飲和丸黍米大每服十粒煎荊芥湯下量兒大小加減天麻丸治肝疳即風疳由乳母寒溫不調乳哺不節肝臟受熱受濕或外感風寒內傷喜怒邪氣末散便以乳兒多成風疳肝者眼之候上膈服熱痰涎壅滯以致肝熱眼赤翳生眵淚爛眩癢揉搽昏時雀盲甚至經月眼合亦名疳眼外證搖頭揉目白膜遮睛眼淚多頭焦發豎筋青腦熱甲癢筋拳燥渴汗多下痢瘡癬青黛川黃連天麻夜明砂川芎蘆薈五靈脂各三錢防風龍膽草蟬蛻去翅足各一錢全蠍一錢麝香一字蟾頭三錢炙焦上為末豬膽汁和丸如麻子大每服十丸薄荷湯下皂角膏治小兒風氣攻項下生核子皂角大者一莖燒存性糯米一合炒黑皮草烏頭生二錢黃皮三錢炒黑色上為末每服不拘多少以井花水調貼如未安須用水精丹取後用調氣觀音散人參散等藥補仍再貼藥與疳藥相間服驚疳附論夫小兒驚疳者由心藏實熱之所致也凡小兒襁褓之內氣未調臟腑細微骨本輕軟因其哺乳不時致生壅滯內有積熱不得宣通心神多驚睡臥不穩胸膈煩悶口瘡煩赤面黃發枯皮燥多渴吃水乳食漸微久而不痊體瘦壯熱故名驚疳也小兒積成驚第一歌曰腹中有塊面如珠形容土色是脾虛如嫌乳食不欲吃醫持秋後命徐徐第二隔中胃積虛胎中受疾實難除更加骨熱三焦渴腹脹生蟲臟腑虛第三身熱火相兼膈熱風痰口有涎多是所傷諸毒物致令疾苦有根源第四脾虛歲至秋遲行體軟亦難留病狀只因不足月忽然浮腫命須休第五青箱數百行肝家受病自難當若加嘔吐驚風作空有良醫少妙方第六脾疳鼻下赤變驚心熱口生瘡口中啼叫風癇作眼赤喉幹不久長第七渾自患浮腫厥冷陰中知是虛思即高聲驚候起乍進乍退必難除方青黛丸治小兒驚疳肌膚羸瘦心神煩熱口鼻疳䘌宜服青黛細研牛黃細研蘆薈細研硃砂細研雄黃細研犀角屑真珠末胡黃連以上各一分蟾酥杏仁一個研入夜明砂半分微炒瓜蒂半分龍腦半分細研乾蟾一枚燒灰蟬蛻七枚微炒虎睛一對酒浸一宿微炙母丁香十枚蜣螂三枚用大麥面作餅子裹灰燒上為末都研令勻另以豬膽汁和丸如黍米大每用奶汁化破二丸滴兒鼻中一丸灌口中