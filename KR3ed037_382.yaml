半兩檳榔半兩熊膽半兩研入乾蟾半兩上為細末每服日空心以暖水下一字服藥後殺蟲五十餘有如馬尾出便瘥三歲以上即服半錢蟾酥丸治小兒蛔疳蟲毒腹脹青筋急滿日漸枯瘦食物則不著肌肉或時蛔蟲出肌肉多痛蟾酥一分麝香一分五靈脂一分巴豆去皮心研紙裹去油上同研令極細用酒半盞同入銚子內以慢火炙不住手攪候堪丸即丸如黃米大每服以陳橘皮煎湯下三丸空心及晚後服之隨兒大小以意加減定粉丸治小兒疳蛔定粉豬膽各一分上研和為丸如綠豆大每服二丸米飲下治小兒疳蛔上用蜀葵花干為末炙豬肉蘸與吃有奇功除毒丹治蛔疳不瘥傳染骨肉者鬼臼一兩苦參青葙子草龍膽半兩硫黃緋絹白礬干蝦蟆各一分以上並燒灰存性上為細末煉蜜和丸如麻子大每服十粒磨沉香湯下大小加減青黛丸治小兒蛔疳一切諸疾青黛一分研胡黃連一分鶴蝨一分蘆薈一分研硃砂一分研上件藥搗羅為末都研令勻以豬膽汁和丸如綠豆大空心以熱水下三丸當有蟲出乾漆散治小兒蛔疳腹肚蟲痛乾漆一錢使君子十四個取肉蕪荑六十片楝樹皮向東邊取皮厚者日乾去粗皮取一兩上為末每服一字二三歲半錢四五歲一錢沙糖熟水下一日三服治小兒疳蛔上取鸕鷀屎乾研為末炙豬肉蘸與吃有奇功療小兒疳蛔咬心心腹脹滿痛黃瘦下寸白蟲上單搗醋麻子為末酒調一錢許服之甚效乾疳附論夫小兒身體憎寒壯熱舌乾發焦皮膚枯燥睡多盜汗乳食雖多肌肉消瘦肢體無力嘿嘿不住忍者乾疳也此由乳食不調心脾積熱嗜甘味多熏蒸積久故令兒日漸尫瘦又謂之疳熱方牛黃丸治小兒乾疳體瘦煩熱眠臥不安牛黃一分研雄黃一分天竺黃一分蘆薈一分胡黃連半兩麝香一錢丁香一分黃連熊膽一分蟾酥半兩蛇蛻皮灰一分青黛一分犀角屑天漿子一分上為末更研令勻以煉蜜和丸如麻豆大以粥飲下三丸日三服量兒大小以意加減天竺黃散治小兒乾疳心脹煩熱眼目赤澀皮膚乾燥夜多盜汗瘦不能乳食天竺黃半兩牛黃一分硃砂一分蘆薈一分雄黃一分蟾頭一分龍腦一錢麝香一錢一分胡黃連一分犀角屑硃砂木香鉤藤一分甘草一分上為細散都研令勻每服以溫水服半錢日二量兒大小以意加減青黛丸治小兒乾疳肌體羸瘦皮毛乾焦發歇寒熱昏昏多睡青黛三分細研牛黃研細蘆薈研細胡黃連硃砂細研麝香細研蛇蛻皮灰龍膽去蘆頭蟾頭一枚塗酥炙焦黃蟬殼微炒以上各一分雄黃一分上件都研令勻用麵糊和丸如黍米大每服以粥飲下三丸日三服量兒大小臨時加減福壽保生丸治小兒乾疳肌肉消瘦蘆薈南木香各二兩蓬朮蕪荑使君子仁黃連青皮去白砂仁陳皮去白神麯各七錢半上宿蒸飲糊為丸每服三十丸米湯下茵芋丸治小兒乾疳體熱茵芋細辛去苗葉黃芩去黑心甘草炙龍齒燒灰石膏碎松蘿各三分杜衡半兩鉛丹別研一分上為末煉蜜和丸如麻子大一二歲每服三丸米飲下三四歲兒五七丸更量兒大小加減青黛散治小兒乾疳肌熱殺蟲青黛別研半兩苦楝根銼三兩黃連去須雄黃別研丹砂別研各一分麝香別研一錢七分蕪荑仁夜明砂炒大黃炙各半兩上搗羅為散每服半錢或一錢米飲調下日再服更量兒大小加減如要解即蜜水調服蟾酥丸治小兒乾疳乳食不成肌膚日漸羸瘦身體壯熱毛髮乾枯四肢無力蟾酥一分豬膽二枚青黛二分硃砂三分細研麝香一分蟬殼一分微炙去足乾地龍一分微炙蛇蛻皮灰一分龍腦三分上除酥外細研以豬膽化蟾酥和丸如粟米大每服以溫水五丸研吹鼻內量兒大小以意加減牛黃丸治小兒乾疳煩渴壯熱皮膚枯燥日漸羸瘦牛黃半錢細研雄黃一分細研甘草半分微炙銼龍腦一錢細研麝香一錢細研黃連一分去須蘆薈一分天竺黃一分上為末令勻用糯米飲和丸如綠豆大每服一歲以粥飲下一丸日三服青黛散治小兒乾疳日久不瘥骨立形枯諸治無效青黛一分麝香一分蘆薈一分硃砂一分地龍一分微炙夜明砂一分微炒干蝦蟆灰一分熊膽一分上為散每服半錢空心以粥飲下更用少許藥吹鼻中後以桃枝湯看冷熱浴兒衣蓋有蟲子出為效也龍齒散治小兒乾疳腹脹急退熱龍齒燒灰龍腦研枯根炒白茯苓去黑皮桂去皮麝香研各一分蜣螂三枚去翅足焦灰上為散一二歲兒每服半錢匕用溫水調下三四歲一錢空心午後服更量兒大小加減訶黎勒丸治小兒乾疳肌肉消瘦飲食不減寒熱枯瘁心腹脹滿好吃泥土訶黎勒皮搗末三分肉豆蔻去殼一枚搗青黛研麝香研蘆薈研熊膽研丹砂研各一分上研令勻用酒煮麵糊丸如黍米大每服三丸至五丸米飲下更量兒大小加減麝香丸治小兒乾疳肌熱化食壓驚麝香細研一錢青黛研雷丸鶴蝨炒綠色貫眾黃連去須各一兩巴豆一十四枚去殼油煎研上除麝香青黛巴豆外余搗羅為末共和研勻用獖豬膽汁浸蒸餅和丸如綠豆大每服五七丸空心日午米飲下更量兒大小加減服之蝸牛丸治小兒乾疳面青目澀腦熱鼻瘡眼生障膜毛髮焦黃肌膚羸瘦蝸牛二分燒灰穀精草三分燒灰夜明砂三分微炙乾蟾一枚塗酥炙令焦黃瓜蒂末半兩雄黃一分麝香一分上為末用蒸餅和丸如綠豆大每服以粥飲下三丸日三服量兒大小加減服之胡黃連丸治小兒乾疳瘦弱不能食乳發豎腦幹肌體羸瘦胡黃連末半兩硃砂三分麝香一分蛇蛻皮灰一條波斯青黛三分蟾酥一杏仁大蘆薈三分上為末用獖豬膽一枚取汁酒一盞和藥末都於銚子內熬成膏丸如綠豆大五歲至六歲以粥飲下五丸日三服三歲以下三丸龍膽散治小兒乾疳瘦瘁鼻癢口瘡龍膽蘆薈麝香青黛各別研黃連去須羊子肝切焙等分上研細和勻每服半錢或一字吹鼻中及塗口中破積丸治乾疳煩熱化腸胃食滯令兒能食破積聚木香青橘皮去白焙桂去粗皮各一兩吳茱萸湯浸焙乾二兩硇砂醋熬成霜取一錢巴豆霜取半錢上為末與硇砂巴豆霜拌勻醋煮麵糊丸如綠豆大每服三丸至五丸早晚後食臨臥一服大便利則減丸數蘆薈丸治小兒乾疳面色微黃肌體羸瘦蘆薈一分龍膽一分去蘆頭青黛半兩細研胡黃連一分牛黃一分細研麝香一錢細研上為末研勻以蒸餅如丸如黃米大每服以粥飲下五丸量兒大小以意加減金蟾丸治小兒乾疳體熱肌瘦蟾頭一枚灰黃連去須胡黃連木香各一分大黃銼炒半分上為末粟米飲丸如麻子大每服五丸至十丸米飲下更量兒大小加減蟾酥煎丸治小兒身體寒熱皮毛枯燥飲食雖多肌肉消瘦嘿嘿不慧名乾疳乾蟾大者五枚細銼用醇酒五升文火煎爛去骨研蘆去滓入蜜四兩銀器內重熬成稠膏胡黃連二兩黃連去須二兩麝香研半兩白蕪荑仁炒二兩上為末以前蟾膏和劑丸如麻子大每服十五丸米飲下不拘時候周晬至十歲以前並宜服大能退疳黃長肌肉牛黃丸治小兒乾疳體熱羸瘦心神煩躁少得眠臥牛黃半兩研硃砂半兩細研水飛過子芩半兩犀角屑半兩麝香上為末都研令勻以糯米飯和丸如麻子大每服用粥飲三丸量兒大小增減服之胡黃連散治小兒乾疳瘦癢胡黃連犀角屑白羊肚切焙細研為末各一錢麝香研一錢上搗羅為散每服半錢生地黃汁小半盞調下空心日午服更量兒大小加減黃連丸一名金瓜丸治小兒乾疳身多壯熱黃瘦黃連去須黃蘗去粗皮甘草炙青橘皮湯浸去白焙各一分上為末加麝香少許和勻以獖豬膽汁入膽內盛用綿子系定於石器內漿水一盞煮漿水減半取出當風處掛一宿去膽皮再研令勻可丸即丸如綠豆大每服五七丸米飲下加至十丸量兒大小加減保童丸治小兒乾疳瘦弱萎黃大黃銼炒一兩黃連去須半兩夜明砂炙楝實麩砂各一分上為末煉蜜丸如豌豆大麝香下三丸更量兒大小加減用之胡黃連散治小兒乾疳飯食如常肌體羸瘦時作寒熱皮毛枯焦嘿嘿不慧胡黃連半兩黃連去須白蕪荑仁各一錢木香半兩上為細末獖豬膽和於盞內坐飲甑中蒸兩度為丸如粟米大每服二十丸米飲下胡黃連丸治小兒乾疳體熱胡黃連去須各半兩黃連半兩丹砂研木香各一分上為末用獖豬膽填藥在內取綿系以杖子一條橫於銚子上將藥膽掛上面勿令著銚底用漿水煮一炊時取出入蘆薈麝香各一分細研和勻飯米丸如黍米大每服五丸至七丸米泔溫水下更量兒大小加減用之漏疳附論夫漏疳之病由風邪毒氣客於手陽明之脈攻衝齒間齦內虛腫濃汁焮痛綿綿不斷久而不瘥時發時愈故名曰漏疳方青礬散治小兒漏疳蟲蝕頸骨破青礬燒研黃礬燒研雄黃別研白礬燒研細辛去苗葉各一分莨菪子微炙附子炮裂去皮苦參藜蘆去蘆頭各一分麝香研甘草炙青黛各研一兩上為末更於乳缽中研細每用少許敷患處病重者以井花水調半錢空心服之黃銀散治漏疳斷爛宣路不止唇齦癢痛牙齒蝕齲黃連去須蒲黃各一兩生薑地黃焙烏頭尖生當歸切焙銅綠細辛去苗葉各二兩莨菪子一分為末粉水銀一錢用棗瓤五枚研令星盡並莨菪子和末上為細散洗淨漱口以手指蘸藥勻敷患處良久溫水漱頻用取效蒿本散治漏疳蟲蝕蒿本去苗土當歸切焙杏仁湯浸去皮尖半兩上研為散每用一字綿裹內蟲孔中看蟲孔漸小為效青梃子治漏疳口齒微爛生瘡信砒磁瓦上炙半熟粉霜磁蒸上炙半熟膽礬磁瓦上炒半熟各一分銅綠生麝香研雌黃研各一錢上為細末鹽水洗漱口次以米飯掌內搓藥成梃子如針頭大置齒縫中蘆薈散治漏疳蝕鼻牙齒鼻爛蘆薈半兩研麝香研青礬燒研黃礬燒研白礬燒研各一分蝦蟆灰半兩上研為散令勻先以綿拭齦上惡血出即貼藥半錢日三次黃連散治漏疳血出不得食黃連去須黃藥子馬牙硝研各一分白礬燒研一分龍腦一錢研上研為散再同研勻每用半錢貼患處龍實散治漏疳蟲有竅龍實龍骨中有之深黃或淡黃土褐色緊掏人舌者白礬燒研蝸牛殼胡粉牛黃各一錢上研為細散每用少許糝貼竅內葵根散治漏疳口瘡葵根切赤小豆土瓜根各一兩麝香研一分上羅為散每用一字貼瘡黑散治漏疳宣露藁本去苗升麻皂莢不蛀者燒灰存性各半兩石膏一兩半碎上羅為散臥時以手指蘸揩齒上微漱存藥氣兼牢牙去臭
