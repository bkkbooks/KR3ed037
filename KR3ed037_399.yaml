body:
  text: 卷三百九十九嬰孩諸疝諸蟲諸疝附論夫腎主納氣乃人之氣海腎虛為風寒所乘為暑濕所襲為喜怒驚恐所傷而水結不散又與氣搏邪聚於中為疝為奔豚為小腸氣為膀胱等證不特外腎小腸作痛或攻刺腰脅或遊走背膂或氣搶心心下痛滿或痛繞臍傍或脅之左右如杯或臍之上下如臂或腸中纍纍如桃李或胃脘覆大如盤或壯熱惡寒或灑淅寒熱有大小便祕者有裡急而下泄者其陰囊間則卵有大小伸縮上下不常囊自腫脹急痛而發歇無定夾冷驚怒則塊物上逼囊根或攻腹脅皆謂腎氣治法大綱風則散之寒則溫之暑則解其熱濕則滲其水驚怒則調其心氣水與氣搏則行其小便其間又以治腎氣藥參之大要流行疏利為先毋曰腎虛不敢疏泄蓋腎為邪氣所幹若非疏利病何由愈倘或姑息畏虛妄投剛補之劑使大小便祕而不通邪氣入腹衝心危殆必矣然腎氣雖虛得之當明冷熱及冷熱不調之證蓋冷者脅邊及外腎清冷小便清而多遇寒則發熱者內夾暑氣或積酒毒熱藥則外腎與小腹俱熱小便數而澀遇熱則甚冷熱不調者小腹外腎乍冷乍熱大小便或澀或利用藥溫涼流行疏導於其中矣若逆氣長吁中脘停酸燥悶嘔吐最為惡候乃天一生水腎實主宗筋聚於陰氣必藉陽明胃土以養今脾土未強腎水既涸脾土又焦陰陽不升降榮衛不流行大小便祕澀腎胃兩虛必為酸汁而暴吐者難治方金鈴子丸出危氏方治疝氣小腹痛引腰脊攣曲身不能直木香檳榔三稜蓬朮炮青皮去白陳皮川練肉蕪花醋浸炒各半兩辣桂牽牛生取仁各三錢川巴豆肉不去油一錢上為末麵糊丸麻子大每三丸空心午前各一服薑湯下小檳榔丸一名神效丸出危氏方治疝氣小腹痛引腰脊攣曲身不能直疝氣因臥得邪風在腎經流傳並血聚如此漸成形冷氣結在臟因茲小腹疼本經無補法疏利藥通靈芫花醋浸炒木香檳榔三稜炒各半兩茯苓青皮去白全蠍肉桂附子炮硇砂各一分上為末將硇砂浸洗去土頓在湯瓶上候成膏子和糖醋打麵糊丸如緑豆大每服三十丸空心溫酒送下未效再服昔日有一人患此服之斷根今三十年不發矣化生丸出楊氏寶書治疝氣小腸痛上連腰脊彎曲飲食不進痿黃身不能直服此藥後宜灸肓俞三壯立瘥百藥俱試惟此最效木香一分炒檳榔半兩生青皮巴豆炒半兩去巴豆陳皮炮三稜莪朮先用濕紙裹取出槌切炒川練去核芫花米醋浸炒各半兩上為細末麵糊丸如黍米大熟水下空心一服臨睡一服治小兒狐疝傷損生㿗出聖惠方芍藥茯苓各十八銖防葵一作防風大黃各半兩半夏桂心蜀椒各六銖上為末蜜和丸如豆大每服一丸日午服可加至三丸玉蟾煮𥚛藥出瑞竹堂歌曰三歲嬰兒性不調休教少子放疏嬌一張衲被檬頭側自有神仙路一條山茱萸蛇床子牡蠣川椒吳茱萸蔥白帶須各等分上㕮咀每服用三錢熬水熏洗患處硃砂丸出御藥院治小兒疝氣硃砂一錢研當門子一枚如皂子大重半分石燕子燒醋淬五次使君子末訶子炮出核為末各一錢木香三字上為細末用米飲為丸如黍米大從一丸至七丸薄荷湯下日二服早晚乳食前各一服當歸散出直指方治疝氣大腑祕小腹陰囊牽引撮聚痛甚辣桂牽牛炒取仁各半兩北大黃桃仁浸去皮焙各二錢半全蠍一錢上銼散每一錢入蜜煎溫服已利後以青皮陳皮茯苓木香縮砂甘草為散生薑煎和胃唇青不治牡丹丸一名桃仁丸出聖惠方治小兒疝氣桃仁炒去皮二錢牡丹白蒺藜炒去刺桂心各半兩郁李仁去皮炒一錢上為末煉蜜丸如小豆大三歲用三十丸溫酒下一方亦治小兒小腹虛冷因多啼氣下致冷陰腫加黃蘗半分微炙用茴香散出全嬰方治小兒疳疝氣攻陰核腫大茴香炒川練子去核牽牛巴戟各等分上為末三歲半錢燈心湯調下一方牽牛為末糊丸小豆大三歲三十丸米湯下常服尤佳香附丸出朱氏集驗方治膀胱疝氣外腎腫痛牽牛炒香附子炒石燕煅紅酒浸研巴豆七粒同牽牛炒去巴豆上末為丸用萆麻湯下金鈴散出危氏方治疝氣作痛時先曲腰啼哭眼中無淚腳冷唇乾額上多汗或外腎釣上陰囊偏大金鈴子一兩炒去核縮砂七錢半去殼蓽澄茄木香各五錢上為末每服一錢大者二錢鹽湯或好酒調服煨棗方治小兒腸氣痛斑蟊不去頭足大棗一斤去核上將斑蟊入大棗內濕紙包煨香熟去蟊空腹食棗桂心湯下治小兒狐疝氣偏有大小時時上下者出濟生拔粹蜘蛛十四枚熬焦桂半兩上為散每服一匕日再酒調下蜜丸亦可治小兒寒疝腹痛大汗出出肘後方濃煮藜葉汁七合頓服以意消息可作三四度飲之大良治小兒疝氣並腎氣以葛袋盛食鹽於戶口懸之大人以手捻抖盡即愈治小兒疝發時腫痛如刺全嬰方以生射干汁取下飲之亦可為丸服之紫蘇子丸出湯氏寶書治臟寒疝氣腹疼真紫蘇子揀淨陳橘皮去白各一兩高良薑桂心人參各半兩木香一分炮上為末煉蜜丸如芡實大或如圓眼細嚼米飲下小兒白湯化下一丸霍亂吐瀉急服煎藿香湯下尤妙備急方出楊氏寶方治證同前沉香木香上以水磨濃傾小盞內逐次磨一服許煎數沸即服無不作效茴香散朱氏集驗方治小兒吊疝大人膀胱疝氣痛京三稜炮茴香炒甘草沒藥上等分為末煎鉤藤湯調下蔥湯亦可桃仁湯出朱氏集驗方治吊疝幼稚服之取效木饅頭切碎用蔥炒桃仁鹽炒上二味等分為細末每服二錢溫酒下治偏墜吊疝方出朱氏集驗方正氣散一貼入鉤藤煎服即愈牡丹丸治小兒陰疝偏腫牡丹皮豉炒防風去叉黃蘗去粗皮微炙滑石別研桂去粗皮各一兩上為末煉蜜和丸如麻子大一二歲兒每服五丸米飲下早晨日晚各一服量大小加減治吊氣出朱氏集驗方鉤藤乾薑甘草各等分上為末湯點下吊腹氣痛未成者出鮑氏方蘿蔔子茴香枳殼甘草各等分上為散煎入少蜜再煎腹痛甚者加少木香又方出鮑氏方蓬朮枳殼木香甘草半兩沒藥二錢乳香一錢鉤藤鉤炒半錢上為末蜜丸如芡實大鉤藤湯下量大小與服立蘇散出朱氏集驗方治小腸氣蛜蝛九個去毒馬藺花二錢水浸一宿木香一錢沒藥半錢胡椒為末半錢上為末蘭香酒調下陰腫附論夫陰腫核腫者由兒啼怒躽氣逆不順乘虛而行陰核偏大又因甘肥不節生冷過度致生疳氣氣結不行流入陰中或傷暑毒或觸風邪使血氣與邪氣相搏停結不散則成陰腫巢氏曰邪氣衝於陰與血氣相搏則成陰腫小兒陰腫者足少陰為腎之經其氣下通於陰小兒有少陰之經虛者而為風邪之氣衝於陰與血氣相搏結則令陰腫也人有常言天生地長多與小兒近地然兒有大小壯弱起止中節可也夫苟腎經氣虛或坐石不起冷氣凝之或近地經久風邪濕氣傷之不為陰腫幾希矣間有啼叫怒氣閉擊於下結聚不散加以水竇不行亦能發為此疾方治小兒核腫壯熱有實千金方青木香甘遂石膏甘草各十八銖麝香大黃前胡各一兩黃芩半兩上㕮咀以水七升煮取一升九合每服三合日四夜二甘遂丸出聖惠方治小兒陰腫壯熱甘遂一分煨令微黃麝香一分細研川大黃一兩銼微炒前胡二兩去蘆頭黃芩半兩木香一兩上為末煉蜜和丸如緑豆大三歲兒每於食前以溫水下三丸量兒大小以意加減三白散出危氏方治膀胱蘊熱風濕相乘陰囊腫脹大小便不利白牽牛二兩桑白皮白朮木通去節陳皮去白各半兩上為末每服二錢薑湯調空心服治盤腸氣釣先服此後服鉤藤膏桃仁丸出危氏方治啼叫怒氣閉擊於下結聚不散水竇不行桃仁浸去皮尖微炒三分辣桂牽牛炒炮取仁牡丹皮白蒺藜炒香搗去刺北大黃各二錢上為末煉蜜丸如麻子大每服五丸或七丸青皮木通蔥白鹽少許煎湯灌下或煎大流氣飲研青木香丸灌下一方無辣桂大黃散出聖惠方治小兒陰腫川大黃一分銼微炒木通一分銼桑根白皮半兩銼羌活一分川朴硝三分上搗羅為散一二歲兒每服一錢以水一小盞煎五分去滓量兒大小分減溫服海蛤散出醫方集成治小兒陰腫由啼叫怒氣擊於下乘虛而行故成此疾宜服海蛤三分蘹香子三分炒薏苡仁半兩茅朮半兩檳榔半兩面裹煨上為末食前溫酒調下半錢量兒大小以意加減治小兒氣卵之疾破故紙蘿蔔子牽牛橘核各等分炒各令焦以黃色上為細末酒糊為丸如緑豆大每服三十丸鹽湯下牡丹丸出聖惠方治小兒陰腫為腸虛冷多啼躽氣下所為宜服牡丹半兩桂心半兩郁李仁半兩湯浸去皮微炒桃仁一分湯浸去皮尖雙仁麩炒微黃上搗羅為末煉蜜和丸如麻子大一二歲兒每服以溫水下五丸早晨晚後各一服量兒大小以意加減牛蒡膏出聖惠方治小兒陰卒腫痛脹生牛蒡汁二大盞煎令如膏赤小豆末半兩肉桂末一分上藥相和如膏塗兒腫處立消漆燕散治小兒陰核氣結腫大或偏腫疼痛漆燕一枚入瓦瓶子內用鹽泥固濟陰乾炭火燒令通赤為度放冷研令細續隨子去皮一分上為細散每服半錢米飲調下治小兒陰腫出聖惠方小豆一合川大黃半兩銼生用上為細散用雞子白調塗兒陰腫處干即易之蛇床仁湯尉方出聖惠方蛇床仁一兩柳蛀屑一兩上藥以水一大碗煎六七沸洗之取其滓以帛裹尉兒腫處治小兒陰腫出聖惠方用狐莖炙搗為末酒服之下半錢又方出千金方用斫桑木白汁塗之又方出千金方用搗蕪菁塗之又方出聖惠方用搗垣衣敷之又方出聖惠方以衣中白魚敷之瘥一方書中白魚雞翅散出全嬰方治小兒陰核腫大用雞翅六莖燒灰京三稜煎湯調塗左腫用左翅右腫用右翅一方單用雞翅燒灰服之古今録驗云治陰囊大如斗三稜散出全嬰方治小兒陰疝核腫用京三稜麵裹煨焦去面將三稜為末三歲半錢空心鹽湯下大小加減蟬蛻散出危氏方治陰囊忽腫多坐地為風或蟲蟻咬著用蟬蛻半兩水一碗煎湯洗腫處其痛立止腫亦消再溫再洗後仍與五苓散加燈心煎服地龍膏出直指方治外腎腫硬或疝或風熱暴腫及陰瘡用乾地龍不拘多少為末先以蔥椒湯於避風處洗次用津唾調敷其上外腎熱者雞子清調敷或加牡蠣少許亦可一方加蔥液調塗一方只用地龍糞生薄荷汁調塗尤妙牡蠣散出危氏方治外腎腫大莖物通明用牡蠣粉研極細先以津唾塗腫處次用糝敷治卵腫出危氏方研桃仁唾調敷亦治婦人陰腫燥癢一方治兒陰腫以桃仁研為膏溫酒化下豇豆大服之日三服大小加減遇仙方出危氏方治風熱腎焮赤腫痛日夜啼叫不退數日皮如雞卵殼愈而復作用老杉木燒灰入膩粉清油調敷效昔滁州趙使君云其長子數歲時患此證忽見一道人説此方一服遂愈五苓散出危氏方治陰核氣結腫大釣痛多因啼怒不止傷動陰氣結聚不散得之或胎婦啼泣過傷令兒生下小腸氣閉加以風冷血水相聚水氣上乘於肺故先喘而後疝痛外腎木硬臍下痛楚不可忍惟利二便則安澤瀉二兩半桂心一兩豬苓去皮赤茯苓去皮白朮去蘆各一兩上為末每服二錢以木通蔥白茴香食鹽煎湯調下得小便利為效治小兒陰卒痛腫出聖惠方用蔓菁子末以豬脂調敷之又方出聖惠方上用馬鞭草爛搗裹之日二易之水萍散出全嬰方治小兒陰囊腫色如琉璃又治瘡豆入目用浮萍草為末三歲煎蔥白湯調下一錢治小兒地風或蟲蟻吹著陰腫出經驗良方用蔥地內蚯蚓糞甘草汁塗一方無甘草水調塗治小兒陰腫出千金方用豬屎五升水煮沸布裹安腫上皂角膏出危氏方瀉腎氣治腎經有熱陰囊赤腫釣痛大腸祕澀大黃五錢黑牽牛半生半炒豬牙皂角各一兩上為末煉蜜丸緑豆大每服七粒溫水空心下茴香散出楊氏家藏方治小兒外腎腫大腸悶作痛香附子去殼巴豆二十七粒炒焦去巴豆不用茴香炒各半兩上件為細末每服半錢煎紫蘇湯調下如是三歲以上服一錢乳食空心下立消散出楊氏家藏方治小兒陰腫脹痛赤芍藥赤小豆枳殼麩炒去瓤上件等分濃煎柏枝湯調藥敷腫處干即以柏枝湯潤之桃仁方出醫方妙選治小兒足少陰之經虛而受風邪者衝於下經則成陰腫病宜用經效桃仁湯浸去皮尖雙仁麩炒微黃三分牡丹半兩白蒺藜半兩微炒去刺桂心半兩郁李仁湯浸去皮微炒一分上件藥搗羅為末煉蜜和丸如黍米大每服十粒以溫酒下乳食前量兒大小加減治百二十日內陰腫如柿大者出朱氏集驗方大黃黃芩黃連黃柏上各等分燒留性為末以雄豬膽汁調抹服則消毒散血一方出海上方治小兒陰囊虛腫以生甘草調地龍糞塗之治小兒陰囊腫脹明亮出本草用石灰湯放溫洗之數次立效治小兒外腎腫痛出朱氏集驗方生地黃甘草上各等分為末煎服立效又方出朱氏集驗方五苓散煎蘿蔔子湯調下即愈偏㿗附論夫小兒偏㿗者是陰核偏腫大亦由啼怒躽氣不止所致其偏腫者氣偏乘虛而行故謂偏腫也方防葵丸出聖惠方治小兒陰偏大卵核堅硬防葵牡丹桂心黃蘗銼滑石以上各一兩豉半兩微炒上搗羅為末煉蜜和丸如麻子大三四歲兒以粥飲下五丸早晨晚後各一服量兒大小以意加減五等丸出千金方治小兒陰偏大又卵核堅㿗方黃蘗香豉牡丹防風桂心各二兩上為末煉蜜丸如大豆兒三歲飲服五丸加至十丸兒小以意酌量著乳頭上服之乳香丸一名妙香丹出全嬰方治小兒疝氣偏墜乳香青木香昆布洗各三錢牽牛炒藿香各半兩上為細末煉蜜丸或棗肉丸如小豆大三歲二十丸鹽湯送下一方用牡蠣湯下蘹香子丸出聖惠方治小兒偏墜或氣攻小腹疼痛蘹香子一分微炒搗為末古文錢青一分研細硇砂一分研細桃仁四十九枚湯浸去皮炙雙仁生用上藥研令勻湯浸蒸餅和丸如麻子大二三歲每服以橘皮湯下三丸萬靈丸出全嬰方治小兒疝氣偏墜京三稜濕紙裹煨茴香炒各一兩斑蟊一錢蛤粉炒去頭足上為末酒糊丸如小豆大三歲五丸茴香湯下食前常服漸退住藥牡丹散出濟生方治小兒卵腫偏墜防風牡丹皮各等分上為末每服二錢溫酒調服鹽湯亦可治小兒偏墜或氣攻小腹疼痛出聖惠方蛇床仁末半兩馬鞭草汁一合上藥相和如膏塗兒陰腫處效治小兒陰㿗偏大出千金方取生白頭翁根搗隨偏腫處敷一宿當作瘡二十日愈以三月上除日收取者佳治小兒偏墜出本草服防葵丸令兒坐於土中午時灸卵下偏墜之處七壯石燕子丸出楊氏家藏方治小兒啼哭躽氣不止動擊於陰偏墜腫脹小腹作痛木香檳榔各二錢石燕子二枚火炙醋淬七遍使君子肉一錢郁李仁一分湯浸去皮別研如膏上件前四味為細末次入郁李仁同研勻煮麵糊為丸如黍米大每服十丸煎紫蘇陳橘皮湯送下乳食前金鈴散出楊氏家藏方治小兒陰核偏腫疼痛往來金鈴子一兩取肉微炒馬藺花炒黃茴香炒黃蒔蘿各半兩上為細末每服一錢煎木瓜湯調下空心服㿗疝附論夫小兒核氣結腫大者㿗疝也由稟受之月肝經虛弱因啼怒躽氣氣脈下墜繫於陰氣則筋脈緩縱結聚不散是為㿗疝也若氣偏虛則其腫亦偏蓋足厥陰肝之經環陰器抵少腹是動則為㿗疝少腹痛方狐陰丸治小兒陰㿗狐陰一具炙黃蜚生蟲十四枚微黃桂去粗皮附子炮裂去皮臍乾薑炮蒺藜子炒去刺細辛去苗各三分桃仁湯浸去皮尖雙仁炒別研卷柏各一兩半上為末煉蜜和丸如麻子大一二歲兒米飲下五丸空心日晚各一服量大小加減一方有消石一作滑石昆布丸出聖惠方治小兒㿗疝攻注連腎外囊腫脹或疼痛偏墜昆布三分洗鹹味蘹香子半兩微炒木香甘草炙微赤銼黃蘗銼丁香爛牡蠣生用銅青以上各一分上為末用熟棗肉為丸如麻子大每一二歲兒煎甘草湯下三丸量兒大小加減桃仁丸治小兒陰㿗日夜疼痛桃仁三分湯浸去皮尖雙仁微炒川大黃半兩銼微炒赤芍藥半兩防葵半兩半夏一分浸洗七次去滑桂心一兩赤茯苓半兩川椒一分去目閉口者微炒去汗上為末煉蜜和丸如緑豆大每三歲兒食前以溫酒下五丸量兒大小虛實加減一方治小兒陰㿗氣疝發作無時者無桃仁防葵名芍藥丸白蒺藜散出聖惠方治小兒陰㿗不消白蒺藜半兩微炒去刺香豉半兩微炒鼠婦蟅蟲微炙川大黃銼微炒桂心細辛以上各一分上為細末一二歲兒每服以溫酒調下半錢每早晚後各一服量兒大小加減薏苡仁散出聖惠方治小兒㿗疝薏苡仁芍藥土瓜根蛇床子微炒黃芩去黑心桔梗炒蛇含各三分上搗羅為散一二歲兒每服半錢匕空心溫酒調下日晚後再服量大小加減一方治小兒陰㿗腫硬或時疼痛無蛇含有地膚子木香散出聖惠方治小兒陰㿗腫脹木香白蒺藜微炒去刺地膚子昆布洗去鹹味枳殼麩炒令黃去瓤槐子以上各一分狐陰一具用酥炙令焦黃上搗羅為散一二歲兒空心以粥飲調下半錢晚後再服量兒大小以意加減治小兒陰㿗腫大不消方出聖惠方硼砂一分上以研化塗之立效治小兒陰㿗出聖惠方取莧菜根搗碎敷之立瘥馬鞭草敷亦佳萆麻丸治小兒㿗疝萆麻仁三十枚棘剛子去皮二十枚石燕子燒一枚滑石末二錢麝香研半錢上為末麵糊和丸如緑豆大每服五十丸空心煎燈心湯下魁蛤散出聖惠方治小兒陰㿗衆藥不效魁蛤三分細研狗陰一具炙令黃白朮半兩桂心一分上搗羅為末一二歲兒每於空心以粥飲調下半錢晚後再服酒下更良量兒大小加減韭子丸治小兒陰㿗韭子炒二兩半附子炮裂去皮臍三分狐陰一具炙黃上為末煉蜜和丸如麻子大一二歲兒每服五丸米飲下早晨臥後各一服量兒大小加減三應散治小兒肝經虛弱筋脈緩縱氣脈下墜陰腫大久成㿗疝蘹香蟲一枚研汁膩粉二錢七分胡黃連末一分上同研令乾每服一字匕陳米飲調下不拘時滑石丸治小兒㿗疝腫硬疼痛滑石碎澤蘭各二錢粉霜一錢續隨子去皮半兩上為末白麵糊和丸如緑豆大五歲以下五丸五歲以上七丸豆蔻酒下空心臨臥服土瓜根散出千金方治小兒氣㿗並以治陰㿗腫硬時復疼痛土瓜根赤芍藥當歸各一兩上㕮咀以水二升煎取一升服五合日二桂心散出千金方治小兒陰㿗腫硬桂心一兩地膚子一兩白朮一兩上搗羅為細末三歲兒每服以溫酒調下半錢匕日三服量兒大小以意加減一方治小兒狐疝傷損生㿗以蜜為丸白酒服之亦可治大人治小兒㿗及陰㿗腫硬用蜥蜴二枚燒末酒服之一二歲服半錢早晚各一服量兒大小加減木通散治小兒㿗疝發作疼痛木通銼膽礬研各一分上研為散每服半錢匕米飲調下治小兒㿗疝腫痛偏墜或氣攻小腹疼痛用枳殼三兩微炒搗為散每用柏枝煎濃汁調厚塗兒囊腫處妙治小兒陰㿗日夜疼痛用蝟皮一個燒存性研細臨臥熱酒調下一錢五分治小兒差㿗差㿗核大小也取杜父魚擘開口咬之咽下此魚生溪澗下背有刺大頭開口長二三寸色黑斑如吹砂而短也治小兒卵㿗用桃仁細研敷之諸蟲附論夫小兒有九蟲一曰伏蟲長四分二曰長蟲一名蛔蟲長一尺貫心則殺人三曰白蟲長一寸長至四五尺亦能殺人四曰肉蟲狀如爛杏令人煩滿五曰肺蟲狀如蠶令人咳嗽六曰胃蟲狀如蝦蟆令人嘔吐喜噦七曰弱蟲又名鬲蟲令人多唾八曰赤蟲狀如生肉令人腸鳴九曰蟯蟲狀如蝸蟲令人下部中癢九蟲之中三蟲最甚而為病之尤者莫如蛔皆由小兒氣血不調腑臟虛弱或食生冷或嗜肥甘胃中氣緩故生諸蟲居腸胃之間多則為痔劇則為癩或因瘡瘍變成癰疽惡瘡又有寸白蟲者長一寸色白形小褊因食生魚牛脂冷物或飲乳致生此蟲損人精氣令人心腹痛若長及一尺亦能殺人凡此諸蟲品類不可悉數皆可通以化蟲藥丸治之欲知蟲證者凡腹痛之脈當沉弦若反洪大者蛔也胕外垢聚甚者蟲也蟲痛者由兒三歲之後甘肥不節生冷過度食生粟炙肉魚生皆致生蟲其蟲因臟腑虛弱而動或食甘肥而動或胃冷而動或胃熱而動動則往來上下腹痛攻心㽱疼叫哭仰身揮手心神悶亂吐涎吐沫或吐清水飲食不成肌膚沉沉默默其蟲不療傷心害人保生云蛔蟲九蟲之數腹中皆有之小兒食乳而哺早或食甜過多胃虛蟲動令兒腹痛惡心口吐清水腹上青筋是其證也方烏梅丹出醫方妙選治小兒久痢蟲動及傷寒蛔厥並宜服之烏梅肉一百枚炒焦川黃連三兩乾薑二兩當歸洗焙乾二兩附子一兩炮裂去皮臍細辛桂一兩刮去粗皮人參一兩去蘆頭蜀椒一兩揀去閉目雙仁者炒香熟出汗黃蘗一兩上為細末煉蜜和丸於石臼中搗一二百下丸如黍米大每服十粒米飲下量兒大小加減大蘆薈丸治疳殺蟲和胃止瀉胡黃連黃連白蕪荑去扇稱蘆薈木香青橘皮雷丸鶴蝨微炒各半兩麝香研二分別入上為細末粟米飯丸如緑豆大米飲下一二十丸無時議曰小兒疳積蟲積皆由食肉太早脾胃本弱受之不磨症傷不化何況更加以肥膩冷硬之物腸胃虛怯因積生蟲惟有三種蛔苗胃也蛔多令兒喜食滋味肉脯之物腹肚緊脹心胸膨滿苗多令兒消瘦神困肚脹青筋疳氣漸盛腸鳴瀉臭食即嘔噦胃多令兒喜食酒肉食不生肌常作困胸滿脅脹煩躁迷悶眠不安席並宜服此其蟲自化盛用利下仍須調胃和氣助之下蟲丸出活幼口議治小兒多蛔蟲苗蟲食蟲疳蟲血蟲並宜服之鶴蝨炒一錢光粉炒二錢膩粉三大錢匕使君子一百個炒檳榔一錢生龍牙根二錢生貫衆子午卯酉日採取方驗緑色者佳二錢龍膽根二錢苦楝根皮酒炙二錢上為細末水煮麵糊為丸如麻子大每服三五十丸空心食前甘草湯下或以豬肉清汁羹服之尤妙仍以調脾和胃佐之貫衆丸治小兒九蟲貫衆一兩一分去白蟲雚蘆三兩去長蟲蕪荑去長蟲狼牙各一兩去胃蟲蜀漆去蟯蟲雷丸一兩半去赤蟲白殭蠶去弱蟲厚朴去粗皮生薑汁炒去肺蟲石蜜去蛔蟲各三分上為末煉白蜜和丸如麻子大每服量兒大小加減四五歲以苦酒調下五丸空腹服之以知為度未知稍加至十丸治小兒香煎丸治小兒蟲動腹痛啼叫口吐涎沫乳香沉香各一錢肉豆蔻一個煨百草霜木香丁香各一錢巴豆一十四粒出油如霜上為末煮酒封頭蠟和丸如緑豆大每服三五丸淡生薑湯送下如患肚痛不止服之大效常服以通為度又云此方加沉乳二香即名感應丸宜療小兒虛中積證冷積症積疳積食積脾氣乳積盤腸蟲痛及胃久虛臟腑中脘不和痞氣鬱結或瀉或痢或嘔或噦腹肚疼痛兒體虛羸不堪動轉者並與服之此方比珍珠丸等取積大不同只恐服此未能通利若通利誠為之幸如胃仍虛當以和脾生胃之藥斟酌用之一方鉤藤湯下凡用藥下蟲須在月初蟲頭向上可下仍須空心清早下後以和胃藥調之使君子餅治因吃食粗肉肥甘生熱肌瘦體虛口吐清涎唇間紫色腹中絞痛口鼻中出黑色蟲不治使君子四十個去殼雷丸半兩定粉二分輕粉半錢青葙子鶴蝨各一分上為末用雞鴨卵和蒸為餅先將此藥隔日夜五更服後將蔥湯丸巴豆二十五粒用水浸一宿五更初去水後去皮殼心膜不去油另研輕粉半錢滑石五錢鷹糞五錢取下化蟲丸治小兒好食炭土不長肌膚五心煩熱鼻赤齒搖蕪荑黃連神麯麥糵烏梅以上各微炒陳皮去白各等分上為末麵糊丸黍米大空心米飲下肥豬汁尤佳量兒大小下一二十丸白鮮皮丸治小兒諸蟲大啼時作心腹脹白鮮皮半兩苦楝根半兩鶴蝨炒半兩定粉青橘皮湯洗去白焙半兩石灰一分上為細末麵糊和丸如緑豆大每服十丸煎使君子湯下不拘時候奪命丹治小兒蟲動不止攻心危困狼牙草扁竹苦參各一兩雷丸鶴蝨揀淨薏苡仁各半兩上為細末糯米飯和丸如黍米大每服十粒取生地黃汁下量兒大小加減棕櫚散治小兒痔疾皆由勞傷過度損動血氣其里有蟲甚細棕櫚一兩燒灰荊芥一兩去枝梗側柏一兩炙黃牛膝半兩枳殼半兩黃耆半兩上為細末每服半錢米飲調下乳食前遣蟲丸治小兒蟲動腹痛啼叫口吐涎沫檳榔蕪荑雷丸定粉鶴蝨炒各等分上為末煎苦楝根湯煮丸如小豆大每服三十丸煎使君子湯送下食前又云如蟲攻下部燒艾煙燻安蟲散治小兒吃物粗肌膚消瘦蟲生腹內極痛不可忍者終日啼哭或因臟腑虛弱而動或因食甘肥而動其動則腹中疼痛發作腫聚往來上下痛無休止亦攻心痛叫哭閣眼仰身撲手心神悶亂嘔噦涎沫吐清水四肢羸困面色青黃飲食雖進不生肌膚或寒或熱沉沉默默不知病之去處其蟲不療則子母相生無有休止長一尺則能害人及治蟲咬心痛來去不定不思乳食一名化蟲丸一名鶴蝨散真胡粉炒檳榔川練子肉炒去核一方用苦楝根去浮皮鶴蝨炒各二兩白礬二錢半生用上為末米飲調痛時及空心服之或以麵糊為丸如麻子大一歲兒服五丸溫漿水入生清油一二點打勻下溫米飲下亦得不拘時候其蟲細小者皆化為水大者自下一方化蟲丹月初服尤妙化蟲散雷丸二錢使君子十個鶴蝨一錢生大黃一錢甘草一錢上為末肉汁調服千金散治小兒疳蟲動心痛面伏地臥口吐清水痰涎白檳榔銼一錢紫楝根銼石榴根皮銼鶴蝨炒令煙出蘆薈研各半兩上為散空心熱茶調下一錢匕更看小兒大小加減一方無蘆薈用生乾地黃一方忌餳糖黏滑食化蟲丸治小兒寒熱傷脾蟲痛瀉青黑色減乳食木香一分檳榔炒二枚胡粉苦楝根鶴蝨炒各二分上為末麵糊丸如麻子大一二歲每服十丸溫粥飲下日二瘥即止鶴蝨散治小兒蟲痛面好伏地口吐清水鶴蝨炒苦楝根各一分檳榔銼一枚牽牛子炒一分使君子去皮十枚上為散每服半錢匕米飲調下檳榔散治蟲痛檳榔貫衆石菖蒲木香甘草各一兩上㕮咀用水一盞煎服黑金散出醫方妙選治小兒蟲煩預先服之得眠睡為驗乾漆二兩肉桂一兩草豆蔻半兩石榴根半兩精明雄黃半兩水磨者上於瓦器中燒存性搗羅為末乳鉢內研極細每服一字至半錢研入麝香少許煎粟米調下量兒大小加減補胃膏出醫方妙選治小兒腹痛不可忍者瀉痢蟲煩高良薑一兩微炮肉桂一兩刮去皮肉豆蔻半兩乾漆半兩燒存性烏梅肉半兩炒乾上為末煉蜜丸如雞頭子大每服一粒至二粒米飲化下乳食前一方有白朮無烏梅肉麵糊丸如粒米大蝟皮散出醫方妙選治小兒痔疾皆由勞傷過度損動血氣其里有蟲甚細蝟皮一兩燒灰鱉甲一兩塗酥炙黃去裙襴蛇蛻皮一兩燒灰露蜂房半兩微炒麝香一錢上為末每服半錢米飲調下量兒大小加減香雷散出醫方妙選治小兒諸蟲動啼叫不止雷丸鶴蝨苦楝根淡蕪荑各半兩上為末每服一字至半錢用生精豬肉汁調下食前服勝金丸治小兒疳蟲痛取效龍膽定粉研黃連去須烏梅肉炒各等分上為末煉蜜丸如麻子大每服十丸米泔下檳榔散治小兒蟲痛頻發面青嘔吐冷痰漸肌瘦檳榔銼一枚酸石榴皮銼苦楝根銼陳橘皮湯浸去白焙各一兩上為散每服半錢匕米飲調下食前服赤石脂丸治小兒胃虛蟲動赤石脂細研二錢肉豆蔻燒存性二枚橡實五錢莨菪子淘去浮者滿五橡實中上將橡實並莨菪一處炒令黑色與赤石脂豆蔻同搗羅為末入蟾酥少許用麵糊丸如黃米大每服五丸米飲下蟲痛煎苦楝根湯下小兒泄瀉頻服良乾漆散出永類鈐方專治小兒疳蟲腹痛乾漆炒煙出一錢使君子取肉十四枚楝根皮東邊皮厚者曝乾去粗皮一兩蕪荑一錢半上為末每服一字二三歲半錢四五歲一錢砂糖熟水調下一日三服化蟲丸出楊氏寶書治因疳生蟲五心煩熱蕪荑炒黃連炒去須神麯炒麥糵炒各等分上為末麵糊丸如黍米大空心米湯下一方用豬膽汁麵糊為丸米飲下肉汁尤佳黃金散出醫方妙選治小兒吐痢腹蟲動者乾漆一兩白蕪荑肉豆蔻各半兩精明雄黃三分細研上研細每服半錢蔥白湯下入生油一點同調下須調令勻熟藥冷即再溫乳前服安蟲丸一名川練丸出錢氏方治上中二焦虛或胃氣蟲咬心動及痛乾漆三分杵碎炒煙出盡雄黃一分巴豆霜一錢上為細末麵糊丸黍米大看小兒大小與服取東引石榴根煎湯下痛者煎苦楝根湯下或蕪荑湯下五七丸至二三十丸發時服萬安散治小兒疳渴蟲動心痛蝦蟆蛇蛻皮蟬殼各一分燒上為散麝香半錢同研每服一字匕日午溫水調下午後煎柳葉湯浴用青紗帛子蓋之其蟲自出蕪荑散出聖惠方治小兒寸白蟲蛔蟲動作多吐清水白蕪荑兩半狼牙草一兩白蘞半兩上為散每服半錢匕以苦酒二合空服調下立瘥化蟲散治小兒蟲痛不可忍白丁香一錢檳榔銼一枚雷丸一錢上為散每服一字或半錢匕米飲調下奶食後服滴金丸治小兒蟲動心腹痛雄黃麝香各半錢白礬三錢上為末粟米飯和丸如麻子大每服五丸煎苦楝湯下化蟲丸治小兒疳蟲㽱刺腹痛及蛔蟲常服化其蟲去根蕪荑一分檳榔銼二錢鶴蝨炒半錢上為末獖豬膽丸如麻子大每服五丸七歲十丸陳米飲吞下一日三服治小兒三蟲出千金方雷丸芎藭各等分上為末每服一錢匕日三服蕪荑散出全嬰方治上中二焦虛或胃寒蟲動及痛小兒蟲咬心痛面青唇紫口吐清水不食白蕪荑去扇稱乾漆各等分上為細末每服一字半錢或一錢米飲調下發時服靈白散一名靈礬散出醫方集成治蟲咬心痛欲絶五靈脂二錢白礬枯半錢上研勻每服一二錢水一盞煎至半盞溫服當吐出蟲為效使君子餅出經驗良方取疳蛔蟲使君子鸕鷀糞各等分上為末雞子一個打破並藥為餅蒸熟五更初食其蟲立可出麝香散治小兒諸蟲及一切疳蟲麝香研一分夜明砂一兩上為末每服半錢匕蔥白湯調下楝實散治小兒蟲痛楝實雞糞各等分上為散每服半錢匕冷水調下治蟲方出經效良方用乾漆一兩搗碎炒令煙盡出油用新汲水入生麻油空心吞下一方調下一字不過三服當取下蟲即瘥治小兒疳蟲取羊蹄葉作菜食之良亦解胡荑魚鮭魚鱣魚之毒治小兒因吃食粗肥甘生熱肌瘦體虛口吐清涎唇間紫色腹中絞痛口鼻中出黑色蟲者不治用使君子湯每服二錢苦楝根少許煎湯調服治小兒蟲證腹痛啼哭如口角青者蟲證也抱起稍止臥之則大啼蓋臥則蟲攻上起則蟲攻下故也出經效良方以平胃散加生硫黃一粒如小指大煎服痛即止又方用白蕪荑檳榔各一兩蒸餅為丸每服二十丸熟水下治小兒蟲出經效良方用石榴皮桑白皮椿皮苦楝根皮等分為末水煎服治小兒諸蟲疼痛不止者以使君子火煨為末以殼煎湯送下宜於月初四五間服之其蟲自下化蟲丸出仁存方鶴蝨去土胡粉檳榔白礬半生半枯苦楝根各半兩蕪荑黃連酸石榴皮各一分上為末以麵糊丸如麻子大一歲兒三丸漿水入香油三五滴下其蟲小者化為水大者自下加雷丸或用豬瘦肉湯下亦可化蟲丸出直指方治蟲痛蕪荑川鶴蝨雞心檳榔蘆薈干蝦蟆炙焦各一分上為末雄豬膽汁為丸麻子大每服五丸陳皮飲下或使君子煎湯送下凡蟲月首則頭向上凌晨可服藥人參湯治小兒疳蟲咬心痛不時日夜不睡人參桂去粗皮桃柳枝銼焙狼牙乳香研青橘皮去白焙炒吳茱萸湯浸焙炒各一兩古老錢四文火煅上粗搗篩每服一錢水六分煎至四分去滓溫服量兒大小加減服之楝根湯治小兒蛔蟲攻心痛楝根皮有子者酸石榴根槐根各一握切碎用東引者上以水三盞煎取一盞去滓空心頓服以藥盞合之即瀉蟲出仰之即吐蟲出神驗量兒大小加減夏少保傳經驗蟲動疼極不可忍方用乾漆半兩檳榔一個生用窯煤一塊再煅細研三件一處為末空心熱酒服良久取下少保門子之兒十歲心痛危極服藥不痊遂用此方取下蟲即愈化蟲丸治小兒脾胃虛弱面黃肌瘦或大便有蟲出或有諸蟲腹內作痛並宜服之乾漆炒煙盡二錢半雄黃另研水飛二錢半蕪荑另研極細狗脊銼各三錢巴豆霜一錢上先將乾漆狗脊為細末次入雄黃蕪荑巴豆霜同研勻細水麵糊為丸一二歲兒如粟米大每服五七丸三四歲如麻子大每服七八丸乳汁送下或煎石榴湯送下或煎蕪荑湯送下更效日進二服如有蟲即時化作濃水便下大效抵聖散治小兒諸蟲定疼痛苦楝二兩白蕪荑半兩上為末水一盞藥末一錢煎取二分放冷待發時服之雄麝散治小兒蟲動心腹撮痛口吐涎沫乾漆炒青煙出使君子炮去殼各三錢雄黃半兩別研麝香一錢別研上為細末每服半錢煎苦楝根湯下使君子散治小兒飲食不調恣食肥膩蟲作㽱痛唇青白嘔吐痰沫發歇往來宜服此藥取蟲使君子二十枚炮去殼蕪荑銼研半兩檳榔一錢大腹子二枚上件為細末次入蕪荑仁同研勻每服一錢至二錢煮豬肉湯調下香蘇散治諸蟲腹痛疳食氣積肚緊痞氣紫蘇香附各二兩陳皮制一兩甘草炙半兩上㕮咀薑蔥煎熱服內加川芎白芷名芎芷香蘇散內加三稜莪朮丁香使君子苦楝根皮名君子香蘇散治小兒蟲氣痛內加木瓜檳榔蘇木烏藥羌活蒼朮名行氣散多加大黃治腳氣茴香丸治蟲積氣痛陳皮茱萸三稜莪朮丁香枳殼炒茴香炒檳榔炒去巴神麯麥芽各等分使君子一百個上為末醋糊為丸緑豆大空心飯飲吞下或薑湯吞下亦可小青木香丸治蟲痛氣刺腹肚疳積盤腸一切等候並宜服此藥青木香鹽炒胡椒白薑烏藥茴香炒上等分為末用湯浸烏梅肉煨火蒜共搗爛和每服二三十粒空心陳皮湯下取蟲立效丸使君子肉三錢檳榔半錢輕粉二字上為末入煎雞子餅少可爛飯數粒搗成丸輕粉為衣每服四五十丸五更初肉湯吞下後進宣藥殺蟲神妙丸苦楝根皮握下二三寸炒川練子石榴皮使君子蕪荑仁炒檳榔鉛錫灰輕粉莪朮巴豆去心膜油三稜青皮棐子蛤粉雞子黃一枚上等分為末醋糊為丸如麻子大每服用二三十丸空心炙桃柳條湯下或五更用茶清肉湯連進三兩服立通有效治小兒大腹殺蟲用苦耽苗子煮汁服亦可生搗絞汁服蛔蟲附論夫蛔蟲九蟲之內一蟲也長一尺亦有長五六寸者或因臟腑虛弱而動或因食甘肥而動其動則腹中痛發作腫聚行來上下痛有休止亦攻心痛口多吐涎及清水貫傷心者死凡小兒有蟲火煨使君子與食以殼煎湯送下甚妙人多於臨臥服又無日分多不效唯於月初四初五間五更服之至日午前蟲盡下乃以和胃溫平藥一二服調理或有蟲痛發作似癇但目不斜手不搐唯只心痛也蛔蟲長蟲此證候作與脾氣冷積虛積大抵相似然小兒腹肚緊脹天明叫喚吐津沫要羹肉吃方小安乃蛔蟲候脾氣多噎逆飲食不下虛中有積腹緊吊痛冷積脹緊心腹膨滿不任坐臥兩脅心膈上下攻刺疼痛作脹先與下蟲丸殺蟲其蟲困次與水晶丸推下餘證各與調胃藥服卻推下積宜服小沉香煎丸又云小兒疳積蟲積皆由食肉太早脾胃本弱受之不磨症傷不化何況更加肥膩冷硬之物腸胃虛怯因積生蟲只有三種蛔苗胃也蛔多令兒喜食滋味肉脯之物腹肚緊脹心胸膨滿苗多令兒消瘦神困肚脹青筋疳氣漸盛腸鳴瀉臭食即嘔噦胃多令兒喜食酒肉食不生肌常作困頓腹脅䐜脹煩躁迷悶眠不安席並宜服此其蟲自化凡蟲痛面白無光心腹痛口吐沫及青水出發痛有時安蟲散主之小兒本怯者多此病積痛食痛虛痛大同小異惟蟲痛者當口淡而沫自出辛氏女年五歲病蟲痛諸醫以巴漆硇砂之屬治之不效至五日外多哭而俯仰睡臥不安自按心腹時大叫面無正色或青或黃或白或黑目無光而慢唇白吐沫至六日胸高而臥轉不安錢詳而視之用蕪荑散三服見目不除青白色大驚曰此病大困若更加瀉則為逆矣至次日辛見錢曰夜來三更果瀉錢於瀉盆中看如藥汁以杖攪之見有藥丸錢曰此子肌厚當氣實今證反虛不可治也辛曰何以然錢曰脾虛胃冷則蟲動而今反目青此肝乘脾又更加瀉知其氣極虛也而丸藥隨糞下即脾胃已脫兼形病不相應故知死病後五日危篤七日而死方檳榔丸治蛔厥腹痛其證怒啼干痛吐清涎人中唇鼻皆黑謂之蛔厥多似慢驚但唇紫耳雞心檳榔鶴蝨貫衆蕪荑川楝肉使君子肉雷丸雄黃乾漆存性輕粉巴豆去殼油木香黃丹煅錫灰炒不見星如灰各等分上為末酒煮麵糊丸以用五更豬肉蔥油煎醬細嚼莫吞蟲頭向上便用肉汁調化蟲散吞下檳榔丸至巳時取下蟲方可飲食化蟲散見諸蟲類使君子散治小兒蛔蟲使君子蘆薈研干楝皮檳榔銼蕪荑各三兩肉豆蔻去殼丁香苦參各二兩膩粉上為散每服一字匕空心飯飲調下療小兒蛔蟲出本草取萹蓄煮汁令濃飲之即瘥治小兒蛔蟲出本草以莢蒾樹枝煮汁和作粥甚美以飼兒能殺蛔蟲尤妙青葙子散出聖惠方治小兒蛔蟲發作心痛多吐青葙子苦參銼黃連去須萹竹狼牙草以上各三兩雷丸一兩雄黃半兩細研桃仁一兩浸去皮尖雙仁麵炒微黃上為細散一二歲無時以稀粥飲調下半錢兒稍大以意加之若下部癢綿裹少許內之日二度如不癢即弗用槐耳湯治蛔心痛取槐樹上木耳燒作灰痛發棗肉碾和水調服備急散出聖惠方治小兒蛔蟲㽱刺心腹疼痛及蛔蟲齧心腹痛用鶴蝨一兩搗細羅為散每服煎肥豬肉汁調下半錢其蟲便出量兒大小以意加減治小兒蛔蟲咬心痛神效亦治蛔蟲薏苡根二兩去土銼上以水一大盞煎取半盞去滓一二歲兒每服一合三四歲至五六歲兒二合空心服之隨大小以意加減一方煮汁作糜食之甚香大效桃仁散出聖惠方治小兒蛔蟲咬心痛桃仁湯浸去皮尖雙仁麵炒木香狗脊白蕪荑狼牙草苦楝根皮銼鶴蝨檳榔各等分上為細散三歲兒每服煎苦楝根湯調下半錢日三四服量兒大小臨時加減木香桃仁丹出醫方妙選治小兒蛔蟲攻心痛不可忍木香一兩桃仁一兩湯浸去皮尖雙仁麵炒香熟檳榔一分黑狗脊一兩鶴蝨一兩揀淨苦楝根皮半兩上為細末獖豬膽汁和丸黍米大每服十粒點麝香湯下不拘時候三根散出醫方妙選治蛔蟲動啼叫不止每至月初間尤甚狀如神祟貫衆根苦楝根酸石榴根各一兩栗刺故綿乾漆各半兩以上各燒灰存性上為末每服一錢用水八分煎四分去滓溫服不拘時候苦楝根散出聖惠方治小兒腹藏有蛔蟲苦楝根鶴蝨薏苡根銼檳榔糯米微炒牽牛子微炒以上各一兩上搗為細散三歲每服以粥飲調下半錢日三服看兒大小臨時加減檳榔散出聖惠方治小兒蛔蟲咬心檳榔三分狼牙草一分酸石榴皮三分赤芍藥川朴硝各半兩上搗為粗散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減溫服貫衆散出聖惠方治小兒蛔蟲攢心閣眼撲手心悶貫衆狗脊狼牙草萆薢銼各一兩上為粗末每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服胡粉丸出聖惠方治小兒腹內有蛔蟲時時㽱痛胡粉三分獖豬膽三枚麝香牛黃各一分上研為細末用膽汁浸蒸餅和丸如緑豆大五歲兒每服以溫水下七丸看小兒大小以意加減下蟲檳榔散出聖惠方治小兒蛔蟲攻臟腑㽱痛檳榔半兩苦楝根皮半兩銼麝香一錢細研東引石榴枝皮半兩銼上搗細羅為散入研了藥令勻五歲兒每服以熱茶調下半錢量兒大小以意加減蕪荑散治小兒蛔蟲咬心痛等乾漆炒煙盡一兩雷丸蕪荑各半兩上為末溫酒調服鶴蝨散出聖惠方治小兒多吐蛔蟲鶴蝨一分川大黃一分銼微炒川朴硝二錢上為粗散都以水一大盞煎至七分去滓三歲溫服半合日三服量兒大小以意加減麝香散出聖惠方治小兒蛔蟲咬心或吐清水麝香一錢研入萆薢一兩銼苦楝根一兩銼上搗為細散以獖豬膽三枚取汁和令勻曝乾後卻研為末每服以蕪荑湯調下半錢量兒大小以意加減萬金散治小兒蛔動卒叫如心痛乾漆炒煙出一兩雄黃二兩上為細散每服半錢匕油一點溫水調下量兒大小以意加減化蟲乾漆丸出聖惠方治小兒蛔蟲咬心㽱痛四肢逆冷乾嘔不吐面色青宜服此藥乾漆二錢膽子礬一錢上搗羅為末用蔥白湯煮麵糊和丸如麻子大二三歲兒以石榴皮湯下二丸日三服三四歲三丸又方胡粉一分膩粉半兩上細研令勻五歲每服以粥飲調下半錢量兒大小以意加減若用羊子肝一具煮熱切以藥末拌和與兒食之更佳治小兒蛔蟲攻臟腑㽱痛出聖惠方酸石榴根半兩入土五寸東引者檳榔一枚上切碎以水一大盞煎至七分去滓入粟米半合煮稀粥空心與食蟲下更利量兒大小加減服之治小兒蛔蟲出千金方削揀木上蒼皮以水煮取汁飲之量兒大小加減一方以根白皮煮服之亦治蛔蟲用半兩一方不用蒼皮治小兒羸瘦有蛔蟲出千金方用雚蘆二兩以水一升米二合煮取米熟出滓服之又方出千金方桃白皮三兩東引吳茱萸根白皮四兩上㕮咀以酒一升二合漬之一宿漸服取瘥為度又方出千金方取豬膏服之亦治蟯蟲亦云煉臘月豬脂每日空心取如皂莢子大服之亦良又方出千金方搗槐子用少許內下部中瘥亦治蟯蟲又方出千金方楝實一枚內孔中亦治蟯蟲一方云為末用少許內下部中殺蛔蟲方取鼴鼠小兒食之良治孩兒蛔蟲定疼痛用葶藶子一分生為末以水三合煎取一合一日服盡治小兒蛔蟲痔疾用瞿麥葉煎湯服之榴枝飲治蛔蟲方出千金方用石榴枝東行根一把水煮服之亦治寸白蟲大驗治小兒蛔蟲定疼痛用石竹葉煎湯服之又方用繅絲湯一盞服之此繅絲湯系煮繭汁為其殺蟲故也蟯蟲附論夫小兒蟯蟲者是九蟲之內一蟲也形甚細小如今之蝸蟲狀赤因臟腑虛弱而致發甚者則成痔瘻瘑疥也方胡粉丹出醫方妙選治小兒蟯蟲發動甚者成痔瘻瘑疥青州大棗五十兩蒸熟取肉水銀半兩胡粉一兩雄黃半兩水磨飛研上拌勻與水銀一處拌勻用棗肉和如黍米大每服一粒苦楝根煎湯下量兒大小加減治小兒蟯蟲蝕下部出聖惠方槐根白皮一兩銼桃仁一兩湯浸去皮尖雙仁生研苦楝子一兩上搗羅為末以豬膏和丸如棗核大內下部中更以蔥白兩莖去須水煮濃汁溫飲半合治小兒蟯蟲攻下部癢出聖惠方用萹蓄葉一握以水一升煎至五合去滓空腹飲之蟲即下用其汁煮粥亦佳一方搗汁服並瘥大棗膏出聖惠方治小兒蟯蟲蝕下部中癢蒸大棗一枚取肉水銀半兩上藥都研令水銀星盡捻為挺子長一寸以綿裹宿內下部中明旦蟲出為效胡粉散出聖惠方治小兒蟯蟲蝕下部胡粉一分雄黃一分上藥都研令細每用少許敷內下部中桃葉飲治小兒蟯蟲用桃葉一兩搗絞取汁空腹服半合亦治寸白蟲治小兒蟯蟲蝕下部出聖惠方杏仁一兩湯浸去皮尖雙仁麩炒微黃上研如膏以綿裹棗核大內下部中甚者不過三度瘥寸白蟲附論夫小兒寸白蟲者是九蟲內之一蟲也長一寸而色白形小褊小兒多因甘肥不節生冷過度之所致也其蟲發動則傷人臟腑飲食不成肌膚子母相生無有休止若蟲長一尺則能害人也方碧金散出危氏方治寸白蟲蛔蟲苦楝根二兩鶴蝨半兩檳榔半兩豬牙皂角三錢燒灰使君子仁半兩各搗羅為末好青黛半兩麝香一分上研勻每服一字用淡豬肉湯調下一方無使君子仁除根散出經驗良方治寸白蟲川楝子去皮檳榔各一錢輕粉一字蕪荑一錢黃丹二錢上為末作一服取石榴根煎酒調下以五更初服先用熟豬肉嚼取汁吃卻服前藥如同吃則令人嘔吐青黛散出聖惠方治小兒寸白蟲連年不除面無顏色體瘦少力青黛一分苦楝根一兩炒微赤銼鶴蝨一分檳榔一枚上為細散每服時先吃湯肉脯少許後以粥飲調下半錢量兒大小加減服之日二三服治小兒寸白蟲久不愈出聖惠方鶴蝨三分雷丸三分使君子三分巴豆十枚去心皮研紙裹壓去油上搗羅為末以糯米飯和丸如緑豆大每服以沙糖水下三丸量兒大小加減服之治小兒寸白蟲連年不除面無顏色體瘦無力出聖惠方硃砂一錢麝香一錢苦楝子肉一兩糯米拌炒以米熟為度上研令細以水浸蒸餅和丸如芥子大每服於空腹服春夏冷水秋冬熱水下七丸量大小加減服之檳榔散出聖惠方治小兒寸白蟲久不愈檳榔三枚為末豬牙皂角三挺燒苦楝子五枚為末上為散每服空心煎苦楝根白皮湯調下半錢三兩服後蟲皆出自下量兒大小加減服之榴枝飲治寸白蟲桃葉飲治寸白蟲下寸白蟲用雷丸水浸軟去皮切焙乾為末於五更初先食炙肉少許便以稀粥調半錢服之日久其蟲自下立應散一名必效散出經驗良方治寸白蟲久不下漸羸瘦用雞心檳榔一個為末以熟精肉四兩不用鹽醋只以酒淹切作薄片和檳榔末嚼肉下五更時以東行石榴根濃煎汁咽下大人小兒皆可服
