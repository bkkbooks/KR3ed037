body:
  text: 卷四百三嬰孩痘疹門一切痘疹附論夫嬰孩患疹痘瘡子者皆是積熱在於臟腑蒸鬱熱毒散於四肢小兒皮肉嫩弱多成此疾凡食乳嬰孩湯藥不可與童兒同療則藥過劑必有損也蓋由飲啜熱乳在於臟腑熱極方成此疾腑熱生於細疹臟熱生於痘瘡若用湯藥宜療於乳母也又絕乳嬰孩患者由積熱伏在於脾肺之間而不早以湯藥療於病源則毒熱行於四肢榮衛之中漸透於肌膚之表疹痘乃隨邪熱而發也嬰兒之性自然陽盛而陰微也臟腑陰陽氣逆大小便多秘不通也才覺是此疾即可便與疏利即輕患也若疹痘已出即不可疏轉若疹痘出定卻宜利大小腸按扁鵲及倉公論云療於嬰孩服以湯散性有可餌之者不可餌之者宜先和節陰陽調治榮衛方利臟腑即熱氣漸解也凡絕乳嬰孩生於疹痘或未出以前是此疾候按扁鵲論云可先以油劑服之行解四肢熱極或疹痘已出不可以油可服平和湯藥療於肝臟解於敗熱慮熱毒攻肝復衝於眼目生障翳今睹時醫及疾患之家疹痘未出以前多是誤認疾候皆以他藥解之其間或餌以燥藥或餌以冷藥不無夭傷時醫用藥直候瘡疹子出病家方覺患者住餌醫者拱手已患之後俗多禁餌致大小便不通不能調於湯藥和於臟腑遂停敗熱在於臟腑之間攻於肝臟疹痘才愈致令衝於眼目成於障翳不遇醫治瞳人遂損因茲無所見也凡斷乳嬰孩童子患疹痘疾候初覺多似傷寒面色與四肢俱赤壯熱頭痛腰背疼足多厥冷眼睛黃色脈息但多洪數細大不定小便赤少大便多秘才覺四肢色候及脈息雖是疹痘疾未攻皮毛穴出者便可以服餌勻和臟腑疏泄逐下若疹痘已結在皮毛穴處微似出即不可疏泄也或疹出太盛竇穴膿水者卻可疏利也或未與疏轉即且急服紫草飲子方辨小兒痘證呵欠嚏噴睡中發驚或耳尖冷眼澀辨復食口熱或口中醋氣奶瓣不消或腹中疼痛如斑證少具其斑未發乃與升麻湯三五錢帶熱服之待身表溫和斑瘡已顯服藥乃止如其身涼其斑未出辨得斑證無問服數直候身表溫和斑瘡顯後乃止只時時與桔梗湯寬利胸膈快咽喉方宣風散治小兒瘡痘盛出身體熱煩渴腹脹氣喘大小便澀面赤悶亂及氣腫水腫並逐脾間風又治風腫積腫又治風熱筋脈攣縮作痛及痘瘡二三日瘡痂不焦欲死者一服效蓋熱氣蒸於皮膚故瘡痂不得焦也宜服此導一二行服後生犀磨水解之瘡痂即焦其效如神檳榔陳皮甘草各半兩牽牛用四兩半生半炒上為極細末三二歲蜜湯調下半錢以上一錢食前易老加防風海藏云與通膈丸相類上下氣血藥也一方用一錢水半盞煎服風熱蜜湯調下牛蒡殭蠶散牛蒡子炒半兩白殭蠶去絲嘴炒一分上為末每服一大錢水六分盞紫草二七寸煎四分連進三服更量兒大小加減服薄荷散家薄荷葉一兩麻黃去節甘草炙各半兩上為末入薑棗煎服量兒大小為劑荊芥湯荊芥穗薄荷葉牛蒡子炒甘草炙各等分上㕮咀白水煎量兒大小為劑安斑散調理瘡疹已發未發皆可服之川升麻赤茯苓白者亦用黃耆羌活各一兩人參去蘆枳殼去瓤炒桔梗甘草各半兩上㕮咀每服二錢水半盞紫草少許薄荷一葉煎至五分去滓通口服之或加木通糯米同煎量兒大小為劑余記治一小兒瘡痘毒氣入心心煩強躁適無討腦子處極是束手無措余自處一方應手而愈用綠豆粉一錢硃砂半錢研極細麥門冬濃煎候溫調半錢服隨即心神定自此而愈此乃解圍活法耳余記一婦人年十八九歲出痘正出後忽平伏低陷適遇經脈行其家甚慌余曰證雖急然痘疹低伏乃是血滯而然今既血動或可無害遂用四物湯加人參黃耆四服痘子光壯後只用四物湯此病危甚而愈當歸丸當歸半兩甘草一錢黃連大黃各二錢半上先將當歸熬膏子入藥末三味為丸漸加服之以利為度消毒救苦散治斑疹悉具消化令不出如已出稀者再不生斑仲冬立此方隨四時加減通造化明藥性者能此麻黃羌活防風各五分川芎藁本葛根蒼朮酒黃芩生黃芩柴胡以上各二分細辛紅花蘇木橘皮白朮各一分升麻生地黃酒黃柏各五分生甘草一分當歸身黃連各三分連翹五分吳茱萸半分上銼如麻豆大每服五錢水二盞煎至一盞去滓熱服空心食前夫斑瘡出者皆因內傷必出斑營氣逆故也大禁牽牛巴豆食藥宜用半夏枳朮大黃益智之類去其瀉止其吐若耳尖冷呵欠睡中驚嚏噴眼澀必出斑也諸大膿泡水小斑癮疹三色皆營氣逆而寒覆其表宜以四味升麻湯中加當歸連翹此定法也如肺出膿斑先顯咳喘或氣高而喘促加人參少黃芩以瀉伏火而補元氣如心出小紅斑必先見血溢驚身熱肌肉腫脈弦洪少加黃連如命門出癮疹先必骨疼身熱其疼痛不敢動搖少加生地黃黃柏諸斑疹皆為陰證瘡須因內傷乳食脾胃不足營氣逆行雖火勢內熾陰覆其外故錢仲陽制四物升麻湯發之如有傳變證依加減服之紫草飲子治小兒痘瘡出被風吹復不見入皮膚內紫草人參芍藥蟬蛻甘草川山甲土拌炒各等分上為末每服一錢水一盞煎七分作三四次溫服平和飲子治小兒瘡疹人參白朮淨茯苓甘草升麻各等分上為細末每服一二錢水煎去滓溫細細飲之量歲大小虛實以意許之此藥治諸瘡疼痛煩渴不寧者皆可服之惟小兒瘡疹尤佳連翹散治一切熱兼治瘡疹有神連翹防風梔子甘草各等分上為末水煎服海藏云治熱在外而不厥此少陽藥也木香散藥性溫平能和表裡通行津液清上實下救陰助陽治小兒腹脹瀉渴其效如神瘡始出五七日之間身熱或腹脹足指冷或瀉渴或身熱驚悸腹脹或瀉頻津液內耗血氣不勻瘡雖起而不靨如身溫腹脹咬牙喘渴難治緣水穀去多津液枯竭飲水不止蕩散真氣故多死者急與木香散異功散救之若欲靨已靨忽不能靨腹脹煩渴及瘡已靨其痂欲落不落煩渴不止不可與水蜜西瓜紅柿食之轉生焦渴或頭溫足冷或瀉咬牙難治急宜服之如腹脹瀉渴足指冷渴驚悸渴身溫渴面色㿠白渴寒戰渴氣急咬牙渴飲水轉渴不已以上數證非熱也脾胃虛津液衰少也宜木香散不愈加丁香攻裡官桂發表表裡俱實其瘡不致癢塌喘喝而死木香大腹皮洗人參去蘆桂心赤茯苓去皮青皮去瓤一用陳皮前胡去蘆訶子肉半夏薑製丁香甘草各三分上銼每服三錢姜三片煎溫服空心量大小以意加減異功散能除風寒濕痹調和陰陽滋養氣血使痘瘡易出易靨不致癢塌痘瘡欲靨已靨忽不能靨頭溫足指冷或腹脹瀉渴氣促速宜服此痘瘡十日至十一日當靨不靨身不壯熱悶亂不寧不則哽氣煩渴咬牙急宜服此加木香官桂以救陰陽表裡木香官桂去皮當歸人參去蘆陳皮去白赤茯苓去皮厚朴薑製丁香肉豆蔻各二錢半白朮一錢半半夏一錢半制附子炮一錢半有熱去之上粗末每服三錢水一盞生薑三片棗五枚煎七分去滓空心稍熱服三歲兒作三度服五歲兒作兩度服一周兩歲兒作三五度與服兒有大小以意加減此藥家傳五世累經效驗此藥專理瘡痘泄瀉寒戰咬牙氣急預用光澤一方無陳皮半夏人參羌活散治小兒疹痘因服熱藥多發而不透身體頭面兩目皆腫連日風搐奮身硬直以荊芥薄荷煎湯服一方用天麻防風丸煎紫草湯同羌活散調服人參羌活散加麻黃用薄荷蔥白煎服湯氏曰汗後尚熱宜服此去麻黃加紫草如已見三五點加紫草陳皮赤芍藥使熱退瘡出亦輕更調辰砂末半錢以制胎毒瘡出亦輕胡荽酒一名胡荽散治瘡疹令速出用胡荽三兩切先以好酒二盞煎至數沸入胡荽再煎便用器蓋定不令氣出候冷去滓微微從項以下以噴兒背腹及兩足不可噴頭面仍噴房內床帳常掛胡荽以闢穢惡楊氏曰以胡荽酒噴身使瘡出快也若兒虛弱及天氣陰寒則可用之若春夏晴熱陽氣發越之時及兒壯實加以酒麴助虛以火益火胃中熱熾毒血蓄聚變成黑陷急煎紫草湯入豬尾血和龍腦服之一方用胡荽法令乳母飲酒為佳消風散治痘瘡或發或未發忽面青暴吼為風邪所傷用此主之痘證以耳冷尻冷足下冷及耳後有紅縷驗之然須見心胸間細點如粟起則真是人參川芎白茯苓去皮羌活殭蠶炒藿香荊芥穗防風甘草炙蟬蛻厚朴制陳皮各二錢上為末荊芥湯下紫草生蔥湯服亦得紫背荷殭蠶散紫背荷葉霜後貼水者佳直殭蠶炒去絲牛蒡子炒各等分上為細末研胡荽汁和酒服一錢米飲亦可五積散方見寒暑濕門中寒類按原方白芷三兩陳皮去白六兩厚朴去皮薑製四兩桔梗去蘆十二兩枳殼去瓤炒六兩川芎甘草炙茯苓各三兩蒼朮米泔浸去皮二十四兩當歸去蘆三兩麻黃去節六兩肉桂去皮芍藥各三兩乾薑四兩半夏湯洗三兩上㕮咀每服四錢水一盞姜三片蔥白三根煎七分熱服凡遇冬春天寒恐被風寒侵襲去麻黃加肉桂當歸川芎紫草薑蔥煎一方加木香砂仁薑棗煎服闢穢丹熏解穢惡蒼朮北細辛甘松川芎乳香降香上末水丸烈火焚之瀉膀胱法先用桂枝芍藥大戟等分為末服一錢棗湯調次服加味宣風散大功散治痘瘡未發正發及未受證者蒼朮五錢米泔浸一宿陳皮五錢去白防風去蘆紫草荊芥穗各三錢赤芍藥五錢厚朴薑製炒柴胡去蘆縮砂仁各二錢川芎五錢當歸酒浸二錢乾薑二錢牛蒡子炒二錢甘草炙一錢黃芩二錢上曬乾為末每家用田螺靨七個桃柳枝各七寸綠豆湯浸透取皮半盞淨洗司命鍋入井水煎熟出滓取清汁再研雄黃末一錢同入鍋內攪勻用篩子捧在中庭自東方起南西北中各倒一盞將藥與已出及方發熱及未受證者服聖功散治痘瘡已出未收服此解熱消毒勻氣活血調脾斂瘡神效防風蒼朮米泔浸荊芥穗陳皮去白甘草炙川芎厚朴薑製牛蒡子炒人參去蘆川白芷縮砂仁柴胡去蘆紫草黃芩黃耆鹽水炙赤芍藥當歸酒浸蟬蛻枳殼煨木通赤茯苓去皮桔梗各等分肉桂去皮木香各等分上除制外余藥不見火曬為細末先用米泔水溫調一服次淡煮獖豬肉或鰱魚田螺泥鰍擼藥與患者空心食之無熱者酒調肉擼有熱者米泔汁調藥擼肉食之如痘不起脹用常酒餅藥與藥末等分酒調肉擼食之瘡起脹便去酒藥如前擼食如大熱大便秘結加四順飲擼食微利即去四順飲如前擼食空心擼食聖功散仍食後服神功散以解熱毒天花散治痘失音天花粉桔梗白茯苓去皮訶子肉石菖蒲甘草炙上末水調在碗內用小竹七莖小荊七莖縛作一束點火在碗內煎臨臥服茯苓湯治痘瘡痰盛白茯苓去皮桔梗去蘆天花粉淨半夏湯泡甘草上銼生薑麥門冬煎服蟬蛻一物散治瘡疹漸作身熱似傷寒候只耳尖腳稍冷或腹痛者是瘡疹用蟬蛻二十一個洗去泥土為末用水一盞慢火煎至七分去滓量大小溫服如覺疹已出更依前服三五次若冷服即有瘡痕若不是瘡疹候誤服無害三豆飲治天行疹痘活血解毒或覺鄉井有此證預防之則不染赤小豆綠豆黑豆各一升甘草半兩上掬淨豆入甘草以水煮熟逐日空心任性食豆飲汁已染者輕解未染服之七日不發如冬月常服可消臟腑中蘊熱惺惺散治小兒風熱及傷寒時氣瘡疹發熱咳嗽不已恐生疹子白茯苓去皮細辛去葉桔梗瓜蔞根人參去蘆甘草炙白朮川芎各等分上為末每服一錢水一小盞薄荷三葉同煎至四分溫服如要和氣入生薑煎服不拘時一方無川芎白虎加人參湯石膏知母各一兩甘草炙五錢粳米一合半人參五錢上銼水煎米熟為度溫服天麻散天麻川芎升麻半夏薑製各等分防風北細辛羌活荊芥蟬蛻去嘴足甘草炙各二分上銼薑棗煎夾寒加桂夾暑加柴胡黃芩夾濕加茯苓蒼朮枳殼枳殼桔梗湯治胸腹脹滿桔梗枳殼麩炒去瓤各一兩上銼散每服二錢水二盞煎至一盞分二服小兒麻豆方用荊芥少許爛研以新井水將布帛裂過入一滴許麻油打勻令飲之便不悶亂麻已出用黃蠟煎青膠水飲即安青膠乃牛皮膠是也紫草湯治絕乳嬰兒並童兒患疹痘疾候初覺多似傷寒面色與四肢俱赤壯熱頭痛腰脊疼足多厥冷眼睛黃色脈息多浮洪至數大不定小便赤少大便多秘才覺四肢色候及脈息雖是疹痘疾未攻皮毛穴出者便可以服餌勻和臟腑疏泄逐下藥按倉公論云可服油劑不可用燥藥不可用冷藥若疹已結在皮毛穴處微微出即不可疏泄也或疹出大盛竇穴膿水者即可疏利也或未與疏轉即且急服此藥紫草二兩新者細銼先以百沸湯浸便以物合定勿令紫草氣出放冷如人體溫凡五十日至一百日嬰孩服半藥注子一百五十日至二百日嬰孩服一注子一歲至二歲兒服半合三歲至四歲兒服一合並於食前午後服此湯疹痘雖出勢亦輕耳常服無妨全嬰方云常行瘡痘紫草湯最良患其服太少太少不能中病但槌好紫草以湯沃之用物合定候冷去滓分減服每紫草切銼半升用湯一升為准斑痘已出不可發表發之斑爛以表虛故曰豌痘欲出以甘草濃煎飲之令臟腑和平並以好坯子水調塗眼眶毒不入目天行發斑瘡須臾遍身皆帶白漿此惡毒也唐永徽四年此瘡自西域東行流於海內但煮葵菜蒜虀啖之則止鮮羊血入口則定初患急服之一方去滓入酒半盞再煎服治小兒未滿百日患痘瘡槐白皮湯浴方槐白皮一兩益母草五兩上以水五升煎至三升去滓浴兒了更取蕓薹菜濃汁煎再浴作蕓薹菜與乳母吃亦佳浮萍丸治小兒瘡子不出煩悶驚悸浮萍草陰乾晚蠶沙白薄荷葉各一分上為末用薄荷自然汁煮麵糊和為丸如雞子大每服一丸薄荷湯化下不拘時龍腦散治小兒出瘡子不透旋出旋焦龍腦牛黃丹砂地龍去土取末麝香木猴梨五十枚焙乳香雄黃各一錢研鯪鯉甲五片燒灰紫草半兩甘草生銼二兩上為散用豬尾上血拌勻入在竹筒子內用油單封裹線纏定於深坑子內調稀豬糞浸二七日取出淨洗每服一皂子大龍腦水化下並三服見效定命散一名定命硃砂散治小兒瘡疹毒氣不出或出後乾黑色服此藥發出毒氣瘡子細紅而出丹砂研半兩龍腦研乳香研馬牙硝研甘草為末各二錢上同研勻用十二月新獖豬血半升同研勻用青竹筒長二尺留兩頭節開一頭作竅注藥在內黃蠟塞定以油絹緊裹封勿令透氣埋地坑中至一百五日取出水洗掛風中四十九日劈開取藥研為細散每服半錢新水調下人參丸治小兒瘡子黑色用人參一分為末用牛李子汁磁器內熬成膏子和為丸如豌豆大每服一丸杏膠湯化下不拘時沖和散一名敗毒散治小兒斑痘瘡退熱解燥白藥子甘草炙各一分雄黃一錢醋淬上為散每服半錢量小兒大小加減蜜湯調下南朱散治小兒斑毒不退解熱丸治小兒出瘡甘草生銼鐵粉研青黛研各半兩上為末再研勻煉蜜和丸如雞頭大每服一丸熟水化下敗草散治小兒痘瘡抓搔成瘡膿血淋漓肌肉敗壞緣血氣衰肌肉虛故也用屋爛草乃蓋屋多年爛草或蓋牆頭草不拘多少或曬焙為末每用干貼無時若渾身瘡破膿水不絕黏摻衣服難以坐臥可用三二升攤於席上令兒坐臥甚效神妙無時候以其草經霜雪雨露感天地陰陽之氣善解瘡毒奇功不可盡述又方用蕎麥粉或荔枝核燒灰糝瘡上亦好斑爛作膿痛甚者用細研黃土敷之或研芒硝末豬膽汁塗不能睡者麥麩或芭蕉葉襯之綿繭散治小兒痘瘡後身體及肢節上生疽蝕瘡膿水不絕用出蛾綿繭不以多少用白礬捶碎塞入繭內令滿以炭火燒候白礬汁盡取出研細每用干貼痘瘡口內若不早治則潰筋骨以致難為醫治瘡爛成片方用黃牛糞干敷膿多痛甚者乾淨黃土為末敷之瘡遍口中痛不能食者五福化毒丹或生蜜浸漬黃柏取汁啖之為愈凡瘡欲成痂頻以面油乳酥清蜜潤之可揭即揭血出無害若干硬已久必成瘢痕如茶醋如豬肝豬血之屬妄與食之則已脫之跡必為之黯慘然而瘡痂已脫肌肉猶嫩不可盥洗太早亦不可以手加之胡荽酒能辟惡氣左右所不可無或蒼朮降真用之亦可曰聖瘡七日熱而發七日泡而干又七日則平復如其舊矣大抵調順血氣溫和脾胃均平冷熱則瘡出為甚易若實實虛虛損不足而益有餘則瘡出為甚難調解之法無以逾此或豆豉燒存性作末敷之麥湯散一名地骨皮散治小兒斑毒傷寒熱咳水豆斑毒狀如蚊咬變成赤生黑不治地骨皮半兩炒麻黃一分去節甘草炙半分人參一分滑石半分大黃一分濕紙裹煨乾知母羌活各一分甜葶藶一分用隔紙炒上為末每服半錢水一小盞入小麥七粒同煎至十數沸服糝方治水泡痘瘡苦參滑石蚌粉輕粉川白芷各等分上為末干糝之立效治麩痘等瘡用山豆根水研服少許治小兒患豌豆瘡醫不瘥服者神妙天麻甘草各一分發灰黃丹熬各一分馬牙硝三分五色豆各七粒黃鹽一分陶隱居云北海黃鹽草粒粗以作魚鮓及咸𮏭上為散空心取一錢冷水調服利下瘡隙瘥治小兒豌豆瘡方用臘月兔肉作醬食又方用臘月兔毛煎湯洗豌豆瘡及以毛敷甚良又方用肉爛煮取汁洗之干脯亦得馬肉脯亦可治小兒發豌豆瘡用豬膽和朴硝塗之治豌豆瘡取東壁土一蜆許為細末敷之又方用馬齒莧燒末敷瘡上其根須臾逐藥出若不出更服良青黛散治小兒斑瘡豌豆瘡青黛研如粉半兩鐵精漿一升上將青黛為散臨時斟酌鐵漿調之一百日兒至二百日兒每服一字匕乳前服一歲兒至二歲兒半錢匕在食前午後各一服隨兒大小以意加減治小兒斑瘡豌豆瘡方取熟煮大豆汁服之佳又方用頭髮一兩燒灰為末湯調服兩字隨兒大小以意加減治豌豆瘡乾漆人中白瓦松灰各少許牙硝一分上同研細空心冷漿水調下半錢以吐為度再服一錢得利三兩行其瘡自除神效治發豌豆瘡方以小兒著取月水汁和水浴之治小兒豌豆瘡入肚者用狗蠅五七個空心淡酒送下即可救之鼠黏湯治小兒瘡痘已出未能得透者皮膚或出未能周遍熱攻咽喉涎盛咳嗽赤眼心煩並消瘡癬癤如瘡痘後毒氣攻眼成翳障並腫痛者此藥時時服之翳自消鼠黏子四兩炒荊芥穗二兩甘草一兩防風半兩上為粗末三歲一錢水半盞煎三分去滓溫服不拘時臨臥逐日三服大利咽膈化痰涎止咳若春冬間常服免生瘡癤老幼皆宜服海藏云太陽少陽藥也首論溫平者此也一方沸湯點服一方治時氣發豌豆瘡用川大黃微炒水煎去滓服治小兒瘡痘方宜房室中用時時燒大黃蒼朮以闢穢惡之氣不宜燒沉檀降真腦麝滴乳白膠等香加減異功散人參白朮白茯苓京芍藥黃耆當歸桔梗厚朴紫草粉草炙各三錢上各㕮咀初加南木香二錢煨加肉豆蔻煨再加附子炮隨輕重旋加用水煎服之豆蔻丸肉豆蔻五錢木香縮砂三錢白朮訶子一錢上為末米糊丸湯飲下量與玄參升麻湯治小兒觸冒必傳瘡疹未發之前並宜服之玄參去蘆升麻葛根芍藥甘草炙各等分上㕮咀每服五錢水一大盞同煎至七分去滓熱服乳母宜多服升麻湯治發痘出後一向作熱山梔子柴胡黃芩赤芍葉甘草升麻乾葛各等分上㕮咀薄荷湯同煎人參散治疹痘麻黃二錢芍藥荊芥白茯苓人參甘草各一錢上為末每服半錢薄荷湯下栝蔞散治欲出痘疹栝蔞貝母荊芥各等分上為末用紫草同煎連三服治瘡疹不透蓄伏危困者上用人牙五個炙令黃研末乳香湯下㗜鼻亦妙香葛發斑湯治小兒四時感冒發熱皆可服惟療小兒痘瘡尚未出過者身發熱頭疼或手心冷耳冷即痘瘡之苗也宜連進此藥數服痘瘡縱出則必少十分穩當此方乃大都夏真人家傳方云其家數代子孫痘斑雖有比他人自然稀少因得此方本堂屢用屢效真衛生之良劑也紫蘇一兩半升麻一兩半乾葛二兩香附子一兩半陳皮一兩甘草一兩赤芍藥一兩紫草二兩上㕮咀每服四錢重水一大盞姜二片蔥白一根同煎七分去滓溫服滓再煎服不拘時痘瘡出則不必服如痘瘡已出者不加紫草止服前藥黃耆六一湯治疹已服葛根湯痘出光壯地紅活色黃耆蜜浸一兩半甘草一兩半上㕮咀入棗水煎服治卒發疹秘驗方以石灰隨多少和醋漿水調塗隨手即減治一切疹以水煮枳殼為煎塗之干即又塗之治瘡疹用苦參五斤切以好酒三斗漬三十日每飲一合日三常服不絕若覺痺即瘥取根皮末服之亦良治一切疹以水煮芒硝塗之治癮疹以陳皮濃煎浴瘡疹已出未出附論夫瘡疹已出未出之間有類傷寒之狀其瘡之證自然憎寒壯熱身體疼痛大便黃稠此乃正病若無他疾不宜服藥但當平調之爾如已出未出之間或瀉渴或腹脹或氣促裡虛也十一味木香散主之已出未出之間其瘡不光澤不起發根窠不紅表虛也十二味異功散主之已出未出之間其瘡不光澤不起發根窠不紅而又腹脹瀉渴或氣促者表裡俱虛也宜與十二味異功散送下七味肉豆蔻丸方如聖湯治小兒身熱頭痛頰赤面紅呵欠清涕瘡疹已出未出川升麻赤芍藥甘草各二錢半紫草半兩白朮二錢陳皮一錢半上㕮咀每服三錢水一盞煎至六分溫服無時一方入生薑二片蔥白二根山楂子根三寸同煎熱服壯熱心煩加人參赤茯苓石膏麥門冬去心一方有全蠍木通無白朮陳皮四妙湯一名捻金散治小兒麻痘瘡欲出渾身壯熱情緒不寧不思飲食服此可以內消仍令瘡無瘢痕紫草茸川升麻糯米各半兩甘草二錢半上為粗末每服三錢水一大盞煎七分去滓溫服或有數點黑陷毒攻內者如鄉村無藥便得紫草三二錢酒煎灌之即發出紅活二寶散一名玳瑁散治痘瘡未發服之內消已出服之解毒不致大盛生玳瑁生犀角不用盛湯酒煮上二味磨水二合攪勻服一方每服半合微溫服日四五服為佳紅花子湯一名紫草散平調瘡疹及治瘡疱已出色不紅潤身熱喘急神志昏困紅花子紫草茸各一兩麻黃去根節川升麻各半兩上為細末每服半錢煎薄荷湯入酒一滴同調下快斑散平和瘡疹貫眾揀淨洗焙乾赤芍藥各一兩甘草炮川升麻枳殼麩炒去瓤各半兩上為細末每服一錢水一盞入竹葉七片煎至五分去滓溫服量兒大小加減調中散白茯苓人參紫河車甘草炙各等分上為細末每服二錢水一盞姜三片棗二枚煎六分溫溫作三兩次服竹葉湯石膏四兩知母二兩麥門冬去心甘草炙各一兩上為粗末每服五錢水二盞竹葉一握煎至七分去滓溫服犀角飲子犀角鎊甘草炙各半兩防風二兩黃芩一兩上為粗末每服五錢水二盞煎至一盞去滓溫服抱龍丸治小兒一切風熱中暑驚悸瘡疹欲出多睡咳嗽涎盛面赤手足冷發溫壯睡中驚搐搦不寧脈洪數頭痛嘔吐小便赤黃天南星銼開里白者生為末臘月內取黃牛膽汁和為劑卻入膽內陰乾再為末半斤天竺黃二兩別研硃砂二錢研水飛雄黃半兩水飛麝香好者一錢牛黃一字上同研極細滴水和丸雞頭大每服二歲兒竹葉或薄荷湯化下一丸不拘時候一出控心散治小兒斑瘡全蠍二十四個雄黃麻黃去節各一分上為細末用芫荽以酒煎令溫調下羌活散治小兒風壅作瘡子解熱散毒羌活獨活川芎桔梗蟬殼地骨皮前胡甘草炙柴胡瓜蔞根天麻炙荊芥防風以上淨洗等分上為細末每服一錢水三分薄荷二葉盞子內煎二分通口服大小加減藥水奪命散治小兒瘡麻已發未發並宜服之升麻糯米紫草甘草以上各半兩木通二錢半上為銼散每服一大錢水七分煎四分去滓溫服六歲五歲以下量大小加減服之黃耆散治小兒熱退瘡疹黃耆柴胡乾葛甘草炙以上各一錢半上為末每服一錢薄荷三葉水五分煎至三分均三呷空心服治小兒麻痘已出未出便服此藥即稀牛蒡子一兩用麩炒令黃色去麩甘草一錢炮上為末每服一字或二字用芫荽煎湯下四聖湯治身熱如火頭痛頰赤面紅呵欠鼻瘡瘡疹已出未出時宜服白芍藥升麻各一兩甘草紫草各五錢乾葛一兩木通五錢去皮節上銼散每服二錢水一中盞入生薑二片蔥白二根山楂子根三寸同煎熱服壯熱心煩加人參赤茯苓石膏麥門冬去心紫草飲治痘瘡欲發未發或未透者紫草白芍藥去蘆麻黃去節當歸甘草各等分上銼散每服二錢水一盞煎不拘時服活血散治痘瘡已出未出煩躁大人同上用北白芍藥不以多少為末白湯調下大能活血止痘瘡脹痛屢用屢效一方酒調海藏云張子和治痘四肢出不快加防風大效此正的太陰藥也一方銼碎水六分煎四分去滓分二服蟬蛻膏御風邪辟惡氣透肌肉發痘瘡蟬蛻去土當歸防風甘草炙川芎荊芥穗升麻陳皮紫草赤芍藥各等分上為末煉蜜為膏每一兩作四十丸木香湯下一方無陳皮紫草芍藥煎荊芥湯下消毒散治小兒瘡疹已出未能勻透及毒氣澀遏雖出不快壯熱狂躁咽膈窒塞睡臥不安大便秘澀及治大人小兒上膈攻熱咽喉腫痛胸膈不利並宜服之瘡疹初出最不宜服宣利藥恐內虛毒入於裡如五七日不大便只服消毒散微得利便即住服若別無他證不宜服藥一方並靨後餘毒未除牛蒡子六兩甘草炙二兩荊芥穗一兩上為粗末每服二錢用水一盞煎至七分去滓溫服食後小兒量力少少與之如治瘡痘若大便利者不宜服人參湯治小兒瘡痘將出人參一錢葡萄苗一分林檎一枚木猴梨七枚上銼碎以水二盞煎至一盞去滓放冷時時令吃荷葉散治大人小兒瘡疹已出而復黶其勢危甚諸藥不效者治之萬不失一荷葉霜後貼水背紫者白殭蠶直者炙去絲上等分為細末每服一錢小兒半錢研胡荽汁和酒下米飲亦得梔子升麻湯治天行麻痘瘡子未出潮熱如火譫語小便澀難升麻白芍藥乾葛山梔子藍葉甘草各等分上為散燈心同煎服之表解散治天行水疹腥臊未出潮熱麻子等證白附子防風川芎全蠍麻黃去節荊芥紅花當歸蟬蛻薄荷羌活茯苓甘草升麻各一分硃砂研半錢麝香少許上為末每服半錢金銀薄荷湯調下治瘡疱將出以牛蒡子炒令熟杵為末每服一錢入荊芥穗水一盞同煎至七分放溫服如瘡疹已出更服亦妙治天行瘡子不出以紅藍花子吞數顆治時氣發瘡疹不出者以葡萄研酒飲之甚效痘瘡未見方可疏利附論嘗考聖惠論痘瘡臟腑氣逆大小便多秘才覺似此疾可便與疏利而輕患也今睹時醫及疾患之家疹痘未出以前多是誤認疾候皆以他藥治之其間或以燥藥或餌冷藥不無夭傷痘瘡初覺多似傷寒證如疹痘未攻皮毛穴出者便可服餌調和臟腑疏泄逐下而活人書乃云瘡痘與傷寒相類疑似之間只與升麻湯治瘡子已發未發皆可服不可疏轉痘瘡已定卻宜利大小腸此為大戒傷寒身熱固不可下瘡疹發熱尤不可轉世人乃云初覺以藥利之宣其毒氣誤矣如小兒傷寒頭痛潮熱咳嗽氣粗煩渴心躁小便多赤大便不通熱盛於心精神恍惚即發驚搐涎盛悶亂瘡痘未分證小兒最多若熱前說只與升麻湯不可疏轉其病可療既言已發未發不可疏轉瘡痘發熱在表尤不可轉論中使洗心散治瘡痘用大黃服之能動臟腑莫有妨害乎又云痘瘡已出不可疏轉出得已定或膿血大盛卻用疏利者亦非大抵瘡痘首尾皆不可下小兒身熱耳冷咳嗽輒用利藥即毒氣入里殺人論中洗心散治身熱咳嗽麩瘡痘疹此藥性寒能利人且又如何既言瘡痘首尾皆不可下只知論中無比散內使硃砂腦麝膩粉水銀等服之下如爛魚腸豈不是下藥也二說俱未定董氏論瘡痘未出往往疑為傷寒即以麻黃等藥重發其汗遂使表虛里實或稱欲出多以熱藥活人書云洗心散內用大黃麻黃治麩瘡痘疹並麻黃黃芩湯用黃芩桂枝治瘡痘不快或出不快或出尚熱皆能發汗可不謂之無冷熱藥乎又云若為陰癇治之用溫驚藥則熱愈盛至三四日證候已定方用瘡痘藥所失多矣按諸書云陰癇者出於吐瀉之後大病之餘身體不熱而瘛瘲者謂之陰癇不熱可得三四日證候已定方用痘藥諸書中未嘗見說有不身熱出瘡痘者凡此者不可不辨也張氏論云才覺是瘡痘便早疏利熱輕易療又云應瘡痘早出若才出皆不可轉利既言才覺是瘡痘即是先證也又云應瘡痘早出不可疏利於此自作兩說使後人不能無疑惑也又錢氏論瘡痘惟用溫涼藥不可妄吐下及攻發又云寒顫噤牙身黃紫腫以百祥丸下之又身熱煩渴腹滿而喘大小便澀面赤悶亂大吐當利小便不瘥宣風散下之嬰童寶鑑云疹痘是臟腑俱熱發皮膚為之熱在腑為疹熱在臟為痘未發同一治未出可下解熱而退既出忌忽下及冷藥逼之其病不出在裡害人今考諸經方論有言之未盡者雖云瘡痘首尾皆不可下或云未出宜疏利出定宜疏利出盛宜疏利分證不明互說差殊驗之平日所治大抵瘡痘之病首尾證平下之者誤首尾有實熱證不下者誤切不可用巴豆丸下之此藥乃攻食積爾首尾有虛寒證不補者誤痘瘡出透澤肥紅證平者不須服藥寶鑑之說誠為可信錢氏之用必勝膏治五太尉而愈活人書用無比散治四惡候出不快及黑瘡子內使硃砂腦麝牛黃輕粉水銀等服之取下如爛魚腸推之藥性難用而寶鑑云未發同一治以此觀之但隨證用藥真明驗也醫官論云刑分輕重患別淺深刑法二罪俱發從重者論醫書云二病俱發從重者治誠良法也蓋瘡痘多是冬溫所變若冬有非節之氣瘡毒未發之前常宜服溫藥令大便稀薄四順飲服令溫微銼大黃甘草下之則溫毒內消又有四時時行者大小傳染乘瘡毒未發之前亦可服餌兼飲油劑以預防之設有痘瘡必輕易療若身疼壯熱頭疼心躁頰赤氣粗不與小汗何由消散麻黃黃芩湯或洗心散薄荷散湯如臟腑久熱毒攻腰脅心腹脹滿不與微利何由解釋四順飲大柴胡湯或調胃承氣湯然汗下之法不可造次冷熱之藥用可詳審活人書云疑似之間只與升麻湯凡療瘡子已發未發皆不可疏轉或云不可汗下寒熱之藥只可紫草湯一味飲之然此二說甚善若執其兩端止治輕疾而已倘治大病拱手待斃若當遇合汗合下之證而疑惑不決荏苒經時以致夭傷者多矣調瑟者必先移柱用藥者必先審證不可執一也方油劑法治小兒臟腑伏熱毒疹痘未盛四肢微覺有熱食物似減頭髮乾燥或熱進退上以生麻油一小盞溫和熱水一小盞旋旋傾熱水入油盞內不住手以杖子打攪直候熱水盡更打令劑如蜜即止夜臥時三歲半小盞一歲內外者每服二蜆殼量大小加減直候大小便微利熱退瘡痘不生也萬全方云可先以油劑服之行解四肢熱極或疹痘已出不可以油劑可服平和湯藥療於肝臟解於敗熱慮熱毒太盛扁鵲油劑治預解胎毒如已出及見紅點者不可服上以生甘草末或煎湯入清油用桃柳枝攪如蜜量大小增減與兒服微利為度又方上以手蘸清油摩兒背脊中間亦驗化毒湯一名紫茸散治小兒麻痘瘡欲出紫草茸升麻少用甘草炙陳皮等分上銼入糯米五十粒溫服劉氏家傳方云服此一盞即內消只二服有效黃連散治小兒熱毒盛發疹痘瘡初發早覺者宜服此方上用黃連一兩去須搗節為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服青黛散治小兒斑瘡及疹痘心神煩躁眠臥不安上用波斯青黛如棗核大以水調服之疹痘論用磨刀水調下當歸散川當歸一兩甘草一分上為細末每服二錢水一中盞豆豉十粒同煎至六分去滓量兒大小服以利動為度逐日令吃甘草汁三歲以下一歲以上加減服治瘡候未作膿心膈燥睡不安者上用黑豆煮汁溫徐徐服亦解油劑方治小兒方一二歲發熱恐成瘡痘以此止之生麻油童子小便各半盞上逐旋夾和以柳枝頻攪令如蜜每服二蜆殼許服畢令臥少時但三四服大小便利身體熱退即不成瘡痘之證若形跡已露不可服化毒散一名敗毒散治小兒瘡痘始出才有白疱忽陷入肉漸漸作紫色無膿日夜啼哭煩躁鬱金一枚甘草炙一分上用水半碗同煎令水乾去甘草將鬱金切作片子令乾為末入生腦子半錢研令勻用生豬血研成稀膏子煎薄荷湯化下一錢不過二服其毒氣從手足心出如癰狀乃瘥此五死一生之疾候若便血瘡壞無膿者十死不治一法可用蟬蛻末半錢好腦子一皂子大豬心血三皂子大和作膏子用熱酒浸紫草令溫化下服移時身上發大熱瘡毒頓出然後依證調治瘡疹出不快附論夫痘瘡出不快皆言毒氣壅盛妄謂其熱以藥宣利解散致令臟腑受冷榮衛澀滯則血氣不能充實皮膚肌肉其瘡不起發不充滿不結實不成痂頻多癢塌煩躁喘喝而死皆因宣利解散之過也閻氏云出不快者數證不同不可不辨自紅斑出齊之後當漸成血疱血疱成膿疱膿疱成痂疕而愈若紅斑已見三四日而不愈者乃毒氣內陷其證危矣切不可妄發及妄下發之則為斑爛下之則為虛脫凡小兒蘊毒在內遇冬溫或春夏暄熱腠理蒸郁遂出為瘡痘若正發之際忽天氣大寒毒氣交伏而不出則精神昏冒面青發熱或譫言妄語當此合用解肌表而出之如紫草蟬蛻發散兼溫養如活血散之類感寒證畢備者凡和解發散之劑皆可酌量用之又有紅斑方出或內虛或因犯胃氣臟腑自利虛弱不食遂陷而不出者宜用溫里之藥甚者雖硫黃薑附靈砂伏火丹砂等亦可用或將成血疱之際一半尚是紅斑點者此毒氣發越未透也宜半溫里半助養之劑或內虛甚而生寒大便利者宜理中姜附輩以溫之里溫則氣不消不陷伏也內實者皮厚肉密毒氣難於發越至服大黃梔子乾葛石膏之類而得平順者或有適當炎月觸冒暑邪煩躁喘急大渴昏迷而發不快用白虎石膏湯抱龍五苓之類而得安靜者此皆臨病識證隨時審諦不可執泥也凡瘡疹或成血疱一半尚是紅點此毒氣發越未透必不能乳食大便如常者宜半溫里半助養之劑理中湯四聖散紫草木香湯若內實之人皮膚厚肉理密熱毒難以發泄至服大黃梔子乾葛之類不得平順者宜服犀角消毒飲方藍根散治小兒瘡疹出不快及倒靨板藍根一兩甘草銼炒三錢上為細末每服半錢或一錢取雄雞冠血三兩點同溫酒少許食後調下無證勿服四物湯治小兒時行瘡痘發熱已出未出或出不快及消瘡斑餘毒大凡瘡痘不透者為血澀故也此藥能活血調順瘡痘無如此藥活人書用一味白芍藥為末治瘡痘不快以此知四物湯誠瘡痘之仙藥也一方加甘草尤妙白芍藥川芎熟地黃當歸各等分上為粗末三歲一錢水半盞煎三分去滓此本是婦人藥治血痢入罌粟殼同煎甚妙化毒湯治小兒瘡痘未定或出不快紫草茸升麻甘草炙各等分上㕮咀三歲一錢水半盞糯米五十粒同煎三分去滓不拘時劉氏傳云麩痘欲出渾身壯熱不思飲食若服此一盞即內消已有一兩顆出即解其半若全出即當日頭焦只三服消消毒飲同服妙紅花湯治小兒瘡痘不出紅花子紫草茸各半兩蟬蛻一分上㕮咀酒水一中盞煎去滓溫服大小加減驅毒散治小兒瘡疹痘不快白花蛇酒浸一宿炙黃去骨為末麝香少許上為末三歲一字酒調下蟬蛻湯亦得良久便出無比散治小兒瘡疹出不快及黑瘡子應一切惡候及治痘毒灌咽喉聲啞涎喘硃砂一兩好者牛黃麝香腦子膩粉各一分上為末一歲一字水銀少許用豬尾上血三兩滴新汲水調服寧穩得睡然後取下如爛魚腸葡萄穗之類涎臭惡物便安乳汁調尤妙一方無水銀大人半錢如聖紫草湯治瘡痘出不快或吃乳嬰兒與乳母兼服之四五歲已外只令兒服紫草二兩陳橘皮一兩上㕮咀白水煎服一方為末每服一錢水一盞入蔥白三寸煎至六分去滓溫服量兒大小加減麝香膏治瘡疹不透上旋取豬心血調麝香少許塗兩手心並口唇上無價散治斑瘡發出不快經驗名化毒散預取等分黃土窖五日砂鍋盛鹽泥固濟日乾至臘日燒末入麝少許名健效化毒散案無價散方缺服法下方缺方名及症狀人貓豬狗臘晨燒少許微將蜜水調百者救生無一死萬鋌黃金也可銷上將前四物於臘日早晨日未出盛貯於銷一鋌銀鍋子內用木炭火籠煅令煙盡白色為度但有發瘡已覺有瘡或發不快倒摧黑靨一切惡瘡並皆治之每遇小童但覺瘡證每用藥一字用蜜調服萬無一失據此藥功效無名可揚故以無價散呼之上項用人貓豬狗四般干糞依上法治用救生散治小兒斑疹出不快倒陷欲死者上用真蒲黃五月上旬丙丁日採以銀器內慢火炒令深紫色細研每藥一兩入真麝香一字研勻每服一字至半錢入薄荷汁五點溫酒調下斑疹黑陷昏潰喘滿欲死者二三服神效萬金散治痘疹已出未能勻遍色不紅潤防風三錢人參蟬蛻各二錢上為細末煎葡萄湯調下如無蜜葡萄亦可煎湯服了急用芥子末白湯調如膏塗兒腳心干即再敷其毒漸漸復出瘡疹依前紅活神效散治小兒瘡疱欲出不出雖出不快倒靨者上用抱雞子殼內白皮不拘多少以木炭火燒為灰出火毒研細以新汲水調下每服半錢日三服加味四聖散治瘡出不快及變黑陷倒靨紫草茸木通黃耆炒川芎各等分甘草炙減半上銼白水煎服大便秘加枳殼大便如常加糯米百粒或白糯米能解毒發瘡一方加南木香同等分絲瓜湯發瘡疹最妙上用絲瓜連皮燒存性為末湯調服楊氏曰發痘瘡最妙或加甘草紫草安斑散赤茯苓去皮黃耆羌活各一兩人參去蘆桔梗去蘆紫草枳殼炒各五錢上銼紫草薄荷煎溫服熱而實者加升麻或加木通糯米煎快斑散紫草茸五錢陳皮二錢黃耆三錢赤芍藥五錢甘草炙三錢上銼加糯米百粒煎三歲以上服三錢以下一錢服後瘡遍勻四肢住後服犀角消毒散治小兒內壅邪熱瘡出不快惡實四兩炒即牛蒡子甘草一兩炙防風半兩荊芥穗二兩上為末煎紫草糯米芫荽子湯調食後臨臥日三服或云痘瘡欲出已出熱盛服三四服消毒發瘡神效一方為散水煎服大便實加大黃豬苓湯治暑天冒熱熱渴昏迷瘡出不快豬苓去皮一兩澤瀉二兩白朮一兩半赤茯苓二兩上末如辰砂末煎車前子草生地黃麥門冬湯下小柴胡湯上加生地黃紫草木通車前草同煎服快毒丹治疹痘瘡氣勻則出快蓋血隨氣行若內有邪熱使氣不勻宜服之黑牽牛南木香一方用各八分肉豆蔻一方用半兩青皮各等分半生半炒一方用一兩半上末滴水丸黍米大每服七粒至十粒量大小加減丸數紫草蔥湯下前賢處方有玄妙木香勻氣豆蔻青皮補脾又以牽牛瀉腎膀胱之腑也托裡散小兒痘瘡毒根在裡或氣血虛弱或風邪穢毒沖觸使瘡毒內陷伏而不出出不勻快者此藥活血勻氣調胃補虛內托瘡毒使之盡易收易靨人參去蘆川芎防風苦桔梗去頭尾川白芷不見火甘草生當歸酒浸黃耆寸截鹽水蒸炙厚朴薑汁浸一夕曬肉桂去皮取末上當歸人參黃耆各二兩余各一兩為末拌勻木香紫草湯調下一名內托散又托裡散補虛活血勻氣發瘡通行血氣倍加黃耆木香赤芍藥蟬蛻肉桂各等分上用白水煎服紅粉丹治腑熱瘡疹不勻龍腦細研一錢南星臘日釀牛膽中百日內陰乾者取末一兩硃砂細研水飛坯子染胭脂天竺黃末各一兩上研勻煉蜜和丸如雞頭大每服一粒人參湯化下滑石散一名玉漿散滑石甘草炙各半兩上為末每服一錢半雞子清酒少許調下一方燈心湯調下脫齒散治瘡疹不出百藥不中者服此即出上以人牙齒脫落者不拘多少於瓷瓶內固濟大火煅令通赤候冷取出為末用薄荷酒調下半錢良久脈平和毒氣散瘡如粟米一方燒存性熱水調服紫金散療小兒瘡疹不快倒靨紫草蛇退皮炒焦牛李子炒各半兩上為粗末每服一錢水七分煎至四分去滓溫服如聖散一名活血散療小兒斑瘡不快倒靨黑凹者上用赤芍藥不以多少杵為細末每服半錢煎葡萄酒冷調下白湯服亦可不拘時候雞峰方治小兒斑瘡出不快上用開花蘿蔔煎汁時時與飲之玉訣酒調散治發瘡疹不出牛蒡子五錢炒紫草麻黃去節各半錢當門子五粒末一字臭椿子去皮為末一錢上以溫酒調下一字或半錢紫草湯治三十六種內瘡子候麻黃去節人參各一分杏仁七粒去皮上為粗末用水二盞煎至一盞去滓卻分為三四服溫下分作二日服未可用諸藥治小兒痘瘡出不快並傷寒不語干野人糞炭火煅為灰腦子麝香各少許上為末每服一二錢新蜜水調下治小兒發斑瘡大蟬蛻三十一個去足洗甘草一錢半上用水半碗煎至一盞旋與服盡效已用驗治小兒斑瘡不發上以乳香研細用豬心血為丸櫻桃大水磨下一丸至聖木星飲子治小兒瘡子不出及不快硃砂一分鬱金半兩上為細末每用一字或二字量兒大小入龍腦少許以新汲水茶腳少許同調勻然後刺獖豬尾血滴三點子入藥汁中令服不過一二時辰瘡子出便紅活兒無他病神效紫草膏治麻痘不快紫草白附子各一錢麻黃去節甘草炙各二錢全蠍十個殭蠶炒二個上為末用蜜一兩酒半盞入紫草煎數沸後令旋旋同和前藥丸如皂角子大每服一粒用紫草湯化下續用黃耆散調治之治瘡子出未透黑靨者上用蟬蛻不以多少洗淨為末一錢熟水調下立見出透食乳者乳母亦服一錢神效紫草木通湯治瘡疹出不快紫草人參木通茯苓糯米各等分甘草減半上銼散煎二錢溫服內虛大便利者可入南木香去紫草一方無糯米用粳米加味四聖散治瘡痘出不快及變陷倒靨小便赤澀餘熱不除一切惡候或被風吹復不見入皮膚內者紫草茸木通去皮節南木香黃耆炒川芎甘草人參各等分蟬蛻去足翼十個上銼散每服二錢水一盞煎不拘時候溫服大便秘加枳殼少許大便如常加糯米百粒性解毒能釀而發之快斑散治痘瘡出不快紫草蟬蛻去足翼及土人參白芍藥各一分木通一錢甘草炙半錢上銼散每服二錢水一盞溫服神驗散治小兒瘡子黑色及出不快鯪鯉甲火炮黃色全者二十片地龍去土炒二十枚紫草五枝上為細末每服半錢溫酒調下後用衣蓋即紅色出四君子湯痘疹論云胃主肌肉調脾進食活血勻氣其瘡不致癢塌氣血倍加川芎當歸赤芍藥木香紫草縮砂仁陳皮枳殼各等分上為末糯米湯調服玳瑁散治小兒瘡疹熱毒內攻紫黑色出不快上用生玳瑁水磨濃汁取一合獖豬心一個取中血一皂子大同研以紫草濃煎湯調都作一服殊聖奪命膏治小兒瘡疹毒氣不散出不快及觸犯黑色用黑熟牛李子七月八月採於盆內研汁生絹濾去滓用銀器盛慢火熬成膏磁器內收常令透風每服皂子大煎杏膠湯化下如人行二十里更進一服其瘡疹自然紅色毒氣及一切瘡疹出不快並可服一名牛李膏又名必聖膏云至秋結實黑圓成穗或無生者市肆中買乾者為末水熬代用董汲治小兒瘡疹痘疱惡候見於皮膚下不出或出而不長及黑紫內陷亦用此藥仍云汲小年病此危惡殆極父母不忍視遇錢乙下此藥得安因懇求得其方遂傳於世惟於收時不知早晚故無全效今並收時載之九月後取研絹濾成膏每膏二兩研入好麝香半錢收貯不津器中九籥衛生方同但用桃膠半兩牛李子一兩炒為粗末每服一錢水七分煎至四分去滓溫服治療亦同一云牛李膏專治小兒瘡痘紫黑色內陷寒顫噤牙戛齒身黃紫腫三服不愈即死紫草回斑散治小兒斑疹出不快或倒靨毒氣入腹紫草茸黃耆桑白皮木通枳殼白朮各等分上為粗末每服三錢水酒各半盞麝香少許同煎四聖散治痘瘡出不快倒靨或小便赤澀餘熱不除一切惡候或被風吹復不見入皮膚內紫草木通甘草枳殼各等分上㕮咀每服二錢水半盞煎三分溫服一方治伏暑在胃經暴發痘瘡欲作黑陷心腹脹滿一切危證於本方中加黃耆等分名紫草散簡易云傷寒者表實而裡虛瘡疹者表虛而裡實傷寒之邪始干於皮膚漸次傳於臟腑瘡疹之毒始蓄於臟腑而漸次泄於皮膚理傷寒之法宜先解表然後攻裡療瘡疹之理當先消毒然後解肌切不宜轉瀉使毒氣轉深變為斑瘡或為倒靨其候危矣此疾亦多因傷寒失於汗下邪毒內蓄或天行疫癘長幼相似當隨證以施治焉四味散治小兒瘡疹欲出不快大鰕乾者為末獖豬乾血惡實甘草炙各等分上為散三歲以下半錢匕五歲以上一錢匕煎赤芍藥酒調下不拘時候日夜各一服發毒散治小兒瘡疹出遲地龍去土防風去叉各等分甘草一兩上為細末每服一字用酒水各少許調下不拘時候一方治時疾發豌痘瘡及赤瘡子未透心煩狂躁氣喘妄語或見神鬼或已發而陷伏龍腦生一錢上研細旋滴豬心血和丸如雞頭大每服一丸心煩躁者同紫草湯化下若瘡子陷伏溫酒化下少時心神便定得睡瘡子發透已發而不甚快或變惡候紫草湯治瘡疹熱盛而發不透者紫草茸紫蘇葉升麻甘草炙各半兩上銼散水二盞糯米五十粒同煎一盞溫分兩服黃耆散治雪天瘡疹難出皮膚溫壯頭燒腳冷呵欠困悶無時驚悸嫩黃耆嫩柴胡蘇木紫草各等分上㕮咀白水煎服大抵疹痘如見服表藥出更宜詳細審察若其色淡白根窠不紅經日不起發以倪文中木香散主之如此後黑陷十救一二以文中異攻散主之痘瘡未見方可表發附論夫小兒才覺傷風身熱未明是與不是瘡疹便宜發散可服四味升麻葛根湯如瘡疹始出一日至五七日之間雖身熱腹脹足稍冷者不宜服也或身熱瀉渴及驚懼腹脹汗出者皆不宜服而以十一味木香散治之古人立升麻湯蓋治痘瘡之常不治其變也未有斑點之前均發熱者常也已結痂疕之後均有餘熱怫鬱而肌表未清涼者亦變也是亦升麻湯方後云治瘡疹已發未發謂未見斑點及作痂疕之後也若斑點既見痂疕未結其候萬變在隨證滲泄曾非一定可拘若傷寒之變患不一也豈可執一以應無窮之變哉且升麻湯不過涼肌解表而已未見斑點已結痂疕則可用之曷可用之於瘡疹正作之時乎若不究此令兒肌寒表弱陷伏而危殆矣小兒壯熱昏睡傷風風熱瘡疹傷食皆相似未能辨認間服升麻湯葛根湯惺惺散小柴胡湯甚驗蓋此數藥通治之不致誤也惟傷食則大便酸臭不消化畏食或吐宜以藥下之海藏云傷食宜以藥下之者當詳其所傷何物生硬寒熱不等不可遽用巴豆之類大毒之藥下之升麻葛根湯太陽陽明也惺惺散風熱咽不利脾不和渴小便不利也小柴胡湯往來寒熱胸脅微痛少陽也然欲知其經當以脈別之小兒耳冷手足乍暖乍涼面赤時嗽時嚏驚悸此瘡疹欲發也未能辨認間服升麻湯消毒散已發未發皆宜服仍用胡荽酒黃柏膏暑月煩躁食後與白虎湯玉露散熱盛與紫雪咽喉或生瘡與甘桔湯甘露散余依錢說大人小兒同治法惟劑大小不同耳消毒散太陽藥白虎湯治身熱目疼鼻乾不得臥陽明藥也正為泄時暑之劑甘露飲子肺腎藥也甘桔湯少陽藥也紫雪天門冬麥門冬黃芩地黃為血劑玉露散肺腎藥石膏寒水石為氣劑方惺惺散治小兒風熱瘡疹時氣頭痛壯熱目澀多睡咳嗽喘粗桔梗真細辛去葉人參去蘆甘草炙白茯苓去皮白朮各一兩真川芎一兩上為粗散每服三錢水一大盞薄荷五葉生薑三片同煎至六分濾去滓溫服不計時候量兒大小加減服四味升麻葛根湯治小兒熱欲作疹痘一日至五七日之間或已發或未發但身熱肢體痛者先宜服之白芍藥一方用赤芍藥川升麻各一兩甘草葛根各一兩半上為粗散每服三錢水一大盞煎至六分去滓溫服無時大小以意加減一方加紫草羌活散治小兒寒邪時氣瘡痘變蒸潮熱涎盛頭痛心躁煩渴氣粗羌活獨活柴胡川芎細辛甘草白茯苓人參枳殼炒各一兩天麻前胡桔梗炒地骨皮防風各半兩上為末三歲一錢水半盞煎三分大小加減服之不拘時麻黃湯一名杏甘湯治瘡疹煩渴甚者用之及痘正出煩喘渴躁麻黃去節杏仁去皮尖桑白皮微炒甘草炙等分上㕮咀白水煎量兒大小為劑若肺數有熱未退入竹瀝一半和水煎或咽喉疼並嗽入麝香少許煩喘咳嗽加射干一分葛根湯治天時炎熱欲發痘瘡服此解肌發表乾葛石膏煅赤芍藥甘草炙各五錢黃芩五錢無汗加麻黃自汗加桂枝上銼蔥白薄荷湯煎乳後服一方止用水煎參蘇湯治小兒凡覺身熱證似傷寒但未經瘡痘者先與此藥和解之前胡去蘆人參去蘆紫蘇葉乾葛半夏制茯苓去皮各三錢枳殼去瓤炒陳皮炙甘草炙桔梗去蘆各半兩上銼薑棗煎微熱服一方加青皮或曰青皮紫蘇亦能表汗催出痘瘡加木香紅綿散治傷風傷寒麻痘身熱發搐疑是痘證天麻炮荊芥穗各三錢甘草炙麻黃去節各二分全蠍七個上末薄荷三葉紫草三寸入酒三五滴同水煎熱服如痘未出再進一服如二服不出即非痘證調解散治痘瘡外為風寒所折榮衛不和內為乳食所傷內氣壅遏以致冰硬青皮陳皮桔梗枳殼制半夏薑製川芎木通乾葛柴胡紫蘇紫草甘草炙等分人參減半上銼散每服二錢姜二片棗一枚水一盞煎服未效加楂根三寸一方無柴胡紫草一方無柴胡有當歸不換金正氣散治痘瘡外為風寒所折榮衛不和內為乳食所傷內氣壅遏以致冰硬蒼朮橘紅半夏曲厚朴薑製甘草炙藿香葉各一兩上銼用川芎薑棗煎惡寒加肉桂紫蘇人參羌活散一名惺惺散治小兒寒邪溫熱時疫瘡疹頭疼體痛壯熱多睡亦治潮熱煩渴痰實咳嗽羌活獨活柴胡人參川芎枳殼麩炒甘草炙各二兩前胡桔梗天麻酒浸炙地骨皮各半兩白茯苓去皮二兩上為散每服二錢水一盞入薄荷少許同煎去滓溫服不拘時候全嬰方加防風德生方如嗽加桑白皮八寶散治小兒瘡疹已發未發在疑擬之間白芍藥羌活升麻乾葛甘草防風撫芎山果子各等分上㕮咀每服二錢水一盞煎至六分去滓溫服五積散上加紫草木香縮砂仁薑棗煎後服去麻黃陳氏木香散異功散通用瘡疹壯熱煩渴附論夫痘瘡出而身熱大渴者七味人參白朮散治之如不愈只服十一味木香散如腹脹者或瀉而渴或足指冷而渴或驚悸而渴或身溫而渴身熱面㿠白色而渴寒戰而渴或氣喘咬牙而渴或飲水轉渴不已皆非熱乃脾胃虛而津液少也宜服十一味木香散如不愈更加丁香官桂攻發其表裡不致癢塌喘喝而死也痘出太盛而面黃大便黑煩躁喘渴或腹脹者此為有瘀血在裡宜犀角地黃湯及治瘡疹中衄血吐血毒氣彌盛若不解利其害尤速如抱龍丸至寶丹生犀角磨汁紫雪之類皆可選而用之若大便不秘實小便不赤黃恐外熱而內寒又當別求治法也方葛根麥門冬散治小兒熱毒斑疹頭痛壯熱心神煩悶葛根麥門冬去心各三錢人參去蘆二錢石膏半兩川升麻甘草茯苓各二錢赤芍藥一錢上為粗末每服三錢水一大盞煎至六分去滓溫服不計時候量大小增減服生地黃散治小兒斑駁疹癮身熱口乾咳嗽心煩生地黃半兩去土麥門冬去心七錢杏子去皮尖麩炒微黃款冬花陳皮各三錢甘草二錢半炙上為粗散每服三錢水一大盞煎至六分去滓溫服不計時候量大小加減服人參清膈散治瘡痘靨後熱毒不解涕唾稠黏鼻乾身熱咳嗽痰喘潮熱煩渴咽膈不利大便如常小便黃赤人參去蘆柴胡去蘆當歸芍藥知母桑白皮炒白朮黃耆紫菀地骨皮茯苓去皮甘草炙桔梗各一兩黃芩半兩石膏滑石各一兩半上為粗末每服三錢水一大盞生薑三片同煎至六分去滓溫服不拘時量大小加減服前胡枳殼湯治痘瘡靨後痰實壯熱胸中煩悶臥則喘滿大便堅實前胡一兩枳殼赤茯苓大黃甘草炙以上各半兩上為粗散每服三錢水一大盞煎至六分去滓溫服不拘時候量兒大小加減如身溫脈微並瀉者不可服人參白朮散一名白朮散治小兒痘瘡已靨身熱不退此藥清神生津除煩止渴人參白朮藿香葉木香甘草白茯苓六味各一兩乾葛二兩上為粗散每服三錢水一大盞煎至六分去滓溫服不計時候如腹脹滿瀉渴足指冷者只服十一味木香散治之赤茯苓散治疹痘瘡出後咳逆脅痛吃食不下赤茯苓甘草炙微赤銼大青升麻枳殼麩皮炒黃各半兩梔子仁一分上㕮咀每服入竹葉淡豉煎量兒大小為劑犀角飲一名調肝散治小兒疹痘瘡其赤瘡子正盛令不入眼犀角屑川大黃桑白皮鉤藤鉤子甘草麻黃去根節各一分龍膽草半分石膏瓜蔞根黃耆各等分上㕮咀白水煎量兒大小為劑錢氏方名調肝散治瘡疹太盛令不入目也一方瘡子退後用犀角濃磨塗之更良山梔子湯治麩疹及斑毒狀如蚊蚤所齧若毒盛色黑者宜服宣毒膏山梔子仁白蘚皮赤芍藥升麻各一兩寒水石甘草各半兩上為末入紫草薄荷各少許煎服量兒大小為劑牛黃丹牛黃川大黃各一兩粉霜硃砂各一分上為末同研勻煉蜜丸如黍米大煎人參湯下量兒大小為劑過關散治斑瘡水痘心躁發渴及小便赤色口舌生瘡通心經山梔子仁車前子木通甘草瞿麥赤茯苓人參滑石各一分大黃一錢萹蓄半兩取嫩枝葉上為末入燈心草略煎四五沸服量兒大小為劑黃耆散退熱調養黃耆柴胡乾葛甘草人參各等分上㕮咀白水煎量兒大小為劑一方無人參用薄荷葉三葉煎黃芩甘草湯治痘瘡閉熱不出煩躁不得眠黃芩七錢半赤芍藥甘草各五錢上㕮咀每服三錢水一盞若胃中虛冷其人能食飲水即噦脈浮發熱口鼻中燥能食者必衄加大棗二枚同煎若嘔者加半夏少許生薑三片同煎若食少者加參棗煎量兒大小各去滓加減服大青四物湯治熱病汗下後身熱不除斑出如錦紋煩躁不得臥大青阿膠甘草豆豉各一兩上㕮咀每服五錢水一盞半先將大青甘草豆豉煎至七分後入阿膠再煎令沸量兒大小加減服白虎湯治溫熱及中暑煩渴並治小兒痘疱麩疹癍瘡赤黑出不快及疹毒餘熱石膏四兩知母一兩半人參四兩甘草炙二兩上銼糯米煎米熟為度子母同服但加生薑棗煎渴盛者更加乾葛春冬秋寒有證亦服但加棗煎小兒減半楊氏方敗毒散方見十味湯上倍加甘草生枳殼糯米煎服一方加紫草黃芩生地黃煎服導赤散生地黃焙乾木通甘草炙上等分水煎服一方為末每服三錢水一盞入竹葉同煎五分食後溫服不用甘草用黃芩神功散治痘瘡大熱發狂譫語此藥清心涼肌退熱消毒服此藥解利熱毒免攻頭目咽喉黃芩柴胡去蘆桔梗去蘆防風去蘆荊芥穗陳皮去白赤芍藥牛蒡子炒枳殼煨去油木通紫草赤茯苓甘草各等分上銼燈心白附子麥門冬煎大便秘大熱加煨大黃糯米煎微利即止後服小熱加竹茹大熱加北薄荷山梔子仁天花粉甘草散治瘡痘略出煩渴不止粉草微炙栝蔞根各等分上為末煎服一錢甘草通血脈發瘡痘烏梅湯治瘡痘熱渴小黑豆綠豆各一合烏梅二個上㕮咀新汲水一盞煎取清汁旋服又方用羌活散消風散消毒飲和竹葉生地黃土朱煎服人參麥門冬散治發渴煩熱及瘡痘身熱麥門冬一兩去心人參去蘆甘草炙陳皮白朮厚朴薑製各半兩上為粗散每服三錢水一大盞煎至六分濾去滓溫服不計時候量兒大小加減與服捻金散治小兒麻痘瘡疹欲出渾身壯熱情緒不樂飲食不思服此可以內消仍令瘡無瘢痕方見四妙湯透肌散治臟腑蘊熱毒氣熏蒸瘡出不快煩喘昏悶方見四妙湯消毒飲子治毒氣壅遏壯熱心煩痘疹難出出未能透方見鼠黏子湯紅花升麻散治小兒疹痘麻子潮熱焦啼煩渴寒凝難出者升麻芍藥乾葛紅花蘇木黃芩麻黃去節甘草各等分上為散白水煎服瘡疹大盛附論瘡痘有可下證者以其出得大盛當結膿疱痂疕而不結者此是毒氣內外貫注若不速解之毒氣入內攻心為害極大治法宜豬尾膏其有不結膿疱痂疕反能食而喘腹脹譫語不大便者當以承氣湯下之如熱甚而渴面赤悶亂大小便澀或大吐者合利其小便通關散主之或瘡疹已出定膿汁不幹而大便不通者宜牛黃丹或有瘡疹證而未見斑點身熱潮作氣粗腹脹大小便秘驚悸煩渴脈沉滑而數者此是毒盛而不得泄亦當用藥下之則內無滯塞榮衛升降其勢將自出此皆合下證也方黍黏子湯如斑子已出稠密身表熱急與此藥以防以後青乾黑陷黍黏子炒香當歸身酒洗甘草炙各一錢柴胡連翹黃耆黃芩各一錢半地骨皮二錢上同為粗末每服二錢水煎去滓溫服空心藥畢且休與乳食一證出大盛而面黃大便色黑煩躁喘喝或腹脹此有瘀血在裡宜小柴胡湯犀角地黃湯小柴胡湯王子亨指迷方曰痘瘡半在表半在裡及熱毒大盛服此佐以快毒丹使氣血調勻則出快不致倒靨及秋冬之間痘瘡發而不起由腎氣強盛胃氣稍弱瘡又黑陷加減用之小柴胡湯柴胡去蘆人參去蘆黃芩甘草炙各一兩半夏湯泡七次二兩半上銼姜三片棗一枚服冬春腎強脾弱黑陷如嗽加五味子二兩又方柴胡三錢性寒制肝甘草一錢調脾生薑二錢正胃氣上加減煎服咳嗽加五味子犀角地黃湯治瘡疱壅盛喘急浸淫成片及治傷寒溫病應發汗而不發汗內有瘀血者及鼻衄吐血不盡內有瘀血面黃大便黑者此方消化瘀血並小兒體氣實熱瘡疹出得大盛此方解之如體衰弱不宜用一名解毒散犀角一兩如無以升麻代之生地黃半斤赤芍藥七錢半牡丹皮一兩上銼每服五錢水一盞半煎取一盞溫服有熱旋加黃芩二兩其人脈大來遲腹不滿自言滿者為無熱更不用黃芩也一證毒氣彌盛瘡中吐衄出大盛之時不能解利其害尤速宜抱龍丸生犀角汁小柴胡湯又方生犀角不用盛湯酒者上用新水磨汁食後服消毒散上紫草生地黃煎下抱龍丸天竺黃一兩本草云乃破竹中黃末雄黃一錢半辰砂五錢麝香一錢牛膽臘月釀南星四兩如無生南星炒用上為細末甘草水丸皂角子大用溫湯化下疹痘論甘草散若瘡未出及雖出燥渴者宜服上用大甘草不拘多少炙過為細末每服一錢或二錢水一盞煎至六分去滓不計時候呷之以少解利熱毒即住若瘡出遲當服紫草飲子大人當針兩腕硯子骨間男左女右取之或灸一壯亦助發出瘡痘毒氣已發不必用之治小兒麻痘瘡子已出大盛發潰膿水黏衣著席不能轉動疼痛濕潤敷之便更不成瘢痕一方名牛糞灰用牛糞不以多少曬乾火煅成灰取中心白者研令極細如用蛤粉相似用綿撲於有瘡處不以時候瘡干以陳酥潤之一方用烏牛糞一方用臘月黃牛糞日乾燒灰瘡疹潰爛者膿汁沾衣衾臥睡不得用灰鋪一寸許在床上令臥之或瘡大而成片無皮或成痘癰皆用黃牛糞糝之一方用菖蒲作末如前用尤佳一方用麥麩亦如前用如嬰孩有此證作絹繃床子與之睡為妙治小兒因患瘡疹其間有瘡大成片或有成痘癰成膿爛痛不可忍者極好生葛不拘多少搗爛用絹袋子盛擺水中隨擺隨挼澄取粉攤紙上焙乾為末糝瘡濕處神效調肝散治瘡疹太盛宜服令瘡不入眼生犀二錢半龍膽一錢黃耆半兩桑白皮半兩炒黃大黃二錢麻黃去節一錢鉤藤鉤子一錢石膏半兩栝蔞去皮甘草炒各二錢上為末每服二錢水煎食後溫服微利效
