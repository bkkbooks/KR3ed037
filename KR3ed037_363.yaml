body:
  text: 卷三百六十三嬰孩頭眼耳鼻門頭瘡附論夫小兒頭瘡者由臟腑有熱熱氣上衝頭面復有濕氣乘之濕氣相搏折於血氣而變生瘡也白禿瘡者由頭上白點斑剝初似癬而有白皮屑久則生痂或瘡遂至遍頭自少至長不瘥頭髮禿謂之白禿瘡小兒頭生小瘡浸淫瘙癢黃膏出不生痂連年不瘥者亦名妒頭瘡以赤龍皮湯及天麻湯洗之內服漏蘆湯外宜敷飛烏膏散及黃連胡粉水銀膏散方雄黃膏出聖惠方救急療小兒頭瘡經年不瘥瘥而復發者雄黃研大黃黃蘗黃芩薑黃雄黃研白芷當歸青木香各四兩上㕮咀以苦酒浸一宿以豬脂一大升煎俟白芷色黃膏成去滓入水銀一兩以唾於手中研令消入膏攪相得於瓷器中收每以皂莢湯洗瘡干拭以膏塗之日再換以瘥為度一方無大黃以藍漿水洗淨塗之松脂膏出聖惠方治小兒頭瘡經年不瘥松脂一兩半川大黃一兩苦參一兩銼黃連一兩去須胡粉黃芩水銀各一兩白礬半兩蛇床子三分上羅為末以臘月豬脂膏和研水銀星盡以瓷合盛每日於瘡上塗之效苦參湯出千金方治小兒頭瘡苦參黃芩黃連黃蘗甘草大黃芎藭各二兩蒺藜子三合上㕮咀以水六升煮取三升漬布搨瘡上日數過治小兒頭熱瘡方出千金方石南草大黃黃芩黃蘗礬石澤蘭各一兩戎藍二兩蛇床子三合上切以水七升煮取三升以絮納湯中洗拭每日三度瘥藜蘆膏治小兒一切頭瘡久則瘙癢不結痂瘡藜蘆黃連雄黃黃芩各三兩松脂二兩豬脂半斤礬石五兩上為末煎令調和先以赤龍皮天麻湯洗干敷之赤龍皮即檞皮是也一方用桐樹白皮天麻甘草煎湯洗淨塗之治頭瘡細搗水龍骨黃丹等分安白礬須要碎雞子用清丸將去紅爐煅煉出象灰團牛皮另燒用硫黃生一般香油調搽敷直要見根盤神仙真妙藥一月保安全上用酸虀汁去瘡蓋如有發須剃淨方可敷之青砂散出聖惠方治小兒頭瘡久不瘥水銀一分以小棗研令星盡硫黃一分狗骨頭半兩燒灰川椒一分去目膩粉一分宿砂一分去皮竹葉半兩燒灰上羅為末研入水銀令勻以生油調塗之立效治小兒頭上生惡瘡方出聖惠方人糞灰狗糞灰皂莢灰香豉炒令微焦白礬灰以上各半兩上羅為散每使量瘡以生油調塗每日一易以瘥為度胡粉散出聖惠方治小兒頭上生惡瘡及疳瘡軟癤胡粉黃連去須各一兩糯米二十一粒赤小豆十四粒吳茱萸半分水銀一兩點少水入胡粉研令先盡上羅為末即以麻油和諸藥調勻塗之水銀膏出聖惠方治小兒赤瘡渾頭面皮胸上作片人不識者水銀松脂各一兩膩粉一分土蜂窠黃蘗銼川大黃各一兩半上除水銀膩粉外搗羅為末以煉成豬脂半斤煎成膏似稀麵糊放冷取水銀膩粉於掌中以唾調和如青泥後可入膏中相和攪令勻塗於瘡上不過三兩上瘥紫草膏治小兒頭瘡紫草二兩去無色枝幹搗末馬腸根一兩搗末杏仁一兩湯浸去皮研吳茱萸一兩搗碎雄黃一兩細研清麻油八兩上先以麻油於一淨鐺內煎下杏仁茱萸徐徐煎三兩沸即去火以生絹濾去滓次入紫草馬腸根等末又煎五七沸再濾去滓看膏稀調得所入雄黃末攪勻用瓷盒盛每用先以鹽漿水洗瘡令淨拭乾以膏塗之立效治小兒頭瘡不瘥惡汁出不斷並熱瘡方黃連去須黃蘗銼白礬燒灰各一兩蛇床子半兩胡粉三分上羅為散以熬成豬脂調如膏日二塗之效一方無白礬以油調敷之治小兒頭瘡及惡瘡方黃連一兩去須吳茱萸生用膩粉杏仁半兩湯浸去皮麻油一合上羅為末入麻油杏仁同研入膏每塗藥時先以鹽漿水洗了拭乾塗上日二用之黃連散治小兒頭瘡川黃連黃蘗去粗皮草決明輕粉各等分上為細末用生豬油於所患瘡上塗之立愈治小兒三歲忽頭上煙漿如釘蓋一二日及胸背皆生仍成瘡方水銀硃砂各半兩破兩相得石硫黃一兩研臘月豬脂如研如膏上煮桑葉湯洗以敷之勿令豬犬婦人小兒見見無效又一方有胡粉無臘月豬脂治小兒頭瘡及惡瘡方香豉二合麻油二合大黃半兩蔥白四兩細切上先煎油令熱入香豉等熬令煙出熱搗貼於瘡以物密裹之效水銀膏治小兒遍頭生瘡水銀二兩胡粉二兩入少水與水銀同研令星盡松脂二兩細研豬脂三兩上先煎豬脂令消去滓下松脂次下水銀胡粉不住手以柳枝子攪令勻膏成盡傾在瓷盒內淨洗干拭塗瘡上日二用之雞子膏治小兒頭瘡及白禿瘡新雞子七枚去殼膩粉半兩麝香一分細婦人油頭髮一團如雞子大上先將雞子入銚內熬次下發令消以綿濾過入膩粉麝香攪勻以瓷盒盛每用先洗淨拭乾塗之治小兒頭瘡出膿水瘥而復發豆豉一兩炒微焦皂莢一枚長三寸許燒過灰鱉甲一兩燒灰膩粉一分上羅為散每使以生油調塗上立效治小兒禿瘡紫草一兩為末輕粉二錢臘月鵝油無鹽者不拘多少黃臘一兩上先熬紫草次諸藥煉成膏不時搽頭上瘡治白禿瘡方斑蝥蟲七個巴豆七個去殼蛇床子松香各等分為末上用清油半盞煎蟲豆二味焦黑色並去不用又用油俟冷火氣息將二味末藥加輕粉於油內如用時先以禾杆燒灰淋汁及煨皂角洗淨候水氣干塗前藥治小兒頭瘡方胡粉連翹各一兩水銀半兩上以水煎連翹納胡粉水銀和調敷之螵蛸散治頭上瘡俗名黏瘡絶妙方海螵蛸二錢白膠香二錢輕粉半錢上將海螵蛸白膠香同研卻用輕粉再於乳鉢內研極細敷貼瘡時先用清油將瘡潤了然後將藥末乾摻瘡上只一上可愈甚者二上黃連散治小兒頭瘡出膿水瘥而復發黃連五兩去須水銀二兩烏賊魚骨一兩燒令赤色上除水銀搗羅為散別用白蘞末一兩半入少水與水銀同研星盡與前藥末相和研勻每用先以桃葉湯洗瘡令淨拭乾以藥敷於瘡上又方水銀半兩黃連末一兩胡粉半兩上相和入少水研水銀星盡以生油調塗之如聖黑膏治頭瘡久不瘥及白禿豆豉半斤龍膽草蕪荑各一分上一處用濕紙裹鹽泥固濟火煅存性碾為末以生清油半斤熬取四兩下藥急攪勻將瓷盒收貯敷之神效凡人耳輪瘡極癢臨睡時敷一遍治白禿剃頭後一敷愈治癩頭瘡方白礬五分刀頭飛過杏仁五分去皮尖細研大楓油五分上一處溶成膏子後入輕粉三分十文調敷之治小兒頭瘡方胡粉一兩黃連一兩上為末洗瘡去痂拭乾敷之即瘥更發如前敷之治小兒頭瘡面上赤有日月益甚者方黃連赤小豆各等分上搗末以臘月豬脂和塗之即瘥治小兒頭瘡出膿水瘥而復發方杏仁一百枚燒為灰膩粉一分上研為散每使用生油調塗之治小兒頭瘡晝間出膿夜即復合者宜用此方大附子一枚去皮臍搗羅為末鯽魚一尾長四寸者上將附子末入鯽魚肚中於炭火上炙令焦細研敷瘡上更爛搗蒜於上封之甚良一方用鯉魚又方亂髮一團如梨大雞子黃五枚上相和於銚中炭火熬令發消以綿濾過用瓷盒盛塗於瘡上鯽魚方治小兒白禿瘡鯽魚一尾重三四兩者去腸肚以亂髮填滿濕紙裹燒存性雄黃二錢上為末生清油調敷先以虀水洗拭後用藥平瘀散治凍瘡白禿黃柏九節黃連各等分上為末凍瘡以蕓薹煎湯俟溫洗令淨軟絹拭乾烏雞子清調敷白禿用甘草湯洗麻油調敷治小兒頭上惡毒腫痤癤諸瘡方取男子屎燒灰和臘月豬脂先以酢泔洗淨拭乾敷之治小兒頭瘡方以多年籬竹入土爛者燒存性入輕粉少許濕者乾摻乾者油調塗之一名籬灰散治頭瘡海上名方治久不瘥瘡以豬筒骨中髓膩粉和為劑復納骨中火煨香熟取出先以溫鹽水浴瘡乃敷之兼肥瘡疳瘡皆可用又方取樹上干桃燒存性碾為末與輕粉麻油調敷一方無輕粉或暑毒頭塊瘡及面上軟癤亦可治治小兒頭瘡煮熟雞子黃炒令油出以麻油膩粉調敷或以蔥汁調膩粉塗之治小兒頭瘡耳上生瘡方用竹葉燒末和豬脂塗上又以雞子白敷之亦妙治小兒頭瘡方取豬膽汁敷之豬𦚠音夷主肺痿咳嗽棗肉酒浸服之亦能治痃癖羸瘦治頭瘡及諸熱瘡方先用醋少許和水淨洗去痂再用溫水洗干用百草霜細研入膩粉少許生油調塗立愈治小兒頭瘡方用龜甲燒灰敷之治小兒頭瘡方用麥葉搗末和白蜜雞子白和勻塗上蟲出不作瘢治小兒頭瘡及浸淫惡瘡大效亦療婦人陰瘡初食利大小腸久食即否去陳留新胡麻人生嚼塗之八稜者名胡麻二稜者名巨勝一方用麻油嚼敷之治小兒頭瘡方用馬骨一味煅燒作灰和醋敷一治身上瘡白禿瘡以駿馬不乏者屎數數暖洗之十遍瘥又白馬脂五兩封瘡上稍稍封之白禿者發即生治小兒頭瘡不瘥方用大蟲脂消令凝每日三四度塗之亦治白禿治小兒頭瘡又白禿發不生汁出者方用雞子七個去白皮於銅器中熬和油敷之治頭瘡用大筍殼葉燒為灰量瘡大小用灰生油調敷入少許膩粉佳治小兒頭面身上生諸瘡方用蛇蛻燒末和豬脂敷之於上效治頭瘡不瘥汁出不止方用枳實燒灰豬脂調塗瘡上又方用田螺殼燒灰存性清油調塗濕摻末在瘡上治頭面上諸惡瘡方用南星貝母等分用湯泡七次研為末入土朱末少許干油調塗濕用乾摻治頭瘡白禿風密皮膚癢方用紫草煎汁浸並敷一方用白芨可煎汁浸並敷治頭上豆瘡白禿方用馬肉煮汁洗一方用馬尿洗治小兒頭上生瘡及肥疳瘡方用糯米飯燒灰入輕粉清油調敷治小兒頭瘡方以松香為末用青蔥葉盛貯皮黃就湯煮數沸取出待冷研細入輕粉和勻香油調敷治小兒頭瘡晝間出膿夜即復合者出聖惠方用馬蹄燒灰細研以生油調塗之又方出聖惠方用露蜂方細研以臘月豬脂調塗之又方出聖惠方用黑豆一合炒令存性搗為末以水調塗之治小兒頭瘡積年不瘥方出聖惠方取檳榔水磨以紙襯曬乾以生油調塗之又方出聖惠方用雞子殼燒灰細研以臘月豬脂和塗之效雞糞炒為末敷之亦佳又方出聖惠方用烏梅肉燒灰研以生油調塗之又方出聖惠方用吳茱萸炒令焦細研入膩粉以豬脂調塗之又方出聖惠方用菖蒲末生油調塗之治小兒禿頭瘡方出千金方取雄雞屎陳醬一升苦酒和勻以洗瘡了敷之又方出聖惠方用芫花臘月豬脂和如泥洗去痂敷之日一度一治白禿又方出千金方用不中水蕪菁葉燒作灰和豬脂敷之祕傳頭禿瘡方出和幼口議用吳茱萸鹽醃為末釅米醋調刷頭上大人肩疽瘡用之立效治小兒禿瘡方出百一選方用鼠糞不拘多少新瓦上煅存性以輕粉麻油調塗之苦楝膏治小兒禿瘡及惡瘡用苦楝皮灰豬脂調敷之治小兒禿瘡方用豬蹄甲七個每甲中放白礬一塊棗兒一個同燒存性研為極細末加輕粉得宜研細用清油調搽不過三五上即瘥治頭瘡白禿殺蟲方以繭草與白蘞赤小豆為末雞子白調如糊塗之干即更易治小兒白禿瘡方用羊糞煎湯洗去痂卻用雄羊糞燒灰同屋懸煤炒為末清油調塗之治小兒頭上禿瘡方用仙人掌草焙乾為末有汁乾摻無汁油調療禿瘡方取虎骨為末油調塗之治小兒禿方用白頭翁根敷一宿作瘡二十日愈療白禿瘡及發中生癬瘡頂白者取熊白敷之治頭上禿瘡用赤馬皮白馬蹄燒灰為末以臘月豬脂和敷之治小兒禿瘡用胡荽子油煎敷之治禿瘡方用桃枝未開花陰乾與桑椹赤者等分作末以豬脂和先用灰汁洗去瘡痂即塗藥治患禿瘡用山豆根以水研敷瘡上治頭上禿瘡方用膽礬少許火枯硼砂少許信少許硃砂少許一處研末取月頭剃去瘡又以炭汁洗清待血水乾清油半盞取鱔魚一條斬斷尾滴血油內調藥用治小兒頭瘡用草鞋鼻子燒灰香油調敷治小兒白禿瘡用淡豉一合炒令煙出色焦為末用飯飲調屋塵一團於炭火內煅令灰燼並細研入真輕粉少許油調剃頭了搽之見效一方治頭瘡無屋塵療惡瘡白禿用蕺菜有毒淡竹筒內煨敷之治小兒白禿瘡頭上瘡團團白色以牛糞敷之治白禿以羊肉如作脯法炙令香及熱以搨上不過三四日瘥治小兒白禿瘡凡頭上團團然白色以蒜揩白處早朝使之治小兒白禿用葶藶搗末以湯洗訖塗上治小兒白禿瘡方出肘後方搗榆白皮末醋和塗之蟲當出治頭瘡白禿殺蟲用烏雌雞窠中草和白禿翁草紙灰豬脂調敷之先以酸米泔水洗然後塗之治白禿方用白鵓鵒糞細羅為散先以酸米泔洗了敷之立瘥治白癩頭瘡出百一選方以白炭不拘多少燒令通紅先用盆盛白沸湯以熾炭投之卻濾令淨將此灰湯候通手洗瘡即愈治小兒頭上熱瘡滿頭膿瘡成片用此藥兩三次作痂而愈出百一選方用屋塵即烏龍也以麻油腳研令極細敷之雖痛不妨一方用皂角湯洗之皂角末敷之治乳抱小兒癩頭方及治軟硬癤諸熱毒疱瘡用五倍子七個搗碎用真香油四兩瓦碗熬令乾一半生布絞去滓敷之三四遍即可不必水洗一方水調塗麻油點用治小兒頭上梅花癩用清油不拘多少小竹子火灰內煨乾煎令油沸卻以豬膽一個燈上燎熟針出膽汁入油內先剃頭搽上勿令日曬淋二三日即愈治小兒頭上有瘡因入湯入水成毒膿水出不止出百一選方用紅曲不拘多少口爛嚼罨之立效又方一名香皂膏出海上名方用肥皂燒灰存性麻油膩粉塗伏龍肝散治小兒頭瘡不瘥鯽魚一尾如手大者腹下開少許去腸不去鱗用頭髮約實一團如彈子大伏龍肝一錢巴豆一枚去殼上將頭髮等三味入在魚腹中用甘草一寸塞魚口內盛在瓦缶中固濟炭火燒紅無煙取出研細油調塗之生肌散治小兒頭上瘡白礬飛過在地上一宿白膠香別研韶粉各一兩膩粉一錢上為細末麻油調塗瘡上只一二日效或熱毒盛再生一兩番亦如此塗之歷青膏治小兒黏瘡歷青一兩黃丹三錢菌荽子三錢黃蠟一兩上為細末小油三兩點熬散搽不須洗神妙散治小兒頭瘡疳肌禿瘡豆豉一合炒焦白礬半兩枯過膩粉一錢上等件研令極細先淨洗瘡剃去發以小便一盞燒稱錘通紅淬入小便中熱洗去瘡皮令淨血出無妨用軟帛拭乾生油調藥敷之如聖散治小兒頭面耳連引甜瘡流水極癢不住手撾又痛久不愈者神效蛇床子一兩輕粉三錢上共為末小油調搽治小兒頭生瘡手爬處即延謂之胎癬治法先以蔥鹽水洗輕粉桑木蛀屑煅存性研勻生麻油調搽治小兒頭瘡神效方水飛雄黃密陀僧上件同京歷青等分各研極細再同研勻桃柳頭各十四個清油浸兩宿以此油調藥塗瘡治小兒頭上生瘡方黃泥裹豉煨熟放冷去土豉搗末先取菜油敷瘡上著末必瘥治小兒頭面忽生瘡方炙艾於銅器內燒灰細研為末先用甘草煮水放溫洗了然後敷藥未愈再易治頭瘡方野外收干牛糞經久不壞者燒灰存性以輕麻油調搽治小兒頭上膿瘡蠶退紙燒灰存性出火毒上加輕粉少許麻油調敷瘡上治小兒頭癢瘡舊牛皮鞋底淨洗煮化淨洗訖敷之治小兒頭瘡及一切疥瘡烏桕樹粗皮向東者大椒五倍子白礬一錢苦楝樹根焙乾上研為細末用麻油調塗有膿水乾敷亦可治小兒頭瘡及女人面瘡方菟絲子煎湯洗治小兒頭瘡吻瘡耳後月蝕瘡以龜甲燒灰敷之治小兒頭瘡以蓼葉搗敷之治小兒頭瘡癰腫陰㿉以蒺藜子作粉摩之治小兒禿瘡熱腫以藍靛滓敷之頭不生髮附論夫足少陰為腎之經其榮在發小兒稟性少陰血氣不足則發疏薄亦有陰瘡而禿落者皆由傷其氣血氣血損少不能榮於發故令發不生也方治小兒不生髮燥癢出經驗良方皂角去皮弦子二條燒灰乾薑燒灰檳榔黃芩黃丹炒各一錢麝香少許硃砂少許白芨二錢上為細末先以桑桃枝燒灰熱湯淋灰汁洗去瘡痂用米醋塗甚者不過三次京芎油出全嬰方治小兒頭髮不出秦艽香白芷京芎附子蔓荊子零陵香各等分上細銼用綿裹定生麻油三斤於磁器中浸二十一日後塗頭上不得滴在面上恐生毛巨勝丸出全嬰方治小兒頭髮不生當歸焙生乾地黃芍藥各一兩苣蕂一分胡粉半兩上為末煉蜜丸如小豆大三歲三十丸煎黑豆湯下兼化塗頭上無妨量大小加減蓯蓉丸出危氏方治發不生稟受血氣不足不能榮於發當歸去尾生乾地黃肉蓯蓉酒洗炙芍藥各一兩胡粉五錢上為末煉蜜丸如黍米大每服十丸煎黑豆湯下兼磨化塗抹頭上神效黑豆膏治小兒腦疳頭髮連根作穗子不脫落生兼瘡白禿髮不生者宜用生髮黑豆三合巨勝三合訶黎勒皮一兩上羅為末以水拌勻納於竹筒中以亂髮塞口用煻灰內煨取油貯於瓷器中先以米泔莢湯洗頭拭乾塗之日再用十日發生又方兼治小兒頭禿瘡苦癢葛根末一方用野葛末豬脂羊脂以上各二兩上水銚子內以慢火熬成膏收於瓷盒中每取一錢塗磨頭上再用不過五七度立效香薷煎治小兒白禿不生髮燥癢並出汁慘痛陳香薷二兩胡粉一兩豬脂半兩上以水一大盞煎香薷取汁三分去滓以胡粉豬脂相和令勻塗於頭上再用之即生一方有黃丹無胡粉治少小頭不生髮一物揪葉方出聖惠方用楸葉取汁敷頭上立生治小兒頭不生髮方出聖惠方燒鯽魚灰末以醬汁和敷之治頭禿髮不生白禿者出肘後方用椿楸桃葉心取汁敷之立生治小兒白禿髮不生出肘後方用臘月豬屎燒末敷之油調亦可蔓菁子散出聖惠方治小兒頭禿不生髮苦癢取蔓菁子搗為末以豬脂調塗於禿處佳又方出聖惠方取貫衆燒灰細研以油調敷之又方出聖惠方用麻子一升熬黑壓取脂敷頭上良又方出聖惠方用鹽湯洗之生油和蒲葦灰敷之又方出聖惠方用雁脂敷之佳長毛髮出木草以物灼飲飯時取甑氣水沐頭令髮長密黑潤朝取梳小兒頭有益解顱附論夫人之資質稟賦父母精氣血脈渾朴胞胎調攝鞠育凡兒變蒸之後其形可知是以顱囟未合筋骨柔弱顱囟青筋脈虛不榮顱囟常坑滑泄便青顱囟腫起風痰不止顱囟久沉吐利清頻顱囟虛軟癲癇不免顱囟匾闊暴瀉易脫顱囟喎長風作即亡顱開連額驚風易得顱囟未完怕熱怯寒顱囟緩收胎氣不周顱囟動數神昏氣弱顱囟寬大受疾恐害顱囟者乃精神之門戶也關竅之槖籥也上下相貫百會相通七孔應透五臟所藉泥丸之宮魂魄之所氣實則合氣虛即開良由長大不可不合醫者一見當知其可否用藥凡兒有顱囟未合受病沉重者慎勿將作尋常審思施治不可妄投丸散小兒解顱者囟大頭縫不合如開解故曰解顱也皆由腎氣不成故也腎主骨髓而腦為腎海腎氣不成則腦髓不足故不能合也凡得此者不遠千日其間亦有數歲者乃廢人也人乏腦髓如木無根故也此乃無辜之疾設有此證亦不可束手待斃也宜依錢氏以補其腎萬一有可生之理宜服地黃丸解顱生下而囟不合腎氣不成也長必少笑更有目白睛多㿠白色瘦者多愁少說也全嬰方云夫解顱者小兒頭骨不合腦縫開解囟大青筋面色黃白多愁少悅易為傷犯蓋受父母之精氣不足則髓海不強不能充於骨也今兒腎氣不成腎氣主骨髓腦為髓海故腦骨開解也寶鑑云父精不足頭骨不合顱開母氣衰微極其體虛而骨極其開有如因驚風或傷風身熱不退被風邪所攻腦骨開大頭重舉夭傷多矣又因打火地震亦令兒頭開經驗有此病者便作頭巾長裹之不使之舒展更用治方久而愈方牛黃丸治小兒腦長喜搖頭解顱牛黃漆花甘草炙銼白朮防風去叉鍾乳粉生乾地黃焙各一分上為末用犬腦髓為丸如麻子大每服二丸至三丸溫水下早晨日午晚後各一服更量兒大小加減半夏尉方出聖惠方治小兒長解顱不合羸瘦色黃至四五歲不能行半夏生薑芎藭各一升細辛三兩桂心一兩烏頭十枚上㕮咀以醇苦酒五升漬之晬時煮三沸絞去滓以綿一片浸藥中適寒溫以尉囟上冷更溫之復尉如前朝暮各三四尉乃止二十日可愈一方無生薑補骨丸出全嬰方治小兒骨氣衰弱囟門不合受胎精氣不足受氣於腦久病氣虛風邪攻作亦然川萆薢骨碎補補骨脂各半兩牛膝葳靈仙草烏頭各一錢上為末醋糊丸小豆大每服三十丸鹽湯送下地黃丸出危氏方治嬰兒胎虛氣弱腎氣不足神氣未完囟大顱開面色㿠白眼目竄視白日好眠肌體羸瘦如木無根不過千日終成廢人此方補腎合骨功不可具論熟乾地黃八錢洗山茱萸乾山藥澤瀉洗牡丹皮去心白茯苓去皮各三錢上研末為丸如梧桐子大三歲以下一二至三丸溫水空心化下一方用炒茴香湯下一方用天南星微炮為末米醋調敷於緋帛烘熱貼之鍾乳丸治小兒解顱囟大身有痼熱頭面汗出腹脹咳嗽上氣肩息足蹇脛交三歲不行鍾乳研粉防風去叉生乾地黃焙一方用熟地黃牛黃研甘草炙銼漆花各一分一方無漆花上為末以犬腦髓為丸如麻子大每服二丸至三丸米飲下早晨午時日晚各一服更量兒大小加減一方以豚腦為丸防風丸治小兒解顱腦縫開不合防風去叉鍾乳粉牛黃研白朮各半兩熟乾地黃焙甘草炙各三分上研末煉蜜為丸如梧桐子大每服三丸溫酒化下隨歲數以加減服玉乳丹治嬰兒頭骨應合而不合頭縫開解此最為小兒大病皆由腎氣虛腦不足不能結成名曰解顱蓋腎主骨而腦為髓海若此不察百病交攻極難調護宜用鍾乳粉依古法治半兩熟乾地黃半兩依法蒸炒柏子仁半兩另研當歸半兩洗防風一分補骨脂一分炒上除柏子仁另為細末次以鍾乳等拌勻煉蜜和為丸如黍米大每服十粒煎茴香湯下食前或加黃耆茯苓封囟散治小兒解顱囟開解柏子仁炒細辛去苗葉防風去叉白芨各半兩草烏頭炮半兩上為細散乳汁調塗囟開處封囟散治嬰兒解顱囟不合囟填囟陷不平皆由腎經虛熱宜用蛇蛻皮一兩燒灰防風半兩白芨半兩川大黃半兩濕紙裹炮存性上為細末青黛半兩同研勻每用半錢以獖豬膽汁調勻用一紙囟子攤之四邊面各留少白紙用淡生醋麵糊貼囟上不住以溫水潤動一伏時換一方生薑汁調敷白芨散治小兒顱骨開蓋腎氣不成腦髓不足小兒年大骨應合而不合頭縫開者宜以藥塗之白芨一分細辛一分防風一分去顱頭柏子仁一分上搗羅為散以乳汁調塗兒顱骨上日二用之三辛散治小兒解顱腦角骨大囟開不合名曰解顱細辛桂心各半兩乾薑十八銖上為末以乳汁和敷顱上干復敷之兒面赤即愈一名桂心散防風散治小兒囟開不合一名柏子仁散防風去蘆頭白芨柏子仁各一兩上羅為末以乳汁和塗頭囟上日一上以合為度治小兒解顱不合方治小兒頭骨連囟開作縫者一名解凡散生蟹足白蘞各半兩上搗為末以乳汁和敷囟上立愈治小兒解顱方治小兒頭開解蛇蛻皮一兩燒灰細研豬頰骨中髓一分上調為膏塗於顱上日二塗之只用髓已效曾有人作頭巾裹遮護之久而自合亦良法也治小兒骨氣衰弱囟開不合受胎精氣不足容風於腦久病氣虛風邪攻作用胡粉不拘多少水調三豆大日三服小兒頭骨開解用驢頭骨不拘多少燒灰研細以生油調敷頭縫中一方用驢蹄燒灰治小兒腦長囟不合雞血塗方一名固頂散取丹雄雞一隻於小兒囟上割其冠使血滴囟干以赤芍藥末粉血上使血不見一日瘥爽神丸母氣衰時胎氣冷父精不足號顱開胎中受氣多不足腎氣未全生下來身上自然無血色肌羸骨細面容衰腦分十字顱門陷目無光彩白睛猥此候父精不足頭角闊而顱開母氣衰微肌膚羸而四肢弱凡遇此候十不救一先用爽神丸次以南星散貼之人參三錢白朮一錢全蠍一錢防風一錢羌活半錢天麻一錢殭蠶半錢湯泡浸洗丁香二錢木香一錢茯神一錢上為末以酒煮麵糊為丸如緑豆大每服五七丸糯米飲下南星散天南星大者一個開一坑入硃砂半兩用酒塞坑內於慢火煨制白芨半兩上為末令勻淡醋調塗囟上以絹片隔用慢火炙手頻頻尉之得效自升如此六七次方見效百日孩兒鼻塞不乳此藥服之亦效尉頂散治長頭方面囟大不合手足痿小不能行步頭頂軟弱體瘦面光並皆治之半夏川烏川芎桂心細辛百合白芨柏子仁朗黎樹根焙各等分上為末用煨大蒜和酒搗成餅子貼之又用緋絹貼之用炙手頻頻尉之地黃丸治頭囟不合體瘦骨露有如鶴膝皆腎虛不足虛治腎疳天柱傾倒腎主骨也熟地黃洗焙八錢澤瀉洗二錢牡丹皮去心白茯苓各三錢山茱萸肉牛膝鹿茸酥炙山藥各四錢上研末煉蜜為丸如梧子大三歲以下二三丸溫水空心化下防風柏子散治囟大不合防風柏子仁百合川烏朗黎樹根皮各等分上為末酒調塗囟上囟填陷附論夫囟填者囟門腫起也脾生肌肉乳哺不常飢飽無度或寒或熱乘於脾家致使脾臟不調其氣上衝為之填脹囟突而高如物堆垛毛髮短黃自汗足耳若寒氣上衝則牢𩊅熱氣上衝則柔軟寒者溫之熱者涼之劑量重輕兼與調氣小兒肝盛風熱加攻亦然未易退瘥囟陷者小兒胃氣中和則腦髓充成囟頂漸合若胃熱熏蒸腑臟則渴而引飲因致瀉利令腑臟血氣虛弱不能上充髓腦所以囟陷如坑不得平滿也聖惠云小兒上陷者此謂囟陷不平也由腹內有熱氣熏臟熱則渴引飲而小便不利者臟腑血氣虛不能上充髓腦故囟陷也方當歸湯出聖惠方治小兒胃虛血氣不充囟陷當歸切焙白朮人參黃耆銼各一兩訶黎勒煨去核半兩甘草炙銼一分上粗搗篩每一錢水七分煎至三分去滓分溫二服不拘時候地黃丸治小兒血氣虛弱囟陷不平熟乾地黃焙芍藥當歸切焙白朮各半兩桂皮去皮一分上為細末和丸如黍米大每服七丸粥飲下乳食前量兒大小加減生乾地黃散出聖惠方治小兒臟腑壅熱氣血不榮致囟陷者生乾地黃焙二兩烏雞骨酥炙黃一兩上為細散粥飲調下半錢不拘時候治小兒囟陷方出直指方因臟腑有熱渴飲水漿致成泄利久則血氣虛弱不能上充腦髓故囟陷如坑不得滿平用狗頭骨炙令黃搗羅為末雞子清調塗之一方用黃狗頭骨又方出聖惠方用天靈蓋炙令黃搗羅為末生油調塗之又方出聖惠方取豬牙車骨髓煎如膏塗囟上良一方用頰車髓囟腫為熱以黃柏膏塗足心湧泉穴陷則為冷以半夏塗手心妙治囟填陷方以白丁香膏三服或南星丸三服凡小兒生下一月內或腫起及交胎熱氣即用黃柏膏塗足心湧泉如陷足開半夏膏塗足心乃嬰兒腎濕冷邪氣干心致此皆為末冷水調囟風傷寒附論小兒有囟風傷寒候氣急吃乳不得身溫熱鼻塞此候因母夜間抱小兒睡鼻孔內氣衝著小兒囟門奈小兒的囟門未合被熱氣吹著而鼻塞至此所治者用蔥涎膏塗囟門上然後用鎮心丸磨與下之氣通即愈也方鎮心丸治囟風傷寒兼治小兒諸驚硃砂別研白附子白殭蠶酒洗蟬蛻去足翅淨洗茯神去皮各半兩全蠍一分尾丁腦麝隨意研入上為末拌合薄荷自然汁為丸如芡實大用銀硃拌腦麝為一每服一丸金錢薄荷煎湯磨下芎蠍散治小兒腦髓風囟顱開解皮肉筋脈急脹骨縫青筋起面少血色或腹中氣響時大便青白沫嘔吐痰涎以成慢驚風搐足脛冷或大人氣上衝胸頭面瘇癢皆宜服之川芎蓽茇各一兩蠍梢一錢細辛去蘆苗一兩淨半夏湯泡去皮臍二鍾半生薑自然汁制一宿上等件搗羅為細末周歲兒每服一次銅錢許用數沸湯調稍熱肚飢服量兒之大小以意增減如痰滿胸喉中眼珠斜視者速與服之若上直視睹不轉睛者難救或痰氣壅塞不能咽藥用一指於兒喉齶中探捥就斡去寒痰冷涎氣稍得通次服補脾益真湯或以油珠膏二藥選用之然生死在人主持此方家傳纍世曾救過無數之人今固刊行流傳於世使養子之家無憂患離情之痛幸甚通頂散治小兒腦熱枕骨疼腦熱閉目不開或頭風痛攢眉啼哭並赤目龍腦薄荷川芎各半兩山茵陳甘草各四錢朴硝三錢上為末以少許吹鼻即效用朴硝吹鼻即止如要嚏噴躑躅花一錢蔥涎膏治小兒囟風傷寒貼囟豬牙皂角天南星赤小豆上等分為末每服二大錢用生蔥自然汁調塗囟上兩次其鼻孔開即愈治頭風痛用川烏為末醋調塗頂上囟角太陽穴之上須臾即止又方用苦葫蘆子為灰吹鼻即止眉瘡附論凡小兒面上瘡謂之眉煉耳上瘡謂之輒耳足上瘡謂之靴癬此三者究其本皆謬名也經曰諸痛癢瘡瘍皆屬心乃血熱極而致然也或謂內經大概不可便以為皆然此不明造化之道也慎勿妄信可用䤵針刺之出血一刺不愈當復刺之再刺不愈則三刺之必愈也內經曰血實者決之眉煉不可藥敷之以其瘡多則癢癢則爬藥入眼則目必損矣方治小兒眉煉輕粉一錢青黛三錢白膠香五錢上為末濕幹上乾用水油調搽神效治眉煉頭瘡用小麥不拘多少略燒令黑色存性為末以小油調塗瘡上治小兒眉間煉胤瘡用曾煅金飯甘鍋子捶碎煨細量研如粉生麻油膩粉調敷之治小兒面湮瘡浴銀煉云瘡者是母受胎之日食酸辣及邪味過度多生此瘡用百藥煎半兩生白礬二錢為細末小油調旋搽之治小兒煉胤瘡並眉煉瘡方用黑驢屎曬乾燒灰清油調搽立效前甲散治小兒眉叢中生瘡名曰煉銀癬用穿山甲前膊鱗炙焦為細末麻油輕粉調敷黃連散治小兒眉煉黃連大黃黃芩百藥煎各等分輕粉少許陀僧上為極細末每用不拘多少油蜜調搽立效眼目附總論小兒諸疾除疳蝕斑瘡二證外皆由五臟所積熱毒而作又有胎內受氣乘母所食熱毒稍長因毒相觸忽作障瞑不由腫赤熱毒積成其候者此等決定難醫若加寒涼之藥壞害尤甚若赤腫流淚疼痛翳膜須與忌食熱毒之物清心涼肝順氣行血解熱散毒認證瀉臟常宜用四順清涼飲隨其熱毒所發輕重加藥與服萬一克效不必執滯方藥指算攻療蓋小兒無患眼所患即與大人不同至重者謂赤腫等俱作宜與利下即便解散若有瘀血眼胞內外腫盛即從鼻中取出敗血立愈既無血眼不作攀努雖有赤脈貫萬一是熱毒所治即不可以鐮針割凡當利下並以大黃藥洗心散之屬乃佳胎氣充足兒當將分降胞囊以破先行清水其兒既誕即送下緣由胞氣頗澀轉側差緩其血壓瘀眶眥遂致濺滲盛則灌注其睛不見瞳人輕則外胞赤腫上下爛眩若投涼藥必寒臟腑宜與服生熟地黃湯流行血氣或用杏仁二枚細嚼乳汁三五匙膩粉少許蒸熟以絹片色蘸頻點甚效重盛者加黃連朴硝最良凡小兒患眼皆由熱毒得之方藥甚衆惟有斑瘡眼患此疾最為惡候若有是疾皆由兒病不謹口腹或斑瘡方愈便與食毒熱毒入於肝腎之間便作腫痛羞明怕日眵淚難開毒者諸凡炙煿醃臘油麵白魚黃牛母豬米醋鮭鯗鮓醬雞羊鵝鴨蝦蟹魚鱉腥膻鱔鰻飛禽之屬悉為斯咎及至熱退痛止睛中白翳已成或一隻兩睛隨其輕重得之宜速與療凡小兒患澀眼數日不開皆風熱所致可服涼膈散瀉肝散風熱即甚鬱結散而自開也目內證赤者心熱導赤散主之淡紅者心虛熱生犀散主之青者肝熱瀉青丸主之淺淡者補之黃耆脾熱瀉黃散主之無精光者腎虛地黃丸主之胎中受風五臟不和嘔吐黃汁兩眼一同見物不明無藥可治目者腑臟之精華肝之外候也小兒臟腑有熱與膈間痰飲相搏氣不宣通熏漬於肝肝經受熱則血脈壅大循經上衝於目故令目赤痛不即治熱甚則生障翳龍木論歌曰小兒不與大人同醫療流傳別有宗神氣未全難保抱披鐮炙割哭傷瞳等閒痛概無令點啼叫勞他病轉濃更若手揉雖禁制因茲睛破更無功欲求穩便全雙目善藥熱淋洗避風服藥治肝須見效免教昏暗一生中雀目附論夫小兒有晝而精明至暝便不見物謂之雀目言如鳥雀瞑便無所見也方泉石散治小兒熱疳雀目青盲眼腫並疳眼生翳甘泉石大黃梔子仁石決明菊花甘草各等分上為末每服半錢煮狗肝湯食後服還明散治小兒至夜不見物者名雀目一名復明散蒼朮一兩半泔浸切去皮穀精草半兩黃芩決子明地膚子各等分上為末每服一錢水半盞荊芥少許煎三分去滓食後溫服治小兒雀目至暮無所見老柏皮一兩烏梅肉半兩微炒細辛半兩地膚皮一兩車前草半兩上羅為散每服以粥飲調下半錢量兒大小加減又方細辛麥門冬去心焙甘草炙微赤銼陳皮蕤仁湯浸去皮細研以上各等分上羅為末以白羊子肝一枚去筋膜煮爛和丸如緑豆大每日食後溫水下五丸五歲以上增之又方烏梅肉微炒槐子微炒黃連去須防風去蘆頭以上各一兩黃牛膽一枚取汁上羅為末牛膽汁拌勻曝乾重羅為末煉蜜丸如緑豆大每服每日空心溫水下五丸量兒大小加減夜明砂散治小兒雀目日晚無所見夜明砂半兩微炒細辛一分羌活一分姜石半兩搗碎細研水飛過上為散研令勻每服一錢用白羊子肝半枚粟米二百粒水一中盞煮米熟去肝放冷漸漸服之兒稍大並肝食之煮肝石決明散治小兒雀目及疳眼石決明細研井泉石蛤粉穀精草以上各半兩上羅為散每服一錢取白羊子肝一枚劈開放藥末以米泔一中盞煮熟空心與食量兒大小加減仙靈脾散治小兒雀目至暮無所見仙靈脾根半兩晚蠶砂半兩射干一分甘草一分炙微赤銼上羅為散用羊子肝一枚切開摻藥二錢在內以綿系定用黑豆一合米泔一大盞煮熟取出分為二服以汁下之合明散治小兒雀目至夜不見物蛤粉石決明甘草各等分上為末每服半錢煮豬肝汁調下食後服又方穀精草半兩甘草半兩炙微赤銼乾薑一分銼上搗為末用面一兩作燒餅子樣用藥三錢入在中間安慢火內煨令熟用好茶下之每日晨早一服至三日後見物多時者不過五服見效無問大人小兒並治小兒量其大小加減又方地膚子決明子各半兩上羅為末以粟米飯和丸如緑豆大每日空心粥飲下七丸至夜再服量兒大小加減又方夜明沙微炒黃芩各半兩上搗為散用米泔煮豬肝汁調下半錢日三服三歲以上增之又方用蒼朮一兩去皮銼微炒每服一錢用羊子肝一具以米泔煮熟分半具細切拌藥與兒食之至晚再服五歲以上即可服未五歲兒不可服一方用河水浸去黑皮煮熟乘熱服然後食之亦治大人雀目治小兒雀目立效方用羊子肝一具薄切作片子鄆州蛤粉一錢勻摻在肝內系定以水煮熟服之五歲以下分減與服又方用牽牛子一兩搗羅為散用羊子肝一片切將末一錢拌肝以白麵作角子兩個炙令黃色候冷服之粥飲下量兒大小加減又方用夜明沙一兩微炒細研用豬膽和丸如緑豆大不計食前後以粥飲下五丸三歲以下三丸治眼胎赤痛附論夫小兒眼胎赤者是初生洗目不淨令穢汁浸積於眥中使瞼赤爛至大不瘥故云胎赤也方升麻湯治小兒眼胎赤風毒所攻腫痛升麻黃耆銼玄參甘草炙各半兩犀角屑防風去叉蕤仁湯浸去皮研各等分上粗搗篩每服一錢以水七分煎至四分去滓分溫二服更量兒大小加減一方用竹瀝半合更煎一兩沸服麥門冬湯治小兒眼胎赤腫痛上焦壅熱麥門冬去心焙犀角屑芒硝防風去叉甘草炙各半兩旋覆花一分上粗搗篩每一錢水七分煎至四分去滓量兒大小分溫服日四五次牛黃丸治小兒眼胎赤久不瘥牛黃一分研細黃連半兩去須決明子一分蕤仁一分湯浸去皮犀角屑半兩龍腦一錢細研上為末煉蜜和丸如麻子大每服以溫水下五丸日三四服更量兒大小加減黃連丸治小兒胎赤眥爛黃連去須一兩防風去叉龍膽去土大黃銼炒細辛去苗葉各半兩上為末煉蜜丸如緑豆大每服五丸至七丸溫水下日三次更量兒大小加減黃連散治小兒胎赤眼由洗兒洗眼不淨穢汁浸漬或在胎母食熱物熱藥令兒目赤爛黃連黃蘗當歸赤芍藥杏仁各等分上銼乳汁浸一宿曬乾為末每用一次用地黃汁調頻點眼中母服洗心散杏仁膏治小兒眼經年胎赤兼有翳膜杏仁一兩湯浸去皮尖研如膏膩粉一錢鹽緑一分細研黃連末一分上同研令勻以真酥調如膏攤於銅碗內以熟艾如雞子大掘小坑子內燒艾煙出將銅碗於上熏之勿令泄氣候煙盡為度更研令勻每取少許以綿裹用人乳汁浸一宿日三四度點之銅青散治小兒眼胎赤經年月深遠者銅青一錢膩粉一錢龍腦半錢乾地龍一條為末上研令極細每用半小豆許點著目眥日以兩度用之龍腦膏治小兒眼胎赤及生瘡怕見風日龍腦半錢細研蕤仁一分湯浸去皮研杏仁一兩湯浸去皮尖研上滴少水都細研和乳汁每日三四度點之龍腦煎治小兒眼胎赤龍腦一錢鹽緑半兩蕤仁一分湯浸去足上研令極細蜜調似面脂每日三兩上點之黃連煎治小兒胎風赤爛不分年月時發時歇頻頻視物淚出澀痛不可忍黃連一兩去須蘆薈一分龍腦一錢別研上先將黃連蘆薈搗為末以新綿裹用水一大盞於銀器中以白湯慢煎候藥汁三分減二即去藥綿入龍腦收入瓷瓶內每日三兩上點之治小兒眼胎赤癢痛龍腦半錢細研桑葉五錢燒作灰上水一升先煎桑葉灰取半升綿濾去滓後入龍腦攪令勻日三四上點之玉筋煎治小兒胎赤眼及風赤眼用蛔蟲二條小兒口中者為末放瓷盒子盛用紙裹向濕地埋五日後取出其蟲化為水以瓷瓶子盛每日以銅箸點少許著目眥頭及夜臥時再點之治小兒眼胎赤及生瘡方出聖惠方用馬牙硝半兩研取臘月豬膽三枚納硝於膽中浸之一干後取硝出以少許龍腦同研細點之四仁膏治小兒風熱疳氣攻眼赤痛內外障眼桃仁四個去皮尖杏仁四個去皮尖蕤仁五個去皮尖郁李仁五個去皮尖蕪荑五個取肉海螵蛸取中心末半錢北停如指大一塊上七味放乳鉢內生研極細將綿絹濾過後用白蜜五文龍腦一百文真麝香一百文輕粉五文再研極勻點之四順散出鄭氏小兒方治小兒目赤上焦壅熱及退諸般潮熱大小不通當歸洗去土芍藥洗大黃濕紙裹煨甘草炙上等分為末每服嬰孩二三歲半錢及一錢水一中盞或半銀盞於銀石砂銚中煎十數沸溫服牛黃散出宣明論方治小兒上焦壅熱諸眼疾肉桂鬱金一兩馬牙硝四兩甘草半兩生上為末如患眼三五年吃三五兩便瘥每服一錢新汲水調下小兒十歲服半錢五歲以下服一分永無驚風疳癇之患目赤腫痛附論夫肝氣通於目臟內有熱與胸膈痰熱相搏熏漬於肝熱氣皆發於目故令眼赤痛甚則生翳也方羚羊角散出聖惠方治小兒肝臟風熱上注眼目赤腫疼痛羚羊角屑犀角屑赤芍藥各三分黃連去須馬牙硝硃砂細研各一分川升麻牛黃細研天竺黃細研芎藭當歸銼微炒甘草炙微赤銼各半錢上羅為散入研了藥令勻每服煎竹葉湯放溫調下一錢量兒大小加減羚羊角散出聖惠方治小兒肝臟風毒上衝眼赤痛開張不得頭額疼痛羚羊角屑半兩甘草半兩炙微赤銼葳蕤防風去蘆頭甘菊花牛黃細研入玄參赤芍藥黃芩梔子仁以上各一分上羅為散每服一錢水一小盞煎至六分去滓入牛黃一分量兒大小加減溫服龍腦散治小兒肝臟壅熱兩眼赤痛龍腦一錢細研梔子仁黃芩麥門冬去心焙地骨皮川升麻犀角屑以上各半兩牛黃一分細研川大黃一兩銼微炒甘草一分炙微赤銼上羅為散每於食後以溫水調下半錢五歲以下可服一字決明湯出聖惠方治小兒眼赤隱澀不開膈中有熱決明子炒黃芩去黑心各一兩一分柴胡去苗大黃炒碎各一兩半升麻石膏梔子仁各一兩甘草炙銼枳殼去穰麵炒各半兩上粗搗篩每一錢水七分入竹葉五片同煎至四分去滓分溫二服隨兒大小加減食後服一方有羚羊角屑無枳殼地黃散出錢氏方治小兒心肝壅熱目赤腫痛生赤膜或白膜遍睛四邊散漫者猶易治若暴遮黑睛多致失明宜速用此方亦治瘡疹入眼生熟乾地黃切焙稱當歸去蘆頭切焙稱防風去蘆頭焙羌活焙生犀末蟬殼去土並頭足木賊穀精草白蒺藜沙苑蒺藜各一錢甘草一錢半銼炒玄參半錢上為末每服一錢或半錢量兒大小加減煎羊肝湯食後調下日三夜一忌口將息亦治大人一本黃連去須大黃去皮取尖者略炒一錢木通一錢半小流氣飲出活幼口議治小兒風毒眼患蟬蛻去大節甘草炙羌活天麻川當歸赤芍藥防風大黃龍腦薄荷杏仁各等分上㕮咀每服二大錢水一小盞煎至半盞去滓通口食後服小菊花膏出活幼口議治小兒積毒眼黃連黃芩大黃菊花羌活蒼朮米泔水浸荊芥穗防風上等分為末煉蜜為膏尾指大每服一餅細嚼白湯下小防風湯出活幼口議治小兒熱毒眼患赤腫乾澀疼痛不開者大黃蒸山梔子甘草炙赤芍藥川當歸洗淨防風羌活各等分上㕮咀每服二大錢水一小盞煎至半盞去滓通口食後服一方有荊芥用燈心薄荷同煎洗肝散出全嬰方治小兒肝熱赤眼腫痛多淚赤芍藥羌活防風大黃甘草各等分上為末每服一錢白湯調下食後服或用黑豆三五個同煎服一方用黑豆燈心煎服又方以秋芙蓉葉為末水調貼太陽尤妙銀白散治嬰孩肝熱眼赤痛涼膈退熱天花粉一方用蛤粉連翹甘草川白藥白附子各等分上為末每服半錢麥門冬蜜熱水調下不拘時候梔子仁散治小兒眼風熱澀赤痛梔子仁黃芩犀角屑龍膽去蘆頭赤芍藥黃連去須胡連川大黃銼微炒甘草炙微赤銼以上各半兩上搗篩為散每服一錢水一小盞煎至五分去滓溫服量兒大小加減治小兒熱毒眼痛赤澀熱淚不止方玄參決明子甘草炙微赤銼黃芩梔子仁犀角屑牛黃細研各半兩龍腦半錢細研上羅為散都研令勻每於食後以蜜水調下半錢五歲以上增之瀉青丸治疳熱肝風赤眼多淚睛疼心躁並消熱翳即瀉肝丸當歸龍膽草川芎梔子仁大黃炒防風去蘆羌活以上各等分上為末煉蜜丸如芡實大煎淡竹葉湯化下一方加甘草每服一丸沙糖湯下又方大人小兒皆可服蒼朮去皮生用當歸洗去土蘆赤芍藥荊芥穗防風去蘆槐花各一兩甘草生一分上㕮咀水煎去滓有實熱加大黃大人小兒以意加減黃連水藥煎治小兒熱毒眼赤黃連去須蕤仁湯浸去皮研入杏仁四十九枚湯浸去皮尖研入雙仁黃蘗銼青鹽以上各半兩膩粉一錢細研龍腦一錢細研上羅為末入研了藥令勻以生絹袋盛用雪水二大盞浸藥一七日取出藥袋子將藥汁灌在竹筒內蜜裹封坐在重湯鍋中煮一時復掘地坑子深三尺埋一宿取出放龍腦攪令勻以瓷瓶盛旋取點之真珠散治小兒肝臟風熱上攻於眼目赤痛真珠末一分研青葙子一分牛黃細研黃連去須蔓荊子半兩甘草炙微赤銼上羅為末入研了藥都研令勻每服以熱水調下半錢量兒大小加減牛黃丸治小兒肝心壅熱上衝眼赤腫疼痛牛黃一分細研硃砂半兩細研水飛過熊膽一分細研龍腦一錢細研黃連末半兩膩粉一錢上研令勻煉蜜為丸如麻子大不計時以溫水下五丸量兒大小加減寒水散治肝風暴赤目睛偏視青黛一錢大豆去皮黃蘗各三錢馬牙硝黃連各三錢上為細末每用一錢蜜少許冷水調成膏緋絹作餅子如小錢大攤藥於上貼太陽穴病左貼左病右貼右生地黃湯治小兒眼赤痛不開生乾地黃二兩決明子黃芩去黑心竹葉各一兩白芍藥一兩上細銼以水二升煮五六沸去滓澄清洗眼一日三次大人通用治小兒暴赤眼澀痛神效方龍腦半錢秦皮銼黃連去須生甘草銼馬牙硝煉過細研五味各半兩上羅為末用水一大盞浸藥一宿將銀銚子煎至五分以新綿濾過入龍腦攪令勻用瓷器盛日三度以銅箸點之導赤散治心熱小便赤澀眼目赤痛生乾地黃木通各一兩甘草黃芩各半兩上㕮咀燈心淡竹葉煎量見大小以意加減黃芩散治小兒赤眼黃芩去黑心半兩寒水石一兩一分升麻甘草炙銼各一分上粗搗每一錢水七分入竹葉五片同煎至四分去滓作二貼食後臨臥分服隨兒大小加減敗毒湯治小兒風熱眼赤痛大黃銼研麵炒甜硝別研甘草炙銼各二錢陳橘皮去白焙三兩上粗搗篩每服一錢水七分入薄荷三葉煎至四分去滓食後服量兒大小加減無薄荷入乳香亦得大黃丸治小兒目赤澀痛漸生翳膜昏暗大黃銼鬱金人參黃連去須各三錢上為末研鼠肝和丸如緑豆大每服三丸米泔下乳食後量兒大小加減胡黃連散治小兒肝臟久積風熱熱毒所攻兩眼赤痛胡黃連一兩真珠末一分研入梔子仁半兩甘草半兩炙微赤銼上羅為散入真珠粉同研令勻每服一字濃煎竹葉湯溫調不拘時候量兒大小加減治小兒暴赤眼澀痛點眼方黃連末一分膩粉半錢杏仁一分湯浸尖蕤仁半兩湯浸去皮上先將杏仁蕤仁爛研如膏後加黃連膩粉相和研了以新綿厚裹卻用新汲水半小盞放淨器內浸藥半日濾取汁日三四度點之貼藥治小兒赤熱腫目川大黃白礬朴硝各等分上為末冷水調作掩子貼目上一方無朴硝決明丸治小兒赤眼決明子牛黃別研蕤仁各等分上為末煉蜜丸如麻子大臨臥時乳汁下二丸隨兒大小加減如熱痛不可忍者用豬膽汁和丸立瘥黃連膏治小兒眼爛眥癢痛淚出不能視物風傷則痛黃連去須八分大銅錢七文白礬燒灰一分上以水並白蜜各三合用銅器盛放飯上炊一次綿濾去滓貯瓷盒內點眼黃蘗湯治小兒赤眼黃蘗去粗皮銼秦皮各一兩銼蕤仁去皮半兩上粗搗篩每用兩匙頭以水一碗干棗三枚同煎三五沸去滓適寒溫洗眼一方有秦艽無秦皮朴硝膏點方治小兒赤眼朴硝燒灰幹一分黃連去須三分上為粗末綿裹以乳汁浸之點眼效一方無朴硝治小兒暴赤眼澀痛點方甘蔗汁三合黃連末半兩上放銅器中以慢火熬煎令汁減半用綿濾每日三四度點之又方龍腦一錢川朴硝半兩上都研令細每用如緑豆大日三四度點之治小兒眼暴赤痛點眼方雞子一枚黃連末半兩上取雞子敲破頭作小竅子出黃取清調拌黃連末卻納雞子殼中以蠟紙封裹於青泥溝中浸三兩日不得令沒取出日三四度點之又方杏仁一分湯浸去皮尖龍腦三豆許大上先研杏仁後放龍腦同研如膏頻點少許目眥中瘥治小兒目暴赤熱毒腫痛方蕤仁一分去皮尖黃連末半兩上同研以綿裹納雞子白中浸一宿後和如膏如半小豆大點兩目眥良久用熱水洗之治小兒眼赤痛不能開方竹瀝三合人乳汁一合上相和以綿濾過時時拭眼中月內兒及三歲以下並宜用之牛黃膏治小兒肝臟風熱上攻於目疼痛不止牛黃一分川大黃一兩銼生用上先搗羅大黃為末以牛黃同研令勻用生地黃汁調如稀膏勻於紙上貼眼候乾時時以冷水潤之如頻開重換治小兒蓐內患赤眼或眥中延瞼赤爛至長大不瘥者名曰胎赤黃連一錢去須黃蘗上細銼以乳汁浸半日綿裹濾去滓頻點之一方用荊芥湯浸放溫時時洗之治小兒赤眼用黃連研為末調塗腳底心其赤自退又方余平生免赤眼之患用之如神大人小兒俱可用凡眼赤澀之初即用自己小便張目溺出一半可用指按抹眼中尿畢閉目少頃開後即效此以真氣通去邪熱故也鉛丹丸洗眼治小兒目暴赤痛用鉛丹一兩細研又白沙蜜調如稀糊同入銀器內攪勻炒候鉛丹紫色可丸即為丸如皂子大每用一丸沸湯化乘熱淋洗療小兒眼痛取淡竹瀝拭之又方取鯉魚膽敷之又方取車前草汁和竹瀝敷之療小兒蓐內赤眼方用生地黃薄切將井花水浸以貼之又方取羊子肝薄切用井花水浸以貼之又方取黃蘗以乳浸貼之治小兒赤目腫痛多淚一名清涼膏用芙蓉葉焙乾為末每用半錢水調太陽穴洗眼光明膏治冷熱諸風眼疾爐甘石用火煅十次每次卻用黃連水浸後方煅當歸一兩桑白皮龍膽草二兩七里光洗淨多為妙又名黃花演生地黃淨洗一兩國丹三錢飛乳香少許麝香少許上等件先用七里光龍膽草當歸生地黃四件以長流水三升熬至半升用綿絹濾過卻以蜜三兩亦用絹濾過慢火熬令成膏再入國丹等藥取出半冷乃放麝香少許攪勻加封裹埋新土中出火毒候三日始用至聖散治小兒眼赤爛黃連五個水洗干銅緑半兩研生白礬半兩研膩粉一錢麝香一錢研乳香一錢研上將黃連搗為末羅過衝入其餘五味拌勻每用少許湯泡澄下乘熱洗之主明目及治疳濕方搗牛膽䑋塊子服之彌佳
