body:
  text: 卷三百六十四嬰孩頭眼耳鼻門眼生翳膜附論夫眼是腑臟之精華肝之外候而肝氣通於眼也小兒臟腑積熱熏漬沖發於眼初目熱痛熱氣蘊積變生障翳熱氣輕者生白翳結聚小者如黍米大者如麻豆隨其輕重翳生重者乃至兩三翳也若生翳而白障者是病重極偏覆熏睛滿目悉白則失明也其障或有輕黑睛邊微有白膜來侵黑睛漸染散漫若不早治則滿眼並生白障又眼翳暈者五臟煩壅攻於肝也或者內傷於風熱赤澀盈或腦熱下流或癍瘡入眼侵黑睛者是也方車前子湯治小兒肝熱眼生翳膜或生血輪腫脹車前子防風去叉甘菊花甘草炙人參菥蓂子青葙子各三分梔子仁黃連去須各半兩上為末每服一錢水一盞加淡竹葉煎服日三次決明丸治小兒肝臟壅熱眼生翳障決明子車前子菊花川芎川連當歸大黃紫參各等分上為末煉蜜丸如小豆大三歲三十丸燈心湯下食後服一方煎桑枝麥門冬湯熟水亦可以意加減服之蕤仁丸治小兒熱盛翳膜侵睛兼赤眼疼痛並眼生赤翳蕤仁湯浸去皮搗一兩半兔肝一具炙梔子仁黃芩去黑心黃連去須各半兩升麻決明子各三分細辛去苗葉一分上為末煉蜜丸如緑豆大每服三丸至五丸溫水下早晨日晚各一服更隨兒大小加減一方無黃芩有羚羊角屑名兔肝丸龍腦飲治小兒肝受病目昏漸生翳膜散漫侵睛因此失明須內外治之龍腦鉤藤土瓜根茯神去皮各半兩甘草炙桑根白皮炙防風去叉各一分上粗搗篩每一錢水一盞入棗半枚同煎至六分去滓分作二服量兒大小加減早晚服鎖肝散治小兒痰熱退翳膜一名鎮肝散胡黃連梔子仁各一兩甘草炙馬牙硝青葙子各半兩以上各為細末次入真珠牛黃並研各一分上都拌勻細研每服一錢水八分荊芥薄荷各少許煎至四分去滓食後溫服旋覆花散出聖惠方治小兒從下生赤膜上幔黑睛旋覆花桑根白皮銼羚羊角屑赤芍藥玄參以上各一分甘草半分炙微赤銼黃連半分去須上搗為散每服一錢水一小盞入竹葉七片煎至五分去滓日三四次溫服量兒大小加減真珠膏出聖惠方治小兒熱風眼生翳膜真珠末龍腦蕤仁湯浸去皮膩粉朴硝青鹽硃砂以上各一分上研如粉酥和如膏每點如黍米大日三四度點之蕤仁煎點方出聖惠方治小兒眼生翳膜瞳人昏昧蕤仁一分湯浸去皮黃丹半分井鹽半分黃連末一兩龍腦半錢麝香一錢蜜五兩上除麝香龍腦蜜外先將蕤仁等都研細以水一大盞入蜜同煎令稀調得所用新綿濾去滓入麝香龍腦末調勻入瓷器中盛每用銅箸點少許日兩度神效羌菊散出全嬰方治小兒肝臟壅熱眼生白翳及治赤眼癍瘡毒羌活防風山梔子各一兩甘草菊花白蒺藜炒去皮各半兩上為末每服半錢蜜湯調下食後服日三次大小以意加減通神散治小兒癍疹毒氣入眼雲翳失明石決明燒粉一分硼砂一錢粉霜一錢片腦一字硃砂半錢上研勻每用一次乳汁調隨左右耳灌之日三次黃芩湯出聖惠方治小兒五歲以下肝臟熱毒目生丁翳黃芩去黑心升麻甘草炙銼各半兩萎蕤玄參犀角上各一分上粗搗篩每一錢水七分煎至四分去滓分溫二服量兒大小加減日三四服黃芩散出聖惠方治小兒眼生翳膜體熱心煩黃芩決明子防風去蘆頭川升麻川大黃銼微炒甘草炙微赤銼以上各等分上搗為散每服一錢水一小盞入淡竹葉七片煎至四分去滓溫服日三四服量兒大小加減羖羊角散出聖惠方治小兒眼生白翳羖羊角屑川大黃銼微炒桑根白皮銼真珠末甘菊花以上各一分甘草半分炙微赤銼上羅為散每服溫水調下半錢日三四服量兒大小加減苦竹葉散出聖惠方治小兒眼生翳膜下垂苦竹葉半兩知母川升麻川大黃銼微炒甘草炙微赤銼梔子仁以上各一分上為細末三五歲者每日食後溫淡漿水調下半錢稍大以意加之龍腦膏出聖惠方治小兒眼赤生翳膜龍腦細研麝香細研膩粉蕤仁湯浸去皮黃連去須以上各半分馬牙硝半兩上搗為散都研令勻用白蜜四兩同放瓷瓶中蜜封投於炊飯甑內蒸飯熟為度每日三四度以箸子取少許點之蟬青煮肝散治小兒疳氣癍疹云昏翳膜一切病眼穀精草去土蟬殼去咀角土定粉蛇蛻皮長二尺石決明各等分上為細末每服二錢豬肝二兩竹刀批開摻藥了卷麻扎定米泔煮熟分三五次熟鹽細嚼煮肝湯送下如瀉加定粉半兩決明子散治小兒眼赤或生翳膜或眼常合不開決明子車前子梔子仁防風去叉黃連去須各一兩上為散每服一錢至半錢搗生豬肝投熱湯取汁調下晨早日晚各一服更量兒大小加減青葙子丸出聖惠方治小兒眼有翳膜遮睛青葙子蚺蛇膽熊膽馬牙硝各半兩龍腦半錢上搗為末煉蜜丸如緑豆大每服以溫水研化五丸日三四服量兒大小加減石決明散治小兒眼生翳膜石決明搗研令細一分龍腦半錢膩粉黃丹各一錢麝香半錢上同研極細每於臥時取少許點之還明丸出全嬰方治小兒疳眼白膜遮睛並雀目夜明沙井泉石穀精草蛤粉各等分上為末煎黃蠟煉丸如雞頭大三歲一丸豬肝一片切開放藥在內麻扎定沙瓶內煮熟先熏眼後食之煮肝散治小兒疳眼翳膜乾澀黃連去須沙參玄精石決明子上等分搗羅為散每半錢用羊子肝一片篦子切作縫子摻末在內線系入沙罐子內垂掛勿令到底以米泔煮熟食羊肝每一片分作兩服或三服量兒大小與食真珠膏出醫方妙選治小兒眼久不瘥茫茫不見物真珠末甘菊花末香豉炒研末井泉石各一分上研勻用白蜜一合鯉魚膽一枚同煎藥以慢火熬成膏次放好龍膽一錢拌勻每用少許時時點眼中治小兒眼生障翳及努肉此方點用出聖惠方龍腦珊瑚真珠末石決明以上各一分上研如粉以白蜜一合相和更研令勻用瓷器盛不計時候頻與點之即瘥治小兒眼生翳膜出經驗良方白菊花穀精草緑豆皮各等分上為細末用豬肝擂細為丸如菜子大每服三五十丸茶清送下或豬肝蘸藥喂之惡實散治小兒風翳散漫侵瞳人及風疳眼惡實木通銼蒺藜子炒去角各一兩上為散每服半錢以水搗羊子肝汁調早晨日晚各一服更量兒大小加減治小兒眼生黑翳覆瞳子方出聖惠方空青一分貝齒一枚白礬一錢上研令細取如黍米大點翳上日再點之治小兒出痘疹眼內有云翳方輕粉黃丹各等分上用竹筒吹在耳內左眼有翳吹右耳內右眼有翳吹左耳內即退至妙立消膏出活幼口議治小兒眼患初作粟翳浮翳或來或去漸發差大侵睛減明用雪白食鹽生其少許須用淨器以大燈心點鹽輕手指定浮翳就點凡三五次點見效令子勿驚恐不疼痛亦不礙人多投之勿慮屢用克效珊瑚散出聖惠方治七八歲小兒眼有白翳未堅不可妄敷藥用珊瑚細研如粉每日少許點之日三次立愈治小兒目睛上白膜出直指方用白礬一分水四合熟銅器中煎取半合白蜜少許調之以綿濾過每日三度點一芥子大貝齒龍腦方出聖惠方治小兒目花眼翳澀痛用貝齒一兩燒作灰研如面入龍腦少許點之又去目翳貝齒十枚燒灰細研取一胡豆大著上眼胞點之至良久乃減息肉者加真珠與貝齒等又一方單用具齒研如粉點眼赤及翳治小兒眼生白膜方出聖惠方用雄雀糞以人乳熟研敷翳上當漸漸消除又方出聖惠方治小兒眼有障翳用瑪瑙半兩細研如粉每用時取如黍米大點在翳上又方出聖惠方用楸葉三兩嫩者爛搗以紙裹更將泥重包著猛火燒之候泥干即取去泥放水少許絞取汁以銅器盛慢火漸漸熬之令如稀餳即貯於瓷盒中每日點一度點如緑豆大又方用書中白魚為末點少許翳上即愈又方用露蜂房一兩以水二盞煮至五七沸去滓溫溫洗之立瘥洗肝散治眼生翳膜視物難明或尋常赤痛人參一錢荊芥穗半錢生地黃一錢酒浸當歸一錢甘草二錢赤芍藥一錢大黃半錢煨茯神一錢大澤草半錢上為末每服半錢清米泔調下蒲黃散治小兒肝熱上攻眼生翳膜蒲黃一分黃連白芨各半兩黃蘗去粗皮二錢赤小豆一兩上等件同為細末每用一錢井花水調作膏子封貼囟上日一易之煮肝散治小兒肝眼翳膜羞明不見物服十日必退效如大人雀目只一服效夜明沙青蛤粉穀精草各一兩上等件為末每服一錢五七歲以上二錢㹠豬肝一匙大批開摻藥在內攤勻麻纏定淘米泔水半碗煮肝熟取出肝湯傾碗內熏眼後湯溫分肝三服嚼吃並用肝湯下一日三服不拘時候大人雀目空心服至十服便見物如患多時日三服治斑後小兒眼有翳膜煎竹葉湯同沙糖化下瀉青丸一兩丸漸至微痢為效目偏視通睛附論夫目偏視者皆由肝臟風邪所攻瞳人不正顧視常偏宜服羚羊角散牛黃散治之小兒通睛外障者此眼初患之時皆因失誤築打著頭面額角到足撲下令小兒肝受驚風遂使眼目通睛宜服牛黃丸犀角飲子通頂石南散立效歌曰嬰兒兩目患睛通欲擬看西又著東振著腦中睛帶轉肝中受得內驚風牛黃犀角頻研灌細搗石南吹鼻中乳母牽連須忌口數朝方得舊時容方羚羊角散治眼風邪所攻瞳人不正顧視常偏羚羊角屑一兩犀角屑密蒙花各一兩龍腦研牛黃各一分研天竺黃研甘草炙微赤硃砂研各半兩防風人參沙參各去蘆赤芍藥甘菊花細辛酸棗仁微炒蔓荊子蕤仁去皮湯浸玄參各二兩上為散入研了藥更研令勻每於食後以竹瀝湯調下二錢牛黃散治肝臟風熱攻眼偏視宜服之牛黃一錢細研人參防風各去蘆犀角屑甘菊花天麻槐子芎藭車前子決明子蔓荊子黃耆銼各半兩硃砂一分細研龍腦一錢研甘草一分炙赤羚羊角屑上為末入研了藥同研令勻每於食後以竹葉湯調下一錢臨臥再服牛黃丸牛黃白附子泡肉桂全蠍芎藭石膏各一分燒通赤白芷藿香各半兩硃砂二錢麝香一分上為末煉蜜丸如芡實大三歲以下每服一丸薄荷湯化下乳食後服乳母忌酒面豬肉犀角飲子犀角一兩射干草龍膽各半兩鉤藤三分黃芩五分人參二兩茯苓甘草各一分遠志上為末以水一盞散一錢煎至五分去滓食後溫服牛黃膏治嬰兒雙眼睛通者欲觀東邊則見西若振掉頭腦則睛方轉此肝受驚風宜服牛黃一錢犀角二錢金銀箔各五片甘草一分上為末煉蜜丸緑豆子大每服七丸用薄荷湯吞下食後服通頂石南散石南一兩藜蘆黃三分瓜蒂五七個上為細末每用一錢粳米少許一日兩度通頂為妙眼瞼生贅附論夫小兒瞼中生贅外障此眼初患之時皆因脾胃壅熱上衝於眼瞼之中致令生肉初時即小如麻米後三五年間如豆大厚隱瞳人赤澀淚出切莫鉤割散去瘀血後乃尉烙即效宜服搜胃散補肝丸點曾青膏即瘥歌曰小兒眼瞼贅雖稀學療之流也要知初即小如麻粒大日深漸長豆珠垂亦須割烙流瘀血斟量湯藥在臨時若逢富貴嬌兒女點藥還須得妙奇方搜胃散大黃桔梗黑參防風車前子細辛芒硝黃芩各等分上為末以水一盞散一錢煎至五分食後去滓溫服補肝丸芎藭藁本五味子細辛各一兩羌活一兩半茺蔚子二兩知母上為末煉蜜丸如梧桐子大空心茶下十丸曾青膏曾青一兩龍腦少許乳香頭硃砂琥珀真珠各一分上研如面用酥相和為膏每至夜點眼青盲外障附論夫眼無障翳而不見物者謂之青盲此由小兒臟內有停飲而無熱但有飲水停積肝也目是五臟之精華肝之外候也肝氣通於目肝為停飲所積臟氣不宣通精華不明審故不赤痛亦無翳而不見物名曰青盲也小兒青盲外障此眼初患之時於母胎中忽受驚邪之氣令生後五七歲以來便乃患眼其初患之時夜臥多驚嘔吐痰涎黃汁漸漸失明還從一眼先患後乃相牽俱損致使然也初覺便宜將息急療服牛黃丸犀角飲子立效歌曰胎中受得風邪氣五臟相連各有名天吊只因心領得目盲肝細是前成痰涎嘔吐黃汁甚神彩時時忘與驚兩眼若能救見物服藥良醫始見能方牛黃丸牛黃牛膽鉤藤各半兩羚羊角藿香人參麝香各一兩虎睛少許上為末煉蜜丸如梧桐子大空心薄荷湯下三丸七歲以上五丸犀角子飲出龍木論犀角防風芍藥黃芩各一兩羚羊角知母人參半兩上為末以水一盞散一錢煎至五分食後去滓溫服羊子肝散出聖惠方治小兒青盲不見物蕤仁一分湯浸去皮防風一分去蘆頭香豉一分炒黃井泉石半兩細研上搗為散用羊子肝一片並藥同煎肝令爛四五歲兒分二服新汲水下甚者不過三四服隨兒大小加減菊花散治小兒青盲外及雀目甘菊花一分牯牛膽一枚陰乾寒水石一分雌雞肝一枚陰乾上搗為散取豬肝血調下半錢不過三五服驗兼退翳治小兒青盲茫茫不見物方出聖惠方真珠半兩研如粉白蜜一合鯉魚膽一枚上相和煎一兩沸候冷點眼中當淚出藥歇即效治小兒青盲不見物方出聖惠方鼠膽鯉魚膽各二枚取汁上相和點眼用之立效治小兒青盲腦痛方出聖惠方鯉魚腦鯉魚膽各等分上相和令勻點眥中日三四度神效又方出聖惠方用豬膽一枚微火上煎之良久候冷點如黍米大效疳眼外障附論夫小兒疳眼外障此眼初患之時皆因腦熱頭上有瘡或因雀目多時瀉痢潛沖疼痛淚出難開膈間熱氣肝風入眼初患時時癢澀撏眉咬甲揉鼻致令翳生赤腫疼痛淚出難開生硬白膜遮滿怕日合面而臥不喜抬頭此疾不宜燒灸頭面恐損眼也尤忌點眼即宜服然風散退翳丸立效歌曰小兒疳眼有自來腦熱肝風變禍災或因瀉痢前衝上雀目多時亦是媒初患之時饒癢澀病深生翳腫難開手撏頭髮兼揉鼻怕見光明頭不抬拙計便將頭面灸相遭疼痛實堪哀庸醫不解輕輕點疼看瘡痕痛不才欲得痊瘥求合道服藥如風捲霧開方生乾地黃湯治小兒疳蝕眼患閉合不開羞明怕日及至開眼有如內障朦朦失所宜服生乾地黃熟乾地黃各一兩洗麥門冬去心半兩川當歸一分枳殼米泔浸一宿麵炒稱一分杏仁湯泡去皮尖麵炒令赤防風甘草炙赤芍藥各一分上㕮咀每一大錢水一小盞黑豆七粒煎黑豆熟去滓通口服一方無黑豆退翳丸出龍木論黑參防風人參茯苓細辛桔梗車前子黃芩石決明各一兩半上為末煉蜜丸如梧桐子大空心茶下十丸煞風散出龍木論防風龍腦牡蠣各二兩白芷五味子細辛各一兩上為細末每日食前米飲調下一錢如聖散方出王氏博濟方治小兒因瀉痢日久眼生翳膜並疳眼退翳蛇蛻兩條用紙燭燒灰研穀精草一兩蟬蛻去土一分附子去皮臍生二錢石決明刷淨一分胡粉研四錢上為散每服一字半羊子肝一片批破摻末用麻皮線纏米泔煮熟先熏眼後與食量兒大小加減如末明食研灌之井泉石散出醫方妙選治眼疳邪熱攻於眼目漸生障翳致損睛瞳井泉石一兩石決明半兩甘菊花半兩夜明沙半兩微炒黃連半兩去須晚蠶沙半兩微炒上為細末每服一錢用米泔一盞入生豬肝少許煎至五分肝爛為度放溫乳食後時時服二草散治小兒疳眼睛疼病赤眼腫痛甘草龍膽草當歸細辛各一分上為末每服一錢水半盞沙糖少許煎至三分去滓食後服三黃丸亦治疳熱眼若因瀉痢後疳昏澀大便不實者六神丸六甲丸並暖疳藥亦可服之撥雲膏治小兒風熱疳氣攻眼赤痛障翳桃仁杏仁各四枚並去皮尖雙仁蕤仁郁李仁各五枚去皮上同生研細濾入蜜麝香膩粉各少許再研極勻點之雞肝散治小兒疳目見明不得不赤不腫不痛但開眼不得者此藥能治之川烏頭大者一枚生去皮好坯子二字上為末每服一錢雄雞肝一具淨洗去筋膜竹刀子薄切開摻藥在內箬葉裹麻皮扎定浸水二次米泔半盞瓷器中煮熟放冷切作片子空心臨臥嚼吃將煮肝湯送下又有腦熱閉目者鼻內乾燥通頂散可服神光湯治小兒熱膈疳熱閉目不開並腦疼以川大黃一分粗末水半盞浸一宿一歲分作兩服余滓塗頂上干易之通頂散亦可治癍瘡入眼外障附論夫小兒癍瘡入眼外障此眼初患之時不論大小須患癍瘡一度瘡子患時覺入眼中即須將息慎忌若不忌口將息即便疼痛睛赤出淚怕日難開腫硬翳如銀色此為熱氣在肝上衝於眼肝膈壅毒致成障翳宜用秦皮湯洗之然後服涼丸亦不宜鐮洗出血點藥挑撥恐損眼候疼痛定後即點退赤藥歌曰夫為人子既生身須患癍瘡不可論熱氣透肝衝上眼難開腫痛且羞明時疼淚出赤如銀不要強將兩手親卻恐叫啼傷破後須知此語是殷勤秦皮煎水頻頻洗眼藥應教微食旬謹省若能依得此遺君終老是全人方涼肝丸防風一兩黃芩茺蔚子黑參大黃知母各一兩人參茯苓各一兩半上為末煉蜜丸如梧桐子大空心茶下十丸秦皮湯秦皮二兩秦艽細辛防風各一兩甘草半兩上為末以水一盞散一錢煎三五沸熱淋洗眼立效鱔血方治小兒痘瘡入眼生翳用鱔魚系其尾而垂之從頂下割破些少取生血點有白鱔尤佳若翳已凝即用南硼沙以燈心蘸點仍用威靈仙仙靈脾洗曬等為末每一錢第二次米泔調服消翳丸治小兒癍瘡眼生障翳硃砂指甲末不拘男子婦人先入水內淨洗指甲拭乾用木賊草打取細末上件等分再同研令極細以露水搜和丸如芥子大每用一粒於夜臥時以新筆蘸水點在眼內夜半更點一粒緣目生瘡附論夫小兒緣目生瘡者由風邪客於瞼眥之間與血氣相搏挾熱則生瘡浸漬緣目赤而有汗時瘥時發世云小兒初生之時浴而不淨使露穢浸漬瞼眥後遇風邪發則目赤爛生瘡難瘥瘥後還發成疹也方犀角散治小兒赤眼疼痛緣目生瘡難開澀痛及有熱淚犀角屑羚羊角屑防風去蘆頭玄參黃芩黃耆銼以上各一分柴胡半兩去苗川大黃半兩銼微炒馬牙硝半兩上搗為散每服一錢水一小盞煎至五分去滓溫服日三四服量兒大小增減黃連散治小兒肝熱沖眼緣目生瘡黃連半兩去須赤芍藥蕤仁湯浸去皮木通銼決明子梔子仁黃芩甘草炙微赤銼以上各一分上搗為散每服一錢水一小盞入竹葉七片煎至五分去溫日三四服量兒大小加減細辛丸治小兒緣目生赤瘡及生翳細辛黃連去須蘆薈桑根白皮銼甜葶藶隔紙炒令紫色以上各一分蕤仁半兩湯浸去皮龍腦半錢細研上羅為末煉蜜丸如緑豆大每服以溫水下七丸日三服三歲以上即服五丸白礬煎治小兒緣目及眥爛作瘡腫痛白礬一分燒為灰黃連半兩去須青錢十文防風三分去蘆頭朴硝三分地黃汁一合白蜜三合上搗為散用綿裹納一青竹筒中入地黃汁及蜜以絹油單蓋緊系筒口於炊飯內蒸之候飯熟即瀉出以綿濾過日三四度取少許塗之黃連丸治小兒緣目及眥爛作瘡黃連半兩去須川大黃銼微炒細辛龍膽去蘆頭防風去蘆頭玄參以上各一分上羅為末煉蜜丸如緑豆大每服以熟水下五丸日三次量兒大小加減龍腦煎治小兒風熱致緣目生瘡赤痛龍腦半錢川芒硝一分膩粉半分蜜三兩黃丹一分上同入筒內以重湯煮一日用綿濾過放瓷瓶內盛每日三四度點之黃連煎治小兒眼赤痛及緣目生瘡黃連半兩去須童子蛔蟲五條吐出者龍腦半錢細研白蜜二兩上除龍腦外入在瓷瓶中放炊飲中蒸候飯熟為度乃濾去淬取汁入龍腦令勻日三四度點之梨汁煎治小兒熱毒沖眼緣目生瘡熱痛不止大鵝梨一枚去皮核黃連末二錢龍腦一錢上先將梨爛研絞取汁綿裹黃連末於梨汁內浸半日入龍腦令勻日三五度點之豬膽煎治小兒緣目生瘡腫痛豬膽一枚龍腦一錢馬牙硝半錢上研令勻納豬膽中牢系懸於旺方陰乾取出納瓷盒中每以麻子少許水化日三四上點之又方黃連半兩去須杏仁一分湯浸去皮尖細研膩粉半錢上以綿裹冷水一小盞浸一宿後每日三五上點之又方黃蘗黃連去須梔子仁各半兩上細銼以水一大碗青鹽一分煎十餘沸綿濾過溫溫洗之日三兩度用之治小兒緣目眥爛作瘡方青錢二十文青鹽一兩上相和先以濕紙數重包又用泥裹候乾於猛火中燒令赤放冷剝去泥紙搗羅為散每取一緑豆許以津調塗瘡上車前子丸治小兒肝臟壅熱眼生瘡翳車前子甘菊花芎藭黃連去須當歸切焙各一分大黃溫紙裹煨黃芩去黑心各半分上為末煉蜜丸如緑豆大每服五七丸量兒大小加減煎桑枝湯下耳疾總論夫耳者宗脈之所聚腎氣之所通小兒腎臟盛而有熱氣上衝於耳津液壅結則生膿汁亦有因沐浴水入耳內水濕停積搏於血氣蘊結成熱亦令耳膿汁出皆謂之聤耳久不瘥則變成聾也聤耳者常有黃膿出是也膿耳者常有紅膿出是也伍耳者裡面疳息是也纏耳者常有白膿出是也囊耳者裡面虛明時有青膿出是也雖有五般其病源一也皆由風水入耳而內有積熱上壅而成此患若不速治久則成聾聤耳者小兒胎氣不充實關竅不通利蓋有稟賦不足胞養有虧臟傷腎經腎為根本水之一數也外應耳孔或云水入耳或曰乳食入耳要之皆非兒生氣脈根壯臟腑固實雖水及乳入耳必不如此自是氣不充脈不實使之然也兒無補腎之方但得清心肺而已初生之兒而有作由甚重也卒難療理用藥敷摻少愈愈而復發至於過周與服黃耆白茯苓人參白芍藥川當歸熟地黃甘草等分作湯劑以固其內內若固實不必摻敷亦自瘥愈摻方用壁上蜘蛛一枚瓦上火干坯子白礬腦子麝香各少許同研令勻雞羽引入自愈耳聾附論夫小兒耳聾者是風入頭腦所為手太陽之經入於耳內頭腦有風邪氣氣入其脈盛與氣相搏風邪停積則令耳聾也方通鳴散治小兒耳聾病菖蒲一寸九節者遠志去心各一兩柴胡去苗麥門冬去心防風去蘆頭半兩細辛一錢甜葶藶一錢磁石搗為末水淘去赤汁研杏仁十四個浸去皮尖上為細末研令勻每服半錢蔥白湯調下日二次食後服量兒大小加減細辛膏治小兒耳聾或因腦熱或因水入或因吹著細辛防風川大黃銼微炒黃芩以上各一分川椒十粒去目蠟半兩上藥銼用清麻油三合煎至紫色濾過下藥候消為膏每日三度用一大豆大點於耳中治小兒風熱兩耳聾鳴方遠志去心菖蒲柴胡甘草炙微赤銼以上各半兩磁石三分搗碎水淘去赤汁麥門冬半兩去心焙上羅為散每服以蔥白湯調下半錢日二服量兒大小加減治小兒耳聾不瘥方生地黃一寸半杏仁二枚湯浸去皮巴豆七枚去皮青鹽半錢上共同搗堪丸即丸如蕤核大用發薄裹納耳中日一易之若耳內痛有水出即去藥未效再用之又方杏仁湯浸去皮甜葶藶青鹽各等分上研如膏用少許豬脂和合煎令稠以綿裹如蕤核大塞耳中日一易之又方萆麻子一枚去皮棗肉七枚上搗如膏母取蕤核大綿裹納於耳中日一易之又方取蔥白放灶灰中煨令熟以蔥白頭納耳中日三易之又方搗芥子令爛以人乳和綿裹少許塞耳中日一易之又方松脂菖蒲末烏油麻各半兩上相和搗熟綿裹如豇豆大塞入耳中日一易之又方菖蒲末一分杏仁半兩湯浸去皮尖雙仁研如泥上相和搗每用少許綿裹納於耳中日一易之治小兒耳聾立效方取自死白頸地龍納蔥葉中麵裹蒸令熟以汁瀝著耳中不過三度瘥聤耳附論夫耳者宗脈之所聚腎氣之所通小兒腎臟盛而有熱氣上衝於耳津液壅結則生膿汁亦有因沐浴水入耳內水濕停積搏於血氣蘊結成熱致令膿汁出皆謂之聤耳久不瘥則變成聾也方紅藍花散治小兒聤耳病不瘥紅藍花洗黃蘗各一兩烏魚骨黃芩各半兩雄黃研細半兩麝香一分研上研細以綿纏搵藥塞耳中日再換黃連散治小兒聤耳久不瘥黃連去