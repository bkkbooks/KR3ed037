腦液下通於鼻故也方前胡橘皮湯治小兒肺傷冷鼻流濁涕前胡去蘆頭陳橘皮湯浸去白各半兩白茯苓去黑皮桂去粗皮白朮人參細辛去苗葉甘草炙各一分上粗搗篩每服一錢水一盞煎至五分去滓溫服日三次隨兒大小加減防風湯治小兒腦戶傷風冷鼻多濁涕精神昏悶一名甘菊花散防風去叉甘菊花擇白朮人參細辛去苗葉白茯苓去黑皮甘草炙銼各一分上粗搗篩每服一錢水一盞入生薑少許同煎至五分去滓溫服不拘時候量兒大小加減菊花散治小兒鼻塞多涕等病甘菊防風前胡各一兩細辛桂心各半兩甘草一分上為細末每半錢研入乳香少許煎荊芥湯調下乳後服人參散治小兒肺塞鼻多清涕精神不爽少欲乳食人參去苗頭前胡去苗頭杏仁湯浸去皮尖雙仁麵炒微黃桂心甘草炙微赤銼以上各一分上搗為散每一錢水一小盞入生薑少許棗二枚煎至五分去滓不拘時候量兒大小加減溫服甘菊花湯治小兒鼻多濁涕是腦門為風冷所乘甘菊花擇甘草炙各一分防風去叉半兩山萸肉七枚上粗搗篩每服一錢水一盞煎至六分去滓分溫三服早晨日午時後各一服更量兒大小加減杏仁膏治小兒鼻塞多涕杏仁湯浸去皮尖雙仁炒半兩蜀椒去目並閉口者炒出汗附子泡裂去皮臍細辛去苗葉各一兩上除蜀椒外銼如麻豆大以醋五合漬藥一宿明旦以豬脂半斤與藥相和入銚子內慢火同熬候附子黃成膏去滓取出貯瓷器內候冷取塗鼻中兼摩頂上日三五度細辛膏塗方治小兒風冷傷囟鼻塞不通多涕細辛末一兩麻油二合上以油煎細辛令微黑入蠟半兩候消令凝每日薄塗囟上日三易鼻疳瘡方涼膈飲子治䘌鼻清肺一名清肺飲子桑白皮地骨皮黃芩生乾地黃各等分上㕮咀水煎去滓食後量兒大小加減服石膽散治鼻乾病疳蟲上蝕於鼻赤癢及連唇生瘡赤爛石膽一兩頭髮燒灰細研莨菪子半兩生用地龍一分洗淨上為細末入麝香一錢同研勻每用一字貼於瘡上二黃散治小兒腦冷漿水溜下從口鼻出氣息甚惡久不瘥能害命大人同治仙方也硫黃好的黃丹炒香白芷上等分為末用少許吹鼻內三五次即瘥治鼻疳先用甘草白礬水洗淨後摻蘆薈黃連黃蘗末日三上治小兒鼻下兩道赤者名曰䘌赤亦名赤鼻疳上以泔水洗敷黃連末日三度佳亦治月蝕瘡治小兒鼻下瘡用牛草卷燒之為屑敷之一方治腦疳鼻癢毛髮作穗肌肉羸瘦用鯽魚膽滴於鼻中連用三五日甚妙一方治疳瘡蟲蝕鼻中用熊膽水調化塗鼻中斂瘡方如先敷前藥已多方用此敷乃驗青黛末當歸赤小豆瓜蒂地榆黃連蘆薈各等分上為末入雄黃末敷之化毒丸治鼻䘌玄參一兩桔梗一兩赤伏苓一分人參一分牙硝一分青黛一分甘草一分麝香一字金銀箔一分上等件除牙硝金銀箔麝香別研外為末次和青黛煉蜜丸如芡實大薄荷湯化下麝香散治鼻瘡疳侵蝕鼻柱麝香草烏頭燒灰上等分研細貼之
