丸如小豆大金錢薄荷湯下參苓散治患驚風傷寒咳嗽身熱胸膈下不快睡臥不安鎮心化痰涎或疹痘不能勻遍並宜服之人參一錢茯神一錢麻黃去節半兩白朮二錢乾葛一錢半白芍藥一錢升麻一錢甘草二錢上為末每服半錢水五分盞薄荷一葉同煮三分服如熱盛再與青金丹桃柳條七寸煮湯下微利相間服蠍尾散治小兒急驚風神效蠍尾二七枚生用白附子二七枚生用黑鉛一錢水銀一錢二味同結沙子附子尖二七枚生用半夏七枚湯洗去滑天南星底一七枚生用烏頭尖一七枚去皮用生上件藥搗細羅為散每服以薄荷湯調下半字若兒在百日內者一字可分為四服如要作丸即以棗肉和丸如緑豆大以馬藺草湯一丸臨時更量兒加減五福丸治急驚風生蚯蚓一條研爛入五福化毒丹一丸再研如泥煎薄荷湯少許調化旋灌量兒大小加減服之無不效者梁國材云揚州進士李彥直家專貨此藥一服千金以糊十口梁大有恩於李故得是方親試屢效不可不筆於册以救嬰孩麝犀膏治小兒壯熱涎盛恍惚不安夜臥強語咬牙弄舌急驚發目睛直視牙關緊急手足驚掣項背強直精神昏亂天竺黃白附子微炮鬱金人參去蘆頭四味各一分真珠末犀角膏各一錢牛黃別研硃砂各半分麝香別研龍腦別研二味各一錢金箔銀箔各十片上件為細末次入硃砂腦麝金銀箔同研令勻煉蜜為丸每一兩作四十丸每服一丸煎薄荷湯化下食後臨臥青餅子治小兒內積實熱外冒風邪遂作急驚遍身壯熱筋脈抽掣涎潮壅盛目睛上視牙關緊急大小便祕棘剛子十四枚去殼取蟲子微炒青黛另研滑石研荊芥穗五味各五分上件為細末水和令勻丸如梧桐子大捏作餅子青黛為衣每服一餅子煎薄荷湯化下不拘時候至寶散治小兒氣血不和素有實熱復因外受風邪遂致急驚涎盛目睛直身熱瘛瘲大便多祕解潮搐清神志虎睛一對酒浸微炒牛黃別研鐵粉別研犀角屑細研白附子細研天竺黃人參去尾蘆頭各二錢半青黛細研硃砂別研大黃三味各半兩細松煙墨一兩燒煙盡地上去火毒龍腦一錢別研麝香一分別研上件為細末次入研諸藥和勻如半歲兒每服一字周歲兒半錢煎蔥白薄荷湯調下或涎盛喉咽腫痛更加細研龍腦半錢煎薄荷湯調下不計時候奪命散治小兒急驚風搐又治肺脹喘胸膈氣急出入兩脅扇動陷下作坑病甚者兩鼻竅張抬肩悶亂煩渴咳嗽聲嗄不鳴痰涎潮塞睡臥不穩死在朝夕世俗不識若作咽喉風或作馬脾風治之誤矣切忌不得於胸腹上灸之反為禍矣慎宜戒之
