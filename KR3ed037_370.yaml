研入蛜𧌴一分烏蛇肉半兩上並生搗羅為末用酒薄荷汁各半盞同煎為膏和丸如緑豆大不計時候以溫酒送下三丸看兒大小加減服之巨聖散治小兒急驚手足瘛瘲咽膈涎盛大黃乳香研各二錢麝香研半錢七丹砂研一錢七膩粉二錢細研雄黃研半錢蠍梢炒白附子炮各一錢上搗研為細散每服一字或半錢薄荷湯下更量兒大小加減服之牛黃丸治小兒急驚化涎鎮心牛黃研蛜𧌴微炒天南星炮搗膩粉研半夏湯洗七次焙麝香細研各一分天漿子三七枚丹砂研半兩上為末燒粟米飯和丸如黍米大每服三丸至五丸荊芥湯下不計時候量兒大小以意加減服之天漿子丸一名鶴壽丹治小兒急驚風虎蠍丸治急驚上視搐搦胎風涎潮虎睛一對酒炙全蠍炒天麻防風南星煨白殭蠶炒烏蛇酒浸焙各一分麝香一錢上為末麵糊和丸如桐子大每服一丸薄荷湯調下珍珠天麻丸治急驚風痰熱壅盛當量用之以通為度仍治吊腸鎖肚撮口至效丸如麻子大初生三日三丸五丸五日七日七丸加青黛名青黛丸天南星炮天麻白附子炮各一錢膩粉半錢重巴霜一字蕪荑炮炒全蠍滑石各一錢半上為末水煮細麵糊為丸如緑豆大每服一歲五丸二歲十丸大小加減薄荷湯點茶送下此方乃下驚風又去痰熱先服截風定搐次與下之切不可以多利之但通為量宜詢問前未曾下惟恐病家不曉此理遂致疏失若初醫在我則當循證截風定搐或珠蠍散尚有疾熱宜與下之免作風候且小兒被驚發風胡不知有熱在臟若知有熱在臟甚勿驚著蓋熱盛即心氣虛一驚觸心心氣迸散所以面青唇白良久驚風氣卻收其或肝虛入肝肺虛入肺五臟六腑皆由虛處其驚氣自然投入因而成病前歌亦載然急驚之急痰熱相觸觸亂神情氣脈互馳經絡乘熱熱即生風風熱不散筋吊脈縮或搐或搦或掣或引各於輕重而然善醫者截風之搐有熱與痰隨而下之其搐搦自定拳攣自舒吊縮自寬風熱自散何患氣不蘇省神不和暢牛黃散治嬰孩小兒急驚風腳手搐動八候俱作全蠍六個炒巴霜一字輕粉半錢雄黃三錢硃砂一錢川鬱金一分皂角水煮熱焙乾再炒麝香腦子各一字上為末和勻每服一次半錢煎金錢薄荷湯調下此方醫急驚風至良但審輕重投劑一服減瘥此非常服亦非調理之餌正值關竅閉塞痰涎壅塞或氣不宣通經絡不順心神悶亂者服頓蘇或自通利或已取利不宜與服反成滌蕩矣療急驚風痰壅並宜其通下痰涎既下即便助胃觀音全蠍散速用連服未藥之前不可躊躇稍定之後不可荒略若審察其候痰涎復作豈可更下須於慢證候理之病家意急慌用他藥或便投藥參差誤矣龍腦水銀丸治小兒急驚並宣轉風熱龍腦研麝香研各一錢豬牙皂角炙甘遂各一錢膩粉研一錢青黛研水銀結沙子各二錢巴豆去皮心膜研七粒不出油上為末麵糊丸如麻子大一歲一丸更量病緊慢及兒大小加減用薄荷湯下天南星丸治小兒急驚痰涎壅毒壯熱腹脹天南星炮製硃砂細研水銀以小棗肉研令星盡各一分金箔二七片細研銀箔二七片細研麝香二錢細研巴豆二枚去皮心研紙裹壓去油上搗羅天南星為末共研令勻煉蜜丸如黍米大一歲兒每服以溫暖水下一丸取下惡物為效二歲以上加丸服之蠍尾散治小兒急驚風神效蠍尾二十一枚生用白附子二七枚生用尖膩粉一錢研入附子尖二七枚星用半夏七枚湯洗去滑天南星底七枚生用烏蛇尖七枚去皮生用上為細末每服以薄荷湯調下半字若兒在百日內者一字可分為四服如要作丸即以棗肉和丸如緑豆大以馬藺草湯下一丸臨時看兒大小加減必勝散治小兒急驚風天南星炮輕粉研甘遂全蠍炒各一分巴豆去皮心膜出油七粒丹砂研一錢麝香研半錢上為細散每服一字要吐瀉酒調下取涎薄荷湯調下未周歲兒減之揭風湯治小兒嬰孩急驚風四證八候俱作者宜服全蠍麵炒去毒一分天麻一分天南星一兩為末水調作劑包裹蠍煨令赤色蠍不用炒亦得硃砂一錢另研輕粉半錢重腦子麝香各少許上為末每服半錢煎金錢薄荷湯調下以通為度天霜散治小兒急中卒風並急驚口噤搐搦涎盛昏塞不語辰砂粉霜輕粉南星炮各半兩蠍尾白附子藿香葉各一錢上為末一歲抄半字薄荷湯調下茶清亦可未吐再服以吐為效七味羌活膏治急驚風壯熱發搐牛黃散治小兒急驚風壯熱筋脈拘急腰背強硬時發搐搦牛黃一分細研麝香一分細研乾蠍一分細炒蜣螂三枚微炙晚蠶蛾一分微炒蚱蟬三枚微炙去翅足波斯青黛一分研入上為末糯米飯和丸如麻子大每服用薄荷湯下三丸若兒有三四歲大每服五丸不計時候量兒大小加減服之蟾酥丸治小兒急驚風口噤搐搦多涎悶亂蟾酥半錢研入乾蠍一分微炒白附子一分炮製龍腦半錢細研麝香半錢細研硃砂二錢細研青黛一錢細研上為末共研令勻以豬膽汁和丸如緑豆大先用奶汁化破一丸滴在鼻內良久如嚏得數聲即便以薄荷汁化下一丸不嚏者難醫量大小臨時加減青黛丸治小兒急驚風化痰涎定搐搦利臟腑青黛一分甘遂一錢末膩粉一錢龍腦一錢蟾酥一分麝香一錢半夏一分湯洗七次焙乾麩炒黃色為末上都研細用湯化蟾酥和丸如粟米大每服以薄荷湯下二丸微瀉是效未瀉量兒大小加減服之珍珠丸治小兒急驚風多發搐搦或夾食腹痛面色變青或大小便不通珍珠末半兩白附子半兩末天南星半兩炮製滑石末一分膩粉一分巴豆三十枚去皮水浸三日取出爆乾研如膏上都研令勻以糯米飯和丸如黃米大百日以上兒以蔥白湯下一丸一歲兩丸三四歲三丸更量大小看病虛實加減服之小惺惺丸解毒治急驚風癇潮熱及諸病虛煩藥毒上攻燥渴臘月取東行母豬糞燒灰存性半兩研辰砂研水飛半兩麝