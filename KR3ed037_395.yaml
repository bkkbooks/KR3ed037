body:
  text: 卷三百九十五嬰孩吐瀉門冷吐附論冷吐者由乳母當風取涼解脫致令風冷之氣入於乳令乳變敗兒若飲之則冷氣入胃故成嘔吐其青涎夾奶吐出是也治之當令乳母捻去舊宿敗乳然後服藥次用釀乳法以療之楊氏云乳母服香蘇散夾和藿香正氣散薑棗煎服逐去寒邪次服理中湯加丁香木香煎服以溫養乳母方聖石丹治小兒胃氣不和乳哺重盥及食不消或呼吸風冷即令嘔吐若不止最為大病胃氣虛嘔吐久不差神驗真陽起石半夏洗七次焙各半兩人參去蘆木香白茯苓母丁香各一兩礞石炭灰燒一伏時四兩不灰木炭火燒一伏時二兩杏仁同巴豆制巴豆各十七個連皮燈上燎透為度研末阿魏研一錢上先將八味搗羅為末次用杏仁巴豆阿魏研末同入湯泡炊餅和丸如龍眼大每服一粒水一盞入生薑一皂子大同擘碎煎五分溫服須於銀器中煎藥石器中亦得治胃寒嘔吐方金液丹青州白丸子上合和為末麵糊再丸如米大米湯送下仍服助胃膏助胃膏治小兒冷氣入胃嘔吐不已人參去蘆白朮白茯苓甘草炙各半兩砂仁十四個白豆蔻十四個木香三錢炮丁香半兩乾山藥一兩肉豆蔻四個炮上為末煉蜜丸如芡實大米湯下一歲服一丸一方加藿香陳皮丁香丸治小兒胃虛寒腹疼吐逆丁香木香藿香牛黃各半兩腦麝一錢膩粉少許上為末麵糊丸小豆大熱湯化一丸服之金針丸治小兒冷氣吐逆不止心胸痞滿陽起石杏仁十五枚湯浸去皮尖雙仁炒不灰木生研半兩阿魏半錢巴豆去皮膜十二枚上除巴豆杏仁別研外為末後入二味再研勻以糯米飲丸如雞頭仁大焙乾每服一丸用針穿燈焰上燎透為度入鹽少許研細冷薑湯調下量大小以意加減溫脾散散寒濕治嘔吐厚朴去皮塗薑汁炙香熟一兩丁香白朮乾薑各半兩肉桂一分上為末每服一錢煎人參湯調下中結丸治脾胃冷吐逆水食不下噎奶此因乳母多食酒肉淹藏毒物得之禹餘糧火煨赤米醋半兩巴豆麵裹煨七粒硃砂皂子大定粉炒二錢麝香少許上為末蒸餅為丸如緑豆大每服三五丸遠志湯下流星散治小兒胃氣虛冷痰吐嘔逆半夏十四個大者生用胡椒四十九粒上為粗末每服半錢水一盞入生薑一片油七滴煎至四分去滓溫服橘皮湯治小兒嘔吐膈上有冷陳橘皮湯浸去白焙細辛去苗葉乾薑炮製各二分大黃銼炒甘草炙各三分上粗搗篩每服一錢水七分盞煎至四分去滓溫分三服一日令盡更量兒大小以意加減瑞蓮散治脾胃一切虛寒嘔吐不食並皆治之石蓮肉一兩木香丁香各二錢半人參三錢澤瀉三錢訶子肉一個紫蘇子炒半兩肉豆蔻二個煨白芷半兩陳皮五錢上為末每服一錢薑棗湯下熱吐附論夫小兒熱盛及極熱而吐更下熱藥脾胃熱而胃口閉所以吐傷水穀不通凡下湯藥乳食只伏在胃管胃口不開脾伏乳食上下不動若下取藥胃口不開只在胸膈不上不下乃是結腸反吐候也歌曰得患初因是熱傷熱極吐逆也尋常誤人最是庸醫見熱疾仍將熱藥嘗致令胃閉並腸結莫服冷藥不須涼若還更取兒當死先須開胃後通腸方辰砂丸治胃熱逆吐不止及驚風涎盛潮作辰砂別研水銀砂子各一分牛黃腦麝別研各半錢生犀末天麻白殭蠶酒炒蟬殼去土乾蠍去毒炒麻黃去節稱天南星湯浸七次切了焙乾稱各一分上為末再研勻熱蜜丸如緑豆大硃砂為衣每服三丸或五七丸食後煎薄荷湯送下保命膏治吐逆不定服熱藥過多不能瘥者丁香山大戟大黃炮不灰木燒紅放冷甘遂各一分以上俱為細末硃砂細研水磨雄黃細研水飛各半兩粉霜水銀用結錫砂子各重一錢巴豆去皮心膜不去油研細十個上都研勻用黃臘四兩銀石器中熔攪成膏旋取和丸如黍米大每服未周晬一粒二三歲兩粒四五歲三粒六七歲五粒十歲以上七粒用新汲水下清膈飲治小兒伏暑嘔吐者最宜服之淡竹葉去枝梗剪葉焙令乾香薷各一兩檀香人參去蘆頭半夏湯洗七次白茯苓甘草炙各半兩白粳米一合上為粗末每服一錢水一大盞煎至六分去滓溫服量兒大小以意加減一方薑棗煎益胃湯治胃虛挾熱嘔吐不止丁香人參去蘆頭各一兩訶黎勒皮一分官桂大黃炮黑黃各半兩上為細末每服一錢水一小盞入生薑二片煎至五分去滓溫湯下妙聖散治小兒胃熱逆吐龍腦粉霜膩粉滑石各等分上研為細末麵糊為丸如緑豆大每服一丸煎乾柿湯下不拘時候麥門冬散治小兒嘔吐心胸煩熱麥門冬去心焙厚朴去粗皮塗生薑汁炙令香熟人參各等分上為散每服一錢水一小盞入生薑少許棗三枚粟米五十粒煎至四分去滓放溫量兒大小漸漸與服又方麥門冬去心焙甘草炙微赤銼人參去蘆頭陳橘皮湯浸去白瓤焙各一分上為散入淡竹茹茅根各一分銼碎每服一錢水一小盞入生薑少許煎至五分去滓稍熱頻服量兒大小以意加減香薷散治小兒熱吐秋夏多伏暑出有黃涎頭額溫至心熱小便赤澀或乾嘔無物霍亂吐瀉轉筋腹痛宜服此乳母同之又宜服甘露飲香薷一兩厚朴制白扁豆各半兩上先用薑汁四兩一處杵厚朴令細炒令赤色入香薷扁豆二味都為末每服五錢水一盞酒一盞共煎去滓入磁瓶內蠟紙封沉入井中候極冷取出一瓶服兒母同服甘露飲治證同前蘆根粥治小兒嘔吐煩熱口渴生蘆根銼二兩粟米一分一方作糯米上以水二大盞煎至一盞去滓投米作粥入生薑蜜汁少許服甜消散治小兒風熱吐不止甜消一錢滑石白膩者半兩上為散每服半錢用漿水半盞入生油一點打勻調下極重者三服必定兒大者每服一錢忌生魚果實治小兒壯熱嘔吐不住食驚癇方以葛粉二大錢水合調勻瀉鐵鐺中傾側令遍重湯中煮令熟以米飲相和冷下之清胃散治小兒熱吐用生薑薄切以生面拌曬極干各焙為末以紫蘇湯調下治熱吐兼利方用敗毒散五苓散陳米煎服凡夏秋吐利多是母感冒暑毒必脈虛面垢自汗身熱惡寒煩渴證治與此熱吐或利同夾驚吐附論小兒吐乳早晚發熱則是驚吐而不睡是也此由胃氣實其乳母或氣不定或食交乳或怒未息或行房了因以乳兒致劃然便吐吐出乳若不變色無害若色青黃或如水或其中有蟲者治須涼膈以溫物暖其腦後避惡風吹其風府也既生其氣又涼其上焦吐即止也更宜與調劑以療之善歌曰吐乳從來胃氣實乳滿胃中生吐逆吐多遍身有風生驚邪本是從斯得吐定無過腦後溫吐乳須教無變色先與定氣後除驚如此醫良不費力方歸命丹治夾驚吐嘔不止丁香藿香各一分生犀牛黃各半錢豬膽狗膽蝟膽熊膽鯽魚膽各半分共稱取半兩上末和丸如緑豆大量兒大小加減一歲以下煎苦楝湯研下二丸殊聖方歌曰小兒驚膈吐還頻晝夜連連不暫停緑水槐黃泔澱汁蛔蟲乳食一時噴藿香研共生犀角五膽牛黃立有勳若有得逢如此藥直饒命困卻還魂三香丹治夾驚嘔吐不定藿香葉丁香各一兩半夏湯洗七次焙乾半兩以上併為細末用膩粉一分龍腦麝香當門子各一錢上同拌勻取生薑汁打麵糊和丸如黍米大每服十粒入人參薄荷湯下量兒大小加減人參溫中湯治小兒驚吐熱吐心神悶亂中脘不和漸加恐悸恍惚無定人參白朮白茯苓半夏湯浸七次陳皮肉豆蔻煨各等分上為細末蒸棗肉為丸如麻子大硃砂為衣藿香生薑湯下三五十丸不拘時候多服勿慮藿香湯治驚吐並熱吐藿香三兩白扁豆薑製厚朴薑製白茯苓各兩半甘草炙一兩上銼酒水煎子母同服定吐丸治小兒驚吐胃脘不快吐逆乳食或心胸發熱丁香三十一枚為末蠍梢四十九個半夏三個洗焙乾為末上研勻煮棗肉丸如黍米大每服七丸至十丸金銀湯吞下如傷暑霍亂吐瀉煎藿香散送下睡驚丸治熱化痰涎鎮心神止驚悸吐逆半夏末薑製乳香末犀角末各一錢上以姜自然汁煮麵糊為丸如緑豆大每服七粒至十粒薄荷水下夜臥服四季散治久患翻胃及驚吐諸吐上好硫黃十兩細研水銀同硫黃再研無星一分生薑四兩取汁上同研如黑煤色每服三錢入薑汁並酒一盞同煎熟調藥空心服用衣被蓋覆半日汗出即瘥有人患反胃三年不瘥治療百端無一驗四季者持此藥與服汗出如膠腥穢不可近後更不復吐其神效如此又須量兒大小服一錢或一字冷水調下此藥難調須先滴水少許以指緩緩研碎稍稍增湯始令調和若入湯酒則浮泛不可服矣一方無生薑毒氣吐附論小兒服湯中毒氣吐下候春夏以湯下蓋由腸胃脆嫩不勝藥勢遂吐下不止藥氣熏臟腑乃煩懊頓乏者謂此為中毒毒氣吐下也方藿香湯治小兒毒氣吐下腹脹逆害乳哺藿香一兩生薑三兩青竹茹甘草炙各半兩上㕮咀以水二升煮取八合每服一合日三有熱加升麻半兩消奶毒方令小兒吃奶無毒升麻銼半兩大麻子搕破一合上酒浸每早晨與奶一盞吃了安乳時須先捻去些少方與兒吃並兒有毒亦解吐利附論夫吐利者由腸虛而胃氣逆故也小兒有解脫而風冷入腸胃腸胃虛則泄利胃氣逆則嘔吐此大體與霍亂相似而小輕不劇悶頓故直云吐利不呼為霍亂也歌曰小兒吐利早須醫只為腸虛氣逆之更有中他湯藥毒必加煩燥在心脾方掌胃膏治小兒脾胃虛弱嘔吐泄利人參白朮白茯苓去黑皮甘草炙肉豆蔻麵裹煨去面白豆蔻陳皮草豆蔻去皮枇杷葉去毛青皮去白丁香沉香木香藿香葉縮砂仁各等分上為末煉蜜丸如龍眼大每服一丸食前米湯化下日二服助胃膏治小兒胃氣虛弱乳食不進腹脅脹滿腸鳴泄泄哯乳便青或時夜啼胎寒腹痛官桂去皮白茯苓去皮白朮藿香葉縮砂仁各三兩白豆蔻仁肉豆蔻煨木香各一兩丁香一兩甘草炙銼三兩橘紅去白山藥各四兩人參一兩上為細末煉蜜和膏丸如雞頭大每服一丸量兒大小加減米飲化下不拘時候參苓散治吐瀉人參白茯苓山藥乾葛麥門冬去心黑附子炮去皮臍桔梗去蘆甘草炙各半兩蓮子心木香不見火各一錢藿香葉一分上為末每服一錢紫蘇米飲調下醒脾散人參五錢去蘆丁香一錢赤茯苓五錢藿香葉五錢白朮五錢白姜二錢炮甘草炙三錢木香二錢炮厚朴薑製南星大者三個縮砂仁一兩同南星炒上銼薑棗煎燒鹽服醒脾湯治小兒吐瀉脾虛多困不思乳食欲生風候人參白茯苓白朮山藥白扁豆炒白附子藿香白殭蠶甘草升麻酸棗仁各等分上為末三歲一錢冬瓜子三七粒水半盞煎至三分去滓服二劑消風散最治吐瀉生風多困加朱麝人參茯苓甘草紫蘇葉木瓜澤瀉香薷半夏曲白扁豆炒陳皮烏梅肉厚朴炒各四錢上為末每服一錢薑棗煎服治小兒直腸泄瀉水穀不分小便不利口乾作渴人參白朮白茯苓木香訶子麵裹炮砂仁陳皮炒瞿麥炒車前子麥門冬去心各等分甘草減半用上㕮咀每服三錢水一盞煎至七分量兒大小無時服小兒青糞者冷也亦是肝克脾之證也肝屬木其色青脾屬土其色黃糞黃者脾家之本色也若脾受肝克則其糞青肝木主風宜早治之不爾成脾風發癇也然所謂青糞才下便青若初下時黃良久乃青小兒安樂者皆然不可認為青糞也可服白附子丸羌活丸白附子丸治小兒青糞及吐而有冷證者白附子一分為末舶上硫黃半夏半兩生為細末用生薑自然汁和成劑藥作小錢大餅子沸生薑湯內下候煮熟不麻為度取研成膏上加蠍梢末一分同研勻入在半夏膏內和令得所干即添湯丸如蘿蔔子大每服三五十粒米湯或乳汁下羌活膏治小兒胃虛吐瀉生風羌活天麻防風各半兩人參茯苓蠍梢酥炒桂各一兩硃砂一錢研水銀一錢硫黃一錢同水銀研上先將八味為末入水銀硫黃研勻煉蜜為膏每服一皂子大