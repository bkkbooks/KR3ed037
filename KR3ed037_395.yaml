治理小兒陰陽不和吐瀉不止預防風證調脾胃進乳食人參白朮茯苓去黑皮山藥白扁豆炒乾葛南星炮甘草微炙藿香葉防風天麻上等分為細末每服一錢水一盞冬瓜子二十粒生薑一片同煎至四分溫服如大瀉不止危急每服沉香肉豆蔻各少許人參白朮散治小兒嘔吐泄瀉口乾唇燥煩渴引飲小便赤澀並宜服之白朮去蘆白茯苓去皮人參去蘆木香藿香葉乾葛銼各半兩滑石膩白者六錢甘草炙三錢上為細末每服一二錢百沸湯調下或生薑湯亦可或㕮咀煎服更妙嘔吐加丁香二錢肉豆蔻膏治小兒夾驚大便清瀉腹疼不穩肉豆蔻二錢銼人參一錢白朮二錢甘草一錢丁香一錢不見火木香一錢不見火藿香五分上件藥同為細末煉蜜為丸如雞頭大每服一丸米飲下空心奶前服參蘇飲子治伏熱吐瀉虛煩悶亂飲引不止感暑者白茯苓人參白朮甘草紫蘇木瓜藿香厚朴半夏各等分上湯點服空心量與神效沒石子丸大健小兒脾胃吐瀉不進乳食諸病後虛弱精神昏慢全不入食吐嘔生痰漸成慢脾候立有神效不可具述半夏半兩生薑一兩半捶爛將半夏每個切作兩片水一大碗同煮乾取出再用水半碗煮姜用白麵一錢重乳鉢內研作餅子慢火炙熟沒石子一枚滑石一分研人參一分丁香一錢白礬一錢硃砂一錢細研上為末每服半錢煎冬瓜子生薑湯調下如為丸用水調薄薑汁麵糊為丸子每服三十丸量大小加減觀音散扁豆炒白朮煨茯苓人參炙神麯炒麥芽炒香附子各等分上為末空心米飲調下霍亂附論夫小兒霍亂者由陰陽清濁二氣相干氣亂於腸胃之間故為霍亂也然腸胃怯弱或因解脫為風冷所乘及乳哺不消而成吐瀉或乳母觸冒風冷及飲食生冷等物冷氣入乳令乳變敗兒若飲之亦成吐利是皆觸犯臟腑使清濁之氣相干之所致也挾風而實者體熱頭疼而復吐瀉凡遇此病須暫斷乳食仍以藥調適乳母先當散乳間風冷之氣宜服香蘇飲夾和藿香正氣散煎食後捻去宿乳服之逐去寒邪次用理中湯加丁香木香煎服溫養其乳此先定其大勢然後自合釀乳藥同兒飲之乃服醒脾散使免生慢驚之疾也楊氏曰陽隔陰而不降陰霍亂也先心痛則先吐先腹痛則先瀉心腹俱痛吐利並作所謂賊邪木來勝土也王氏曰小兒內因脾胃虛弱乳哺停積外因感冒寒暑邪正交爭證有冷熱之不同藥用溫涼之各異陳無擇曰傷風則惡風自汗傷寒則惡寒無汗胃濕則冷凝傷暑則熱煩必以外所因而治之扶救不先立致危殆治法必先止吐次則隨證治利許仁則曰凡濕霍亂死者少乾霍亂死者多楊氏曰足陽明屬胃以養宗筋暴吐暴利津液驟亡失其所養甚則轉筋入腹而死王氏曰小兒吐利暴作最為急證蓋脾虛則吐胃虛則瀉脾胃俱虛吐利俱不止吐而不止瀉者危楊氏曰吐瀉不止必慢驚慢脾虛風也又曰小兒有中霍亂吐瀉候上吐下瀉遍身微熱不能乳哺此因吃食冷熱不調脾家受熱胃冷不消化所致宜用睡驚沉香飲夾丁香散乳香散活脾散與服如傳變大渴不食面臉紅眼微視氣少不語汗多恐患慢脾風死候不治又小兒霍亂而成吐瀉仍須進大七寶散二三服並觀音散二三服溫白丸二三服如不退恐脾困不進乳食須進惺惺散二三服如此不效往往變作慢脾風慢驚風此候宜進竹瀝膏二三服間惺惺散調胃氣並沉香散又小兒霍亂吐利由陰陽不和清濁相干與大人無異如救火拯溺宜速療之兼宜用聖石丹順正湯霍亂吐瀉形候忽然吐瀉調之霍亂吐瀉如有渴即下沉香飲子夾平胃丸若未有渴量大小下鮓湯丸通一二遍白涎只依前用沉香飲子平胃丸謂或尚猖狂煩躁夜睡不得喘息急促此死候不治翰林待詔楊大業問小兒霍亂吐奶者為何答曰凡將息小兒之道切慎擇乳母精神強健智惠深遠身無疾病肌肉肥潤溫厚淳善能調理乳食何疾更生衆疾易愈方大七寶方治小兒霍亂吐瀉不進食乳木香炮丁香炒官桂不見火茯苓麻黃去節當歸甘草炙人參大腹皮川練子去核秦艽炒各一錢訶子去核一錢肉豆蔻一個炮藿香葉一錢炒地榆二錢炒上為末每服一歲兒一字二三歲半錢四五歲一錢水一藥注或半銀盞入棗子半斤煎十數沸溫服地黃散治小兒脾胃氣衰弱霍亂吐瀉嘔逆不食煩躁迷悶乾地黃厚朴去粗皮薑汁浸炒人參茯苓乾葛藿香葉黃耆蜜炒白朮麩炒各一分丁香訶子炮取肉各一錢上為末每服半錢或一錢用蒼朮煮飯飲調下並進四五服肉豆蔻散治小兒霍亂吐瀉不止食飲不下肉豆蔻一枚去核丁香黃耆銼枇杷葉去毛炙微黃各半分桂心人參甘草白茯苓各半兩陳橘皮一分湯浸去白瓤焙上為散一歲兒霍亂每服以溫水調下半錢大小加減半夏散治小兒霍亂後吐瀉不止煩悶半夏湯浸七次去滑用黃連去須乾薑炮裂銼陳橘皮去白瓤湯浸焙人參去蘆頭當歸微銼炒以上各半兩黃芩甘草炙微赤銼各一兩上為散每服一錢水一小盞煎至五分去滓不拘時量大小溫服丁香散治小兒霍亂吐瀉不定丁香木香甘草炙微赤銼葛根銼枇杷葉去毛炙微黃各半兩藿香人參去蘆頭桑黃各半兩上為散末不計時以麝香湯調下半錢量大小以意加減服之救生丹治小兒心膈伏熱生涎霍亂躁悶身熱吐逆噁心乳食不下大戟一錢半輕粉三字乳香丁香各半錢龍腦一字粉霜三字水銀黃蠟各三錢黑鉛一錢一字與水銀結砂子上為末熔蠟為丸如小豆大一歲一丸木瓜甘草湯飢服如煩躁研生芝麻馬齒莧水下如吐逆煎藿香湯下更量虛實加減食後臨臥服之此藥除熱化涎下膈止吐逆若胃虛傷冷嘔吐不止者不可服凡小兒吐逆宜速療之久不止遂為慢驚常宜收此藥備急醒脾散人參半兩去蘆丁香四十粒白茯苓半兩藿香葉半兩白朮半兩甘草半兩炙天南星二個重八錢以