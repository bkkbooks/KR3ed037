小兒霍亂方人參蘆籜各半兩一用根扁豆藤二兩倉米一撮上㕮咀水二升煮取五合溫服菖蒲散治小兒霍亂吐瀉不止煩悶菖蒲肉豆蔻去殼人參去蘆頭白茯苓各一分上為散不計時以生薑湯調下半錢量大小加減人參散治小兒霍亂吐瀉不定人參去蘆頭陳皮湯浸去白瓤焙黃連去須厚朴去粗皮薑汁炙令香熟上各三分為散以陳粟米粥飲調下半錢三歲以上加服香連散分清濁定霍亂吐利木香川黃連去蘆各一兩人參去蘆頭厚朴去粗皮塗薑汁炙令香熟各半兩上為細末每服一錢粟米飲下快膈散定霍亂吐利服藥多吐即先服此藥甘草半兩炙高良薑微炮肉豆蔻去殼丁香各一錢上為細末每服半錢新汲水調下桃仁膏治霍亂吐瀉桃仁杏仁巴豆各一枚硃砂少許上同研飯為丸如米大每服一丸以米飲吞下治霍亂吐瀉不止方乾薑炮人參白朮各四錢厚朴二分薑汁浸炙上細銼分作四服每服水二盞煎取六分以意加減與服入甘草二分尤佳青金丹一名陰陽丸治小兒霍亂吐逆及治大人虛實冷熱吐瀉並諸般吐逆不定水銀一錢硫黃二錢生者同水銀研令水銀不見星只作黑色上薑汁糊丸麻子大每服二十丸淡薑湯下治吐水調末服治霍亂常用妙方南沒石子肉豆蔻訶子上三味各磨水少許煎數沸一二服可止若加黃連木香等分為末麵糊丸便是沒石子丸亦治熱瀉久利治霍亂吐瀉面色青四肢冷虛汗出方香茅一分生薑生大碎薄荷葉半分上以水一小盞煎至五分去滓量兒大小分減溫服丁香散治霍亂吐瀉丁香一錢藿香半兩枇杷葉七片湯洗泡去毛炙為末上為細末每服一字或半錢飯飲調下只兩服住治小兒霍亂吐瀉方草豆蔻檳榔甘草等分上為末姜煎一錢空心服木香散治霍亂吐瀉木香細銼人參藿香各等分上為末每服一錢水五分煎至三分服藿香散治小兒霍亂吐瀉藿香香薷末各一分白茯苓末二錢上研每服半錢薑湯下如人行三五里進一服連進三服乳香丸治小兒霍亂吐瀉不定乳香硃砂各一錢研半夏半兩湯浸洗七次薑汁炒黃上為末麵糊丸如緑豆大每服五丸米飲下日三張氏家傳方用半夏卻只用一兩名香砂丸又方丁香末一錢消梨一枚絞汁奶汁一合上和勻少少與兒服之又方甘草半兩炙微赤炒肉豆蔻去殼乾薑炮製銼各一分上為散每服以冷水調下一字二歲以上加減服龍骨散治小兒霍亂吐瀉不止龍骨末一分草豆蔻末半兩爛籧篨末半分上研勻以奶汁三合煎二合去滓別入麝香牛黃兔毛灰各一字生薑汁少許調勻分為三服如人行五里一服治霍亂吐瀉並冷瀉欲死肉豆蔻去殼甘草炙微赤銼藿香各一分上為散每服一錢水一小盞煎至五分去滓不計時大小分減溫服一方用粉草香薷散治小兒霍亂吐瀉體熱煩躁昏昌多渴陰陽不順清濁相干厚朴去皮製黃連二味同薑汁杵作紫色香薷各一兩上為末三歲一錢水半盞酒少許煎三分去滓水中頓冷服一方用白扁豆炒各等分又方治小兒霍亂立驗人參一兩木瓜一枚倉米一撮上㕮咀以水煮分服更量大小加減佳溫中丸治小兒胃寒泄瀉腹痛腸鳴吐酸水不思食霍亂吐瀉人參切去蘆頭甘草炮白朮各一兩為末上薑汁麵糊丸緑豆大米飲下一二十丸無時治小兒霍亂但利不吐方烏牛糞半兩燒灰人參三分去蘆頭生薑半分切上用甜淡漿水一大盞煎至五分去滓不拘時量大小加減溫服如渴取曲蟺糞爛龍骨一兩漿水煎服一作烏牛箷草用一團箷舒移切治小兒霍亂方生薑四分切香薷薄荷各一兩上以水煎分溫兒與母同服之甚良量兒大小分減稍熱頻服和中散治陰陽不和清濁相干霍亂吐利壯熱煩渴胸膈痞悶腹脹滿面色青白手足厥冷困頓多睡全不思食乾薑厚朴去皮炙制甘草炙各一兩上為細末每服一大錢水八分生薑三片同煎至三分去滓溫服丁香散治小兒霍亂不欲乳食丁香一分人參半兩去蘆頭上為散每服一錢水一小盞煎五分去滓不拘時量大小分減溫服一方以乳汁三合同煎肉豆蔻散治小兒霍亂不止肉豆蔻一分去殼藿香半兩上為散每服一錢以水一小盞煎至五分去滓不拘時量大小分減服治小兒霍亂方扁豆莖一升先炙切細人參三兩切上以水三大升半取汁煮粟米少許為粥與乳母服衣裹乳勿令露之每欲乳兒先捻去少許然後乳兒常服大佳石黃散治霍亂吐瀉不止治伏暑霍亂吐瀉胡椒半兩緑豆粉一兩上為末煎燈心木瓜湯調下又方治小兒霍亂吐利一名霜葉散干桑藥藿香各半兩上為末不拘時以粥飲調下半錢量大小加減又方桂心甘草等分上粗末水煎入法醋少許服治小兒惡氣霍亂方用梳篦垢水和飲之治小兒乳霍亂方取廁屋戶簾燒灰研飲服一錢又方用訶黎勒一枚先煎沸湯研一半許與兒服立住如未止再服治百日以來及蓐內兒霍亂方以人乳半合及生薑汁少許和煎服入口定治小兒熱霍亂諸藥不差者用蘆葉二兩或蘆根糯米三大合水三升先煮葉入米煮取一升入蜜少許和服瘥不止即取桑葉二升生薑半兩切以水二升煮取一升入一匙白米為飲服牛泄方治小兒霍亂腹脹不得利取牛泄絞汁百日兒一合二百日一合半三歲二合服治小兒霍亂吐乳不止以人參煎湯服差又方取薄荷葉未乾者研汁量多少捻鼻合口開灌之治霍亂用陳大蓼濃煎湯洗足止並服濃汁一二合自愈蒔蘿丸治小兒氣脹霍亂嘔逆腹冷食不下及脅痛以蒔蘿為末糊丸如緑豆大三歲三十丸青皮湯下治小兒霍亂以尿滓乳上服之又方以牛涎灌口中一合差治小兒吐利霍亂用寡婦薦取二七莖煮飲之又方用芹葉細切煮熟汁任性飲多少止又方用桑蟲一枚炙焦黃細研以奶調灌之又方用蠮螉窠微火炙為末以乳汁調一字服之備用方治小兒霍亂吐利用生蒜研塗心下及兩足心效八白飲治小兒脾虛胃弱膈有風痰水穀入口悉皆嘔噦體羸氣乏飲食不下霍亂吐利神情恍惚心胸脹滿中脘不和沉香藿香葉人參草果半夏曲白川薑炮白芍藥白檳榔白豆蔻白茯苓白朮白扁豆炮白芷各等分上為末腹瀉後吐或吐後腹瀉每服一錢水一小盞生薑二片棗半個煎三五沸通口不拘時服五苓散治霍亂吐瀉燥渴飲水小便不利澤瀉二兩半銼木豬苓去皮銼一兩半官桂去皮一兩白茯苓銼一兩半白朮銼一兩半上為細末每服一錢溫湯調下燥渴新汲水調服以意加減不以時服丁香散治霍亂丁香藿香各一兩人參半兩上為細末每服一錢以水半盞煎五沸更入奶汁少許去滓稍熱細呷頻服量兒大小加減乾霍亂附論夫乾霍亂者由脾胃氣熱陰氣內積陽氣外傷邪熱之氣搏於脾胃稽留不散傷動陽經遂致精神昏亂則血脈不榮易受風冷卒被所感便即心痛煩滿氣粗腹大如鼓涎壅咽乾其氣虛而邪氣勝邪氣既勝則與衛氣並行其所以不吐利也蓋脾胃充實難於吐利其證心神煩亂恍惚多驚故曰乾霍亂也又云忽然心腹脹滿絞痛欲吐不吐欲利不利痰壅腹脹頃刻之間便致悶絶此乃所傷之物因吐利泄盡則生若上不得吐下不得利所傷之物壅閉正氣關格陰陽躁擾喘脹霍亂氣息少者危法宜蘇感丸疏利之方治小兒霍亂不吐利肚脹妨滿上下不通甘草四分炙當歸三分石鹽三分上以水漿一升半煎至六合去滓入牛黃麝香各半錢研蜜半匙相和灌之即通奶母與水漿粥飲勿吃麵肉等立應散治小兒乾霍亂不吐不瀉腹脹如鼓心胸痰壅鹽二兩生薑一兩上同炒令轉色三歲半錢童子小便半盞煎三分去滓溫服保安丸治小兒乾霍亂不吐不利煩悶不知所為以巴豆一枚去皮心分作十小丸每服一丸水研服之當快利三五行即以漿水粥補之治乾霍亂以蘇合香丸加枳殼一分木瓜半分煎湯調下又方以炒鹽二碗紙裹絹護頓胸前並腹上截以尉斗火尉令熱氣透即蘇又炒鹽依法尉背則全愈一方用鹽一大盞極咸熱飲以手剜喉令吐三飲三剜三吐即止治小兒乾霍亂渴熱壯熱眼色慢四大困悶以烏豆二升淨洗干擇生薑一兩切水三升煎豆皮欲爛即濾取汁二合和少許蜜吃即便吐如人行五七里又與吃無問大小兒並令服之效霍亂心腹痛附論夫小兒冷熱不調乳哺不節使陰陽二氣相干而變亂於腸胃則成霍亂也心腹痛者是冷氣與真氣相擊或上攻心或下攻腹故成痛也方人參散治小兒霍亂心腹痛不欲飲食人參去蘆頭白朮芎藭草豆蔻去皮厚朴去粗皮塗薑汁炙令香熟當歸銼微炒陳橘皮浸去白瓤焙丁香桂心各一分上為細散不拘時煮薑棗米飲調下半錢量大小加減治小兒霍亂心腹刺痛吐利方茯苓桔梗人參各六分白朮五分甘草炙四分厚朴炙四分上為散每服一錢水一小盞煎至五分去滓不計時量大小加減溫服人參散治小兒霍亂心腹痛不欲食飲人參一分去蘆頭丁香一分桂心一分白朮芎藭各三分上為散不拘時煮薑棗米飲下半錢量大小加減服肉豆蔻散治小兒霍亂吐瀉不止腹痛肉豆蔻去殼桂心各一分人參去蘆頭甘草炙微赤銼各半兩上為散每服一錢水一小盞生薑少許煎至五分去滓不計時量大小分減溫服烏藥散治小兒乳食冷熱不和及心腹痛或水瀉乳汁不好香附子用白者高良薑赤芍藥天台烏藥等分上為末每服水一盞煎六分溫服如心腹痛入酒煎水瀉米飲調下無時調中丸甘草半兩炒白朮半兩人參切去須半兩乾薑四錢炮上為細末蜜丸如緑豆大每服十丸至二三十丸食前溫水送下治轉筋入腹欲死用生薑一兩捶碎酒五盞煮服又方令病人仰睡熱土頓臍上令人尿之針頭丸治小兒霍亂吐利腹中疼痛巴豆肉二個水半盞煮乾阿魏雞頭大一塊舶上硫黃如阿魏大上研勻以薄糊搜作餅子如錢眼大每服一餅子針頭穿定燈上燒留三分存性淡薑湯化開服治霍亂吐利腹痛用高良薑水煎加粳米如粥食之
