body:
  text: 卷三百六十一嬰兒初生門胎寒附論凡小兒胎中受寒於臟傷動胞胎生下不能將護再傷風外其候面色青白四肢逆冷手足顫動似大人寒瘧或口噤不開乃胎寒之候也其寒氣或乘虛而入臟則令腹疼或作盤腸內瘹皆因寒而得之大便青者是也方調中丸出聖惠方治小兒胎寒虛脹滿不嗜食大便青夾白膿及欲發癇宜服當歸半兩銼微炒川椒一分去目及閉口者微炒出汗附子一枚炮裂去皮臍狼毒半兩炒黃巴豆二十枚去皮心去油盡細辛一分豉四合炒微焦杏仁十二枚湯浸去皮尖微炒黃上搗羅為末煉蜜和搗三五百杵以器盛之未滿百日兒以溫水下一丸如麻子大一二歲兒服二丸量兒大小以意加減服之以利為度當歸散出聖惠方治小兒胎寒聚唾弄舌躽啼反張怒驚當歸銼微炒黃耆銼蜜炙細辛黃芩龍骨細研桂心赤芍藥各半兩上搗羅為末每服以乳汁調下一字日三服更看兒大小以意加減醫方集成治小兒胎中受寒生下再感外風面色青白四肢厥冷大便青黑及腸疼盤腸內瘹並皆治之川白薑散出直指方治産婦取冷大過胎中受寒令兒腹痛不飲乳木香陳皮檳榔官桂川白薑甘草炙各等分上銼每取一捻水一合煎以綿蘸與之嘔加木瓜丁香雀糞丸一名逐痛丸出聖惠方治小兒胎寒躽啼溫中止痛雄雀糞一分牛糞半兩細研赤芍藥半兩芎藭半兩當歸一兩銼微炒上搗羅為末煉蜜和丸如麻子大百日兒每服以乳汁下一丸日三服量兒大小以意加減服之茱萸散出危氏方治兒生七日腎縮乃初生受寒氣有此證上用硫黃茱萸各半兩為末研大蒜薄塗其腹仍以蛇床子熏之豬腎當歸散出聖惠方治小兒五十日以來胎寒腹痛微熱而驚聚唾弄舌躽啼上視此癇之候宜服此方豬腎一具薄切去脂膜當歸一兩銼微炒上二味相和以清酒一升煮至七合去滓每服取如杏仁大令兒咽之日三服夜一服量兒大小以意加減良治小兒多患胎寒好啼晝夜不止因此成癇疾出肘後方上用當歸末一小豆大用乳汁灌之日夜三四度服瘥芎藭丸出肘後方治小兒胎寒腹痛大便青芎藭黃耆各三錢牛黃研一分蟅蟲半兩麝香研一錢當歸切焙芍藥各半兩上為末煉蜜和為丸如麻子大每服兩丸至三丸米飲下早晨晚間各一量兒大小加減黃耆湯出聖濟總録治小兒胎寒腹中㽱痛黃耆切焙人參芍藥各一兩半當歸切焙甘草炙芎藭各一兩上搗羅每服二錢匕以水一小盞生薑二片煎至七分去滓分溫三服早晨日午近晚各一芍藥丸出聖濟總録治小兒胎寒大便青不欲食芍藥當歸切焙芎藭人參各三分甘草炙一兩上為末煉蜜和丸如麻子大每服一丸以乳汁下早晨日午近晚各一服量兒大小加減衣中白魚摩方出聖惠方治小兒胎寒腹痛汗出衣中白魚二十枚上以薄熟絹包裹於兒腹上回轉摩之以瘥為度梨汁飲出千金方治小兒腹痛夭矯汗出名胎寒上以煮梨葉濃汁七合可三四度飲之當歸散出傅氏活嬰方治胎寒啼叫當歸桂心各一錢甘草半錢木香三錢白茯苓三錢上為末每服一錢或半錢乳汁調入口中五加皮散出傅氏活嬰方治胎寒身軟當歸二錢甘草半錢五加皮三錢木香一錢白茯苓三錢上為末每服半錢棗湯下或東瓜仁湯下治胎寒喉中白膜口瘡出傅氏活嬰方黃連硼砂甘草各等分上為末用乳汁調滴入口中豬乳汁亦可人參散出傅氏活嬰方治胎寒人參當歸白茯苓白芍藥川芎甘草各等分上為末每服半錢乳汁調入口中小柴胡湯出傅氏活嬰方治胎病寒邪柴胡二兩黃芩人參半夏各三錢甘草半兩上件㕮咀每服一錢薑棗煎服胎熱附論小兒受胎因母受熱或恣食酒面熱毒之物傳入胎中令兒生下面赤眼閉不開身體壯熱哭聲不止口熱如湯乃為胎熱之候也初生嬰兒以表用藥凡有胎熱證當令乳母服藥不可求速效也治法當以酸乳令兒吃漸次解之百無一失若遽以冷藥攻之必損脾胃加以嘔吐乃成大患學者當曉此理胎熱生下有血氣時叫哭身壯熱如淡茶色目赤小便赤黃糞稠急以乳浴法主之更別父母肥瘦肥不可生瘦瘦不可生肥也方地黃湯治在胎受母熱毒生下遍身面目俱黃身熱大便祕小便黃色多啼不乳赤芍藥川芎當歸天花粉豬苓赤茯苓澤瀉甘草山茵蔯各等分上㕮咀生地黃煎子母同服解胎熱釀乳方出危氏得效方解胎中受熱生下面赤眼閉大小便不通不食乳澤瀉二兩半木豬苓去黑皮赤茯苓天花粉各一兩半生乾地黃二兩山茵蔯用葉甘草各一兩上㕮咀每服五錢水一盞煎至六分食後擠去舊乳去滓服急風散出醫方妙選治胎氣挾熱亦因母有邪熱傳染或生下洗浴當風褓襁失度致令嬰兒啼聲不出乳哺艱難名曰撮口不開病在七日之內尤甚宜用蛇蛻皮一分微炒鉤藤一分乾蠍梢一分硃砂一分水飛好麝香半錢真牛黃半錢研細上為末每服一字取竹瀝一兩點同乳汁調下黃連散由洗兒洗目不淨穢汁浸漬或在胎母食熱物熱藥令兒目赤爛杏仁黃連黃柏當歸赤芍藥各等分上銼乳汁浸一宿曬乾為末每用一字生地黃汁調頻點眼中母服洗心散豬苓湯上加天花粉山梔仁白水煎臨熟入生地黃汁子母俱服胎驚附論胎驚者兒在母腹中十相俱足或妊婦驚怪攧撲失驚而心主血脈應之於胎故生下未滿月而發驚者是也初生嬰兒難以用藥凡有此候急令取豬乳細研辰砂牛黃各少許調抹口中功效不可具述又入麝香當門子尤佳方龍膽湯出直指方治胎驚月內氣盛發熱凡臍風撮口壯熱等證皆可用龍膽草鉤藤柴胡黃芩北梗赤芍藥茯苓甘草炙各半兩蜣螂二枚去翅足炙大黃一分濕紙煨麥門冬去心防風各一錢上為末每服一錢北棗煎服或加防風麥門冬以導心熱黃芩減半用三因引用無蜣螂余藥並同太一散出直指方治胎驚天漿子去殼微炒南星白附子各微炮天麻防風茯苓各二錢全蠍硃砂各一錢麝香少許上為末每服半錢乳汁化下參蠍散出直指方治胎驚發定心神天漿子天竺黃人參硃砂全蠍天麻蟬殼各等分麝香少許上為末煉蜜丸梧桐子大每服一丸金銀湯下獨活湯出直指方治胎驚發散風邪羌活獨活各一分檳榔天麻麻黃去節甘草炙各半分上銼散每服半錢水煎服於內加南星末蜜調可貼囟用豬乳膏出直指方治胎驚最妙琥珀防風各一錢硃砂半錢上為末豬乳調一字拭入口中全蠍散出直指方治諸驚胎癇全蠍一個焙琥珀硃砂各少許上為末每服一字麥門冬煎湯調下全蠍散出湯氏寶書治胎驚風皆可服上以全蠍頭尾全者用生薄荷葉裹外以麻線纏火上炙燥為度碾為末另研生硃砂麝香各少許煎麥門冬湯下牛黃豬乳膏出危氏方治兒在胎中受驚故生未滿月而發驚搐上用硃砂研細同牛黃少許取豬乳汁調稀抹入口中入麝香當門子尤妙此法諸家方書並不曾載自余始傳之東官吳觀察新得一子有一月病此因用之牛黃散治小兒胎驚及乳癇心熱牛黃研半兩馬牙硝研鐵粉研龍齒研各一分上研細和勻每服方寸匕用熟水調下早晨午間臨臥各一服隨兒大小以意加減胎風附論夫胎風者由在胎之時臟腑未具神氣未全母動靜不常酒色過度或憂愁思慮叫喚聲高或自聞大聲傷動心神又因將養失宜觸冒寒暑腠理開泄風邪所傷入於胞中兒生之後邪風在臟不能宣泄或包裹失度冷觸臍帶風傷四肢若乳哺不調令兒吐哯時復面青或痰食壅積則生壯熱時復面紅二者不已致令拘急驚臥不安手足動搖身反強直乍靜乍動此即胎癇也子在胞胎稟受不足肝心驚虛及其始生乳養無法觸冒外邪或因斷臍瘡痂未斂風邪一入則令臟腑虛弱經絡不通蘊結為熱蓋風善行而數變入於榮衛氣血間則令兒壯熱吐哯精神不寧睡臥饒驚手足抽掣故名胎風縱而弗治則成癇疾方葛根湯治小兒初生至百晬前後驚癇連發不醒及胎中感風體冷麵青筋急反張葛根銼微炒麻黃去節羌活去蘆頭甘草炙銼枳殼去瓤麩炒各半兩杏仁湯浸去皮尖雙仁炒一分升麻黃芩去黑心大黃銼炒各一兩柴胡去苗芍藥各三分鉤藤一分蛇蛻微炙三寸蚱蟬二枚去翅微炒石膏碎一兩上搗篩每服一錢匕水半盞煎至三分入竹瀝少許更煎一兩沸去滓分溫三服隨兒大小以意增減犀角丸出聖惠方治小兒胎風搐搦筋脈拘急牙關或時緊硬犀角半兩白花蛇一兩酒浸去皮骨炙令黃天南星半兩炮裂白附子半兩炮裂乾蠍半兩微炒天麻半兩麻黃半兩去根節以上七味搗羅為末用無灰酒二大盞攪令勻於慢火上煎旋添酒不住手攪以酒盡為度又方牛黃一分麝香半分膩粉一分硃砂一分虎睛一對微炒水銀一分以棗穰研令星盡龍腦一分上細研入酒煎膏內看硬軟和丸如緑豆大不計時候以竹瀝下三丸量兒大小加減水銀丸出直指方治胎風壯熱痰盛翻眼口噤取下胎中蘊受之毒亦治驚積但量用之水銀一錢蒸棗肉研如泥白附子一錢半蠍一錢南星硃砂各一分天漿子牛黃蘆薈各半分腦一字鉛霜半錢和水銀研麝香半錢白殭蠶炒七個上為末粟米糊丸芥子大每一丸薄荷湯下如未通利加至二丸虎睛丸治小兒胎風虎睛研牛黃研各一字乾蠍七枚炒墨一棗大青黛研一分使君子十枚燒存性丹砂麝香研各半錢龍腦研金箔銀箔各十片上為末用水浸炊餅心為丸如櫻桃大煎金錢薄荷湯磨下半丸如疾重服一丸更量兒大小加減龍腦散治小兒胎風及慢驚眼澀多睡化涎解熱龍腦研麝香研白附子微炮牛黃天麻白殭蠶直者炒乾蠍炒烏蛇肉酒浸焙各一分麻黃去節半兩天南星微炒半兩上除龍腦麝香牛黃同研令勻外余搗碎不羅用新水一盞浸一伏時冬月浸兩伏時生絹濾藥汁調和寒食白麵為丸如大皂子大陰乾搗羅為散入前三味再同研勻每服一字用薄荷湯調下量兒大小加減露蜂房丸治小兒胎中久積風熱發歇手足搐搦多驚不睡出聖惠方露蜂房半分炒令黃色蠶蛾半兩微炒天漿子三十枚微炒天南星半分泡裂硃砂半兩細研水飛過乾蠍一分微炒膩粉一分牛黃一分細研水銀一分以棗肉研令星盡上為末都研令勻以煉蜜和丸如緑豆大不計時候煎槐柳薄荷湯下五丸量兒大小以意加減水銀丸出聖惠方治小兒風發作抽掣渾身急強眼目反張水銀天麻天南星炮裂白附子炮裂乾蠍各一兩微炒麝香研細龍腦細研藿香各一分白殭蠶一兩微炒上為末先用少許棗肉研水銀星盡與諸藥末同研令勻煉蜜和丸如緑豆大不計時候以薄荷酒研三丸服之量兒大小以意加減得汗出立效虎睛丸出聖惠方治小兒胎風及驚風目睛上視手足搐搦虎睛一對酒浸炙微黃天麻乾蠍微炒烏蛇肉炙微黃羌活獨活殭蠶微炒麝香各一分細研上為末以麵糊和丸如緑豆大每服三丸研破不計時候以薄荷湯服之一方虎睛膏金箔為衣天南星丸治小兒胎風壯熱瘛瘲天南星炮二枚白附子炮十枚乾蠍全者炒一分牛黃研龍腦研各一錢丹砂研一錢半雄黃研一分天漿子十枚去皮上為末煉蜜和為丸如皂角子大以丹砂為衣三二歲兒每服一丸至十歲服三丸煎金錢薄荷湯化下空心臨臥服虎睛丸治小兒胎風服犀角丸後宜服虎睛微炙研一對代赭搗研丹砂研各一分蘆薈研三分麝香研一分牛黃研三分桃仁二七枚湯退去皮尖雙仁麩炒當歸切焙為末二分上為末煉蜜和丸如麻子大一二歲兒每服三丸三四歲兒每服五丸並溫水下日再牛黃丸出聖惠方治小兒胎風手足搐搦遍身壯熱牛黃一分細研水銀一分用黑鉛一分同結為砂子細研硃砂一分細研犀角屑一分麝香半分細研蠍稍一分微炒天漿