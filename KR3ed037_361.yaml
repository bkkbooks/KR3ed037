母宜服並略與兒服之生乾地黃赤芍藥川芎當歸洗栝蔞根各等分上㕮咀每服五錢水一盞煎至六分去滓産婦亦可服抹些入兒口中甘豆湯出湯氏寶書治小兒初生下胎黃黑豆用一合甘草一兩切上用水一大碗煮臨熱入沙糖少許同煎糖化澄清遇渴飲之加淡竹葉一握能解五臟熱毒夏月産者尤宜服之黃龍湯出傅氏活嬰方治嬰兒出胎血肉未斂面目俱黃不啼鼻乾撮口四肢不能伸縮並宜服之山茱萸山藥生乾地黃澤瀉赤茯苓甘草各一錢腦子麝香少許上為末每服一錢溫水點服如小便不通則用五苓散加人參加茵蔯煉燈心煎服變蒸附論凡兒生三十二日一變六十四日再變變且蒸九十六日三變一百二十八日四變變且蒸一百六十日五變一百九十二日六變變且蒸二百二十四日七變二百五十六日八變變且蒸二百八十八日九變三百二十日十變變且蒸積三百二十日小蒸畢後六十四日大蒸蒸後六十四日復大蒸蒸後一百二十八日復大蒸小兒自生三十二日一變再變為一蒸凡十變而五小蒸又三大蒸積五百七十六日大小蒸都畢乃成人小兒所以變蒸者是榮其血脈改其五臟故一變竟輒覺情態有異有變蒸之候變者上氣蒸者體熱變蒸有輕重其輕者體熱而微驚耳冷尻冷上唇頭白泡起如魚目珠子微汗出其重者體壯熱而脈亂或汗或不汗不欲食食輒吐哯目白睛微赤黑睛微白又云目白者重赤黑者微變蒸畢目睛明矣此其證也單變小微兼蒸小劇凡蒸平者五日而衰遠者十日而衰先期五日後期五日為十日之中熱乃除耳兒生三十二日一變二十九日先期而熱便治之如法至三十六七日蒸乃畢耳且變蒸之時不欲驚動勿令傍多人兒變蒸或早或晚不如法者多又初變之時或熱甚者過日數不歇審計變蒸之日當其時有熱微驚慎不可治及灸刺但和視之若良久熱不可已少與紫丸微下熱歇便止若於變蒸之中加以時行溫病或非變蒸時而得時行者其診皆相似惟耳及尻通熱口上無白泡耳當先服黑散以發其汗汗出溫粉粉之熱當歇便就瘥若猶不都除乃與紫丸下之兒變蒸時若有寒加之即寒熱交爭腹腰夭糾啼不止者尉之則愈也變蒸與溫熱傷寒相似若非變蒸身熱尻耳亦熱此乃為他病可作余治審是變蒸不得余治也凡小兒生三十二日始變變者身熱也至六十四日再變變且蒸其狀端正也至九十六日三變定者候丹孔出而泄至一百二十八日四變變且蒸以能咳笑也至一百六十日五變以成機關也至一百九十二日六變變且蒸五機成也至二百二十四日七變以能匍匐也至二百五十六日八變變且蒸以知欲學語也至二百八十八日九變以亭亭然也凡小兒生至二百八十八日九變四蒸也當其變之日慎不可妄治之則加其疾變且蒸者是兒送迎月也蒸者甚熱而脈亂汗出是也近者五日歇遠者八九日歇也當是蒸上不可灸刺妄治之也錢氏云小兒在母腹中乃生骨氣五臟六腑成而未具自生之後即長骨脈五臟六腑之神智變者易也變蒸者自內而長自下而上又身熱以生之日後三十二日一變每異常情性異於前何者長生腑臟智意故生何謂三十二日長骨添精神人有三百六十五骨除手中足中四十五碎骨外有三百二十數自生下骨一日十段而上之十日百段而上之十日百段而三十二日計三百二十段為一遍亦曰一蒸骨之餘氣自腦分入齦中作三十二齒而齒牙不及三十二數者乃變不足其常也或二十八日即至長二十八齒以下仿此但不過三十二數也凡一周變乃發虛熱諸病如此十周則十蒸畢也計三百二十日生骨氣乃全而未壯也故初三十二日一變生腎志六十四日再變生膀胱其發耳與骫冷腎與膀胱俱主水水數一故先變生之九十六日三變生心喜一百二十八日四變生小腸其發汗出而微驚心為火火數二一百六十日五變生肝哭一百九十二日六變生膽其發目不開而赤肝主木木數三二百二十四日七變生肺聲二百五十六日八變生大腸其發熱膚不汗肺者金金數四二百八十八日九變生脾智三百二十日十變生胃其發不食腸痛而吐乳此後乃齒生能言知喜怒故云始全也太倉公云氣入四肢長碎骨於十變後六十四日長其經脈手足受血手受血故能持物足受血能行立經云變且蒸謂蒸畢而足一歲之日師曰不汗而熱者發其汗大吐者微下不可別治是以小兒變蒸蛻齒者如花之易苗所謂不三十齒由變之不及齒與當日變日相合也年壯而視齒方明卻逢相剋相剋者又逢相生理宜新證大氐陰陽造成五臟相生者順相剋者逆其變蒸法是養血氣滋榮五臟相生之法此理昭然聖濟經云水木火土金為序者以其相生有母子之道也水火金木土為序者以其相剋有夫婦之義也相生所以相繼相剋所以相治愚原胎者得水火既濟陰陽造化受五行相治而成形故始於腎氣之初生也錢氏將腎初變非嬰兒變蒸者當血氣改變陰陽升降從五臟相繼而成人寶鑑云三大蒸都計五百七十六日乃成人也故始於肝經之初變也寶鑑以肝為初變是肝者東方甲乙木也孫真人云新生曰芽兒芽者萬物始榮為芽應東方肝木為首以此之初變明矣凡小兒變蒸法者合相生而傳變矣故證錢氏寶鑑互有差殊之誤使後之學者不至疑惑也素問云天地俱生萬物以榮應言肝木為首也變蒸詩曰口中白泡起如珠蒸變居常有自殊壯熱來時還有退兒經初變長肌膚二蒸哯乳或多嗔寒熱來時嚏噴頻毛髮堅時生氣血過期七日有精神嬰兒體熱動心神汗出虛驚又畏人蒸變有期增骨髓時時反復學翻身四蒸木過體安康乳食甘甜覺異常穀氣暗增添意智雖能學坐未能行經絡流通第五蒸今時精志日俱增形神未定多嬌態掌骨生而匍匐能情昏神倦色偏移或自嬉歡或自悲蓋自陰陽當運合滋榮氣血正相宜七變憔悴昏兒目情思恓惶愛多哭近則五朝三日散遠過七日方平復八蒸驚哭要咨煎變易肌膚血氣堅微利腸鳴更膺熱精神充悅得人憐九蒸筋骨始能全氣血充脾不肯眠變過自然生意智肌膚潤澤臉如蓮十蒸學語幾般聲倚立停停又怕驚扶步堪憐猶未穩三焦通利暢心神氣實者迎暮行氣虛者期後行方龍膽湯治小兒初生血脈盛實寒熱溫壯四肢驚掣發熱大吐哯者若已能進哺飲食不消壯熱及變蒸不解中客忤鬾氣並諸驚癇悉療龍膽鉤藤柴胡去苗赤茯苓去黑皮桔梗炒黃芩去黑心芍藥大黃銼炒各一兩甘草炙銼蜣螂去翅足炙當歸切焙人參各一兩上粗搗篩一二歲兒每服一錢匕水五分煎至三分去滓溫服三四歲兒每服一錢匕半水一小盞煎至五分去滓連夜三四服量兒大小加減惺惺散出傅氏活嬰方退變蒸及溫病輕宜服及發熱咳嗽痰涎鼻塞聲重人參白朮白茯苓甘草白芍藥天花粉桔梗各半兩細辛一分上為末每服一錢水半小盞薑一片薄荷一葉煎至三分服之或除天花粉加川芎或加粉葛升麻柴胡等藥一方無白芍藥調氣散出直指方治變蒸吐瀉不乳不啼木香香附子炒去毛人參厚朴去粗皮薑汁炒橘皮藿香去土甘草各一錢上銼散每服三字水一盞生薑三片紅棗一枚煎溫服以上證候治之但當以平和之劑微表熱實者微利之柴胡湯一名人參散出聖惠方治小兒變蒸經時不止挾熱心煩啼叫不歇骨熱面黃柴胡去苗甘草炙銼人參玄參各一兩龍膽半兩麥門冬去心焙一兩半上粗搗篩每服一錢水八分盞煎至四分去滓溫服不拘時更量兒大小加減一方有防風無玄參清心湯出醫方妙選治嬰兒周晬內時或體熱眠睡不寧乳哺不調目睛不明或差或作三十二日一變六十四日再變甚者微驚乃長血氣名曰變蒸候過周晬漸除切不可亂投諸藥宜用人參半兩去蘆麻黃去節川大黃麥門冬去心甘草炙犀角用屑各一分上為細末每服一錢水八分入杏仁一個去皮尖拍破同煎至四分去滓放溫時時與服前胡湯治小兒變蒸熱氣乘心煩燥啼叫不已及骨蒸煩熱前胡去蘆頭龍膽甘草炙銼麥門冬去心焙人參各一兩上粗搗篩每服一錢匕水七分煎至四分去滓食後量兒大小加減服之紫砂丹出醫方妙選治證與前清心湯同當歸半兩焙硃砂水飛木香人參各一分去蘆代赭石半兩研細水浸一宿澄去清水焙乾上為細末與代赭石研勻入杏仁十枚去皮尖巴豆五個去心膜出油同研勻入麝香半錢拌勻滴水和如針頭大每服三粒至五粒煎荊芥湯下乳後當歸散出直指方治變蒸有寒無熱當歸二錢木香官桂辣者甘草人參各一錢上銼散每一錢水一盞薑三片紅棗一枚煎食前服紫丸一名紫雙丸出聖惠方治小兒變蒸發熱不解並夾食傷寒溫壯汗後熱不歇及腹中有痰癖哺乳不進乳則吐哯食癇先寒後熱赤石脂代赭各一兩醋碎巴豆三十粒去油杏仁五十枚去皮尖上為末巴豆杏仁別研為膏相和更搗二千杵當自相得若硬入少蜜同搗之密器中收三十日兒服如麻子一丸與少乳汁令下食頃後與少乳勿令多至日中當小下熱除若未全除明旦更與一丸百日兒服如小豆一丸以此準量增減夏月多熱喜冷發疹二三十日輒一服佳紫丸無所不療雖下不虛人代赭須真者若不真以左顧牡蠣代之一方爛飯杵為丸一歲二丸米湯下四君子湯治小兒變蒸時用四君子加茯神去白朮人參茯苓茯神各半兩甘草炙三錢上為細末薄荷煎湯調下慎不可服驚藥恐冷胃氣黑散治小兒變蒸中挾時行溫病或非變蒸時而得時行者亦治傷寒退熱一名黑膏子麻黃杏仁各半兩大黃六銖上搗麻黃大黃為散別研杏仁如脂乃細細內散又搗令調和內密器中一月兒服小豆大一枚以乳汁和服抱令得汗汗出以粉粉之勿使見風百日兒服如棗核以兒大小量之一方為末一歲兒半錢熟水調下一方以甘草薄荷湯下小紅綿散治變蒸驚悸自泄天麻人參全蠍麻黃甘草茯苓白附紅花荊芥辰砂麝香各等分上為末每服半錢薄荷同煎湯溫服防風飲子治變蒸驚悸焦啼哯乳手足抽掣防風羌活白附甘草川芎白茯苓全蠍人參各等分上㕮咀為散每服一錢鉤藤同煎防風散治變蒸潮熱焦啼哯乳欲發瘡癬山藥半兩白茯苓半兩白附半錢甘草二錢全蠍一錢人參防風各一錢上為末每服一錢或半錢鉤藤同煎溫平驚藥治嬰兒變蒸潮熱驚悸吐乳泄青夢裡佯啼嬉笑情思憔悴並宜服之茯苓遠志羌活防風白附川芎天麻全蠍粉草山藥硃砂代赭麝香白茯苓白微各等分上為末每服一錢金錢薄荷湯下天麻四君子湯治變蒸吐乳泄瀉人參白朮白茯苓天麻甘草各二錢上為末每服半錢熱湯點服及治慢驚體弱冬瓜仁棗子湯點服前胡飲子治變蒸潮熱煩渴頭痛瘡癤熱伏或疹痘未勻並宜服之升麻白芍藥乾葛前胡川芎甘草知母麻黃苦梗黃芩各等分上為末每服一錢蔥白薄荷同煎白朮散治變蒸風吐乳自泄人參白朮白茯苓甘草藿香山藥扁豆炒各等分上為末每服一錢熱湯點服清神散治變蒸潮熱傷寒兼傷風咳嗽氣急夜啼煩燥頭目昏沉麻黃去節二錢川芎半兩羌活二錢防風二錢荊芥二錢苦梗二錢甘草二錢茯苓半兩人參三錢上為散每服二錢薄荷同煎溫藏鉤藤膏治變蒸驚焦啼白附茯神甘草茯苓全蠍羌活天麻防風山藥蟬蛻殭蠶遠志人參硃砂麝香金箔各等分上為末煉蜜為丸鉤藤蘇木湯化下蟬花散治變蒸風痰潮熱焦啼蟬花白茯苓人參防風白附子甘草山藥全蠍天麻硃砂麝香各等分上為末每服一字金錢薄荷湯點服小紅丸治變蒸潮熱咳嗽多痰吐乳驚悸無時焦啼痄腮風痰並宜服之南星二錢生半夏二錢生白礬二錢生全蠍一錢巴