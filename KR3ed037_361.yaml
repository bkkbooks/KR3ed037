高是內瘹也方沉香飲治小兒驚氣入腹內瘹壯熱肚疼並受胎氣怯弱冷氣傷脾腹躽啼叫狀若鬼祟腹脹面青沉香木香炮當歸去蘆白朮甘草炙肉桂去皮枳殼麩炒五味子赤芍藥以上各等分上㕮咀半歲兒抄半錢水酒各半盞煎至五分去滓飢服大小加減辰砂散治小兒傷冷聚積驚風日久變成內瘹時人不識呼為祟硇砂半分紅芍藥鉛白霜各一分半琥珀研珍珠不鑽者為末各一分上為末每服一字金銀薄荷湯調下斬邪丹治小兒驚積內瘹時發肚疼夜啼驚叫乳香沒藥舶上茴香炒木香不見火鉤藤各一錢上為末將乳香沒藥二味乳鉢中研細然後勻諸藥切大蒜白三片研細和前藥丸如梧桐子大每服十丸十五丸鉤藤茴香湯吞下無時乳香丸其證腹痛多啼唇黑囊腫傴僂反張眼有斑血驚風內瘹啼乳香沒藥沉香各一兩蠍梢水洗四枚檳榔一兩半上為末煉蜜和丸菖蒲鉤藤煎湯下丸如黍米大一方無檳榔乳香丸治小兒驚風內瘹痛不可忍者乳香一錢半蠍梢二七個沒藥半錢沉香一錢半上為末煉蜜和丸如黍米大每服嬰孩三丸一歲五丸三歲七丸以意加減乳香湯吞下桃符丸治嬰孩驚風內瘹銀硃乳香各一錢研大蒜一個煨研上先研乳香極細後入銀硃再研後又同大蒜研看軟硬得所丸如緑豆大半歲每服五丸一歲七丸二三歲十丸以意加減薄荷湯化下沒石子丸治小兒驚風內瘹腹痛不可忍木香螺粉燒草烏頭生用去皮尖上為末用醋煮糊為丸如黍米大每服十丸淡醋吞下止痛丸治嬰孩內瘹大鱉子肉胡椒各等分上為細末用黑豆末醋作糊丸如緑豆大每服三四粒荊芥湯下治內瘹腹痛病源曰驚風內瘹腹痛多啼汗出糞青咬乳眼慢流涎或唇黑囊腫傴僂反張眼內有紅筋斑血虎口脈紋入掌上以青龍湯奪命丹並用鉤藤鉤子七個不蛀皂角子七粒薄荷七葉煎湯調服芎歸散治內瘹胎寒腹痛躽啼官桂當歸川芎香附子各一分川白薑木香甘草炒各半兩上為末每服半錢白水煎乳食前服木香散治驚風內瘹盤腸氣蟲痛黑牽牛末半生半熟大腹皮各一兩半檳榔雷丸錫灰醋炒三稜莪朮並煨木香大黃各一兩上為細末每服三錢空心蜜水或沙糖水調下仍先用燒豬肉一片細嚼不吞仍吐出卻服藥引蟲胎寒胃冷啼附論夫胎寒胃冷啼者由母妊娠之時寒溫失理動止乖違取涼飲冷冷氣停滯觸入胞中致生之後冷伏脾胃令令兒咳噎風邪暴傷令兒吐哯面白形青時時啼叫是胎寒胃冷故也小兒胎寒之病本於在胎時稟受不足或犯寒冷既生之後臟腑又怯弱乳哺不化或脹或利痢顏色青甚則邪冷與正氣相搏令兒腹痛躽張蹙氣而啼是為胎寒之病方蜀椒丸治小兒胎寒躽啼腹中痛舌上青下黑涎蜀椒去目皮羽者炒出汗一分當歸切焙半兩吳茱萸湯浸焙乾炒半分狼毒銼炒一分細辛去苗葉三分乾薑炮一分豉炒二合巴豆十枚去心膜研細紙裹出油盡附子炮裂去皮臍三分上將八味搗羅為末以巴豆一處同研令勻煉蜜為劑搗一千杵和丸一月兒服如黍米大一丸早晨晚後各一服一歲兒兩丸三歲至五歲兒服五丸並用米飲下更量兒大小加減當歸九治小兒胎寒躽啼驚癇虛脹不嗜食大便青或夾膿並治諸癇證當歸切焙半兩蜀椒去目及閉口者炒出汗一分附子一枚炮裂去皮臍狼毒銼炒半兩杏仁十二枚湯浸去皮尖雙仁麩炒豉微炒巴豆二十枚去皮心研爛去油盡細辛去苗葉各一分上為末煉蜜和杵以瓷器盛之每用旋丸未滿百日兒服如麻子大一丸溫水下一二歲兒二丸只早晨服更量兒大小加減以利為度楊氏當歸散治胎寒腹痛面色青自身冷腹痛多啼當歸炒黃耆蜜炒北細辛去土葉肉桂去皮陳皮去白白薑炮縮砂仁甘草炙各等分上㕮咀生薑糯米煎空心服當歸散治小兒胎寒聚唾弄舌躽啼反張怒驚釀乳法治中寒其證手足厥冷寒顫口禁暈悶口吐涎沫不能啼哭上用五積散薑棗煎子母服一方消積飲加丁香薑棗煎子母同服一方用食鹽同茱萸炒絹包尉兒臍腹乳附丸治小兒腹寒胃冷便青夾自膿心腹痛泄瀉氣虛腹痛啼叫有汗附子炮去皮乳香當歸切焙訶子炮去核桂心乾薑炮吳茱萸各等分上為末酒糊為丸如小豆大月內兒一丸鉤藤湯下或米飲食前大小加減服之芎藭湯治小兒胎寒腹痛躽啼芎藭當歸切焙黃耆銼焙各二兩乾薑炮甘草炙黃芩去黑心各半兩上粗搗篩每一錢用水一小盞煎至五分去滓分溫二服早晨日晚各一服量兒大小加減服之逐痛丸治小兒胎寒躽啼溫中止痛雀屎一分炒牛黃別研芍藥芎藭各半兩當歸切焙一兩上為細末煉蜜和丸如麻子大百日兒每服一丸乳汁下早晨日午近晚各一服量兒大小加減理中丸治小兒胎寒腹痛躽啼溫中止痛人參乾薑炮白朮甘草炙各等分上為末煉蜜為丸如彈子大每服一丸水一盞入大棗一枚擘破同煎至半盞分溫三服以薑棗湯化下保嬰方為末每服一錢白湯調下名理中湯當歸酒治小兒五十日以來胎寒腹痛微熱聚唾弄舌躽啼上視當歸切焙粗搗一分豬肉一兩薄切小片上用清酒一碗煮至七分去滓每服取半呷許令兒咽之日三夜一量兒大小加減胎熱伏心啼附論夫胎熱伏心啼者由母妊娠之時恣食辛酸多味炙煿厚衣焙服熱氣熏蒸觸入胎中致五味毒熱伏於經令兒恍惚風邪暴傷令兒驚啼面赤唇紅時時啼叫是胎熱伏心故也方導赤散治小兒燥啼面赤小便亦赤口中熱腹上亦熱或有汗仰身而啼至曉方息上以導赤散加黃芩煎未效通心飲加麥門冬車前子燈心薄荷煎與兒飲豬苓湯治邪熱在心本臟屬火復為熱所乘故炎上焦哭其證面紅小便赤口氣熱啼時時有汗仰身而啼煩燥畏燈火上以豬苓湯加辰砂導赤散小柴胡湯加黃芩生地黃並用燈心麥門冬或竹茹煎服芝燈湯治小兒熱證心燥夜啼上用芝麻清油燈花三兩顆研細用燈心數莖煎湯調塗口中以乳汁送下邪干心痛啼附論夫邪干心痛啼者本非起於心即邪氣客於心主之脈少陰者君心火也是五臟之主精神之舍心氣實則邪不干正心氣虛則邪傷於心則神去神去則死矣經曰真心痛旦發夕死夕發旦死凡諸邪在心者止在心包絡是心之別脈也蓋小兒稟受虛怯厥氣上逆痞而不散故發心痛而啼也一是邪熱在心本臟屬火復以熱所乘故炎上而焦哭其候舌白小便赤者是也宜服珍珠散小便赤澀壯熱宜導赤散又宜服官局紫雪二是恐有祟物所侵小兒目有所睹但口不能語而驚哭也其候兩手虎口俱無脈面變五色者是也玉環集三關虎口脈形歌云忽然兩手俱無見定知唐突惡神明宜服蘇合香丸仍以絳紗袋盛帶之及燒降真醋炭薰之三是有臟腑積冷或乳母飲食生冷令乳夾冷氣入兒腹遇夜半陰氣又盛或失蓋覆孩兒腹肚故作疼尤甚也其候大便青白而瀉宜服乳香沒藥等仍用蔥連白煎湯尉洗乳母宜服木香勻氣散宜服魏香散方治小兒邪祟所侵小兒目有所睹而驚哭其候兩手虎口俱無脈面變五色上研麝香雄黃硃砂同蘇合香丸降真湯下又方上用熟艾紙上烘熱外以帕子包尉臍腹中作兩包頻易如大便青瀉宜服錢氏益黃散蚯蚓丸治小兒本客忤一名黃土散上用淡豉灶中土蚯蚓糞用醋措和丸如雞子大摩兒囟上及手足心並臍上下各七次擘開有毛即棄之心腹痛啼附論夫卒然心腹刺痛啼叫悶欲絶死者蓋小兒氣血軟弱精神不足忽傷賊風遭邪氣中客忤皆虛而得之其證面易五色眼睛不視似驚癇狀是也無問大小若陰陽順理榮衛和平神守內堅邪不干正無諸暴疾也或腸胃挾冷暴為寒邪所折邪氣分爭攻衝上下亦令心腹刺痛而啼也方蘇合香丸治小兒心腹刺痛啼哭不住或中邪氣或沖客忤或驚氣入腹或夜啼瘹痛面色不定常服與少許辟邪氣瘟疾除癇霍亂白朮沉香香附子訶子炮去核木香檀香蓽澄茄丁香犀角各一兩麝香半兩蘇合香酒炙熬成膏乳香各一兩硃砂一兩腦子半兩安息香酒熬成膏人參各一兩上為末同蘇合香安息香膏八味煉蜜一處和為丸如雞頭米大半歲分作七服人參湯化下飢服六神散治腹痛啼哭面青口中冷氣四肢亦冷曲腰而啼大便泄瀉青白糞及不吮乳及治因身熱服藥既表解後再熱者蓋氣不歸原而陽浮於外故耳此非熱證也當用此藥加粳米煎和其胃氣歸內身體自涼人參山藥白朮各半兩甘草二錢白茯苓白扁豆炒各一兩上為末每服一錢薑二片棗一枚煎一方用當歸白芍藥人參各二錢半甘草桔梗陳皮各一錢為散每服一錢水煎時時與服前藥治胃冷加附子治風加天麻治痢加罌粟殼參香丸治小兒心腹痛並腸冷便青腹急痛乳香木香石菖蒲人參良薑炒各等分上為末酒糊丸如小豆大一歲五丸米湯下蓬仙丸治小兒心腹刺痛躽身啼哭腸冷便青發稀面黃肚腹膨脹桂心去皮乳香蓬莪朮炮各一錢上為末酒煮糊為丸如小豆大一歲三丸鉤藤湯下飢服蒜乳丸治冷證腹痛夜啼面青手冷大蒜一枚慢火煨香熟取出細研切日中或火上焙半乾研乳香半錢別研上研勻為丸如芥子大每服七粒乳空時服以乳汁送下治小兒腹痛夜啼牛黃如小豆大上用乳汁化服又臍下書田字瘥半夏丸治小兒腹中卒痛啼呼悶絶半夏生薑汁洗去滑暴乾一分上為末用酒麵糊丸如黍米大一月及百日兒每服三丸用薄荷湯下半年至一歲兒每服五丸一日三五服乳食作痛啼附論夫乳食作痛啼者因兒飲乳乳壅不散傷動脾胃脾胃氣弱不能消化滯乳停留與正氣交擊故成陳作痛而啼也湯氏曰臟寒腹痛由乳母食啖生冷觸冒風寒令乳夾冷氣入兒腹中遇夜半陰氣又盛或失蓋覆令兒腹冷作痛或胎中受寒亦令腹痛多啼其證大便青白而瀉面白方治臟寒腹痛用四君子湯加丁香白薑兼服木香勻氣散五積散又方以熟艾烘熱以帛包頻尉腹臍小兒不吃乳附論凡小兒初生看産人見兒出急以手掩拭兒口無令惡血得入兒喉則兒腹內調和無有疾病若掩拭不及則惡血穢露兒咽入腹令心腹痞滿故兒不吃乳也方硃砂丸治小兒三歲以下胃口閉不吃乳硃砂一分細研丁香一分麝香一分細研人參一分去蘆頭犀角屑半兩黃耆半兩銼石膏半兩細研水飛五靈脂半兩牛黃一分細研甘草一分炙微赤銼上搗羅為末入研了藥都研令勻煉蜜和丸如緑豆大每服以熟水下三丸日四五服龍膽散治小兒壯熱肚脹不飲乳龍膽半兩去蘆頭犀角屑一分川升麻半兩檳榔一分川大黃一分銼碎炒甘草一分炙微赤銼鱉甲一分塗醋炙令黃去裙襴上搗羅為散每服一錢以水一小盞煎至五分去滓放溫分減漸漸與服之如不乳更入後方摩頂膏治小兒鼻塞腦悶吃乳不得羊髓三兩當歸三分銼微炒細辛三分白芷三分木通三分野豬脂三兩上搗碎先下脂髓於鐺中入諸藥以慢火煎候白芷色焦黃藥成以綿濾去滓於瓷合內盛令凝每用少許塗頂門上摩之兼以少許入鼻內立效人參丸治小兒腹痛不食乳人參半兩去蘆頭黃連半兩去須龍膽半兩去蘆頭馬牙硝半兩甘草半兩炙微炒銼枳實半兩麩炒微黃上搗羅為末煉蜜和丸如梧桐子大每服以乳汁研二丸灌入口中日四五服瘥乳黃散治小兒腹痛不肯哺乳赤茯苓一分甘草一分炙微赤銼黃連一分去須上搗羅為末煉蜜和丸如梧桐子大每用一丸研破著奶頭上令兒吮奶或研點口中亦得硃砂散治小兒不吃乳眼目不開手足牽挽此是驚風硃砂一分龍齒一分消石一分上細研為散每服煎竹葉湯放溫調下一字如二歲以上兒每服半錢鹽黃散治初生兒不飲乳吐不止目呆面青不得啼哭蓬莪朮少許鹽兩黃米大上以奶汁一合煎三五沸去滓即加牛黃末兩粟米大分減服之立效青礞石丸治小兒吐奶白丁香一錢去土硫黃三錢青礞石一錢半百草霜一錢半五靈脂一錢半上為細末研米飯為丸如緑豆大捻作餅子每服三十餅溫水送下或淡薑湯糯米飲空心服漸加至五六十餅食前厚腸丸治小兒失乳以食飼之未有食腸不能克化或生腸脹四肢瘦弱或痢色無常橘皮三分去白大麥糵五錢炒半夏三分洗枳實三分炒蒼朮三錢制青皮三分去穰人參三分厚朴二分薑炙神麯末五分炒上為細末水麵糊為丸如麻子大每服二十丸溫水送下食前忌飽食
