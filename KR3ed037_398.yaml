body:
  text: 卷三百九十八嬰孩下痢門疳痢附論夫小兒疳痢者由乳哺不節生冷過度傷於脾胃冷熱相搏致腑臟不調久而不瘥即變諸疳若大腸虛弱水穀不化下痢無度是為疳痢其證面色萎黃肌體羸瘦盜汗壯熱皮毛焦枯嗜好酸鹹心腹虛脹痢下蘊瘀日夜無度是也方熊膽散治一切疳痢熊膽研雄黃研青黛研丹砂研各半兩甘草炙一兩黃礬燒令汁枯細辛去苗葉莨菪子炒各半兩蘆薈研龍膽當歸切焙白礬燒令汁盡蟬蛻炒蝦蟆炙焦各三分麝香研黃連去須黃蘗去須皮各一兩上為散六十日至百日孩子每服一字一二歲半錢三四歲一錢並米飲調下早晚食前服大疳丸治小兒疳痢羸瘦黃礬枯綠礬各一兩膽礬二錢干蝦蟆一枚去腸肚炙莨菪子葶藶洗各一分蝸牛四枚以上七味入在瓶內鹽泥固濟候乾火燒通赤取出研為細末胡黃連一分生蝸牛研三枚麝香研丹砂研雄黃研牛黃研各一分熊膽研訶黎勒皮細辛去苗葉各二分青黛半錢上為末和令勻燒粟米飯和丸如麻子大每服三丸至五丸薄荷湯下不拘時服量兒大小加減麝香丸治小兒疳痢不止體瘦食少腹痛羸弱麝香細研硃砂細研蘆薈細研雄黃細研母丁香細研鶴蝨細研白礬灰細研密陀僧細研沒藥龍膽去蘆頭地龍微炒熊膽細研各一分蟾酥一錢艾葉半兩炒令黃色肉豆蔻半兩去殼黃連半兩去須定粉半兩微炒上為末入研了再研令勻以麵糊和丸如綠豆大每服以粥飲下三丸三日服三次量兒大小加減蘆薈丸治小兒五疳八痢腹內積滯堅硬如石肚大筋青面黃羸瘦寒熱往來目澀口臭牙齦爛黑出血常服長肌退黃殺疳蟲進飲食消積滯青皮一兩去瓤陳皮一兩去白炙胡黃連一兩半石三稜半兩使君子一兩檳榔一兩熊膽半兩木香半兩蓬朮一兩神麯一兩炒麥糵一兩蘆薈半兩南星半兩蕪荑一錢半雷丸三錢炒上為末麵糊丸麻子大每服三十丸米湯送下食前服熊膽丸治小兒疳痢氣下痢腹大肌瘦常服熊膽研胡黃連夜明砂炒青黛研黃連去須各一錢一分肉豆蔻一枚去殼蘆薈一分研龍腦一錢研蟾頭一枚酥炙麝香三錢研使君子一分去殼丁香半分無食子一分上為末粟米飯為丸如綠豆大每服七丸至十丸米飲下日三服青金丹治小兒驚風諸疳諸痢病疳瘠黃疸喘粗有氣者或下蟲數合無不即瘥肥壯無疾用之有益青黛研三分雄黃研胡黃連末各二分丹砂研膩粉熊膽溫水化白附子為末蘆薈研各一兩麝香研半兩蟾酥燒酒化研水銀各桐子大鉛霜研龍腦研各一錢上同為末入乳缽內再研令勻用獖豬膽一枚取汁熬過浸蒸餅少許為丸黃米大曝乾一歲可服二丸量大小增減驚風諸癇先以一丸溫水化滴鼻中令嚏戴目者當自下瘛瘲亦定更用薄荷湯下諸疳米粥飲下變蒸寒熱薄荷湯下諸瀉痢米飲下疳蚘咬心楝實煎湯下鼻下赤爛口齒疳蟲口瘡等乳汁研塗病疳眼雀目白羊子肝一枚竹刀批開內藥肝中以麻縷纏米疳煮令熱空心服乳母常忌毒魚大蒜雞豬肉治疳最佳肥兒丸治小兒五疳八痢陰陽氣不順虛痞腹脹嘔逆腹痛瀉痢消化乳癖積聚肥退面黃瘦殺蟲安胃進飲食此藥應有小兒疳病累服藥未效者不問虛實便與數服即安檳榔用面劑煨煨熟去面銼焙陳皮洗去白青皮去白胡黃連宣連去須銼碎微炒白蕪荑炒去扇使君子煨去皮肉豆蔻如檳榔法煨人參去蘆夜明砂微炒赤白芍藥龍膽草上等分為末麵糊為丸如蘿蔔子大每服三五十丸同紫蘇木瓜湯下瀉痢米飲下不計時候日二三服更量兒大小加減青黛散治小兒疳痢脊膂如鋸眼口鼻癢自咬指甲頭髮乾焦下部急痛青黛細研雄黃研硃砂細研附子炮裂去皮臍藜蘆去蘆頭胡黃連研細辛研麝香細研白礬灰研黃礬研莨菪子水淘去浮者水煮令芽曝乾炒令微焦以上各一分上都研令勻每服以粥飲下半錢早晨晚後各一服量兒大小加減服之木香丸治小兒疳痢日夜不止體瘦乏力不能飲食木香蟬殼微炒去足肉豆蔻去殼黃丹微炒硃砂細研夜明砂微炒各一兩赤石脂細研半兩黃連半兩微炒去須田父一枚燒灰蝸牛二十枚炒微黃麝香一錢細研上羅為末入研了藥令勻以湯浸蒸餅和丸如綠豆大每服以溫粥飲下五丸日三服量兒大小加減厚朴丸治小兒疳痢嘔逆厚朴去粗皮生薑汁炙三分龍骨半兩白茯苓去黑皮人參各三分去蘆白石脂半兩陳橘皮去白切焙一分當歸切焙三分肉豆蔻一枚去殼烏梅肉炒乾木瓜各半分上為末煉蜜為丸如麻子大每服五七丸煎薑棗湯下食前服使君子丸治小兒五疳瀉痢肌膚黃瘦多困好吃泥土五心常熱煩渴引飲夜多虛汗使君子去殼麵裹煨銼木香無食子各五枚赤芍藥蘆薈研各一分肉豆蔻去殼檳榔煨銼各一枚黃連去須麒麟竭研麝香研各一分上為末粟米飲丸如麻子大每服五丸至十丸米飲下不拘時服夏秋宜常服蘭香散治小兒一切疳痢蘭香人糞白狗糞蝦蟆白礬蜘蛛蚯蚓蝸牛子八味並燒灰蘆薈研蚺蛇膽研各一分上為散以葦管斜批吹少許入鼻中及齒上更以蜜和塗紙上貼之蘆薈丸治小兒疳痢四肢羸瘦腹脹鼻癢皮膚乾燥下痢不止蘆薈細研雄黃細研沒石子蛇蛻皮燒灰丁香熊膽蟬殼微炒去足蟾酥研入以上各一分麝香黃連各半兩微炒去須上為末煉蜜丸如米大每服以粥湯下三丸別研一丸吹鼻中量兒大小加減服之龍骨丸治小兒疳痢日夜度數不止肌體羸瘦龍骨半兩雄黃一錢細研麝香一錢細研硃砂一錢細研橡實半兩蝸牛二十枚炒令微黃牛黃一錢細研白土一錢青黛一錢訶黎勒一分煨去皮上羅為末入研令勻用麵糊和丸如綠豆大每服以粥飲下五丸日三服量兒大小加減龍骨湯治小兒三歲以上疳痢口瘡身體腳手心熱龍骨一兩黃連去須黃蘗去粗皮炙地榆炙各三分白頭翁乾薑炮當歸切焙酸石榴皮白朮各半兩上粗搗篩一二歲每服半錢水半盞姜三片同煎至三分去滓分溫二服早晚食前服量兒大小加減口瘡取蘆薈赤地利末敷之下部生瘡取蚺蛇膽黃連麝香等分為末塗敷之一方有高良薑沉香散治小兒疳痢黃瘦焦枯壯熱脹滿沉香銼丁香酸石榴皮各二分木香肉豆蔻去殼訶黎勒炮去核無食子縮砂仁各三分使君子去皮半兩上為末煉蜜調成煎每服一豆大米飲化下熊膽丸治小兒疳痢脾胃虛冷乳食不化臍腹疼痛熊膽一分附子一枚炮裂去皮臍巴豆七枚去皮心研紙裹壓去油定粉一兩炒微黃黃丹二兩醋炒令紫色淨砒霜一錢細研乾薑一分煨裂銼硫黃一錢細研訶黎勒一分煨用皮上為末湯浸蒸餅和丸如黃米大每服以冷水下二丸量兒大小加減切忌熱物定命丸治小兒疳痢青黛研三分烏蛇去皮骨酒炙一分白附子一枚乾蠍炒七個膩粉研一分獨角仙去足炙一枚棘剛子去殼七枚麝香研一分上為末用豬膽汁丸如黍米大每服三丸早晨晚後溫水下金髓丸治小兒急疳痢不止或膿或血或青或黃髮結成穗或墮落鼻乾咬指好吃土炭金牙一分烏頭生去皮臍半兩肉豆蔻去殼一枚訶黎勒煨去核二枚石中黃如無禹餘糧代麝香研丹砂研各一分黃連搗末用雞子一枚取清和末並餅炙乾一兩上搗研為末煉蜜丸如綠豆大每服五丸空心米飲下日晚再服量兒大小加減胡黃連丸治小兒氣疳下痢腹脹胡黃連半兩蛇蛻炙一分蝦蟆炙半兩青黛細研一分蝸牛細研半兩木香一兩訶黎勒皮半兩麝香一分上為末用飯為丸如綠豆大每服三五丸米飲下蟲出為度至聖丸治小兒疳痢腹脹肌瘦泄瀉不止使君子二十枚去殼肉豆蔻一枚去殼丁香神麯炒雄黃研細熊膽研各一分麝香細研半錢訶黎勒皮一錢上為末白麵糊和丸如綠豆大每服十丸米飲下乳食前量兒大小加減香橘丸治小兒疳痢冷熱不調水穀不化使君子二兩去皮訶子肉五錢神麯麥芽甘草炙厚朴各五錢薑製陳皮三錢木香二錢半上為末煉蜜丸米湯化下水蓼丹治血痢疳瘦蛇蛻皮燒灰雞頭殼燒灰存性各一兩胡黃連硃砂水蓼各半兩以上搗羅為末蘆薈一分牛黃一分粉霜一錢並各研極細上為末軟飯和丸如黍米大每服五粒至七粒麝香湯下量大小加減不拘時候神聖散治小兒疳痢腹大口乾四肢羸弱下痢不止干蝦蟆一枚五月五日收者去肚腸獨顆蒜一顆搗研川椒半兩去目以上二味入蝦蟆腹中用著大麥麵餅裹燒令焦黃色搗羅為末麝香一錢細研龍腦半錢蘆薈一分硃砂一錢雄黃二錢細研上與前藥同研為散每服以粥飲調下半錢日三四服量兒大小加減服之百中湯治小兒疳痢樗皮炙黃連去須枳殼去瓤炒蕪荑各半兩生薑一分豆豉半兩蔥白三莖上細銼以水五合浸經宿平旦煎取三合量兒大小空腹服之初服經日昏沉後漸漸蘇來全效更作一劑熱渴與竹瀝飲之阿膠丸一名白龍骨散治小兒一切痢久成疳阿膠炒令燥白龍骨細研黃連去須白石脂細研雞屎白炒一方用雞屎丸胡粉炒研赤茯苓去黑皮各一兩上為末煉蜜丸如麻子大每服米飲下三丸食前服更量兒大小加減丹砂丸治小兒五疳八痢丹砂研青黛研各一分丁香半分肉豆蔻去殼一枚無食子一枚麝香研一錢干蝦蟆去頭足酥塗炙一枚上為末麵糊丸如黃米大每服三丸至五丸空心米飲下胡黃連丸治小兒疳痢皮毛焦枯身體羸瘦喜食酸鹹心腹脹發熱胡黃連一分芎藭蓬莪朮煨銼青橘皮去白焙各半兩乾薑炮一錢京三稜三錢煨陳橘皮去白炒半兩上為末每抄一錢入巴豆十粒去皮心膜入冷油內慢火煎墨色研細煮醋麵糊丸如黍米大一歲一丸薄荷湯下二肝丹地膽草漏蘆菖蒲一寸九節煮各一兩胡黃連地榆各半兩以上搗羅為末雞肝豬肝一兩鹽少許同諸藥煮肝上為末臼中搗一二百下成膏如黍米大每服十粒麝香湯下乳食前量兒大小加減青黛散治小兒疳痢下部癢青黛一分蟾灰一分赤石脂半兩訶黎勒皮一兩煨胡粉一分炒黃連一分去須炒麝香一分細研上搗為散每服以乳汁調下半錢日三四服量兒大小加減桃皮散一名丁香散治小兒疳痢赤白及一切痢並下部濕䘌桃白皮炙半兩黃連去須胡粉炒研赤茯苓去黑皮各一兩一方用白茯苓黃蘗去粗皮各半兩丁香七粒上為散每服半錢米飲調下早晚前服量兒大小加減豆蔻丸治小兒疳痢及吐不吃乳食四肢瘦弱肉豆蔻去殼一枚木香半兩丹砂研人參訶黎勒煨去核皮麝香研各一分上為末用飯丸如麻子大每服三丸空心米飲下日再服更量大小加減龍齒散治小兒疳痢或口內生瘡龍齒半兩丁香一分黃連去須胡粉炒赤茯苓去黑皮各半兩枳殼去瓤麩炒一分上為散每服半錢粥飲調下食前服量兒大小加減或加牛黃一錢亦得有鮮血加蕪荑一分肉豆蔻丸肉豆蔻去殼一枚訶黎勒炮去核三枚黃連去須一錢赤石脂細研一錢木香一分蟾頭生薑汁炙一枚上為末用蝸牛肉研為丸如黍米大焙乾每服三丸至五丸粥飲下食前服六神丸治小兒疳痢羸瘦飲食減少及肚瀉並驟瀉丁香木香肉豆蔻去殼秤各半兩三味同麵裹慢火煨蘆薈研一兩使君子去殼訶黎勒各半兩上為末棗肉為丸如綠豆大每服三丸至五丸米飲下空心服一方不用棗肉爛飯為丸蓋飯引入脾也驟瀉不已用金星丸等推去滯調理脾胃黃連木香丸治小兒疳痢無常色黃連去須木香各半兩麝香研一錢定粉一分狗肝一具竹刀切蝦蟆一枚切上為末將狗肝蝦蟆用酒三升煮爛至一升去滓煎成膏丸前末如綠豆大每服三丸空心米飲下更量兒大小加減莨菪丸治小兒疳痢面黃體瘦盜汗壯熱心腹虛脹皮毛焦枯莨菪子醋浸一宿炒一兩木香胡