氣下推出肛門不入赤石脂剔去上陳伏龍肝各等分上為細末每服半錢敷腸頭上每日三上用附子散治小兒大腸虛冷肛門脫出多因下痢得之宜以藥敷附子生去皮龍骨各一兩上搗細羅為散每用一錢敷在肛門上按令入頻用之以瘥為度又方黑狗脊剔荊芥銼各一兩上以水二升煎令沸先噓後洗立效治小兒脫肛久不瘥雀糞半兩乾薑一分炮製碎銼上羅為散每服一錢白麵半匙同搜作餺飥煮熟入鹽醋少許每日早晨一服量兒大小加減服之治小兒下痢肛腸下脫久不瘥方用大蜘蛛濕紙裹燒焦存性入麝香少許同研細先用溫湯淋洗肛邊軟帛搤干摻藥敷之立效一方治卒脫肛者無麝香更燒桑葉熏治痢頻脫肛黑色生殼方用巴豆殼燒灰芭蕉自然汁煮入朴硝少許洗軟用真清油點三滴於三角白礬煅過研爛真龍骨少許同研糝肛頭用芭蕉葉托上勿令使出入令大人抱定治大腸虛肛門出洗方用香附子荊芥皂角煎水洗又方以蔥湯洗令軟用芭蕉葉托上又方用五倍子朴硝大腹皮煎水洗以赤石脂末糝在芭蕉葉上托入貼方用萆麻子四十九粒研爛水調作餅子貼囟門頂上收上即洗之水聖散子治脫肛不收用浮萍草不拘多少杵為細末干貼患處紫蕺膏治臟熱肛門脫出用紫背蕺一大握又以魚腥草搗爛如泥先朴硝水洗糝肛門用芭蕉葉托入卻用藥於臀下貼坐自然收入抵聖散治小兒腹中虛痛肛門脫出用五倍子不拘多少為末煉蜜調入如膏攤油紙上貼之托入一方入茶少許糝腸頭上絹帛揉入一方糝患處以物襯手揉入切忌吃發風毒物治男子婦人小兒脫肛用干蝦蟆皮一片瓶中燒煙燻治小兒因痢肛門脫以鐵精粉一方磨刀水洗之亦效一方煮水洗之治小兒若五歲以下脫肛以紫草汁半合子調散和酒令服之忌生冷陳倉米等治小兒脫肛一名收肛散用團魚頭不拘多少燒灰存性入麝香一錢為細末糝在肛上一方無麝香用鱉頭甲灰取粉撲之治腸頭作癢即是有蟲用生艾苦楝根煎湯熏洗敗毒散治風邪入大腸脫肛用敗毒散一貼加陳米煎服或噤口不食加石蓮肉煎桑葉方用黃皮桑取葉二升煎帶溫以布盛罨小兒肛門輕手按入次用門臼中細塵綿蘸撲之治脫肛法用蒲黃一兩豬脂二兩煉和成膏塗腸頭上即縮入又方治小兒痢脫肛用白龍骨末敷肛門腸頭上不過三上瘥治瀉痢後脫肛用陳槐花不拘多少為末陳米飲調下治小兒因痢後躽氣下推出肛門不入方用細墨末每服以溫酒調下一字日三服又方用鱉頭一枚炙令焦為末以米飲調下半錢日三服一方用馬藺花半兩搗細散以漿水先洗拭乾糝藥末半錢於故綿子上按入每日用之以瘥為度又方用生鐵二斤以水三碗煮取一碗候冷暖得所洗之立瘥治小兒大腸虛冷脫肛方用莨菪子一兩炒令黑色為末先以暖水淨洗干拭塗藥半錢卻內入腸不過三上不出便以蕓薹子熟研為末一錢以醋調塗胡餅上炙乾分減與食之又方為女萎五兩燒熏下部三五上瘥鉤藤丸治脫肛及諸痔下膿不止白礬綠礬訶子苦栝蔞燒枳殼炒白附子制南星生雞冠花炒附子去皮半夏蝟破瓶內燒存性胡桃肉不油者燒存性上各等分為末麵糊丸如麻子大每服二十丸空心送下又方用水楊梅根煮水熏洗用馬恰葉托上木鱉子丸治小兒久痢腸滑脫肛沉香二錢枳殼半兩麩炒去瓤五靈脂半兩微炒木鱉子連殼秤半兩去殼用上件前三味為細末次入木鱉子同研細醋煮麵糊為丸如黍米大二歲兒每服三十丸醋調茶清送下乳食前服龍骨散小兒久痢脫肛宜服龍骨赤石脂訶子煨去核白朮枳殼麩炒去瓤以上五味各等分上件為細末每服一錢溫米飲調下乳食前服歸腸散治小兒腸虛脫肛橡斗子半兩蜜炙黃木賊半兩燒灰留性上件為細末每服一錢陳米飲調下乳食前服治小兒脫肛先用麻油湯熱熏患處候溫旋洗之即以五倍子細末多糝軟手揉入切忌食發風等毒物又勿令為外風所傷治小兒脫肛血痢以榼籐子燒灰服
